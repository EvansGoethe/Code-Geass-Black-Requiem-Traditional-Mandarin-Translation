 wtt_border_conflict_won_attacker.1.t:0 "[their_state.GetName]大捷"
 wtt_border_conflict_won_attacker.1.desc:0 "日前在[our_state.GetName]和[their_state.GetName]交界地區發生的衝突最終以我軍完勝[their_country.GetLeader]軍隊而告捷。[their_country.GetAdjective]軍隊現已被擊退，而我方則順勢攻佔了此爭議地區。"
 wtt_border_conflict_won_attacker.1.a:0 "我們展現了自身的實力！"
 wtt_border_conflict_won_defender.1.t:0 "[their_state.GetName]大捷"
 wtt_border_conflict_won_defender.1.desc:0 "日前在[our_state.GetName]和[their_state.GetName]交界地區發生的衝突最終以我軍完勝[their_country.GetLeader]軍隊而告捷。[their_country.GetAdjective]軍隊現已被擊退，而我方則順勢攻佔了此爭議地區。"
 wtt_border_conflict_won_defender.1.a:0 "我們展現了自身的實力！"
 wtt_border_conflict_lost_attacker.1.t:0 "[our_state.GetName]兵敗"
 wtt_border_conflict_lost_attacker.1.desc:0 "日前[their_country.GetLeader]麾下的軍隊在[our_state.GetName]和[their_state.GetName]的爭議地區擊退了我軍。所幸我軍轉進途中秩序井然，正在重整以備未來的再戰。"
 wtt_border_conflict_lost_attacker.1.a:0 "我們必須儘快反擊！"
 wtt_border_conflict_lost_defender.1.t:0 "[our_state.GetName]兵敗"
 wtt_border_conflict_lost_defender.1.desc:0 "日前[their_country.GetLeader]麾下的軍隊在[our_state.GetName]和[their_state.GetName]的爭議地區擊退了我軍。所幸我軍轉進途中秩序井然，正在重整以備未來的再戰。"
 wtt_border_conflict_lost_defender.1.a:0 "我們必須儘快反擊！"
 wtt_border_conflict_canceled_attacker.1.t:0 "[their_state.GetName]困局"
 wtt_border_conflict_canceled_attacker.1.desc:0 "由於雙方均無力擊退對方，日前在[our_state.GetName]和[their_state.GetName]交界地區的交火已陷入了僵局，敵我兩軍均未取得任何較大進展。偵察兵報告稱[their_country.GetAdjective]的士兵正在其戰線一側構築防禦工事，看起來相比於進攻，他們更希望維持現狀。"
 wtt_border_conflict_canceled_attacker.1.a:0 "我們會回來的。"
 wtt_border_conflict_canceled_defender.1.t:0 "[their_state.GetName]困局"
 wtt_border_conflict_canceled_defender.1.desc:0 "由於雙方均無力擊退對方，日前在[our_state.GetName]和[their_state.GetName]交界地區的交火已陷入了僵局，敵我兩軍均未取得任何較大進展。偵察兵報告稱[their_country.GetAdjective]的士兵正在其戰線一側構築防禦工事，看起來相比於進攻，他們更希望維持現狀。"
 wtt_border_conflict_canceled_defender.1.a:0 "我們會回來的。"
 wtt_border_incident_defender_warning.1.t:0 "[From.GetNameDefCap]威脅着我們的邊境"
 wtt_border_incident_defender_warning.1.desc:0 "昨日早些時候，我們發現[their_country.GetAdjective]的士兵正自[attacker_state.GetName]出擊越境侵入[defender_state.GetName]。而在當日晚間，更多的[their_country.GetAdjective]部隊業已開抵此地區，並在我方領土內構築防禦陣地。\n\n在此之後，[their_country.GetLeader]麾下的軍隊與我方在整條邊境線上爆發了一系列的邊境衝突以及交火。\n\n至此，形勢已然十分明顯，[their_country.GetAdjective]軍隊進犯我方疆界且拒不撤退。我們必須儘快組織力量進行反擊，阻止其進一步的侵略。"
 wtt_border_incident_defender_warning.1.a:0 "動員所有可用的軍隊！"
 wtt_border_conflict_escalate_to_war.1.t:0 "[From.GetNameDefCap]正在做戰爭動員"
 wtt_border_conflict_escalate_to_war.1.desc:0 "據偵察員報告，[From.GetAdjective]士兵正在大批湧入[their_state.GetName]，參加進軍[our_state.GetName]的大規模行動。鑑於[From.GetLeader]願意花費在這次冒險上的資源數量，很明顯，這不僅僅是一場關於邊界線或者貿易線路的確切位置的糾紛。\n\n大戰在即。"
 wtt_border_conflict_escalate_to_war.1.a:0 "我們必須做好直面他們的準備！"