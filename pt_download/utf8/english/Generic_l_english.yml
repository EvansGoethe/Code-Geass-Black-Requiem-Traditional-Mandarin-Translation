 russian_civil_war:0 "俄國內戰"
 russian_civil_war_Desc:0 "隨着俄國內戰的爆發，世界列強達成協議，只向俄國交戰各方提供有限的援助。"
 gen_exploring_our_options:0 "探索我們的方案"
 gen_exploring_our_options_desc:0 "我們或許在國家變革方面受到限制，但至少我們可以決定內部的治理方式。當一個國家被那些稍有不慎便能將其毀滅的勢力所包圍時，意識形態不應成爲其發展的桎梏。"
 gen_authoritarianism:0 "威權主義"
 gen_authoritarianism_desc:0 "我們已經完全掌控了國家。有人說這是靠武力，也有人認爲這是因爲人民信任我們，相信我們能保障他們的安全。無論如何，我們都會充分利用當前的形勢。"
 gen_tolalitarian_BR_socialism:0 "極權社會主義"
 gen_tolalitarian_BR_socialism_desc:0 "極權政府以捍衛其社會主義理想的名義，通過宣傳和脅迫手段，試圖完全控制公民的生活。儘管國家有時會努力提升人民的生活水平，但其餘時間都用於鞏固對國家的統治。"
 gen_secret_police:0 "祕密警察"
 gen_secret_police_desc:0 "我們無法保證我們的人民不會受到外國勢力的影響。世界上充斥着不尊重國界和文化的擴張主義國家。爲了保護我們自身和我們的人民，我們需要一支效忠政府、能夠祕密行動且不受法律約束的警察部隊。"
 gen_command_economy:0 "徵用經濟"
 gen_command_economy_desc:0 "政府的職責是引導人民，這一責任也延伸至經濟領域。我們必須將企業和工會國有化。爲了確保國家朝着正確的方向前進，我們必須自己僱用人民。"
 gen_autocracy:0 "專制主義"
 gen_autocracy_desc:0 "專制政府由一位統治者掌控國家絕對權力，幷包攬一切決策。專制政體自君主制和城邦時代就已存在。在需要快速決策時，專制政體展現出強大的效力，但同時也導致一人可以隨心所欲地帶領國家走上任何道路，而無需顧及人民的意願。"
 gen_I_am_the_law:0 "我就是法律"
 gen_I_am_the_law_desc:0 "維護法律和秩序對國家的穩定至關重要。人民瞭解並尊重這一社會準則。他們知道我會帶領他們度過任何可能面臨的黑暗時期，但要做到這一點，我必須擺脫束縛普通人的法律枷鎖。畢竟，是我制定了法律，是我修改了憲法。此時此刻，我就是法律本身。"
 gen_appointed_ministers:0 "任命內閣顧問"
 gen_appointed_ministers_desc:0 "一個人無法獨攬大權，但他可以選擇自己的顧問。罷免持不同意見的大臣是維護政治團結的必要權力。不過說實話，能夠制止大臣們的虛張聲勢和爭吵，也是我非常感激的一項權利。"
 gen_nationalism:0 "極端民族主義"
 gen_nationalism_desc:0 "極端民族主義政府對其人民及其控制的任何國家行使絕對權力，無論是通過佔領性軍事力量還是在必要時施加經濟壓力。民粹主義者堅信本國優越性和控制他國的權利，這爲其擴張主義外交政策提供了正當理由。"
 gen_mandated_draft:0 "強制徵召"
 gen_mandated_draft_desc:0 "國家有責任服務人民，而人民也有義務服務國家，捍衛國家的榮譽、繁榮和霸權。不願爲國家做出貢獻的公民，是對國家和同胞的極大不尊重，必將受到相應的懲罰。"
 gen_expansionist_economy:0 "擴張主義經濟"
 gen_expansionist_economy_desc:0 "我們國家的影響力遠超國界。我們必須時刻保持一支常備軍，以便捍衛我們的主權，懲罰任何企圖破壞我們的人。爲了維護這些領土，我們的經濟必須優先服務於軍隊，爲他們提供一切所需，以確保我們國家的強大。"
 gen_state_first_mentality:0 "國家優先心態"
 gen_state_first_mentality_desc:0 "人民只不過是國家生存所必需的一羣物品。教育民衆，確保他們明白國家至上，他們只效忠於國家，這是我們政權維持影響力的必要條件。"
 gen_third_way:0 "取其中道"
 gen_third_way_desc:0 "固守單一意識形態是愚蠢的。我們可以兼得兩者之長，而不受任何弊端之苦。歷史上，威權主義和自由主義的結合從未出錯，不是嗎？"
 gen_revolutionary:0 "強硬派社會主義"
 gen_revolutionary_desc:0 "一個強硬的社會主義社會會不惜一切代價堅定地捍衛其公有的生產資料和分配方式，確保每個公民無論個人境遇如何，都享有平等的地位。若有人膽敢以任何方式擾亂這一社會秩序的人，都將被鄰國強行驅逐出境。"
 gen_government_unions:0 "政府工會"
 gen_government_unions_desc:0 "如果不加以監管，工會可能會威脅到我們國家的根基。作爲一個國家，我們必須在它們構成國家安全威脅之前採取措施。不如讓國家來管理它們？"
 gen_the_means_of_production:0 "生產資料"
 gen_the_means_of_production_desc:0 "人民只受一種觀念控制，那就是消費主義思維。我們必須將他們從這種冷酷無情的慾望中解放出來，賦予他們自力更生的能力，使他們在政府的統治下改善生活。"
 gen_authoritarian_dem:0 "威權民主主義"
 gen_authoritarian_dem_desc:0 "威權民主不過是企業與富人矛盾的過度擴張。他們代表整個羣體發聲，同時通過遊說維持自身權力。公衆對此心甘情願，因爲他們得以享受投票權——儘管這些選票最終都受制於權勢人物操控的代表。"
 gen_getting_the_logs:0 "激進記錄"
 gen_getting_the_logs_desc:0 "我們國家有些人可能會公開反抗和違抗政府。我們應該密切關注這些顛覆分子，記錄他們的活動，以防將來這些極端分子的行爲造成任何問題。"
 gen_regulating_entry:0 "規範經濟"
 gen_regulating_entry_desc:0 "我們要規範我國經濟。不能坐視外國企業繼續無限制地運營而我們的人民卻因他們貪婪行徑受苦。因此，我們必須管制他們的影響力，這樣他們就不像我們的國有企業這麼強大。"
 gen_one_party_one_state:0 "一黨一國"
 gen_one_party_one_state_desc:0 "只有一黨總攬政府的方方面面，我們的政治機構才能真正地運行。只要有任何反對都會妨礙對國家和人民的治理——這種想法真讓人震驚"
 gen_liberalism:0 "溫和自由主義"
 gen_liberalism_desc:0 "在君主們統治世界、EU又在成員國間奉行威權民主的當下，任何政治上居中的國家相較之下都成了自由主義的天堂。儘管這些國家的自由徒有其名，其寬鬆的意識形態仍使它們成為最宜居住的安全之地。"
 gen_moderate_liberalism:0 "溫和自由主義"
 gen_moderate_liberalism_desc:0 "在這個時代自由主義已經十分少見，因爲皇帝查爾斯·zi·不列顛尼亞會直接扼殺所有自稱開放社會的國家。只有EU和少數其他國家敢於涉足自由主義理念。"
 gen_conservatism:0 "溫和保守主義"
 gen_conservatism_desc:0 "保守主義成爲了這個世界新的“左”翼。這是一個國家最安全的道路——既不會引起中國和不列顛尼亞的憤怒，也不用爲了迎合它們的要求而徹底改變原有的國家結構。這迫使國家陷入停滯，但也讓這個國家不被世界上其他國家盯上。"
 gen_corruption_free_statesmen:0 "廉潔的政治家"
 gen_corruption_free_statesmen_desc:0 "越來越明顯的是，我們的一些政治家同僚已腐敗透頂。這些人公然利用公職謀取私利，理應被認定為不適任。"
 gen_fear_of_change:0 "對變革的恐懼"
 gen_fear_of_change_desc:0 "人民對國家的走向感到恐懼，所以我們必須讓他們相信這一切都是為了更好的未來。我們必須為所有人的美好未來而努力；唯有如此，我們作為國家與民族才能繁榮昌盛。"
 gen_employment_as_a_right:0 "就業作為一項權利"
 gen_employment_as_a_right_desc:0 "失業在我國經濟中十分普遍。我們需要讓人民重返工作崗位，這不僅是為了改善經濟，更是為了改善他們的生活。工作是我國每一個人的天賦權利。"
 gen_times_of_change:0 "變革之時"
 gen_times_of_change_desc:0 "我們的國家確實在向好的方向轉變。變革之時即將到來。我們將成為一個人人平等、遠離戰爭、饑荒、貧困與腐敗的國家。更美好的明天正等著我們。"
 gen_progressive:0 "溫和社會主義"
 gen_progressive_desc:0 "雖然社會主義仍是長期目標，溫和社會主義者更關心的是遏制資本主義的過度膨脹，並且一直支持近來使企業與政府更具人性的進步改革。"
 gen_a_united_front:0 "統一戰線"
 gen_a_united_front_desc:0 "激進的政治勢力近來在我國甚囂塵上。我們必須組成統一戰線，團結一致對抗威權主義以及任何企圖摧毀我們立場的意識形態！"
 gen_international_trade:0 "國際貿易"
 gen_international_trade_desc:0 "我們必須擁抱國際貿易以改善經濟，並與其他國家建立友好的貿易關係。這些關係將來必定使我們受益，而在此期間，我們還能獲得最上等的絲綢。"
 gen_individual_rights:0 "個人權利"
 gen_individual_rights_desc:0 "沒有人民就沒有國家。人民構成了民族國家的根基，而國家則作為代議機構回過頭來為人民服務。人人為我，我為人人！"
 gen_our_own_block:0 "我們自己的集團"
 gen_our_own_block_desc:0 "如今我們的國家正走在自己開創的道路上，我們擁有足夠的穩定與內在力量來維護主權——即使淪為傀儡國或加入多國同盟也是如此。"
 gen_Industrial_Development:0 "工業發展"
 gen_Industrial_Development_desc:0 "我們的國家迫切需要一場工業大改造。我們需要投資更先進的工業化體系，使國家擺脫在這動盪時代所陷入的經濟困境。"
 Civillian_Sector:0 "民用部門"
 Civillian_Sector_desc:0 "是時候從零開始建造新工廠了。有了這些工廠，我們的國家就能達到成為經濟強國所需的產能與永續能力。"
 Civilian_Sector_2:0 "民用部門2"
 Civilian_Sector_2_desc:0 "作為現行經濟政策的延續，政府將投資更多國有工廠，以提振國家經濟，並為人民的長期經濟繁榮而努力。"
 Civilian_Sector_3:0 "民用部門3"
 Civilian_Sector_3_desc:0 "為達成經濟計畫的中期目標，我們將繼續專注於工廠建設，以滿足日益成長的消費工業的需求。"
 Civillian_Sector_4:0 "民用部門4"
 Civillian_Sector_4_desc:0 "隨著經濟計畫的最後步驟開花結果，引領我國走向富裕繁榮的巔峰之作終於可以啟動了！在不久的將來，世界列國都將在我們純粹的經濟實力面前俯首！"
 Infastructure_Sector:0 "基礎設施部門"
 Infastructure_Sector_desc:0 "由於過去的腐敗與無知，我們長期疏於維護，國家的基礎設施已然破敗。我們必須發起一項修復與擴建基礎設施的計畫，使其重現昔日榮光。"
 Infastructure_Sector_2:0 "基礎設施部門2"
 Infastructure_Sector_2_desc:0 "基礎設施發展的下一階段現在可以開始了。我們將致力於建設一個可長期運作的全國性運輸系統，在未來多年內為我們的軍隊與民眾提供補給。"
 Infastructure_Sector_3:0 "基礎設施部門3"
 Infastructure_Sector_3_desc:0 "我們必須保持迄今獲得的發展勢頭。我們將清理老舊的基礎設施，為新的住宅、工廠與設施騰出空間，鞏固國家的根基。"
 Infastructure_Sector_4:0 "基礎設施部門4"
 Infastructure_Sector_4_desc:0 "基礎設施發展計畫的最後階段終於要開始了。我們的首都將在可預見的未來實現自給自足，其經濟也將真正展現出一個崛起中國家首都的風貌。"
 Military_Sector:0 "軍事部門"
 Military_Sector_desc:0 "為了能夠妥善抵禦外部威脅，我們需要一個軍工產業，為步兵提供足夠可靠的武器，以對抗那些不斷壯大、企圖破壞我國穩定的敵對勢力。"
 Military_Sector_2:0 "軍事部門2"
 Military_Sector_2_desc:0 "我們必須考慮的另一個面向，是敵人可能部署的大量裝甲師，更遑論面對Knightmare的可能性——這項技術正迅速展現戰爭的新面貌，並發展成超越裝甲的存在。我們必須投資火砲與反戰車能力，才能在如此強大的技術力量面前站穩腳跟。"
 Military_Sector_3:0 "軍事部門3"
 Military_Sector_3_desc:0 "天空是戰鬥中經常被忽視的戰場，即便如此，我們仍能清楚看到：誰掌控天空，誰就掌控戰局。生產能夠保證我方制空權的飛機是當務之急。"
 Military_Sector_4:0 "軍事部門4"
 Military_Sector_4_desc:0 "我們最後一輪軍工擴張將大幅提升軍事生產並推進軍事科技，確保我們的主權與國家的持續安全。"
 New_Technical_Institute:0 "新技術學院"
 New_Technical_Institute_desc:0 "近期的工業擴張讓我們有機會增加研發預算，這將使我們得以迅速擴展創新能力，推進長期的國家目標。"
 Synthethic_Sources:0 "合成資源"
 Synthethic_Sources_desc:0 "為了給日益成長的工業提供動力，我們需要足夠的資源來維持自身運轉，同時繼續擴張工業，並研發有助於工業擴張的新技術。"
 Civillian_Sector_5:0 "民用部門5"
 Civillian_Sector_5_desc:0 "我們的第二個國家工業計畫已經啟動。我們在此興建的工廠，將為國家提供確保經濟獨立所需的手段。"
 Prosperous_Nation:0 "繁榮的國家"
 Prosperous_Nation_desc:0 "我們的國家終於實現了真正的繁榮。人民依靠國家經濟產業近期擴張所帶來的財富過上了好日子。我們達成了弱小國家只能夢想的成就。"
 Pink_Saphires:0 "粉紅藍寶石？"
 Pink_Saphires_desc:0 "櫻石是一種我們絕不能放棄的珍貴資源。其他國家利用這種資源大幅提升了自身的經濟與軍事實力。我們需要這種資源，而且是刻不容緩！"
 New_Railways:0 "新鐵路"
 New_Railways_desc:0 "為確保我們的國家不僅能自我防衛，還能在經濟上自我維持，我們需要建設一個鐵路網，滿足我們這個處於創新前沿的成長中國家的需求。"
 Military_Sector_5:0 "軍事部門5"
 Military_Sector_5_desc:0 "如今我們擁有了實施第二次軍事擴張的資源，可以真正為軍隊配備各式各樣的裝備。我們將擁有世界上數一數二——不，是裝備最精良的軍隊！"
 Military_Industrial_Complex:0 "軍工複合體"
 Military_Industrial_Complex_desc:0 "我們國家的經濟前景正日益向軍事化傾斜。我們的戰爭機器將持續擴張；我們能無限期地維持它，還是它將導致我們的覆滅？"
 Advanced_Technical_Institute:0 "高等技術學院"
 Advanced_Technical_Institute_desc:0 "近期工業的成長提升了我們創新與改良現有技術的能力。我們將在那些自認為技術優於我們的國家面前取得優勢。"
 gen_Establish_Admiralty:0 "建立海軍部"
 gen_Establish_Admiralty_desc:0 "我們的國家終於到了向海岸線之外進發的時候。在考慮派遣艦艇出海之前，我們必須先建立海軍部與指揮體系。國內能勝任這一職位的人寥寥無幾，但願他們能夠迎接挑戰。"
 gen_Confiscate_Dockyards:0 "徵收民用造船廠"
 gen_Confiscate_Dockyards_desc:0 "儘管在這動盪時期貿易對我們至關重要，但我們不能在巨人們的踐踏之下坐以待斃——遲早會輪到我們被踩在腳下。我們將徵收港口、碼頭以及一切用於修船的人工設施。這批東拼西湊的造船廠將使我們有能力生產自己的戰艦。"
 gen_Naval_School:0 "創辦海軍學院"
 gen_Naval_School_desc:0 "如今我們有了海軍上將，也有幾艘艦艇進入建造初期，我們必須建立一所學院，將水兵培養為軍官，以填補指揮體系中的其餘職位。"
 gen_New_Age:0 "海戰新時代"
 gen_New_Age_desc:0 "雖然艦艇設計多年來變化不大，但各艦種的戰術與角色已發生翻天覆地的變化。我們必須跟上海軍學說的腳步，否則很可能在第一場海戰中就被打個措手不及。"
 gen_Coastal_Defense_Fleet:0 "建立海岸防衛艦隊"
 gen_Coastal_Defense_Fleet_desc:0 "隨著生產能力的成長與指揮體系的穩固確立，我們現在可以向海軍下達第一項任務。這項任務不過是沿著海岸線巡邏，讓船員累積海上經驗。表面上看這似乎是次要任務，卻成功地提振了國家的自豪感與希望。"
 gen_Honorable_Battle:0 "光榮的戰潮"
 gen_Honorable_Battle_desc:0 "我們的國家太過驕傲與崇尚榮譽，不屑像潛伏的獵食者那樣藏身波濤之下。我們將昂首挺立，以昔日艦隊曾經擁有的威勢與壯麗駛向敵人，用我們強大的武備痛擊他們。"
 gen_Heavy_Ship_Design:0 "重型艦艇設計"
 gen_Heavy_Ship_Design_desc:0 "如今我們擁有了一支強大的護衛艦隊，可以安全地護送船隻橫渡大洋。這也意味著，是時候放眼更宏大的格局了。讓我們建造足以匹敵不列顛尼亞最強戰鬥航母的艦艇吧。"
 gen_Standardized_Designs:0 "標準化設計"
 gen_Standardized_Designs_desc:0 "我們已成功建造了多種級別的水面艦艇。從中獲得的專業經驗讓我們看清了設計中的許多缺陷，其中一些導致組裝耗時過長。因此，我們終於能夠將設計標準化，以前所未有的速度組裝輕型艦艇。"
 gen_Install_the_Repair_Yards:0 "設置修理船塢"
 gen_Install_the_Repair_Yards_desc:0 "隨著戰爭的可能性與月俱增，建造乾船塢修理廠將提升我方艦隊的生存能力，使其無需等待數月維修即可重返巡邏崗位。"
 gen_Flagship_for_the_Fleet:0 "艦隊的旗艦"
 gen_Flagship_for_the_Fleet_desc:0 "沒有旗艦領軍的現代水面艦隊算什麼？沒有為艦隊加冕，我們無論如何也不敢自稱海軍強國。雖然我們有足夠的資源建造這樣一艘船，但只夠建造一艘主力艦。是選擇重巡洋艦還是航空母艦，目前正在海軍部內引發相當激烈的爭論。"
 gen_Hidden_War:0 "隱形戰爭"
 gen_Hidden_War_desc:0 "我國的生產能力如此有限，為了自尊或面子而建造水面艦隊實屬愚蠢。我們反而應該專注於獵食者戰術，在出擊之前隱匿行蹤。從長遠來看，一支潛艇艦隊更適合我們。首先讓我們將其設計標準化吧。"
 gen_Fear_the_Unseen:0 "畏懼無形之敵"
 gen_Fear_the_Unseen_desc:0 "建造小型艦艇節省了大量時間與精力，我們可以將這些資源轉而用於升級魚雷性能，並訓練水兵忍耐到最後一刻才對目標發動攻擊。"
 gen_Lock_Down_the_Ocean:0 "封鎖海洋"
 gen_Lock_Down_the_Ocean_desc:0 "潛艇設計標準化之後，是時候增加巡邏次數了。我們新型佈雷艦的加入強化了這一行動，使國家周邊海域處於封鎖狀態。"
 gen_Mass-Produce_Parts:0 "量產零件"
 gen_Mass-Produce_Parts_desc:0 "我們不能讓巡邏出現漏洞。為確保敵艦無法穿越我們的艦隊，我們必須將造艦零件標準化，以加快潛艇的組裝速度。"
 gen_Deploy_the_Prototypes:0 "部署原型艇"
 gen_Deploy_the_Prototypes_desc:0 "海軍生產的專業化終於得到了回報。設計師們興奮地向海軍部報告，新的原型潛艇已準備好下水出海。這讓海軍部大吃一驚，因為他們從未訂購或預期過任何原型艇。"
 gen_Air_Development:0 "空軍發展"
 gen_Air_Development_desc:0 "很明顯，與世界主要強國相比，我們的空軍相形見絀。我們必須立即糾正這一點！航空研發部門已奉命設計新的原型——包括武器與機體設計——以縮小我們與敵人之間的實力差距。"
 gen_Airbases:0 "空軍基地"
 gen_Airbases_desc:0 "隨著空軍新機型的研發，我們必須先建造一些機場，才能開始組裝。"
 gen_Air_Academy:0 "創辦空軍學院"
 gen_Air_Academy_desc:0 "我們建立了一支空軍，但這還不足以在制空權的爭奪中保持競爭力。我們將訓練飛行員運用最好的戰術與戰略，傳授他們淵博的知識，使任何敵人都無法在戰鬥中勝過他們。他們將成為我們的天空守護者，且將無所畏懼。"
 gen_Transport_Supplies:0 "運輸補給"
 gen_Transport_Supplies_desc:0 "時代在變。我們不能再像以往那樣，僅僅依賴地面基礎設施來安全運輸補給。籌集資金後，我們將向其他國家的私營部門購買一些運輸機，以便在不依賴公路與鐵路的情況下為部隊提供補給。"
 gen_aviation_Doctrine_School:0 "空軍學說學校"
 gen_aviation_Doctrine_School_desc:0 "無需遠望便知，在飛機及其運用方面我們還有許多要學。錢已經花了，書也買了；我們將用它們來訓練我們的飛行員。"
 gen_aviation_Doctrine_School_2:0 "空軍學說學校2"
 gen_aviation_Doctrine_School_2_desc:0 "自上次會議以來，我們在空軍學說方面學到了一些非常寶貴的經驗——這些經驗讓我們明白了該如何進一步推進飛行員的訓練。"
 gen_aviation_Doctrine_School_3:0 "空軍學說學校3"
 gen_aviation_Doctrine_School_3_desc:0 "我們的國家對空戰已足夠熟稔，飛行員的技術已比肩列強麾下的飛行員。何必止步於此？不，我們將繼續學以致用，進一步提升飛行員的技術。空軍的停滯不前，無異於在敵人選擇繼續精進時向其拱手投降。"
 gen_Fighter_Focus:0 "戰鬥機優先"
 gen_Fighter_Focus_desc:0 "轟炸機固然強大，但它們緩慢而脆弱。我們的空軍需要的不是更多轟炸機，而是能夠反制轟炸機、並殲滅敵人膽敢部署的任何飛機的手段。"
 gen_Close_Air_Support:0 "近距離空中支援"
 gen_Close_Air_Support_desc:0 "諸兵種協同作戰的方法論已不能再被視為可有可無的學說。將制空權與有效的地面支援相結合，是保持戰鬥勢頭的最佳戰術。地面支援與突然的空中突擊相輔相成。為了實現這種協同作戰，我們必須擁有隨時可以升空的近距離空中支援力量。"
 gen_Bomber_Focus:0 "轟炸機優先"
 gen_Bomber_Focus_desc:0 "我們擁有支撐空軍最有效組成部分——轟炸機——所需的工業。這些巨大的死亡機器能夠摧毀敵人的後方，為前線將士扭轉戰局。"
 gen_Nothing_But_Ash:0 "只餘灰燼"
 gen_Nothing_But_Ash_desc:0 "我們空軍的首要目標應是徹底摧毀敵人發動戰爭的能力。我們將致力於設計世界上前所未見的最強轟炸機，不僅打擊敵人的工業，還有他們的基礎設施，讓他們的部隊補給枯竭，任由我們的地面部隊宰割。"
 gen_Army_Development:0 "陸軍發展"
 gen_Army_Development_desc:0 "是時候重新評估我們的軍隊，為新時代的戰爭做好準備，並研究我們想要的前進方向了。"
 gen_Artillery_Development:0 "火砲發展"
 gen_Artillery_Development_desc:0 "火砲已被證明在殲滅最堅固的軍隊時極為有效。在這個時代，一支沒有火砲的軍隊不僅不明智，簡直是愚不可及。我們將研究前線部隊的報告，以研發更好的火砲。"
 gen_Motorized_Development:0 "摩托化發展"
 gen_Motorized_Development_desc:0 "過去幾個世紀是戰爭與技術創新和實驗的堡壘。在學到的諸多事物中，我們發現了摩托化裝備在軍隊中的效用。我們將集結科學家，加深對這些簡單卻極為重要的機器的理解。"
 gen_Firearms_Development:0 "槍械發展"
 gen_Firearms_Development_desc:0 "對軍隊而言，還有什麼比不起眼的槍更重要？就連那些花俏的新Knightmare也有自己的槍。所幸，我們可以借鑑其他國家私營部門的知識，來幫助研發更好的槍械。"
 gen_Armor_Development:0 "裝甲發展"
 gen_Armor_Development_desc:0 "戰車是唯一被證明能有效對抗不列顛尼亞Knightmare的武器，即便如此，它們也一直處於苦戰。我們必須迅速行動，研發更好的戰車來反制Knightmare。"
 gen_New_RND_Department:0 "新研發部門"
 gen_New_RND_Department_desc:0 "很明顯，我們需要更多科學家才能跟上敵人的腳步。我們已籌集資金並召集必要的人員，建立一個全新的研究部門來支援現有部門。"
 gen_army_Doctrine_School:0 "陸軍學說學校"
 gen_army_Doctrine_School_desc:0 "建立一支成功的軍隊涉及許多重要因素，其中最關鍵的之一是指揮體系。我們需要能幹的軍官與將領才能發動戰爭；否則，我們的軍隊將極其低效與遲緩。我們將確保只有最有才幹、最有經驗、因而也最合格的人才能獲得晉升。"
 gen_army_Doctrine_School_2:0 "陸軍學說學校2"
 gen_army_Doctrine_School_2_desc:0 "雖然裝甲部隊目前仍很普遍，但未來顯然將由Knightmare主宰。徒步步兵在即將到來的時代將難以生存。若想讓他們在與敵人的第一次接觸中活下來，就必須確保他們獲得單兵攜行反戰車系統（MANPATS）的補給，讓他們得以生存並有能力對抗任何Knightmare或裝甲敵人。"
 gen_army_Doctrine_School_3:0 "陸軍學說學校3"
 gen_army_Doctrine_School_3_desc:0 "隨著新的Knightmare原型機逐年亮相，我們必須探討兩種變體：格鬥型與要塞型。格鬥型Knightmare犧牲防禦力換取裝甲穿透力，能夠對大多數Knightmare變體形成突破尖兵。要塞型Knightmare幾乎沒有進攻能力，卻是防禦上的巨無霸，需要先進機體或反Knightmare火砲才能擊破。"
 gen_army_Doctrine_School_4:0 "陸軍學說學校4"
 gen_army_Doctrine_School_4_desc:0 "我們必須探討的最後一種Knightmare Frame變體，是先進型，或所謂的「全能」型。這種技術的奇蹟——或者說恐怖——是我們必須不惜一切代價避開的存在。只有反Knightmare火砲有能力阻止它們。如果我們的士兵遭遇一台，他們必須懂得要麼堅守待援，要麼撤回主戰線。切勿交戰。"
 gen_army_Doctrine_School_5:0 "陸軍學說學校5"
 gen_army_Doctrine_School_5_desc:0 "反Knightmare火砲已成為對抗Knightmare的常備資產。無論我們選擇哪一方，都必須研究與之協同或對抗的方法。我們可以用聰明的戰術反制這種火砲，例如讓步兵突襲這些笨重的機器；或者，若我們使用這類武器，則將其部署在敵人難以攻克的戰略要點。"
 gen_Knightmare_Warfare:0 "Knightmare戰爭"
 gen_Knightmare_Warfare_desc:0 "戰爭的新時代已然來臨；我們絕不能讓自己掉隊。Knightmare是未來的方向，我們將充分利用它們，研發我們自己的機體，以便在必要時與列強一較高下。"
 gen_The_Facts:0 "運轉的事實"
 gen_The_Facts_desc:0 "Factsphere感應器與Landspinner是Knightmare的核心組件。我們需要立即研發這些技術。不惜一切代價！"
 gen_Knightmared_Police:0 "Knightmare警察"
 gen_Knightmared_Police_desc:0 "警察一直是維護世界法律與秩序的中堅力量，但在當今時代，恐怖主義與叛亂才是他們的主要對手。我們將致力於打造一款警用Knightmare Frame，讓警察能用它保衛街頭免受這些威脅，並在緊急情況下投入對叛亂分子的戰鬥。"
 gen_Buy_Used_Stock:0 "購買二手庫存"
 gen_Buy_Used_Stock_desc:0 "誰說我們的Knightmare都得自己造？黑市上有大量二手機體與庫存，足以為我們提供至少組建一個師的Knightmare。我們將迅速召集人員，訓練他們使用這些Knightmare保衛家園。"
 gen_Our_Own_Roundtable:0 "我們自己的圓桌"
 gen_Our_Own_Roundtable_desc:0 "不列顛尼亞誇耀著自己的精英部隊——由最優秀、最出色的Knightmare駕駛員組成的圓桌騎士。雖然我們在Knightmare方面的經驗尚有不足，但我們擁有足夠多具備天賦的人才，足以組建我們自己的精英部隊。"
 gen_Conventional_Warfare:0 "常規戰爭"
 gen_Conventional_Warfare_desc:0 "東西沒壞就別修。既然我們現有的軍隊已在歷史上證明了自身的價值，為什麼要把重心放在Knightmare上？"
 gen_The_Real_Engines_of_war:0 "真正的戰爭引擎"
 gen_The_Real_Engines_of_war_desc:0 "Knightmare也許又大又嚇人，但俗話說得好：爬得越高，摔得越重。我們將與戰車設計師以及實際操作戰車的士兵合作，研發更好的戰車，以跟上Knightmare Frame的怪物級力量。"
 gen_The_Stuff_That_Matters:0 "真正重要的事物"
 gen_The_Stuff_That_Matters_desc:0 "步兵是任何軍隊最重要的組成部分，忽視他們是愚蠢的。我們將操練部隊，教他們如何更有效地作戰。通過這些操練，我們的整支軍隊也將更有組織。"
 gen_Protecting_The_Men_On_The_Front:0 "保護前線將士"
 gen_Protecting_The_Men_On_The_Front_desc:0 "人力是寶貴的資源，而願意為國而戰的老兵更是難能可貴。我們將增加戰地醫護兵的數量並提升其裝備品質，以降低失去寶貴士兵的機率。"
 gen_The_Drums_Of_War:0 "戰爭之鼓"
 gen_The_Drums_Of_War_desc:0 "我們的軍隊已躋身世界頂尖之列！就連列強在進攻我們之前也要三思！走到這一步實屬不易；然而我們不會止步於此。我們要讓軍隊更上一層樓！否則，敵人必將迎頭趕上，最壞的情況下甚至會超越並壓制我們。"
 GEN.1.t:0 "艦隊的旗艦"
 GEN.1.d:0 "自海軍司令部成立以來，我們取得了驚人的進展。從建造第一艘軍艦至今積累的技術與經驗，終於將我們引領至這一歷史性時刻。現在是時候打造一艘能成爲艦隊驕傲的艦艇了，它將成爲我們整個海軍在遠海作戰中凝聚力量的核心象徵。敵人將學會畏懼這艘戰艦，僅是它出現在海平面上的身影就足以令他們戰慄。\n\n然而，司令部在究竟發展何種艦艇的問題上存在分歧。分成了兩派：一方主張建造重型巡洋艦，率領艦隊與敵軍交戰；另一方則力推航空母艦，爲艦隊提供防護與作戰引導。無論最終選擇如何，我們都將以非凡姿態統治遠洋！"
 GEN.1.a:0 "我們要打造一艘令海洋爲之戰慄的船。（重巡洋艦）"
 GEN.1.b:0 "我們將從海上統治天空。（航空母艦）"