 area11.1.t:0 "來自俾斯麥的命令"
 area11.1.d:0 "隨著我們開始抹去舊日本身分和行政體制，皇家行政監督局已下令廢除舊的日本法律和司法體系，並以與日本本土類似的版本取代。儘管如此，我們仍需考慮該地區持續不斷的叛亂以及當地居民和不列顛人極低的支持率。 \n\n事實上，政府必須決定新法典是立即在全國實施，還是逐步秘密推行。 \n\n前者會在近期內造成一些不穩定，而後者則會讓我們在抵抗力量面前顯得軟弱無力。"
 area11.1.a:0 "逐步引入"
 area11.1.b:0 "立刻推行！"
 area11.2.t:0 "舊神，新主"
 area11.2.d:0 "儘管不列顛尼亞已對日本實行了強大的統治，但每日的報道顯示，日本民眾對接受不列顛尼亞的價值觀和文化抱持一定的抵觸情緒。因此，我們必須限制並清除所有腐朽的日本傳統，包括所有宗教面向。自從最近對日本進行行政劃分以來，軍隊發現了許多神道教的紀念碑、寺廟和傳統建築，尤其是在鄉村地區。 \n\n對俾斯麥總督來說，解決方案既簡單又公平：有系統地摧毀所有此類荒謬事物的痕跡。這樣一來，我們就能清理出各個區域，以便重新用於建造不列顛尼亞的建築，而最重要的是，日本身份認同的一個重要像徵也將永遠消失。為了最大限度地提高行動效率，這項行動將與正常的反叛亂行動同時進行。"
 area11.2.a:0 "拆掉那些寺廟！"
 area11.3.t:0 "皇家行政監督局的內部鬥爭"
 area11.3.d:0 "在我們近期鞏固對11區的行政控制之後，皇家行政監督局內部各派系似乎都在試圖攫取更大的影響力和權力。尤其是純血派，在過去幾個月一直在暗中破壞我們的改革，因為這些改革在11區看來過於「溫和」。此外，許多貴族已經表達了遷往新規劃定居點的意願，他們將擁有相當大的政治影響力。 \n\n幸運的是，俾斯麥也在加強對皇家行政監督局的控制，這位鐵血總督絕不會容忍任何直接或間接的對其權威的挑戰。事實上，他已經透露，他將利用秘密機構和忠誠的將軍來監視某些人，確保他的計劃能夠順利進行，不受任何「干擾」。"
 area11.3.a:0 "俾斯麥規則是絕對的。"
 area11.4.t:0 "斬草除根"
 area11.4.d:0 "在第一階段的去日本化之後，這個階段主要關注物質結構和符號，現在終於到了直擊舊社會和傳統核心的時候了。特別是，所有宗教神道教的著作，以及在公共場所和住宅中的口頭表達，都將被嚴厲禁止；任何意識形態或信仰的儀式都將受到強制勞動的懲罰。此外，任何效忠舊國旗或「樞木氏」的行為都將意味著立即被驅逐到新安格利亞流放地或7號區的地獄。\n\n畢竟，所有與傳統服飾、日期、文化節日，尤其是頹廢的習慣和行為相關的方面，都將以某種方式消失。透過一次又一次的鎮壓，我們將能夠減少未來的不穩定，並迷惑公眾和抵抗力量。的確，我們有責任教育「Elevens」，讓他們認識到自己在我們優越文化中的地位，並接受強大的帝國教義，遵循聖查爾斯·達爾文的理論和社會達爾文主義。"
 area11.4.a:0 "一磚一瓦，整棟大廈將轟然倒塌……"
 area11.5.t:0 "東京租界動工"
 area11.5.d:0 "來自世界各地的眾多記者受邀參觀了全新的東京租界的施工現場，這座租界原本只供高級貴族和政府官員使用。俾斯麥自豪地向公眾展示了這座宏偉的建築，大多數人都被宮殿的高度所震撼。只有歐洲媒體似乎對這工地感到恐懼，考慮到近期大西洋的緊張局勢，他們認為這可能是巴黎或聖彼得堡的未來。\n\n在最初的介紹之後，這位所謂的「鐵血總督」聲稱，這是不列顛尼亞在未來幾十年內統治這些島嶼的象徵。此外，他還呼籲全世界停止稱該地區為「日本」，因為在那一刻，他們已經為它舉行了正式的葬禮。顯然，這立刻引來大眾的哄堂大笑。 \n\n儀式結束後不久，俾斯麥返回皇家行政監督局時，一些軍官告訴他，抵抗組織此前在該地策劃了一起恐怖襲擊，但被挫敗了。他大聲咒罵，並迅速向他的部下傳達道：「我們必須盡快啟動那該死的『日落行動』！」"
 area11.5.a:0 "不列顛尼亞建築技術冠絕全球"
 area11.6.t:0 "第72號經濟報告"
 area11.6.d:0 "在啟動財政援助計畫之前，總督緊急發布了一份報告，以核實太平洋戰爭後日本工業的狀況。結果令人擔憂。樞木之死引發的混亂幾乎摧毀了所有輕工業。此外，原本規模就有限的重工業也遭到我方knightmares的徹底摧毀。作為衝突根源的櫻石礦大部分完好無損，但近一半已被抵抗軍控製或落入強大的桐原殘部手中。我方專家承認，礦區地理位置偏遠嚴重影響了我們的開採效率，導致礦藏無法有效利用。 \n\n為了緩解目前的困境，許多專家建議與不列顛尼亞的財閥密切合作，由他們從中國調集傭兵。這無疑會耗資巨資，但卻是貴族和純血統家族所青睞的方案。另一方面，俾斯麥更傾向於與京都六家結成戰略聯盟，這能迅速緩解經濟壓力，而且他對當地情況非常了解。顯然，這件事會被圓桌騎士團和不列顛尼亞媒體蒙在鼓裡，儘管天皇允許我們有一定的迴旋餘地。"
 area11.6.a:0 "11區人不可信任。"
 area11.6.b:0 "俾斯麥的命令，必須服從。"
 area11.7.t:0 "富士山的會面"
 area11.7.d:0 "大約午夜時分，俾斯麥帶著幾名衛兵在舊富士礦山附近行進；會面地點由京都六家提議，因為在大混亂之後，這裡是日本人跡罕至的地區之一。一切都按總督的計劃進行，因為日本舊企業準備談判達成一項非正式停戰協議，並在名義上臣服於不列顛尼亞當局，以確保11區內龐大的櫻石礦開採點的正常運作。 \n\n這項秘密協議還包括對京都六家所有成員的全面赦免，他們將積極配合重建工作，並暫時停止對各派系抵抗運動的支持。特別是，日本前經濟大臣桐原被派來作為所有工業集團的代表與俾斯麥會談，俾斯麥似乎非常樂意摧毀這些令人厭煩的破壞活動的主要基地。顯然，至少在初期階段，這項協議只會與最值得信賴的官員分享，反對派無法利用此事。"
 area11.7.a:0 "這東西絕對不能離開這個區域，聽到了嗎？"
 area11.8.t:0 "與奧德修斯的對話"
 area11.8.d:0 "俾斯麥正準備在新落成的東京城接見首相奧德修斯；雖然王子此行名義上是度假，但他也會藉此機會聽取總督的經濟訴求。尤其值得一提的是，俾斯麥先前已向不列顛尼亞的主要財團提出申請，希望獲得極低息貸款，但由於這些財團都由敵對的不列顛尼亞貴族家族掌控，只有得到一位王子的許可才能促成此事。 \n\n奧德修斯一如既往地疲憊不堪，依舊是那副百無聊賴、漫不經心的樣子，就像幾年前兩人在潘德拉貢因家務相遇時一樣。俾斯麥正摩拳擦掌，準備用雄辯的口才說服王子，但奧德修斯打了個哈欠，漫不經心地說道：\n\n「我可以借給你任何你想要的貸款，一騎士。只要我不用去那些廢墟……」\n\n鐵血總督以為這會很容易，但沒想到會這麼容易。"
 area11.8.a:0 "呵，省得我浪費口舌了。"
 area11.9.t:0 "地下經濟"
 area11.9.d:0 "若不鎮壓自太平洋戰爭結束後最初幾年就存在於該地區的地下經濟，徹底的經濟重建便無從談起。儘管地下經濟使無數平民免於基本生活必需品（如食物、衣物和工具）的匱乏，但近幾個月來，各路勢力卻利用它從該地區或中國蒐集武器彈藥。\n\n此外，地下經濟也日益成為皇家行政監督局和各大公司的一大難題，因為一個龐大的黑市已經崛起，成為非法貿易的中心，使得黑幫和地方腐敗官員的勢力達到了前所未有的高度。因此，俾斯麥得出結論：只有動用武力鎮壓，利用軍隊和忠誠的間諜來鎖定主要的非法網絡或其他行動，才能徹底剷除這個墮落的毒瘤。不列顛尼亞的敵人將永無寧日。"
 area11.9.a:0 "爆破。燃燒。重複。"
 area11.10.t:0 "社會階級"
 area11.10.d:0 "根據我們的意識形態－社會達爾文主義的原則，我們將徹底重組11區的社會及其勞動市場。具體而言，我們將建立一套嚴格的社會階級制度，其結構將與其他區域類似。貴族和上層階級將處於上層，但金字塔的頂端始終由皇帝及其皇室成員和圓桌騎士佔據。此外，中低階軍官、官僚機構和有組織犯罪集團將處於中產階級。 \n\n最終，下層階級將由普通不列顛尼亞公民組成，其下層包括：榮譽不列顛尼亞人（選擇在不列顛尼亞軍隊服役以換取最低限度人權的11區居民），以及最底層的普通11區居民。"
 area11.10.a:0 "不平等也是一種力量！"
 area11.11.t:0 "改造景觀"
 area11.11.d:0 "總督俾斯麥剛剛在皇家行政監督局面前向本國宣布，他計劃在本月實施「鑽井計畫」。 「鑽井計劃」是俾斯麥親自下令，在第二次太平洋戰爭結束後幾個月，由多位經濟學家和工程師共同製定的一項計劃，旨在建造世界上規模最大的礦山。該計劃保證了巨額利潤和最高效率，但同時也需要耗費大量的能源和人力。幸運的是，Geass教團在富士山後發現了大量的櫻石礦藏，被認為是建造該礦的理想地點。 \n\n據估計，該礦山的景觀將遭到嚴重破壞，但這對於不列顛帝國來說是可以接受的犧牲；我們絕不會重蹈樞木的覆轍，為了一個可悲民族的、早已過時的民族主義概念而破壞我們的採礦業。"
 area11.11.a:0 "櫻石必須流通！"
 area11.12.t:0 "摧毀遺產"
 area11.12.d:0 "儘管桐原已逃往不明藏身之處，產業也崩潰，但京都六家的其他成員似乎仍在拖延時間，在皇神樂耶的領導下謹慎行事。據情報顯示，皇神樂耶最近被提名為京都家族的首領。 皇家行政監督局不顧俾斯麥的勸阻，決定頒布一系列法令，剷除舊日本遺產的殘餘勢力。 \n\n先前，解散法令僅針對桐原一人，因為其目標是直接控制櫻石精煉廠。我們低估了京都六家殘餘成員的韌性。我們預計，隨著最後法令的頒布，他們與支持抵抗運動直接相關的經濟活動將受到嚴重削弱，同時，樞木的任何殘餘勢力也將不復存在。"
 area11.12.a:0 "太仁慈了？"
 area11.13.t:0 "新人力資源辦公室"
 area11.13.d:0 "皇家行政監督局的新指令將十一區居民分為兩組：第一組將作為砲灰加入駐軍旅，其餘的將被安置在特殊的「救濟」區，其中包括許多來自南美的奴隸。這些營地的建立旨在加速經濟復甦，重建眾多工業園區和櫻石精煉廠。 \n\n行政管理方面，將由皇家行政監督局的經濟部門負責，但不包括俾斯麥的集團，該集團與各大公司關係密切。由於許多報告顯示主要營地發生了騷亂，因此這一過程需要付出相當大的努力，並加強對公眾的安撫。 \n\n這正是我們設立軍事駐軍的原因。我們來到這裡不是為了他們的利益，而是為了我們自己的利益。 \n\n值得慶幸的是，Knightframes警察的最新模組配備了足夠的鞭子。"
 area11.13.a:0 "閒著沒事幹，魔鬼就會找上門。"
 area11.14.t:0 "東京宣言"
 area11.14.d:0 "接近午夜，俾斯麥被發現正前往富士山，隨即被效忠皇家行政監督局的衛兵攔下。同時，我們的間諜也在同一區域發現了桐原。兩者之間的聯繫顯而易見；俾斯麥的意圖也昭然若揭，他被迫屈服於我們的要求。在接下來的幾天裡，他同意撕毀與京都六家的任何協議，並在東京和解協議中發表聯合聲明，譴責日本舊政府及其產業。 \n\n透過這項舉措，我們確保了不列顛尼亞標準的經濟政策得以延續，以及純不列顛尼亞企業集團的主導地位，這些企業集團將在該地區不受任何限制地運作。這場勝利將鞏固皇家行政監督局內部激進派系的地位，而這些派系的首領正是純血派。"
 area11.16.t:0 "遊擊藝術"
 area11.16.d:0 "經過數月的偵察，以及許多搜救隊和重型裝備的失踪，我們終於完成了新區域內幾處主要叛軍活動的測繪。這是俾斯麥直接下令的——這使我們離最終結束這場叛亂更近了一步。 \n\n尤其值得一提的是，我們已確認各主要叛軍組織之間互不合作，實際上似乎也無力聯合起來。這對我們來說是一個巨大的優勢，因為他們各自沒有足夠的進攻力量來嚴重威脅我們對主要城市或補給點的控制。 \n\n這些組織可以被視為獨立的派系，其中許多是舊日軍的殘餘勢力。倖存的各師士兵仍然由他們的軍官指揮，指揮層級僅劃分到高級將領級別。我們有時也發現這些組織內部有衝突，我們可以利用這些衝突來削弱他們的實力。"
 area11.16.a:0 "他們各自因悲傷而分裂，卻都走向了同樣的命運。"
 area11.17.t:0 "北方猛虎"
 area11.17.d:0 "經過多次調查和情報收集，我們繪製了一張更詳細的叛亂組織分佈圖。 \n\n在中部，前將軍草壁徐水領導著全國最大的民兵組織；此外，他還在東京及其周邊廢墟的秘密倉庫中儲備了大量的裝備，特別是輕武器和車輛。這位將軍脾氣暴躁、行事衝動，這嚴重削弱了他的戰鬥力。 \n\n在南部，另一位名叫片瀨的前將軍正在九州地區附近建立基地，並在山區修建了數座堡壘。他缺乏強大的進攻能力，但擁有穩固的防禦工事。 \n\n最後一位，也是迄今為止最危險的人物，是藤堂。他曾多次擊敗我們的Knightmare機甲。他擁有最豐富的軍事經驗，也是樞木軍中最明智的戰術家。他採用遊擊戰術，這給我們的部隊造成了很大的麻煩。"
 area11.17.a:0 "那個該死的副官…"
 area11.15.t:0 "傳遞火炬"
 area11.15.d:0 "經過數年的任職，俾斯麥已準備卸下11區的絕對統治權，解散最高重建局；他已精疲力竭，無法再在這爛攤子裡待上十年。儘管如此，他也不願讓自己的心血被某個傲慢的不列顛尼亞貴族總督毀於一旦。因此，他決定成立一個地方參議院，成員全部由他的支持者和顧問組成。 \n\n畢竟，11區的局勢十分微妙，必須妥善處理才能維持他們好不容易取得的穩定。許多合作者懇求他留任，但皇帝對他另有安排，讓他馳騁戰場，而非待在官僚機構。"
 area11.15.a:0 "俾斯麥，你是祖國的榮耀。"
 area11.18.t:0 "PenNIIOKhT物質33號"
 area11.18.d:0 "事實證明，傳統戰術在大多數反恐行動中總體上效果不佳，而「Knightmare」戰機的生產效率仍然不足，無法同時覆蓋所有島嶼。 \n\n幸運的是，潘德拉貢研究所為我們提供了一種強效神經毒劑；這可能是不列顛尼亞境內迄今為止研發的最強效的毒劑。使用這種代號為「PenNIIOKhT物質33號」的物質，我們將能夠以更有效率的方式抓捕並消滅整個團夥，同時大幅降低我方傷亡率。值得注意的是，由於叛亂分子可能藏匿在人群中，這些行動也會對平民造成影響。"
 area11.18.a:0 "準備氣體…"
 area11.19.t:0 "俾斯麥的特別行動"
 area11.19.d:0 "最高統帥俾斯麥認為，是時候對日本抵抗組織發動重創了。這項計畫由俾斯麥本人及其最親密的顧問精心製定。 \n\n主要目標是位於中央的草壁，我們將在此部署精銳部隊，摧毀大部分倉庫（由我方情報部門發現），並迷惑日軍。我們將讓他們相信我們將撤退到櫻石礦附近的更安全陣地，待他們接近時，兩支由Knightmare組成的先鋒部隊將完成任務。 \n\n在南部，特製的Knightmare將負責摧毀位於山脈周圍的幾個防禦據點，迫使片瀨撤退到遠離我方補給站的更深處。 \n\n最終，俾斯麥的親衛隊將在攻擊直升機和遠程火砲的支援下與藤堂正面交鋒，憑藉強大的火力阻止藤堂支援其他派系。行動結束後，他們只能默默舔舐傷口，苟延殘喘。"
 area11.19.a:0 "這應該能讓他們暫時止步。"
 area11.20.t:0 "新不列顛尼亞的黎明"
 area11.20.d:0 "當克洛維斯抵達11區時，場面盛大隆重。 \n\n在殿下抵達的黎明，身著華麗戰靴的步兵在數個布里塔尼亞新一代戰機中隊的護送下，浩浩蕩蕩地行進著，震撼了東京租界。 \n\n總督高高地站在他的陸地巡洋艦上，發表了一篇令人敬畏的演講，誓言要將所有反抗布里塔尼亞的人「徹底消滅」。此外，人們還看到幾位貴族婦女在巡洋艦後部歡笑飲酒，為走下車的王子歡呼。 \n\n一隊Knightmare機甲全副武裝地環繞著他的護衛隊，彷彿在向所有仍然與舊不列顛尼亞榮譽旗幟和11區旗幟有聯繫的人發出痛苦的提醒。對於那些曾經積極參與叛亂的人來說，更是如此，他們此刻已經開始疲憊不堪，只能眼睜睜地看著自己的領地被交到新的主人手中。"
 area11.20.a:0 "總督萬歲！\n不列顛尼亞萬歲！"
 area11.21.t:0 "12區"
 area11.21.d:0 "「長官！是，長官！」\n\n太陽剛升起，朝鮮半島上空就佈滿了各種形狀的布里塔尼亞戰機。鏡頭轉向一艘巨大的布里塔尼亞航空母艦；一架颱風戰機從艦上躍出，落在毫無防備的中國裝甲車上，這些戰機展示了布里塔尼亞情報部門洩露的最新研發模組。 \n\n電影《12區》由總督委託並執導，克洛維斯·La·布里塔尼亞駕駛著一架金紅色的颱風戰機出演。片中，榮譽布里塔尼亞人對他們的純血派主人唯命是從，不列顛尼亞軍隊以11區為跳板，入侵朝鮮半島和滿洲國，並在此基礎上開闢了12區。 \n\n這部電影迄今在全球票房大賣，許多中國製片人揚言要報復。此外，中華聯邦在其境內禁映了這部電影，並致函神聖不列顛尼亞帝國，要求其正式道歉。皇帝對此置之不理。"
 area11.21.a:0 "你說的「售罄」是什麼意思？ ！"
 area11.22.t:0 "慵懶的午後"
 area11.22.d:0 "微風輕拂，拉爾斯中士率領他指揮的三輛步兵戰車，本月第七次穿過這條狹窄茂密的林間小路。自從新任總督上任以來，他除了這37公里長的道路和部下們的面孔之外，他什麼也沒見過。 \n\n在俾斯麥統治時期，他只是個下士。但那個混蛋卻讓他巡邏這些島嶼上每一寸可通行的土地，戰鬥幾乎每週都會發生。現在，他心想──他們只是在浪費燃料。叛軍小隊不可能憑空出現在路邊。即便真有，在這種地形上他們也追不上。司令部的命令……「奇怪」。彷彿最近的命令對我們迄今所遭受的傷亡視而不見。 \n\n一聲雷鳴打斷了他的思緒；一聲巨響，讓人不禁想到前面的車輛可能壓到了簡易地雷，整個巡邏隊頓時停了下來，拉爾的心也瞬間回到了潘德拉貢，回到了他心愛的莉娜身邊。 \n\n他趕緊爬過艙口，想要看清情況，並命令後面的車輛掉頭180度。現在，叛亂分子只需要一個位置合適的狙擊手就夠了。"
 area11.22.a:0 "附近居然有貴族度假村？ ！我說我們需要汽油，現在就要。"
 area11.23.t:0 "一封措辭強硬的信"
 area11.23.d:0 "§R皇家事務辦公室§!\n§R致：不列顛總督克洛維斯‧La‧布里塔尼亞§!\n§R寄件者：參謀長俾斯麥·瓦爾德斯坦\n\n\n「克洛維斯，我懷著無比的憤慨寫這封信給你。\n\n自從你上任以來，你對大臣們呈遞給你的每一項關鍵決策都漫不經心，要么委託他人處理，要么拖延不決。§R你處處裝死，任由叛亂由叛亂惹事，癱瘓了政府。§!\n\n要不是你與皇室有牽連，你現在恐怕早已被送上斷頭台了。"
 area11.23.a:0 "那個狂妄的蠢貨！他不敢！"
 area11.24.t:0 "無需手動操作？"
 area11.24.d:0 "時鐘敲響一聲，所有「賓客」準時到達。 \n\n他們都非常清楚這次會議的保密程度，以及這個模仿皇家行政監督局的機構將如何運作。包括兩位聯合主管在內的18名官員被授權全面接管總督的職責，並在履行現有職責的同時積極管理11區的方方面面，實際上使總督的頭銜淪為傀儡，而親王仍保留隨時改變方向的權力。 \n\n沒有人反對這些未公開的晉升，大多數人對皇家行政監督局的成立表示歡迎。在克洛維斯看來，這個名字對不列顛尼亞媒體來說，其意義正如字面意思一樣。"
 area11.24.a:0 "如果俾斯麥聽到這件事……"
 area11.25.t:0 "第一次集會"
 area11.25.d:0 "頭幾個小時簡直一團糟。 \n\n最大的會議室擠滿了形形色色的工作人員，每個人都對著各自負責的文員大喊大叫，讓他們按「優先級」（或其他什麼優先級）整理好自己的那份文件，這時的會議室也會顯得狹小。每隔二十分鐘，克洛維斯辦公室就會送來一大堆文件，堵在門口，這讓每個人都更加焦躁不安。 \n\n只有在深入研究這些文件中涉及的細枝末節之後，俾斯麥對微觀管理的痴迷才顯露出來，這也揭開了他提前辭職的秘密。每台Knightmare機甲的戰後損傷評估、定居點內每個貴族家族的現金流，以及在該地區建立新企業的每一項申請，都足以讓人頭疼不已。 \n\n最終，監察委員會唯一達成一致的決定是，官僚機構需要徹底改革，但這可以稍後再說。現在重要的是，政府開始覺醒，這些人都可以追求自己的目標了。"
 area11.25.a:0 "哈哈，沒想到總督在這裡居然可以待一個小時。"
 area11.26.t:0 "在東京的另一天"
 area11.26.d:0 "起初，人們以為長達六小時的會議不會持續超過一兩個月，但現在——皇家行政監督局內部的每個人都感到疲憊不堪。叫喊、侮辱和不忠的指控幾乎成了家常便飯。而且，該地區的問題似乎短期內不會結束。 \n\n與皇家行政監督局內部一些人最初的預期相反，即各部大臣會結成小團體，榨取總督轄區的資源；權力分散反而造成了部門間的競爭，導致政治人物提出旨在削減對手資金的議程，彼此更加分裂，而不是利用自身地位。多虧了哈德利和阿斯普里烏斯的影響力，這些陰謀詭計中最糟糕的情況得以避免，但這並不意味著該地區的混亂局面會比現在好一些。 \n\n地方政府必須完成最近發布的各項目標和年度計劃，才能申請帝國給予發展中地區的豐厚補貼。在此之前，不列顛尼亞化計劃和基礎設施項目必須繼續進行。"
 area11.26.a:0 "老實說，我的頭髮是不是開始變白了？"
 area11.28.t:0 "日本解放陣線的成立"
 area11.28.d:0 "我們情報部門收到了令人震驚的消息。 \n\n一直以來，在我們維護11區所有不列顛尼亞利益的過程中，所有針對我們軍隊的抵抗行動都各自為戰。但現在，情況似乎不再如此。 \n\n為了回應11區居民日益增長的不列顛尼亞化傾向，以片瀨立脅為首的各派正式發表聲明，稱日出之地的復興與「不列顛尼亞的下一次暴行」一樣迫在眉睫。 \n\n謠言如同野火般在前線的各個聚居區迅速蔓延。申請成為名譽不列顛尼亞人的11區居民數量也驟然停止。在整個島嶼上，人們都在屏息凝神地猜測11區的未來將會如何。"
 area11.28.a:0 "“哼。讓阿斯普里烏斯接電話。”"
 area11.29.t:0 "把弦線收起來"
 area11.29.d:0 "時間是午夜過後3點14分，然而代號R小組只有在夜裡才能真正開始研究。 \n\n設施中心是阿斯普里烏斯將軍，一如既往地兢兢業業：他正面對著一台巨大的顯示器。螢幕上每分鐘都在滾動播放著數百張嫌疑人的照片。他周圍都是研究人員和非正式偵探，他們正在翻閱從入侵首次登陸以來的所有文件，希望能找到任何線索。 \n\n他們都在尋找所有離奇傷亡報告中都暗示的相同特徵：女性化、身材纖細的身形，榛色、死氣沉沉的眼睛，以及最引人注目的——長長的翠綠色頭髮。這些特徵組合在一起，讓她得到了“翠綠魔女”的綽號。 \n\n一種難以言說的絕望壓垮了小組最初的熱情，就在這時，將軍一聲「停！」的命令讓所有人的搜索戛然而止。他命令螢幕操作員倒回前四張照片，Bingo！不列顛尼亞的監視器偶然拍到一張照片，顯示就在幾個小時前，那個「魔女」穿著低階職員的製服，在定居點內公開走動。將軍立刻召集了他的精銳部隊。"
 area11.29.a:0 "Eagle Six－準備撤離。"
 area11.30.t:0 "網裡的貓"
 area11.30.d:0 "「溫柔一點也無妨。」\n\n亞歷克斯船長既警惕巫術，又滿懷熱情地無視魔女的懇求，反而收緊了用櫻石精煉而成的全身束縛帶，這些束縛帶是他的隊員們為她綁上的。他的母親經常告訴他老巫婆和魔女如何化身為美麗的少女來迷惑年輕的王子。儘管她脆弱的樣子看起來很迷人，但他不會被她動搖。 \n\n於是，船長帶著他珍貴的貨物登上裝甲運兵車，報告道："
 area11.30.a:0 "“收到，Delta-5。我們返回基地。”"
 area11.31.t:0 "不速之客"
 area11.31.d:0 "自從被指派在她被安置於該設施期間擔任她的貼身護衛以來，亞歷克斯上尉就對這個魔女產生了依戀。過去兩個月裡，在實驗間隙，他不得不聆聽她那溫柔、溫暖卻又疲憊的聲音，或許讓他過於著迷。他對研究人員的態度也從積極鼓勵轉變為默默鄙夷，親手餵她吃飯這件事似乎觸動了他們兩人內心深處的某種東西。 \n\n亞歷克斯最後一次自言自語。 \n他真的要為了這個女孩背叛他的將軍，讓家族蒙羞嗎？就在不久前，他還會毫不猶豫地當場除掉她。難道他……中了某種魔咒？ \n\n上尉搖了搖頭，閉上了眼睛。他的任務是確保她被轉移到一個更安全的設施，而那將是他最後一次見到她。這意味著此刻是他帶著她逃走的最後機會。 \n\n「司機，走那條巷子。到碼頭去。」\n他真的做到了嗎？他的心跳從未如此劇烈。他的目光飛快地轉向女巫，換來一個虛弱卻又無比美好的微笑。這短暫的幸福感似乎在回報他的努力，但就在這時，運輸車與護衛隊拉開了足夠的距離，最終被一輛拖拉機撞倒。 \n\n大約十秒鐘的時間裡，他眼前一片空白。但叛軍湧入運輸車、屠殺他手下士兵的每個細節都清晰地浮現在他的腦海中。他頭部遭受重擊，鮮血直流，這或許足以讓抵抗組織的成員相信他已經陣亡。武器不在身邊，他只能眼睜睜地看著自己最親愛的人被帶走，裝進一輛看似普通的商用卡車後部的空煤氣罐裡。"
 area11.31.a:0 "“D-Delta-5…收到請回答…”"
 area11.27.t:0 "新兵訓練營"
 area11.27.d:0 "「……至於那些願意接受自己作為不列顛尼亞下屬的合法地位的人——好消息即將到來。未來一片光明。這僅僅是新生活的開始。」\n\n如果不列顛尼亞軍官們不斷灌輸的宣傳口號還不夠，那麼他們的演講更是讓人不寒而慄。但這對列兵樞木朱雀來說無關緊要。 \n\n在障礙物圍籬的第六圈，區分優劣變得輕而易舉。樞木列兵似乎遠遠領先他的兵排，而且他的眼神絲毫沒有動搖。 \n\n他之前在不列顛尼亞歷史、文化和政治的筆試中都取得了優異成績——他被認為是這片區域的佼佼者，將被提拔到一支更強的步兵部隊。"
 area11.27.a:0 "給所有十一區人樹立榜樣。"
 area11.32.t:0 "日本解放陣線發動攻擊！"
 area11.32.d:0 "正當我們的大臣們敲定將11區正式提升至與帝國學院同等地位的「國家級」地位，並將其與一些示範區相提並論時，日本解放陣線的混蛋們卻發動了襲擊。 \n\n11區內各大布里塔尼亞定居點接連發生爆炸，其中東京租界受損最為嚴重。由於攻擊者從11區的貧民區滲透到布里塔尼亞各區，我們的警察反應不夠迅速，未能阻止這場災難的發生。更糟的是，由於俾斯麥撤離後，大部分特殊情報局特工也離開了，導致局勢進一步惡化。 \n\n傷亡較少，財產損失也基本可控制。幸運的是，由於加強了安保措施，富士礦山和其他開採點倖免於難。然而，今天最大的損失是我們不可戰勝的神話徹底破滅了。"
 area11.32.a:0 "這群不知天高地厚的傢伙！"
 area11.33.t:0 "東京租界發生騷亂！"
 area11.33.d:0 "爆炸發生數日後，一場意想不到的恐怖行動在我們的首都獲得了公眾的支持。不列顛尼亞公民在定居點的多個地區開始暴動。 \n\n許多人讚揚俾斯麥政府，並指責現任統治者治理不善、道德敗壞，且奉行反達爾文主義政策。 \n\n為了回應這一局面，克洛維斯王子決定在全國廣播中露面，發表一場旨在打動不列顛尼亞公民的慷慨激昂的演講。以他的表演才能來看，他無疑會成功完成這項任務。作為預防措施，我們將派遣一支Knightmare警察小隊來阻止進一步的混亂，並清理主要道路。"
 area11.33.a:0 "“英勇的不列顛尼亞人啊，請聽我的請求！”"
 area11.34.t:0 "克洛維斯的公告！"
 area11.34.d:0 "令皇家行政監督機構大為震驚的是，克洛維斯王子製定了一項計劃，旨在加強不列顛尼亞總督轄區並遏制日本解放陣線的勢力。 \n\n我們將重啟臭名昭著的清洗運動，其手段與俾斯麥時代的血腥清洗如出一轍。初期，清洗範圍將限定在11區內的特定區域，以試探各榮譽官員的反應。布里塔尼亞主要定居點附近的幾個貧民窟將成為首批目標。 \n\n克洛維斯希望挽救“翠綠魔女計畫”，因為代號R研究小組報告稱，他們位於新宿附近的基地有材料、文件和實驗資產被盜，而這與當地恐怖分子的組織有關。 \n\n這些行動也將由克洛維斯親自指揮，這引起了當地將領的強烈不滿。"
 area11.34.a:0 "無辜的不列顛尼亞人必將得到復仇！"
 area11.35.t:0 "第一目標：橫濱。"
 area11.35.d:0 "橫濱貧民窟緊鄰東京租界，由於距離主要城市中心很近，一直是不列顛尼亞政府的眼中釘。 \n\n因此，第一階段的行動將從這裡開始。我們將實施交通管制，並派遣我們的名譽不列顛尼亞人作為第一道防線。隨後，Knightmares機甲將憑藉其強大的火力夷平街道。 \n\n鑑於我們擁有數量上的優勢，無需請求增援或製定周密的策略。我們將切斷貧民窟和東京租界之間的所有通訊線路。到目前為止，我們的部隊已經毫無抵抗地摧毀了外圍街道。"
 area11.35.a:0 "“收到，Delta-2，無人生還。”"
 area11.36.t:0 "第二目標：日野原。"
 area11.36.d:0 "日野原貧民窟距離東京租界更遠，但它仍然是日本解放軍地方組織非法武器走私的重要戰略樞紐。 \n\n與先前的預期相反，當地抵抗組織用簡易的反Knightmare武器和工事加固了外圍基地。儘管如此，憑藉我們龐大的兵力，我們可以承受有限的損失。 \n\n我們不求他們的投降，而是要將他們徹底殲滅。我們的Knightmare將夷平一切。一位名叫傑雷米亞·歌特瓦爾德的Knightmare駕駛員在戰鬥中表現出了卓越的英勇，將在這次襲擊後獲得晉升。"
 area11.36.a:0 "損失微乎其微。繼續。"
 area11.37.t:0 "第三個目標：新宿。"
 area11.37.d:0 "主要目標是新宿貧民窟，也就是恐怖分子的藏身處，我們的翠綠魔女也躲藏在那裡。 \n\n整個新宿區都遭到了當地部隊的全麵包圍，但局勢迅速失控。起初，局勢發展緩慢，彷彿一隊隊Knightmare機甲被一股無形的力量擊敗。但現在，就在我們中心下方，地鐵系統徹底崩塌，我們整個排全軍覆沒。就在殿下指揮中心岌岌可危之際，勞埃德伯爵下令蘭斯洛特起飛，它隨即伴隨著一聲巨響升空。 \n\n二等兵樞木朱雀重創了敵軍的薩瑟蘭機甲。在一陣舞動的火焰中，他毫不留情地粉碎並撕裂敵方騎士機甲的頭部，火力壓制了整個恐怖分子部隊，並在被包圍時輕鬆擋開了他們的子彈。 \n\n在最後的華爾茲中，二等兵朱雀與敵方指揮官展開了近身搏鬥，幾乎斬下了勝果——然而，他卻錯失了拯救兩名Elevens士兵的機會！至少，他憑藉著一己之力清剿了整個貧民窟。"
 area11.37.a:0 "那孩子真是個上等零件！"
 area11.38.t:0 "將死"
 area11.38.d:0 "終於，我們找到了倖存的十一區居民的藏身之處。然而，正當我們準備將他們從貧民窟徹底清除時——總督下達了一道奇怪的命令。 \n\n「所有部隊注意：立即停止射擊。\n我，克洛維斯，不列顛尼亞第三王子兼11區皇家總督，在此命令：所有部隊立即停止射擊。對任何建築物或財產的破壞也必須停止。所有傷亡人員，無論不列顛尼亞人還是十一區居民，都將得到平等對待，不帶任何偏見。」\n\n有消息稱，有人聽到指揮中心傳來一聲流彈。 \n\n我們派士兵去調查時，已經太晚了。克洛維斯的屍體倒在血泊中。刺殺者已經逃之夭夭，現場只剩下一把不列顛尼亞製式手槍和一套防彈衣。這只可能是某個名譽不列顛尼亞人所為。 \n\n一旦王子的死訊傳到媒體，純血派可能會陷入瘋狂。我們必須盡快控制住這場災難！"
 area11.38.a:0 "該死的Elevens！全都該死！"
 A11_support_brt:0 "來自本國的支持"
 A11_support_brt_desc:0 "這一次，為了確保專案的順利進行，我們需要在整個區域中長期部署大量軍事力量。常規的駐軍將不足以應對，俾斯麥將請求不列顛尼亞本土提供額外的物資和軍事人員支援。"
 A11_bismark:0 "是時候打電話給俾斯麥了"
 A11_bismark_desc:0 "鑑於我們迅速征服後所造成的混亂局面，新區域的局勢似乎比我們預想的要複雜得多。帝國中能勝任重建一個飽受摧殘的國家這一重任的人寥寥無幾，而「第一騎士」俾斯麥·瓦爾德斯坦正是其中之一。不久之後，他將正式就任總督，在不列顛尼亞的行政體系中擁有廣泛的權力。"
 A11_gov_reconstruction:0 "最高重建局"
 A11_gov_reconstruction_desc:0 "解決這一亂局的第一步是建立一個最高權威機構，負責監督11區的重建和去日本化。這將促使我們權力高度集中，並避免敵對派系——純血派——的抗議或暗中破壞。"
 A11_military_prov:0 "建立軍事區域"
 A11_military_prov_desc:0 "原日本所有領土將被劃分為若干特別軍事區，每個區域由佔領軍的一名高級軍官負責。我們的權威也將大大加強，舊政權中又一個低效率的環節將被摧毀。"
 A11_brt_laws:0 "引入不列顛尼亞法律"
 A11_brt_laws_desc:0 "區域整合的另一個重要步驟是對不列顛入侵前製定的舊法和司法體系進行徹底改革。大部分新法將借鏡本國的政府和社會經驗。"
 A11_ban_jap:0 "摒棄漢字字母"
 A11_ban_jap_desc:0 "融入帝國的一大障礙是入侵前廣泛使用的另一個字母表。雖然這對民眾來說將是巨大的衝擊，但這是實現神聖不列顛帝國宏偉藍圖的必經之路。任何抵抗或反對都將遭到槍林彈雨和重甲鎮壓。"
 A11_start_cultural_repres:0 "開始文化壓制"
 A11_start_cultural_repres_desc:0 "字母改革只是開始徹底文化壓制的序幕，這場壓制將重塑11區。日本身分認同的所有物質和社會層面，包括國旗、宗教、建築和象徵符號，都將被摧毀殆盡。隨著這一進程，就連「日本人」這個詞最終也將被拋入舊世界的灰燼之中。"
 A11_police_force:0 "正式成立新的警察部隊"
 A11_police_force_desc:0 "幾乎所有原日本警察部隊都已加入非法遊擊隊抵抗運動，導致我們面臨嚴重的警力短缺。儘管如此，這也為我們提供了一個機會，可以迅速用一個效忠於佔領軍和秘密機構的組織取代整個警察部隊。"
 A11_food_supply:0 "緊急食品進口"
 A11_food_supply_desc:0 "日本昔日的農業產量如今已接近零，各大城市即將爆發大規模飢荒，導致人口銳減。為避免這種情況，政府將從南美其他地區以極低的價格緊急進口糧食，並分發給民眾中那些忠誠或被動的群體。"
 A11_country:0 "重建國家"
 A11_country_desc:0 "除了農村地區遊擊隊控制的據點外，我們基本上已經完全控制了該地區，現在我們可以進行重大改革，以解決與第二次太平洋戰爭有關的災難性問題。"
 A11_stab_sit:0 "穩定局勢"
 A11_stab_sit_desc:0 "根據俾斯麥的計劃，第一步是緩解人口衰退，同時利用現代不列顛建築風格重建許多先前被摧毀的基礎設施。此外，住房隔離將成為未來對原住民實施種族隔離制度的基礎。"
 A11_new_build_division:0 "新住房隔離"
 A11_new_build_division_desc:0 "不列顛尼亞的技術專家和工程師目前正在研究新的軍事區域行政劃分方案，旨在為「十一區」居民設立特殊區域，並為貴族建造獨立的豪華中心。這個計畫即將完成，幾個月後，我們將迎來第一批「貧民窟」。"
 A11_repair_infr:0 "基礎設施更新"
 A11_repair_infr_desc:0 "是時候清理不列顛尼亞新專屬區域內被毀壞的基礎設施了，這些區域將重建來自北美大陸的傳統建築。重建計畫不會包括十一區居民的區域，因為這些廢墟對他們來說正是新現實的最佳寫照。"
 A11_ease_supplies:0 "緩解供應鏈壓力"
 A11_ease_supplies_desc:0 "儘管農產品產量增加，但該地區仍缺乏一些基本生活用品，例如衣物、肉類以及貴族享用的大部分奢侈品。為了解決這個問題，俾斯麥授權從中國和不列顛尼亞進口特殊物資，「只要能讓他們保持沉默」。"
 A11_open_ghettos:0 "第一貧民窟"
 A11_open_ghettos_desc:0 "我們將在北海道、九州以及正在建設中的東京租界設立三個中大型隔離區，待鄉村地區完全納入我們的控制範圍後，還將設立更多小型隔離區。所有隔離區之間都將嚴格隔離，以避免人員接觸和可能發生的叛亂。"
 A11_immigration:0 "維持大規模移民"
 A11_immigration_desc:0 "該地區已準備好開放其主要的太平洋海路，並歡迎來自不列顛尼亞本國的勞工和貴族。這是解決當前勞動力和軍官嚴重短缺問題的極其重要的一步。"
 A11_continue_repress:0 "加大鎮壓力度"
 A11_continue_repress_desc:0 "總督俾斯麥已授權啟動第二階段的去日本化行動，旨在清除所有腐朽的日本傳統和社會結構，包括宗教典籍。更糟的是，任何效忠舊國旗或與樞木有關之事的人都將立即被驅逐到新安格利亞或第七區人間煉獄般的勞改營。"
 A11_great_sep:0 "大分離"
 A11_great_sep_desc:0 "經過幾個月的時間，宏偉的東京租界即將竣工，並將舉行盛大的公眾開放儀式。這將是對現行歧視性住房制度的徹底終結，查理二世皇帝想必也會為此感到欣慰。"
 A11_economy_ress:0 "經濟停滯"
 A11_economy_ress_desc:0 "11區的經濟如同太平洋上的一具屍體，而這一切都是布里塔尼亞入侵的罪魁禍首。因此，俾斯麥提出了一個備受爭議的解決方案：與舊經濟精英合作，以期迅速恢復經濟。當然，這勢必會遭到皇家行政監督局相當一部分人的強烈反對，尤其是純血派。"
 A11_work_kirihara:0 "與桐原合作"
 A11_work_kirihara_desc:0 "俾斯麥的意志已經征服皇家行政監督局了！現在，我們要確保啟動計劃，並至少在最初幾個月內將其瞞過皇家行政監督局內外的所有敵人。此外，桐原看起來夠理智，願意授權，而不是像那些桀騸不馴的派系那樣咄咄逼人。"
 A11_fuji_deal:0 "富士交易"
 A11_fuji_deal_desc:0 "我們將在富士山附近的一個秘密地點與桐原會面，在那裡達成協議：那些日本老牌企業將不再與不列顛尼亞當局對抗。作為交換，當不列顛尼亞軍隊鎮壓叛亂時，他們將獲得對其反抗查理皇帝行為的赦免。"
 A11_concessions:0 "秘密讓步"
 A11_concessions_desc:0 "作為協議的一部分，我們將移交日本境內櫻石礦總量的百分之六十，但最高權力將由皇家行政監督局的經濟委員會代表，投資優先權將歸於不列顛尼亞的財閥。此外，他們也將協助我們打擊任何非法經濟活動。"
 A11_allow_zaibatsu:0 "京都六家的回歸"
 A11_allow_zaibatsu_desc:0 "京都六家已部分融入11區的經濟體系，使總督轄區成為神聖不列顛尼亞帝國的特例。當然，這是由特殊緊急情況造成的，也無法保證繼任總督在抵抗力量被徹底消滅後，會維持現狀還是會利用這一弱點。"
 A11__mines:0 "重建礦山"
 A11__mines_desc:0 "遍布群島的大量櫻石礦藏是太平洋戰爭的根源。因此，11區的經濟將進行轉型，以盡可能廣泛地開採這種資源。我們的礦場必須以最高效率運轉，為帝國經濟服務。為此，我們將重新啟用先前的礦場，並大幅提升其產能。"
 A11_funds_brt:0 "低利率貸款"
 A11_funds_brt_desc:0 "凡事皆有代價，俾斯麥的運作也不例外；為了完成這項宏偉的計劃，我們將向潘德拉貢眾多強大的家族請求資金和貸款，這些家族持有龐大的帝國企業集團80%的股份。"
 A11_integrate_bureau:0 "整合原有官僚機構"
 A11_integrate_bureau_desc:0 "名譽不列顛尼亞人不僅在軍隊中有用，還能填補先前官僚機構留下的空缺，因為許多官僚要么在戰爭中陣亡，要么加入了派系抵抗運動。俾斯麥作為“第一騎士”，可以對某些文書工作睜一隻眼閉一隻眼，暫時利用體制漏洞來促進經濟發展。"
 A11_new_railways:0 "鐵路"
 A11_new_railways_desc:0 "櫻石礦每天都在大量開採，但缺乏與我們主要港口的有效連接。在我們更換那些日本廢棄鐵軌之前，我們之前的努力將付諸東流。我們將進口來自不列顛的硬質鋼材，以預製鐵軌的形式，徹底解決這個問題。"
 A11_brit_corp:0 "邀請金融集團"
 A11_brit_corp_desc:0 "俾斯麥妄想繞過不列顛尼亞法律，真是愚蠢至極。 皇家行政監督局的經濟部門將接管此事，正式邀請潘德拉貢的高級貴族家族及其金融公司參與。他們非常樂意開發這片新領土。"
 A11_nobles:0 "引進新的貴族"
 A11_nobles_desc:0 "第一次太平洋戰爭後，舊日本邊緣化了舊貴族，建立了一種虛假的「精英統治」制度，幾十年來，這種制度讓不擇手段的實業家和腐敗的政客們中飽私囊。俾斯麥將邀請不列顛尼亞貴族，建立一個真正的上層階級。"
 A11_crackdown_black_market:0 "嚴厲打擊黑市"
 A11_crackdown_black_market_desc:0 "現在經濟情勢略有穩定，我們可以打擊幹擾合法經濟的地下市場。該市場充斥著非法開採櫻石和偏遠地區食品供應，對帝國公司來說是個棘手的問題。"
 A11_labour_pyramid:0 "勞動金字塔"
 A11_labour_pyramid_desc:0 "幸運的是，自第一次太平洋戰爭以來，日本社會仍然保留著一定程度的等級制度。我們可以利用這種僵化的製度，在該地區建立更等級分明的社會金字塔，顯然，我們會用更符合不列顛尼亞模式的結構來取代原有的社會階級。此外，我們也將設立名譽不列顛尼亞人制度。"
 A11_fuji_mine:0 "富士礦山"
 A11_fuji_mine_desc:0 "我們經濟計畫的巔峰之作——富士礦山——終於開工了！這項宏偉的基礎設施計畫將破壞自然景觀，並使不列顛尼亞成為全世界櫻石的主要出口國！"
 A11_no_deal:0 "不要跟他們做交易！"
 A11_no_deal_desc:0 "雖然桐原表示願意與不列顛尼亞當局對話，但他仍然是十一區的一員；因此，我們有責任無視他的要求，集中精力，借助祖國的幫助和我們的決心，進行適當的重建。"
 A11_crush_kirihara:0 "碾壓桐原"
 A11_crush_kirihara_desc:0 "鑑於桐原不斷向抵抗組織提供物資以及其幕後活動，皇家行政監督局認定他已成為11區的一根眼中釘。一份命令即將發布，他將被迫轉入地下——俾斯麥的寬容時代已經結束。"
 A11_seize_assets:0 "沒收所有資產"
 A11_seize_assets_desc:0 "既然桐原和京都六家已無力抵抗，我們便可沒收所有原日本企業的財產。機器設備將出售給出價最高的帝國企業，土地將授予最成功的官員。這便是「強權即正義」的明證。"
 A11_forced_labour:0 "強迫勞動"
 A11_forced_labour_desc:0 "名譽不列顛尼亞人不僅可以作為軍事人力來源，還可以作為基層工人到我們的礦山工作，填補桐原和京都六家留下的空缺。在俾斯麥的支持下，皇家行政監督局將說服將軍們提供部分人力。"
 A11_civil_industry:0 "修復民用工業"
 A11_civil_industry_desc:0 "黑市的禍害根源必須追溯到輕工業的崩潰和該地區消費品的普遍匱乏。為了避免這種禍患捲土重來，我們必須重建戰爭中損毀的主要民用工業，並進口農業機械，以滿足我們更願意培養的勞動力的需求。"
 A11_force_kaguya_underground:0 "神樂耶的地下勢力"
 A11_force_kaguya_underground_desc:0 "作為日本反抗精神的新象徵，皇神樂耶和其他一些代表人物長期以來不受現行體制的約束。但我們不必過於擔心，皇家行政監督局正在著手實施一系列新的歧視性法律，這些法律將有效地削弱敵對勢力的企業，並將所有眾議院議員變成逃犯。"
 A11_purge_bureau:0 "清除官僚機構"
 A11_purge_bureau_desc:0 "儘管我們進行了整頓，但舊官僚機構仍然不斷干預我們的經濟改革，助長無休止的混亂和京都六家的破壞活動。這種情況絕對不能繼續下去。因此，最高權力機構已下令徹底清除舊體制，並建立一個全新的全不列顛尼亞官僚機構。"
 A11_order:0 "街道秩序"
 A11_order_desc:0 "包括名將藤堂鏡志朗在內的幾名中層軍官自太平洋戰爭後便銷聲匿跡，目前分散在整個戰區，形成多個派系。所幸他們尚未結成統一戰線，我們必須利用這種分裂來消滅他們。"
 A11_secret_police:0 "啟動特殊情報局"
 A11_secret_police_desc:0 "不列顛尼亞情報部門與只對皇帝負責的特殊情報局合作，俾斯麥不給叛亂任何機會，並授權利用他們的聯合力量，在鎮壓行動開始之前，找出反對派的主要中心並滲透到他們的隊伍中。"
 A11_martial_law:0 "實施戒嚴令"
 A11_martial_law_desc:0 "戒嚴令是根除瘟疫的必然之舉，即便這意味著對十一區居民本來就寥寥無幾的讓步將徹底終止。諷刺的是，這些讓步與樞木在戰爭末期強加的特殊法令如出一轍──而這些法令只會讓他更加蒙羞。"
 A11_cleansing:0 "清理行動"
 A11_cleansing_desc:0 "這場戰役將分為三條主要路線：首先，在南方進行一系列軍事行動，徹底佔領11區的工業中心，並切斷與京都府的一條重要聯繫；然後，我們將反擊威脅我們櫻石礦的城市遊擊隊；最後，我們將進攻北方最危險的將領藤堂。"
 A11_chaos_south:0 "粉碎瘟疫"
 A11_chaos_south_desc:0 "片瀨少將在南部領土的防禦工事中堅守已久，佔據著相當數量的櫻石礦藏。他們至今僅憑地形優勢就能守住陣地──然而，他的軍隊並不擅長正面交鋒。一次來自廣闊戰線的快速打擊足以迫使他放棄大片爭奪領土。"
 A11_chaos_north:0 "在北方的勢力"
 A11_chaos_north_desc:0 "第11區北部分散的領土一直是戰功卓著的藤堂鏡志朗將軍的避難所，他在太平洋戰爭中給了我方慘敗。我們將向該區域投入更多資源，以更好地應對其活動。"
 A11_chaos_cities:0 "終結城市無政府狀態"
 A11_chaos_cities_desc:0 "草壁中校憑藉著在各城市廢墟中的遊擊戰而聲名鵲起，甚至滲透到了正在建設中的新貧民窟。加強警力部署、強化監視以及系統性地殲滅他的前線部隊，將迫使他重新考慮他膽敢推進的每一寸土地。"
 A11_starve_them:0 "把他們的毒氣放出來"
 A11_starve_them_desc:0 "我們將像以往鎮壓叛亂一樣，使用生物武器，就像自生物武器研製成功以來我們所做的那樣。這些令人神經緊張的燃燒氣體將使他們的愚蠢行徑化為泡影。俾斯麥已下令不得在不必要的情況下使用生物武器，但一些極端軍官難以遵守命令。"
 A11_repulse_guard:0 "擊退舊勢力軍團"
 A11_repulse_guard_desc:0 "這些派系頑強不屈，在地形險峻的地區毫不留情地反擊我方陣地，幾乎總是堅守孤立的據點直至最後一人。從底層士兵開始，他們已經穿越了無數雷區，任何物質損失都能被剩餘榮譽成員的辛勤勞動所彌補。"
 A11_death_penalties:0 "第七十法條"
 A11_death_penalties_desc:0 "在其他地區，行刑隊是一種非常有效的控製手段，為什麼我們在這裡不也採用呢？根據俾斯麥的親自命令，所有俘虜中百分之七十的人一旦落入我們手中，就將被處以行刑。當然，他們會被“誤導”，不知道那些投降者的下場。我們不需要更多的「Elevens」。"
 A11_raze_campaigns:0 "夷平郊區"
 A11_raze_campaigns_desc:0 "叛軍經常利用天然屏障和森林對我軍發動破壞和伏擊。我們將展開大規模的「清剿」行動，包括焚毀整片森林以消滅部分叛軍小隊。而「knightmares」的保護將確保行動的成功。"
 A11_oper_lazarus:0 "暮落行動"
 A11_oper_lazarus_desc:0 "對各派系的最終打擊即將到來：所有軍事力量將在俾斯麥總督的親自指揮下協調行動，同時剷除三大派系的總部和主要據點，並奪取叛軍控制下剩餘的櫻石精煉廠。我們絕不能再容忍這種對帝國威望的玷污。"
 A11_retirement_bismark:0 "不列顛尼亞總督府"
 A11_retirement_bismark_desc:0 "經濟改革已經完成，我們實現了該地區的經濟平衡；有些人可能會稱之為停滯，但這比幾年前的徹底崩潰要好得多。這個過程令人筋疲力盡，有傳言說現任總督可能正在考慮提前退休，這可是他應得的。"
 A11_open_civ_govern:0 "引入文官政府"
 A11_open_civ_govern_desc:0 "俾斯麥將在幾個月後退休，官僚機構正在製定正式解散皇家行政監督局的程序。同時，將建立標準的不列顛尼亞總督轄區，並將第11區與其他地區一樣納入帝國勢力範圍。"
 A11_nominate_clovis:0 "任命克洛維斯·La·布里塔尼亞"
 A11_nominate_clovis_desc:0 "查理皇帝決定由他的兒子，神聖不列顛尼亞帝國的第三代王子——克洛維·La·布里塔尼亞——接替俾斯麥的空缺職位。這位王子從未擔任過總督，他天真而虛榮，許多人擔心他的經驗不足會導致統治無能，並最終破壞俾斯麥精心建立的平衡。"
 A11_clovis_gov:0 "克洛維斯的冒險"
 A11_clovis_gov_desc:0 "殿下對皇帝的選擇最為驚訝，但似乎也是最熱情的。克洛維斯王子深知徹底征服一個地區所帶來的榮耀，尤其當這個地區擁有像十一區那樣獨特的文化，並且幾乎囊括了全世界已知的全部櫻石礦藏時，更是如此。"
 A11_smile_cam:0 "對著鏡頭微笑"
 A11_smile_cam_desc:0 "我們敬愛的王子走到哪裡，不列顛尼亞的媒體就跟到哪裡。他們尤其關注他下令組成的新空降兵團的訓練情況。王子和總督一直很關心部隊，但一些重要的行政決定都被擱置了，直到王子在他那安排得滿滿噹噹的日程中抽出時間為止……"
 A11_bismark_legacy:0 "俾斯麥的遺產"
 A11_bismark_legacy_desc:0 "總督積極下令在整個作戰區域巡邏，包括先前報告確認安全的地區。一些軍官注意到，巡邏報告越來越短，抓獲的叛亂分子越來越少，傷亡人數卻開始增加，因為我們的巡邏隊每週都要多次巡邏同一區域。"
 A11_duties:0 "職責，職責，職責……"
 A11_duties_desc:0 "與三個月前殿下展現出的令人振奮的熱情相比，如今看來，官僚機構的日常運作似乎不再是他的「首要任務」。他電影事業的驚人成功並未讓他擺脫那些消耗他時間的女士們，而他嚴格命令巡邏隊幾乎固定在固定位置的做法，也讓我們的總督誤以為11區正走在走向穩定的道路上。"
 A11_growing_boredom:0 "日益增長的百無聊賴"
 A11_growing_boredom_desc:0 "參謀會議、新項目、統計數據、外交活動。這裡撥款，在那裡審批——起初令人興奮，但對總督來說，一切都變得令人難以忍受。事實上，無聊到他強迫將軍們暫停所有參謀會議，並要求官僚們徹底停止騷擾他。"
 A11_corruption:0 "腐敗成風"
 A11_corruption_desc:0 "自從總督做出了一個相當痛苦的決定，將官僚機構從他的直接管轄範圍中剝離出來之後，我們得以通過“非法”手段解決一些最緊迫的問題——但同時也使得各部門負責人可以隨意向政府提出任何請求，並在沒有任何必要授權的情況下蓋章批准。"
 A11_tolerate_purists:0 "容忍純血派的存在"
 A11_tolerate_purists_desc:0 "自克洛維斯上任以來，軍官團的韌性與日俱增。當然，這對帝國的敵人來說無疑是災難性的。然而，為了消滅人數不過一隻手手指頭的叛亂分子，就夷平數萬平方公里的森林，或用毒氣轟炸整個街區，這無疑會大幅縮小我們能夠建立更多定居點的適宜生存環境。"
 A11_organised_crime:0 "對犯罪視而不見"
 A11_organised_crime_desc:0 "隨著政府行政壓力日益增大，各部門都開始出現問題，地方警察部門尤其如此。有傳言稱，警員內部存在收賄行為，並與大型犯罪集團和黑幫殘餘勢力達成協議。其中最極端的說法是，人口販賣正在貧民窟滋生……話說回來，一個「Eleven」警員的尊嚴又從何談起呢？"
 A11_partying:0 "酒水和派對！"
 A11_partying_desc:0 "終於——殿下可以盡情享受辛勤工作的甜美果實了。這甜美幾乎和他上次與阿什福德那位光彩照人的年輕女子的風流韻事一樣甜蜜……他再也不用為瑣事煩心了。總督之位是尊貴與榮耀的象徵。因此，美酒佳釀，任憑其揮灑！"
 A11_pen_message:0 "來自潘德拉貢的消息"
 A11_pen_message_desc:0 "我們收到了一封不尋常的家書。自新政府上任以來，所有寄到官邸的信件要么是寫給總督的，帶有貴族女性的徽章，要么標題明確指向國家行政部門。而這封信的署名卻是俾斯麥——“第一騎士”，其密級低於總督的級別，任何人都無法查看。"
 A11_clovis_decision:0 "克洛維斯的決定"
 A11_clovis_decision_desc:0 "儘管重返官位令人惱火，但克洛維斯總督不能冒著俾斯麥玷污其名譽的風險。殿下認為，最佳方案是組成行政機構。由大臣、高級官員和高級將領組成，就能解決最棘手的問題。為避免優柔寡斷，該機構將由哈德利大臣和阿斯皮里烏斯將軍共同管理。"
 A11_tokyo_bombings:0 "東京爆炸案"
 A11_tokyo_bombings_desc:0 "新成立的日本解放陣線表明，即使在俾斯麥進行了大規模鎮壓之後，不列顛尼亞殖民地也並非完全安全。這對我們的內部地位造成了巨大打擊，必須盡快應對。"
 A11_organise:0 "重新啟動清理行動"
 A11_organise_desc:0 "克洛維斯總督在事件發生後出人意料地保持冷靜，並下令在定居點附近的幾個主要貧民窟採取強有力的軍事行動。這些屠殺將被包裝成反恐行動，以博取不列顛尼亞人民眾和國際輿論的支持。"
 A11_ghetto_battle_1:0 "橫濱之戰"
 A11_ghetto_battle_1_desc:0 "首要目標是橫濱，靠近東京租界。名譽不列顛尼亞人將被部署到位，實際上充當炮灰，消滅任何潛在的抵抗力量。必要時，knightmares將介入作戰。"
 A11_ghetto_battle_2:0 "日野原之戰"
 A11_ghetto_battle_2_desc:0 "第二個目標是日野原，出乎我們意料的是，它的防禦工事比之前的隔離區堅固得多。雖然情況可能更加棘手，但我們會採取包圍並摧毀任何遇到的防禦陣地的策略。"
 A11_ghetto_battle_3:0 "新宿之戰"
 A11_ghetto_battle_3_desc:0 "新宿是我們戰役的第三個目標，也是翠綠魔女預計藏身之處。這次行動的成敗至關重要。雖然Knightmare機甲的損失過於慘重，但敵人只集中在街區的中心。全力衝鋒──包括守衛總督府的部隊──必將取得勝利！"
 A11_clovis_death:0 "終局"
 A11_clovis_death_desc:0 "我們已徹底清除新宿區內的抵抗力量，儘管付出了極其慘重的人員和物資代價。剩餘部隊將繼續對這些廢墟下殘存的敵人進行搜尋和摧毀。"
 A11_diarchy:0 "必要的二元政治"
 A11_diarchy_desc:0 "這屆總督轄區對政府來說簡直是一場災難。現在是時候採取措施應對定居點內外日益增長的動盪了。阿斯普里烏斯將軍下令每兩週召開一次六小時的會議，直到克洛維斯堆積如山的文書工作徹底解決為止。更糟的是，哈德利還要求審查過去四個月內所有已批准的項目。"
 A11_war_minister:0 "阿斯普里烏斯的野心"
 A11_war_minister_desc:0 "克洛維斯很清楚，阿斯普里烏斯的利益與他眼中一群神秘的瘋子密謀有關，這使得總督無需考慮政變的可能性。將軍在處理皇家阿爾斯特軍事務上的能力，以及他如今近乎無限的權力，最終賦予了他必要的自主權，讓他能夠追求該組織的利益。"
 A11_interior_minister:0 "哈德利的提議"
 A11_interior_minister_desc:0 "哈德利認為，透過一系列旨在擴大定居點、為上層階級建立旅遊業、改善貴族生活品質的計劃，這將吸引更多利潤豐厚的投資，並引發 11 區工業化的淘金熱。"
 A11_leisure_place:0 "休閒場所……"
 A11_leisure_place_desc:0 "東京租界的大片區域將被劃為開發用地。該區域內的一系列設施已經完成了規劃階段。其中最引人注目的是“巴別塔”；這是一座規劃中的巨型塔樓，將建成一個垂直的“娛樂區”，內設賭場、豪華餐廳和劇院等各種娛樂場所。"
 A11_duties_2:0 "……以及職責"
 A11_duties_2_desc:0 "為了促進私營部門的發展，希望在11區內停留時間超出有限旅遊範圍的家庭，要么需要創辦公司來僱用日益增多的“名譽不列顛尼亞人”，要么需要在當地證券交易所進行大規模投資。如此一來，我們將進一步提升11區作為精英中精英聚集地的聲譽。"
 A11_promote_culture:0 "推廣不列顛尼亞文化"
 A11_promote_culture_desc:0 "根據帝國行為準則，在帝國領土上建造的每一座新建築都必須成為不列顛尼亞帝國至高無上的象徵。每一個城區都必須彰顯帝國的威望，每一座塔樓都必須象徵凱旋。而最重要的是：每一個Eleven都必須時時記得自身的卑微。"
 A11_housing:0 "新住房計劃"
 A11_housing_desc:0 "為了確保我們對11區的持續統治，我們需要整合一個由當地官員、新來人員和下層貴族組成的強大階層，為此，我們需要為他們提供價格適中且舒適的住房，而目前這類住房嚴重短缺，無法滿足需求。新的開發區將以住宅區為主。"
 A11_new_universities:0 "建立教育區"
 A11_new_universities_desc:0 "一個危險的問題日益凸顯：現有的教育中心嚴重不足。一系列公立學校將成為發展區的核心，以緩解現有教育機構的壓力。此外，阿什福德基金會創辦第一所私立學院的舉措也廣受好評。"
 A11_art_contests:0 "推廣藝術比賽"
 A11_art_contests_desc:0 "對不列顛尼亞文化的浪漫化使其成為世界上最優秀的文化。透過向帝國核心地區的著名藝術家發放巨額資助，讓他們參加當地的藝術展覽，我們可以向大眾描繪出一幅微妙的畫面：不列顛尼亞向十一區伸出援手。"
 A11_slow_ethnic_cleansing:0 "放慢文化清洗的步伐"
 A11_slow_ethnic_cleansing_desc:0 "「Elevens」級青年申請成為名譽不列顛尼亞人的速度已經遠遠超出我們目前的能力範圍，我們無法逐一對每個人進行嚴格的忠誠度審查。作為一項臨時措施，我們將取消其中最嚴格的一項測試。高層認為「Elevens」級青年的過往經驗已不再具有任何意義。"
 A11_remove_martial_law:0 "偏遠地區去軍事化"
 A11_remove_martial_law_desc:0 "叛亂勢力或許遠不及俾斯麥幾年前所面對的那般強大，但一些咽喉要道，大多是托多集團殘餘勢力所為，已經重新出現。這聽起來可能不受歡迎，但我們的兵力已經捉襟見肘——我們不得不暫時放棄一些無關緊要的據點，以便更好地集中力量進攻內陸，並讓疲憊不堪的部隊得到喘息之機。"
 A11_abolish_mil_regions:0 "新常態"
 A11_abolish_mil_regions_desc:0 "或許是受新巡邏路線不如以往大膽的刺激，舊派系內部的某些勢力又開始蠢蠢欲動。他們就像癌症一樣，每次根除核心都會死灰復燃。沒關係。我們將徹底放棄偏遠地區，專注於剷除民眾中殘存的任何戰鬥意志。"
 A11_minor_crackdowns:0 "持續進行小規模打擊行動"
 A11_minor_crackdowns_desc:0 "貧民窟已經逍遙法外太久了。這種寬容在11區絕不容忍。我們將對每一個聚集在我們腳下的11區居民進行突擊搜查和任意處決。他們必須明白，如果不是被送進勞改營──他們的歸宿就是灰燼之中。"
 A11_honorary_brt:0 "擴大名譽不列顛尼亞人"
 A11_honorary_brt_desc:0 "自從我們開始接納「Elevens」級軍人以來，這些名譽不列顛尼亞人就一直淪為我軍的砲灰，只有在攻擊敵軍最堅固的防禦工事時才會被賦予真正的武器裝備。只有那些在忠誠和能力上完全證明自己的榮譽軍人，才能獲得以列兵身份在軍隊中服役的機會，並擁有非常有限但並非完全沒有的晉升可能。"
 A11_native_navy:0 "一支合格的海軍"
 A11_native_navy_desc:0 "據代號R小組透露，一座離岸島嶼是該團隊研究不可或缺的地點。 \n\n必須採取嚴密的安全措施，組建一支強大的海軍將提供必要的保護並轉移不必要的關注。"
 A11_geass_reserch:0 "開始Geass研究"
 A11_geass_reserch_desc:0 "多年來，代號R研究團隊一直只是一個進行假設分析的機構，後來它正式成立，成為總督府地下的一個部門。在發生一些「意外」以及那些為該設施的運作付出大量殘酷勞動的榮譽人員被清算之後，除了內部的科學家之外，幾乎無人知曉這個部門的存在。"
 A11_project_green_witch:0 "翠綠魔女計劃 I"
 A11_project_green_witch_desc:0 "我們與Geass教派合作研究的巔峰之作，使我們的專家發現了一個強大到足以支撐實驗並引領我們更接近最終目標的存在。教派內部的傳言表明，這個存在正是特別情報局特工在11區追蹤的目標。如果傳言屬實，那麼這將是一場生死競速。而我們輸不起。"
 A11_project_green_witch_2:0 "翠綠魔女計劃 II"
 A11_project_green_witch_2_desc:0 "我們已經確定了目標的位置。我們的高層領導已經準備好了各種激動人心的實驗，以從她嬌嫩的肌膚中提取我們所需的東西。"
 A11_geass_cult:0 "與教團合作"
 A11_geass_cult_desc:0 "短短幾週內，我們對櫻石的深入研究就為團隊帶來了寶貴的洞見，而這些洞見若非經過多年的假設和低效計算才能獲得。但如果我們想在十年內實現目標，這遠遠不夠。與Geass教派的合作將是實現我們願景的唯一途徑。"
 A11_rebuild_army:0 "加強駐防軍"
 A11_rebuild_army_desc:0 "過去幾個月對當地駐軍來說簡直是一場災難，傷亡人數幾乎與第一次佔領時期一樣慘重。我們將正式請求從祖國調派新軍官，並從10號區域群島調派反叛亂專家，以重新將「Elevens」武裝分子控制在我們腳下。"
 A11_no_restrictions:0 "Knightmare限制解除！"
 A11_no_restrictions_desc:0 "經過國內對軍方高層立法者和工業集團進行無數次的遊說和賄賂，我們的地方旅終於得以獲得先進的「Knightmare」機甲模組。唯一的擔憂是，不列顛尼亞王室和軍官團普遍害怕抵抗組織成員會得到這些原型機，但這根本不可能。"
 A11_knight_police:0 "整合Knightmares警察"
 A11_knight_police_desc:0 "如果我們的駐軍從這場資源消耗巨大的佔領行動中吸取了任何教訓，那就是：當你用knightmares入侵一個國家時，你應該用同樣的knightmares來維持秩序。絕大多數knightmares在戰鬥基本結束後離開了11區。儘管這是一個致命的錯誤，但現在是彌補它的時候了。"
 A11_funds:0 "更多資金"
 A11_funds_desc:0 "儘管「knightmares」戰機威力強大，但如果我們要在每一平方公里都部署它們，它們仍然效率低下且成本極高。我們的步兵仍然是駐防部隊不可或缺的一部分，他們的裝備極需全面升級，重型武器的升級也必須盡快進行。"
 A11_secret_bases:0 "秘密實驗的基地"
 A11_upgrade_area_status:0 "實力與繁榮"
 A11_secret_bases_desc:0 "研究團隊近期的成果以及駐軍日益增長的需求催生了一個革命性的想法—Geass強化型knightmares。這個概念必須絕對保密，我們親愛的魔女必須再深入地下四百公尺。"
 A11_upgrade_area_status_desc:0 "自從阿斯普里烏斯和哈德利共同執掌政權以來，駐軍的傷亡率持續下降，股市更是飆升至月球表面之上。建築業、移民潮和榮譽公民申請數量均創歷史新高。不列顛尼亞的卓越成就和榮譽公民的辛勤付出，正引領11區邁向強盛繁榮的黃金時代。"
 area11_focus_2:0 "克洛維斯焦點樹"
 A11_BR_supremacist_party:0 "不列顛尼亞總督轄區 - 激進派"
 A11_BR_autocracy_party:0 "不列顛尼亞當局"
 A11_BR_authoritarian_party:0 "不列顛尼亞總督－貴族"
 A11_BR_paternalism_party:0 "日本抵抗組織"
 A11_BR_conservatism_party:0 "日本抵抗組織"
 A11_BR_liberalism_party:0 "日本抵抗組織"
 A11_BR_progressive_party:0 "日本抵抗組織"
 A11_BR_socialism_party:0 "日本抵抗組織"
 A11_BR_revolutionary_party:0 "日本抵抗組織"
 A11_BR_vanguardist_party:0 "日本抵抗組織"
 A11_honorary_britannians:0 "名譽不列顛尼亞人制度"
 A11_honorary_britannians_desc:0 "名譽不列顛尼亞人是指宣誓效忠神聖不列顛尼亞帝國的Numbers。所有居住在不列顛尼亞征服區的非不列顛尼亞人，只要願意為帝國效力並保持忠誠，都可以獲得榮譽不列顛尼亞公民身份。榮譽不列顛尼亞人在法律上與不列顛尼亞本土公民享有同等權利：他們可以享受特殊特權，居住在富裕的城市等等，但前提是必須在軍隊服役。"
 A11_martial_law_idea_1:0 "戒嚴令"
 A11_martial_law_idea_1_desc:0 "為了改善內部秩序，當局實施了一系列壓制性法律，包括嚴格的宵禁、未經審判即可逮捕以及設立軍事法庭。儘管如此，這無疑會疏遠十一區的大部分居民。"
 A11_martial_law_idea_2:0 "戒嚴令"
 A11_martial_law_idea_2_desc:0 "為了改善內部秩序，當局實施了一系列壓制性法律，包括嚴格的宵禁、未經審判即可逮捕以及設立軍事法庭。儘管如此，這無疑會疏遠十一區的大部分居民。"
 rampant_chaos_area_11:0 "大範圍混亂"
 rampant_chaos_area_11_desc:0 "日本雖然在常規軍事衝突中戰敗，但其反抗精神遠未消退。樞木政府的幾位前將領正在新區域各地發動叛亂。這令不列顛尼亞政府如鯁在喉，必須盡快剷除。"
 demographic_death_area_11:0 "人口崩潰"
 demographic_death_area_11_desc:0 "11 區的人口狀況在戰爭爆發前就已經十分嚴峻；但現在，隨著許多年輕士兵被屠殺，出生率暴跌，整個城市目前都已人去樓空。"
 economic_collapse_area_11:0 "經濟蕭條"
 economic_collapse_area_11_desc:0 "戰爭期間，日本大部分重工業和櫻石礦（該地區的主要收入來源）遭到破壞。該地區需要按照不列顛尼亞的經濟和金融模式，對其工業進行全面重建。"
 administrative_strain:0 "行政壓力"
 administrative_strain_desc:0 "由於舊官僚機構瓦解，加上前政府造成的嚴重破壞，新成立的不列顛尼亞殖民政府在有效管理這片領土方面舉步維艱。此外，缺乏當地合作者也使我們的處境更加複雜。"
 administrative_strain_2:0 "行政壓力"
 administrative_strain_2_desc:0 "由於舊官僚機構瓦解，加上前政府造成的嚴重破壞，新成立的不列顛尼亞殖民政府在有效管理這片領土方面舉步維艱。此外，缺乏當地合作者也使我們的處境更加複雜。"
 administrative_strain_3:0 "行政壓力"
 administrative_strain_3_desc:0 "由於舊官僚機構瓦解，加上前政府造成的嚴重破壞，新成立的不列顛尼亞殖民政府在有效管理這片領土方面舉步維艱。此外，缺乏當地合作者也使我們的處境更加複雜。"
 destroyed_infratructures:0 "被摧毀的基礎設施"
 destroyed_infratructures_desc:0 "Knightmare在摧毀敵軍方面固然威力強大，但它們對遍布全國的基礎設施和補給站的破壞也極為嚴重。結果，該國的供應鏈受到了嚴重破壞。"
 destroyed_infratructures_2:0 "受損的基礎設施"
 destroyed_infratructures_2_desc:0 "Knightmare在摧毀敵軍方面固然威力強大，但它們對遍布全國的基礎設施和補給站的破壞也極為嚴重。結果，該國的供應鏈受到了嚴重破壞。"
 destroyed_infratructures_3:0 "受損的基礎設施"
 destroyed_infratructures_3_desc:0 "Knightmare在摧毀敵軍方面固然威力強大，但它們對遍布全國的基礎設施和補給站的破壞也極為嚴重。結果，該國的供應鏈受到了嚴重破壞。"
 food_imports:0 "糧食進口"
 food_imports_desc:0 "為了彌補當地農業產量的減少，小麥和其他主要糧食來源正從大陸運來。"
 cultural_repression:0 "文化壓制"
 cultural_repression_desc:0 "日本人的自我認同必須徹底消除，因此我們正在國內開展不列顛尼亞化運動。"
 cultural_repression_2:0 "文化清洗"
 cultural_repression_2_desc:0 "日本人的自我認同必須徹底消除，因此我們正在國內開展不列顛尼亞化運動。"
 jap_brit_corporations:0 "混合公司"
 jap_brit_corporations_desc:0 "目前，不列顛尼亞的多家企業和原京都六家寡頭正在攜手合作，以確保經濟的穩健成長。然而，這種做法卻遭到了皇家行政監督局大多數成員的強烈批評。"
 brit_corporations:0 "不列顛尼亞公司"
 brit_corporations_desc:0 "不列顛尼亞主導的企業主導 11 區的經濟，不列顛尼亞本土也出現了類似的情況。"
 extreme_stratocracy_A11:0 "強制執行的等級統治模式"
 extreme_stratocracy_A11_desc:0 "目前，我們正試圖在各方面都模仿不列顛尼亞嚴格的社會結構。重要的是，我們將創造一個階級分明的新社會。"
 extreme_stratocracy_A11_2:0 "層級統治模式"
 extreme_stratocracy_A11_2_desc:0 "目前，我們正試圖在各方面都模仿不列顛尼亞嚴格的社會結構。重要的是，我們將創造一個階級分明的新社會。"
 economic_stagnation_A11:0 "經濟平衡"
 economic_stagnation_A11_desc:0 "隨著經濟衰退的結束，俾斯麥為不列顛尼亞贏得了微妙的經濟平衡時期，並恢復了金融領域的秩序。"
 neglected_government_end:0 "動盪的政府"
 neglected_government_end_desc:0 "不列顛尼亞殖民政府目前忙於瑣碎的聚會和休閒活動，而無暇顧及對這片領土的實際管理，由此產生了一系列後果。"
 neglected_government_5:0 "動盪的政府"
 neglected_government_5_desc:0 "不列顛尼亞殖民政府目前忙於瑣碎的聚會和休閒活動，而無暇顧及對這片領土的實際管理，由此產生了一系列後果。"
