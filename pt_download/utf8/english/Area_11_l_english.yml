 A11_Decadence:0 "十一區的頹廢"
 A11_Decadence_desc:0 "俾斯麥離任後，許多人都在猜測§Y克洛維斯·La·不列顛尼§!亞能否維持前任政府所取得的§R平衡§!。一些可靠的消息來源透露，不列顛尼亞親王在最近的幾項任務中表現得漫不經心、懶散懈怠。因此，密切關注該地區的軍隊、殖民政府和民間社會狀況至關重要。如果放任不管，情況可能會惡化到無法挽回的地步，給我們的敵人和日本抵抗組織§R再次發動叛亂§!的機會。"
