 research_funds:0 "教育經費"
 research_funds_desc:0 "政府正在支持為該地區的不列顛尼亞人建造學校和其他教育區。"
 A11_KN:0 "§R我們將獲得我們的第一個Knightmare軍團。§!"
 A11_decadence_low_all:0 "軍隊、政府和社會的腐敗程度必須低於§R20%。 §!"
 A11_Suppression_Campaign:0 "不列顛尼亞鎮壓運動"
 A11_Suppression_Campaign_desc:0 "儘管我們已經宣布對日取得全面軍事勝利，但其大部分將領和大臣已逃離該國，並從海外新基地指揮針對佔領當局的顛覆活動；考慮到許多軍官和士兵§R拒絕投降§!大部分戰鬥都集中在東京都市圈以外的§Y鄉村地區§!和主要島嶼，特別是§Y北海道§!和§Y九州§!。憑藉特務機關以及軟硬兼施的策略，我們必須控制並盡可能徹底地消滅所有正規抵抗力量！ \n\n§R注意：您一次只能執行兩種不同的操作。"
 A11_Geass_Research:0 "Geass研究"
 A11_Geass_Research_desc:0 "巴特利·阿斯普里烏斯或許是一位受人尊敬的將軍，但他還有其他的追求。在克洛維斯的庇護下，他創立了代號R研究小組，其主要研究對像是C.C.以及Geass能力的本質，目的是複製她的力量。此外，這或許還能藉助Geass的力量創造出強大的武器。這個項目的存在甚至連部分皇室成員都毫不知情，為了最終的成功，它必須保持這種高度的保密性。 \n\n理論發展：[?Root.geass_understand|R%0].\n\n材料採購：[?Root.searching_material|R%0].\n\n基礎設施：[?Root.infrastructure_building|R%0].\n\n Geass控制：[?Root.controlling_geass|R%0].\n\n武器製造：[?Root.geass_weapons|R%0]."
