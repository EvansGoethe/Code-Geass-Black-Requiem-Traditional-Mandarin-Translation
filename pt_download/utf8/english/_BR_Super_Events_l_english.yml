 SUPER_JAP_invasion:0 "不列顛尼亞入侵"
 SUPER_JAP_invasion_TEXT:0 "我們將繼續戰鬥，我們將奮鬥、競爭、掠奪和統治，最終，未來將屬於我們。不列顛萬歲！ \n §Y- 查爾斯·Di·不列顛尼亞§!"
 SUPER_RCW_start:0 "俄羅斯內戰"
 SUPER_RCW_start_TEXT:0 "俄羅斯陷入混亂，我發現自己身為總統卻無國可治。我的人民拋棄了我，看來我將和我的國家一樣走向毀滅。 \n §Y- 弗拉迪斯拉夫·扎哈羅夫§!"
 SUPER_RCW_end_eurobritannia:0 "俄羅斯的和平"
 SUPER_RCW_end_eurobritannia_TEXT:0 "你知道戰場的真相嗎？正常情況下殺一個人是犯罪，但在戰場上殺很多人，你就能成為英雄。 \n §Y- 盧西亞諾·布拉德利§!"
 SUPER_RCW_end_luka:0 "雅各賓主義的最後進軍"
 SUPER_RCW_end_luka_TEXT:0 "你不可能透過說服人們你是正義的來贏得革命。你只能透過讓他們害怕不相信你來贏得革命。 \n §Y-盧卡·朱可夫§!"