 ORG_the_holy_orange_empire_desc:0 "不列顛尼亞帝國本土是我們橙子的故土。是時候將它從查爾斯皇帝的暴政中解放出來，並以神聖橙子帝國之名解放其他所有殖民區了！這是我們的首要目標，在達成之前，橙色鎮魂曲永遠不算完成。"
 ORG_form_holy_orange_empire:0 "建立神聖橙子帝國"
 ORG_control_our_orangelands:0 "我們的橙子大地"
 ORG_control_our_orangelands_desc:0 "並非我國的每一位成員都支持在新的橙色旗幟下生活，要贏得他們的信任尚需時日。我們可以持續為國家開發新的資源，向他們證明我們才是世界名正言順的橙色統治者。"
