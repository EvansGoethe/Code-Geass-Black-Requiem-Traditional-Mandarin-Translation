 ORG_guilford_demotion_desc:0 "吉爾福特辜負了神聖橙子帝國，為此他將被連降三級。他將有兩個選擇：要麼從駕駛員重新做起，要麼去經營一座火龍果農場。"
 ORG_for_your_failure:0 "將吉爾福特連降三級"
 ORG.1.t:0 "橙子叛亂"
 ORG.1.d:0 "5區一直像帝國不列顛尼亞的其他殖民區一樣運轉著：向祖國輸送物資，換取軍隊與補給。在不列顛尼亞總督的近期記憶中，或在可預見的未來裡，都沒有什麼棘手的任務——除了幾場籠絡數字人、安撫貴族的公開演說。\n\n就在那時，事情毫無預兆地發生了。報告紛至沓來，全都關於一家新公司進駐5區的消息。這家公司財力深不可測，大肆收購土地開闢橙子農場。它名叫橙子國際公司，不僅將財富用於自身獲利，還為員工提供遠超其他任何公司的福利待遇。\n\n作為回報，工人們向公司宣誓絕對效忠，甚至自稱為「橙子」。當總督終於決定將公司逐出5區時，一切壓制公司的企圖都遭到了民眾的頑強反抗。街頭開始爆發騷亂，這是該區有史以來最嚴重的騷亂，而不知為何，不列顛尼亞袖手旁觀。\n\n橙子們的要求不止於讓公司留下，他們要求全區尊重公司帶來的福祉，甚至將其設為正式政黨；還要求為殖民區更名，與不列顛尼亞的傳統決裂。\n\n總督明白這一切都是奪權的手段，但他仍不得不做出抉擇。"
 ORG.1.a:0 "「向橙子們的要求屈服。」"
 ORG.1.b:0 "「絕不能讓他們控制5區！」"
 ORG.2.t:0 "橙子小子？"
 ORG.2.d:0 "總督被逼入了絕境，他必須做出決斷，只能祈禱那是正確的。他輕嘆一聲，佇立在辦公室的窗前，俯瞰著波哥大租界。自從他接受橙子們的要求後，騷亂便平息了。但如今他眼睜睜看著他的殖民區、他的國度正在改變。\n\n望向城市，他看到就連懸掛不列顛尼亞國旗的巨幅旗幟也未能倖免，被換成了以橙色取代藍色的旗幟。\n\n「我到底哪裡做錯了？」他輕聲自語，閉上眼睛片刻。突然，身後傳來一個聲音，他猛然轉身，制服上的披風隨著這突兀的動作揚起。\n\n「你好啊，很榮幸與你相識。」那名男子佇立在那裡，身著讓人聯想到騎士的白色衣裝，留著看似藍中帶綠的正式短髮，最顯眼的特徵是罩住左眼的橙色半面具。\n\n總督還來不及開口，男子便縱身躍過辦公桌向他撲來，甩出右臂，一柄金色的利刃自袖中彈出。\n\n「你是誰？你想幹什麼！」男子以一個優雅流暢的動作割開了總督的喉嚨。他只選擇回答第一個問題——因為第二個問題的答案，只有他與他的皇帝才配知曉。"
 ORG.2.a:0 "「正是在下，傑洛米亞·哥特瓦爾德！」"
 ORG.3.t:0 "我是橙子，漢斯博士"
 ORG.3.d:0 "橙子自治區的人民越發沉醉於橙子國際公司帶來的福祉，如今尋求變革的已不只是公司的員工。\n\n就連軍中將士也拋下了不列顛尼亞的旗色，改換橙色。該區的貴族們別無選擇——在那些曾被他們視為區區「5區人」、如今卻已成大氣候的人們的壓力之下。\n\n橙子們的權勢開始凌駕於貴族之上，使貴族們只剩一條路可走：全力支持橙子，拋開對其他黨派的一切效忠，不僅在名義上、更在實質上成為橙子。"
 ORG.3.a:0 "先讓我們的國家變成橙色，然後是全世界。"
 ORG.4.t:0 "橙色的忠誠"
 ORG.4.d:0 "隨著總督的猝然離世，橙子自治區的未來一度懸而未決。然而橙子們迅速抓住這個機會擴張權力，推動公司掌舵、統治整個殖民區——讓橙子國際公司的執行長接任，成為該區總督。\n\n這場奪權之舉甚至是在與不列顛尼亞作對，換作其他任何情況，不列顛尼亞都會出兵徹底粉碎這場橙子叛亂。但正因為他們的領袖，這一切並未發生——他們對他的忠誠堅定不移，而他也為他們帶來了自由。\n\n南美大陸的其他殖民區紛紛效仿，發起自己的抗爭，直到所有殖民區都掙脫了不列顛尼亞的傀儡絲線。經此一役，對橙子的忠誠已不僅僅源於它帶來的福祉，更成為他們彰顯自由與生命的方式。"
 ORG.4.a:0 "人民對橙子的忠誠正變得絕對。"
 ORG.5.t:0 "永恆的忠誠"
 ORG.5.d:0 "傑洛米亞在這個國家點燃了革命的火花，橙子們得以擺脫不列顛尼亞傀儡與棋子的身分，而傑洛米亞承諾給予他們更多。\n\n當他從波哥大租界的新辦公室俯視他們時，眼中沒有厭惡，也沒有任何惡意。他注視他們的眼神，與他注視那些得到他忠誠之人的眼神如出一轍。他的新國家向他獻上了忠誠，他也將以忠誠回報。下一步，就是公開宣布脫離帝國，與不列顛尼亞斷絕一切往來——不再向其輸送資源，也不再接受其支援。\n\n對其他殖民區而言，這無異於自取滅亡，只會招致不列顛尼亞更嚴酷的鉗制；但有傑洛米亞領導橙子之國，自由便有希望。當這個國家與傑洛米亞發表宣言時，早已追隨橙子自治區腳步的其他殖民區也紛紛效法。整個南美地區公然反抗不列顛尼亞，各殖民區跟隨橙子的先例紛紛更名。\n\n但，他們缺少名字背後的意義，缺少讓橙子與眾不同的東西。當薇蕾塔·奴請求傑洛米亞向民眾發表演說時，他道出了「橙子」之名的由來。"
 ORG.5.a:0 "「橙子，你說？那就是我忠誠的名字！」"
 ORG.6.t:0 "見到我很開心嗎，橙子？"
 ORG.6.d:0 "其他國家與橙子自治區一同脫離不列顛尼亞看似偶然，實則完全在傑洛米亞的計畫之中。其他殖民區沒有立即加入他的國家，這對他而言無關緊要——他自有辦法對付他們。\n\n在擺脫不列顛尼亞之後，橙子自治區便可以進入計畫的下一步：準備征服不列顛尼亞。為此，橙子自治區需要更多的土地、更多的工廠和更多的人力。\n\n如今全世界的目光都聚焦於此，橙子自治區開始備戰，橙子們也早已摩拳擦掌。他們的國家正準備開戰，他們亦然——帶著總督向他們展現過的那份忠誠，追隨他前進。"
 ORG.6.a:0 "我們的國家與我們的橙子們茁壯成長。"
 ORG.7.t:0 "橙子義體工學研究"
 ORG.7.d:0 "傑洛米亞現身5區看似純屬偶然，其來歷的真相成謎。更神祕的是他隨身帶來的東西——他帶給5區的不只是一家市值數兆美元的公司，還有遠超當今水準的技術與設計圖。\n\n他帶來的技術只能說是來自遙遠的未來，其中一部分更是源於傑洛米亞自身。他的身體部分由義體構成，這些義體某種程度上維繫著他的生命。\n\n他允許橙子科學家們研究這些技術，嘗試逆向工程加以復刻，並應用到其他人身上。這不僅是為了拯救生命，更是為了改良國民，某種意義上也讓他們更接近真正的橙子。科學家們沒過多久便取得了突破。\n\n雖然技術極為先進，但憑藉傑洛米亞持有的設計圖與知識，復刻工作事半功倍，輕鬆通過了測試階段，已準備好量產並推廣至全國。"
 ORG.7.a:0 "向成為橙子更近一步。"
 ORG.8.t:0 "終極Knightmare Frame OR-1"
 ORG.8.d:0 "有了這項名為Knightmare Frame的新技術設計圖，改良工作無需額外授權便迅速展開。儘管傑洛米亞當時已帶來他所能取得的最頂尖技術，他深知世界的進步一日千里。\n\n如今全世界都見識到了橙子自治區掌握的技術，進步或許會更快。科學家們著手一項新計畫：改良從傑洛米亞那裡獲得的薩瑟蘭設計，憑藉橙子工程學的偉力，使其超越其他一切技術。\n\n科學家們將這項計畫及新型Knightmare Frame命名為O-R1NG3 L-OY1L——這是它的完整編號，但通常簡稱為OR-1 Knightmare Frame。\n\n短短數週之內，這個機體設計就從薩瑟蘭的簡單改良案，歷經原型階段與各項測試，達到了可在全國全面量產的程度。傑洛米亞大人的恩澤，加上橙子們的忠誠與意志，使OR-1成為菁英中的菁英。"
 ORG.8.a:0 "橙子工程學的極致！"
 ORG.9.t:0 "橙色地球"
 ORG.9.d:0 "擁有了足以征服列國的軍隊，整個南美大陸也已盡入橙子囊中。傑洛米亞知道，是時候將目光投向不列顛尼亞了——那是他通往更美好世界、完成計畫之路上最大的障礙。\n\n與不列顛尼亞為敵——那個他曾誓死效忠的國家——是傑洛米亞面臨的最大考驗。但當他想起自己的忠誠與目標時，那份考驗頃刻消散。傑洛米亞坐在辦公桌前低頭沉思，完全忘記了身邊還有旁人。\n\n「傑洛米亞大人。」他聽見薇蕾塔·奴的聲音，感到她的手輕輕搭上他的肩膀。她站在他身旁，溫柔地注視著他。\n\n「別管他，他又沉浸在他的橙子裡了。」這次說話的是站在桌前望著他的安亞，與傑洛米亞初見她時相比，她的眼中竟有了光彩。\n\n傑洛米亞嘆了口氣，從椅子上站起身來，薇蕾塔的手仍搭在他身上。他俯身向前，朗聲說道。"
 ORG.9.a:0 "「為了我們的橙色地球，不列顛尼亞必須消失！」"
 ORG.10.t:0 "橙色鎮魂曲"
 ORG.10.d:0 "神聖橙子帝國走過了漫長的道路——從最初不過是茫茫大海中不列顛尼亞的又一個殖民區，到推翻並徹底接管這個國家，將不列顛尼亞的暴政從世上抹除。傑洛米亞輕嘆一聲，近來他在獨處時似乎總是嘆息。\n\n「還沒有結束。」他淡淡地說道，目光越過辦公桌望向前方，雙手托著下巴，陷入沉默。\n\n「我的皇帝仍在承受這個世界帶來的痛苦……還沒有結束。橙色鎮魂曲仍有未竟的樂章。」傑洛米亞喃喃自語。對忠誠的時刻銘記，是支撐他走到今天的力量——甚至勝過維繫他生命的體內義體。科技能讓他活著，但忠誠讓他活下去。\n\n他知道世上仍有一些國家會給世界帶來混亂與浩劫，只要它們存在，他就永遠得不到他渴望的和平。\n\n即便不是如此，一些被征服的民眾也對自己的新處境心懷不滿。對他們，他只有一句宣言。"
 ORG.10.a:0 "「我要毀滅世界，再造新生。」"
 ORG_orange_boy:0 "橙子小子？"
 ORG_orange_boy_desc:0 "拜橙子國際公司的影響力所賜，5區如今已被稱為橙子自治區。但有傳言稱，公司的執行長正在謀求權力，他的綽號是「橙子小子」。"
 ORG_i_am_an_orange_dr_hans:0 "我是橙子，漢斯博士"
 ORG_i_am_an_orange_dr_hans_desc:0 "橙子自治區的人民越發與國家同心同德，他們開始在街頭高呼自己與橙子一體，人人皆為橙子。"
 ORG_orange_tinted_loyalty:0 "橙色的忠誠"
 ORG_orange_tinted_loyalty_desc:0 "人民對國家的忠誠已經絕對，推動國家不再作為不列顛尼亞的直接棋子。他們忠誠的影響力也感染了其他不列顛尼亞殖民區，與橙子們一道掙脫不列顛尼亞的直接枷鎖。"
 ORG_eternal_loyalty:0 "永恆的忠誠"
 ORG_eternal_loyalty_desc:0 "終於，伴隨著橙子們的忠誠吶喊，橙子自治區徹底擺脫了不列顛尼亞，團結在他們的領袖傑洛米亞·哥特瓦爾德身後！其他殖民區也紛紛效仿，脫離不列顛尼亞，開闢自己的疆土。"
 ORG_ethylene_powered_air_fleet:0 "乙烯動力航空艦隊"
 ORG_ethylene_powered_air_fleet_desc:0 "憑藉橙子自治區工廠的全部產能，以及橙子天才科學家們的智慧，這個國家造出了完全以乙烯為動力的飛機與飛空艇。"
 ORG_orange_you_glad_to_see_me:0 "見到我很開心嗎，橙子？"
 ORG_orange_you_glad_to_see_me_desc:0 "其他不列顛尼亞殖民區雖然追隨了橙子的先例，卻並未對橙子懷抱至高的忠誠。為此，必須讓他們回到自己的位置上。"
 ORG_the_citrus_fleet:0 "柑橘艦隊"
 ORG_the_citrus_fleet_desc:0 "環繞我們許久的海洋曾被不列顛尼亞壓迫者征服，這樣的日子一去不返。一支更加宏偉的海軍正在建造之中，它將以橙子之名統治海洋。"
 ORG_assembling_orange_airforce:0 "組建橙子空軍"
 ORG_assembling_orange_airforce_desc:0 "掌握了乙烯動力飛行器的技術，如今是時候開始大規模建設國家的橙子空軍了。"
 ORG_orange_the_fleet:0 "橙子艦隊"
 ORG_orange_the_fleet_desc:0 "能夠橫渡七海、裝備最強火砲的雄偉戰艦，若不能善加運用便毫無價值。是時候將柑橘艦隊妥善編組了。"
 ORG_maximum_orange_efficiency:0 "橙子效率最大化"
 ORG_maximum_orange_efficiency_desc:0 "多虧了橙子們的奉獻與辛勤工作，我們的工廠效率已臻巔峰。"
 ORG_orange_coast:0 "橙色海岸"
 ORG_orange_coast_desc:0 "我們的國土四面環海。要征服海洋，必先馴服海岸線，使其為我們所有。"
 ORG_oranges_the_finest_in_cybernetics:0 "橙子！義體工學的翹楚"
 ORG_oranges_the_finest_in_cybernetics_desc:0 "我們的領袖傑洛米亞·哥特瓦爾德擁有一整套義體，橙子科學家們一直致力於將其改造為適用於他人的技術。過程雖然緩慢，但橙子義體工學終於可以應用於全軍了。"
 ORG_a_superior_orange_army:0 "超凡的橙子軍"
 ORG_a_superior_orange_army_desc:0 "我們建立了一支足以勝過鋼鐵齒輪的軍隊，一支將超越不列顛尼亞與全世界的軍隊，一支令敵人聞橙喪膽的軍隊。"
 ORG_construction_of_the_knightmares:0 "橙子動力Knightmare"
 ORG_construction_of_the_knightmares_desc:0 "Knightmare Frame是我國所能掌握的最致命的武器之一。而巧的是，我們的領袖傑洛米亞·哥特瓦爾德從他的來處帶來了一整套超越一切的設計圖。"
 ORG_ultimate_knightmare_the_or1:0 "終極Knightmare OR-1"
 ORG_ultimate_knightmare_the_or1_desc:0 "憑藉傑洛米亞提供的設計圖，我們的科學家們不斷加以改良，使其成為我們自己的東西，打造出終極的Knightmare Frame——他們將其命名為OR-1。"
 ORG_god_is_an_orange:0 "神是橙子"
 ORG_god_is_an_orange_desc:0 "隨著我們對普通橙子士兵的改造不斷進步，我們的成果已真正超越了人類。神確實存在，而且祂是一顆橙子。"
 ORG_knights_of_orange:0 "橙之騎士團"
 ORG_knights_of_orange_desc:0 "新型Knightmare Frame迅速投入使用，駕駛員中很快便有人脫穎而出。這些技藝精湛的駕駛員由傑洛米亞親自挑選，成為他的橙之騎士團的一員。"
 ORG_we_can_orange_the_price:0 "橙子出得起這個價"
 ORG_we_can_orange_the_price_desc:0 "橙子國際公司與橙子自治區的價值與日俱增，但我們的土地卻沒有增加，以至於我們開始尋求其他獲取土地的手段。"
 ORG_an_orange_earth:0 "橙色地球"
 ORG_an_orange_earth_desc:0 "傑洛米亞的最終目標一直很簡單：終結紛爭與戰爭。為此他採取了一個簡單的辦法——讓整個世界變成橙色，讓世界忠於自身與人民。而要做到這一點，不列顛尼亞必須滅亡。"
 ORG_the_orange_council:0 "橙子議會"
 ORG_the_orange_council_desc:0 "橙子自治區的政務日益繁重，傑洛米亞漸感力不從心。因此他召集了一批最忠誠、最聰慧的橙子協助治理，組成了橙子議會。"
 ORG_united_they_fall:0 "合則俱亡"
 ORG_united_they_fall_desc:0 "歐盟是一個內部充滿紛爭、動盪與衝突的國家。橙子自治區不能坐視他們分崩離析——我們要加速他們的崩潰。"
 ORG_from_desert_to_sea:0 "人人皆橙"
 ORG_from_desert_to_sea_desc:0 "世界被形形色色的國家分割得太久了，是時候糾正這個錯誤了。是時候讓每個男人、每個女人、每個孩子都成為橙子了。"
 ORG_orange_requiem:0 "橙色鎮魂曲"
 ORG_orange_requiem_desc:0 "隨著不列顛尼亞的敗亡，傑洛米亞距離他的目標又近了一步。事實上，他的計畫已近完成，只剩少數收尾工作。他將毀滅世界，並以橙色鎮魂曲再造新生——這一切，皆是為了他的忠誠。"