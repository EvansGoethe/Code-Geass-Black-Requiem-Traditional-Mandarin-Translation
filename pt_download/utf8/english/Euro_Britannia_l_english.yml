 EUR_intervention.3.t:0 "「來自歐洲不列顛尼亞的信息」"
 EUR_intervention.3.d:0 "「主旨：援助抗擊我們的敵人\n寄件者：維萊恩斯大公\n收件者：歐洲干涉區總司令\n\n以神聖不列顛尼亞帝國第98代皇帝查爾斯·Zi·不列顛尼亞之名。我，歐洲不列顛尼亞領袖維萊恩斯大公以他的名義向您發送此消息。\n\n我們的利益已達成一致，經上議院決定和皇帝的旨意，我們不能允許虛假的偽沙皇繼續他微不足道的存在。因此，我們將向您提供援助和支持，以應對這一麻煩。\n\n不列顛尼亞萬歲！」"
 EUR_intervention.3.a:0 "「『真是個奇怪的國家……』」"
 EUR_intervention.4.t:0 "「來自歐洲不列顛尼亞的信息」"
 EUR_intervention.4.d:0 "「主旨：援助抗擊我們的敵人\n寄件者：維萊恩斯大公\n收件者：弗謝沃洛德·羅曼諾夫\n\n以神聖不列顛尼亞帝國第98代皇帝查爾斯·Zi·不列顛尼亞之名。我，歐洲不列顛尼亞領袖維萊恩斯大公以他的名義向您發送此消息。\n\n我們的利益已達成一致，經上議院決定和皇帝的旨意，我們不能允許腐敗民主的歐洲干涉區繼續干涉俄羅斯。因此，我們將向您提供援助和支持，以應對這種外部影響。\n\n不列顛尼亞萬歲！」"
