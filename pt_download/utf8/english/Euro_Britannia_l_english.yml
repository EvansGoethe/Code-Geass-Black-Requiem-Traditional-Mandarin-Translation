 EUR_Site_Component1_loc_1:0 "§Y發射台§!\n這些是向太空發射火箭的關鍵基礎設施。隨著時間的推移，由於風化、腐蝕和疏於維護，它們遭受了結構退化或損壞。"
 EUR_Site_Component2_loc_1:0 "§Y機庫和組裝大樓§!\n火箭在這裡組裝、與有效載荷集成，並準備發射。這些建築的屋頂、牆壁、門和其他零件需要維修，以便為火箭組裝和維護活動提供安全且溫度可控的環境。"
 EUR_Site_Component3_loc_1:0 "§Y燃料和推進劑設施§!\n這些設施對於儲存、處理和裝載火箭發射所需的燃料和推進劑至關重要。這些設施的儲罐、管道、泵浦和其他設備需要維修，以確保其符合安全標準和運作要求。"
 EUR_Site_Component4_loc_1:0 "§Y通信與控制中心§! \n它們是航太發射場的神經中樞，負責監控和控制發射操作的各個方面。"
 EUR_Site_Component1_loc_2:0 "§Y發射塔是火箭發射的關鍵基礎設施。§!\n隨著時間的推移，這些結構會遭受磨損、腐蝕或結構性損壞。"
 EUR_Site_Component2_loc_2:0 "§Y組裝與整合設施§§!\n火箭在這裡組裝、與有效載荷集成，並準備發射。這些設施需要對設備進行維修，例如起重機、升降機和組裝車間，以及通風系統和電氣線路等基礎設施。"
 EUR_Site_Component3_loc_2:0 "§Y處理設施§! \n這些設施對於儲存和管理火箭發射所需的燃料和氧化劑至關重要。這些設施的儲槽、管道、閥門和泵浦需要維修或升級，以確保推進劑的安全處理和儲存。"
 EUR_Site_Component4_loc_2:0 "§Y任務控制中心§!\n它作為火箭發射操作的指揮中心，負責監督任務規劃、監控火箭狀態，並在發射過程中做出關鍵決策。"
 EUR_Site_Component1_loc_4:0 "§Y試驗台和設施§! \n它們是進行火箭發動機及其部件推進試驗的關鍵基礎設施。這些設施包括靜態試驗台（發動機固定在地面上進行點火試驗）和動態試驗台（發動機安裝在移動平台上以模擬飛行條件）。"
 EUR_Site_Component2_loc_4:0 "§Y引擎測試艙§! \n這些是專門用於安裝和測試火箭發動機的封閉空間。這些設施需要對推力測量系統、燃料輸送系統和排氣通風系統等設備進行維修或升級。"
 EUR_Site_Component3_loc_4:0 "§Y儀器儀表與控制系統§! \n它們在監測和控制推進試驗、收集數據和分析試驗結果方面發揮著至關重要的作用。這些系統包括感測器、數據採集系統和控制台。"
 EUR_Site_Component4_loc_4:0 "§Y安全與環境系統§! \n這些系統對於在推進系統測試期間保護人員和周圍環境至關重要。這些系統包括滅火系統、緊急停車程序和環境監測設備。"
 EUR_Site_Component1_loc_3:0 "§Y天線陣列§! \n它是雷達系統的主要組成部分，由多個按特定配置排列的天線組成，用於發射和接收雷達訊號。隨著時間的推移，天線會受到腐蝕、機械磨損和電子元件老化的影響。"
 EUR_Site_Component2_loc_3:0 "§Y發射機和接收機單元§! \n發射機和接收機單元產生雷達訊號、放大接收訊號並處理雷達資料。這些單元的電子元件需要維修和升級。"
 EUR_Site_Component3_loc_3:0 "§Y訊號處理與控制系統§! \n它們負責管理雷達運作、控制天線運動和處理雷達資料。這些系統包括電腦、軟體應用程式和控制介面。"
 EUR_Site_Component4_loc_3:0 "§Y電源和冷卻系統§!\n電源和冷卻系統為雷達組件提供電力並維持最佳工作溫度。這些系統包括發電機、配電單元、空調單元和冷卻風扇。"
