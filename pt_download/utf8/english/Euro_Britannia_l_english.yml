 EUR.12.t:0 "「當太陽落下，月亮升起」"
 EUR.12.d:0 "\n\n£GFX_EUR_Project_Zorya \n\n\n\n\n\n主旨：佐里亞計畫\n寄件者：星射計畫負責人 伊莎貝拉·沙里亞克\n收件者：維萊納大公\n\n長官，我很抱歉發送這封緊急訊息，但最近的進展迫使我違反了協定。\n\n昨晚3:07:51，我的團隊收到了一條加密傳輸，我們對此無法解釋。連接到航天發射場網路的每一台電腦都記錄下了這一現象，隨後便崩潰了。試圖從上述任何設備中恢復最終數據的嘗試均宣告徹底失敗；然而，我們能夠確定建造在設施內的所有硬體均未受到影響。不論是什麼發送了那條傳輸，建造這裡的那些聰明人設計的系統顯然足以抵禦此類事件。\n\n我不需要說明一條能癱瘓整個通訊網路的訊號，會給我們的努力或帝國的繁榮帶來多大的重要性或擔憂。\n\n我明白您想要答案，但我除了向您匯報我其中一條潛在線索的最新進展外，別無他法。在過去的6年裡，我發現有超過300批運往該設施的貨物已從資料庫中被刪除，記錄上只留下一處空白。此外，航天控制中心有幾次靜態點火測試和兩次發射的記錄，這些記錄並不在發射清單或任何其他記錄中。該共和國以其太空計畫的保密性而聞名，但坦白說，這有些過頭了。我相信這三個實例確實與之前的傳輸有關，雖然我受限於該設施的資訊，但如果我能進入該計畫的其他地點，我應該能了解更多資訊。\n\n最後，長官，我向您提供我能恢復的最後一項資訊，即所有相關文件被發現時所用的代號……§R佐里亞計畫§!"
 EUR.12.a:0 "「這是自動回覆，還是有人試圖阻止我們的調查？」"
 EUR_schneizel_phase_one.1.t:0 "「來自皇太子的命令」"
 EUR_schneizel_phase_one.1.d:0 "「維萊恩斯大公站在他最近在鄂霍次克市政大樓獲得的辦公室裡。他的手指按在冰冷的辦公桌表面上，腦海中盤旋著過去兩個月發生的事情，以及擺在他面前的來自潘德拉根的信息。噢，他是多麼希望有一個政府作為建設的基礎……噢，他是多麼詛咒 O.S.I 殺死了唯一一個為這片領土帶來穩定的男人。儘管總統索羅金有種種缺點，但他履行了自己的職責，這一想法讓海蘭將心思重新集中到眼前的任務上。\n\n字句很清晰，他要徹底鏟除來自西部新秀或內部的任何反對勢力，同時確保整個俄羅斯都歸入歐洲不列顛尼亞的控制之下。這無疑是一個挑戰，但區區一個挑戰何時曾迫使他退縮。不，讓他猶豫的不是任務本身，而是命令的發起者——第二皇子施奈澤爾·el·不列顛尼亞。\n\n施奈澤爾的指令總是冷酷地合乎邏輯，讓人想起帝國不可動搖的意志，但這些他所提出的建議卻喚醒了他的良知。儘管他非常崇敬施奈澤爾的才智與戰略天賦，但執行這些命令所需要的殘酷手段在最近被征服的地區並非罕見。這就是他被期望領導的地方嗎？一個建立在背信棄義和政治背叛之上的新地區？海蘭對這個想法報以冷笑，意識到這個想法與不列顛尼亞皇室的歷史是多麼契合。\n\n他當然可以重演歷史，按字面意思執行命令。他的職位當然要求他首先並最首要地忠於皇帝，但他內心深處想知道，是否有辦法更具創意地解讀這些命令。看看他是否能在不損害自己地位的情況下，終止這個循環，並把所承諾的給予人民。這無疑會更加困難，但再說一次，額外的挑戰何時曾阻止過他？」"
 EUR_schneizel_phase_one.1.a:0 "「最好服從命令，避免不必要的麻煩。」"
 EUR_schneizel_phase_one.1.b:0 "「如果我要領導這些人民，我需要重建已失去的信任。」"
 EUR_guinevere_phase_one.1.t:0 "「來自第一皇女的命令」"
 EUR_guinevere_phase_one.1.d:0 "\"鑑於不列顛尼亞本土已無法再向你提供援助，你可以向各殖民區（Area）尋求財政支持。\"第一皇女的話語在海蘭德腦中迴響。桂妮薇兒·德·不列顛尼亞，一個野心勃勃、期望不切實際的女人。他在鄂霍次克寒冷的船塢裡讀著她的信，緊緊攥著信紙。要建設俄羅斯，他最需要的就是支持。鄂霍次克的資源遠遠不夠，而隨著索羅金總統被O.S.I.殺害，這一地區的穩定正急轉直下。\n\n\"若不列顛尼亞為我放行，我期望在我抵達時，見到一座比東京租界更大的租界。\"海蘭德的手指把信紙的一角揉成了一團。他當然早就了解她的習性與為人，但這也太過分了。她的期望比星辰還高。不列顛尼亞的支持固然美妙，但代價是桂妮薇兒想要一樣無理至極的東西——竟然要在鄂霍次克這種地方建一整座租界！\n\n\"若他們不放行，你就隨意吧。我懷疑這一趟是否值得我花時間。\"海蘭德閉上眼睛，揉著太陽穴。用殖民區的資金重振俄羅斯經濟，再把一個國家重建成配得上不列顛尼亞的模樣——他面前的任務可真是艱鉅啊。"
 EUR_guinevere_phase_one.1.a:0 "\"該著手建設鄂霍次克租界了……\""
 EUR_guinevere_phase_one.1.b:0 "「我們正依賴這些地區。」"
 EUR_guinevere_phase_one_economy.1.t:0 "「桂妮薇兒的鄂霍次克之行」"
 EUR_guinevere_phase_one_economy.1.d:0 "海蘭德站在機場，站在這顆俄羅斯東部璀璨明珠的面前，風從背後吹來，等候著載有桂妮薇兒的私人專機。他一手攥著當初她寄來的那封揉皺的信，作為對自己一路辛勞的提醒。遠處的燈光越來越近。她即將抵達。海蘭德胸中的期待愈發強烈。大型垂直起降機粗暴地著陸了。海蘭德皺起眉頭、瞪大眼睛，惱怒於第一皇女的專機竟對她如此顛簸。當他走向飛機的舷梯出口時，一股氣流把他低束的馬尾吹向腦後。引擎關閉，艙門開了條縫，緩緩放下。艙內的燈光在一個人影背後灑落。然而，這個身影既沒有華服，也沒有時髦的髮型。\n\n\"殿……下？\"海蘭德試探著向第一皇女致意。身影繼續走下舷梯，露出真容——並非他想像中的皇族，而是一個男人。毫不起眼。沒有華貴的衣著，沒有不列顛尼亞的紋章。\"我不明白……\"海蘭德說。\"她是暈機了嗎？\"男人一言不發，伸手從口袋裡掏出一個信封，上面是那再熟悉不過的蠟封。海蘭德遲疑地從男人伸出的手中接過信。他拆開蠟封，翻開信紙，掃視著裡面的內容。幾乎在一瞬間，他瞪大了雙眼。\n\n\"親愛的奧古斯塔·亨利·海蘭德，維萊訥公爵：\n\n據我所知，你已成功建成了我所要求之物。事情竟有如此非凡的轉折。然而，在你開始修建這座租界後不久，我便得出了結論：我根本不在乎。聽聞你如此認真而高效地執行了我的命令，倒是頗有樂趣。不過，早在給你寫第一封信時我就想到，造訪俄羅斯東部實在太過麻煩，況且我從來不喜歡寒冷。因此，我不會親自前去參觀鄂霍次克租界。別打擾我的僕人。他是來我的新租界取俄羅斯葡萄酒的，供我即將舉辦的宴會之用。\n\n謹啟，皇室第一皇女，桂妮薇兒·德·不列顛尼亞。\""
 EUR_guinevere_phase_one_economy.1.a:0 "\"海蘭德發出一聲痛苦的乾笑，一隻眼睛不住抽搐。\""
 EUR_guinevere_phase_one_economy.2.t:0 "「來自各個地區的貨物」"
 EUR_guinevere_phase_one_economy.2.d:0 "海蘭德抱著雙臂，站在船塢裡望著那艘龐然巨艦。他提高嗓門，好蓋過重型機械的轟鳴：\"……你確定沒有弄錯？\"\n\"當然，閣下！各殖民區對交給您的東西可是交代得明明白白。\"工頭同樣大聲地回答。\n\n隨著越來越多的貨物被卸下，船身漸漸「縮小」，貨櫃降落到混凝土地面上時火花四濺。海蘭德試圖越過工頭的肩膀，偷看寫字板上還列著哪些貨物，工頭注意到了。\"哦？您還挺好奇的嘛？\"工頭大方地把寫字板遞給海蘭德。\"看看船上還有些什麼吧，閣下。\"\n\n海蘭德掃視著數據，數量相當慷慨，但也絕不至於需要這麼大的一艘貨輪。他翻起一頁，注意到「櫻石」兩個簡簡單單的字，旁邊跟著一個大得嚇人的數字。海蘭德被自己的口水嗆到了。\"這……這太瘋狂了！這麼多櫻石堆在一處……船上只要冒出一點火花，釀成的災難就會比鄂霍次克大爆炸更慘烈！\"\n工頭寬慰海蘭德道：\"別擔心，沒人知道這批貨。再說，運櫻石的船很少出事故的。\"\n這番安慰對海蘭德毫無作用。\"回到辦公室後，我會向各殖民區致以最深的謝意，也親自感謝你處理此事——但恕我失陪，我得離開這顆漂浮的炸彈了。\""
 EUR_guinevere_phase_one_economy.2.a:0 "\"他們到底在想什麼？\""
 EUR_guinevere_phase_one.2.t:0 "「禮儀重於理智」"
 EUR_guinevere_phase_one.2.d:0 "「「你越權了，蘭開斯特將軍，」海蘭提高了聲音，儘管其中沒有任何憤怒。\n海蘭對面的男子嘲笑地搖了搖頭。「我端量著我的觀點，大公。你更願意按照你自己的方式去做嗎？」男子的聲音中帶著一絲諷刺。\n\n艾伯特·蘭開斯特將軍毫無預警地前來會見海蘭，並在鄂霍次克政府大樓的大廳裡伏擊了他，抱怨海蘭目前在西伯利亞前線的戰略。這名男子的外套上裝飾著勳章，其中大部分代表了他對前日本人——現在的11區人——取得的令人震驚的勝利。艾伯特對不列顛尼亞的高級指揮部來說一直彌足珍貴，但海蘭以前所認識的那個懦弱、謹慎的走狗，現在表現得完全相反。他每次走過海蘭時給予的傲慢眼神，以及他姿態中散發出的優越感，都表明他沉浸在這種新的威望中。\n\n海蘭用嚴厲但平靜的眼睛瞪著艾伯特。「蘭開斯特將軍，我認為你最好表現得更專業一些。」\n艾伯特修容道。「也許如果我不需要的話，我應該把這件事留給你，並帶我的部下回家。」\n「那好吧，我會立即將你的決定通知皇帝，」海蘭用同樣堅定的表情說道，他的話語冰冷。\n艾伯特的得意神情頓時消失，迅速改口收回。「大公，我們別操之過急！」他稍微退後一步，清理了一下喉嚨，盡力保持冷靜。「請考慮我的提議。」當他深深地、壓抑地呼出一口氣時，額頭上冒出了汗水。」"
 EUR_guinevere_phase_one.2.a:0 "「我會考慮的。」"
 EUR_guinevere_phase_one.3.t:0 "「公爵會見騎士」"
 EUR_guinevere_phase_one.3.d:0 "他揮了揮手——這個即使站在海蘭德身邊也依然魁梧如巨人的男人，做的第一件事就是揮手。海蘭德帶著隨行人員走近，兩側簇擁著眾多不列顛尼亞衛兵，身旁兩名主要持著禮儀長矛。而在他身後還有一支小分隊，配備著真正的武器——他的精銳衛隊，那些會真正保護他、為他而死的人。\"海蘭德！\"曼弗雷迪低沉的嗓音吼道，那如雷貫耳的聲音讓他在自己的隨行隊伍中無所遁形。他們剛在馬加丹港下船。海蘭德走上前，站定在他面前幾步遠的地方望著他，心想還是先把禮數走完。\"第二席騎士米凱勒·曼弗雷迪，我深感榮——\"然而，他沒能用自己的聲音說完這句話。曼弗雷迪大跨三步，單臂把海蘭德一把拉進熊抱，海蘭德只能拍拍曼弗雷迪的後背作為回應，後者又衝他吼了一嗓子：\"啊！少來那套虛的，能再見到你真好，我的朋友。\"能再次親眼見到海蘭德，他看起來由衷地高興。曼弗雷迪先前試圖從不列顛尼亞本土遙控指揮歐洲不列顛尼亞軍，靠電話和便箋處理事務，既困難又惱人，還孤獨。曼弗雷迪鬆開懷抱，兩人順勢轉為海蘭德更習慣的一記有力握手——即便只是簡單的握手，曼弗雷迪的力道也大得驚人。\n\n\"見到你我也很高興。你清楚自己在這裡的任務吧？\"海蘭德說。儘管他也為見到朋友而高興，但他明白他們還有一個國家要守護、一場戰爭要打贏、一堆工作要做。一切都是為了查爾斯皇帝。曼弗雷迪看著他，臉上始終掛著大大的笑容，此刻撓了撓後腦勺笑得更開了。\"當然清楚！他們可是翻來覆去地跟我念叨個沒完。\"他說著，似乎有些不耐煩，但也並非真的介意。隨後，兩個男人就那麼站著，站了熱乎乎的——或者說冷冰冰的——一分鐘，俄羅斯刺骨的寒冬啃噬著他們。他們四目相對地站著，一言不發。海蘭德期待地望著他，曼弗雷迪卻什麼也不說。於是海蘭德清了清嗓子，再次開口打破這凝滯的冷空氣。\n\n\"那麼你知道——\"話音未落又被曼弗雷迪打斷。他顯然不想再聽一遍相同的命令，尤其是從朋友嘴裡。看他眼中閃過的光和越咧越開的笑容，剛才那一下分明是故意引他上鉤。\"知道！建立一個騎士組織，讓他們承載歐洲不列顛尼亞的火焰與榮譽，並將其發揚光大。\"雖然他接到的命令肯定比這具體得多，理由也充分得多，但海蘭德不得不承認，這就是曼弗雷迪理解命令的方式，也是他執行命令的方式。這麼一想，他說得分毫不差。所以，海蘭德沒有糾正他，只是說道："
 EUR_guinevere_phase_one.3.a:0 "\"是啊，大致就是這樣。\""
 EUR_guinevere_phase_one.4.t:0 "「毒蛇之籠」"
 EUR_guinevere_phase_one.4.d:0 "「「啊，這個時候有訪客？」她的聲音冰冷無比，沒有絲毫關心的意思。伴隨著她那一頭黯淡、如鬼魅般金黃的頭髮隨著頭部轉動，伊莎貝拉·沙里亞克只是暫時從書桌上的信件抬起頭看了一眼。她很快又低下頭繼續閱讀。「受人尊敬的海蘭德勳爵。真是有趣。你想要什麼？」她翻動著文件，傍晚橙色的餘暉透過一扇裝有鐵窗櫺的窗戶灑了進來。\n海蘭德對她瞇起了雙眼。即便只用餘光，他也能明白這間房間的情況。舒適的家具、華麗的裝飾、絲綢窗簾……這是唯一適合她這種關係的貴婦人的囚室。「伊莎貝拉·沙里亞克，我來呈上皇帝親筆寫下的赦免令。」他平靜地說道。面對她這種性格的女人，沒有必要拐彎抹角。\n\n她把書桌上的一封信塞進信封裡，從書桌旁站了起來，拿起一頂高禮帽。戴著她標誌性的頭飾，她朝海蘭德走去，高跟鞋在木地板上發出清脆的聲響，手裡還拿著信封。她在他的面前停下腳步，雙臂交叉，海蘭德俯視著這位年輕的女子。「那麼告訴我，我需要為你做些什麼？」她的聲音毫無客套，給了海蘭德同樣生硬的回答，就像他對她一樣。儘管她的語氣隨意，但臉上的表情卻與她的聲音截然相反。她的嘴角帶著一絲玩味的微笑，眼神中閃爍著好奇的光芒。任何見過伊莎貝拉的人都會說同樣的話：她的臉簡直就像一條毒蛇。\n為了延續他們簡明直接的談話模式，海蘭德用實話實說的方式回答道：「妳要來歐洲不列顛尼亞，在我的手下工作。我需要妳的專業知識。」海蘭德保持著嚴厲的目光，權威不容置疑。\n\n伊莎貝拉保持著惡毒的微笑，她的雙眼向海蘭德注入了一股令人不安的毒素。在海蘭德無法也不想理解的腦袋裡思考了一會兒後，伊莎貝拉走到這間豪華囚室角落的壁爐旁。她把信封拿在面前，外面沒有任何文字，只是像觀察化學試管一樣端詳著它。「好吧，」她說道，隨後是一陣沉默。「那我會有我自己的實驗室工作嗎？」她只是微微偏過頭，用餘光瞥著海蘭德。\n雖然她是以提問的方式提出，但海蘭德覺得這並不完全是一個請求。「妳會得到妳所需要的資源，」他回答道。說完，伊莎貝拉又看了手中的信封最後一眼，然後將其扔進了壁爐的火焰中。海蘭德沒有再說什麼，打開門離開了她。他沒有更多話想對她說。畢竟，她是那種會謀殺自己親生丈夫的女人。」"
 EUR_guinevere_phase_one.4.a:0 "「招惹毒蛇絕無好處。」"
 EUR_guinevere_phase_one_military.1.t:0 "「配得上公爵的軍隊」"
 EUR_guinevere_phase_one_military.1.d:0 "「在得知本國的 Knightmare 駕駛員抵達的消息後，海蘭急忙趕往他們臨時駐紮的附近地堡。當他打開食堂大門時，目光掃過從不列顛尼亞派來的二三十名駕駛員，他們都在互相社交並享用著餐點。海蘭立刻被認了出來，片刻之內，他們都挺直身體向海蘭敬禮。海蘭身材挺拔高大，除了少數幾個駕駛員外，他比所有人都高。\n\n隨著他們繼續以尊嚴保持敬禮，房間裡歡樂的氣氛消失了。他們肩並肩站立，準備效力。當海蘭認出一些高調的駕駛員，以及幾位在招募初期被稱為神童的人時，自豪感油然而生。這是海蘭所能要求最好的了。\n\n海蘭清理了一下喉嚨，開始用響亮而引人注目的聲音說話。「我親愛的不列顛尼亞同胞們，歡迎來到歐洲不列顛尼亞。」他停頓了一下，並不完全是個會即興演講的人，但很快繼續說道。「你們都是被單獨選中的，我們期待你們能取得好成績。別被騙了。西伯利亞是不容低估的。我們已經有很多人在冰凍的俄羅斯苔原上犧牲了。機器故障是在所難免的。今晚好好休息。你們明天就上戰場。不列顛尼亞萬歲，」他幾乎是單調地說道，但這足以引起駕駛員們齊聲仿效。\n\n「不列顛尼亞萬歲！」在食堂裡齊聲迴響。海蘭轉身走出了房間。當他走回走廊時，一陣狂熱的喧鬧聲響徹了走廊。」"
 EUR_guinevere_phase_one_military.1.a:0 "「紅軍將不得片刻安寧。」"
 EUR_guinevere_phase_one_military.2.t:0 "「招募名譽不列顛尼亞人」"
 EUR_guinevere_phase_one_military.2.d:0 "分針指向十二，落地大擺鐘對著空無一人的房間奏響報時的鐘聲。報時鳥正指向敞開的陽台門，門外站著海蘭德，雙手背在身後。他的眼睛一直眺望著鄂霍次克的萬家燈火，目光中帶著懷舊，回想著自己的職業生涯。\n\n舊日記憶流淌之際，海蘭德思索著自己在此地的職責。不列顛尼亞待他不薄，他必須用成功來回報這份恩情。如果能申請調來一些駕駛員，那就意味著——\n\"不行，\"海蘭德喃喃自語，打斷了自己的思緒。\"他們給我的已經太多了。再多要，就是對陛下的侮辱。\"\n\n海蘭德俯身向前，赤手按在欄杆上，全然不顧金屬的冰冷。\"不列顛尼亞的強大，將由她曾經征服的人們來證明。\"他的雙手此刻緊緊攥住欄杆，海蘭德再度沉入自己的思緒。帝國的「Number」，從1號編到11號。若為這場戰爭徵召各殖民區的人，本土不會有任何怨言。畢竟，他們並不是真正的不列顛尼亞人。"
 EUR_guinevere_phase_one_military.2.a:0 "「不需要最好的。」"
 EUR_guinevere_phase_one_military.3.t:0 "「請求外國軍團」"
 EUR_guinevere_phase_one_military.3.d:0 "「「正好是我想要見的人，」海蘭在羅莎琳·布希爾將軍對面放下餐盤時宣佈。羅莎琳滿嘴食物，快速而尷尬地敬了個禮，然後吞了下去。\n「大公！」她咳嗽起來，因為食物吞得不順暢。「有什麼我可以協助您的嗎？」\n「幾天前，」海蘭開始說道，同時將土豆切成均勻的方塊。「我向所有地區發送了消息，請求更多步兵。」羅莎琳點點頭，停下吃東西以集中注意力。海蘭繼續切牛排，再次切成方塊。「那些來自各個地區的人，我會分配給你。」羅莎琳正盡最大努力保持專注，但此時正在把西蘭花切成方塊的海蘭極大地分散了她的注意力。「這應該不會太多吧？」海蘭問道。\n「當然不會！」羅莎琳搖搖頭，從恍惚中清醒過來。「我會好好利用他們的！」\n「太棒了。」海蘭鬆了一口氣。「我知道我可以依靠你。」\n既然官方事務已經結束，兩人便一起用餐。羅莎琳發揮她無窮的智慧，試圖以最糟糕的方式與大公進行閒聊。\n「你為什麼吃起東西來像我爺爺？」\n海蘭變得自覺起來，隨即告退，食物還在桌上，一邊嘟囔著一邊走開了。」"
 EUR_guinevere_phase_one_military.3.a:0 "「這就是為什麼我更喜歡在辦公室吃東西。」"
 EUR_guinevere_phase_one_military.4.t:0 "「給士兵的援助」"
 EUR_guinevere_phase_one_military.4.d:0 "「在鄂霍次克港口坐落著一箱神秘的貨物。這只集裝箱在任何送達的運單中都沒有記錄，也沒有任何工人記得曾碰過它。由於擔心是敵人的炸藥，此案被通報給了歐洲不列顛尼亞的炸彈小組。集裝箱引起的所有轟動，也勾起了海蘭的好奇心。在被判定安全後，海蘭大公親自抽空見證了它的隆重開箱。\n\n海蘭和一群碼頭工人遠遠地看著。集裝箱旁直接搭起了裝有化學檢測設備的白色帳篷。一名穿著防化服的不幸男子承擔了打開沉重金屬門的任務。隨著艙門被鬆開並打開，海蘭注意到後面有許多木箱。防化服男子爬進集裝箱，往下看，並蹲下撿起一個物品。該男子隨即將其帶到化學檢測小組對其進行測試。在幾次點頭同意後，該物品被直接帶給了海蘭。\n\n「一封信？」海蘭挑起眉毛，伸出手去接那封沒有任何標記的信封。當他打開時，迎面而來的是過於華麗的筆跡。\n「親愛的奧古斯塔·亨利·海蘭大公，」信中寫道。「希望此信能讓您安好。我一直對您在歐洲不列顛尼亞的努力非常感興趣，並希望您的成功得以實現。在發現這封信的地方有一大批物資，您一定會覺得有用。祝你好運。不要相信任何人。\n\n署名，一位粉絲。」\n\n海蘭抬起頭，看到整個碼頭都靜止不動，正盯著他看。\n「測試你在那個集裝箱裡發現的所有東西。如果它是安全的，那麼我們將充分利用這一切。」他宣佈道，驚醒了行動中的人們。」"
 EUR_guinevere_phase_one_military.4.a:0 "「我是誰，怎能拒絕幫助呢？」"
 EUR_guinevere_phase_one_military.4.b:0 "「我為什麼要相信一個陌生人？」"
 EUR_guinevere_phase_one_delivieries.1.t:0 "「每月交付」"
 EUR_guinevere_phase_one_delivieries.1.d:0 "「「我告訴過你這裡會經常發生故障，」海蘭德對他的將軍羅莎琳·布爾希爾說道。海蘭德繼續說道：「我很慶幸他們的逃生艙還能用。那更重要。我們已經安排定期運送替換零件和機體。」海蘭德打開收音機，巴洛克音樂頓時充滿了房間。「啊，又是這首？」海蘭德懷舊地笑了笑。「既然那些暫時無法執勤的駕駛員沒事可做，我就去他們的基地看看。」海蘭德開始隨著和弦踏腳。「我接下來的幾天都要被文書工作淹沒了。我想聽聽他們的意見，換換口味。」\n羅莎琳點頭回應。「明白了，總督。」她開始無意識地隨著小提琴的旋律搖擺。「你知道嗎，我爺爺最喜歡這種音樂了！」\n海蘭德的眼角抽搐了一下，感覺自己瞬間老了至少三十歲。」"
 EUR_guinevere_phase_one_delivieries.1.a:0 "「你被解散了。」"
 EUR_schneizel_phase_one_military.1.t:0 "「自信的綿羊」"
 EUR_schneizel_phase_one_military.1.d:0 "他走了進來。海蘭德已有許久未曾見過他。海蘭德記得上一次見到如今名聲顯赫的阿爾伯特·蘭開斯特，還是在日本入侵之前——他被查爾斯帶進皇座之廳覲見，在那裡被授予指揮並領導入侵日本的殊榮。海蘭德還記得他當時走路的樣子。儘管那時的他已是一位敏銳而勇敢的指揮官，他走進查爾斯皇帝的皇座之廳時，卻像一隻踏入獅穴的綿羊，直到那次任命賦予他巨大的威望與地位。自從在日本大獲成功後，他走起路來判若兩人。如今場面何其相似：阿爾伯特·蘭開斯特走向海蘭德，走向海蘭德那近乎臨時拼湊的王座——在更正式的準備就緒之前倉促搭成，卻依然威嚴堂皇、氣派十足，更不用說還有確保他安全的衛兵。阿爾伯特朝他走來，彷彿掌握權力的是他自己，彷彿獅子走進了羊圈。\n\n\"阿爾伯特·蘭開斯特藩侯，據我所知，憑藉你的家族淵源以及你近來在日本的成功，你與不列顛尼亞幾位德高望重的老將軍素有交情——\"海蘭德邊說邊從王座上起身，沿著那搖搖晃晃拼裝起來的台座走下幾級台階。他不願高坐在王座上俯視自己的將軍——一個他正有求於的人。他想與他平視，或者盡可能地接近平視。然而他被打斷了——不是因為阿爾伯特退避，也不是因為他行禮，而是他那自信而刻薄的評論：\"直說吧，維萊訥。你想讓我申請把他們調到歐洲不列顛尼亞來。\"海蘭德注視著他，不是怒視，目光也並不如刀。他只是注視著——這與他那天見到的那個男人實在判若雲泥。那個查爾斯稍稍提高嗓門就可能瑟縮發抖的男人。海蘭德不是查爾斯，也永遠成不了查爾斯。但他被授予了與查爾斯比肩的權柄，一種通常唯有皇笏才能授予的權威。而對方居然還是這種態度。\"鑑於當前的局勢，我認為最好由既有經驗又有榮譽感的人來統領我們的部隊。\"海蘭德解釋道，語氣、聲音與姿態都保持著平穩。他不是那種會屈膝的人，也不會因為麾下這位如今傲氣沖天的將軍稍加頂撞就亂了方寸。\n\n\"那就照辦。還有別的事嗎？\"阿爾伯特問道，臉上的神情頗能說明問題。他看起來像是覬覦著海蘭德的職位——不，不對。他看起來像是自認比這職位更高明。甚至沒等回答，阿爾伯特就自作主張，看海蘭德沉默不語，便轉身走向房門——由兩名持禮儀長矛的衛兵把守的房門。\"不，還沒完。給我記住，蘭開斯特將軍。\"海蘭德說著抬手一揮，門邊兩名衛兵立即交叉長矛封住了出口，阻止這位將軍離開——尤其是在他還沒有回身直面海蘭德目光的情況下。即便如此，阿爾伯特也沒有完全轉過身來，只是把頭探了回來——迎接他的，是獅子的凝視，和一位強硬統治者的宣告。"
 EUR_schneizel_phase_one_military.1.a:0 "\"給我……注意你的語氣。\""
 EUR_schneizel_phase_one_military.2.t:0 "「公爵會見騎士」"
 EUR_schneizel_phase_one_military.2.d:0 "他揮了揮手——這個即使站在海蘭德身邊也依然魁梧如巨人的男人，做的第一件事就是揮手。海蘭德帶著隨行人員走近，兩側簇擁著眾多不列顛尼亞衛兵，身旁兩名主要持著禮儀長矛。而在他身後還有一支小分隊，配備著真正的武器——他的精銳衛隊，那些會真正保護他、為他而死的人。\"海蘭德！\"曼弗雷迪低沉的嗓音吼道，那如雷貫耳的聲音讓他在自己的隨行隊伍中無所遁形。他們剛在馬加丹港下船。海蘭德走上前，站定在他面前幾步遠的地方望著他，心想還是先把禮數走完。\"第二席騎士米凱勒·曼弗雷迪，我深感榮——\"然而，他沒能用自己的聲音說完這句話。曼弗雷迪大跨三步，單臂把海蘭德一把拉進熊抱，海蘭德只能拍拍曼弗雷迪的後背作為回應，後者又衝他吼了一嗓子：\"啊！少來那套虛的，能再見到你真好，我的朋友。\"能再次親眼見到海蘭德，他看起來由衷地高興。曼弗雷迪先前試圖從不列顛尼亞本土遙控指揮歐洲不列顛尼亞軍，靠電話和便箋處理事務，既困難又惱人，還孤獨。曼弗雷迪鬆開懷抱，兩人順勢轉為海蘭德更習慣的一記有力握手——即便只是簡單的握手，曼弗雷迪的力道也大得驚人。\n\n\"見到你我也很高興。你清楚自己在這裡的任務吧？\"海蘭德說。儘管他也為見到朋友而高興，但他明白他們還有一個國家要守護、一場戰爭要打贏、一堆工作要做。一切都是為了查爾斯皇帝。曼弗雷迪看著他，臉上始終掛著大大的笑容，此刻撓了撓後腦勺笑得更開了。\"當然清楚！他們可是翻來覆去地跟我念叨個沒完。\"他說著，似乎有些不耐煩，但也並非真的介意。隨後，兩個男人就那麼站著，站了熱乎乎的——或者說冷冰冰的——一分鐘，俄羅斯刺骨的寒冬啃噬著他們。他們四目相對地站著，一言不發。海蘭德期待地望著他，曼弗雷迪卻什麼也不說。於是海蘭德清了清嗓子，再次開口打破這凝滯的冷空氣。\n\n\"那麼你知道——\"話音未落又被曼弗雷迪打斷。他顯然不想再聽一遍相同的命令，尤其是從朋友嘴裡。看他眼中閃過的光和越咧越開的笑容，剛才那一下分明是故意引他上鉤。\"知道！建立一個騎士組織，讓他們承載歐洲不列顛尼亞的火焰與榮譽，並將其發揚光大。\"雖然他接到的命令肯定比這具體得多，理由也充分得多，但海蘭德不得不承認，這就是曼弗雷迪理解命令的方式，也是他執行命令的方式。這麼一想，他說得分毫不差。所以，海蘭德沒有糾正他，只是說道："
 EUR_schneizel_phase_one_military.2.a:0 "\"是啊，大致就是這樣。\""
 EUR_schneizel_phase_one_military.3.t:0 "「最大的垃圾堆」"
 EUR_schneizel_phase_one_military.3.d:0 "機庫大門緩緩滑開，站在門檻前等待它完全開啟的四名飛行員激動不已。這就是他們一直期盼的東西，也是他們自願申請調來歐洲不列顛尼亞——這個眼下堪稱冰封地獄的地方——的主要原因之一。他們終於盼到了能重新獲得一絲功勞、應有的尊重，以及一份勉強像樣的預算的機會。趁著中士望向別處，四人屏住了呼吸。當大門終於停下，他們得以看見裡面那些即將有幸駕駛的新飛機時，只有一句話可說。\n\n\"這些飛機是垃圾！\"飛行員菈拉發出一聲尖利的怪叫，第一個衝進去檢查這座鏽跡斑斑的破舊機庫裡停放的眾多飛機之一。另外三名飛行員也緊隨其後。這些飛機看上去……老朽、過時、陳舊不堪，比歐洲不列顛尼亞最差勁的飛機還差了十萬八千里——而他們原有的飛機還沒能享受到運過來飛的待遇。\"該死，我還真指望調來歐洲不列顛尼亞能有個好點的預算。這裡是優先戰線，他們卻還是只給我們——殘羹剩飯？\"奧蘇納一邊評論，一邊伸手撫過一架飛機的側面，隨即迅速縮回手，看著沾滿灰塵的手掌，飛快地往一位同僚背上抹去——那位高個子的奧廷根似乎沒有察覺。或者就算察覺了也毫不在意，他推了推眼鏡端詳著這些飛機。先是離他們最近的那架，也就是奧蘇納剛留下一枚嶄新掌印的那架，然後又望向遠處的其他飛機，用一口帶著濃重法國口音的嗓音得出了一個簡單的結論。\n\n\"預算現在全都流向Knightmare Frame了，而且流走的還不只是預算……\"他若有所思地說，顯然在幻想一些要是被中士看見準會惹麻煩的東西。而他們的中士此刻仍站在門邊，伸手往口袋裡掏酒壺。是為了驅散頭痛，還是為了抵禦嚴寒？飛行員們似乎都不太在乎是哪一個，因為兩者他們都感同身受。\"是啊是啊，威望啊，榮譽啊。如今全攥在那些駕駛員手裡了。\"哈考特在機庫另一頭喊道——他方才一路跑到機庫盡頭又跑了回來，想看看能否在這堆垃圾山裡翻出一架金礦般的戰機。他的聲音透著苦澀，彷彿重新考慮職業道路已成了家常便飯。當他們的中士布盧瓦發現酒壺裡的酒已經見底時，他終於邁步走了進來，衝著所有人厲聲喝道："
 EUR_schneizel_phase_one_military.3.a:0 "\"你們全都給我閉嘴！\""
 EUR_schneizel_phase_one.2.t:0 "「毒蛇之籠」"
 EUR_schneizel_phase_one.2.d:0 "「「啊，這個時候有訪客？」她的聲音冰冷無比，沒有絲毫關心的意思。伴隨著她那一頭黯淡、如鬼魅般金黃的頭髮隨著頭部轉動，伊莎貝拉·沙里亞克只是暫時從桌上的文件抬起頭看了一眼。她很快又低下頭繼續塗寫。「受人尊敬的海蘭德勳爵。真是有趣。你想要什麼？」她翻動著文件，傍晚橙色的餘暉透過一扇裝有鐵窗櫺的窗戶灑了進來。\n海蘭德對她瞇起了雙眼。即便只用餘光，他也能明白這間房間的情況。舒適的家具、華麗的裝飾、絲綢窗簾……這是唯一適合她這種關係的貴婦人的囚室。「伊莎貝拉·沙里亞克，我來呈上皇帝親筆寫下的赦免令。」他平靜地說道。面對她這種性格的女人，沒有必要拐彎抹角。\n\n伊莎貝拉從書桌旁站了起來，拿起一頂高禮帽。戴著她標誌性的頭飾，她朝海蘭德走去，高跟鞋在木地板上發出清脆的聲響。她在他的面前停下腳步，雙臂交叉，海蘭德俯視著這位年輕的女子。「那麼告訴我，我需要為你做些什麼？」她的聲音毫無客套，給了海蘭德同樣生硬的回答，就像他對她一樣。儘管她的語氣隨意，但臉上的表情卻與她的聲音截然相反。她的嘴角帶著一絲玩味的微笑，眼神中閃爍著好奇的光芒。任何見過伊莎貝拉的人都會說同樣的話：她的臉簡直就像一條毒蛇。\n為了延續他們簡明直接的談話模式，海蘭德用實話實說的方式回答道：「妳要來歐洲不列顛尼亞，在我的手下工作。我需要妳的專業知識。」海蘭德保持著嚴厲的目光，權威不容置疑。\n\n伊莎貝拉保持著惡毒的微笑，她的雙眼向海蘭德注入了一股令人不安的毒素。在海蘭德無法也不想理解的腦袋裡思考了一會兒後，伊莎貝拉走到這間豪華囚室角落的壁爐旁。「好吧，」她說道，隨後是一陣沉默。「那我會有我自己的實驗室工作嗎？」她只是微微偏過頭，用餘光瞥著海蘭德。\n雖然她是以提問的方式提出，但海蘭德覺得這並不完全是一個請求。「妳會得到妳所需要的資源，」他回答道。他沒有再說什麼，打開門離開了她。他沒有更多話想對她說。畢竟，她是那種會謀殺自己親生丈夫的女人。」"
 EUR_schneizel_phase_one.2.a:0 "「招惹毒蛇絕無好處。」"
 EUR_schneizel_phase_one_economy.1.t:0 "「施奈澤爾的棋盤」"
 EUR_schneizel_phase_one_economy.1.d:0 "他就在那裡——那位金髮的皇子，第二皇子，現任不列顛尼亞首相。施奈澤·艾勒·不列顛尼亞，他的皇帝的親生骨肉。雖然他並非親身在場，卻出現在海蘭德注視的螢幕上。海蘭德坐在他那把不舒服的王座上——倉促拼湊、安放在一間本不該擺王座的房間裡。正如施奈澤出現在他面前的方式：一塊被推進房間的大螢幕，僅僅是為了讓他們的對話顯得更自然一些。施奈澤身上有種說不出的東西——他的儀態，或是他的微笑——讓海蘭德的後頸一陣發麻。\"海蘭德卿，我們上次交談已是許久之前，我——\"施奈澤開口了。海蘭德確信這副嗓音能令少女傾倒、使萬民安心。但海蘭德聽出來的，是施奈澤試圖用親暱熟稔的口吻與他說話。他們確實相熟，是的，但海蘭德與查爾斯的許多子女都相熟。無論施奈澤是否意識到，他的言辭正在削弱海蘭德的地位。若在場的只有自己的衛兵和幾位親近之人，海蘭德還能一笑置之。但施奈澤自己的使節團也在這間屋子裡，那就不行。\n\n\"施奈澤首相，我的頭銜是維萊訥大公。還請您使用它。\"這番話對海蘭德來說近乎陌生——為自己要求正確使用一個頭銜，一個他自認尚未掙得的頭銜。但他明白自己必須這麼做。他需要施奈澤視他為對等之人，否則施奈澤會繼續用對待棋盤上棋子的口吻同他講話。\"抱歉，我尚不知曉您的新頭銜。那麼言歸正傳，您明白我們召開這次會議的緣由吧？\"施奈澤輕描淡寫地帶了過去，正如海蘭德所料，哪怕海蘭德正瞇起眼睛盯著他。海蘭德點了點頭。那一刻他多想站起身來，不想在這王座上迎接這一切。但他忍住了——他必須坐在皇帝為他確立的位置上，把這場會議進行到底。\"您想要對歐洲不列顛尼亞及其人民的全權處置。\"海蘭德答道，雙手在身前交握，十指相扣，注視著施奈澤。而施奈澤正面迎上了這句話，向海蘭德拋出了他的某種信念，或者說哲學。\n\n\"歐洲不列顛尼亞的人民想要什麼？挨餓？還是吃飽？\"這會是一場漫長的會議，海蘭德想。也許他對施奈澤太過嚴苛了。但他控制不住——那雙眼睛的神情，那副微笑的模樣，在海蘭德看來實在刺眼。像一個精心編織的謊言。於是，海蘭德繼續用同樣的方式說話，回應道："
 EUR_schneizel_phase_one_economy.1.a:0 "\"您想說什麼？\""
 EUR_schneizel_phase_one_economy.2.t:0 "「海蘭的危機」"
 EUR_schneizel_phase_one_economy.2.d:0 "與施奈澤的會議早已結束。儘管他的手下與棋子仍徘徊在歐洲不列顛尼亞，徘徊在海蘭德身邊，施奈澤本人已不再是變數。然而，海蘭德卻無法停止回想那場會議，回想施奈澤提出的種種建議——或者更確切地說，他的命令。也許他是瘋了。也許對皇帝如此忠誠不貳的侍奉，已讓他對一切不合既定模子的人疑神疑鬼。但施奈澤，那個人一定有什麼問題。海蘭德知道他是西洋棋的天才與大師，而他現在或許在想：施奈澤是否把整個世界都看作一張棋盤，或者說，把世人都當作他的棋子。一場棋局——對手又是誰？\"如果我們只是要照搬各殖民區的政策，那把這地方叫做歐洲不列顛尼亞還有什麼意義？\"海蘭德抬手扶住額頭。辦公室的門緊閉著，他明確吩咐過助理不得進入、不得放任何人進來，讓海蘭德一個人靜一靜，獨自面對他的思緒與言語。他身後的百葉窗也已放下。儘管外面是白天，光線卻被擋在窗外。海蘭德的腳開始心不在焉地打著拍子，陷入沉思。\n\n\"我固然遵從皇帝的命令，可是……這實在是。\"這是一場危機嗎？信仰的危機？道德的危機？海蘭德不知道該如何理解自己的想法。他唯一明白的是，他不能把自己的使命貶低為又一場對殖民區的征服。他想要完成皇帝的大業，收復如此多不列顛尼亞人的故土——某種程度上也是收復他自己的故土。然而，把歐洲不列顛尼亞貶為一個殖民區並不能實現這一點；那些手段即便有效，也配不上這個國家。\"我們欺騙了這個國家，奪走了他們的自由、他們的身份。\"他承認了。他其實一直都心知肚明。儘管當初正是他向皇帝建議發出提議，但那本該是誠實的，本該只是單純的支援——然而它變成了一場詭計，一個謊言。一個他從未想說的謊言，他甚至不知道皇帝是否有意讓它被說出。海蘭德與他的皇帝如此親近，可如今他腦中只有一個念頭在盤旋：皇帝對謊言持何種看法？他也許永遠不會知道，因為查爾斯也許永遠不會向他透露。哪怕他侍奉了這麼多年，友誼延續了這麼多年。還是說，那從頭到尾只是侍奉？那一瞬間，海蘭德幾近崩潰，聲音顫抖，那是一個除他之外無人知曉的聲音，一個他只留給自己最黑暗念頭的聲音。\n\n\"而現在，同樣的事又要重演……我最終會落得謝爾蓋的下場嗎？\"死——那就是謝爾蓋的下場。一個死人。那也會是海蘭德最終的命運嗎？被利用，然後在失去利用價值時被殺掉。突然，海蘭德的鋼鐵意志把他猛地拉了回來。他彷彿用盡全身力氣才止住那條上下抖動的腿。他必須把自己的心鍛造成鐵籠。他不會就這樣垮掉，不會為了施奈澤的命令垮掉。就算歐洲不列顛尼亞淪為一個名義之外的殖民區，他也必須撐住自己。他大聲吼出了此刻最後的念頭，而不只是在腦海裡："
 EUR_schneizel_phase_one_economy.2.a:0 "\"振作點，海蘭德！\""
 EUR_schneizel_phase_one_economy.3.t:0 "「土地的吶喊」"
 EUR_schneizel_phase_one_economy.3.d:0 "他差點就來不及了。他拼盡全力奔跑，用盡所有力氣追趕。凜冬的寒意刺入骨髓，他仍在奔跑。連年齡都在與他作對，他仍在奔跑。他能聽見遠處的聲音——又一艘不列顛尼亞船隻的雷鳴般轟響，又一艘滿載著從他祖國掠奪的物資的船，正轟然啟動，要把這些資源運往遙遠的彼方。在那裡，它們將供養一台外國的戰爭機器，而不是養活人民。男人不停地跑，他的毛帽在差點撞上一位看似不列顛尼亞貴族的人時掉落了。貴族衝他叫罵，但他既沒時間回頭去撿帽子，也沒像往常那樣回嘴。跑著跑著，他終於看見了目標——那艘不列顛尼亞船。一艘巨輪，鄂霍次克港這一片區最後停泊的船隻之一。他阻止不了所有的船，但也許能攔下這一艘。\n\n碼頭沿線佈置了幾名不列顛尼亞衛兵，幾乎排成一道人牆，防止有人闖入。但這些衛兵並非全副武裝，沒有穿典型的不列顛尼亞全身裝備，而是裹得嚴嚴實實，衣服套著衣服，有些還披著印有不列顛尼亞徽記的毛皮保暖。奔跑的男人雖能看清他們的臉，卻根本不在乎他們是誰。\"停下！立刻讓這艘船停下！\"男人嘶喊著，俄國口音濃重，話語卻清晰有力，穿透一切——正如他直接撞穿了不列顛尼亞人的封鎖線。就在他們試圖攔截時，他從人縫中擠了過去，成功突破。他聽見許多槍械上膛的聲響，但他不在乎。他狂奔著衝向一條通往船上的舷梯，以驚人的速度一口氣爬了上去。他直奔頂層，衝向離船長室最近的一扇門。與此同時，他聽見了沉重的腳步聲如雷逼近，還有一聲不列顛尼亞人的呼喝。\n\n\"什麼——你在幹什麼，快下來！\"俄國男人不聽，也不回應。他只是找到了那扇門，立刻試圖把它打開。他試了又試，拉、推、擰、轉，但無論怎麼做，門都紋絲不動。\"你們怎麼能這樣！你們闖進來，把我們的生計連根奪走！\"他喊著，絕望地期盼門另一側有人能聽見他，也許還會聽進去，也許會為他改變些什麼。他永遠不會知道了——他聽見了衛兵的呼喝。\"拿下他！\"一人下令。男人的拳頭重重砸在門上，砸在金屬上又刺又痛，但他仍在砸。直到他再也砸不動了，直到他感到一隻手粗暴地抓住他的肩膀。他絕望地跪倒在地，仍捶打著那扇門，感到更多的手抓住他、拖拽他、制住他。他只是哭喊著。"
 EUR_schneizel_phase_one_economy.3.a:0 "\"全都見鬼去吧！\""
 EUR_schneizel_phase_one_economy.4.t:0 "「貴族的投資」"
 EUR_schneizel_phase_one_economy.4.d:0 "當那人走進來時，海蘭德幾乎要對他露出一絲柔和的微笑。但他不能——當他意識到還有其他目光注視著自己時，便不能。他知道自己必須保持沉穩：沉穩、自信、平靜，一位名副其實的統治者。但即便如此，他對奧爾良伯爵應他之邀遠道而來歐洲不列顛尼亞，仍是感激萬分——以至於當伯爵步入殿內、向坐在王座上的海蘭德輕輕一躬時，海蘭德索性起身迎了上去。坐在那王座上始終讓他渾身不自在，所以機會一來他便離開了它，走下台座，語氣平和地簡單說道：\"奧爾良伯爵，感謝你千里迢迢趕來。我知道本土眼下正是多事之秋。\"伯爵直起身時，海蘭德已伸出了手。兩人的手緊緊相握，那是一記彼此尊重與信任的握手。伯爵雖沒有從海蘭德那裡得到微笑，卻透過那把金色的鬍鬚回了他一個淺淺的笑，他的頭髮向後梳攏。他用自己的聲音說道：\n\n\"那些就不必掛心了，能來拜訪、親眼看看你的成就，我很高興，我的朋友。不過……你主要是想談正事吧。\"他的話語起初或許帶著幾分興奮，眼中或許閃著光——想在鄂霍次克四處走走，看看這座城市正被改造成配得上歐洲不列顛尼亞的都會的種種變化；或許他甚至只是好奇Knightmare Frame的駕駛員們在這片新的冰封地獄裡表現如何。但他言語間也透露出，眼下沒有太多時間顧及這些。而這一點，海蘭德自己也再清楚不過。\"你知道我在帝國貴族中的處境算不上好。我希望你或許能……為歐洲不列顛尼亞向他們敞開大門，讓其中一些人來投資。眼下我們缺乏帝國那樣自我維持的實力。\"在海蘭德自己聽來，這番話說得笨拙，甚至近乎乞求。但在其他所有人耳中，這是維萊訥大公自信的聲音，與他們對他的期待分毫不差。海蘭德說出口的也正是這樣的語氣，哪怕內心並無把握。\n\n奧爾良伯爵聽著他的話連連點頭，深表理解。他自己就很清楚海蘭德的特殊處境——與皇帝如此親近使他成為眾人嫉妒的靶子，而且，他還是個不符合傳統貴族模子的人。不過話說回來，奧爾良自己又何嘗不是。\"啊，我明白了。那麼，好消息是——\"奧爾良用半開玩笑的口吻宣佈道，簡直像個爛笑話的開場白。但即便是笑話，海蘭德也捧了場，開口相問，外表依然沉穩。他或許暗自希望這會是個有趣的笑話——在一年中的這個時節聽上一個，也許會非常舒心。\"什麼好消息？\"他問。奧爾良笑得更開了。但那不是詼諧或狡黠的笑，而是一個坦蕩真誠的笑容。他說："
 EUR_schneizel_phase_one_economy.4.a:0 "\"已經有人投資你了。\""
 EUR_schneizel_phase_one_economy.5.t:0 "「鄂霍次克貿易樞紐」"
 EUR_schneizel_phase_one_economy.5.d:0 "海蘭德正在審閱一些文件，他戴著眼鏡，只為讀清面前的幾頁紙。信函，以及來自世界三大強權的官方文書，全都攤在他的桌上。他拿起E.U.的那份湊近細看，尋找任何隱藏的深意——條款，或是他們可能設下的陷阱。確認沒有之後，他又用另一隻手拿起不列顛尼亞的那份確認函，兩手各執一份來回翻看比對。\"維萊訥大公？您在看什麼呢？\"助理羞怯而細小的聲音插了進來。她走近時，海蘭德正埋首檢視文件，甚至沒注意到她進門。他放下文件，她已站在面前。他猜她是在找些事做——替他遞送文件，或是幫他取些東西。他本可以擁有一整隊僕從，或從不列顛尼亞帶來自己的人，但他樂於讓一位俄羅斯人輔佐自己，樂於觀察她對自己種種舉措的反應。然而，不列顛尼亞永遠必須居於首位——他希望她明白這一點。\n\n\"是信函。E.U.與中華聯邦的代表表達了他們的興趣，希望歐洲不列顛尼亞成為一個中立的商業樞紐。\"他輕聲回答她。這時他才意識到，她一直不在知情圈內。在所有知情者的建議下，這項議程始終被壓低聲量、秘而不宣。但觀察她的反應，他看得出她此刻知曉此事並無大礙——她沒有流露任何惡意或不軌之心，只有一絲輕微的錯愕，而她很快掩飾了過去，開始回想此前發生的種種。她輕聲問他：\"您真的認為這是明智之舉嗎……我是說，您有沒有先請示過施——施奈澤——\"她說到第二皇子的名字時結巴了。他不能怪她，畢竟這個名字對她來說本就陌生拗口。但他也把這視作一個機會，去糾正、或者說洗去她對不列顛尼亞現行體制可能懷有的某些觀念——同時把自己的想法置身事外，或者說努力這麼做，哪怕它們仍不時滲入。\n\n\"施奈澤首相是皇帝嗎？\"他問她，語氣同樣輕柔。不是想斥責或嚇唬她，只是想讓她明白。因為她過去所理解的，是俄羅斯總統乃需要顧忌的最高權力之一，而總統一職與首相相仿——至少在澳大利亞，兩者基本就是同一個職位。她現在必須明白，在不列顛尼亞並非如此。\"不是……\"她依然怯生生的，甚至後退了一步。海蘭德攔不住她，只能抬手摘下眼鏡，希望自己那雙不再被鏡片遮擋的灰色眼睛能給她一些寬慰。對她，他只是重申了自己的忠誠與立場。"
 EUR_schneizel_phase_one_economy.5.a:0 "\"我只侍奉皇帝一人。\""
 EUR_schneizel_phase_one_economy.6.t:0 "「帝國公告」"
 EUR_schneizel_phase_one_economy.6.d:0 "Highland was growing restless, constantly adjusting in his throne. Uncomfortable to sit in it, he was much more familiar with kneeling or standing before it. That sitting in it, well, it wasn't uncomfortable because it was hastily thrown into a room unprepared or meant for it. It was uncomfortable because Highland was placed down in it, feeling unprepared or meant for it. He thought that perhaps he never would, it did not help that he had large blaring studio lights down on him. Two ceremonial guards flanked his throne and the plinth it stood on, in a good shot of the frame. To convey strength alongside Highland, the camera was adjusted, zoomed in and out. He couldn't see the person behind it, completely covered by it, just focusing on the glass within it. That reflected his own person back at him. A person in a throne, one he couldn't recognise. Not until, it shifted to Charles. That was how he could do this, do this in front of the camera. He had to channel his Emperor. When the camera clicked on, the script ran through Highland's mind. Though it was his mouth that was speaking, the tone came across like Charles' or attempted to, it still had within it a tone of Highland's person.\n\n\"To all imperial subjects of Euro-Britannia! Britannians and Honorary Britannians alike!\" He announced, his hands gripping the arm rests of the throne hard, the gold felt like it would break under his grip, under his tension. All the while he tried to let it go, just let himself focus and relax, but he could not. He could not relax in the throne, he felt like this was right. That a ruler should never be relaxed in his throne. \"It is with great honor that I make this announcement to you.\" Highland watched as someone from the side of the camera was fiddling, fiddling in a pile of apparently cue cards. As if they were prepared for him to make a mistake, for them to catch him just in case. However, he would not need them too. He had the strength to have this on his own, as he continued. This time, he added a flair, he took his right hand off the throne, and threw it out in front, uncurling his fingers.\n\n\"When we offered our hand to the old Russian Far-East, it was in squalor. It was wretched, barely able to stand on its own two feet.\" He rotated his hand until it became an open hand, an offer, a sign of giving. Or a sign of needing, of wanting. Either way, it reflected the words ringing in Highland's head. \"With help from Britannia, we have been able to rectify this. Now Euro-Britannia is able to stand on its own two feet! And look towards the future.\" He then crushed this open hand, he turned it into a fist, a fist in the air that he held, and as he continued to speak, he rose from his throne, standing tall. While he was dressed in his usual garb, they took on another look while he stood there, the camera tilted up to capture his presence and just looking at him now. All the while the lights beamed on him, casting him in an ethereal glow. He then rose his fist high above his head and yelled proudly."
 EUR_schneizel_phase_one_economy.6.a:0 "\"不列顛尼亞萬歲！\""
