 RUS_region_management_category_desc:0 "總統，我們偉大的俄羅斯虛弱、蒼老、衰朽。它被時代甩在身後，在無能或腐敗的領導人手中輾轉流離——但現在，變革的時候到了。\n\n您有能力實現這一變革，而有兩個關鍵要點務必請您知悉：其一是民眾對現狀日益高漲的不滿，其二是祖國各地的發展水準。俄羅斯的許多地區已被時代拋棄，導致其§R發展水準§!低下。這些地區的異見正在滋長，引發§R社會不滿§!的上升。用投資與開發來推進這些地區看似上策，但這些舉措可能被其他地區視為冷落，反而使它們心生不滿。\n\n鑑於祖國幅員遼闊、各地文化與信仰紛繁各異，我們已將全國劃分為四個地區，以便您更好地治理。這四個地區包括：眾多公民安居樂業、發展完善的§Y西俄羅斯§!；工業腹地§Y烏拉爾工業帶§!；共產主義同情者仍在其廣袤荒野中湧動的§Y西伯利亞§!；以及我國疆土的最遠端，§Y遠東§!。\n\n如何治理這些地區——是決意振興它們，還是任由其他地區燃起叛亂的烈火——皆繫於您一人之手，扎哈羅夫總統。"
