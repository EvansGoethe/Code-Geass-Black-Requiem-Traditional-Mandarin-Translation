 RUS_phase_one.28.a:0 "CUT"
 RUS_phase_one.29.t:0 "政府安全調查辦公室"
 RUS_phase_one.29.d:0 "\"我想，室長，你知道我為何而來。\"扎哈羅夫望著葉夫根尼·基洛夫說道。他剛走進這個房間時，一度以為自己走錯了地方。房間狹小侷促，他感覺目光所及的每個角落都佈滿蛛網與蜘蛛。而這個人本身也與他想像中的模樣相去甚遠——基洛夫看上去就是個平平無奇的普通官僚。但這反倒進一步向他證明：CSRO有多需要擴編，才能配得上俄羅斯。\n\n\"是的，扎哈羅夫總統。我隱約猜到了。\"這個人的嗓音單調沉悶，讓扎哈羅夫想起自己兒時的一位老師——說真的，他的整個相貌都像。禿頂，兩隻眼睛都微微泛白，乍一看他甚至以為右眼完全沒了，裝的是義眼。扎哈羅夫定了定神，在室長辦公桌旁那把搖搖晃晃的小椅子上坐下。\"那我就直說了。我希望擴編CSRO，把它建成一個像樣的機構。\"基洛夫沒有露出扎哈羅夫預期的驚訝，反而徑自轉身，走向辦公室角落的一個檔案櫃。扎哈羅夫吃了一驚，擔心基洛夫沒聽見他的話。對方拉開抽屜，開始翻找。\n\n\"有什麼問題嗎？\"扎哈羅夫現在真不知道該怎麼看這個人了。基洛夫很快回來了，手裡捧著一份塞得鼓鼓囊囊的巨大檔案，又舊又積灰，顯然已有不知多少年頭無人碰過。扎哈羅夫挑起眉毛，看著他把檔案捧回桌前，放到自己面前。\"給，這是我關於CSRO擴編提案的全部文件。\"扎哈羅夫難得地輕笑出聲。他翻開檔案一頁頁看下去——室長沒有說錯。裡面是詳盡的清單與條目：每一分錢的去向、每一名員工的招募，全都記錄在案。顯然，這位室長知道的遠比表面上多，期待的也遠比表面上多。"
 RUS_phase_one.29.a:0 "\"漂亮。我接受你的提案。\""
