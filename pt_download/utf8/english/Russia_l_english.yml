 POLITICS_ZAKHAROV_DESC:0 "弗拉季斯拉夫·扎哈羅夫出生於沙皇時代俄羅斯一個貧困偏遠的農村地區。俄國革命期間，他成爲入侵俄羅斯的歐洲軍隊的重要合作者，但這僅僅是他漫長政治生涯的開端。第一次世界大戰後，共和國成立，他加入俄羅斯公務員隊伍，一步步攀升政治階梯。然而，他總覺得哪裏不對勁；隨着他地位的提升，他越發察覺到俄羅斯政府根深蒂固的腐敗，這種腐敗已經嚴重影響了公民社會和民衆的生活。最終，經過一系列合法與非法的運作，他於2008年當選俄羅斯總統，並誓言要根除困擾國家的種種弊病，使俄羅斯能夠與他所敬仰的其他歐洲強國平起平坐。如今，一年過去了，人們不禁要問：他能否解決俄羅斯面臨的社會動盪和經濟困境？還是命運另有安排？"
