 RUS.12.d:0 ""
 RUS.12.a:0 "先生們，是時候執行布蘭切特的計劃了"
 russiaCW.0.t:0 "一個時代的終結"
 russiaCW.0.d:0 "阿列克謝站在熙攘人群的邊緣，心因期待而狂跳。他到得很早，急切地想聽參議員們演講，也想見見幾位不像他那樣獲准休假離營的朋友。作為一名短期休假的軍官，看到朋友們仍穿著軍裝，他心中交織著慶幸與愧疚——當然，他可沒什麼好抱怨的。\n\n他在這座港口小鎮長大，海軍基地一直是他生活肌理的一部分。小時候，他會沿著棧橋奔跑，追逐海鷗，幻想那些船艦見證過的冒險。如今，作為NRM的一員，基地成了某種更深遠的象徵——它是他與無數人為之奮鬥的變革的心臟。\n\n人們來自各行各業——臉上沾滿粉塵的礦工、眉頭緊鎖的企業主，甚至還有尋求公道的政府職員。把他們凝聚在一起的，是一個共同的信念：現狀已經辜負了他們。而今天，就是他們的聲音被聽見的日子。\n\n擴音器劈啪作響地開啟，電流雜音如利刃般切開喧囂。參議員伊格納托夫洪亮的嗓音充盈了整個空間，在船塢高聳的起重機間迴盪。\"我們偉大國家的公民們，\"他開口了，語調莊重而鏗鏘，\"今天，我們站在十字路口。太久以來，腐敗者與麻木者把持著權柄，把我們引上衰敗與絕望之路。但不要害怕，因為我們就在這裡，要把國家重新引回進步的航道！\"\n\n人群報以雷鳴般的掌聲，參議員繼續演講——就在此時，毫無預警地，他腳下的大地震顫起來，一聲震耳欲聾的轟鳴撕裂長空。一枚巨型炸彈在海軍基地深處引爆，迸出令人膽寒而奪目的閃光，阿列克謝的世界瞬間陷入混沌。爆炸的衝擊把他掀翻在地，周遭的世界崩解成一片火焰、濃煙與碎片的模糊。他耳中嗡鳴，視野在混亂中搖晃。人群的歡呼化作恐怖的尖叫，而原本穩固的士兵警戒線彷彿就那樣……蒸發了。\n\n阿列克謝的頭隨著狂奔的心跳陣陣抽痛，但本能接管了一切。軍事訓練發揮了作用，他強撐著站起身，跌跌撞撞地越過瓦礫。四周的混亂無以復加，但他有一個使命——去救助那些為尋求變革而來的人。他蹣跚著穿過斷壁殘垣，目光在廢墟中搜尋任何生命的跡象。燒焦的橡膠與血肉的氣味令人作嘔，但他仍奮力前行，不去理會自己痛苦的呻吟，也不去理會那些哀悼者的哭聲——逝者的夢想已與他們一同死去。"
 russiaCW.0.a:0 "再多一個……請讓我再拯救多一個……"
 russiaCW.1.t:0 "情況報告：鄂霍次克爆炸"
 russiaCW.1.d:0 "URGENT MILITARY COMMUNICATION TO THE OFFICE OF THE PRESIDENT\nDate/Time: Redacted, 19:07 Local Time\nFrom: Col. Viktor Kozolov, Military Police\nTo: President Vladislav Zakharov\n\nAt 19:07 hours, Senators Fyodor Ignatov (Okhotsk Oblast) and Ayhal Medvedev (Yakutia) arrived at Port Okhotsk to address the escalating civil unrest. Due to the high risk assessed by the security team, both Senators were redirected to Port Okhotsk Naval Base for their protection.\n\nA crowd estimated at several hundred thousand individuals surrounded the naval base and exhibited hostile behavior. Most RSDF guards abandoned their posts, and the small contingent of EU naval infantry withdrew to safeguard the docked Pacific Fleet vessels. Senators Ignatov and Medvedev decided to address the crowds to stabilize the situation which had a significant effect in de-escalate the situation.\n\nAt 19:58 hours, a significant explosion occurred, originating from the ammunition depot located a few hundred meters behind the armory. The blast resulted in extensive destruction to the facility, with the ammunition depot, barracks, and armory being entirely destroyed. Search and Rescue operations are still underway; however, initial estimates place the dead at between 800 and 1000 men, women, and children. Additionally, we can confirm that Senators Ignatov and Medvedev were killed in the blast alongside 15 security officers, 8 RSDF troops, and 5 EU naval personnel. The frigate EUS Aquitaine sustained serious damage but was the only EU ship in port as the Pacific Fleet was engaged in shadowing Britannian Naval Forces.\n\nPreliminary findings indicate the explosion was deliberate, with traces of a makeshift explosive device discovered at ground zero. The specific origin and perpetrator of the device remain unidentified.\n\nThe situation in Okhotsk has deteriorated beyond immediate control. Rioting, gunfire, and lynching have been confirmed at the city center and I can confirm that several patrols have joined the mob. I have ordered all available forces to withdraw behind the garrison walls and I have requested reinforcements from the reserve station at Ushki.\n\nCol. Viktor Kozolov, Military Police"
 russiaCW.1.a:0 "祝上校一路順風"
 russiaCW.2.t:0 "情況報告——我們已失去控制"
 russiaCW.2.d:0 "Mr. President,\n\nWe promised the people that we would provide safety to their Senators... we were wrong. We expected the deaths of Senators Fyodor Ignatov and Ayhal Medvedev, alongside all those innocents at the site of the explosion, to illicit some feelings of solidarity or a time of morning... we were wrong there too. Now, three days after the catastrophic loss to our nation, I regret to inform you that we have failed to restore order to our city.\n\nThe situation in Port Okhotsk has deteriorated beyond my worst fears as long-simmering tensions within the National Renewal Movement have finally boiled over. It seems as though the last hope these people had were issuing their grievances with their now departed Senators but with the administrative chain being broken, so too it seems has any remaining loyalty to Moscow.\n\nThe streets are filled with tens of thousands of enraged citizens and an ever-increasing number of defectors, both officers and rank and file alike. This is not mindless destruction; damage to public property is minimal... Instead, the National Renewal Movement, driven by a sense of betrayal and long-standing grievances, is targeting those few who have put up in their eyes the biggest roadblocks for their cause. Known opponents are being dragged from their homes and workplaces before facing beatings, mock trials, and imprisonment.\n\nDesertions within our ranks have reached alarming levels as our RSDF garrison of 5,240 have dwindled to a little over 410... a number I fear will lower with each day. Soldiers born and raised in this region, sharing the beliefs of the rioters, are defecting in droves. Officers and enlisted men alike are abandoning their posts to join the masses for which they are cheered and looked up to.\n\nReinforcements from Ushki arrived a few hours ago. Initially, there was hope that they would help restore order... though that was not to be as the people reacted with nothing short of jubilation. Currently, they have formed a perimeter around City Hall and I can confirm with my own eyes that Colonels Volkov, Vasiliev, and Admiral Drozd have entered the building of their own volition.\n\nI have attempted to reach out to other reserve stations, airbases, and army installations across the region for aid but the responses have been dishearteningly consistent. Either they are reporting similar unrest and defections spreading across the small towns like Mokhsogoliokh and Yukusk... Or in the case of Neryungri... they are not responding at all.\n\nIn light of these events, I regret to inform you that this will be our final communication. Gunfire has just broken out at the perimeter between Loyalist and now traitor forces. The naval base has fallen. I have ordered the destruction of sensitive documents and equipment to prevent them from falling into hostile hands. My remaining loyal officers and I will hold our position to the last.\n\nMay Mother Russia be in safer hands than our own...\n\nCol. Viktor Kozolov. Military Police"
 russiaCW.2.a:0 "我們都做了些什麼……"
 russiaCW.3.t:0 "西伯利亞暴動"
 russiaCW.3.d:0 "緊急軍事通訊——呈總統辦公室\n主旨：機不可失，時不再來\n發文單位：內部發展辦公室\n收文者：弗拉迪斯拉夫·扎哈羅夫總統\n\n總統先生：\n\n鄂霍次克的暴亂現已蔓延至東部，新西伯利亞成為動盪升級的最新震央。工會人士與工人團體趁亂開始協調大規模的罷工行動，並為襲擊政府機構的組織活動提供支援。\n\n西伯利亞軍區司令報告稱，後勤困難、逃兵與資源匱乏已使哈薩克邊境站陷入癱瘓。我們在阿拉木圖的線人警告：儘管雅科夫·布寧已死，邊境對面的共產主義活動仍在抬頭。我們擔心，一旦他們藉動亂之機侵入俄羅斯，我們將無力阻擋。\n\n願俄羅斯安然無恙。\n\n格里高利·布爾加寧\n\n內政部長"
 russiaCW.3.a:0 "警察會處理這件事。你擔心得太多了，格里高利。"
 russiaCW.4.t:0 "沙皇派叛亂！"
 russiaCW.4.d:0 "緊急軍事通訊——呈總統辦公室\n主旨：機不可失，時不再來\n發文單位：內部發展辦公室\n收文者：弗拉迪斯拉夫·扎哈羅夫總統\n\n我以萬分緊急的心情報告：葉卡捷琳堡爆發了新的暴亂。如您所知，遠東與西伯利亞的動亂已使這些地區嚴重失穩。如今葉卡捷琳堡也陷入混亂，我們必須在這些暴亂惡化成更糟的事態之前有所行動……\n\n葉卡捷琳堡暴亂的激烈與暴力程度與其他受災地區如出一轍。地方當局應接不暇，公共安全與秩序面臨的威脅正迅速升級。我們還接到令人不安的報告：極端民族主義民兵正在向暴亂者分發武器。至於民族主義者方面，我們的安全部門始終未能找到米哈伊爾·阿斯塔科夫的下落，但我們懷疑他將利用這場暴亂謀利。\n\n鑑於遠東、西伯利亞、如今又加上烏拉爾的大範圍失序，我強烈建議在受影響地區宣佈戒嚴。\n\n立即部署軍隊對恢復秩序、阻止暴力進一步蔓延至關重要。我理解您對動用軍隊的顧慮，但我們早已過了猶豫的階段。趁我還不必採取我自己的斷然手段之前，把這個爛攤子收拾乾淨……"
 russiaCW.4.a:0 "派軍隊進去，這件事已經升級到無法談判的地步。"
 russiaCW.5.t:0 "派軍隊平息暴動"
 russiaCW.5.d:0 "\"怎麼回事？來人報告！\"扎哈羅夫總統的聲音在他大步掃進指揮室時迴響。滿室的人聲與儀器蜂鳴並未完全沉寂，但確實頓了一頓。將軍與參謀們轉身面向他，神情交織著驚訝與不安。總統的副官——一個額頭冒汗的年輕人——攥著平板衝到他跟前。\n\n\"總統先生，我們與烏拉爾、西伯利亞和遠東軍區的部隊失去了聯繫。\"他報告道，聲音微微發顫。\"信號就那樣……消失了。\"\n\n扎哈羅夫難以置信地瞪大雙眼。\"消失了？這怎麼可能？\"他哽住了，鎮定出現裂痕。室內氣氛驟然緊繃，將軍們不自在地挪動著，面面相覷，隨後又埋回各自的螢幕，裝作忙碌。副官深吸一口氣，繼續道：\"我們不確定，閣下。起初我們以為是技術故障，但靜默已持續超過一個小時了。\"\n\n總統咬緊牙關，消化著這些訊息。他知道出事了——遠比通訊故障更大的事。\"直接聯絡各基地！\"他下令，聲音在室內迴盪。\"那些基地都接著我們的熱線系統對吧？不管出了什麼事，熱線總該通。\"\n\n\"閣下，自最初的報告傳來，我們就一直在嘗試建立直通線路。\"彼得羅夫將軍答道。\"我們向以東的所有主要基地和地方駐軍發了訊息，但沒有任何回應……他們……閣下……\"他結結巴巴，在總統凌厲的注視下漸漸撐不住，\"……我們收到了自動回執，顯示訊息已送達……只是沒有人回覆。\"\n\n總統面色慘白，局勢的分量如重錘般砸向他。如果他的部隊真的叛變了，那可能意味著不敢想像之事。克里姆林宮一向清楚東部諸區是個火藥桶，但他們自認牢牢掌控著自己的軍事力量。如今，那些師團的沉默似乎正印證著克里姆林宮高層最深的恐懼。"
 russiaCW.5.a:0 "最後的多米諾骨牌倒下了……"
 RUS_CW_5_Army_Disband:0 "§Y我們與我們的武裝部隊失去了所有聯繫。做好最壞的準備……§!"
 russiaCW.6.t:0 "遠東之獅"
 russiaCW.6.d:0 "謝爾蓋清了清嗓子，目光掃過房間。他對上的每一張面孔，都刻著同樣的決心、同樣把眾人聚到一起的希望。他知道接下來要從他唇間吐出的話語有多沉重。他們都看過新聞，目睹混亂在祖國遼闊的土地上蔓延。俄羅斯正處在無政府狀態的邊緣，而拯救她是他們的責任。\n\n\"兄弟姐妹們，\"他開口了，聲音有力而平穩。\"我們的國家，曾經是力量與團結的堡壘，如今卻被那些高踞象牙塔之人的貪婪掏空。他們背棄了自己本應服務的人民，向那些對我們的掙扎、我們的夢想、我們的存在本身漠不關心的歐洲霸主們卑躬屈膝。\"他的話語懸在空中，滿載控訴。\"他們已經控制了我們的憲法……難道還要讓他們控制我們的生活嗎？！\"\n\n房間裡爆發出憤怒與贊同交織的躁動。人群騷動起來，空氣中瀰漫著汗水與激情的氣味。他抬手示意安靜，喧囂應聲而落，如幕布垂下。\"我們正站在新時代的懸崖邊上，\"他繼續道，眼中燃著熾烈的決意。\"一個民族復興運動將作為人民真正的聲音崛起的時代。一個我們不再充當那個一次次辜負我們的體制的棋子的時代。\"\n\n\"我們不只是異見者，更不是供國家用完即棄的工具。我們是俄羅斯母親的兒女，我們將攜手成為新未來的建築師！在那個未來，我們的孩子不再被過去的債務束縛，我們的資源由我們自己開發，而不是充作賄賂外國利益的貢品！\n\n我們是巨熊的後裔，是草原的兒女！我們的祖先征服過帝國，屹立於時間的摧折而不倒！我們的靈魂，正是在這片積雪荒原的逆境之火中鍛成的！\"\n\n人群的回應震耳欲聾，一片贊同的咆哮彷彿撼動了房間的根基。他們知道賭上的是什麼，也已準備好為之而戰。他用眼角的餘光看見鮑里斯正退進人群，但沒有在意。\n\n\"此刻正是時候！\"謝爾蓋宣告，聲音層層攀升至力量的頂點。\"我們必須挺身而起，萬眾一心！作為祖國真正的守護者！我們必須甩開舊政府及其背信盟友的枷鎖！我們必須拿起武器，奮勇向前——為了我們的孩子，為了我們的存在本身！\""
 russiaCW.6.a:0 "絕不容許脫離共和國！"
 russiaCW.6.b:0 "For Dignity! For Our Future! For The N.R.M!\n"
 russiaCW.7.t:0 "西伯利亞起義！"
 russiaCW.7.d:0 "作為對歐洲不列顛尼亞叛亂的回應，中西伯利亞的共產主義勢力已從共和國分離出去。他們聲稱遠東的貴族國家是對無產階級的威脅，並已著手組織防衛民兵，控制關鍵政府建築與軍事設施。看來無論如何，他們都要保衛自己。"
 russiaCW.7.a:0 "他們上次沒吸取教訓……"
 russiaCW.7.b:0 "為了人類和革命！"
 russiaCW.8.t:0 "舊日榮光"
 russiaCW.8.d:0 "又一個分裂國家宣告誕生，俄羅斯親王國利用烏拉以西地區及其周邊地區的民族主義情緒割據一方。他們宣布弗謝沃洛德·羅曼諾夫為他們的領袖，儘管他看起來不過是當權者（即軍隊）的傀儡。他們試圖重新統一在大戰期間失去的領土。"
 russiaCW.8.a:0 "過去已死。我們知道接下來會發生什麼……"
 russiaCW.8.b:0 "為了沙皇與祖國！"
 russiaCW.9.t:0 "被朋友和家人背叛"
 russiaCW.9.d:0 "阿爾喬姆·伊凡諾夫中尉跨過厚重的鋼門，走進燈光昏暗的總統指揮中心。裡面的空氣緊繃得幾乎凝固，還沒完全進屋便已撲面而來。地圖與文件在大桌上鋪開，四周圍著國家最高層的官員。桌首站著扎哈羅夫總統，面容憔悴，雙手捧著一杯咖啡慢慢啜著。\n\n\"總統先生，我們必須面對現實：東部的部隊應當視為已經失去。他們的陣地已被攻陷，通訊全面沉寂。我們必須把所有可用的部隊調往高爾基會合，以——\"\n\n\"然後讓我們僅剩的城市不設防？！\"扎哈羅夫總統眉頭緊鎖，目光死死盯著面前的地圖。\"斯維亞托斯拉夫將軍，我欣賞你急於粉碎沙皇派的心情，但看看四周吧……我們僅存的力量四散零落、毫無組織，警察應接不暇，鄰國也因動亂關閉了邊境。\"\n\n\"總統先生，\"阿爾喬姆插話，向前一步。身在葉卡捷琳堡的母親的身影從他腦中閃過。他深吸一口氣穩住自己，才繼續說道：\"第13裝甲旅、第9步兵團和第51空降部隊報告遭受猛烈火力……他們……他們說EU軍隊已越過白俄羅斯邊境發動全面進攻。\"\n\n\"我們面對的是多少個師，中尉？\"總統的聲音輕得幾如耳語。\"初步報告顯示是多個師，並有重炮與空襲支援。\"阿爾喬姆答道。\"我們怎麼辦，閣下？\"\n\n扎哈羅夫走向這個大概二十出頭的年輕人，一隻手按上中尉的肩膀，擠出一個強作寬慰的笑容。\"告訴他們，我們會儘快馳援。但在那之前，他們必須為我們爭取時間。\"\n\n阿爾喬姆敬了個利落的軍禮，轉身跑向通訊室傳達命令……他的耳朵隱約捕捉到身後傳來的一聲低低的啜泣。"
 russiaCW.9.a:0 "共和國萬歲……"
 russiaCW.10.t:0 "我們正在崩潰的城市"
 russiaCW.10.d:0 "\"報告！局勢有了新的進展。\"那個聲音劈啪響起，打斷了扎哈羅夫。倒不是說他正忙著什麼——他此刻只是坐在地堡裡一把吱呀作響的舊椅子上，直勾勾地望著前方的虛無，望著混凝土牆。此情此景，他多麼懷念自己的辦公室啊，連那座時鐘瘋狂的滴答聲都令人懷念。他轉過身，緩緩起立，撣了撣身上的塵土。他沒聽出剛才插進來的聲音是誰，等看清那人的樣子才明白過來。\"又怎麼了……阿爾喬姆中尉呢？\"扎哈羅夫立刻發問。眼前這名士兵看上去太——生澀，太缺乏歷練，太年輕了，不該出現在這裡。這讓他一瞬間害怕最壞的事已經發生——但他知道，最壞的早已發生過了。扎哈羅夫居高臨下，軍官結巴了一下。\n\n\"他正在地鐵隧道裡集結我們殘存的部隊，閣下。\"扎哈羅夫無聲地鬆了口氣。他很高興那個人還活著。哪怕與他素昧平生，他也慶幸又一個同胞沒有走進死路。看到士兵手中攥著的文件，扎哈羅夫點點頭，上前一步伸手去接。士兵連忙把文件送進他等候的、顫抖的手裡。扎哈羅夫已經不知道該如何止住這顫抖了。\"E.U.已宣佈不再承認我們的政府。他們正在肢解我們的體制……以及殘存的一切。他們找到我們，只是時間問題。\"士兵對他說。他想必看見了扎哈羅夫的目光只在文件上匆匆一掠，幾乎沒有細讀，只抓住了隻言片語。扎哈羅夫用力擰緊眉頭，抬手揉了揉鼻梁。\"命令所有人收攏能收攏的一切——人員、裝備，凡是沒釘死在地上的東西，全部集中起來……\"\n\n此刻他能想到的只有這些話。然而，他不知道這有什麼意義。是的，他們或許能從這座地堡裡湊出一些家當。可那又有什麼用？他的最終目標是什麼？他要如何走下去？這些念頭他藏在心底。士兵望著他，領會了命令，立正敬禮，隨即匆匆離去。士兵一走出他這間狹小的新辦公室，扎哈羅夫便嘆了口氣。那不是解脫的嘆息——他甚至不知道那是為了什麼。他只是深吸一口氣，把文件甩了出去，任它們散落一地，然後重新坐回椅子上，喃喃自語。"
 russiaCW.10.a:0 "\"為什麼……到底為什麼？\""
 russiaCW.11.t:0 "崩潰的抵抗運動"
 russiaCW.11.d:0 "\"閣下，有一則對您的公告！\"扎哈羅夫幾乎沒在聽。他轉過頭，讓士兵看清自己：總統眼下掛著濃重的烏青，西裝磨損、骯髒。顯然它沒有被送洗過，他也沒有親自打理過。但扎哈羅夫縱然疲憊，眼睛還是好使的。他看出這又是一個不同的士兵，又一個給他帶來更多消息的人。沒有一條是好消息，沒有一條值得聽。不過這次有一點不同——士兵手裡拿著一張光碟。影像光碟。他有些意外。他早已習慣了拖垮俄羅斯官僚體系的文山會海，幾乎忘了歐洲其他地方的科技早已進步——哪怕這張碟依然落伍得可憐。\n\n他看著士兵，默默揮了揮手，示意他去辦公室角落裡塞著的那台電視。士兵趕忙過去放碟播放，他也調整了姿勢準備觀看。\"歐洲的公民們！\"影像瞬間劈啪作響地亮起，畫面粗糙——其實根本算不上影像，因為畫面上只有歐洲的旗幟：藍底上的飛鳥。說話的聲音，他不認得。也在意料之中。他向後靠進那把搖搖欲墜的椅子。\"我們知道，你們不願再面對一場戰爭，你們盼望兒子和丈夫早日歸家。但是，我們並非在打仗！我們對崩潰中的俄羅斯共和國的介入，只是為了穩定局勢、恢復該地區的秩序。\"那聲音繼續說著。扎哈羅夫幾乎要笑出聲——如果他還有那口氣的話。他找到了形容詞：虛偽，做戲。儘管他的頭腦不確定那究竟是事實，還是只是他自己的感受。\n\n\"我們的部隊對俄羅斯境內有組織的抵抗力量實施了精確打擊，終結了『劍與十字架兄弟會』等恐怖組織，以及其他僭稱俄羅斯的偽共和國。\"扎哈羅夫真的輕笑出聲，多少覺得好笑。他一定是真的開始失常了——他用眼角的餘光瞥見士兵對他的反應露出驚訝的神色。好笑的是，『劍與十字架兄弟會』不過是個新冒出來的小團體，俄羅斯抵抗運動中微不足道的一支——只是其信仰與存在方式最為……有趣。扎哈羅夫繼續聽下去。\"我們正竭盡全力重建俄羅斯政府，並尋找前總統弗拉迪斯拉夫·扎——\"\n\n扎哈羅夫把自己嚇了一跳——他從椅子上彈起，動作快得讓他震驚自己的身體竟還有這份氣力。他關掉了電視。他實在無法忍受聽到接下來的字句。他轉過身，看見士兵一臉錯愕——扎哈羅夫離開椅子的速度快得讓椅子哐當倒地。扎哈羅夫盯著他看了一瞬。他差一點就下達了那道命令——乾脆……放棄的命令。但是，他忍住了。如今他只剩一個選擇。他朝士兵走去，然後徑直繞過他，走向這間狹小辦公室的出口。\"閣下！您要去哪裡？\"士兵幾乎慌了，既困惑又好奇。扎哈羅夫轉向那人，在繼續離開的同時與他四目相對。他說出了唯一能說的話——真話。"
 russiaCW.11.a:0 "\"除了家，還能去哪呢……\""
 russiaCW.12.t:0 "新的開始"
 russiaCW.12.d:0 "\"羅蘭將軍，幸會！我可以認為，您已經大致知道自己為何而來了吧？\"羅蘭起初得左右轉頭，才找到聲音的來處。這一轉身，靴子在泥濘的積雪地面上蹭出聲響——然後他看見了他。派翠克·阿徹，他認得這張臉。那臉上掛著笑，不算傲慢，卻也算不上和善。他攤著雙手，一頭凌亂的黑髮蓋在頭頂，有幾縷遮住了他的藍眼睛。羅蘭默默走向他，伸出手。派翠克握住了。羅蘭握得很緊，簡短地答道：\n\n\"是。\"他的嗓音粗啞，不經意間帶著低吼。派翠克退開一步輕笑，轉過身用不冷不熱的語氣說道，聽起來輕飄飄的，像樹皮一樣乾脆：\"好極了，這邊請。委員會正在等您。\"派翠克朝身後揮了揮手，邁步走開。羅蘭跟上，輕輕扶正將官帽，擋住刺眼的陽光。他的目光始終鎖定派翠克的後背，一秒也不讓它游移到四周的雪原上——那些勉強立著的零星建築、支起的帳篷和臨時倉庫。羅蘭猜想對方會把他領進其中一頂帳篷。\"明白。\"這是他消化完之後吐出的全部。這又惹得派翠克輕笑一聲，抬手撥了撥頭髮。\"趁路上簡單交代一下：您已被選為EIZ的代理總司令。\"這條訊息對羅蘭來說是廢話——他正是為此而來。雖然對獲得這樣的職位有些意外，但他並不排斥。他接下了這份挑戰，也接下了這次擢升——哪怕只是暫時的。\n\n\"我知道。\"羅蘭又吐出一句。他對與派翠克這種人交談興趣缺缺，但仍跟著他走。他向前望去，看見一頂大帳篷立在一圈東倒西歪的帳篷中央，身穿E.U.藍色制服的士兵們四處奔忙。\"寡言少語的人，是吧？那也挺好。這個職位是暫時的，等歐洲選出更合適的領導人為止。在那之前，您將是我們聯合部隊司令部的首長。您得拿主意、做決斷什麼的。有問題嗎？\"這段冗長而多餘的解釋剛好撐到他們走到帳篷口。派翠克掀開帳簾，側身讓羅蘭看向裡面——幾位軍官身著與他相似的制服，胸前掛滿各式勳章。羅蘭看了派翠克一眼，希望這是最後一眼，走進帳篷前說道："
 russiaCW.12.a:0 "“不。”"
