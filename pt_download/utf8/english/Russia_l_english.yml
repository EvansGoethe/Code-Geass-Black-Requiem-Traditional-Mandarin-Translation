 RUS_phase_one.1.t:0 "扎爾科夫的統治"
 RUS_phase_one.1.d:0 "扎哈羅夫一生中出席過無數次總統就職典禮，作為坐在前排為KDPR又一次必然的勝利鼓掌的少數黨內要員之一。而現在，他獨自站在講台上。那些他曾與之周旋的官僚群體，如今望著他的眼神彷彿他遠在世界的另一端。他幾乎無法呼吸，抓著講台的邊緣，努力不在電視攝製組的燈光下瑟縮。死一般的寂靜瀰漫大廳，唯有後方攝影記者們相機的咔嚓聲刺破沉默。這彷彿凝固的時刻，在法院法官將一部憲法放到他面前時重新流動起來。沒有任何思緒或情感，扎哈羅夫右手按上憲法，左手舉向空中。每一個動作都顯得虛幻，彷彿被某種他無法控制的力量推動著。他深吸一口氣，開始宣讀那將把他銘刻進史冊的就職誓詞。隨著一字一句吐出，他想的越來越不是誓詞的含義，而是自己為何站在這裡。\"我在此宣誓，行使俄羅斯聯邦共和國的行政權力……\"『總統——這裡每個人都不惜殺人也要得到的位置。見鬼，有些人為了得到它幾乎肯定已經這麼做過了。而如今我獨自站在這裡，這份我從未想要的權力被塞進我手中，代價卻是失去我永遠無法挽回的……』\"……保護並維護我們共和國的憲法與制度……\"『他們為什麼想要這個？阿列克謝又為什麼想要？為了坐上一片破碎國土的王座？為了在一個仍被昔日戰勝者挾持的無力國家裡，做那個最有權勢的人？』\"……捍衛我們民主的安全與保障……\"『阿列克謝……你為什麼選擇為這個職位而死？有什麼理由能夠正當化拋下娜塔莉亞和葉夫根尼？拋下我？是因為你不信任任何人能接替你嗎？早知道會變成這樣，我當初就該多為你分擔些……』\"……並忠實地服務我們的人民……\"『也許你是唯一真正認真嘗試過的人……為了你，阿列克謝，我會試試。』宣讀完誓詞，扎哈羅夫放下手，觀眾席爆發出禮節性的掌聲。環顧四周，他看到的只是一支馬屁精大軍，正準備在這場意外變局面前調整各自的奪權計劃。扎哈羅夫沒有理會他們——他早就和這種人打過交道。他能被選為副總統，靠的不是相貌或魅力。他是列別傑夫總統的心腹、黨內老將，或許也是阿列克謝唯一信任的人。走出大廳時，扎哈羅夫驚訝地發現自己的思緒已然翻騰起來。他的腦海跳向了俄羅斯——它的經濟、失靈的行政系統、與歐洲之間的經濟困局。數十年停滯累積下的那些廣袤而難以逾越的障礙，如今都輪到他去攀越、去征服了。扎哈羅夫想逃離這份重擔，但他坐上這個位置靠的不是自己的授權，而是列別傑夫的。他已無法回頭。"
 RUS_phase_one.1.a:0 "為了列別傑夫，我必須嘗試不可能的事。"
 RUS_phase_one.2.t:0 "列別捷夫的遺產"
 RUS_phase_one.2.d:0 "致弗拉迪斯拉夫·扎哈羅夫：\n\n我祈禱你永遠不必讀到這封信。我希望你我能一同精神煥發、健康無恙地走進克里姆林宮，共同推進我的第三個任期。然而，我相信你不會沒有注意到，我的健康狀況已岌岌可危許久。雖然我自信還撐得起一個任期，但若不考慮我可能無法就任的情況，那就是不負責任。所以，如果你此刻正在讀我的這些話，那麼可以肯定：我已經死了，國家的重擔落在了你的肩上。\n\n你如此勤勉而富有洞察力。我毫不懷疑你已決心獨自扛起俄羅斯的深重苦難。我終其任期也只能為它止血，遑論治癒我們的祖國。我不會拿總統職位的基本準則和信條向你說教來貶低你——這些東西因人而異，它們會像當年降臨於我一樣自然地降臨於你。取而代之，我要留給你一份實際的遺產——一座軍火庫，願它能助你挺過即將到來的風暴。\n\n黨的中樞會站到你這邊。我從未告訴過你，但一段時間以來，我一直在把你鞏固為我的當然繼承人。因此，建制派的三分之一已經支持你。各路領袖知道要與你會面，也知道你擁有我身後的背書。與他們會面之後，打電話給斯坦尼斯拉夫，向他要那份「特別檔案」。我讓他準備這份東西已有些時日了。用它來說服聯邦委員會變得更合作一些。最後：歐洲。我知道，在我們的憲政與貨幣改革被歐洲一次次斷然否決之後，連你這樣的支持者恐怕也開始失去希望。你上任後他們很可能更加動搖，但不要停止向他們施壓。我已經消磨了他們多年，看得出他們已接近接受我們的改革。德國人站在我們一邊，我們也快爭取到多瑙聯邦了。有了他們，我們終於能以多數票推動改革通過。\n\n希望我的這份遺產能幫助你克服橫亙在你面前的艱鉅任務。我相信你會盡己所能履行職責，所以我只求你一件事：告訴娜塔莉亞，我很抱歉。告訴她，抱歉我是個該死的老傻瓜，一個寧願為這個愚蠢的職位而死、把她孤零零留下的老傻瓜。\n\n謝謝你，弗拉迪斯拉夫。我相信，俄羅斯在你手中會安然無恙。"
 RUS_phase_one.2.a:0 "在一張永遠堅毅的臉上，淚水開始流淌。"
 RUS_phase_one.3.t:0 "切爾尼科夫"
 RUS_phase_one.3.d:0 "當俄羅斯的權力掮客與幕後推手們穿梭於高樓會議與遊艇派對之間，試圖評估列別傑夫總統之死究竟是危機還是機遇時，有兩個人正以更貼近舊俄羅斯的方式進行著他們的謀劃——在鄉間別墅的壁爐前分享一瓶伏特加。內政部長布爾加寧，一個五十歲上下、戴著眼鏡、留著整齊金色短髮的男人，坐在高背皮革扶手椅上，對面是年邁的前總統維克托·切爾尼科夫。布爾加寧部長暗自思忖，切爾尼科夫在KDPR的圈子裡可謂惡名昭彰。這位前總統在其一屆半的任期內，曾於1981年的紅色危機中無情鎮壓DSU。他擴大總統安全權力、將關鍵產業國有化的企圖幾乎撕裂了整個黨，直到1989年全國性的暴力抗議導致他垮台。如今，他扮演著傀儡師的角色，從自我放逐的鄉間遙控著他那所謂的「改革派」，而布爾加寧正是他的門生。兩人談論著不斷變化的局勢，以及它為改革派反擊建制派核心集團提供的獨特機會，直到話題轉到新總統身上。\"我承認，維克托，我對扎哈羅夫了解不多。據我所知，他算是黨內的一個灰色官僚。\"布爾加寧沉吟道。\"扎哈羅夫從來不是我會多加留意的人，\"切爾尼科夫望著房梁說，\"不過我知道，他一直是列別傑夫那條狗的心頭好。\"切爾尼科夫啐出宿敵名字時的刻毒狂熱，讓布爾加寧微微一縮。在布爾加寧的認知裡，切爾尼科夫是個冷靜沉著的政治操盤手，驅動他的是願景，而非自負或虛榮。但切爾尼科夫的垮台主要就是因為列別傑夫倒戈相向，這件事對他而言極為私人。\"無論如何，\"切爾尼科夫把話題拉回正事，\"眼下先保持他對你的好感。我們不能給他任何把你踢出去的理由。要想把列別傑夫的走狗們一勞永逸地趕出KDPR，我們就需要自己人先站穩腳跟。\""
 RUS_phase_one.3.a:0 "這些恩怨仍有待清算。"
 RUS_phase_one.4.t:0 "軍閥"
 RUS_phase_one.4.d:0 "兩百多年前，聖彼得堡作為彼得大帝俄羅斯現代化之夢的一部分而建立，並發展為一座大都會，以比肩歐洲的其他地方。1965年，歐洲聯軍夷平了這座以他們的形象為藍本建造的城市，把它變成共產主義的墳墓，以及對膽敢挑戰歐洲秩序者的警告。50年後，聖彼得堡再次以西方的形象重建，只是不再由黃金與石料鑄就，而是一座玻璃與鋼鐵之城。諷刺的是，它也成了資本主義慣性力量的紀念碑。\n\n仍保留著帝國世紀風格的建築之一，是重建的冬宮。這座本應作為博物館的建築，如今成了聖彼得堡市政府珠光寶氣的巢穴。在它富麗的殿堂裡，寡頭與政府的利益在一場腐敗與貪婪的狂歡中交織。聖彼得堡的年輕新貴們——曾經是1990年代的夢想家與謀劃者——如今已蛻變成他們當年所反抗的那種盤根錯節的財富與權力集團。\n\n這些人中最顯赫的，是馬特維·科諾瓦洛夫：聖彼得堡前市長、現任經濟與發展部長，也是這個財閥祕會的實際領袖。他走在冬宮金碧輝煌的長廊裡，聽取著同僚們的種種關切：\n\"總統願意談嗎？\"\n\"他跟布爾加寧不是一夥的吧？\"\n\"他會繼續推進鐵路私有化嗎？\"\n\"我們能用這事拖住對宇宙通訊公司（KosmosCom）的調查嗎？\"\n\"他最好別動什麼干預市場的念頭……\"\n\n馬特維知道，一位總統候選人的意外身亡與其親信的上位，在他的朋友俱樂部裡引起了不小的騷動。但一夜之間，他就驅散了同僚們的種種雜音，成功把他們的注意力引回遊艇與情婦上。\n\n他知道，誰坐在那個位置上其實無關緊要。畢竟，人類是物質的生物，總能被說服去採取對自己有利的行動。歸根結底……"
 RUS_phase_one.4.a:0 "\"金錢控制權力。\""
 RUS_phase_one.5.t:0 "反對派增長"
 RUS_phase_one.5.d:0 "CSRO report on dissident threats to the Republic, for the Office of the President,\n\nAll-Union Communist Party (VKP): The organisational and ideological descendants of Ivan Katunin's Soviet state, currently sheltering in Kazakhstan where they have resided since their defeat and ousting by the KDPR in 1965. The party helms one of the largest military forces in the Kazakh frontier whose presence is tolerated by the Kazakh government in return for assistance in anti-warlord operations. Though they are a notable military threat, they do not have enough manpower to cross the border defended by the RSDF and Europian units. Reports from our spies in Alma-ata report that Party Chairman Yakov Katunin (who has led his brother's party since its exile) has gotten increasingly ill and is unlikely to live for much longer.\n\nRussian National Front (RNF): This alliance of right-wing parties that failed to pass the election threshold would be of little note if it weren't for their leader, Mikhail Astakov. Astakov won the 1999 Ekaterinburg mayoral election by riding a wave of anti-Europian sentiment following a mass industrial layoff. He has since tried (and failed) to get into national politics, always making headlines but never taking seats as every attempt to unite the far-right has collapsed into infighting. Informers from within his office have reported that he has taken a recent interest in monarchism and locating a Romanov heir. Astakov can easily be countered by our usual electoral measures, but his connections to right-wing paramilitaries justifies full monitoring.\n\nPeople's Liberal Justice Party (NLPS): The NLPS is the largest opposition party in the assembly, controlling 28% of the seats. The party used to be an old liberal party but has gone through numerous mergers and renamings since the late 1960s. Currently, the party sits in the political center, having shifted their platform to appeal to the moderate left since the early 2000s. The current party leader is Grigory Ignateyev, a former lawyer and anti-corruption campaigner who was elected to balance the party's left and right wings. The party has proven impossible to dislodge but is struggling to achieve national popularity or electoral success. The party has known connections to numerous human rights and activist groups that are on our watchlist. We also suspect they've been taking money from the Europian liberal movement.\n\nNational Renewal Movement (NRM): The NRM is a rather schizophrenic movement that has grown due to generalised anti-government sentiment in the Far East. The NRM has numerous followers, regional mayors, indigenous groups, trade unions, businessmen, and activists ranging from far-left to far-right. Currently, the NRM fails to pass the electoral threshold as its support is primarily based in sparsely populated regions, but they have almost entirely pushed the KDPR out of local government in the Far East. If they continue to gain a foothold there, they may make a push for greater autonomy or possibly even independence.\n\nAdvice on handling these groups as well as detailed threat assessments to follow on pages 12-38."
 RUS_phase_one.5.a:0 "\"願俄羅斯在您手中安然無恙。\""
 RUS_phase_one.6.t:0 "聯邦委員會的鉗制"
 RUS_phase_one.6.d:0 "扎哈羅夫看著聯邦委員會裡一項又一項動議被否決，忍不住低聲呻吟。惹惱他的不是結果——地方任命的聯邦委員會的阻撓主義，是他在KDPR數十年來早已習慣的政治現實。讓他作嘔的，是這一切何等明目張膽，以及他們何等樂在其中。每否決一項動議，他都能看見周圍委員們的眼睛閃閃發亮，盤算著在勢在必行的重新表決前能從他身上敲出什麼讓步。地方基建項目的撥款、對他們表親建築公司的國家投資、選舉上的關照，甚至一筆公然的賄賂——每個委員都各有所求，而且他們非常樂意挾持政府，直到如願以償。\n\n會議進入休會，禿鷲們魚貫而出去準備各自的要價。扎哈羅夫向後靠進椅子裡，以他多年歷練出的老練政客姿態開始運轉。二十年的政壇生涯讓他對付這種人的算計易如反掌。但就在他盤算自己能付得起哪些讓步時，一個念頭突然閃過。列別傑夫最後那封信裡的一小段話浮現在腦海——在導師去世後的忙亂與悲痛中，他還沒來得及深究：「斯坦尼斯拉夫的檔案」。\n\n扎哈羅夫認得這個名字，那是列別傑夫在八十年代共事過的一位黨內老掮客。看來，列別傑夫曾讓他蒐集聯邦委員們的黑材料。時鐘敲響下午兩點，那些西裝革履的鼠輩開始魚貫而入。扎哈羅夫急忙轉向助理，說道……"
 RUS_phase_one.6.a:0 "\"打給黨部。找維克托·斯坦尼斯拉夫。告訴他，扎哈羅夫需要列別傑夫的臨別贈禮。\""
 RUS_phase_one.7.t:0 "污點"
 RUS_phase_one.7.d:0 "總統辦公室的時鐘敲響凌晨一點，再次見證扎哈羅夫無盡的長夜。難得這一次，總統沒有在處理文書——他幾個小時前就完成了工作。此刻他獨自坐著，手指有節奏地敲擊桌面，等候一份重要到足以讓列別傑夫在給他的最後一封信中提及的檔案。幾分鐘後，一名副官拉開門，寒暄過後，留下了一大捆裝在灰色封套裡的文件。扎哈羅夫翻轉文件捆，取下夾在上面的一張小字條，上面寫著：\"致弗拉迪斯拉夫·扎哈羅夫——我相信你會善用此物，甚至比列別傑夫用得更好。你的老同僚，維克托·斯坦尼斯拉夫。\"扎哈羅夫把字條輕輕放在桌上，解開文件，打開閱讀燈。接下來的五個小時，扎哈羅夫沉浸在這份堪稱俄羅斯政壇最完整、最詳盡的黑材料檔案之中。每一位聯邦委員的每一樁越軌、腐敗、劣行與失職，都被斯坦尼斯拉夫勤勉地記錄在案，每個案例都附有指向埋藏在黨檔案庫中證據的引注。它不止於委員們——它還深挖了任命他們的州長們的骯髒秘密，確保這份檔案在有人被替換時依然管用。幾乎每個人都難逃干係，只有寥寥數人例外——他們或許真是清白的，但更可能是藏匿證據的個中翹楚。扎哈羅夫一一記下每份檔案：加在一起，它們足以引發數百起逮捕、數十樁離婚、價值數百萬歐元的罰款，以及好幾輩子的從政禁令。清晨六點左右，一位清潔工驚訝地發現總統徹夜未眠。自那一刻起，他開始佈局落子。他即將玩的是一場骯髒的遊戲，但坐上總統寶座的人，沒有一雙手是乾淨的。整個上午，在咖啡與腎上腺素的加持下，總統派出他的敲詐特使，去不動聲色地脅迫與控制委員會。到了下午，聯邦委員會開議，扎哈羅夫前去見證列別傑夫的最後一份禮物。結果一目瞭然……"
 RUS_phase_one.7.a:0 "所有提案一致通過……"
 RUS_phase_one.8.t:0 "日本的提議"
 RUS_phase_one.8.d:0 "扎哈羅夫靠在座椅上，眺望玻璃窗外的全景。從ROSMIRES大廈的110層望去，整個莫斯科盡收眼底。克里姆林宮——他世界的中心——從ROSMIRES的視角看去，不過是城市景觀中一小片光斑。\"總統先生，歡迎您的到來。\"ROSMIRES董事長亞歷山大·季諾維大步走進房間，在辦公桌前落座。\"抱歉讓您久等，董事會超時了。\"扎哈羅夫上下打量著這個男人。總統一職並沒有賦予他多強勢的權力地位，但即便是最有影響力的寡頭，通常也會出於對這一職位的尊重來見他。而季諾維絕非尋常寡頭——他執掌著俄羅斯最強大的企業，控制著俄羅斯經濟的相當一部分。不過，無論季諾維影響力多大，政府仍持有這家公司可觀的股份。\n\n扎哈羅夫起身，握住對方伸出的手。\"感謝您撥冗與我會面，季諾維先生。\"\"哪裡的話！\"董事長回應道，指了指辦公桌前的座位。\"ROSMIRES隨時準備傾聽最大股東的關切——不過今天，我們要談的是我們能為您做什麼。\"扎哈羅夫點頭示意他繼續，對ROSMIRES要提出的「交易」頗有幾分興趣。董事長按下桌上的按鈕，身後的油畫滑落，露出一塊巨大的寬螢幕。片刻之後，一顆閃耀的粉色晶體出現在螢幕上，映亮了房間。\"櫻石，總統先生。我們的經濟預測顯示，它將成為首要的戰略能源資源，最遲在2015年前超越石油與天然氣，甚至可能更早。如果我們不能順勢而為，利潤預計將下滑最多42%。但我們相信，我們可以從一開始就佔據先機。\"\n\n\"可是我們可開採的櫻石礦藏比不過不列顛尼亞，更別提日本了，\"扎哈羅夫回應，\"而且我懷疑他們誰都不會願意出售。\"季諾維朝他露出狐狸般的笑容。\"出售？不。但我們在日本人那裡有『門路』。桐原財閥掌握著日本大部分櫻石礦山，對這一資源形成了事實上的壟斷。然而，我們自己的地質勘測認為，他們目前只能開發其潛在礦藏的40%。桐原泰三對此心知肚明，並已表示願意與我們建立合作關係。\"\"這個合作的條件是什麼？\"扎哈羅夫好奇地問。\"以我們在勞動力、機械與技術上的鉅額投入，換取礦山利潤的分成。總的來說，今後凡是我們協助的櫻石開採業務，他們願意讓我們分得全部收益的25%。\"\n\n扎哈羅夫竭力繃住表情，用盡全力保持鎮定。他不是傻瓜；櫻石產業價值數萬億，持續的分成將為ROSMIRES的股東帶來數十億的進賬。\"那麼，您需要什麼，董事長先生？\"季諾維向後靠進椅子，十指交扣。\"我們需要資本，大量的資本，總統先生。要付得起這場合作的入場費、成為不可或缺的一方，我們需要數十億。除了掃清貿易壁壘之外，我還需要國家傾力投資。如果國家能墊付35%的成本，我們說服簽約的私人投資者將補足差額。\"\"這風險太大了，季諾維先生。國家出資的部分我還得去談——\"扎哈羅夫正想解釋，季諾維抬手打斷了他。\n\n\"當然。但如果您真想扭轉這個腐朽的國家，就必須全押。那麼，您意下如何，總統先生？\"扎哈羅夫權衡片刻，做出了一個將永遠改變俄羅斯航向的決定。"
 RUS_phase_one.8.a:0 "\"好吧，董事長先生。成交。\""
 RUS_phase_one.9.t:0 "京都協定"
 RUS_phase_one.9.d:0 "CUT"
 RUS_phase_one.9.a:0 "CUT"
 FRA_from_other_nations.1.t:0 "歐元-盧布建議"
 FRA_from_other_nations.1.d:0 "門被輕輕推開，通向一間巨大的辦公室。它大得離譜，遠超所需。狹長的矩形空間，唯一的門開在一端，要小跑一段才能到達另一端——那裡的窗戶俯瞰巴黎，艾菲爾鐵塔盡收眼底。\"總統，有一份給您的請求。來自俄羅斯。\"總統抬起頭。他坐在三張辦公桌的正中，每張桌上都散落著文件——不僅是文件，還有鋼筆、案卷、裝著更多案卷的平板。總統要處理的工作量，確實需要三張桌子。其中兩張桌前坐著助理，總統批完的文件由他們轉遞他處。\n\n\"放我桌上。\"愛德華說得慢條斯理到令人難受，帶著濃重的法國口音。他拖長著字句，把一塊平板舉到面前，用肥厚的手指梳過往後抹平的頭髮——同時處理這麼多事務的巨大壓力，已在那頭髮上留下褶痕。他幾乎沒注意到進門的人正邁著標準的步伐向他走來。不過他倒認出了此人的一個特徵——他的德國口音。\"這份似乎……很緊急。\"愛德華心中嗤笑，把手裡的平板遞給身旁銀髮的助理。『準是個新來的信使。』他想，他們同時有好幾個信使在跑，而這一位顯然不懂總統時間的寶貴。\n\n\"行吧，行吧。拿過來。\"他不情願地說，轉向那個已走到他面前的男人——此時他正坐在三張桌子的正中面對著他。愛德華一把奪過對方遞來的平板。他常想，讓每條訊息都各配一人傳遞是多麼浪費資源。但他也承認這有點用處——它更直觀地顯出他的工作量有多大。他在心裡對這個念頭輕笑了一聲，開始閱讀這一份的內容。看到開頭幾段和標題時，他吃了一驚。\"……你說緊急？他們不過是把跟我提過十幾遍的東西又提了一遍。\"總統此刻已頗為惱火，但他掩飾住了，把空著的手托上肥胖的下巴。這是來自俄羅斯的提議，關於想在他們的經濟上做點什麼的無用之物。這一次他幾乎沒讀他們的懇求——免得像上次那樣浪費時間。他把平板放到了一疊不重要的工作上。"
 FRA_from_other_nations.1.a:0 "\"他們最好別再『提議』了。\""
 RUS_phase_one.10.t:0 "經濟轉型"
 RUS_phase_one.10.d:0 "在雪茄煙霧的繚繞中，扎哈羅夫坐在長桌的首位。他已不再只是列別傑夫的左膀右臂——這個座位如今屬於他。長桌兩側坐著他的內閣。其中有屬於改革派的格里高利·布爾加寧，也有聖彼得堡集團的門面人物馬特維·科諾瓦洛夫。空氣中的惡臭，與這個房間裡端坐的腐敗一樣令人作嘔。這場辯論自始至終只圍繞一個主題：經濟政策。主宰談話的是一種兇狠——一種不動聲色的兇狠。每個人都有自己要守護的利益。對扎哈羅夫而言，那是導師的遺志：繼續與歐洲合作，確保俄羅斯擁有未來——那是他與列別傑夫共同的願景。然而，坐在這群政客之中的那兩人，正與他的願景針鋒相對。布爾加寧與科諾瓦洛夫，各自派系的代表人物。科諾瓦洛夫把雪茄頭直接摁熄在桌面上，毫不在意造成的損壞。\"俄羅斯有大量未開發的資源礦藏，總統。如果我們善加利用，俄羅斯就不必再在國際餐桌上爭搶殘羹剩飯。您難道看不到嗎？\"扎哈羅夫雙手交握於面前，接著開口：\"那樣我就放棄了與歐洲達成協議的機會。我們需要維持更緊密的關係。\"扎哈羅夫閉目養神。\"讓歐洲見鬼去吧，\"布爾加寧插話道。\"除了挾持我們的憲法，他們為我們做過什麼？我們需要變革，而且得靠我們自己。\"扎哈羅夫依然雙手交握，閉著眼睛面對這場分歧的風暴。會議室裡的爭執聲此起彼伏、越演越烈。然而，身為總統，他必須做出微妙的抉擇：是在反對聲中堅守自己的願景，還是迎合同僚們的主張？哪條路才是最好的，又對誰有利？"
 RUS_phase_one.10.a:0 "\"無論如何，俄羅斯必須重新站穩腳跟。\""
 RUS_phase_one.11.t:0 "歐洲的協議"
 RUS_phase_one.11.d:0 "扎哈羅夫癱進椅子裡，打量著這間積塵、老舊的辦公室裡的金色裝飾。他能理解他們的挫敗。俄羅斯與歐洲之間的夥伴關係條款長期以來並不對等，但那正是他想要扭轉的趨勢。他們為那些談判操勞了多年，在九十年代末的柏林、巴黎、維也納度過了無數個長夜。那是一個緩慢而漸進的變革過程——歷史以審慎的步伐寫就，不是靠握手與鎂光燈定格，而是靠不起眼的密室會談，靠佐著麵包與葡萄酒締結的一個個小小協定。\n\n那時的他是列別傑夫忠實的僕從，是其宏偉計劃的勤勉信使——那個要修補與歐洲四十年停滯關係的計劃。如今，主人與導師已然離去，把他獨自留在一座宏偉的城堡裡，把它的修繕與照料託付給了他。時鐘敲響凌晨兩點。這件沙皇時代的老古董的鐘聲在他發顫的顱骨裡迴盪，提醒著他：一個更理智的人早就該去睡了。計劃必須成功。繼續把俄羅斯當作地緣政治與經濟上的奴隸，已不再符合歐洲的最佳利益。德國人接受我們道義上的主張，多瑙人正屈服於我們的壓力，連法國人都開始看到那些「積極的意涵」。\n\n可如果這一切都是徒勞呢？如果前沙皇與蘇維埃留下的積怨，依然深植於歐洲的心臟呢？理性的、現實的當代政治，會不會被古老的恐俄症蒙蔽？扎哈羅夫在種種可能中煎熬，忽然生出一個念頭：萬一歐洲人向我們隱瞞了某種馬基維利式的理由，非要把我們踩在腳下呢？萬一任何滋長的希望，都不過是他們那卡夫卡式官僚體系的某個百年陰謀呢？\n\n桌上電話的嗡鳴把他從疑雲密佈的妄想中震醒。\"抱歉，總統先生，奧爾列夫部長剛從歐洲能源會議回來。要幫您接通嗎？\"祕書問道。扎哈羅夫深吸一口氣，穩住心神。工作還等著他做，沉溺於妄想又有什麼用？為了俄羅斯，也為了列別傑夫，他要把這個計劃進行到底。他向後一靠，接起電話，用接下來的兩個小時與他的外交部長討論能源關稅。"
 RUS_phase_one.11.a:0 "\"勤勉工作吧，總統先生。俄羅斯需要您！\""
 RUS_phase_one.12.t:0 "長期適應"
 RUS_phase_one.12.d:0 "\"總統，您該明白，E.U.永遠不會接受俄羅斯獨立貨幣的提案。\"科諾瓦洛夫的話被意外打斷——扎哈羅夫辦公室裡那座古鐘的報時聲響了。他幾乎是本能地伸手去夠桌上的電話，以為會有來電。但鈴聲沒有響起，於是他得以癱回椅中，倚進上好的皮革裡，在舒適中思忖片刻後回應道：\"而如果我們通過你提議的財政與稅制改革，我們就會變成歐洲企業的避稅天堂，從而帶來利潤……\"扎哈羅夫拖長了最後一句。他知道，當他把頭靠上冰涼的右手、抬眼望向科諾瓦洛夫時，對方定會想要回應。他果然回應了，只用了一個詞。\n\n\"正是。\"扎哈羅夫點著頭，仔細端詳著科諾瓦洛夫。他並不苦於找不到對這個人的看法，而是苦於想法太多——關於他的行事，關於他展現自己的方式。不過，扎哈羅夫倒樂於承認一點：這個人至少懂得如何做好本職。而扎哈羅夫也懂得如何做好自己的——懂得如何迴避某些問題。於是他在腦中反覆掂量著這兩個念頭，目光落在辦公室裡仍在滴答作響的時鐘上，輕聲說道：\n\n\"然而，代價是招來其他E.U.國家的某些敵意。我說得對嗎？\"問題懸而未決。科諾瓦洛夫沒有立即回答，他順著總統的目光望向那座時鐘，然後抬起自己的手腕，端詳起自己的手錶——比那件老古董乾淨得多，也新得多。他收回目光，定了定神，承認了一件時常與事實相去甚遠的事：\"這由您決定，總統。\"扎哈羅夫在心裡輕笑。這次是他的抉擇——也就意味著是他來背負罵名。他不再後仰，而是俯身向前，刻意伸手去拿桌上的電話。撥了幾個號碼，鈴聲很響。\n\n然而他開口時並沒有提高音量。不是對電話那頭的什麼人說——電話畢竟還沒接通——而是對他自己。"
 RUS_phase_one.12.a:0 "\"是繼續挖隧道……還是用炸藥把它炸開。\""
