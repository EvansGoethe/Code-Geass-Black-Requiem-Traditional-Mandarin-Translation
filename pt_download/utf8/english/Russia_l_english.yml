 RUS_phase_one.17.b:0 "間接管線"
 RUS_phase_one.18.t:0 "危險的賭博"
 RUS_phase_one.18.d:0 "\"不列顛尼亞……何必去接觸他們呢……\"扎哈羅夫自嘲地輕笑著，隨即笑聲軟化成一聲惱火的呻吟。他向後靠進椅子，試圖從中找到些許安適，心頭卻始終壓著揮之不去的憂慮——他們的決定會不會立刻敗露。他實在放心不下。他一直盼著看到科諾瓦洛夫從那扇門走回來，帶著凱旋的消息：成功了，不列顛尼亞接受了提議，準備坐下來商談具體路線——是取道馬加丹或鄂霍次克的直接路線，還是一步更冒險的棋。就在他沉思之際，他的祈禱應驗了。科諾瓦洛夫從門口走了進來，卻沒有他慣常的一絲不苟。不，有什麼地方微微不對勁。但扎哈羅夫沒有在意——尤其當他看見對方右手拿著一封信時。\n\n\"科諾瓦洛夫，有消息了？\"扎哈羅夫謹慎地問。科諾瓦洛夫用空著的手扶了扶領帶，似乎對它的位置很不自在。他就這樣徑直走到扎哈羅夫面前，遞上那封信，只說了一句：\"是……有了。弗拉迪斯拉夫。\"扎哈羅夫立刻接過信，腦中滑過了一個事實卻沒有抓住——科諾瓦洛夫從來沒有喊過他的名字。他甚至沒有注意到，科諾瓦洛夫轉過身，徑自要走。扎哈羅夫端詳著信封，第一眼便看到了彰顯其分量的標誌：不列顛尼亞皇室紋章，烙印在封緘信口的紅蠟之中。扎哈羅夫把信放下，拇指撫過封蠟。就在這時他抬起頭，看見科諾瓦洛夫正伸手去開門。\n\n\"不留下——？\"扎哈羅夫的問話戛然而止——因為他的眼睛不再欺騙他。在科諾瓦洛夫的位置上，站在他方才站立的地方的，是一個看上去不超過九歲的男孩，一頭短短的金髮，有些地方亂糟糟的。扎哈羅夫認得那身制服，是莫斯科附近一所學校的。可是——他怎麼進來的？科諾瓦洛夫又去了哪裡？\"等等！\"扎哈羅夫失聲喊道。男孩發覺自己被發現，拔腿就跑，拉開門又摔上。扎哈羅夫騰地起身，但隨即回頭看了看那封信，又坐了下來。如果這是不列顛尼亞的安排，追那個男孩毫無意義。他拆開封蠟，終於取出信中之物——一張簡單、乾淨、平整的紙。\n\n上面只有寥寥數語。扎哈羅夫搖了搖頭，終於敲定了路線。"
 RUS_phase_one.18.a:0 "在鄂霍茨克啓航"
 RUS_phase_one.18.b:0 "航行穿過日本"
 RUS_phase_one.19.t:0 "經濟多元化"
 RUS_phase_one.19.d:0 "\"俄羅斯的公民們，我，扎哈羅夫總統，有話要對大家說。\"扎哈羅夫清楚自己說話時為何暗自難受。不是因為聚焦在他身上的灼熱棚燈，不是因為站在專業巨型攝影機前、被眾人注視的壓力，而是因為他在照著提詞器唸稿。他知道稿子是他自己要求準備的，但他真希望它聽起來別這麼機械、這麼沒有靈魂。他明白，人民——他正在對之講話的公民們——如果看到的只是一個機器人，是不會與這樣的領袖產生共鳴的。\n\n\"政府已做出安排，我們將對非主要產業進行一系列重點投資。\"扎哈羅夫把頭從鏡頭前轉開，望向右邊——布爾加寧站在那裡，臉上掛著得意洋洋的神情。扎哈羅夫搖了搖頭，又轉了回來。他知道那副表情從何而來，只是希望他能挑別的場合去炫耀。有些日子，扎哈羅夫覺得自己是總統；有些日子，他覺得自己是一枚棋子。\n\n他的腦子總是雜念紛飛，有時甚至想不清自己究竟是誰，想成為誰、想聽起來像誰。\"請各位期待，以下領域的投資將——\"扎哈羅夫停住了。他停下來，是因為他此刻聽起來就像在唸廣告。他猛地推開椅子站起，俯身壓向桌面，讓攝影機重新對焦，把他完整地收入鏡頭。\n\n\"不，簡單地說：這些投資，全都將用於支撐我們的國家，支撐我們能為你們——我們的人民——所提供的一切。\"這是一個小小的舉動，一個小小的訊號，是扎哈羅夫所能給出的為數不多的訊號之一。這是難得的時刻——他有了一些屬於自己的東西，可以想、可以堂堂正正地對大眾說。他對此感到滿足。於是他滿足地提前結束了講話，用簡單的最後一句："
 RUS_phase_one.19.a:0 "\"就這些。\""
 RUS_phase_one.20.t:0 "宏大計劃"
 RUS_phase_one.20.d:0 "\"你擬好方案了，科諾瓦洛夫？\"扎哈羅夫覺得自己開始厭倦科諾瓦洛夫這張臉了——實在是看得太頻繁。這恰恰凸顯了經濟最大的問題：僅僅為了讓它勉強走上正軌，就需要總統與科諾瓦洛夫之間進行無數次的會談與交涉。這一次，他說完話等待科諾瓦洛夫回應時，索性轉頭環顧起自己的辦公室，想找個值得注意的東西，好在聆聽時有個落點。\n\n\"是的，總統先生。確切地說，有兩份。\"扎哈羅夫漫不經心地示意他繼續。他知道對方帶來那兩份文件必有其因。他也知道這正是他必須頻頻召見科諾瓦洛夫的原因——這個人大體上很有效，更重要的是高效，而且這樣也便於他盯著這個人。\"第一份：透過聚焦各產業的技術進步——具體而言是自動化——來改善我們的經濟狀況。\"科諾瓦洛夫把文件從手中取出放下，錯開疊放以便區分。扎哈羅夫連標題都懶得看，他知道科諾瓦洛夫會先把要點提煉出來，讓他決定選哪一條，之後再細讀成功所需的全部內容。\n\n\"第二份：我們主攻極廉價的重工業，力求在產量與價格上壓倒其他歐洲企業。\"扎哈羅夫早已明白，兩個選項各有利弊。他把目光從一本書的書名上收回——確切地說，是一位英國名作家的《歐洲最後一人》——重新鎖定科諾瓦洛夫。哪個主意聽起來更有意思，他心裡已經有數了。"
 RUS_phase_one.20.a:0 "新技術"
 RUS_phase_one.20.b:0 "壟斷鋼鐵"
 RUS_phase_one.21.t:0 "資助俄羅斯國家技術集團"
 RUS_phase_one.21.d:0 "\"我很榮幸為大家介紹這位為促成這一切而奮鬥的人——扎哈羅夫總統。\"新成立的俄羅斯發展技術公司（Rosdevtec）的總監對著麥克風說道，聲音轟然作響、時而爆音。他湊得太近了，用力也太猛了。扎哈羅夫起身時搖了搖頭——他自己不看講稿連幾句完整的話都湊不齊，這會兒倒批評起別人的演講方式來了。總統起身時，人群歡呼鼓掌。尼古拉總監招手請他上前，他跟了過去，打量著這個帥氣的年輕人：金髮，灰眼。\"謹代表新成立的Rosdevtec，我們感謝扎哈羅夫總統促成了這一切。\"扎哈羅夫感到胸中一陣鼓脹。那不是疼痛，這一次甚至不是任何負面的情緒——扎哈羅夫感到的是自豪，一種真正的成就感。它驅使他向人們綻開笑容，朝他們揮手致意。\n\n他知道攝影機最愛這一套，但他不是做給它們看的。他是做給觀眾席上的公民們看的——在這樣的時代仰望著他的人們，即便這算不上俄羅斯經歷過的最艱難的時代。\"扎哈羅夫總統，您要講幾句嗎？\"尼古拉退後一步，話音總算不再爆音。扎哈羅夫點頭就位。這回輪到總監站在一旁，耐心而熱切地等他講完。\"就講幾句。謝謝你，尼古拉總監。\"扎哈羅夫用平穩的語氣回應，目光掃過人群。他穩穩站在台上，與麥克風保持著恰到好處的距離。他點了點頭，鬍鬚因這份矚目而微微翕動。\n\n\"俄羅斯的未來在於科技。我們正慢慢落後於E.U.的其他國家。我希望，藉助Rosdevtec，我們將成為科技的先驅——不僅是這個國家的，更是全世界的。\"他看到記者們飛快地把他的話記進筆記，急著要登上報紙。他直視著記錄整場活動的攝影機，目光沉沉，以簡單的一句收尾："
 RUS_phase_one.21.a:0 "\"就這些。\""
 RUS_phase_one.22.t:0 "打破系統"
 RUS_phase_one.22.d:0 "CUT"
 RUS_phase_one.22.a:0 "CUT"
 RUS_phase_one.23.t:0 "內部改革"
 RUS_phase_one.23.d:0 "扎哈羅夫仰望著天花板。他從沒盯著它看這麼久過，也從沒需要在任何一個地方、就任何一個問題想這麼久過。當副總統是件有回報的差事，也有它的好處。但如今身為總統，他心頭壓著別的問題。\"警察……內閣安全調查室……俄羅斯自衛隊。\"他自言自語，一邊用手指梳理著灰白的鬍鬚，一邊把辦公椅向後仰到極限，椅子在重壓下吱呀作響。\"這三個機構都需要大刀闊斧的改造……但眼下……\"\n\n他腦中盤旋的正是這個：如何著手補救國家的內部狀況。它牽涉三個主要機構，它們的名字與面貌在他腦中反覆閃過：警察、內閣安全調查室（CSRO）、俄羅斯自衛隊（RSDF）。他決定在腦中——也在這間空蕩蕩的辦公室裡出聲地——逐一梳理這些構想以及它們所需的支持。\"警察只需要增加撥款，他們的經費向來被剋扣……\"他的聲音像無人機一樣單調，透著厭倦。老實說他確實厭倦了——和別人討論問題要輕鬆得多，那樣他還能拿別人的意見與自己的權衡。但他知道，他必須接受一個事實：有些抉擇終究只能由他一人做出。只能由總統。這個念頭仍在他腦中迴響。直到現在，他才真正有時間去想這件事——然而即便如此，他也不願去想，很快便把這些念頭拂到一邊。\n\n\"CSRO幾乎算不上一個情報機構，擴編會很有用。\"這是實話。扎哈羅夫上次核查時，這個機構總共只有百來號人——卻要覆蓋整個俄羅斯。這遠遠不夠，所以它至今極少動用，即便動用也只是聚焦於個案。\"而RSDF正在臃腫、腐爛。它需要徹底重建，才能迎來數十年來的第一次啟用。\"RSDF已多年未被動用——自從很多年前，他們被派去鎮壓莫斯科及全國各地的暴亂之後。那些暴亂以血腥收場，罵名很快落到RSDF頭上。由於輿論惡劣，此後的歷任總統都不敢碰他們，任其自生自滅。有些人大概以為它早已解散，但它仍在那裡，隨時待命。扎哈羅夫垂下目光，把頭靠上指節，作了今天最後一次沉吟。"
 RUS_phase_one.23.a:0 "\"阿列克謝，換作是你，會怎麼選？\""
 RUS_phase_one.24.t:0 "聯邦警察資金"
 RUS_phase_one.24.d:0 "\"總統先生！真沒想到，我還以為您要來是有人惡作劇呢。\"扎哈羅夫踏進莫斯科警察局恐怕還不到五步，就被一個相當圓胖的年輕人快步迎上。他個子很高，塊頭也大，卻絲毫不讓人覺得有壓迫感。扎哈羅夫認得這個人——俄羅斯警察總監。他搖著頭伸出手：\"拜託，對我多點信心，布加科夫。我是為要事而來。\"\n\n總監一記握手所展現的力道非同尋常，但他的性格卻實在是「非同」尋常。總監示意總統跟他往裡走，經過前台——那裡的警官們正接待憂心忡忡的市民。\"我看到您送來的報告了，簡直不敢相信。我的警官們向來……\"布加科夫的嗓音出奇地甜潤輕柔，讓扎哈羅夫想到蜂蜜。這個人渾身上下都令人費解，但扎哈羅夫搖了搖頭。布加科夫一邊說一邊四下張望，幾乎是擔心被人偷聽似的，才把話說完：\"……不受重視。然後您就來了，還主動提出增加預算？\"\n\n他說話的樣子憂心忡忡，像是在揣測扎哈羅夫是否想從警局撈點什麼——比如用這筆錢當賄賂，讓警方對某樁罪案睜一隻眼閉一隻眼之類。扎哈羅夫察覺了，搖搖頭，把來意和盤托出：\"除此之外，是的，我還想擴大你們的管轄權——這也解釋了為什麼需要增加預算。\"布加科夫聞言眼睛一亮。他們終於走到他辦公室門口，他差點一把摔開門，好歹維持住了幾分職業風度。他快步繞到辦公桌後落座，那椅子勉強容得下他，居然沒有吱呀作響。\"謝謝您，先生。請，我們坐下詳談。\"他笑著示意扎哈羅夫在對面就座。扎哈羅夫點點頭，坐了下來。"
 RUS_phase_one.24.a:0 "\"那再好不過。\""
