 RUS_hostage_constitution:0 "被脅持的憲法"
 RUS_hostage_constitution_desc:0 "在大戰中遭受失敗後，我們被迫根據不斷演進的神聖歐洲聯合起草了一部新憲法。為了防止突然或危險的修改，修改憲法的權力已被移交給巴黎的40人委員會。儘管我們在委員會中佔有席位，但它實際上由法國、德國、多瑙河聯邦及其盟友主導。由於曾在一場殘酷衝突中互為對手，且目前決心在任何意義上阻止一個強大俄羅斯的復興，迄今為止所有修改我們憲法的努力都未能成功。"
 RUS_extensive_corruption_1:0 "廣泛的腐敗"
 RUS_extensive_corruption_1_desc:0 "腐敗給俄羅斯蒙上了一層無處不在的陰影，將政府、寡頭和有組織犯罪集團糾纏在一起。在這種背景下，要實現任何目標都必須仰賴合適的關係……或是足夠的資金。總體而言，這一現實滲透到了國家工業 and 和政治領域的各個方面。"
 RUS_military_shambles_1:0 "軍事混亂"
 RUS_military_shambles_1_desc:0 "俄羅斯聯邦的軍隊已是昔日自我的影子。裝備陳舊，並受到限制從歐洲承包商進口武器的條約限制，這阻礙了我們的效能。此外，關於我們裝備庫存的真實程度仍存有疑慮，編因為許多士兵和軍官領不到薪水，這引發了人們的猜測，即失蹤的薪水是通過在黑市上非法出售軍用資產來補償的。"
 RUS_oligarchic_economy_1:0 "寡頭經濟"
 RUS_oligarchic_economy_1_desc:0 "聯邦的經濟實力在紙面上看起來很強大，但實際上並非如此。財富每天通過資源出口和開採業積累，但主要使在政府內部擁有影響力的寡頭受益。諷刺的是，這些冒險活動的收入總是流向法國的銀行，而不是流向俄羅斯財政部的金庫。"
 RUS_parasitic_federalism_1:0 "寄生聯邦制"
 RUS_parasitic_federalism_1_desc:0 "俄羅斯的治理無法在國家層面得到有效集中。戰後憲法強加的聯邦結構賦予了地方州長和官僚巨大的權力。再加上這些官員普遍腐敗且缺乏問責制，國家倡議實際上陷於癱瘓。每一項總統法令或項目都必須穿過腐敗地方官僚機構的迷宮。因此，諸如資助國家高速公路項目之類的項目不可避免地演變成了肥水流向地方官員的口袋，而不是實現其預期目的。"
