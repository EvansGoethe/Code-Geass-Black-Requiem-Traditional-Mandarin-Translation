 RUS_phase_one_projects_outcome.1.t:0 "中哈管道報告"
 RUS_phase_one_projects_outcome.1.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick a pipeline directly from Krasnoyarsk to Astana was a great success. The surrounding areas have seen increased prosperity and focus thanks to the pipeline. It has also worked double duty to enhance our relationship with the Chinese Federation, improving our chances of further deals.\n\nThat is all."
 RUS_phase_one_projects_outcome.1.a:0 "\"總算……有點好消息了。\""
 RUS_phase_one_projects_outcome.2.t:0 "中哈管道報告"
 RUS_phase_one_projects_outcome.2.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick the path of the pipeline to be indirect to say the least with Kazakhstan has proven to be a success in its goals. Not only does it fuel the deal we have with the Chinese Federation. It has also provided the surrounding rural areas that would often not get much of a look over prosperity and needed infrastructure thanks to the pipeline. Fulfilling the deal of course has also done double duty to enhance our relationship with the Chinese Federation, improving our chances of further deals.\n\nThat is all."
 RUS_phase_one_projects_outcome.2.a:0 "\"那真是好消息。\""
 RUS_phase_one_projects_outcome.3.t:0 "中哈管道報告"
 RUS_phase_one_projects_outcome.3.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick a pipeline directly from Krasnoyarsk to Astana sadly did not pan out as we hoped. Time, energy, money was all frankly wasted on the project. Those who we got to do it fell under shortly after taking the contract and work barely being started. Safe to say that the Chinese Federation is not pleased with this outcome and so have bailed on the deal.\n\nThat is all."
 RUS_phase_one_projects_outcome.3.a:0 "\"本來可能更糟……\""
 RUS_phase_one_projects_outcome.4.t:0 "中哈管道報告"
 RUS_phase_one_projects_outcome.4.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick the path of the pipeline to be indirect to say the least with Kazakhstan has proven to sadly have been a mistake. The indirect path that was chosen was revealed to have vastly unsuitable terrain for the pipeline, as well as the nature of the environment making it hard to get supplies there and start building in the first place. The company we had chosen for the pipeline has already gone through the cost of trying to make the pipeline work. Sadly failing this in suitable time has made the Chinese Federation not pleased, and they have since bailed on the deal.\n\nThat is all."
 RUS_phase_one_projects_outcome.4.a:0 "\"又一次冒險失敗了。\""
 RUS_phase_one_projects_outcome.5.t:0 "至不列顛尼亞的北極航運"
 RUS_phase_one_projects_outcome.5.d:0 "Subject: Okhotsk Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The decision to plan the route from Okhotsk right to Britannia through Alaska, avoiding the chance of discovery by many other nations proved to be successful. It has allowed us to ship between our nations unimpeded and without watchful eyes, it has even seen the Port of Okhotsk receiving more buildup which it greatly needed.\n\nThat is all."
 RUS_phase_one_projects_outcome.5.a:0 "\"但願能一直如此……\""
 RUS_phase_one_projects_outcome.6.t:0 "至不列顛尼亞的北極航運"
 RUS_phase_one_projects_outcome.6.d:0 "Subject: Okhotsk Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The decision to plan the route from Okhotsk right to Britannia through Alaska, avoiding the chance of discovery by many other nations proved to have been a good idea in concept. However, luck was not on our side. As one of our ships was making its way to Britannia around Kamchatka it was spotted by a Chinese Federation vessel, the Chinese Federation stopped the ship as it avoided all attempts at communication. This led to the Chinese figuring out what we were doing, and as you may be aware, revealing this plan to the wider world, specifically to the rest of the E.U. The Republic is not pleased with our attempted deception and so this will make it harder for future negotiations not just with them but Britannia as well.\n\nThat is all."
 RUS_phase_one_projects_outcome.6.a:0 "\"賭輸了。\""
 RUS_phase_one_projects_outcome.7.t:0 "至不列顛尼亞的北極航運"
 RUS_phase_one_projects_outcome.7.d:0 "Subject: Japan Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The route to ship through Japan to Britannia, including them on our deal, ended up quite fruitful. In an era of tensions between Japan and Britannia this small cooperation has seemed to ease it even a little, even though that was not our main intention. Our main intention was met the same, added funds that have seen use to expand ports and bases across our nearby coastline to improve our shipping capabilities.\n\nThat is all."
 RUS_phase_one_projects_outcome.7.a:0 "\"片刻難得的安寧。\""
 RUS_phase_one_projects_outcome.8.t:0 "至不列顛尼亞的北極航運"
 RUS_phase_one_projects_outcome.8.d:0 "Subject: Japan Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The route to ship through Japan to Britannia, including them on our deal, ended up sadly not as fruitful as we hoped. The cut Japan takes on our deal with Britannia is just too much. So while the deal seemed to slightly improve the relationship between Japan and Britannia, it was just not profitable for us. Leading to the decision to cut the deal, while this has seemed to not bother Britannia due to wanting to keep discrete on the manner. Japan is not the same way, and so now seems to be harbouring an issue with our tactics and the way we do business. They'll hold this grudge for as long as they exist it seems.\n\nThat is all."
 RUS_phase_one_projects_outcome.8.a:0 "\"這可不妙。\""
 RUS_phase_one.35.t:0 "約束黨內"
 RUS_phase_one.35.d:0 "\"先生們，我想，終於到了我宣佈……的時候了。\"空氣中的緊張陡然變得濃稠。所有人都望著扎哈羅夫，他也望著眾人。望著那些各自抱團的政客們——他們大多一直在密謀策劃著各種奪權掌局的手段。那些形形色色的團體、身處其中與執掌其上的形形色色的人，此刻竟難得地為同一件事凝聚在一起：緊緊咬住扎哈羅夫的每一個字。他們心裡期盼的都是同一件事——這會是他的辭職宣告嗎？這讓他隱隱生出一絲寒意嗎？所有人都注視著他，注視著這個站在講台上、向眾人發言的人，盼著這會是他最後一次這麼做？也許確實如此，扎哈羅夫。\n\n他不確定自己是什麼感受，不知道該作何想。過去這一年多來，所有人都在努力讓俄羅斯重回正軌。他不確定自己該成為什麼，該成為誰。扎哈羅夫深吸一口氣。說到底，就算不知道自己是誰也無關緊要。他知道自己必須做什麼。這一點，他很確定。\"我還沒有做完！\"扎哈羅夫一拳砸在講台上。那一拳裡沒有憤怒，而是一個承諾。他的目光掃過眾人，試圖與在場的每一個人對視。\n\n\"我站在你們中間，看夠了你們卑劣的內鬥。你們的相互攻訐——你們全都在把我們偉大的國家往分裂的方向撕扯。\"他把這一點說得清清楚楚，說給每一個人聽。這座大樓裡，沒有幾個人不曾試圖靠攻擊他人來撈取好處。那極少數潔身自好的人呢？正是那些支持扎哈羅夫到底、支持得不含半分私心的人。\"我絕不容忍。只要我還是總統，我就會致力於把這個國家凝聚起來，把我們拉回正確的軌道。\"扎哈羅夫斬釘截鐵，語氣堅定，不留任何反駁的餘地。他知道他必須如此——此刻若露出一絲軟弱，他就完了。\n\n\"把俄羅斯重新送回通往偉大的道路上。送到我們將作為E.U.支柱之一屹立的地方。\"這是一個漫長的夢。它需要時間，需要浩大的努力，需要太多事情都順利進行。但是，扎哈羅夫必須相信它。他別無選擇，他必須從自己心中找到那份信念——他做得到。最後，扎哈羅夫簡單地結束了他的講話。"
 RUS_phase_one.35.a:0 "\"就……到這裡。\""
 RUS_phase_one.36.t:0 "櫻石崩盤（一）"
 RUS_phase_one.36.d:0 "ROSMIRES大廈110層，多美的景色。莫斯科最高的摩天大樓——從這個視野，季諾維可以俯瞰整座城市。從這一個位置，他能看到所有的作為，與所有的後果。他把那只閃著微光的小圓杯舉到唇邊，抬高，擋住了視線，拼命想再喝上最後一口。可是，瓶子早已見底，只剩最後幾塊冰在杯中叮噹作響。季諾維嘆了口氣。他不敢相信，這一切竟把他引到了這個境地。他回望莫斯科，那雙眼睛——那雙不再訴說什麼的眼睛，只透著疲憊，和已然乾涸的淚痕的殘跡。\n\n他輕輕吸了吸鼻子，這很不像他。他轉過身，走向辦公桌，正要放下杯子。然而，這沒有發生。因為桌上依然擺著那份文件——那張宣告了這一絕境的簡簡單單的紙。他不需要再讀一遍，他根本讀不下去。僅僅是看著它，就令他怒火中燒。玻璃杯被用盡最後的力氣擲向牆壁，徹底粉碎，冰塊滾落一地。有那麼一秒鐘，季諾維的臉上是全然徹底的暴怒——剛好長到讓他吼出一句：\"該死的不列顛尼亞！\"他站在那裡，聲音淬著毒。他又啐出幾個字：\"全都該死……日本。\"\n\n他彷彿一個女巫，向擊敗了他們的人吐出最後的詛咒。他盡力平復自己，繞到辦公桌另一側，看著抽屜。他蹲下身，拉開其中一個——那是他曾希望永遠不必打開的一個。他從裡面取出一個黑色的匣子。他握著它站起身，又咒罵了幾句，把它帶回窗邊。至少，他還能最後看一眼窗外。望出去時，他竟輕輕笑了。他掀開匣蓋，蓋子翹起，露出底下閃亮的黑色金屬，乾淨而光潔，配著漂亮的木質握把。\n\n那把季諾維一直用於防身的納甘M1895。想想吧——那是多年以前，他用自己的第一份薪水買下的。他從匣中取出手槍，放下匣子，雙手握著它。感覺很陌生，很怪異，彷彿它突然重了許多。他還是檢查了一遍以防萬一。沒有刻痕，沒有瑕疵，只有久未使用的積塵。他推出轉輪，檢視裡面。"
 RUS_phase_one.36.a:0 "只需要一顆子彈。"
 RUS_phase_one.37.t:0 "櫻石崩盤（二）"
 RUS_phase_one.37.d:0 "The paper was worn, it was weathered. Tattered even, though it seemed entirely new and recent. The Policeman's eyes fell upon it, examining it. Seeing the rips, seeing the stains that could have been from tears. Or a drink. It was a report, a timeline. Only parts could be read.\n\n0030: Imperial Britannia military forces begin an all-out invasion of Japan\n0200: Kururugi government declares martial law and seizes strategic industries in cooperation with the Kyoto Houses. ROSMIRES-Kirihara agreement becomes null and void.\n0320: Major Europian investors and banks such as Eurobank, LEBC, Crédit Français and Deutsche Bank, prepare to short millions of euro's worth of their investment.\n0400: Information from confidential board meeting and ROSMIRES discussing the likelihood of bankruptcy leaks to the media.\n0630: Moscow Exchange commences morning trading. ROSMIRES opens at 975 points and drops to 34 by the end of the hour.\n0730: Panic spreads as major industries and banks experience panic selling, Eurasian Industrial Indices fell by 27.3%.\n0800: Europian Central Stock Exchange commences trading, ROSMIRES and Russian banks experience similar losses.\n0845: Public panic causes runs on major banks including state-owned Rosbank.\n1000: Europian Central Bank freezes further loans to Russia, emergency session of the EU executive council is called.\n1130: ROSMIRES announces bankruptcy proceedings, several company mines cease extraction with billions of tonnes worth of minerals lying idle.\n\nThe officer now understood, he had the reason for it. For more than he was here for, that much he understood. Looking away from the paper, he spotted scant few other officers around him. They were short handed as of late, with much work to be done. And now, he realised. That staying here any longer, to investigate a suicide at this time. It was pointless."
 RUS_phase_one.37.a:0 "\"收拾好……我們有活要幹。\""
 RUS_phase_one.38.t:0 "櫻石崩盤（三）"
 RUS_phase_one.38.d:0 "基里洛夫對著電話絕望地嘶喊。若是憤怒可以化為力量，他早把這部掛在搖搖欲墜的牆上的電話整個扯下來了。\"不！你們……你們不能把我們丟在這裡！\"絕望浸透了他的聲音。怎麼可能不呢？他的思緒飛轉。他背貼著牆，座機聽筒抵在耳邊，身體卻刻意壓低避開視線。他望向窗外——或者說，從窗邊偷偷往外瞄。遠處，他看見爆炸。烈火燃燒，斷壁殘垣，人們四散奔逃。電話那頭的聲音，他竭力去聽，心思卻在別處。他從窗邊轉開，把百葉窗又攏上一些，回頭望向身後那扇虛掩的門。門縫裡，他看見了自己的兒子，那頭棕色短髮閃了一下，看樣子剛收拾完行李。\n\n這讓他鬆了口氣。然而接著，他聽到了毀滅性的消息。\"我們來不了。\"電話那頭的聲音說道。他猛地又吼了起來：\"為什麼——什麼！？我——\"他沒能說完，那頭的人已經掛斷。那是他們迅速脫身的少數希望之一。他把聽筒狠狠砸回牆上，砸裂了聽筒和牆座。他掃視這間他們藏身的狹小房間，從桌上抓起一個郵差包，走到門邊。他看見門縫裡兒子的頭髮縮了回去。他輕輕地、慢慢地推開門，對他小心翼翼。\"庫列平……收拾好了嗎？\"他盡量耐心地等著，看著兒子悄悄探出頭來，點了點頭。他看到了——背包已經背在身上。他輕輕地笑了。這笑容給不了他自己安慰，但也許能給兒子一些。他清了清嗓子正要再開口，一聲巨大的爆炸撼動了整棟樓。他一把撈起兒子抱進懷裡，把小男孩托了起來。\"我們得走了！\"他以最快的速度奔向前門，整棟樓和屋裡的傢俱都在搖晃。他騰出的那隻手伸出去拉開門——門開了，卻立刻被人從外面拽了回去。\n\n他本希望門外站著的是俄羅斯保鏢，或是能帶他們離開的人。迎接他的，卻是「灰色死神」。一名士兵，全身灰色裝甲，腿部、胸口、肩頭覆滿甲板；全封閉的頭盔，深灰色鏡片，整合著防毒面具。他端著一支犢牛式突擊步槍，槍口已對準基里洛夫與庫列平，只容他囁嚅出一句：\"我們不是日本公民，我們是——\"自那之後，基里洛夫的聲音永遠沉寂了。一陣短促的連射，是外面唯一能聽到的聲音，隨後被尖叫與哭喊試圖淹沒。\n\n而屋內最後傳來的聲音——被一個流血的兒子，某位俄羅斯商界大人物的兒子聽見的——是那面具下低沉的嗓音，簡短地宣告："
 RUS_phase_one.38.a:0 "\"區域已肅清。\""
 RUS_phase_two.1.t:0 "國家災難"
 RUS_phase_two.1.d:0 "對扎哈羅夫來說，被大批保鏢簇擁、身後還跟著總在四周設起屏障的警察，永遠是種格格不入的感覺。在他看來，這彷彿永遠地隔絕了他與人民——與他為之治理國家的公民們。突然，走在莫斯科一條尋常街道上、正返回辦公室途中的扎哈羅夫豎起了耳朵。\n\n\"——是的，這是剛剛收到的消息。\"聲音來自電視上的一位記者。他四下張望，透過一扇幾乎結凍的商店櫥窗，看見一位金髮女記者手裡拿著一疊稿紙。扎哈羅夫停下腳步，整個隨行隊伍也隨之停下。但他必須知道他的國家——以及這個世界——正在發生什麼。\"由於日本的持續局勢，對日投資失敗後，ROSMIRES公司面臨崩潰。公司市值暴跌，瀕臨宣告破產……\"這些話像一顆飛馳的子彈擊中了扎哈羅夫。這並非全然出乎意料——日本的局勢讓他早就擔心會發生這樣的事，但他的頭腦一直竭盡全力把這些念頭趕走。如今，一切轟然砸回他的身上。\n\n\"就在幾小時前，人們發現ROSMIRES董事長亞歷山大·季諾維自殺身亡——他從大樓縱身躍下。\"螢幕上閃出季諾維的照片。扎哈羅夫張口結舌。說他驚駭欲絕都是輕描淡寫，連他周圍的護衛都面露驚恐。街上其他地方看著同一則報導的少數市民也驚駭不已——只是他們的反應比扎哈羅夫更能發出聲音。\"各位，這一切不會止於ROSMIRES。隨著股市崩盤，整個俄羅斯經濟預計將萎縮5%。多家銀行因無力償債正在關閉。\"扎哈羅夫繼續看著。螢幕不斷切換：圖表、一幅幅銀行關門的畫面、擠滿人群卻被鎖在門外的銀行的錄影。扎哈羅夫猛地一拳砸在自己腿上，護衛們為之一驚，卻沒有阻止他。他一下又一下地砸著，口中緩緩念著："
 RUS_phase_two.1.a:0 "\"這……這不可能是真的。\""
 RUS_phase_two.2.t:0 "科諾瓦洛夫的懇求"
 RUS_phase_two.2.d:0 "\"求您了，總統先生，有幾家公司我們必須紓困。\"若不是扎哈羅夫正用雙手揉著太陽穴，他或許真能聽出科諾瓦洛夫話音裡的憂慮——那從一個平素冷漠的人身上滲出的隱隱恐慌。扎哈羅夫的思緒還在為方才目睹的一切天旋地轉，幾乎無暇他顧。\"科諾瓦洛夫——慢點說。\"他絕望地說著，睜開眼看去。科諾瓦洛夫正俯身壓在桌上，姿態不再筆挺齊整。單是這一點就顯出他的憂慮，他的眉梢滲著細汗。\n\n\"如果我們不出手，經濟會繼續自由落體。我們必須馬上行動！\"科諾瓦洛夫明知自己不必提高嗓門——那也無法讓扎哈羅夫在轟鳴的思緒中聽得更清楚。他一遍又一遍地試圖理解眼前的局面，拼命思索。就在他的頭腦終於允許他進一步消化的那一刻，怒火轟然竄起，彷彿有根血管砰然爆裂。\"冷靜點！\"\n\n這聲怒吼不僅嚇到了科諾瓦洛夫，也嚇到了扎哈羅夫自己。兩人陷入一陣苦澀的沉默。扎哈羅夫轉過椅子面向科諾瓦洛夫，後者移開視線，垂眼望向桌面，望向底下的文件。他迅速抓起一支筆，開始在其中一張紙上疾書。扎哈羅夫認出了幾家俄羅斯公司的名字，便明白了其中含義。寫完後，科諾瓦洛夫徹底放下筆，利落地轉身，明顯努力平復著自己。當他的聲音再度響起時，已顯得自然許多：\"其餘的就交給您了。\"這是他離開前的最後一句話。扎哈羅夫望著那張紙，緩緩伸手去拿那支剛被放下的筆。"
 RUS_phase_two.2.a:0 "\"列別傑夫……當年也是這樣。\""
 RUS_phase_two.3.t:0 "我們城市中的騷動"
 RUS_phase_two.3.d:0 "伊帕季耶夫還是無法相信。那一幕在他的腦海裡永無止境地重播：前一刻，他還在看著自己的積蓄——他光明的未來，他在一個不斷落井下石的國家裡拼死拼活掙來的未來。下一瞬，一切化為烏有。他所有的錢，所有的積蓄。他知道自己並不孤單——這正在全國上演，整個俄羅斯都在崩潰。但是，他不在乎俄羅斯，他什麼都不在乎了。是俄羅斯，是他的國家把這一切加諸他的身上。他想著這一切，把那輛黑紅相間的ZID牌摩托車停在路邊，行人從他身旁走過。\n\n所有人，甚至沒有一個人注意到他、注意到他的存在——他的人生長久以來就是如此。憤怒不僅燒進了他的心，如今也燒上了他的臉。他摘下摩托車頭盔扔在地上，關掉引擎時已渾身顫抖抽搐。\"為什麼……為什麼……為什麼。\"他一遍又一遍地喃喃著。他名下已一文不剩，而失去的又遠不止金錢。房子沒了，工作沒了，照這樣下去，接下來失去的恐怕就是妻子。這個念頭讓他狠狠咬住舌頭——想到那一幕，想到他想與之共度未來的人，想到他已然消逝的未來。\"該死——！！！\"他突然放聲嘶吼。他再也承受不住了，再也撐不下去了。路人被嚇了一跳——他們終於知道了他的存在。\n\n他們終於看見了他，卻是在他把手伸進包裡、抽出一把刀的時候。接下來的瞬間一片模糊。伊帕季耶夫狀若鬼魅附身，起初只是朝自己的摩托車亂砍。然而，當有人試圖伸手阻止他的那一刻，刀刃直接劃穿了那人的手臂，鮮血滴落。他停不下來了。他開始攻擊人群，癲狂、瘋亂地揮砍。加諸他身上的痛苦，如今他只想加諸他人。砰！一聲槍響自伊帕季耶夫處傳來。他低下頭，霎時間覺得呼吸與力氣一併抽離。他早已渾身浴血，分不清胸口那個洞裡湧出的血，是自己的，還是別人的。"
 RUS_phase_two.3.a:0 "又一個生命……被熄滅了。"
 RUS_phase_two.4.t:0 "總統的演講"
 RUS_phase_two.4.d:0 "扎哈羅夫深吸一口氣。他感到灼熱的棚燈打在身上，專業高端攝影機的閃光此起彼伏。他拼命想讀清那份倉促為他準備的講稿。這一切都令他不堪重負。當他聽到遠處那位過分亢奮的導播喊出\"開始！\"時，他爆發了。即便鏡頭正對著他，即便全俄羅斯人民都注視著他，他抓起稿紙，朝身後揚手一撒，任其漫天飛散。他不在乎這會被如何解讀。他知道自己是個糟糕的演說者，但現在，他只想說他認為對的話。\n\n\"俄羅斯的公民們！不要恐懼……\"他幾乎是俯視著鏡頭——主要是瞪著鏡頭後面的人。他雙手重重按在桌上，努力穩住自己，在話音的餘韻中閉上眼睛思索著。鼓起勇氣，攢足氣息，凝聚起他相信他的前任身處此境時會說出的話。\n\n\"我知道時局艱難，我知道我們的國家正面臨巨大的動盪，一場巨大的災難。\"他說得擲地有聲——他終於說出了一位堅實而偉大的總統應有的氣魄。他知道所有目光都在他身上，於是他攥緊拳頭、指甲掐進掌心，繼續說道：\"但這難道就意味著我們要淪為野獸嗎！我說這些，不是要凌駕於你們之上，不是要當一個凌駕於法律之上、凌駕於你們所有人之上的總統。我這麼做是為了你們。因為……\"他想起了自己看過的那些最令人揪心的報告：人們被逼瘋；一位公民抓起刀開始攻擊路人；還有他來的路上目睹的種種爭吵與鬥毆。\"我和你們每一個人一樣。我是俄羅斯人，和正在收看的各位一樣。在這黑暗的時刻，我們必須保持冷靜。\"他希望——不，他祈禱自己的話足夠有力。如果不夠，他不知道還能怎麼辦。\n\n\"因為如果我們繼續下滑、不斷下滑，我們偉大的國家將淪為一片廢墟。\"他的腦海中閃過四分五裂的俄羅斯——崩塌、傾頹，被無數團體與個人為一己之私撕扯殆盡。此生此世，他都努力相信俄羅斯不會倒下……然而即便講話結束，他的腦海深處仍潛伏著一個揮之不去的念頭，一個他知道自己無法戰勝的念頭。"
 RUS_phase_two.4.a:0 "\"求求你們……務必與我共渡難關。\""
 RUS_phase_two.5.t:0 "與時間賽跑"
 RUS_phase_two.5.d:0 "\"眾所周知——\"扎哈羅夫開口了。他事先清了清嗓子，卻彷彿什麼聲音都沒發出來——其實發出來了。他的聲音洪亮，至少在他自己聽來清晰無比。然而環顧內閣會議室，沒有一個人在聽他講話。在他們眼裡，他無異於地板上的一隻螞蟻——沒有目光投向他，沒有尊重。房間裡的其他成員自顧自地交談，有的爭執，有的附和。整個房間彷彿被分割開來，無形的派系界線把它切成一塊一塊——就像他們把他的國家切開一樣。\"眾所周知！俄羅斯正處於——\"\n\n扎哈羅夫再次嘗試，一拳砸在面前骯髒的講台上，木頭彷彿都被這力道砸裂、迸出碎屑。然而，即便他像敲法槌一樣砸拳，也絲毫壓不住這個房間的喧嘩。他們繼續著，彷彿他在短短數日、甚至數個瞬間之內就失去了所有的權力、所有的分量。他掃視全場——這一切必有緣由，必有某個突然引發這一切轉變的源頭。隨即他眯起眼睛，怒不可遏地喊出了一句不像他會說的話：\"你們沒有一個人愛國勝過愛自己嗎！？\"\n\n依然沒有人聽見他。俄羅斯總統，在自己的內閣裡形同幽靈。這時，他的目光落在此刻離他最近的人身上——一個一直在等著接住總統目光的人，等著總統掃視全場之後注意到他。科諾瓦洛夫。時機一到，他清了清嗓子，湊近前來，對總統說出他想說的話。他總有話要說。\"總統先生……恕我直言，我相信我有解決之道。\"就在那一刻——他話音的起伏、語調的下沉，還有科諾瓦洛夫臉上的神情。是他，就是他找到的。顯然如此。扎哈羅夫咬緊牙關，怒意滲入，但他竭力不讓自己沉穩的假面繼續龜裂。他吐出幾個字——與其說是話語，不如說是指控。\n\n\"我早該想到……\"他啐道。他不想說出那個人的名字，但它已在舌尖——一根他隨時可能咬斷的舌頭，所以他不得不說。他盯著他，更像是瞪著他，說完了那句話。"
 RUS_phase_two.5.a:0 "寡頭的運作"
 RUS_phase_two.6.t:0 "寡頭的運作"
 RUS_phase_two.6.d:0 "通往吵嚷內閣會議室的門被利落地推開，開得如此之猛，以至於重重撞上牆壁，彷彿開門者毫不顧惜這棟建築——又或者，他只是想來一場隆重的登場。至少可以說，動靜很大。門甩開後不久，布爾加寧走進房間。他的一切都一如往常，只是這次一隻手拿著一疊文件收在身側。他掃視全場，第一個去的地方是講台——扎哈羅夫總統通常所在的位置。只是這次他不在。布爾加寧輕聲自語：\"扎哈羅夫總統不在？真奇怪……\"他暗自記下。不能把手裡的文件親手呈給總統，這事就少了幾分快意——不過也罷，之後再找他就是。\n\n\"你想幹什麼，布爾加寧——\"房間裡有一名成員出聲，站起來看向布爾加寧。布爾加寧沒有立刻回頭——直到雷鳴般的腳步聲朝房間逼近，隨後從敞開的門湧入室內。接著又是一聲巨響，另一扇門被推開，更多人湧了進來。他們是聯邦警察，目前正受布爾加寧指揮。許多內閣成員開始驚慌，但也有少數幾人全然鎮定——正是那些不在聯邦警察抓捕名單上的人。布爾加寧這才終於轉身，看向那個質問他的人。他一時想不起此人的名字，但這無關緊要。\n\n\"逮捕那些應對ROSMIRES崩潰負責的人。\"布爾加寧平靜地承認道。警察們開始揪住內閣成員，將他們摔倒在地，銬上手銬——對被捕者強制執行，對不從者同樣強制執行。\"豈有此理！\"那名內閣成員瞪著布爾加寧喊道。布爾加寧移開目光，只是看向手中的那疊文件，掃了一秒，然後平靜地解釋：\n\n\"哦，對了……你也是其中之一，不是嗎。\"布爾加寧隨即轉回身去，甚至無需指認，只憑一個眼神，警察便朝那人逼近。布爾加寧對他們下達了簡單的最後命令。"
 RUS_phase_two.6.a:0 "\"把他也拿下。\""
 RUS_phase_two.7.t:0 "內閣改組"
 RUS_phase_two.7.d:0 "\"今天最後一項。\"扎哈羅夫累了，這一點顯而易見。但也許熬過又一場煎熬的內閣會議，他終於可以回家了。不，不是家——他已經好幾年沒回去了。他會去的只有辦公室。至少在辦公室裡，他或許還能歇上一秒。扎哈羅夫在講台上翻動著文件，讀著幾份指令，又抽出另外幾份——一半是為了裝出忙碌的樣子。他早就知道自己要說什麼，也知道該怎麼說。\"經濟部長科諾瓦洛夫、內政部長布爾加寧。即刻起，你們被解除職務。\"\n\n本就安靜的房間霎時死寂，彷彿所有人都被一個他們一百萬年也想不到的變故驚得呆住。許多人花了幾秒、甚至幾分鐘才反應過來他說了什麼。扎哈羅夫恰恰給了他們這段時間，讓正在發生的事滲進他們的腦子。他掃視全場，先看見坐得離他最近的科諾瓦洛夫，又看見布爾加寧——後者明顯壓抑著憤怒與惱意，四下張望著尋找任何當下的對策。扎哈羅夫對這個結果很滿意，繼續說道：\n\n\"新任部長是——\"或者說，扎哈羅夫想要繼續。但他被打斷了——科諾瓦洛夫從椅子上站起，直視著總統，逕自開了口。他總是在說話，這一點扎哈羅夫早已厭倦透頂。\"總統先生。我認為——\"這一次，輪到扎哈羅夫說話了，輪到扎哈羅夫打斷別人了。他終於得以說出這一整年——也許更久——以來一直想說的話。他甚至懶得繼續看科諾瓦洛夫，只是低頭看著自己的文件，用趕蒼蠅一般的語氣說道：\n\n\"閉嘴，科諾瓦洛夫。\"他沒有轉向科諾瓦洛夫去看他的反應，看他消化這句話時的表情。但他聽到了——他聽到科諾瓦洛夫決定坐回原位、就此噤聲的那一刻。這就夠了。他很高興能夠繼續推進、結束這場會議，於是接著說道，把話題拉回正軌："
 RUS_phase_two.7.a:0 "\"如我方才所說。\""
 RUS_civil_war_leadup.1.t:0 "鄂霍茨克港被封鎖"
 RUS_civil_war_leadup.1.d:0 "帕維爾在清晨的濃霧中跋涉，濕氣滲進他磨破的靴子。這座曾經繁榮的東俄羅斯樞紐如今一片蕭索，金屬貨櫃的鏗鏘聲在空無一人的碼頭間迴盪。他佈滿老繭的雙手攥著一壺油膩的咖啡，蒸汽在霜寒的空氣中與他的呼吸交融。海水的鹹腥味裡，摻著籠罩全城的苦澀絕望的氣息。\n\n轉過街角，帕維爾的目光落在昔日同事們焦慮的臉上。通知毫無預警地降臨，一則冰冷的告示貼滿了辦公室的窗戶：\"即刻裁員60%。\"這幾個字已刻進港口每一位工人的心裡。此刻他們擠作一團，那份集體的恐懼，與近旁翻湧拍岸的大海何其相似。\n\n帕維爾踏上一只倒扣的板條箱——他即興演說的臨時講台——開口道：\"兄弟姐妹們，今天我們站在這裡，不是作為區區碼頭工人，而是作為這個偉大國家的脊梁！多年來，我們為朋友、為家人……為孩子們盡了自己的本分……\"他的神思微微飄遠，隨即，信念在他心中熊熊燃起。\n\n\"但今天，我們受夠了！\"他咆哮道。\"我們在天寒地凍中辛勞，把血汗獻給了這座港口，換來的是什麼？是朝不保夕！是背叛！我們的政府視而不見，克里姆林宮裡的肥貓卻用我們的血汗錢中飽私囊！\"人群被這番話攪動起來，張張面孔因憤怒與絕望交織而扭曲。\n\n\"是我們挺身而出的時候了！\"他高舉拳頭喊道。\"我們不會被噤聲！我們不會被遺忘！我們要求正義！\"人群爆發出一片附和的喧騰，集體的怒火匯成咆哮。『罷工』一詞如野火般蔓延，從一個憤怒的工人傳到下一個，直到一句新的口號迸發而出。先是緩緩的，繼而如雷霆轟鳴，迴盪在鄂霍次克霧氣瀰漫的街道上……\n\n\"為了尊嚴！為了我們的未來！為了N.R.M.！\""
 RUS_civil_war_leadup.1.a:0 "我們需要將其扼殺在萌芽狀態。召集我的內閣。"
 RUS_civil_war_leadup.2.t:0 "混亂的內閣"
 RUS_civil_war_leadup.2.d:0 "在克里姆林宮靜謐的深處，輕柔的滴答聲在宏偉的長廊間迴響。空氣中飄著皮革封面文件的氣味，還有一絲隱隱的躁動——與眼下的恐慌局勢形成微妙的反差。弗拉迪斯拉夫·扎哈羅夫總統大步走進會議室，迎接他的是一片混亂：他的各部部長們手忙腳亂地翻著文件、對著電話嘶喊，拼命想撲滅正在吞噬他們紙牌屋的大火。\n\n\"聽著，我們不能也不該試圖為所有人紓困，那樣做我們全都會破產。市場的法則就是必須靠拼搏才能生存，救濟只會削弱所有人——就算我們想救也救不起。紓困的機會窗口是在ROSMIRES倒下的時候，而那次我們沒能阻止……\"經濟部長科諾瓦洛夫喊道，在部裡的電話和他私人股票經紀人的電話之間來回奔忙。\n\n扎哈羅夫總統向後靠進椅子，眯起眼睛。\"局勢我清楚，科諾瓦洛夫。我不清楚的是你解決它的方案是什麼。時間就是金錢，而我們的國家兩樣都在流血。\"\n\n科諾瓦洛夫定了定神，扶正領帶，恢復了幾分鎮定，他那通還沒掛斷的電話裡仍傳出叫嚷聲。\n\n\"很簡單：撤出那些虧損的投資。遠東早就是個無底洞，它的增長潛力多年前就枯竭了，純粹是死重。砍掉我們臃腫的補貼，把錢用來止住財政的失血。\"\n\n扎哈羅夫轉過頭，用惱怒而冷峻的目光看著這個人：\"那可是我們至少四分之一的公民、三分之一的國土。你不能像甩掉一家業績不佳的子公司那樣甩掉它……\"\n\n內政部長布爾加寧摔下那部一直對著他耳朵嘶吼的電話，插話道：\"我很不情願替科諾瓦洛夫說話，但恐怕那也不會讓局勢糟到哪裡去。地方官員們要麼提著一袋袋政府的錢坐上了飛往澳大利亞的航班，要麼正把自己關起來抵擋暴民。\"布爾加寧定了定神，繼續道：\"那些腐敗的鼠輩大多是自作自受，但我們還有牌可打。伊格納托夫和梅特維傑夫沒有伸手撈錢，也不被民眾憎恨。我相信可以說服他們履行愛國義務，與人民重建哪怕一絲信任。\"\n\n總統唯一的回應，是一聲嘆息……"
 RUS_civil_war_leadup.2.a:0 "看來我們別無選擇。通知伊格納托夫和梅德韋傑夫，告訴他們我祝他們好運。"
 RUS_civil_war_leadup.3.t:0 "內戰得以避免！"
 RUS_civil_war_leadup.3.d:0 "unfortunatelty, this isn't intended right now, we have nothing for this path\n\nwhich means the civil war has to happen, good job anyway."
 RUS_civil_war_leadup.3.a:0 "去你的。"
 RUS_civil_war_leadup.4.t:0 "歷史的倒計時"
 RUS_civil_war_leadup.4.d:0 "參議員費奧多爾·伊格納托夫與艾哈爾·梅特維傑夫坐在鄂霍次克市長謝爾蓋·索羅金陳設簡樸的辦公室裡，窗外映著一幅動盪的圖景。清冽的秋日空氣中傳來遠處人群不安的低語，他們的聲音匯成有節奏的呼喊：\"為了尊嚴！為了我們的未來！為了NRM！\"抗議者的隊伍秩序井然地行進著，標語牌起起伏伏，如一片不滿的浪海。索羅金的目光掃視著這一幕，流露出一絲對窗外民眾的同情。\n\n當視訊螢幕亮起、顯出兩個身影時，等待結束了：憔悴疲憊的涅留恩格里市長鮑里斯·尤舒科夫，與他形成對比的是堅毅沉著的憲兵維克多·科佐洛夫上校。\n\n\"好，人都到齊了。感謝兩位參議員的到來，希望你們的到場與努力能幫助穩定局勢。\"索羅金說著，從窗邊轉向落座的參議員與螢幕上的來賓。\"抗議越來越嚴重了。局勢本就糟糕，而這次崩盤更把絕望的人潮成批推進了NRM的懷抱。我和運動裡的同僚談過，但他們也很難讓民意保持冷靜、導向變革……我擔心一旦希望盡失，局勢會演變成暴力起義。\"\n\n上校提及他的N.R.M.成員身份時，索羅金為之一凜。\"恕我直言，我們認為您親愛的『同僚』們可能正在積極鼓動分離。坦白說，他們若無視這個機會才是傻瓜。\"\n\n索羅金揮開了這句話：\"不管你們怎麼擔心，NRM始終只以和平方式爭取自治與代表權。我若想要革命，早就上街煽動仇恨了，何必坐在這裡？我讓警察保持距離只是為了避免衝突，我對人群喊的話從來都是呼籲冷靜與和平。鮑里斯也採取了類似措施穩住局面——雖然我希望我這位朋友能走得更遠些……\"\n\n\"理想主義和激進主義是年輕人的遊戲，謝爾蓋。\"鮑里斯·尤舒科夫插話道，\"那不是我想玩的遊戲，我也不想拿妻兒的性命去冒險。讓我說清楚：我做這些，是出於對和平的渴望，是為了償還選民對我的託付——哪怕他們為此唾棄我。\"\n\n伊格納托夫抬手示意安靜，中止了這場爭論。\"我看得出，這場危機對每個人都很艱難。我由衷感謝你們三位穩定了當前的局勢，而且我相信我們幫得上忙。\"伊格納托夫示意同僚梅特維傑夫接著說。\"問題在於，這場危機既是地方的，更是全國的。無論你們如何盡心竭力，人民依然因莫斯科的無能而挨餓。我認為這場危機恰恰是一個契機，讓我們終結數十年來的停滯。現狀已在自身的重壓下崩塌，如今我們別無選擇，只能求變。我們只需要讓人民知道：行動終於要來了。\"\n\n所有人都期待地望向上校。他嘆了口氣，答道：\"我會為你們安排一場演說。但為了你們自身的安全，我必須要求你們在鄂霍次克港海軍基地等候，我的人會送你們過去。\""
 RUS_civil_war_leadup.4.a:0 "兩位參議員微笑著走出辦公室，朝向歷史邁出了最後一步，無論是好是壞……"
 RUS_phase_two.8.t:0 "緊急狀態！"
 RUS_phase_two.8.d:0 "科諾瓦洛夫聽得見自己的腳步聲在走廊裡迴盪，步伐分毫不亂。他望向前方，看到了他要進的那扇辦公室的門——那扇他已進出過無數次、但也許再也不必進入的門。門上金色銘牌上的字簡單明瞭：『總統辦公室』。一走到門前，他精準地握住門把，轉到恰到好處，推門而入。\"總統先生。\"\n\n他一到便開口，這才看清室內的景象：辦公室光線昏暗，一盞燈都沒開，窗外傾瀉進來的光在科諾瓦洛夫身上投下陰影。他循光望去，看到了光源前的人——扎哈羅夫坐在椅子上，背對著他，望著窗外的莫斯科。\"科諾瓦洛夫……我早該料到是你。又來提你的什麼方案了？\"總統轉過椅子。這個人看上去徹夜未眠，眼下掛著烏青，平日一絲不苟的深藏青西裝上沾著塵土與磨痕。科諾瓦洛夫難得地露出一絲揶揄的笑，這一次對總統說道：\n\n\"正是。這次的很簡單。\"他細細品味著自己吐出的每一個字，享受著把這些話送到這個男人面前的時刻。他苦心經營、拼命追求的東西終於到手了，而他還能親眼看著、親口告訴這個一路上「幫助」過他的落敗之人。\"授權你全權處理經濟復甦？\"看來科諾瓦洛夫沒能親口說出那些話——扎哈羅夫替他說了。總統雙臂撐上桌面，十指死死絞在一起。但這對科諾瓦洛夫來說效果一樣好，他笑得更燦爛了，得以迅速接話：\"很高興你明白。\"說完，他關上了門，懶得再與那人繼續交談——儘管扎哈羅夫還在說著什麼，在那間幾乎全暗的房間裡喃喃自語。"
 RUS_phase_two.8.a:0 "\"你我都清楚……我別無選擇。\""
 RUS_phase_two.9.t:0 "國家財政委員會"
 RUS_phase_two.9.d:0 "\"布爾加寧。\"聽到這聲呼喚，那人抬眼望去。他剛剛穿過橫在他與頹然的扎哈羅夫總統之間的重重警察。此刻的總統癱坐著，垂著頭，望著結霜的地面和自己髒污的黑靴。他坐在一張石凳上。布爾加寧環顧四周，認出了這座公園的景致，以及莫斯科附近那棟政府大樓——他和扎哈羅夫都是從那裡逃出來的。\n\n\"扎哈羅夫總統。\"布爾加寧的語氣輕柔，卻帶著一絲堅硬。他來之前就想好了要說什麼，而且看得出扎哈羅夫也心裡有數——否則他不會頹喪成這副模樣。總統的聲音透著空洞與悲哀，連開口都像是白費力氣：\"是來伸出援手的？\"從某種意義上說，這個問題問得沒錯。布爾加寧得承認，他確實是要提供幫助。但他知道，那不是為了扎哈羅夫，也不是為了他的任何希望。他嘆了口氣，看著自己呵出的白霧被風捲走。\n\n\"不。就在我們說話的當口，我的人正接手領導內閣——而你卻坐在這裡自怨自艾。\"他的話鋒利，也精準。他那些彷彿醞釀了無數歲月、在問題初現時便已就緒的計劃，此刻正在付諸實施——為他自己，也為其他人。總統似乎哽住了，喘息著呻吟道：\"我在努力，布爾加寧。我努力過……我只是。\"布爾加寧一直以來認識的那個人——那個堅忍的、挺身填補自己並不想要的位置的扎哈羅夫——已經不在了。取而代之的是：\"我只是不知道還能撐多久……\"一個被擊敗的人，一個破碎的人。一個心中只剩最後一點微弱火花的人。"
 RUS_phase_two.9.a:0 "\"我可以再試試……\""
 RUS_phase_two.10.t:0 "扎哈羅夫的希望"
 RUS_phase_two.10.d:0 "\"布爾加寧和科諾瓦洛夫呢？\"扎哈羅夫敲著桌子問道，竭力保持聲音平穩，不流露擔憂與不安。與此同時，他一邊收拾著自己的辦公桌與辦公室，一邊聽祕書向他匯報消息。他不時瞥對方幾眼——這個年輕人比扎哈羅夫年輕得多，看上去既太年輕又太稚嫩。但正是這副長相，讓他騙過了那麼多人，讓人只當他是個普通祕書。\n\n\"閣下，他們各自都在試圖掌控局面。他們的注意力不在您身上，正在互相撕咬。\"扎哈羅夫點了點頭。這對他和國家而言都是最好的局面——即便它利用的是他們認定扎哈羅夫已一蹶不振、掀不起風浪的事實。\"很好，這能讓他們誰都無法獨攬大權。\"終於，扎哈羅夫拉開側櫃的一個抽屜，取出一只早已收拾妥當、隨時可以出發的行李箱。儘管他看起來狼狽不堪——西裝上積著塵土，那不僅來自收拾屋子，也來自一個個和衣而眠的不眠之夜——他卻比任何時候都更加準備就緒。\n\n\"閣下……您要去哪裡？\"助理注意到他的神情，注意到那只行李箱，明白了那意味著什麼。扎哈羅夫走上前，把辦公室的鑰匙交到他手中。只要有得選，扎哈羅夫不打算在這間辦公室多待一分鐘。他要去拯救他的國家，用如今僅剩的方式、僅剩的希望去幫助他的人民。\"準備好我給E.U.的信函，並在此事了結後安排一趟巴黎之行。\"他帶著助理向門口走去，心中認真思忖著：他能否做到？這是否就是他一直以來的使命？又或者，這只是在彌補當初的過錯？他沉吟著，最後轉過身，久久地看了辦公室最後一眼——要麼帶著一個復興的俄羅斯回來，要麼永遠不再回來。他輕聲自語。"
 RUS_phase_two.10.a:0 "\"我做得到……列別傑夫。\""
