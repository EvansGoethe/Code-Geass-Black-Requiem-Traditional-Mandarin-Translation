 RUS_Zhakarovs_Presidency:0 "扎哈羅夫的總統任期"
 RUS_Zhakarovs_Presidency_desc:0 "對於俄羅斯政府來說，一個新的總統任期意義不大，因為當總統受制於一部旨在使他的國家停滯不前的不可修改的憲法時，他究竟真正掌握著什麼權力？在大戰和簽署《明斯克協議》之後，我們的憲法一直被歐洲威脅。由於無法修改自己國家的憲法，扎哈羅夫的總統能力將受到阻礙，共和國的穩定將受到考驗。"
 RUS_Lebedevs_Legacy:0 "列別傑夫的遺產"
 RUS_Lebedevs_Legacy_desc:0 "接過前外交部長阿列克謝·列別傑夫的衣缽，扎哈羅夫的目標是維護俄羅斯內部的穩定與統一，因為一個四分五裂的國家很難被稱為一個國家。為了實現這一目標，與歐盟緊密合作已成為首要任務。通過一些巧妙的外交，也許我們可以修改《明斯克協議》，使俄羅斯憲法重新變回俄羅斯人自己的憲法。"
 RUS_Chernikovs_Spectre:0 "切爾尼科夫"
 RUS_Chernikovs_Spectre_desc:0 "儘管不再在政府任職，前總統切爾尼科夫在改革派中仍然很受歡迎。他的經濟改革思想堅決反對腐敗——這是俄羅斯政府可以學習的。然而，切爾尼科夫在過去曾試圖取消任期限制，並賦予總統比地方州長更多的權力，這無疑表現出了威權主義傾向，儘管有人可能會認為當前的權力分配從根本上是不平衡的。"
 RUS_Saint_Petersburg_Cliques_Shadow:0 "聖彼得堡集團的陰影"
 RUS_Saint_Petersburg_Cliques_Shadow_desc:0 "聖彼得堡集團是由來自聖彼得堡的寡頭組成的。該集團認為他們自身的利益高於國家的利益。儘管如此，由於改革和自由市場的承諾，對他們的支持繼續增長。如果政府承諾的改革失敗，聖彼得堡集團的聲望只會上升。人民要求改變。"
 RUS_Growing_Opposition:0 "日益壯大的反對派"
 RUS_Growing_Opposition_desc:0 "對現政府的怨恨顯然很高。俄羅斯保持著停滯，人民對此有所改變抱持微弱希望。《明斯克協議》再次成為我們的眼中釘，如果我們希望重獲人民的信任，就必須儘快將其拔除。它的拔除取決於我們與歐洲的關係如何發展，以及我們能否修改我們的憲法。"
 RUS_Talking_To_Banks:0 "與銀行對話"
 RUS_Talking_To_Banks_desc:0 "我們國家欠歐盟巨額債務和賠償。其中大部分是通過一個非常複雜且脆弱的延期貸款網絡進行維護的，這些貸款橫跨在各個歐盟國家之間，這是我們前幾屆政府做出的巨大外交努力。現在列別傑夫走了，我們需要與我們的債權人談談，並向他們保證我們不會賴債。"
 RUS_Suggest_Euro_Ruble:0 "再次提議歐洲盧布"
 RUS_Suggest_Euro_Ruble_desc:0 "像大多數歐盟國家一樣，我國使用歐元作為貨幣。雖然它對歐洲大部分地區而言強大且可靠，但已被證實對我們的經濟是災難性的。我們對自己的貨幣政策毫無控制權，這扼殺了我們的出口業。我們提出的解決方案是建立我們自己的貨幣，與歐元掛鉤但貶值以幫助我們的經濟。列別傑夫政府此前曾拒絕這一倡議，但我們可以再次嘗試說服歐盟。列別傑夫說過他為我們磨損了他們的銳氣，對吧？"
 RUS_Foreign_Currency_Acquisitions:0 "外幣收購"
 RUS_Foreign_Currency_Acquisitions_desc:0 "在又一輪失敗的談判後，我們被迫採取替代的權宜之計來刺激我們的經濟。外交部長切爾諾夫決定收購外幣，尤其是日圓，以使我們的貿易結算多樣化，擺脫僅使用歐元的局面。"
 RUS_Federal_Council_Grasp:0 "聯邦委員會的掌控"
 RUS_Federal_Council_Grasp_desc:0 "拜明斯克協議所賜，聯邦委員會握有的權力凌駕於我國政府的任何其他職位與機構之上，以至於總統若不先取得參議員們的批准，連改革都無法推行。這套體制無可爭辯地是俄羅斯政治嚴重停滯的罪魁禍首。我們必須立即終結它。"
 RUS_Deal_Art:0 "交易的藝術"
 RUS_Deal_Art_desc:0 "聯邦委員會是一個由不合理的憲法扶植起來的阻礙改革的怪獸，該憲法賦予了坐擁分肥政治王座的地方親信巨大權力。我們準備了談判崩潰時的應對預案，但我們不妨先嘗試正常、禮貌的方式。"
 RUS_Digging_Dirt_Laundry:0 "深挖他們的髒污底細"
 RUS_Digging_Dirt_Laundry_desc:0 "談判可能失敗了，但即使已經去世，列別傑夫依然發揮了作用。《斯塔尼斯拉夫檔案》為我們提供了關於高級聯邦議員最完整的黑歷史（kompromat）收集。這應該能讓我們通過勒索和脅迫的方式來建立一個正常運作的政府。這不是最乾淨的治理方式，但它有效。"
 RUS_Adressing_Sakuradite_Drift:0 "應對向櫻石的轉型"
 RUS_Adressing_Sakuradite_Drift_desc:0 "時代在變。世界不再如此沉重地依賴來自中東的石油，而是依賴日本的櫻石。如果我們渴望扭轉厄運並實現經濟復甦，我們就應該擁抱未來。隨著世界上最大礦業公司之一掌控在我們手中，我們終於處於可以開始與日本就其櫻石達成協議的地位。"
 RUS_Japanese_Proposal:0 "日本提案"
 RUS_Japanese_Proposal_desc:0 "ROSMIRES集團是俄羅斯最大的礦業公司，是我們在日本櫻石交易中可以打出的一張王牌。如果他們接受，我們將獲得我們協助他們開採的櫻石利潤份額。ROSMIRES集團的專家擁有京都所沒有的經驗和工具。即使只是很小的一部分利潤份額，也足夠讓我們重回正軌。"
 RUS_Negotiations_Kyoto:0 "開啟與京都的談判"
 RUS_Negotiations_Kyoto_desc:0 "京都已同意聽取我們的意見，儘管季諾維和桐原之間基本上已經達成了櫻石交易的共識。"
 RUS_Shifting_Economy:0 "經濟轉軌"
 RUS_Shifting_Economy_desc:0 "幾十年來，我們的增長一直停滯不前，我們的經濟任由能源開採和歐盟財政政策擺佈。許多總統都試圖打破這個循環，但沒有人成功。雖然櫻石交易可能會緩解我們的經濟困境，但將我們剩餘的財富投資到某個地方仍然是明智之舉。"
 RUS_European_Deals:0 "歐洲交易"
 RUS_European_Deals_desc:0 "面對構成歐盟核心的龐大企業集團，俄羅斯的工業一向無能為力。戰爭、賠款和財政政策抹去了我們在製造業中曾經擁有的相對優勢。剩下的只有我們廉價的勞動力，而荒好有許多歐洲企業集團願意與我們達成有利可圖的交易，以利用我們較不嚴格的工業法規和低廉的工資……"
 RUS_bmg_car_plants:0 "BMG汽車廠"
 RUS_bmg_car_plants_desc:0 "柏林汽車集團股份有限公司（Berlin Motor Group AG，通常被稱為BMG）是歐洲最知名的企業之一，其汽車在從里斯本到莫斯科的高速公路上隨處可見。憑藉著滿足整個大陸對汽車源源不斷的需求所積累的財富，他們尋求更便宜的工廠建造地點，因此表示有興趣在俄羅斯開設一些工廠。"
 RUS_malcal_group_energy:0 "馬爾卡集團能源"
 RUS_malcal_group_energy_desc:0 "法國家族所有的馬爾卡集團在整個大陸擁有多元化的資產，最近表示有興趣收購歐洲能源市場。鑑於北海能源在該地區的主導地位，他們的努力大多未能取得任何成果，因此他們越來越渴望挽救其子公司。如果我們同意停用北海能源，馬爾卡家族願意投資我們的燃料基礎設施並以低廉的價格生產國內能源。"
 RUS_eec_electronics:0 "EEC電子"
 RUS_eec_electronics_desc:0 "作為歐洲國內電腦市場的主宰，總部位於布拉格的「歐洲電子公司」（通常被稱為EEC）在過去幾十年中迅速崛起為經濟巨人，與有數百年歷史的工業卡特爾競爭。雖然他們的運作方式時尚且高科技，在軟體和硬體創新方面領先世界。然而，他們在滿足對其設備的需求方面遇到了困難，需要將硬體生產轉移到更便宜的地方。對我們雙方來說幸運的是，我們可以提供。"
 RUS_Long_Term_Adaptations:0 "長期適應"
 RUS_Long_Term_Adaptations_desc:0 "雖然我們與歐盟公司的夥伴關係為我們的增長帶來了立竿見影的推動，但這充其量只是我們疲軟經濟的短期興奮劑。如果我們想打破停滯和衰退的循環，我們需要一個長期計劃來治癒我們的經濟頑疾。"
 RUS_Siphoning_Wealth:0 "虹吸財富"
 RUS_Siphoning_Wealth_desc:0 "歐洲人在經濟上向來無意公平競爭；受制於條約與經濟慣性，我們根本沒有靠正當手段取勝的可能。既然他們玩陰的，我們也可以。既然無法在歐洲治下創造財富與增長，我們就只好把資源從他們腳下「引誘」過來。歐洲的眾多企業支撐著它的增長與經濟實力。這對各方而言大多互利共贏——除了一件事：稅。"
 RUS_Corporate_Heaven:0 "企業避稅天堂計劃"
 RUS_Corporate_Heaven_desc:0 "歐洲經濟圈日益緊密，使得避稅的嘗試越來越困難。然而，如果我們宣佈免除在俄企業的稅賦，只收取一些「居留費」，我們應該就能把歐洲的大批企業精英引誘到聖彼得堡和莫斯科來。我敢肯定，只要稅夠低，他們不會介意這裡的嚴寒。"
 RUS_Partnership_Plan:0 "夥伴關係計劃"
 RUS_Partnership_Plan_desc:0 "別理會改革派的犬儒者，也別理會聖彼得堡集團的投機客——我們與歐洲的關係正在逼近轉折點。憲法改革、經濟條約、貨幣主權的每一次嘗試，是否都在歐洲理事會被否決了？是的。但每一次，差距都在縮小。隨著越來越多的利益方意識到一個復興的俄羅斯留在EU勢力圈內何等有利，全票反對已變成了勉強過半的「否」。"
 RUS_Currency_Negotiations:0 "加緊貨幣談判"
 RUS_Currency_Negotiations_desc:0 "如果我們想要一個在歐盟內部發揮作用的經濟體，我們就需要控制自己的貨幣。列別傑夫的這一夢想將由扎哈羅夫來完成，談判將宣告結束。我們已經確保了與德國議員的協議，雖然法國人可能不會為之所動，但我們可能可以確保與多瑙河集團的協議。如果我們再爭取到一個大型投票集團，我們將能夠獲得進行變革所需的多數票。"
 RUS_Working_Within_The_System:0 "在體制內運作"
 RUS_Working_Within_The_System_desc:0 "歸根結底，我們身處歐盟，因此我們必須按照其遊戲規則行事。通過外交或其他手段，我們將加強我們在歐洲經濟圈中的地位。諸如單方面退出或能源部門進一步停滯之類的幻想已被拋棄，相反地，我們將在歐洲掌握可行性藝術。"
 RUS_Bounty_Russia:0 "俄羅斯的物產"
 RUS_Bounty_Russia_desc:0 "祖國俄羅斯正在流失財富，其土地和水域之下埋藏著歐亞大陸上最豐富的一些礦產和能源礦床。我們可以用歐盟合作或多樣化的宏偉計劃來欺騙自己，但歸根結底，我們的財富不可避免地與我們的開採經濟和ROSMIRES集團綁定在一起。不妨把我們所做的事情做好……"
 RUS_Dig_Deep:0 "深挖，貪婪地挖"
 RUS_Dig_Deep_desc:0 "我們擁有歐盟中最大的領土和迄今為止最豐富的資源，儘管如此，這還不夠。非洲在礦產上正將我們邊緣化，而北海也在能源生產上與我們抗衡。我們目前利用的只是未開發財富的一小部分，如果我們要成為岩石和礦石的主宰，我們必須挖得更深、更飢渴。"
 RUS_Oil_Flow_Faster:0 "讓石油流得更快"
 RUS_Oil_Flow_Faster_desc:0 "雖然櫻石是一個新興的能源市場，但石油目前在歐盟仍然是王者，並且是我們僅次於天然氣的最大能源。當我們可以開採十倍的石油且成本減半時，浪費巨大的精力去開採我們僅有的一點點櫻石是沒有意義的。"
 RUS_Siberia_For_Sakuradite:0 "搜遍西伯利亞尋找櫻石"
 RUS_Siberia_For_Sakuradite_desc:0 "雖然我們永遠無法與日本富士山的礦藏相比，但我們可以與規模較小的櫻石生產國平起平坐。ROSMIRES的地質調查表明，我們在東部擁有具有經濟意義的礦藏。這將是昂貴且緩慢的，但對歐盟來說，進入櫻石市場很可能會非常有利可圖。"
 RUS_New_Markets:0 "新市場？"
 RUS_New_Markets_desc:0 "我們總是有能源過剩。石油和天然氣產量巨大，我們經常向歐盟能源市場提供很大一部分份額，但仍有過剩的可以出售。幸運的是，能源辦公室已經提出了3個可能的貿易計劃來出售我們龐大的過剩能源。"
 RUS_Playing_It_Safe:0 "穩紮穩打"
 RUS_Playing_It_Safe_desc:0 "鑑於三大超級大國之間的敵意以及偶爾轉向經濟保護主義，與歐洲進行貿易是最安全的。這不僅因為我們處於歐洲經濟圈而免徵關稅，而且這是我們擁有最多貿易經驗的地區。與歐洲的交易雖然不是暴利，但很可能是一筆安全的投資。"
 RUS_BALTLINE_Project:0 "波羅的海線項目"
 RUS_BALTLINE_Project_desc:0 "我們的大部分石油和天然氣貿易都是通過陸路管道經由波蘭和羅馬尼亞向歐洲其他地區進行的。這些管道為我們提供了很好的服務，但現在是擴展我們出口能力的時候了。我們的工程師建議建立一條貫穿波羅的海海底直達德國的海底天然氣管道，這將極大地擴大我們與歐洲的能源出口能力。"
 RUS_Risky_Ventures:0 "有風險的投機"
 RUS_Risky_Ventures_desc:0 "與中國打交道有風險，但不太危險。與不列顛尼亞相比，歐洲與中國的關係要冷淡得多，且不像與不列顛尼亞那樣容易發生對抗。中國對能源的需求也在不斷增長，其國內部門正努力跟上需求的步伐。雖然風險更大，但滿足中國對能源的飢渴有更多的錢可賺。"
 RUS_Sino_Kazakh_Pipeline:0 "接入中哈輸油管線"
 RUS_Sino_Kazakh_Pipeline_desc:0 "俄羅斯與中國之間不存在直接的石油或天然氣管道，我們打算改變這一點。如果我們與中哈管道相連，我們就可以開始向中國經濟體高效供應石油，從而獲得巨大的利潤。唯一的問題是歐盟的反對，以及哈薩克是一個由土匪控制的荒地，歷史上很難在其中修建管道。然而，如果我們成功了，中國也會為幫助穩定其動盪的邊境付出同樣豐厚的報酬。"
 RUS_Dangerous_Gamble:0 "危險的賭博"
 RUS_Dangerous_Gamble_desc:0 "鑑於目前歐盟對不列顛尼亞實施的制裁，與他們進行能源貿易無異於叛國。雖然與中國的交易會遭到反對，但這筆交易必須秘密進行，因為擔心我們會遭到報復性制裁，甚至可能面臨歐盟的逮捕令。然而，鑑於不列顛尼亞目前在貿易戰中遭受的打擊，在三個超級大國中，他們顯然最願意為能源支付最高的價格。"
 RUS_Arctic_Shipping_BRT:0 "至不列顛尼亞的秘密北極航運"
 RUS_Arctic_Shipping_BRT_desc:0 "由於我們官方不被允許與不列顛尼亞進行貿易，我們被迫使用權宜船旗系統和大量的官僚欺騙來逃避制裁。使用註冊在空殼公司的澳大利亞籍船隻，我們應該能夠在沒有人注意到的情況下，通過北極將石油和天然氣運往不列顛尼亞，希望如此……"
 RUS_Diversify_Our_Economy:0 "使我們的經濟多樣化"
 RUS_Diversify_Our_Economy_desc:0 "俄羅斯的經濟過度依賴其能源和礦業部門。如果像ROSMIRES這樣的公司陷入困境，俄羅斯就會陷入困境。這種經濟依賴不利於我們的穩定，因此憲民黨各派系的許多人物一直在爭論我們的投資應該多樣化。"
 RUS_Protect_Ural_Steel_Industry:0 "保護烏拉鋼鐵工業"
 RUS_Protect_Ural_Steel_Industry_desc:0 "我們在烏拉地區的鋼鐵生產是我們僅存的一些重工業之一。在東部雇用了數十萬人。他們大多保持著營運，但魯爾最近的創新威脅到了烏拉作為主要煉鋼中心的地位。如果他們要與歐洲保持競爭力，他們將需要巨額補貼。"
 RUS_Far_Eastern_Zoning_Rules:0 "放寬遠東分區規劃規則"
 RUS_Far_Eastern_Zoning_Rules_desc:0 "遠東的許多開發項目，都被迷宮般的分區與保護法規所扼殺——那些法規保護的是地方土豪，服務的是狹隘的「別建在我家後院」的私利。只要在聯邦層面稍加運作，我們就能掃除這些阻礙遠東發展的條例，終於給那片窮鄉僻壤帶去一點工業。"
 RUS_Tax_Rules_Saint_Petersburg:0 "聖彼得堡稅收特例"
 RUS_Tax_Rules_Saint_Petersburg_desc:0 "科諾瓦洛夫聽到他將聖彼得堡轉變為免稅自由港的計劃終於獲得批准，一定會欣喜若狂。即使這是對他集團的巨大讓步，它將帶來的資金以及我們最大城市之一將經歷的增長是不可否認的。"
 RUS_Grand_Plans:0 "宏大計劃"
 RUS_Grand_Plans_desc:0 "我們的短期計劃已經開始支付股息。事實證明，多樣化是可以發揮作用的，但是如果我們想真正打破經濟停滯的循環，我們需要一個更大的舉措。這將是困難的，但如果我們牌打得對，我們可能會控制一個可以與歐洲競爭並結束能源依賴的新興產業。"
 RUS_Undercutting_Competition:0 "低價擊垮競爭對手"
 RUS_Undercutting_Competition_desc:0 "對我們來說，在技術或質量上超越歐洲是困難的，這是他們掌握了幾個世紀的遊戲。然而，我們可以做一件他們做不到的事。我們可以把它做得很便宜，並且批量生產。我們的經濟學家相信，如果我們利用我們廉價的勞動力和製造性能，我們有可能用廉價的鋼鐵淹沒歐盟市場，並削弱歐盟大多數鋼鐵廠的競爭力。"
 RUS_Merge_Steel_Corps:0 "合併鋼鐵企業"
 RUS_Merge_Steel_Corps_desc:0 "如果我們要在他們的自己鋼鐵市場削弱歐洲的競爭力，我們需要有凝聚力。我們將發起一項由國家主導的對我們分散的鋼鐵利益的收購，並將它們統一起來，組成一個單一的俄羅斯鋼鐵企業集團。從那裡我們可以協調和擴大我們的生產，並以歐洲任何國家都無法競爭的價格製造鋼鐵。這需要時間，但如果成功，歐洲的整個經濟格局將會改變，因為我們將成為其第四個經濟支柱。"
 RUS_Future_Planning:0 "規劃未來"
 RUS_Future_Planning_desc:0 "歐洲可能擁有先進的技術，那我們為什麼不能有。通過正確的投資和激勵措施，我們可以逆轉我們輕微的人才流失，並吸引回許多聰明且有才華的工程師和科學家。如果我們協調他們的努力，我們可能能夠利用俄羅斯的企業精神和創造力，在高端技術市場發起一次出其不意的進軍。"
 RUS_Founding_Rosdevtec:0 "創立俄羅斯發展技術公司"
 RUS_Founding_Rosdevtec_desc:0 "如果我們想要協調資金和專利權益，我們需要一個聯合的國家技術開發公司。Rosdevtec將會是那家公司。在其旗幟下，我們將團結俄羅斯的創新者和創造者，讓他們在技術開發中盡情發揮。這是每個人最意想不到的事，但我們不能利用技術革命的想法是有偏見的，有什麼能阻止我們製造出極好的電腦？"
 RUS_Breaking_Out_System:0 "衝破體制"
 RUS_Breaking_Out_System_desc:0 "我們的計劃正在緩慢但切實地推進。沒有任何事情爆炸或崩潰，這比我們過去為多樣化做出的許多努力都要好。整個經濟部門都洋溢著希望，這一次它將會起作用。雖然我們以前吃過虧，但這一次感覺有些不同……"
 RUS_Internal_Reforms:0 "內部改革"
 RUS_Internal_Reforms_desc:0 "既然我們已經啟動了我們的經濟議程，我們現在可以專注於法律與秩序的內部問題。我們的聯邦體制癱瘓了我們處理內部安全問題的能力，因為地方警察部隊往往腐敗得令人震驚或資金不足。隨著危險活動家和激進分子的崛起，我們需要在這種情況失控之前對其進行控制。"
 RUS_Federal_Police_Funding:0 "聯邦警察資金"
 RUS_Federal_Police_Funding_desc:0 "聯邦警察是莫斯科政府的執法機構。他們公然存在是為了調查針對政府的犯罪以及各區域內的跨境犯罪。雖然相當敬業且訓練有素，但他們經常遇到資金問題和管轄權問題，這損害了他們的士氣和效率。提高他們的預算無疑將釋放改變的訊號。"
 RUS_Federal_Office_Powers:0 "增強聯邦辦公室權力"
 RUS_Federal_Office_Powers_desc:0 "利用我們在聯邦委員會新獲得的「影響力」，我們應該能說服他們對聯邦警察的調查與行動更加配合。通過一部管轄權改革法，聯邦警察便可展開任何調查——無論案件是否跨區，是否針對政府。反正協助地方警察，本就是天經地義……"
 RUS_Equipment_Upgrading:0 "升級他們的裝備"
 RUS_Equipment_Upgrading_desc:0 "隨著他們新獲得的職責，我們也應該增加聯邦警察的裝備預算。調查現在將可以使用新的電子監控設備，戰術單位現在將可以使用軍隊剩餘的物資。我們還通過向法國警方購買新裝備來加強了暴亂控制，法國警方是該領域的專家。"
 RUS_Targeted_Operations:0 "有針對性的行動"
 RUS_Targeted_Operations_desc:0 "既然我們已經改革並召集了聯邦警察，使其在我們針對內部問題的戰爭中成為一支忠誠且有效的力量，我們現在可以讓他們放手去對付一些特別有問題的團體。這些初步的調查和行動將為我們更新的力量提供一個引以為豪的測試案例。"
 RUS_Target_Activists:0 "針對破壞性的活動家"
 RUS_Target_Activists_desc:0 "在西俄羅斯有許多令人頭疼的親民主煽動者。這些人煽動針對我們合法政府的暴力，指責我們腐敗。即使他們部分正確，他們也對憲民黨（KDPR）構成了威脅，或者更確切地說，對政府的穩定構成了威脅。如果這些團體到處奔走激起反對，我們就無法實施真正的變革。"
 RUS_Target_Problematic_Local_Governments:0 "針對有問題的地方政府"
 RUS_Target_Problematic_Local_Governments_desc:0 "許多地方政府，特別是在遠東地區，仍然對聯邦的援助和利益抱持敵意。他們依靠侵略性的分肥政治運作，並運行著令人震驚的腐敗地方政治機器，這會讓憲民黨（KDPR）的一些大亨感到臉紅。針對這些令人頭疼的團體開展反腐敗行動，應該會在這些任性的地區重新確立聯邦的控制。"
 RUS_Target_Trade_Unions:0 "針對令人頭疼的勞工組織"
 RUS_Target_Trade_Unions_desc:0 "東部的工業和諧已被令人頭疼的社會主義工會的崛起所打破。寡頭們多年來一直抱怨並試圖應對這些團體，但沒有成功，但最近關於可能與哈薩克流亡共產主義者有聯繫的情報令人極度擔憂。鑑於這些合法的安全威脅，聯邦政府對這些工會進行干預是順理成章的。"
 RUS_CSRO:0 "政府安全調查辦公室"
 RUS_CSRO_desc:0 "內閣安全研究組織（簡稱CSRO）是一個不到100人的小辦公室，是我們最接近獨立情報機構的機構。目前它主要負責處理安全簡報，並在情報事務上協調警察和軍隊，但最近其負責人葉夫根尼·基洛夫提議進行擴建。在他的計劃下，該機構將成為一個規模更大的正式安全機構，仿照歐洲的秘密服務機構。"
 RUS_Black_Budget_Personnel:0 "擴充祕密人事預算"
 RUS_Black_Budget_Personnel_desc:0 "即便在數位間諜時代的黎明，情報機構依然需要人手。官方預算的增加已滿足了對聯絡官與分析員的擴編需求，但基洛夫還申請了一筆龐大的「黑色預算」，用以資助由非官方特工與線人組成的龐大網絡。這筆無跡可查的資金，將為CSRO的行動提供靈活性與匿名性。"
 RUS_Intelligence_Theories:0 "新型情報理論"
 RUS_Intelligence_Theories_desc:0 "基洛夫是一位新時代有抱負的情報頭子。他已明確表示，他無意重組一個被痛恨的沙皇奧克拉納或社會主義契卡的民主版本。相反，他的理論基於21世紀歐洲情報圈的發展。鑑於他的概述，基洛夫相信，與粗暴的秘密警察相比，資訊戰和滲透能更好地控制反對派。"
 RUS_Deep_Cover_Infiltration:0 "深層臥底滲透"
 RUS_Deep_Cover_Infiltration_desc:0 "對持不同政見者組織的深層臥底滲透給我們帶來了兩個優勢。首先是進入這些團體的內部核心，使我們能夠深入了解他們的行動，從而做出相應的反應。其次是控制這些團體或充當挑釁特工（agent provocateurs），以可控的方式煽動暴力，從而誘捕並清除危險分子。"
 RUS_Digital_Manipulation:0 "數字操縱戰術"
 RUS_Digital_Manipulation_desc:0 "基洛夫最創新、最有趣的觀點之一是資訊戰。在現代俄羅斯，冷漠和厭倦使得直接的宣傳失效了。但是，通過社交媒體正確認定虛假訊息和暗示的目標，可以產生很大的效果。如果我們控制了輿論走向，我們就可以開始排斥這些團體並讓人們反對他們，甚至混淆和分裂他們自己的成員。"
 RUS_Plain_Clothes_Agents:0 "便衣特工"
 RUS_Plain_Clothes_Agents_desc:0 "即使有了該機構的新理論，便衣特工仍然是需要的。雖然他們不會像舊時代的機構那樣到處謀殺持不同政見者或間諜，但他們仍然有用武之地。栽贓嫁禍、秘密拘留、跟蹤、恐嚇、闖入或甚至是老式的綁架，總是需要與我們政府沒有明確聯繫、道德上靈活的機構人員……"
 RUS_Bigger_Problems:0 "更大的問題"
 RUS_Bigger_Problems_desc:0 "現在我們已經裝備並塑造了一個新的CSRO，我們可以讓他們放手去解決我們的內部問題。基洛夫預計他將在一年內把主要反對團體踩在腳下，這是一個大膽的承諾，但CSRO已經展示了其價值。如果這行得通，我們甚至可能可以用他們來處理憲民黨（KDPR）內部的問題……"
 RUS_Russian_Self_Defence:0 "俄羅斯自衛的對內運用"
 RUS_Russian_Self_Defence_desc:0 "俄羅斯防衛軍（RSDF）在預算削減和條約限制的重壓下，大多被任其衰退和腐爛。幾十年來，我們將首次實際考慮為他們尋找主動的用途。自從反切爾尼科夫暴動以來，在內部事務中使用防衛軍一直是一個禁忌，但希望人民能理解我們對他們的使用。"
 RUS_Expand_Civil_Defence_Service:0 "擴充民防預備隊"
 RUS_Expand_Civil_Defence_Service_desc:0 "通過擴大我們的民防部隊，我們也擴大了我們在對非軍事形勢的軍事化反應中可以使用的人力。災害救援、土木工程和其他需要軍隊式協調但不需要暴力的項目。這將是處理內部事務的有用工具，同時也能改善防衛軍的形象。"
 RUS_Intermediary_Mission:0 "中介任務"
 RUS_Intermediary_Mission_desc:0 "既然我們已經為內部使用做好了防衛軍（RSDF）的整頓，我們必須決定具體用他們來做什麼。雖然我們不能在不等同於內戰的情況下把他們直接扔向地方政府或持不同政見者，但我們還可以用他們執行許多其他任務，以穩定我們的內部局勢而不需要發生衝突。"
 RUS_Exercises_Europe:0 "與歐洲聯合軍演"
 RUS_Exercises_Europe_desc:0 "大多數歐洲軍隊都認為俄羅斯防衛軍（RSDF）是一個可悲的笑話，老實說，這還是委婉的說法。然而，希望參與歐盟的軍事演習能提高我們部隊'的經驗和士氣，同時也能改善我們與歐洲人的關係。"
 RUS_Patrol_Kazahk_Border:0 "巡邏哈薩克邊境"
 RUS_Patrol_Kazahk_Border_desc:0 "由於中國的忽視，哈薩克的大部分地區已成為一個由土匪、伊斯蘭叛軍和各種軍閥統治的無法無天之地。走私和犯罪在我們漫長的邊界周圍猖獗，邊境警察難以遏制。部署軍隊保衛我們的邊界將阻止一個流血問題，同時也向流亡的共產主義者和庇護他們的哈薩克政府傳遞一個堅定的信號。"
 RUS_Civil_Engineering_Assistance:0 "土木工程援助"
 RUS_Civil_Engineering_Assistance_desc:0 "俄羅斯有著近乎無限的腐爛基礎設施項目需要修復，尤其是在我們的農村地區。地方政府往往只付錢給私營公司來修復有經濟價值的公路和鐵路，這使得許多地區被忽視。通過部署防衛軍協助土木工程項目，我們應該能夠提高我們在被忽視地區的聲望和發展。"
 RUS_Reigning_Party:0 "約束黨內"
 RUS_Reigning_Party_desc:0 "既然我們已鞏固了對國內領域的掌控，接下來就必須著手處理所有問題中最棘手的一個：KDPR。我們自己的黨是一頭與國家難分彼此的利維坦，是一團被特殊利益腐蝕、臃腫不堪的爛攤子，數十年來主宰政壇的派系鬥爭在其中橫行。若說扎哈羅夫有一項想要完成的使命，那就是屠掉這頭利維坦，把它改造成一個能夠正常執政的政黨。而多虧列別傑夫的遺產，如今擋在路上的只剩改革派與聖彼得堡集團……"
 RUS_a_national_catastrophe:0 "國家災難"
 RUS_a_national_catastrophe_desc:0 "對日投資的崩盤在全國掀起了衝擊波。ROSMIRES瀕臨倒閉，銀行無力償債，眾多參與投資的私營企業被迫緊縮。顯而易見，我們正面臨俄羅斯歷史上最嚴重的經濟危機。"
 RUS_assessing_the_damage:0 "評估損失"
 RUS_assessing_the_damage_desc:0 "我們的經濟已經跌穿地板，卻不知怎地還在往下墜。不幸的是，這還不是終點。我們必須挺身而出，阻止這場災難繼續惡化。給ROSMIRES的管理層打電話，讓銀行先按兵不動，接通EU大使的線路，五分鐘內召集整個經濟危機小組開會。我們必須阻止這一切……"
 RUS_meeting_with_the_oligarchs:0 "會晤寡頭"
 RUS_meeting_with_the_oligarchs_desc:0 "船要沉的時候，總是老鼠先逃。寡頭們也不例外：他們的投資已然崩盤，面對真真切切變窮的可能，他們開始割肉跑路。如果他們撒手不管，我們的經濟就再無復甦的希望。我們要把他們請上談判桌，並透過科諾瓦洛夫告誡他們：這一次，別再做任何自私或愚蠢的事……"
 RUS_rumblings_in_our_city:0 "城中的騷動"
 RUS_rumblings_in_our_city_desc:0 "隨著銀行接連倒閉，民眾開始切身感受到衝擊：養老金違約，恐慌蔓延，擠兌風潮四起。ROSMIRES的崩潰還讓數十萬工人流落街頭，連投資了櫻石計劃的第三產業也在裁員。實際通膨一飛沖天，積蓄化為烏有，失業率飛速攀升。人民憤怒了。那道我們靠民眾的麻木勉強攔住的不滿浪潮，恐怕終將決堤，將我們全數吞沒……"
 RUS_conovalovs_pleas:0 "科諾瓦洛夫的懇求"
 RUS_conovalovs_pleas_desc:0 "科諾瓦洛夫和他那類人一樣，是個自私自利的腐敗騙徒。儘管如此，在所有寡頭中，他擁有最強的膽識與狡黠——否則他也當不上我們的經濟部長。我們固然不能對寡頭們每一項瘋狂的紓困要求照單全收，但我們得聽取科諾瓦洛夫較為溫和的訴求，以安撫、穩住我們的產業界。他明白堅守陣地才是上策，我們只需要他去攔住其他人別跑。"
 RUS_the_presidents_speech:0 "總統演說"
 RUS_the_presidents_speech_desc:0 "我們已經盡可能摸清了局勢，現在該行動了。但首先必須向全國喊話。扎哈羅夫算不上偉大的演說家，但他是國家的門面，是危機中許多人第一個仰望的人。今晚，他將向全國發表講話，努力安定局勢。"
 RUS_set_price_limits:0 "設定價格限制"
 RUS_set_price_limits_desc:0 "衝擊普通俄羅斯人的最迫切危機，是商品價格的瘋狂上漲。我們被迫大舉借債，而信心危機之下，隨著生產下滑，貨架上的商品越來越貴。為防止通膨失控，我們將對糧食、藥品等基本物資實施聯邦價格管制，避免關鍵物資陷入危機。"
 RUS_save_the_banking_system:0 "拯救銀行體系"
 RUS_save_the_banking_system_desc:0 "對於俄羅斯的經濟內爆，歐洲銀行一直沉默得可疑。可以斷定，除了他們自救本國貨幣的行動之外，我們不會從歐洲得到任何即時援助。我們只能榨乾自己的預算為金融機構紓困，以免它們違約。一旦它們倒下，我們的工業就會垮掉，我們也將無力償還欠歐洲的鉅額債務——那將是災難性的。"
 RUS_refill_our_coffers:0 "重新充實國庫"
 RUS_refill_our_coffers_desc:0 "拯救俄羅斯的經濟計劃代價高昂。我們無法印鈔——因為銀行不在我們手中——所以只能用手頭現有的。加稅、削減福利、取消基建項目、凍結非必要開支。要為國家紓困，我們就需要激進的緊縮，無論它有多痛苦。"
 RUS_a_race_against_time:0 "與時間賽跑"
 RUS_a_race_against_time_desc:0 "我們暫時避免了經濟的全面內爆，但金融體系仍深陷危機，GDP正螺旋式墜入災難性的衰退。我們需要一劑猛藥，否則局勢將徹底失控——經濟一旦完蛋，國家也將隨之覆滅。我們必須立刻行動。"
 RUS_the_oligarchs_maneuvering:0 "寡頭的運作"
 RUS_the_oligarchs_maneuvering_desc:0 "黨內的把戲玩夠了。是時候讓經濟的利益相關者坐上復甦大業的頭把交椅了。由於黨那些愚蠢的豪賭，我們的利益連同俄羅斯的利益一起付之一炬。科諾瓦洛夫已接掌復甦工作，把總統和布爾加寧晾到了一邊。有資本掌舵，俄羅斯的局勢必將穩定。"
 RUS_reshuffle_the_cabinet:0 "內閣改組"
 RUS_reshuffle_the_cabinet_desc:0 "扎哈羅夫、布爾加寧這類黨閥對經濟一竅不通。要挽回局面，就得讓商人入主內閣。聖彼得堡向來按經濟利益相關者的調子運轉，整個九十年代都運轉良好——如今的2010年代，俄羅斯也該如此。"
 RUS_defend_our_interests:0 "捍衛我們的利益"
 RUS_defend_our_interests_desc:0 "扎哈羅夫會罵我們是財閥、竊國者，說我們動用國家資產為自己的持股紓困。但不可否認，我們的利益就是國家的利益。我們的企業一旦倒下，復甦的希望也隨之破滅。我們為俄羅斯經濟做了這麼多，它幫我們一把也是天經地義。"
 RUS_the_party_our_most_precious_tool:0 "黨，我們最珍貴的工具"
 RUS_the_party_our_most_precious_tool_desc:0 "儘管KDPR內的許多派系不過是扎哈羅夫或切爾尼科夫臃腫的傀儡，它依然是天然的執政黨，對國家機構握有巨大的影響力。我們一向把這些關係經營得很好。現在，我們要動用所有的人情，讓整個國家機器步調一致地運轉起來，收拾眼前這個爛攤子……"
 RUS_a_state_of_emergency:0 "緊急狀態"
 RUS_a_state_of_emergency_desc:0 "內亂正在惡化。事實證明，我們一心為財團紓困、置福利服務於不顧的做法很不得人心。社會主義墮落分子成群結隊地走上街頭暴動。整個國家都要完蛋了，他們卻只知道伸手要救濟。要拯救經濟，我們就必須宣佈緊急狀態，鎮壓這場動亂。"
 RUS_create_the_national_financial_commission:0 "設立國家財政委員會"
 RUS_create_the_national_financial_commission_desc:0 "我們的預算正在分崩離析。我們要拯救銀行和工業，卻不能靠印鈔來實現。想要全身而退，就必須去除贅肉、精簡開支。科諾瓦洛夫為此組建了國家財政委員會。該委員會有權大刀闊斧地砍掉浪費性支出，挽救我們的預算。"
 RUS_simplfy_the_legislation:0 "精簡法規"
 RUS_simplfy_the_legislation_desc:0 "我們需要現在就改變稅收與支出，而不是以後。利用委員會的權力，我們可以斬斷繁文縟節、精簡支出法規，從而更有效率地把我們的經濟從預算崩潰的蹂躪中拯救出來。"
 RUS_implement_harsh_austerity:0 "實施嚴厲緊縮"
 RUS_implement_harsh_austerity_desc:0 "我們已進入危機模式，一切對經濟復甦非必要的東西都得砍掉。醫療、社會照護、教育、福利、公用事業、警察、軍隊、養老金、公務員薪資——統統都要大幅削減。我們需要把所有的錢投進私營部門，防止它內爆，而且要快。"
 RUS_promote_exportations:0 "促進出口"
 RUS_promote_exportations_desc:0 "所有殘存的出口貿易壁壘正在被拆除。拯救經濟需要現金，而貿易恰恰能帶來現金。透過促進出口，我們可以獲得外匯的湧入，再注入本國經濟，從而恢復GDP、逃離衰退。"
 RUS_paris_orders_and_we_obey:0 "巴黎下令，我們服從"
 RUS_paris_orders_and_we_obey_desc:0 "歐洲人可能收回全部債權、或採取手段前來「討債」的可能性，一直像達摩克利斯之劍懸在我們頭上。歐洲銀行剛剛透過祕密渠道與我們接觸，開出了一筆交易：只要我們透過向歐洲企業出售破產的國有資產與能源期貨來恢復還款，他們就向我們提供金融援助。條件苛刻，但為了拯救經濟，我們必須接受。"
 RUS_redirect_the_hate:0 "轉移仇恨"
 RUS_redirect_the_hate_desc:0 "我們對福利體系與公共服務事實上的摧毀，已讓民眾群情激憤。眼下的動盪甚至比切爾尼科夫總統任期最黑暗的日子還要嚴重。一不小心，人們就要在街頭私刑處決商人了。所幸，我們握有全部的權力，卻不必背負顯眼的責任——我們只需把罵名引向總統就行。"
 RUS_zhakarovs_stained_legacy:0 "扎哈羅夫蒙塵的遺產"
 RUS_zhakarovs_stained_legacy_desc:0 "聽著，事情就發生在他的任上。要是他當初不聽ROSMIRES那筆交易的鬼話，我們現在都好好的（好吧，我們當時也想做這筆買賣，但他本該更明智才對！）。他的歷史定位已經是「眼睜睜看著俄羅斯經濟崩潰的人」了，再給他加上一頂「摧毀公共部門的人」的帽子，想必也差不了多少吧？"
 RUS_the_money_must_flow:0 "錢必須流動起來……"
 RUS_the_money_must_flow_desc:0 "我們就快成功了——再多砍一些，再多救一些，再多來點錢！我們的利益幾乎全部保住了，馬上就能重回增長與生產的正軌。只要錢開始流動，我們就能重操舊業了，對吧？"
 RUS_bulganins_iron_will:0 "布爾加寧的鐵腕意志"
 RUS_bulganins_iron_will_desc:0 "這些把戲必須停止。扎哈羅夫和建制派已經失敗，科諾瓦洛夫和聖彼得堡集團更關心的是保住自己可悲的皮囊。是改革派挺身面對危機的時候了。內政部長布爾加寧將領導拯救經濟的努力，並徹底清算釀成這場爛攤子的腐敗與失敗。"
 RUS_push_the_enabling_act:0 "強推授權法"
 RUS_push_the_enabling_act_desc:0 "不再等待黨內派系傾軋和討價還價。要拯救俄羅斯，我們必須毫不遲疑、毫不留情地行動。布爾加寧將強行通過一部授權法，在這國家危急之時賦予內閣近乎獨裁的權力。"
 RUS_establish_the_anti_corruption_department:0 "設立反腐敗部門"
 RUS_establish_the_anti_corruption_department_desc:0 "眼下，寡頭們想洗劫國家來保住自己的投資，建制派則忙著向歐洲賣身。呸！叛徒和懦夫，他們很快就會得到報應。布爾加寧將設立反腐敗部門，無情清洗國家機器中那些造成我們經濟困境的寄生蟲。俄羅斯終將被納入正軌——不管用什麼方式……"
 RUS_ivestigate_the_army:0 "調查軍隊"
 RUS_ivestigate_the_army_desc:0 "局勢惡化之際，我們需要RSDF來貫徹我們的意志，不幸的是它腐敗透頂。就像那個老笑話說的：哈薩克軍閥們的最大金主，是後勤部隊的中士們。RSDF必須成為俄羅斯的驕傲，腐敗絕不容存。"
 RUS_question_the_party:0 "質問黨"
 RUS_question_the_party_desc:0 "KDPR是一團由腐敗與裙帶關係堆成的臃腫爛泥。切爾尼科夫曾試圖清除黨內的寄生蟲，把它鍛造成一部高效的執政機器——一個黨國一體的混合體。雖然背叛毀掉了他的藍圖，但他的準繼承人布爾加寧將接過衣缽，馴服KDPR這頭利維坦。"
 RUS_target_the_conglomerates:0 "打擊財團"
 RUS_target_the_conglomerates_desc:0 "對俄羅斯的姦淫擄掠，寡頭及其控股集團的罪責恐怕僅次於歐洲。他們是最惡劣的竊賊與強盜：先是挾持俄羅斯的財富，等到時局艱難，又只顧自己的身家。要拯救俄羅斯，就必須把這些罪犯清洗乾淨。"
 RUS_check_upon_the_bureaucrats:0 "清查官僚"
 RUS_check_upon_the_bureaucrats_desc:0 "誠然，許多國家官僚是忠誠勤勉的公僕，與我們改革俄羅斯國家的願望不謀而合。但也有許多人是扎哈羅夫或寡頭利益的腐敗傀儡。我們需要清查國家機器，確保它高效運轉，並忠於我們建設一個革新而完善的俄羅斯國家的目標。"
 RUS_smash_organised_crime:0 "粉碎組織犯罪"
 RUS_smash_organised_crime_desc:0 "在荼毒俄羅斯的種種大惡面前，組織犯罪常常被忽視，但它血腥的指紋無處不在。你以為九十年代是誰幫聖彼得堡集團買下私有化的國有資產？是誰幫歐洲銀行收購國有企業？又是誰幫腐敗的地方政府保住權位？這些人渣把我們的諸多問題串在一起，國家對他們的清算早該到來。"
 RUS_too_little_too_late:0 "太少，太遲？"
 RUS_too_little_too_late_desc:0 "我們改革俄羅斯、粉碎腐敗的行動迅速而無情，但這夠嗎？寡頭在逃亡，建制派在密謀，而我們周圍，失去領導的人民已把火炬投向俄羅斯的根基。也許早在切爾尼科夫敗給列別傑夫——那個老娼婦的雜種——的時候就已經太遲了。也許，我們對俄羅斯求救呼聲的回應，等得太久了……"
 RUS_centralise_statal_assets:0 "集中國有資產"
 RUS_centralise_statal_assets_desc:0 "集中國有資產"
 RUS_stimulate_small_businesses:0 "扶持小企業"
 RUS_stimulate_small_businesses_desc:0 "在我們集中掌控經濟命脈的同時，也早該向小人物伸出援手了。俄羅斯的小企業——那些財閥圈子之外的人——是俄羅斯無名的英雄。像社會主義者那樣試圖控制他們是愚蠢的；相反，讓我們幫助他們蓬勃發展，為不斷壯大的中產階級帶來繁榮。"
 RUS_reduce_regional_autonomy:0 "削減地方自治"
 RUS_reduce_regional_autonomy_desc:0 "歐洲強加給我們的聯邦體制，扼殺了我們建立一個正常運轉國家的能力。是時候整肅那些各行其是的地方政府，讓各地區與莫斯科保持一致了。一旦清除這些地方主義的寄生實體，我們終於能把進步與改革帶給整個俄羅斯。"
 RUS_the_toughest_man_in_russia:0 "全俄羅斯最強硬的男人"
 RUS_the_toughest_man_in_russia_desc:0 "布爾加寧配得上「全俄羅斯最強硬的男人」這一稱號，也讓切爾尼科夫感到驕傲。建制派節節敗退，寡頭們俯首帖耳。縱使忘恩負義之徒暴動劫掠，我們仍將正面迎擊、屹立不倒。改革集團絕不會重蹈數十年前的覆轍，如今我們將站在一個更強大、更偉大的俄羅斯的舵前。"
 RUS_zhakarovs_hopes:0 "扎哈羅夫的希望"
 RUS_zhakarovs_hopes_desc:0 "我們已經走了這麼遠，再熬過一場危機也未嘗不可。扎哈羅夫在總統職位的重重考驗中苦苦支撐，絲毫無意放棄他對列別傑夫的承諾。改革派的陰謀與聖彼得堡集團的交易都將被掃到一邊。這是總統要解決的危機——而他必將解決它。"
 RUS_call_for_pan_european_unity:0 "呼籲泛歐團結"
 RUS_call_for_pan_european_unity_desc:0 "無論他們願不願意，我們的危機也是歐洲的危機。縱使有恐俄症與冷漠作祟，歐洲沒有人希望其最大成員國之一的經濟崩潰。若說有什麼時機能把我們的改革推向歐洲，那就是現在。"
 RUS_beg_the_council_of_forty:0 "懇求四十人議會"
 RUS_beg_the_council_of_forty_desc:0 "歐洲的執政議會向來反對任何對俄政策改革，但態度正在慢慢鬆動。這場崩盤的衝擊，應該足以讓所有仍在觀望的人明白：必須採取果斷行動。哪怕要卑躬屈膝地哀求，我們也必須拿下那最後幾票……"
 RUS_blind_eye_on_corruption:0 "對腐敗睜一隻眼閉一隻眼"
 RUS_blind_eye_on_corruption_desc:0 "聽著，我們試過乾乾淨淨地辦事，但我們沒時間了——我們需要那些票！打電話給我們手上的每一個說客和利益團體，告訴他們歐洲已是狩獵季。行賄、勒索、脅迫、遊說——只要能弄到推動變革所需的支持就行！"
 RUS_sway_paris_industrialists:0 "拉攏巴黎的實業家"
 RUS_sway_paris_industrialists_desc:0 "在對俄政策改革上，法國一直最不情願。然而，即便其民眾與政府對我們心存疑慮，實業家們卻分得清生意與偏見。若能說服他們為我們遊說，我們或許能撬動幾位關鍵的法國要員。畢竟法國在我國有大量經濟投資，他們可不希望這些投資打了水漂。"
 RUS_tempt_berlins_hawks:0 "誘惑柏林的鷹派"
 RUS_tempt_berlins_hawks_desc:0 "在改革對俄政策的問題上，德國人大體站在我們這邊。但我們仍需盡可能爭取那些頑固派。他們許多是鷹派，至今對大戰耿耿於懷、疑心未消。我們要讓他們相信：一旦俄羅斯陷入經濟動盪，中國人或不列顛尼亞就可能在東方對我們下手，危及歐洲的國家安全。"
 RUS_bribe_viennas_bureaucrats:0 "賄賂維也納的官僚"
 RUS_bribe_viennas_bureaucrats_desc:0 "多瑙的政策對我們大多漠不關心。所幸他們許多關鍵的實權人物極易收買，因此我們將把遊說的重心放在說服他們支持我們上。有了他們的協助，任何涉俄表決都應能被我們扳成簡單多數。"
 RUS_renegotiate_the_blanchet_commission:0 "重新談判布朗謝委員會"
 RUS_renegotiate_the_blanchet_commission_desc:0 "是時候了。我們終於要直面結局，把針對歐洲涉俄條約的改革方案付諸表決。如果這套方案獲得通過，我們的經濟將得到紓困，我們的憲法將重獲自由，我們還將獲得創立獨立貨幣的全權。如果失敗，我們的一切努力都將付諸東流，俄羅斯恐怕在劫難逃。"
 RUS_an_abrupt_finale:0 "戛然而止的終章"
 RUS_an_abrupt_finale_desc:0 "總統先生，最終表決結果出來了，您該看看這個……"
 RUS_deepends_eec_cooperation:0 "深化EEC合作"
 RUS_deepends_eec_cooperation_desc:0 "我們需要深化與歐洲市場的經濟聯繫。我們獲得的經濟靈活性開闢了貿易與投資的新途徑，我們終於得以踏上漫長的復甦之路。"
 RUS_establish_joint_enterprises:0 "建立合資企業"
 RUS_establish_joint_enterprises_desc:0 "我國市場的巨變吸引了眾多想搭上崩盤後復甦浪潮的歐洲投資者。不過我們會保持謹慎，避免大規模收購；取而代之，我們將鼓勵俄羅斯工業、歐洲投資者與我國政府三方組建合資企業。"
 RUS_readjust_our_markets:0 "重新調整我們的市場"
 RUS_readjust_our_markets_desc:0 "我國經濟面臨的巨變需要政策上的重大調整。在能源產業衰退的同時，新興產業正在崛起。要乘上復甦的浪潮，我們就必須改變優先事項。"
 RUS_a_much_needed_relief:0 "久旱逢甘霖"
 RUS_a_much_needed_relief_desc:0 "來自歐洲的援助終於全面見效。我們熬過了崩盤最黑暗的時期，如今步入復甦的時代——我們將在其中重新成長，變得比以往更強健、更堅韌。扎哈羅夫完成了不可能之事，功不可沒——儘管他本人把大部分功勞歸於已故的列別傑夫在他之前打下的基礎。"
