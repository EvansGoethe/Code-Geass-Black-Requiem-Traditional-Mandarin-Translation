 RUS_phase_one.14.t:0 "俄羅斯的物產"
 RUS_phase_one.14.d:0 "在ROSMIRES大廈的110層，俄羅斯兩位權勢滔天的人物正進行一場私人會晤。\"贏下那場辯論很好，我很高興總統看到了其中的價值。\"科諾瓦洛夫說道。這一次，他的語氣與平時略有不同——帶著一絲興奮，一絲對自己成就的自豪與得意。辦公桌另一側站著季諾維，他正俯身拉開最底層的抽屜，露出一瓶昂貴的白葡萄酒。\n\n\"你可以聽起來更帶勁一點嘛，這場勝利可是名正言順！\"季諾維的嗓音恰恰相反，洪亮得滿是歡欣。他取出一隻酒杯——他知道科諾瓦洛夫不會喝——興奮得幾乎起了雞皮疙瘩。他把杯子叮的一聲磕在桌上，伸手去拿那瓶昂貴的酒。\"跟你不一樣，我的公司可等不來政府翻倍的投資。\"季諾維聞言輕笑，舉起酒瓶開了封。軟木塞拔出時發出響亮的一聲，他立刻給自己斟起酒來，雙手微顫地答道：\"這倒是實話。沒想到你還會開玩笑。\"斟完酒，他把敞開的酒瓶留在桌上，一隻手去端酒杯，另一隻手伸向另一個抽屜。\n\n\"我不會。\"科諾瓦洛夫直白地回答，看著眼前的一幕，等著季諾維叫他來的真正目的——季諾維知道他在等。所以他用左手拉開抽屜，從裡面抽出幾份文件。\"人各有志。來，看看這些！\"他隨手把那捆文件拋過桌面，文件滑落，正好滑進科諾瓦洛夫等候的指間。他接住、翻轉，開始閱讀。當季諾維看到科諾瓦洛夫的目光被其中幾頁攫住時，他得意地一笑。隨後科諾瓦洛夫收攏紙頁，在桌沿磕齊，夾到腋下。\n\n\"我會看看能為你做些什麼。\"他說話時，聲音裡那一絲異樣已經消失。季諾維皺起眉，看著他轉身離去。月光透過巨大的玻璃幕牆傾瀉進來，他最後補了一句："
 RUS_phase_one.14.a:0 "\"但願那不是句玩笑。\""
 RUS_phase_one.15.t:0 "尋找新市場"
 RUS_phase_one.15.d:0 "\"你帶來了好消息嗎，科諾瓦洛夫？\"當科諾瓦洛夫踱進門時，扎哈羅夫的語氣裡透著幾分急切。他雖料到來人是他，卻不知道該期待什麼消息。而今天的扎哈羅夫看上去彷彿再多來一個大麻煩就會當場睡著，這讓他對答案更加忐忑。\"事實上，是的，總統先生。確實是好消息。\"聽到科諾瓦洛夫那分析式的嗓音，扎哈羅夫如釋重負地長舒一口氣，肩上的重擔輕了大半。他坐直身子，向前傾去，幾乎是迫不及待地想看看科諾瓦洛夫帶來了什麼。他的目光落在對方雙手捧著的那張紙上。\n\n\"快說。\"扎哈羅夫急促地催促道，手已伸向那支墨黑鎏金的鋼筆。科諾瓦洛夫走近幾步，左手舉起那張紙，拿的方式恰好不遮擋內容。那只是一張圖表，扎哈羅夫一眼就看清了標題：『能源產出』。他知道這是個好兆頭，因為圖上的曲線陡然上揚。有了能源盈餘，可以說他們就有了更多可支配的資本。科諾瓦洛夫把紙放下，推過桌面讓總統細看，一邊解釋他的好消息：\"我們最近在能源產出上實現了可觀的盈餘。有鑑於此，我建議擴大出口。我心裡有幾個選項。\"\n\n扎哈羅夫聞言挑起眉毛——現在他對這位經濟部長的盤算有點擔心了。他讀到紙張底部，那裡建議利用這額外的餘裕擴大對歐洲的出口。但那只是選項之一，於是他開口問道：\"幾個？其他的是什麼？\"科諾瓦洛夫顯然早有準備，總統話音剛落他便答道：\"簡單地說：歐洲、中國，或不列顛尼亞。\"話一出口，總統震驚不已。此舉太過大膽，尤其是在不與歐洲商議的情況下。但他很快回過神來，把圖表輕輕推回科諾瓦洛夫那邊。"
 RUS_phase_one.15.a:0 "\"這三個選項，我需要細節。\""
 RUS_phase_one.16.t:0 "小心行事"
 RUS_phase_one.16.d:0 "\"否則風險太大了……\"這是扎哈羅夫呻吟著吐出的最後一句話。他正在自己心裡進行一場辯論。這是他必須做出的重要決定——又一個，在他已經做過的無數個之外。他把黏在天花板上的視線移開，先看向一旁滴答作響的古老落地鐘。他對自己點了點頭，然後專注於眼前，目光斜落在桌面上，伸手去拿放在右手邊的座機。\n\n他拿起話筒，撥了那個號碼。短暫的鈴聲給了扎哈羅夫足夠的時間下定決心、破釜沉舟。\"這裡是魯達總統的祕書處，請問您要預約會面嗎？\"電話那頭的聲音輕快而專業，帶著再明顯不過的烏克蘭口音。扎哈羅夫用較為直接的語氣回應，既注意不顯得無禮，又要儘快辦成他要辦的事。\"幫我接尤里。\"那頭的祕書幾乎立刻發出一聲短促的驚呼——顯然她認出了這個聲音，瞬間慌了神。\n\n\"馬上，先生！抱歉，扎哈羅夫總統。\"扎哈羅夫點了點頭，儘管他知道她看不見。他等了寶貴的幾秒，終於聽到線路雜音一變，傳來一位同僚總統沉穩從容的聲音：\"我是尤里。能直接越過我的祕書，你一定有事，弗拉迪斯拉夫。\"扎哈羅夫聞言微微一笑，然後用簡單的一句話回答了他。"
 RUS_phase_one.16.a:0 "索要烏克蘭建築許可"
 UKR_from_other_nations.1.t:0 "小心行事"
 UKR_from_other_nations.1.d:0 "魯達直視前方，望著桌上成堆的文件。他眼中所見比實際更多——每一堆在他看來，都是處理完這一批之後又要翻閱、又要解決的下一堆。他向後一靠，搖晃著那把結實的木椅，椅子在他身下吱呀作響。與此同時，他用疲憊的手指梳過柔軟的深棕色頭髮。突然，彷彿要強行把他的注意力拽回來似的，他聽見座機開始響鈴——它被埋在文件堆的一側。他迅速停住搖晃，手從頭髮裡抽出來按向電話，快速接起。\n\n\"喂，什麼事？\"儘管剛才手忙腳亂地接電話，他的聲音依然沉穩從容。回應他的是祕書急促的、近乎驚慌的嗓音：\"有您的電話，先生！是扎哈羅夫總統。\"魯達嘆了口氣，從僵硬的職業姿態中放鬆下來，甚至又往椅背上一靠。祕書知道這事不需要他答覆，很快他就聽見線路轉接——主要是因為他聽見了扎哈羅夫那座時鐘熟悉的滴答聲。魯達的辦公室裡可沒有這種老古董。\"我是尤里。能直接越過我的祕書，你一定有事，弗拉迪斯拉夫。\"語氣沉穩從容之餘，也帶著隨意——他認識扎哈羅夫已經很久了。他突然來電並不新鮮，尤其是現在。他等著，扎哈羅夫似乎又多花了幾秒斟酌某個決定，然後說道：\n\n\"我有筆交易要跟你談。\"魯達沒來得及回答，也不需要回答。緊接著，他專注地聽扎哈羅夫講解一項俄烏交易的細節。魯達的大腦飛速運轉著解讀：據他所知，俄羅斯口袋裡多了點錢，正在尋找一項好的投資。而具體到這裡，他們希望與歐洲建立更好的貿易網絡。這在魯達聽來都說得通。不過，當對方發問時，他才意識到自己想得太久了。\n\n\"你怎麼說，尤里？\"魯達不再放鬆，俯身向前，取來一張白紙，左手抓起一支鋼筆。接下來的話他得字斟句酌，停頓了一秒才開口作答。"
 UKR_from_other_nations.1.a:0 "我會再聯絡你。"
 UKR_from_other_nations.1.b:0 "我現在去安排。"
 RUS_phase_one.17.t:0 "有風險的投機"
 RUS_phase_one.17.d:0 "扎哈羅夫低聲咒罵——他怎麼能遲到成這樣？在祕書、保鏢和幾名隨從的陪同下，扎哈羅夫一行人在停機坪上狂奔。這副模樣實在狼狽。他一面努力維持尊嚴與體面，一面又不能讓新來的貴客再等下去。他望向前方——飛機早已落地，但他運氣不錯：遠遠地，他看見艙門終於開啟，滑落展開成一道舷梯。他沒有心思去辨認那是哪個型號的中國飛機——那點轉瞬即逝的業餘愛好，扎哈羅夫此刻消受不起。他看著那位衣著奢華的宦官走了出來：臉上敷著慘白的妝粉，雙頰點著兩團紅圈。\n\n他身披彷彿無比寬大的飄逸長袍，猩紅與燦金交織。扎哈羅夫朝副官和保鏢們揮了揮手，由狂奔轉為快步疾走，一邊整理著袖扣和領帶。他走上前去，直到距離近得讓宦官終於望向他，投來冰冷的目光。\"你是副官嗎？我得說，我對總統的期待可要高得多——\"宦官的話沒說完，顯然把扎哈羅夫的遲到與狼狽當成了區區僕從的表現。扎哈羅夫清了清嗓子，直視前方，強自鎮定地說：\"我就是總統，弗拉迪斯拉夫·扎哈羅夫。\"他說得正式而直截了當。宦官那雙冰冷的眼睛驚訝地睜大，上下打量了扎哈羅夫一番，才尷尬地乾笑起來。\n\n\"啊！失敬失敬，沒想到閣下竟是這樣的人物。\"扎哈羅夫伸出手。宦官愣了片刻，隨即看見了已然聚集的攝影機與媒體人員，也伸出了自己的手。兩手緊緊相握的瞬間，快門聲此起彼伏。扎哈羅夫驚訝於這個清瘦男人手上的力道——但力量本就不能只憑外表判斷，這一點他自己再清楚不過。\"彼此彼此。\"扎哈羅夫對他說，然後鬆開手，按照流程側過身去，宦官也照做了，讓媒體再拍一張。扎哈羅夫沒法拒絕媒體出現在這個場合，只希望這不會壞事。\n\n\"那麼，總統，我們談正事吧？我在這裡時間不多。\"宦官說著轉向扎哈羅夫。直到此刻，扎哈羅夫才想起了他的名字。他沒有多少時間為此準備，而中國究竟會派哪位宦官前來，他這邊事先也有過一番議論。但他點了點頭，自信地說道："
