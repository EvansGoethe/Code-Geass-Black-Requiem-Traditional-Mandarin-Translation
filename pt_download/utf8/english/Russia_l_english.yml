 RUS_operation_frontiere_libre:0 "行動：§R自由國境§!"
 RUS_operation_frontiere_libre_desc:0 "對俄羅斯的所有控制權均已喪失。扎哈羅夫不再是俄羅斯的掌權者，而是被各路軍閥和抵抗戰士瓜分，每個人都試圖刻畫出自己的理想藍圖。現在，情況變得更糟了。因為有報告指出歐盟發起了一項行動來作為回應。這一行動似乎並未將俄羅斯的利益放在心上。"
 RUS_collapse_of_government:0 "我們正在瓦解的城市……"
 RUS_collapse_of_government_desc:0 "牆上的一塊磚被抽走了，一切都倒塌了。然後是另一塊，再一塊。歐盟的入侵和抵抗力量的戰鬥，已經開始解構我們整個國家。將其連根拔起，我們自己的城市也開始崩潰。"
 RUS_Collapse_Of_Organized_Resistance:0 "……以及土崩瓦解的抵抗"
 RUS_Collapse_Of_Organized_Resistance_desc:0 "就像他們所居住的國家一樣，甚至各個抵抗組織也開始崩潰。面對歐盟入侵部隊的頑強抵抗，加上各組織之間的相互戰鬥，導致他們四散奔逃。但在他們離去後……還會剩下什麼？在莫斯科的灰燼中會崛起什麼？"
 RUS_Revise_the_Constitution_of_1919:0 "修改1950年憲法"
 RUS_Revise_the_Constitution_of_1919_desc:0 "俄羅斯一直飽受法國人在大戰結束時強加給它的憲法所困擾，這項立法將我們束縛在法國之下，使其成為一個二等國家。我們因此失去了領土、人民，並在經濟上遭受了痛苦，但現在有機會修改憲法並鬆開套在我們身上的枷鎖。"
 RUS_Revitalize_The_Economy:0 "振興經濟"
 RUS_Revitalize_The_Economy_desc:0 "在解決經濟差距的努力中，政府已為在西伯利亞和遠東地區發展和擴展基礎設施的計劃發出綠燈。此舉應該能減輕這些地區經濟動盪的影響，並緩解民眾的一些困境。"
 RUS_Use_the_Bulganins_Plan:0 "執行布爾加寧計劃"
 RUS_Use_the_Bulganins_Plan_desc:0 "儘管俄羅斯正深陷經濟困境，布爾加寧仍提出了一項發展並擴充俄羅斯軍事複合體的計劃。他認為，實現俄羅斯陸、海、空力量的現代化，將在我們身處的這段前途未卜的時期維繫法律與秩序。"
 RUS_Invitation_of_European_colleagues:0 "邀請我們的歐洲同僚"
 RUS_Invitation_of_European_colleagues_desc:0 "俄羅斯軍隊現代化的第一步，是引進新技術：邀請來自歐洲各地的專家，全面提升軍隊的作戰效能。俄軍的陸、海、空能力都將被提升到與歐洲聯合各成員國軍隊相當的水準。"
 RUS_Modernization_of_airfields:0 "現代化機場"
 RUS_Modernization_of_airfields_desc:0 "下一步是實現國家空中力量的現代化：改造機場，擴充其功能，使其能夠起降任何類型的軍用飛機，以保障俄羅斯領空的空防安全。擴建西俄羅斯三大地區的機場，是國家安全的關鍵。"
 RUS_The_use_of_English_jet_engines:0 "引進英國噴射引擎"
 RUS_The_use_of_English_jet_engines_desc:0 "現代化我們國家空中能力的最後一步，是為我們的噴射機使用更新且更可靠的引擎，使其能夠達到更高的速度並承受更長的任務時間。英國人以其優越的噴射引擎而聞名，我們必須利用他們的優越性能並將其應用於我們自己的飛機設計中。"
 RUS_The_use_of_French_military_doctrine:0 "法式軍事學說"
 RUS_The_use_of_French_military_doctrine_desc:0 "為了現代化我們的陸上能力，我們需要引入一種新的戰爭學說，為我們軍隊在現代時期的標準奠定基礎。法國模式是最合適的，因為他們確實曾擊敗過我們一次，我們應該趁此機會儘可能從敵人那裡學習知識。"
 RUS_Training_in_cadet_corps_according_to_the_European_model:0 "歐式軍官團"
 RUS_Training_in_cadet_corps_according_to_the_European_model_desc:0 "我們已經在大多數方面開始效法法國軍隊——效仿其軍官模式，讓未來的軍官加入見習軍官團，以在未來世代中建立領導力和職前軍事訓練，這應該能提供更優秀的軍官隊伍以滿足軍隊的領導需求。"
 RUS_Creation_of_a_unified_military_command:0 "聯合軍事指揮部"
 RUS_Creation_of_a_unified_military_command_desc:0 "根據新確立的俄羅斯軍事學說，是時候建立一個聯合軍事指揮部，以協調軍隊所有主要分支的資源和行動。陸海空力量將歸於一個作戰當局的指揮之下。"
 RUS_Development_of_modern_armored_vehicles:0 "研發現代化裝甲"
 RUS_Development_of_modern_armored_vehicles_desc:0 "我軍陸上力量現代化僅剩的最後幾步之一，就是我們的裝甲部隊。俄羅斯工程師們正在加緊研製新的設計，以供武裝部隊列裝服役。這將為俄羅斯未來的裝甲載具樹立標準。"
 RUS_The_doctrine_of_modern_warfare:0 "現代戰爭之路"
 RUS_The_doctrine_of_modern_warfare_desc:0 "既然俄羅斯已經完成了陸戰能力的現代化，接下來就該根據我們的軍事學說發展現代化戰術，確保我們的武器與裝甲在戰鬥中發揮實效。戰略決定戰鬥的成敗，而一場場勝仗決定戰爭的結局。"
 RUS_Creation_of_the_Baltic_Fleet:0 "建立波羅的海隊"
 RUS_Creation_of_the_Baltic_Fleet_desc:0 "提升海軍能力的第一步是組建一支新的海軍艦隊。波羅的海是我們通往歐洲與世界各地的主要海上貿易通道。波羅的海艦隊將以聖彼得堡為母港正式成立。"
 RUS_Construction_of_new_northern_ports:0 "改善北部港口"
 RUS_Construction_of_new_northern_ports_desc:0 "為確保北方貿易航線的安全，我們必須修建新的海軍基地並升級現有基地，保護關鍵港口免遭敵方艦隊未來可能的封鎖或襲擾。守衛俄羅斯的海上邊界，對國家安全至關重要。"
 RUS_Purchase_of_old_blueprints_from_EU_members:0 "購買舊藍圖"
 RUS_Purchase_of_old_blueprints_from_EU_members_desc:0 "我軍能力現代化的最後一步終於到來。我們將請求購買一批歐洲的舊軍事圖紙，涵蓋各類武器、坦克與飛機。透過研究這些圖紙，我們可以加以評估，並在其基礎上著手設計更新的型號，使我軍達到與其他歐洲國家同等的水準。"
 RUS_Use_the_Conovalovs_Plan:0 "實施科諾瓦洛夫計劃"
 RUS_Use_the_Conovalovs_Plan_desc:0 "俄羅斯正深受經濟困境之苦，其根源在於落後的經濟體制。科諾瓦洛夫提出了一項透過工業化與直接干預政策來穩定經濟的計劃。"
 RUS_Stimulate_small_business:0 "刺激小企業"
 RUS_Stimulate_small_business_desc:0 "隨著最近的經濟動盪——小企業一直在苦苦掙扎。雖然我們無法直接給予支持，但我們可以提供一項刺激方案，以鼓勵他們在這段經濟困難時期繼續營運和增長。"
 RUS_Set_price_limit_for_essential_products:0 "設定價格限制"
 RUS_Set_price_limit_for_essential_products_desc:0 "通貨膨脹已然失控。為回應民眾對必需品價格飆漲的憂慮，我們承諾政府將對公民日常生活攸關的商品設定價格上限。"
 RUS_Increase_the_credit_rate:0 "提高信貸利率"
 RUS_Increase_the_credit_rate_desc:0 "隨著我們最近解決經濟問題的行動初見成效，我們將提高信貸利率，以保留近期成功帶來的一部分利潤，並在國庫中留出剩餘的可用資金，以防我們未來面臨只能用金錢解決的問題。"
 RUS_The_beginning_of_industrialization:0 "開始工業化"
 RUS_The_beginning_of_industrialization_desc:0 "俄羅斯直到現在仍依靠農業經濟體系生存，我們經濟不景氣的原因是我們對工業國家的依賴。我們需要通過加快工業化步伐來追趕他們。基礎設施和工業的徹底改革必須立即開始。"
 RUS_Development_of_new_deposits:0 "開發新礦床"
 RUS_Development_of_new_deposits_desc:0 "我們迫切需要開發我們這個遼闊大國的自然資源。當地人可能會對我們開採這些地區以支持蓬勃發展的工業的努力感到不滿，但我們絕不能妥協。我們需要那些資源，即使有一些不滿的當地人會對政府的這一舉動感到鄙視。"
 RUS_Creation_of_new_processing_plants:0 "建立新型加工廠"
 RUS_Creation_of_new_processing_plants_desc:0 "既然我們已經獲得了製造對發展國民經濟至關重要的合成部件所需的資源，我們將需要在烏拉地區開設這些工廠。我們的多數工業都將設在那裡，作為西部大都市與西伯利亞遼闊腹地之間的交會點。"
 RUS_Project_of_the_Rybinsk_Hydroelectric_Power_Station:0 "雷賓斯克水電站"
 RUS_Project_of_the_Rybinsk_Hydroelectric_Power_Station_desc:0 "我們高速工業化的主要目標之一，是擺脫對歐洲盟友的能源依賴。實現這一目標的第一步，是在雷賓斯克建成一座水力發電站——這將降低我們對歐洲的依賴，並成為興建更多電站、點亮俄羅斯的踏腳石。"
 RUS_Electrification_of_Siberia:0 "西伯利亞電氣化"
 RUS_Electrification_of_Siberia_desc:0 "我們已經為我們最大規模的基礎設施擴張奠定了基礎，以便迅速將國家發展成為工業超級大國，西伯利亞是我們未來發展的關鍵，因為它為我們的工業提供了擴展空間，我們應該為其提供必要的資源以開始對這片荒野凍土的開發——電力將照亮我們國家前進的道路。"
 RUS_Strengthening_the_national_banking_system:0 "加強銀行體系"
 RUS_Strengthening_the_national_banking_system_desc:0 "俄羅斯面臨的經濟動盪削弱了銀行體系，對銀行體系的運作方式進行部分改革並加強政府監管，應該能為我們更好地控制貨幣及其使用方式奠定基礎。"
 RUS_ruble_appreciation:0 "盧布升值"
 RUS_ruble_appreciation_desc:0 "自14世紀以來，盧布一直是流通的主要貨幣，最近幾天，與歐盟的其他貨幣相比，盧布的價值一直在上升。最近的經濟刺激表明，如果當前的郵勢繼續下去，俄羅斯可以與歐洲的其他地區競爭。"
 RUS_Revision_of_part_of_international_agreements_in_national_currency:0 "修改國際貨幣條約"
 RUS_Revision_of_part_of_international_agreements_in_national_currency_desc:0 "自簽署憲法以來，歐洲貨幣條約就一直是紮在我們身上的一根刺。然而，隨著盧布相對歐洲其他貨幣表現強勁，我們阻止EU繼續把國際貨幣標準強加於我們的籌碼正在增加。真正的俄羅斯貨幣，遠勝法國人套在我們脖子上的枷鎖。"
 RUS_Use_the_Chernovs_Plan:0 "執行切爾諾夫計劃"
 RUS_Use_the_Chernovs_Plan_desc:0 "我們偉大國家面臨的最大問題，是司法與政府機構中猖獗的腐敗。切爾諾夫提出了一項整頓法律體系、理順國家經濟的計劃。"
 RUS_Creation_of_an_Anti_Corruption_Agency:0 "反腐敗機構"
 RUS_Creation_of_an_Anti_Corruption_Agency_desc:0 "我們需要一個獨立於政府的機構來在政府的所有部門中推行和執行法規。該機構將提供必要的監督，以應對公務員隊伍中的腐敗分子及其對有組織犯罪的影響，並僅向最高辦公室負責。"
 RUS_Centralization_of_state_assets:0 "集中國家資產"
 RUS_Centralization_of_state_assets_desc:0 "通常由政府負責的某些資產正被企業和腐敗的政府官員所剝削。我們將需要集中與國家相關的基礎設施、大學和財產，只有政府才應該控制國家如此關鍵的部分。"
 RUS_Greater_influence_of_the_state_on_the_economy_of_the_regions:0 "國家對經濟的影響"
 RUS_Greater_influence_of_the_state_on_the_economy_of_the_regions_desc:0 "國家必須擴大其在俄羅斯關鍵經濟區域的影響力，以穩定經濟形勢，我們不能把俄羅斯經濟的命運留給企業。當企業開始顯露出囤積財富的第一批跡象時，國家必須進行干預。"
 RUS_Independence_of_the_courts_budget:0 "獨立的法院預算"
 RUS_Independence_of_the_courts_budget_desc:0 "由於政府大部分部門都充斥著腐敗，我們必須開始清洗國家的司法部門，確保所有腐敗的法官和立法者都被撤職，換上反腐候選人。這個獨立法院將獲得必要的手段，以清除困擾人民意志的猖獗腐敗。"
 RUS_Simplification_of_legislation:0 "簡化立法"
 RUS_Simplification_of_legislation_desc:0 "目前生效的幾項立法存在著一些漏洞，尋求從前系統的無能中獲利的腐敗官僚可以利用這些漏洞，但這種情況將不復存在。法院已開始簡化立法，以確保沒有漏洞可被利用。"
 RUS_demonstrative_arrests:0 "示範性逮捕"
 RUS_demonstrative_arrests_desc:0 "既然法院已經做好了檢測和判處腐敗官員所需的基础工作，政府現在就可以開始清除所有腐敗官員，並將他們移交法院起訴，使他們因剝削人民和國家而得到應有的懲罰。願這能起到警示作用，表明俄羅斯絕不容忍腐敗。"
 RUS_anti_corruption_education_of_the_population:0 "反腐敗教育"
 RUS_anti_corruption_education_of_the_population_desc:0 "人類天生容易被權力和財富的慾望所誘惑，我們必須從源頭上處理腐敗。俄羅斯必須確保當前和未來的世代都知道社會只能靠道德理想生存，使國家的心靈和靈魂純潔是文明生存的關鍵。"
