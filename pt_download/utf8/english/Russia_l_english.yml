 RUS.11.t:0 "更簡單，更聰明"
 RUS.11.d:0 "俄羅斯獨立的反腐敗司法法院已啟動程序，修訂現行法規，堵住漏洞，並將條文簡化得具體明確、不留模糊空間。這些法規修訂完成後，將封死腐敗官員與企業一切可鑽營的門路。反腐敗之戰將持續下去，直到國家滌淨一切腐敗。"
 RUS.11.a:0 "正義得勝！"
