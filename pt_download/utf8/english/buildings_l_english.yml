 BUILDING_GROUP_SHARED_NAME_ENTRY: "- $NAME$"
 energy_infrastructure: "強化電網"
 industrial_infrastructure: "高容量電網"
 energy_infrastructure_desc: "強化的供電線路與具備多重冗餘系統的電力基礎設施，確保我們的工廠無論如何都能持續生產。"
 industrial_infrastructure_desc: "對既有民用電力基礎設施的擴建，使我們具備進行高強度工業作業的更強能力。"