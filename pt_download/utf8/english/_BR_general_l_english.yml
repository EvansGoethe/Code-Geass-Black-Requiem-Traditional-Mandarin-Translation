 WRD.1.t:0 "歡迎頁面"
 WRD.1.d:0 "大家好，歡迎來到2025年愚人節更新——“鴯鶓起義”！我們知道大家都期待着“俄羅斯大亂”更新，這個更新仍在籌備中。但在此期間，作爲一個小小的過渡，那個更新中所有的生活質量改進內容將先在這裏推出！如果大家開啓特定的遊戲規則去探索澳大利亞，希望你們會喜歡爲你們準備的內容。"
