 WRD.2.t:0 "更新日誌頁面"
 WRD.2.d:0 "更新日誌：這裏有太多內容要列出來了！所有都是對這個模組的生活質量改進，所以不如你自己來發現所有這些改進吧！如果你能找到儘可能多的改進，然後去Discord上，或許你能讓Arc對你找到的數量感到驚喜。他有一個清單，但即使是他的清單也不完整，所以如果你能找到更多，你會得到一個驚喜！"
