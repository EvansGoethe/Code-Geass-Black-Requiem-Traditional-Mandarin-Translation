l_english:
 LOADING_TIP_0:0 "通過不正當手段取得的勝利根本算不上勝利。\n——樞木朱雀"
 LOADING_TIP_1:0 "為消滅邪惡，我將成為更強大的邪惡。\n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_2:0 "“真相”大多數時候都被掩蓋了。\n——羅伊德·阿斯普林德"
 LOADING_TIP_3:0 "消除謊言的最佳方式，就是讓它們成爲現實。\n——樞木朱雀"
 LOADING_TIP_4:0 "時間不停流逝，它不會在意那些正在掙扎的人。\n——魯路修·蘭佩洛基"
 LOADING_TIP_5:0 "毫無節制的力量，不過是暴力而已\n——俾斯麥·瓦爾德施泰因"
 LOADING_TIP_6:0 "並非所有人生而平等！這就是爲什麼會有戰爭、暴力和動亂。\n- 查爾斯·zi·不列顛尼亞"
 LOADING_TIP_7:0 "你知道爲什麼雪是白的嗎？因爲它忘記了自己原本是什麼顏色。\n——C.C."
 LOADING_TIP_8:0 "我現在要開始享用這條魚了。\n——樞木朱雀（值得收藏的Meme）"
 LOADING_TIP_9:0 "如果國王不採取行動，他的臣民就不會追隨。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_10:0 "不染塵埃，豈能改變世界。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_11:0 "虛假的眼淚會傷害身邊的人，虛假的笑容只會讓自己痛苦。\n——C.C."
 LOADING_TIP_12:0 "你一定覺得自己很酷吧，不過是置身事外對世界評頭論足罷了。\n——紅月卡蓮"
 LOADING_TIP_13:0 "查爾斯皇帝沉湎於往昔，你執着於當下，而我追尋未來.\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_14:0 "停滯不前的事物終將消亡。\n——米蕾·阿什弗德"
 LOADING_TIP_15:0 "想要有結果，就必須採取行動。\n——樞木朱雀"
 LOADING_TIP_16:0 "戰爭只是外交的一種方式，但也是最低效的一種方式。\n——俾斯麥·瓦爾德施泰因"
 LOADING_TIP_17:0 "生命中總有這樣的時刻，你不得不遠離所愛之人，卻是因爲你深愛着他們。\n——C.C."
 LOADING_TIP_18:0 "在這個世界上，善意能產生惡果，也有在惡意中產生的善行。\n——C.C."
 LOADING_TIP_19:0 "碌碌無爲的人生無異於慢性死亡。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_20:0 "虛假的眼淚會傷害身邊的人，虛假的笑容只會讓自己痛苦。\n——C.C."
 LOADING_TIP_21:0 "如果國王不採取行動，他的臣民就不會追隨。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_22:0 "並非所有人生而平等！這就是爲什麼會有戰爭、暴力和動亂。\n- 查爾斯·zi·不列顛尼亞"
 LOADING_TIP_23:0 "我名為魯路修·Vi·不列顛尼亞，是瑪麗安娜皇后的長子，被帝國拋棄的王子。若有人想阻止我，儘管放馬過來！若有人能超越我的絕望！ \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_24:0 "如果我因為做了正確的事而名聲受損，那我並不需要它。 \n——樞木朱雀"
 LOADING_TIP_25:0 "在這個世界上，善意能產生惡果，也有在惡意中產生的善行。\n——C.C."
 LOADING_TIP_26:0 "查爾斯皇帝沉湎於往昔，你執着於當下，而我追尋未來.\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_27:0 "我名為魯路修·Vi·不列顛尼亞，是瑪麗安娜皇后的長子，被帝國拋棄的王子。若有人想阻止我，儘管放馬過來！若有人能超越我的絕望！ \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_28:0 "時間不停流逝，它不會在意那些正在掙扎的人。 \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_29:0 "人類的心靈始終是我們一切力量的泉源。正因如此，人民才會奮起反抗宦官，黑騎士團才會像巨人般戰鬥。我們用心靈的力量戰鬥！ \n——Zero"
 LOADING_TIP_30:0 "領導力包含選擇優秀的人才並幫助他們做到最好。\n——§O傑雷米亞·歌特瓦爾德§!"
 LOADING_TIP_31:0 "你只有先愛自己，才能愛別人。 \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_32:0 "我鄭重接受此Geass能力。 \n——Zero"
 LOADING_TIP_33:0 "只想讓你捫心自問，當你用錯誤的方式獲得結果時，最終會留下什麼？只有深深的悔恨和無處安放的空虛。 \n——樞木朱雀"
 LOADING_TIP_34:0 "我是他的劍。我會斬斷他的敵人，摧毀他的弱點。所以，C.C.，你成為他的盾牌。保護他。 \n——樞木朱雀"
 LOADING_TIP_35:0 "我鄭重接受此Geass能力。 \n——Zero"
 LOADING_TIP_36:0 "如果我因為做了正確的事而名聲受損，那我並不需要它。 \n——樞木朱雀"
 LOADING_TIP_37:0 "世界和世人——永遠不會變成我們希望的樣子。 \n——樞木朱雀"
 LOADING_TIP_38:0 "你做了那麼多壞事，真覺得這樣就夠了嗎？你以為你跪地求饒就能讓我原諒你？ ！ \n——樞木朱雀"
 LOADING_TIP_39:0 "我打電話來是因為有件事想讓你幫我告訴大家……天空；別抬頭看天空。 \n——樞木朱雀"
 LOADING_TIP_40:0 "我，魯路修·Vi·不列顛尼亞，命令你們！現在，你們所有人……§R死吧！§! \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_41:0 "時間不停流逝，它不會在意那些正在掙扎的人。 \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_42:0 "真正戰鬥的訣竅在於，每個人都是人。 \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_43:0 "你只有先愛自己，才能愛別人。 \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_44:0 "C.C.，我不知道雪為什麼是白色的，但我確實覺得這樣的白雪很美。我不討厭它。 \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_45:0 "是的，我就是Zero，統領黑色騎士團的男人，挑戰神聖不列顛尼亞帝國的男人，掌控著整個世界的男人。 \n——Zero"
 LOADING_TIP_46:0 "人類的心靈始終是我們一切力量的泉源。正因如此，人民才會奮起反抗宦官，黑騎士團才會像巨人般戰鬥。我們用心靈的力量戰鬥！ \n——Zero"
 LOADING_TIP_47:0 "我名為魯路修·Vi·不列顛尼亞，是瑪麗安娜皇后的長子，被帝國拋棄的王子。若有人想阻止我，儘管放馬過來！若有人能超越我的絕望！ \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_48:0 "卡蓮，你必須§R活下去§! 。\n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_49:0 "我無意戰勝神明。我除了請托以外一無所為。是的，如今我終於真正理解自己。神明啊，集體無意識！請不令時間停止流逝！\n ——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_50:0 "是的，從今天起，從這一刻起，世界就屬於我！魯路修·Vi·不列顛尼亞命令你們！臣民們，服從我！世界，服從我！\n ——布里塔尼亞帝國第99代皇帝"
 LOADING_TIP_51:0 "是的，我……毀滅世界……然後……重新創造了它。 \n——魯路修·Vi·不列顛尼亞"
 LOADING_TIP_52:0 "一旦我將革命帶給全世界，我就可以自豪地說，我已躋身歷史偉人之列，人民將高呼我的名字，傳頌萬年！ \n——盧卡·朱可夫"
 LOADING_TIP_53:0 "記住這個名字！記住傑雷米亞·歌特瓦爾德！牢記這個名字，因為這是擊敗你的那人令人難忘的名字。 \n——傑雷米亞·歌特瓦爾德"