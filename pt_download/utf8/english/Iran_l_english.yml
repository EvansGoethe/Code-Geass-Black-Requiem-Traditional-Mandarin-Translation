 middle_fed:0 "阿拉伯聯合王國"
 IRN_declining_foreign_influence:0 "外國影響力衰退"
 sultan_democracy:0 "蘇丹們的民主"
 IRN_declining_foreign_influence_desc:0 "近代以來，中東一直是歐亞大陸兩大超級大國——中華聯邦與歐洲聯合共和國——的角力場。儘管如此，隨著近來櫻石的發現與日本的危機，我們正逐漸被隔絕於外國影響力之外，而國內的不穩定卻與日俱增……"
 oil_crisis:0 "石油巨頭正在衰落"
 oil_crisis_desc:0 "中東是迄今爲止地球上石油生產和開採最重要的地區。不幸的是，自從發現櫻石以來，化石資源在工業化國家中的重要性一直在下降，特別是在我們最重要的合作伙伴——不列顛尼亞。尤其是外國需求的持續下降，導致了煉油廠和石油公司的衰落，以及國家資金的短缺。情況十分嚴峻，§R但可能會變得更糟。§!"
 sultan_democracy_desc:0 "當前的政治體系由德黑蘭委員會主導，該委員會由來自中東各地的幾位君主組成。數十年來，這個得到歐洲和中國支持的機構一直在維持該地區的穩定，卻損害了各國的諸多利益。此外，下層階級和衆多少數羣體要麼被忽視，要麼被壓制，這因此在民衆中造成了持續的不滿。"
