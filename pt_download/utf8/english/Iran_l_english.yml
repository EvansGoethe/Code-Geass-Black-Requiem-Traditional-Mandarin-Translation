l_english:
 POLITICS_ARAB_COUNCIL_DESC:0 "聯邦的主要政府由一個殘餘議會組成；特別是每個月，負責各個阿拉伯國家的君主們都會討論從地緣政治到經濟等各種議題。"
 IRN:0 "伊朗帝國"
