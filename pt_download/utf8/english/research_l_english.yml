 RESEARCH_YEAR_AHEAD_PENALTY:1 "§R該科技目前超前$YEARS|2$年（+$VALUE|%0$）。超前懲罰將會隨時間的過去而降低。§!"
 RESEARCH_YEAR_AHEAD_PENALTY_RED:2 "§R該科技目前超前$YEARS|2$年（+$VALUE|%0$），但由於國策影響，超前懲罰已減少$REDUCED_YEARS|.1$年（+$RED|%0$）。超前懲罰將會隨時間的過去而降低。§!"
