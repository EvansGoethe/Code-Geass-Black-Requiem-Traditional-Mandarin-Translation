 masterful_blitz:0 "大師級閃電戰"
 masterful_blitz_desc:0 "閃電戰可能不是我們發明的，但我們會發展和完善這個戰術。即使是最堅固的防線，也無法阻止我們光榮軍隊的前進。"
 penal_infantry:0 "懲戒營"
 penal_infantry_desc:0 "懲戒營爲被判決有罪的紅軍士兵和軍官提供了爲祖國流血犧牲、爲過去犯下的可恥行爲贖罪的機會。"
