 ASSAULT_LABEL:0 "突襲"
 ASSAULT_LABEL_TT:0 "着眼於用裝甲直接進行正面突破。"
 INFILTRATION_LABEL:0 "滲透"
 INFILTRATION_LABEL_TT:0 "着眼於詭道與非傳統士兵戰略。"
 DEEP_BATTLE_LABEL:0 "縱深戰鬥"
 DEEP_BATTLE_LABEL_TT:0 "提高深入敵方領土時的攻擊與支援能力。"
 MASS_MOBILIZATION_LABEL:0 "大規模動員"
 MASS_MOBILIZATION_LABEL_TT:0 "最大化徵募與集羣作戰能力。"
 FLEET_IN_BEING_DESC:0 "一支以戰列艦爲核心的強大艦隊意味着我方在海上不容被忽視。"
 TRADE_INTERDICTION_DESC:0 "應對強勢敵海軍時，我方可以着眼於讓敵艦隊陷入疲憊並打擊補給線來敵方的戰爭機器陷入困頓。"
 BASE_STRIKE_DESC:0 "大幅側重於航母與其支援，無論在海洋或是陸地都沒有我方觸及不到的敵人。"
 AIR_SUPERIORITY_DESC:0 "我方戰鬥機是空軍骨幹，它們負責捍衛領空、護航轟炸機並替地面單位掃蕩敵機。"
 BATTLEFIELD_SUPPORT_DESC:1 "提高密接支援和地面部隊協作的緊密性，我方將以最佳的支援讓敵方部隊潰不成軍。"
 OPERATIONAL_INTEGRITY_DESC:0 "戰術轟炸機用途多樣，既能進行常規轟炸也能運用於對地支援。"
 STRATEGIC_DESTRUCTION_DESC:0 "在夜間甚至更危險的白天對敵方工廠進行轟炸，我方可以嚴重擾亂敵方的戰爭機器。"
