 filler_frigate_tech_desc:0 "開發中"
 filler_destroyer_tech:0 "一戰驅逐艦學說"
 filler_destroyer_tech_desc:0 "開發中"
 filler_cruiser_tech:0 "一戰巡洋艦學說"
 filler_cruiser_tech_desc:0 "開發中"
 filler_carrier_tech:0 "一戰航母學說"
 filler_carrier_tech_desc:0 "開發中"
 filler_submarine_tech:0 "一戰潛艇學說"
 filler_submarine_tech_desc:0 "開發中"
 SUPPORT_TITLE_SUPPORT_INFANTRY:0 "支援連"
 signal_company_tech:0 "通信連科技"
 signal_company_tech_desc:0 "在戰場上建立和維持通信向來需要特殊的技能。隨着第一次世界大戰中新型通信和探測技術的出現，這種實踐迎來了新的可能性。"
 signal_company_tech_2:0 "通信連 II"
 signal_company_tech_2_desc:0 "專注軍種間通信之通信連可確保地面部隊協調海空行動，加速機動規劃"
 signal_company_tech_3:0 "通信連 III"
 signal_company_tech_3_desc:0 "逐步完善的便攜通訊科技在單兵攜帶的揹包形式下更加可行。由此得到改善的通訊連機動力應被利用。"
 signal_company_tech_4:0 "通信連 IV"
 signal_company_tech_4_desc:0 "我方通訊技術兵們在運用通訊裝備上有着無可比擬的實地經驗。讓他們參與新型通訊科技的研究將活用他們的技能。"
 recon_company_tech:0 "偵察連 I"
 recon_company_tech_desc:0 "在主力行進前派出小股斥候以獲得敵人位置和數目的情報。"
 recon_company_tech_2:0 "偵察連 II"
 recon_company_tech_2_desc:0 "偵察任務往往危機四伏傷亡重大。讓偵察隊做好頻繁轉移、撤退的準備，並提供工具以清理敵軍佈置的障礙物都將提高他們的生還幾率。"
 recon_company_tech_3:0 "偵察連 III"
 recon_company_tech_3_desc:0 "無線電技術的發展改變了偵察任務的執行方式，使得迅速傳遞情報變爲可能。"
 recon_company_tech_4:0 "偵察連 IV"
 recon_company_tech_4_desc:0 "結合了諜報，遊擊行動與別動隊訓練的深度偵查作戰行動將有助於我方的戰術抉擇並讓我方能隨機應變調整決策。"
 maintenance_company_tech:0 "維修連 I"
 maintenance_company_tech_desc:0 "維護、修理及檢修對於保持裝備安全可靠以供使用至關重要。派專門的連隊負責將保證此方面得到合適的關注。"
 maintenance_company_tech_2:0 "維修連 II"
 maintenance_company_tech_2_desc:0 "例行維護程序將降低裝備故障的風險並警示士兵在裝備損壞前就更換。"
 maintenance_company_tech_3:0 "維修連 III"
 maintenance_company_tech_3_desc:0 "確保士兵在戰場上總有基本素材進行常規修理可以避免裝備在已知損壞的情況下被持續使用。"
 maintenance_company_tech_4:0 "維修連 IV"
 maintenance_company_tech_4_desc:0 "大戰中主動冗餘設計經驗可革新應用於更現代裝備，使維護更簡易"
 logistics_company_tech:0 "後勤連 I"
 logistics_company_tech_desc:0 "編設專業後勤軍官將確保支援網絡高效運行，最大限度減少浪費"
 logistics_company_tech_2:0 "後勤連 II"
 logistics_company_tech_2_desc:0 "針對新的戰爭環境來調整我方風險評估會提高我方後勤支援的安全性。"
 logistics_company_tech_3:0 "後勤連 III"
 logistics_company_tech_3_desc:0 "對部隊補給需求進行持續性統計評估將有助於我方資源使用效率的最大化。"
 logistics_company_tech_4:0 "後勤連 IV"
 logistics_company_tech_4_desc:0 "爲供應品制定標準化分類將最大限度地減少混亂，並使規劃更有效率。"
 field_hospital_company_tech:0 "野戰醫院 I"
 field_hospital_company_tech_desc:0 "傷亡未必意味士兵陣亡。確保這點的第一步是對撤到後方的傷員進行第一時間急救。"
 field_hospital_company_tech_2:0 "野戰醫院 II"
 field_hospital_company_tech_2_desc:0 "建立便攜醫院體系，將醫療送至所需之處，可避免大量不必要傷亡與永久性創傷"
 field_hospital_company_tech_3:0 "野戰醫院 III"
 field_hospital_company_tech_3_desc:0 "外科手術系戰場最常見急救處置。相關程序與器械須更靠前配置，且須確保熟練外科軍醫編入醫療單位"
 field_hospital_company_tech_4:0 "野戰醫院 IV"
 field_hospital_company_tech_4_desc:0 "儘管戰場醫療已獲得諸多改進和長足進步，但仍未建立好理論體系。活用積累下的經驗，我方能更清楚地詮釋這些單位的職責，並將各類創新手段變成固定程序。"
 engineer_company_tech:0 "工兵連 I"
 engineer_company_tech_desc:0 "構築工事及清理障礙的能力使工兵在戰場上至關重要。讓工兵扮演全能的戰場角色將使我方能在各種各樣需要他們的環境中部署他們。"
 engineer_company_tech_2:0 "工兵連 II"
 engineer_company_tech_2_desc:0 "擁有了現代化裝備和高爆炸藥後，我方工兵將走出傳統角色，在陸上與海洋利用創造力打敵人措手不及。"
 engineer_company_tech_3:0 "工兵連 III"
 engineer_company_tech_3_desc:0 "軍事工程項目的規模正逐步擴大。先進的基礎設施支援將使過去因需求大量補給而無法在戰場上實行的作業變爲現實。"
 engineer_company_tech_4:0 "工兵連 IV"
 engineer_company_tech_4_desc:0 "保持機動的同時還能構築補給系統和過去被視作“永久性”的防禦工事，未來的工兵將確保我軍士兵無論在何處遭敵攻擊都能作好萬全準備。"
 military_police_company_tech:0 "憲兵隊 I"
 military_police_company_tech_desc:0 "一般士兵也許可以短暫管理佔領區，但他們首要且最重要的角色是戰士。將憲兵整合入我軍將保證我方有餘力應對抵抗勢力並針對破壞行動展開調查。"
 military_police_company_tech_2:0 "憲兵隊 II"
 military_police_company_tech_2_desc:0 "通過在佔領區履行諸如交通管理和維持公共秩序類的一般警察職責，我方憲兵將使滋生反抗軍運動的混亂與無序最小化。"
 military_police_company_tech_3:0 "憲兵隊 III"
 military_police_company_tech_3_desc:0 "通過與佔領前發展的線人、建立的當地間諜網進行合作，我方憲兵能在抵抗勢力可能產生的區域先行作好準備。"
 military_police_company_tech_4:0 "憲兵隊 IV"
 military_police_company_tech_4_desc:0 "對妥善維持佔領區治安來說，迴歸常態與拔除反抗同等重要。我方憲兵必須保證這個過程儘早展開以確保軍民安全。"
