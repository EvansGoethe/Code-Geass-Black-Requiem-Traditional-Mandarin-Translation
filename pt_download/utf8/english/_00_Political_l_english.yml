 revolutionary_jacobinism:0 "革命雅各賓主義"
 revolutionary_jacobinism_desc:0 "在一個看似已遠離昔日革命動盪年代的世界裡，許多人驚訝地發現，一種曾經被鄙視和恐懼的意識形態的殘餘在當代仍有支持者。§Y革命雅各賓主義§!是其歷史同名的現代化身，它以集體主義經濟學說和自由主義社會政策的驚人融合而存在。儘管名聲受損，但這種意識形態仍然吸引著那些被其社會平等願景和民族主義熱情所吸引的追隨者。深入探究其信條，就會發現其複雜的政治結構，其中一位魅力非凡的領導人佔據著至高無上的地位，並由雅各賓運動中頗具影響力的人物組成的委員會提供支援。引人注目的是，它採用了類似於昔日專制政權所採用的手段，例如秘密警察和青年組織，來剷除異議並鞏固權力。即使在外交政策問題上，革命雅各賓主義也表現出與左翼意識形態保持一致的意願，儘管在生存需要時會務實地調整其立場。"
 military_bolshevism:0 "軍事布爾什維主義"
 military_bolshevism_desc:0 "§Y軍事布林什維主義§!是一種重視社會的軍事化，強調軍隊在革命程序中的中心角色的社會主義形式。軍事布林什維主義主張成立在革命國家中成立有高度紀律性、中心化的軍事機構，認為軍隊應該充當無產階級革命的先鋒。這一意識形態優先使用暴力和強迫達成革命目標，常使用強硬手段鎮壓反對派和維持控制。軍事布林什維主義尋求透過將關鍵機構軍事化並把嚴格軍事紀律同等地施加於軍人和平民來鞏固權力。它代表了馬克思主義的一種極端表現形式，強調武裝鬥爭在實現並保持社會改革中的首要地位"
 national_bolshevism:0 "民族布爾什維主義"
 national_bolshevism_desc:0 "§Y民族布林什維主義§!融合了社會主義經濟原則和狂熱的民族主義。主張包括從國家資本主義到指令式計劃經濟的社會主義經濟模式。民族布林什維主義者偏向於保守，在一些情況下有反動傾向。他們常對沙文主義觀點和文化霸權持支援態度，有時會主張極端的同化政策甚至不顧少數族裔採取強硬措施。強調傳統的家庭價值和宗教影響的復興，特別是教會的中心地位。最重要的是，民族布林什維主義傾向民族主義，反對全球共運，取而代之的是接納布哈林一國建成社會主義理論。他們的外交政策各有不同，有些傾向孤立主義，另一些則表現為“紅色帝國主義”。"
 balkan_socialism:0 "巴爾幹社會主義"
 balkan_socialism_desc:0 "與其他官僚主義和技術官僚主義的共產主義流派相比，§Y巴爾幹社會主義§!這種意識形態體現了一種英雄主義崇拜，以積極參與革命的游擊隊員的領導為核心。它由克羅埃西亞布林什維克約瑟普·提托創立，提托因其對多瑙河聯邦和歐盟的頑強抵抗而被譽為“巴爾幹之狼”。這種意識形態主張建立一個權力較為分散的國家，並倡導多民族的兄弟情誼和團結。其核心原則包括由類似於蘇維埃的工廠委員會推動的工人自治，以及市場社會主義等混合經濟政策。這些國家往往在強硬的統治和內部的讓步之間搖擺不定，使其本質上不穩定且容易滋生不滿，如同一個隨時可能引爆的火藥桶。"
 centralist_communism:0 "中央集權共產主義"
 centralist_communism_desc:0 "§Y中央集權共產主義§!強烈反對技術官僚制和聯邦制，強調普通民衆參與黨組織的重要性，而非技術官僚精英。這種意識形態摒棄了技術官僚統治的理念，轉而倡導崇尚簡樸生活、重視普通公民智慧和經驗的制度。它強調基層參與和集體決策的重要性，以確保政策符合廣大民衆的需求。然而，中央集權共產主義也秉持着極權主義和高度中央集權的國家理念，由單一的執政共產黨掌握絕對權力。儘管它強調簡樸生活，但這種意識形態對社會和經濟的各個方面都實行嚴格控制，限制個人自由，以維護集體目標和國家至上。最終，少數羣體被視爲對國家社會凝聚力的威脅，任何追求自治的行爲都被視爲破壞國家統一。"
 technocratic_communism:0 "技官共產主義"
 technocratic_communism_desc:0 "§Y技官共產主義§!在先鋒派運動中，該運動因其堅信必須建立一個強大的黨國來領導向共產主義的革命而顯得尤爲突出。它設想的理想政府是一個愛國的官僚機構，通過執行著名的五年計劃來推行技術官僚式的計劃經濟。這種意識形態的特點是強烈的民族主義意識，以及致力於爲普通民衆實現社會經濟進步的決心，即便這意味着要讓他們在強大的祕密警察的嚴密監視下接受全面的監控。在外交政策方面，該運動採取務實的態度，展現出與非共產主義勢力談判和接觸的意願。"
 revolutionary_front:0 "革命陣線"
 revolutionary_front_desc:0 "§Y革命陣線§!是一個倡導通過直接行動和基層動員實現激進變革的意識形態運動。它拒絕傳統的政治結構，旨在瓦解現有的權力與特權體系，建立一個更加公正的社會。其意識形態的核心是賦予工人階級和受壓迫羣體權力，使其成爲變革的推動者。“革命陣線”促進社會運動間的團結，鼓勵集體反抗壓迫和不公正。它強調去中心化的組織和橫向的決策過程，力求賦予地方社區自主決定自身未來的權力。通過抗議、罷工和社區組織等一系列策略，“革命陣線”挑戰根深蒂固的權力結構。其目標是創造本土化的變革，構想一個擺脫資本主義、帝國主義和一切形式壓迫的世界。"
 anarcho_communism:0 "無政府共產主義"
 anarcho_communism_desc:0 "§Y無政府共產主義§!無政府共產主義者主張通過革命手段立即廢除國家，旨在根除私有財產、僱傭勞動、資本主義和社會等級制度。傳統上，他們設想以自治的村落公社和城邦聯盟取代國家，而現代支持者則傾向於分散的聯邦制。在經濟方面，無政府共產主義者分爲兩派：一派支持禮物經濟和廢除貨幣，另一派則傾向於自由市場無政府主義模式，建立公社和工人合作社，以勞動券和物物交換取代貨幣。無政府共產主義者堅決反對歧視，並捍衛包括婦女和少數族裔在內的邊緣羣體的權利。雖然許多無政府共產主義者是無神論者或反教權主義者，但他們尊重宗教自由，儘管也有一些人是反神論者，主張徹底根除宗教。"
 anarcho_pacifism:0 "無政府和平主義"
 anarcho_pacifism_desc:0 "§Y無政府和平主義§!無政府和平主義者代表了一種堅決反對暴力的無政府主義意識形態，他們主張以和平的方式進行抵抗，以實現社會變革。他們認爲暴力與無政府主義的原則（例如反對等級制度和統治）背道而馳，因此將公民不服從和建立自由主義社區作爲變革的主要手段。一些支持者主張迴歸農業鄉村生活，而另一些人則尋求在工業化與生態可持續性和工人控制之間尋求平衡。許多人支持禮物經濟或復興物物交換制度。無政府和平主義者的目標不僅是廢除國家，還主張取消警察和軍隊，他們認爲所有衝突都可以通過對話、談判和妥協和平解決。在社會層面，他們倡導包容性，歡迎來自各種背景和信仰的人，以及少數羣體等受壓迫羣體。"
 left_libertarianism:0 "左翼自由主義"
 left_libertarianism_desc:0 "§Y左翼自由主義§!左翼自由主義涵蓋了一系列平等主義、反威權主義的意識形態，這些意識形態既重視個人自由，也重視社會平等。左翼自由主義者反對資本主義和私有財產，支持個人財產權，並倡導生產資料的公有制或社會所有制，其理念涵蓋了從市場無政府主義到分散式計劃經濟的各個方面。左翼自由主義者的獨特之處在於他們對個人自主和公民自由的堅定承諾，他們常常倡導思想自由和廢除傳統家庭結構。婦女權利是他們關注的重點，許多人致力於瓦解父權制體系。批評者可能會譴責左翼自由主義是烏托邦式的，並指責他們在充滿挑戰的環境下妥協原則，從而與他們所反對的威權主義措施相呼應。"
 neo_menshevism:0 "新孟什維克主義"
 neo_menshevism_desc:0 "§Y新孟什維克主義§!它體現了一種獨特的俄羅斯式改良社會主義，自詡爲孟什維克在爭取國家未來的歷史鬥爭中的繼承者。他們主張通過民主改革、與工會合作以及過渡性的資本主義階段來實現社會主義，同時還擁護世俗化、多元文化主義和少數民族自治。他們譴責官僚腐敗和政治無能，力圖實現過去革命者的目標。爲了實現這些目標，他們採取了與布爾什維克對手類似的策略，支持建立祕密警察和在軍隊中設立政治委員。有些人甚至認爲，爲了捍衛自由和革命免受威脅，恢復古拉格勞改營是必要之惡。"
 syndacalism:0 "工團主義"
 syndacalism_desc:0 "§Y工團主義§!工團主義植根於直接行動以瓦解資本主義，涵蓋總罷工、工業破壞和武裝起義等多種策略。革命後，工團主義者設想將生產資料控制權移交工會，通過徹底改造社會政治結構來優先實現工業民主。這種重構包括解散政黨及削弱自上而下的權威。工團主義陣營內部存在明顯分歧：“革命”工團主義者主張建立去中心化的聯邦制國家，而“無政府工團主義者”則追求消解國家機器，建立自治公社。部分激進派甚至主張以民主控制的民兵組織取代常備軍隊。工團主義聚焦城市發展的理念獲得城市勞動者廣泛支持，他們往往對農村地區持懷疑態度。衆多工團主義者倡導大規模城市化與工業化進程，稱之爲“向前衝刺”，以壯大其運動力量。"
 utopian_communism:0 "烏托邦共產主義"
 utopian_communism_desc:0 "§Y烏托邦共產主義§!被稱爲理想主義者的這羣人主張復興伊萬式的共產主義，摒棄技官馬克思主義，轉而採取更爲革命的路線。他們斷言，真正的共產主義只能通過階級鬥爭和推翻腐敗制度來實現。他們不依賴官僚機構，而是相信應該賦予無產階級權力，讓他們領導變革。他們的政策包括廢除人民代表大會中的政黨、開展階級鬥爭、實行資源集體化、廢除私有財產、實行社會公有化以及建立革命民兵。他們認爲，這些措施是實現共產主義最終目標的必要步驟，在共產主義中，權力和資源將在社會所有成員之間平等共享。"
 revisionist_communism:0 "修正共產主義"
 revisionist_communism_desc:0 "§Y修正共產主義§!修正共產主義，又稱實用主義者，其根源可追溯至與馬克西姆·布尼納相關的技術官僚和黨羽。他們摒棄了激進革命變革的道路，認爲伊凡的去世標誌着此類努力的失敗，並主張採取審慎的務實轉型，認爲這是通往共產主義最可行的途徑。這一派別優先考慮妥協和聯盟建設，例如他們參與了人民代表大會內部的團結聯盟。他們主張與小資產階級妥協，反對集體化，而是傾向於市場社會主義傾向，並允許有限的財產所有權。修正主義共產主義者主張建立一箇中央集權的安全機構來維護穩定，同時推行旨在逐步實現社會經濟轉型的政策，力求以務實和審慎的態度應對向共產主義過渡的複雜性。"
 agrarian_socialism:0 "農業社會主義"
 agrarian_socialism_desc:0 "與以城市爲中心的社會主義不同，§Y農業社會主義§!維護農村農民的利益，倡導土地社會化、土地改革和財富再分配，以減輕農民的負擔。他們還致力於打破壟斷，挑戰地主階級的統治。農業社會主義者的支持基礎紮根於農村社區，他們往往持有保守的社會價值觀，強調傳統的家庭結構和教會的影響力。他們對城市自由主義者持懷疑態度，儘管有些人支持有限的進步改革，例如免費教育和醫療保健，以及象徵性的婦女權利措施。更激進的派別則擁抱綠色政治，包括環境保護和社會正義，並將基層民主置於首位。"
 trade_unionism:0 "工會主義"
 trade_unionism_desc:0 "§Y工會主義§!作爲一種政治治理形式，工會主義的核心是通過有組織的工會來維護工人的權利。與主張更爲激進的工團主義者截然不同，工會主義者堅持在代表制議會框架內奉行社會主義民主原則。他們強調集體談判、協商和直接行動，以確保公平的工資、更好的工作條件和社會保障。工會主義者致力於實現工作場所的民主化，賦予工人決策權，挑戰等級制度，並促進工作場所的民主。他們優先考慮工人之間的團結，以應對剝削和不平等。通過倡導最低工資法和工人安全法規等政策，工會主義者旨在現有政治體系內重新平衡權力格局，使之有利於工人。"
 social_monarchism:0 "社會君主主義"
 social_monarchism_desc:0 "§Y社會君主主義§!社會君主主義，又稱布爾什維克君主主義，是一種獨特的意識形態，它將傳統的君主專制與社會主義原則相結合。在這種體制下，君主擁有不受制約的權力，而社會主義政策則由國家強制執行。與權力受法律限制的君主立憲制不同，社會君主制主張統治者擁有絕對權力，以此象徵民族團結和傳統。財富再分配和關鍵產業國有化等社會主義理想均由君主頒佈法令予以實施。儘管君主制具有絕對主義性質，但這種意識形態仍然強調社會經濟平等和工人階級的福祉，儘管這一切都建立在君主權力的牢牢掌控之上。社會君主制力求將歷史上的君主制與進步的社會主義目標相協調，從而建立一個融合傳統、中央集權治理和社會主義政策的政權。"
 social_democracy:0 "社會民主主義"
 social_democracy_desc:0 "§Y社會民主黨§!最初由那些反對馬克思關於全球革命和暴力變革必要性的預言的人組成，他們主張通過漸進的法律改革來實現社會主義。他們不試圖瓦解資本主義，而是力圖利用資本主義自身的力量，從而建立一個健全的福利國家、累進稅制、全民醫療保健、免費教育和社會市場經濟。他們強調階級合作而非衝突，支持集體談判和合作社，同時捍衛少數羣體的權利。許多社會民主黨人主張通過外交手段開展國際合作。儘管他們的理念被認爲具有烏托邦色彩，但歷史上也存在背叛和機會主義的例子，例如與企業利益結盟以及利用社會偏見來獲取選舉利益。儘管有人批評他們的做法是“紅色資本主義”，但社會民主黨人仍然堅定地致力於進行一場文明的革命。"
 reformist_socialism:0 "改良社會主義"
 reformist_socialism_desc:0 "§Y改良社會主義§!改良社會主義主張通過和平、合法和民主的手段實現社會主義，摒棄革命方法以避免進一步的動盪。他們重視積極參與選舉和議會進程，力求在現有政治框架內推行社會主義政策。在經濟方面，改革派社會主義通過建立健全的福利國家、推行管理主義和經濟計算機化來推進社會主義，同時由於普遍存在的腐敗問題而削弱工會的影響力。一些支持者支持企業工會主義和提高自動化程度。值得注意的是，他們倡導青年運動以對抗老年統治和解決青年人的失望情緒，旨在提拔青年成員擔任領導職務。改革派社會主義雖然致力於通過和平民主的渠道實現社會主義，但經常受到中央集權共產主義者的批評，後者主張採取更加革命和集中的方式。"
 social_liberalism:0 "社會自由主義"
 social_liberalism_desc:0 "§Y社會自由主義§!社會自由主義者認爲政府的作用在於扶助弱勢羣體並最大化公民幸福感，將公共利益與個人自由相協調。他們將社會問題歸咎於個人缺陷而非制度缺陷。他們主張賦權有能力的領導者，支持免費教育、全民醫療和公共工程項目等計劃以改善基礎設施和消除貧困。社會自由主義者通常擁抱進步的文化價值觀，倡導社會市場經濟、自由貿易和創業精神。儘管他們支持工人權益，卻對工會抱有懷疑甚至敵意。他們拒絕激進主義，主張改革與妥協，常爲安撫其他政治派別而調整自身主張。"
 radical_liberalism:0 "激進自由主義"
 radical_liberalism_desc:0 "§Y激進自由主義§!激進自由主義者主張在維護個人自由與集體福祉之間取得平衡的同時，推動社會發生重大變革。他們尋求實質性改革以解決系統性不平等問題，促進社會正義，但其改革力度不及社會民主黨。激進自由主義者優先考慮進步政策，例如全面的社會福利計劃和教育改革，其立場介於社會自由主義者的溫和路線和社會民主黨更具變革性的議程之間。他們擁抱文化多樣性和包容性，力求以大膽而務實的方式應對社會挑戰。在經濟方面，他們支持受監管的資本主義，並採取措施確保財富的公平分配，其立場介於社會自由主義者的溫和立場和社會民主黨更偏向市場導向的路線之間。激進自由主義者主張通過改革與大膽行動相結合的方式實現有意義的變革。"
 market_liberalism:0 "市場自由主義"
 market_liberalism_desc:0 "§Y市場自由主義§!市場自由主義者推崇個人主義和法治，主張小政府，限制政府幹預。他們支持市場自由化，主張放松管制、私有化和自由貿易，以實現自由放任的資本主義社會。市場自由主義者反對工會和工人權利，主張精英制度，認爲努力工作才能獲得成功。他們認爲福利制度效率低下，鼓勵自力更生。市場自由主義者包容多元的生活方式，致力於構建一個全球化的互聯市場，以提高盈利能力和資源獲取。然而，他們的資本主義觀點將一切事物，包括個人，都視爲商品。市場自由主義者力求迎合保守和非傳統消費者，並將利潤最大化置於首位。"
 ancap:0 "無政府資本主義"
 ancap_desc:0 "§Y無政府資本主義§! 無政府資本主義代表了市場自由主義的極端形態，主張建立不受監管的自由市場，讓個人得以自由施展。無政府資本主義者主張廢除國家，用私營安保機構、法院、監獄和僱傭軍取代政府機構，所有這些都在不受限制的自由市場中運作。許多人支持分散式貨幣或迴歸金本位制。儘管存在批評，無政府資本主義者仍認爲由此形成的企業權力新封建狀態是可取的。他們將“市場無形之手”奉若神明，主張完全不受監管的市場自主。無政府資本主義者支持毒品交易合法化、國際軍火貿易擴張，甚至主張恢復國際奴隸貿易，視萬物衆生皆爲商品。在社會層面，他們堅持在非侵略原則框架內維護個人自由。"
 national_conservatism:0 "民族保守主義"
 national_conservatism_desc:0 "§Y民族保守主義§!體現了一種民族主義傾向的保守主義，優先考慮國家利益和文化或民族認同的維護。他們主張國家利益至上，承諾保護國家免受內外威脅。他們強調公民有義務熱愛、服務和保衛祖國，並致力於傳承和保護傳統文化，造福子孫後代。民族保守主義者對外國文化和媒體保持警惕，經常審查和審查外國媒體。他們視家庭爲國家基石，並倡導傳統的家庭價值觀。雖然有些民族保守主義者是世俗主義者，但許多民族保守主義者支持與宗教團體合作。他們通常反對移民，傾向於採取嚴格的限制措施甚至徹底禁止移民。在經濟方面，他們支持能夠增強國家實力的政策，無論是混合經濟、社團主義還是自由市場資本主義，並且通常支持軍事行動。"
 social_conservatism:0 "社會保守主義"
 social_conservatism_desc:0 "§Y社會保守主義§!社會保守主義者重視家長式作風、自然法和等級制度，視家庭爲社會基石，並維護傳統價值觀和性別角色。他們倡導建立以維護法律和秩序爲核心的道德政府，同時捍衛保守主義原則。社會保守主義者尋求政府、民衆和教會之間的合作，以實現共同利益。在經濟方面，他們支持以小型企業、家庭農場和愛國企業爲基礎的道德經濟，對社會福利持懷疑態度，更傾向於私人慈善事業。他們主張低稅收、低關稅和低配額以保護國內產業，並支持恢復金本位制或以貴金屬或農產品爲貨幣儲備。雖然他們對工會持謹慎態度，但可能支持教會或國家運營的替代方案。"
 liberal_conservatism:0 "自由保守主義"
 liberal_conservatism_desc:0 "§Y自由保守主義§!自由保​​守主義融合了傳統的保守價值觀和自由主義理念，力求在社會進步與維護基本制度和習俗之間取得平衡。它優先考慮個人自由、限制政府幹預和堅持法治。自由保守主義者主張漸進式改革而非劇烈變革，強調在穩步發展的同時維護社會穩定。他們擁護自由市場、企業家精神和個人責任，同時也支持建立健全的社會保障體系來幫助有需要的人。在文化方面，他們提倡在傳統價值觀框架內實現寬容、多元和包容。家庭在他們的世界觀中佔據核心地位，他們經常與宗教團體合作以增強社會凝聚力。自由保守主義致力於傳統與創新的和諧融合，爲治理和社會發展提供了一種務實的途徑。"
 britannian_con:0 "不列顛尼亞憲政主義"
 britannian_con_desc:0 "§Y不列顛尼亞憲政主義§!不列顛憲政主義代表了一種全新的意識形態，誕生於魯路修時代之後，由娜娜莉女皇領導下的不列顛尼亞。其主要目標是在帝國傳統的家長式價值觀與現代民主原則之間尋求平衡。因此，它提倡一種類似於半君主立憲制的混合政體，由首相和女皇共同領導。這種意識形態優先考慮逐步消除歧視和文化仇外心理，尤其針對“Numbers”，這標誌着與以往帝國政策的決裂。它還倡導有限的新聞自由，並營造有利於公開討論和思想交流的環境。布里塔尼亞憲政主義力求通過透明且負責任的政府來促進國家團結與穩定，這標誌着與以往威權主義的決裂。總而言之，它代表着不列顛尼亞帝國向更加包容和自由的社會邁出的關鍵一步。"
 aristocratic_paternalism:0 "貴族家長制"
 aristocratic_paternalism_desc:0 "§Y貴族家長制§!貴族家長制是一種建立在以下前提之上的意識形態：社會精英（通常出身貴族）有責任監督和保障下層民衆的福祉。它根植於傳統的等級結構，主張上層階級對下層階級提供仁慈的指導和保護。這種意識形態通過少數特權階層的領導來促進社會穩定和延續，這些特權階層被視爲社會福祉的守護者。儘管有人批評它加劇了不平等並限制了社會流動性，但也有人認爲它培養了統治階級對弱勢羣體的責任感和義務感。本質上，貴族家長制認爲精英階層既有能力也有義務領導和關愛社會。"
 pat_conservatism:0 "家長制保守主義"
 pat_conservatism_desc:0 "§Y家長制保守主義§!家長制保守主義是一種強調國家在引導和保護公民方面所扮演的角色，類似於父親形象的意識形態。它植根於傳統的保守價值觀，優先考慮社會穩定、秩序和權威。這種意識形態主張建立一個強大的中央政府，干預經濟和社會，以確保公民的福祉和道德教化。家長制保守主義者相信維護家庭、社區和等級制度等傳統價值觀，認爲這些價值觀對於維持社會凝聚力和道德標準至關重要。支持者認爲，家長制保守主義爲應對社會挑戰提供了一個框架，同時又能保留保守主義的核心原則。"
 conservative_one_party_democracy:0 "保守派一黨民主"
 conservative_one_party_democracy_desc:0 "§Y保守派一黨民主§!保守派一黨制民主倡導以單一的保守黨爲主導的政治體系。這種意識形態根植於這樣的信念：穩定和延續性最好通過統一的政治實體來維護。它優先考慮傳統價值觀、有限的政府幹預和自由市場原則。支持者認爲，一黨制框架消除了多黨政治的低效，確保了快速決策和團結的治理。他們提倡精英領導結構，個人憑藉能力和對黨原則的忠誠而非競爭性選舉獲得晉升。然而，批評者對這種體系中固有的威權主義和缺乏多元化的可能性表示擔憂，並警告說，這種體系會導致異議聲音被壓制，民主原則遭到侵蝕。儘管如此，保守派一黨制民主仍然是一個頗具爭議的概念，支持者們力挺其在促進穩定和經濟增長方面的優勢。"
 authoritarian_sub:0 "威權民主主義"
 authoritarian_sub_desc:0 "§Y威權民主主義§!威權民主主義是一種意識形態體系，其特點是表面上的民主制度與高度集中的控制和權力相結合。在這種體系下，選舉雖然可能舉行，但往往受到嚴密控制或操縱，以確保單一執政黨或個人的勝利。儘管公民可能在一定程度上參與政治進程，但異議和反對派通常會通過審查、恐嚇或脅迫而被壓制。政府牢牢掌控權力，並常常以維護國家穩定和發展爲由爲其行爲辯護。批評者認爲，威權民主破壞了真正民主的原則，因爲它將權力的鞏固置於人民的權利和自由之上。儘管披着民主的外衣，這種意識形態卻以民衆的合法性爲幌子，使威權統治得以延續。"
 one_party_democracy:0 "一黨民主"
 one_party_democracy_desc:0 "§Y一黨民主§!一黨民主是一種主張權力集中於單一執政黨的政治體制意識形態，儘管其本質未必保守。雖然一黨民主與保守的一黨民主在強調穩定性和治理效率方面相似，但它可能更加務實，允許執政黨內部存在更廣泛的意識形態。這種模式旨在促進團結，簡化決策流程，從而迅速實施有利於社會進步的政策。然而，它也存在滋生威權主義傾向和壓制異議聲音的潛在風險。人們普遍認爲，一黨民主爲應對治理挑戰提供了一種切實可行的方案，它既能保持政治穩定，又能靈活應對社會需求。"
 semi_constitutional_monarchy:0 "二元制君主立憲制"
 semi_constitutional_monarchy_desc:0 "§Y二元制君主立憲制§!是一種君主與憲法規定的政府並存的政體，該政府通常由選舉產生的官員和/或委任的代表組成。在這種體制下，君主的權力受到憲法的限制，憲法明確規定了君主的權力範圍，並建立了權力制衡機制以防止絕對統治。雖然君主可能保留禮儀性或象徵性的角色，但實際的政治權力通常掌握在憲政政府手中。該制度旨在將君主制的穩定性和延續性與民主和法治原則相結合。然而，君主與憲政政府之間的權力平衡會因各國的具體憲法安排和歷史背景而存在很大差異。"
 military_dictatorship:0 "軍事獨裁"
 military_dictatorship_desc:0 "§Y軍事獨裁§!是指由軍官統治的政府，其根源可以追溯到古希臘的軍人統治等古代制度，在古希臘，軍隊和政府是統一的。在現代，軍政府常常以捍衛民主或通過傀儡文官政府維護秩序爲幌子來掩蓋其統治。他們可能通過爲軍官保留議會席位或以維護穩定爲幌子操縱選舉來操縱政治進程。“軍事優先”政策將軍事需求置於民用商品和服務之上，社會也圍繞着支持和服役軍隊而運轉。青年組織被軍事化，爲子女服役做準備，而持不同意見的知識分子則被壓制。這類政權傾向於在國內和外交政策中使用武力，並常常推行擴張主義議程以鞏固自身權力。"
 oligarchic_government:0 "寡頭政治"
 oligarchic_government_desc:0 "§Y寡頭政治§!是指權力集中在少數特權精英手中的政體。寡頭政治的特點是財富極度不均、社會階層分化嚴重以及腐敗盛行，儘管有些寡頭能夠有效地控制這些問題，從而維持權力並安撫民衆。經濟控制對其生存至關重要，而這種控制往往是通過國家壟斷或企業集團實現的。寡頭將利潤最大化放在首位，對政體形式（無論是君主制還是共和制）漠不關心，只要能夠保住權力即可。他們炫耀財富，助長精英主義和享樂主義的社會風氣。爲了維持奢靡的生活方式，他們奉行以利潤爲先、而非以道德爲先的政策，常常掠奪弱小國家的資源，並操縱全球市場。儘管面臨經濟崩潰的風險，寡頭仍然將自身利益置於一切之上，奉行以維護自身統治地位爲核心的利己主義外交政策。"
 brit_reformism:0 "不列顛尼亞改良主義"
 brit_reformism_desc:0 "§Y不列顛改良主義§!不列顛改良派逐漸形成一種獨特的意識形態，並受到不列顛社會進步人士的擁護。與其名稱相反，不列顛改良派並非尋求從根本上改變不列顛尼亞的本質，而是致力於完善它，摒棄其最具破壞性的方面，同時保留其權力、影響力和文明。這一意識形態的核心在於維護一個強大且適應性強的不列顛，使其能夠在應對全球挑戰的同時蓬勃發展。權力主要掌握在首相手中，從而實現高效治理。不列顛尼亞議會主要作爲諮詢機構，促進討論並解決民衆訴求。此外，政府強調技術官僚原則，熟練的技術人員在行政管理中發揮着至關重要的作用。務實主義允許進行有限的自由主義改革，包括增加受壓迫的“Numbers”的權利，這體現了帝國治理中一種微妙的策略。"
 brit_aristocracy:0 "不列顛尼亞貴族"
 brit_aristocracy_desc:0 "§Y不列顛尼亞貴族§!這套治理體系體現了不列顛尼亞帝國根深蒂固的排外主義和社會達爾文主義原則。在這種情況下，貴族對首相和皇帝都擁有絕對權力，實際上將君主淪爲半傀儡。這個貴族階層優先維護精英主義和等級制度，使歧視和不平等在整個帝國範圍內持續存在。因此，福利和社會保障的概念蕩然無存，進一步加劇了貴族與平民之間的鴻溝。帝國元老院的權力日益膨脹，其控制範圍涵蓋帝國治理的各個方面，包括祕密機構和軍隊，從而將權力集中在貴族手中，並使壓迫和剝削制度得以延續。"
 colonial_regime:0 "殖民政權"
 colonial_regime_desc:0 "§Y殖民政權§!是一種意識形態體系，其特徵是外國勢力對某一領土或地區進行統治。這種體系通常通過征服或殖民建立，殖民勢力對當地居民實施政治、經濟和文化控制。殖民政權的主要目標往往包括資源掠奪、經濟剝削和地緣政治影響力的擴張。雖然一些殖民政府可能致力於殖民地的現代化和發展，但它們通常優先考慮殖民者的利益而非當地居民的利益。對殖民政權的批判主要集中在其固有的權力不平等、資源剝削以及對當地文化和身份的壓制上。儘管殖民者努力進行治理和發展，但殖民主義的遺毒往往是社會、經濟和政治上的不平等，這些不平等現象在正式獨立後仍然長期存在。"
 transitional_regime:0 "過渡政府"
 transitional_regime_desc:0 "§Y過渡政府往往在重大動盪之後出現，通常源於先前政府因特殊情況而垮臺或被推翻。其主要目的是作爲臨時權力機構，在舊政權與建立更穩定的新政府之間架起橋樑。過渡政權面臨着建立秩序、解決民怨、爲更民主包容的制度奠定基礎的緊迫任務。它們必須在利益集團和派系角力的複雜格局中周旋，在維持穩定的同時努力兼容多元觀點。然而若處理不當，過渡政權可能導致動盪持續或催生威權主義。其最終成敗取決於能否有效管理過渡進程，爲建立更民主、更具韌性的治理結構創造有利條件。"
 genbuism:0 "玄武主義"
 genbuism_desc:0 "§Y玄武主義§!“玄武主義”一詞常被貶義地用來概括日本首相樞木玄武的領導風格。他以民粹主義和強人作風著稱，將權力集中於首相辦公室，削弱了日本立法和司法機構的影響力，從而強化了行政部門的權力。玄武辯稱，這種權力集中是帶領日本度過動盪時期的必要之舉。他掌握着大量的緊急權力，並多次暫停議會，挫敗了罷免他的企圖。玄武政府與企業保持着密切聯繫，使得日本成爲一個對企業極爲友好的國家，許多公共服務外包給了私營企業。儘管如此，玄武仍然保持着一定的自主性，偶爾會將那些表現出不忠誠或與外國勢力勾結的企業國有化。在玄武主義的統治下，日本經濟蓬勃發展，擁有放松管制的銀行業、完善的企業福利制度以及強大的公私合作關係，鞏固了其作爲經濟強國的地位。"
 military_autocracy:0 "軍事獨裁"
 military_autocracy_desc:0 "§Y軍事獨裁§!軍事獨裁是指最高權力集中於單一軍事領導人的政府體制。在這種體制下，軍隊完全掌控政府的各個方面，包括立法、行政和司法職能。決策單方面做出，無需制衡或民主程序。軍事獨裁者通常以維護秩序、安全和國家統一爲由，爲其統治辯護。公民自由通常受到限制，異議遭到壓制，反對者會遭到嚴厲鎮壓。軍隊的利益和優先事項決定着國家政策，往往導致社會高度軍事化，以國防和擴張爲中心。儘管有人認爲軍事獨裁能夠帶來穩定和效率，但批評者強調其專制本質、缺乏問責機制以及濫用權力的可能性。"
 imperial_absolutism:0 "帝國專制主義"
 imperial_absolutism_desc:0 "§Y帝國專制主義§!帝國專制主義是一種根植於基督教聯邦主義原則的君主制意識形態框架，起源於多瑙河聯邦。該體系主張中央集權，最高權力歸於君主，君主被視爲神授君主，擁有對國家的絕對權力。帝國專制主義汲取基督教價值觀，強調在君主的領導下維護國家統一，君主扮演着團結力量和信仰守護者的角色。聯邦主義元素的融入確保了各地區在帝國體制內的代表性和自治權。儘管君主擁有絕對權力，聯邦機構和地區領導人在治理中也發揮着作用，從而在中央集權和地方分權之間取得平衡。這一意識形態旨在維護國家穩定，捍衛基督教價值觀，並在仁慈開明的君主的庇護下促進國家繁榮。"
 britannian_vic:0 "不列顛尼亞總督轄區"
 britannian_vic_desc:0 "§Y不列顛尼亞總督轄區§!作爲神聖不列顛帝國的半自治延伸，總督轄區通常由皇室成員統治。儘管如此，由於特殊情況，一些總督轄區也可能由權勢顯赫的貴族或有影響力的軍事強人執掌。總督通常代表皇帝在潘德拉貢行使權力，因此在轄區內擁有至高無上的絕對權威。儘管各轄區在內部事務上的自治程度不一，但其共同政策包括歧視、強制文化同化和廣泛的經濟剝削。一般來說，每個總督轄區都需要強大的軍事力量，以應對週期性的不滿和偶爾發生的叛亂，同時也能保障當地不列顛居民的安全，並支持帝國政府徹底同化該地區。"
 imperial_cult:0 "帝國國教"
 imperial_cult_desc:0 "§Y帝國國教§!帝國國教是在潘德拉貢登基後所倡導的一種意識形態。它要求民衆對皇帝絕對忠誠，並以強化後的指令Geass和廣泛的宣傳爲支撐。在這種教義下，包括企業和軍隊在內的所有其他實體都必須無條件服從皇帝的絕對權威。帝國國教尤其敵視貴族和純潔派，主張鎮壓他們，以期更廣泛地解放“Numbers”和其他社會羣體。它主張所有人享有完全的個人和經濟自由，但與政治直接相關的事務除外，這些事務仍然完全由皇帝掌控。這種意識形態旨在鞏固帝國的權力，使其集中於單一權威之下，同時在帝國境內倡導平等主義和個人自由。"
 absolute_monarchy:0 "絕對君主制"
 absolute_monarchy_desc:0 "§Y絕對君主制§!絕對君主制是一種君主擁有絕對權力的政體，不受教會、立法機構或社會精英等任何其他機構的約束。其根基在於絕對主義教義，君主的權力由“君權神授”所維護，將君主的權威歸於神聖的旨意而非人爲的統治。雖然君主不被奉爲神明，但他被視爲上帝在人間的最高代表。絕對君主制的特點是擁有一個完全服務於君主的官僚機構，賦予統治者解散政府、隨意任命官員和指揮軍隊的權力。一支強大的軍隊對於保衛和擴張君主的影響力至關重要。經濟政策多種多樣，旨在通過重商主義、資本主義或社團主義來鞏固君主及其核心圈子的財富。儘管絕對君主通常較爲保守，但也有一些君主會接受啓蒙運動的原則來加強其統治。"
 paternal_autocracy:0 "家長制獨裁"
 paternal_autocracy_desc:0 "§Y家長制獨裁§!家長制獨裁是一種意識形態體系，其特點是權力集中於單一統治者手中，這位統治者通常被塑造成一位慈父形象。在這種體系下，統治者對治理、經濟和社會等各個方面都擁有絕對權威，並堅信自己是在爲臣民謀求最大利益，如同慈父一般。家長制獨裁通常優先考慮穩定、秩序和傳統價值觀，統治者往往被描繪成人民的保護者和供養者。雖然這種政體能夠帶來安全感和指引，但它往往會導致個人自由受到壓制、缺乏問責機制以及權力濫用的風險。"
 purist_aristocracy:0 "純血派貴族"
 purist_aristocracy_desc:0 "§Y純血派貴族§!是不列顛尼亞最極端的派系之一，在追求極致純粹血統的同時在文化上堅定排外，堅決反對名譽不列顛尼亞人制度。他們的中心理念是保護不列顛尼亞的血脈和傳承，強烈反對稀釋不列顛尼亞人的血統。他們自認爲是不列顛尼亞純潔和傳統的最後守護者，堅定不移地忠於潘德拉貢的皇帝，尋求進入皇帝直轄之下。這個派系認爲他們是不列顛尼亞意志的真正體現，支持基於血統和家系制定等級森嚴的制度。他們致力於保障不列顛尼亞的遺產不被稀釋和污染，視血統高於一切，這一極端觀點常常引發和帝國內其他派系的摩擦。"
 geass_cult: "Geass教團"
 geass_cult_desc:0 "§YGeass教團§!是一個籠罩在深奧神祕主義與古老起源的迷霧之中的宗教機構。其教義僅由少數被選定的人瞭解，認爲自由意志是萬惡之源，致力於通過隱祕操縱來控制人類。通過運用Geass的神祕力量教徒們在歷史上曾多次影響重要事件，取得了不同程度的成功。教團內部存在兩大派系：追隨米吉多教宗的派系想要觸發諸神黃昏，而佩倫之子的代理人則利用Geass與神性推動着不可告人的計劃。在此之外，非正式的第三勢力啓明裁判所則在暗中控制全球事務，企圖永久維持現有秩序。"
 integralism:0 "民粹整體主義"
 integralism_desc:0 "§Y民粹整體主義§!民粹整合主義是一種融合了民粹主義和整合主義元素的意識形態，強調以整合多元社會要素爲基礎的整體治理方法。其核心目標是在滿足民衆需求和關切的同時，將國家凝聚在共同的身份認同之下。它倡導建立一個以傳統價值觀和原則爲指導的強大中央集權國家，並強調社會凝聚力和團結。民粹整合主義者常常迎合普通民衆，將自己塑造成對抗外部威脅或內部分裂的國家捍衛者。在倡導民族團結的同時，他們也可能優先考慮經濟再分配和社會福利政策，以解決不平等問題，提升全體公民的福祉。"
 ultra_nationalism:0 "極端民族主義"
 ultra_nationalism_desc:0 "§Y極端民族主義§!極端民族主義是一種極端形式的民族主義，其特徵是對本國的狂熱忠誠，往往排斥或損害其他羣體。它宣揚民族優越論，併力求不惜一切代價維護和促進國家利益。極端民族主義者通常主張採取侵略性和擴張性的外交政策，將軍事實力和領土擴張視爲國家榮耀和統治地位的必要條件。這種意識形態常常妖魔化和攻擊少數羣體、移民或被視爲內部敵人的羣體，將國家問題歸咎於他們，並主張排斥或鎮壓他們。極端民族主義可能導致威權主義、仇外心理，甚至極權主義政權，因爲它將國家利益置於個人權利和自由之上。"
 national_syndacalism:0 "國家工團主義"
 national_syndacalism_desc:0 "§Y國家工團主義§!國家工團主義是一種在右翼圈子中頗具爭議的意識形態，它將民族主義熱情與工團主義原則融合在一起。它背離了馬克思主義分析框架，崇尚神話和象徵主義，將罷工、工人以及工人階級生活理想化。國家工團主義者將革命暴力視爲變革力量，倡導社會工會化，並將其劃分爲“生產者”工會和“消費者”工會，以優化經濟。他們主張企業國有化，廢除私有財產，同時在社會層面推崇活力論和“新人”的塑造。極端男性氣質、反個人主義和父權價值觀是這一意識形態的典型特徵，他們嚴格控制移民以維護本地就業和文化。國家工團主義者摒棄資產階級頹廢，將國家置於首位，力圖使宗教服從於國家權威。軍國主義受到讚揚，準軍事團體受到鼓勵，擴張主義被推行，以確保民衆的資源和生存空間。"
 japanese_militarism:0 "日本軍國主義"
 japanese_militarism_desc:0 "§Y日本軍國主義§!在藤堂的派系中，日本軍國主義作爲一個激進派別脫穎而出，其排外傾向與不列顛尼亞純血派者如出一轍。該派別主張復興日本軍國主義，主張建立新的日本帝國，視日本人爲優越種族，註定要領導亞洲所有土著民族。它力圖解散政黨，恢復由軍方主導的絕對君主制，體現了一種本質上的極權主義和軍國主義意識形態。日本軍國主義以軍國主義爲核心信條，設想建立一個軍方擁有至高無上權力、主導社會各方面治理的社會。"