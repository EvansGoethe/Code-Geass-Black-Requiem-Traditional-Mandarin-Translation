name: 🔔 Paratranz Discord Notifier

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Paratranz History and Notify Discord
        env:
          # 精準對齊您圖片中的 Secrets 命名
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
          PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 -c "
          import os, datetime, urllib.request, json
          
          token = os.getenv('PARATRANZ_TOKEN', '').strip()
          project_id = os.getenv('PROJECT_ID', '').strip()
          webhook = os.getenv('DISCORD_WEBHOOK', '').strip()
          
        run: |
          python3 -c "
          import os, datetime, urllib.request, json, urllib.error
          
          token = os.getenv('PARATRANZ_TOKEN', '').strip()
          project_id = os.getenv('PROJECT_ID', '').strip()
          webhook = os.getenv('DISCORD_WEBHOOK', '').strip()
          
          if not token or not project_id or not webhook:
              print('❌ 錯誤：無法讀取 Secrets。')
              exit(1)
          
          if not token.startswith('Bearer '):
              token = f'Bearer {token}'
              
          start_time = (datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(minutes=30)).strftime('%Y-%m-%dT%H:%M:%SZ')
          url = f'hhttps://paratranz.cn/api/projects/{project_id}/history?start={start_time}'
          print(f'正在連線至 Paratranz API: {url}')
          
          req = urllib.request.Request(url)
          req.add_header('Authorization', token)
          req.add_header('Content-Type', 'application/json')
          
          try:
              with urllib.request.urlopen(req) as response:
                  res_body = response.read().decode()
                  data = json.loads(res_body)
                  results = data.get('results', [])
                  count = len(results)
                  
                  if count > 0:
                      print(f'發現 {count} 筆新動態，正在發送至 Discord...')
                      
                      # 修正：用迴圈直接安全地取出第一筆字典，避開 [0] 被誤判為字串切片的問題
                      latest = {}
                      for item in results:
                          latest = item
                          break
                      
                      user_name = latest.get('user', {}).get('username', '未知用戶')
                      action = latest.get('action', '未知動作')
                      
                      file_obj = latest.get('file')
                      file_name = file_obj.get('name', '系統專案') if isinstance(file_obj, dict) else '系統專案'
                      
                      payload = {
                          'embeds': [{
                              'title': '📝 Paratranz 專案新動態',
                              'description': f'**操作用戶：** {user_name}\n**動作：** {action}\n**相關檔案：** {file_name}',
                              'color': 5814783,
                              'url': f'https://paratranz.cn{project_id}',
                              'footer': {'text': '由 GitHub Actions 自動轉發'}
                          }]
                      }
                      
                      disc_req = urllib.request.Request(webhook, data=json.dumps(payload).encode('utf-8'), method='POST')
                      disc_req.add_header('Content-Type', 'application/json')
                      disc_req.add_header('User-Agent', 'Mozilla/5.0')
                      with urllib.request.urlopen(disc_req) as disc_res:
                          print('Discord 訊息發送成功！')
                  else:
                      print('過去 30 分鐘內無任何新動態。')
          except urllib.error.HTTPError as e:
              print(f'❌ 網路請求錯誤 (HTTP 錯誤代碼 {e.code})')
              try:
                  print(f'錯誤詳細回應: {e.read().decode()}')
              except:
                  pass
              exit(1)
          except Exception as e:
              print(f'❌ 執行出錯: {e}')
              exit(1)
          "
