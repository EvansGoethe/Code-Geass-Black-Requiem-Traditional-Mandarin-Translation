name: 🔔 Paratranz Discord Notifier

on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分鐘自動檢查一次變動（可自行修改）
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊測試

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Paratranz History and Notify Discord
        env:
          PARATRANZ_TOKEN: ${{ 07f3acc479ef2495f0fd772f3f75c039 }}
          PROJECT_ID: ${{ 19644 }}
          DISCORD_WEBHOOK: ${{ https://discord.com/api/webhooks/1524301331194577036/Lqgt3OY1tIDvskV5mvAifv_XV1_Ci7OOVxGfodBhanGMXqrHi3qBbf86M4KPqQTjQX2B }}
        run: |
          # 1. 計算 30 分鐘前的 ISO 時間戳記
          START_TIME=$(date -u -d "30 minutes ago" +"%Y-%m-%dT%H:%M:%SZ")
          
          # 2. 呼叫 Paratranz 歷史紀錄 API
          RESPONSE=$(curl -s -X GET "https://paratranz.cn{PROJECT_ID}/history?start=${START_TIME}" \
            -H "Authorization: ${PARATRANZ_TOKEN}" \
            -H "Content-Type: application/json")
          
          # 3. 解析是否有新事件 (檢查回傳的陣列長度)
          COUNT=$(echo "$RESPONSE" | jq '.results | length')
          
          if [ "$COUNT" -gt 0 ]; then
            echo "發現 $COUNT 筆新動態，正在發送至 Discord..."
            
            # 提取最新的一筆動態作為範例（或可以寫迴圈發送全部）
            LATEST_ACTION=$(echo "$RESPONSE" | jq -r '.results[0].action')
            USER_NAME=$(echo "$RESPONSE" | jq -r '.results[0].user.username')
            FILE_NAME=$(echo "$RESPONSE" | jq -r '.results[0].file.name // "系統專案"')
            
            # 4. 組裝精美的 Discord Embed 訊息
            PAYLOAD=$(cat <<EOF
            {
              "embeds": [{
                "title": "📝 Paratranz 專案新動態",
                "description": "**操作用戶：** ${USER_NAME}\n**動作：** ${LATEST_ACTION}\n**相關檔案：** ${FILE_NAME}",
                "color": 5814783,
                "url": "https://paratranz.cn{PROJECT_ID}",
                "footer": { "text": "由 GitHub Actions 自動轉發" }
              }]
            }
          EOF
          )
            
            # 5. 發送至 Discord
            curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK"
          else
            echo "過去 30 分鐘內無任何新動態。"
          fi
