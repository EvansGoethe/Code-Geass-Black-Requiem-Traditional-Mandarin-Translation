name: 🔔 Paratranz Discord Notifier

on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分鐘自動檢查一次變動
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊測試

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Paratranz History and Notify Discord
        env:
          # 關鍵修正：確保這裡的名稱與下方 Python 讀取的 os.getenv 完全一致
          PT_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
          PT_PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 -c "
          import os, datetime, urllib.request, json
          
          # 1. 取得環境變數
          token = os.getenv('PT_TOKEN')
          project_id = os.getenv('PT_PROJECT_ID')
          webhook = os.getenv('DISCORD_WEBHOOK')
          
          # 防呆檢查：如果 Secrets 沒填對，直接輸出提示不崩潰
          if not token or not project_id or not webhook:
              print('❌ 錯誤：GitHub Secrets 填寫不完整，請檢查 PARATRANZ_TOKEN, PROJECT_ID 或 DISCORD_WEBHOOK_URL 是否有正確設定。')
              exit(1)
              
          # 2. 列印偵錯資訊 (隱藏敏感部分)
          print('=== [偵錯資訊] 檢查您的 Secrets 設定 ===')
          print(f'1. PROJECT_ID 讀取結果: \"{project_id}\"')
          if webhook:
              print(f'2. DISCORD_WEBHOOK 開頭前 30 字元: \"{webhook[:30]}...\"')
              if '/api/webhooks/' not in webhook:
                  print('   ❌ 警告：您的 Discord 網址中似乎缺少了 /api/webhooks/ ，請重新至 Discord 複製！')
          else:
              print('2. DISCORD_WEBHOOK 讀取結果: 空值 (None)')
          print('========================================')
          
          if not token or not project_id or not webhook:
              print('❌ 錯誤：GitHub Secrets 填寫不完整，請檢查變數名稱與內容。')
              exit(1)
              
          start_time = (datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(minutes=30)).strftime('%Y-%m-%dT%H:%M:%SZ')
          
          url = f'https://paratranz.cn/projects/{project_id}/history?start={start_time}'
          print(f'正在嘗試連線至 Paratranz API: {url}')
          
          req = urllib.request.Request(url)
          req.add_header('Authorization', token)
          req.add_header('Content-Type', 'application/json')
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  results = data.get('results', [])
                  count = len(results)
                  
                  if count > 0:
                      print(f'發現 {count} 筆新動態，正在發送至 Discord...')
                      latest = results[0] if isinstance(results, list) and len(results) > 0 else {}
                      user_name = latest.get('user', {}).get('username', '未知用戶')
                      action = latest.get('action', '未知動作')
                      file_name = latest.get('file', {}).get('name', '系統專案') if latest.get('file') else '系統專案'
                      
                      payload = {
                          'embeds': [{
                              'title': '📝 Paratranz 專案新動態',
                              'description': f'**操作用戶：** {user_name}\n**動作：** {action}\n**相關檔案：** {file_name}',
                              'color': 5814783,
                              'url': f'https://paratranz.cn{project_id}',
                              'footer': {'text': '由 GitHub Actions 自動轉發'}
                          }]
                      }
                      
                      disc_req = urllib.request.Request(webhook, data=json.dumps(payload).encode('utf-8'), method='POST')
                      disc_req.add_header('Content-Type', 'application/json')
                      disc_req.add_header('User-Agent', 'Mozilla/5.0')
                      with urllib.request.urlopen(disc_req) as disc_res:
                          print('Discord 訊息發送成功！')
                  else:
                      print('過去 30 分鐘內無任何新動態。')
          except Exception as e:
              print(f'❌ 連線或執行出錯: {e}')
              exit(1)
          "
