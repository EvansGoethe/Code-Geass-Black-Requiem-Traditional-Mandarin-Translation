name: 📥 從 ParaTranz 同步翻譯

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼倉庫
        uses: actions/checkout@v4

      - name: 準備 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 下載與除錯 ParaTranz 翻譯包
        env:
          PT_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
          PT_PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}
        run: |
          echo "開始從 ParaTranz 獲取翻譯..."
          
          # 🛑 關鍵修復：加入 -L 參數，讓 curl 自動跟隨 302 轉址去下載真正的檔案
          HTTP_STATUS=$(curl -s -L -w "%{http_code}" -H "Authorization: $PT_TOKEN" "https://paratranz.cn/api/projects/$PT_PROJECT_ID/artifacts/download" -o translation.zip)
          
          echo "最終伺服器回傳狀態碼: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ 下載失敗！伺服器回傳的真實內容是："
            cat translation.zip
            exit 1
          fi
          
          echo "✅ 下載成功，準備解壓縮..."
          unzip -o translation.zip -d ./pt_download/

      - name: 處理 P社專用格式 (轉 UTF-8 BOM 與語言替換)
        run: |
          python -c "
          import os, glob, codecs
          target_dir = 'localisation/simp_chinese'
          os.makedirs(target_dir, exist_ok=True)
          
          for filepath in glob.glob('./pt_download/**/*.yml', recursive=True):
              filename = os.path.basename(filepath)
              new_filename = filename.replace('l_english', 'l_simp_chinese')
              new_filepath = os.path.join(target_dir, new_filename)

              with codecs.open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()

              content = content.replace('l_english:', 'l_simp_chinese:')

              with codecs.open(new_filepath, 'w', encoding='utf-8-sig') as f:
                  f.write(content)
          "
          rm -rf translation.zip pt_download/

      - name: 自動提交與推送到 GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-sync: 更新來自 ParaTranz 的最新翻譯"
          branch: main
