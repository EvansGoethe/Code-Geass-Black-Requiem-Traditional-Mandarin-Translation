 member_state_desc:0 "聯邦內部存在着不同程度的自治權，成員國便是其中之一。除了本土資源外，這些地區在戰略意義上並非特別重要；因此，它們在地方事務中的行政影響力有限，民用經濟也只是部分發展起來。儘管如此，這些地區仍存在着與聯邦相同的問題，而且來自中國本土的漢族移民受到鼓勵，以慢慢殖民這些領土。"