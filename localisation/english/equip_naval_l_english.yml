﻿l_english:
 ship_hull_submarine_desc:0 "潛艇是擅長於對付無武裝的運輸船的暗影獵手。歐陸大戰之後的數十年間，潛艇的改進一直在繼續。"
 ship_hull_submarine_1:0 "潛艇 I型"
 ship_hull_submarine_1_desc:0 "潛艇是擅長於對付無武裝的運輸船的暗影獵手。歐陸大戰之後的數十年間，潛艇的改進一直在繼續。"
 mtg_sakuradite_propulsion:0 "櫻石推進"
 mtg_sakuradite_propulsion_desc:0 "櫻石推進完全不依賴空氣，使潛艇擺脫了傳統潛艇必須頻繁上浮的需求。櫻石反應爐產生的龐大能量讓核潛艇能夠長時間高速航行，而漫長的燃料補給間隔則賦予其近乎無限的續航力，使航程的唯一限制只剩下補充食物或其他消耗品之類的因素。"
 ship_hull_submarine_2:0 "潛艇 II型"
 ship_hull_submarine_2_desc:0 "現代潛艇的建造著重於隱蔽性。先進的螺旋槳設計、大量的降噪隔音材料與特殊機械，使潛艇能保持與海洋環境噪音同樣安靜，令其難以被偵測。要找到並攻擊現代潛艇，需要專門的技術。"
 ship_hull_submarine_3:0 "潛艇 III型"
 ship_hull_submarine_3_desc:0 "彈道飛彈潛艇是能夠部署搭載核彈頭的潛射彈道飛彈（SLBM）的潛艇。它們可以在距目標數千公里處發射飛彈，而聲學靜音技術使其難以被偵測，因而在遭受第一擊時仍是可存活的威懾力量。"
 ship_hull_light_desc:0 "驅逐艦明顯大於歐盟戰爭時期的艦艇，配備全自動主砲、整合機械、雷達、聲納，以及「烏賊」反潛迫擊砲等反潛武器。"
 ship_hull_light_1:0 "驅逐艦 I型"
 ship_hull_light_1_desc:0 "爲了確保運輸船的安全，第一次世界大戰的驅逐艦需要更改它們的定位並改變它們的設計。新的設計將擁有更多的魚雷來增加與敵人交火的機會。"
 ship_hull_light_2:0 "驅逐艦 II型"
 ship_hull_light_2_desc:0 "現代驅逐艦已配備導引飛彈系統，使其能更快、更狠地命中目標。這些系統大多採垂直方向配置。"
 ship_hull_light_3:0 "驅逐艦 III型"
 ship_hull_light_3_desc:0 "該領域的進一步發展帶來了防範潛艇攻擊的強大雷達偵測器；此外，改良的裝甲也提升了驅逐艦的防禦力。"
 ship_hull_light_4:0 "驅逐艦 IV型"
 ship_hull_light_4_desc:0 "最現代化的驅逐艦已具備執行隱形任務的能力；此外，部分型號已能夠有限度地操控櫻石武器，儘管程度仍非常有限。"
 ship_hull_frigate:0 "巡防艦I"
 ship_hull_frigate_desc:0 "巡防艦通常是一種反潛護航艦艇，比巡邏艦大，但比驅逐艦小。其尺寸與能力與美式護航驅逐艦相當，而巡防艦的建造與維護成本通常更低。"
 ship_hull_frigate_1:0 "巡防艦I"
 ship_hull_frigate_1_desc:0 "巡防艦通常是一種反潛護航艦艇，比巡邏艦大，但比驅逐艦小。其尺寸與能力與美式護航驅逐艦相當，而巡防艦的建造與維護成本通常更低。"
 ship_hull_frigate_2:0 "巡防艦II"
 ship_hull_frigate_2_desc:0 "新型巡防艦擁有比前代更快的速度與更佳的機動性。因此，它們能夠執行騷擾與破壞行動。"
 mtg_general_improve:0 "輕型艦艇改良"
 mtg_general_improve_desc:0 "巡防艦將實施全面改良，以應對新的威脅。"
 ship_hull_frigate_3:0 "巡防艦III"
 ship_hull_frigate_3_desc:0 "最現代化的巡防艦能夠長時間牽制Knightmare，同時建造與維護成本越來越低。"
 ship_hull_cruiser_desc:0 "這些巡洋艦被視為僅次於航空母艦的最龐大艦艇，配備導引飛彈系統的原型，同時也是攻擊直升機的基地。後者由反潛作戰型與飛彈導引／電子情報型混合編成。"
 ship_hull_cruiser_1:0 "巡洋艦 I型"
 ship_hull_cruiser_1_desc:0 "這些巡洋艦被視為僅次於航空母艦的最龐大艦艇，配備導引飛彈系統的原型，同時也是攻擊直升機的基地。後者由反潛作戰型與飛彈導引／電子情報型混合編成。"
 mtg_increased_defense:0 "強化防禦"
 mtg_increased_defense_desc:0 "彈道飛彈潛艇的部署使標準巡洋艦在面對隱蔽攻擊時極為脆弱。有必要加強反潛與反魚雷防禦。"
 ship_hull_cruiser_2:0 "巡洋艦 II型"
 ship_hull_cruiser_2_desc:0 "巡洋艦已正式成為戰艦與戰鬥巡洋艦的繼承者，垂直飛彈系統也終於得到應用與改良。儘管如此，該艦艇在另一種武器面前仍然過於脆弱：Knightmare。"
 ship_hull_cruiser_3:0 "巡洋艦 III型"
 ship_hull_cruiser_3_desc:0 "巡洋艦現在採用支援4種不同飛彈的新型通用垂直發射系統，其中包括在實戰中證明極為有用的反Knightmare砲。與此同時，其防禦與攻擊能力也有所提升。"
 ship_hull_carrier:0 "航空母艦"
 ship_hull_carrier_desc:0 "在許多年的實驗之後，航空母艦作爲一種獨特種類的戰艦慢慢變得成熟。能夠搭載越來越多，越來越強大的艦載機，航空母艦即將成爲海軍力量投射的最終答案。"
 ship_hull_carrier_1:0 "1936航空母艦船體"
 ship_hull_carrier_1_desc:0 "很多軍事理論家相信未來是屬於海軍航空兵的。老舊的主力艦以及郵船改裝的航空母艦將是這些新理論的第一個試驗場。"
 mtg_anti_kn_cannons:0 "反KN砲"
 mtg_anti_kn_cannons_desc:0 "最現代化的航空母艦已裝設小型黑德隆砲，如今能夠從空中與水面摧毀Knightmare。"
 ship_hull_carrier_2:0 "1940航空母艦船體"
 ship_hull_carrier_2_desc:0 "第一種專用航空母艦的設計工作開始了，我們必須確保這種航空母艦在不違反海軍條約的前提下，有足夠遠的航程和足夠快的速度來跟上艦隊中其他的軍艦。"
 mtg_magnetic_field:0 "磁力護盾"
 mtg_magnetic_field_desc:0 "對以櫻石元件推進的航空母艦而言，Gefjun擾亂器正成為日益嚴重的威脅；因此，需要一種電磁反制措施，以確保對抗擾亂器時有獲勝的機會。"
 ship_hull_carrier_3:0 "1944航空母艦船體"
 ship_hull_carrier_3_desc:0 "改進的建造方式以及諸如甲板邊升降機這類的更加專業的系統使這些航空母艦可以更高效的攜帶更多飛機。"
 sakuradite_propulsion:0 "櫻石推進"
 sakuradite_propulsion_desc:0 "櫻石推進完全不依賴空氣，使潛艇擺脫了傳統潛艇必須頻繁上浮的需求。櫻石反應爐產生的龐大能量讓核潛艇能夠長時間高速航行，而漫長的燃料補給間隔則賦予其近乎無限的續航力，使航程的唯一限制只剩下補充食物或其他消耗品之類的因素。"
