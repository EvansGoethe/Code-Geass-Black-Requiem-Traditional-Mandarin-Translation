 carrier_desc:0 "航空母艦是作為海上機場的軍艦，配備全通式飛行甲板以及搭載、武裝、部署與回收飛機的設施。它通常是艦隊的主力艦，使海軍得以在全球投射空中力量，而無需依賴當地基地進行飛機作業。"
 carrier_2_desc:0 "第一種專用航空母艦的設計工作開始了，我們必須確保這種航空母艦在不違反海軍條約的前提下，有足夠遠的航程和足夠快的速度來跟上艦隊中其他的軍艦。"
