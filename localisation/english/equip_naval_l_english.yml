 torpedo_cruiser:0 "重雷裝巡洋艦"
 torpedo_cruiser_desc:0 "以拆除一些主炮和防空炮爲代價，搭載着大量魚雷發射管的輕巡洋艦。"
 light_cruiser_desc:0 "這些巡洋艦被視為僅次於航空母艦的最龐大艦艇，配備導引飛彈系統的原型，同時也是攻擊直升機的基地。後者由反潛作戰型與飛彈導引／電子情報型混合編成。"
 light_cruiser_1_desc:0 "這些巡洋艦被視為僅次於航空母艦的最龐大艦艇，配備導引飛彈系統的原型，同時也是攻擊直升機的基地。後者由反潛作戰型與飛彈導引／電子情報型混合編成。"
 light_cruiser_2_desc:0 "雖然戰後的條約對輕巡洋艦提出了諸多限制，但是人們還是在條約的限制內設計出了火力出衆的輕型船隻。"
 light_cruiser_3_desc:0 "現在條約的限制解除了，人們可以設計更大也更重的巡洋艦，不過較弱的火力使它們還只能被劃分爲輕巡洋艦。"
 magnetic_field:0 "磁力護盾"
 magnetic_field_desc:0 "對以櫻石元件推進的航空母艦而言，Gefjun擾亂器正成為日益嚴重的威脅；因此，需要一種電磁反制措施，以確保對抗擾亂器時有獲勝的機會。"
 heavy_carrier:0 "航空戰鬥巡洋艦"
 heavy_carrier_desc:0 "航空巡洋艦（又稱航空母巡洋艦）是一種結合航空母艦與巡洋艦或戰艦等水面戰艦特性的軍艦。它們以強化的防禦力與遠超其他艦艇的噸位著稱。迄今為止，它們在對抗Knightmare時展現了卓越的成果。"
 anti_kn_cannons:0 "反KN砲"
 anti_kn_cannons_desc:0 "最現代化的航空母艦已裝設小型黑德隆砲，如今能夠從空中與水面摧毀Knightmare。"
 carrier_1:0 "航空母艦 I型"
