﻿l_english:
 UNLOCK_DIVISION_TANK_TEMPLATE:0 "我們將解鎖現代裝甲師"
 tank_design:0 "裝甲載具設計"
 tank_design_desc:0 "坦克的研發始於大歐洲戰爭的最後階段，並很快成為世界各地戰爭的主角。其統治地位以主戰坦克的形式一直延續到新千年；然而，面對Knightmare與致命的步兵反坦克武器，這種現狀恐將改變。此外，陸上巡洋艦等替代性裝甲載具也正在世界舞台上嶄露頭角。"
 gw_tank_equipment:0 "大戰時坦克"
 cold_war_tank:0 "早期主戰坦克"
 cold_war_tank_desc:0 "早期主戰坦克設計於大歐洲戰爭之後的數十年間，被視為中型坦克的進化型。這一轉變在1950年代逐漸完成，因為人們意識到中型坦克也能夠搭載可在遠距離擊穿任何實際裝甲水準的火炮。"
 cold_war_tank_2:0 "早期主戰坦克"
 cold_war_tank_2_desc:0 "早期主戰坦克設計於大歐洲戰爭之後的數十年間，被視為中型坦克的進化型。這一轉變在1950年代逐漸完成，因為人們意識到中型坦克也能夠搭載可在遠距離擊穿任何實際裝甲水準的火炮。"
 mobile_bases:0 "陸地巡洋艦"
 mobile_bases_equip:0 "陸地巡洋艦"
 BRT_mobile_bases_desc:0 "G-1基地是不列顛尼亞的陸上巡洋艦，通常由皇室知名成員用作機動指揮中心與野戰醫院。由於這些機動基地幾乎總是載有身分顯赫的人物，它們總是被警察與醫療車隊簇擁，並由戰車、裝甲車與Knightmare等正規軍護衛。"
 BRT_mobile_bases:0 "G-1基地"
 mobile_bases_desc:0 "陸上巡洋艦是一種重型裝甲載具，通常用作機動指揮中心與野戰醫院。由於這些機動基地幾乎總是載有身分顯赫的人物，它們總是被警察與醫療車隊簇擁，並由戰車、裝甲車與Knightmare等正規軍護衛。因此，它們僅具備有限的攻擊能力，但擁有堅固的防禦結構。"
 impr_base_1:0 "機動性改良"
 impr_base_1_desc:0 "履帶在各種地形上都能提供良好的機動性；有鑑於此，將把戰車履帶重新改造以適用於陸上巡洋艦。"
 impr_base_2:0 "加裝機槍"
 impr_base_2_desc:0 "陸上巡洋艦的攻擊能力偏低，必須加裝機槍與反裝甲砲塔加以強化。它們將被安置在車體最暴露的部位。"
 impr_base_3:0 "強化結構"
 impr_base_3_desc:0 "陸上巡洋艦的防禦力已相當可觀，但仍可透過隱藏式護盾進一步提升；它們將覆蓋車體的正面與側翼。"
 mbt_1:0 "主力戰車"
 mbt_1_desc:0 "主力戰車（MBT）是在許多現代軍隊中擔負裝甲防護直射火力與機動任務的戰車。更強大的引擎、更好的懸吊系統與更輕的複合裝甲的發展，使人們得以設計出一種戰車：擁有超重型戰車的火力、重型戰車的裝甲防護、輕型戰車的機動性，而整體重量僅與中型戰車相當。"
 mbt_2:0 "改良型主力戰車"
 mbt_2_desc:0 "幾年下來，主力戰車在以Knightmare為主力的軍隊中也被賦予了支援任務；因此，車輛的機動性正在重新調整以適應這一角色。此外，主砲的威力也將得到強化，以應對各種環境下的高強度戰鬥。"
 mbt_3:0 "MBT/AKD"
 mbt_3_desc:0 "主力戰車反Knightmare設計型是世界上最現代化的裝甲載具。為了完美反制Knightmare的威脅，新型主力戰車經過改裝，以整合式雷光砲取代主砲。此外，戰車的側翼與車頭周圍還將裝設更厚重的裝甲。"
 impr_gun_1:0 "火砲改良"
 impr_gun_2:0 "火砲改良II"
 impr_gun_1_desc:0 "對主砲進行口徑與射程方面的全面改良，將應用於主力戰車設計。"
 impr_gun_2_desc:0 "對主砲進行口徑與射程方面的全面改良，將應用於主力戰車設計。"
 impr_arm_1:0 "裝甲改良"
 impr_arm_1_desc:0 "對主裝甲進行全面改良，強化主力戰車設計中的整體複合結構。"
 impr_arm_2_desc:0 "對主裝甲進行全面改良，強化主力戰車設計中的整體複合結構。"
 impr_arm_2:0 "裝甲改良II"
 impr_gun_3:0 "AK火炮"
 impr_gun_3_desc:0 "反Knightmare砲將取代戰車的主砲；後者將被移至較不居中的位置，以確保主力戰車的最大火力。"
 impr_arm_3:0 "AK裝甲"
 impr_arm_3_desc:0 "反Knightmare裝甲是即將應用於戰車的新型非爆炸反應裝甲（NERA）的正式名稱。NERA的運作原理基於衝擊波在不同材料中傳播的速度偏差。"
 UNLOCK_KN_1:0 "這是新式Knightmare科技研發的第一步"
 UNLOCK_KN_2:0 "這是新式Knightmare科技研發的最後一步"
 UNLOCK_KN_3:0 "這是新式Knightmare科技研發必不可少的一步"
 knightmares_folder:0 "Knightmare"
 knightmares_folder_desc:0 "Knightmare開發專用的特殊科技樹"
 knightmare_mass_production:0 "大規模生產"
 knightmare_civilian:0 "民用"
 knightmare_fortress:0 "堡壘"
 knightmare_melee:0 "近戰型Knightmare"
 knightmare_mobile:0 "機動型Knightmare"
 knightmare_all:0 "通用"
 knightmare_artillery:0 "重型火炮"
 knightmare_frame_1:0 "第一世代Knightmare設計"
 knightmare_frame_1_desc:0 "Knightmare Frame的起源，來自為傳統載具打造的「緊急逃生駕駛艙」。這種裝置配備火箭引擎，可帶著乘員飛離殘骸，不久後又加裝了人工腿以提升機動性。載具內部空間有限，使腿的數量僅限於兩條。雖然無論從哪個意義上說它都不是武器，但這種「會走路的駕駛艙」為其後繼者提供了基礎形態。"
 knightmare_police:0 "Knightpolice"
 knightmare_police_desc:0 "Knightpolice是以退役Glasgow改造而成的Knightmare Frame，由不列顛尼亞警察部隊的精英準軍事單位操作，為一般與特種警察單位提供後援支援。它以一對衝鋒手槍取代突擊步槍，並配有特製的反Knightmare戰鬥刀。此外，在可能出現槍械或失控Knightmare的鎮暴場合，Knightpolice機體還會使用鎮暴盾牌。"
 knightmare_pol_1:0 "Knightpolice"
 knightmare_pol_1_desc:0 "Knightpolice是以退役Glasgow改造而成的Knightmare Frame，由不列顛尼亞警察部隊的精英準軍事單位操作，為一般與特種警察單位提供後援支援。它以一對衝鋒手槍取代突擊步槍，並配有特製的反Knightmare戰鬥刀。此外，在可能出現槍械或失控Knightmare的鎮暴場合，Knightpolice機體還會使用鎮暴盾牌。"
 landspinner:0 "Landspinner系統"
 landspinner_desc:0 "Landspinner推進系統本質上是一組可安裝在Knightmare Frame腳跟後方的輪子。裝上懸浮系統時，Landspinner會被摺疊或拆除。由於腿部與Landspinner本身皆可轉向，它們可以利用周圍的表面作為接觸點，離地行進。"
 landspinner_equip_desc:0 "Landspinner推進系統本質上是一組可安裝在Knightmare Frame腳跟後方的輪子。裝上懸浮系統時，Landspinner會被摺疊或拆除。由於腿部與Landspinner本身皆可轉向，它們可以利用周圍的表面作為接觸點，離地行進。"
 factspheres:0 "Factsphere感應器"
 factspheres_desc:0 "Factsphere感應器本質上是一部先進的攝影機，可將即時熱成像影像與數據傳送給駕駛員。它同時使用微波波段與可見光區的主動／被動感應器，加上聲學收音裝置與火控用環境感應器，為駕駛員提供整合資訊。它們通常受可伸縮的裝甲層保護。收起裝甲時，可獲得更高的系統靈敏度。"
 factspheres_equip_desc:0 "Factsphere感應器本質上是一部先進的攝影機，可將即時熱成像影像與數據傳送給駕駛員。它同時使用微波波段與可見光區的主動／被動感應器，加上聲學收音裝置與火控用環境感應器，為駕駛員提供整合資訊。它們通常受可伸縮的裝甲層保護。收起裝甲時，可獲得更高的系統靈敏度。"
 knightmare_frame_2:0 "第二世代Knightmare設計"
 knightmare_frame_2_desc:0 "Factsphere與Landspinner等多項通用Knightmare Frame技術的誕生，促成了Knightmare Frame原型機的研發資金。然而新技術的表現並不穩定，研究因此被外包給軍方的機器人計畫與民生導向的項目。前者交由不列顛尼亞陸軍特別部門負責，後者則落入私人團體——阿什福德財團——手中。"
 knightmare_mass_prod_1:0 "第三世代Knightmare Frame"
 knightmare_mass_prod_1_desc:0 "憑藉兩個獨立計畫取得的成果，Knightmare Frame被發展為具有實戰效能的平台。櫻石的運用成為讓Knightmare Frame達到預期性能的關鍵，使這種礦物的價值大幅上漲，成為國際政治中與化石燃料同等重要的資源。第三世代還見證了由阿什福德財團設計製造的原型機「蓋尼米德」的誕生。"
 knightmare_frame_3:0 "第三世代Knightmare Frame"
 knightmare_frame_3_desc:0 "憑藉兩個獨立計畫取得的成果，Knightmare Frame被發展為具有實戰效能的平台。櫻石的運用成為讓Knightmare Frame達到預期性能的關鍵，使這種礦物的價值大幅上漲，成為國際政治中與化石燃料同等重要的資源。第三世代還見證了由阿什福德財團設計製造的原型機「蓋尼米德」的誕生。"
 knightmare_frame_4:0 "第四世代Knightmare Frame"
 knightmare_frame_4_desc:0 "第四世代見證了RPI-11 Glasgow的登場——第一種量產型武器平台。其性能使不列顛尼亞帝國在皇曆2010年的入侵中輕鬆制霸日本。Glasgow此後成為不列顛尼亞陸軍的基準機體，儘管最終遭到淘汰。部分Glasgow機體仍由Knightpolice用於執法，其他國家也以其為基礎開發自己的Knightmare Frame。"
 knightmare_mass_prod_2:0 "第四世代Knightmare Frame"
 knightmare_mass_prod_2_desc:0 "第四世代見證了RPI-11 Glasgow的登場——第一種量產型武器平台。其性能使不列顛尼亞帝國在皇曆2010年的入侵中輕鬆制霸日本。Glasgow此後成為不列顛尼亞陸軍的基準機體，儘管最終遭到淘汰。部分Glasgow機體仍由Knightpolice用於執法，其他國家也以其為基礎開發自己的Knightmare Frame。"
 knightmare_frame_5:0 "第五世代Knightmare Frame"
 knightmare_frame_5_desc:0 "RPI-13薩瑟蘭是反Knightmare武器發展中使用最廣、最富盛名的成果。薩瑟蘭改善了駕駛艙的舒適性與功能性、提升了機動力，並強化了近身戰鬥能力，以突顯其作為反Knightmare武器的定位。"
 knightmare_mass_prod_3:0 "第五世代Knightmare Frame"
 knightmare_mass_prod_3_desc:0 "RPI-13薩瑟蘭是反Knightmare武器發展中使用最廣、最富盛名的成果。薩瑟蘭改善了駕駛艙的舒適性與功能性、提升了機動力，並強化了近身戰鬥能力，以突顯其作為反Knightmare武器的定位。"
 knightmare_frame_7:0 "第七世代Knightmare Frame"
 knightmare_frame_7_desc:0 "第七世代機蘭斯洛特的誕生標誌著首次重大革新。櫻石不僅應用於Yggdrasil驅動器，更遍佈機體全身，使各方面性能都得到飛躍性提升。這使其能夠有效運用MVS（梅澤振動劍）與電磁護盾，並成為首台展示Blaze Luminous——一種特殊能量護盾——的Knightmare。"
 knightmare_mass_prod_4:0 "第七世代Knightmare Frame"
 knightmare_mass_prod_4_desc:0 "第七世代蘭斯洛特的誕生標誌著第一次重大革新。櫻石不僅用於世界樹驅動輪，更遍布整個機體，使各方面性能都獲得飛躍性提升。這使其能有效運用MVS（微波振動劍）與電磁護盾，並成為第一台展示「Blaze Luminous」——一種特殊能量護盾——的Knightmare。"
 knightmare_frame_9:0 "第九世代Knightmare Frame"
 knightmare_frame_9_desc:0 "第九世代見證了「能量翼」的登場——一種實驗性懸浮系統，賦予無與倫比的敏捷性與令人目眩的速度，但極難操控。已知的第九世代Knightmare僅有兩台：蘭斯洛特·阿爾比恩與紅蓮聖天八極式。據推測，所有配備懸浮系統的第八世代以上Knightmare都內建氧氣供應，以進行高空作戰，部分機體還能在水下航行與戰鬥。"
 knightmare_mass_prod_5:0 "第九世代Knightmare Frame"
 knightmare_mass_prod_5_desc:0 "第九世代見證了「能量翼」的登場——一種實驗性懸浮系統，賦予無與倫比的敏捷性與令人目眩的速度，但極難操控。已知的第九世代Knightmare僅有兩台：蘭斯洛特·阿爾比恩與紅蓮聖天八極式。據推測，所有配備懸浮系統的第八世代以上Knightmare都內建氧氣供應，以進行高空作戰，部分機體還能在水下航行與戰鬥。"
 anti_knightmare_design:0 "反Knightmare Frame設計"
 anti_knightmare_design_desc:0 "繼Knightmare Frame在對抗傳統戰爭武器上大獲成功之後，人們的注意力轉向了打造旨在摧毀同類武器——包括其他Knightmare Frame——的Knightmare Frame。"
 knightmare_melee_1:0 "第五世代格鬥型Knightmare"
 knightmare_melee_1_desc:0 "格鬥型Knightmare是普通Knightmare Frame的廉價衍生型，生產成本有限，對普通士兵來說也更容易上手。然而，它故障與失靈的機率較高，此外也沒有配備完善的駕駛員彈射系統。其最大的生產者是中華聯邦。"
 hadron_cannon:0 "黑德隆砲"
 hadron_cannon_desc:0 "這種武器的運作原理是將多道獨立的粒子束合併為一道威力巨大的光束。黑德隆砲擊的特徵是紅黑相間，周圍常環繞著電弧。強子（Hadron）是由夸克組成的粒子，例如質子、中子與介子。因此，可以合理推測黑德隆砲是某種發射強子的粒子砲。"
 knightmare_artillery_1:0 "第七世代重炮型Knightmare"
 knightmare_artillery_1_desc:0 "該機體配備了原型整合式懸浮系統，能夠持續飛行。它的手指是小型的飛翔滑爪，並在雙肩裝有一對黑德隆砲，可在驚人的射程內持續發射毀滅性的能量流。儘管實力強勁，加文的速度相當緩慢，因此容易被更小、更快的Knightmare搶佔先機。"
 knightmare_artillery_2:0 "第八世代重炮型Knightmare"
 knightmare_artillery_2_desc:0 "莫德雷德配備整合式懸浮系統，能夠飛行，但該系統很容易被切穿。它的雙肩各裝有一組黑德隆砲，可展開並合併為稱為「斯塔克黑德隆砲」的四管巨砲，將火力聚焦為足以一擊殲滅飛空巡洋艦的單發砲擊。"
 knightmare_melee_2:0 "第八世代格鬥型Knightmare"
 knightmare_melee_2_desc:0 "它的裝甲格外厚重，手腕伸出巨大的錐體，臀部與雙腳裝有尖狀腿甲，肩部與Landspinner上長滿尖刺。它還配備整合式懸浮系統以獲得飛行能力。該機體的主要武器是右腕上的巨爪。爪子可以重新變形並旋轉，產生Blaze Luminous力場，將手臂變為MVS粒子鑽頭長槍。"
 super_MVS:0 "超級MVS"
 super_MVS_desc:0 "微波振動劍是一種結合極高振動頻率與高溫來提升切割效能的武器，會使灰色的材質瞬間變紅。由於部分微波振動劍的振動頻率相近，它們彼此碰撞時不會被切開。"
 knightmare_melee_3:0 "第九世代超格鬥型Knightmare Frame"
 knightmare_melee_3_desc:0 "該機體擁有許多與先前機體類似的特徵，例如內建Landspinner、以小型飛翔滑爪為手指的雙手，以及普通Knightmare兩倍的體型。它配備能量護盾，背上攜帶一把名為「Excalibur」的微波振動劍，比Knightmare本體還要巨大。劍鞘附有額外的Landspinner，同時充當加拉哈德的懸浮系統。"
 energy_shield:0 "能量護盾"
 energy_shield_desc:0 "Blaze Luminous系統，或簡稱能量護盾，是一種在附近目標周圍以護盾形態投射能量的系統。它被設計為一種應用擊穿現象的能量裝甲系統。維持護盾所需的能量與護盾所阻擋的能量成正比。"
 knightmare_all_pur_1:0 "全用途Knightmare Frame"
 knightmare_all_pur_1_desc:0 "作為高性能機體，該機搭載了大量前代機體所沒有的實驗性創新裝置。蘭斯洛特胸前裝有兩具可收納式Factsphere、前臂裝有兩面光束護盾，以及四具飛翔滑爪。這些飛翔滑爪配有名為「滑爪推進器」的實驗性推進裝置，可提升其速度並使其在飛行途中改變方向。"
 knightmare_all_pur_unit_desc:0 "作為高性能機體，該機搭載了大量前代機體所沒有的實驗性創新裝置。蘭斯洛特胸前裝有兩具可收納式Factsphere、前臂裝有兩面光束護盾，以及四具飛翔滑爪。這些飛翔滑爪配有名為「滑爪推進器」的實驗性推進裝置，可提升其速度並使其在飛行途中改變方向。"
 floater_system:0 "懸浮系統"
 floater_system_desc:0 "懸浮系統是由勞埃德·阿斯普朗德與神聖不列顛尼亞帝國研發、使Knightmare得以飛行的浮空裝置。這是一種原理不明、但很可能是電磁性質的大氣浮空裝置，既能讓極大質量的結構體懸停飛行，也能以相當快的速度在空中移動。它需要陀螺儀穩定，並以天文數字般的能量消耗著稱。"
 knightmare_all_pur_2:0 "第七世代全用途Knightmare Frame"
 knightmare_all_pur_2_desc:0 "懸浮系統背包如今已是標準配備。康奎斯塔獲得了一門黑德隆衝擊砲，安裝在懸浮系統頂部，將其VARIS步槍對接到懸浮系統上加裝的大型砲座下方即可發射。其獨有的Core Luminous經過調校與精煉，提升了戰鬥威力，並配備了能部分防禦Knightmare癱瘓裝置Gefjun擾亂器的反制措施。"
 knightmare_all_pur_3:0 "第九世代全用途Knightmare Frame"
 knightmare_all_pur_3_desc:0 "該機體擁有極致的機動力與火力，是不列顛尼亞最強的Knightmare Frame。阿爾比恩的主要武裝是對原有武器的重大升級，與前代的單管相比採用了雙管設計。"
 knightmare_frame_fortress:0 "第八世代要塞型Knightmare Frame"
 knightmare_frame_fortress_desc:0 "騎士巨型要塞是Knightmare Frame的衍生型，特徵是沒有四肢、體型龐大且極為堅固。這類要塞本質上是懸浮突擊艇，利用懸浮系統在空中機動，並可配備多具飛翔滑爪、黑德隆砲及其他武器。"
 knightmare_fortress_1:0 "第八世代要塞型Knightmare Frame"
 knightmare_fortress_1_desc:0 "騎士巨型要塞是Knightmare Frame的衍生型，特徵是沒有四肢、體型龐大且極為堅固。這類要塞本質上是懸浮突擊艇，利用懸浮系統在空中機動，並可配備多具飛翔滑爪、黑德隆砲及其他武器。"
 absolute_defense:0 "絕對防禦"
 absolute_defense_desc:0 "絕對防禦系統會產生相互交疊的紅色六角形護盾，形成防禦網。該護盾系統透過一對鍵盤控制操作，根據德魯伊系統提供的資訊建立有效的防禦陣型——該系統可推算來襲砲彈的彈道。"
 energy_wing:0 "能量翼"
 energy_wing_desc:0 "這是一種全新的、實驗性的高度先進懸浮系統。其開發基礎是從擄獲的紅蓮可翔式上取得的數據。當能量翼系統完成時，其成果便是第一台第九世代Knightmare Frame的誕生——紅蓮聖天八極式。"
 knightmare_fortress_2:0 "超要塞型Knightmare Frame"
 knightmare_fortress_2_desc:0 "蜃氣樓擁有絕對防禦系統，使用一組可投射到機體任何部位的六角形能量護盾。其德魯伊系統可推算來襲砲彈的彈道並相應地移動護盾，使蜃氣樓擁有所有Knightmare Frame中最高的防禦力。該系統需要極其複雜的運算才能形成有效的屏障。在全力運轉下，絕對防禦系統可以擋下莫德雷德斯塔克黑德隆砲的零距離持續砲擊。"
 EU_knightmare_frame_1:0 "第一世代Knightmare設計"
 EU_knightmare_frame_1_desc:0 "Knightmare Frame的起源，來自為傳統載具打造的「緊急逃生駕駛艙」。這種裝置配備火箭引擎，可帶著乘員飛離殘骸，不久後又加裝了人工腿以提升機動性。載具內部空間有限，使腿的數量僅限於兩條。雖然無論從哪個意義上說它都不是武器，但這種「會走路的駕駛艙」為其後繼者提供了基礎形態。"
 EU_knightmare_frame_2:0 "第二世代Knightmare設計"
 EU_knightmare_frame_2_desc:0 "Factsphere與Landspinner等多項通用Knightmare Frame技術的誕生，促成了Knightmare Frame原型機的研發資金。然而新技術的表現並不穩定，研究因此被外包給軍方的機器人計畫與民生導向的項目。前者交由不列顛尼亞陸軍特別部門負責，後者則落入私人團體——阿什福德財團——手中。"
 EU_knightmare_frame_3:0 "加德騎士"
 EU_knightmare_frame_3_desc:0 ""
 EU_knightmare_frame_4:0 "裝甲蜂"
 EU_knightmare_frame_4_desc:0 ""
 knightmare_mass_prod_unit:0 "量產型KN"
 knightmare_mass_prod_unit_desc:0 "憑藉兩個獨立計畫取得的成果，Knightmare Frame被發展為具有實戰效能的平台。櫻石的運用成為讓Knightmare Frame達到預期性能的關鍵，使這種礦物的價值大幅上漲，成為國際政治中與化石燃料同等重要的資源。第三世代還見證了由阿什福德財團設計製造的原型機「蓋尼米德」的誕生。"
 knightmare_pol_unit:0 "警用KN"
 knightmare_pol_unit_desc:0 "Knightpolice是以退役Glasgow改造而成的Knightmare Frame，由不列顛尼亞警察部隊的精英準軍事單位操作，為一般與特種警察單位提供後援支援。它以一對衝鋒手槍取代突擊步槍，並配有特製的反Knightmare戰鬥刀。此外，在可能出現槍械或失控Knightmare的鎮暴場合，Knightpolice機體還會使用鎮暴盾牌。"
 knightmare_all_pur_unit:0 "全能型KN"
 knightmare_fortress_unit:0 "要塞型KN"
 knightmare_fortress_unit_desc:0 ""
 knightmare_melee_unit:0 "格鬥型KN"
 knightmare_melee_unit_desc:0 ""
 knightmare_artillery_unit:0 "砲擊型KN"
 knightmare_artillery_unit_desc:0 ""
 technicals:0 "技術車"
 technicals_desc:0 "技術車是經過改裝以搭載重武器的輕型車輛，通常是皮卡車。它們常為非正規部隊所用，在打帶跑戰術中頗具成效。"
 convoy_1:0 "運輸船"
 convoy_1_desc:0 "用於國際商品與資源貿易的運輸船隊。也用於運送部隊與執行海上登陸作戰。"
 convoy:0 "運輸船"
 convoy_desc:0 "運輸船承擔着國際間貨物和資源的運輸。它同時也被用來運輸部隊以及開展登陸作戰行動。"
 OUTDATED_EQ:1 "展示§H過時裝備§!"
 tank_armor_upgrade:0 "裝甲"
 tank_armor_upgrade_desc:0 "超過敵人穿甲能力的裝甲會讓你的部隊獲得巨大的優勢，但也會使它們速度更慢。"
 tank_gun_upgrade:0 "主炮"
 tank_gun_upgrade_desc:0 "裝備穿甲厚度超過敵人裝甲的主炮是非常重要的。"
 tank_aa_upgrade:0 "防空武器"
 tank_aa_upgrade_desc:0 "確保我們的防空武器裝備能夠擊落敵人最新型號的飛機。"
 tank_at_upgrade:0 "反坦克武器"
 tank_at_upgrade_desc:0 "確保我們的自行反坦克炮能幹掉敵人最新的坦克。"
 tank_art_upgrade:0 "火炮裝備"
 tank_art_upgrade_desc:1 "確保我們的自行火炮擁有巨大火力，能夠摧毀任何沒有裝甲的敵人。"
 tank_reliability_upgrade:0 "可靠性"
 tank_reliability_upgrade_desc:1 "提高穩定性能夠減少那些需要被替換的拋錨的裝備。"
 mech_cost_upgrade:0 "生產花費"
 mech_cost_upgrade_desc:0 "對設計進行優化以及在不太重要的部位採用替代材料可以使車輛的製造速度更快，但這樣製出來的單位存在略多缺陷。"
 tank_engine_upgrade:0 "引擎"
 tank_engine_upgrade_desc:0 "更強的機動性給你更多的戰略和戰術優勢，允許裝備更厚的裝甲而不會顯著降低速度。"
 ac_engine_upgrade:0 "引擎"
 ac_engine_upgrade_desc:0 "更好的機動性會給你帶來戰略和戰術優勢，不但允許裝備更厚的裝甲而且不會顯著降低速度。"
 ship_gun_upgrade:0 "艦炮"
 ship_gun_upgrade_desc:0 "裝備穿甲厚度超過敵人裝甲的主炮是非常重要的。"
 ship_torpedo_upgrade:0 "魚雷"
 ship_torpedo_upgrade_desc:0 "魚雷是一種強大的攻擊武器，由較小船隻在射程內發射，具有很大機會打出致命一擊"
 ship_armor_upgrade:0 "裝甲厚度"
 ship_armor_upgrade_desc:0 "更厚的裝甲以保護你的船隻免於敵人炮火"
 carrier_armor_upgrade:0 "裝甲厚度"
 carrier_armor_upgrade_desc:0 "更厚的裝甲以保護你的船隻免於敵人炮火"
 ship_engine_upgrade:0 "引擎"
 ship_engine_upgrade_desc:0 "具有更強大引擎的船只可以在戰鬥中更好地控制其與敵人的距離"
 ship_reliability_upgrade:0 "可靠性"
 ship_reliability_upgrade_desc:0 "具有更高可靠性的船隻不會輕易被致命一擊擊沉，那些會被致命一擊的船隻明顯沒有經過深思熟慮的設計與建設。"
 ship_anti_air_upgrade:0 "防空"
 ship_anti_air_upgrade_desc:0 "裝備更多的火炮意味着我們將擊落更多的敵機！"
 ship_ASW_upgrade:0 "反潛武器"
 ship_ASW_upgrade_desc:0 "反潛武器對於定位和擺脫潛艇非常重要。"
 destroyer_engine_upgrade:0 "引擎"
 destroyer_engine_upgrade_desc:0 "具有更強大引擎的船只可以在戰鬥中更好地控制其餘敵人的距離"
 sub_engine_upgrade:0 "引擎"
 sub_engine_upgrade_desc:0 "具有更強大引擎的船只可以在戰鬥中更好地控制其餘敵人的距離"
 sub_stealth_upgrade:0 "潛伏性"
 sub_stealth_upgrade_desc:0 "潛艇最強大之處在於直到他在形勢有利時打出致命一擊前都不被察覺到。"
 sub_torpedo_upgrade:0 "魚雷"
 sub_torpedo_upgrade_desc:0 "魚雷是一種強大的攻擊武器，由較小船隻在射程內發射，具有很大機會打出致命一擊"
 ship_deckspace_upgrade:0 "甲板空間"
 ship_deckspace_upgrade_desc:0 "更大的空間用以攜帶和發射艦載機。"
 plane_gun_upgrade:0 "各類武器"
 plane_gun_upgrade_desc:0 "更好的武器用於對戰其他飛機"
 cv_plane_gun_upgrade:0 "各類武器"
 cv_plane_gun_upgrade_desc:0 "更好的武器用於對戰其他飛機"
 plane_engine_upgrade:0 "引擎"
 plane_engine_upgrade_desc:0 "更快的速度讓飛機在定位和選取目標時獲得更多優勢，對於攔截機尤爲重要。"
 plane_range_upgrade:0 "航程"
 plane_range_upgrade_desc:0 "航程更好的飛機在執行任務時能夠到達更好的戰略地點"
 cv_plane_range_upgrade:0 "航程"
 cv_plane_range_upgrade_desc:0 "航程更好的飛機在執行任務時能夠到達更好的戰略地點"
 plane_reliability_upgrade:0 "可靠性"
 plane_reliability_upgrade_desc:0 "可靠性低的飛機可能在執行任務時發生意外"
 plane_naval_upgrade:0 "對艦武器"
 plane_naval_upgrade_desc:0 "更多的對艦武器承載能力。"
 cv_plane_naval_upgrade:0 "對艦武器"
 cv_plane_naval_upgrade_desc:0 "更多的對艦武器承載能力。"
 plane_bomb_upgrade:0 "轟炸"
 plane_bomb_upgrade_desc:0 "更大的炸彈艙可以提供更多載荷。"
 plane_tac_bomb_upgrade:0 "轟炸"
 plane_tac_bomb_upgrade_desc:0 "更大的炸彈艙可以提供更多載荷。"
 plane_cas_upgrade:0 "地面攻擊"
 plane_cas_upgrade_desc:0 "改進的地面目標攻擊武器"
 plane_armor_upgrade:0 "裝甲"
 EQUIPMENT_VERSION:0 "$VERSION|0$型"
 night_vision:0 "夜視裝備I"
 night_vision_desc:0 "一種光電影像增強裝置，特別是頭盔形式，可偵測可見光與近紅外線能量，將能量增強後提供可見影像以供夜間觀察。"
 night_vision2:0 "夜視裝備II"
 night_vision2_desc:0 "夜視頭盔的多項改良帶來了更舒適的結構與更強的韌性，耐用度也大幅提升。"
 support_weapons:0 "支援武器I"
 support_weapons_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 support_weapons2:0 "支援武器II"
 support_weapons2_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 support_weapons3:0 "支援武器III"
 support_weapons3_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 support_weapons4:0 "支援武器IV"
 support_weapons4_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 support_weapons5:0 "支援武器V"
 support_weapons5_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 support_weapons6:0 "支援武器VI"
 support_weapons6_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 support_weapons7:0 "支援武器VII"
 support_weapons7_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 support_weapons8:0 "支援武器VIII"
 support_weapons8_desc:0 "步兵支援武器是為提升步兵單位安全性而設計使用的小型武器，能對單位指揮官的需求提供即時的戰術回應。"
 paratroopers:0 "傘兵I"
 paratroopers_desc:0 "將空降部隊納入我們的軍隊，就能實施強行突入，並將關鍵部隊部署到以往無法到達的地區，開創新的戰術機會。"
 paratroopers2:0 "傘兵II"
 paratroopers2_desc:0 "從只有少數傘兵的小型行動轉型為更大規模的空降師，為大規模空降作戰鋪平了道路，使這支部隊從新奇玩意變成戰爭的常態組成。"
 paratroopers4:0 "傘兵IV"
 paratroopers4_desc:0 "傘兵部隊如今已專業化為一支獨當一面的精英特種部隊。"
 paratroopers3:0 "傘兵III"
 paratroopers3_desc:0 "學習根據天候調整空降作戰，並將空降Knightmare等裝備標準化，將是增強我軍所必需的。"
 marines:0 "海軍陸戰隊I"
 marines_desc:0 "專精兩棲作戰的部隊正變得日益不可或缺。隨著我們的海軍步兵獲得專用登陸艇與專業訓練的支援，臨時拼湊的方法與裝備已成為過去。"
 marines2:0 "海軍陸戰隊II"
 marines2_desc:0 "兩棲作戰需要持續創新。改良的後勤支援與可攜式港口，能讓我們的陸戰隊完成原本不可能的登陸行動。"
 marines3:0 "海軍陸戰隊III"
 marines3_desc:0 "陸戰隊不只是兩棲步兵。未來，他們將配備最現代化的Knightmare Frame。"
 marines4:0 "海軍陸戰隊IV"
 marines4_desc:0 "陸戰隊如今已專業化為一支獨當一面的精英特種部隊。"
 tech_mountaineers:0 "山地步兵I"
 tech_mountaineers_desc:0 "在山脈中作戰使部隊面臨諸多危險，但有時無法避免。為士兵提供針對這種環境的專業訓練，可以將這些風險降到最低。"
 tech_mountaineers2:0 "山地步兵II"
 tech_mountaineers2_desc:0 "不僅是求生，我們的部隊還能受訓利用山地作為優勢。憑藉輕裝備與騾馬運輸，他們能比其他步兵更好地在這種地形上機動。"
 tech_mountaineers3:0 "山地步兵III"
 tech_mountaineers3_desc:0 "為高海拔、低溫下最艱鉅的山地任務做準備，將需要部署Knightmare。"
 tech_mountaineers4:0 "山地步兵IV"
 tech_mountaineers4_desc:0 "山地部隊如今已專業化為一支獨當一面的精英特種部隊。"
 tech_special_forces:0 "特種部隊"
 tech_special_forces_desc:0 "非常規作戰需要專業訓練。我們必須確保部隊做好準備，能夠適應嚴酷的環境。"
 advanced_special_forces:0 "進階特種部隊訓練"
 advanced_special_forces_desc:0 "透過高強度的訓練，我們可以確保特種部隊的表現遠超常人。"
 improved_special_forces:1 "擴大特種部隊計畫"
 improved_special_forces_desc:1 "特種部隊能執行普通士兵無法完成的任務。我們需要擴大訓練計畫，讓更多士兵取得資格。"
 extreme_environment_training:0 "極端環境訓練"
 extreme_environment_training_desc:0 "我們必須能夠在最嚴酷的環境中作戰。有了合適的訓練與裝備，我們的部隊將能在最極端的條件下戰鬥。"
 survival_training:0 "求生訓練"
 survival_training_desc:0 "我們的特種部隊經常要在敵後與補給短缺的情況下作戰。我們需要訓練他們忍受惡劣天候，並在補給有限的情況下戰鬥。"
 elite_forces:0 "精英部隊"
 elite_forces_desc:0 "只有精英中的精英才能成為特種部隊。通過訓練的士兵將比任何人都更強壯、更迅捷、更驍勇善戰。"
 jungle_warfare:0 "叢林戰"
 jungle_warfare_desc:0 "讓我們的士兵在叢林中發揮戰力的特種訓練。"
 HUN_light_infantry_tech:0 "輕步兵師學說"
 HUN_light_infantry_tech_desc:0 "減少步兵師中支援兵種的數量，使其更加靈活，在城市與森林等受限地形的戰鬥中佔據優勢。"
 mountain_warfare:0 "山地戰"
