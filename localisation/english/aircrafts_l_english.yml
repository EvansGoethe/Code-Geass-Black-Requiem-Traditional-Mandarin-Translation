﻿l_english:
 cas:0 "地面支援"
 cv_cas:0 "艦載近距支援機"
 cv_CAS_equipment_desc:0 "我們的密接支援理論學說要求一款可進行精確範圍攻擊的飛行器。此種飛機的可用載荷較大型的戰略轟炸機要小，可在低空掃射及俯衝轟炸時伺機攻擊摧毀小型目標。"
 cv_fighter:0 "艦載多用途戰機"
 fighter:0 "多用途戰機"
 early_jet_design:0 "早期輕型飛機設計"
 early_jet_design_desc:0 "輕型飛機是主要用於空戰的固定翼軍用飛機。在軍事衝突中，這些飛機的功能是奪取戰場上空的製空權。控制戰場上空的製空權使得轟炸機和攻擊機能夠對敵方目標進行戰術和戰略轟炸。"
 cv_fighter_equipment_desc:0 "多用途戰鬥機（MRCA）是一種旨在執行不同作戰任務的戰鬥機。這些任務包括空對空作戰、空中支援、空中轟炸、偵察、電子戰和壓制防空系統。"
 fighter1:0 "多用途戰機 I"
 fighter1_desc:0 "多用途戰鬥機（MRCA）是一種旨在執行不同作戰任務的戰鬥機。這些任務包括空對空作戰、空中支援、空中轟炸、偵察、電子戰和壓制防空系統。"
 cv_fighter_equipment_1:0 "多用途戰機 I"
 cv_fighter_equipment_2:0 "多用途戰機 II"
 fighter2:0 "多用途戰機 II"
 fighter2_desc:0 "這架飛機包含重大的結構改動以及更大的發動機。機身設計融入了功率更強的發動機，並配備了先進的發動機艙結構和艙門。後座爲武器系統軍官配備了設備，使其能夠通過多個屏幕操作空對地航空電子設備。"
 improved_fighter:0 "通用多用途戰機改進"
 improved_fighter_desc:0 "現在，多用途戰機裝載了威力更大的導彈，能對Knightmare造成傷害。速度和攻擊精度也得到提升。"
 fighter4:0 "多用途戰機 III"
 fighter4_desc:0 "這種飛機裝備了更大的機翼，這使得有效載荷和機動性與其推力成比例地增加，但也會以各種方式增加機身的重量。它對Knightmare的攻擊抗性大幅增強了。"
 stealth_fighters:0 "多用途戰機隱身改進"
 stealth_fighters_desc:0 "在機翼上共固化技術的創新應用遇到暫時性的困難，但這項技術的前沿應用已經被證實可以減輕重量、提升航程，還有利於提高隱身性能。"
 fighter5:0 "多用途戰機 IV型"
 fighter5_desc:0 "多用途戰機的最新發展使其對所有威脅的攻防能力得到了加強。此外，極高的靈活性使其能夠在同一場行動中，在極短的時間內執行多項任務。"
 g_support1:0 "近距支援機 I型"
 g_support1_desc:0 "我們的密接支援理論學說要求一款可進行精確範圍攻擊的飛行器。此種飛機的可用載荷較大型的戰略轟炸機要小，可在低空掃射及俯衝轟炸時伺機攻擊摧毀小型目標。"
 g_support2:0 "近距支援機 II型"
 g_support2_desc:0 "近距支援飛機的新型號在防禦系統方面進行了改進，還配備了用於抵禦任何攻擊的小型武器。"
 improved_g_support_desc:0 "考慮到Knightmare戰機技術的最新發展，這類戰機已配備一套全新的防禦系統。這樣一來，它們將能更好地抵禦戰機的攻擊。"
 g_support4:0 "近距支援機 III型"
 g_support4_desc:0 "近距支援機儘管最近已嘗試進行改進，但事實證明它們在抵禦來自下方的敵人攻擊時仍過於脆弱。如今，它們將在戰場邊緣發揮作用，憑藉增強型導彈和武器提供支援。"
 improved_g_support:0 "通用地面支援改進"
 stealth_g_support:0 "通用近距支援機隱身改進"
 stealth_g_support_desc:0 "爲了讓近距支援機躲過低級防空設施，有必要提高它們的隱身能力。"
 UNLOCK_DIVISION_PLANES:0 "我們將解鎖攻擊機的全部機型。"
 UNLOCK_DIVISION_PLANES_2:0 "我們將解鎖轟炸機和運輸機的全部機型。"
 early_jet_design_2:0 "早期重型飛機設計"
 early_jet_design_2_desc:0 "重型飛機是主要用於對地攻擊的固定翼軍用飛機。在軍事衝突中，這些飛機的角色多種多樣，從運送部隊和武器到對陸地或海上目標進行重型轟炸。"
 hel1:0 "攻擊直升機I型"
 hel1_desc:0 "攻擊直升機是一種武裝直升機，其主要任務是攻擊，具備打擊地面目標（例如敵方步兵、軍用車輛和防禦工事）的攻擊能力。由於其配備的重型武器，它們有時也被稱為武裝直升機。"
 helicopter_equipment_1:0 "攻擊直升機I型"
 helicopter_equipment_1_desc:0 "攻擊直升機是一種武裝直升機，其主要任務是攻擊，具備打擊地面目標（例如敵方步兵、軍用車輛和防禦工事）的攻擊能力。由於其配備的重型武器，它們有時也被稱為武裝直升機。"
 helicopter_equipment_2:0 "攻擊直升機II型"
 helicopter_equipment_2_desc:0 "現代攻擊直升機有兩個主要用途：一是為地面部隊提供直接、精準的近距離空中支援；二是執行反戰車任務，摧毀敵方成群的裝甲車輛。攻擊直升機也可用作運輸直升機的護航機，或與輕型直升機協同執行武裝偵察任務。"
 hel2:0 "攻擊直升機II型"
 hel2_desc:0 "現代攻擊直升機有兩個主要用途：一是為地面部隊提供直接、精準的近距離空中支援；二是執行反戰車任務，摧毀敵方成群的裝甲車輛。攻擊直升機也可用作運輸直升機的護航機，或與輕型直升機協同執行武裝偵察任務。"
 hel_improve:0 "通用直升機改進"
 hel_improve_desc:0 "攻擊直升機現在可以使用機關炮、機關槍、火箭彈、反坦克導彈等武器。一些攻擊直升機還可以裝配備了空對空導彈。"
 trans1:0 "運輸機I型"
 trans1_desc:0 "軍用運輸機，也稱為軍用貨運飛機或運輸機，是軍方擁有的運輸飛機，用於空運部隊和軍事裝備，以支援軍事行動。運輸機對於維持通往難以通過陸路或水路抵達的前線基地的補給線至關重要，可用於執行戰略和戰術任務。"
 transport_plane_equipment_1:0 "運輸機I型"
 transport_plane_equipment_1_desc:0 "軍用運輸機，也稱為軍用貨運飛機或運輸機，是軍方擁有的運輸飛機，用於空運部隊和軍事裝備，以支援軍事行動。運輸機對於維持通往難以通過陸路或水路抵達的前線基地的補給線至關重要，可用於執行戰略和戰術任務。"
 trans_improve:0 "通用運輸機改進"
 trans_improve_desc:0 "新型運輸直升機普遍具備較強的運載能力，配備全新強化防禦系統，可搭載一個排的步兵，也可以通過機艙內置或懸掛運輸牽引式火炮與輕型車輛。"
 trans2:0 "航空母艦"
 trans2_desc:0 "這是一艘造型獨特的大型船，船上設有許多艙室、會議室和娛樂室。艦橋設有指揮平台，位於其他控制平台之上，各平台間以樓梯連接。防禦方面，該艦最初僅在底部配備了熾焰光輝護盾，但後來擴展至覆蓋整艘船隻。攻擊方面，艦體上佈滿了自動機槍砲塔，頂部裝有飛彈發射器，此外還有一門巨大的艦首砲和一門艦尾砲。"
 transport_plane_equipment_2:0 "航空母艦"
 transport_plane_equipment_2_desc:0 "這是一艘造型獨特的大型船，船上設有許多艙室、會議室和娛樂室。艦橋設有指揮平台，位於其他控制平台之上，各平台間以樓梯連接。防禦方面，該艦最初僅在底部配備了熾焰光輝護盾，但後來擴展至覆蓋整艘船隻。攻擊方面，艦體上佈滿了自動機槍砲塔，頂部裝有飛彈發射器，此外還有一門巨大的艦首砲和一門艦尾砲。"
 bomber1:0 "噴氣式轟炸機I型"
 bomber1_desc:0 "轟炸機是一種軍用作戰飛機，設計用於透過投擲空對地武器（例如炸彈）、發射魚雷或部署空射巡航飛彈來攻擊地面和海上目標。現代噴射轟炸機主要執行戰略轟炸任務，儘管它們偶爾也會執行戰術轟炸任務。"
 strat_bomber_equipment_1:0 "噴氣式轟炸機I型"
 strat_bomber_equipment_1_desc:0 "轟炸機是一種軍用作戰飛機，設計用於透過投擲空對地武器（例如炸彈）、發射魚雷或部署空射巡航飛彈來攻擊地面和海上目標。現代噴射轟炸機主要執行戰略轟炸任務，儘管它們偶爾也會執行戰術轟炸任務。"
 bomber2:0 "噴氣式轟炸機II型"
 bomber2_desc:0 "轟炸機是一種軍用作戰飛機，其設計目的是透過投擲空對地武器（如炸彈）、發射魚雷或部署空射巡航飛彈來攻擊地面和海上目標。"
 strat_bomber_equipment_2:0 "噴氣式轟炸機II型"
 strat_bomber_equipment_2_desc:0 "現代噴射轟炸機主要執行戰略轟炸任務，偶爾也會進行戰術轟炸。儘管如此，它們的成本很高，但效果卻一般。"
 missile_equip:0 "通用武器強化"
 missile_equip_desc:0 "現代噴射轟炸機主要執行戰略轟炸任務，偶爾也會進行戰術轟炸。儘管如此，它們的成本很高，但效果卻一般。"
 bomber3:0 "噴氣式轟炸機III型"
 bomber3_desc:0 "隱形戰機採用各種技術來避免被偵測，這些技術可以減少雷達、紅外線、可見光、射頻頻譜和音訊的反射/發射，這些技術統稱為隱形技術。"
 strat_bomber_equipment_3:0 "噴氣式轟炸機III型"
 strat_bomber_equipment_3_desc:0 "隱形戰機採用各種技術來避免被偵測，這些技術可以減少雷達、紅外線、可見光、射頻頻譜和音訊的反射/發射，這些技術統稱為隱形技術。"
 sak_equip:0 "附加櫻石設備"
 sak_equip_desc:0 "櫻石動力開發的成果將得到應用；新式引擎保障了極大的轟炸範圍，也提高了地毯式轟炸的效率。"
 gen_improv_2:0 "通用噴氣式轟炸機改進"
 gen_improv_2_desc:0 "噴氣式轟炸機效率的提高，以及威力更大的炸彈的研發，將確保這些飛行器擁有更好的性能。"
 bomber4:0 "噴氣式轟炸機IV型"
 bomber4_desc:0 "最新版本的轟炸機能夠執行各種高風險任務而不用擔心暴露身份。此外，它們遭遇夢魘騎士的機率也很低。"
 strat_bomber_equipment_4:0 "噴氣式轟炸機IV型"
 strat_bomber_equipment_4_desc:0 "最新版本的轟炸機能夠執行各種高風險任務而不用擔心暴露身份。此外，它們遭遇夢魘騎士的機率也很低。"