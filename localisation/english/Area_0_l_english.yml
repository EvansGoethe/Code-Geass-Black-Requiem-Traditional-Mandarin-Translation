﻿l_english:
 side_nobles:0 "§R你站在寡頭政治一方了§!"
 side_viceroy:0 "§R你已經站到總督派一邊§!"
 side_purists:0 "§R純血派已經奪權§!"
 quota_level_1:0 "殖民稅水平：§G輕度§!"
 quota_level_1_desc:0 "作為不列顛尼亞的殖民地，我們必須向我們的宗主國繳納我們應繳的稅款，這相當於國民經濟的 50%。；"
 quota_level_2:0 "殖民稅水平：§O中度§!"
 quota_level_2_desc:0 "作為不列顛尼亞的殖民地，我們必須向我們的宗主國繳納我們應繳的稅款，這相當於國民經濟的 80%。"
 quota_level_3:0 "殖民稅水平：§R高度§!"
 quota_level_3_desc:0 "作為不列顛尼亞的殖民地，我們必須向我們的宗主國繳納我們應繳的稅款，這相當於國民經濟的95%。"
 aristocratic_families_area_1:0 "地方貴族的暴政"
 aristocratic_families_area_2:0 "地方貴族的暴政"
 aristocratic_families_area_3:0 "少數人的樂土"
 aristocratic_families_area_1_desc:0 "地方貴族家系對帝國總督施加了權威，並且對殖民地行政管理擁有巨大的權力。"
 aristocratic_families_area_2_desc:0 "地方貴族家系對帝國總督施加了權威，並且對殖民地行政管理擁有巨大的權力。"
 aristocratic_families_area_3_desc:0 "貴族們對整個地區及其居民擁有絕對的權力，居民被迫居住在靠近最不發達地區的隔離區。最終，只有極少數人能夠享受生活的基本便利。"
 centralized_leadership:0 "中央集權管理"
 centralized_leadership_desc:0 "該地區現在完全由帝國總督控制，總督可以組織高效的行政機構管理整個領土。"
 centralized_leadership_2:0 "經濟行政效率"
 centralized_leadership_2_desc:0 "由於不列顛尼亞金融集團與殖民政府之間有著牢固的聯繫，因此有可能大大提高當地的生產力，這將有利於帝國本土。"
 centralized_leadership_3:0 "模型區域"
 centralized_leadership_3_desc:0 "該地區已成為不列顛殖民政權的典範，透過帝國鞏固了「不列顛治下的和平」的原則。"
 army_purged:0 "內部清洗"
 army_purged_desc:0 "在純血派政府的命令下，地方不列顛尼亞衛隊正在執行一系列的審批和清洗。"
 total_political_dominance:0 "極權政權"
 total_political_dominance_desc:0 "激進純血派已經牢牢掌控了整個國家機器，容不下一點內部的反對和批評"
 total_political_dominance_2:0 "極權主義奴隸制政權"
 total_political_dominance_2_desc:0 "當地經濟現在建立在殘酷的奴隸制度之上，大大提高了當地的生產力，為偉大的不列顛尼亞民族做出了貢獻。"
 total_political_dominance_3:0 "極端社會達爾文主義"
 total_political_dominance_3_desc:0 "該地區已成為一個完美的社會達爾文主義國家，實現了純血派烏托邦，或者，在許多人看來，實現了純血派地獄。"
 spurred_industrialization_1:0 "促進工業化"
 spurred_industrialization_2:0 "工業繁榮"
 area_management:0 "管理殖民區"
 area_management_desc:0 "我們正處於政府運作的關鍵時期，任何一個錯誤都可能為整個地區帶來災難性的後果。"
 area_nobles:0 "賦予貴族權力"
 area_nobles_desc:0 "貴族們贏得了權力鬥爭，新的寡頭政治似乎即將建立。"
 area_exportation:0 "控制資源市場"
 area_exportation_desc:0 "資源開發是不列顛尼亞地區最重要的產業，透過持續的財政投資控制產業，我們可以獲得巨大的影響力。"
 area_privilegies:0 "擴展貴族頭銜"
 area_privilegies_desc:0 "隨著貴族頭銜的擴展，我們可以進一步鞏固我們在殖民政府中的政治地位，並將友好人士安排在重要職位上。"
 area_oligarchy:0 "新寡頭政治的誕生"
 area_oligarchy_desc:0 "帝國總督如今不過是不列顛貴族階級的傀儡，而不列顛貴族階級已經建立了帝國參議院，這一機構將保證未來新政治秩序的合法性。"
 area_crime:0 "無視有組織犯罪"
 area_crime_desc:0 "如果我們想與祖國的金融巨頭競爭，就必須將我們的工業實力與當地有組織犯罪集團的關係和影響力結合起來，而這些犯罪集團將可以肆無忌憚地從事非法活動。最終，這必將助長民間部門的腐敗。"
 area_corvee:0 "重新引入徭役制度"
 area_corvee_desc:0 "為了徹底控制民眾，參議院通過了一系列法律，使當地居民完全依賴貴族，或者換句話說，建立了一種新的現代化封建制度。"
 area_special_zones:0 "封閉區域"
 area_special_zones_desc:0 "為了確保該地區各種族群之間的隔離，參議院將利用新農奴來改造該地區的城市佈局。此外，該地區將被劃分為平民的特殊保留地和專供顯赫貴族階級居住的豪華區域。"
 area_paradise_few:0 "少數人的樂土"
 area_paradise_few_desc:0 "該地區已經淪為貴族階級的遊樂場，在這個不公正的製度下，只有少數人能夠享受生活所能提供的奢華。"
 area_viceroy:0 "擴大總督權力"
 area_viceroy_desc:0 "總督贏得了權力鬥爭，現狀似乎很可能會繼續維持下去。"
 area_bribe:0 "賄賂政府"
 area_honorary_brit:0 "支持名譽不列顛尼亞人"
 area_honorary_brit_desc:0 "為了鞏固我們的軍事實力並對抗純血派民兵，我們必須支援軍隊中的榮譽不列顛尼亞部隊。這樣，我們既可以打擊激進分子，又能提升該地區對不列顛尼亞的忠誠度。"
 area_fire_officials:0 "解僱不忠誠的軍官"
 area_fire_officials_desc:0 "最後，我們要撤下與純血派勾結的高階軍官並隔離他們。這樣能保證軍隊的忠誠，粉碎未來可能的政變陰謀"
 area_bribe_desc:0 "貴族們永遠不會真正效忠於我們的政府，但他們的支持對於穩定局勢至關重要。幸運的是，我們可以提供大量的金錢和特權來改變他們的想法。"
 area_impose_gov:0 "專制領導"
 area_impose_gov_desc:0 "最艱難的幾個月已經過去，總督的地位再一次得到保證。純血派被削弱，各派貴族都站到我們一邊；沒有什麼能阻礙我們獨攬大權。"
 area_conglomerates:0 "企業集團的力量"
 area_conglomerates_desc:0 "為了促進該地區的經濟發展，我們將擴大金融集團的影響力。由於這些集團大多由貴族控制，它們的政治權力將受到極大削弱。"
 area_model:0 "模範區域"
 area_model_desc:0 "該地區在經濟和民事領域都擁有高效的行政管理，已成為帝國的榜樣，也是皇帝建立的政治和平（Pax Britannica）的完美典範。"
 area_purists:0 "純血派政變！"
 area_purists_desc:0 "純血派已經開始行動，這個地區可能面臨激進的轉型。"
 area_sideline_viceroy:0 "流放總督！"
 area_sideline_viceroy_desc:0 "帝國總督目前是我們統治的最大威脅，必須因其「健康原因」將其遣返回國。此舉之後，我們將完全掌控這片領土。"
 area_build_assets:0 "奪取敵對貴族的資產！"
 area_build_assets_desc:0 "一些貪腐的貴族就像寄生蟲一樣，他們為了保住自身權力拼命阻止我們建立一個公平的社會達爾文主義社會。因此，必須透過大規模資產沒收徹底清除他們的影響力。"
 area_clear_army:0 "清洗軍隊！"
 area_clear_army_desc:0 "殖民地人以名譽不列顛尼亞人出現在軍中玷汙和損害了不列顛尼亞軍隊的傳統。幸運的是，純血派將迅速通過一項法令，把所有非不列顛尼亞人和不忠誠的軍官驅逐出軍隊。"
 area_destroy_ghettos:0 "清除貧民窟！"
 area_destroy_ghettos_desc:0 "雖然軍隊目前狀況尚可接受，但那些骯髒的「Numbers」仍然佔據著不列顛尼亞的聖地。為了徹底消除他們的威脅，必須採取一切手段，對民眾進行嚴厲的控制。"
 area_purist_secured:0 "純血派主導"
 area_purist_secured_desc:0 "局勢目前再次穩定，人口控制已全面實現。這標誌著邁向真正的社會達爾文主義的第一步。"
 area_slavery:0 "奴役倖存者"
 area_slavery_desc:0 "該區域內剩餘的人口將被強徵入專門的再教育營，為大不列顛尼亞祖國服務。這將提高當地的生產效率和礦業發展。"
 area_propaganda:0 "加強民族主義宣傳"
 area_propaganda_desc:0 "有些不列顛尼亞人對我們採取的激進措施並不完全信服，但只要進行適當的宣傳，我們就能讓新政府獲得合法性。"
 area_increase_exploitation:0 "極端剝削ㄋ"
 area_increase_exploitation_desc:0 "另一個有利於不列顛尼亞的必要步驟是最大限度地開發這片領土，而不顧環境或社會後果。"
 area_extreme_darwinism:0 "真正的社會達爾文主義"
 area_extreme_darwinism_desc:0 "最終，經過數十年的地方衰敗，我們實現了真正的達爾文主義社會，其全部功能就是以最大的效率和生產力造福神聖不列顛尼亞帝國。"
 ARE_Industrial_Development:0 "發展工業"
 ARE_Industrial_Development_desc:0 "我們的國家迫切需要進行工業改革。我們需要投資建立更好的工業化體系，以使我們的國家擺脫在當前充滿不確定性的時期所面臨的經濟差距。"
 ARE_Civillian_sector:0 "民事部門"
 ARE_Civillian_sector_desc:0 "現在是時候從零開始建造新工廠了。只有這樣，我們的國家才能達到成為經濟強國所需的指標和永續發展目標。"
 ARE_Civilian_Sector_2:0 "民事部門 2"
 ARE_Civilian_Sector_2_desc:0 "作為當前經濟政策的延續，政府將投資建設更多國有工廠，以促進國家經濟發展，並致力於實現人民的長期經濟繁榮。"
 ARE_Civilian_Sector_3:0 "民事部門 3"
 ARE_Civilian_Sector_3_desc:0 "為了實現經濟計畫的中期目標，我們將繼續專注於建造工廠，以滿足不斷增長的消費產業的需求。"
 ARE_Civillian_sector_4:0 "民事部門 4"
 ARE_Civillian_sector_4_desc:0 "隨著我們經濟計劃的最後階段即將完成，這項旨在提升國家財富和繁榮的宏偉計劃終於準備就緒！在不久的將來，世界各國都將臣服於我們強大的經濟實力！"
 ARE_Infastructure_Sector:0 "基礎設施部門"
 ARE_Infastructure_Sector_desc:0 "由於過去的腐敗和無知，我們國家的基建設施長期疏於維護，已經破敗不堪。我們必須發起一項倡議，修復和擴大我們的基建設施，使其重現昔日輝煌。"
 ARE_Infastructure_Sector_2:0 "基礎設施部門 2"
 ARE_Infastructure_Sector_2_desc:0 "我們基礎設施建設的下一階段現在可以開始了。我們將致力於建立一個可持續的全國性交通運輸系統，以在未來多年內為我們的軍隊和廣大民眾提供物資保障。"
 ARE_Infastructure_Sector_3:0 "基礎設施部門 3"
 ARE_Infastructure_Sector_3_desc:0 "我們必須保持目前所取得的動能。我們將清理舊的基礎設施，為新建住宅、工廠和設施騰出空間，這將鞏固我們國家的根基。"
 ARE_Infastructure_Sector_4:0 "基礎建設部門 4"
 ARE_Infastructure_Sector_4_desc:0 "我們的基礎建設發展計畫終於要進入最後階段了。在可預見的未來，我們的首都將實現自給自足，其經濟也將真正體現一個新興國家首都應有的水準。"
 ARE_Military_Sector:0 "軍事區"
 ARE_Military_Sector_desc:0 "為了能夠有效地抵禦外部威脅，我們需要一個能夠為步兵提供足夠可靠的武器的軍火工業，以對抗那些企圖破壞我們國家穩定的日益增長的敵對勢力。"
 ARE_Military_Sector_2:0 "第二軍事區"
 ARE_Military_Sector_2_desc:0 "我們必須考慮的另一個方面是敵軍可能部署的大量裝甲師。更不用說我們可能遭遇的「knightmares」坦克了。這種技術正迅速展現戰爭的新面貌，並且正快速發展成為超越裝甲的新型武器。我們必須加大對火砲和反戰車能力的投入，才能對抗這種強大的技術力量。"
 ARE_Military_Sector_3:0 "第三軍事區"
 ARE_Military_Sector_3_desc:0 "天空是戰場上經常被忽視的一個區域，但即便如此，我們也能清楚地看到，誰控制了製空權，誰就控制了戰局。因此，生產能夠確保我方制空權的飛機是重中之重。"
 ARE_Military_Sector_4:0 "第四軍事區"
 ARE_Military_Sector_4_desc:0 "我們最終的軍事工業擴張將大大提高我們的軍事產量，推動我們的軍事技術，確保我們的主權和我們國家的持續安全。"
 ARE_New_Technical_Institute:0 "新技術學院"
 ARE_New_Technical_Institute_desc:0 "我們近期的工業擴張使我們有機會增加研發預算，這將使我們能夠迅速擴大創新能力，並進一步實現我們的長期國家目標。"
 ARE_Synthethic_Sources:0 "合成資源"
 ARE_Synthethic_Sources_desc:0 "為了推動我們不斷發展的產業，我們需要資源來維持自身的正常運轉，同時繼續擴大產業規模，並創新能夠幫助我們實現產業擴張的新技術。"
 ARE_Civillian_sector_5:0 "民事部門 5"
 ARE_Civillian_Sector_5_desc:0 "我們的第二個國家工業計劃已經啟動。我們將在這裡興建的工廠將為國家提供確保經濟獨立所需的資源。"
 ARE_Prosperous_Nation:0 "繁榮之國"
 ARE_Prosperous_Nation_desc:0 "最終，我們的國家實現了真正的繁榮。人民享受近年來國民經濟產業蓬勃發展所帶來的財富。我們取得了其他弱小國夢寐以求的成就。"
 ARE_Pink_Saphires:0 "粉色的寶石？"
 ARE_Pink_Saphires_desc:0 "櫻石是一種珍貴的資源，我們絕對不能放棄。其他國家則利用這種資源大大提升了自身的經濟和軍事實力。我們需要這種資源，而且是刻不容緩！"
 ARE_New_Railways:0 "新建鐵路"
 ARE_New_Railways_desc:0 "為了確保我國不僅能夠保衛自身，而且能夠實現經濟自給自足，我們需要建立一個能夠滿足我們這個處於創新前沿的成長型國家需求的鐵路網絡。"
 ARE_Military_Sector_5:0 "第五軍事區"
 ARE_Military_Sector_5_desc:0 "現在我們擁有了進行第二次軍事擴張所需的資源，我們就能真正為軍隊配備各種各樣的裝備。我們將擁有世界上裝備最精良的軍隊之一——不，是世界上裝備最精良的軍隊！"
 ARE_Military_Industrial_Complex:0 "軍工複合體"
 ARE_Military_Industrial_Complex_desc:0 "我們國家的經濟未來正越來越接近以軍事為中心的模式。我們的戰爭機器將繼續壯大；我們能否無限期地維持下去，還是這將導致我們的衰落？"
 ARE_Advanced_Technical_Institute:0 "先進技術學院"
 ARE_Advanced_Technical_Institute_desc:0 "近年來，我們產業的蓬勃發展提升了我們的創新能力，也增強了我們改進現有技術的能力。這將使我們超越那些自認為科技優於我們的國家，贏得競爭優勢。"
 ARE_Establish_Admiralty:0 "建立海軍部"
 ARE_Establish_Admiralty_desc:0 "現在，我們國家終於到了海岸線以外拓展的時機。但在考慮派遣船艦之前，我們必須先建立起海軍體系和指揮系統。我們國家只有少數男女能夠勝任這項工作。希望他們能夠迎接挑戰。"
 ARE_Confiscate_Dockyards:0 "沒收民用船塢"
 ARE_Confiscate_Dockyards_desc:0 "儘管貿易在當前動盪時期對我們至關重要，但我們不能坐視巨頭們踐踏我們，因為我們終將面臨被踐踏的命運。我們將沒收港口、碼頭以及任何用於船舶維修的人工岬角。這些臨時搭建的船塢將使我們能夠製造自己的戰艦。"
 ARE_Naval_School:0 "創辦海軍學院"
 ARE_Naval_School_desc:0 "現在我們有了海軍上將，也有了幾艘正在建造中的艦艇，我們必須建立一所學院，將水手培養成軍官，以便我們能夠填補指揮結構中的其他軍銜。"
 ARE_New_Age:0 "海戰新時代"
 ARE_New_Age_desc:0 "儘管艦船設計多年來變化不大，但各艦種的戰術和角色卻發生了翻天覆地的變化。我們必須盡快更新海軍理論，否則，我們很可能在第一場戰鬥中就措手不及。"
 ARE_Coastal_Defense_Fleet:0 "建立海岸防禦艦隊"
 ARE_Coastal_Defense_Fleet_desc:0 "隨著生產能力的提升和指揮體系的穩固建立，我們現在可以向海軍下達第一個任務。這項任務的目標並不複雜，就是沿著海岸線巡邏，讓船員累積一些海上經驗。雖然表面上看這只是一項小任務，但它卻成功地增強了我們國家的自豪感和希望。"
 ARE_Honorable_Battle:0 "光榮的戰爭浪潮"
 ARE_Honorable_Battle_desc:0 "我們的國家驕傲而光榮，絕不會像潛伏的掠食者一樣躲藏在海底。我們將昂首挺胸，以昔日艦隊的雄偉氣勢向敵人發動衝鋒。我們將用我們強大的武器裝備將他們徹底擊敗。"
 ARE_Heavy_Ship_Design:0 "重型船艦設計"
 ARE_Heavy_Ship_Design_desc:0 "現在我們擁有了一支強大的護航艦隊，可以安全地護送我們的船穿越海洋。這也意味著我們應該從更宏觀的角度來思考問題。讓我們建造能夠與不列顛尼亞最強大的戰列航空母艦相媲美的船吧。"
 ARE_Standardized_Designs:0 "標準化設計"
 ARE_Standardized_Designs_desc:0 "我們已成功建造了多種類型的水面艦艇。從中累積的經驗讓我們發現了設計中的許多缺陷，其中一些缺陷導致組裝時間過長。因此，我們最終能夠實現設計標準化，從而以前所未有的速度組裝輕型艦艇。"
 ARE_Install_the_Repair_Yards:0 "安裝維修場地"
 ARE_Install_the_Repair_Yards_desc:0 "隨著戰爭的可能性隨著時間的推移而增加，建造乾船塢修理廠將增強我們艦隊的生存能力，使它們能夠返回巡邏，而無需等待數月進行維修。"
 ARE_Flagship_for_the_Fleet:0 "艦隊的旗艦"
 ARE_Flagship_for_the_Fleet_desc:0 "現代水面艦隊若沒有旗艦統帥，又怎能稱之為海軍強國？沒有旗艦，我們怎能自詡為海軍強國？儘管我們擁有足夠的資源來建造這樣一艘戰艦，但目前僅夠建造一艘主力艦。重型巡洋艦和航空母艦之間的選擇，目前在海軍部內部引發了激烈的爭論。"
 ARE_Hidden_War:0 "秘密戰線"
 ARE_Hidden_War_desc:0 "鑑於我國生產能力有限，為了面子或虛榮心而建造水面艦隊是愚蠢的。我們應該專注於捕食戰術，在目標出現之前保持隱蔽。從長遠來看，潛艦艦隊對我們更有利。我們首先要做的就是統一潛水艇設計。"
 ARE_Fear_the_Unseen:0 "懼怕無形"
 ARE_Fear_the_Unseen_desc:0 "建造小型艦艇節省了大量時間和精力，我們可以將精力投入到提升魚雷性能和訓練水手推遲攻擊目標到最後一刻的行動中。"
 ARE_Lock_Down_the_Ocean:0 "封鎖海路"
 ARE_Lock_Down_the_Ocean_desc:0 "隨著潛水艇設計的標準化，現在是時候增加巡邏次數了。我們新建造的布雷艦進一步加強了這項工作，它們對我國週邊海域實施了嚴密的封鎖。"
 ARE_Mass-Produce_Parts:0 "大量生產零件"
 ARE_Mass-Produce_Parts_desc:0 "我們絕不能讓巡邏出現漏洞。為了確保敵艦無法突破我方艦隊防線，我們必須將艦艇建造零件標準化，以提高潛艦的組裝速度。"
 ARE_Deploy_the_Prototypes:0 "部署原型"
 ARE_Deploy_the_Prototypes_desc:0 "專業化海軍生產終於有了成效。設計師們興奮地向海軍部報告說，新型潛水艇原型已經準備就緒，可以下水試航了。這令海軍部感到意外，因為他們之前既沒有訂購也沒有預料到會有原型艇。"
 ARE_Air_Development:0 "發展空軍"
 ARE_Air_Development_desc:0 "我們已經清楚地認識到，我國空軍與世界主要強國相比實力不足。我們必須立即糾正這一問題！我們已命令航空研發部門設計新型武器和機身原型，以縮小與敵人之間的實力差距。"
 ARE_Airbases:0 "空軍基地"
 ARE_Airbases_desc:0 "由於我國空軍正在研發新型飛機，我們必須先建造一些機場才能開始組裝。"
 ARE_Air_Academy:0 "建立空軍學院"
 ARE_Air_Academy_desc:0 "我們已經建立了一支強大的空軍，但這還不足以讓我們在製空戰中保持競爭力。我們將訓練飛行員運用最佳戰術和策略，賦予他們豐富的知識，使他們在戰鬥中所向披靡。他們將成為我們天空的守護者，他們將無所畏懼。"
 ARE_Transport_Supplies:0 "物資輸送"
 ARE_Transport_Supplies_desc:0 "時代在變遷。我們不能再像過去那樣僅僅依靠地面基礎設施來安全運輸物資了。在籌集到一些資金後，我們將從其他國家的私人企業購買一些運輸機，這樣我們就能在不依賴公路和鐵路的情況下為部隊提供補給。"
 ARE_aviation_Doctrine_School:0 "空軍理論學校"
 ARE_aviation_Doctrine_School_desc:0 "我們無需費力就能明白，在飛機及其使用方面，我們還有很多東西要學習。資金已經投入，書籍也已購買；我們將利用這些資源來培訓我們的飛行員。"
 ARE_aviation_Doctrine_School_2:0 "空軍理論學校 2"
 ARE_aviation_Doctrine_School_2_desc:0 "自上次會議以來，我們在空軍理論方面吸取了一些非常寶貴的經驗教訓——這些經驗教訓讓我們對如何進一步推進飛行員訓練有了更深入的了解。"
 ARE_aviation_Doctrine_School_3:0 "空軍理論學校 3"
 ARE_aviation_Doctrine_School_3_desc:0 "我國在空戰方面已經累積了豐富的經驗，飛行員的技能已經可以與主要強國的飛行員相提並論。我們為什麼要止步於此？不，我們將繼續運用已有的經驗，進一步提升飛行員的技能。如果我們的空軍停滯不前，就等於向敵人投降。"
 ARE_Fighter_Focus:0 "重視戰鬥機"
 ARE_Fighter_Focus_desc:0 "轟炸機威力強大，但速度慢且脆弱。我們的空軍需要的不是更多的轟炸機，而是能夠對抗轟炸機並摧毀敵方可能部署的任何飛機的手段。"
 ARE_Close_Air_Support:0 "近距離空中支援"
 ARE_Close_Air_Support_desc:0 "諸兵種聯合作戰方法已不再是可有可無的戰術條令。將空中優勢與有效的地面支援相結合，是保持戰鬥勢頭的最佳戰術。地面支援最好與突襲式空中打擊配合使用。為了使這些諸兵種聯合作戰成為可能，我們必須擁有隨時待命的近距離空中支援力量。"
 ARE_Bomber_Focus:0 "重視轟炸機"
 ARE_Bomber_Focus_desc:0 "我們擁有支援空軍最精銳部隊——轟炸機——所需的工業實力。這些大型殺傷性機器能夠摧毀敵人的後方防線，扭轉戰局，為前線士兵帶來勝利。"
 ARE_Nothing_But_Ash:0 "只餘灰燼"
 ARE_Nothing_But_Ash_desc:0 "我軍空軍的首要目標應當是徹底摧毀敵人的戰爭能力。我們將竭力發展出世界上最強大的轟炸機，並用它們攻擊敵人的工業設施和基礎設施，使其軍隊物資匱乏，容易受到我軍地面部隊的打擊。"
 ARE_Army_Development:0 "陸軍發展計畫"
 ARE_Army_Development_desc:0 "現在是時候重新評估我們的軍隊，為新時代的戰爭做好準備，並研究我們希望如何繼續前進。"
 ARE_Artillery_Development:0 "發展炮兵部隊"
 ARE_Artillery_Development_desc:0 "事實證明，砲兵在摧毀最強大的軍隊方面極為有效。在當今時代，擁有一支沒有砲兵的軍隊不僅不明智，而且極其愚蠢。我們將研究來自前線部隊的報告，以研發更好的砲兵裝備。"
 ARE_Motorized_Development:0 "機動化發展"
 ARE_Motorized_Development_desc:0 "過去幾個世紀一直是戰爭和技術領域創新與實驗的堡壘。在眾多經驗中，我們發現了機動裝備在軍隊中的效用。我們將匯聚科學家的力量，加深我們對這些看似簡單卻至關重要的機器的理解。"
 ARE_Firearms_Development:0 "槍械研發"
 ARE_Firearms_Development_desc:0 "對一支軍隊來說，還有什麼比不起眼的槍更重要的呢？就連這些先進的新型「knightmares」戰機也配備了自己的武器。值得慶幸的是，我們可以藉鏡其他國家私部門的知識，來研發更先進的槍械。"
 ARE_Armor_Development:0 "裝甲裝備研發"
 ARE_Armor_Development_desc:0 "坦克是唯一能有效對抗布里塔尼亞機甲的武器，即便如此，它們也難以取勝。我們必須盡快研發出更強大的坦克車來對抗機甲。"
 ARE_New_RND_Department:0 "一個新的研發部門"
 ARE_New_RND_Department_desc:0 "我們已清楚地認識到，為了與敵人抗衡，我們需要更多科學家。我們已籌集到資金並招募到所需人才，以建立一個全新的研究部門來支持我們現有的研究部門。"
 ARE_army_Doctrine_School:0 "陸軍條令學校"
 ARE_army_Doctrine_School_desc:0 "打造一支成功的軍隊需要考慮許多重要因素，其中最關鍵的因素之一就是指揮結構。我們需要高效的軍官和士兵才能打贏戰爭；否則，我們的軍隊將極其低效且行動遲緩。我們將確保只有最熟練、最有經驗、最合格的人員才能獲得晉升。"
 ARE_army_Doctrine_School_2:0 "陸軍條令學校 2"
 ARE_army_Doctrine_School_2_desc:0 "儘管裝甲目前仍然普遍存在，但未來顯然將由「knightmares」主導。步兵在即將到來的時代將難以生存。如果我們希望他們能夠在與敵人的首次交鋒中倖存下來，就必須確保他們獲得便攜式反坦克導彈（MANPATS）的補給，以維持他們的生存能力，並使其能夠對抗任何「knightmares」或裝甲敵人。"
 ARE_army_Doctrine_School_3:0 "陸軍條令學校 3"
 ARE_army_Doctrine_School_3_desc:0 "隨著每年都有新的Knightmare原型機亮相，我們必須討論兩種變體：近戰型和堡壘型。近戰型Knightmare犧牲了防禦力以換取更高的護甲穿透力，能夠對大多數Knightmare變體構成攻擊先鋒。堡壘型Knightmare幾乎沒有任何進攻能力，但卻是強大的防禦力量，需要先進的機甲或反Knightmare火砲才能將其擊敗。"
 ARE_army_Doctrine_School_4:0 "陸軍條令學校 4"
 ARE_army_Doctrine_School_4_desc:0 "我們必須討論的最後一個Knightmare Frame變種是先進型，或者說是所謂的「全能型」。這種科技奇蹟（或恐怖）是我們務必不惜一切代價避免的目標。只有反Knightmare火砲才能將其擊敗。如果我們的士兵遭遇這種機體，他們必須知道要么堅守陣地等待援軍，要么撤退到主戰線。切勿交戰。"
 ARE_army_Doctrine_School_5:0 "陸軍條令學校 5"
 ARE_army_Doctrine_School_5_desc:0 "反Knightmare砲兵已成為對抗Knightmare的重要武器。無論我們選擇哪種策略，都必須研究如何與它們協同作戰或對抗。我們可以運用智慧戰術來對抗砲兵，例如讓步兵攻擊這些笨重的機器；或者，如果我們使用此類武器，則應將其部署在敵人難以攻克的戰略要地。"
 ARE_Knightmare_Warfare:0 "Knightmare 戰爭"
 ARE_Knightmare_Warfare_desc:0 "戰爭新時代已經來臨；我們絕不能落後。knightmares是未來的發展方向，我們將充分利用它們，研發出屬於我們自己的knightmares，以便在必要時與各強國競爭。"
 ARE_The_Facts:0 "歪曲事實"
 ARE_The_Facts_desc:0 "微型球體感測器和陸上迴旋輪 是knightmares的關鍵組件。我們需要立即開發這些技術。不惜一切代價！"
 ARE_Knightmared_Police:0 "Knightmare 警察"
 ARE_Knightmared_Police_desc:0 "警力在維護世界法律和秩序方面發揮著至關重要的作用，但在當今時代，恐怖主義和叛亂是他們的主要對手。我們將努力打造一款「Knightmare」，供我們的警員用來保衛街道免受這些威脅，並在緊急情況下用於對抗叛亂分子。"
 ARE_Buy_Used_Stock:0 "買二手貨"
 ARE_Buy_Used_Stock_desc:0 "誰說我們非得自己做所有的knightmares？二手貨和黑市庫存充足，足夠我們組成一個師。我們得趕緊集結兵力，訓練他們駕駛這些knightmares保衛家園。"
 ARE_Our_Own_Roundtable:0 "我們自己的圓桌騎士團"
 ARE_Our_Own_Roundtable_desc:0 "不列顛尼亞擁有一支由最優秀、最傑出的Knightmare機甲駕駛員組成的精英部隊，名為「圓桌騎士」。雖然我們目前在Knightmare機甲方面經驗不足，但我們擁有足夠多具備組建我們自己的精英部隊所需天賦的人才。"
 ARE_Conventional_Warfare:0 "常規作戰"
 ARE_Conventional_Warfare_desc:0 "如果它沒壞，就別修。我們現有的軍隊已經在歷史上證明了自身的價值，為什麼還要把精力放在「knightmares」戰機上呢？"
 ARE_The_Real_Engines_of_war:0 "真正的戰爭機器"
 ARE_The_Real_Engines_of_war_desc:0 "knightmares或許體型龐大、令人膽寒，但正如俗語所說：越大越容易倒下。我們將與坦克設計師和實際操作坦克的士兵攜手合作，研發出性能更優的坦克，以應對Knightmare的強大火力。"
 ARE_The_Stuff_That_Matters:0 "事關重大"
 ARE_The_Stuff_That_Matters_desc:0 "步兵是任何軍隊最重要的組成部分，忽視他們是愚蠢的。我們將訓練部隊，教導他們如何更有效地作戰。透過這些訓練，我們也將提升整個軍隊的組織性。"
 ARE_Protecting_The_Men_On_The_Front:0 "保護前線士兵"
 ARE_Protecting_The_Men_On_The_Front_desc:0 "人力是寶貴的資源，而那些願意為國而戰的經驗豐富的戰士更是如此。我們必須增加戰地醫護人員的數量，並提高他們的裝備質量，以降低我們損失寶貴士兵的風險。"
 ARE_The_Drums_Of_War:0 "戰鼓轟鳴"
 ARE_The_Drums_Of_War_desc:0 "我們的軍隊已經成為世界上最精銳的部隊之一！就連各大強國在進攻我們之前都會三思！要達到今天的成就絕非易事；然而，我們不會止步於此。我們將繼續提昇軍隊的實力！否則，我們的敵人必將迎頭趕上，甚至在最糟糕的情況下，超越並壓制我們。"
 area.1.t:0 "新的征途"
 area.1.d:0 "經過數年激烈的內部紛爭，地方行政部門的局勢已然緊張，效率也嚴重受損。在不列顛尼亞政權內部，儘管表面上團結一致，但實際上主要有三大派系在爭奪權力：帝國總督、貴族顧問和純血統貴族。 \n\n為了維持區域穩定，結束權力鬥爭，我們必須在事態失控之前決定支持哪一方。我們有很多選擇，但有些選擇風險更大。"
 area.1.a:0 "與貴族們聯手。"
 area.1.b:0 "支持現狀。"
 area.1.c:0 "依靠純血派民兵！"
 area.2.t:0 "純血派已經奪權！"
 area.2.a:0 "下一步棋？"
 area.2.d:0 "由於我們採取了先例，純血民兵大大加強了他在不列顛尼亞駐軍和行政機構中的影響力。由於擔心祖國的反應以及不列顛尼亞總督的嚴厲幹預，軍隊中的激進官員在不列顛尼亞定居點組織了一次遊行。 \n\n在當地警察和部分居民的支持下，士兵們佔領了包括總督府在內的戰略要地，這一史無前例的局面發生了改變。儘管如此，許多「Numbers」和效忠派勢力目前仍在反對新政權，並佔領了一些有限的領土。一場新的鬥爭已經開始…"
 generic_expansionism:0 "擴張主義政策"
 equal_conscription:0 "重視徵兵"
 generic_welfare_idea:0 "福利支出"
 industry_1:0 "發展工業"
 industry_1_desc:0 "我們將啟動加強我國工業能力的計畫。"
 industry_civ_1:0 "民事部門"
 industry_civ_1_desc:0 "這個國家的弱點之一是其民用工業。為了部分修正這個問題，我們將在這個領域推行一系列改革。"
 industry_civ_2:0 "進一步的民用設施改進"
 industry_civ_2_desc:0 "全國各地將開設新公司。這樣一來，失業率將降至最低水準。"
 industry_civ_3:0 "向公司提供貸款"
 industry_civ_3_desc:0 "透過向工業企業提供 AREerous 貸款，我們將確保它們在工業化過程中獲得支援。"
 industry_mil_1:0 "軍事區"
 industry_mil_1_desc:0 "在這個地區建立高效率的軍事綜合網絡非常重要；這樣，我們就能為軍隊創造安全的物資供應。"
 industry_mil_2:0 "進一步的軍事改革"
 industry_mil_2_desc:0 "在這種情況下，我們將重點放在最不發達的地區，並確保軍事設施的均衡發展。"
 industry_mil_3:0 "建設軍事基礎設施"
 industry_mil_3_desc:0 "最後，我們將把該地區的所有工業園區連接起來，創造一個集中且有效率的網路。"
 industry_progress:0 "金融改革"
 industry_progress_desc:0 "既然我們已經完成了輕重工業的發展，我們就可以專注於行政和財政的問題了。"
 mining_1:0 "尋找新資源"
 mining_1_desc:0 "最終，該國特定地區將開採新的稀有礦物，例如櫻石，並將其用於 Knightmare 技術。"
 infrastructure_1:0 "擴建鐵路系統"
 infrastructure_1_desc:0 "鐵路系統是貨物和人員運輸最重要的基礎設施之一。鑑於其重要性，必須盡快對其進行改進。"
 extra_slot:0 "啟動新研發中心"
 extra_slot_desc:0 "隨著新研究中心的建立，我們將能夠在工業和軍事等各個領域提高我們的技術水平。"
 AREeric_national_identity:0 "鞏固國家"
 AREeric_national_identity_desc:0 "歷經諸多磨難，我們終於在國內實現了持久的政治和社會和平。"
 AREeric_political_effort:0 "加強政府"
 AREeric_political_effort_desc:0 "鑑於其他國家近期造成的不穩定局勢，穩定當前的政治局勢至關重要。"
 militarism_1:0 "支持威權主義"
 militarism_1_desc:0 "在這個動盪的時代，如果我們想要鞏固我們的權力，就必須對缺乏安全感的民眾行使政府權力。"
 militarism_2:0 "擴編陸軍"
 militarism_2_desc:0 "為了更好地為國家應對未來的衝突做好準備，我們可以運用新的理論和技術來訓練軍隊。此外，我們還將從預備役部隊中招募新兵。"
 militarism_3:0 "動員經濟"
 militarism_3_desc:0 "下一步是調動整個經濟，並長期維持軍隊的運作。"
 militarism_4:0 "激進外交政策"
 militarism_4_desc:0 "我們的軍隊和經濟已經做好了全面戰爭的準備。現在，我們只需要等待未來擴張國界的時機。"
 democracy_1:0 "支持民主黨派"
 democracy_1_desc:0 "在這個動盪的時代，如果我們想要鞏固我們的權力，就必須賦予人民更多的政治責任。"
 democracy_2:0 "政治競選"
 democracy_2_desc:0 "為了提高我們黨的受歡迎程度，我們可以利用現代大眾媒體，透過高效的政治競選活動來發揮我們的優勢。"
 democracy_3:0 "自由兵工廠"
 democracy_3_desc:0 "為了捍衛我們民主平等的社會，消除來自周邊國家的各種潛在威脅至關重要。因此，我們必須在民眾中實行有限的徵兵制。"
 democracy_4:0 "福利國家"
 democracy_4_desc:0 "最後，我們必須透過建立適當的福利國家來避免進一步的社會主義或共產主義動亂，以保護工人階級免受任何剝削。"
 tech_army_1:0 "陸軍發展計畫"
 tech_army_1_desc:0 "為了與其他國家進行常規戰爭，我們必須保持一支高效率且強大的陸軍。"
 tech_equip_1:0 "裝備現代化"
 tech_equip_1_desc:0 "近幾十年來，槍械工業在現代化、高殺傷力霰彈槍方面取得了多項成就。我們應該盡快將它們引入軍隊。"
 tech_equip_2:0 "高階支援技術"
 tech_equip_2_desc:0 "考慮到現代軍隊的規模，忽視現代化後勤裝備對每位士兵的重要性是愚蠢的。"
 tech_equip_3:0 "遠程火砲"
 tech_equip_3_desc:0 "我們將繼續努力，確保我們的步兵和支援部隊配備當今最先進的裝備。"
 tech_doc_1:0 "新的學說"
 tech_doc_1_desc:0 "近期的衝突表明，舊的陸地戰略在現代戰爭中已不再適用。有鑑於此，我們必須對規劃策略進行深刻改革。"
 tech_doc_2:0 "鞏固該理論"
 tech_doc_2_desc:0 "儘管我們盡了最大努力，但我們的軍官隊伍中仍然存在一些對改革的反對意見，特別是來自高級軍官的反對。我們需要盡快強化這些新原則。"
 tech_mot_1:0 "機動化生產"
 tech_mot_1_desc:0 "機動性和防護性對於步兵安全進出戰場至關重要。關注這些方面的發展將使我們能夠迅速採取行動。"
 tech_mec_1:0 "機械化生產"
 tech_mec_1_desc:0 "重新思考機動化步兵的可能性，我們將能夠在當今的載具構造上有所突破。"
 tech_arm_1:0 "裝甲生產"
 tech_arm_1_desc:0 "現代主戰坦克已證明在現代戰爭中非常有效，即使在極其惡劣的條件下也是如此。我們應該最大限度地發揮它們的潛力。"
 tech_knight_1:0 "第一代 knightmares"
 tech_knight_1_desc:0 "一種名為「Knightmare」的新型恐怖武器。它將徹底改變戰爭的概念。"
 tech_knight_2:0 "第二代 knightmares"
 tech_knight_2_desc:0 "憑藉機動性和裝甲方面的多項改進，新型knightmares將成為軍隊的先鋒。"
 tech_knight_3:0 "第三代 knightmares"
 tech_knight_3_desc:0 "隨著Knightmare全新的世代，這些武器將開始大規模生產，每個士兵都將接受使用這些武器的基本訓練。"
 tech_air_1:0 "空軍研發"
 tech_air_1_desc:0 "空軍技術是所有軍事技術中發展最快的。航空學是任何一個現代化國家都需要掌握的。"
 tech_fight:0 "戰鬥機生產"
 tech_fight_desc:0 "在戰鬥機研發方面保持領先地位，將使我們在未來佔據優勢。"
 tech_cas:0 "支援機生產"
 tech_cas_desc:0 "現代軍隊不僅需要地面車輛的支援，也需要空中車輛的支援。"
 tech_air_2:0 "新的空軍理論"
 tech_air_2_desc:0 "隨著攻擊直升機和先進噴射機等新型飛機的生產，對我們舊的傳統進行現代化改造就顯得尤為重要。"
 tech_air_3:0 "強化該原則"
 tech_air_3_desc:0 "儘管我們盡了最大努力，但我們的軍官隊伍中仍然存在一些對改革的反對意見，特別是來自高級軍官的反對。我們需要盡快強化這些新原則。"
 tech_bomber:0 "生產轟炸機"
 tech_bomber_desc:0 "當未來的人們談到今日戰爭的恐怖時，從天而降的烈焰必將成為其中濃墨重彩的一筆。我們將竭盡所能，確保這些故事由我們的敵人講述。"
 tech_nav_air:0 "生產海軍轟炸機"
 tech_nav_air_desc:0 "隨著我方艦隊新型航空母艦的建造，我們必須生產更多海軍轟炸機，以削弱敵軍在海洋上的力量。"
 tech_navy_1:0 "海軍發展"
 tech_navy_1_desc:0 "擴充海軍規模應是我們的首要任務。將所有可用資源投入新建船塢和先進艦艇的研發中。"
 tech_flexible_navy:0 "機動艦隊"
 tech_flexible_navy_desc:0 "重新定義海戰模式，以適應潛艦技術的進步，將使我們能夠有效地打擊敵方運輸船隊。"
 tech_submarine_effort:0 "潛艦製造"
 tech_submarine_effort_desc:0 "近幾十年來，隨著櫻石推進引擎的研發，潛艦戰的潛力得到了極大的提升。我們不僅應該防範潛艇，還應該利用潛艇攻擊敵方船隻。"
 tech_destroyer_effort:0 "驅逐艦建造"
 tech_destroyer_effort_desc:0 "研究潛艇的設計和戰術時，我們也學會了如何應對這些戰術。驅逐艦將成為其中關鍵。"
 tech_large_navy:0 "大型艦隊"
 tech_large_navy_desc:0 "調整我們的海軍理論以適應大型艦艇並確保貿易船隊的安全，將使我們更清楚地了解我們需要什麼樣的船艦。"
 tech_cruiser_effort:0 "巡洋艦生產"
 tech_cruiser_effort_desc:0 "在研發出更先進的戰列艦之前，先以稍微輕型的巡洋艦來替代。"
 tech_capital_ships_effort:0 "主力艦生產"
 tech_capital_ships_effort_desc:0 "擁有最多戰艦的國家將稱霸海洋。戰艦和航空母艦分別代表了海軍優勢的過去和現在。"
 build_docyards_1:0 "擴建船塢設施"
 build_docyards_1_desc:0 "為了維持海軍生產，我們必須開始對許多舊船塢進行改造和擴建。"
 build_docyards_2:0 "新型海軍工業綜合體"
 build_docyards_2_desc:0 "最後，我們可以設立特殊的海岸區域，在那裡建造高效率的工業園區。這將有利於提高當地的生產力，也有利於國家船隊的發展。"