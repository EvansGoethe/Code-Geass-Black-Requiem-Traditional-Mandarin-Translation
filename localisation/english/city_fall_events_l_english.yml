﻿l_english:
 city_falls_russia.1.t:0 "莫斯科陷落"
 city_falls_russia.1.d:0 "今日，[new_controller.GetNameDEF]宣告戰勝[old_controller.GetNameDEF]，鄂霍次克這座巨型城市已落入[new_controller.GetAdjective]軍隊之手。在[new_controller.GetAdjective]軍隊攻入鄂霍次克政府特區之前，該城經受了無情的圍攻，城內許多關鍵目標為削弱城市防禦而遭到摧毀。\n\n在[new_controller.GetAdjective]軍隊控制鄂霍次克巨型港口並俘獲數千名政治犯之後，這些囚犯被押解遊街穿過市中心，[old_controller.GetNameDEF]的旗幟在被征服的民眾眾目睽睽之下被焚為灰燼——有人為解放而歡欣鼓舞，也有人惶恐於新統治者將如何處置他們。隨著[new_controller.GetNameDEF]對遠東西伯利亞的統治完全確立，[old_controller.GetAdjective]政府的殘餘勢力已逃往神聖不列顛尼亞帝國，以躲避他們的敵人。"
 city_falls_russia.1.a:0 "這不是終點！"
 city_falls_russia.1.b:0 "[old_controller.GetNameDEF]的首都是我們的了！"
 city_falls_russia.1.c:0 "有意思。"
 city_falls_russia.2.t:0 "聖彼得堡陷落"
