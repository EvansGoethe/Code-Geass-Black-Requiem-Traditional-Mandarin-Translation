 city_falls_russia.3.t:0 "伏爾加格勒陷落"
 city_falls_russia.3.d:0 "今日，[new_controller.GetNameDEF]宣告戰勝[old_controller.GetNameDEF]，鄂霍次克這座巨型城市已落入[new_controller.GetAdjective]軍隊之手。在[new_controller.GetAdjective]軍隊攻入鄂霍次克政府特區之前，該城經受了無情的圍攻，城內許多關鍵目標為削弱城市防禦而遭到摧毀。\n\n在[new_controller.GetAdjective]軍隊控制鄂霍次克巨型港口並俘獲數千名政治犯之後，這些囚犯被押解遊街穿過市中心，[old_controller.GetNameDEF]的旗幟在被征服的民眾眾目睽睽之下被焚為灰燼——有人為解放而歡欣鼓舞，也有人惶恐於新統治者將如何處置他們。隨著[new_controller.GetNameDEF]對遠東西伯利亞的統治完全確立，[old_controller.GetAdjective]政府的殘餘勢力已逃往神聖不列顛尼亞帝國，以躲避他們的敵人。"
 city_falls_russia.3.a:0 "這不是終點！"
 city_falls_russia.3.b:0 "[old_controller.GetNameDEF]通往高加索之路是我們的了！"
 city_falls_russia.3.c:0 "有意思。"
 city_falls_russia.4.t:0 "葉卡捷琳堡陷落"
 city_falls_russia.4.d:0 "今日，俄羅斯往昔的最後堡壘陷入重圍。[new_controller.GetAdjective]部隊突破了防禦圈，[old_controller.GetAdjective]守軍迅速土崩瓦解，城中殘餘守備部隊奉命向兵力更為龐大的[new_controller.GetAdjective]軍隊投降。人們看到[new_controller.GetAdjective]軍隊向皇宮與毗鄰的政府區進發，以確保對這座城市及其人民的完全控制。在[new_controller.GetAdjective]部隊佔領城市時，有平民出面反抗，但在[new_controller.GetAdjective]武裝部隊的壓倒性力量面前，這些異議轉瞬即逝。"
 city_falls_russia.4.b:0 "西伯利亞的心臟任由我們掌控！"
 city_falls_russia.4.c:0 "有意思。"
 city_falls_russia.5.t:0 "新西伯利亞陷落"
 city_falls_russia.5.d:0 "今日，戰火終於燒到了革命的腹地——新西伯利亞。[new_controller.GetAdjective]部隊已突破城市防線，[new_controller.GetAdjective]士兵湧入街頭，將敵方守軍逼向內城的中央政府大樓。[new_controller.GetAdjective]噴射機的空襲已使[old_controller.GetAdjective]部隊的所有撤退路線無法通行。如今被困在地獄之火與步步進逼的蠻族大軍之間，[old_controller.GetNameDEF]勇敢的英雄們的處境每時每刻都在惡化。他們的敗亡似乎已迫在眉睫。"
 city_falls_russia.5.b:0 "西伯利亞的心臟任由我們掌控！"
 city_falls_russia.5.c:0 "有意思。"
 city_falls_russia.6.t:0 "鄂霍次克陷落"
 city_falls_russia.6.d:0 "今日，[new_controller.GetNameDEF]宣告戰勝[old_controller.GetNameDEF]，鄂霍次克這座巨型城市已落入[new_controller.GetAdjective]軍隊之手。在[new_controller.GetAdjective]軍隊攻入鄂霍次克政府特區之前，該城經受了無情的圍攻，城內許多關鍵目標為削弱城市防禦而遭到摧毀。\n\n在[new_controller.GetAdjective]軍隊控制鄂霍次克巨型港口並俘獲數千名政治犯之後，這些囚犯被押解遊街穿過市中心，[old_controller.GetNameDEF]的旗幟在被征服的民眾眾目睽睽之下被焚為灰燼——有人為解放而歡欣鼓舞，也有人惶恐於新統治者將如何處置他們。隨著[new_controller.GetNameDEF]對遠東西伯利亞的統治完全確立，[old_controller.GetAdjective]政府的殘餘勢力已逃往神聖不列顛尼亞帝國，以躲避他們的敵人。"
 city_falls_russia.6.a:0 "我們失敗了！"
 city_falls_russia.6.b:0 "[new_controller.GetNameDEF]萬歲！"
 city_falls_russia.6.c:0 "有意思。"
