 SRU_Sonya_Phase_One.1.t:0 "March of the Revolution"
 SRU_Sonya_Phase_One.1.d:0 "There was, but a single pang of nervousness that lay within her heart. As she approached the podium, a single thought that this was the moment. This was what it's all been for. She got there and grasped the microphone tightly in her hand and began. \"People of Siberia! Of the Revolution!\" Sonya made a call, not just to those who were anxiously watching her out in the audience of hundreds. But to the entirety of their nation, to all those who were watching from the cameras pointed right at her. \"You all know that there was once a dream for Russia! A dream for a society where every man and woman was equal. A society built for the people, by the people.\" She felt like she already knew what she had to say, they weren't just her words. They were her fathers words, and she heard them not just in her head but her heart.\n\n\"This dream was fought for.. This dream was killed for, and died for. But the flames of the first Revolution died out, we were forced into exile with its embers. But...\" Every single detail from him she could remember, every story she told her. Of the peace and beauty of a communist nation, she tried to channel it into her words today. In case they were the last words she ever said. Looking out, she saw the entire audience hanging on her word. \"This was the dream my father had, this is the dream I have, this is the Siberian dream! This is the dream of the people!\" Her voice sounded calm, even as it was raised. It sounded beautiful, even as it was shouted. She raised her right fist up into the air, an action that garnered the cheers of the entire crowd.\n\n\"Our brothers and sisters in the East share our blood, but not our dream. They march into the soil of the Revolution for their own dream.\" Throwing her right hand far out to the side, her voice had grown a taste of disgust. The power of that tone echoed through the entire crowd. They felt like they could feel just what she was feeling from hearing alone. \"I do not wish to see more Russian blood spilt. Yet they have chosen to fight the will of the people! So we must stand up, and fight for our dream again.\" Upon her words to stand she heard the stomps of many of the people that shared the stage with her, but were off to the side previously in seats. She threw her fist right back into the air and punched it, a salute that was repeated by the entire crowd, looking back for a second she saw Kulakov who nodded at her before he repeated the salute. She turned back before finishing her speech."
 SRU_Sonya_Phase_One.1.a:0 "\"Onwards, march for the Revolution!\""
 SRU_Sonya_Phase_One.2.t:0 "Politburo War Powers"
 SRU_Sonya_Phase_One.2.d:0 "Zavrazhin slammed his mug down onto the wavy chipped oak table hard. The clear liquid bubbled out of it, he looked across to his drinking buddy standing on the other side of the round table who was sipping from his drink. \"Bah, these war powers are no good. It's tantamount to a dictatorship.\" Zavrazhin admitted with disgust, his voice groggy from the alcohol, with a tone messed up from his crooked and broken teeth. \"You don't understand, nations succeed by strong leadership. Look at the E.U, do we want our nation to be as weak as them?\" Krutikov put his drink down more carefully on the coaster as he answered, trying to win against Zavrazhins crass way of arguing. The speaking in the bar was deafening, only leading to the two men. Fresh out of work the two need to speak quite loud to hear each other. Zavrazhin shakes his head aggressively, the woolen beanie on his head slipping around with no friction, from a lack of hair. \"Is a nation run by the people. Not the essence of socialism?!\" He yells quite aggressively, grappling with his drink once more taking a big gulp. The liquid felt like it burnt him, but that's exactly what he needed to fight the cold. \"I'm not suggesting a monarchy like the bloody Britannians- though if I was, Sonya would make for a perfect Queen. A queen of the people, the Red Queen.\" Zavrazhin was almost aghast, his mouth agape drink spilling down his chin a bit as he looked at Krutikov, who stared right at him. Zavrazhin admitted quite frankly."
 SRU_Sonya_Phase_One.2.a:0 "\"You've gone mad.\""
 SRU_Sonya_Phase_One.14.t:0 "Putting Theory Into Practice"
 SRU_Sonya_Phase_One.14.d:0 "Before Sonya lay a great sprawl of concrete and light. Growingly seemingly organically, yet perfectly fitting to some organized outline. The collective endeavour of proletarian progress, sweeping across a canvas of constructivist urbanism. It was just a painting, Tatlin's \"City Of Socialism\", an architectural concept for a socialist city. A blueprint, but one conveyed with such vivid motion Sonya felt transported to its world. Her father had some of Tatlin's pieces, but most were lost during the war. She was quite surprised to find that the regional drafting office in Novosibirsk (that now housed GOSPLAN), had kept and displayed the original portrait despite anti-communist print restrictions. Sonya's immersion into Tatlin's world was broken by the sound of a door slamming, a lighter being lit and the familiar scent of Yunnanese tobacco. Prime Minister Kulakov looked more irritable than she had ever seen him before as he took a forceful drag on his cigarette. Waiting for enough nicotine to flood his system to restore his trademark composure, Sonya turned around and asked \"I take it Saburov and Alekseeva are yet to form a consensus on recommending an economic plan?\" Kulakov replied through his cigarette \"No, Saburov won't consider trade with Asia and Alekseeva is flat out against his industrialization targets.\" The meeting Sonya and Kulakov had excused themselves from was an economic committee turned into a warzone. On one side was Saburov and the Construction Ministry arguing for rapid industrialization and a focus on autarky, on the other was Alekseeva and the Trade Ministry wanting to form partnerships with Asia trading our mineral surplus for weapons and technology. \"You look disappointed with them,\" Sonya said, reflecting on Kulakov's relatively bitter mood. \"Of course I am\", he replied \"They are working backwards, they have become overly attached to their plans and theories, seeking to bend facts and data to make their plans work, rather than planning based on the facts.\" The two stood in silence, thinking for two minutes until Sonya finally spoke, \"We can't force a compromise, I would if we could but these are the only two plans that get us the needed war material quick enough. Therefore, we must make a unanimous decision on economic policy.\" Kulakov nodded, \"Agreed, should we call for a recess and examine the plans again, each has merits and drawbacks.\" \"No,\" Sonya replied, \"If we wait any longer Saburov's blood pressure might give out...\" 15 minutes later, Chairwoman Bunina and Prime Minister Kulakov reentered the committee room to announce their decision on economic policy going forward..."
 SRU_Sonya_Phase_One.14.a:0 "Saburov's industrialisation plan shall be adopted."
 SRU_Sonya_Phase_One.14.b:0 "Alekseeva's trade recommendations shall be adopted."
 SRU_Sonya_Phase_One.15.t:0 "Two-Year Plan"
 SRU_Sonya_Phase_One.15.d:0 "Saburov suddenly took a step up out of his chair, he was sitting at the very head of a large table. Filled in all seats with his very team, he smirked. He always had to take a moment to admire his success, as this night, this very dinner celebrated another success of them. Of him. \"Everyone, a toast!\" He announced loudly and proudly, snatching from below him his wine glass swirling the crimson coloured liquid as he looked out at all of their faces watching him. \"We have the favour of our nation's great leadership.\" Leaving open a moment in his small speech for a few cheers at that comment, he was satisfied with the amount he got. He then continued rolling his hand through his hair, then down to fix any creases in his suit. \"Of course, one step for the revolution. But not the last.\"\n\nWearing a smug smirk as he spoke, he saw the others finally start to pick up their glasses, swallow their meals and get ready for the rest of the speech. \"We have a long road ahead of us, we must further centralise our investments. And, as well fully take control of the industry.\" He knew the road for the revolution was long, but the road of success for him seemed very short. Taking a moment, he took a deep breath, then fully raised his glass his team knew better, and waited for him to finish. \"Only we here can do this, only us.\" They all now followed his lead as they usually did, and raised their glasses with him."
 SRU_Sonya_Phase_One.15.a:0 "\"Long live the Revolution!\""
 SRU_Sonya_Socialist_Flavour.1.t:0 "Expand the Tomsk University"
 SRU_Sonya_Socialist_Flavour.1.d:0 "Sonya leaned forward, having the palms of her hands sink deeply into the tops of her knees. Looking around, she saw the progression of the ceremony for the expansion of the Tomsk University. However it was the various people paying attention to those that were speaking on the stage that drew her eye, it was how Kulakov looked around at this place. It was just outside of the university by its very front doors. That's where the stage was positioned, Sonya noticed a glint in the eyes of Kulakov she hadn't seen before. \"You look at this place with eyes of commemoration Kulakov, it's rare for you.\" She admitted, almost to herself at first but let it out for Kulakov to hear. He barely registered it, responding almost instantly to her comment with a soft voice.\n\n\"I owe this place my future, and my life.\" There was a sense of memory, locked in those words. Sonya was interested in hearing it unlocked. \"We'll be here another hour yet, care to continue?\" Sonya was indeed right, though their part in the expansion was over. The ceremony still continued at a snail's pace. Kulakov shifted on the side bench they were both crouched in. He seemed to grow somber, but he decided to respond to Sonya's curiosity. \"Not much left to continue. It was a long time ago.. This place introduced me to a path that others frown upon. And when we were sentenced to ruin, the chairman intervened.\" Nodding along, Sonya was able to continue the train of thought that Kulakov let slip.\n\n\"And that is how we all ended up in Kazakhstan.\" There were many different ways that the communist remnants ended up in neighbouring Kazakhstan, this was the first time she was hearing about Kulakovs. He softly chuckled, it was a weird sort of chuckle. Sounding less like laughter and more like a bodily function. \"Catching on quickly, as per usual.\" Sonya appreciated the compliment, even if she felt like she didn't deserve it. While she caught on quickly sometimes, she struggled in others. Kulakov then moved to procure a cigarette from his breast pocket, leading Sonya to live up to the compliment."
 SRU_Sonya_Socialist_Flavour.1.a:0 "\"Shouldn't smoke at a university, Kulakov.\""
 SRU_Sonya_Socialist_Flavour.2.t:0 "Open Public Hospitals"
 SRU_Sonya_Socialist_Flavour.2.d:0 "Sonya had just shut the door of the sleek black slightly elongated car she had pounced out from, when she was almost instantly approached by someone. He was bald, and a short man. Shorter than even Sonya, she recognised him of course. The soon to be Director of one of the new hospitals she had just arrived at. She wasn't informed which hospital this even was, normally that was told to her by Kulakov. This time however, he wasn't with her. She would have to do this one, of the dozens of hospitals they've visited, alone. \"Lady Bunina, it is good to see you- but, I don't see Kulakov with you is he?\"\n\nThe man asked Sonya, his voice sounded almost like a skeleton. It was filled with excitement at first, but then died down, replaced with curiosity as he saw her and just her. He however extended his hand nonetheless for a handshake. \"Just Sonya please.\" She took his offered hand, he had bony hands and fingers it felt like it dug right into her. When they separated she answered him.\n\n\"And yes, Kulakov isn't with me. He urgently had to return to Novosibirsk, there were matters he had to attend to.\" Sonya was only the bringer of more disappointing news to this man, and that worried her. He looked down solemnly, she could've figured that he was a massive supporter of Kulakov from the way she acted. She would've only liked this one time, to find a bigger supporter of her. \"Ah, well... It is a shame.\" The skeleton director said, putting his hands in his lab coats pockets, before quickly seeing how his tone could be read. \"Not that it's bad to just be you!- Lady- Sorry, Sonya.\" He was a bit of a bumbling mess now, with his jaw chattering up and down trying to find what else to say to apologise. He looked as if he was about to explode, Sonya hid her amusement and urged him on."
 SRU_Sonya_Socialist_Flavour.2.a:0 "\"Let us get on with it.\""
 SRU_Sonya_Phase_One.16.t:0 "National Trade Plan"
 SRU_Sonya_Phase_One.16.d:0 "\"Listen in everyone, I only wish to go over this once. Please, do not make me repeat myself.\" Alekseeva snapped up, she was standing over her work station. Overlooking some documents, they neat and tidy reports that allowed her to speak with so much confidence. She turned around, to look around the workshop she found herself in. It was jointly an office, storage, workshop and had all of her team roaming about. It allowed her to ultimately be efficient with her strategies. \"While we have the eyes of the government we must perform well to keep them.\"\n\nJust as she said in her voice that reeked of analytics, and of belonging to an inquisitive mind her team all looked up. The maybe dozen or so faces that she so intimately knew, and they knew to listen when she spoke. Even if some were excited and happy that they ultimately got the favour of the government. \"As I have stated previously, our aim is to work alongside Kazakhstan so that we can open up trade routes to the Chinese Federation. This will not only improve our relations with outside powers, but also allow us to catch up to the rest of the nations.\" It was a solid plan, most of those in the room right now either were the Russian exiles hiding in Kazakhstan, or from Kazakhstan themselves. She gave a pause, to allow them to smile and be properly excited for a change, before finishing her small important speech."
 SRU_Sonya_Phase_One.16.a:0 "\"Onto the first steps.\""
 SRU_Sonya_Phase_One.17.t:0 "A Long Road"
 SRU_Sonya_Phase_One.17.d:0 "Sonya stares out the window, watching as the buildings within Tomsk pass by. She knew this wasn't going to be the last time she was in the place, but she had a small wish that it was. The office she had been practically living within in Novosibirsk wasn't the best. But it had its comforts. Sonya smiled as she saw the Tomsk University go by, with work fully underway on its expansion, then followed by one of the public hospitals that she and Kulakov had appeared at. She finally turned to Kulakov, who had his window down smoking out of it. \"You see Kulakov, we've had tremendous success thus far. If we wish our economy to get back on track fully, we must intensify it for greater results.\"\n\nKulakov took a few more puffs, blowing them out the window, before turning forward, taking the last slivers of the cigarette and putting them out in the car integrated ashtray. \"I would think you would learn another thing or two by now.. Sonya, the road to the end of our revolution cannot be rushed. If we speed up our progress, we may seem to topple the entire economy. To-\" His voice was filled with calculated worry, filled with what ifs and what could happen. Sonya did learn another thing, she learned even more that Kulakov did not want to rush. He seemed to be the most patient man alive to her, but she simply shook her head and finished what he was going to say.\n\n\"To the end of the revolution, I did learn Kulakov. Please, do not treat me like a child anymore.\" Kulakov went silent, there was an awkward pause, as the car finally left the bounds of Tomsk. \"I see that at this moment, neither of us can move the roadblock.\" Kulakov announced to her, in a rather cryptic manner. She let out a sigh as she rolled her window down, to hopefully fully get rid of the ashy smell."
 SRU_Sonya_Phase_One.17.a:0 "\"On that, we can agree.\""
 SRU_Sonya_Phase_One.3.t:0 "Establish the Peoples Congress"
 SRU_Sonya_Phase_One.3.d:0 "\"Kulakov, I'm sorry you must start over. This- plan... Look, the People's Congress was your idea. But, you wish to limit it? I understand your worry about the other parties and yet-\" Kulakov stood in front of Sonya, his hand on her desk as it pointed forward to a document that concerned the very topic of discussion. The People's Congress, Sonya was for lack of a better word, confused. Simply trying to fully understand the reasoning, but she was simply cut off by Kulakov who saw her response a mile away. \"We can beat them in a fair fight? That we may for a time, but for how long Sonya? If we wish to safeguard our nation, we must ensure that the other parties can only achieve a modicum of success. Allow them only to have a minority of the seats, allow us to keep the majority of the power.\"\n\nKulakovs worry was always about time, Sonya sees that now. She had stood up to speak to him more directly, but now she takes her seat again. While he always talked about taking things slow, for a slow progressive revolution. He was now complaining about what would happen in that time. \"It seems for once, Kulakov. That our roles are switched, it is for the people to decide on this matter.\" She mused, now being the one to take the route that would only have great change with time, while he fought for the opposite. He coughed a little into his hand, looking away so he did not cough into Sonya. Solemnly nodding once he stopped. \"Some people will never agree the same way.\" He admitted the very essence of politics. Sonya tore herself down to the paper in front of her. It would just need both their signatures to decide which direction to go. She finally spoke out again."
 SRU_Sonya_Phase_One.3.a:0 "\"Not this time.. Allow only the minority seats.\""
 SRU_Sonya_Phase_One.3.b:0 "\"It is for the people to decide, for the majority.\""
 SRU_Sonya_Phase_One.6.t:0 "The Party or the State?"
 SRU_Sonya_Phase_One.6.d:0 "\"No, no this will do no good. We can't have the party further merge with the state, that would only scare people away. Competent people who we need at this point in time.\" Kulakov spoke quickly, he was up and about due to this recent discussion he was having with Sonya. They were both standing, and both leaning over Sonya's desk. Kulakov with his back to the door, and Sonya with hers to the window. That shone some of the cold light in from outside. Kulakovs hands worked quickly, spreading across the top of Sonya's desk sliding side paper work focusing on his proposal.\n\n\"The party already has many equivalent positions to those within the state, a merging of the two would allow the streamlining of the process.\" Sonya quipped back, definitely opposing Kulakov. This was one of their few discussions that actively heated up, thawing the cold stone heart of Kulakov. And emblazoning the fire within Sonya, one that had been idle for so long. \"Not everything should be made more streamlined, or efficient.\" He mused, sighing. Sonya noticed he fidgeted with his hands on the table. The fingers twitch as if needing a cigarette.\n\n\"Do you suggest that the party should not be involved at all with the state?\" Sonya asked him as she made herself relax, and calm back a bit. She stood up straighter, not leaning as much, and slid back over her paper that Kulakov had pushed away. This action seemed to cool things a little, as Kulakov himself backed up. Shaking his head, before speaking in his deep cool voice. \"That is a foolish suggestion, the party may still have its involvement, but a complete merger is even more utter nonsense.\" The words were snappy, and it led to the two locking eyes for a moment. Battling for who would get the next word in, as the next word in, the next blow in their fight. Would declare the winner."
 SRU_Sonya_Phase_One.6.a:0 "\"There must be a clear divide.\""
 SRU_Sonya_Phase_One.6.b:0 "\"We must merge them.\""
 SRU_Sonya_Phase_One.9.t:0 "Educational Doctrine"
 SRU_Sonya_Phase_One.9.d:0 "Sonya caught the appearance of Kulakov as she walked up towards the entrance of the ministry of education. Another matter that would require both of their input, she looked Kulakov up and down, he was in the same suit he always wears. As white as snow, with no room to hide the dirt. His face down into a neutral expression, close to a scowl. Running his hand through his chestnut silvered brown hair, he finally caught Sonya as they both arrived on the doorstep of the ministry. \"Another matter we must settle. It never ends.\" Kulakov admits, taking this time as he stands there reaching into his breast pocket, gently sliding out a cigarette packet before taking one from it. Followed by looking for his lighter.\n\n\"That is because, Komsomol raises a point.\" Sonya ignores his actions to put another cigarette into his mouth, she was convinced he goes through millions a day. She only wishes to get the jump on settling this matter. \"Throwing a spat, threatening the education minister is raising a point? You chaired them, is that how you ordered them to act.\" Kulakov speaks, muffled by the cigarette in between his teeth, and the hands raised up as he begins trying to light the cigarette. Sonya looks away from the act, pretending to be annoyed by it. But she had to admit, she never was fully able to grapple control of Komsomol, their new leader, one she was very familiar with. Acted the way she expected him too. \"I- no- I didn't and... no it doesn't.\" She admits now slightly worried, though she could tell Kulakov didn't care for how she was feeling in this moment, nor her worry.\n\n\"But what they were trying to raise was that schools should be introducing curriculum teaching about communism. It's like how my father raised me.\" He knew she always finds her voice, she just needed a second. He stares at her, hand down, cigarette smoke wafting away, as he chooses his next words carefully. Blowing smoke away from the ministry. \"Not every child, not every parent wishes to learn about it from school. I agree with the minister, politics should be kept out of school.\" Part of her knew it was right, after all she didn't learn about the revolution in school. Unless she were to consider being with her father, school. Sonya hoped her next words would end the debate before even stepping inside."
 SRU_Sonya_Phase_One.9.a:0 "\"You and the minister are right.\""
 SRU_Sonya_Phase_One.9.b:0 "\"It should still be added to the curriculum.\""
 SRU_Sonya_Phase_One.7.t:0 "Remove Jacobin Chekists"
 SRU_Sonya_Phase_One.7.d:0 "Kulikova's footsteps were barely heard as she walked around in the halls at the Headquarters of the Cheka in Novosibirsk. It seemed as if she wasn't walking at all, and was merely slightly hovering over the ground. The only sound made due to the wind, however such tricks didn't exist. But if they did, Kulikova would have them. Turning down a hallway she looked forward, it was someone out of the Cheka uniform. Which only meant that this was someone with a message, otherwise they would not have been let inside. Kulikova didn't even pay them any other look after catching a glimpse of them, he was 5ft 11\" tall. Had chestnut brown hair combed to the side, forest grass green eyes. A face that only a mother could love.\n\nAll of that Kulikova saw only with a glimpse, all to determine that he wasn't a threat. However, she was surprised as she kept walking when he stepped right in front of her instead of stepping out of the way, and then reached to his side. \"Why have you stopped me?\" Kulikova questioned, a tone of indifference only slightly annoyed. He produced a folded letter from a pocket and gave it to her. \"Apologies, Miss Kulikova. However, you must read this.\" He said to her, with some shake in his body. She raised her hand up, bringing her almost bleached white hair out of her eyes. \"Alright... Hand it here.\" She snapped up the letter quickly and unfolded it, beginning to read its contents. Reading it all quickly, she had to reread it, then again.\n\n\"A reassignment? To- to.. Head of Border Security?\" This was the first time she had something unexpected happen in terms of her appointment to Cheka, looking at the messenger as if he had answers. He only was able to say one thing. \"I can assure you this is not a mistake. This came right from the Prime Minister.\" Kulikova nodded, however she took a deep breath and continued on. Thinking about one thing, Kulakov needed to pick his messengers better. \"I see. Well, please let this document get to Luka as well.\" Handing it back to him, he took it with a nod of acknowledgement. She turned around and began walking back the way she came, one last comment that the messenger could hear."
 SRU_Sonya_Phase_One.7.a:0 "\"Pointless to guard a frozen border.\""
 SRU_Sonya_Phase_One.10.t:0 "Chairwoman Leonova"
 SRU_Sonya_Phase_One.10.d:0 "The sliding creak of drawers were heard as Sonya pulled them out from her desk, she was rummaging through them for a document she was given to look over and discuss with Kulakov in one of their talks. She would hope this time it would put the walks she forced him into good use, but that wouldn't help if she couldn't find it. Her searching was interrupted loudly with a bang! That sounded as if someone shot a gun into her office. Whipping her head up quickly she looked to the door, the door slamming was a familiar sound to her. With the exact kind of energy flooding into the room being the exact same as one she had experienced, a lot before. \"Sonya it is good to see you!\" Looking forward, the familiarity was answered entirely. If the voice didn't confirm it, the woman did. Sonya looked at Leonova. Dressed head to toe in a new uniform, one she hadn't seen her in before. But that made sense, this would be the first day of Leonova being Head of Cheka. \"Ah, please knock next time, Leonova. But, I must admit it is good to see you too.\" Letting out, Sonya relaxed and leaned forward, her desk drawer still half open but she paid no mind to it. Only glad to see her friend again, she needed a familiar face after all she's had to go through these past few months. \"Hah, of course. My mistake, it's not like your old office. It's so official.\"\n\nLeonova said, analysing the room. Acting as if she was remembering the old one right on top of it, so she could compare the two. Sonya gave her a second, Leonova wore a big smile before she rapidly continued. \"Anyway, pleased to tell you, the reorganisation is going well. Many of those in Cheka are glad to- well, be rid of their Jacobin counterparts.\" There it was, Sonya looked to the side as Leonova affixed her gaze on her, despite being used to Leonova the look she gave Sonya sometimes still worried her. It felt like being analysed, by a monster in the dark. That exact kind of thought infected Sonya's brain, as she asked her question she already knew the answer too. \"Good to hear, and those remaining are they... are you..\" The flash of worry grew massive as she looked at Leonova's face, Leonova's beautiful soft features in her mind were replaced with what came to be the scariest to Sonya's, completely haunting. Her hair seemed to turn to snakes like a wicked myth, and the teeth in her smile seemed to become sharp jaws of death. \"Sonya, I'm hurt... if I wanted to turn against you. I would've done it with the bodyguards.\" The flash of grown worry was gone as quickly as it came, especially as Leonova dropped her smile to finish speaking. Despite this happening a few times before, Sonya only had one response."
 SRU_Sonya_Phase_One.10.a:0 "\"That's reassuring...\""
 SRU_Sonya_Phase_One.11.t:0 "Chairman Ivanov"
 SRU_Sonya_Phase_One.11.d:0 "The scratching of Sonya's ink pen against parchment was all that could be heard within her office, it was a late hour. The only light in her office was the lamp on her desk, which was serving only to illuminate the paper in front of her. She let out a yawn, catching it with her free hand. Next time she would remember to finish signing documents before it got to an ungodly hour in the night, but she didn't mind. Novosibirsk was peaceful this time of night, same with her office. It was a lovely quiet. \"Miss Bunina, here to report on the organisation of Cheka.\" Suddenly a voice as deep as an ocean, and as smooth as silk spoke. It caused Sonya to jump out of her chair, dropping the pen looking forward, instantly grabbing the lamp almost as if in reflex, shining the light on the person in front of her.\n\nWhat was revealed was not a monster of the night, but a man with silver hair, in a completely black suit. He had a chiseled chin, and eyes that looked like they were calculating numbers at all times, with a colour of clouds over the sky. \"Ah! I- Ahem, apologies for that. I did not see you come in.\" Sonya felt like she'd run red of embarrassment at not recognising someone walk in, but she did recognise this man even if only a little. He was recently appointed head of Cheka, to replace the previous leader with- unfortunate loyalties. \"Mr... Ivanov was it?\" She asked softly, he seemed to pay no mind at all to her reaction. He probably expected it after all, due to sneaking in so quietly. \"Cheka is still undergoing its transformation into the MGB, there have been no problems from the previous Jacobin members of the group, nor from the new Head of Border Security.\"\n\nThe news he gave her was excellent, but the man who gave it puzzled her. He didn't even choose to answer if Ivanov was even his name, she tilted her head as she pulled the lamp away from shining in his eyes. She looked back at her paper for a second, seeing she made a bit of a mess with the pen. \"Thank you, you are very efficient. You were the one who-\" Sonya looked, and the man was gone. Quickly she shined a light back, and saw no man standing there. Not even the door slightly ajar, it was perfectly shut. She blinked her eyes a few times, she hoped it was just a trick of the light. But that wouldn't explain why she didn't hear him leave. At least now, she was remembering the details of the man. Putting it together, finally finishing her sentence that she herself interrupted."
 SRU_Sonya_Phase_One.11.a:0 "\"-rebuilt the spy networks after the DSU crisis...\""
 SRU_Sonya_Phase_One.8.t:0 "The Power of the Media"
 SRU_Sonya_Phase_One.8.d:0 "Sonya hears the talking die down, as she and Kulakov step out into the streets of Novosibirsk. Out here there were no reporters, no one from any media organisations looking to get a scope from the leaders of their state. Kulakov is the first one to take advantage of this as he lands flatly onto the street, down from the steps. Walking towards a sleek black elongated car resting at the side, the driver was ready to receive them. \"We are at war, Sonya, with these outlets issuing these harsh critiques...\" Kulakov went silent as he opened the door to the car and crawled in, waiting until Sonya had caught up with him. She stepped away fully looked side to side, and entered the car shutting the door and buckling on her seatbelt before she heard him continue. \"They simply weaken our state, our national security. The party, its borderline treason.\" He complained, though unlike his others his tone didn't reek of annoyance or complaint at all. Just a fragment of notice, and willingness to settle another topic. \"Seems to me that you are simply unable to handle the spotlight and answer simple questions.\" Sonya left the comment with Kulakov, while she had never liked being with the media all the time, she had grown adept at interacting with them at times. \"You know that's not what it is.\" He knows she's sometimes more clever than she lets on, allowing the comment to slide right off of him. \"Regardless, while some are harmful. Their critiques and reflection of the movement only serve to strengthen it. The only organisations that need removal are the ones that cross that line of treason.\" Her point was laid out exactly when the car started. Rumbling to life, waiting a few seconds before it took off down the road. That time gave Kulakov to think about how to answer. It didn't take long. \"We can have those critiques still, all we need to do is bring the media under us.\" Shaking her head, Sonya looked out the window as the car trundled along down the road. Trying to find the words, deciding if she should speak or just allow Kulakov to continue."
 SRU_Sonya_Phase_One.8.a:0 "\"Allow them to be independent Kulakov.\""
 SRU_Sonya_Phase_One.8.b:0 "\"They must be brought into line Sonya.\""
 SRU_Sonya_Phase_One.12.t:0 "The Foreigners Loyalties"
 SRU_Sonya_Phase_One.12.d:0 "\"See that man, he's a mechanic. That sort of genius mind could be put to great use designing our vehicles.\" Kulakov suddenly spoke out to Sonya, it was unexpected. She turned to her right, to look past Kulakov to see where he was pointing. It was rare he would open conversations on her mandated walks, so this was clearly something important. What she spotted was a ZID Brand Motorbike leaned over to the side of the road, its front wheel was off and there were a bunch of parts strewn about. A man crouched by it with a series of tools, he didn't look much like a Russian. He was slender, his skin was tanned, and he had short black hair, with a big brown mustache. Sonya knew that he didn't seem Russian by the way he shook with the cold, he had a ring on his finger and as they continued walking. Sonya saw a woman come out to put more blankets around him.\n\n\"Look at his face Kulakov, he is not Russian. You should recognise the face of some enamoured with capitalism.\" Sonya's verbal points were few, but the ones in her head were many. Looking at this man as they continued briskly walking past. She knew why he brought up such a man and matter. \"The face of a man should not dictate his deportation. He has skills, put him under watch, and put him to use. Lest we allow the Europians to gain another mechanic.\" Kulakov was talking over a matter that she and him had talked about previously, but came to no outcome. Kulakov talked softly and reasonably, while Sonya took a moment to think. Trying to find the right words.\n\n\"What if he raises his daughter or his son, under his ideals. She then grows up and joins a liberal party, and fights for it. Would that not then jeopardise our utopia.\" Kulakov stopped and looked at her, she stopped in turn and looked at him. He seemed to recognise something with her words, and stared right at her. He sighs, and reaches for a cigarette from his pocket, pulling it out and placing it between his fingers. \"I'm changing my mind. This walk seems productive.\" He said gruffly this time almost sarcastically with the cigarette now in his mouth, but there was more he was gonna say. He just needed his lighter, once he had it and lit his cigarette he finished."
 SRU_Sonya_Phase_One.12.a:0 "\"Let the Europians have their mechanic back.\""
 SRU_Sonya_Phase_One.12.b:0 "\"He'll raise his daughter to be like you.\""
 SRU_Sonya_Phase_One.13.t:0 "Groundwork of the Revolution"
 SRU_Sonya_Phase_One.13.d:0 "Sonya was lost in thought, her eyes were affixed on the window right behind her desk. Opposite of the door to her office, she was leaning forward slightly resting her chin softly onto her hand that was stuck right into her thigh. She wasn't even looking out the window, simply focused on the glass, its frosting up due to the chill winter. Her thoughts plagued her bad enough that she spoke them out loud. \"Kulakov, he seems... To be freezing the wheels that keep this revolution on its tracks.\" Elsewhere within the same building, within a similar layout was Kulakov, who instead was leaning out of his chair over his desk looking down at a series of papers of some possible reforms or changes that could be made with the nation. He too, was lost in thought. And a thought of a similar matter. \"Sonya, she seems to be finding her voice and power. She is no longer that scared little girl in Kazakhstan.\" Both of them separately, were thinking of the exact same thing. What to do about the other person, who held the fate of the nation in their hands.\n\n\"He may prove to become an issue later... But, what can I do about him? I can't out match him when it comes to political power.\" Sonya's voice was laced with worry and concern, though Kulakova who had similar words to say. Was calculated, almost stoic in a way. \"Her minimal efforts are causing a rift in this party, she's weakening us just by attempting to be a part of the revolution.\" He sighed out, taking his right hand and reaching for a cigarette only to not find his packet.\"The groundwork of the revolution has been laid.\" Sonya let out, finally standing from her chair brushing it aside on its wheels. \"Our nation is getting stronger, it is progressing but...\" Kulakov stepped away and went to the window that was behind him reaching for the blinds. There was one final thing that both of them said separately, but in unison."
 SRU_Sonya_Phase_One.13.a:0 "\"Who will finish it?\""
 SRU_Sonya_Phase_One.18.t:0 "Failures of the Great Peoples War"
 SRU_Sonya_Phase_One.18.d:0 "Sonya felt like banging her head against a wall. This time instead of her own wall, it was the wall in Kulakov's office. She could handle a lot, she could handle six speeches in a day. Deciding between which tax reform to go with, deciding even what every citizen should have for breakfast, lunch and dinner. But she couldn't handle that, when she couldn't even begin to understand what was being said, if two individuals kept talking and bickering over each other about concepts she couldn't even fully grasp. Like the two that stood in front of her, Marshal Rostoviev and General Durov. While Rostoviev was a greatly respected leader amongst the Red Army famous for his actions during the Great Revolutionary War, Durov was the exact kind of General who did not care for that in the slightest. \"Enough. Both of you, please get to your points already.\"\n\nSonya let out, rubbing her temple as she gently put her right hand on Kulakovs desk, using it for support. The two instantly stopped talking and looked towards Sonya, Kulakov looked at her too while her shoulder length blonde hair covered her face. He was used to this kind of discussion, and so was able to follow along with it with no problem. But, he stepped in now to help Sonya. \"Rostoviev, it would be best if you started this first.\" Giving the start to the highly respected Marshal seemed like a good start, and Sonya was very thankful he did so. Rostoviev cleared his throat before speaking. \"Certainly, Prime Minister Kulakov. My plan is simple, the Red Army is too split apart and too undisciplined.\" Durov scoffed at the comment, leading to all eyes falling on him. Until Rostoviev continued.\n\n\"We need to strengthen it, to centralise it. Logistics and command is a mess, they must be joint to have any success. Turn the rabble into a modern fighting force.\" Sonya found that Rostoviev made a good point: the decentralised nature of the army worked well in Kazakhstan but could have trouble against more organised enemies. Durov didn't even give Sonya a minute to think about that idea, before he spoke with his own. \"Our weakness is our strength. The East is attempting to fight like a modern force, we have great success in our unpredictability. The army should continue to fight as they have been. We must remain a force that can strike the enemy anytime, anywhere. Entirely unpredictable.\" Sighing, Sonya understood it now. What the whole argument could be boiled down into. Just two singular points, whether to centralise the army. Or keep it decentralised, but she knew little of military strategy as much as she would hate to admit, so turned her head to Kulakov and asked. \"Kulakov, your thoughts?\""
 SRU_Sonya_Phase_One.18.a:0 "\"Durov understands our army.\""
 SRU_Sonya_Phase_One.18.b:0 "\"Rostoviev is right.\""
 SRU_Sonya_Phase_One.19.t:0 "The Partisan's Ideas"
 SRU_Sonya_Phase_One.19.d:0 "Vasily Durov was looking over battlefield reports in his hands, the contents of which was all concerned about the current fighting force of their enemy. The Russians in the Far-East, he had almost burst out laughing when he saw them. Their numbers, and their equipment. He felt like it would simply be child's play to defeat the bulk of their forces, there were only a few outliers to him that would prove difficult. \"Look at these reports, love, this enemy... Well, let me just ask. What would you do?\" Vasily turned and looked at his wife Song, long dark black hair that was beautifully shining in the light of their home. She was currently sitting on the kitchen counter, he walked over to her and handed her the report in his right hand. She took a second to look over it, and Vasily caught her eyes on a particular line.\n\n\"Their army isn't built for the East. I'd take a squad, and lead them to fall into a frozen river.\" She was right, despite it being the army of the Far-East the entirety of their army seemed not to be ready to handle the severe winters this far from Moscow. Vasily shot her a smile at her simple response. \"Exactly. This is why I want to give more command to the squad leaders, they know their men best. Can perform these tactics quickly and react instantly, if given that power.\" Vasily blurted out as he took the report back, laid it next to Song on the counter and looked it over. He could catch her eye staring at him, he often wondered how he was so lucky to land such a beautiful wife. And was glad she didn't kill her when she was a bandit he was chasing in Kazakhstan. \"Dear, this idea embodies an ancient proverb from home.\"\n\nHer comment caught his attention, he fully pulled his eyes off the reports and looked at her, motioning her to continue. It was then she leaned in with a full smirk, and finished what she was saying. \"Should a great warrior challenge you, kick him in the balls and steal his shoes.\" Vasily couldn't contain himself, he burst out laughing. The way his wife said it, spoke it perfectly in that honey laced voice of hers. It might as well have been the funniest joke on earth. He leaned into her and softly planted a kiss on her."
 SRU_Sonya_Phase_One.19.a:0 "\"Their shoes have no worth, love.\""
 SRU_Sonya_Phase_One.21.t:0 "No Longer in Kazahkstan"
 SRU_Sonya_Phase_One.21.d:0 "\"Hey.. you got another pair of boots? I could use one, or several.\" Demidov spoke towards Vanzin as he leaned in towards him, his breath was instantly turning to white mist. The two men were sitting around a campfire, the light illuminated the freezing night they were experiencing. Vanzin chuckled, rubbing his hand together, as he looked towards Demidov. \"All the clothes in Kazakhstan could not defeat this cold.\" He spoke softly into his cupped hands, Demidov chuckled and leaned back right into the snow beneath him. The rest of the men, which numbered six around the campfire murmured their agreements. Though their winter uniforms were built for this weather, the men themselves and their bodies weren't. \"I could not agree more.\"\n\nAll the men quickly turned to the side, when they heard the familiar gruff voice of their Sergeant. He very quickly found a free spot alongside the men, clearing the ground while holding a cup. \"Sir!\" They all made a quick attempt to stand rapidly from their positions, Vanzin stood quickly and firmly while Demidov tripped, and attempted a salute while on the ground. \"At ease, at ease. No need for that here.\" The man spoke quickly, waving his free hand down as he himself took a seat on the cold earth beneath them, warming himself by the fire. Vanzin quickly found himself back down, to relax again. While the rest of the men breathed visible sighs of relief. It was quiet for a time, with the Sergeant sipping his drink. Before he spoke a question to them all. \"Tell me boys, would you prefer some blankets, or to kill the enemies of the revolution.\"\n\nHe spoke it honestly, though he dragged on that last part, attempting to personify some official document. The men chuckled around a little bit, Vanzin took a deep moment to think. While a blanket would certainly help him leave through the cold, fighting would also warm up his body quickly. But his thoughts were interrupted when Demidov finally had a thought and blurted out. \"I prefer a woman sir!\" Vanzin burst into laughter and Demidov did too, all of the men did around the fire. Even the Sergeant almost spilled his drink, and then like in unison they all said into the long night."
 SRU_Sonya_Phase_One.21.a:0 "\"Don't we all!\""
 SRU_Sonya_Phase_One.20.t:0 "Military Council's Plan"
 SRU_Sonya_Phase_One.20.d:0 "Marshal Rostoviev winced as he pulled himself up, heaving a large file box in his hands. His back wasn't like it was when he was younger, the small action to pull up a container nearly broke him. He kicked hard the filing draw shut, his steel toed boots preventing any further damage. Dropping hard the box on a nearby table, it shoe dust everywhere all towards the other filing cabinets. He pulled out a random file, and looked at the name. It read, ‘The Defence of the Volga.' Remembering the event well, he mused his thoughts out loud for only the dust and spiders to hear him. \"Ah... I remember that, a failed defensive. Completely shattered our line because our troops couldn't hold.\" The wounds of the past stung him, of failure and mistakes. But that's why he was here, to learn from them.\n\n\"Sir, I have news for you.\" A familiar voice to Rostoviev spoke into the room, he knew it instantly. He turned from the pile of shattered memories and looked, seeing the dashing blonde young protege of his. Zhutov Petr. He held the door open, which brought some fresh new golden light into the room. \"Better news than these decade old reports I hope.\" The casualness and gentle kindness in his voice was not the way he usually talked, he always held himself to a higher standard with others. But not with Petr. The young man looked at him and smiled a little bit, he brushed his hair to the side gently moving his officers cap alongside it. \"Well sir, your structure reforms have gone through well, my regiment is rapidly succeeding. The new coordination and clear orders have been tremendous for the tanks.\"\n\nIt truly was much better news than those old reports, Rostoviev made a toothless smile at the man. Reports of success of his tactics and ideas this time around, was greater news to him then if the entirety of the Far-East had given up. Though in his mind, that would not be a bad thing either. He turned away from Petr who stepped closer into the room with him, he opened the Volga file and began reading as he finished with."
 SRU_Sonya_Phase_One.20.a:0 "\"This time, we won't fail.\""
 SRU_Sonya_Phase_One.24.t:0 "Push out the Invaders"
 SRU_Sonya_Phase_One.24.d:0 "\"Be at the ready! Any second now they'll throw their men at us!\" Commander Galygin barked around to his men, he made his way up and down shoddily dug trenches while the shadow of nearby buildings was casted over them, these trenches weren't for fighting from. They were to block the advance of any of the Red Army's tanks, they were vital to their survival. He looked to his right as he walked, and saw a soldier barely moving with his shovel, he hit him upside the head. \"Move it soldier! You'll get us all killed.\" The man was suddenly reinvigorated to work, muttering a yes sir to the commander. Galygin walked with some more confidence now, he had no doubt the foolish Reds would just run at them with more bodies, then march their tanks right into the hole he was about to climb out of.\n\nBoom! The ground suddenly shook, impacted with a sudden and violent barrage of artillery, Galygin had just climbed out of the hole when he suddenly was hit hard in the side. He thought an entire shell had somehow slammed into him until he heard a voice yell. \"Get down sir!\" The soldier had just tackled Galygin back into the hole, looking up past the soldier's ruffled grey hat he saw an artillery shell fly right above him and strike right where he once was standing. Almost giving out a sigh of relief, until he felt the shadows fall looking up higher, he saw the steel birds in the air flying the red five pointed star. Galygin cursed, he pushed the soldier off him quickly slowly starting to stand up. Being bombed was the last of what they needed, he was careful not to stand too tall and high, lest a sniper suddenly take his life.\n\nYet, with the amount of smoke around he thought it would be impossible to see him. He turned and looked towards the Red Army side of the frontline, and there he saw and heard it. Moving steel blocks, and the roaring thunder of tracks. There were more tanks than he could count, and they were marching right towards him. So strong and powerful, they effortlessly were getting into and out of the holes. Powering through like a machine. \"Fallback! Retreat!\" He made the desperate shout to his men, quick to make up his mind. He snagged the soldier that was just beginning to get up by the right arm and made an effort to fall back."
 SRU_Sonya_Phase_One.24.a:0 "Galygin returned, with a spare arm."
 SRU_Luka_Phase_One.1.t:0 "Trial Of The Generals"
 SRU_Luka_Phase_One.1.d:0 "Behind the sealed doors of the General Staff chamber, senior officers gathered around a table buried beneath maps. Chairwoman Sonya’s government was rapidly losing control of the revolution. Entire districts slipped from the state’s grasp while Sonya spoke of a utopia built upon her own fictional ideals. The generals had grown tired of her inaction. Field Commander Mikhail Kovalev stood among them, arms folded, listening as the older officers spoke in careful phrases. “Emergency military authority.\" “Temporary restoration of order,\" \"protective custody.” None of them said \"coup,\" but every man in the room understood the subtext. Then the doors swung open. The newly elected Premier Luka Zhukov walked in calmly, his coat dark from the rain outside. Beside him followed Tasha Kulikova, flanked by two Cheka officers in grey uniforms. Several generals instinctively reached for their pistols. “Careful now,” Luka said. “If you draw them, you will have to decide whether you are brave enough to fire.” Their hands froze. Kovalev was the first to speak. “With all due respect, Premier, you and your thugs are not welcome here.” Luka glanced at the maps. “Oh really? Because if I am not mistaken, this seems to be a coup d'état.\" The room went silent.\n\nOne general stepped forward, face flushed with anger. “We are trying to save the revolution from Sonya’s weakness.” Luka grinned. “Are you suggesting we replace hesitation with panic?” Luka asked. “You would seize the ministries tonight, arrest half the government by dawn, and by morning everybody in Siberia would know the army has turned against the state. Congratulations. You would give our enemies exactly what they have wanted.” Kovalev’s eyes narrowed. “And what would you suggest, Premier? More politicking?” Luka’s grin turned into a smug smile. “No,” Luka replied. “I suggest discipline.” An anti-Jacobin officer slammed his fist onto the table. “Discipline? From you? I will not hand the army to Jacobin fanatics and Cheka thugs.” Another officer nodded. “Nor will I. Better Sonya than a dictatorship ruled by your ilk.” Luka did not look at them. He only gave the faintest motion of his hand. Kulikova drew her pistol. Two shots echoed throughout the chamber. The Cheka officers fired a heartbeat later. The dissenting generals collapsed beside the map table, their blood spreading across the oak table. No one else dared reach for a weapon. Kulikova lowered her pistol; a twisted look of satisfaction was written across her face.\n\nLuka stepped past the bodies as if they were misplaced furniture. “You came here tonight because you understood one truth: Sonya cannot lead the revolution any longer. But you fail to understand the gravity of the consequences you were going to inflict upon the revolution. A coup is not instantaneous. It is an operation. It requires ministries prepared to obey, newspapers prepared to dictate, soldiers prepared to stand aside, and enemies prepared to disappear before they know they are enemies.” Kovalev stared at the dead officers, then back at Luka. “So this was never about stopping us.” Luka’s gaze fixates on Kovalev. “No,” Luka said. “It was about finding out which of you understood power.” A long silence followed. Luka placed both hands on the table. “Sonya will fall. Not tonight. Not in some misguided military seizure that collapses before the sun rises. In several months, once every important office has accepted the inevitable, the situation will change. It won't resemble a rebellion when the army advances. It will look like a restoration.” One of the remaining generals gulped. “And after Sonya?” Luka’s gaze moved across the room. “The Revolutionary Directorate will be formed. I will assume its chairmanship. The military will retain its honour and its purpose. In return, it will stand with me when the hour comes.” Kovalev’s voice hardened. “And if we refuse?” Luka looked at the bodies on the floor. “Then prepare for unforeseen consequences.” No one spoke. Slowly, one general lowered his head. Another followed. Kovalev remained standing, jaw tight, unwilling to bow, yet unable to deny the shape of the future forming before him. At last, he said, “The military will not be your weapon to use as you please.” Luka met his eyes. “No, Commander. It will be the revolution’s shield.” Outside, rain struck the windows of the general staff chamber. Inside, the coup was postponed and reshaped under Luka Zhukov’s direction. By the time Luka Zhukov left, the generals understood that they had not recruited him into their conspiracy. He had recruited them."
 SRU_Luka_Phase_One.1.a:0 "All is proceeding as planned."
 SRU_Luka_Phase_One.2.t:0 "Formation Of The Russian Jacobin Council"
 SRU_Luka_Phase_One.2.d:0 "The cold Russian winter chill assailed the city of Novosibirsk late one night, the streets were all but completely deserted, there were but a handful of people staying outside braving the harsh Siberian weather. Most were inside their homes, safe and warm, foolishly feeling as if they were almost protected from the strife that affected Russia. Tucked away from prying eyes, down empty deserted alleyways and streets, a group of individuals gathered in a dining hall who numbered no more than 40 tucked away in the hall, seating themselves at a few tables, all enjoying fine pleasantries food and company with one another.\n\nThey were all gathered there for the annual Jacobin meeting, the members made up mostly of middle class Russians, with their ideals unified under one banner. At the central table sat the higher up members of the party, situated at the head of the table with no opposition from either side of the table, was Luka Zhukov, who was sitting there in his chair above all the swathes of people clambering for their own prestige and to be the ones to earn Zhukov's favour, he was seemingly disinterested by the masses of loathsome securocrats and mundane bureaucrats.\n\nThose who sat around him were other important members of the Jacobin clique, sitting to his right was Zaytsev the economic minister a reformer who prefers a more soft approach to Jacobinism, unlike Zhukov his focus was on the fine drink in front of him.\n\nTo Luka's left was Kulikova, the Chief of the Cheka, who was watching Luka like a hawk examining his every move. Then there was Sorokina the youngest member of the top four party members, she was enjoying herself blissfully unaware of her surroundings as usual. Everything continued as it was, the feast was filled with a joyous air of the Jacobin's recent victory in the people's congress but some were more successful than others an aura of envy was in the air, suddenly as the clock strikes midnight Luka Zhukov stands up, Zaytsev stands up after him and clinks his glass to get the attention of everybody in the hall.\n\nThe silence rapidly dissipated and an aura of unease filled the room, suddenly Luka started speaking \"My dearest friends and colleagues tonight we celebrate our most recent victory in the people's congress, our party is now in coalition with the rest of the VKP and with my recent appointment as the Prime Minister our influence grows day by day, soon the fate of the revolution shall be ours to determine and we must guide it to fruition, to do this I have ordered the creation of the Russian Jacobin Council which shall oversee the true governing of the country while the VKP grip onto whatever delusions of power they think they hold.\"\n\nThe hall suddenly erupts into cheers and praise for Luka but he gestures for them to quiet themselves. He continues \"My fellow Jacobins if we are to be successful in ensuring the survival of our revolution then we must rally behind one leader, that is why I from henceforth shall be the sole authority of the Jacobin leadership with my three compatriots beside me to assist me in carrying the torch of the revolution. Long live the revolution, long live Russia!\"\n\nThe hall chants Luka's very words \"Long live the revolution, long live Russia!\" Those words echo through the night sky, not even suppressed by the coming storm which is on the horizon."
 SRU_Luka_Phase_One.2.a:0 "'Long live the revolution!'"
 SRU_Luka_Phase_One.3.t:0 "A Revolutionary With A Heart Of Steel"
 SRU_Luka_Phase_One.3.d:0 "The ballroom of the old Novosibirsk governor’s palace had once belonged to oligarchs. Though any semblance of the old regime was quickly erased by the regalia of Jacobin banners. Beneath those banners stood officers of the military and party delegates of the VKP. Luka Zhukov stood at the head of the hall, framed by the banners of the revolution. Behind him sat the central leadership of the VKP. To one side stood General Nakahara, Field Marshal Veronika Alexeeva and the military staff; to the other, the Jacobin Clique leadership. Everyone knew that the Siberian People’s Republic’s existence was not guaranteed with the Russian pretender states of the Principality of Ekaterinburg, the Euro-Intervention Zone to our west and now Euro-Britannia to our east. Luka let the silence stretch before speaking. “Comrades of the revolution, there are moments when a nation must decide whether it lives or dies.” His voice carried across the ballroom. “For years, Russia has been broken under the Europian yoke. Our enemies have violated our beloved motherland as we sat from afar watching. Now foreign heathens sit upon our outermost territories. An old menace is reemerging after nearly a century. These pretenders cannot be allowed to stop our revolution. They believe us to be weak, unprepared and broken.” He paused. “We shall prove them wrong.” A low murmur passed through the hall. “We have endured a century of strife, conflict, betrayal and occupation. Yet still, we stand here tonight.” Luka’s voice sharpened. “Russia did not forget us. Russia was merely waiting for our return after all these years.” The officers stood to attention. The party delegates leant forward. “Euro-Britannia believes it can dictate the fate of our nation from across the Pacific. Europia United holds the belief that Russia would continue to be a nation of broken and exploitable people, a people destined for humiliation. And the Tsar believes our revolution was merely another flame that would burn itself out.” He raised his hand towards the banners. “But this revolution does not falter. Not in my hands. It will take its place in history by force of will, by labour, by sacrifice, and by war.” The applause began, growing by the second.\n\nLuka’s expression remained fierce. “Let the Duke of Velaines hear us. Let their Holy Orders hear us. Let their emperor hear us. The Russian people kneel to no one. The revolution does not waver. This revolution shall prevail over the foreign hands that strangle its birthplace.” His voice rose. “Tonight, we cast away the last illusion of peace. There can be no quarter with those who profit from our weakness. There can be no compromise with those who call occupation justice. There can be no future for Russia while Euro-Britannia and the rest of our enemies stand upon our shores.” The ballroom fell silent again. Luka placed both hands on the podium. “Therefore, by authority of the Politburo, by mandate of the VKP, and by the will of the people, I declare that a state of war now exists between the Siberian People’s Republic and Euro-Britannia.” For one second, there was only silence. Then the hall erupted. Officers thumped their fists against their chests. Attendants rose with applause. The chandeliers trembled with the sheer force of it all. Luka stood unmoving amid the storm. “Let no one mistake this war for vengeance,” he continued. “Vengeance is too small for us now. This is not a war for justice, but for our destiny. We march so that Russia may never again be subjugated by the powers of the world. We march so that every worker, every soldier, every child born beneath our banners may inherit a nation… No, a world worth fighting for.\" His final words cut through the applause like a blade. “Comrades, the long humiliation ends tonight. Russia rises. The revolution advances. And history will remember that when our enemies came to destroy us, they found a people with hearts of steel.” The ballroom shook with cheers. Outside, telegraph offices began transmitting the declaration of war. Across the front, sealed orders were opened. In barracks, soldiers were awakened before dawn. The war had begun."
 SRU_Luka_Phase_One.3.a:0 "All Hail Comrade Zhukov!"
 SRU_Luka_Phase_One.4.t:0 "The Sword Which Decides The State"
 SRU_Luka_Phase_One.4.d:0 "The war room feels smaller than it should. Maps crowd the walls, layered with ink and tactical corrections, each line a story of advance or retreat. Frost clings to the windowpanes. Field Marshal Veronika Alexeeva, the freshly appointed acting Supreme Commander, stands at the head of the table, hands resting lightly against the cold metal surface. Around her sit thirteen of the highest military officials in the Siberian Revolutionary Republic. They all know why they are here today. “The revolution, as you all know, is at war for its very survival; our enemy, Euro-Britannia, will stop at nothing to destroy everything we stand for.” She says at last, “The Prime Minister has asked me to call this meeting to determine a new Supreme Commander to take up the responsibility of guiding our revolution across the bridge of despair.” Two folders lie before her. “We have narrowed down the candidates to just two individuals.”\n\nShe opens the first. “Mikhail Kovalev.” An accomplished soldier turned commander, son of the revolutionary hero Artyom Kovalev. He commands respect the old way, by earning it from the men under his command. However, he believes the army should not be entwined with the government. She closes the folder. The second folder is thinner, with many of its pages ripped out. Shohei Nakahara. An outsider. A man without his homeland, now standing at the centre of a land so alien to him. He is experienced in modern warfare; there is less hesitation compared to Kovalev. He is willing to sacrifice a great deal to chase whatever string pulls him along. He inspires no loyalty but imposes order like no other could. He has the Cheka's backing and the favour of Prime Minister Zhukov behind him.\n\nAlexeeva exhales slowly. “One offers us strength and compassion,” she says, her voice cutting through the silence. “The other offers us a certain victory with no end.” A murmur stirs, then dies just as quickly. She looks up. “Kovalev will win battles,” she continues. “He will raise the army to new heights. But he will not belong to us entirely. Not to the Party. Not to the chairman.\" A pause. “Nakahara will do as the Prime Minister commands.” That lands heavier than any argument. “He will shape the army into something… absolute. No hesitation. No dissent. No surrender.” She lets the words hang for a moment. “And no independence.” The room shifts. Some sit straighter. Others avoid her gaze.\n\nThe chief marshal of aviation, Tikhon Belov, is the first to speak up cautiously. “We need victory, Comrade Marshal.” Alexeeva nods. “Yes.” Then, Stefan Mikhailov, Admiral of the Fleet, speaks up. “But we must decide what kind of victory we are building toward.” Her eyes drift once more to the two names. Kovalev, the soldier who could preserve the army’s roots. Nakahara, the general who could transform it into an unstoppable machine of war and violence. The future waits on a single decision. Alexeeva closes both folders. When she speaks again, her voice is steady. “Call the vote.” The room moves into action. Whichever name is chosen, one thing is already certain. The military will never be the same again."
 SRU_Luka_Phase_One.4.a:0 "‘Appoint Mikhail Kovalev — The Army Must Remain Independent’"
 SRU_Luka_Phase_One.4.b:0 "‘Appoint Shohei Nakahara — The Army Must Be Loyal’"
 SRU_Luka_Phase_One.5.t:0 "Meeting With The Devil Himself"
 SRU_Luka_Phase_One.5.d:0 "The summons arrived after midnight. Mikhail Kovalev found the Revolutionary Directorate almost empty, its corridors lit by dim lamps and guarded by soldiers who did not meet his gaze. At the end of the central hall, Luka Zhukov waited in his office, standing before a Cheka document detailing Kovalev’s whole history. “You’ve become increasingly popular with the officer corps,” Luka said without turning. Kovalev remained at attention. “The men respect results.” Luka turned to face him. “Yes,” Luka replied. “That is why popularity in the army is never harmless.” Silence passed between them. Luka opened the folder. Inside were reports from the front: victories, casualty figures, intercepted conversations, private praise from soldiers who had begun calling Kovalev the revolution’s champion. “You believe the military should be free of politics,” Luka said. “I believe it should be free to win the war.” Luka smiled faintly. “A beautiful distinction. Dangerous, but beautiful.” He stepped closer. “The army is not separate from the revolution, Mikhail. One day we will have little need for armies.” Kovalev’s expression hardened. “Did you summon me here to threaten me, Chairman?” Luka let out a little laugh. “No,” Luka said softly. “If I wanted to threaten you, Kulikova would be here.” \n\nLuka placed a new document on the desk: orders for a reorganisation of the military command structure. Kovalev’s signature line waited at the bottom. “You will support the integration of ‘politically reliable’ officers into your field commands,” Luka said. “You will also pledge allegiance to me once Sonya has been ousted from power.” Kovalev looked at the paper, then back at him. “And if I refuse?” Luka’s voice remained calm. “Then the army will lose its most respected commander at the worst possible moment. You will be forgotten in the annals of history as Russia and the world move forward without you.” He leaned in slightly. “But if you agree, you remain where you are. You remain alive. You guide the army through what comes next.” Kovalev understood then. Luka was not asking for loyalty. He was offering a cage just as he did with Sonya. After a long silence, Kovalev took the pen. “For the revolution,” Luka said as he put his hand on Kovalev’s shoulder. Kovalev signed. “For the people,” he answered.\n\nLuka watched him leave with the faintest trace of satisfaction. By dawn, the army would hear that Kovalev had endorsed reforms dressed under the guise of military independence. By noon, the officer corps would begin adjusting itself to the chairman's will. The pen, not the sword, had defeated the military and brought it under the heel of Chairman Zhukov."
 SRU_Luka_Phase_One.5.a:0 "‘Most Excellent Supreme Commander.’"
 SRU_Luka_Phase_One.6.t:0 "The Red Shōgun"
 SRU_Luka_Phase_One.6.d:0 "The memory returned to Shohei Nakahara in fragments: rain sliding from tiled roofs, cigarette smoke clinging to damp uniforms, Sawazaki’s ministers speaking endlessly of Japan’s liberation while Britannia tightened its grip over Area 11. The government-in-exile had mastered the language of delay. Every meeting promised action; every week proved otherwise. Allies vanished. Plans were revised until they meant nothing. China was full of noise, yet empty of power. Then Nakahara first heard the name Luka Zhukov. It came from a Kazakh baron travelling to Luoyang to pay tribute to the imperial court. “Zhukov”, he said, was an enforcer for the exiled Red Army in Central Asia, a man who turned disorder into opportunity. His revolution was preparing to strike north, reclaim Russia, and cast out the Europian occupiers who had exploited it since the Great War. Nakahara listened. Then he left. He cut ties with Sawazaki’s government without warning, depriving it of its most capable military adviser. If Japan was ever to be liberated, it would not be by men who mistook survival for strategy. It would require power, true power, and Nakahara suspected Luka Zhukov possessed it. The Cheka intercepted him outside Atyrau. They had heard rumours of a Japanese officer searching for an elusive revolutionary. They came silently, clapping restraints around his wrists and throwing a hood over his head. In another life, Nakahara would have fought. This time, he allowed himself to be taken. After all, it was the fastest way to meet Luka Zhukov.\n\nWhen the hood was removed, Nakahara found himself in an interrogation room beneath Atyrau. A single light flickered overhead. A one-way mirror watched from the opposite wall. The smell of blood lingered in the air. The door opened. Luka Zhukov entered alone, coat buttoned, a file tucked beneath one arm. He studied Nakahara before opening it. “So,” Luka said, “the Japanese exile who abandoned a dying government finds his way to my doorstep. Why have you come?” “Because I wanted to know if the stories were true.” “Which stories?” “That you can do what others only promise.” Luka half-closed the file. “Careful. Men who believe stories usually die chasing them.” “Then it’s good that I don’t believe in fairytales.” That amused Luka. “Then what do you believe in?” “Results.” For the first time, Luka’s interest sharpened. “And Japan?” Nakahara’s jaw tightened. “Japan is occupied by our common enemy. Soon, if Britannia has its way, it will become unrecognisable. I intend to reclaim it by any means necessary.” “So you came to me for liberation?” “I came to you because I need something worth fighting for.” Luka’s smile faded slightly. “Honesty is so rare in people these days.” He glanced toward the one-way mirror. “Leave us.” Footsteps retreated behind the glass. Now they were alone. Luka placed the file on the table. “Men like you usually seek wealth, power, or revenge.” “I want only one thing,” Nakahara said. “Japan to be free.” “Would you serve a foreign revolution to free your own country?” “I would use any road that leads back to Japan.”\n\nLuka studied him for a moment. “You are not loyal. You are not a socialist. You are not Russian. Tell me why I should keep you alive?” “Because many of your revolutionaries have known peace for far too long. Some know sacrifice. But I know war. I have known it my entire life.” The light buzzed overhead. “One more question, General. If I promised you Japan, would you believe me?” Nakahara let out a short laugh. “No.” Luka watched him closely. “But if you gave me the means to take it,” Nakahara continued, “I would follow you until the day I meet my fate or you meet yours.” Luka stepped forward and unlocked his restraints. “Very well. From this moment forth, you serve me.” Nakahara rose and stood at attention. “I pledge my allegiance to you, Chairman Zhukov.” Luka’s expression remained composed, almost serene, yet beneath that stillness Nakahara sensed the faintest trace of empathy."
 SRU_Luka_Phase_One.6.a:0 "‘My honour died in exile. My purpose did not.’"
 SRU_Luka_Phase_One.7.t:0 "High Morale Among Soldiers"
 SRU_Luka_Phase_One.7.d:0 "\"As you can see, Miss Sorokina. The addition of your cadets has gotten through to us, here you can see them undergoing instruction..\" The voice trailed off softly, the eyes of Sorokina were keenly focused elsewhere. The sharp slightly pinkish rubies with pitch black iris's spied around. The first thing her sharp eyes caught was fresh snow. The winter has assailed Novosibirsk and Siberia constantly, here was no exception. She ignored it, just as she would ignore rocks on the ground. Ignoring the air of frost, clinging to the nearby buildings, and paying no heed to those working to clear away paths.\n\nHer eyes spotted the topic of conversation. Rows of young looking, snow dusted, Siberian trainees who were being grilled by an older man in full uniform and getup. They stood perfectly in line, perfectly still, taking in everything he had to say. They appeared more as listening robots, than cadets she had made them that way. \"I see that, Bolotov. I'm wondering what the effect on the other soldiers is?\" Sorokina's voice was light, soft, some would describe it similar to the sound of feathers falling. Her focus was kept on them, even as they walked. Raising her hand, wearing a pristine white glove. The man directing her, caught the movement but kept moving. She could feel his eyes staring at her, she softly smiled.\n\nShe couldn't blame him, after all she was beautiful in her uniform. One such uniform that signified importance, being the colour of mint forest green, a uniform topped off around her neck by a white fur collar that separated the outside of her uniform from the inside. Which was a more simple crisp white shirt, with a tight formal black tie and deep maroon red vest. \"I'm unsure what you are referring to, Miss. This base of the JRA has seen no adverse effects from their involvement, every soldier performs his duty for his country.\" Sorokina had caught him, she was sure of it. His voice had wavered for just a second, as he spoke.\n\nThe tone she had caught was of being forced, coerced into speaking on something or being pressured too. And she caught him in it just as he had mentioned the JRA. They had been walking along now for quite some time, and they came to a sudden stop as Sorokina prevented herself from moving, turning away from watching the cadets in training. She eyed him now, as they both stood under the outside overhanging roof that was connected to a nearby troops building. \"You seem like you can't speak. Bolotov, in fact you seem like you are being with a knife to your throat.\" The face he now gave her, was the face of someone being caught stealing, reeking of almost being intimidated. He made quick to compose himself.\n\n\"Miss if you are implying. That I am underperforming in my duties, then you can-\" Sorokina quickly snapped at him, with her own voice stopping him dead in his tracks. As if he had just been struck, by a bullet fired from a rifle. \"That's simply not what I'm implying at all, Bolotov. I am here to inspect, and see what has come of my actions. So, if you have any complaints, any issues of the sort with the induction of the cadets. Please bring them to my attention.\" There was now a sudden pause, a moment of wait. Where Bolotov thought his next words carefully as he looked at Sorokina. Before he spoke again, now in a tone that sounded as if the noose around his neck had loosened.\n\n \"Well... Miss, my first complaint. Please address me via my rank first.\" Sorokina's first response was a bright wide smile with pearly white teeth, before she let out a light hearty chuckle."
 SRU_Luka_Phase_One.7.a:0 "‘Heheh, why of course Officer Bolotov.'"
 SRU_Luka_Phase_One.8.t:0 "The Long Night"
 SRU_Luka_Phase_One.8.d:0 "The meeting had been called after sunset. By then, the Directorate was nearly devoid of life. In Chairman Zhukov’s office, a fire burned low within the room, throwing shadows across the walls. Marianna Sorokina stood before Luka with a folder in her hands. Inside were hundreds of names. GRU contacts who had vanished after crossing the Cheka. For weeks, Marianna had gathered proof of Tasha Kulikova’s overreach, convinced that if Luka saw the truth plainly, he would act. She placed the folder on his desk. “Chairman, the Cheka is no longer protecting the people. It is enslaving them.” Luka did not open the folder immediately. He merely looked at it, then at her. “You seem to misunderstand Cheka's original goal.” Marianna had a confused look on her face. “What are you talking about?” Before Luka could answer her, the door opened. Tasha Kulikova strutted inside as if she had owned the place. Marianna froze. Kulikova greeted her with a mocking smile. “Oh, don’t look so surprised, Anna. You’re not the only one who knows how to obtain information.” Marianna’s hands tightened at her side. “This does not concern you.” Tasha laughed softly and crossed the room. “Everything that threatens state security concerns me.” She placed her own file besides Marianna’s. Luka opened it first. Marianna’s face paled at the sight. Inside were intercepted messages, records of her meetings with Kovalev and Zaytsev, and the names of several military officers secretly protected by GRU agents. Tasha spoke gently. “You thought you were building an untraceable network. But every network casts a shadow.” Marianna turned to Luka. “I was trying to save lives. To end the war faster. To keep her from turning the revolution into a prison camp.” Tasha reached for a cigarette. “And to build influence outside the chairman's control.” Tasha added. Marianna snapped back. “BECAUSE YOUR CONTROL IS POISON!” Tasha’s smile widened. “There it is. The little heroine finally bares her teeth.” Luka remained silent, reading. His silence hurt more than any accusation from Tasha.\n\nMarianna stepped forward. “Luka, you know what she is. You know what she’s done.” Luka looked at Tasha. “Yes,” Luka said at last. The room fell still. Marianna searched his face, waiting for judgment, for anger, for anything. Instead, Luka closed both folders. “Tasha’s methods are excessive. But they’re necessary now more than ever.” Marianna’s breath caught. Tasha leant closer, her voice low and smooth. “You thought this was a struggle between you and me. How sweet.” She circled slowly, never taking her eyes off Marianna. “You imagined yourself as my counterweight. A force for justice. The last gentle hand on the chairman's shoulder.” Her voice hardened. “But you were never opposing me.” She stopped beside Luka’s desk. “You were never my equal.” Marianna stared daggers at her. Tasha tilted her head. “Do not flatter yourself. You were never a player in this game. You were merely a pawn for higher powers.” Those words struck her like a blade.\n\nMarianna looked at Luka one final time. “Is that true?” For a moment, there was something almost regretful in his eyes. It soon vanished. “You will suspend all independent GRU operations concerning internal affairs,” Luka said. “Your military networks will be reviewed. Those deemed loyal may continue under supervision.” Marianna’s voice dropped to a whisper. “And those deemed disloyal?” No one answered. Because everyone knew the answer. Tasha collected both folders and tucked them beneath her arm. “The long night is difficult,” she said. “But the dawn belongs to those who are strong enough to survive it.” Marianna stood motionless as Tasha left the room. Luka turned back towards the fire. “You should rest, Marianna; you have had a long day.” She gave a bitter, broken smile. “No Chairman, I think I’m finally awake.” Behind her, the door closed softly, and the long night continued."
 SRU_Luka_Phase_One.8.a:0 "It's merely a matter of time."
 SRU_Luka_Phase_One.9.t:0 "Agent Tannenbaum Calls"
 SRU_Luka_Phase_One.9.d:0 "The afternoon was unusually mild for Novosibirsk’s colder climate. Luka Zhukov and Leonid Zaytsev sat beneath the covered patio of the Revolutionary Directorate, overlooking gardens flourishing as the revolutionary machine stirs onwards. Between them rested a silver tea set, untouched reports, and the comfortable silence of two men temporarily free from the everchanging bureaucracy of the directorate. Marianna Sorokina disturbed the tranquil peace. She approached carrying a thin black dossier marked with the golden seal of the GRU. Luka watched her take the empty chair opposite him but offered no tea. “This must be important,” he said. “You rarely interrupt Leonid while he is pretending not to work.” Zaytsev lifted his cup. “I find the pretence restorative.” Marianna placed the dossier on the table, sliding it in front of Luka. “Agent Tannenbaum has contacted us,\" Marianna said.\n\nLuka’s expression remained composed, though his attention sharpened. Tannenbaum had been planted within Euro-Britannian society months earlier, buried beneath a false identity and an unremarkable bureaucratic career. Recent reports suggested that he had reached the inner administration of the imperial government. “He is requesting activation. He claims he can secure access to military deployment plans and the private communications of several senior nobles,\" Marianna said. “Or he has been discovered, and Euro-Britannian intelligence is baiting us to expose our network,\" Luka replied. “That possibility exists,” Marianna admitted. “But his intelligence has matched information gathered independently by our localised cells in the region.” Luka looked down at the unopened folder. “What does he want?” Marianna opens the folder for him. “Authority to proceed. Additional funding and permission to recruit assets within the imperial ministries.” Luka’s face strained. “So he wants us to gamble an entire network on his continued loyalty to us?” Luka asked.\n\nMarianna leaned forward. “He offers us something armies cannot: influence at the heart of the enemy government. If he succeeds, Euro-Britannia may begin making decisions shaped by information we choose for them to see.” Zaytsev placed his cup carefully on its saucer. “An expensive gamble,” he observed. “Though considerably cheaper than another costly offensive to the east.” Luka glanced at him. “Is that an endorsement?” Zaytsev acted nonchalant. “Merely an economic observation. Wars are quite costly. Spies, however, seem to be a more fruitful investment these days.” Marianna concealed a faint smile. “We can compartmentalise the operation. Tannenbaum will receive only what he needs. If he has been compromised, the damage to our network will end with him.”\n\nFor several moments, only the quiet clink of porcelain disturbed the patio. Luka finally looked at the file and examined the photograph within: an ordinary man in an ordinary suit, standing among figures who could decide the course of the war. “Activate him,” Luka said. “Give him no direct knowledge of our wider network. If he is loyal, he will become our blade inside the heart of their government.” Zaytsev nodded in agreement. Luka closed the dossier. Marianna rose and reclaimed the file. “Agent Tannenbaum will receive his instructions tonight.” As she departed, Zaytsev poured Luka another cup of tea. “You had already planned that scheme before she arrived,” he remarked. “Of course,\" Luka smiled. “Then why make her argue for it?” Zaytsev asked. Luka watched Marianna disappear into the Directorate’s interior. “Because an agent is most useful when their handler believes the operation belongs to them.” Zaytsev regarded him for a moment, then quietly returned to his tea."
 SRU_Luka_Phase_One.9.a:0 "Activate Tannenbaum."
 SRU_Luka_Phase_One.10.t:0 "The Antonov Plot"
 SRU_Luka_Phase_One.10.d:0 "SIBERIAN PEOPLE'S REPUBLIC \n\nMAIN DIRECTORATE OF INTELLIGENCE (GRU) \n\nEYES ONLY - CHAIRMAN LUKA ZHUKOV \n\nCLASSIFICATION: TOP SECRET \n\nDATE: REDACTED \n\nSUBJECT: Attempted Assassination of Grand Duke Velaines, Euro-Britannia \n\nSummary of Operation: \n\nAn armed action was initiated by a three-man Socialist Cell operating in the Okhotsk capital district in Euro-Britannia. The intended target was the Grand Duke Velaines, en route to a meeting with Emperor Charles Zi Britannia. The attack was to proceed via two vectors of attack. The primary vector being sniper fire from an elevated position and the secondary vector being an improvised explosive device concealed along the motorcade route. The attempt failed due to the unexpected intervention of Michele Manfredi, identified as a key military figure in one of Euro-Britannia's holy orders, the special military organisations that operate within Euro-Britannia. \n\nThe Socialist Cell that undertook this operation sustained two casualties, and the third operative was captured attempting to flee the area. As a result of this operation, Euro-Britannian intelligence structures have begun a sweep operation inside their capital, likely to be extended to the rest of the occupied territories. \n\nDIRECTOR'S COMMENT (FOR CHAIRMAN'S REVIEW) \n\nThe operation's failure, while regrettable, may serve our broader aims if managed with a more delicate hand. Euro-Britannia now hunts phantoms within its own territory. We can manipulate their investigation to steer them well clear of our operatives embedded inside their government. Furthermore, I would suggest authorising Agent Tannenbaum to eliminate the remaining member of the cell to ensure all loose ends are tied up. \n\nFiled by: \n\nLt. Col. Pavel Yermolov \n\nDeputy Director, GRU \n\n§RTHIS DOCUMENT IS TO BE DESTROYED AFTER BEING ISSUED TO RELEVANT PARTIES§!"
 SRU_Luka_Phase_One.10.a:0 "What a pity."
 SRU_Luka_Phase_One.13.t:0 "Seven Minutes to Midnight"
 SRU_Luka_Phase_One.13.d:0 "The wind howled outside the frosted windows of the central bureau building. Inside, the room was cold and dim, the atmosphere broken only by the scratching of paper and the soft hum of the office lights above. Piles of production charts, transport manifests, and casualty reports covered the long table. Leonid Zaytsev sat at the far end, his face worn from another long workday. Across from him, Premier Luka Zhukov stood motionless observing a hastily modified wall map of Russia with pins and red strings connecting battlefronts, depots, and dead cities alike.\n\nZaytsev exhaled through his nose, voice low due to the fatigue. “We’re burning through everything we have left. Every factory has been mobilised, every train diverted to transport soldiers to the front. At this rate, we’re consuming the country faster than we can defend it. Six months from now, there won’t be anything left to govern even if we win the war. This method of approach is unsustainable for us right now.”\n\nLuka didn’t turn. His eyes traced the borders of the map like a general surveying a battlefield. “And if we don’t win, Leonid? Then there will be no people left to feed, no factories and no revolution. The war is the nation now. Survival has replaced ideology.” Luka said. “You speak as if there’s no middle ground,” Zaytsev said, his tone hardening. “I’m not asking for a miracle, just order. Bread for the workers. Steel for the factories. Build now, so that when the guns finally fall silent, we’re not left ruling over piles rubble and bones.”\n\nFinally, Luka turned. The light was casting an unnatural shadow upon his face. “You want to build while the revolution is ablaze,” he said bluntly. “I want to ensure the revolution is still standing no matter what it must endure.” Zaytsev’s hand trembled as he crumpled a production report. “We’re mortgaging the Revolution itself, Comrade Chairman. What happens when the people are too starved to believe in it? When socialism becomes nothing but a barracks and a uniform?”\n\nLuka stepped closer, his shadow stretching across the table. “And what happens if we pause, if we hesitate, and the enemy devours us whole? The Revolution isn’t an idea anymore. It’s a living machine. It consumes because it must. For now at least.” Zaytsev met Luka’s gaze. “Then make it a machine that knows when to stop. Or one day it’ll consume you too.”\n\nFor a long moment, Luka said nothing. Then, almost gently, he placed a hand on Zaytsev’s shoulder. “When we have a country again, Leonid. You’ll get your wish. Your fate. Your destiny.” He paused, voice dropping to a whisper. “But until then, let me win the war.” The lights flickered, casting their shadows against the wall map: one standing, one seated, two men bound by the same revolution, staring into the same darkness but seeing entirely different ends."
 SRU_Luka_Phase_One.13.a:0 "Seductive charts bury me desk."
 SRU_Luka_Phase_One.14.t:0 "An Eternal War"
 SRU_Luka_Phase_One.14.d:0 "Snow falls through the skeletal frame of a half-built military factory, the snow settles on steel beams and the frozen earth. Floodlights hum in the pale afternoon, casting long shadows over the workers toiling away. The artillery fire in the distance feels heavier than the cold itself. Leonid Zaytsev stands amongst the construction workers, a fur-lined coat draped over his shoulders, boots crunching on the fresh coat of frost. Around him, workers haul steel, engineers shout over harsh Siberian wind and military officers act as overseers watching the workers' movements. This frozen tundra is becoming the first cog of a great war machine.\n\nZaytsev studies a blueprint and addresses the site engineer beside him. “You’re behind schedule. The reinforced cooling systems for the lathe chambers must be installed before the frost hardens. Without them, the second production line will fail before spring.” The engineer shifts uneasily. “We’re short on copper tubing. It’s been redirected to the munitions plant on the South Eastern Front. Colonel Baranov’s orders.” Zaytsev doesn’t look up from the schematics he is currently observing. “Divert it back. If they want bullets in the spring, they’ll need the machine that makes the casings.” He finally meets the man’s eyes. “And tell Baranov, if he disagrees, he may bring his complaints directly to Premier Zhukov and explain how he plans to fire artillery without his gun barrels.”\n\nHe moves through the site, passing rows of conscripted workers unloading steel in preparation for phase 2 of the construction. ZTheir faces are pale, eyes hollow, and hands trembling from the cold and exhaustion. Zaytsev watches them quietly, thinking, “One day these people won't have to toil away in a factory, once the war is won Siberia will be transformed into something much greater.”\n\nA foreman jogs up beside him. “Sir, some of the men say the ground’s cursed. The tsar’s prison stood here once. They still find old shackles in the dirt. It’s bad for morale.” Zaytsev without a care in the world. “Then let it remind them what happens when they serve tyranny instead of progress.” He ascends a half-finished catwalk and looks down over the assembly floor: cranes swinging, sparks flashing, and columns rising into the sky. For a rare moment, the noise below fades into nothing. “One day,” he murmurs to himself, “they’ll call this a monument to victory. They won’t remember the frostbite or the hunger, only the tools of war.”\n\nThe floodlights hum louder, and the first whistle of steam pierces the cold wastes of Siberia, the birth cry of another weapon in Luka Zhukov’s new Russia."
 SRU_Luka_Phase_One.14.a:0 "All for progress."
 SRU_Luka_Phase_One.15.t:0 "Calculating The Future"
 SRU_Luka_Phase_One.15.d:0 "The fog rests thick over the frozen trenches; in the distance are the dull thumps of distant artillery and the cries of shellshocked troops cowering in the trenches below the hail of thunder. Half-buried corpses lie stiff in the mud; others rest in shallow graves where frost clings to their bloodied uniforms. On a raised platform of sandbags and rusted steel, two figures watch over the shattered landscape, now a battlefield, the harbinger of death. Shohei Nakahara stands motionless, binoculars pressed to his face. Beside him, Leonid Zaytsev lights a cigarette, his fingers trembling not from fear but from the Siberian cold.\n\nAfter a long silence, Zaytsev exhales, the smoke rising into the grey sky. “So this is what our revolution looks like: dead soldiers, broken machines, and mud that swallows them both.” Shohei doesn’t turn, his tone flat. “No. This is simply a means to an end. As long as the army is supplied, the revolution endures to see tomorrow.” Zaytsev’s expression hardens. “The economy is collapsing under the weight of this war machine we have concocted. I’m asked to work miracles with nothing to create said miracles. Siberia has nothing left to give.” He takes another whiff of his cigarette. “Tell me, how long do you intend to bleed us dry in the name of strategy? Lady Euthanasia gets a free hand to shoot whoever she wishes, while I’m told to build utopia atop a graveyard while some of the brightest minds this frozen wasteland had to offer lie dead just yonder.”\n\nShohei lowers his binoculars, finally meeting Zaytsev's stare. “You misunderstand me, Leonid. I know the cost of war too well. The Britannian invasion of Japan taught me this much: armies fall when their economies do. We cannot win on zeal alone.” Zaytsev flicks the cigarette into the snow. “Then we agree. Ideology alone cannot win this war, let alone keep this country going for a few more years of war. But maybe I can sustain your quotas on one simple condition.” Shohei’s brow rises. “A condition?”\n\nZaytsev glances toward the horizon. “An alliance. To contain Kulikova and her Cheka. She’s chaos wrapped in a uniform; she’ll burn everything that the Chairman and our people have built.” Shohei lets out a quiet laugh, rare and sharp. “So that’s it. You’re afraid of losing your influence. You fear entropy itself; you're afraid the revolution will devour its own architects.” Zaytsev’s reply is honest but tense. “Yes. I fear her because she kills without purpose; she does it for pleasure. I only ask that when this war ends, you choose the right side of history.”\n\nShohei sighs, adjusting his gloves. “Politics bores me, Leonid. But for the sake of stability and the Chairman, I’ll help restrain her. In return, my divisions receive priority for all war goods. No exceptions.” Zaytsev nods, a smile breaking through his cold exterior. “Agreed. When this war ends, we’ll build something better than this ruin we find ourselves in.” Shohei turns to leave, boots crunching through the frost. As he walks into the fog, his voice drifts back, calm and distant, “If it ever ends at all.”"
 SRU_Luka_Phase_One.15.a:0 "War, war never changes."
 SRU_Luka_Phase_One.18.t:0 "A Nation Run By Ledgers"
 SRU_Luka_Phase_One.18.d:0 "The lamps are low and the halls quiet. Zaytsev sits by the fire in his office, weary from another day of meetings, tea cooling on the table in front of him. The door creaks; he reaches for his pistol but relaxes when Marianna Sorokina, the head of the G.R.U., steps in, a folder clasped to her chest. \n\n“Ah, Marianna, I forgot we had a meeting scheduled.” Zaytsev said, folding his arms. “Comrade Zaytsev,” Marianna said as she sat and laid the folder between them. “Thank you for seeing me. On such short notice.” Her voice was calm, but a hint of distress could be felt behind her calm demeanour. “As you know, we promised a more comprehensive civilian development programme. I was wondering if you would allocate some funds to the proposed cultural programmes listed in the file?”\n\nZaytsev skimmed the file for a few moments before answering. “If your aims were purely altruistic, you’d go to a minister of lower ranking rather than bothering me with this. You know that.” She met his gaze. “Let’s cut to the chase. You know why I came. Kulikova has spies within our government. I need somebody I can trust to redirect funds through civilian infrastructure; if you were to do it, then Kulikova might think twice before cracking down on the Youth Corps. These brigades are the future cadres; without them we hollow out the revolution’s spirit.” He closed the folder, then took a sip of his tea. “Marianna, picking sides is something I don't do, at least not yet.” \n\nMarianna had an unsurprised look on her face. “But you already have; I heard about the incident she caused in your bureau planning meeting,” she said softly. A small, wry frown touched his mouth. “Does Luka know about this little scheme?” She glanced sadly toward the window where the city’s dark silhouette lay. “The Chairman is preoccupied with matters of the state. He trusts the cadres he trusts; I don't seem to be one of them. His inner circle shrinks with each day.” Zaytsev sighs. \"Listen, Marianna... The war has taken its toll on all of us. Once the war is over I can assure you that Kulikova will get what she deserves. But for now she still has her uses to the Chairman. I can provide a little aid or, more likely, feed her false intel to keep her distracted.\"\n\nMarianna stood, disappointment lingering behind her eyes. “It won’t be enough. She’s taking a personal interest in my downfall.” She grabbed the folder and turned to the door. As she opened it, Zaytsev’s voice followed her as she stepped to the door. “Marianna... if Luka keeps you at a distance, it’s not because he distrusts you. It’s to keep you safe.” She paused, her hand resting on the doorframe. For a brief moment, a mix of anger and sadness crossed her face. Then she stepped into the corridor, leaving Zaytsev alone to his late-night work."
 SRU_Luka_Phase_One.18.a:0 "An interesting night indeed."
 SRU_Luka_Phase_One.19.t:0 "The Numbers That Bleed"
 SRU_Luka_Phase_One.19.d:0 "The ballroom was a haze of perfume, music, and the dull conversations of officials pretending to enjoy themselves. Zaytsev moved through the crowd, making idle conversation with a few party officials here and there, trying to mask his boredom. It was one of Chairman Zhukov’s endless “unity” receptions, a de facto loyalty pledge to the Chairman and the party.\n\nHe was speaking quietly with Shohei near the balcony when a Cheka officer approached him and whispered something in his ear. Zaytsev froze for a few moments before excusing himself. He followed the officer through a side corridor draped in red curtains and portraits of the revolution’s previous figures, long dead by now. The music from the ballroom grew distant and muffled, and eventually it ceased altogether.\n\nThe door at the end of the corridor opened without a knock as if they knew he was coming. Inside, the light was dim, a stark contrast from the illustrious lighting in the rest of the mansion; a single desk lamp was illuminating the room. Tasha Kulikova stood by the window, cigarette in hand; the faint smell of smoke plagued the room. Her uniform was immaculate; her tone, on the other hand. “Comrade Zaytsev,” she said without turning from the window. “You’ve been busy.” The Cheka officer closed the door behind them. Zaytsev asks. “Why have you summoned me here, Tasha? I haven't the time for this.”\n\nKulikova smiled and turned to face him. “I admire that composure of yours. Even when I have evidence of your collusion with other party members to embezzle funds.” She flicked ash into a tray shaped like a bear’s skull. “You’re not very subtle; to be honest I am disappointed.” Zaytsev straightened his tie and spoke confidently. “Everything I do is documented. You of all people should know that.” “That’s precisely what worries me,” she said, stepping closer. “I know you are colluding with Sorokina against me, you of all people should know the Chairman frowns upon such skulduggery.” He met her gaze, calm, almost tired. “If you plan to accuse me of treason, Tasha, at least do it properly. Call your thugs, draw your pistol, and save us both this farce.”\n\nKulikova stopped just in front of him. “I could, but there wouldn't be any fun in just killing you outright.” She reached out and brushed imaginary dust from his lapel. “I think... For now I would get a lot of enjoyment out of watching how paranoid you get. Always looking over your shoulder, ensuring I am not watching your every move.” Zaytsev leaned slightly closer, lowering his voice. “You don't frighten me, Lady Euthenasia.” She smiled wryly. “In time, Leonid, you will learn to fear me; all it takes is one word to the Chairman, and your life is over.” The silence lingered between them. The distant hum of the orchestra could be heard faintly through the walls.\n\nZaytsev adjusted his cufflinks, turned toward the door, and said quietly, “I never took you for the gambling type, Comrade Kulikova, but if you truly believe the Chairman will believe your word over mine, then you have severely overestimated how valuable you are.” Kulikova exhaled smoke and watched him leave; her murderous stare was burning a hole in his back as he left. When Zaytsev returned to the ballroom, the music had changed to a slower drum. He smiled to himself almost out of whimsy, picked up another glass of champagne, and rejoined the crowd as if nothing had happened, as if his archenemy wasn't actively plotting to kill him."
 SRU_Luka_Phase_One.19.a:0 "She will regret this."
 SRU_Luka_Phase_One.20.t:0 "Efficiency Over Ideology"
 SRU_Luka_Phase_One.20.d:0 "The central bureau is busy as always. Inside, a meeting is underway within its reinforced concrete walls. Dim lights flicker overhead. The air smells of paper and cold coffee. A freshly hoisted banner hangs above the room: “Work is victory. Labour is loyalty.” Around the table sit Leonid Zaytsev, the Commissar for Economic Reconstruction, and Tasha Kulikova, the Chief of the Cheka. Also present are Ekaterina Volkova, responsible for Infrastructure and Logistics; Dr Yuri Ginsburg, an industrial economist; and Maxim Rudin, the Labour Mobilisation Director.\n\nThe table is cluttered with maps marked by red lines and factory sites, population charts, and supply routes. The sound of pencils scratching is almost maddening. Zaytsev points to a map. “We can complete several manufactories near Novosibirsk within six months. If the war continues to progress favourably, our economy is poised for significant improvement over the next two years. Opening several avenues of expansion economically speaking.” Volkova nods. “There’s massive hydroelectric potential along the Lower Lena River. If secured properly, it could satisfy our energy needs for decades to come.” Rudin speaks next, his tone strained. “We also need more willing labourers. Half the workforce is comprised of criminals; the other half were conscripted as part of our national labour programme.”\n\nKulikova leans back in her chair, stretching her arms wide, her voice sharp and cold like the edge of a spear. “You speak as if the war is already over. Your optimism borders on subversion; some could call that treasonous.” Zaytsev doesn’t look at her. “Comrade Kulikova, I am starting to think that the Chairman sent you here to annoy me with your idiosyncratic opinions.” Kulikova smirks. “Starting to think? That is a very dangerous thing you are doing there, Comrade Zaytsev.” Zaytsev turns to her, his tone clipped. “You are starting to test my patience. The only reason you are in such a high position with the Chairman is because he somehow sees some sort of use for your pathetic talents.” The room falls silent.\n\nZaytsev steps closer. “This war cannot be won with your senseless tactics alone. Guns rust, men die. But the great projects I will build will outlast everything. They are the revolution’s true backbone. Even Chairman Zhukov knows that my creations will outlast man.” Kulikova narrows her eyes with a scowl now plastered across her face. “The Chairman puts too much faith in you and your creations; in the end, only fear and terror will keep this nation going.” Zaytsev exhales sharply. “Awfully ambitious, but from what I read of your report, you lack the basic intellectual capability to think about the long term.”\n\nThe tension snaps. Kulikova pulls out her pistol, pressing it hard against Zaytsev's forehead; the other attendees are shocked. “Do you have any last words because I am ready and willing to execute everybody in this room right here and now?” Zaytsev maintains his calm demeanour, but a line of sweat drips down his temple. “Go on, do it; unlike all the other people you have killed, my death will have tremendous consequences for you—” CLICK, she presses the trigger, and Zaytsev falls back onto the floor. The pistol was empty, and Kulikova was laughing like she had just heard the funniest joke in the world. “If boredom were treason, I’d have you all executed.” She eventually calms herself and leaves the meeting with Zaytsev still shocked that she pressed the trigger."
 SRU_Luka_Phase_One.20.a:0 "Who gave her a gun?"
 SRU_Luka_Phase_One.21.t:0 "A Pact With An Angel"
 SRU_Luka_Phase_One.21.d:0 "Marianna Sorokina stood at the edge of a long, wooden-furnished table, gloved fingers resting lightly against its surface. Across from her, Field Commander Mikhail Kovalev studied the Frontline map in silence, his expression unreadable. Neither of them trusted the other. That much was clear. “Comrade Kovalev\", Marianna began, her voice echoing, \"You've been difficult to reach.” Kovalev didn’t look up. “I’ve been busy winning this wretched war.” A pause. Then his eyes lifted to meet hers. “And you’ve been busy watching from the sidelines.” Marianna allowed the slightest hint of a smile. \"Well, observation is part of my duty.” An unimpressed look found its way on Kovalev’s face. “So is surveillance.” Kovalev corrected. “Control is Kulikova’s obsession. Which one is yours?” Marianna smiled. “Neither,” she replied calmly. “I’m here because the war is turning into an unnecessary bloodbath.” That got his attention. Kovalev straightened slightly. “Go on.”\n\nMarianna stepped closer, now leaning on the table between them. “The current military structure is fractured. The Cheka has been interfering with command decisions for far too long. The officers are kept in place by fear of what the Cheka will do to them if they step out of line.” She tapped the table lightly. “You know this.” Kovalev’s jaw tightened. “I’ve buried good comrades because someone higher up the chain decided they were 'unreliable'.\" Kovalev’s expression grew grim. “Exactly,” Marianna said. “All of these decisions have been made in order to prolong the war to the benefit of Kulikova and her Cheka.” Silence settled between them again. “And what are you proposing?” he asked. Marianna met his gaze directly. “A division of influence.” Kovalev’s expression hardened. “Sounds like politics to me.” Marianna smiled. “It is,” she said plainly. “But it’s also survival; your predecessor was deemed uncooperative by the Cheka. You will likely meet the same fate if you don’t accept my help.” She pulls out a file and places it on the table in front of Kovalev. “In this file are the names of Cheka operatives currently operating within both the GRU and military. I am asking for your help in winning this war, not just for power but to save all the lives that will be lost if this terrible conflict becomes consumed by the wanton ambitions of Kulikova and her ilk.”\n\nKovalev looked down at the file, then back at her. “You’re aware if I open this file I will be condemning myself to the same fate as you?” Marianna’s tone cooled. “I am; if you help me, together we can destroy her, saving millions in the process.” A faint scoff escaped him. “You think you can destroy her? Premier Zhukov backs her; she is de facto untouchable.” Marianna’s tone hardened “Alone I am no match for her,\" she admitted. “But with your support we can limit her reach for now; eventually Chairman Zhukov will have no further use for her, then we can strike her.” Kovalev stepped away from the table, folding his arms. “Why are you really doing all this?” he asked. Marianna sighs. “I’m doing this so when this war ends there will at least be something left to govern,” she replied. “If that requires putting my life on the line for my ideals then so be it.” Another pause. Kovalev exhaled slowly. “And what happens when the war is over?” Marianna closed the file. “Then we get to decide what kind of state emerges from the ashes of Russia.” He took a moment to think to himself, weighing certain death against absolute conviction. Finally, he extended a hand. “Very well,” he said. “For a better future.” Marianna smiled and took it without hesitation. “For the future.” Their handshake was firm. As Marianna turned to leave, Kovalev spoke again. “If this turns into another game of shadows…” She paused at the doorway, not looking back. “Then we’ll both lose,” she said quietly. Kovalev was left to contemplate the future."
 SRU_Luka_Phase_One.21.a:0 "‘A just cause most righteous in nature.’"
 SRU_Luka_Phase_One.22.t:0 "A Deal With The Devil"
 SRU_Luka_Phase_One.22.d:0 "The encampment squatted at the edge of the Siberian wastes. Canvas tents stretched across the earthworks, and armoured vehicles sat half-buried in frozen mud. Inside the command tent, a long wooden table was crowded with maps, field radios, and exhausted officers. Shohei Nakahara sat at its head. Generals argued in low, tense voices, fingers tapping across various maps. Armed soldiers stood along the edges of the tent, rifles slung low, eyes alert. The war had made everyone wary. Then the tent flap opened. Tasha Kulikova stepped inside, dust and frost clinging to her coat after the long drive through the wastes. Any conversation died almost instantly. Shohei rose. “Everyone out.” The generals hesitated. “That includes you,” he said, his tone sharper than ever. “And the guards.” A murmur passed through the tent, but rank prevailed. Chairs scraped against the ground. Maps were gathered in haste. One by one, officers and soldiers filed out until the tent grew silent, leaving only Nakahara and Kulikova.\n\nKulikova removed her gloves and placed them carefully on the table, as if this were an office in Moscow rather than a battlefield command post. “You’ve consolidated authority quite quickly,” she said. “The chairman chose well.” Shohei remained standing. “If you came to congratulate me, you’ve wasted a long drive.” A faint smile touched her lips. “I came to ensure your command survives, Supreme Commander.” She slid a thin folder across the table. “I recognise that you are not a man who can be controlled through threats or violence,” she continued. “So I bring a gift and the possibility of a mutual understanding between the Cheka and the military.” Shohei did not touch the folder. “You’re asking for submission.” Kulikova grinned. “I’m offering cooperation,” Kulikova corrected him. “The kind that keeps your rear secure while you focus on winning the war.” Shohei raised his brow. “And the cost?” Her gaze did not waver. “When the Cheka acts, the army does not interfere. When certain individuals disappear, questions are not asked.” A long silence followed.\n\nShohei exhaled slowly. “That is not an alliance.” Kulikova gave a quiet scoff. “No. An alliance would suggest I trust you.” She leaned forward slightly. “Think of it as a mutual understanding. We both serve the same master. The methods need not concern us, so long as the outcome serves his will.” Shohei finally glanced down at the folder. “And if I refuse?” Kulikova stood, calmly reclaiming her gloves. “Your predecessor refused. His career ended as his life did, in a ditch, rotting with the rest of history’s mistakes.” She turned toward the exit. “War rewards decisiveness, Supreme Commander. Inaction is often more fatal than it may seem.” The tent flap opened. Cold air flooded in. Shohei remained standing alone, the unopened folder resting on the table before him, his thoughts fixed not on the war outside, but on the state that would emerge after everything ends."
 SRU_Luka_Phase_One.22.a:0 "‘Prepare For Unfortunate Consequences.’"
 SRU_Luka_Phase_One_Politics.1.t:0 "A Lesson In Political Theatre"
 SRU_Luka_Phase_One_Politics.1.d:0 "It was another restless day in the congressional theatre. Sonya had not been seen in months, leaving Mikhail Kulakov to lead the main opposition, while Jacobin membership continued to surge. Inside the congressional hall, the tension was palpable, the endless bickering of politicians echoing off the marble walls of the chamber.\n\nHigh above them, Luka Zhukov stood on a balcony overlooking the entire chamber, watching in silence. Zaytsev joined him moments later, adjusting his coat before saying, “So this is where you wandered off to.” Luka replied without looking away, “The cabinet meetings bore me. I needed time to think.” Zaytsev gave a short laugh. “Hard to believe how far we’ve come. We’re no longer a fringe movement; we are the government now.”\n\nLuka smiled faintly. “Yes. But there’s still much to be done.” Zaytsev’s tone darkened. “We’ve done terrible things to get here. Do you really think it will all be worth it?” Luka turned slightly toward him. “Leonid, is that a hint of a conscience I detect? You should be very well aware by now that we’ve all chosen the path of the Jacobin; for us there is no turning back.” Zaytsev shrugged. “Maybe. Still, I’d like to see this project of ours through to the end.” Luka cracked a fake smile.\n\nA sharp crack of a gavel cut through the noise below. The chamber fell silent. All eyes turned toward the podium, where Mikhail Kulakov stood, his presence commanding. “Well,” Zaytsev murmured, “this should be interesting.” Luka said nothing, his gaze afixed on the man daring to speak out so blatantly against his authority.\n\nKulakov’s voice filled the hall. “Fellow delegates of the VKP and other parties. Our nation is at war for its very soul, and yet, what do I see? Endless arguing. Paralysis. The gears of government have jammed, grinding backward against freedom and progress.” He paused, letting the words hang in the air before continuing, “That is why I, Mikhail Kulakov of the VKP, along with Dimitri Yakovlev of the People’s Democratic Alliance, will form a coalition to turn those gears once more toward a future worthy of Russia.”\n\nAs applause rose from the opposition and even some VKP members, Kulakov sensing Luka's stare of death looked up at the balcony. Luka already met his gaze, arms folded, expression unreadable like wearing a mask but a faint hint of menace was seeping from the cracks in his well crafted mask. From above, he looked less like a man and more like a shadow looming over the chamber, watching a challenge to his power take shape below."
 SRU_Luka_Phase_One_Politics.1.a:0 "This possibly can't end well for you Kulakov. (Purge)"
 SRU_Luka_Phase_One_Politics.1.b:0 "Leonid we must ensure Kulakov does not succeed no matter what. (Compromise)"
 SRU_Luka_Phase_One_Politics.2.t:0 "Lessons of the French Revolution"
 SRU_Luka_Phase_One_Politics.2.d:0 "Zaytsev sat across from Luka’s desk, the dim glow of the fireplace casting restless shadows across the room. He flipped through a worn copy of Reflections on the French Revolution, its edges yellowed and frayed from use. He glanced up, his voice calm but edged with irony.\n\n“France had Danton. We have Kulakov. While they have different blood. They represent the same problem for us.” Zaytsev pondered. Luka leaned back in his chair, fingertips pressed together, eyes fixed on the fire. “And Robespierre had virtue,” he murmured. “Or so he said until the guillotine took his head from his shoulders.”\n\nLeonid gave a dry laugh. “Virtue makes for poor governance. Fear, on the other hand, is controllable. Empires have been founded on it.” Luka’s gaze softened. “So was Thermidor,” he replied quietly. “Fear will never be enough on its own. It corrodes everything, even the hand that wields it.” Zaytsev raised an eyebrow. “You ordered the purges, Luka. Not me.” Luka turned to him, unwavering in his resolve. “I did. Because we couldn’t afford to be the Girondin idealists paralysed by debate while our enemies loaded their guns. We acted, and now the nation breathes because of it.” He tapped a finger against the desk. “But we must take care to ensure we do not meet the same fate as the Archangel of Terror, I wonder though, did he truly believe what he preached? Or did he simply know when belief was useful?”\n\nZaytsev leaned back, studying Luka. “You think we’re approaching our own Thermidor?” Luka cracked a smirk. “No. Because unlike them, I know it’s coming. And I intend to survive it, overcome it even.” Zaytsev closed the book, setting it down on the table. “History remembers revolutions,” he said. “But it forgets it's leaders. You know that, don’t you?” Luka turned facing the flames once more. The light painted his face in a fiery shadow. “Yes,” he said. “But leaders decide how long a revolution survives, if it is to even be remembered at all.”\n\nZaytsev’s expression darkened. “Eventually, the people will see us for what we really are: monsters of the revolution.” Luka’s jaw tightened. “Let them,” he said with disdain. “History doesn’t care about monsters. It only remembers it's victors.” He started pacing slowly toward the window, his reflection passing faintly in the glass of the framed portraits that lined the walls, portraits of those long since purged, a reminder of the countless sacrifices. “The revolution”, Luka continued, voice soft but unwavering, “will continue as long as I do. It will end when I end. Without my leadership it will crumble to dust.”\n\nZaytsev’s voice softened. “And when will the Revolution be safe?” Luka turned his head slightly, the glow of the sun piercing through the windows illuminating his figure. A long pause filled the air before he spoke. “When the last empire falls.” The clock ticked. The fire cracked. And the two men, architects of fear and believers in destiny, sat in silence, listening to the slow, inevitable march of their creation."
 SRU_Luka_Phase_One_Politics.2.a:0 "Lessons can be misleading."
 SRU_Luka_Phase_One_Politics.3.t:0 "Dark Is The Night"
 SRU_Luka_Phase_One_Politics.3.d:0 "Rain hammered the silent streets of Novosibirsk, the city flickering under the occasional glow of street lamps. In his dimly lit office, government minister Nikolai Lebedev sat alone, cigarette smoke floating above his desk lamp. His eyes lingered on a photograph of his daughter, Anya, before the telephone rang.\n\n“NIKOLAI!” a panicked voice shouted, the voice belonged to Aleksei Popov from the fourth floor. “Aleksei, calm down, What’s wrong?” Nikolai sighed. “THE CHEKA IS HERE! They’re taking people outside. Have you not heard the gunfire?” Aleksei said with desperation. “You’ve been drinking again, Aleksei?” Nikolai laughed nervously. “LOOK OUT YOUR WINDOW!” Aleksei shouted.\n\nThrough the rain, Nikolai saw trucks, soldiers, and flashes of light. Gunfire cracked across the courtyard. When he picked up the phone again, Aleksei was pleading, “Please, I’m loyal to the state—” before a gunshot ended the call.\n\nFor twenty minutes, the building echoed with screams and gunshots, then silence. Nikolai sat frozen, his sweat cutting through the chill air. Footsteps echoed in the corridor, slow, deliberate and drawing closer with each second that passes. Then followed by a knock at the door.\n\nThe door opened. A Cheka officer stepped into the dim light, face obscured. He turned off the radio, plunging the room into suffocating a silence. “Hello,” the officer said. “Hello,” Nikolai answered weakly. The officer reached into his coat. Nikolai shut his eyes, waiting for death.\n\n“Cigarette?” the officer asked, lighting one for him. Nikolai accepted. “Do you know why I’m here, Comrade Lebedev?” “I do not.” Nikolai replied.\n\n“Your ministry is accused of treason and counter-revolutionary activity under Ordinance 757. All members are to be terminated.” The officer stated with an emotionless tone. “Not all were guilty.” Nikolai’s voice trembled. “The burden of the many”, the officer replied coldly, “is carried by the individual.” A quote from the Chairman himself.\n\nAs Nikolai looked again at Anya’s photograph, his vision blurred. He gasped, “Poison...” before collapsing. The officer watched impassively, blood spattered across his uniform from the other victims of the massacre. A faint smell of gasoline filled the room, then a spark. Flames consumed the office, roaring through Government District 6, cleansing Nikolai and his colleagues in the fires of revolution."
 SRU_Luka_Phase_One_Politics.3.a:0 "§tAnother life snuffed out.§!"
 SRU_Luka_Phase_One_Politics.4.t:0 "An Old Memory Long Forgotten"
 SRU_Luka_Phase_One_Politics.4.d:0 "The night was quiet, too quiet for Novosibirsk. Only the wind outside broke the silence, howling faintly through the cracks in the window. Inside, Pyotr Opokin sat in his chair, staring at the small fire burning low in the hearth. Across the room, the clock ticked steady, patient and unfeeling. He had been waiting for over an hour. Then came the knock. Three slow, deliberate taps.\n\nPyotr smiled. “He’s here,” he muttered, straightening his coat. He opened the door. Luka Zhukov stood there, framed by the dim hallway light. His coat dripped faintly with rain, his eyes dark and unreadable. “Premier,” Pyotr said, forcing a grin. “I didn’t expect you tonight.” “I didn’t expect to come,” Luka replied simply. His tone was soft, too soft. “Then what changed your mind?” Pyotr asked.\n\nLuka stepped inside without answering. His gaze drifted to the small table by the fireplace; two glasses, a decanter of brandy, and a pistol lay neatly between them. “You prepared this for me?” Luka asked. “Of course,” Pyotr said with a chuckle. “I always keep something ready when you visit. You never know when business might turn into pleasure.”\n\nLuka sat down opposite him. The fire crackled quietly. For a while, neither spoke. The silence was heavy to the point of being almost suffocating. Finally, Pyotr leaned forward, his voice casual but curious.\n\n“So”, he said, “who is it this time?” Luka looked up. “Who is what?” “You know what I mean.” Pyotr smirked, tapping the table beside the gun. “Who do you want me to kill next?” Luka’s eyes softened. He raised his index finger and tapped his forehead. Pyotr blinked. “What?” Luka’s finger remained pressed against his forehead. “Here.” Pyotr laughed nervously. “Heh... That’s a good one. You almost had me there, Luka.”\n\nLuka didn’t laugh. The smile slowly faded from Pyotr’s face. “You’re... you’re not joking.” Luka picked up the pistol. He weighed it in his hand, staring at it like something so distant yet so familiar. Then he stood, turning toward the fire. “You know,” Luka said quietly, “I died once, I experienced the end for a few moments but I felt so free when I was there.” Pyotr frowned. “What are you talking about?”\n\n“It was quiet there. Peaceful. I think... that’s where I’m meant to go.” A hint of sadness plagued Luka's voice for a moment. “Luka,” Pyotr said, unease rising in his voice, “you don’t have to—” The sound came fast: one sharp crack that echoed off the stone walls. Pyotr slumped back in his chair, eyes wide, mouth still half open as if trying to form a word that never came, a bullet hole perfectly place in the middle of his forehead. Luka now facing Pyotr his arm stretched out, the barrel of the pistol still smoking. The flames from the fire glimmered against his eyes, making them look almost golden. “Pyotr,” he said softly. “There’s nowhere left for you to go.” The fire crackled on, indifferent to what just occurred.\n\nLuka stood there for a moment, watching the smoke rise toward the ceiling. Then he gently placed the gun back on the table and whispered to himself, “It’s from a memory only I have... that place is where I must be.” He buttoned up his coat, turned, and walked out the door. leaving Pyotr behind now as a corpse to rot."
 SRU_Luka_Phase_One_Politics.4.a:0 "Goodbye Pyotr."
 SRU_Luka_Phase_One_Politics.5.t:0 "The Great Terror"
 SRU_Luka_Phase_One_Politics.5.d:0 "Krasnoyarsk lay under a suffocating gloom. The war had drained the city of it's best and brightest, a storm was hammering the city. Police Chief Sidorov was jolted awake by a midnight call, an emergency from the mayor’s mansion. He dressed hastily, drove through empty streets, and found a lone squad car outside the mansion, its lights flashing but no officers in sight. The front door hung off its hinges, splintered from being forced open. Inside, silence.\n\n“Hello!?” Sidorov called out. No answer only the shape of a dead bodyguard on the floor. Gun drawn, Sidorov climbed the stairs and burst into the mayor’s office. The mayor lay dead beside a fallen policeman. “What the hell—” he started saying, before feeling cold metal press to the back of his head.\n\n“Drop the gun, Sidorov,” a voice ordered. He obeyed. A Cheka officer stepped from the shadows and gestured to the desk. “Sit.” Sidorov complied and sat across from the dead mayor, sweat running down the sides of his face. The silence broke when the red telephone on the desk rang. The officer answered, listened briefly, then handed it to Sidorov. “It’s for you.”\n\nSidorov lifted the receiver.“Hello, Comrade Sidorov,” came a calm woman’s voice. “How are Tatiyana and little Lena?” His heart stopped. “HOW DO YOU KNOW THEIR NAMES!?” he shouted. “Mr Sidorov, we know everything. They’ll be safe if you cooperate.” The woman continued, her tone light, almost playful. “A pity about the mayor. Treason, corruption... and now, murder. Terrible, isn’t it?”\n\n“I DIDN’T KILL HIM!” Sidorov shouted. “Of course not,” she replied. “But the investigation will say otherwise unless you help us tidy things up.” she said obviously smiling on the other end. “Who are you?” Sidorov asked. “I am Chief Tasha Kulikova of the Cheka,” she said. “You’ve seen me on television, no?” She explained: the mayor had outlived his usefulness, and someone must be held accountable. A young man, bound and terrified, was wheeled into the office. “This one”, Kulikova said, “is a known counterrevolutionary. You’ll name him the killer. In return, your family remains unharmed. Perhaps even a promotion, Commissioner Sidorov has a nice ring, doesn’t it?”\n\nSidorov hesitated, thinking only of his wife and daughter. “Fine, just leave them out of this.” he whispered in defeat. “Excellent,” said Kulikova. “Then we understand each other.”  The officer redialed the precinct and handed Sidorov the phone. “This is Chief Sidorov,” he said hollowly. “The mayor is dead. I have the suspect in custody. Send backup immediately.”\n\nWhen the line went dead, the Cheka officers vanished into the night. Alone with the corpses and the lingering smell of gunpowder, Sidorov lit a cigarette. Smoke filled the air and guilt settled in. He had saved his family. But he had also sold his soul to the devil."
 SRU_Luka_Phase_One_Politics.5.a:0 "§tWhat have I done?§!"
 SRU_Luka_Phase_One_Politics.6.t:0 "A Great Revolutionary Fire"
 SRU_Luka_Phase_One_Politics.6.d:0 "Night cloaked Novosibirsk in darkness, illuminated only by the roars of flames consuming the sixth government district of the city. Firefighters battled the inferno as soldiers sealed off the streets. At the heart of the chaos stood Premier Luka Zhukov, Tasha Kulikova, and Leonid Zaytsev.\n\nKulikova handed Luka a file. “Premier, the blaze is destroying everything as planned. The perpetrator, Maxim Konev, is in custody.” Zaytsev frowned at her statement. “All according to plan? Do you realise what the repairs will cost?” Kulikova shot Zaytsev a cold glance. Luka turned from the burning building and spoke. “Leonid, this is a necessary sacrifice. Having a common enemy unites people more effectively than decrees. With this ‘attack’, the revolution and by extension our Jacobin cause will gain even greater authority.”\n\n“There were easier ways,” Zaytsev muttered. Kulikova smirked and said. “You can’t make an omelette without cracking a few eggs.” Luka checked his watch. “It’s time. Let’s finish what we’ve begun.” Two Cheka officers dragged the bound Konev to a makeshift stage as cameras and crowds gathered. Luka stepped to the podium, voice steady but commanding.\n\n“Citizens of Novosibirsk,” he began, “tonight we suffered a grave tragedy. A traitor has struck at the very heart of our government.” He gestured to Konev. “This man, a pawn of counter-revolutionaries and foreign agents, sought to destroy this city’s revolutionary spirit. His actions took the lives of loyal comrades, among them, Minister of technology Nikolai Lebedev.” Luka’s tone hardened. “As Premier and guardian of our revolution, I promise justice. The traitor will be executed, and from this night forward, the Revolutionary Protocols Act will protect our nation from enemies within.”\n\nThe crowd murmured. But Luka pressed on. “Civil liberties will be suspended temporarily. The Cheka will have full authority to root out subversion. These measures may seem harsh, but only through discipline can we survive this storm and build a brighter future.” He paused, eyes reflecting the blaze behind him. “The ruins of this building will rise again, stronger and purer, a monument to the people’s revolution.”\n\nThe cameras cut. Konev was dragged away. Luka and Kulikova rejoined Zaytsev, who watched the fire with grim silence. Luka’s voice was firm but resolute. “The old regime burns tonight, Leonid. From its ashes, the new world begins.”"
 SRU_Luka_Phase_One_Politics.6.a:0 "A cleansing flame burns eternal."
 SRU_Luka_Phase_One_Politics.7.t:0 "Capital Lockdown"
 SRU_Luka_Phase_One_Politics.7.d:0 "An emergency session of the People’s Congress convened in the old parliament hall, a symbolic place from the era of the former republic. The chamber was filled with opposition leaders, a few VKP delegates who were opposed to Jacobin ideals and a few deputies never arrived. Mikhail Kulakov sat with Dimitri Yakovlev, watching the heavy guard whilst trading low suspicions with each other.\n\n“So who called this?” Yakovlev whispered. “I have no clue, but I have a feeling something is off.” Kulakov replied. “Most of the VKP stayed away. And look at the armed guards who. Are they here to keep others out or to keep us in?”\n\nTheir murmuring ceased when Luka Zhukov along with General Shohei Nakahara entered the room. Luka ascended to the podium, hands braced on its edge, he surveyed the room with a slow smile. “Comrades,” he said, theatrically. “I’m glad you made it to the final session of this esteemed chamber.” Confused murmurs swelled as he began to applaud them with mocking sincerity. “You’ve all played your parts as my pawns.” He laughed, and then his smile vanished. “But all things must come to an end.”\n\nPanic spread like a wildfire across the chamber's floor. As soldiers fitted their gas masks, Luka lowered his voice. “The new Russia allows no rival thought,” he declared. “To survive the decades of war ahead, we must purge anti-revolutionary ideology and form a new sythesis. As the eternal protector of the revolution, I will annihilate its traitors.” He pointed, pronouncing each delegate guilty.\n\nLuka reached into his jacket pocket and revealed a detonator. “One press of this button, and a new genesis begins.” He proclaimed, then he pushed it. From the chamber’s corners a pale gas hissed out. Luka and Shohei snapped on masks and watched as the exits were sealed and soldiers drove choking politicians back into the all-consuming cloud. Delegates stumbled and gagged; the chaos became madness.\n\nLuka moved through the chaos like a conductor amongst his instruments, savouring each moment of their collapse. As the old assembly choked and eventually fell silent, he stood over the ruined chamber and felt the revolution reborn upon the corpses of its opponents."
 SRU_Luka_Phase_One_Politics.7.a:0 "§tWith this democracy dies.§!"
 SRU_Luka_Phase_One_Politics.8.t:0 "Democracy Redefined"
 SRU_Luka_Phase_One_Politics.8.d:0 "The central hall of the Novosibirsk government, now the seat of the Revolutionary Directorate which was born out of the ashes of the VKP, the hall bearing the decor of the new party with a great red banner; the Jacobin sigil replaced the old VKP crest. The chamber was half full; the rest of its former occupants were executed, exiled, or “re-educated”. The cameras clicked on, and the broadcast began.\n\nLuka stepped up to the podium. “The Revolution tolerates no snakes. It tolerates no parasites,” he said. “Today a new dawn arrives. The dead weight has been cut from our cause: hypocrites who cloaked their ambition in our flag, traitors who whispered compromise while enjoying comforts as our people suffered, and the cowards who love safety more than their own people are now erased from our soil.”\n\n“Do not mourn them, afterall they did not mourn our fallen comrades who died protecting the revolution from it's enemies. I did not want this great purge, but it was necessary to save the soul of our nation and to secure its future. The tree of the Revolution cannot grow in soil poisoned by the hesitation of the few. What fell was not the VKP but the infection that hollowed it with illusions of peace; the only peace we seek shall be one that only benefits us now and forever.”\n\n“The VKP is reborn, stripped of cowardice, deaf to intrigue, and immune to betrayal.” He paused; the silence pressed like a blade to an artery. “Call me cruel if you must; cruelty implies pleasure, and I felt none. Call me a tyrant; tyranny serves itself; I serve the future. Call this no longer a revolution. My answer is this: you cannot make a revolution and keep your gloves white. This is not the end of politics; this is the end of theatre.”\n\n“From this day forth there will be no factions, no secret meetings, no scheming just leadership and a plan for the future of Russia. When I assumed the office of Chairman of the Revolutionary Directorate. You all placed your faith in me; I will safeguard the revolution’s stability. There will be only the Jacobin path: unified, uncompromising, absolute.”\n\n“We have crossed the threshold. There is no return. Victory is in sight; our utopia will be realised. If the people fear me, let them. I would rather be feared for ending treason than loved for tolerating it. We march not toward comfort, but toward the future. Let none stand in our way for the total victory of Jacobinism.” The cameras cut. Applause rose, some genuine, much of it out of fear.\n\nIn the crowd, Zaytsev lifted a glass and gave Luka a grim nod. Kulikova was absent, carrying out purges elsewhere with a more free hand. Sorokina sat in a hallway, contemplating her path. Shohei was carrying out drills on the frontline preparing the nation's soldiers for their sacrifice. Luka smiled to himself, basking in the triumph of his will, then joined Zaytsev as the celebrations began and the loud, inevitable drum of a new order took place."
 SRU_Luka_Phase_One_Politics.8.a:0 "Jacobinism Is Triumphant Once More."
 SRU_Luka_Phase_One_Politics.9.t:0 "Zhukov Meets With The Opposition"
 SRU_Luka_Phase_One_Politics.9.d:0 "\"Matvey, Oksana, welcome. Have a seat. We will need to hurry this along. My time is very limited as of late. I'll give you five minutes. Tell me, why did you want to have this meeting?\" As if Luka's words could take grip of the very room around them, Matvey Vasilev and Oksana Volkona suddenly felt like they heard a clock rapidly ticking. All the while they were being stared down by Luka, who observed their every characteristic and feature, like he was logging it permanently into his brain. \"We don't want to take up-\" Oksana tried to speak first, attempting to be kind and apologetic already, hoping for this to not get out of hand.\n\nHowever, suddenly her soft voice drowned out, her black hair almost jumping off her head. \"Enough! He said make this quick, so let's make this quick.\" Matvey was brash, cutting off Oksana's niceties quickly. His hands balled into fists. Not for a fight, but purely out of reflex as he started to wave them at Oksana as if telling her to get on with it. \"Right! Both our parties have a series of concessions we'd like to see from the government.\" Oksana produced a white crisp paper document from a stack of papers within her hands. She couldn't even hand it to Luka. She simply stepped forward and placed them down in front of him. It was within his eyesight but he didn't even focus on it. He focused only on them.\n\n\"Simply put, more democratic changes to the electoral system and the continuity of elections through the current period of war. The government should not just be allowed to act freely during a time of crisis, especially on this magnitude. This document covers most of it. In short, let the people elect their own judges, and officials to oversee the government.\" It was clear that Matvey was speaking from his own true beliefs, trying to speak on the behalf of the people. It was no wonder he was given the position he was in. He seemed to have earned it by drive alone.\n\nHis fists were now holstered at his side, doing their best to not wave in Luka's direction, lest it caused him to feel fear. Little did Matvey know that as Luka stared right at him as he spoke. There was nothing to fear from the man, even if he had a loaded gun to his head. Luka answered quickly and sharply. He hadn't even begun to read the document before finishing with..."
 SRU_Luka_Phase_One_Politics.9.a:0 "\"I believe five minutes is up... Now, please leave.\""
 SRU_Luka_Phase_One_Politics.10.t:0 "Some Advice From a Friend"
 SRU_Luka_Phase_One_Politics.10.d:0 "The air in Luka's office was chill, while the window to the rest of the frozen Novosibirsk was hard shut. The biting cold still seeped its way in, so much so that as Luka went to raise his cup of Tashkent tea, the steam billowed off of it like a smoke stack, but he raised it to his lips regardless. The warmth flooded his body, all while his ears were filled with the voice of Zaytsev. \"What I'm saying, Luka, is that there is a simple way to deal with the opposing parties.\" Luka gently sat contemplating the topic of discussion before he answered, placing the tea cup back on its plate in his hand as he looked out at Zaytsev.\n\nHe had his own cup he was drinking from, which he held from above with his hands, reminiscent of a spider, spread out on its rim. \"Go on Zaytsev,\" was Luka's simple response, interested in what his friend had to say. \"The parties are weak willed. They'll take anyone who shows a little bit of interest in their mundane values. That is their weakness. Put simply, if we were to infiltrate their party's leadership, they could be controlled from the shadows.\" Zaytsev's mind was always analytical. Luka assumed he saw everything like a graph and could come up with the best way to solve the problem. So, he thought for a second.\n\nTaking a few more sips of his tea, that couldn't calm a perfectly still Luka was providing warmth for his body, more than his suit did. \"People are far more willing to listen to someone who shows interest in their values no matter how false that interest may be.\" Luka's words seemed interesting, well, to anyone but Zaytsev. He had an underlying feeling about them. Something like they were practiced before or came from simple experience. Zaytsev took a long sip of his black tea, before finishing what he was arguing for. The way to solve problems that the nation had. \"My point exactly, to end the political turmoil, use the opposing parties to your benefit to get what you want. All without lifting a finger and getting our nation back on track.\" Zaytsev had practically chugged his tea, and when he sat it down gently on Luka's desk, an action no one else but Zaytsev would dare to do, Luka smiled at him."
 SRU_Luka_Phase_One_Politics.10.a:0 "\"Let's find some interested people.\""
 SRU_Luka_Phase_One_Politics.11.t:0 "Zhukov's Thoughts"
 SRU_Luka_Phase_One_Politics.11.d:0 "The winter had assaulted Novosibirsk harsher than had ever been seen before. Luka couldn't remember a time in his life where it was any harsher. It was either that, or the fact of looking down at it all from an office window that was floors above it, had a way of making him forget the times of being hit by it, of being someone who needed to crawl through the icy breath of snow just to reach home. \"Novosibirsk.. Socialist Paradise.\" The muttering words under Luka's chill breath seemed to fog up on the windows, not that he minded. Softly tapping his wrist with his hands folded behind his back, he eyed himself within the reflection of the window, treating it like a mirror.\n\n\"Not entirely, not yet. Still so much left to do.\" Luka did not lower his head, did not stoop himself down, instead his eyes merely drifted. To someone fighting against the cold winter's breath just to even move out in the main street, going from building to building waving at others that spotted them. Luka didn't realise it, but he must've forgotten the feeling of the struggle the man went through. \"What course should I take? Both sides have merits, Zaytsev has a way of making a convincing argument to me.\" Or, he must've ignored it. His own words now seemed lost, caught up within his own mind. His own tongue caught, until of course, he was able to weed and clear them out completely with sharp words. \"I hate it.\"\n\nWords not reading as loathing or annoyance, not even pure hatred. Something more interwoven. Luka re-affixed his gaze onto the window, he didn't see that man anymore making his way through the city. Instead he caught someone else's eye over his right shoulder, in his own office. Not waiting for a second, he turned around to catch the intruder. Someone he noticed had both a fully recogniseable face, and one he couldn't recall. \"I don't believe I let you in-\" The air was silent, the office completely silent, the windows were hard shut, and so not a single gust of wind was able to disturb him in his office. He straightened himself, looking at his desk, eyeing the unruffled papers that lie neatly across it, but more importantly, he eyed the desk phone of his in the left hand corner."
 SRU_Luka_Phase_One_Politics.11.a:0 "\"Either way, I should make the call.\""
 SRU_Luka_Phase_One_Politics.12.t:0 "Chaotic Congressional Session"
 SRU_Luka_Phase_One_Politics.12.d:0 "The bill was passed around the Novosibirsk congress room, like it was a piece of paper caught on fire. Every time a single slip of it was handed out to a member of congress, who was sitting around in a ring of dark oak wooden tables, it was almost like they suddenly went into a panic and all Luka Zhukov did was watch. He sat at the very head and foremost point of the congress room. All attention in the room, all focus would always be towards him. It was no different this time.\n\n\"This is an outrageous bill!\" The voice of one of the congressmen rattled off. Luka didn't attempt to even look at the man. who had bursted up out of his seat, scrunching the paper in his right fist and waving it around. The man was yet to finish shouting as others started receiving their bits of paper from nearby assistants and helpers. \"You want us to simply lay down, and hand you full control over the nation!!\" The man was fuming. It was clear he was a part of one of the key opposition parties to Luka. But the details of which one he was a part of didn't matter.\n\nAll members of the opposing parties reacted similarly if not worse. Congress almost broke out into complete chaos with members standing up, yelling, and practically throwing themselves around the room. Luka even noticed that some members of his own party, the VKP, didn't look too pleased when they saw the bill. The reformists hiding by Kulakov had more restrained rage. Itlooked like a blood vessel of his would burst at any moment, but he kept control and stayed seated looking down at the paper with disgust. Luka continued to watch all of this unfold with mild amusement, not smiling. He had no expression on his face, just quietly watching.\n\nEven as members of Cheka entered the room through all entrances and exits, moving around silently which slowly wrapped a chain around the necks of congress. Their mere presence caused those who had visibly shown their rage, annoyance and anger at the bill, to quietly take their seats once more and stay seated. Luka didn't even need to lift a finger or move a muscle. He stayed seated in his chair the whole time. It didn't seem like the chair was even comfortable for Luka. It was old, almost broken, splintering wood. Luka started to lean his head down a little bit as he looked out at the room and finally he spoke. He did so with a smile."
 SRU_Luka_Phase_One_Politics.12.a:0 "\"Tell me again, your complaints. If you would.\""
 SRU_Luka_Phase_One_Politics.13.t:0 "Congress Unites Under Zhukov's Leadership"
 SRU_Luka_Phase_One_Politics.13.d:0 "\"Look at them...\" Luka's eyes were focused down from the railing of the balcony where he stood, his only options to look were either ahead out towards the far reaching horizon, blotted with a series of snow covered brick buildings. Or up towards the ever soaring skies, where it would only be blocked by the clouds. \"People of Russia...\" Luka began muttering to himself, watching down by the streets as people corralled around beneath him. He could see his feet, firmly planted on the top of a thin railing to his balcony, as the wind whipped at him and people seemed to look up at him concerned. \"People of Novosibirsk... no,\" he continued. He had no trouble finding the words or knowing them, no trouble at all. He was simply admiring the view of those beneath him like ants. The people of the revolution, his revolution, all watching concerned, as they believed any push of wind would send him tumbling to his death.\n\n\"Look around you, look amongst yourselves.\" He spoke just loud enough to be heard above the wind and those below. \"To your friends, to your family, to your comrades. Tell me now, could you ever imagine to yourself, that the person you considered friend, may very well be not just an enemy to you, but to your home that you live in? To your family?\" Continuing his words, they seemed to take effect on those beneath him, who began to shuffle amongst themselves turning side by side, possibly wondering where this was coming from, but focusing on what was said all the same. Luka began to grow a smirk on his face. He took his hands, his arms that were safely stored at his side, then threw them far out to the sides, seemingly in a wide embrace. \"For too long has our revolution struggled. Not only did we have enemies within the East, but we had our enemies right amongst us. Look to the left of you, look to the right of you. Any of them could be our greatest foe for our revolution.\"\n\nNow murmurs in the crowd gathered below began to grow, and Luka seemingly caught the glimpse of a camera zooming up at him, his smirk only grew as he directed his eyes up, closing them. Before looking back down. \"These enemies trapped our fate within their jaws, barring any progression amongst our Congress.\" There was some mild outrage amongst the crowd, a scant few members of the growing blot down below raising and shaking their fists into the air at Luka while trying to overtake his words with his own, the others around them began to step away. No matter, Luka thought, looking at them as he continued. \"No longer shall they plague us, no longer shall we clench at our own throat as the noose ties around it.\" One of those growing dissidents, clearly a member of other parties, was quickly surrounded by figures dressed in the uniforms even from this distance, recognised by Luka to be Cheka.\n\n\"For I, I alone have taken the blade and cut that rope. Now, not only do I intend to direct our blade at the enemies in the East. But, I will direct it to all the enemies of the revolution.\" Luka threw his right hand out in front of him, pointing and holding his wrist forward like he held a knife pointed forward to the horizon, as he took his other hand, balled it into a fist and slammed it into his heart. At that moment, the Cheka surrounding the man turned away from him back to Luka, throwing their fists onto their own hearts in unison, which started a chain reaction amongst the rest of the crowd, minus those few dissidents. The words that rang out from the crowd shortly after and that rested on the headlines of the newspaper..."
 SRU_Luka_Phase_One_Politics.13.a:0 "\"Long live Luka!\""
