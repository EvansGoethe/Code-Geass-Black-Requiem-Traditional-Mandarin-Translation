 POLITICS_LUKA_ZHUKOV_DESC:0 "Luka Zhukov, Chairman of the Russian Jacobin Council, born REDACTED, is the supreme leader of the Jacobin Revolution. Not much is known about Mr Zhukov before his rise to leadership in the VKP. But those who know him describe him as logical, realistic, and the only man capable of reviving an ideology that has been long forgotten by the world. However, his ambitions for Russia let alone the world are entirely unknown to even his closest confidants and allies. Although one thing is for certain, he is determined to rescue Russia from the eve of its destruction. Whether or not his reign will be as bloody as Robespierre’s remains to be seen but a spectre has been unleashed upon this world and its grip tightens with each day it remains unopposed."
 SRU_sonya_bunina_desc:0 "Sonya Bunina, Chairwoman of the All-Union Communist Party, born 7th November 1986, is the de facto leader of the Russian communist movement. Sonya is radical, idealistic, and the heir to the utopian ideas of her father and the party's founder, Ivan Katunin. However, she is also aware of the lack of compromises and mistakes that led to the failure of the first revolution. Whatever road must be taken, Sonya intends to bring forth the communist future her father always told her about by leading the revolution to either a red dawn or its final sunset."
