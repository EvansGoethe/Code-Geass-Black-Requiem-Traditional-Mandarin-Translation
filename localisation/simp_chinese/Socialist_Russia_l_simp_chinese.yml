 news.8.t:0 "Chinese Federation Recognises S.P.R. Of Russia"
 news.8.d:0 "As of today the Chinese Federation has taken a suprising stance toward the Russian Civil War, originally proclaiming itself neutral in the conflict it has now officially recognised the Socialist People's Republic of Russia as the true successor to the Russian state, this announcement was broadcasted to the world two days after prime minister Luka Zhukov met with Luo Zhang one of the high eunuchs responsible for administering Chinese foreign policy, this action has been met with furious reactions from both the Britannian and Europian ambassadors in the Forbidden City, neither Luo Zhang or Luka Zhukov have commented further on the matter. Chinese recognition will likely result in China becoming more involved in supplying the Socialist Republic of Russia's military and economical needs this will certainly give them the upperhand in the war against their enemies but only time will tell."
 news.8.a:0 "The war escalates..."
 news.8.b:0 "Their support is much appreciated."
