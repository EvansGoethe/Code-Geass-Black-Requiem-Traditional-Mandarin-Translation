﻿l_simp_chinese:
 fighter_equipment_0:0 "多用途戰機 I型"
 fighter_equipment_0_desc:0 "多用途戰機是一種爲了執行多種戰鬥任務而設計戰機。可以執行空中格鬥、空中支援、轟炸、偵查、電子戰和壓制防空火力等任務。"
 fighter_equipment_1:0 "多用途戰機 II型"
 fighter_equipment_1_desc:0 "這架飛機包含重大的結構改動以及更大的發動機。機身設計融入了功率更強的發動機，並配備了先進的發動機艙結構和艙門。後座爲武器系統軍官配備了設備，使其能夠通過多個屏幕操作空對地航空電子設備。"
 fighter_equipment_2:0 "戰鬥機 II型"
 fighter_equipment_2_desc:0 "這種飛機裝備了更大的機翼，這使得有效載荷和機動性與其推力成比例地增加，但也會以各種方式增加機身的重量。它對Knightmare的攻擊抗性大幅增強了。"
 fighter_equipment_3:0 "多用途戰機 IV型"
 fighter_equipment_3_desc:0 "多用途戰機的最新發展使其對所有威脅的攻防能力得到了加強。此外，極高的靈活性使其能夠在同一場行動中，在極短的時間內執行多項任務。"
 CAS_equipment_1:0 "近距支援機 I型"
 cv_fighter_equipment_0:0 "艦載多用途戰機 I型"
 cv_CAS_equipment_1:0 "艦載近距支援機 I型"
 cv_CAS_equipment_2:0 "艦載近距支援機 II型"
 cv_CAS_equipment_3:0 "艦載近距支援機 III型"
 CAS_equipment_1_desc:0 "我們的密接支援理論學說要求一款可進行精確範圍攻擊的飛行器。此種飛機的可用載荷較大型的戰略轟炸機要小，可在低空掃射及俯衝轟炸時伺機攻擊摧毀小型目標。"
 CAS_equipment_2:0 "近距支援機 II型"
 CAS_equipment_2_desc:0 "近距支援飛機的新型號在防禦系統方面進行了改進，還配備了用於抵禦任何攻擊的小型武器。"
 CAS_equipment_3:0 "近距支援機 III型"
 CAS_equipment_3_desc:0 "近距支援機儘管最近已嘗試進行改進，但事實證明它們在抵禦來自下方的敵人攻擊時仍過於脆弱。如今，它們將在戰場邊緣發揮作用，憑藉增強型導彈和武器提供支援。"
 helicopter:0 "攻擊直升機"
 transport_plane:0 "運輸機"
 strat_bomber:0 "噴氣式轟炸機"