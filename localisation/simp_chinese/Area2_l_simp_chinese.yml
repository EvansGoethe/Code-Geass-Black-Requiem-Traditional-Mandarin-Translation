 AR2_BR_supremacist_party:0 "不列顛尼亞當局-激進派"
 AR2_BR_autocracy_party:0 "不列顛尼亞當局"
 AR2_BR_conservatism_party:0 "殖民地人"
 AR2_BR_conservatism_party_long:0 "殖民地人"
 AR2_BR_authoritarian_party:0 "不列顛尼亞當局-貴族派"
 AR2_BR_liberalism_party:0 "殖民地人"
