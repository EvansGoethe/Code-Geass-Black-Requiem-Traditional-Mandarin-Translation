 quota_level_1:0 "殖民稅水平：§G輕度§!"
 quota_level_1_desc:0 "作爲不列顛尼亞的殖民區，由於宗主國的要求，我們必須向他們交出國內經濟的50%。"
 quota_level_2:0 "殖民稅水平：§O中度§!"
 quota_level_2_desc:0 "作爲不列顛尼亞的殖民區，由於宗主國的要求，我們必須向他們交出國內經濟的80%。"
 quota_level_3:0 "殖民稅水平：§R高度§!"
 quota_level_3_desc:0 "作爲不列顛尼亞的殖民區，由於宗主國的要求，我們必須向他們交出國內經濟的95%。"
 aristocratic_families_area_1:0 "本地貴族的暴政"
 aristocratic_families_area_2:0 "本地貴族的暴政"
 aristocratic_families_area_3:0 "少數人的樂土"
 aristocratic_families_area_1_desc:0 "本地貴族家族權勢凌駕於帝國總督之上，他們掌握着殖民地的行政大權。"
 aristocratic_families_area_2_desc:0 "本地貴族家族權勢凌駕於帝國總督之上，他們掌握着殖民地的行政大權。"
 aristocratic_families_area_3_desc:0 "貴族已經徹底放手殖民區的權力，他們被強制分別安置到幾個最落後的地區.他們中只有少數人享用到基礎的奢侈品。"
 centralized_leadership:0 "中央集權管理"
 centralized_leadership_desc:0 "帝國總督已經牢牢控制住這個地區，可以在整個轄區組建起高效的行政機構。"
 centralized_leadership_2:0 "經濟-行政效率"
 centralized_leadership_2_desc:0 "不列顛尼亞金融財團與殖民地政府間聯繫緊密，當地的勞動生產率有望大幅提升，這也對帝國本土有利。"
 centralized_leadership_3:0 "模範區域"
 centralized_leadership_3_desc:0 "這個殖民區是不列顛尼亞殖民政權的模範，在帝國範圍內彰顯着不列顛尼亞式和平的原則。"
 army_purged:0 "內部清洗"
 army_purged_desc:0 "在純血派政府的命令下，地方不列顛尼亞衛隊正在執行一系列的審批和清洗。"
 total_political_dominance:0 "極權主義政權"
 total_political_dominance_desc:0 "激進純血派已經牢牢掌控了整個國家機器，容不下一點內部的反對和批評"
 total_political_dominance_2:0 "極權主義奴隸制政權"
 total_political_dominance_2_desc:0 "現在，基於殘酷奴隸制的本地經濟這極大提高了本地生產力，爲偉大的不列顛尼亞國家服務。"
 total_political_dominance_3:0 "極端社會達爾文主義"
 total_political_dominance_3_desc:0 "這一殖民區成爲了一個完美的社會達爾文主義國家，建成了純血派烏托邦，或者對大多數人來說，純血派地獄。"
 spurred_industrialization_1:0 "促進工業化"
 spurred_industrialization_2:0 "工業繁榮"
 area_management:0 "管理殖民區"
 area_management_desc:0 "我們正處於行政管理的微妙時刻，任何失誤都可能給整個殖民區帶來災難性後果。"
 area_nobles:0 "賦予貴族權力"
 area_nobles_desc:0 "貴族在權力鬥爭中勝出，有可能成立一個新的寡頭政權。"
 area_exportation:0 "控制資源市場"
 area_exportation_desc:0 "資源開採是不列顛尼亞殖民區最重要的產業，通過財政上的投資實現對他們的控制，我們可以獲得巨大的影響力。"
 area_privilegies:0 "擴展貴族頭銜"
 area_privilegies_desc:0 "通過擴展貴族頭銜，我們可以進一步鞏固我們在殖民地政府的地位，把友方人士安排到重要的崗位上。"
 area_oligarchy:0 "新寡頭的誕生"
 area_oligarchy_desc:0 "現在，帝國總督僅僅是不列顛貴族階級的傀儡，他們成立了帝國議會，這一機構將在未來保障新政治秩序的合法性。"
 area_crime:0 "無視有組織犯罪"
 area_crime_desc:0 "如果我們想要和本土的金融企業集團競爭，我們必須藉助當地有組織犯罪集團的關係網和影響力把工業力量聚合起來，同時放任他們的非法活動。毫無疑問，這會在民政部門內滋生貪污腐敗。"
 area_corvee:0 "重新引入徭役制度"
 area_corvee_desc:0 "議會找到了一個強迫殖民地人完美方法，通過了一系列法律使本地人口處於完全依附於貴族的狀態，換句話說，這是一個現代化的封建體系。"
 area_special_zones:0 "封閉式區塊"
 area_special_zones_desc:0 "爲了分開殖民區的不同民族，議會將徵調新農奴們改造領土上各城市的佈局，殖民區將分爲幾個留給殖民地人的特別保留區爲當權貴族階級服務的豪華享樂區。"
 area_paradise_few:0 "少數人的樂土"
 area_paradise_few_desc:0 "這個殖民區已經成爲了貴族階級的遊樂場，在這個不公的體系下，只有少數人能享受到人生的種種奢侈。"
 area_viceroy:0 "擴大總督權力"
 area_viceroy_desc:0 "總督在權力鬥爭中勝出，現狀似乎很可能得以維持。"
 area_bribe:0 "賄賂政府"
 area_honorary_brit:0 "支持名譽不列顛尼亞人"
 area_honorary_brit_desc:0 "爲了強化我們的軍事力量，對抗純血派民兵，我們需要支持軍隊中的名譽不列顛尼亞部隊。這樣我們可以在打擊激進派的同時提高殖民區對不列顛尼亞的忠誠度。"
 area_fire_officials:0 "撤換不忠的軍官"
 area_fire_officials_desc:0 "最後，我們要撤下與純血派勾結的高級軍官並隔離他們。這樣能保證軍隊的忠誠，粉碎未來可能的政變陰謀"
 area_bribe_desc:0 "貴族絕不會真心地忠於我們的政府，但他們的支持對維持局勢穩定必不可少。幸運的是，我們可以給他們一大筆錢和一些名譽來讓他們改變想法。"
 area_impose_gov:0 "專制領導"
 area_impose_gov_desc:0 "最艱難的幾個月已經過去，總督的地位再一次得到保證。純血派被削弱，各派貴族都站到我們一邊；沒有什麼能阻礙我們獨攬大權。"
 area_conglomerates:0 "企業集團的力量"
 area_conglomerates_desc:0 "爲了促進殖民區的經濟，我們將擴大金融企業集團的影響力。考慮到目前他們大部分由貴族控制，這會大幅削弱他們的政治力量。"
 area_model:0 "模範區域"
 area_model_desc:0 "這個殖民區以經濟和民生方面的高效治理成爲了帝國的模範、不列顛尼亞式和平的典例，這一政治體系由皇帝陛下親自造就。"
 area_purists:0 "純血派政變！"
 area_purists_desc:0 "純血派已經開始行動，這個地區可能面臨激進的轉型。"
 area_sideline_viceroy:0 "流放總督"
 area_sideline_viceroy_desc:0 "現在，帝國總督是對我們最統治危險的威脅，由於他的“健康原因“，他需要回到本土。完成這次行動之後，我們就可以在這片領地上自由行動了。"
 area_build_assets:0 "奪取敵對貴族資產"
 area_build_assets_desc:0 "一些貪腐的貴族就像寄生蟲一樣，他們爲了保住自身權力拼命阻止我們建立一個公平的社會達爾文主義社會。因此，必須通過大規模資產沒收徹底清除他們的影響力。"
 area_clear_army:0 "清洗軍隊"
 area_clear_army_desc:0 "殖民地人以名譽不列顛尼亞人出現在軍中玷污和損害了不列顛尼亞軍隊的傳統。幸運的是，純血派將迅速通過一項法令，把所有非不列顛尼亞人和不忠誠的軍官驅逐出軍隊。"
 area_destroy_ghettos:0 "清除集住區！"
 area_destroy_ghettos_desc:0 "軍隊的情況現在還算可以接受，骯髒的殖民地人仍然佔據着不列顛尼亞的神聖領土。爲了徹底剷除他們的威脅，有必要實施嚴格的人口管制，通過各種手段。"
 area_purist_secured:0 "純血派主導"
 area_purist_secured_desc:0 "情況已經再次穩定，對人口的完全控制已經達成。這是邁向真正的社會達爾文主義的第一步。"
 area_slavery:0 "奴役倖存者"
 area_slavery_desc:0 "在殖民區內剩餘的殖民地人將被遣送至特殊的再教育營，以強制勞動的形式爲不列顛尼亞祖國效力。這將顯著提升當地生產效率與礦業產能。"
 area_propaganda:0 "增強民族主義宣傳"
 area_propaganda_desc:0 "部分不列顛民衆對我們採取的極端措施尚存疑慮，但通過適當的宣傳運作，我們將讓新政權合法化。"
 area_increase_exploitation:0 "極致剝削"
 area_increase_exploitation_desc:0 "另一項有益於不列顛尼亞的必要舉措是最大限度開發領地的資源，無論會有怎樣的環境或社會後果。"
 area_extreme_darwinism:0 "真正的社會達爾文主義"
 area_extreme_darwinism_desc:0 "終於，在經歷了數十年的頹廢之後，我們建成了真正的社會達爾文主義社會，社會所有機能都以最高的效率和最大化的生產力爲神聖不列顛帝國謀取利益。"
 ARE_Industrial_Development:0 "工業發展"
 ARE_Industrial_Development_desc:0 "我國亟需產業全盤升級。我們需要投資更先進的工業化體系，以擺脫當前充滿不確定性的時代裏所陷入的經濟困境。"
 ARE_Civillian_sector:0 "民事部門"
 ARE_Civillian_sector_desc:0 "如今我們正迎來從零開始建造新工廠的契機。藉此，我國將能達成所需的生產指標與可持續發展目標，成爲經濟強國。"
 ARE_Civilian_Sector_2:0 "民事部門 2"
 ARE_Civilian_Sector_2_desc:0 "作爲當前經濟政策的延續，政府將投資興建更多國有工廠以提振國家經濟，致力於實現長期的經濟繁榮，服務我們的人民。"
 ARE_Civilian_Sector_3:0 "民事部門 3"
 ARE_Civilian_Sector_3_desc:0 "爲實現經濟規劃的中期目標，我們將持續聚焦工廠建設，以滿足日益增長的消費品行業需求。"
 ARE_Civillian_sector_4:0 "民事部門 4"
 ARE_Civillian_sector_4_desc:0 "隨着經濟規劃最終階段取得成果，這項將我國推向富強繁榮的宏偉工程終於即將完成！在不久的將來，世界各國都將拜倒在我們強大的經濟實力面前！"
 ARE_Infastructure_Sector:0 "基礎建設部門"
 ARE_Infastructure_Sector_desc:0 "由於過去的腐敗與忽視，我國基礎設施長期缺乏維護。我們必須啓動一項修復與擴建計劃，使基礎設施重現曾經的輝煌。"
 ARE_Infastructure_Sector_2:0 "基礎建設部門 2"
 ARE_Infastructure_Sector_2_desc:0 "現在可已啓動基礎設施建設的下一階段。我們應致力於構建可持續的全國運輸體系，爲未來多年的軍隊與平民需求提供保障。"
 ARE_Infastructure_Sector_3:0 "基礎建設部門 3"
 ARE_Infastructure_Sector_3_desc:0 "我們必須保持推進當前的建設。我們將拆除老舊的基礎設施，爲新建住宅、工廠及各類設施騰出空間，鞏固我們國家的根基。"
 ARE_Infastructure_Sector_4:0 "基礎建設部門 4"
 ARE_Infastructure_Sector_4_desc:0 "基礎設施發展計劃的最終階段終於可以啓動。在可預見的未來，我們的首都將實現自給自足，經濟方面也將真正展現出崛起中國家首都的風貌。"
 ARE_Military_Sector:0 "軍事部門"
 ARE_Military_Sector_desc:0 "爲了抵禦外部威脅，我們必須建立能夠爲步兵提供可靠武器的軍工體系，以對抗那些日益壯大、企圖破壞我國穩定的敵對勢力。"
 ARE_Military_Sector_2:0 "軍事部門 2"
 ARE_Military_Sector_2_desc:0 "我們必須考慮的另一個因素是敵人可能部署的大規模裝甲部隊。除此之外，還可能面對knightmare。這項技術正在迅速改變戰爭形態，發展出超越傳統裝甲的作戰能力。我們要投資火炮與反坦克力量建設，這樣我們才能在這些科技強權面前保護自己。"
 ARE_Military_Sector_3:0 "軍事部門 3"
 ARE_Military_Sector_3_desc:0 "空中的戰鬥經常在作戰中被忽視，但即使這樣，我們深知掌握制空權就是掌控戰局。生產能確保我們空中優勢的航空器至關重要。"
 ARE_Military_Sector_4:0 "軍事部門 4"
 ARE_Military_Sector_4_desc:0 "我們軍工擴張最後的一步將大幅提升軍事產能並推動軍事技術革新，確保我們的主權、使國家長治久安。"
 ARE_New_Technical_Institute:0 "新技術學院"
 ARE_New_Technical_Institute_desc:0 "近期工業擴張是我們增加研發預算的好機會，這能快速提升我們的創新能力，推動實現國家長期戰略目標。"
 ARE_Synthethic_Sources:0 "合成資源"
 ARE_Synthethic_Sources_desc:0 "爲了推動我們的工業發展，我們需要足夠原材料來維持日漸擴張產業，研發新技術有助於我們的產業擴張。"
 ARE_Civillian_sector_5:0 "民事部門 5"
 ARE_Civillian_Sector_5_desc:0 "國家產業計劃第二階段已正式啓動。我們將在這興建工廠，爲國家經濟獨立提供所需的生產資料。"
 ARE_Prosperous_Nation:0 "繁榮之國"
 ARE_Prosperous_Nation_desc:0 "終於，我國迎來了真正的繁榮昌盛。近期國家經濟產業擴張所帶來了財富，國民生活富足。我們已然實現了那些弱小國家夢寐以求的成就。"
 ARE_Pink_Saphires:0 "粉色的寶石？"
 ARE_Pink_Saphires_desc:0 "櫻石是我們絕不能放棄的珍貴資源。其他國家正利用這種資源大力提升自身的經濟與軍事實力。我們需要這種資源，刻不容緩！"
 ARE_New_Railways:0 "新建鐵路"
 ARE_New_Railways_desc:0 "爲了確保我們的國家不僅有能力保衛自己，還能在經濟上自給自足，我們需要建設一個能夠滿足我們作爲一個正處於不斷創新、不斷成長的國家的需求的鐵路網絡。"
 ARE_Military_Sector_5:0 "軍事部門5"
 ARE_Military_Sector_5_desc:0 "如今，我們已擁有實施第二輪軍事擴張所需的資源，真正能夠用各類裝備來全面武裝我們的軍隊。我們將擁有世界一流的——不！全球裝備最精良的軍隊！"
 ARE_Military_Industrial_Complex:0 "軍工複合體"
 ARE_Military_Industrial_Complex_desc:0 "Our nation’s economic future is edging closer and closer to a militaristically centered one. Our war machine will continue to grow; can we sustain it indefinitely, or will it lead to our downfall?"
 ARE_Advanced_Technical_Institute:0 "Advanced Technical Institute"
 ARE_Advanced_Technical_Institute_desc:0 "The recent growth of our industry has given us an increase in our capacity to innovate and improve upon our current technologies. We will gain the edge on other nations who believe themselves superior to us technologically."
 ARE_Establish_Admiralty:0 "Establish the Admiralty"
 ARE_Establish_Admiralty_desc:0 "It is finally time for our nation to reach out beyond our coastline. Before we can even consider sending ships out, we must establish both the admiralty and the chain of command. We only have a few men and women capable of filling this role within our nation. Let us hope they’re up to the challenge."
 ARE_Confiscate_Dockyards:0 "Confiscate Civilian Dockyards"
 ARE_Confiscate_Dockyards_desc:0 "Though trade is vital to us in this uncertain time, we cannot sit idly by as the giants stomp around us, for it will only be a matter of time before we are the ones being stomped. We will confiscate ports, harbors, and any man-made outcroppings that are used for boat repairs. This makeshift collection of dockyards shall provide us with the ability to produce our own vessels of war."
 ARE_Naval_School:0 "Found the Naval Academy"
 ARE_Naval_School_desc:0 "Now that we have a high admiral and a few vessels in the beginning stages of construction, we must establish an academy to train seamen into officers so that we can fill out the rest of the ranks in our command structure."
 ARE_New_Age:0 "The New Age of Naval Warfare"
 ARE_New_Age_desc:0 "Although ship designs have not been altered much over the years, the tactics and roles for each ship class have changed drastically. We must catch up on our naval doctrines; otherwise, there is a significant chance that we may be caught unawares in our very first battle."
 ARE_Coastal_Defense_Fleet:0 "Establish the Coastal Defense Fleet"
 ARE_Coastal_Defense_Fleet_desc:0 "With our production capabilities growing and our command structure firmly established, we can now distribute our first task to the navy. The goal of this task is nothing tougher than patrolling along our coastline to give the crew some experience on the sea. Though this may seem like a minor mission on the surface, it has successfully bolstered our nation's pride and hope."
 ARE_Honorable_Battle:0 "The Honorable Tides of Battle"
 ARE_Honorable_Battle_desc:0 "Our nation is too prideful and honorable to hide beneath the waves like a skulking predator. We will stand tall and head towards our enemies with the might and grandeur once held by the fleets of old. We will pummel them with our formidable armaments."
 ARE_Heavy_Ship_Design:0 "重型戰艦設計"
 ARE_Heavy_Ship_Design_desc:0 "Now that we have a strong screening fleet, we can safely escort our vessels across the seas. This also means that the time has come for us to think on a grander scale. Let us build vessels which rival even Britannia’s mightiest battlecarriers."
 ARE_Standardized_Designs:0 "標準化設計"
 ARE_Standardized_Designs_desc:0 "We have successfully constructed multiple classes of surface fleet vessels. The expertise we have gained from this has shown us many of the flaws in our designs, some of which caused assembly to take longer than was necessary. As a result, we will finally be able to standardize our designs, allowing us to assemble light vessels faster than ever before."
 ARE_Install_the_Repair_Yards:0 "Install Repair Yards"
 ARE_Install_the_Repair_Yards_desc:0 "With the possibility of war growing as the months pass by, the construction of dry dock repair yards would bolster our fleet’s survivability, allowing them to return to patrol without needing to wait months for repairs."
 ARE_Flagship_for_the_Fleet:0 "A Flagship for the Fleet"
 ARE_Flagship_for_the_Fleet_desc:0 "What is a modern surface fleet without a flagship leading it? We could not in our right minds call ourselves a naval power without a crown for our fleet. Though we have enough resources to build such a ship, we only have enough for one capital vessel. The choice between a heavy cruiser or an aircraft carrier is currently giving rise to some rather heated debates among the admiralty."
 ARE_Hidden_War:0 "The Hidden War"
 ARE_Hidden_War_desc:0 "With our nation being so limited in its production capabilities, it would be foolish of us to build a surface fleet for the sake of pride or ego. We should instead focus on predator tactics, remaining unnoticed until we strike our targets. A fleet of submarines would serve us better in the long run. Let us standardize their designs before anything else."
 ARE_Fear_the_Unseen:0 "Fear the Unseen"
 ARE_Fear_the_Unseen_desc:0 "With a huge amount of time and effort saved by building smaller vessels, we can divert our efforts into updating our torpedoes’ capabilities and training our seamen to hold off on hitting a target until the last moment instead."
 ARE_Lock_Down_the_Ocean:0 "Lock Down the Ocean"
 ARE_Lock_Down_the_Ocean_desc:0 "With our submarine designs standardized, it is time to increase the number of our patrols. This effort has been amplified by our new minelaying ships, which keep the areas around our nation on lockdown."
 ARE_Mass-Produce_Parts:0 "Mass-Produce Parts"
 ARE_Mass-Produce_Parts_desc:0 "We cannot allow gaps in our patrols to form. To ensure that enemy ships cannot slip through our fleet, we must standardize the parts used to build our vessels themselves to increase the assembly speed of our submarines."
 ARE_Deploy_the_Prototypes:0 "部署原型"
 ARE_Deploy_the_Prototypes_desc:0 "Specializing our naval production has finally paid off. The designers excitedly informed the admiralty that the new prototype submarines are ready to be let loose onto the sea. This came as a surprise to the admiralty, as they had not ordered or expected prototypes in any manner."
 ARE_Air_Development:0 "發展空軍"
 ARE_Air_Development_desc:0 "It has become clear to us that our air force is inadequate compared to those of the major powers of the world. We must correct this at once! Our aviation R&D department has been ordered to design new prototypes, both for weapons and Frame designs, to close the gap of power between us and our enemies."
 ARE_Airbases:0 "空軍基地"
 ARE_Airbases_desc:0 "With new aircraft models being developed for our air force, we must create some airfields before we can begin assembly."
 ARE_Air_Academy:0 "建立空軍學院"
 ARE_Air_Academy_desc:0 "We have built ourselves an air force, but that is not enough to remain competitive in the war for the skies. We shall train our pilots to utilize the best tactics and strategies, bestowing them with so much knowledge that no foe shall best them in battle. They will become our guardians of the sky, and they shall know no fear."
 ARE_Transport_Supplies:0 "Transport Supplies"
 ARE_Transport_Supplies_desc:0 "Times are changing. We can no longer depend solely on our ground infrastructure for the safe transportation of our supplies like we have been. After we pool together some funding, we will purchase some transport planes from the private sectors of other countries so that we may supply our forces without needing to depend on our roads and railways."
 ARE_aviation_Doctrine_School:0 "空軍學說學院"
 ARE_aviation_Doctrine_School_desc:0 "We need not look far to know we have much to learn in terms of aircraft and how to use them. Money has been spent, and books have been purchased; we shall use them to train our pilots."
 ARE_aviation_Doctrine_School_2:0 "空軍學說學院2"
 ARE_aviation_Doctrine_School_2_desc:0 "We have learned some very valuable lessons in the time since our last meeting concerning the doctrine of our air force—lessons that have given us insight about how to proceed further with our pilots’ training."
 ARE_aviation_Doctrine_School_3:0 "空軍學說學院3"
 ARE_aviation_Doctrine_School_3_desc:0 "Our nation has sufficiently acquainted itself with air combat to the point where our pilots have become as skilled as those serving the major powers. Why should we stop there? No, we will continue to apply what we’ve learned and improve our pilots’ skills even further. The stagnation of our air force would be tantamount to surrendering ourselves to the enemy should they choose to do the same."
 ARE_Fighter_Focus:0 "重視戰鬥機"
 ARE_Fighter_Focus_desc:0 "Bombers are powerful, yes, but they are slow and vulnerable. What our air force needs is not more bombers but a means to counter them as well as obliterate any aircraft that our enemies might choose to deploy."
 ARE_Close_Air_Support:0 "Close Air Support"
 ARE_Close_Air_Support_desc:0 "The combined arms methodology can no longer be considered an optional doctrine. Combining air superiority with effective ground support is the best tactic for maintaining momentum in a battle. Ground support is best used in tandem with sudden air assaults. To make these combined arms maneuvers possible, we must have a foundation of close air support ready to fly at any time."
 ARE_Bomber_Focus:0 "Bomber Focus"
 ARE_Bomber_Focus_desc:0 "We have the industry required to support the most effective part of our air force: the bomber. These large machines of death can destroy our enemies’ backlines and turn the tides of battle for our soldiers on the frontlines."
 ARE_Nothing_But_Ash:0 "Nothing but Ash"
 ARE_Nothing_But_Ash_desc:0 "Our air force’s primary goal should be to completely and utterly destroy our enemies’ ability to wage war. We shall endeavor to design the most powerful bombers the world has ever seen, and we will use them to target not just our enemies’ industries but their infrastructure as well, leaving their troops starved for supplies and vulnerable to our ground forces."
 ARE_Army_Development:0 "Army Development"
 ARE_Army_Development_desc:0 "The time has come to reevaluate our military to prepare ourselves for the new age of warfare and research how we want to proceed."
 ARE_Artillery_Development:0 "Artillery Development"
 ARE_Artillery_Development_desc:0 "Artillery has proven itself extremely effective in taking out the sturdiest of armies. To have an army without it in this day and age is not only unwise but incredibly stupid. We shall study reports from our troops in the field to develop better artillery."
 ARE_Motorized_Development:0 "Motorized Development"
 ARE_Motorized_Development_desc:0 "The last few centuries have been a bastion of innovation and experimentation for warfare and technology. Among the many things learned, we have discovered the effectiveness of motorized equipment in an army. We shall pool together our scientists to advance our understanding of these simple yet very important machines."
 ARE_Firearms_Development:0 "Firearms Development"
 ARE_Firearms_Development_desc:0 "What could be more important for an army than the humble gun? Even these fancy new Knightmares have their own guns. Thankfully, we can borrow knowledge from the private sector of other countries to help develop better firearms."
 ARE_Armor_Development:0 "Armor Development"
 ARE_Armor_Development_desc:0 "Tanks are the only thing proving to be effective against Britannian Knightmares, and even then, they have been struggling. We must act quickly to develop better tanks to counter Knightmares."
 ARE_New_RND_Department:0 "A New R&D Department"
 ARE_New_RND_Department_desc:0 "It has become clear to us that we need more scientists in order to keep up with our enemies. We have gathered the funds and the necessary people to establish a brand new research department to support our current ones."
 ARE_army_Doctrine_School:0 "Army Doctrine School"
 ARE_army_Doctrine_School_desc:0 "Many important factors go into the creation of a successful military, but one of the most crucial is the command structure. We need effective officers and AREerals to be able to wage war; otherwise, our military would be incredibly ineffective and sluggish. We shall ensure only the most skilled and experienced people, and thus the most qualified, will be promoted."
 ARE_army_Doctrine_School_2:0 "Army Doctrine School 2"
 ARE_army_Doctrine_School_2_desc:0 "Although armor is still prevalent presently, the future will very clearly be driven by Knightmares. Foot infantry will not survive in the coming age. If we wish for them to even survive first contact with the enemy, we must ensure they receive supplies of MANPATS, or man-portable anti-tank systems, to keep them alive and capable of fighting against any Knightmares or armored enemies."
 ARE_army_Doctrine_School_3:0 "Army Doctrine School 3"
 ARE_army_Doctrine_School_3_desc:0 "With new Knightmare prototypes being unveiled yearly, we must discuss two variants: melee and fortress. Melee Knightmares sacrifice defensiveness for armor penetration and are able to form spearheads against most Knightmare variants. Fortress Knightmares don’t really have any offensive capabilities but are defensive powerhouses, requiring advanced Frames or anti-Knightmare artillery to take down."
 ARE_army_Doctrine_School_4:0 "Army Doctrine School 4"
 ARE_army_Doctrine_School_4_desc:0 "The last Knightmare Frame variant we must address is the advanced, or so-called “all-purpose”, variant. This marvel, or terror, of technology is the one thing we should avoid at all costs. Only anti-Knightmare artillery have the capabilities to stop them. If our soldiers encounter one, they must know to either stand firm and wait for reinforcements or fall back to the main front. Do not engage."
 ARE_army_Doctrine_School_5:0 "Army Doctrine School 5"
 ARE_army_Doctrine_School_5_desc:0 "Anti-Knightmare artillery have become a staple asset for fighting Knightmares. Whether we commit to one or the other, we must study ways to work with or against them. We could counter the artillery with intelliAREt tactics, such as having our infantry assault these unwieldy machines, or, if we utilize such weapons, place them at strategic points where our enemies would struggle to defeat them."
 ARE_Knightmare_Warfare:0 "Knightmare Warfare"
 ARE_Knightmare_Warfare_desc:0 "A new age of warfare is upon us; we shall not let ourselves fall to the wayside. Knightmares are the way forward, and we will take full advantage of them by developing our own to compete with the major powers should the need arise."
 ARE_The_Facts:0 "Spin the Facts"
 ARE_The_Facts_desc:0 "Factsphere sensors and landspinners are essential components for Knightmares. We need to develop these technologies right away. Spare no expense!"
 ARE_Knightmared_Police:0 "Knightmare Police"
 ARE_Knightmared_Police_desc:0 "Police forces have been essential in upholding law and order in the world, but in this day and age, terrorism and rebellion are their main opponents. We shall endeavor to create a Knightmare Frame which our police officers can use to defend our streets from these threats and, in an emerAREcy, be used in combat against insurAREts."
 ARE_Buy_Used_Stock:0 "Buy Used Stock"
 ARE_Buy_Used_Stock_desc:0 "Who said we needed to build all of our Knightmares? There are plenty of secondhand models and stock on the black market to supply us with enough Knightmares to at least create a division of them. We shall quickly gather our men and train them to use these Knightmares to defend our homeland."
 ARE_Our_Own_Roundtable:0 "Our Own Round Table"
 ARE_Our_Own_Roundtable_desc:0 "Britannia boasts its own elite unit composed of their best and brightest Knightmare pilots called the Knights of the Round. Although our experience with Knightmares is lacking so far, we have enough people with the raw talent required to create our own formation of elite units."
 ARE_Conventional_Warfare:0 "Conventional Warfare"
 ARE_Conventional_Warfare_desc:0 "If it’s not broken, don’t fix it. Why would we focus on Knightmares when our existing military has proven its worth historically?"
 ARE_The_Real_Engines_of_war:0 "The Real Engines of War"
 ARE_The_Real_Engines_of_war_desc:0 "Knightmares may be big and scary, but as the saying goes: the bigger they are, the harder they fall. We will work with our tank designers and the soldiers who actually operate them in order to develop better tanks to keep up with the monstrous power of Knightmare Frames."
 ARE_The_Stuff_That_Matters:0 "The Things That Matter"
 ARE_The_Stuff_That_Matters_desc:0 "Infantry is the most important part of any army, and we would be fools to ignore them. We shall drill our troops and teach them how to fight more effectively. By running these drills, we’ll also be making our whole army more organized."
 ARE_Protecting_The_Men_On_The_Front:0 "Protecting the Men on the Front"
 ARE_Protecting_The_Men_On_The_Front_desc:0 "Manpower is a precious resource, and experienced men willing to fight for their country prove to be even more so. The number of field medics and the quality of their gear shall be improved to decrease the chances of us losing valuable soldiers."
 ARE_The_Drums_Of_War:0 "The Drums of War"
 ARE_The_Drums_Of_War_desc:0 "Our forces have become some of the best in the world! Even the major powers will think twice about attacking us! Getting to this point was no small feat; however, we will not stop there. We shall make our forces even better! If we don’t, our enemies will surely catch up to us or, in the worst case scenario, exceed and dominate us."
 area.1.t:0 "A New Course"
 area.1.d:0 "After several years of bitter internal divisions, we have reached a tense situation in the local administration, whose efficiency is now severely crippled. Inside the Britannian Regime, despite the apparent unity, there are mainly three factions that are vying for power: the Imperial Viceroy, the Noble Advisors and the Purebloods.\n\n If we want to maintain the stability in the region and end the power struggle, we must decide who to support before things go out of control. There are various options that can be chosen, but some of them are riskier than others."
 area.1.a:0 "Team up with the Nobles."
 area.1.b:0 "Support the Status Quo."
 area.1.c:0 "Rely on the Pureblood Militia!"
 area.2.t:0 "Pureblood Takeover!"
 area.2.a:0 "And Now What?"
 area.2.d:0 "Thanks to our precedent stance, the Pureblood Militia greatly reinforced his presence both inside the Britannian Garrison and the administration. Fearing the reaction of the Homeland and a harsh intervention of the Britannian Viceroy, radical officials in the army organised a march in the Britannian Settlement.\n\nWith the support of the local police and part of the residents the soldiers occupied strategic points, including the Viceroy Palace in an unprecedent turn of events. Despite this, many Numbers and loyalist forces are currently opposing the new regime and took over limited territories. A new struggle has begun ..."
 AREeric_expansionism:0 "Expansionist Policy"
 equal_conscription:0 "Conscription Effort"
 AREeric_welfare_idea:0 "Welfare Spending"
 industry_1:0 "Industrial Development"
 industry_1_desc:0 "We'll begin our plan to strengthen the industrial capacities of this country."
 industry_civ_1:0 "Civilian Sector"
 industry_civ_1_desc:0 "One of the weaknesses of this nation it's their civilian industry. To partly correct this, we'll enact a series of reforms in this camp."
 industry_civ_2:0 "Further Civilian Improvement"
 industry_civ_2_desc:0 "New companies will be opened through all the territory. In this way, the unemployment is going to be reduced at minimum levels."
 industry_civ_3:0 "Loans to the Companies"
 industry_civ_3_desc:0 "With AREerous loans to the industrial companies, we will secure their support in the process of industrialization"
 industry_mil_1:0 "Military Sector"
 industry_mil_1_desc:0 "It's important to build an efficent network of military complexes in this territory; in this way, we'll create a secure supply to the army."
 industry_mil_2:0 "Further Military Improvement"
 industry_mil_2_desc:0 "In this case, we are going to focus on the least developed zones and assure an equal development of military complexes."
 industry_mil_3:0 "Build Military Infrastructures"
 industry_mil_3_desc:0 "Finally, we will connect all the industial complexes in the territory and create a centralized and efficient network."
 industry_progress:0 "Reform the Financial Sector"
 industry_progress_desc:0 "Since we have finished the development of the light and heavy industry, we can focus on the bureaucratic and financial aspects."
 mining_1:0 "Search for New Resources"
 mining_1_desc:0 "Eventually, new rare minerals ,such as Sakuradite, will be extracted in specific part of the country and utilized in Knightmare technology."
 infrastructure_1:0 "Expand the Rail System"
 infrastructure_1_desc:0 "The rail system is one of the most important infrastructures for the movement of goods and people. Given its role, it must be improved as soon as possible."
 extra_slot:0 "Open New Research Centers"
 extra_slot_desc:0 "With the establishment of new research centers, we will be able to improve our technological level in various camps, such as the industrial and military sectors."
 AREeric_national_identity:0 "Consolidate the Nation"
 AREeric_national_identity_desc:0 "After many troubles, we have finally obtained a long-lasting political and social peace inside the country."
 AREeric_political_effort:0 "Strenght the Government"
 AREeric_political_effort_desc:0 "With recent instability caused by the other nations, it's important to stabilize the current political situation."
 militarism_1:0 "Support Authoritarianism"
 militarism_1_desc:0 "If we want to consolidate our power in this turbolent era, we must assert the power of our administration over the insecure population."
 militarism_2:0 "Expand the Army"
 militarism_2_desc:0 "To better prepare the nation for future conflicts, we can train our army with new doctrines and technologies. Furthermore, new people will be recruited from the reserves."
 militarism_3:0 "Mobilitate the Economy"
 militarism_3_desc:0 "The next step is to mobilitate the entire economy and sustain the army in the long term."
 militarism_4:0 "Aggressive Foreign Policy"
 militarism_4_desc:0 "Our army and economy are ready for a total war. Now, we must only wait for a future occasion to expand the borders of the country."
 democracy_1:0 "Support Democracy"
 democracy_1_desc:0 "If we want to consolidate our power in this turbolent era, we must give more political responsabilities to the population."
 democracy_2:0 "Political Campaign"
 democracy_2_desc:0 "To increase the popularity of our party, we can utilize the modern mass media for our advantage, through an efficient and effective political campaign."
 democracy_3:0 "Arsenal of Liberty"
 democracy_3_desc:0 "To defend our democratic and equal society, it's important to eliminate all kind of potential threats from the surrounding nations. Because of this, we must enact a limited conscription among the population."
 democracy_4:0 "Welfare State"
 democracy_4_desc:0 "Lastly, we must avoid further socialist or communist agitations by implementing a proper welfare state, that will protect the worker class against any exploitation."
 tech_army_1:0 "Army Development"
 tech_army_1_desc:0 "In order to sustain conventional warfare with other nations, we must maintain an efficient and strong land army."
 tech_equip_1:0 "Modernise the Equipment"
 tech_equip_1_desc:0 "In the last decades, the guns' industry has made several achievements with modern and deadly shotguns. We should introduce them to the army as soon as possible."
 tech_equip_2:0 "Advanced Support Technology"
 tech_equip_2_desc:0 "Considering the size of modern armies, it would be silly to ignore the importance of a modern support equipment for every soldier."
 tech_equip_3:0 "Long Range Artillery"
 tech_equip_3_desc:0 "We will continue our efforts to ensure our infantry and support troops are armed with the best possible equipment of our time."
 tech_doc_1:0 "A New Doctrine"
 tech_doc_1_desc:0 "The recent conflicts have shown us that the old land doctrines are useless for a modern battle. Considering this, we must implement deep reforms in our planning strategy."
 tech_doc_2:0 "Consolidate the Doctrine"
 tech_doc_2_desc:0 "Despite our best efforts, there is still a certain opposition to our reforms in our officers' corp, especially from our senior AREerals. We need to reinforce the new doctrines as soon as possible."
 tech_mot_1:0 "Motorized Production"
 tech_mot_1_desc:0 "Mobility and protection are crucial to get infantry into and out of the field safely. Focusing on these developments will allow us to take action quickly."
 tech_mec_1:0 "機械化生產"
 tech_mec_1_desc:0 "重新思考機械化步兵的可能性，我們能夠突破當今車輛建造技術的極限。"
 tech_arm_1:0 "裝甲生產"
 tech_arm_1_desc:0 "現代主戰坦克已被證明在現代戰爭極爲有效，能克服嚴苛環境，我們應當充分發揮它們的最大潛能。"
 tech_knight_1:0 "1st AREeration Knightmares"
 tech_knight_1_desc:0 "A new terrible weapon called the Knightmare. This is going to revolutionize forever the concept of war."
 tech_knight_2:0 "2nd AREeration Knightmares"
 tech_knight_2_desc:0 "With several improvements in mobility and armor, the new Knightmares will be the spearhead of the army."
 tech_knight_3:0 "3rd AREeration Knightmares"
 tech_knight_3_desc:0 "With the new AREeration of Knightmares, it will begin the mass-production of these weapons, and every soldier will receive a basic training to use them."
 tech_air_1:0 "Aviation Development"
 tech_air_1_desc:0 "Nowhere is technological advances more rapid than in aerial warfare. Aviation is a field any modern nation must master."
 tech_fight:0 "Fighter Production"
 tech_fight_desc:0 "Keeping ahead in the development of fighter planes will give us an edge in the future."
 tech_cas:0 "CAS Production"
 tech_cas_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
 tech_air_2:0 "A New Air Doctrine"
 tech_air_2_desc:0 "With the production of new air vehicles such as attack helicopters and advanced jet, it's important to modernise our old traditions."
 tech_air_3:0 "Reinforce the Doctrine"
 tech_air_3_desc:0 "Despite our best efforts, there is still a certain opposition to our reforms in our officers' corp, especially from our senior AREerals. We need to reinforce the new doctrines as soon as possible."
 tech_bomber:0 "轟炸機生產"
 tech_bomber_desc:0 "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
 tech_nav_air:0 "海軍轟炸機生產"
 tech_nav_air_desc:0 "With the development of new aircraft carriers within our fleet, we must produce more naval bombers to cripple the enemy's forces in the ocean."
 tech_navy_1:0 "海軍發展"
 tech_navy_1_desc:0 "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into advanced ships."
 tech_flexible_navy:0 "靈活的海軍"
 tech_flexible_navy_desc:0 "Reinventing naval warfare to account for the advances in submarine technology will allow us to strike efficiently against enemy convoys."
 tech_submarine_effort:0 "潛艇生產"
 tech_submarine_effort_desc:0 "Submarine warfare has acquired a lot of potential in the last decades, with the production of sakuradite-propelled engines. We would do well to not just protect against submarines, but also use them against enemy shipping."
 tech_destroyer_effort:0 "Destroyer Production"
 tech_destroyer_effort_desc:0 "Studying the design and strategic use of submarines, we have also learned how to counter those strategies. Destroyers will be crucial for this."
 tech_large_navy:0 "Large Navy"
 tech_large_navy_desc:0 "Adapting our naval doctrines to accommodate large ships and ensuring the safety of our trade convoys will teach us much about what sort of ships we need"
 tech_cruiser_effort:0 "Cruiser Production"
 tech_cruiser_effort_desc:0 "Before making forays into advanced battleship research, the smaller cruisers are in need of replacement."
 tech_capital_ships_effort:0 "Capital Ship Production"
 tech_capital_ships_effort_desc:0 "The nation with the most battleships will rule the oceans. Battleships and carriers represent the old and the new in naval superiority."
 build_docyards_1:0 "Expand Dockyard Facilities"
 build_docyards_1_desc:0 "In order to sustain our naval production, we must begin the renewal and expansion of many old dockyards."
 build_docyards_2:0 "New Naval-Industrial Complexes"
 build_docyards_2_desc:0 "Lastly, we can create special coastal zones where we will build efficient industrial complexes. This will benefit both the local productivity and the national fleet."
