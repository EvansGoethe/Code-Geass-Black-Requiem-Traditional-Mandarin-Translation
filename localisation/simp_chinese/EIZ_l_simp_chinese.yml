 EIZ_A_Mechanized_Army:0 "A Mechanized Army"
 EIZ_A_Mechanized_Army_desc:0 "If i am to wage this war then i must acquire the tools of war by any means necessary, we require more tanks, more rifles, more armored vehicles and more financial support, our budget must be expanded exponentially through any and every means within our grasp."
 EIZ_fredericas_new_warfare:0 "New Warfare"
 EIZ_fredericas_new_warfare_desc:0 "placeholder"
 EIZ_frederica_found_the_special_project_core:0 "Found the Special Project Core"
 EIZ_frederica_found_the_special_project_core_desc:0 "Shortly after declaring this war we've come to the realization that as our troops are fighting on the front we can use the time their buying us to develop new ways to outsmart our enemies so we've decided to form the S.P.C whose focus is to develop new means to combat the enemy forces with weapons they probably wouldn't have expected."
