 EIZ_lyon_phase_one_economy.1.t:0 "里昂的經濟委員會"
 EIZ_lyon_phase_one_economy.1.d:0 "\"啊，mon amour，現在能聽到我說話嗎？\"里昂對著電話說，盼著這回終於接通了。他的聲音寫滿了他的思念與情感——他需要聽到她的聲音，需要她回應他。他終於擠出了打電話的時間。無論多麼短暫，他就是需要。他在指揮帳篷裡來回踱步等待著，幾乎要咬起自己的指甲。他曾向自己保證緊張會離他而去，可它突然又回來了，為這麼一件小事一陣陣襲來。\"能！Mi amor，我聽得清清楚楚。\"然後，緊張瞬間煙消雲散。里昂放鬆下來，長舒一口氣。加布里埃拉的聲音——嗯，里昂向來不怎麼喜歡音樂，但她的聲音在他心中是真正的天籟。他停下踱步，快步走去倚在桌邊，把耳朵貼向電話。\"太好了……我得說，我很想念你的聲音。\"
 EIZ_lyon_phase_one_economy.1.a:0 "\"……啊，好。再見，mon amour。\""
 EIZ_lyon_phase_one_economy.2.t:0 "卡薩布蘭卡提案"
 EIZ_lyon_phase_one_economy.2.d:0 "讓站在摩洛哥政務官辦公室的後方，仔細聽著這場談話。\"你們能提供什麼？和你們合作只會讓我們在法國那邊的處境雪上加霜。他們本來就幾乎不支持我治理這塊殖民地。\"讓看見那位政客露出微笑——顯然這正是他想聽到的。\"問題就在這裡。你們可以和我們合作，和我們貿易。你們需要真正的貿易對象，需要承認你們權威的人。我們雖然不會給予正式承認，卻很樂意租用你們的港口和貨船，供我們使用。只要你扮演好自己的角色、擺正自己的位置，這對你會非常有利。\"EIZ代表帶著狡黠的神情說道。"
 EIZ_lyon_phase_one_economy.2.a:0 "『我們可以利用那些被法國冷落的殖民地。』"
 EIZ_lyon_phase_one_economy.3.t:0 "蒼白寶石"
 EIZ_lyon_phase_one_economy.3.d:0 "讓幫著手下打開空運機的腹艙，讓EIZ代表們下機去會見西非邦聯的首腦。看著代表們警惕的目光，讓嗤笑一聲。戰鬥機與轟炸機在高空大範圍盤旋，只有讓那架特製攔截機跟在運輸機後面降落——以防萬一。當讓聽到政務官對代表們的要求表示反對時，他大步走了過去，不動聲色地摟住政務官的肩膀，指向天上那兩個戰鬥機與轟炸機中隊。\"在我看來，那些可不像是聯盟的飛機。嗯……不管他們是誰，希望他們不會等得不耐煩。\"政務官默默點了點頭，他拍拍那人的背，轉身朝工人們吼去：\"動作快點，我要這些運輸機裝得滿滿當當！\""
 EIZ_lyon_phase_one_economy.3.a:0 "『如果這就是終結危機的代價。』"
 EIZ_lyon_phase_one_economy.4.t:0 "聯絡老朋友"
 EIZ_lyon_phase_one_economy.4.d:0 "讓爬出他的攔截機，沿著集結起來的機群一路走過。有了里昂的資金，他能做的事簡直讓他心潮澎湃——尤其是里昂已經明確表示他什麼都不想知道。讓的整個航空聯隊都已抵達，足足一千人：飛行員、工程師、傘降專家，從歐洲的每個角落匯聚而來，終於有機會拿到他們服役應得的財富。所有人都望向南方，望向未來的幾週。"
 EIZ_lyon_phase_one_economy.4.a:0 "『私人軍事公司？這絕不會有好結果。』"
 EIZ_lyon_phase_one_economy.5.t:0 "打破常規"
 EIZ_lyon_phase_one_economy.5.d:0 "Lyon took a step into the office, it was strange to be in a proper building for once for a meeting. But, it was strange circumstances that brought it about so he couldn't be surprised. He closed the door behind him and locked it just in case, there was nothing out of the ordinary about this office. It appeared on the surface to just be a normal office. He looked to the centre, there was a large desk prominent in the centre of the room, with a large almost executive chair sitting by it, its back turned to him. He had expected to see the man he was here to see sitting on it, so he stepped closer towards the desk.\n\n\"I hear, you. And your associates... have some interest in funding us.\" Lyon spoke, aiming his attention to the chair, he stood right in front of the desk now, only for there to be nothing coming from the chair. Then suddenly he heard a voice, turning to its location he saw a plain old man step out from the corner adjusting his tie, he was in a sleek black suit. \"Only because, we hear that your existence furthers our Mark of Peace.\" Lyon eyed the man, he seemed harmless enough, he watched him step over to the other side of the desk and wheel the chair around, sitting in it was a piece of paper. The contract, no doubt for their services. \"I only seek to put this war to an end. For my country, and my country men.\" Lyon had no interest in anything but, he just wanted the war to end. He wanted to go home, his men wanted to go home. He almost could care less about peace for the wider world so long as the E.U. was safe, so long as his love. Was safe.\n\n\"It matters not what the reason is, as long as the outcome is the same.\" Lyon was catching the man's voice now, it was smooth as glass. As deep as the ocean, and spoke with a reserved confidence. He leaned down to the paper on the chair and pulled it up, passing it over to Lyon, he then offered him a yellow pen. \"So, what do I call you.\" It was a question he wasn't sure if he should ask him, but he did. All to give himself a second to go over the terms and details of the contract in his hand, before taking the yellow pen off the man. \"Know me, as Mister Y.\" That type of answer was expected from the man, Lyon placed the piece of paper onto the desk and signed it in fresh black ink."
 EIZ_lyon_phase_one_economy.5.a:0 "\"敬戰爭早日結束。\""
 EIZ_lyon_phase_one_economy.6.t:0 "合同"
 EIZ_lyon_phase_one_economy.6.d:0 "\"這地方，沒錯，是有些破敗。但這正合適——它能避人耳目。\"讓驕傲地宣佈，彷彿對自己的發現自信到無以復加。他舉著手機原地轉了一圈，讓里昂把這處設施看個清楚。老實說這就是個垃圾場：一座索馬利危機時期的舊衣索比亞機場，早已風光不再——風光得多的日子早過去了。如今它幾乎被沙土堆掩埋，好在機庫仍然屹立。\"它自索馬利危機以來就廢棄了。我承認它位置寶貴，但它現在連自己都快撐不住了。\"
 EIZ_lyon_phase_one_economy.6.a:0 "\"這地方賣多少錢？\""
 EIZ_lyon_phase_one_economy.7.t:0 "衣索比亞避風港"
 EIZ_lyon_phase_one_economy.7.d:0 "士兵們一個接一個地把板條箱或扛或推，運到標記點——正下方是一架巨大的貨運直升機，數條繩索與纜線垂懸而下，準備接收戰利品或人員。讓瞥向一旁：倉庫經理跨出一步，試圖攔住一名走向標記點的士兵。\"你們——你們不能這樣！？沒有這些物資，我們就沒法——\"他驚慌失措，依然滿頭霧水。他就是不明白。啊——讓咧嘴一笑，朝他走近一步，又一步，同時垂下手，看也不看地解開槍套，抽出手槍，咔噠一聲打開保險——這聲音驚動了經理——隨即把槍口直抵他的後腦。\"沒法什麼？我的朋友，沒法活下去？沒法見到明天？沒法養家糊口？\"
 EIZ_lyon_phase_one_economy.7.a:0 "\"後會有期！\""
 EIZ_lyon_phase_one_economy.8.t:0 "利比亞劫掠"
 EIZ_lyon_phase_one_economy.8.d:0 "讓一聲令下，轟炸機聯隊把載荷傾瀉在加工廠前的曠野上，將散佈地面的灌木與岩石夷為平地。空運機打開艙門，傘兵們降落到地面，急速衝進加工廠，命令工人把加工完成的與未加工的礦物全部搬到場地上。空運機著陸卸下運載艙，由工人們裝滿。一名工頭試圖逃跑求援，讓俯衝而下，機炮在他面前掃出一串彈幕。十分鐘後，滿載的空運機起飛，私人軍事公司的機群緊隨其後。"
 EIZ_lyon_phase_one_economy.8.a:0 "『這些絕對夠前線的補給了。』"
 EIZ_lyon_phase_one_economy.9.t:0 "洗劫南非"
 EIZ_lyon_phase_one_economy.9.d:0 "讓親自大步走向高級政務官，笑容燦爛地遞上一個密封的信封。\"幸會，我們是你們的新貿易夥伴。\"讓咧著嘴輕快地說道。在他們身後，讓的一千名手下正忙著把摩洛哥的貨船裝滿——那些囤積待運的礦物與物資盡數裝船。\"別擔心，我們拿的不會多到讓法國對你們降下地獄之火。還有，找個沒人的地方拆開那個信封，我保證裡面的東西會讓你非常感興趣。\"讓依然微笑著。身後槍聲驟起，他突然用手槍的握柄狠狠砸向高級政務官。"
 EIZ_lyon_phase_one_economy.9.a:0 "『讓在搞什麼鬼？』"
 EIZ_lyon_phase_one_economy.10.t:0 "巔峰之作"
 EIZ_lyon_phase_one_economy.10.d:0 "讓坐在里昂的辦公室裡喝著咖啡，兩人一起看著關於非洲行動的新聞報導。當高級政務官出現在螢幕上時，讓一拳捶在里昂的手臂上歡呼起來。\"怎麼樣，我幹得不錯吧，里昂？我看我可什麼都不欠你了。\"讓打趣地說著，看著里昂搖頭。\"你光靠施壓和武力展示，就讓一整個大陸的殖民地偷偷給我們運資源、轉資金。我很驚訝你居然沒被抓包。抱歉現在得請你出去了，我還有收尾的事要辦。回頭機庫見。\"里昂回到辦公桌前，讀著前線的報告，很快又是一臉倦容。\"你得回到天上去，里昂。不然你會死在這地上的。\"讓一邊走出房間一邊喊道。"
 EIZ_lyon_phase_one_economy.10.a:0 "『等等……那樣，那樣也行？』"
