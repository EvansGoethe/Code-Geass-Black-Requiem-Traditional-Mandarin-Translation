 EIZ_oskar_phase_one_military.1.t:0 "The Secrets of the Clock"
 EIZ_oskar_phase_one_military.1.d:0 "\"Will it work... the best it can do, is buy us a little time... find some scraps before the wolves devour us..\" Oskar murmured to himself, muttering intently under his breath his hand coming up to stroke his beard as he stared lost in thought. Where were his eyes glancing? Simply forward, he wasn't sitting at his neat and ordered desk this time, instead he was standing. Looking at the tsarist grandfather clock, its maddening ticking had over time slowly became soothing. He saw his reflection in the glass covering the clock's face as it ticked, seeing his ever increasing grey and white hairs.\n\n\"Why Tomislav... why did you place this burden on me.\" He knew in part the answer to that question, he just wished it wasn't the case. That he could go back home, and just lay down and stay there for the rest of the year. To distract himself he had his eyes drift over the grandfather clock, not just staring at his reflection or its face. It was an old, old grandfather clock. Having been in this office unmoving for, well he had no idea. Though it was mostly clean, mostly spotless. Mostly, suddenly Oskar's eye caught something, a finger print, a thumb print on the front of it, reaching almost around the side. Oskar quickly tilted his head, getting around the side of the clock. Noticing the finger prints had curled around its side, he reached his right hand out and matched it.\n\n\"What's this?\" He had to question, when he perfectly matched his hand to it, he heard a click as his fingers hard curled against a moving piece of wood. With that click, the side of the grandfather clock opened up, Oskar quickly moved around it. Peering his head down into it, it was a tight cramped space of the clock, but it contained a simple paper. A document, quickly Oskar picked it up and searched for its contents. It didn't have much writing, it was almost like it was a scrawled note, yet somehow almost official looking.\n\nThe first thing he read was a set of coordinates, and the second he questioned out loud in mild surprise."
 EIZ_oskar_phase_one_military.1.a:0 "\"The Presidential Bunker?\""
 EIZ_oskar_phase_one_military.2.t:0 "The Presidental Bunker"
 EIZ_oskar_phase_one_military.2.d:0 "The pounding of footsteps was one of the only sounds that could be heard in the concrete tomb, the pounding wasn't from a rush. Just from brisk walking around the corridors, Oskar was almost amazed at this bunker and what he had found. While he had others searching it as he walked around and admired it, he had gone on ahead intent on finding out what this was all for. He turned the corner, entering through a cleared doorway. The room was almost spotless, spotless in a way where there was almost nothing inside it. Like it had been picked clean, all that was left was a metal table in the corner.\n\n\"So this... is where Zakharov spent the last days of his presidency.\" Oskar summarised, assuming that this room so deep and far into the bunker, may as well have been where Zakharov had stayed. Though he didn't have much inclination to that outside of a few factors, one being that this was the Presidential bunker, the other that Zakharov had just disappeared during the chaos. Oskar looked around this room some more, noting the same disturbing detail that was lacking from the entire bunker. \"...No corpses.. No blood, no spent casings... no sign of death.\" He spoke this out to himself softly, as he walked forward, he turned as he walked to catch all the sides of the room. Every inch of it in his eyes, lest he find Zakharov's corpse held up in the corner. The Missing President, found at last. Only he didn't, he just kept walking and turning until he had fully turned again.\n\n\"Where.. Did they go?\" He questioned as he approached the only object in the room, the table. As he got closer he realised there was an object on top of it, a black box. But it wasn't just a box, it was a video tape box. He reached forward and picked it up, looking it over as he flipped it in his hands, underneath it he saw a note scrawled into the table chiseled into it. More coordinates, this rabbit hole went deeper. Deeper then even this bunker extended. \"This is... coordinates, and a video.\" Looking from one to the other, he shook his head. He had a country to run, he didn't have time to play detective if it had no benefit to him. Tucking the video tape away in his suit he turned around and began to walk away. Muttering quietly a promise to himself in the bunker."
 EIZ_oskar_phase_one_military.2.a:0 "\"I'll investigate later...\""
 EIZ_oskar_phase_one_military.3.t:0 "They'll Never See it Coming!"
 EIZ_oskar_phase_one_military.3.d:0 "The biting wind was cold, it felt like it penetrated deeply into Oskar's body, freezing him almost solid. The chill was to be expected, but his body had yet gotten used to it. But being frozen in solid staring ahead wasn't the worst thing in the world here, he was standing near the edge of a port. Looking straight ahead, at colossal ships. Oskar never had much appreciation from boats or even the sea, he hadn't grown up near either of those. But even he could tell, from the size, and the majesty of these ships. That this was something special.\n\n\"So these... are the Ice Breakers.\" He murmured under his beard, his breath froze right in front of him. Producing a white mist, he figured it would be okay to take a few more minutes to appreciate the ships before trying to move. He needed to do that while he could, before they departed. Hopefully to success, and not to death. \"Commander. I didn't expect you to visit.\" Oskar's frozen body shattered as he jumped right out of his skin, while his feet never left the ground it felt like he almost fell right forward. He hadn't been near anyone while he was admiring the ships, quickly turning around to see where the deep almost brooding voice had come from, he spots him. Mainly by his completely silver hair, the colour of the snow. And the scowl on his chiseled face.\n\n\"Ah! Admiral Conroy, didn't see you there. Yes, I was wondering how things are coming along.\" Oskar quickly responds, coughing immediately more white mist being produced into his numb hands as he tries to act like he hadn't just been scared out of his skin by his own subordinate. Conroy took a few heavy steps forward from being behind Oskar to being alongside him, he stood tall. And despite his age he was fit that was evident.\n\n\"Well enough I'd say, they'll be ready for deployment shortly.\" That was reassuring at the least, Oskar didn't speak for a bit. Looking away from the man then looking back at him from the corner of his eye, expecting him to disappear just like a ghost or a bat that could grow wings and fly away. When he didn't, Oskar sighed, relieved. Returning a simple comment that if Conroy was leading the ships, there would be nothing to worry about."
 EIZ_oskar_phase_one_military.3.a:0 "\"They'll never see it coming.\""
 EIZ_oskar_phase_one_military.4.t:0 "Using What we Have"
 EIZ_oskar_phase_one_military.4.d:0 "\"Why... why am I so useless!\" Loathing, hatred, complete incompetency. Oskar's voice was absolutely dripping in all of these, he spoke loudly with his head on his desk and his hands on his neck. He did his best to control himself, and did his best to stifle any tears. Any anger, any rage. His thoughts were just racing, every moment that went down in his head. Every conversation, every phone call, he thought about them all. The issues that may have happened, every little way he could've improved and in part he wondered how he could improve. He let out a soft wail, hoping no one else would hear it as he let it out into his desk, that had seen better days. The once neat and orderly was, for today at least. A mess, documents scattered, the tablet once laying unused now on the floor, perhaps with a cracked screen though Oskar hadn't even been bothered to check.\n\n\"Why can't I- why can't I convince them.\" He muttered, the one thought that was ringing over and over and over and over again in his head. Breathing was growing faster, heavier. Oskar was hyperventilating while doing his best to remain calm, he tried to pull his head up, but now his hands felt so heavy, and when he tried pulling his hands off, his wrists felt so heavy. With a final exertion of effort he pulled them off, pulling his head up, leaning on his desk for support. He tried thinking about what someone else would do, what someone else would say. How Tomislav would do it, closing his eyes, he slowed his breathing, deep breaths. In and out, in and out. In and finally, out.\n\n\"I guess we'll...\" The voice was shaky, the words almost falling apart as he said them, but with a final opening of his eyes, looking at the mess on his desk. He let out that sigh, and began to clean it up, organised it, and put it back together. One piece at a time. Finishing what he started."
 EIZ_oskar_phase_one_military.4.a:0 "\"Just have to use what we have.\""
 EIZ_oskar_phase_one_military.5.t:0 "Stand Firm!"
 EIZ_oskar_phase_one_military.5.d:0 "Walking around a military compound near Moscow, Oskar's eyes caught all sorts of details as he took one step after the other. Surveying the troops, the shoddy equipment, the landscape. He did this hoping in some part his meager presence might improve morale, or at least make it look like he was there for the troops. He thought he was, but he had begun to think that they may not see the same. Just then, his eyes caught onto something. A man in uniform, cowering, shaking, sitting in a crumpled pile by a nearby wall. Oskar could've walked away, alerted an officer, or done anything else. But the more he looked, the more he veered, he went towards them. Step by step, he approached them until he stood right in front of them. Covering them with shade from his body as the sun beat down on them in the Russian cold. The soldier didn't look up, not until Oskar spoke.\n\n\"Soldier... why are you shaking.\" Oskar asked him softly, the soldier shot his head right up in alarm and panic his eyes staring right into Oskar's afraid, Oskar knew that look. He had seen it etched in one place in particular, the mirror. \"Commander! I- I uh- I uh- I just- I just..\" Truly the voice was panicking just as much the man, he looked young though. More so a boy, Oskar looked at him as he trailed off and he asked him simply. \"Can you still stand?\" Offering the boy his hand, the soldier took it with his own. Feeling the callous' on Oskar's hands, and the strength, the weakness he held within them. While pulling him up Oskar said to him simply.\n\n\"If so then stand, and stand firm.\" He said, almost like a command. But it wasn't meant to be, not to the boy at least. But to himself, Oskar looked at him waiting to see if he would fall again, the boy's legs were shaking. Just as much as Oskar's were in his mind, he reached forward and placed both of his hands on the boy's shoulders. Oskar closed his eyes softly as he looked down trying to hide his face as it began to crack. \"I'm sorry... you have to stand firm.\" He muttered, he ordered. The boy was speechless, quiet, some part of him had seemed to calm. To stand tall and proud, but another part was just like Oskar's, it was hurting. Hurting inside. Oskar muttered his next words to himself first, not to the boy."
 EIZ_oskar_phase_one_military.5.a:0 "\"Just... a little longer.\""
 EIZ_oskar_phase_one_military.6.t:0 "Every Peak a Bunker"
 EIZ_oskar_phase_one_military.6.d:0 "\"These bunkers are.. Very impressive, but how did you get this together so quickly?\" Oskar asked, as he was walking just behind one of his soldiers. His name slipped his mind at the current moment, but lately... that was happening with everything. The soldier was leading him through one of the new bunkers in the Urals. They were basically catacombs of weaving concrete corridors, held up by hopes, prayers and mainly steel beams. \"Apparently, while they were excavating for the new bunkers, they found these old tunnels and a connected network of bunkers already set up. We just worked on reinforcing them.\" The soldier answered him simply, his voice was unlike what was expected of a soldier, not tough, not gruff. It was light and gentle, strong enough to be gentle. Oskar, was almost glad to hear it this time, and not another tough on his ass general who had seen more violence in a second then Oskar had seen in his life. They turned a corner where they quickly avoided walking right into other soldiers passing through.\n\n\"How long ago were they built?\" Oskar couldn't help but wonder as he looked around, eyeing up and down the concrete walls, they seemed semi clean but they wore old wounds, old scars and old life. The soldier thought for a second as he remembered, allowing the two men to walk the halls in silence for a moment. Save their own footsteps, and... something more. Oskar could've sworn he heard just on the other side of the wall to his right, rustling. Rustling of something heavy. \"Judging off the old flags and memorabilia, they were built back when the Tsar was in charge of Russia. We haven't got much information out of these ones. I think there's still plenty of bunkers we haven't found yet.\"\n\nThat was reassuring, if there were more bunkers that could be found that was more bunkers that could be used. Less that needed to be built, and less money that needed to be spent. That was how Oskar's mind seemed to work as of late, counting every penny. Every action. Oskar didn't say anything as he shook his head, the rustling sound disappearing. The two men continued to walk, until Oskar had thought they were back the way they came. Only to realise no, they were even further in. Each of the halls looked almost identical, a labyrinth of corridors, hallways. Lightly manned and staffed, he wondered how easy it was to hide down here.\n\n\"Sir. Some of the men garrisoning these bunkers even whisper that they hear rustling and movement in the walls. It's nothing, I'm sure.\" The soldier said to Oskar, as if he too had heard the sound from the wall and wanted to reassure him. Oskar was already lost in thought, contemplating and thinking. But then his mind rounded back on the benefit of these bunkers, and they far, far out weighed the negatives. So, to him it was nothing. Which was exactly what he let the man know."
 EIZ_oskar_phase_one_military.6.a:0 "\"Seems just a soldier's superstition..\""
 EIZ_oskar_phase_one_economy.1.t:0 "Repair What we Saved"
 EIZ_oskar_phase_one_economy.1.d:0 "\"Oskar here's the reports on the factories, long story short. Most of the equipment has been broken, mainly due to cumulative resistance groups. Some as sabotage by current workers... and the rest is just. Outdated, old.\" Laszlo explained to him, his voice didn't drone on at all, but Oskar was finding it harder and harder to listen to anything at all. So instead, he took the paper from his hands and began to look, and read while he spoke. Luckily it came with pictures, though they didn't paint a pretty sight, they showed broken machinery. Photos from resistance groups, the Sword and Cross. Active sabotage by current workers, and worst of all. The dates were shown in high detail closeups on some of the equipment. Some of it were stretching decades old, some even older. Oskar shook his head as Laszlo handed him another piece of paper, this time it was specifications for more equipment.\n\n\"You recommend requesting more from the E.U., that they might hand over some modern day equipment that... works?\" Oskar asked him, not bewildered, not befuddled. But just for clarification as to the point Laszlo was going for this, Laszlo cleared his throat as he looked at Oskar with a slight worry painting his face. \"I would yes- if we can?\" When Laszlo started, Oskar did as well, he started very simply. Just by shaking his head, side to side until Laszlo finished, he handed the papers back to Laszlo who took them into his hands once more.\n\n\"We can't. They won't send anything more... We'll just have to get it repaired...\" Oskar said dejected, almost lost. It was beginning to take its toll on him, and it was beginning to show on his face. So much so, that Oskar decided to turn himself around and face away from Laszlo, not even bothering to look forward, not bothering to look at all. While he finished his statement."
 EIZ_oskar_phase_one_economy.1.a:0 "\"It's all we have..\""
 EIZ_oskar_phase_one_economy.2.t:0 "Russia For Russian's"
 EIZ_oskar_phase_one_economy.2.d:0 "Oskar looked Laszlo in the eyes as he handed him his next document, just one piece of paper with one request on it. Without waiting Oskar then stood up, just so he could stretch his legs and get out of his damned chair for once. He tucked it in while Laszlo speed read the document, and managed to turn his back before he was questioned. \"Sir, about this... request, why do you want to limit E.U. advisors and workers it just seems-\" Oskar stopped him by holding up his right hand, he tucked his left behind his back as he began to look. Look out the window that sat behind him, and look out onto everything below. Onto Russia below, with people wandering about. Some are trying to get to work, some are trying to live. And others, well hard to say what they wanted.\n\n\"They... don't have a vested interest in this country Laszlo. They come here to get rich off the spoils of a war, or for some patriotic duty to help.\" He explained to Laszlo as his eyes drifted, he spotted a few people that were like red ants amongst the rest. Out of place, acting differently. It was easily apparent on the streets below, from this view. Who was Russian and who was Europian. \"And the Russians?\" Lazslo asked, Oskar stood there watching, he leaned closer, until he gently put his forehead against the glass. Trying his best to not let his body collapse onto it.\n\n\"This is their home, they'll fight for it. Die for it, they'll work for it... and sadly... they'll work for it for whatever we can give them.\" There was a hint in his voice, a hint of truth. A hint of sadness, he thought about what he had to do. What choices he had to make, it was him. It was all him, he had to do this, he was the only one that could do this. And maybe... just for this moment he'd admit that to Laszlo, admit that one little thing. He started with a simple.\n\n\"I wish I didn't...\" And finished it off with."
 EIZ_oskar_phase_one_economy.2.a:0 "\"Have to exploit them.\""
 EIZ_oskar_phase_one_economy.3.t:0 "It's Not Enough!"
 EIZ_oskar_phase_one_economy.3.d:0 "\"So, as you can see Oskar... our efforts sadly won't be enough, there's no way we can-\" Oskar heard it, and he had heard enough. The pot had been boiling over, ready right on the edge of explosion. One bad thing after another, one bad meeting after another. He had to contain it, he had to keep it in check. If he couldn't keep it together who could? Who was out there that could do this? There was no one. Through gritted teeth, Oskar was able to tell Laszlo one thing.\n\n\"Leave.\" Laszlo seemed to have taken a step back, he had never heard that tone from Oskar, the tone of a simmering furnace, it was wheezing. On the way to an explosion, Laszlo shuffled for a second unsure what to do, he let out a soft. \"Oskar?\" Oskar shook his head, as he stood up from his chair, before doing anything drastic he reiterated one last time. \"Leave.\" His voice getting hotter and hotter, his face growing red. Laszlo looked at Oskar who wouldn't look him in the eyes, and quickly turned to leave, shuffling out the room in record speed, slowing down just enough to prevent the door slamming behind him. When the door closed, it clicked into place. Oskar slammed his fists right down onto the desk hard! He then swiped his arms across it, throwing the neatly ordered papers, the documents stacked together, the cup of pens, the tablet with a crack in it everywhere. All landing on the floor, the glass screen of the tablet let out a whine as it cracked further. The desk was now clear, but Oskar wasn't done.\n\n\"It won't be enough... It won't be enough.\" He began muttering, over, and over, and over, and over, and over. He took his right fist, and began pounding it onto the same spot on the desk over and over. Meeting his mad muttering as he did it, the pain began growing in his fist. White hot, searing, but it wasn't enough to cool his anger not until one last time he finally shouted."
 EIZ_oskar_phase_one_economy.3.a:0 "\"It won't be enough!\""
 EIZ_oskar_phase_one_economy.4.t:0 "Oskar... Missing?"
 EIZ_oskar_phase_one_economy.4.d:0 "\"Have you... seen Oskar around? I've been looking for him.\" Laszlo was at his wits end, he knocked on Oskar's door and got no response. So clearly he had gotten up to go somewhere, yet everyone he asked gave him no answer. Until finally he waited around for any passerby, asking this one who he couldn't remember the name of the same question he asked every person who had passed him in the hallway. He held his documents close to his chest lest they fly away.\n\n\"You tried his office?\" The woman asked him nicely after he asked, her voice light. Her accent seemed to be French Laszlo would've guessed, he dealt with enough frenchmen and women to tell. He sighed, of course he did. And he told her that in the same breath. \"First place I checked, I knocked and there was no-\" The woman gave him the look like she knew something, so she motioned for him to follow her. With a wave of her hand as she started to walk off, so Laszlo did. They seemed to be walking the same direction Oskar's office was in, but presumably Oskar hadn't managed to return there without passing by Laszlo.\n\n\"Did you... go inside? He's been... sleeping in there for some time now.\" She told him, almost awkwardly like it was a secret whispering it quietly. Laszlo looked into his brain, no he never does. He only ever knocks, it's rude to just barge in on someone like that. They walked in silence for a little bit, just until they arrived at Oskar's door, the lady stepped first towards it, grabbing the doorknob and turning it softly until it clicked open, she then pushed it away. It was dark in the room, no lights on, the only light coming from outside.\n\nBut there he was Oskar, splayed across his desk, having accidentally knocked his papers off, and presumably his unused tablet as it lay there on the ground. A broken screen, Laszlo admitted shyly to the kind French woman."
 EIZ_oskar_phase_one_economy.4.a:0 "\"I... I didn't realise.\""
 EIZ_oskar_phase_one_economy.5.t:0 "More Goddamnit!"
 EIZ_oskar_phase_one_economy.5.d:0 "\"We need more!\" Oskar shouted, fed up with this beating around the bush and this negotiating. His eyes glared right into Tomislav's flickering blue holographic visage. Tomislav kept his face cool, not seeming perturbed or annoyed by Oskar's sudden shouting. Oskar didn't care if he was though, at the very least that would let his damned point be gotten across. He was at a rope's edge, and he needed something to help him. He had to do this, he was the only one that could. Tomislav saw that in him, so at the very least he could do this one thing for him to help. \"Oskar, please. You don't need to-\" Tomislav attempted to calm him down, attempted to keep things civil. His voice not wavering once as he looked at him, finding the words and weaving them together hopefully in a way that would calm Oskar, but it didn't. He slapped his hand down at the edge of his desk, it rang across his room and Oskar hoped it came across to Tomislav in his office, looking at Oskar's holographic visage.\n\n\"We need more Tomislav! We're working with a shoe string budget and you want us to complete a miracle! I don't care what it takes, find the way to get us the money now!\" Oskar shouted as he pointed an accusatory finger right at Tomislav, he pointed it so close it would stab into his chest if they were in person. His eyes boring into his as best they could, there was a fire in them now. A glint, perhaps a sliver just a sliver, of a burgeoning madness. Something deep that was festering, like an infected cut or wound. Something in Oskar's mind, what it was? Oskar would be able to create a list of potential reasons, one of which he was currently pointing at. Who remained dead silent, the silence went on and on. The quietness seemed to affect Oskar a little as well, who to himself began shifting. Shifting side to side in his chair, as it began to prick at him. This was the Third President he was speaking to, and he was yelling at him like he was a drill sergeant. He took his pointed finger back and laid it flat on the desk. Tomislav stood there, unflinchingly still, making it look like yet again the hologram had broken, had frozen solid. Until he finally spoke again.\n\n\"I'll try Oskar, but yelling won't get you anywhere with negotiation-\" The hologram then died, not because of its power supply dying, or because of a short circuit. No, Oskar's free hand had moved on its own, and turned it off. He had gotten what he needed out of Tomislav, he didn't need to be lectured on the right way to do things. This way had to work, for it was the way he had chosen, it was the way he had to hold and carry. Nothing else would do, nothing else would work. Oskar slid the hologram's disc out the way, off to the side. He admitted quietly to himself, in a now dead room."
 EIZ_oskar_phase_one_economy.5.a:0 "\"It'll have to...\""
 EIZ_oskar_phase_one_economy.6.t:0 "It Might Be Enough..."
 EIZ_oskar_phase_one_economy.6.d:0 "\"Oskar you look...\" That was a thought that Laszlo had and he didn't mean to say outloud, he looked at Oskar. His eyes softening, he had expected to go in there like a hardass. Oskar had apparently gone off the deep end recently ever since his meeting with the Third President, he had become loud. Aggressive, constantly angry. Trying to force his way to get what he wants, and snap everyone into line with the crack of his proverbial whip. But, Laszlo couldn't do it, not as he looked at Oskar now. That furnace had seemingly gotten burnt right out, his eyelids looked heavy, deep bags sitting under his eyes. His hair was now more white then it was grey, same with his beard. His eyes spoke more than words, he seemed. Like a dead man walking, or more accurately. A dead man, sitting in his chair. Looking at his friend that had worked alongside him longer than either could currently remember.\n\n\"Is it enough... Laszlo?\" Oskar didn't even try anymore, didn't try to say much. Didn't try to respond, his mind was currently locked onto one thing, and it was stuck on it. While Laszlo stood there, having marched right up to his desk he was now unsure what to do as he looked down at him. It was incredible, how different a man looked, depending on what angle you viewed him. Here he seemed weak, dead, like a failure. \"Look this isn't the time to talk-\" Laszlo admitted as he reached into his pocket, trying to find a handkerchief or something he could hand over to Oskar, he hadn't brought a stack of documents or paper. This wasn't for work, this was to settle things. But now here he was, completely and utterly empty handed to help. It seemed like he couldn't help Oskar, perhaps at this point it was too late for anyone to help Oskar.\n\n\"Is... it.... Enough?\" Oskar yawned in the middle of his sentence, his mouth opening wide for a second then closing, yet his eyes when they closed stayed closed, and didn't open for what felt like minutes. Until they finally did, looking right at Laszlo again, expecting a miracle. Laszlo didn't have a miracle, he couldn't lie to Oskar, he couldn't lie to him, not now. He could only tell what was the truth. \"It might be...\" He admitted shyly, trying to look away from him. It was good he did, the moment he did tears seemed to prick at Oskar's eyes, needing him to close them, he kept them closed as he looked down, muttering to himself."
 EIZ_oskar_phase_one_economy.6.a:0 "\"Goddamnit...\""
 EIZ_oskar_phase_one_economy.7.t:0 "An Unholy Arrangement"
 EIZ_oskar_phase_one_economy.7.d:0 "It felt so heavy in his hands, such a little device. Such a little disc, yet in his hands it felt like a massive weight, that it weighed as much as a tank. Or a heart, he flipped it over in his hands, the bottom side was mostly smooth, it was made out of two main panels it seemed, flipped over one another. It really had the look of a prototype, or an experiment, flipping it over again was the main part of the device seemingly. It raised up, then went flat, completely flat for a glassy, glossy black screen. Where the hologram actually came from, Oskar breathed in and out. Finally making up his mind, he placed it flat on the table, adjusted some of the papers next to it to keep his desk neat, tidy and in place. Then reached his free hand out, over to the side. To hit the button, to turn it on. This as a prototype, had no other people that would connect to it. Which was good, he only had one man he needed it to connect to. Oskar thought he'd have to wait, but shortly after he heard.\n\n\"So, you've decided then Oskar?\" Tomislav's words crackled into his ears, before his holographic form crackled to life. His from freezing, unmoving as if he was frozen but no, it was just a pose he held, and could hold for a seemingly indefinite amount of time. Oskar reaches the hand back and tugs on his collar, he was... hesitant to say the least to turn to a man such as the Third President of the E.U. for help, especially given that he was given this task because Tomislav had no one else to do it. But, he admitted it, he knew. Oskar knew it, he couldn't do it alone. \"Yes... if you wouldn't mind Tomislav, I would like-\" Tomislav seemed prepared, almost too prepared. As if he was fully expecting this turn of events to happen, as if he had already the plan written up in his mind. That he paved the road, and Oskar was simply driving down it just as he wanted. \"You're here because you want me to handle the negotiations.\" While the here, that Tomislav mentioned was technically false. As one man sat in the comfort of his home in Danubia, and the other sat in a foreign office made temporarily his home in Russia, it resonated just the same with the both of them. Oskar nodded softly, then afraid the hologram wouldn't pick it up, he nodded much more in depth. Speaking alongside it, letting it trail off into places unknown to him. \"I am...\" It was silent between them for just a little bit, a moment of thought. Or perhaps just a moment of thought, and reprieve.\n\n\"You've realised you can't do it alone?\" Tomislav continued, almost expecting, perhaps wanting an answer from Oskar. But as Oskar looked at him, Tomislav took in his features. Looking him up and down, as best as he could with only some part of his body shown on his end, mostly the upper torso. He decided to alleviate some of Oskar's worries. \"Don't worry, I'm very familiar with Middle Eastern customs as of... yesterday.\" Oskar thought that was a joke for a second, but seeing in Tomislav's unflinching eyes that he wasn't. He finally just let himself express what he wanted to. Letting out a very emotion filled."
 EIZ_oskar_phase_one_economy.7.a:0 "\"Oh, thank god.\""
 EIZ_oskar_phase_one_economy.8.t:0 "A President and a Prince"
 EIZ_oskar_phase_one_economy.8.d:0 "Oskar had to give his credit to the E.U. engineers, or scientists, or whoever it was that was able to conceptualise and come up with, and also get working the holographic tech that the E.U. was starting to get out. It was simply stunning, with one simple disc on his desk, it was both able to project his form out across Russia into Tehran in Iran. And it was able to project within the confines of his office an almost full ring desk. Oskar's desk seemed to form one part of the ring, as the hologram continued off its sides and wrapped around until it was a full circle, almost as if it was integrating him into it. What he saw outside the desk, and the chairs right next to them, plus a few meters was just his normal office. The hologram was only able to capture so much, the true size of the room in Tehran could be gigantic, or not any bigger than Oskar's office. He was about to turn to his left while looking at it, to sing his praises to the system to Tomislav who was sitting, his body turned away from Oskar looking forward. But then, Tomislav stood right up, and began walking to the other end of the hologram. Saying to someone invisible to Oskar.\n\n\"Your royal highness Zubayr bin Abdulaziz Al Saud, as-salaam alaykum.\" Oskar was glad to see that Tomislav had actually picked up Middle Eastern customs, even if what the words meant was alien to him. Oskar then watched as the person Tomislav addressed came into form from the hologram, the Prince or a Prince of the Nejd. \"Wa alaykum as-salaam... Third President Tomislav I assume?\" He spoke, his voice was not as... Smooth, or clean as Tomislav's was. It almost reeked in, inexperience. Perhaps an immaturity, the Prince extended his hand to Tomislav who almost seemed to be waiting for it as Tomislav accepted it almost immediately, when he did he took a step back, pointing to a chair near him, as Tomislav returned to his own. The Prince took his time sitting. \"Then this... must be..\" Prince Zubayr trailed off; he had initially turned to Tomislav when he sat. But then turned, looking right at Oskar, the details of the Prince's outfit, and his face. Even the colours of both were hard to make out, the hologram could only do so much. The blue sheen of it covered both, but he continued to look, meeting his eyes. Oskar was going to introduce himself, but then Tomislav cut in for him. Allowing Oskar to shut up, content to let Tomislav do the talking. \"Oskar Von Mendel... your... royal highness.\" Tomislav said, it almost read alien to Oskar's ears, to hear the attempted reverence Tomislav applied to the title he used to refer to the Prince, but he assumed this is what you had to do in negotiations, understand who you were talking to and their preferences and what they wanted. The Prince turned back to Tomislav, content now to ignore Oskar, a non important factor in this meeting seemingly.\n\n\"Ah, I see. Well. Let's get down to business.\" The Prince cut that in, like he was the only one else needed to be present for this deal. A self centeredness that, well. Perhaps it would fly in the normal negotiations the E.U. had. Oskar had no idea, just listening intently as Tomislav aimed to listen to that. "
 EIZ_oskar_phase_one_economy.8.a:0 "\"Yes, let's.\""
 EIZ_oskar_phase_one_economy.9.t:0 "Inviting The Iranians"
 EIZ_oskar_phase_one_economy.9.d:0 "The scribbling on paper, rapidly as Tomislav noted down, was easier to hear than it was to see in the hologram. But, it was also in part covered up by Tomislav's talking. As he listened and did his best to keep track of what Prince Zubayr was interested in. \"So, you wish for exclusive rights to oil in the Caucasus' that can be arranged, however I was-\" He tried to continue his point, but as he looked up from writing he was interrupted, his eyes falling on someone else also just out of frame. Rather than the Prince that was seated just a little bit away from him. Tomislav rapidly dropped his pen, and placed both hands on his section of the ringed desk, and stood up keeping his eyes trained on the just out of sight and reach figure.\n\n\"Ah! Your royal highness Ariyan Phlavi, as-salaam alaykum.\" Another Prince had entered the arena of negotiation. While it seemed like Tomislav was intent to cross the room to shake the hand of yet another member of royalty, he didn't as he watched Prince Zubayr push his chair out, the back of it fading out, pushed out the hologram's reach. The Prince then turned to look up, as Prince Phlavi entered the frame. He seemed older, or at least more experienced then Prince Zubayr, that could just be seen with the differences on how the two carried themselves. One slouched, relaxed, like he owned the room. The other held his head high, and his body stiff and rigid, almost like Tomislav. Except when Tomislav did it he looked natural. \"Yes yes, Wa alaykum as-salaam Tomislav, and to you as well. Zubayr.\" Phlavi seemed like he was in a hurry, with the way he looked at Zubayr who smiled just a little. It seemed like he was intently aware of the Prince's efforts to get all that he wanted out of this, and leave Phlavi with nothing. Though, the Prince's didn't battle here. Not obviously, not with anger or annoyance. But with glares, looks, and perhaps snide remarks. Tomislav took his seat, then Phlavi took his, just to the right of Zubayr, Phlavi took a look at Oskar before turning his gaze back to Zubayr. \"How nice of you to join us...\" The younger Prince said, mainly out the corner of his mouth as he glanced at Phlavi. Tomislav, seeing the tension with his own eyes, looked at the both of them and placed his hands forward in a pushing down gesture.\n\n\"Please, I invited Ariyan Phlavi here to give you both something for your support. Oskar, if you would?\" Tomislav then used his hands to direct the Prince's to Oskar, Oskar shook, but he did his best to hide that. He was unexpecting a call in to talk so soon, and especially to get both attention on him from the two Princes. Clearing his throat hopefully in a not obvious way he said softly. \"In exchange for exclusive rights to oil for the Nejd, we would grant Iran control over and management of Caucasus' for whatever they deem fit..\" Oskar was intent on continuing, but he watched as both Princes turned around. Tomislav who just sat down stood up again, clearly a new person had arrived. A new Prince, before Oskar even got a good look at this Prince, just listening to the scuffle of movement that could be heard but not seen. He muttered very quietly under his breath."
 EIZ_oskar_phase_one_economy.9.a:0 "\"How many Princes are there...\""
 EIZ_oskar_phase_one_economy.10.t:0 "Iraq Crashes The Meeting"
 EIZ_oskar_phase_one_economy.10.d:0 "\"You have a negotiation with the E.U. and intend to leave Iraq out of it?!\" The Prince burst into the hologram seemingly just as aggressively as he burst into the room this meeting was properly being held in. He grabbed the tops of the backs of both the chairs the two Princes were sitting in, clearly they both seemed terrified. Zubayr shut up, his smiles dropping, his skin seemed to start sweating. Phlavi on the other hand, became so stiff it almost looked like he died. This new Prince, he was tall. He seemed strong, confident, and yet at the same time- way older, he had a long, long beard. Almost as long as Oskar's, though with his height. It perhaps was longer. Though Oskar was unable to see if it was pure black, or had flecks and streaks of grey in it. Tomislav looks at the Prince, and speaks softly to him. His voice not shifting once at any development, seemingly nothing had shocked him this entire time.\n\n\"I'm so sorry, your royal highness Haidar-\" He started, but Prince Haidar looked at him, speaking in a deep tone. Where his anger seemed to fade, or more so be redirected. Not at Tomislav. \"Silence, you are not at fault. I hold the fault with these two immature princelings.\" Tomislav heeded those wide words, and so fell completely silent. Instead, deciding to let Prince Haidar take charge. Yet, it seemed like that was exactly what Tomislav wanted, he was completely intent to hand the reigns of negotiation off completely. Not just to Haidar, but each Prince that had appeared, minus Phlavi who didn't get a chance to do much. But Oskar had no doubt he would if the Prince tried. \"I care not what they plan to offer and get, whatever they offer I will double. With only two things in exchange.\" Prince Haidar took a few final glares at the two Princes, they seemed so terrified of him they sat up straight. Dead silent, one sweating buckets, and the other stiffer than wood. Seemingly there was a threatening presence or aura that Haidar emitted that didn't transfer through the hologram, or perhaps Haidar had walked in with an army in the back. Which would also explain entirely their fear. \"Go on.\" Tomislav said to him, offering him the floor as he took his seat right back. Hopefully intending to stay seated this time until the end.\n\n\"You allow Iraq to remilitarise on its borders with Turkey, and to form a larger army.\" Ah, it made sense now. Completely, Iraq had been the main sufferer of the defeated during the Desert War. The demilitarised border being one of its main issues, while it might be a bridge too far for Tomislav to cross on his own, completely unable to get it passed without either of the first two Presidents say, or the rest of the government of the E.U. that didn't seem to bother him in this moment. While he didn't see it on his face, Oskar had grown accustomed to Tomislav now. And he knew, he was smiling. Which let Oskar have the final realisation with this entire meeting. He whispered it quietly."
 EIZ_oskar_phase_one_economy.10.a:0 "\"Tomislav's planned jackpot..\""
 EIZ_oskar_phase_one_economy.11.t:0 "The Tehran Proposal"
 EIZ_oskar_phase_one_economy.11.d:0 "\"I don't know... how you pulled that off..\" Oskar said, it was a compliment. Covered in amazement, but also bewilderment. He waited to say it until he noticed that every holographic form displayed in his office had disappeared, all except for Tomislav. Who stood up again, and adjusted his tie. Oskar had to wonder what colour it was, it was impossible to tell in the holographic blue. Tomislav stood up straight, in a perfect posture. With one hand on the chair he had made his home for the meeting he looked at Oskar. Meeting his gaze.\n\n\"Likewise Oskar, I wouldn't know a lick about some of your work.\" He said, tilting his head to the side and offering Oskar the slightest smile. It was dripping in charm and charisma, a hint to his success in negotiating. Oskar didn't have much else to think about, only an immediate question to follow up. \"Did you plan them all-\" Tomislav cut him off, almost with a shrug. But instead of adjusting his shoulders he just held his free hand out. It perfectly displayed the other seats that were around the table. Now empty, clearly a direction to point to those who were sitting in them before. \"Of course, to succeed in negotiations you must control it without them realising it.\" Again, with that damn smile now. Oskar shook his head, reaching back to scratch his head with his free hand. Tomislav holstered his hand that was out, and used the one on the chair to push it back in, he then went to his cuffs. Adjusting them slightly, he then turns to leave. Getting a few steps away, before realising Oskar was still holographically present, while Oskar couldn't see this the best, he watched Tomislav turn back around and begin approaching him. Presumably where the projector or disc was doing this hologram.\n\n\"What, what happens now?\" Oskar asked him, as if he had completely forgotten everything about this meeting, he saw Tomislav reach forward and the hologram reaches out towards him, almost touching him. Only for it to flicker the rest of the holographic room fading just revealing Tomislav now, who before disconnecting with Oskar left him with his last piece of advice."
 EIZ_oskar_phase_one_economy.11.a:0 "\"You win the war.\""
 EIZ_oskar_phase_one_economy.12.t:0 "President's First Steps"
 EIZ_oskar_phase_one_economy.12.d:0 "\"Another day... another problem crushed.\" Tomislav spoke, simply... softly, he had no need to keep up appearances. Not now, not when he was in his office. Alone, in solitude. He couldn't even look around it, it was completely shrouded in dark, only in the comfort of this dark does he lean back. Breaking his perfect posture, he lets himself rest. Relaxing against his desk chair, leather that was dark before, but in the darkness looked almost pitch black. There were no windows in his office, he preferred it like that. He had no need to turn back, and look upon his city. It was his, no matter if he could see it or not. Could see the ants roaming about. Starring forward at his desk, he saw the holographic disc off to the side of it, reminding him of someone.\n\n\"Oskar... are you like me? Are you... fed up with this country, this... form of governance.\" Tomislav continued to speak softly, but now quietly. While he knew the words would never reach Oskar, not while he was all the way in Russia. Not from his office, not unless he turned the hologram on. He still spoke his words, feeling. Embittered, with it all. Gritting his teeth, despite all the work he does. It still feels so pointless and frustrating. \"Every law, every legislation... faces a gaggle of corrupted fools, who want nothing more than to hinder, and halt its passing. All for their own benefits... goals and plans...\"\n\nPure, frustration. That's all that came from Tomislav's words, it was completely dripping in it. Words he would say to himself in his head but not outloud, not unless he was alone. \"Can it get better? Is there anything better? Democracy is rotten, dictatorships are destructive... But unlike dictatorships... snuffed out when one life is taken.\" Tomislav kept himself relaxed in his chair, as he tilted his head side to side, contemplating. Thinking, trying to figure out the answer to his next question. One he would leave silently, before needing to get back to work. He stood up, and went around his chair, grabbing it by its head, and pushing it into his desk while he finished."
 EIZ_oskar_phase_one_economy.12.a:0 "\"When does democracy die...\""
 EIZ_intervention.1.t:0 "Lyon Intervenes in The East"
 EIZ_intervention.1.d:0 ""
 EIZ_intervention.1.a:0 "'The Red Flag needs our wind.'"
 EIZ_intervention.1.b:0 "'The Lion needs our support.'"
 EIZ_intervention.2.t:0 "Frederika Intervenes in The East"
 EIZ_intervention.2.d:0 "Frederika lay still on the sofa, her mind swirling with Russia's state of being. Yes, Europia has made good progress, but it didn't stop her from dwelling on the threats to the east. She stressed over how many innocent lives had been lost and if it could have been prevented. Not to mention whoever would come out on top would eventually come to claim the rest of Russia, leaving Europia to deal with yet another war.\n\nFrederika sat up, her typically straight shoulder length hair now scruffy.\n“Hannah?” She beckoned, “May I borrow you for a second?”\nHannah came in instantly. “What do you need?”\nFrederika adjusted a sleeve. “I need to bounce some ideas off of you.”\nHannah sighed and rubbed her forehead in frustration, knowing Frederika didn't manage to get any relaxation. “What about?”\nFrederika put her fingers through her hair in an attempt to straighten it. “I have to decide on what to do with the east. If we let it go on for too long, too many innocent people will die.”\n\nSilence lingered after Frederika spoke. Despite Frederika trying to stay stoic, Hannah noticed some pain in her eyes. Hannah walked over to sit next to Frederika. “Okay. Tell me your ideas.”\n“We have no right to declare war on them currently,” Frederika mulled. “It may sound counterintuitive, but to end the war quicker we have to give support to one of them.”\nHannah recoiled at the suggestion.\n“Giving supplies to a future enemy? Are you sure?”\nFrederika nodded her head solemnly. “If it can prevent unnecessary deaths, I'm afraid so.”\nHannah looked at Frederika, proud of her leader's sense of duty. “Stay here, I'll find information about the leaders. If we're going to support an evil, we might as well support the lesser one.”\n“Thanks Hannah,” Frederika said, a warm smile on her face.\n\nA few hours passed and Hannah came back with a huge pile of documents courtesy of their spy agency. The two spent the rest of the day debating the pros and cons of each side, until eventually at four in the morning they came to a conclusion."
 EIZ_intervention.2.a:0 "We shall assist the reds."
 EIZ_intervention.2.b:0 "We shall assist Euro-Britannia."
 EIZ_intervention.3.t:0 "Oskar Intervenes in The East"
 EIZ_intervention.3.d:0 ""
 EIZ_intervention.3.a:0 "'The Red Flag needs our wind.'"
 EIZ_intervention.3.b:0 "'The Lion needs our support.'"
 EIZ_intervention.4.t:0 "Backing The Siberians"
 EIZ_intervention.4.d:0 "Subject: Ceasing Britannian Operations in Russia\nFrom: Commander in Chief of the Europian Intervention Zone\nTo: Politburo of the Siberian People's Republic\n\nHistory has proved us enemies, but history need not be cyclical. Britannia poses a great threat to the world and it is up to us to repel their advancements. You pride yourselves with a love for your country and we pride ourselves on protecting peace. Accept Europia's logistical aid this once and Britannia's foothold on Russian land will be extinguished. We await your response and hope that the past is not a blinding object to see the greater threat."
 EIZ_intervention.4.a:0 "A beneficial cause to Russia is something we cannot deny."
 EIZ_intervention.5.t:0 "Backing The Euro-Britannians"
 EIZ_intervention.5.d:0 "Subject: Supporting a Hasty Victory\nFrom: Commander in Chief of the Europian Intervention Zone\nTo: Augusta Henry Highland\n\nIt is Europia's understanding that the ongoing battle in eastern Russia is giving you trouble. With our victory securing peace in the west, Europia now offers to reach out a hand to give temporary assistance. If you accept, we will provide logistical support to your armies and help hasten your victory. Your enemies follow the footsteps of their predecessors and must be stopped lest a second great war breaks out. Europia trusts Britannia to help us bring peace back to Russia."
 EIZ_intervention.5.a:0 "His majesty allows this fleeting partnership."
 EIZ_intervention.6.t:0 "Bear Stands United"
 EIZ_intervention.6.d:0 "Steam swirled around the room as Frederika turned off the faucet, the nearby window which provided a view into the snow had fogged over. She placed a half empty beer can on the tiled floor and raised her leg to dip a toe into the bath. Delight came over her face as she sank slowly into the scorching water. For the first time since arrival, she could finally relax properly. Frederika leaned over to grab the can, but tipped it over by accident. She grumbled and manoeuvred her hand further along to find the rest of the beer pack and took her fourth can. Memories filled her head of college as she took a sip, then relaxed her arms over the side of the bath. “Heh… Thanks for importing this Treuebier, Hannah.”\n\nFrederika tilted her head to the side, swearing she could hear the beer talk back to her.\nFrederika smirked. “Well aren't you bold, asking for that. I suppose I can't say no to you.”\nFollowing the beer's order, Frederika raised her arm to salute the can as she poured the rest in the bath with her. Her arms lowered once more over the side of the tub as she sighed in bliss and closed her eyes.\n\nHours passed. Hannah, who had searched the whole building to find Frederika, pushed open the unlocked door to see empty beer cans spread across the floor with a snoring Frederika in the tub."
 EIZ_intervention.6.a:0 "Waking the tiger can wait, for her dignity's sake."
 EIZ_intervention.7.t:0 "Lion And Bear Togther"
 EIZ_intervention.7.d:0 ""
 EIZ_intervention.7.a:0 ""
 EIZ_intervention.8.t:0 "Siberia Burning..."
 EIZ_intervention.8.d:0 ""
 EIZ_intervention.8.a:0 ""
 EIZ_a_new_beginning:0 "A New Beginning"
 EIZ_a_new_beginning_desc:0 "From the ashes of Moscow, rise a new being. One that carved its way out of Russia, with the support and help of the E.U., the Europian Intervention Zone. A nation comprised majorly of E.U. soldiers and bureaucrats. With one goal in mind, to return Russia. The E.U.'s own backdoor, to stability."
 EIZ_Chief_Of_Army:0 "Order in the Barracks"
 EIZ_Chief_Of_Army_desc:0 "placeholder"
 EIZ_Head_Of_Logistics:0 "Establish Our Supply Routes"
 EIZ_Head_Of_Logistics_desc:0 "placehoder"
 EIZ_Administrator_Of_Government:0 "Department of Civilian Affairs"
 EIZ_Administrator_Of_Government_desc:0 "placeholder"
 EIZ_Final_Selection:0 "The Final Selection"
 EIZ_Final_Selection_desc:0 "placeholder"
 EIZ_lyon_victory_desc:0 "Lyon is a good military man and a charismatic commander. His time in the Desert War was spent as an ace pilot, The experience left his patience with democracy and bureaucracy strained, finding himself sharing more in common with the mercenary aces who flew alongside him. His plan to make sure this war is cold, calculated, unrelenting, and efficient."
 EIZ_Request_Economic_Support_V1:0 "Request Europian Funding"
 EIZ_Request_Economic_Support_V1_desc:0 "The opinions regarding our intervention into the civil war have been split among the council, we are in desperate need for any kind of support both economically and militarily from those who support us in Europe, nonetheless we must lobby for support to aid us in our battle against our enemies."
 EIZ_Raise_Volunteers:0 "French Volunteers"
 EIZ_Raise_Volunteers_desc:0 "Our military forces are spread quite thin across the occupied territories, due to this we need to ask our sponsor France to send us volunteers to help improve our military situation, once we get a solid military presence sorted out we can progress with our war plan to bring Russia back into the fold."
 EIZ_Total_War:0 "Total War"
 EIZ_Total_War_desc:0 "The time has come to enact the first phase of our war plan to bring Russia back into the fold, eliminating the Monarchists are the first obstacle standing in between us and our goal of reunifying Russia under France’s control, Lyon has ordered for our soldiers to take no mercy against them and destroy all those who fight against us."
 EIZ_Lyon_Ground_Support:0 "Lyon's Ground Support"
 EIZ_Lyon_Ground_Support_desc:0 "In Spite of our key focus on using air power to win this war it is an unavoidable fact even to Lyon that a ground contingent is necessary. If we don’t have anyone on the ground to hold the line or push our gains then the enemy could simply walk into our airfields and blow up our precious planes."
 EIZ_Lyons_High_Command:0 "Lyon's High Command"
 EIZ_Lyons_High_Command_desc:0 "With our army doctrine solidified we can now increase our control over the military high command. Reluctant individuals and non-cooperative officers from rival EU members shall be sent packing to be replaced with Lyon’s associates and French Officers. "
 EIZ_Holding_The_Line:0 "Hold the Line"
 EIZ_Holding_The_Line_desc:0 "Every war comes through history no matter how complex at its core comes down to an infantryman and his weapon. Let’s not overcomplicate our ground doctrine. We simply need men with guns to hold the line and push the opportunities presented by our air power."
 EIZ_Drafting_Russians:0 "Draft Russians"
 EIZ_Drafting_Russians_desc:0 "Our rather blunt force strategy has bad optics back in europe. Every rifleman shipped back to Europe in a coffin draped in a flag runs a week of bad press for us and that has an effect on the budget. Since we are fighting for Russia it is only fair they take up an increased share of the struggle and be grateful for the air power us europeans provide."
 EIZ_Ramp_Up_Rifle_Production:0 "Ramp up Rifle Production"
 EIZ_Ramp_Up_Rifle_Production_desc:0 "As we ramp up infantry deployments to the frontlines we find our stockpiles of basic infantry weapons to be heavily strained. We shall streamline and move our weapons production to Russia proper rather than shipping the weapons in from europe. This should solve our logistical issues regarding the equipment of our infantry."
 EIZ_Standardise_Field_Artillery:0 "Standardize Field Artillery"
 EIZ_Standardise_Field_Artillery_desc:0 "Artillery for a long time has been the pinnacle of a modern and competent force. They are flexible tools useful for many situations from defense to attack to even anti air duty but we currently lack the means to produce sufficient numbers of these guns. To win this war we must produce more artillery so we shall standardize the designs and parts so that we can mass produce more of these guns and cut down the extra parts needed."
 EIZ_Lyon_Stand_Firm:0 "Stand Firm"
 EIZ_Lyon_Stand_Firm_desc:0 "We must hold the line at all costs. The work of the Air Force will be for nothing if our frontlines collapse. Every soldier must do their duty for Europe and not move back an inch. Behind them are our Airfields and if we lose them the whole war is lost. If we keep the flights going the poor wretches at the front might stand a chance."
 EIZ_Giving_The_Army_Wings:0 "Give the Army Wings"
 EIZ_Giving_The_Army_Wings_desc:0 "We should increase cooperation between the air force and the army to ensure better coordination on the battlefield, this increased cooperation may bear some fruit in the future and aid us in our cause to restore order to Russia and unify it once more under European control."
 EIZ_Create_General_Purpose_VTOLs:0 "Create General Purpose VTOLs"
 EIZ_Create_General_Purpose_VTOLs_desc:0 "The increased cooperation between the air force and the army has led us to create VTOLs for military application, this should make air operations easier and the transportation of troops to key areas of the frontline faster, it is certainly a breakthrough in our war effort against the Monarchists."
 EIZ_Air_Mobile_Infantry:0 "Air Mobile Infantry"
 EIZ_Air_Mobile_Infantry_desc:0 "Infantry is naturally slow compared to vehicles or planes. This is a weakness that can be overcome with infantry vehicles but with our focus on the Air Force we can’t afford to diverge too much industry to this so we shall put the infantry on our aircraft and drop them into the combat zone or as close to it as possible creating mobile infantry corp with a speed the world has yet to see."
 EIZ_Aerial_Logistics:0 "Aerial Logistics"
 EIZ_Aerial_Logistics_desc:0 "The need to send supplies to the front lines is imperative. Where trains and trucks suffer from terrain, planes can go over with ease and at a much greater ease avoiding traffic jams and partisans. Our relative control of the skies and our increasing surplus of transport aircraft compared to trucks and trains makes this an obvious choice."
 EIZ_Valkyrie_Doctrine:0 "Valkyrie Doctrine"
 EIZ_Valkyrie_Doctrine_desc:0 "Our aircraft can be used to support our ground forces in more ways than just supplies and transportation. Planes can make quick pinpoint strikes against enemy forces, or launch heavy bombardment over an area. Meanwhile our helicopters can provide closer and longer lasting support to an infantry company, as well as fulfill the quick strike capabilities of planes. Focusing our aircraft support doctrine around this will increase the effectiveness of our forces through the use of combined arms."
 EIZ_Lyons_Air_Force:0 "Lyon's Air Force"
 EIZ_Lyons_Air_Force_desc:0 "As a pilot Lyon has always been a proponent of aviation as a decisive factor in winning a war. Now he has complete command of the intervention effort he can finally prove his theories to the doubters in the EU high command. Russia shall be Lyon’s showcase of what air power truly does for a war."
 EIZ_Found_The_Special_Project_Core:0 "Found the Special Project Core"
 EIZ_Found_The_Special_Project_Core_desc:0 "Shortly after declaring this war we've come to the realization that as our troops are fighting on the front we can use the time their buying us to develop new ways to outsmart our enemies so we've decided to form the S.P.C whose focus is to develop new means to combat the enemy forces with weapons they probably wouldn't have expected."
 EIZ_Contacts_In_The_ESA:0 "Contacts in the ESA"
 EIZ_Contacts_In_The_ESA_desc:0 "Our enemies have proven to be quite formidable on the battlefield, our reconnaissance efforts so far have been subpar which has lost us many battles, we should contact the Europian Space Agency and request that they provide satellite data on enemy positions to enhance our intelligence on the enemy."
 EIZ_Loosen_Rules_of_Engagement:0 "Loosen Rules of Engagement"
 EIZ_Loosen_Rules_of_Engagement_desc:0 "Certain restrictions on engaging the enemy have prevented us from waging an effective war on the Monarchists, Lyon has concocted a plan to overstep certain restrictions to enhance the freedom of our soldiers to “act as they will '' towards the enemy, he hopes this will provide results both in the sky and on the battlefield."
 EIZ_summon_sapphire_squadron:0 "Summon Sapphire Squadron"
 EIZ_summon_sapphire_squadron_desc:0 "With the war continuing and an increasing need to tip the balance Lyon has seen it fit to play his top card, Sapphire Squadron. These pilots are some of the best in Europe with legends that precede them wherever they go. Deploying these veteran’s from France will go beyond a tactical advantage to a psychological one as well. No one has fought a pilot from sapphire and lived to tell the tale."
 EIZ_Supremacy_in_Numbers:0 "Supremacy in Numbers"
 EIZ_Supremacy_in_Numbers_desc:0 "Our military industrial capability is heavily lacking in its ability to produce aircraft. If we can’t produce enough planes and train enough pilots we will lose this war very quickly. Our strategy must revolve around getting as many planes in the air as possible so we can overwhelm our enemies by sheer strength of numbers."
 EIZ_Streamline_Training:0 "Streamline Training"
 EIZ_Streamline_Training_desc:0 "Pilot training in the modern age has become increasingly expensive and complicated. It takes months and costs millions to train pilots to EU standards. We must move our training goalposts if we want to keep up with the growing size of our Air Force. Training shall be made quicker, easier and cheaper to perform per-pilot. This strategy harkens back to the late stages of the great war when you learn to fly a plane in 30 minutes (though not quite as quick though…)"
 EIZ_More_Pilots_Than_Planes:0 "More Pilots Than Planes"
 EIZ_More_Pilots_Than_Planes_desc:0 "It is an inevitable fact that we are going to lose pilots, especially if they do not receive optimal levels of training. Because of this we need to make sure that for every pilot killed in action we have a trained replacement ready to take his place in the sky. This way we can beat the enemy by sheer numbers and industry."
 EIZ_Shock_And_Awe:0 "Shock and Awe"
 EIZ_Shock_And_Awe_desc:0 "Since our air force is large and widespread we can overwhelm frontline targets with waves of bombers, it doesn’t matter if they shoot one down because another 4 will hit the target in its place. This strategy of shock and awe means the enemy will learn to never crawl out of whatever foxhole they are hiding in for fear of being blasted back to the stone age."
 EIZ_Intergrate_Russian_Aircraft:0 "Integrate Russian Aircraft"
 EIZ_Intergrate_Russian_Aircraft_desc:0 "Even though we are ramping up our production levels we still lack an immediate reserve of aircraft to achieve our current goals. We can remedy this by seizing the aircraft of the now defunct Russian Republic’s Air Force and pressing their pilots into service. They may not be as capable as EU aircraft being a few generations behind our current levels but if they get shot down we will only lose Russian pilots so who cares?"
 EIZ_contacts_in_aerospace_manufacturing:0 "Contacts in Aerospace Manufacturing"
 EIZ_contacts_in_aerospace_manufacturing_desc:0 "Building aircraft in Russia presents numerous problems, most immediately is that aircraft factories in Russia are vulnerable to enemy attacks and sabotage. Secondly the Russian aerospace industry we inherited from the republic is woefully inadequate and unable to produce modern aircraft. Luckily we have many contacts with Aerospace defense contractors in Europe who have advanced factories safely away from the war and will happily provide aircraft."
 EIZ_Great_War_Levels_Of_Production:0 "Great War Levels of Production"
 EIZ_Great_War_Levels_Of_Production_desc:0 "We need to accelerate our production of aircraft. We shall do this by recreating the great war model of aircraft production. Back then we could produce hundreds of aircraft cheaply and on a wide scale with little need for technical training for the factory workers. Of course the increased cost and complexity of even simplified modern aircraft makes the exact formula impossible but it will work as long as we invest enough into building the factories."
 EIZ_Block_Out_The_Sky:0 "Block out the Sky"
 EIZ_Block_Out_The_Sky_desc:0 "We have finally done it! Our aircraft production and pilot recruitment is high enough that we have finally gained an overwhelming numerical superiority over the enemy. It doesn’t matter if they shoot down a plane because we have 5 waiting to replace them with eager pilots waiting as well. In combat we simply smother the enemy with our numbers, we have so many aircraft in the air they can hardly tell the contacts apart on their radar!"
 EIZ_Supremacy_in_Technology:0 "Supremacy in Technology"
 EIZ_Supremacy_in_Technology_desc:0 "With funding and a whole war to test things out. Lyon can finally follow his dreams of creating the perfect Aircraft and going down as one of the great innovators in aerial warfare. We shall focus on creating advanced aircraft that can dominate the skies even if outnumbered. One good fighter is better than Ten mediocre ones."
 EIZ_encourage_the_best:0 "Encourage the Best"
 EIZ_encourage_the_best_desc:0 "A good plane is nothing without an equally good pilot. Our current system of pilot promotion is too bureaucratic and doctrinaire. We need to streamline our system so the truly talented can rise without being constrained by time served or connections."
 EIZ_pilots_who_can_take_on_armies:0 "Pilots who can Take on Armies"
 EIZ_pilots_who_can_take_on_armies_desc:0 "With our focus on getting better pilots we should also promote the truly great pilots. Those for whom flying is in their blood and carry engagements on their own. Given proper support and advanced aircraft to these Aces will ensure the skies shall be ours."
 EIZ_Strike_Hard_Strike_Fast:0 "Strike Hard Strike Fast"
 EIZ_Strike_Hard_Strike_Fast_desc:0 "Since we lack a large well defended bomber fleet frontline bombing raids are a suicidal endeavour. Because of this we shall perfect the strategy of strike warfare. Using stealthy and fast multi-role aircraft we can strike important targets behind enemy lines where their defenses are weakest. Exploiting the weaknesses in enemy air defenses means we can destroy these targets before they even have the time to respond. "
 EIZ_no_expense_spared:0 "No Expense Spared"
 EIZ_no_expense_spared_desc:0 "Since we are moving away from trying to build a large air force we can instead invest more of our budget into design. We must spare no expense when it comes to making the perfect aircraft, many great projects have been destroyed by budgets and committees and we can’t risk that happening here."
 EIZ_contacts_in_aerospace_research:0 "Contacts in Aerospace Research"
 EIZ_contacts_in_aerospace_research_desc:0 "The intervention zone does not have much in the way of an aerospace industry or research base. Luckily we can call on our contacts within Europe's military-industrial complex who do have access to aerospace and research assets that we don’t. All we need to do is offer them money and contracts and they should be more than happy to help."
 EIZ_The_Perfect_Fighter:0 "The Perfect Fighter"
 EIZ_The_Perfect_Fighter_desc:0 "With the blank cheque we have given to Europian aerospace defense contractors they can now work without restrictions or budget constraints. While this may increase the final production cost of aircraft the combat effectiveness should be truly impressive. Now we can finally equip our pilots with the best."
 EIZ_Knights_of_The_Sky:0 "Knights of the Sky"
 EIZ_Knights_of_The_Sky_desc:0 "With the combination of our advanced fighter program and ace pilot initiatives we have finally achieved our dream, to finally be the knights of the sky. Our pilots and their planes are becoming legends of the skies, something akin to the Brittanian knightmare pilots. We shall go down as some of the greatest to ever grace the skies and we are only just beginning…"
 EIZ_Lyon_Economic_Board:0 "Lyon's Economic Board"
 EIZ_Lyon_Economic_Board_desc:0 "With the Europian Intervention Zone established, we must focus on our economy as much as our military; without it, we cannot maintain the Zone, let alone the front. To achieve this, we have asked France to send us economists who will establish an economic board with the goal of designing and implementing an economic program for the E.I.Z."
 EIZ_casablanca_proposal:0 "Casablanca Proposal"
 EIZ_casablanca_proposal_desc:0 "Morocco used to be a shining jewel in the French Empire in the golden days. Today they are a faded protectorate with most of their resources being drained and trade importance lost. Due to this, they have been sorely neglected by the French, but this works out nicely for us. The colonial government has been increasingly dependent on the thriving criminal underworld in casablanca. We should be able to levy these connections and make them an offer they can’t refuse."
 EIZ_calling_the_pale_jewel:0 "Calling the Pale Jewel"
 EIZ_calling_the_pale_jewel_desc:0 "Unlike many other colonies like the West African Confederation is not anywhere near as neglected and economically derelict as places like Morocco or Ethiopia. However the government has very amenable anti-colonial members who can be convinced to give us aid if we highlight how our future efforts will damage structures of colonial exploitation. "
 EIZ_cook_the_books:0 "Cook the Books"
 EIZ_cook_the_books_desc:0 "We must ensure funding and facilities to run our forces and construct new facilities but our mandate was given scarce funding and resources. Neither can we afford to heavily tax the people and create turmoil behind our lines. So we must do something many would consider illegal and this may come back to bite us later but we shall forge and alter documents making it appear as if we have more funding than we actually do and as if we own facilities we did not own before."
 EIZ_send_accountants_to_the_front:0 "Send Accountants to the Front"
 EIZ_send_accountants_to_the_front_desc:0 "There are many EIZ officials and accountants who are too clever for their own good. We have been getting reports of junior officials following the paper trail of our less legal efforts to secure funding and are getting close to collapsing the house of cards that is keeping the EIZ together. We can solve this by making sure they receive postings away from HQ on the front lines where no one will hear from them and if we are lucky they might get themselves killed."
 EIZ_off_the_books_trading:0 "Off the Books Trading"
 EIZ_off_the_books_trading_desc:0 "Paper trails and bookkeeping only harpers our efforts to secure funding. We can make much better deals with foreign powers to secure resources without Brussels Bureaucrats peering over our receipts and complaining that we are buying from war criminals under EU sanctions. If they spent half the time they did complaining actually giving us money we wouldn’t have to do this in the first place."
 EIZ_bribe_officials:0 "Bribe Officials"
 EIZ_bribe_officials_desc:0 "As our efforts grow we are starting to fall into the old adage that you need to spend money to make money or in our case you have to spend money to stop the pyramid of fraud from collapsing in on itself. To prevent more people finding out we are having to pay key officials large sums of cash to keep everything under wraps. Luckily the amount we are gaining far offsets the costs we sustain paying people hush money."
 EIZ_international_banking_fraud:0 "International Banking Fraud"
 EIZ_international_banking_fraud_desc:0 "We need money to sustain the war effort. However the EU are demanding we fight a billion euro war and are giving us the equivalent of pocket change to fight it. Because of this we have to look to less conventional methods to balance the budget. Europe has a vast financial sector which is questionably regulated. While committing mass financial fraud would be damaging Europe's economy as a whole, all we are really doing is taking what they should have given us."
 EIZ_insider_trading:0 "Insider Trading"
 EIZ_insider_trading_desc:0 "War and strife is often a great driver of market change. Given we are in charge of one of the largest Europian military operations since the Great War we are privy to a lot of market changes. We could use our knowledge of market trends we shall be creating and profiting from this. We buy up reserves of chromium and then bomb a few mines in the urals and suddenly we are rolling in cash. Stock Trading is fun when you know you will always win."
 EIZ_comb_the_prisons_and_banks:0 "Comb the Prisons and Banks"
 EIZ_comb_the_prisons_and_banks_desc:0 "Our efforts to secure funding via illegal banking and trading practices may have grown a bit out of our control, long story short we may now be at the center of one of the largest financial conspiracies in Europian history. To keep up with our growing efforts we shall recruit more shady bankers from europe to help us and even recruit a few white-collar criminals currently languishing in russian prisons, why leave them there when we can have then do some good for us."
 EIZ_prepare_for_market_changes:0 "Prepare for Market Changes"
 EIZ_prepare_for_market_changes_desc:0 "While we are going to receive direct sources of income from the raids in the form of loot and spoils we would be foolish to overlook the other potential of income this presents. These raids will cause market shockwaves and our prior knowledge should allow us to ride the financial waves to make even more money. We shall contact our friends in finance and tell them to prepare for the storm."
 EIZ_the_contract:0 "The Contract"
 EIZ_the_contract_desc:0 "We need resources as well as cash to sustain the war machine. Luckily Jean-Marie has managed to make contact with a shadowy group of individuals who are interested in funding us. This seems like a promising option though we are currently unsure of what they want from us we are pretty sure that the EU wouldn’t like it. "
 EIZ_ethiopian_haven:0 "Ethiopian Haven"
 EIZ_ethiopian_haven_desc:0 "These raids will be highly illegal and off the books. Because of this we must find a base of operations that can not only sustain these operations but is also hidden and out of reach of those who would retaliate. Ethiopia has a large degree of autonomy from the EU and also has a surplus of abandoned airfields that were used during the Somalia Crisis. We can acquire these for our own use and make sure the government in Ethiopia won’t tell Europe about what we are doing."
 EIZ_libiyan_raid:0 "The Libyan Raid"
 EIZ_libiyan_raid_desc:0 "Libya has many resources that the EU has neglected to protect since the region is mostly peaceful. Since they are not using it we shall claim their bounty for the war effort. Jean-Marie shall lead a string of coordinated airborne raids from the air to loot key industrial facilities of their resources. Since this operation is so outlandish we shall definitely have the element of surprise. They will never see it coming!"
 EIZ_loot_south_africa:0 "Loot South Africa"
 EIZ_loot_south_africa_desc:0 "South Africa is one of the more important African holdings for Europe being the largest EU producer of sakuradite. Luckily the stability of the state is built on a house of cards and we should easily be able to storm in and make off with a fortune. The operation shall be targeted to happen whilst the prime-minister is distracted and the high commissioner is out of the country to make sure no one can coordinate a response against us."
 EIZ_lyons_magnum_opus:0 "Lyon's Magnum Opus"
 EIZ_lyons_magnum_opus_desc:0 "Our mad gambit actually worked! We have bent the rotten colonial superstructure of Africa to our will. Our raids are virtually unopposed and often not even needed as underfunded and intimidated officials just hand over what we want. A whole continent is now ours to plunder without opposition, the bounty of Africa shall pave our way to victory in Russia!"
 EIZ_Volunteers_From_the_French_Sphere:0 "Volunteers From the French Sphere"
 EIZ_Volunteers_From_the_French_Sphere_desc:0 "placeholder"
 EIZ_Spanish_Volunteer_Quality:0 "Spanish Quality"
 EIZ_Spanish_Volunteer_Quality_desc:0 "Spanish divisions are equipped with means for reconnaissance on the battlefield, which makes them dangerous opponents on the front."
 EIZ_English_Volunteer_Quality:0 "English Quality"
 EIZ_English_Volunteer_Quality_desc:0 "In the Europian Union, we used to distrust the English, because in fact they are the ancestors of Britains. Fortunately, for 200 years they have completely cut off contacts with the Pendragon, and the help of their industry and navy during the war was invaluable. Their divisions have clear organization and very well armed."
 EIZ_Italy_Volunteer_Quality:0 "Italian Quality"
 EIZ_Italy_Volunteer_Quality_desc:0 "The Italians have been the most loyal allies since the time of Bonaparte, their divisions have powerful artillery support capable of destroying numerous advancing enemy columns and fortified points."
 EIZ_Morocco_Volunteer_Quality:0 "Moroccan Quality"
 EIZ_Morocco_Volunteer_Quality_desc:0 "The Moroccan divisions are equipped with MLRS, which allows them to bury the enemy in fire traps in the vast deserts, in addition, they can stay in the environment for a long time thanks to well-structured logistics and consumption."
 EIZ_Portugal_Volunteer_Quality:0 "Portuguese Quality"
 EIZ_Portugal_Volunteer_Quality_desc:0 "The Portuguese are very good at forcing water barriers, thanks to the presence of many amphibious vehicles and marine units. In conditions when it is necessary to take a fortified coast, there are no better people than the Portuguese."
 EIZ_Spanish_Volunteer_Quantity:0 "Spanish Quantity"
 EIZ_Spanish_Volunteer_Quantity_desc:0 "The Spanish infantry will be able to create a lot of problems for the enemy who broke through the front and went deep inside the line. They are numerous and have experience in guerrilla fighting."
 EIZ_English_Volunteer_Quantity:0 "English Quantity"
 EIZ_English_Volunteer_Quantity_desc:0 "The units recruited from the Scotish, Irish and Welsh regions. They have extensive experience of wars in the mountains and wooded areas. They will help us plug the gaps in the front on rough terrain. In addition, these peoples hate the British most of all, so they are ready to fight not for life, but for death."
 EIZ_Italy_Volunteer_Quantity:0 "Italian Quantity"
 EIZ_Italy_Volunteer_Quantity_desc:0 "Italians will gladly go into battle for Europian democracy, their divisions can be placed in the most dangerous areas, where the enemy forces outnumber them in numbers. They are good at fortifications, so you will have to try to smoke them out."
 EIZ_Morocco_Volunteer_Quantity:0 "Moroccan Quantity"
 EIZ_Morocco_Volunteer_Quantity_desc:0 "Moroccans are very hardy people, their units can be in absolute isolation for months without the support of allies. They move quickly through the desert and will help us close the rear in arid areas."
 EIZ_Portugal_Volunteer_Quantity:0 "Portuguese Quantity"
 EIZ_Portugal_Volunteer_Quantity_desc:0 "Portuguese light infantry will be able to help cover the port bases and prevent the enemy from going deep into the continent or expand the bridgehead."
 EIZ_multinational_volunteers:0 "Multinational Volunteers"
 EIZ_multinational_volunteers_desc:0 "The war effort has reached far enough that a huge influx of volunteer troops are offering to join our fight!"
 EIZ_Lyon_West_Secured:0 "West Secured"
 EIZ_Lyon_West_Secured_desc:0 "placeholder"
 EIZ_Lyon_Putting_Down_The_Rebels:0 "Putting Down the Rebels"
 EIZ_Lyon_Putting_Down_The_Rebels_desc:0 "placeholder"
 EIZ_Lyon_Crossing_The_Urals:0 " Crossing the Urals"
 EIZ_Lyon_Crossing_The_Urals_desc:0 "placeholder"
 EIZ_Lyon_Intervene_In_The_East:0 "Lyon Intervenes In The East"
 EIZ_Lyon_Intervene_In_The_East_desc:0 "placeholder"
 EIZ_Lyon_Backing_The_Socialists:0 "Backing The Socialists"
 EIZ_Lyon_Backing_The_Socialists_desc:0 "We can support the Socialists in the war with Euro Britannia, so we can weaken our opponent in the long term and subsequently finish off. But we will not be able to compete directly with the Lion so well."
 EIZ_Lyon_Feeding_Their_Industry:0 "Feeding Their Industry"
 EIZ_Lyon_Feeding_Their_Industry_desc:0 "by giving the Socialists production facilities we don't need, outdated machines, we will be able to feed their industry by giving the resources necessary for the army. We won't lose anything, but we also earn extra money."
 EIZ_Lyon_Supplies_Red_War_Machine:0 "Supply The Red War Machine"
 EIZ_Lyon_Supplies_Red_War_Machine_desc:0 "Siberia is not ideal farmland. The fact that they have managed to sustain themselves out of the land is quite impressive. Expired Europian soldier rations can be given out and boost their capabilities."
 EIZ_Lyon_Bear_United_Against:0 "The Bear Stands United Against Invaders"
 EIZ_Lyon_Bear_United_Against_desc:0 "The importance of national unity has been long forgotten. The socialists excel in this. It's only natural to help enforce their unity in the face of Euro-Brittania. We can start to undermine it after they succeed."
 EIZ_Lyon_Revolution_fuel_are_Soldiers:0 "Revolutions Fuel Are Soldiers"
 EIZ_Lyon_Revolution_fuel_are_Soldiers_desc:0 "If you gather people of left-wing views from all over the EU and send them to your beloved Komi, then you can feed the revolutionary engine of the Russians well. And it does not matter who these leftists are - anarchists, liberals, social Democrats, all will be suitable for the defense of the Siberian expanses."
 EIZ_Lyon_Cutting_Lion_Communication:0 "Cutting The Lion's Communications"
 EIZ_Lyon_Cutting_Lion_Communication_desc:0 "The terrain of Russia is a loathsome beast, and requires constant communication to not fall victim to the wilderness. If those communication lines were to get interrupted, those at the front would be sitting ducks."
 EIZ_Lyon_Resistance_Last_Man:0 "Resistance To The Last Man"
 EIZ_Lyon_Resistance_Last_Man_desc:0 "The Siberians believe their propaganda deeply. Having such a durable enemy will be troublesome, but as an ally they don't give up."
 EIZ_Lyon_Death_Traitor_Punishment:0 "Death is The Betrayer's Punishment"
 EIZ_Lyon_Death_Traitor_Punishment_desc:0 "It is an inconceivable notion to even consider allowing Britannia a foothold on Europian soil. The Euro-Britannians cannot be allowed to continue existing. For the greater good, we stand with the Socialist People's Republic!"
 EIZ_Lyon_Backing_The_Euro_Britannians:0 "Backing The Euro Brittanians"
 EIZ_Lyon_Backing_The_Euro_Britannians_desc:0 "We can support the Euro-Britannians in the east of Russia. Without a doubt, the victory of the anti-colonial forces will cause a rise in patriotic sentiments among Russians, such a thing cannot be allowed. Better an old enemy than a new one."
 EIZ_Lyon_Lion_Needs_Strength:0 "The Lion Needs Strength"
 EIZ_Lyon_Lion_Needs_Strength_desc:0 "Euro-Britannia still doubts their enemy's capabilities. The resources Britannia has sent are laughably pitiable. It's time you show them a taste of the power Europia has by sharing some of our own equipment."
 EIZ_Lyon_Enemy_of_Enemy_Supplies:0 "The Enemy Of My Enemy Gets Supplies"
 EIZ_Lyon_Enemy_of_Enemy_Supplies_desc:0 "If it weren't for our empires touching through the Atlantic, supplying Euro-Britannia would be troublesome. Thankfully we can utilise that adjacency to ship supplies seamlessly to them."
 EIZ_Lyon_Lion_Bear_United:0 "The Lion And Bear United"
 EIZ_Lyon_Lion_Bear_United_desc:0 "Communism was allowed to fester just once in history, with devastating results. We cannot allow it to continue again. If it were to bleed further west, we would face an ideological threat that harbours only hatred for the EU."
 EIZ_Lyon_Send_Lapdogs:0 "Send The Lapdogs"
 EIZ_Lyon_Send_Lapdogs_desc:0 "Britannians sent over still fail to grasp the nature of Russia. It's best if we send some troops of our own to guide them."
 EIZ_Lyon_Socialist_Little_Hell:0 "Socialists Little Hell"
 EIZ_Lyon_Socialist_Little_Hell_desc:0 "The foolish Britannians have underestimated the terrain. Without giving away our entire tactics, we can provide a simple explanation on how to deal with the environment they have found themselves in."
 EIZ_Lyon_Price_Revolution:0 "The Price Of Revolution"
 EIZ_Lyon_Price_Revolution_desc:0 "The chaos the Siberians have spread across their province is taking its toll on the citizens. Exporting propaganda into their population's hands will slow down recruitment, leaving them more vulnerable to Euro-Britannia's march forward. "
 EIZ_Lyon_Red_Flag_Burns:0 "The Red Flag Burns"
 EIZ_Lyon_Red_Flag_Burns_desc:0 "The pain the citizens have suffered under the communist revolution is almost at an end. All you need to do now is hope Euro-Britannia doesn't screw up."
 EIZ_Lyon_Siberia_Burns:0 "Siberia Burns And Now We Wait"
 EIZ_Lyon_Siberia_Burns_desc:0 "We have backed our horse and all we can do now is reap the rewards, prepare for the future, and rebuild the west. Whoever comes out on top in the east, a war will likely be inevitable between us. Let us hope that our gamble pays off."
 EIZ_frederica_victory_desc:0 "placeholder"
 EIZ_a_just_war:0 "A Just War"
 EIZ_a_just_war_desc:0 "War is an ugly thing for those whom it falls upon to fight it and for those whom it falls upon to endure it, what justice can be found in the middle of a war? Surely, with rules and war tribunals the barbarism of war will be quelled and the destructive potential of war reduced as much as humanly possible. We fight for the Rightful Democratic Russian government which holds the interests of all Russians in heart, we are different from the barbarians to our east that fight for their own riches and power, all of the EU can clearly see this and must assist us in our crusade to bring justice to Russia and save the Russian people from tyranny."
 EIZ_request_economic_support_V2:0 "German Aid"
 EIZ_request_economic_support_V2_desc:0 "Germany produces some of the finest armored vehicles in the EU. Naturally, the Lioness of France has a predilection for these people and their works, and would like to work with them now and in the future. The German government has shown to be eager to bring a swift end to the war in Russia in order to restore access to the Russian market as quickly as possible, and protect their investments in Russia from the barbarity of war. They will accordingly offer financial support to Frederica's war effort."
 EIZ_request_unoffical_reinforcements:0 "Vol German"
 EIZ_request_unoffical_reinforcements_desc:0 "Receiving support from the government is one thing, but receiving support from the people themselves is challenging at the best of times, especially during times of war. Nonetheless private companies, prominent political figures, and the smallfolk also wish to contribute to bringing some relief to the Russian people, and accordingly they have organized themselves into various nonprofit organizations with the intent to relieve the Civilians from the hardships of war."
