 EIZ_Frederica_Crossing_The_Urals:0 "越過烏拉山脈"
 EIZ_Frederica_Crossing_The_Urals_desc:0 "placeholder"
 EIZ_Frederica_Intervene_In_The_East:0 "Frederika Intervenes In The East"
 EIZ_Frederica_Intervene_In_The_East_desc:0 "儘管我們在俄羅斯西部取得了勝利，但東方的戰爭仍在繼續。如果我們策略得當，這可以轉化為我們的優勢。藉由經濟與軍事援助——即便不直接參戰——我們可以支持衝突中的某一方，以確保結果對我們更為有利，即便與任何一方的戰爭最終都不可避免。"
 EIZ_Frederica_Backing_The_Socialists:0 "Backing The Socialists"
 EIZ_Frederica_Backing_The_Socialists_desc:0 "新西伯利亞的社會主義者雖然難以捉摸，但支持他們會對我們有利。他們的組織性較差，且缺乏大國的支持。這將使未來與他們的任何衝突在整體上風險更低。"
 EIZ_Frederica_Feeding_Their_Industry:0 "Feeding Their Industry"
 EIZ_Frederica_Feeding_Their_Industry_desc:0 "簡單來說，西伯利亞人缺乏歐洲不列顛尼亞所擁有的純粹火力。儘管他們目前的伏擊戰術到目前為止效果顯著，但他們急需的裝備卻嚴重匱乏。分享我們生產份額的贈禮，是我們為確保其勝利所應採取的第一步。"
 EIZ_Frederica_Supplies_Red_War_Machine:0 "Supply The Red War Machine"
 EIZ_Frederica_Supplies_Red_War_Machine_desc:0 "西伯利亞並非理想的農田。他們能靠這片土地養活自己，實在令人欽佩。可以發放過期的歐洲軍糧，提升他們的能力。"
 EIZ_Frederica_Bear_United_Against:0 "巨熊團結一致抵禦侵略者"
 EIZ_Frederica_Bear_United_Against_desc:0 "民族團結的重要性早已被遺忘。社會主義者在這方面表現出色。面對歐洲不列顛尼亞，幫助加強他們的團結是很自然的事。他們成功後我們就可以開始破壞它。"
 EIZ_Frederica_Revolution_fuel_are_Soldiers:0 "Revolutions Fuel Are Soldiers"
 EIZ_Frederica_Revolution_fuel_are_Soldiers_desc:0 "不管你怎麼評價那些赤色分子，但他們的演講確實具有極富感染力的激情。模仿他們的個人魅力將能賦予我們的士兵遠離家鄉作戰所需的動力。"
 EIZ_Frederica_Cutting_Lion_Communication:0 "Cutting The Lion's Communications"
 EIZ_Frederica_Cutting_Lion_Communication_desc:0 "俄羅斯的地形是令人厭惡的野獸，需要不斷的溝通才能不成為荒野的受害者。如果這些通訊線路被中斷，那麼前線的人就會成為靶子。"
 EIZ_Frederica_Resistance_Last_Man:0 "Resistance To The Last Man"
 EIZ_Frederica_Resistance_Last_Man_desc:0 "西伯利亞人深信他們的宣傳。有這樣頑固的敵人會很麻煩，但作為盟友，他們不會放棄。"
 EIZ_Frederica_Death_Traitor_Punishment:0 "Death is The Betrayer's Punishment"
 EIZ_Frederica_Death_Traitor_Punishment_desc:0 "考虑让不列颠尼亚在欧洲土地上立足是一个不可思议的想法。不能允許歐洲不列顛尼亞人繼續存在。为了更大的利益，我们与社会主义人民共和国站在一起！"
 EIZ_Frederica_Backing_The_Euro_Britannians:0 "Backing The Euro Brittanians"
 EIZ_Frederica_Backing_The_Euro_Britannians_desc:0 "位於鄂霍次克的不列顛尼亞代理政權是更容易預測的支持選項，他們雖然缺乏物資，但在不列顛尼亞帝國的支持下，結果幾乎注定會對他們有利。押對寶可能會帶來好處，即便這意味著未來會面對一個更強大的對手。絕不能給共產主義者另一次死灰復燃的機會。"
 EIZ_Frederica_Lion_Needs_Strength:0 "獅子需要力量"
 EIZ_Frederica_Lion_Needs_Strength_desc:0 "歐洲不列顛尼亞仍然懷疑敵人的能力。不列顛尼亞送來的資源少得可笑。是時候透過分享我們自己的一些設備來向他們展示 Europia 的力量了。"
 EIZ_Frederica_Enemy_of_Enemy_Supplies:0 "The Enemy Of My Enemy Gets Supplies"
 EIZ_Frederica_Enemy_of_Enemy_Supplies_desc:0 "如果不是我們的帝國橫跨大西洋，向歐洲-不列顛尼亞供應物資將會很麻煩。值得慶幸的是，我們可以利用這種毗鄰關係將物資無縫地運送給他們。"
 EIZ_Frederica_Lion_Bear_United:0 "The Lion And Bear United"
 EIZ_Frederica_Lion_Bear_United_desc:0 "共產主義在歷史上只有一次被允許惡化，並造成了毀滅性的後果。我們不能允許這種情況再次繼續下去。如果流血進一步向西蔓延，我們將面臨一種只對歐盟懷有仇恨的意識形態威脅。"
 EIZ_Frederica_Send_Lapdogs:0 "Send The Lapdogs"
 EIZ_Frederica_Send_Lapdogs_desc:0 "派過來的英國人仍然沒有掌握俄羅斯的本質。我們最好派一些自己的部隊來引導他們。"
 EIZ_Frederica_Socialist_Little_Hell:0 "Socialists Little Hell"
 EIZ_Frederica_Socialist_Little_Hell_desc:0 "愚蠢的英国人低估了地形。在不洩漏我們全部策略的情況下，我們可以提供一個簡單的解釋，說明如何應對他們所處的環境。"
 EIZ_Frederica_Price_Revolution:0 "The Price Of Revolution"
 EIZ_Frederica_Price_Revolution_desc:0 "西伯利亞人在全省蔓延的混亂正在給公民帶來損失。將宣傳輸出到他們的民眾手中將減緩招募速度，使他們更容易受到歐洲不列顛尼亞前進的影響。"
 EIZ_Frederica_Red_Flag_Burns:0 "紅旗燃燒"
 EIZ_Frederica_Red_Flag_Burns_desc:0 "公民在共產主義革命中所遭受的痛苦幾乎已經結束。現在您所需要做的就是希望歐洲-不列顛尼亞不會搞砸。"
 EIZ_Frederica_Siberia_Burns:0 "Siberia Burns And Now We Wait"
 EIZ_Frederica_Siberia_Burns_desc:0 "我們已經背了馬，現在能做的就是收穫回報，為未來做好準備，重建西部。無論誰在東方獲勝，我們之間的戰爭都可能不可避免。讓我們希望我們的賭博得到回報。"
 EIZ_OskarVictory:0 "Oskar Victory"
 EIZ_OskarVictory_desc:0 "恭喜奧斯卡接管了 EIZ，但目前面臨一個問題：沒有足夠的人力來滿足 EIZ 的駐防需求，因此奧斯卡正在與俄羅斯行政當局合作，徵召當地居民來防衛該介入區。"
 EIZ_Request_Economic_Support_V3:0 "請求經濟支持"
 EIZ_Request_Economic_Support_V3_desc:0 "placeholder"
 EIZ_Force_Russians_To_War:0 "這是你們的國家！"
 EIZ_Force_Russians_To_War_desc:0 "placeholder"
 EIZ_A_Desperate_War:0 "絕望的戰爭"
 EIZ_A_Desperate_War_desc:0 "雖然距離 EIZ 成立及奧斯卡接掌大局僅過去了幾週，但君主派、歐洲不列顛尼亞人以及社會主義者等其他陣營已經對我們的所作所為感到不滿，我們已正式收到他們各自的宣戰聲明。看來未來的道路將會十分艱難。"
 EIZ_panic_at_the_staff_office:0 "參謀部的恐慌"
 EIZ_panic_at_the_staff_office_desc:0 "自從我們接管俄羅斯的治理權以來，我們便預料到軍隊狀況會有所衰退，為了解決這個問題，我們需要將軍隊轉化為一支能夠實現指揮部在此次戰爭中目標的戰鬥力量。"
 EIZ_exploring_abandoned_structures:0 "探索廢棄設施"
 EIZ_exploring_abandoned_structures_desc:0 "我們知道周圍的陣營正處於混亂之中，這給了我們一個極佳的機會。當他們互相爭鬥時，我們可以利用這段時間尋找舊的政府掩體，也許其中包含能在這個艱難時期幫助我們的東西。"
 EIZ_administrative_archives_unearthed:0 "出土的行政檔案"
 EIZ_administrative_archives_unearthed_desc:0 "在搜尋了那些掩體之後，我們成功出土了一些行政檔案。我們可以將這些檔案呈交給俄羅斯行政當局，希望能拉近彼此的距離，以便我們在未來能更有效地進行合作。"
 EIZ_federal_reserves_reclamation:0 "收回聯邦儲備"
 EIZ_federal_reserves_reclamation_desc:0 "為了幫助我們渡過這個艱難的時期，我們不得不收回俄羅斯行政當局在 EIZ 成立前留下的聯邦儲備，這希望能為我們提供足夠的裝備，直到我們獲得增援……希望如此。"
 EIZ_repurposing_underground_metro_lanes:0 "改造地鐵線路"
 EIZ_repurposing_underground_metro_lanes_desc:0 "經過廣泛的探查，我們發現一些舊的地下地鐵線路並未被摧毀或廢棄。我們可以使用這些線路來建立一條補給線，這樣如果發生最壞的情況，我們就能堅守得更久。"
 EIZ_the_presidential_bunker:0 "總統掩體"
 EIZ_the_presidential_bunker_desc:0 "「為了確保國家領導階層的安全，我們將建造一座能夠容納政府與總統的地堡，以防範未來敵軍의轟炸。」"
 EIZ_take_to_the_sea:0 "走向海洋"
 EIZ_take_to_the_sea_desc:0 "如果我們想在這場戰爭中取得勝利，我們就必須控制海洋，制海權將破壞敵方的航運線，且我們掌控制海權的時間越長，就越能削弱他們的軍隊。"
 EIZ_recall_the_fleets:0 "召回艦隊"
 EIZ_recall_the_fleets_desc:0 "為了在這場戰爭中維持制海權，我們需要更多的船隻，也許前共和國的海軍艦隊仍對共和國、對唯一的真俄羅斯保持著忠誠。"
 EIZ_Every_Boat_A_Transport:0 "每艘船都是運輸船"
 EIZ_Every_Boat_A_Transport_desc:0 "目的為準備即將到來的行動，我們需要運輸船來將我們的部隊運送到海外，我們將要求平民將其船隻讓渡給海軍，以彌補能滿足我們需求的船隻不足。"
 EIZ_our_tanks_must_swim:0 "我們的坦克必須會游泳！"
 EIZ_our_tanks_must_swim_desc:0 "我們需要以坦克來支援我們的地面部隊，如果我們想在行動期間取得任何實際進展，我們將需要水陸兩棲坦克來實現這一目標。"
 EIZ_summon_the_icebreakers:0 "召集破冰船"
 EIZ_summon_the_icebreakers_desc:0 "為了給我們的軍事行動鋪平道路，我們需要聚集破冰船來清除海面上的冰層，以便為我們的船隻進入敵方領土開闢航道。"
 EIZ_call_upon_the_true_russians:0 "召喚真正的俄羅斯人"
 EIZ_call_upon_the_true_russians_desc:0 "我們的國家需要最愛國的俄羅斯人為國家的生存而戰，我們將需要大量人力來裝備這次行動並取得成功，我們已做好了犧牲的準備！"
 EIZ_we_must_land:0 "我們必須登陸！"
 EIZ_we_must_land_desc:0 "整個戰爭的成敗取決於俄羅斯軍隊能否在北極領土的冰凍海灘上登陸，並為共和國贏得勝利。"
 EIZ_haul_out_the_old_sea_dogs:0 "召集老海狗！"
 EIZ_haul_out_the_old_sea_dogs_desc:0 "我們派往 EIZ 的部隊中缺乏合格的海軍分隊。幸運的是，這裡並不缺少對北極海域瞭如指掌的資深水手和航海家。他們非常願意為了薪水和萊姆酒加入我們的事業，當然，別給他們「太多」萊姆酒……"
 EIZ_stick_the_landing:0 "確保成功登陸"
 EIZ_stick_the_landing_desc:0 "行動的時間越來越近了，準備一份登陸計劃對其成功至關重要，且希望能藉此將戰爭的局勢扭轉到對我們有利的方向。"
 EIZ_they_wont_see_it_coming:0 "他們絕對料想不到！"
 EIZ_they_wont_see_it_coming_desc:0 "期待已久的行動時刻已到，我們的士兵將在海灘登陸，不惜一切代價將敵人擊退，我們的戰士將以力量與憤怒，付出鮮血與鋼鐵的代價來完成任務。"
 EIZ_using_what_we_have:0 "Using What we Have"
 EIZ_using_what_we_have_desc:0 "placeholder"
 EIZ_not_enough_guns:0 "槍支不足"
 EIZ_not_enough_guns_desc:0 "Our search for guns has helped give every man a weapon in hand but this is only helped temporarily. So the production lines will be made more efficient and more resources will be poured into our factories, even if that means less for the people at home… "
 EIZ_in_all_of_russia:0 "在整個俄羅斯"
 EIZ_in_all_of_russia_desc:0 "槍！我們需要更多槍來繼續這場戰爭！我們必須搜尋每個角落，絕不漏掉任何地方，否則這場戰爭將會失敗。"
 EIZ_for_this_damn_war:0 "為了這場該死的戰爭"
 EIZ_for_this_damn_war_desc:0 "placeholder"
 EIZ_stand_firm_desc:0 "我們的士兵感到恐懼，我們的裝備粗製濫造。我們的支持令人懷疑，但我們必須傾盡所有。我們必須將我們擁有的一切奉獻給這場戰爭，否則一切都將走向毀滅。我們必須團結一致，堅定立場。"
 EIZ_not_one_step_back:0 "一步也不許後退"
 EIZ_not_one_step_back_desc:0 "我們的首都周圍需要戰壕！我們絕不能再退後一步，否則這場戰爭就輸了，我們需要修築大量戰壕，讓任何人都無法進出。"
 EIZ_those_who_dig:0 "挖掘壕溝之人"
 EIZ_those_who_dig_desc:0 "戰爭中有兩種士兵，一種是射擊的，一種是挖掘的。挖掘壕溝的士兵往往死得少得多。"
 EIZ_bristling_with_firepower:0 "火力充沛"
 EIZ_bristling_with_firepower_desc:0 "儘管我們在最前線部署了許多地堡，但它們已經不合時宜了，因此從現在開始，地堡必須配備重機槍或反坦克炮。"
 EIZ_retun_fire:0 "還擊"
 EIZ_retun_fire_desc:0 "時機已到！我們必須在整個戰線上發起多次反擊，否則我們永遠贏不了這場戰爭！與徹底的勝利相比，多犧牲幾具軀體又算得了什麼？"
 EIZ_the_biggest_of_guns:0 "最大型的火炮"
 EIZ_the_biggest_of_guns_desc:0 "為了贏得戰壕戰，我們需要更大、更具爆炸力的火砲！畢竟，上帝眷顧擁有最好火砲的一方，因此實驗性鐵路炮是必不可少的！"
 EIZ_comforts_of_the_trench:0 "戰壕的舒適生活"
 EIZ_comforts_of_the_trench_desc:0 "我們士兵的士氣每天都在下滑。如果我們不立即應對這一威脅，可能會導致我們的防線出現缺口。行政當局必須儘可能讓戰壕變得舒適。保持戰壕乾燥，並讓地堡裝滿生活必需品。我們的部隊必須避免不必要的疾病，否則這場戰爭將會失敗。"
 EIZ_no_more_going_home:0 "不准再回家"
 EIZ_no_more_going_home_desc:0 "我們前線的人力每天都在減少，而後方可供徵召的健康戰鬥人員儲備也正在枯竭。我們不能讓這種情況繼續下去，我們必須讓每一個活人留在防線上。為了實現這一點，奧斯卡要求在戰壕正後方建立野戰醫院。這基本上剝奪了士兵請假假期的權利。"
 EIZ_continental_trenches:0 "大陸防線戰壕"
 EIZ_continental_trenches_desc:0 "我們的祖先確實懂得如何打仗。即使在大戰中，他們也會勇敢地在挖掘的戰壕中排開，我們必須回歸行之有效的方法。任何人都不能失去掩體。我們將把戰壕從北部海岸延伸到哈薩克的邊境。"
 EIZ_leveling_the_battlefield:0 "夷平戰場"
 EIZ_leveling_the_battlefield_desc:0 "placeholder"
 EIZ_every_peak_a_bunker:0 "每座山峰都是地堡"
 EIZ_every_peak_a_bunker_desc:0 "勝利僅剩幾週之遙，但我們在如此接近成功的時候絕不能出錯，所以即使我們無法將他們驅逐出去，他們也休想踏出一步，除非他們想讓子彈如雨般落在他們的頭上！"
 EIZ_oskars_gambit:0 "奧斯卡的賭注"
 EIZ_oskars_gambit_desc:0 "擺在奧斯卡面前的道路並不理想，一方面，俄羅斯將被徹底搜刮以獲取維持 EIZ 戰爭所需物資。另一方面，托米斯拉夫總統慷慨地提出與中東進行談判，以期了解他們是否能提供所需物資，儘管代價可能同樣高昂。無論如何，奧斯卡都必須下一場賭注。"
 EIZ_Repairing_What_We_Saved:0 "修復我們保住的東西"
 EIZ_Repairing_What_We_Saved_desc:0 "placeholder"
 EIZ_Repair_Remaining_Infrastructure:0 "Repair Remaining Infastructure"
 EIZ_Repair_Remaining_Infrastructure_desc:0 "placeholder"
 EIZ_Consolidate_the_North:0 "鞏固北方"
 EIZ_Consolidate_the_North_desc:0 "placeholder"
 EIZ_Ensure_Material_Production:0 "確保原料生產"
 EIZ_Ensure_Material_Production_desc:0 "placeholder"
 EIZ_Russia_For_Russians:0 "俄羅斯人的俄羅斯"
 EIZ_Russia_For_Russians_desc:0 "placeholder"
 EIZ_IT_WONT_BE_ENOUGH:0 "這還不夠！"
 EIZ_IT_WONT_BE_ENOUGH_desc:0 "placeholder"
 EIZ_CALL_IN_THE_FAVORS:0 "兌現人情"
 EIZ_CALL_IN_THE_FAVORS_desc:0 "placeholder"
 EIZ_WHERE_ARE_THE_RESOURCES:0 "資源在哪裡？"
 EIZ_WHERE_ARE_THE_RESOURCES_desc:0 "placeholder"
 EIZ_EXTRACT_EVERYTHING:0 "榨乾一切"
 EIZ_EXTRACT_EVERYTHING_desc:0 "placeholder"
 EIZ_Get_Me_More_Money:0 "給我更多錢！"
 EIZ_Get_Me_More_Money_desc:0 "placeholder"
 EIZ_Just_Find_A_Way:0 "想方設法"
 EIZ_Just_Find_A_Way_desc:0 "placeholder"
 EIZ_Let_Them_Build_Roads:0 "讓他們修路"
 EIZ_Let_Them_Build_Roads_desc:0 "placeholder"
 EIZ_WE_NEED_MORE:0 "我們需要更多！"
 EIZ_WE_NEED_MORE_desc:0 "placeholder"
 EIZ_It_MIGHT_BE_ENOUGH:0 "也許夠了"
 EIZ_It_MIGHT_BE_ENOUGH_desc:0 "placeholder"
 EIZ_An_Unholy_Arrangement:0 "邪惡的協定"
 EIZ_An_Unholy_Arrangement_desc:0 "如果我們要適當地建立起經濟，我們就必須將焦點放在外部經濟活動上。中東諸國是一個我們可以加以利用的潛在投資池，我們面前有一個可以充分利用的明確解決方案。"
 EIZ_a_president_and_a_prince:0 "總統與皇子"
 EIZ_a_president_and_a_prince_desc:0 "我們與中東談判這筆交易的第一步，是請我們的第三任總統托米斯拉夫·科西斯安排臨時行政當局與諸王會議的幾位親王會面，討論這筆讓雙方平等受益的交易條款。"
 EIZ_Inviting_The_Iranians:0 "Inviting the Iranians"
 EIZ_Inviting_The_Iranians_desc:0 "與中東談判這筆交易的第二步將是讓伊朗人參與進來，這無疑會增加交易的吸引力，並為我們的合作努力帶來更多回報。"
 EIZ_Iraq_Crashes_The_Meeting:0 "伊拉克闖入會議"
 EIZ_Iraq_Crashes_The_Meeting_desc:0 "伊拉克代表團堅持加入會議，因為他們認為自己有權討論他們的行動方針，儘管如此，我們仍必須更加努力地推動這項交易。"
 EIZ_The_Tehran_Proposal:0 "德黑蘭提案"
 EIZ_The_Tehran_Proposal_desc:0 "我們終於達成了交易：高加索將獲得獨立並納入中東的勢力範圍，作為回報，我們將從這筆世紀最大交易中獲得經濟回報！"
 EIZ_presidents_first_steps:0 "總統的第一步"
 EIZ_presidents_first_steps_desc:0 "隨著《德黑蘭提案》的敲定，我們將迎來大量的財富和特殊資源權利，我們的多瑙河盟友也是如此，這確實是一筆會讓各國羨慕數十年的偉大交易！"
