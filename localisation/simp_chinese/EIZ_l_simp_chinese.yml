 EIZ_fredericas_new_warfare_desc:0 "placeholder"
 EIZ_frederica_found_the_special_project_core:0 "成立特殊計畫核心"
 EIZ_frederica_found_the_special_project_core_desc:0 "Shortly after declaring this war we've come to the realization that as our troops are fighting on the front we can use the time their buying us to develop new ways to outsmart our enemies so we've decided to form the S.P.C whose focus is to develop new means to combat the enemy forces with weapons they probably wouldn't have expected."
