 EIZ_The_Bundeswehr_Model:0 "德國聯邦國防軍模型"
 EIZ_The_Bundeswehr_Model_desc:0 "縱觀歐洲主要軍隊，我們可以發現德國聯邦國防軍是機械化戰爭的典範。我們應該複製他們的軍事結構和條令，以最大限度地發揮我們裝甲部隊的利益"
