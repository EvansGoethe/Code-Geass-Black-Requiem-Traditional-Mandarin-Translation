 EIZ_oskar_phase_one_military.1.t:0 "時鐘的祕密"
 EIZ_oskar_phase_one_military.1.d:0 "\"能行嗎……它頂多，也就是為我們爭取一點時間……在狼群把我們吞掉之前，撿些殘羹剩飯……\"奧斯卡自言自語，壓著嗓子專注地咕噥著，一隻手抬起來捋著鬍子，怔怔地望著前方出神。他的眼睛在看哪裡？只是前方。這一次他沒有坐在整潔有序的辦公桌前，而是站著，望著那座沙皇時代的落地大擺鐘——它令人發狂的滴答聲，隨著時間推移竟漸漸變得撫慰人心。鐘擺滴答作響，他在罩著鐘面的玻璃裡看見自己的倒影，看見自己日漸增多的灰白頭髮。\n\n\"為什麼，托米斯拉夫……為什麼要把這副重擔壓在我身上。\"這個問題的答案他多少知道一些，他只是希望事實並非如此——希望自己能回家去，躺下來，就那樣躺過這一整年。為了分散注意力，他讓目光在落地鐘上游移，不再只盯著自己的倒影或鐘面。這是一座很老很老的落地鐘，在這間辦公室裡一動不動地待了——呃，他也不知道多少年。不過它大體乾淨，大體一塵不染。大體上——突然，奧斯卡的眼睛捕捉到了什麼：一枚指紋，一枚拇指印，印在鐘的正面，幾乎繞到了側面。奧斯卡迅速偏過頭，繞到鐘的側面，注意到指紋一路蜷向側板。他伸出右手，與指印比對。\n\n\"這是什麼？\"他不由得發問。當他的手與指印完全重合時，手指用力扣住一塊活動的木板，他聽到咔噠一聲。隨著那聲輕響，落地鐘的側面打開了。奧斯卡趕忙繞過去，低頭朝裡看：鐘內是一個狹窄侷促的空間，但裡面放著一張簡單的紙。一份文件。奧斯卡迅速拿起它，查看內容。上面字不多，幾乎像是一張潦草的便條，卻又莫名透著幾分正式。\n\n他讀到的第一樣東西是一組座標；第二樣，他略帶驚訝地脫口而出。"
 EIZ_oskar_phase_one_military.1.a:0 "\"總統地堡？\""
 EIZ_oskar_phase_one_military.2.t:0 "總統地堡"
 EIZ_oskar_phase_one_military.2.d:0 "腳步的踏響是這座混凝土墳墓中僅有的聲音之一。那踏響並非出於匆忙，只是在走廊間快步行走。奧斯卡對這座地堡和他的發現幾乎感到驚歎。他讓其他人分頭搜索，自己則邊走邊觀察，率先深入，一心想弄清這一切究竟是為了什麼。他拐過牆角，穿過一道已清查過的門洞。這個房間近乎「一塵不染」——那種裡面幾乎什麼都不剩的一塵不染，彷彿被人搜刮一空，只剩角落裡一張金屬桌。\n\n\"所以這裡……就是扎哈羅夫度過總統任期最後時日的地方。\"奧斯卡總結道。他推測，這個位於地堡最深最遠處的房間，多半就是扎哈羅夫的居所。當然，除了幾條線索外他並無太多依據：其一，這是總統地堡；其二，扎哈羅夫正是在那場混亂中憑空消失的。奧斯卡又環顧了一遍房間，注意到整座地堡都缺少的那個令人不安的細節。\"……沒有屍體……沒有血跡，沒有彈殼……沒有死亡的痕跡。\"他輕聲自語，一邊向前走，一邊轉著身子把房間的每一面都收入眼底——每一寸都不放過，生怕在哪個角落發現扎哈羅夫的屍體。失蹤的總統，終於現身。然而並沒有。他就那樣邊走邊轉，直到又轉回了原位。\n\n\"他們……去哪了？\"他一邊發問，一邊走向房間裡唯一的物件——那張桌子。走近後他才發現桌上有樣東西：一個黑色的盒子。但那不只是個盒子，那是一個錄影帶盒。他伸手拿起它，翻來覆去地端詳。在盒子底下，他看見桌面上刻著一行字——又是座標。這個兔子洞越挖越深，比這座地堡延伸得還要深。\"這是……座標，還有一卷錄影。\"他看看這個又看看那個，搖了搖頭。他還有一個國家要治理，沒空玩偵探遊戲——如果這對他毫無益處的話。他把錄影帶塞進西裝內袋，轉身離去，在地堡中對自己輕聲許下一個承諾。"
 EIZ_oskar_phase_one_military.2.a:0 "\"以後再查……\""
 EIZ_oskar_phase_one_military.3.t:0 "他們絕對料想不到！"
 EIZ_oskar_phase_one_military.3.d:0 "刺骨的寒風凜冽徹骨，彷彿深深穿透奧斯卡的身體，幾乎把他凍成一根冰柱。嚴寒本在意料之中，只是他的身體還沒能適應。不過，被凍僵在原地直視前方，在這裡倒也算不上最糟的事——他正站在港口邊緣，直直望著前方那些龐然巨艦。奧斯卡向來對船和大海沒什麼感情，他成長的地方離這兩者都很遠。但即便是他，也能從這些艦船的規模與威嚴中看出：這是非同凡響之物。\n\n\"所以這些……就是破冰艦。\"他隔著鬍子低聲咕噥，呼出的氣息在面前凝成白霧。他想著，在動身之前再多花幾分鐘欣賞這些艦船應該無妨。趁還來得及——趁它們還未啟航。但願是駛向成功，而非死亡。\"司令。沒想到您會來視察。\"奧斯卡僵住的身體霎時「粉碎」，嚇得他魂飛魄散——雙腳雖然沒離地，整個人卻幾乎向前栽倒。方才欣賞艦船時，他附近明明沒有旁人。他猛地回頭尋找那低沉、近乎陰鬱的嗓音的來處——他看見了他。最顯眼的是那頭雪一樣的銀髮，還有那張稜角分明的臉上的冷峻神情。\n\n\"啊！康羅伊上將，剛才沒看見您。是的，我正想了解進展如何。\"奧斯卡連忙回答，立刻咳嗽了幾聲，更多白霧噴進他凍麻的手心。他竭力裝作自己剛才沒有被自己的部下嚇得半死。康羅伊邁著沉重的步子，從奧斯卡身後走到他身側，站得筆直。儘管上了年紀，他的健碩依然一目瞭然。\n\n\"進展不錯，我得說。它們很快就能部署了。\"這至少令人寬慰。奧斯卡半晌沒說話，先是移開視線，又用眼角瞥回那人，彷彿預期他會像幽靈——或是一隻能生出翅膀飛走的蝙蝠——一樣憑空消失。見他沒有消失，奧斯卡才鬆了口氣，回了一句簡單的話：只要艦隊由康羅伊統領，就沒什麼可擔心的。"
 EIZ_oskar_phase_one_military.3.a:0 "\"他們絕對料想不到。\""
 EIZ_oskar_phase_one_military.4.t:0 "善用現有資源"
 EIZ_oskar_phase_one_military.4.d:0 "\"為什麼……我為什麼這麼沒用！\"自厭、憎恨、徹底的無能感——奧斯卡的聲音裡浸透了這一切。他把頭埋在桌上，雙手扣著後頸，大聲說著。他竭力控制自己，竭力憋住眼淚，憋住怒氣，憋住狂怒。思緒只是狂奔：腦海裡閃過的每一個瞬間、每一次談話、每一通電話，他全都想了一遍——那些可能出岔子的問題，每一個他本可以做得更好的細節；他也在想，自己究竟該如何變好。他發出一聲低低的哀鳴，把它悶進桌面，只盼沒有旁人聽見。那張曾經風光的桌子，如今——至少今天——一片狼藉：文件四散，那台從未用過的平板掉在地上，螢幕可能已經裂了，可奧斯卡連查看的力氣都沒有。\n\n\"為什麼我——為什麼我說服不了他們。\"他喃喃著。這個念頭在他腦中一遍又一遍、一遍又一遍地迴響。呼吸越來越快、越來越沉。奧斯卡一邊過度換氣，一邊竭力保持鎮定。他想抬起頭，可雙手此刻沉重無比；想挪開手，手腕又重若千鈞。他用盡最後一分力氣把手扯開，抬起頭，撐著桌子借力。他試著去想別人會怎麼做、會怎麼說——托米斯拉夫會怎麼做。他閉上眼睛，放緩呼吸，深呼吸。吸氣，呼氣。吸氣，呼氣。吸氣，最後——呼氣。\n\n\"看來我們……\"聲音顫抖，字句幾乎在出口時就散了架。但他最終睜開眼睛，看著桌上的狼藉，吐出那口嘆息，開始收拾殘局：整理、歸位、把一切重新拼好。一件一件來。把開了頭的事情做完。"
 EIZ_oskar_phase_one_military.4.a:0 "\"只能用我們現有的了。\""
 EIZ_oskar_phase_one_military.5.t:0 "堅守陣地！"
 EIZ_oskar_phase_one_military.5.d:0 "在莫斯科附近的一處軍營裡，奧斯卡一步一步走著，眼睛捕捉著各種細節：巡視部隊、破舊的裝備、周遭的地貌。他這麼做，多少是希望自己微不足道的現身能提振士氣，或至少讓人覺得他是為士兵們而來。他自認如此，卻也開始懷疑士兵們是否這麼看。就在這時，他的目光被什麼攫住了：一個穿制服的人，蜷縮著、顫抖著，癱坐在附近的一面牆邊。奧斯卡本可以走開，本可以通知軍官，或做任何別的事。但他越看，腳步越偏，他朝那人走去。一步一步，直到站定在他的正前方，在俄羅斯的嚴寒裡，用自己的身影替他擋住直射的太陽。士兵沒有抬頭——直到奧斯卡開口。\n\n\"士兵……你為什麼發抖。\"奧斯卡輕聲問他。士兵驚慌地猛然抬頭，一雙充滿恐懼的眼睛直直望進奧斯卡的眼裡。奧斯卡認得那種眼神——他曾在一個地方見過它，刻骨銘心：鏡子裡。\"司令！我——我呃——我呃——我只是——我只是……\"那聲音和那人一樣驚慌失措。他看上去很年輕，更像個孩子。奧斯卡望著語無倫次的他，只是簡單地問：\"你還站得起來嗎？\"他向男孩伸出手。士兵伸手握住，感受到奧斯卡手上的老繭，感受到那雙手中蘊含的力量——與軟弱。奧斯卡把他拉起來，對他只說了一句：\n\n\"站得起來，就站著，站穩了。\"那話幾乎像一道命令。但它並非命令——至少不是對男孩下的，而是對他自己。奧斯卡望著他，等著看他會不會再度倒下。男孩的雙腿在發抖——就像奧斯卡心裡的雙腿一樣。他伸出雙手，按住男孩的肩膀，輕輕閉上眼睛，垂下頭，藏起自己開始龜裂的面容。\"對不起……但你必須站穩。\"他喃喃著，命令著。男孩無言、沉默。他心裡似乎有一部分平靜了下來，挺直了腰桿；但另一部分，卻和奧斯卡的一樣，在痛。在心裡痛著。奧斯卡接下來的話，先是說給自己聽的，而非男孩。"
 EIZ_oskar_phase_one_military.5.a:0 "\"再……撐一下就好。\""
 EIZ_oskar_phase_one_military.6.t:0 "每座山峰都是地堡"
 EIZ_oskar_phase_one_military.6.d:0 "\"這些地堡……非常了不起。可你們是怎麼這麼快建起來的？\"奧斯卡問道。他走在一名士兵身後——那人的名字他此刻想不起來了，不過最近……他什麼都記不住了。士兵正領著他參觀烏拉爾的一座新地堡。這裡簡直是一座由蜿蜒混凝土走廊構成的地下墓穴，靠著希望、祈禱——主要還是鋼梁——支撐著。\"據說，他們為新地堡開挖時，發現了這些舊隧道和一整套早已建成、相互連通的地堡網絡。我們只是做了加固。\"士兵簡單地答道。他的嗓音與人們對士兵的想像不同：不粗獷，不硬朗，而是輕柔溫和——強大到足以溫和。這一次，奧斯卡幾乎慶幸聽到這樣的聲音，而不是又一個一秒鐘裡見過的暴力比奧斯卡一輩子見過的還多、對他吹鬍子瞪眼的將軍。他們拐過一個彎，險些與迎面經過的其他士兵撞個滿懷。\n\n\"它們是多久以前建的？\"奧斯卡忍不住好奇，一邊環顧四周，上下打量著混凝土牆。牆面看似還算乾淨，卻帶著舊傷、舊疤與舊日的生活痕跡。士兵回想了一下，兩人便沉默地走了一段，只剩他們自己的腳步聲，還有……別的什麼。奧斯卡幾乎可以發誓，他聽見右手邊牆的另一側傳來窸窣聲——某種沉重之物的窸窣聲。\"從那些舊旗幟和紀念品判斷，它們建於沙皇統治俄羅斯的年代。這幾座我們沒挖出多少資訊。我想還有很多地堡沒被找到。\"\n\n這倒令人寬慰：能找到的地堡越多，能用的地堡就越多；需要新建的就越少，要花的錢也就越少。奧斯卡最近的腦子就是這麼運轉的——數著每一分錢，算著每一個舉動。奧斯卡搖了搖頭，什麼也沒說，那窸窣聲也消失了。兩人繼續前行，直到奧斯卡以為他們已原路返回——才發現不對，他們反而走得更深了。每條走廊看起來幾乎一模一樣，一座由迴廊與甬道構成的迷宮，人員稀疏。他不禁想：藏在這下面該有多容易。\n\n\"長官。駐守這些地堡的一些弟兄甚至私下說，他們聽見牆裡有窸窣聲和動靜。肯定沒什麼的，我敢說。\"士兵對奧斯卡說，彷彿他也聽見了牆裡的聲音，想寬慰他一番。奧斯卡早已陷入沉思，反覆思量。但他的思緒最終繞回了這些地堡的益處上——它們遠遠、遠遠壓過那些隱患。所以對他而言，那不算什麼。而這正是他讓那人知道的。"
 EIZ_oskar_phase_one_military.6.a:0 "\"看來只是士兵的迷信……\""
 EIZ_oskar_phase_one_economy.1.t:0 "修復我們保住的東西"
 EIZ_oskar_phase_one_economy.1.d:0 "\"奧斯卡，這是工廠的報告，長話短說：大部分設備都壞了，主要是各路抵抗組織日積月累破壞的，一部分是現有工人的蓄意搗毀……剩下的就純粹是。過時，老舊。\"拉斯洛向他解釋。他的聲音絲毫不單調，可奧斯卡卻越來越難聽進任何東西。於是他從對方手裡接過報告，一邊聽一邊自己翻看。所幸報告附有照片——儘管拍下的景象並不好看：損毀的機器、抵抗組織「劍與十字架」的照片、現有工人的蓄意破壞，而最糟的是，一些設備的高清特寫上清楚地顯示著出廠日期。有些已有數十年歷史，有些甚至更老。奧斯卡搖著頭，拉斯洛又遞來一張紙，這次是新設備的規格清單。\n\n\"你建議向E.U.再提請求，讓他們撥給我們一些現代的、能……用的設備？\"奧斯卡問他。不是困惑，也不是不解，只是想確認拉斯洛的用意。拉斯洛清了清嗓子，望著奧斯卡，臉上抹過一絲擔憂。\"是的，我會這麼建議——如果可以的話？\"拉斯洛話音剛起，奧斯卡也開始了——非常簡單地，只是搖頭，左右搖著，直到拉斯洛把話說完。他把文件遞回去，拉斯洛重新接進手裡。\n\n\"不行。他們不會再送任何東西來了……我們只能想辦法修……\"奧斯卡沮喪地說，近乎失魂。這一切開始對他造成損耗，也開始寫在他的臉上。以至於奧斯卡索性轉過身去，背對拉斯洛，既不看前方，也什麼都不看，說完了最後那句話。"
 EIZ_oskar_phase_one_economy.1.a:0 "\"我們只有這些了……\""
 EIZ_oskar_phase_one_economy.2.t:0 "俄羅斯人的俄羅斯"
 EIZ_oskar_phase_one_economy.2.d:0 "奧斯卡把下一份文件遞給拉斯洛時直視著他的眼睛——只有一頁紙，上面只有一項請求。沒等對方看完，奧斯卡就站起身來，只為伸展一下雙腿，難得離開那把該死的椅子。趁拉斯洛速讀文件的工夫，他把椅子推好，並趕在被質問之前轉過了身。\"長官，關於這份……請求，您為什麼要限制E.U.的顧問和工作人員？這似乎——\"奧斯卡舉起右手止住了他，左手背到身後，開始望向身後的窗，望向下方的一切。望向下方的俄羅斯：人們四處奔走，有的趕著上工，有的掙扎求生。還有一些人——很難說他們想要什麼。\n\n\"他們……對這個國家沒有切身利益，拉斯洛。他們來這裡，是為了發戰爭財，或是出於某種愛國義務來幫忙。\"他向拉斯洛解釋道，目光游移間，他看見人群裡有幾個人像混進蟻群的紅螞蟻：格格不入，舉止迥異。從這個高度俯瞰下面的街道，誰是俄羅斯人、誰是歐洲人，一目瞭然。\"那俄羅斯人呢？\"拉斯洛問。奧斯卡站在那裡看著，身體漸漸前傾，直到把額頭輕輕抵上玻璃，竭力不讓整個身子癱靠上去。\n\n\"這是他們的家園，他們會為它而戰，為它而死，為它勞作……而可悲的是……不管我們能給多少，他們都會為它勞作。\"他的聲音裡帶著一絲什麼——一絲真相，一絲悲哀。他想著自己必須做的事、必須做的抉擇。是他，全都是他。這件事必須由他來做，也只有他能做。而也許……就在這一刻，他願意向拉斯洛承認這一點，承認那一件小事。他先是輕輕地說：\n\n\"我真希望我不必……\"然後用這句話收尾："
 EIZ_oskar_phase_one_economy.2.a:0 "\"壓榨他們。\""
 EIZ_oskar_phase_one_economy.3.t:0 "還不夠！"
 EIZ_oskar_phase_one_economy.3.d:0 "\"所以，如您所見，奧斯卡……我們的努力恐怕還是不夠，我們無論如何都沒法——\"奧斯卡聽到了，而且他已經聽夠了。那口鍋早已沸騰滿溢，正處在爆炸的邊緣。一件接一件的壞事，一場接一場的糟糕會議。他必須壓住它，必須把它控制住。如果連他都撐不住，還有誰能？這世上還有誰能做這件事？沒有人。奧斯卡從牙縫裡擠出一個字，告訴拉斯洛：\n\n\"出去。\"拉斯洛似乎倒退了一步。他從未聽過奧斯卡用這種語氣說話——那是悶燒的熔爐的聲音，嘶嘶作響，正走向爆炸。拉斯洛不知所措地挪了挪腳，輕聲喚了一句：\"奧斯卡？\"奧斯卡搖著頭從椅子上站起，在做出任何過激之舉前，最後重申了一遍：\"出去。\"他的聲音越來越灼熱，臉漲得通紅。拉斯洛看著不肯與他對視的奧斯卡，趕忙轉身離開，以破紀錄的速度快步出屋，只在最後放緩了一步，不讓門在身後摔上。門扣上的那一刻，咔噠一聲歸位。奧斯卡的雙拳狠狠砸向桌面！接著他雙臂橫掃，把碼放整齊的文件、疊好的案卷、裝筆的杯子、那台已有裂痕的平板統統掀飛，散落一地。平板的玻璃螢幕呻吟一聲，裂得更深了。桌面清空了，但奧斯卡還沒完。\n\n\"不夠的……還是不夠的。\"他開始喃喃，一遍，又一遍，又一遍，又一遍。他握起右拳，朝桌面的同一個位置一下又一下地砸，應和著自己瘋狂的呢喃。拳頭上的疼痛不斷滋長，白熱、灼燒——但仍不足以澆滅他的怒火，直到最後，他終於吼了出來。"
 EIZ_oskar_phase_one_economy.3.a:0 "\"還是不夠！\""
 EIZ_oskar_phase_one_economy.4.t:0 "奧斯卡……失蹤了？"
 EIZ_oskar_phase_one_economy.4.d:0 "\"你……看見奧斯卡了嗎？我一直在找他。\"拉斯洛已經束手無策。他敲了奧斯卡的門，無人應答。顯然他起身去了別處，可問遍了人也沒人能給他答案。最後他索性守在走廊上見人就問，此刻問的是一位他記不起名字的路人——問的還是他問過每一個路人的同一個問題。他把文件緊緊抱在胸前，生怕它們飛走。\n\n\"你去他辦公室看過了嗎？\"那位女士和氣地反問，嗓音輕柔。聽口音像是法國人——拉斯洛跟法國男男女女打過的交道夠多，分辨得出來。他嘆了口氣：當然去過。他也在同一口氣裡告訴了她。\"那是我第一個查的地方，我敲了門，沒有——\"女士露出一副心裡有數的神情，抬手示意他跟上，說著便邁步走開。拉斯洛跟了上去。他們走的似乎正是通往奧斯卡辦公室的方向，可按理說，奧斯卡不可能在沒經過拉斯洛的情況下回到那裡。\n\n\"你……進去看了嗎？他最近……一直睡在裡面。\"她告訴他，語氣有些尷尬，像是在悄聲透露一個祕密。拉斯洛在腦中回想——不，他從來不進去。他只敲門，貿然闖進別人房間太失禮了。兩人沉默地走了一小段，直到抵達奧斯卡的門前。女士先一步上前，握住門把輕輕旋轉，直到咔噠一聲門開了，她把門推開。房間裡一片昏暗，燈全沒開，唯一的光線來自窗外。\n\n而他就在那裡——奧斯卡，整個人趴倒在辦公桌上，文件被他不小心掃落在地，想必還有那台從未用過的平板，正躺在地板上，螢幕碎裂。拉斯洛羞赧地向那位好心的法國女士承認："
 EIZ_oskar_phase_one_economy.4.a:0 "\"我……我沒想到。\""
 EIZ_oskar_phase_one_economy.5.t:0 "該死的，還要更多！"
 EIZ_oskar_phase_one_economy.5.d:0 "\"我們需要更多！\"奧斯卡吼道，他受夠了這種拐彎抹角、討價還價。他的目光直直瞪進托米斯拉夫那閃爍的藍色全息影像。托米斯拉夫面色如常，對奧斯卡突如其來的咆哮不見絲毫慌亂或不悅。奧斯卡才不管他惱不惱火，至少這樣能把他該死的意思傳達到位。他已被逼到繩索的盡頭，需要什麼東西來拉他一把。這事必須由他來做，只有他能做。托米斯拉夫看得出他身上的這一點，那麼至少可以幫他做成這一件事。\"奧斯卡，拜託。你不必——\"托米斯拉夫試圖讓他冷靜下來，試圖維持體面。他望著奧斯卡，聲音沒有一絲動搖，斟酌著字句、編織成他希望能安撫奧斯卡的話語。但沒有用。奧斯卡一巴掌拍在桌沿，聲響迴盪整個房間，他希望這聲響也能傳到托米斯拉夫的辦公室裡——傳到正望著奧斯卡全息影像的那個人耳中。\n\n\"我們需要更多，托米斯拉夫！我們拿著一根鞋帶的預算，你卻要我們創造奇蹟！我不管你用什麼辦法，現在就給我們弄到錢！\"奧斯卡吼著，伸出一根控訴的手指直指托米斯拉夫，指得那麼近，若是面對面，指尖恐怕已戳進他的胸口。他的眼睛竭盡所能地鑽進對方的眼裡——那雙眼中此刻燃著火。一絲光，也許只是一線、僅僅一線初生的瘋狂。某種深處潰爛的東西，像一道感染的傷口。奧斯卡腦中的某樣東西——那是什麼？奧斯卡自己能列出一張潛在原因的清單，其中之一正被他指著。而那人死一般沉默，沉默不斷延續。這份安靜似乎也開始影響奧斯卡，他不自覺地在椅子上左右挪動，因為它開始扎他了。他此刻對著吼的，可是第三總統——而他吼人的架勢活像個教官。他收回手指，平放在桌上。托米斯拉夫站在那裡，紋絲不動，讓人再次以為全息影像壞了、凍住了。直到他終於再度開口。\n\n\"我會盡力，奧斯卡。但吼叫在談判裡不會給你帶來任何——\"全息影像滅了。不是因為斷電，也不是因為短路。不，是奧斯卡那隻空著的手自己動了，關掉了它。他已經從托米斯拉夫那裡得到了需要的東西，不需要再聽人教育做事的正確方式。這條路必須走通，因為這是他選的路，是他必須扛著走下去的路。別的都不行，別的都沒用。奧斯卡把全息圓盤推到一邊，在如今死寂的房間裡，對自己輕聲承認。"
 EIZ_oskar_phase_one_economy.5.a:0 "\"它必須走通……\""
 EIZ_oskar_phase_one_economy.6.t:0 "也許夠了……"
 EIZ_oskar_phase_one_economy.6.d:0 "\"奧斯卡，你看起來……\"這本是拉斯洛心裡的念頭，他沒打算說出口。他望著奧斯卡，目光軟了下來。他本來是打算進來硬碰硬的——據說自從與第三總統那次會談之後，奧斯卡最近就走了極端：變得大聲、好鬥、終日暴怒，靠著揮舞那條無形的鞭子強行索取、逼所有人就範。可是，拉斯洛做不到——當他看著眼前的奧斯卡時，做不到。那座熔爐似乎已經燒盡了。他的眼皮沉重，眼下掛著深深的烏青。他的頭髮如今白多於灰，鬍子也是。他的眼睛勝過千言萬語——他看上去像一個行屍走肉。或者更準確地說，一個死人，坐在椅子上，望著這位共事之久已無從記起的老友。\n\n\"夠了嗎……拉斯洛？\"奧斯卡甚至不再費力了，不再費力多說什麼，不再費力回應。他的腦子此刻只鎖著一件事，死死卡在上面。拉斯洛徑直走到他桌前站定，低頭望著他，卻不知該如何是好。真是不可思議——同一個人，換個角度看去竟判若兩人。此刻的他看起來虛弱、死寂，像一個失敗者。\"聽著，現在不是談這個的時候——\"拉斯洛一邊說，一邊伸手進口袋，想找塊手帕或任何能遞給奧斯卡的東西。他這次沒帶成疊的文件和紙張——這趟不是為了公務，是為了把話說開。可如今他站在這裡，兩手空空，什麼忙也幫不上。看來他幫不了奧斯卡。也許事到如今，已經沒有人幫得了奧斯卡了。\n\n\"夠……了……嗎？\"奧斯卡的話說到一半打了個哈欠，嘴巴大張了一瞬又合上；而他的眼睛一閉上就沒再睜開，彷彿過了幾分鐘之久。直到終於睜開，再次直直望向拉斯洛，期待著一個奇蹟。拉斯洛沒有奇蹟。他不能對奧斯卡撒謊——不能，尤其是現在。他只能說出實話。\"也許……夠了……\"他怯怯地承認，努力把目光移開。幸好他移開了——就在那一瞬，淚水湧上了奧斯卡的眼眶，逼得他閉上眼睛。他垂著頭，閉著眼，對自己喃喃。"
 EIZ_oskar_phase_one_economy.6.a:0 "\"該死的……\""
 EIZ_oskar_phase_one_economy.7.t:0 "邪惡的協定"
 EIZ_oskar_phase_one_economy.7.d:0 "它在他手中如此沉重——這麼小的一個裝置，這麼小的一枚圓盤，在他手裡卻像千斤重擔，重如一輛坦克。或是一顆心。他把它在手裡翻來覆去：底面大體光滑，似乎由兩塊主要面板扣合而成。它確實有種原型機、實驗品的模樣。再翻回正面，是裝置的主體：先是隆起，隨後攤平，化作一塊光潔如鏡的黑色螢幕——全息影像正是從這裡投出。奧斯卡深吸一口氣，又呼出，終於下定決心。他把它平放在桌上，順手整了整旁邊的文件，保持桌面整潔有序，然後伸出空著的手，探向側面，按下按鈕，啟動了它。作為原型機，它沒有其他可連接的對象——這正好，他需要連接的只有一個人。奧斯卡本以為要等上一陣，但很快他就聽到了。\n\n\"這麼說，你決定了，奧斯卡？\"托米斯拉夫的話音劈啪傳入耳中，隨後他的全息身影也劈啪成形。他的身形凝固不動，彷彿凍住了——但不，那只是他保持的一個姿勢，而且他似乎能無限期地保持下去。奧斯卡收回手，扯了扯衣領。要向第三總統這樣的人物求助，他……至少可以說是猶豫的。尤其是，他之所以被交付這項任務，正是因為托米斯拉夫無人可用。但他承認了，他明白了。奧斯卡明白：他一個人做不到。\"是的……如果你不介意的話，托米斯拉夫，我想——\"托米斯拉夫早有準備，準備得幾乎過了頭，彷彿他完全料到事情會走到這一步，彷彿計劃早已在他腦中寫就。他鋪好了路，而奧斯卡不過是照著他的意願一路開了過來。\"你來找我，是想讓我來主持談判。\"托米斯拉夫所說的「來」嚴格說並不準確——一人安坐在多瑙家中，另一人坐在俄羅斯一間權充居所的異國辦公室裡——但這話在兩人心中激起的共鳴並無二致。奧斯卡輕輕點頭，又怕全息影像捕捉不到，便更用力地點了幾下，同時開口應和，任話音消散在他自己也不知道的地方：\"是的……\"兩人之間安靜了片刻。那是思索的一刻。或者說，思索與喘息的一刻。\n\n\"你意識到自己一個人做不到了？\"托米斯拉夫繼續說，近乎期待著、或許是想要奧斯卡的一個回答。而當奧斯卡望向他時，托米斯拉夫也在打量他的模樣，儘可能地上下端詳——儘管他那端只顯示出身體的一部分，主要是上半身。他決定寬解奧斯卡的一些憂慮。\"別擔心，我對中東的習俗非常熟悉——從……昨天開始。\"奧斯卡一瞬間以為那是玩笑，但從托米斯拉夫毫不動搖的眼神裡看出他是認真的。他終於讓自己表達出想表達的東西，飽含感情地吐出一句："
 EIZ_oskar_phase_one_economy.7.a:0 "\"哦，謝天謝地。\""
 EIZ_oskar_phase_one_economy.8.t:0 "總統與皇子"
 EIZ_oskar_phase_one_economy.8.d:0 "奧斯卡不得不佩服E.U.的工程師，或科學家，或不管是哪路人馬——能構想出、設計出並真正做出E.U.正逐步推出的這套全息技術。它簡直令人驚歎：桌上一枚小小的圓盤，既能把他的身影從俄羅斯投射到伊朗的德黑蘭，又能在他辦公室的方寸之間投出一張近乎完整的環形會議桌。奧斯卡的辦公桌彷彿構成了圓環的一段，全息影像從桌子兩側延展開去，環繞成一個完整的圓，彷彿把他也融入了進去。桌子與緊鄰的座椅之外幾米開外，就是他普通的辦公室——全息影像的捕捉範圍有限，德黑蘭那間屋子的真實大小可能無比宏大，也可能不比奧斯卡的辦公室大多少。他正想一邊看一邊轉向左邊，向坐在那裡、身體背對他望向前方的托米斯拉夫盛讚這套系統。就在這時，托米斯拉夫霍然起身，朝全息影像的另一端走去，向一個奧斯卡看不見的人說道：\n\n\"祖拜爾·本·阿卜杜勒阿齊茲·阿勒沙特殿下，願平安降臨於您（as-salaam alaykum）。\"奧斯卡欣慰地看到托米斯拉夫真的學會了中東的禮儀，儘管那些話對他而言如同天書。接著，奧斯卡看著托米斯拉夫問候的對象在全息影像中成形——內志的王子，或者說王子之一。\"也願平安降臨於您（Wa alaykum as-salaam）……我想，您就是第三總統托米斯拉夫？\"他開口了。他的嗓音不如托米斯拉夫的……圓潤、乾淨，幾乎透著一股生澀，或許還有幾分稚氣。王子向托米斯拉夫伸出手，而托米斯拉夫幾乎像是早在等候，立刻握住。握完手他退後一步，指向近旁的一把椅子，自己則回到座位。王子慢條斯理地落座。\"那麼這位……想必就是……\"祖拜爾王子的話沒說完。他落座時本是朝向托米斯拉夫的，隨後卻轉過頭，直直望向奧斯卡。王子服飾的細節、他的面容，乃至二者的顏色都難以辨認——全息影像的能耐終究有限，藍色的光暈籠罩著一切。但他繼續注視著，與奧斯卡四目相對。奧斯卡正要自我介紹，托米斯拉夫卻替他接了話，讓奧斯卡樂得閉嘴，安心把發言權交給托米斯拉夫。\"奧斯卡·馮·門德爾……殿——下。\"托米斯拉夫說。聽著托米斯拉夫努力對王子頭銜擠出的那份敬意，奧斯卡的耳朵直發怪——但他想，談判大概就得這樣：搞清楚你在和誰說話、對方的偏好、對方想要什麼。王子轉回托米斯拉夫那邊，從此心安理得地無視奧斯卡——看來在這場會談中，他是個無足輕重的因素。\n\n\"啊，明白了。那麼，我們談正事吧。\"王子逕自插話，彷彿這筆交易只需要他一人在場。這份自我中心，呃——也許在E.U.慣常的談判裡行得通？奧斯卡不得而知，只是專注地聽著，托米斯拉夫也正凝神以待。"
 EIZ_oskar_phase_one_economy.8.a:0 "\"好，談吧。\""
 EIZ_oskar_phase_one_economy.9.t:0 "邀請伊朗人"
 EIZ_oskar_phase_one_economy.9.d:0 "托米斯拉夫飛快記錄時筆尖劃過紙面的沙沙聲，在全息影像裡與其說看得見，不如說聽得見——不過它多少也被托米斯拉夫的說話聲蓋了過去。他一邊傾聽，一邊竭力理清祖拜爾王子感興趣的東西。\"那麼，您希望獲得高加索石油的獨家開採權——這可以安排。不過我剛才——\"他想繼續說下去，可從紙上抬頭的瞬間被打斷了：他的目光落在了另一個同樣剛出畫框外的人身上，而不是坐在他不遠處的那位王子。托米斯拉夫迅速擱筆，雙手按上環形桌屬於他的那一段，站起身來，目光緊鎖著那個在視野與觸及範圍之外的身影。\n\n\"啊！阿里揚·巴列維殿下，願平安降臨於您。\"又一位王子踏入了談判的競技場。托米斯拉夫看樣子本想穿過房間去與這位新的王室成員握手，卻停住了——他看見祖拜爾王子把椅子向後一推，椅背淡出、被推出了全息影像的範圍。王子隨即轉頭仰望，巴列維王子步入畫面。他看起來比祖拜爾王子年長，或者至少更老練——單從兩人的儀態便可見一斑：一個懶散鬆弛，彷彿整間屋子都是他的；另一個昂首挺立、身姿僵直，幾乎像托米斯拉夫——只不過托米斯拉夫那樣站著顯得自然。\"好了好了，也願平安降臨於您，托米斯拉夫。還有你，祖拜爾。\"巴列維看祖拜爾的眼神透著急迫，後者則微微一笑。看來他很清楚這位小王子正卯足了勁想把好處撈盡、讓巴列維空手而歸。不過，王子們在這裡的交鋒並不張揚，不靠怒火或慍色，而是靠瞪視、眼神，或許還有幾句陰陽怪氣。托米斯拉夫落座，巴列維也隨之落座，就在祖拜爾右手邊。巴列維瞥了奧斯卡一眼，又把目光轉回祖拜爾。\"您能大駕光臨，真是太好了……\"年輕的王子斜睨著巴列維，話幾乎是從嘴角擠出來的。托米斯拉夫親眼看著這股劍拔弩張，望望這個又望望那個，雙手前伸做了個下壓的手勢。\n\n\"兩位，我請阿里揚·巴列維前來，是要給你們二位的支持各奉上一份回報。奧斯卡，可以請你說明嗎？\"托米斯拉夫隨即用手把兩位王子的注意力引向奧斯卡。奧斯卡打了個哆嗦，但竭力掩飾。他沒料到這麼快就被點名發言，更沒料到要同時承受兩位王子的注視。他清了清嗓子——但願不太明顯——輕聲說道：\"作為內志獲得石油獨家開採權的交換，我們將把高加索的控制與管理權授予伊朗，任其處置……\"奧斯卡本想繼續，卻看見兩位王子雙雙回頭。剛坐下的托米斯拉夫再度起身——顯然，又有新人到場。又一位王子。奧斯卡還沒來得及看清這位王子的模樣，只聽見一陣看不見的騷動聲，便壓低嗓子喃喃道："
 EIZ_oskar_phase_one_economy.9.a:0 "\"到底有多少個王子……\""
 EIZ_oskar_phase_one_economy.10.t:0 "伊拉克不請自來"
 EIZ_oskar_phase_one_economy.10.d:0 "\"你們和E.U.談判，居然打算把伊拉克排除在外？！\"這位王子闖進全息影像的架勢，想必和他闖進會議現場的架勢一樣兇猛。他一把抓住兩位王子座椅的椅背頂端——兩人顯然嚇壞了。祖拜爾閉上了嘴，笑容垮掉，皮膚開始冒汗；巴列維則僵硬得幾乎像斷了氣。這位新來的王子身材高大，看上去強壯、自信，卻同時——蒼老得多。他蓄著很長很長的鬍鬚，幾乎和奧斯卡的一樣長；考慮到他的身高，恐怕還要更長。只是奧斯卡分辨不出那鬍鬚是純黑，還是已摻雜著斑駁的灰。托米斯拉夫望向這位王子，柔聲對他說話——他的聲音從始至終沒有因任何變故而起伏，彷彿這一切都不曾令他吃驚。\n\n\"非常抱歉，海達爾殿下——\"他剛開口，海達爾王子便看向他，用低沉的嗓音說道。他的怒氣似乎消退了，或者說轉移了——不是衝著托米斯拉夫。\"住口，錯不在你。錯在這兩個不成器的小王子。\"托米斯拉夫聽從了這番話，徹底沉默，轉而讓海達爾王子主導全場。然而，這似乎正中托米斯拉夫下懷——他完全樂意把談判的韁繩全盤交出，不只交給海達爾，而是交給每一位現身的王子（巴列維除外，他還沒撈到出手的機會。但奧斯卡毫不懷疑，只要那位王子肯試，托米斯拉夫也會照辦）。\"我不管他們打算出什麼價、拿什麼貨。他們出多少，我加倍。只換兩樣東西。\"海達爾王子最後又狠狠瞪了兩位王子幾眼。他們怕他怕得筆直端坐，死一般安靜：一個汗如雨下，一個僵硬如木。看來海達爾身上散發著某種威懾的氣場，只是沒能透過全息影像傳過來——又或者，海達爾是帶著一支軍隊進門的。那也能完全解釋他們的恐懼。\"請講。\"托米斯拉夫對他說，把發言權奉上，自己則坐回座位——但願這次能一直坐到散會。\n\n\"你們要允許伊拉克在土耳其邊境重新駐軍，並允許它擴建一支更大的軍隊。\"啊，這下全說得通了。伊拉克是沙漠戰爭戰敗方中受創最深的一個，非軍事化的邊境正是它的心頭大患。這一步對托米斯拉夫來說本該是無法獨自跨越的橋——沒有前兩位總統的首肯或E.U.政府其他部門的同意，根本無從通過——但此刻這似乎絲毫沒有困擾他。雖然臉上看不出來，奧斯卡如今已摸透了托米斯拉夫：他知道，他在笑。這讓奧斯卡對這整場會談有了最後的頓悟。他悄聲低語："
 EIZ_oskar_phase_one_economy.10.a:0 "\"托米斯拉夫算計好的大獎……\""
 EIZ_oskar_phase_one_economy.11.t:0 "德黑蘭提案"
 EIZ_oskar_phase_one_economy.11.d:0 "\"我不知道……你是怎麼辦到的……\"奧斯卡說。這是一句讚美，裹著驚歎，也裹著困惑。他一直等到辦公室裡的全息影像盡數消失才開口——只剩托米斯拉夫。後者再度起身，整了整領帶。奧斯卡不禁好奇那領帶是什麼顏色——在全息的藍光裡根本無從分辨。托米斯拉夫站得筆直，姿態無可挑剔，一隻手搭在那把會議期間被他當作根據地的椅子上，望向奧斯卡，與他四目相對。\n\n\"彼此彼此，奧斯卡。你的某些工作，我同樣一竅不通。\"他說著，微微偏頭，向奧斯卡遞上一個極淺的微笑——浸透了魅力與風度，正是他談判無往不利的註腳。奧斯卡沒有太多可想的，只有一個緊隨而至的問題：\"這些全都是你安排——\"托米斯拉夫打斷了他，近乎聳肩——只是他沒有動肩膀，而是攤出那隻空著的手，恰好指向環桌四周如今空空如也的座椅，分明是在點出方才坐在那裡的人們。\"當然。要在談判中取勝，就必須在對方毫無察覺之下掌控它。\"又是那該死的微笑。奧斯卡搖搖頭，抬起空著的手撓了撓後腦勺。托米斯拉夫收回攤著的手，用搭在椅子上的那隻手把椅子推回原位，接著整了整袖口，轉身欲走。走出幾步，他才想起奧斯卡的全息影像還在。奧斯卡雖看不真切，但他看見托米斯拉夫轉回身朝他走來——大概是走向投射這全息影像的投影器或圓盤。\n\n\"那，接下來會怎樣？\"奧斯卡問他，彷彿把這場會談的一切都忘了個精光。他看見托米斯拉夫伸出手，全息影像朝他探來，幾乎觸到他——隨即影像一陣閃爍，全息房間的其餘部分盡數淡去，只剩托米斯拉夫。在與奧斯卡斷開連線之前，他留下了最後一句忠告。"
 EIZ_oskar_phase_one_economy.11.a:0 "\"你去贏得戰爭。\""
 EIZ_oskar_phase_one_economy.12.t:0 "總統的第一步"
 EIZ_oskar_phase_one_economy.12.d:0 "\"又一天……又碾平了一個難題。\"托米斯拉夫說，語氣簡單……輕柔。他無需再撐著體面——現在不用，在他的辦公室裡不用。獨自一人，離群索居。他甚至無法環顧四周：室內完全籠罩在黑暗裡。唯有在這黑暗的庇護中，他才向後仰去，卸下那副完美的坐姿，允許自己歇息。他靠進辦公椅——皮革本就深色，在黑暗中幾乎漆黑如墨。他的辦公室沒有窗，他喜歡這樣。他無需回頭去俯瞰他的城市。無論看不看得見，它都是他的。看不看得見那些四處爬動的螞蟻，也一樣。他直視著辦公桌，看見放在桌邊的全息圓盤，想起了某個人。\n\n\"奧斯卡……你和我一樣嗎？你是不是……也受夠了這個國家，這種……治理的形式。\"托米斯拉夫繼續輕聲說著，如今更是壓低了聲音。他明知這些話永遠傳不到奧斯卡耳中——他遠在俄羅斯，除非打開全息投影，否則這間辦公室裡的話語哪裡也去不了。但他仍在說，心中滿是……怨憤，對這一切的怨憤。他咬緊牙關——儘管他做了那麼多工作，一切仍顯得那麼徒勞、那麼令人氣悶。\"每一部法律，每一項法案……都要面對一群腐敗的蠢貨。他們別無所求，只想阻撓、扼殺它的通過。全都是為了他們自己的利益……目標與盤算……\"\n\n純粹的挫敗。托米斯拉夫的話語裡只有這個，字字浸透。這些話他只在腦中對自己說，從不出口——除非獨自一人。\"還能更好嗎？還有更好的嗎？民主已經腐爛，獨裁具有毀滅性……但不同於獨裁……取走一條命就能將其掐滅。\"托米斯拉夫依然放鬆地靠在椅中，頭左右輕晃，沉思著，琢磨著他下一個問題的答案。這個問題他將無聲地留下，然後回去繼續工作。他站起身，繞到椅後，抓住椅背頂端，一邊把它推回桌下，一邊說完了最後一句。"
 EIZ_oskar_phase_one_economy.12.a:0 "\"民主，何時死去……\""
 EIZ_intervention.1.t:0 "里昂介入東方"
 EIZ_intervention.1.d:0 ""
 EIZ_intervention.1.a:0 "「紅旗需要我們的風。」"
 EIZ_intervention.1.b:0 "「雄獅需要我們的支持。」"
 EIZ_intervention.2.t:0 "弗雷德麗卡介入東方"
 EIZ_intervention.2.d:0 "弗蕾德莉卡靜靜躺在沙發上，腦海裡翻騰著俄羅斯的局勢。是的，歐洲已取得長足進展，但這並不能阻止她惦記東方的威脅。她為已經逝去的無數無辜生命而煩憂，想著這一切原本能否避免。更何況，無論誰笑到最後，終將前來奪取俄羅斯的其餘領土，屆時歐洲又得面對一場戰爭。\n\n弗蕾德莉卡坐起身，平日筆直的及肩長髮如今一片凌亂。\n「漢娜？」她喚道，「能借用妳一下嗎？」\n漢娜立刻進來了。「需要什麼？」\n弗蕾德莉卡整了整袖子。「我需要找妳討論一些想法。」\n漢娜嘆了口氣，煩惱地揉著額頭——她知道弗蕾德莉卡根本沒能好好休息。「討論什麼？」\n弗蕾德莉卡用手指梳理著頭髮，想把它弄直。「我必須決定如何處理東方。如果放任太久，會有太多無辜的人死去。」\n\n弗蕾德莉卡說完，沉默在空氣中蔓延。儘管她努力保持鎮定，漢娜還是注意到她眼中的一絲痛楚。漢娜走過去，在弗蕾德莉卡身邊坐下。「好。說說妳的想法。」\n「目前我們沒有權利向他們宣戰，」弗蕾德莉卡沉吟道。「聽起來也許有違直覺，但要更快結束戰爭，我們必須支援其中一方。」\n漢娜對這個提議吃了一驚。\n「給未來的敵人送補給？妳確定嗎？」\n弗蕾德莉卡鄭重地點了點頭。「如果能避免不必要的死亡，恐怕只能如此。」\n漢娜望著弗蕾德莉卡，為自己領袖的責任感而自豪。「待在這裡，我去找那些領導人的資料。既然要支持惡魔，不如支持危害較小的那個。」\n「謝謝妳，漢娜。」弗蕾德莉卡說，臉上帶著溫暖的微笑。\n\n幾個小時後，漢娜抱著間諜機構提供的一大疊文件回來了。兩人用剩下的一整天爭論雙方的利弊，直到凌晨四點，終於得出了結論。"
 EIZ_intervention.2.a:0 "我們支援紅色一方。"
 EIZ_intervention.2.b:0 "我們支援歐洲不列顛尼亞。"
