 POLITICS_ALEXANDER_LYON_DESC:0 "亞歷山大·C·里昂，一個骨子裡的軍人，1981年4月19日生於法國。他在極為年幼時便進入一所著名的法國少年軍校就讀。學業甫一結束，EU與鄂圖曼帝國之間便爆發了戰爭。在這場戰爭中，他一路晉升，成為一支精銳戰鬥機中隊的指揮官，並在此期間結識了他的摯友讓·瑪里。兩人結下了經受無數戰役與衝突考驗的友誼。最終，里昂在戰場上嶄露頭角，以壓倒性的勝利次數贏得讚譽，並在戰爭結束後晉升為空軍元帥。"
