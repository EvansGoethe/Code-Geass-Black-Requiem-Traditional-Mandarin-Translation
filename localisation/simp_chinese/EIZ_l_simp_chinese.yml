 EIZ.1.t:0 "入侵"
 EIZ.1.d:0 "President Zakharov stands in his bunker surrounded by his best generals all telling him the impossible. Countless military bases across Russia report coming under attack by civilians bearing various banners. Worse still are the bases who no one can contact, where the bunker’s communications staff confirm they are receiving messages but simply won’t respond to our hails. Seeing the worse, President Zakharov has mobilized all remaining forces and reservists to put down the insurrection; however, it seems as though the Europeans to the west have other ideas. As Zakharov begins issuing orders, reports stream in as outposts on the border with Poland report hostile contacts bearing the insignia of European Peacekeeping forces seemingly headed straight for Moscow."
 EIZ.1.a:0 "May God save Russia for I could not…"
 EIZ.2.t:0 "Collapse Of Government"
 EIZ.2.d:0 "This is IRC reporter Katerin Zelenkov with BREAKING NEWS… after an emergency session of the Council of Europe, International Peacekeeping forces have been sent to secure Moscow after the recent uprisings all across the Former Republic of Russia. At 8:00am Peacekeeper tanks and soldiers were spotted sitting outside the main governing building and rounding up any officials they can find. President Zakharov has noticeably been absent since Peacekeepers crossed the boarder and faced fierce resistance. The situation in Russia is still unknown; however, it seems as though the President and many of his closest advisors have fled the city. Their whereabouts are still unknown."
 EIZ.2.a:0 "對總統及其走狗發出逮捕令！"
 EIZ.3.t:0 "有組織抵抗的瓦解"
 EIZ.3.d:0 "While the Russian Armed Forces was no match for the Counsel’s Peacekeepers, civilian resistance was still strong enough to cause several setbacks. With the President’s disappearance and a renewed effort to crush the armed insurrection, all organized resistance within the territories east of the newly formed Principality of Ekaterinburg have been crushed. It awaits to been seen what the new military government will have in store for the future."
 EIZ.3.a:0 "Long live the European Intervention Zone!"
 EIZ.31.t:0 "一群烏合之眾"
 EIZ.31.d:0 "Lyon smiled as he made his way over to Jean Marie, the tall man putting an arm around Lyon turning to his squadron. “This is the man we came here to see, Lyon here saved me in a dogfight. Diving from above towards the enemy tailing me. The crazy bastard pulled up just before they crashed into each other. Because of that the enemy panicked, causing him to roll too hard. The weak man passed out from the G force. I've owed Lyon since then. So, we will be working for him,” Jean said letting out a hearty laugh as he took a step back, Lyon unable to laugh with him, needing to clear his throat before talking. “You're making it sound like you're not getting anything out of this. You aren't going to the front boys. I have something better suiting your skills planned.”"
 EIZ.31.a:0 "里昂在盤算什麼？"
 EIZ_starting_tree.1.t:0 "A New Beginning"
 EIZ_starting_tree.1.d:0 "Subject: Where we setting up?\nFrom: Keep guessing\nTo: Whats-his-face, Acting Commander in Chief\n\nGonna make this quick... So, basically. My job is to relay information and reports received throughout the EIZ, condense them down and then send them to you.. Just to let you make decisions on what to do, what course the intervention is taking and tell them to that council of gen-wanks or whatever.\n\nNow, I know you're reading this and quickly going. \"Who the hell is this writing my reports?\" Well, the good thing about my job is that. I don't have to tell you, and if you don't know me. You can't fire me or court marshall me or whatever.. And frankly, I don't get paid enough to care. With that out the way, onto business.\n\nThe first major issue people are having, apparently, is where to situate our headquarters.. Frankly I'd pick my bedroom back in Limerick, but beggars can't be choosers. Except you can! So, we've got three suggestions for where to go with this. First ones from the French guy we have in charge of the air force, he says to stay in Moscow because- okay I'll be honest I didn't read all the reasons in their reports, I guess he just likes the weather for flying. Seconds from one of the tank generals, she's German I think. Or French? Frederica... No Frederika, so German. She suggests... Prine- Prinevisk- Saint Petersburg. Again not sure why, maybe a cultural thing. Or supply. Last ones from some Danubian guy, actually passed by him while collecting reports. Does not seem to be doing well, I think he's an accountant? Why we brought one I don't know... Anyway he suggests Volgograd.\n\nThat's about it, the choice boils down to. Where do you want to kick your feet up. If I was to guess, it also influences how those people who suggest it will go. They might brag about it or whatever."
 EIZ_starting_tree.1.a:0 "Lyon"
 EIZ_starting_tree.1.b:0 "Frederika"
 EIZ_starting_tree.1.c:0 "Oskar"
 EIZ_starting_tree.2.t:0 "恢復軍營秩序"
 EIZ_starting_tree.2.d:0 "主旨：小夥子們鬧起來了……救命？\n寄件人：繼續猜吧\n收件人：那個誰，代理總司令\n\n又是我，老規矩。哦，聽說你在查我是誰——嘿，跟著我的小夥子們可不會那麼輕易出賣我……所以你暫時只能接受我們的夥伴關係了。\n\n說到哪了？哦對，總結一下……士兵們嘛，他們可不是歐盟裡最守紀律的一批人，大多數都……挺嫩的，菜鳥，乳臭未乾。這是他們第一次被實際部署到什麼地方，然後……這就是問題所在。這是一支整編部隊，雖然我理解軍隊那種既集中又分散的性質什麼的……巴拉巴拉。反正這造成了麻煩，不僅是對將軍們，還有那些可憐的、得替他們申領物資的傢伙。\n\n說到方案，還是跟上次一樣的三個回覆……那個法國空軍的傢伙。里昂？躺——昂。嘿嘿，抱歉。應該是拼作Lyon，他基本上是建議，呃，嚴厲的紀律，把他們狠狠操練成型……好吧他沒這麼說，但報告看起來就是這個意思。話說回來，我那份報告可能有點問題……有一瞬間還以為他要求用毒氣熏他們……原來是打錯字了。總之，然後是那個德國妞，弗蕾德莉卡——順帶一提……她給我一種熟悉感，不知道為什麼。我剛看過她的照片，嗯，總之她建議別那麼嚴厲，只要獎勵守規矩的人就行。我覺得有道理，胡蘿蔔加大棒嘛。我個人支持這個……不過話說回來，我大概永遠拿不到獎勵。最後我又碰到了那個多瑙河人，他看起來壓力山大。我們得找人管管這事，總之跟他聊了幾句。他的思路很簡單……何不兩者兼施？懲戒越線者，獎賞守規者。他說這要花點錢……但他沒細說壞處……好吧他可能說了，我沒在聽。\n\n所以，趕緊處理吧。這些部隊遲早會自相殘殺……而且傷亡報告也歸我管，別逼我加班。"
 EIZ_starting_tree.2.a:0 "Lyon"
 EIZ_starting_tree.2.b:0 "Frederika"
 EIZ_starting_tree.2.c:0 "Oskar"
 EIZ_starting_tree.3.t:0 "建立我們的補給線"
 EIZ_starting_tree.3.d:0 "主旨：誰都領不到東西\n寄件人：繼續猜吧\n收件人：那個誰，代理總司令\n\n有時候我真受夠了這份工作，你知道嗎？你可能不這麼想……畢竟我靠耍嘴皮子、當全世界最沒用的傢伙領薪水。但有時候，到處跑來跑去真的很累……為了這份報告、那份報告到處打電話。找人核對、收集數據。最後還要整理成讓老闆你一目了然的格式。開玩笑的，老闆那部分是玩笑……其他都是真的，但你可管不著我。\n\n進入今天的主題：收到很多報告說我們的補給線……後勤，嗯，攤得太薄了。很多地區送不到東西，很吃力……我們為了打進來把俄羅斯毀得夠嗆，現在得決定怎麼把它拼回去。別擔心，我又給你準備了三個方案。\n\n第一個讓我挺意外，那個搞飛機的里昂。整天端著他的飛機高高在上……居然沒建議空投補給。看來停擺的鐘一天也能準個幾次……大概一次吧。總之他建議在我們領土的北半部擴建補給基地，那一帶被打得最慘，補給線也最薄弱。而女神弗蕾德莉卡……抱歉，她真的很漂亮，我能怎麼辦。她建議我們專注改善使用最頻繁的地區，讓它們扛下主要壓力，也就是我們領土的南部。有道理，我想這也有利於她的戰車調動。最後一個建議來自那位多瑙河老兄……順帶一提他叫奧斯卡，奧斯卡·馮·什麼的，我記不住名字。總之，他發現了一個問題……顯然是財政問題，這才是補給吃緊的原因。他實際建議的是擴建港口、興建新港口，用來運進新補給，順便給我們的資產組合添點進項……聽起來他是這個意思。\n\n祝你處理愉快。就我個人而言，如果你能保證我的伙食供應充足，我會非常感激的，兄弟。"
 EIZ_starting_tree.3.a:0 "Lyon"
 EIZ_starting_tree.3.b:0 "Frederika"
 EIZ_starting_tree.3.c:0 "Oskar"
 EIZ_starting_tree.4.t:0 "Department For Civilian Affairs"
 EIZ_starting_tree.4.d:0 "主旨：真的毫無頭緒\n寄件人：繼續猜吧\n收件人：那個誰，代理總司令\n\n好吧，這次我被難住了……我的報告就是收不上來。雖然有人跟我說抵抗勢力已經全被粉碎，我就是不信。我把好幾個人臭罵一頓要文件……結果什麼都沒拿到。我得出的結論是：我們正在成立一個處理平民事務的部門……但老兄，沒人說得清那到底要幹嘛。我甚至逮不到奧斯卡碰個面，所以……看來我只能即興發揮了？\n\n好，基本上我猜……猜這是個處理EIZ治下平民問題的部門，給他們發聲的管道、照顧他們。那麼，我猜在怎麼做這件事上有分歧，不然我也不會發這封信等你裁決。我大概能猜到誰會出什麼主意，讓我模仿看看。\n\n我跟你賭，里昂肯定會扯到飛機，他八成想設一個專門圍繞民用航空的部門，好給我們提供更多飛機。或者只是想管制民航機別擋路，對，八成是這個。弗蕾德莉卡就單純多了，她人很好，她有愛心。她叫我小帥哥……唉，想得美。我想她會希望平民事務聚焦在救助受傷的平民，幫助他們、供應物資，在我們幹活的時候讓他們吃飽活命。所以，就這麼辦？至於奧斯卡……我還是不懂為什麼要給會計發言權。他八成只想要更多——更多幫手、更多會計、更多陪他一起受苦受難的人。所以，把數字做上去？\n\n這次真的抱歉了老兄，我覺得文件是被敵方游擊隊劫了。這批文件弄得特別辛苦，希望早點解決。我可不想幹比現在更多的活。"
 EIZ_starting_tree.4.a:0 "Lyon"
 EIZ_starting_tree.4.b:0 "Frederika"
 EIZ_starting_tree.4.c:0 "Oskar"
 EIZ_starting_tree.5.t:0 "最終抉擇"
 EIZ_starting_tree.5.d:0 "Subject: Your Replacement\nFrom: Keep guessing\nTo: Whats-his-face, Acting Commander in Chief\n\nWell, it's sad to see you go. But the time has finally come... It's bitter sweet really, just as we were starting to connect. It's a shame to see you go, oh right you probably haven't heard so basically. Your position has been Acting Commander in Chief for a reason... you're a temp while Europia tries to select the best person for the job, and it seems they have. I'm writing this to you ahead of time, I'm not sure on who they selected yet, but I can tell you. Your choices in my previous reports probably had something to do with it. So, our options are probably limited. I'll go over the candidates.\n\nLyon, the leader of our air forces. Not much to say about them, he comes from France, he's a highly decorated pilot and leader. Apparently his beliefs are simple. \"Plane warfare is the most efficient.\" But like picture that in a French accent, I can't do that. The second option, my pick is Frederika. From Germany where she's a part of a big group over there. She's the leader of our armoured convoy slash part of our army, she's like Lyon highly decorated though of course she's actually seen more combat. She holds the idea that focusing on having more advanced weapons will keep more people safe. She views war as only necessary to save lives. Then finally Oskar, decent guy, all things considered. Now, he's not actually military at all. He's from Danubia and an accountant, not sure why we brought him. Or why he's so important, I guess the universe is just cruel to him. He's tired, he's stressed. But he gets the job done.\n\nNow man, not sure who will succeed. But this will be the last we will report to each other, after they select the Command in Chief, well apparently I just go back to casualty reports, it seems SOMEBODY told someone about how my reports are like. So, I can't be doing them too much anymore. It sucks, but I guess they found me in the end. Oh well, you still have a job here and you don't. Truly it is a shame we won't talk anymore."
 EIZ_starting_tree.5.a:0 "\"A shame indeed...\""
