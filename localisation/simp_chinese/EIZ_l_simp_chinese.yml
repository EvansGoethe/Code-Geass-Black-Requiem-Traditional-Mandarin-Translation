 EIZ_Foreign_Engineers_desc:0 "Many EU specialists wish to volunteer in order to assist the reestablished Russian administration. We can begin to start work on rebuilding the nation using their various skillsets. Furthermore, a volunteer task force would be less costly to the little budget we have."
