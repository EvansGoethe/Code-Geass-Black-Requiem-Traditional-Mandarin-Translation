 EIZ_frederika_phase_one_economy.6.t:0 "惹惱哈布斯堡家族"
 EIZ_frederika_phase_one_economy.6.d:0 "弗雷德麗卡端坐在軟墊座椅上，啜著一只白瓷茶杯。她對面是希爾薇婭·梅特涅，一位來自奧地利的外交官。她的蔚藍色禮服綴著黑金紋飾，一條天藍寶石項鏈與耳環相映著她明亮的藍眼睛。姑娘蹺著腿而坐——正是她邀請弗雷德麗卡來赴這場至關重要的茶會。希爾薇婭放下茶杯，帶著一抹胸有成竹的微笑注視著弗雷德麗卡。她把下巴擱在手背上，用銀鈴般的嗓音開口：\"能終於見到您，真是榮幸，施羅德女士。德意志的母虎……俄羅斯的劍與盾。戰事如何？\"\n\n弗雷德麗卡放下茶杯的動作可沒那麼優雅，杯底與碟子磕出刺耳的一響。\"補給少得令人作嘔。還用我多說嗎？理事會對苦難中的俄羅斯……可算不上仁慈。\"\n儘管聽到的是壞消息，希爾薇婭依然微笑著，低頭看向自己的茶。\"這是俄羅斯的茶？真甜。\"希爾薇婭又緩緩地、輕輕地啜了一口。\"您喜歡甜茶嗎，施羅德女士？\"\n弗雷德麗卡低頭看著茶杯，在碟子上輕輕轉了轉，望著漾開的漣漪。\"大概是喜歡的。\"\n\"很奇怪，不是嗎？如此冷峻苦澀的人們，卻偏愛如此甜美的味道。他們是被自己得不到的東西吸引嗎？\"希爾薇婭此刻把下巴擱到了雙手上，身體前傾。\"還是說，他們自己其實就是甜的？\"\n弗雷德麗卡抬起頭，偏了偏腦袋。\"您是在說我嗎？\"\n希爾薇婭搖搖頭。\"我說的是俄羅斯人民。這裡的空氣寒冷。凜冽。苦澀。您對這裡的人也有同感嗎？\"\n\n弗雷德麗卡側過頭去，發現自己陷入了這場出乎意料的哲學討論，沉吟了片刻。\"俄羅斯人民不得不去適應他們的環境。倘若境遇不同，他們自然會去活成自己最愛的那杯茶的樣子。\"弗雷德麗卡搖了搖頭。\"您一定知道我為何而來，希爾薇婭。\"\n希爾薇婭依然是那副篤定的神情。\"當然，您想要我的幫助。為了俄羅斯，而不是為了您自己。\"\n\"難道您不想看到俄羅斯綻放出更美的模樣嗎？\"\n希爾薇婭瞥向左手邊的窗外，仰望著籠罩白色大地的灰雲。厚重的雲層只允許最微弱的光線灑進這座俄羅斯城市——遠不足以帶來一絲暖意。"
