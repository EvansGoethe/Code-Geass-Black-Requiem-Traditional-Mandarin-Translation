 EIZ_lyon_phase_one_economy.1.t:0 "Lyon's Economic Board"
 EIZ_lyon_phase_one_economy.1.d:0 "\"Ah, mon amour, can you hear me now?\" Lyon spoke into his phone, hoping that he finally had a connection. His voice read his thoughts and feelings, he needed to hear her. Needing her to respond to him, he finally had the time for a call. No matter how quick it would be he just needed it, he paced his command tent as he waited. Almost biting his own nails, he promised himself nervousness would leave. But suddenly it's back, in waves at this simple thing. \"Yes! Mi amor, I can hear you splendidly.\" Then it vanished, in an instant. Lyon could relax, he breathed a sigh of relief. The voice of Gabriella, well Lyon was rarely a fan of music. But her voice he considered truly a divine song, he stopped pacing and quickly went to lean on his desk leaning further into his phone. \"Fantastic.. I must say I have missed your voice.\" He admitted sheepishly, he knew the tent walls weren't going to do any effort to block out what he was saying. Frankly, it didn't matter. Not right now, he had contact with his wife. He wasn't gonna waste it or not say what he felt because of others.\n\n\"The only thing you missed~?\" Gabriella's tone was slightly dangerous. The way it was hinting to him, he chuckled. Such a rare sound to hear from Lyon, especially as of late. The smile was forced upon his face, and he hoped it wouldn't leave soon. Of course not.\" Lyon answered quickly, he heard his wife on the other end chuckle herself as she leaned in. \"So, how are you? What's happening?\" How he was, he always forgot to think about this question. How he was, everything was simple. Everything piled onto him, so stressful. He had no way to break it down or explain it so softly he just said. \"I'm... fine.\" The second question he could answer quicker, looking down at his desk and the message he had received the day before. \"The first president is sending over some economists to help get us on track, apparently he thinks the Danubians failed.\" While Lyon had to admit that he thought the Danubians were doing the best he could, he also saw it himself. They were simply overworked, unprepared for this sudden intervention. So they did the best with what they had, he hoped his fellow countrymen could give them a hand. Lyon listened intently for Gabriella's response to that, but he just heard shuffling and movement. She went quiet, then shortly after she responded to him. But, it wasn't the way he had hoped.\n\n\"Oh... I have to go, I'll talk to you later mi amor.\" Just like that his brief moment, the moment he had cherished would have to come to an end. He wasn't sad, just disappointed. Lyon's smile faded softly, shaking his head. She makes him so easily come undone, and she puts him back together just like that. Lyon did his best to hide his disappointment in his voice as he got ready to hang up."
 EIZ_lyon_phase_one_economy.1.a:0 "\"...ah, okay. Bye mon amour.\""
 EIZ_lyon_phase_one_economy.2.t:0 "Casablanca Proposal "
 EIZ_lyon_phase_one_economy.2.d:0 "Jean stood at the back of the Moroccan commissar's office, listening closely to the conversation. “What could you offer? Working with you makes our position with France even worse. They barely help support me in running the colony as is,” Jean saw the politician smile, clearly this is what he was hoping to hear. “Well that's exactly it. You can work with us, trade with us. You need someone to actually trade with, someone who recognises your authority. While we won't do that. We would be happy to lease out your harbors and cargo ships for our own uses. This could be very good for you. If you play your role and keep your position in mind,” the EIZ representative said with a devious look."
 EIZ_lyon_phase_one_economy.2.a:0 "'We can take advantage of the colonies France has neglected.'"
 EIZ_lyon_phase_one_economy.3.t:0 "The Pale Jewel"
 EIZ_lyon_phase_one_economy.3.d:0 "As Jean helped his men open up the ventral of the air lifts. Allowing the EIZ representatives to unload to meet with the head of the west African confederation. Jean scoffed at the representatives looking at him with caution. The fighters and bombers flying large orbiting above. Only Jean's specialized interceptor following behind the airlifts into a landing, just in case. As Jean heard the Commissar argue against the representatives request, he marched over before calmly putting an arm around the commissar and pointing up at the two squadrons of fighters and bombers. “Those don't look like Union aircraft to me. Hmmm whoever they are, I hope they don't get restless from waiting.” With a silent nod from the commissar he patted the man on the back before heading off to yell at the workers “Hurry up I want these airlifts filled to the brim.”"
 EIZ_lyon_phase_one_economy.3.a:0 "'If this is what it takes to end the crisis.'"
 EIZ_lyon_phase_one_economy.4.t:0 "Reaching out to old friends"
 EIZ_lyon_phase_one_economy.4.d:0 "Jean climbed out of his interceptor, pacing down the row of aircraft that had gathered together. He couldn't help but become overwhelmed with the possibilities of what he could do with Lyon's funding, especially now that Lyon had made it clear he didn't want to know. Jean's full air wing had arrived, all 1000 men. Aviators, engineers and paradropping specialists all gathered from every corner of Europe. Finally having the chance to get the riches they were owed for their service. Everyone looking south and the weeks ahead."
 EIZ_lyon_phase_one_economy.4.a:0 "'A PMC? This can not go well.'"
 EIZ_lyon_phase_one_economy.5.t:0 "Breaking The Mold"
 EIZ_lyon_phase_one_economy.5.d:0 "Lyon took a step into the office, it was strange to be in a proper building for once for a meeting. But, it was strange circumstances that brought it about so he couldn't be surprised. He closed the door behind him and locked it just in case, there was nothing out of the ordinary about this office. It appeared on the surface to just be a normal office. He looked to the centre, there was a large desk prominent in the centre of the room, with a large almost executive chair sitting by it, its back turned to him. He had expected to see the man he was here to see sitting on it, so he stepped closer towards the desk.\n\n\"I hear, you. And your associates... have some interest in funding us.\" Lyon spoke, aiming his attention to the chair, he stood right in front of the desk now, only for there to be nothing coming from the chair. Then suddenly he heard a voice, turning to its location he saw a plain old man step out from the corner adjusting his tie, he was in a sleek black suit. \"Only because, we hear that your existence furthers our Mark of Peace.\" Lyon eyed the man, he seemed harmless enough, he watched him step over to the other side of the desk and wheel the chair around, sitting in it was a piece of paper. The contract, no doubt for their services. \"I only seek to put this war to an end. For my country, and my country men.\" Lyon had no interest in anything but, he just wanted the war to end. He wanted to go home, his men wanted to go home. He almost could care less about peace for the wider world so long as the E.U. was safe, so long as his love. Was safe.\n\n\"It matters not what the reason is, as long as the outcome is the same.\" Lyon was catching the man's voice now, it was smooth as glass. As deep as the ocean, and spoke with a reserved confidence. He leaned down to the paper on the chair and pulled it up, passing it over to Lyon, he then offered him a yellow pen. \"So, what do I call you.\" It was a question he wasn't sure if he should ask him, but he did. All to give himself a second to go over the terms and details of the contract in his hand, before taking the yellow pen off the man. \"Know me, as Mister Y.\" That type of answer was expected from the man, Lyon placed the piece of paper onto the desk and signed it in fresh black ink."
 EIZ_lyon_phase_one_economy.5.a:0 "\"To a swift end of the war.\""
 EIZ_lyon_phase_one_economy.6.t:0 "The Contract"
 EIZ_lyon_phase_one_economy.6.d:0 "\"This place, yes, has seen better days. But that makes it perfect, it will fly under the radar.\" Jean announced proudly, as if so confident in his find there could be nothing better. He did a spin while holding his phone out, allowing Lyon to get a good view visually of the facility. It was frankly a dump, it was an old Ethiopian Airfield from the Somali Crisis, it had seen better days. Much better days, right now it was almost buried underneath piles of sand and dirt, though the hangers were still standing tall.\"It's been abandoned since the Somali crisis. While I understand its valuable location, it's barely being held up right.\" Lyon admitted not being convinced, rightly so given the state of the place. Jean sighed, his smirk cracking only slightly as he stopped his twirl, turning behind him to look at his men while keeping Lyon's feed on the airfield.\n\n\"Then allow me to be responsible for propping it up my friend! It won't take much to... acquire it.\" Jean said somewhat, suspiciously. Especially as he waved his hand behind to his men, who made moves to go to a jeep that was near by them. Jean had this preplanned and as of now it was all going along to that plan, Lyon just needed to agree. So Jean turned his back to the airbase and had the camera capture both him and it in the frame, allowing him to see Lyon's face and tired features. He needed a win, that was clear. The man seemed exhausted. \"Fine, see it done.\" Lyon said simply, Jean's smile widened. \n\n\"Absolutely splendid!\" He announced as he hung up the call, tucking his phone away. He looked back to his men who had pulled someone with a black bag over his head out of the jeep. Jean moved towards him, climbing a small sand dune while simply asking the covered and cowering man."
 EIZ_lyon_phase_one_economy.6.a:0 "\"How much for the place?\""
 EIZ_lyon_phase_one_economy.7.t:0 "Ethopian Haven"
 EIZ_lyon_phase_one_economy.7.d:0 "One by one, the men took the crates and either carried them or pushed them to the marker. Right underneath a massive cargo helicopter that had various ropes and cables dangling down, ready to receive the spoils or the men. Jean looked to the side, as the manager took a step to attempt to stop a soldier from getting to the marker. \"You- you can't do this!? If we don't have these supplies we won't-\" He was panicked, confused still. He simply didn't get it, ah Jean cracked a smirk as he took a step towards him then another, all the while he put his hand down and without looking unholstered his pistol, pulling it out he clicked the safety off alerting the manager, and put it right to the back of his skull. \"Won't what? My friend, won't be able to live? To see the next day? To feed your families?\"\n\nJean knew he was enjoying himself too much here, but he couldn't help it. His tone was close to a cackle, as he felt the man squirm and struggle to breathe with the pistol barrel stuck right to his head. \"I sure would love to see that, so don't make me pull the trigger.\" Jean had even begun to start squeezing the trigger, oh just a little bit more and this man would drop dead right now. And he did, except to Jean's amusement he didn't even need to pull the trigger. The man simply let out a scream, terrified for his life, he began to sob. Dropping to his knees, his head crumbled right into his hands. Jean chuckled at that, not bothering to holster his gun just yet. He looked to the side, the cargo was loaded and the men had not much else to do.\n\n\"Alright men! We are done here.\" He announced to them all, signalling to them to start packing themselves up, fastening themselves to the ropes and cables, Jean himself moved over to grab one, only to look back at the man on the ground as takeoff began. Jean didn't care much for safety, they had to do this quickly. So as he was pulled off the ground he simply laughed down to the manager still crying on the ground."
 EIZ_lyon_phase_one_economy.7.a:0 "\"Till we meet again!\""
 EIZ_lyon_phase_one_economy.8.t:0 "The Libyan raid"
 EIZ_lyon_phase_one_economy.8.d:0 "Jean gave the order, the bomber wing unloading their cargo down in front of the field in front of the processing plant, flattening the bushes and rocks that peppered the ground. The airlifts opened their Vectors, Paratroopers dropping down onto the ground hurriedly running into the processing plant. Commanding workers to bring the processed and raw minerals out into the field. The airlifts landing and dropping their Vectors allowing the workers to fill them. Jean dove down and let his guns fire in front of a foramen trying to escape to get help. The airlifts took off ten minutes later filled to the brim, with the PMC following close behind."
 EIZ_lyon_phase_one_economy.8.a:0 "'This should be enough to supply the front for sure.'"
 EIZ_lyon_phase_one_economy.9.t:0 "Loot South Africa"
 EIZ_lyon_phase_one_economy.9.d:0 "Jean personally marched up to the High Commissar smiling brightly as he handed him a sealed envelope. “Nice to meet you, we are your new trading partners.” Jean chirped with a wide grin as behind them, a scene played out of all one thousand men of Jean's all loading up Cargo ships from Morocco, with all the minerals and supplies that were stored up for shipping. “Do not worry, we won't take enough that causes France to rain down hell on you and if you open that envelope in a private space. I'm sure you will find its contents very intriguing. Jean continued to smile as gunfire broke out behind them, suddenly hitting the High Commissar with the butt of his pistol."
 EIZ_lyon_phase_one_economy.9.a:0 "'What is Jean doing?'"
 EIZ_lyon_phase_one_economy.10.t:0 "Magnum Opus"
 EIZ_lyon_phase_one_economy.10.d:0 "Jean sat in Lyon's office drinking coffee as the two watched news coverage of the activities in Africa. Jean punched Lyons arm and cheered as the High Commissar came on screen. “So did I do good in Lyon? I reckon I don't owe you anything anymore,” Jean said playfully as he watched Lyon shake his head. “You convinced a whole continent of colonies to secretly ship as resources and transfer us funds. Just by placing pressure and showing force. I'm amazed you didn't get caught. Now I'm sorry to kick you out but I have a way to finish, I'll see you at the hangar later” Lyon returned to his desk quickly appearing bored again as he read reports from the front. “You need to get back in the air Lyon, you'll die down here otherwise,” Jean called out as he exited the room."
 EIZ_lyon_phase_one_economy.10.a:0 "'Wait… that, that worked?'"
