 EIZ_The_Bundeswehr_Model:0 "The Bundeswehr Model"
 EIZ_The_Bundeswehr_Model_desc:0 "Looking at the major Europian militaries we can see that Germany's Bundeswehr is a masterful example of mechanized warfare. We should copy their military structure and doctrine in order to maximize the benefits of our armored forces"
