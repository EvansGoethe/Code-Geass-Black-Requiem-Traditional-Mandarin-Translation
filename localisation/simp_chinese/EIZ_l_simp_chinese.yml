 POLITICS_ALEXANDER_LYON_DESC:0 "Alexander C. Lyon, a military man at heart, was born in France on the 19th of April, 1981. At an exceedingly young age, he was enrolled into a prestigious French military academy for youths. Soon after he finished his education, a war broke out between the EU and the Ottoman Empire. During this war, he rose through the ranks and became the commanding officer of an elite fighter squadron, meeting his sworn best friend, Jean Marie, in the process. Together, they forged a friendship that withstood numerous battles and conflicts. Eventually, Lyon distinguished himself in battle, earning recognition for his overwhelming number of victories and ultimately being promoted to an air marshal after the end of the war."
