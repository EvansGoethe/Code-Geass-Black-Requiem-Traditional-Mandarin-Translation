 EIZ_Foreign_Engineers_desc:0 "許多歐盟專家希望能自願協助重建後的俄羅斯行政當局。我們可以開始利用他們各自的專業技能來開展國家重建工作。此外，在我們預算有限的情況下，志願工作組的成本也會較低。"
