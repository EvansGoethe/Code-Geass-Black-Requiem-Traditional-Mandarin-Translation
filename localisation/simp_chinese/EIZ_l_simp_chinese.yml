 EIZ_Call_the_Young_Fox:0 "召喚小狐狸"
 EIZ_Call_the_Young_Fox_desc:0 "placeholder"
 EIZ_Frederica_Oil_Focused:0 "石油對焦"
 EIZ_Frederica_Oil_Focused_desc:0 "毫無疑問，石油是我們的生命線，我軍的實力較強的部隊嚴重依賴這種稀缺而寶貴的資源。因此，我請求我們的盟國協助建立當地石油生產，這將使我們在該領域擁有一定程度的自主權。"
 EIZ_Rolling_Off_The_Production_Line:0 "下線"
 EIZ_Rolling_Off_The_Production_Line_desc:0 "雖然我們的車輛品質確實非常好，但我們必須適應我們所處的新環境，相應地，我們的坦克設計將被簡化，以提高產量並促進我們最重要的進攻工具的批量生產"
 EIZ_Pushing_Past_Their_lines:0 "突破他們的界限"
 EIZ_Pushing_Past_Their_lines_desc:0 "衝突開始已經有幾個月了，當時我們發現了敵人防線的弱點，所以我們決定在這些點上集中我們的一些兵力，他們已經成功地突破了他們的防線，所以希望這一切很快就會結束。"
 EIZ_Rethinking_Tank_Designs:0 "重新思考坦克設計"
 EIZ_Rethinking_Tank_Designs_desc:0 "我們的坦克很好，但與新型戰爭武器相比，它們開始下降。我們需要重新考慮坦克的裝甲和武器裝備，但是車內的佈局和其他機械也很重要。"
 EIZ_Armor_from_the_Home_Front:0 "來自後方的盔甲"
 EIZ_Armor_from_the_Home_Front_desc:0 "Although we are working on producing our own Armored vehicles, we are still not capable of fulfilling the frontline needs of production. We can alleviate this issue by requesting vehicles from EU member countries."
 EIZ_Frederica_Sakuradyte_Focused:0 "櫻石聚焦"
 EIZ_Frederica_Sakuradyte_Focused_desc:0 "就像工業革命將煤炭與石油的熱能潛力帶到工業與軍事技術發展的最前線一樣，我們必須擁抱櫻石的能量潛力，以便在敵人之前搶佔先機，並為我們自己製造全新的戰爭武器。"
 EIZ_Sakuradite_Propellent:0 "櫻石推進劑"
 EIZ_Sakuradite_Propellent_desc:0 "毫無疑問，櫻石代表著未來，一項新的研發已投入生產，讓我們的火砲得以提升其炮彈性能。"
 EIZ_Sakuradyte_Plating:0 "櫻石裝甲板"
 EIZ_Sakuradyte_Plating_desc:0 "由於對櫻石的投資，我們的坦克得到了進一步的技術改良，坦克裝甲板的薄弱部位已用櫻石進行了加固，使我們得以在不增加重量的情況下提升裝甲。"
 EIZ_Give_The_Russian_Knightmares:0 "給予俄羅斯人Knightmare"
 EIZ_Give_The_Russian_Knightmares_desc:0 "Our most potent battlefield weapon as of date is the Knightmare frame. It seems foolish not to provide these to our Russian troops, who hold a greater investment in this conflict than our other European soldiers."
 EIZ_Frau_Und_Panzer:0 "少女與戰車"
 EIZ_Frau_Und_Panzer_desc:0 "女性和男性在裝甲車輛內作戰時同樣能發揮出色，我們應該利用這一事實，讓更多女性加入我們的裝甲戰鬥部隊。我們也可以將此作為宣傳手段來為我們謀取優勢。"
