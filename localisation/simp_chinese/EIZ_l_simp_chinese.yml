 EIZ_lyon_phase_one_economy.8.t:0 "The Libyan raid"
 EIZ_lyon_phase_one_economy.8.d:0 "Jean gave the order, the bomber wing unloading their cargo down in front of the field in front of the processing plant, flattening the bushes and rocks that peppered the ground. The airlifts opened their Vectors, Paratroopers dropping down onto the ground hurriedly running into the processing plant. Commanding workers to bring the processed and raw minerals out into the field. The airlifts landing and dropping their Vectors allowing the workers to fill them. Jean dove down and let his guns fire in front of a foramen trying to escape to get help. The airlifts took off ten minutes later filled to the brim, with the PMC following close behind."
 EIZ_lyon_phase_one_economy.8.a:0 "'This should be enough to supply the front for sure.'"
 EIZ_lyon_phase_one_economy.9.t:0 "Loot South Africa"
 EIZ_lyon_phase_one_economy.9.d:0 "Jean personally marched up to the High Commissar smiling brightly as he handed him a sealed envelope. “Nice to meet you, we are your new trading partners.” Jean chirped with a wide grin as behind them, a scene played out of all one thousand men of Jean's all loading up Cargo ships from Morocco, with all the minerals and supplies that were stored up for shipping. “Do not worry, we won't take enough that causes France to rain down hell on you and if you open that envelope in a private space. I'm sure you will find its contents very intriguing. Jean continued to smile as gunfire broke out behind them, suddenly hitting the High Commissar with the butt of his pistol."
 EIZ_lyon_phase_one_economy.9.a:0 "'What is Jean doing?'"
 EIZ_lyon_phase_one_economy.10.t:0 "Magnum Opus"
 EIZ_lyon_phase_one_economy.10.d:0 "Jean sat in Lyon's office drinking coffee as the two watched news coverage of the activities in Africa. Jean punched Lyons arm and cheered as the High Commissar came on screen. “So did I do good in Lyon? I reckon I don't owe you anything anymore,” Jean said playfully as he watched Lyon shake his head. “You convinced a whole continent of colonies to secretly ship as resources and transfer us funds. Just by placing pressure and showing force. I'm amazed you didn't get caught. Now I'm sorry to kick you out but I have a way to finish, I'll see you at the hangar later” Lyon returned to his desk quickly appearing bored again as he read reports from the front. “You need to get back in the air Lyon, you'll die down here otherwise,” Jean called out as he exited the room."
 EIZ_lyon_phase_one_economy.10.a:0 "'Wait… that, that worked?'"
