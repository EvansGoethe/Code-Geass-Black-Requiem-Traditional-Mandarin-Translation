 EIZ_Foreign_Relations_Secured_desc:0 "placeholder"
 EIZ_Halfway_There:0 "Halfway There"
 EIZ_Halfway_There_desc:0 "placeholder"
 EIZ_Oskar_Putting_Down_The_Rebels:0 "Put Down the Rebels"
 EIZ_Oskar_Putting_Down_The_Rebels_desc:0 "placeholder"
 EIZ_Oskar_Crossing_The_Urals:0 "Cross the Urals"
 EIZ_Oskar_Crossing_The_Urals_desc:0 "placeholder"
 EIZ_Oskar_Intervene_In_The_East:0 "Oskar Intervenes In The East"
 EIZ_Oskar_Intervene_In_The_East_desc:0 "The war in the east is still in effect, even with our victory in western Russia. This can be used to our advantage if we play our cards right. Through economic and military aid, though not directly engaging in combat, we can support one side in the conflict to ensure the outcome is more favorable, even if a war with either side is inevitable."
 EIZ_Oskar_Backing_The_Socialists:0 "Backing The Socialists"
 EIZ_Oskar_Backing_The_Socialists_desc:0 "The socialists in Novosibirsk, although unpredictable, would be advantageous to support. They are less organised and lack the backing of a major power. This will make any future conflict with them less risky overall."
 EIZ_Oskar_Feeding_Their_Industry:0 "Feeding Their Industry"
 EIZ_Oskar_Feeding_Their_Industry_desc:0 "To put it simply, the Siberians lack the pure firepower that Euro-Britannia has. Although their current ambush tactics have done well for them so far, the equipment they need is sorely lacking. A gift of sharing our production is the first step we should take in securing their victory."
 EIZ_Oskar_Supplies_Red_War_Machine:0 "Supply The Red War Machine"
 EIZ_Oskar_Supplies_Red_War_Machine_desc:0 "Siberia is not ideal farmland. The fact that they have managed to sustain themselves out of the land is quite impressive. Expired Europian soldier rations can be given out and boost their capabilities."
 EIZ_Oskar_Bear_United_Against:0 "The Bear Stands United Against Invaders"
 EIZ_Oskar_Bear_United_Against_desc:0 "The importance of national unity has been long forgotten. The socialists excel in this. It's only natural to help enforce their unity in the face of Euro-Brittania. We can start to undermine it after they succeed."
 EIZ_Oskar_Revolution_fuel_are_Soldiers:0 "Revolutions Fuel Are Soldiers"
 EIZ_Oskar_Revolution_fuel_are_Soldiers_desc:0 "Say what you will about the reds, but their speeches hold an infectious passion. Mimicking their charisma will give our soldiers the drive they need to fight a war so far away from home."
 EIZ_Oskar_Cutting_Lion_Communication:0 "Cutting The Lion's Communications"
