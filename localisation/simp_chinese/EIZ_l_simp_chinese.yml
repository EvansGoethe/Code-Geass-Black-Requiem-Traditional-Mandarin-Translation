 EIZ_frederika_phase_one_economy.6.t:0 "Annoying The Hapsburgs"
 EIZ_frederika_phase_one_economy.6.d:0 "Sat upright in a cushioned seat was Frederika, who sipped from a white tea cup. Across from her was Sylvia Metternich, a diplomat from Austria. Her cerulean dress adorned with black and gold, an azure jewelled necklace and earrings to match her bright blue eyes. The girl sat with her legs crossed, having invited Frederika to this most important tea party. Sylvia set her teacup down, gazing into Frederika with a self assured smile. She rested her chin on the back of her hand before speaking in a silvery voice. \"It really is a pleasure to finally meet you, Ms. Schröder. The Tigress of Germany... Russia's sword and shield. How is the war?\"\n\nFrederika set her teacup down less daintily, a grating clank against the plate. \"Supply is disgustingly low. Need I say more? The Council was... not so kind to a suffering Russia.\"\nSylvia still smiled despite the horrible news, looking down at her tea. \"This is Russian? It's sweet.\" Sylvia took another slow and gentle sip. \"Do you like sweet tea, Ms. Schröder?\"\nFrederika looked down at the tea cup, swirling it on the plate for a moment to watch the ripples. \"I suppose I do.\"\n\"Strange, isn't it? Such cold and bitter people enjoy such sweet flavours. Are they drawn to what they can't have?\" Sylvia rested her chin onto both her hands now, leaning forward. \"Or are they actually sweet themselves?\"\nFrederika looked up and tilted her head. \"Are you referring to me?\"\nSylvia shook her head. \"I refer to the Russian people. The air here is cold. Sharp. Bitter. Do you feel the same about the people?\"\n\nTurning her head to the side, Frederika found herself lost in this unexpectedly philosophical discussion, pondering for a few moments. \"The Russian people had to adapt to their environment. If things were different, they would naturally try to match their favourite drink.\" Frederika shook her head. \"You must know why I'm here, Sylvia.\"\nSylvia kept that self assured look. \"Of course, you want my help. For Russia, not yourself.\"\n\"Wouldn't you like to see Russia bloom into something more?\"\nGlancing out the window to her left, Sylvia stared up at the grey clouds covering the white landscape. The thick clouds allowed only the smallest amount of light into the Russian city, not enough to bring about any warmth."
