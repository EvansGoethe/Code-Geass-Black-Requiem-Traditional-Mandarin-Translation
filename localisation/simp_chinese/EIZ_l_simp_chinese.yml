 EIZ_integrated_command_desc:0 "placeholder"
 EIZ_learn_from_experience:0 "從經驗中學習"
 EIZ_learn_from_experience_desc:0 "placeholder"
 EIZ_gain_academy_support:0 "爭取學院支持"
 EIZ_gain_academy_support_desc:0 "placeholder"
 EIZ_streamline_a_working_system:0 "簡化工作系統"
 EIZ_streamline_a_working_system_desc:0 "placeholder"
 EIZ_deploy_experimental_command_systems:0 "部署實驗指揮系統"
 EIZ_deploy_experimental_command_systems_desc:0 "placeholder"
 EIZ_elevate_the_ncos:0 "提升軍士級別"
 EIZ_elevate_the_ncos_desc:0 "placeholder"
 EIZ_centralize_command:0 "集中指揮"
 EIZ_centralize_command_desc:0 "placeholder"
 EIZ_unit_autonomy:0 "單位自治"
 EIZ_unit_autonomy_desc:0 "placeholder"
 EIZ_digital_battlespace:0 "數位戰場"
 EIZ_digital_battlespace_desc:0 "placeholder"
 EIZ_strategic_and_tactical_study_group:0 "Strategeic And Tactical Study Group"
 EIZ_strategic_and_tactical_study_group_desc:0 "placeholder"
 EIZ_A_Mechanized_Army:0 "A Mechanized Army"
 EIZ_A_Mechanized_Army_desc:0 "如果我要發動這場戰爭，那麼我必須透過任何必要的手段獲得戰爭工具，我們需要更多的坦克、更多的步槍、更多的裝甲車和更多的財政支持，我們的預算必須透過我們掌握的一切手段倍增。"
 EIZ_fredericas_new_warfare:0 "新戰爭"
 EIZ_fredericas_new_warfare_desc:0 "placeholder"
 EIZ_frederica_found_the_special_project_core:0 "成立特殊計畫核心"
 EIZ_frederica_found_the_special_project_core_desc:0 "Shortly after declaring this war we've come to the realization that as our troops are fighting on the front we can use the time their buying us to develop new ways to outsmart our enemies so we've decided to form the S.P.C whose focus is to develop new means to combat the enemy forces with weapons they probably wouldn't have expected."
 EIZ_fishing_for_academy_recruits:0 "為學院新兵釣魚"
 EIZ_fishing_for_academy_recruits_desc:0 "placeholder"
 EIZ_codify_rules_of_engagement:0 "制定交戰規則"
 EIZ_codify_rules_of_engagement_desc:0 "placeholder"
 EIZ_mobile_warfare:0 "機動作戰"
 EIZ_mobile_warfare_desc:0 "placeholder"
 EIZ_motorise_the_infantry:0 "步兵機動化"
 EIZ_motorise_the_infantry_desc:0 "placeholder"
 EIZ_main_battle_tank_concept:0 "主戰坦克概念"
