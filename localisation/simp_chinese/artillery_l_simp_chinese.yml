﻿l_simp_chinese:
 sp_artillery:0 "自行火炮支援連"
 sp_artillery_brigade:0 "自行火炮"
 eu_war_anti_air:0 "EU戰爭後防空炮"
 eu_war_anti_air_desc:0 "一種防空載具，也被稱爲自行防空炮，是一種專注於防空能力的移動載具。特化的武器系統使用了諸如機槍、機關炮、大口徑火炮或導彈，有的除火炮外還載有遠程導彈。"
 modern_spaa_1:0 "現代自行防空"
 modern_spaa_1_desc:0 "現代自行防空通常安裝在可快速轉動且仰角較高的炮塔內，以便追蹤快速移動的飛機。它們常採用雙聯裝或四聯裝配置，從而能實現高射速。此外，大多數高射炮還可用於對地面目標進行直瞄射擊，效果顯著。如今，導彈（通常安裝在類似的炮塔上）已在很大程度上取代了高射炮。"
 modern_spaa_2:0 "現代自行防空 II"
 modern_spaa_2_desc:0 "這些自行防空炮雖然與前一代沒有本質上的差異，但能大幅降低車內人員死亡率。儘管精度與環境探測能力有所提升，自行防空炮在面對機甲攻擊與重型武器集火仍然十分脆弱。"
 modern_spaa_3:0 "現代自行防空 III"
 modern_spaa_3_desc:0 "最新型自行防空炮裝備了多聯裝地對空導彈與兩門30毫米機炮。標準配置包含數字化火控系統、加熱裝置、通風系統及核生化防護系統等，顯著提升了作戰效能。此外，炮塔後部頂端加裝了目標探測雷達，可探測3500米高空飛行的敵機。"
 modern_spaa_2_upgrade_1:0 "自行防空 II 通用升級"
 modern_spaa_2_upgrade_1_desc:0 "在自行防空炮上首次安裝反應裝甲，這取得了顯著成效，但最大的提升在於車輛自動換擋系統、自動火災探測和火災管制系統等主要功能的全面數字化。"
 modern_spaa_1_upgrade_1:0 "自行防空 I 通用升級"
 modern_spaa_1_upgrade_1_desc:0 "自行防空砲車的第一輪革新採用了穩定器以提升精度，並加裝輕武器以更好地反制來自地面的步兵攻擊。"
 modern_spaa_3_upgrade_1:0 "自行防空 III 通用升級"
 modern_spaa_3_upgrade_1_desc:0 "進一步的改良包括專為獵殺配備懸浮系統的Knightmare而生產的特種火砲。這些整合配備了強化裝甲的支援，可保護車輛免受黑德隆砲與遠程砲火的傷害。"
 raiko_artillery_unit:0 "反Knightmare火炮"
 eu_war_artillery:0 "EU戰爭後防空炮"
 eu_war_artillery_desc:0 "火砲是一類重型軍用遠程武器，其發射的彈藥射程與威力遠超步兵槍械。早期火砲的發展著重於在圍城戰中轟破防禦城牆與工事的能力，因而造就了沉重且幾乎無法機動的攻城器械。隨著技術進步，更輕便、更機動的野戰砲逐漸發展出來以供戰場使用。"
 modern_artillery:0 "早期自行火砲"
 modern_artillery_desc:0 "自行火砲是配備自身推進系統、可自行移動至射擊陣地的火砲。它們是高機動性車輛，通常以履帶為基礎，搭載大型野戰砲、榴彈砲、迫擊砲或某種火箭／飛彈發射器。它們通常用於戰場上的遠程間接火力支援。"
 fire_control_system:0 "火控系統"
 fire_control_system_desc:0 "光學火控系統是用於將武器（榴彈砲、迫擊砲、加農砲等）對準目標的光學機械系統。它使砲組成員能夠精確地將武器迴旋並仰起，對準可見目標或指定座標；此外，這類火控系統由瞄準鏡、砲架與象限儀組成。"
 anti_kn_features:0 "反KN設計"
 anti_kn_features_desc:0 "大多數自行火砲對Knightmare武器的效力已越來越低；因此，有必要在常規營中建立一支只以Knightmare為打擊目標的新型支援部隊。"
 UNLOCK_KN_ART:0 "這將是邁向反Knightmare火砲的第一步"
 sp_artillery_1:0 "自行火炮"
 sp_artillery_1_desc:0 "這些型號的自行火砲與現有的指揮管制系統協同運作，提供卓越的追蹤能力，最大射程可達50公里。其艙室的設計可保護乘員免受砲彈破片與地雷，以及核生化（NBC）威脅的傷害。該系統只需40秒即可完成射擊程序並撤離陣地。這款高機動車輛最高時速70公里，巡航里程500公里。"
 varied_propellant_artillery:0 "整裝液態發射藥"
 varied_propellant_artillery_desc:0 "整裝液態發射藥是一種具備多項優勢的火砲技術：火砲結構更簡單，戰術與後勤選擇也更廣泛。理論上，使用可變發射藥量的標準砲彈能帶來更佳的精度與戰術彈性，並藉由淘汰各種不同的火藥裝填量來簡化後勤。"
 modern_artillery_1:0 "火箭砲"
 modern_artillery_1_desc:0 "火箭砲是以火箭作為彈藥的火砲。火箭具備與傳統火砲不同的能力，例如更遠的射程與不同的酬載——通常是比同尺寸火砲平台大得多的彈頭，或多枚彈頭。與傳統火砲相比，無導引火箭砲以精度差、裝填慢而聞名。"
 multiple_rounds_simultaneous_impact_1:0 "多發同時彈著"
 multiple_rounds_simultaneous_impact_1_desc:0 "多發同時彈著（MRSI）是早期「同時彈著」概念的現代版本。MRSI是指單門火砲發射多枚砲彈，使其同時命中同一目標。通常一條彈道低於水平45度，另一條高於45度，且藉由為每枚砲彈使用不同大小的發射藥，可以利用兩條以上的彈道。"
 modern_artillery_2:0 "火箭炮 II"
 modern_artillery_2_desc:0 "更先進的火箭砲車輛藉由可同時發射多枚火箭的系統，並結合GPS或慣性導引，徹底克服了精度不足的問題。此外，機動性的多項改良也在戰場上展現出卓越成果。"
 sp_artillery_2:0 "自行火砲II"
 sp_artillery_2_desc:0 "該榴彈砲可發射高爆精確導引彈藥、攜帶干擾器的砲彈、反戰車子母彈，以及標準與火箭增程高爆破片（HE-FRAG）砲彈。射速為每分鐘八發，最大射程70公里。車輛最高時速仍為60公里，作戰半徑500公里。"
 knightmare_coilgun_deployment:0 "反Knightmare線圈砲部署"
 knightmare_coilgun_deployment_desc:0 "雷光砲迄今展現了卓越的成果，但其侷限也已顯現。因此，反Knightmare武器的標準化勢在必行。具體而言，將在主砲附近加裝一門較小型的反KN線圈砲。雖然其效力不及雷光砲，但將使眾多車輛免於毀滅。"
 high_explosives_tearing_projectiles:0 "高爆撕裂砲彈"
 high_explosives_tearing_projectiles_desc:0 "M694超高爆砲彈採用了一種獨特的設計：基於預破片減速傘彈頭，設計為在目標上方的最佳高度起爆。與標準砲彈相比，這種砲彈對Knightmare與重裝甲車輛的殺傷力高出5倍。"
 raiko_artillery:0 "雷光砲"
 raiko_artillery_desc:0 "一門由四架Glasgow或其Burai變體組成的巨型線圈砲。它發射一種霰彈：高速砲彈釋放出二十四枚鋼珠，可輕易撕裂Knightmare Frame以及大多數其他目標。四架Knightmare分列砲身兩側作為支撐，其頭部連接在砲管頂部的圓盤上，提供360度的視野。"
 bulk_loaded_liquid_propellant:0 "強化傳動系統"
 bulk_loaded_liquid_propellant_desc:0 "當然，這門新式火砲必須承受數架Knightmare與重型彈藥的重量。因此，將採用強化裝甲並搭配新型傳動系統；還將使用一種由鐵與中和櫻石製成的新型合金。"
 modern_artillery_3:0 "火箭砲III"
 modern_artillery_3_desc:0 "最先進的火箭砲擁有能在極短時間內抵達目標的特殊火箭，並結合可同時阻擋敵方砲彈與攻擊的電磁力場。這些強化使火砲久違地首次具備了正面對抗Knightmare的能力。"
 sp_artillery_3:0 "自行火砲III"
 sp_artillery_3_desc:0 "自行火砲的發展已臻極限，如今只是轉向更加電腦化的系統，由人工操作的工作越來越少。其效能也有所提升，配備了更大的彈藥空間，以及針對各種攻擊的多重防禦。"
 sakuradite_engine:0 "櫻石引擎"
 sakuradite_engine_desc:0 "為了進一步提升自行火砲的機動力與火力，車內將裝設櫻石碎片以及小型簡化版的世界樹驅動輪。雖然這將帶來自損甚至致命事故的高風險，但也將帶來對敵的巨大優勢。"
 super_heavy_artillery:0 "超重型火砲"
 super_heavy_artillery_desc:0 "The artillery a is pyramid-shaped land-cruising mobile fortress. It has two large cannons and thirteen smaller cannons. Certain models are equipped with tank treads for land mobility, while others have hover systems to levitate across bodies of water. The Longdan's large cannons pretty much serve the same role as their main guns can destroy most knightmare frame that get within firing range."