 SUPER_JAP_invasion:0 "不列顛尼亞入侵"
 SUPER_JAP_invasion_TEXT:0 "我們將繼續戰鬥，我們要爭鬥、競爭、掠奪、主宰，最終，未來屬於我們。不列顛尼亞萬歲！\n§Y查爾斯·Zi·不列顛尼亞§!"
 SUPER_RCW_start:0 "俄羅斯內戰"
 SUPER_RCW_start_TEXT:0 "俄羅斯淪爲廢墟，我成了亡國的總統。我的人民拋棄了我，看樣子，我的命運將和這國家一樣氣數將盡。\n§Y-弗拉迪斯拉夫·扎哈羅夫-§！"
 SUPER_RCW_end_eurobritannia:0 "俄羅斯的和平"
 SUPER_RCW_end_eurobritannia_TEXT:0 "你知道戰場的真理嗎？在平時殺一個人，那是犯罪。但在戰場上了殺千千萬萬的人，你就成英雄了。\n§Y-魯基亞諾·布蘭德利-§!"
 SUPER_RCW_end_luka:0 "盧卡統一俄羅斯"
 SUPER_RCW_end_luka_TEXT:0 "統治的權力不是賺來的。是從別人手上奪來的，他們相信自己有能力但忽視了自己統治的無能，從他們手中奪取權力容易得可悲。在以前，皇帝們和總統們統治俄羅斯，但我和他們不一樣，我死後仍會續存。直到人類文明終結，俄羅斯都別想逃出我的陰影。\n§Y-盧卡·朱可夫-§!"