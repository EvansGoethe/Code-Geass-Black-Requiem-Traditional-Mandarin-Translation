 POLITICS_EMPRESS_TIENZI_PUPPETS_DESC:0 "傀儡皇帝在國內聲譽不好，在聯邦的其他傀儡政權中更是聲名狼藉。在這些地區，當地人把她視爲一切壓迫的象徵。"
 chinese_exploitation:0 "中國經濟剝削"
 chinese_exploitation_desc:0 "聯邦成員國的經濟陷入了嚴重的蕭條和低效狀態。這主要是由中國對各個領域的經濟控製造成的。特別是，大部分資源和資金都流向了中國，同時大量產業被中國企業控制，導致本土生產嚴重下滑。"
 military_state_desc:0 "聯邦內部存在着不同程度的自治權，而軍區便是其中之一。由於其戰略位置或恐怖活動的原因，某些地區從經濟到行政都處於帝國軍隊的嚴格控制之下，帝國軍隊直接對宦官負責。這確保了軍隊的效率和效力，但也導致了對人權的較少尊重。"