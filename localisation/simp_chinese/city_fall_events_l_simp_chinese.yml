 city_falls_russia.4.t:0 "Fall of Ekaterinburg"
 city_falls_russia.4.d:0 "Today, the last bastion of Russia’s past is under siege as [new_controller.GetAdjective] forces breach the defensive perimeter which quickly prompts the [old_controller.GetAdjective] garrison to collapse in on itself as the remaining units of the city’s garrison are ordered to surrender to the larger [new_controller.GetAdjective] force. [new_controller.GetAdjective] troops were seen marching towards the imperial palace and the neighbouring government sector to secure full control over the city and its population. Civilians were seen opposing [new_controller.GetAdjective] forces as they occupied the city although the dissent was short-lived due to the overwhelming might of the [new_controller.GetAdjective] armed forces."
 city_falls_russia.4.b:0 "Siberia's heart is ours to command!"
 city_falls_russia.4.c:0 "Curious."
 city_falls_russia.5.t:0 "Fall of Novosibirsk"
 city_falls_russia.5.d:0 "Today, the war has finally reached the heartlands of the revolution Novosibirsk. [new_controller.GetAdjective] forces have breached the city defences, as [new_controller.GetAdjective] troops swarm through the streets and push the enemy garrison towards the central government building within the inner city limits. Airstrikes carried out by [new_controller.GetAdjective] jet aircraft have left any routes of retreat for [old_controller.GetAdjective] forces impassable. Now trapped in between a wall of hellfire and an advancing army of would be savages, the situation for the brave heroes of the  [old_controller.GetNameDEF] is becoming more intangible by the hour. Their defeat seems imminent."
 city_falls_russia.5.b:0 "Siberia's heart is ours to command!"
 city_falls_russia.5.c:0 "Curious."
