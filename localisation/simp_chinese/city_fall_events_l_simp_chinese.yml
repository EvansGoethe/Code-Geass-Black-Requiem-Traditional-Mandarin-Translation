﻿l_simp_chinese:
 city_fall_news.1.t:0 "涅留恩格里的陷落"
 city_fall_news.1.d:0 "今天，隨着涅留恩格里落入[new_controller.GetAdjective]軍隊的掌控之中，戰火終究蔓延到了遠東地區。在[new_controller.GetAdjective]軍隊攻入城市之前，該城遭到了猛烈的轟炸，爲了削弱城市守軍的防禦，許多建築被摧毀。\n\n[new_controller.GetAdjective]軍隊控制了涅留恩格里周邊地區，形成對城市的包圍，阻斷了[old_controller.GetAdjective]增援部隊。[new_controller.GetAdjective]軍隊在受損的涅留恩格里政府大樓附近的市中心舉行了閱兵，標誌着[new_controller.GetNameDEF]法理上控制了該地區。有報告稱當地地下抵抗組織已經開始活動，並正在組織抵抗，這可能使未來對[old_controller.GetNameDEF]的佔領代價高昂。"
 city_fall_news.1.a:0 "這一切還沒有結束！"
 city_fall_news.1.b:0 "太平洋商貿航線是歸我們了！"
 city_fall_news.1.c:0 "有趣。"
 city_fall_news.2.t:0 "鄂霍茨克的陷落"
 city_fall_news.2.d:0 "今日，[new_controller.GetNameDEF]宣告在對[old_controller.GetNameDEF]戰爭中取得勝利，大都市鄂霍次克已落入[new_controller.GetAdjective]軍隊之手。在[new_controller.GetAdjective]大軍攻入鄂霍次克行政區的過程中，這座城市市經歷了殘酷圍城，爲了削弱防禦城內衆多關鍵目標被摧毀。\n\n在[new_controller.GetAdjective]軍隊控制鄂霍次克大型港口並俘獲數千名政治犯後，戰俘被押送遊街示衆。在淪陷區人民的注視下，[old_controller.GetNameDEF]的旗幟被當衆燒成灰燼。有的人爲解放歡欣鼓舞，但有人對新統治者的未來政策心懷恐懼。隨着[new_controller.GetNameDEF]實現了對遠東西伯利亞的統治，[old_controller.GetAdjective]政權殘部已逃往神聖不列顛帝國，伺機反攻倒算。"
 city_fall_news.2.a:0 "我們失敗了！"
 city_fall_news.2.b:0 "[new_controller.GetNameDEF]萬歲！"
 city_fall_news.2.c:0 "有趣。"
 city_fall_news.3.t:0 "克拉斯諾亞爾斯克的陷落"
 city_fall_news.3.d:0 "今日，[new_controller.GetNameDEF]宣告在對[old_controller.GetNameDEF]戰爭中取得勝利，[new_controller.GetAdjective]軍隊高歌猛進，攻入了克拉斯諾亞爾斯克市。在[new_controller.GetAdjective]軍隊進入市市中心之前，該城遭到了[new_controller.GetAdjective]空軍猛烈的空襲，許多重要目標在空襲中被摧毀。\n\n[new_controller.GetAdjective]軍隊控制了克拉斯諾亞爾斯克周邊農村地區後，節節敗退的[old_controller.GetAdjective]部隊縱火燒燬了農場和種植園。[new_controller.GetNameDEF]軍隊已經穩操勝券，隨着軍隊的推進，[old_controller.GetAdjective]軍隊的士氣已跌至谷底。據報道，哈薩克斯坦與中國等周邊國家正在接收尋求逃離西伯利亞戰區的難民。"
 city_fall_news.3.a:0 "這一切還沒有結束！"
 city_fall_news.3.b:0 "[new_controller.GetNameDEF]萬歲！"
 city_fall_news.3.c:0 "有趣。"
 city_fall_news.4.t:0 "新西伯利亞的陷落"
 city_fall_news.4.d:0 "Today, the war has finally reached the heartlands of the revolution Novosibirsk. [new_controller.GetAdjective] forces have breached the city defences, as [new_controller.GetAdjective] troops swarm through the streets and push the enemy garrison towards the central government building within the inner city limits. Airstrikes carried out by [new_controller.GetAdjective] jet aircraft have left any routes of retreat for [old_controller.GetAdjective] forces impassable. Now trapped in between a wall of hellfire and an advancing army of would be savages, the situation for the brave heroes of the  [old_controller.GetNameDEF] is becoming more intangible by the hour. Their defeat seems imminent."
 city_fall_news.4.b:0 "Siberia's heart is ours to command!"
 city_fall_news.4.c:0 "有趣。"
 city_fall_news.5.t:0 "葉卡捷琳堡的陷落"
 city_fall_news.5.d:0 "Today, the last bastion of Russia’s past is under siege as [new_controller.GetAdjective] forces breach the defensive perimeter which quickly prompts the [old_controller.GetAdjective] garrison to collapse in on itself as the remaining units of the city’s garrison are ordered to surrender to the larger [new_controller.GetAdjective] force. [new_controller.GetAdjective] troops were seen marching towards the imperial palace and the neighbouring government sector to secure full control over the city and its population. Civilians were seen opposing [new_controller.GetAdjective] forces as they occupied the city although the dissent was short-lived due to the overwhelming might of the [new_controller.GetAdjective] armed forces."
 city_fall_news.5.b:0 "Siberia's heart is ours to command!"
 city_fall_news.5.c:0 "有趣。"
 city_fall_news.6.t:0 "別列茲尼基的陷落"
