﻿l_simp_chinese:
 city_falls_russia.1.t:0 "Fall of Moscow"
 city_falls_russia.1.d:0 "Today, the [new_controller.GetNameDEF] has proclaimed victory over [old_controller.GetNameDEF], as the megacity of Okhotsk fell to [new_controller.GetAdjective] troops. The city faced a relentless siege before the [new_controller.GetAdjective] army entered the Okhotsk government district, many critical targets within the city were destroyed in order to weaken the city's defenses.\n\nAfter the [new_controller.GetAdjective] army secured the Okhotsk megaport capturing thousands of political prisoners, the prisoners were paraded through the city centre as the flag of [old_controller.GetNameDEF] could be seen being burnt to ashes in full view of the conquered populace, some rejoicing at the liberation while others fear what their new overlords have in store for them. With [new_controller.GetNameDEF]'s dominion over Far Eastern Siberia now fully realised, the remanents of the [old_controller.GetAdjective] government fled to The Holy Britannian Empire for refuge against their enemies."
 city_falls_russia.1.a:0 "This is not the end!"
 city_falls_russia.1.b:0 "[old_controller.GetNameDEF]'s capital city is ours!"
 city_falls_russia.1.c:0 "Curious."
