 RUS_phase_one_old.1.t:0 "An Appointed Constitution"
 RUS_phase_one_old.1.d:0 "The current constitutional obligation that we are bound to is a disgrace to the motherland, the government has been in talks with the French and they have agreed to a revision of the constitution since it is outdated and does not serve the interests of the Russian people or Europia."
 RUS_phase_one_old.1.a:0 "We cast off the shackles that bound us"
 RUS_phase_one_old.2.t:0 "Clean-Hands Strategy"
 RUS_phase_one_old.2.d:0 "Chernov is a man on a mission, all his life he has been set on enforcing the laws of the state to full effect. He has identified the flaws with the current system and he has outlined his plan to clean up the government by having them accountable to an independent court who will root out the inherent corruption that plagues the republic. Chernov wants to restore the people’s faith in the Russian system."
 RUS_phase_one_old.2.a:0 "Chernov will cleanse the system"
 RUS_phase_one_old.3.t:0 "A More Balanced Economy"
 RUS_phase_one_old.3.d:0 "The economy is the main problem that is facing the nation, our people have been suffering with a decrease in living standards and the gradual shrinking of the national economy. We must balance the economy and prevent an economic collapse that will affect the nation’s stability."
 RUS_phase_one_old.3.a:0 "We need to balance the budget!"
 RUS_phase_one_old.4.t:0 "The Army And The State"
 RUS_phase_one_old.4.d:0 "Many people believe that the economy is the biggest issue that is facing the nation, but they are wrong, the economy does not keep the social cohesion of the republic nor does it keep the nation safe in times of civil strife. The army is the most important aspect of the state, it defends the motherland and its people in times of conflict and suppresses any sign of rebellion that arises."
 RUS_phase_one_old.4.a:0 "The military will get their funding"
 RUS_phase_one_old.5.t:0 "Russia Offers To Buy Our Blueprints!"
 RUS_phase_one_old.5.d:0 "We have received word from the Russian government about a request to buy old military blueprints to modernize their military, they specifically asked for army related blueprints, there is little risk involved in letting such old blueprints go especially to the Russians who have a very underdeveloped military."
 RUS_phase_one_old.5.a:0 "What a delightful business opportunity"
 RUS_phase_one_old.5.b:0 "They Should Make Their Own, Honestly."
 RUS_phase_one_old.6.t:0 "Paris Military School"
 RUS_phase_one_old.6.d:0 "France has offered to train our officers at their military officer school in Paris, this should help with the development of our officer corps so they can lead without blundering in the field of battle against a future enemy or perhaps a rebellion."
 RUS_phase_one_old.6.a:0 "Our men shall be led by Lions"
 RUS_phase_one_old.7.t:0 "Art Of Modern Warfare"
 RUS_phase_one_old.7.d:0 "Now that the military has been drastically overhauled into a professional army on par with the rest of the republic, we can now pursue modern tactics in the art of warfare, the new age to come shall be one of Russian excellence on the battlefield. Defending the republic will be a high cost in today’s age but we must advance our tactics to be capable of defending what we hold so dear to our hearts."
 RUS_phase_one_old.7.a:0 "We shall completely reinvent war"
 RUS_phase_one_old.8.t:0 "Improving Our Finances"
 RUS_phase_one_old.8.d:0 "Economic minister Conovalov has introduced policies to stabilize the economy and reduce the effects of the crisis on the Russian people. Recent findings have suggested that the economy should move into a recovery soon and the economic situation should gradually improve with time."
 RUS_phase_one_old.8.a:0 "Conovalov we never doubted you"
 RUS_phase_one_old.9.t:0 "New Plans For Siberia"
 RUS_phase_one_old.9.d:0 "The government has outlined a grand plan to industrialize and expand Siberian infrastructure, the first step is to ensure that the region has a sufficient power supply to maintain the advanced infrastructure we have planned for the future. Now that the hydroelectric station in Rybinsk is built the prerequisites have been cleared for a full scale expansion of Siberian industry."
 RUS_phase_one_old.9.a:0 "Government Approved"
 RUS_phase_one_old.10.t:0 "The Best Approach"
 RUS_phase_one_old.10.d:0 "The agency for anti-corruption in Russia is to serve as a body for keeping tabs on the corruption that is entrenched within the government and civil service. This will serve the needs of the independent court once established and work to purify Russia of the ills corruption has wrought on the nation. The government’s war on corruption is far from over!"
 RUS_phase_one_old.10.a:0 "Down with corruption!"
 RUS_phase_one_old.10.b:0 "Promoting State's Role In The Economy Should Be Enough."