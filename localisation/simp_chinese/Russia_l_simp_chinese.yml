 RUS_End_reformation_of_2nd_region:0 "Reform Central Russia"
 RUS_End_reformation_of_2nd_region_desc:0 ""
 RUS_Zhakarovs_Presidency:0 "Zharakov's Presidency"
 RUS_Zhakarovs_Presidency_desc:0 "For the Russian government, a new presidential term means little, for what power does the president truly hold when bound by an unchangeable constitution designed to stagnate his country? After the Great War and the signing of the Minsk Agreement, our constitution has been held hostage by Europia. Unable to amend his country's constitution, Zakharov's presidential abilities will be hindered, and the stability of the Republic will be tested."
 RUS_Lebedevs_Legacy:0 "Lebedev's Legacy"
 RUS_Lebedevs_Legacy_desc:0 "Taking on the mantle of former Foreign Minister Alexei Lebedev, Zakharov's goal is to maintain stability and unity within Russia, for a fractured nation can hardly be called a nation at all. Working closely with the EU has turned into a priority in order to achieve this goal. With some clever diplomacy, perhaps we could amend the Minsk Agreement so that the Russian constitution becomes Russian once more."
 RUS_Chernikovs_Spectre:0 "Chernikov's Spectre"
 RUS_Chernikovs_Spectre_desc:0 "Despite no longer being in government, former President Chernikov still remains popular amongst the Reformers. His ideas for economic reforms stand firmly against corruption—something the Russian government could learn from. However, Chernikov has unmistakably shown authoritarian leanings in the past by attempting to remove term limits and give more power to the president than the regional governors, although an argument could be made that the current distribution of power is fundamentally unbalanced."
 RUS_Saint_Petersburg_Cliques_Shadow:0 "The Saint Petersburg Clique's Shadow"
 RUS_Saint_Petersburg_Cliques_Shadow_desc:0 "The Saint Petersburg Clique was formed by oligarchs from Saint Petersburg. The Clique believes their own interests to be of greater importance than those of the nation's. Despite this, support for them continues to grow due to the promise of reforms and a free market. Should the reforms promised by the government fail, the Saint Petersburg Clique's popularity will only rise. The people demand change."
 RUS_Growing_Opposition:0 "The Growing Opposition"
 RUS_Growing_Opposition_desc:0 "Resentment towards the current government is clearly high. Russia remains stagnant with little hope amongst the people of this changing. The Minsk Agreement once again serves as a thorn in our side, one that we must extract quickly if we wish to regain the trust of the people. Its removal depends on how our relations with Europia go and whether or not we can amend our constitution."
 RUS_Talking_To_Banks:0 "Talking to The Banks"
 RUS_Talking_To_Banks_desc:0 "Our nation owes a large amount of debt and reparations to the EU. Most of these are serviced by a very complex and fragile network of deferred loans crossing between various EU countries, a gargantuan diplomatic effort by our earlier administrations. Now that Lebedev's gone, we need to speak to our lenders and assure them we won't renege on our loans."
 RUS_Suggest_Euro_Ruble:0 "Suggest The Euro-Ruble Again"
 RUS_Suggest_Euro_Ruble_desc:0 "Our country, like most E.U. nations, uses the euro as its currency. While it's strong and reliable for most of Europia, it has proven catastrophic for our economy. We have no control over our monetary policy, and it has strangled our export industry. Our proposed solution is to create our own currency, pegged to the euro but devalued to help our economy. This initiative by the Lebedev administration had been turned down in the past, but we can try to persuade the E.U. again. Lebedev said he wore them down for us, right?"
 RUS_Foreign_Currency_Acquisitions:0 "Foreign Currency Acquisitions"
 RUS_Foreign_Currency_Acquisitions_desc:0 "After another round of failed talks, we are forced to use alternative stopgap measures to stimulate our economy. Foreign Minister Chernov has decided to acquire foreign currencies, especially the yen, to diversify our trade payments away from just the euro."
 RUS_Federal_Council_Grasp:0 "The Federal Council's Grasp"
 RUS_Federal_Council_Grasp_desc:0 "Thanks to the Minsk Agreement, the Federal Council holds more power than any other position or office in our government to the point where the president can't even make reforms without first gaining the approval of the senators. This system is indisputably the primary culprit of the gross political stagnation plaguing Russia. We must put an end to it at once."
 RUS_Deal_Art:0 "Art of The Deal"
 RUS_Deal_Art_desc:0 "The Federal Council is an obstructionist monstrosity elevated by a flawed constitution that empowers regional cronies sitting atop thrones of pork barrel politics. We have contingencies prepared in case negotiations collapse, but we might as well try the normal, polite way first."
 RUS_Digging_Dirt_Laundry:0 "Digging Into Their Dirty Laundry"
 RUS_Digging_Dirt_Laundry_desc:0 "Negotiations may have failed, but even in death, Lebedev has delivered. The Stanislav Dossier has given us the most complete collection of kompromat on senior federal councillors. This should allow us to blackmail and coerce our way towards a functioning government. It's not the cleanest way of governing, but it works."
 RUS_Adressing_Sakuradite_Drift:0 "Addressing The Drift to Sakuradite"
 RUS_Adressing_Sakuradite_Drift_desc:0 "Times are changing. No longer does the world rely so heavily on oil from the Middle East but instead the Sakuradite of Japan. If we desire to turn around our misfortune and recover economically, we should embrace the future. With one of the largest mining corporations in the world at our fingertips, we finally sit in a position where we can begin making deals with Japan for their Sakuradite."
 RUS_Japanese_Proposal:0 "The Japan Proposal"
 RUS_Japanese_Proposal_desc:0 "The ROSMIRES Group, Russia's largest mining corporation, is our ace to play in the Sakuradite deal with Japan. If they accept, we will gain a share of the profits from the Sakuradite we assist them in mining. The experts in the ROSMIRES Group have the experience and tools that Kyoto doesn't. Even a small share of the profits will be enough to get us back on our feet."
 RUS_Negotiations_Kyoto:0 "Open Negotiations With Kyoto"
 RUS_Negotiations_Kyoto_desc:0 "Kyoto has agreed to hear us out, though the Sakuradite deal has essentially already been settled between Zinovy and Kirihara."
 RUS_Shifting_Economy:0 "Shifting The Economy"
 RUS_Shifting_Economy_desc:0 "For decades, our growth has been stagnant, and our economy has been at the mercy of energy extraction and EU fiscal policy. Many presidents have tried to break this loop, but none have succeeded. While the Sakuradite deal may ease our economic distress, it would still be wise to invest our remaining fortune somewhere."
 RUS_European_Deals:0 "European Deal's"
 RUS_European_Deals_desc:0 "Russian industry has always been powerless against the titanic conglomerates composing the heart of the EU. War, reparations, and fiscal policies have wiped out our once comparative advantages in manufacturing. All that remains is our cheap labor, and there happen to be plenty of Europian conglomerates willing to make profitable deals with us to utilise our less stringent industrial regulations and low worker pay... "
 RUS_bmg_car_plants:0 "BMG Car Plants"
 RUS_bmg_car_plants_desc:0 "Berlin Motor Group AG, more commonly known as BMG, is one of the most recognisable corporations in Europia, its automobiles a common sight along motorways from Lisbon to Moscow. With a fortune built off of supplying the continent's insatiable demand for cars, they seek ever cheaper locations to build their manufacturing plants and thus have expressed interest in opening some in Russia."
 RUS_malcal_group_energy:0 "Malcal Group Energy"
 RUS_malcal_group_energy_desc:0 "The French family-owned Malcal Group has diverse holdings across the continent and have most recently expressed interest in buying into the Europian energy market. Given North Sea Energy's dominance in the region, their efforts have mostly failed to achieve anything, and they have become increasingly desperate to salvage their subsidiary as a result. The Malcals are willing to invest in our fuel infrastructure and produce domestic energy at a low price if we agree to move away from North Sea Energy."
 RUS_eec_electronics:0 "EEC Electronics"
 RUS_eec_electronics_desc:0 "Masters of the Europian domestic computing market, the Prague based ‘Europian Electric Corporation' (commonly known as EEC) has rapidly emerged as an economic titan over the past decades competing with centuries old industrial cartel's. While their modus operandi is sleek and high tech, leading the world in software and hardware innovation. However, they have struggled with keeping up with demand for their devices and need to offload hardware production to a cheaper location. Fortunately for both of us we can provide."
 RUS_Long_Term_Adaptations:0 "Long Term Adaptations"
 RUS_Long_Term_Adaptations_desc:0 "While our partnership with EU firms has given us an immediate boost to growth, it is at most a short term stimulant for our flagging economy. If we want to break out of the cycle of stagnation and recession we need a long term plan to cure our economic woes."
 RUS_Siphoning_Wealth:0 "Siphoning The Wealth"
 RUS_Siphoning_Wealth_desc:0 "The Europian's have shown little interest in playing fair economically, by treaty and economic inertia there is nothing we can do to win fairly. If they fight dirty, so can we. If we can't create wealth and growth under Europia, we will just have to \"tempt\" away resources from under them. Europia's many corporations fuel its growth and economic power. It has mostly proven beneficial for most parties except for one thing, Taxes. "
 RUS_Corporate_Heaven:0 "Corporate Haven Scheme"
 RUS_Corporate_Heaven_desc:0 "The increasing closeness of the Europian economic sphere has rendered attempts at evasion increasingly difficult. However, if we were to say remove taxation for corporations based in Russia in return for some \"residency fees\" we should be able to tempt away much of Europia's corporate elite to Saint Petersburg and Moscow. I'm sure they won't mind the cold if it means lower tax."
 RUS_Partnership_Plan:0 "Partnership Plan"
 RUS_Partnership_Plan_desc:0 "Ignore the cynics of the Reformists or the opportunists of the Saint Petersburg Clique, we are closing in on a turning point on Europia. Has every attempt to reform the constitution, economic treaties or currency sovereignty been voted down in the Council of Europia? Yes, but each time the margin has narrowed. Unanimous votes turned into a slimmer majority of \"Nay\" as more and more interests realised how beneficial a revived Russia in the EU's sphere is."
 RUS_Currency_Negotiations:0 "Intensify Currency Negotiations"
 RUS_Currency_Negotiations_desc:0 "If we ever want an economy that works within the EU we need control of our own currency. This dream of Lebedev shall be finished by Zakharov, negotiations shall be concluded. We have already secured an agreement with Germany's Councillors, and while the French are likely to be unmoved we may be able to secure an agreement with the Danubian bloc. If we shift one more large voting bloc we shall be able to get the majority we need to effect change."
 RUS_Working_Within_The_System:0 "Working Within The System"
 RUS_Working_Within_The_System_desc:0 "At the end of the day we are in the EU, therefore we must work by its playbook. Via diplomacy or other means we shall strengthen our position within the Europian economic sphere. Flights of fantasy such as unilateral withdrawal or further stagnation in the energy sector have been discarded, instead we shall master the art of the possible within Europia."
 RUS_Bounty_Russia:0 "Bounty of Russia"
 RUS_Bounty_Russia_desc:0 "Mother Russia bleeds wealth, beneath its earth and waters are some of the richest mineral and energy deposits in Eurasia. We can kid ourselves with grand plans of EU cooperation or diversification but at the end of the day our fortunes are invariably tied to our extraction economy and the ROSMIRES group. Might as well be good at what we do..."
 RUS_Dig_Deep:0 "Dig Deep, Dig Greedily"
 RUS_Dig_Deep_desc:0 "We have the largest territory of any country in the EU and the most resources by far, despite this it is not enough. Africa is edging us out on minerals and the North Sea is rivaling our energy production. What we currently harness is but a small fraction of untapped wealth, we must dig deeper and with more hunger if we are to become the masters of rock and stone."
 RUS_Oil_Flow_Faster:0 "Let The Oil Flow Faster"
 RUS_Oil_Flow_Faster_desc:0 "While Sakuradite is an emerging energy market, oil for now remains king in the EU and by far our largest energy resource behind gas. There is no point wasting great energy extracting what little sakuradite we have when we can drill tenfold the amount of oil and half the cost."
 RUS_Siberia_For_Sakuradite:0 "Scour Siberia For Sakuradite"
 RUS_Siberia_For_Sakuradite_desc:0 "While we will never rival Japan's deposits at Mt Fuji, we can compete on par with smaller Sakuradite producers. Geological investigations by ROSMIRES have shown we possess economically significant deposits out east. It will be costly and slower but getting in on the Sakuradite market for the EU will likely be very profitable."
 RUS_New_Markets:0 "New Markets?"
 RUS_New_Markets_desc:0 "We always have a surplus of energy. Oil and Gas production is immense and we frequently supply a large portion of the EU energy market and yet still have a surplus to sell. Fortunately the energy office has come up with 3 possible trade plans to sell off our vast surplus."
 RUS_Playing_It_Safe:0 "Playing it Safe"
 RUS_Playing_It_Safe_desc:0 "Given the hostility between the 3 superpowers and occasional swings into economic protectionism, it is safest to trade with Europia. Not only is it tariff free due to us being in the Europian economic sphere, but it is the area we have the most experience trading with. A deal with Europia, while not ludicrous, will likely be a safe investment."
 RUS_BALTLINE_Project:0 "The BALTLINE Project"
 RUS_BALTLINE_Project_desc:0 "A lot of our oil and gas trade has been done overland via pipelines through Poland and Romania onto the rest of Europia. These have served us very well but time has come for an expansion of our export capabilities. Our engineers have proposed the creation of an undersea gas pipeline running underneath the Baltic Sea through to Germany which will greatly expand our energy export capacity with Europia."
 RUS_Risky_Ventures:0 "Risky Ventures"
 RUS_Risky_Ventures_desc:0 "Dealing with China is risky but not too dangerous. Compared to Britannia, relations between Europia and China are much cooler and less prone to confrontation than with Britannia. China also has a growing need for energy, its domestic sector struggling to keep pace with demand. While riskier there is more money to be made supplying China's hunger for energy."
 RUS_Sino_Kazakh_Pipeline:0 "Linking up With Sino-Kazakh Oil-Pipeline"
 RUS_Sino_Kazakh_Pipeline_desc:0 "No direct oil or gas pipeline exists between Russia or China, something we intend to change. If we link up with the Sino-Kazakh pipeline we can start to efficiently supply oil to the Chinese economy at a great profit. The only problems are disapproval from the EU and the fact that Kazakhstan is a bandit controlled wasteland that it is historically hard to build pipelines through. However, if we pull it off, China will pay just as well for helping stabilize its troubled frontier."
 RUS_Dangerous_Gamble:0 "Dangerous Gamble"
 RUS_Dangerous_Gamble_desc:0 "Given the sanctions currently leveled against Britannia by Europia, energy trade with them is tantamount to treason. While China would be met with disapproval, this deal has to be done secretly for fear we get slammed with retaliatory sanction and possibly EU arrest warrants. However, Britannia is by far willing to pay the most for energy out of the 3 superpowers given its current battering in the trade war."
 RUS_Arctic_Shipping_BRT:0 "Secret Arctic Shipping to Britannia"
 RUS_Arctic_Shipping_BRT_desc:0 "As we are not officially allowed to trade with Britannia, we are instead forced to use a system of flags of convenience and A LOT of bureaucratic deception to get away with this. Using Australian flagged ships registered to shell companies we should be able to move oil and gas to Britannia via the Arctic without anyone noticing, hopefully..."
 RUS_Diversify_Our_Economy:0 "Diversify Our Economy"
 RUS_Diversify_Our_Economy_desc:0 "Russia's economy is overdependent on its energy and mineral sector. If companies like ROSMIRES have hard times, Russia has hard times. This economic dependency is not good for our stability so many figures from across the KDPR's factions have been arguing for diversity in our investments."
 RUS_Protect_Ural_Steel_Industry:0 "Protect Ural Steel Industry"
 RUS_Protect_Ural_Steel_Industry_desc:0 "Our steel production in the Urals is some of our last surviving heavy industry. Employing hundreds of thousands of people in the east. They have mostly stayed afloat but recent innovations in the Ruhr have threatened the Ural's position as a major steelmaking hub. If they are to remain competitive with Europia they will require a large subsidy."
 RUS_Far_Eastern_Zoning_Rules:0 "Loosen Far-Eastern Zoning Rules"
 RUS_Far_Eastern_Zoning_Rules_desc:0 "Much development in the far east has been undercut by labyrinthine zoning and protection laws that protect local land barons and serve petty nimby interests. With a bit of federal wrangling we should be able to sweep aside these regulations that hold back the far-east's development and finally bring a bit of industry to that backwater."
 RUS_Tax_Rules_Saint_Petersburg:0 "Special Tax Rules For Saint Petersburg"
 RUS_Tax_Rules_Saint_Petersburg_desc:0 "Konovalov will be over the moon to hear that his plans for turning Saint Petersburg into a free port tax haven have finally been given approval. Even if it is a large concession to his clique, the capital it will bring in cannot be denied along with the growth one of our largest cities will experience."
 RUS_Grand_Plans:0 "Grand Plans"
 RUS_Grand_Plans_desc:0 "Our short term plans are already paying out dividends. Turns out diversification can work, however we need a bigger play if we want to actually break out of the loop of economic stagnation. It will be hard but if we play our cards right we may control an emerging industry that can compete with Europia and end the energy dependency."
 RUS_Undercutting_Competition:0 "Undercutting The Competition"
 RUS_Undercutting_Competition_desc:0 "It would be hard for us to outpace Europia in technology or quality, it is a game they have mastered for centuries. However, we can do one thing they can't do. We can make it cheap and make it in bulk. Our economists believe if we play to our cheap labour and manufacturing costs, we can potentially flood the EU market with cheap steel and undercut most EU steelworks."
 RUS_Merge_Steel_Corps:0 "Merge The Steel Corporations"
 RUS_Merge_Steel_Corps_desc:0 "If we are to undercut Europia in their own steel market, we need to have cohesion. We shall initiate a state led buyout of our divided steel interests and unite them under a single Russian Steel Conglomerate. From there we can coordinate and expand our production and make Steel at a price that no country in Europia can compete with. It will take time but if it works the whole economic landscape of Europia will change as we become its fourth economic pillar."
 RUS_Future_Planning:0 "Planning For The Future"
 RUS_Future_Planning_desc:0 "Europia may have advanced tech so why can't we. With the right investments and incentives we can reverse our mild brain drain and tempt back many of our bright and talented engineers and scientists. If we coordinate their efforts we may be able to harness the enterprise and ingenuity of Russia and launch a surprise incursion into the High Tech market."
 RUS_Founding_Rosdevtec:0 "Founding Rosdevtec"
 RUS_Founding_Rosdevtec_desc:0 "If we want coordinated funding and a stake in patents, we need a united state corporation for technological development. Rosdevtec will be that corporation. Under its banner we shall unite the innovators and creators of Russia and let them run wild in technological development. It's the last thing everyone expects but the idea we can't harness the technological revolution is prejudiced, what's stopping us making damn good computers?"
 RUS_Breaking_Out_System:0 "Breaking Out of The System"
 RUS_Breaking_Out_System_desc:0 "Our plans are taking their time but are solidly in motion. Nothing has blown up or collapsed in on itself which makes it better than many of our past efforts to diversify. All throughout the economic ministries there is a buzz of hope that this time it will work. While we have been burned before, something feels different this time..."
 RUS_Internal_Reforms:0 "Internal Reforms"
 RUS_Internal_Reforms_desc:0 "Now we have set our economic agenda in motion, we can now focus on internal issues of law and order. Our federal system has paralysed our ability to deal with internal security issues as local police forces are often horrendously corrupt or underfunded. With the rise of dangerous activists and radicals we need to get a grip on this situation before it spirals out of hand."
 RUS_Federal_Police_Funding:0 "Federal Police Funding"
 RUS_Federal_Police_Funding_desc:0 "The Federal Police are the government in Moscow's arm of law enforcement. They exist to investigate crimes against the government and cross-border crime within the regions. While fairly dedicated and well trained they have often had funding issues and jurisdiction issues that have damaged their morale and effectiveness. A boost to their budget shall certainly signal change."
 RUS_Federal_Office_Powers:0 "Increase Federal Office Powers"
 RUS_Federal_Office_Powers_desc:0 "Using our newfound \"influence\" on the federal council, we should be able to convince them to be more accommodating for Federal Police investigations and operations. Passing a jurisdictional reform law will allow the federal police to investigate anyway, regardless of if the crime is cross border or against the government. It's only fair they help out local police anyway..."
 RUS_Equipment_Upgrading:0 "Upgrading Their Equipment"
 RUS_Equipment_Upgrading_desc:0 "With their newfound responsibilities we should also increase the equipment budget for the Federal Police. Investigations shall now have access to new electronic surveillance equipment and tactical units shall now have access to army surplus materials. We also have boosted riot control by buying new equipment from the French Police who are experts in that area."
 RUS_Targeted_Operations:0 "Targeted Operations"
 RUS_Targeted_Operations_desc:0 "Now we have reformed and rallied the Federal Police to be a loyal and effective force in our war on internal issues, we can now let them loose on some particularly problematic groups. These opening investigations and actions shall serve as a proud test case for our renewed force."
 RUS_Target_Activists:0 "Target Disruptive Activists"
 RUS_Target_Activists_desc:0 "There are many troublesome pro-democracy agitators in west Russia. These individuals incite violence against our legitimate government accusing us of corruption. Even if they are partially right, they represent a threat to the KDPR, or more so government stability. We can't enact real change if these groups are running around stirring up opposition."
 RUS_Target_Problematic_Local_Governments:0 "Target Problematic Local Governments"
 RUS_Target_Problematic_Local_Governments_desc:0 "A lot of local governments, particularly in the far east. Are still hostile to federal aid and interests. They operate on systems of aggressive pork barrel politics and operate horrendously corrupt local political machines that would make some KDPR bigwigs blush. Anti-Corruption operations against these troublesome groups should re-assert federal control in these wayward regions."
 RUS_Target_Trade_Unions:0 "Target Troublesome Labour Organisations"
 RUS_Target_Trade_Unions_desc:0 "Industrial harmony in the east has been upset by the rise of troublesome socialist trade unions. The Oligarchs have complained and tried to deal with these groups for years to no success but recent information about potential links to the exiled communists in Kazakhstan are immensely worrying. Given these legitimate security threats it's only natural the federal government intervenes against these unions."
 RUS_CSRO:0 "Cabinet Security Research Office"
 RUS_CSRO_desc:0 "The Cabinet Security Research Organisation, Or CSRO. Is a small office of less than 100 people that is the closest thing we have to an independent intelligence agency. Right now it mostly handles security briefings and coordinates the police and army in intelligence matters, but recently its Director Yevgenny Kirov has proposed an expansion. Under his plans the agency would become a larger formal security service modelled on the Secret Services of Europia."
 RUS_Black_Budget_Personnel:0 "Expanding Black Personnel Budget"
 RUS_Black_Budget_Personnel_desc:0 "Even in the dawning age of digital espionage, a spy agency needs manpower. While the official budget increase has handled the required increase in handlers and analysts, Kirov has requested a large \"Black Budget\" to fund vast networks of unofficial agents and informants. This untraceable budget will allow flexibility and anonymity for CSRO operations."
 RUS_Intelligence_Theories:0 "New Intelligence Theories"
 RUS_Intelligence_Theories_desc:0 "Kirov is an aspiring spymaster of a new age. He has made it clear he has no intention of reforming a democratic version of the hated Tsarist Okhrana or Socialist Cheka. Instead he bases his theories on 21st century developments in Europia's intelligence circuit. Given his overview, Kirov believes that information warfare and infiltration will do a better job controlling opposition than thuggish secret policemen."
 RUS_Deep_Cover_Infiltration:0 "Deep Cover Infiltration"
 RUS_Deep_Cover_Infiltration_desc:0 "Deep cover infiltration into dissident organisations gives us two advantages. Firstly is access to the inner circles of these groups giving us strong insight into their actions allowing us to respond accordingly. Secondly is the possibility of controlling these groups or acting as agent provocateurs and inciting violence in a controllable manner to entrap and remove dangerous individuals."
 RUS_Digital_Manipulation:0 "Digital Manipulation Tactics"
 RUS_Digital_Manipulation_desc:0 "One of the most novel and interesting of Kirov's ideas is information warfare. Apathy and weariness have rendered straight up propaganda useless in modern Russia. But the correct targeting of misinformation and suggestion via social media can have a great effect. If we control the narrative we can start to ostracise these groups and turn people on them, even confuse and divide their own membership."
 RUS_Plain_Clothes_Agents:0 "Plain-Clothes Agents"
 RUS_Plain_Clothes_Agents_desc:0 "Even with the agency's new theories, plain clothes agents are still needed. While they won't be running around murdering dissidents or spies like agencies of old, they still have uses. Planting evidence, blackbagging, tailing, intimidation, breaking and entering or even good old fashioned abduction, there is always a need for morally flexible agency men without clear links to our government..."
 RUS_Bigger_Problems:0 "Bigger Problems"
 RUS_Bigger_Problems_desc:0 "Now we have equipped and shaped a new CSRO, we can let them loose on our internal problems. Kirov expects that he will have the major dissident groups under foot within a year, a bold promise but the CSRO is already showing its worth. If this works out we may even be able to use them to deal with issues within the KDPR itself..."
 RUS_Russian_Self_Defence:0 "Internal Use For Russian Self-Defence"
 RUS_Russian_Self_Defence_desc:0 "The Russian Self Defence Force, or RSDF, has mostly been left to fester and rot under the weight of budget cuts and treaty restrictions. For the first time in decades we shall actually consider finding an active use for them. Ever since anti-chernikov riots it has been taboo to use the RSDF for internal matters but hopefully the people will understand our usage of them."
 RUS_Expand_Civil_Defence_Service:0 "Expanding The Civil Defence Reserve"
 RUS_Expand_Civil_Defence_Service_desc:0 "By expanding our civil defence troops we also expand the manpower we can use on militarized responses to non military situations. Disaster relief, civil engineering and other projects that require army style coordination but don't need violence. This shall be a useful tool for internal matters whilst also improving the RSDR's image."
 RUS_Intermediary_Mission:0 "Intermediary Mission"
 RUS_Intermediary_Mission_desc:0 "Now we have toiled up the RSDF for internal usage we must decide on what to specifically do with them. While we can't exactly throw them at local governments or dissidents without it being tantamount to civil war, there are many other missions we can use them for to stabilize our internal situation without confrontation."
 RUS_Exercises_Europe:0 "Exercises With Europe"
 RUS_Exercises_Europe_desc:0 "Most Europian armies consider the RSDF to be a sad joke, and honestly that is a polite way of putting it. However, hopefully getting involved with EU military exercises should improve our forces' experience and morale, while also improving our connections with the Europians."
 RUS_Patrol_Kazahk_Border:0 "Patrol The Kazahk Border"
 RUS_Patrol_Kazahk_Border_desc:0 "Due to Chinese neglect, most of Kazakhstan has become a lawless wasteland ruled over by bandits, islamic rebels and warlords of every variety. Smuggling and crime flourishes around our large border with border police struggling to contain it. Deploying the army to secure our border will stop a haemorrhaging issue while also sending a firm message to the exiled Communists and the Kazakh government that shelters them."
 RUS_Civil_Engineering_Assistance:0 "Civil Engineering Assistance"
 RUS_Civil_Engineering_Assistance_desc:0 "Russia has a near endless number of decaying infrastructure projects that need repair, especially in our rural expanses. Local governments will often only pay private companies to repair economically relevant roads and rails leaving a lot of areas neglected. By deploying the RSDF to help with civil engineering projects we should be able to increase our popularity and development in neglected areas."
 RUS_Reigning_Party:0 "Reigning in The Party"
 RUS_Reigning_Party_desc:0 "Now that we have solidified our efforts to secure the internal sphere, we now must move on to deal with the greatest problem of them all, the KDPR. Our own party is a leviathan inseparable from the state, it is a corrupted and bloated mess of special interests, rife with factionalism that has dominated politics for decades. If Zakharov has one mission he wishes to complete, it is to slay this leviathan and reform it into a functioning party of government, and thanks to Lebedev's legacy, only the Reformists and Saint Petersburg Clique stand in the way..."
 RUS_a_national_catastrophe:0 "A National Catastrophe"
 RUS_a_national_catastrophe_desc:0 "The collapse of our investment in Japan has sent shockwaves across our nation. ROSMIRES is on the verge of collapse, Banks are unable to pay off the debt and numerous private enterprises that invested are having to cut back. It is clear that we are currently facing the worst economic crisis in Russian History."
 RUS_assessing_the_damage:0 "Assessing The Damage"
 RUS_assessing_the_damage_desc:0 "Our economy has plummeted through the floor and is somehow still falling. Unfortunately for us this isn't the end, we have to step up and try and stop this catastrophe from getting worse. Put calls through to ROSMIRES's management, Tell the banks to hold off, get the EU Ambassador on the line and get the entire economic crisis team in conference in 5 minutes. We HAVE to stop this..."
 RUS_meeting_with_the_oligarchs:0 "Meeting With The Oligarchs"
 RUS_meeting_with_the_oligarchs_desc:0 "When the ship goes down the rats are always the ones that flee first. The Oligarchs are no different, their investments have folded and faced with the very real possibility of being poor, are starting to cut and run. If they bail, there is no hope of recovering our economy. We shall bring them to the table and using Konavalev tell them to not to do anything selfish or stupid for once..."
 RUS_rumblings_in_our_city:0 "Rumblings in Our City"
 RUS_rumblings_in_our_city_desc:0 "As the banks begin to fold the people start to feel the hit, pensions default and the panic begins as bank runs are spreading. ROSMIRES's collapse has also put hundreds of thousands of workers out on the street, and even tertiary industries that invested in the Sakuradite plan are having layoffs. Real Inflation is through the roof, savings are gone and unemployment is rising rapidly. The people are angry and the tide of discontent we have held in bay by apathy may finally burst forth and envelop us all..."
 RUS_conovalovs_pleas:0 "Conovalov's Pleas"
 RUS_conovalovs_pleas_desc:0 "Konovalov like most of his sort is a self interested corrupt grifter. Despite this he out of all Oligarch's possesses the strongest nerve and cunning, he wouldn't be our economy minister if he didn't. While we can't capitulate to every mad bailout request from the Oligarchs, we will have to listen to Konovalov's more moderate demands to appease and calm our industry. He knows it's best to stand our ground, we just need him to stop everyone else running."
 RUS_the_presidents_speech:0 "The Presidents Speech"
 RUS_the_presidents_speech_desc:0 "We have taken as much stock of the situation as we can afford to, now it's time to act. First we must address the nation though, Zakharov is no great orator but he is the face of the nation and the first many shall look to in a crisis. Tonight he shall address the nation and try to calm the situation."
 RUS_set_price_limits:0 "Set Price Limits"
 RUS_set_price_limits_desc:0 "The most immediate crisis hitting the average Russian is the massive rise in inflation of goods. We are having to borrow aggressively and a crisis of confidence has seen goods on the shelf get increasingly expensive as production slumps. To prevent this inflation spiraling out of control we shall set federal price controls of staple goods such as food and medicine to prevent a crisis of key goods."
 RUS_save_the_banking_system:0 "Save The Banking System"
 RUS_save_the_banking_system_desc:0 "The Bank of Europia has been suspiciously quiet about Russia's economic implosion. It is safe to say that we won't be getting immediate help from Europia aside from their own efforts to save their own currency. We are going to have to raid our budget to bail out our financial institutions so they don't default. If they go under our industry folds and we won't be able to service our large debts to Europia which would be catastrophic."
 RUS_refill_our_coffers:0 "Re-Fill Our Coffers"
 RUS_refill_our_coffers_desc:0 "Our economic plan to save Russia has been costly, we can't print money since we don't control our bank so we will have to use what we have. Raise taxes, cut welfare, cancel infrastructure projects and freeze non-vital spending. We need radical austerity if we are to bail out our country, no matter how painful it is."
 RUS_a_race_against_time:0 "A Race Against Time"
 RUS_a_race_against_time_desc:0 "We have prevented total economic implosion for the moment but our financial system is still in crisis and our GDP is spiraling into catastrophic recession. We need a solid fix or the situation will spiral out of control, if our economy goes the nation goes with it. We need to act NOW."
 RUS_the_oligarchs_maneuvering:0 "The Oligarch's Maneuvering"
 RUS_the_oligarchs_maneuvering_desc:0 "Enough party games, it's time the economic stakeholders of the economy take their rightful place at the head of our recovery. Our interests and that of Russia have gone down in flames due to idiotic gambles of the party. Konavalev has taken the helm of recovery efforts and sidelined the President and Bulganin, with Capital at the helm Russia's situation SHALL stabilize."
 RUS_reshuffle_the_cabinet:0 "Re-Shuffle The Cabinet"
 RUS_reshuffle_the_cabinet_desc:0 "These partocrats like Zakharov and Bulganin know nothing of the economy, if we are to salvage the situation we need businessmen in office. Saint Petersburg ran to the tune of economic stakeholders and it was doing fine throughout the 90s, now so shall Russia in the 2010s."
 RUS_defend_our_interests:0 "Defend Our Interests"
 RUS_defend_our_interests_desc:0 "Zakharov would call us plutocrats and kleptocrats for using state assets to bail out our own holdings but it is undeniable that our interests and the country's interests. If our businesses go under so does any hope for a recovery, after all we have done for the Russian economy it is only fair that it helps us out."
 RUS_the_party_our_most_precious_tool:0 "The Party, Our Most Precious Tool"
 RUS_the_party_our_most_precious_tool_desc:0 "Though many factions within the KDPR are bloated puppets of Zakharov or Chernikov, it is still the natural party of government and has a large amount of sway on the institutions of state. We have always played these connections well and now we need to call in all of our favours to get the state moving in lockstep to fix this mess we have now..."
 RUS_a_state_of_emergency:0 "A State of Emergency"
 RUS_a_state_of_emergency_desc:0 "Civil Unrest is getting worse right now, turns out our focus on bailing out conglomerates at the neglect of welfare services is unpopular. Socialist degenerates are taking to the streets and rioting en masse. The whole country goes up the spout and all they can ask for is handouts. We need to declare a state of emergency and beat down this unrest if we want to save the economy. "
 RUS_create_the_national_financial_commission:0 "Create The National Financial Commission"
 RUS_create_the_national_financial_commission_desc:0 "Our budget is falling apart, we need to save our banks and our industries but we can't just print money to do it. We need to cut the fat and streamline our spending if we want to get out of this in one piece. Konavalev has formed the National Financial Commission to do just that. The commission is empowered to cut through wasteful spending and salvage our budget."
 RUS_simplfy_the_legislation:0 "Simplify The Legislation"
 RUS_simplfy_the_legislation_desc:0 "We need change to our taxes and spending now, not later. Using the Commission's powers we can cut through the red tape and simplify legislation on spending so we can more efficiently save our economy from the depredations of budgetary collapse."
 RUS_implement_harsh_austerity:0 "Implement Harsh Austerity"
 RUS_implement_harsh_austerity_desc:0 "We are in crisis mode, we need to gut everything that isn't essential to our economic recovery. Healthcare, social care, education, welfare, state utilities, police, armed forces, pensions and government paychecks all have to be aggressively cut. We need all the money to invest into our private sector to prevent it imploding and fast."
 RUS_promote_exportations:0 "Promote Exportations"
 RUS_promote_exportations_desc:0 "Any remaining trade barriers to exports are now being cut down. We need cash to save the economy and trade will do just that. By promoting exports we can get an influx of foreign currency to inject back into our economy so we can recover our GDP and escape a recession."
 RUS_paris_orders_and_we_obey:0 "Paris Orders, And We Obey"
 RUS_paris_orders_and_we_obey_desc:0 "The possibility of the Europian's calling in all our debts or taking measures to \"collect\" has hung over us like the sword of damocles. The Bank of Europia has just gotten in contact with us via the back channels and offered us a deal. They will send us financial assistance if we resume repayments by selling off failed state assets and energy futures to Europian businesses. It's a harsh offer but for the salvation of the economy we must accept."
 RUS_redirect_the_hate:0 "Redirect The Hate"
 RUS_redirect_the_hate_desc:0 "Our effective destruction of the welfare system and public services has sent the people up in arms. Unrest is currently even worse than during the darkest days of the Chernikov Presidency. If we are not careful people are gonna start lynching businessmen in the street. Fortunately we have all the power without visible responsibility, we will just direct the blame on the presidency."
 RUS_zhakarovs_stained_legacy:0 "Zhakarov's Stained Legacy"
 RUS_zhakarovs_stained_legacy_desc:0 "Look it happened under his watch, if he didn't listen to the ROSMIRES deal we would all be fine, (I mean yes we also wanted it but he should have known better!) His legacy is already that of the man who saw the Russian economy collapse, tacking on the man who destroyed the public sector surely won't make that much of a difference?"
 RUS_the_money_must_flow:0 "The Money Must Flow..."
 RUS_the_money_must_flow_desc:0 "We are starting to get there, more cuts, more bailouts, more money! Our interests are almost all salvaged and we can get back to the business of growth and production again. We just need the money to start flowing and we can get back to proper business right?"
 RUS_bulganins_iron_will:0 "Bulganin's Iron Will"
 RUS_bulganins_iron_will_desc:0 "These games must cease. Zakharov and the establishment have failed and Konovalov and the Saint Petersburg Clique are more concerned with saving their own pathetic skins. It is time for the Reformists to step up to face the crisis. Interior Minister Bulganin will lead the effort to save the economy and wipe clean the slate of corruption and failure that led to this mess."
 RUS_push_the_enabling_act:0 "Push The Enabling Act"
 RUS_push_the_enabling_act_desc:0 "No more waiting for party factionalism and wheeling and dealing, if we want to save Russia we must act without delay or mercy. Bulganin shall force through an enabling act to give the Cabinet near dictatorial powers in this time of national emergency."
 RUS_establish_the_anti_corruption_department:0 "Establish The Anti-Corruption Department"
 RUS_establish_the_anti_corruption_department_desc:0 "Right now the Oligarchs want to pillage the state to save their own investments, and the Establishment are selling out to Europia. Bah! Traitors and cowards, they shall get their due shortly. Bulganin shall found the Anti-Corruption Department to ruthlessly purge the state of parasitic elements that are responsible for our economic woes. Russia will be brought in line, one way or another..."
 RUS_ivestigate_the_army:0 "Investigate The Army"
 RUS_ivestigate_the_army_desc:0 "We need the RSDF to enforce our will as the situation deteriorates, unfortunately it is rife with corruption. As the old joke goes, the warlords of Kazakhstan's main backers are sergeants in the logistics corps. The RSDF must be the pride of Russia, and corruption will not stand."
 RUS_question_the_party:0 "Question The Party"
 RUS_question_the_party_desc:0 "The KDPR is a bloated mess of corruption and cronies. Chernikov once tried to purge the party of its parasites and forge it into an efficient machine of government, a hybrid of state and party. Though betrayal destroyed his designs, his heir apparent Bulganin shall take up the mantle and tame the leviathan that is the KDPR."
 RUS_target_the_conglomerates:0 "Target The Conglomerates"
 RUS_target_the_conglomerates_desc:0 "The Oligarchs and their holdings are perhaps the most responsible for the rape and pillage of russia, second only to Europia. They are thieves and bandits of the worst kind who held Russia's riches hostage and then when the going got tough looked only to their own fortune. If we are to save Russia we must cleanse it of these criminals."
 RUS_check_upon_the_bureaucrats:0 "Check Upon The Bureaucrats"
 RUS_check_upon_the_bureaucrats_desc:0 "While many bureaucrats of state are loyal and diligent servants who see eye to eye with our desire to reform the Russian state. Many are corrupt puppets of the interests of Zakharov or the Oligarchs. We need to look into the state apparatus to make sure it is efficient and loyal to our objectives for a reformed and perfected Russian state."
 RUS_smash_organised_crime:0 "Smash Organised Crime"
 RUS_smash_organised_crime_desc:0 "Often ignored next to the grander evils that plague Russia, the bloody fingerprint of organized crime is everywhere. Who do you think helped the Saint Petersburg Clique buyout privatised state assets in the 90s? Who do you think helped Europian banks buy out state enterprises? And Who helps the corrupt local governments keep their hold on power? These scum link so many of our problems together, they are long overdue a reckoning from the state."
 RUS_too_little_too_late:0 "Too Little, Too Late?"
 RUS_too_little_too_late_desc:0 "Or efforts to reform Russia and crush corruption have been quick and ruthless, but is it enough? The Oligarchs are running, the establishment scheming and all around us the people deprived of leadership have taken the torch to the very fabric of Russia. Was it two late when Chernikov lost to Lebedev, that hoar's bastard. Perhaps we waited too long to respond to Russia's cries for help..."
 RUS_centralise_statal_assets:0 "Centralise Statal Assets"
 RUS_centralise_statal_assets_desc:0 "Centralise Statal Assets"
 RUS_stimulate_small_businesses:0 "Stimulate Small Businesses"
 RUS_stimulate_small_businesses_desc:0 "While we centralize and control the commanding heights of the economy, it is high time we give a hand out to the little man. The small businesses of Russia, those outside of the plutocrats circle, are the unsung heroes of Russia. It is folly to try and control them like the socialists did, instead let us help them flourish and bring prosperity to a growing middle class."
 RUS_reduce_regional_autonomy:0 "Reduce Regional Autonomy"
 RUS_reduce_regional_autonomy_desc:0 "The federal system imposed upon us by Europia has stifled our ability to form a functioning state. It is time to crack down on rogue local governments and bring the regions in line with Moscow. Once these parasitic entities of regionalism are purged we can finally bring progress and reform to all Russia."
 RUS_the_toughest_man_in_russia:0 "The Toughest Man in Russia"
 RUS_the_toughest_man_in_russia_desc:0 "Bulganin has earned his title of the toughest man in Russia, and made Chernikov proud. The establishment is reeling and the Oligarchs are coming to heel. While the ungrateful riot and pillage we shall still face them down and stand victorious. The Reform Group will never again repeat the mistakes of decades past and we shall now stand at the helm of a stronger and greater Russia."
 RUS_zhakarovs_hopes:0 "Zharakov's Hopes"
 RUS_zhakarovs_hopes_desc:0 "We've come this far, we can make it through one more crisis. Zakharov has struggled through the trials of the presidency and has no intention of giving up on his promise to Lebedev. The Reformists schemes and the Saint Petersburg Clique's dealings shall be cast aside. This is the President's crisis to solve, and solve it he shall."
 RUS_call_for_pan_european_unity:0 "Call For Pan-European Unity"
 RUS_call_for_pan_european_unity_desc:0 "Whether they like it or not, our crisis is also Europia's crisis. Despite russophobia and apathy no one in Europia wants one of their largest member state's economies collapsing. If there is a time to push our reforms to Europia, it is right now."
 RUS_beg_the_council_of_forty:0 "Beg The Council of Forty"
 RUS_beg_the_council_of_forty_desc:0 "The ruling council of Europia has been opposed to any reforms on Russia policy but have slowly been coming around. The shock of the crash should make it clear to any remaining fence sitters that decisive action needs to be taken. Even if we have to beg and plead we must get those last votes..."
 RUS_blind_eye_on_corruption:0 "Blind Eye on Corruption"
 RUS_blind_eye_on_corruption_desc:0 "Look we've tried being clean but we don't have the time, WE NEED THOSE VOTES. Call every lobbyist and vested interest we have and tell them its open season in Europia. Bribe, blackmail, coerce and lobby just get us the support we need to push through change!"
 RUS_sway_paris_industrialists:0 "Sway Paris' Industrialists"
 RUS_sway_paris_industrialists_desc:0 "France has been the most reluctant to accept any reform on Russia policy. However, even if the public and government is skeptical of us, the industrialists know business from prejudice. If we can convince them to lobby in our favour we may be able to sway a few key French leads. Afterall the French have numerous economic investments in our country so they would hardly want them going belly up."
 RUS_tempt_berlins_hawks:0 "Tempt Berlin's Hawks"
 RUS_tempt_berlins_hawks_desc:0 "The Germans have mostly been on our side when it comes to reforming Russia policy. However we need to secure as many of the holdouts as we can get. Many are warhawks still paranoid or holding grudges going back to the Great War. We need to convince them that if Russia falls to economic turmoil the Chinese or Britannia's could make a move against us in the east and compromise Europian national security."
 RUS_bribe_viennas_bureaucrats:0 "Bribe Vienna's Bureaucrats"
 RUS_bribe_viennas_bureaucrats_desc:0 "Danubian policy has mostly been apathetic towards us. Fortunately many of their key influential leads are very easy to bribe so we shall direct most of our lobbying efforts to convince them to support us. With their aid we should be able to swing any votes on Russia into a simple majority."
 RUS_renegotiate_the_blanchet_commission:0 "Renegotiate The Blanchet Commission"
 RUS_renegotiate_the_blanchet_commission_desc:0 "It's time. We must finally face the music and put our reforms on the Europian treaties regarding Russia up to vote. If this package is approved then our economy will get a bailout, our constitution its freedom and also carte blanche to create an independent currency. If it fails, then all our effort will have been for nothing and Russia may very well be doomed."
 RUS_an_abrupt_finale:0 "An Abrupt Finale"
 RUS_an_abrupt_finale_desc:0 "Mr President the final vote is in, you should take a look at this..."
 RUS_deepends_eec_cooperation:0 "Deepends EEC Cooperation"
 RUS_deepends_eec_cooperation_desc:0 "We need to deepen our economic ties to the Europian market. The economic flexibility we have been given opens up new avenues of trade and investment so we should be able to finally embark on the long road to recovery."
 RUS_establish_joint_enterprises:0 "Establish Joint Enterprises"
 RUS_establish_joint_enterprises_desc:0 "Vast changes in our market have tempted many Europian investors who want to ride the wave of post-crash recovery to our market. We shall be cautious though to avoid mass buyouts, instead we shall encourage the formation of joint enterprises between Russian industry, Europian investors and our government."
 RUS_readjust_our_markets:0 "Re-Adjust Our Markets"
 RUS_readjust_our_markets_desc:0 "The massive changes facing our economy require some significant readjustment in policy. We are facing a rise of new industries in the face of the decline of our energy sector. We need to change our priorities if we are to ride a wave to recovery."
 RUS_a_much_needed_relief:0 "A Much Needed Relief"
 RUS_a_much_needed_relief_desc:0 "The aid from Europia is finally starting to take full effect. We have ended the worst period of the crash and are now into an era of recovery, one in which we shall grow back stronger and more robust than before. Zakharov deserves great credit for doing the impossible, though he himself mostly thanks the late Lebedev for the work done before him."
