 RUS_phase_one.13.a:0 "CUT"
 RUS_phase_one.14.t:0 "俄羅斯的物產"
 RUS_phase_one.14.d:0 "On the 110th floor of the ROSMIRES tower, two very powerful men in Russia lie having a private meeting. \"It was good to win the debate, I'm glad the president sees the value.\" Konovalov speaks, his voice was slightly in a different tone this time around then it normally would be. There was a hint of excitement, a hint of pride and success in what he had accomplished. From the other side of the desk stood Zinovy, who was reaching down to his bottom drawer cracking it open. Revealing an expensive bottle of white wine.\n\n\"You can sound more enthusiastic than that, the victory has been warranted!\" Zinovy's voice was the exact opposite, it was booming with joy and glee. His skin had practically had goosebumps as he drew out a glass for himself, knowing that Konovalov would not partake, he taps it down onto his desk with a tink and reaches for the expensive bottle. \"Unlike you, I'm not about to see a doubled investment in my company from the government.\" Zinovy chuckled at the words, drawing up the bottle and cracking it open. A loud pop could be heard as he removed the cork, and instantly he started pouring it for himself, his hands shaking as he replied. \"I suppose that's true, didn't know you could make jokes.\" Once he was done pouring he left the bottle open on his desk, reaching for the glass with one hand, and another desk drawer with the other.\n\n\"I don't.\" Konovalov replied frankly, watching the scene unfold waiting for the actual point that Zinovy called him here for, Zinovy knew he would. So that's why with his left hand he pulled open a drawer, and then reached inside pulling out a few documents. \"To each their own. Here, take a look at these!\" He tossed the bundle carelessly over the desk, it landed and slid right into Konovalov's awaiting fingers who took it and twisted them and started reading. Zinovy smirked when he spotted Konovalov's eye catch on to a few of them, before he then took his hand off and bundled up the papers, tapping them against the desk to get them neat, then sliding them under his arm. \n\n\"I'll see what I can do for you.\" He spoke without that small hint of difference in his voice now, Zinovy frowned as he began walking away. Chiming in one last time as the light of the moon from outside flooded in through massive glass panels."
 RUS_phase_one.14.a:0 "\"I hope that's not a joke.\""
 RUS_phase_one.15.t:0 "尋找新市場"
 RUS_phase_one.15.d:0 "\"You bring good news Konovalov?\" Zakharov was sounding a bit desperate this time around when Konovalov waltzed in through his door, while he expected the man he didn't know what news to expect. And as of today, with Zakharov looking partially like he'd fall asleep if a bigger issue was brought up, he was more worried about the answer. \"Matter of fact, yes Mr. President. Indeed I do.\" The sigh of relief to Konovalov's analytical voice was loud, and the weight lifted off of his shoulders was great. He sat forward now, and leaned in. Almost desperate to see what Konovalov had, his eyes settled on the piece of paper that he was carrying in both hands.\n\n\"Out with it.\" Zakharov snapped quickly, already reaching for his deep black and shining gold pen. Konovalov simply stepped a few feet closer, and then hoisted the paper up in his left hand, holding the single piece in a way to not obstruct its contents. It was just a graph, and Zakharov caught its title from the immediate glance. ‘Energy Output.' Zakharov knew it boded well, since he saw that the graph sharply rose. With a surplus of energy, it gave them more capital to work with so to speak. Konovalov put the paper down and slid it across to let the President examine it further as he explained his good news. \"We have recently achieved a significant surplus in energy output. With this, I make the suggestion that we increase our exports. I have a few options in mind.\"\n\nZakharov raised an eyebrow at that, now he was slightly worried about what his economic minister had in mind. He read on the paper down the bottom, it had the suggestion of using the extra boost to increase exports with Europia. But that was only one option, so he raised his question verbally. \"A few? What others do you have in mind?\" Konovalov had his response primed, that much was obvious as very quickly when the President asked he responded. \"Put simply, Europia, China or Britannia.\" As soon as the words left his mouth, the President was shocked. Such a move was bold to do, especially without conferring with Europia. But quickly he gathered himself, and gently pushed the graph back over to Konovalov's side."
 RUS_phase_one.15.a:0 "\"I need details on these three options.\""
 RUS_phase_one.16.t:0 "小心行事"
 RUS_phase_one.16.d:0 "\"The risk otherwise is too great..\" Those words were the final words Zakharov groaned out, he was having a debate within himself. It was an important decision he had to make, another one. Out of the countless others he already had to do, he removed his eyes from being glued to the ceiling and looked to the side first, at the ancient grandfather clock ticking away. He nodded to himself, and focused in front of him gluing his eyes off kilter to the desk, reaching for the landline that was resting on the right side.\n\nHe picked up the phone and dialed in the right number, it had a short moment of ringing which allowed Zakharov to fully make up his mind and commit to this. \"Secretary of President Ruda here, would you like to schedule an appointment?\" The voice on the other side was light and professional, with the clearest sign of a Ukrainian accent. Zakharov replied in a more immediate tone, making sure to not come across as rude, but to also allow him to get done with what he needed. \"Put me through to Yurij.\" The secretary on the other side almost seemed to squeal immediately, it was clear she recognised the voice, which instantly set her off.\n\n\"Right away sir! Sorry President Zakharov.\" Zakharov nodded, even though he knew she couldn't see it as he waited a few precious moments, until he finally heard the static of the line change, listening through and hearing the calm and collected voice of a fellow President. \"Yurij here, you must have a reason for pushing right past my Secretary, Vladislav.\" Zakharov cracked a small smile in response. Before answering him with a simple line."
 RUS_phase_one.16.a:0 "索要烏克蘭建築許可"
 UKR_from_other_nations.1.t:0 "Playing it Safe"
 UKR_from_other_nations.1.d:0 "Ruda was staring forward, looking at the piles of papers on his desk. He visually saw more than what was there, as he saw each as another future pile of papers he would have to rifle through and solve once he was done with this lot. He leaned back, rocking his solid wooden chair, it creaked under him. All while he ran his tired fingers through his soft dark brown hair. Suddenly, almost as if to force his attention back down he heard the beginning ring of his landline, buried off to the side of the papers. Quickly he dropped himself from rocking in his chair, and snapped his hand out of his hair to the phone, picking it up quickly.\n\n\"Yes, what is it?\" His voice was calm and collected, despite the mad dash to pick it up. In return he got a quick response from his secretary, who spoke in almost a panicked voice. \"Phone call for you sir! President Zakharov.\" Ruda sighed, relaxing himself from a stiff professional posture, even leaning back in his chair again. His Secretary knew she didn't need his response from this, and shortly he heard the phone line redirect. Mainly because he could hear the familiar sound of Zakharov's ticking clock, Ruda didn't have such a relic in his office. \"Yurij here, you must have a reason for pushing right past my Secretary Vladislav.\" While calm and collected his tone was also casual, he had known Zakharov for quite a while. A call from him out of the blue was nothing new, especially now. He waited as Zakharov seemed to have had an extra few moments to think about a decision before he said.\n\n\"I have a deal for you.\" Ruda didn't get a chance to answer, he didn't need to. Shortly after he listened intently as Zakharov began explaining the minutiae of a deal between Russia and Ukraine. Ruda's brain worked to decipher it as quickly as possible, to what he gathered Russia had a bit of extra money in its pocket and was looking for a good investment. And here specifically they wished to build a better trade network with Europia, it all made sense to Ruda. Though he realised he thought about it too long when he was asked.\n\n\"What do you say, Yurij?\" Ruda stopped relaxing and leaned forward now, getting a blank piece of paper, and with his left hand grabbing a fountain pen. He would need to choose his next words carefully, waiting for a second before answering."
 UKR_from_other_nations.1.a:0 "I'll get back to you."
 UKR_from_other_nations.1.b:0 "I'll see the arrangements done now."
 RUS_phase_one.17.t:0 "有風險的投機"
 RUS_phase_one.17.d:0 "Zakharov cursed under his breath, how could he afford to be so late already? Accompanied by his secretary, his body guards and a few other hangerons. Zakharov and the mob sprinted across the tarmac, it was a messy move. As he both tried to maintain his dignity, and professionalism. While not letting the new arrival wait any longer, he looked forward. The plane had long since touched down, but he was in luck, from far away he watched the door finally cap open. Sliding down and forming a staircase, he didn't bother to look at what model of Chinese plane it was. That would have to wait, a moment of fleeting hobbyism that Zakharov couldn't afford to spend. He watched the lavishly dressed Eunuch walk out, he had pale stark white makeup on, with red circles on his cheeks.\n\nHe wore what looked like massive flowing robes, colours of scarlett red and shining gold. Zakharov waved his hands to his aides and bodyguards, as he turned from a sprint. Into a quick speedy walk, fixing his cufflinks and tie. He stepped out until he finally got close enough that the Eunuch looked at him, affixing a cold gaze. \"Are you the aide? I must say I expected much more from the Presi-\" The Eunuch trailed off, clearly mistaking Zakharov's tardiness, and dishevelled appearance for a mere servant. Zakharov cleared his throat, and stared forward. Finding it within himself to speak calmly, \"I'm, President Vladislav Zakharov.\" He kept it formal, and straight forward. The Eunuchs cold frozen eyes widened in surprise, looking Zakharov up and down before he nervously chuckled.\n\n\"Ah! My apologies, I didn't expect a man such as yourself.\" Zakharov offered his hand, the Eunuch seemed confused for a time. Then saw all the cameras and the crew that had assembled. Reaching his own hand out, when they grasped in a firm handshake. Photos were instantly snapped, Zakharov was surprised at the strength found within the otherwise thin man. But strength could not be told through appearance alone, he knew that himself. \"I could say the same here.\" Zakharov told him, before letting his hand go. Turning to the side as he needed to, the Eunuch did as well. Allowing another photo to be taken, Zakharov couldn't exactly deny the media's presence at this scene. He only hoped it wouldn't hinder anything.\n\n\"Shall we then, President, get down to business? I don't have much time here.\" The Eunuch turned to Zakharov as he said that, it was then that Zakharov looked and remembered his name. He wasn't given much time to prepare for this, and there was some discussion amongst his side on which Eunuch would even be sent from China. But he nodded and said confidently."
 RUS_phase_one.17.a:0 "克拉斯諾亞爾斯克-阿斯塔納油氣管道"
 RUS_phase_one.17.b:0 "間接管線"
 RUS_phase_one.18.t:0 "危險的賭博"
 RUS_phase_one.18.d:0 "\"Britannia... Why even bother to approach them..\" Zakharov mused to himself, chuckling. Then turning it softly in a groan of annoyance, he leaned back on his chair. Trying to find comfort with it, but with the ever worrying weight. That what they had decided to do would be found out immediately. He just couldn't, he had hoped he'd watch Konovalov walk back in through that door. With triumphant news, that it was a success. Britannia accepted the offer, and were ready to sit down and discuss the actual route. Between a straight forward route, using Magadan, or Okhotsk. Or, an even riskier play. It was then musing on his thoughts, that his prayers had been answered. Konovalov strolled through the door, not with his usual precision. No, something seemed off slightly. But, Zakharov paid it no mind. Especially when he saw that he had a letter in his right hand.\n\n\"Konovalov, you bring news?\" Zakharov asked cautiously, Konovalov reached with his free hand to his tie and adjusted it. Seemingly uncomfortable with its position, he did this as he strolled right up to Zakharov offering the letter with a simple. \"Yes.. I do. Vladislav.\" Zakharov took the letter instantly, his mind slipping past the fact that Konovalov had never referred to him by his first name before. Not even noticing, when Konovalov turned around. Looking to leave immediately. Zakharov analysed the letter, the first blaring symbol of its importance. The Britannian royal crest, emblazoned within red wax sealing the letter shut. Zakharov placed the letter down, moving his thumb over the seal. As he did so he looked up, watching Konovalov reach for the door.\n\n\"Not going to-?\" Zakharov's trailed off question stopped, when his eyes had stopped deceiving him. In Konovalov's place, standing where he stood. Was a boy who didn't look older than nine, he had short blonde hair that seemed rough in places. Zakharov recognised the uniform, one worn in a nearby Moscow school. But- how did he get here. Where had Konovalov been? \"Wait!\" Zakharov shouted accidentally, the boy upon realising he had been spotted bolted. Opening and slamming the door, Zakharov raced to his feet. But then, he looked back at the letter, and sat down again. If this had been set up by Britannia, chasing the boy was pointless. Cracking the seal open, Zakharov finally lifted its contents out. A simple piece of clean and crisp paper.\n\nWith very few words on it, Zakharov shook his head as he finally decided on the route."
 RUS_phase_one.18.a:0 "在鄂霍茨克啓航"
 RUS_phase_one.18.b:0 "航行穿過日本"
 RUS_phase_one.19.t:0 "經濟多元化"
 RUS_phase_one.19.d:0 "\"Citizens of Russia, I, President Zakharov, have a message for you all.\" Zakharov knew the reason he cringed as he was speaking. Was not the hot studio lights that were focused on him, not the pressure of being in front of professional massive cameras, with many people starring. It was reading from the teleprompter, he was aware that he had requested a script be prepared. But, he would've wished it didn't sound so robotic, so soulless. He knew that the people, the very citizens he was addressing would not connect with a robot as their leader if that's all they see.\n\n\"The government has seen to it that we shall make a series of focused investments into our non-primary industries.\" Zakharov turned his head from the camera and looked to his right, to see Bulganin, he stood there and had a smug expression and look on his face. Zakharov shook his head, and turned right back. He knew why he had that, he just wished he would've displayed it elsewhere. Somedays Zakharov felt like the President, some days he felt like a pawn.\n\nHis head would always ramble, and struggle to think of who he even was some days. Who he was trying to be and sound like. \"Look forward all, to seeing investments within the-\" Zakharov stopped, he stopped because he was now sounding like he was just reading advertisements. He kicked himself out of the chair suddenly and leaned across the desk, allowing the cameras to adjust to fully catch him.\n\n\"No, put simply. These investments will all go to supporting our nation, supporting what we provide for you. Our people.\" It was a small act, a small sign, one of the few that Zakharov could give. One of the rare times he had something himself he could think or properly say to the masses, and he was content with that. Content with this, as he was with finishing the message early, with a simple and final."
 RUS_phase_one.19.a:0 "\"That is all.\""
 RUS_phase_one.20.t:0 "宏大計劃"
 RUS_phase_one.20.d:0 "\"You made plans, Konovalov?\" Zakharov felt like he was starting to get sick of Konovalov's face, having to stare at it so often. Truly that highlighted the biggest issue with the economy, that it required many talks, many conversations, just between the President and Konovalov in order to even partially get on track. This time, after he spoke and waited for Konovalov he turned and just began looking around his office, attempting to find something of note that he could focus on while listening.\n\n\"Yes, Mr. President. Two, to be specific.\" Zakharov off-handedly, motioned for him to continue. He knew that he had brought those two documents for a reason. He knew this is why he had to keep seeing Konovalov, he was mostly effective. But importantly efficient, and it allowed him to keep an eye on the man. \"The first, where we improve our economic situation. By focusing on technological advancement across our industries, automation to be specific.\" Konovalov took the documents out of his hands and placed them down, sliding them atop each other to separate them. Zakharov didn't even bother to look at the names, he knew Konovalov would boil them down first. Leaving him to decide which he'd go with, then reading what was entirely needed to achieve success.\n\n\"The second, we focus on very cheap heavy industry. Aiming to outproduce and undercut other Europian companies. Both options, Zakharov already knew would have ups and downs. He turned away from looking at the title of a book, ‘The Last Man in Europia' to be exact from a famous British author. Locking back onto Konovalov, he already knew which idea sounded more interesting to him."
 RUS_phase_one.20.a:0 "新技術"
 RUS_phase_one.20.b:0 "壟斷鋼鐵"
 RUS_phase_one.21.t:0 "資助俄羅斯國家技術集團"
 RUS_phase_one.21.d:0 "\"It is my pleasure to introduce the man who fought for this all to happen. President Zakharov.\" The microphone boomed and peaked as the man who was the Director of the newly formed Rosdevtec spoke into them. He was leaning over into it too far, he was being too forceful. Zakharov shook his head as he stood, here he was a man who barely could form some sentences without a speech. Critiquing how one goes about it, the crowd cheered and clapped as the President stood. When Director Nikolai ushered him over he followed, eyeing the charming young man, blonde hair, grey eyes. \"On behalf of the newly formed Rosdevtec. We'd like to all thank President Zakharov for making this possible.\" Zakharov felt a swelling in his chest, it wasn't pain. It wasn't even any negative emotions this time, Zakharov felt pride. Felt some proper sense of accomplishment, it fueled him to crack a smile for the people, waving out to them.\n\nHe knew the cameras would eat that up, but he didn't do it for them. He did it for the citizens in the audience, who looked to him in these times, even if they weren't the toughest Russia had seen. \"President Zakharov, would you like a few words?\" Nikolai stepped back, finally preventing the mic from peaking as he spoke, Zakharov nodded as he took his position. Now it was the Director who was standing off to the side, waiting patiently and eagerly for him to finish. \"Only a few, thank you Director Nikolai.\" Zakharov responded in a neutral tone, looking out across the crowd. Standing perfectly on the platform, the right distance from the mic. He nodded, his mustache flaring from the attention.\n\n\"The future of Russia lies in technology. We are slowly falling behind the rest of the E.U. It is my hope. That with Rosdevtec, we will become the pioneers of technology, of not just the nation but the world.\" He spotted the reporters who were very quick to etch his words into their notes, eager to have those posted in the newspaper. And he looked right at the cameras who were recording the entire event, staring them down as he made sure to finish with a simple."
 RUS_phase_one.21.a:0 "\"That is all.\""
 RUS_phase_one.22.t:0 "打破系統"
 RUS_phase_one.22.d:0 "CUT"
 RUS_phase_one.22.a:0 "CUT"
 RUS_phase_one.23.t:0 "內部改革"
 RUS_phase_one.23.d:0 "Zakharov stared up, right at his ceiling. He had never looked at it so long before. Never needing to think so long before on any one issue, in any one place. Being Vice President was rewarding, and had its perks. But now as the President he had other issues on his mind. \"The police... the CSRO... the RSDF.\" Musing to himself, the words were muttered as Zakharov ran his fingers through his greying mustache, he had leaned back on his desk chair as far as it would allow. Creaking under the weight. \"All three of these groups need a dramatic rework.. But for now...\"\n\nThat was the thought under his mind, how he was gonna help remedy the internal situation of the country. It concerned three main groups, the names and identities of which he keeps just running through his mind, the Police, the Cabinet Security Research Office, the Russian Self Defence Force. He decided to tackle the ideas, and needed support of them one at a time in his head, and outloud in his otherwise empty office. \"The police only need a boost of funding, they were always skimped on..\" He sounded like a drone, he sounded bored. And frankly he was, it was much easier to talk about issues with other people. Then he could weigh their opinions with his own, but he knew he needed to accept the fact that some choices had to come down to just him. Just the President, the thought still rang in his head, he never really had time to think about that until now. Yet even still, he wouldn't as he quickly brushed the thoughts aside.\n\n\"The CSRO is barely an intelligence agency, an expansion would prove useful.\" It's true, last Zakharov had checked the agency only spanned 100 or so people, for the entirety of Russia. It was not nearly enough, which is why for now it's only been rarely used, and when it has, it's been focused. \"While the RSDF is bloating, rotting. It needs a complete redo, before it can be used for the first time in decades.\" The RSDF hadn't seen any use, since many years ago they were used to quell riots in Moscow and elsewhere throughout the nation. The riots ended brutally, and the blame was quick to fall onto RSDF, due to the bad press every single following President was afraid to touch them. Left them alone, some probably even believed it had already been disbanded, but it was still there ready to serve. Zakharov looked down now, and rested his head onto his knuckles. Musing for the last time today."
 RUS_phase_one.23.a:0 "\"Alexei, what would you have chosen?\""
 RUS_phase_one.24.t:0 "聯邦警察資金"
 RUS_phase_one.24.d:0 "\"Mr. President! I'm surprised, I was convinced you coming was a hoax.\" Zakharov must not have even stepped five feet into the Police Station in Moscow, before he was approached quickly by a rather rotund young man. He was quite tall, quite big too, but he didn't give off the impression of being intimidating. Zakharov recognised the man, Commissioner of the Police for Russia. He shook his head as he extended a hand. \"Please, have more faith than that, Bugakov. I come with important matters.\"\n\nThe strength that the Commissioner displayed with a single handshake was extraordinary, but his personality was simply extra, ordinary. The Commissioner motioned for the President to follow him along a bit, past the front desk which had officers responding to concerned citizens. \"I saw the report you sent, I just couldn't believe it. My Officers have always been...\" The voice of Bugakov was surprisingly sweet and light, it reminded Zakharov of honey. Everything about the man was perplexing, but Zakharov shook his head. Bugakov as he spoke looked around, almost worried people would overhear before he finished. \"Under-appreciated, and then you come in offering a budget increase?\"\n\nHe spoke as if worried and trying to figure out if Zakharov wanted anything out of the station, perhaps using it as a bribe to look the other way with a crime or what have you. Zakharov noticed and shook his head, answering fully what he was here for. \"Among other things, yes, I was wanting to expand your jurisdiction as well, explaining the needed budget increase.\" Bugakov lit up at that, as they finally approached the door to his office, he almost threw it open but managed to keep some air of professionalism. He quickly went over to his desk and took his seat, which barely fit him without creaking. \"Thank you sir, please. Let us sit and discuss.\" Motioning to Zakharov to take the seat in front of him smiling, Zakharov nodded as he began to sit."
 RUS_phase_one.24.a:0 "\"That would be nice.\""
