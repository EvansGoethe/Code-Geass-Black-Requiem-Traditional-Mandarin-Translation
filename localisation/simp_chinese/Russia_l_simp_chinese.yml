 RUS_Oligarchic_Economy:0 "寡頭經濟"
 RUS_Oligarchic_Economy_desc:0 "The economic strength of the Federation appears formidable on paper, yet in reality, it falls short. Wealth accumulates daily through resource exports and the extraction industry, yet it predominantly benefits the Oligarchs who wield influence within the government. Ironically, the revenues from these ventures consistently find their way into French banks rather than the coffers of the Russian Finance Ministry."
 RUS_Oligarchic_Economy_2:0 "寡頭經濟"
 RUS_Oligarchic_Economy_2_desc:0 "The economic strength of the Federation appears formidable on paper, yet in reality, it falls short. Wealth accumulates daily through resource exports and the extraction industry, yet it predominantly benefits the Oligarchs who wield influence within the government. Ironically, the revenues from these ventures consistently find their way into French banks rather than the coffers of the Russian Finance Ministry."
 RUS_Hostage_Constitution:0 "Hostage Constitution"
 RUS_Hostage_Constitution_desc:0 "After suffering defeat in the Great War, we were forced to draft a new constitution in accordance with the evolving United European Republic. To safeguard against sudden or dangerous alterations, the authority to amend the constitution has been transferred to the Council of 40 in Paris. Despite our representation on the council, it is de-facto dominated by France, Germany, Danubia, and their allies. Having been adversaries in a brutal conflict and currently determined to prevent  the resurgence of a robust Russia in any sense, all endeavors to amend our constitution have been so far not successful."
 RUS_Military_Shambles:0 "Military Shambles"
 RUS_Military_Shambles_desc:0 "The military of the Russian Federation is a shadow of its former self. Outdated equipment and constrained by treaties limiting weapones' imports from European contractors hampers our effectiveness. Moreover, suspicions linger regarding the true extent of our equipment inventory, as many soldiers and officers go unpaid, leading to speculation that missing pay is compensated through illicit sales of military assets on the black market."
 RUS_Parasitic_Federalism:0 "Parasitic Federalism"
 RUS_Parasitic_Federalism_desc:0 "The governance of Russia cannot be effectively centralized at the national level. The federalist structure imposed by the Post-War Constitution grants enormous power to regional governors and bureaucrats. Coupled with widespread corruption and lack of accountability among these officials, national initiatives are practically paralyzed. Every presidential decree or project must navigate through a labyrinth of corrupt regional bureaucracy. Consequently, projects such as funding a national highway project inevitably devolve into lining the pockets of local officials rather than achieving their intended purpose."
 RUS_Extensive_Corruption:0 "Extensive Corruption"
 RUS_Extensive_Corruption_desc:0 "Corruption casts a pervasive shadow over Russia, entwining the government, oligarchs, and organized crime syndicates. In this landscape, achieving any objective relies on having the appropriate connections... or sufficient financial resources. This reality, overall, permeates every facet of the nation's industrial and political spheres."
