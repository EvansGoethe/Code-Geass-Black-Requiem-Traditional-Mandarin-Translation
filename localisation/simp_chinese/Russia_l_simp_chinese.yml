 RUS_region_management_category:0 "Regional Investment"
 RUS_region_management_category_desc:0 "President, our great nation of Russia is weak, old, decrepit. It is being outpaced by the times, having been shuffled around in the hands of ineffectual or corrupt leaders, but now it is time for change.\n\nYou have the power to make that change, and there are two key details you must be made aware of. That of our populaces rising discontent with the way things are, and the development level of our motherland. Many areas in Russia have been abandoned by the times, leading them to have a low §Rdevelopment level§!. These areas have begun growing in dissent, leading to a rise in §Rsocial discontent§!. It may seem best to advance these areas with investments and development, but these actions could be seen as neglect by other areas only leading to them to become discontented.\n\nAnd because of the vast nature of our motherland, and its varying cultures and beliefs spread out amongst it we have divided the nation into four to better allow you to manage them. These four regions of Russia include the well-developed home of many of our citizens, §YWestern Russia§!. The industrial heartlands of the §YUral Belt§!. The vast wilderness still teaming with communist sympathisers in §YSiberia§!. And the furthest extent of our land, the §YFar-East§!.\n\nThe best way to handle these regions, the decisions to improve them, or alight others in the fires of rebellion lay soley within your hands, President Zakharov."
