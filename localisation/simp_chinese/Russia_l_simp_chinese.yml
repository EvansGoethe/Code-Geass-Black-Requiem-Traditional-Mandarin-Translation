 RUS_civil_war_leadup.1.t:0 "鄂霍茨克港被封鎖"
 RUS_civil_war_leadup.1.d:0 "Pavel trudged through the early morning fog, the dampness seeping into his worn-out boots. The once-thriving hub of Eastern Russia now bore a desolate air, the clank of metal containers echoing through the deserted docks. His calloused hands clutched a greasy flask of coffee, the steam mingling with his breath in the frosty air. The briny scent of the sea was tainted with the bitter smell of bitter despair that hung over the city.\n\nTurning the corner, Pavel's gaze fell upon the anxious faces of his former colleagues. The notice had come without warning, a stark message plastered across the office windows: \"60% layoffs effective immediately.\" The words had been etched into the hearts of every worker in the port, and now as they huddled together, their collective fear felt not unlike the crashing sea nearby.\n\nStepping onto an upturned crate, the makeshift podium for his impromptu speech, Pavel began, \"Brothers and sisters, we stand here today not as mere dockworkers but as the backbone of this great nation! For years we have done our duty for friends, family... and children...\" His attention drifts slightly before conviction burns brightly in his heart.\n\n\"But today we have had enough!\" he bellowed. \"We've toiled in the freezing cold, given our sweat and blood to this port, and what do we get in return? Uncertainty! Betrayal! Our government turns a blind eye while the fat cats in the Kremlin line their pockets with our hard-earned money!” The crowd stirs at the words, their faces contorting with a mix of anger and desperation.\n\n\"It's time we take a stand!\" he exclaimed, raising his fist high. \"We won't be silenced! We won't be forgotten! We demand justice!\" The crowd erupted into a cacophony of agreement, their collective anger growing into a roar. The word 'strike' began to spread like wildfire, passed from one furious worker to the next, until a new chant burst out. First slowly, then with roaring thunder, it echoed through the foggy streets of Okhotsk...\n\n\"FOR DIGNITY! FOR OUR FUTURE! FOR THE N.R.M!\""
 RUS_civil_war_leadup.1.a:0 "We need to nip this in the bud. Bring in my Cabnet."
 RUS_civil_war_leadup.2.t:0 "混亂的內閣"
 RUS_civil_war_leadup.2.d:0 "In the hushed confines of the Kremlin, a soft ticking echoed through the grand hallways. The air had the scent of leather-bound documents and the subtle hum of anticipation belying the panicked situation. President Vladislav Zakharov strode into the conference room, greeted by the chaotic assembly of his ministers of state scrabbling at papers and screaming into phones desperately trying to extinguish the fire now consuming their house of cards.\n\n\"Look, we can't and shouldn't try and bail everyone out, if we do that we all go bust. The rule of the market is that you have to fight to survive, a handout weakens everyone, even if we wanted too we can't afford it. The window of opportunity for a bailout was when ROSMIRES went under and we couldn't stop that..\" The Economy Minister Konavolev shouted, darting between the phone to his ministry and his personal stock broker.\n\nPresident Zakharov leaned back into his chair, his eyes narrowing. \"I know the situation, Konavolev. What I don't know is what your proposal is to resolve it. Time is money, and our country is bleeding both.\"\n\nKonavolev collected himself, straightening his tie and regaining some of his composure, the sound of yelling emanating from his still active call.\n\n\"It's simple, pull out of the investments that are in the red, The Far-East has been a drain for ages and most of its possibilities for growth dried up ages ago, they are just dead weight. Cut our bloated subsidies and spend the money trying to stem the fiscal bleeding.\"\n\nZakharov turned looking at the man with an exasperated steely gaze, “That is at least a quarter of our citizens and a third of our territory, you can’t dump it like an underperforming subsidiary...”\n\nInterior Minister Bulganin cut in slamming down a phone that had been screaming into his ear, “I loathe giving Konavolev a point but doubt that would make the situation much worse. Local administrators are either on flights to Australia with bags of government cash or are barricading themselves against the mob.” collecting himself Bulganin continued “While most of those corrupt rats are reaping what they sowed we still have options. Ignatov and Medvedev haven’t dipped into the pot and are not hated by the people, I’m sure they can be convinced to do their patriotic duty and rebuild a modicum of trust with the people.”\n\nThe only response from the president was a sigh..."
 RUS_civil_war_leadup.2.a:0 "It seems we have little choice. Inform Ignatov and Medvedev, tell them I wish them good luck."
 RUS_civil_war_leadup.4.t:0 "Countdown To History"
 RUS_civil_war_leadup.4.d:0 "Senators Fyodor Ignatov and Ayhal Medvedev sat in the modestly furnished office of Okhotsk's Mayor, Sergei Sorokin, the windows framing a pattern of unrest. The crisp fall air outside carried the distant murmur of a restless crowd, their voices melding into a rhythmic chant: \"For dignity! For our future! For the NRM!\" The protesters marched in a well-behaved procession, their placards bobbing like a sea of discontented waves. Sorokin's eyes surveyed the scene betraying a hint of sympathy toward the masses outside.\n\nThe anticipation ceased when the video monitor lit up to reveal two figures, the haggard and tired Mayor of Neryunguri Boris Yushukov contrasted beside the firm and collected Colonel Kozolov of the Military Police.\n\n“Good we are all here now. Thank you Senators for joining us, I hope your presence and efforts will help calm the situation.” Sorokin said turning from the window to the seated senators and the guests on screen, “The protests are getting worse, the situation was bad beforehand but the crash has unleashed a tidal wave of the desperate into the NRM’s arms. I’ve talked with my colleagues in the group but they are struggling to keep the feeling calm and directed towards change... I fear the situation might break out into a violent revolt if all hope is lost.”\n\nSorokin bristled at the Colonel’s mention of his membership with the N.R.M. “With all due respect, we believe that your dear “Colleagues” may be actively agitating for secession, they would frankly be fools to ignore this opportunity.”\n\nSorokin brushed off the remark “Despite your fears, the NRM has only ever advocated peacefully for autonomy and representation. If I wanted revolution I would be stirring up hatred on the streets rather than sitting here, I’ve only had the police stand off to prevent confrontation and my interactions with the crowd have been calls for calm and peace. Boris has taken similar measures to keep the situation steady, though I wish my friend would go further...”\n\n“Idealism and radicalism is a young man’s game, Sergei.” Boris Yakushukov cut in, “It's not one I wish to play nor risk the lives of my wife and children doing so, let me clear I am doing this out of a desire for peace and a debt to the people who elected me even if they despise me for it.”\n\nThe debate was halted by Ignatov raising his hand and gesturing for silence, “I can see the crisis is difficult for everyone, and I am truly grateful to you three for stabilising the current situation and I believe we can help.” Ignatov gestured to his colleague Medvedev who continued. “The problem is the crisis is a national one as much as a local one and for all your good will and efforts the people still starve due to Moscow’s impotence, I believe this crisis presents an opportunity to finally end the stagnation we have been in for decades, the status-quo has broken under its own weight and now we have no choice but to change, we just need to let the people know that action is finally coming.”\n\nEveryone looked expectantly at the Colonel who sighed and responded, “I’ll find a way for you to make an address, but I must demand that you wait in the Port Okhotsk naval base for your own safety, my men will drive you there.”"
 RUS_civil_war_leadup.4.a:0 "The two senators smiled and stepped out of the office, a last step towards history for better or for worse..."
 RUS_civil_war_leadup.3.t:0 "Civil War Avoided!"
 RUS_civil_war_leadup.3.d:0 "unfortunatelty, this isn't intended right now, we have nothing for this path\n\nwhich means the civil war has to happen, good job anyway."
 RUS_civil_war_leadup.3.a:0 "Fuck you."
