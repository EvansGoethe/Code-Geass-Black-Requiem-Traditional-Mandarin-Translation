 RUS_phase_one.33.t:0 "Internal Use For Russian-Self Defence"
 RUS_phase_one.33.d:0 "\"Take a seat. This is important.\" Zakharov gestured his hand out as the final man dressed in the RSDF general uniform filtered into the room. The men all looked at each other, half a dozen in total wondering what the point of bringing them all here was. All into a room that felt cramped and claustrophobic despite having plenty of space. In the centre lay a table long enough to fit all six generals, either side of it. Zakharov was the only one who remained standing as they all sat, leaning against a chair at the head of the table, the other side of the door where all the men flooded in from.\n\n\"I've gathered you all here, to talk about the future of the RSDF.\" The topic drew worried faces from the generals, he knew that he should move on with this quickly, but Zakharov couldn't stop himself from looking at each one of their faces. He recognised not a man here, which is why he was here. The RSDF, had been so sorely underutilized, many assumed it had been disbanded when it wasn't. Leading to the abandonment to only get worse. \"I've decided that the RSDF can be put to better use, for the nation's internal situation. And so, I am going to expand the organisation.\" Many of the generals had the expressions that looked as if they needed their ears checked, they turned from looking up at Zakharov to each other and vice versa. \"Are you sure sir- after...\" One general spoke out, he was on the right closest to Zakharov leading to him catching his gaze. He was possibly the youngest amongst them, which wasn't that young. Not compared to other areas of the government. Though he had the courage to speak first, he did not have the words to finish it. So, the man that sat right next to him ended up finishing it. He was much older, full grey hair, full grey beard.\n\n\"After the riots, the RSDF has remained unused. Most Presidents feared the bad press.\" He spoke frankly, and honestly in a deep Russian accent expected of an older man. Zakharov admired all the qualities about him, and so nodded along as he spoke. Taking his hand off the seat in front of him no longer leaning. He tapped his hand on the table and continued. \"Soon enough, you all will be supporters to civil and security matters for the nation.\" Moving his head to look at each of them again, he made extra sure for them to empathise this next point. Already two of the generals had seemed convinced by the President but he wanted to be sure."
 RUS_phase_one.33.a:0 "\"Not, brutal enforcers.\""
 RUS_phase_one.34.t:0 "Intermediary Mission"
 RUS_phase_one.34.d:0 "CUT"
 RUS_phase_one.34.a:0 "CUT"
 RUS_phase_one_projects_outcome.1.t:0 "Sino-Kazakh Pipeline Report"
 RUS_phase_one_projects_outcome.1.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick a pipeline directly from Krasnoyarsk to Astana was a great success. The surrounding areas have seen increased prosperity and focus thanks to the pipeline. It has also worked double duty to enhance our relationship with the Chinese Federation, improving our chances of further deals.\n\nThat is all."
 RUS_phase_one_projects_outcome.1.a:0 "\"Finally... some good news.\""
 RUS_phase_one_projects_outcome.2.t:0 "Sino-Kazakh Pipeline Report"
 RUS_phase_one_projects_outcome.2.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick the path of the pipeline to be indirect to say the least with Kazakhstan has proven to be a success in its goals. Not only does it fuel the deal we have with the Chinese Federation. It has also provided the surrounding rural areas that would often not get much of a look over prosperity and needed infrastructure thanks to the pipeline. Fulfilling the deal of course has also done double duty to enhance our relationship with the Chinese Federation, improving our chances of further deals.\n\nThat is all."
 RUS_phase_one_projects_outcome.2.a:0 "\"That's good to hear.\""
 RUS_phase_one_projects_outcome.3.t:0 "Sino-Kazakh Pipeline Report"
 RUS_phase_one_projects_outcome.3.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick a pipeline directly from Krasnoyarsk to Astana sadly did not pan out as we hoped. Time, energy, money was all frankly wasted on the project. Those who we got to do it fell under shortly after taking the contract and work barely being started. Safe to say that the Chinese Federation is not pleased with this outcome and so have bailed on the deal.\n\nThat is all."
 RUS_phase_one_projects_outcome.3.a:0 "\"Could be worse...\""
 RUS_phase_one_projects_outcome.4.t:0 "Sino-Kazakh Pipeline Report"
 RUS_phase_one_projects_outcome.4.d:0 "Subject: Sino-Kazakh Pipeline Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Sino-Kazakh Pipeline deal we organised with the Chinese Federation. The choice to pick the path of the pipeline to be indirect to say the least with Kazakhstan has proven to sadly have been a mistake. The indirect path that was chosen was revealed to have vastly unsuitable terrain for the pipeline, as well as the nature of the environment making it hard to get supplies there and start building in the first place. The company we had chosen for the pipeline has already gone through the cost of trying to make the pipeline work. Sadly failing this in suitable time has made the Chinese Federation not pleased, and they have since bailed on the deal.\n\nThat is all."
 RUS_phase_one_projects_outcome.4.a:0 "\"Another risk failed.\""
 RUS_phase_one_projects_outcome.5.t:0 "Arctic Shipping to Britannia"
 RUS_phase_one_projects_outcome.5.d:0 "Subject: Okhotsk Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The decision to plan the route from Okhotsk right to Britannia through Alaska, avoiding the chance of discovery by many other nations proved to be successful. It has allowed us to ship between our nations unimpeded and without watchful eyes, it has even seen the Port of Okhotsk receiving more buildup which it greatly needed.\n\nThat is all."
 RUS_phase_one_projects_outcome.5.a:0 "\"Let's hope it stays that way...\""
 RUS_phase_one_projects_outcome.6.t:0 "Arctic Shipping to Britannia"
 RUS_phase_one_projects_outcome.6.d:0 "Subject: Okhotsk Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The decision to plan the route from Okhotsk right to Britannia through Alaska, avoiding the chance of discovery by many other nations proved to have been a good idea in concept. However, luck was not on our side. As one of our ships was making its way to Britannia around Kamchatka it was spotted by a Chinese Federation vessel, the Chinese Federation stopped the ship as it avoided all attempts at communication. This led to the Chinese figuring out what we were doing, and as you may be aware, revealing this plan to the wider world, specifically to the rest of the E.U. The Republic is not pleased with our attempted deception and so this will make it harder for future negotiations not just with them but Britannia as well.\n\nThat is all."
 RUS_phase_one_projects_outcome.6.a:0 "\"The gamble failed.\""
 RUS_phase_one_projects_outcome.7.t:0 "Arctic Shipping to Britannia"
 RUS_phase_one_projects_outcome.7.d:0 "Subject: Japan Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The route to ship through Japan to Britannia, including them on our deal, ended up quite fruitful. In an era of tensions between Japan and Britannia this small cooperation has seemed to ease it even a little, even though that was not our main intention. Our main intention was met the same, added funds that have seen use to expand ports and bases across our nearby coastline to improve our shipping capabilities.\n\nThat is all."
 RUS_phase_one_projects_outcome.7.a:0 "\"A small moment of peace.\""
 RUS_phase_one_projects_outcome.8.t:0 "Arctic Shipping to Britannia"
 RUS_phase_one_projects_outcome.8.d:0 "Subject: Japan Route Shipping Outcome\nFrom: Minister, Matvei Konovalov\nTo: President, Vladislav Zakharov\n\nMr. President, this is the follow up on the Arctic Shipping deal we organised with the Holy Britannian Empire. The route to ship through Japan to Britannia, including them on our deal, ended up sadly not as fruitful as we hoped. The cut Japan takes on our deal with Britannia is just too much. So while the deal seemed to slightly improve the relationship between Japan and Britannia, it was just not profitable for us. Leading to the decision to cut the deal, while this has seemed to not bother Britannia due to wanting to keep discrete on the manner. Japan is not the same way, and so now seems to be harbouring an issue with our tactics and the way we do business. They'll hold this grudge for as long as they exist it seems.\n\nThat is all."
 RUS_phase_one_projects_outcome.8.a:0 "\"That's not good.\""
 RUS_phase_one.35.t:0 "Reigning in The Party"
 RUS_phase_one.35.d:0 "\"Gentlemen, I think it is finally time for me to announce...\" The tension suddenly became thick in the air. All looked at Zakharov, and he looked out at them. Seeing all the various politicians, stuck together in their groups. Most who had been scheming and plotting various tactics to take charge, take control. Those various groups, those various people within and in charge of them. Were now all united for once into one thing, to hang onto the words of Zakharov. They had all hoped the same thing, that this. Would it be his resignation, did it feel him with some slight dread? That everyone looked upon him. Standing at a podium, speaking for them all to hear. Were hoping it would be the last time he ever did so? Maybe it did, Zakharov.\n\nHe wasn't sure how he felt, wasn't sure how to think. This past year or so, all working to get Russia back on track. He wasn't sure what he was supposed to be, who he was supposed to be. Zakharov took a deep breath. At the end of the day, it did not matter if he didn't know who he was. He knew what he had to do. That much, he was sure. \"That I am not yet done!\" Zakharov slammed his fist down on the podium, it was not filled with rage. But instead, a promise he scanned his eyes out amongst them all. Trying to lock eyes with everyone within.\n\n\"I have stood here amongst you, and seen your petty squabbling. Your attacks against each other, you have all sought to tear our great nation apart.\" He made that point clear, to each and everyone of them. There were very few within this building, who had not tried to gain something through attacking someone else. Those very few who avoid that all? Well, they were the ones who supported Zakharov to the end. With no ill will behind their support. \"I will not stand for it, for as long as I am president, I will be aiming to pull this nation together. To put us back on the right track.\" Zakharov spat, he spoke firmly. He spoke and did not allow room for objection, he knew he had to. A moment of weakness, especially now. And he would be finished.\n\n\"To put Russia right back on the path to greatness. To where we will exist as one of the pillars of the E.U.\" It was a long dream, it would take time. It would take a massive effort, and it would rely on so much going right. But, Zakharov had to believe in it. He had no choice, he had to find it within himself. That he could do this. Zakharov finally ended his words simply."
 RUS_phase_one.35.a:0 "\"That... will be all.\""
 RUS_phase_one.36.t:0 "Sakuradite Crash One"
 RUS_phase_one.36.d:0 "110th floor of the ROSMIRES tower, what a beautiful sight. The tallest skyscraper in Moscow, from that sight Zinovy could look out on the city. From this single spot he could see the actions, and the consequences of all. He raised his small shimmering round glass to his lips, he pulled it up, blocking his view. Desperately trying to get one last sip, but. The bottle had run dry, the last cubes of ice simply chink and tink around in it. Zinovy sighs, he couldn't believe this is where it all had led him. Looking back out at Moscow, with eyes. Eyes that didn't say much, they simply reeked of tiredness, of the faint remnants of tears that had run dry now.\n\nWith a soft sniffle, uncharacteristic of the man. He turns around, moving forward to his desk, about to put his glass down. However, that would not happen. For on his desk sat still, the single document, the simple paper that denoted this dire circumstance. He didn't need to read it again, he couldn't even simply looking at it sent him a flare of rage. The glass completely shattered, the ice cubes falling to the ground. Being tossed against the wall with all strength left, Zinovy had a look of complete utter rage on his face for a second. Just long enough for him to yell out. \"Damn it Britannia!\" Standing there, voice dripping with venom. He spat out some more, \"damn it all... Japan.\"\n\nIt felt like he was a witch, uttering one last curse to those who had defeated them. He did his best to compose himself, walking around to the other side of his desk, looking at his drawers. He knelt down, and pulled one of them open. It was one he hoped he would not ever have to open, he drew out a black parcel from inside. With it in hand, he stood up. Cursing some more, he took it back to the window. At least he would get to look out one last time. It led him to softly smile as he looked out. Lifting the box open, the lid peaked. Revealing shimmering black metal underneath, clean and polished. With a lovely wooden grip.\n\nThe Nagant M1895 that Zinovy always kept for personal protection, to think. He had bought it all those years ago with his first pay check, he drew the pistol from the box and dropped it down, he held it in both hands. It felt strange, felt weird. Like it was suddenly much heavier, he inspected it just in case. There was no marking or blemishes, only dust from unused. He slid out the revolver cartridge to examine the inside."
 RUS_phase_one.36.a:0 "There only needed to be one bullet."
 RUS_phase_one.37.t:0 "Sakuradite Crash Two"
 RUS_phase_one.37.d:0 "The paper was worn, it was weathered. Tattered even, though it seemed entirely new and recent. The Policeman's eyes fell upon it, examining it. Seeing the rips, seeing the stains that could have been from tears. Or a drink. It was a report, a timeline. Only parts could be read.\n\n0030: Imperial Britannia military forces begin an all-out invasion of Japan\n0200: Kururugi government declares martial law and seizes strategic industries in cooperation with the Kyoto Houses. ROSMIRES-Kirihara agreement becomes null and void.\n0320: Major Europian investors and banks such as Eurobank, LEBC, Crédit Français and Deutsche Bank, prepare to short millions of euro's worth of their investment.\n0400: Information from confidential board meeting and ROSMIRES discussing the likelihood of bankruptcy leaks to the media.\n0630: Moscow Exchange commences morning trading. ROSMIRES opens at 975 points and drops to 34 by the end of the hour.\n0730: Panic spreads as major industries and banks experience panic selling, Eurasian Industrial Indices fell by 27.3%.\n0800: Europian Central Stock Exchange commences trading, ROSMIRES and Russian banks experience similar losses.\n0845: Public panic causes runs on major banks including state-owned Rosbank.\n1000: Europian Central Bank freezes further loans to Russia, emergency session of the EU executive council is called.\n1130: ROSMIRES announces bankruptcy proceedings, several company mines cease extraction with billions of tonnes worth of minerals lying idle.\n\nThe officer now understood, he had the reason for it. For more than he was here for, that much he understood. Looking away from the paper, he spotted scant few other officers around him. They were short handed as of late, with much work to be done. And now, he realised. That staying here any longer, to investigate a suicide at this time. It was pointless."
 RUS_phase_one.37.a:0 "\"Pack it up... we have work to do.\""
 RUS_phase_one.38.t:0 "Sakuradite Crash Three"
 RUS_phase_one.38.d:0 "Desperately, Kirillov screamed and shouted into his phone. He would've ripped it right off the wall, one that was barely still standing if he could with his rage. \"No! You.. You can't just leave us here!\" Desperation, it riddled his voice. How could it not? His thoughts were racing, he was against the wall, the landline phone against his ear. Yet he was pressed in a way to avoid a line of sight. He was looking out the window, or more so peaking out the window, from far away, he saw explosions. Fires burning, rubble, people running away. The voice in the other line, he did his best to listen to. But, his thoughts were elsewhere. He turned away from the window, closing the blinds slightly, looking through a door behind him that had been peaked open. Seeing his son, his short brown hair gleaming through. Looking like he had just finished packing.\n\nThat gave him a sigh of relief, but then he heard devastating news. \"We can't.\" That voice spoke through the other line, he quickly snapped up again shouting. \"Why- what!? I-\" He didn't get to finish it, as the person he had been talking to on the other line had disconnected. That was one of his few hopes of getting away quickly, he slammed the phone back into the wall. Cracking it and the wall mount, he swept across the small cramped room they had hid themselves in. Snapping up a messenger bag from the table. He went to the door, he saw his son's hair that was peaking through tuck away, he opened the door softly. Slowly, being careful with him. \"Kurepin.. Are you done?\" Waiting as long as he could, he watched his son peak around quietly, nodding his head, he saw him. His backpack already on, he softly smiled. It brought him no comfort, but maybe it would bring his son some. Clearing his throat to speak again, it was interrupted by a loud explosion that rocked their building. Snapping up his son into his arms, he hoisted the little boy up. \"We have to go!\" Running to the front door as quickly as he could, all while the building and the furniture within it shook. Reaching his free hand out to swing the door out and open, it was opened and pulled right back.\n\nThere he had hoped to be met by Russian bodyguards, or men who could get them out of there. Instead, he was met with the Grey Death. A soldier, in full grey body armour, plates all up his legs, chest and shoulders. A fully enclosed helmet, dark grey lenses and a gas mask integrated into it. He held a bullpup assault rifle already pointed at Kirillov and Kurepin, only allowing him to mutter out. \"We're not Japanese citizens we're-\" Kirillov's voice would fall silent from then on. A quick burst of shots, all that could be heard from outside, attempted to be drowned out by screaming and crying.\n\nYet the last thing heard inside, heard by a bleeding son. The son of some Russian business bigshot. Was the deep masked voice, announcing simply."
 RUS_phase_one.38.a:0 "\"Sector cleared.\""
 RUS_phase_two.1.t:0 "A National Catastrophe"
 RUS_phase_two.1.d:0 "To Zakharov, being surrounded by a mass amount of body guards. And followed even further by police always setting up a barrier around him would always feel alien. It felt like to him, it would permanently stop himself from being with the people, the citizens he ran the country for. Suddenly, Zakharov's ears perked up as he was walking down a random street in Moscow, on his route to getting back to his office.\n\n\"-Yes, and this just in.\" It was from a reporter on the TV, he looked around and found through one of the almost frozen shop windows the look of a blonde reporter, a stack of papers in her hands. When Zakharov stopped, so did the entirety of his entourage, but he had to know what was going on with his country. And the world. \"The ROSMIRES company faces collapse, after the failed investment into Japan due to the ongoing situation. The company's value plummeted and is on the verge of declaring bankruptcy..\" The words hit Zakharov like a speeding bullet, it wasn't unexpected entirely. With the situation in Japan he feared something like this would happen, but his mind had done everything it could to fight the thoughts away from him. Now, it would all come crashing back to him.\n\n\"It was found only a few hours ago. That the Chairman of ROSMIRES,  Alexsandr Zinovy, had killed himself. By throwing himself out of the building.\" The screen flashed with an image of Zinovy, Zakharov's mouth was agape. To say he was horrified was an understatement, even the men surrounding him were horrified. Those few citizens elsewhere on the street, watching the same report, were horrified. But they had more audible reactions than Zakharov. \"This doesn't end folks with just ROSMIRES, the entirety of the Russian economy is expected to shrink by 5% with the collapse of its stock market. Many banks are closing, unable to pay off debts.\" Zakharov kept watching, the screen flashed so many times. With graphs, various images of banks closing, of video footage of those banks flooded with people and them being locked out. Zakharov instantly punched his leg, causing his guards to react but they didn't stop him. He kept doing that, all while he said slowly."
 RUS_phase_two.1.a:0 "\"This.. this can't be real.\""
 RUS_phase_two.2.t:0 "Conavlov's Pleas"
 RUS_phase_two.2.d:0 "\"Please Mr. President, there are several companies we must bailout.\" If Zakharov hadn't had his hands rubbing his temples, he might actually have heard the worry in Konovalov's voice. The subtle panic that reeked in an otherwise cold man, Zakharov could barely see his thoughts all reeling from what he just witnessed before. \"Konovalov- Slow down.\" He desperately said, as he opened his eyes and looked. Konovalov was leaning down over the table, his position no longer straight and pristine. It alone showed his worry, he was sweating just a bit under his brow.\n\n\"If we don't, the economy will continue going into a free fall. We have to act quickly!\" Konovalov knew he didn't have to raise his voice. It wouldn't allow Zakharov to hear him any better over his pounding thoughts, over and over trying to comprehend the situation. Trying desperately to think, the moment his mind allowed him to further register it flared up in anger. A blood vessel sounded like it burst. \"Calm down!\"\n\nThe shout surprised not only Konovalov but Zakharov too, they were left in bitter silence for a time. Zakharov turned in his chair to fake Konovalov, who focused his eyes away and down onto the desk. Onto the papers below, quickly he snapped up a pen and began scrawling onto one of the pieces of paper. Zakharov recognised the names of a few Russian Companies, and so knew the meaning behind it. Once he was done he fully dropped the pen, and swiftly turned around. Making a clear effort to compose himself, his voice when it returned sounded more natural. \"I leave the rest to you.\" Were his final words before leaving, Zakharov looked at the paper, and slowly reached for the pen that was just dropped."
 RUS_phase_two.2.a:0 "\"So... so did Lebedev.\""
 RUS_phase_two.3.t:0 "Rumblings in Our Cities"
 RUS_phase_two.3.d:0 "Ipatyev still couldn't believe it. His eyes were permanently replaying the scene in his head, one moment he was looking at his savings. His bright future, one he had worked so hard for in a state that was constantly kicking him while he was down. The next, in an instant it was gone. All of his money, all of his savings, he knew he wasn't alone. This was happening nationwide, the entirety of Russia was in a collapse. But, he didn't care about Russia, he didn't care about any of it. It was Russia, it was his country that brought this upon him. He thought all of this, as he brought his black and red ZID brand motorcycle to a stop on the side, people went past him.\n\nAll of them, not even acknowledging him or his existence, that was how his life was for so long. He had anger not just burned into his heart, but his face now. He removed the motorcycle helmet and tossed it down, he began shaking convulsing as he turned his motorcycle off. \"Why.. why... why.\" He kept muttering more and more, he had not a single penny to his name, he had lost so much more than just money. Lost his house, lost his job, if he didn't know any better he'd lose his wife next. That thought caused him to bite his tongue, the thought of that happening. Of the one he wanted his future with, of his future gone. \"DAMN IT!!!!!\" He suddenly screamed out, he shouted, he couldn't take it anymore. He couldn't deal with this, passersby were shook and finally they knew he existed.\n\nFinally they saw him, but only as he began reaching into his bag. And pulled out a knife, the next moments were a blur. Ipatyev looked more like a man possessed, he only started with slashing at his motorbike. Yet, the moment came when someone tried to reach and stop him. The cut went straight through their arm, dripping their blood down. He couldn't stop himself, he started attacking people, crazed, frantic, slashing. The pain inflicted on him, he now only wanted to inflict upon others. Bang! A single gunshot was heard from Ipatyev. He looked down, and instantly he felt his breath and his energy gone. So far covered in blood, he couldn't tell if the blood coming from the hole in his chest was his, or someone else's."
 RUS_phase_two.3.a:0 "Another life.. Snuffed out."
 RUS_phase_two.4.t:0 "總統的演講"
 RUS_phase_two.4.d:0 "Zakharov took a deep breath, he felt the hot studio lights on him. The flashing of all the professional high end cameras, he was desperately trying to read the notes of a hastily prepared script for him. All of it was proving to be too much, when he heard the words. \"Begin!\" From far off by an over excited director, he burst. Even with the camera on him, the full view of the Russian people on him, he took the notes and scattered them in the air, right behind him. He didn't care how it was viewed, he knew he was a terrible speaker, but now he would just speak what he believed was right.\n\n\"Citizens of Russia! Do not fear...\" He practically glared down at the camera, mainly to the men past it. Even as he slammed and kept his hands down on the desk, he worked to compose himself. Resting on his last words, closing his eyes as he thought. Mustering up the courage, mustering up the breath. Mustering up what he would believe, his predecessor would have said in the situation he spoke. \n\n\"I know times are tough, I know our nation is facing a great turmoil, a great catastrophe.\" He spoke with conviction, he finally spoke with the air of a solid and great President. All eyes were on him and he knew it, so he continued while gripping his own skin hard in his balled fists. \"But must that mean we turn into barbarians! I say this not to act better of you, not to be a president above the law. Above all of you, I do this for you. Because..\" He thought of some of the most worrying reports he had seen, of people driving mad. Of a citizen who grabbed a knife and started attacking people, of all the arguments and fighting he saw on his way here. \"I am the same as all of you, I am Russian just like those who are watching this. We must remain calm in this dark hour.\" He hoped, no he prayed his words were enough. He would not know what to do if they weren't.\n\n\"For if we continue to slip further and further, our great nation will be reduced to nothing but ruin.\" His mind flashed to Russia in pieces. Crumbled, destroyed by multiple groups and people attempting to tear it apart for themselves. For as long as he lived, he tried to believe that Russia would not fall... And yet even as he finished his speech, there was a lurking nagging thought at the back of his mind, that he knew he could not defeat."
 RUS_phase_two.4.a:0 "\"Please... You must bear this with me.\""
 RUS_phase_two.5.t:0 "與時間賽跑"
 RUS_phase_two.5.d:0 "\"As you all know-\" Zakharov started, he cleared his throat before hand but. It seemed nothing came out, but it did. His voice came in loud, it came in clear to him at the very least. However as he observed the cabinet room, nobody was paying attention to him. To them he may as well be an ant on the floor, he had no eyes to him. No respect, other members in the room were simply talking, some arguing, some agreeing. The room seemed to be divided, invisible factional divides splitting the room in sections. Just like they split his nation. \"As you all know! Russia is in a state of-\"\n\nZakharov tried again, slamming his fist right down on the dirty podium in front of him, it sounded like the wood cracked and splintered from the force. And yet slamming his fist like a gavel did nothing to silence the room, they continued. Its as if he lost all his power, all his weight in a manner of days or moments. He scanned the room, surely there was some reason for this, some single thing that was the sudden cause and shift of all of this. Then his eyes narrowed, in rage he simply shouted out unlike him. \"Do none of you care about your country more than yourselves!?\"\n\nAgain, no one heard him. The President of Russia, a ghost in his own cabinet. Then his eyes fell on the closest person to him at this current moment. Someone who was waiting to catch the President's eye, as he allowed the President to survey the room. Konovalov, and with his moment met, he cleared his throat and leaned closer, to tell the President what he wanted to say. For he always had something to say. \"Mr. President... If I may, I believe I have the solution.\" It was then, with the way his words and tone dipped, and the look Konovalov had on his face. He had it, he had found it. Clearly, Zakharov bit down on his own teeth. Anger seeped in, but he did his best to keep his stoic facade from cracking further. He let out a few words from this, an accusation more than anything else.\n\n\"I should've known...\" He spat, he didn't want to say the man's name. But it was on his tongue, a tongue he could bite off in an instant so he had to. He stared at him, more like glared at him. As he finished the sentence."
 RUS_phase_two.5.a:0 "Oligarchs Maneuvering"
 RUS_phase_two.6.t:0 "Oligarch's Maneuvering"
 RUS_phase_two.6.d:0 "The door into the bickering cabinet room swung open cleanly, it swung so far that it slammed into the wall as if the opener had no care for the building. Or, as if they had simply wanted to make an entrance. It was a loud one to say the least, Bulganin stepped into the room shortly after the door swung open. Everything about him was the usual for him, except this time he had a stack of papers in one hand that he kept stored at his side, he scanned the room. The first place he went was the podium, where President Zakharov normally was. Except this time he wasn't, Bulganin mused to himself softly. \"President Zakharov isn't here? How strange...\" He noted, this wouldn't be as satisfying without being able to hand the papers in his hand over to the President, but oh well. He would just have to catch him later.\n\n\"What are you up to Bulganin-\" One of the members of the room spoke out, standing up to look at Bulganin, Bulganin didn't turn immediately. Not until the thunder of footsteps could be heard beaming towards the room, then running into the room from the open door. Then another loud slam was heard as another door was opened and more men poured into the room. They were the Federal Police, under current command from Bulganin. Many members of the Cabinet began panicking, but there were a few who remained totally calm. The same few who were not under target by the Federal Police. Bulganin now finally turned to look at the man who questioned him, he couldn't remember his name currently but it didn't matter. \n\n\"Arresting those responsible for the collapse of ROSMIRES.\" Bulganin admitted plainly, as the Police now began grabbing cabinet members and throwing them down, slamming handcuffs onto them. Doing forceful arrests to those who were arrested, and equally forceful arrests to those who didn't. \"That's outrageous!\" The cabinet member exclaimed, staring Bulganin down, who looked away. Only to look at his stack of papers, scan them for a second and calmly explained.\n\n\"Oh, right... you were one of them weren't you.\" Bulganin then turned right back and without a point, just his eyes the Police began advancing on the man. With Bulganin giving a simple final order to them."
 RUS_phase_two.6.a:0 "\"Seize him too.\""
 RUS_phase_two.7.t:0 "Re-Shuffling The Cabinet"
 RUS_phase_two.7.d:0 "\"Lastly for today.\" Zakharov was tired, that much was apparent. But finally, maybe after another grueling cabinet meeting he could finally go back home. No, not home. He hadn't been there in years now, the only place he would go would be his office. At least in his office, he might be able to rest for a second. Zakharov shuffled some papers on the podium, reading some orders. Pulling others out, he did it just to look busy in part. He already knew what he was getting to, and how to do it. \"Economics Minister Konovalov, Interior Minister Bulganin. Effective immediately you have been dismissed from your positions.\"\n\nThe one quiet room now suddenly went dead, as if everyone had just been shocked by a turn of events they never once suspected in a million years, it took many a few seconds even minutes to register what was said. And Zakharov gave them that exact time, to let it get through their heads what was happening. He scanned the room, spotting Konovalov who was nearest to him in his seating, then spotting Bulganin who was clearly hiding anger, and annoyance as he looked around for any immediate options. Zakharov was satisfied with this outcome as he continued.\n\n\"The new ministers are-\" Or at least, Zakharov tried to continue. But he was interrupted, stopped by the standing of Konovalov from his chair, who looked right at the President and simply started to speak. He was always speaking, something Zakharov had grown even more tired of. \"Mr. President. I find-\" This time it was Zakharovs turn to speak, Zakharov's turn to interrupt. And he finally got to say something that he had longed to say this entire year, perhaps even longer than that. He didn't even bother to continue looking at Konovalov, he simply looked at his papers and spoke as if he was swatting away a fly.\n\n\"Shut up Konovalov.\" He didn't turn to Konovalov to see his reaction, his face as he tried to process those words. But he did hear it, he heard the moment Konovalov decided to sit right back down and went quiet. And that was all he needed, glad to be able to continue along and finish this meeting he continued. Trying to get back on track."
 RUS_phase_two.7.a:0 "\"As I was saying.\""
 RUS_civil_war_leadup.1.t:0 "鄂霍茨克港被封鎖"
 RUS_civil_war_leadup.1.d:0 "Pavel trudged through the early morning fog, the dampness seeping into his worn-out boots. The once-thriving hub of Eastern Russia now bore a desolate air, the clank of metal containers echoing through the deserted docks. His calloused hands clutched a greasy flask of coffee, the steam mingling with his breath in the frosty air. The briny scent of the sea was tainted with the bitter smell of bitter despair that hung over the city.\n\nTurning the corner, Pavel's gaze fell upon the anxious faces of his former colleagues. The notice had come without warning, a stark message plastered across the office windows: \"60% layoffs effective immediately.\" The words had been etched into the hearts of every worker in the port, and now as they huddled together, their collective fear felt not unlike the crashing sea nearby.\n\nStepping onto an upturned crate, the makeshift podium for his impromptu speech, Pavel began, \"Brothers and sisters, we stand here today not as mere dockworkers but as the backbone of this great nation! For years we have done our duty for friends, family... and children...\" His attention drifts slightly before conviction burns brightly in his heart.\n\n\"But today we have had enough!\" he bellowed. \"We've toiled in the freezing cold, given our sweat and blood to this port, and what do we get in return? Uncertainty! Betrayal! Our government turns a blind eye while the fat cats in the Kremlin line their pockets with our hard-earned money!” The crowd stirs at the words, their faces contorting with a mix of anger and desperation.\n\n\"It's time we take a stand!\" he exclaimed, raising his fist high. \"We won't be silenced! We won't be forgotten! We demand justice!\" The crowd erupted into a cacophony of agreement, their collective anger growing into a roar. The word 'strike' began to spread like wildfire, passed from one furious worker to the next, until a new chant burst out. First slowly, then with roaring thunder, it echoed through the foggy streets of Okhotsk...\n\n\"FOR DIGNITY! FOR OUR FUTURE! FOR THE N.R.M!\""
 RUS_civil_war_leadup.1.a:0 "We need to nip this in the bud. Bring in my Cabnet."
 RUS_civil_war_leadup.2.t:0 "混亂的內閣"
 RUS_civil_war_leadup.2.d:0 "In the hushed confines of the Kremlin, a soft ticking echoed through the grand hallways. The air had the scent of leather-bound documents and the subtle hum of anticipation belying the panicked situation. President Vladislav Zakharov strode into the conference room, greeted by the chaotic assembly of his ministers of state scrabbling at papers and screaming into phones desperately trying to extinguish the fire now consuming their house of cards.\n\n\"Look, we can't and shouldn't try and bail everyone out, if we do that we all go bust. The rule of the market is that you have to fight to survive, a handout weakens everyone, even if we wanted too we can't afford it. The window of opportunity for a bailout was when ROSMIRES went under and we couldn't stop that..\" The Economy Minister Konavolev shouted, darting between the phone to his ministry and his personal stock broker.\n\nPresident Zakharov leaned back into his chair, his eyes narrowing. \"I know the situation, Konavolev. What I don't know is what your proposal is to resolve it. Time is money, and our country is bleeding both.\"\n\nKonavolev collected himself, straightening his tie and regaining some of his composure, the sound of yelling emanating from his still active call.\n\n\"It's simple, pull out of the investments that are in the red, The Far-East has been a drain for ages and most of its possibilities for growth dried up ages ago, they are just dead weight. Cut our bloated subsidies and spend the money trying to stem the fiscal bleeding.\"\n\nZakharov turned looking at the man with an exasperated steely gaze, “That is at least a quarter of our citizens and a third of our territory, you can’t dump it like an underperforming subsidiary...”\n\nInterior Minister Bulganin cut in slamming down a phone that had been screaming into his ear, “I loathe giving Konavolev a point but doubt that would make the situation much worse. Local administrators are either on flights to Australia with bags of government cash or are barricading themselves against the mob.” collecting himself Bulganin continued “While most of those corrupt rats are reaping what they sowed we still have options. Ignatov and Medvedev haven’t dipped into the pot and are not hated by the people, I’m sure they can be convinced to do their patriotic duty and rebuild a modicum of trust with the people.”\n\nThe only response from the president was a sigh..."
 RUS_civil_war_leadup.2.a:0 "It seems we have little choice. Inform Ignatov and Medvedev, tell them I wish them good luck."
 RUS_civil_war_leadup.3.t:0 "Civil War Avoided!"
 RUS_civil_war_leadup.3.d:0 "unfortunatelty, this isn't intended right now, we have nothing for this path\n\nwhich means the civil war has to happen, good job anyway."
 RUS_civil_war_leadup.3.a:0 "Fuck you."
 RUS_civil_war_leadup.4.t:0 "Countdown To History"
 RUS_civil_war_leadup.4.d:0 "Senators Fyodor Ignatov and Ayhal Medvedev sat in the modestly furnished office of Okhotsk's Mayor, Sergei Sorokin, the windows framing a pattern of unrest. The crisp fall air outside carried the distant murmur of a restless crowd, their voices melding into a rhythmic chant: \"For dignity! For our future! For the NRM!\" The protesters marched in a well-behaved procession, their placards bobbing like a sea of discontented waves. Sorokin's eyes surveyed the scene betraying a hint of sympathy toward the masses outside.\n\nThe anticipation ceased when the video monitor lit up to reveal two figures, the haggard and tired Mayor of Neryunguri Boris Yushukov contrasted beside the firm and collected Colonel Kozolov of the Military Police.\n\n“Good we are all here now. Thank you Senators for joining us, I hope your presence and efforts will help calm the situation.” Sorokin said turning from the window to the seated senators and the guests on screen, “The protests are getting worse, the situation was bad beforehand but the crash has unleashed a tidal wave of the desperate into the NRM’s arms. I’ve talked with my colleagues in the group but they are struggling to keep the feeling calm and directed towards change... I fear the situation might break out into a violent revolt if all hope is lost.”\n\nSorokin bristled at the Colonel’s mention of his membership with the N.R.M. “With all due respect, we believe that your dear “Colleagues” may be actively agitating for secession, they would frankly be fools to ignore this opportunity.”\n\nSorokin brushed off the remark “Despite your fears, the NRM has only ever advocated peacefully for autonomy and representation. If I wanted revolution I would be stirring up hatred on the streets rather than sitting here, I’ve only had the police stand off to prevent confrontation and my interactions with the crowd have been calls for calm and peace. Boris has taken similar measures to keep the situation steady, though I wish my friend would go further...”\n\n“Idealism and radicalism is a young man’s game, Sergei.” Boris Yakushukov cut in, “It's not one I wish to play nor risk the lives of my wife and children doing so, let me clear I am doing this out of a desire for peace and a debt to the people who elected me even if they despise me for it.”\n\nThe debate was halted by Ignatov raising his hand and gesturing for silence, “I can see the crisis is difficult for everyone, and I am truly grateful to you three for stabilising the current situation and I believe we can help.” Ignatov gestured to his colleague Medvedev who continued. “The problem is the crisis is a national one as much as a local one and for all your good will and efforts the people still starve due to Moscow’s impotence, I believe this crisis presents an opportunity to finally end the stagnation we have been in for decades, the status-quo has broken under its own weight and now we have no choice but to change, we just need to let the people know that action is finally coming.”\n\nEveryone looked expectantly at the Colonel who sighed and responded, “I’ll find a way for you to make an address, but I must demand that you wait in the Port Okhotsk naval base for your own safety, my men will drive you there.”"
 RUS_civil_war_leadup.4.a:0 "The two senators smiled and stepped out of the office, a last step towards history for better or for worse..."
 RUS_phase_two.8.t:0 "State of Emergency!"
 RUS_phase_two.8.d:0 "Konovalov could hear how his footsteps reverberated as he walked down the hallway with a perfect stride. Looking forward, he spotted the door of the office he needed to enter. The one that he had entered so much already, but perhaps would never need to enter again. The words emblazoned on the gold plaque on the door read simply. ‘The President's Office.' As soon as he reached it, he grabbed the door knob perfectly, turned it enough and entered as he opened the way. \"Mr. President.\"\n\nSpeaking instantly on arrival he finally looked in, the office was dimly lit. None of the lights were on, and all the light beaming out the window cast a shadow onto Konovalov, he looked and saw the source. Zakharov in his chair, turned away looking out the windows towards Moscow. \"Konovalov... I should've expected you, here to make another one of your proposals?\" The President wheel his chair around, the man looked like he had no sleep. Bags were under his eyes, and his usually pristine deep navy blue suit had dirt and scuffs on it. Konovalov had a rare wry smile as he spoke to the president this time.\n\n\"Indeed I am, this one is simple.\" He relished every word he spoke, savouring the moment he got to deliver these words to the man. What he had worked so hard for, so hard to achieve was finally here, and he got to see and deliver it to the defeated man who helped him along the way. \"Grant you the control to take care of the economic recovery?\" It seemed that Konovalov would not get to deliver those words, as Zakharov answered for him. Pressing his arms onto his desks, then his hands together in a vice grip. But this did Konovalov just as well, he smiled brighter. Able to speak out quickly. \"Glad to see you understand.\" And with that, he closed the door. Not bothering to continue the conversation with the man, even though Zakharov did. Musing something to himself, in the now almost fully dark room."
 RUS_phase_two.8.a:0 "\"We both know... I had no choice.\""
 RUS_phase_two.9.t:0 "The National Fiance Commission"
 RUS_phase_two.9.d:0 "\"Bulganin.\" The man himself looked forward after hearing those words, he had only just made it past the mountains of police that were in the way between him and the dejected President Zakharov. A man, who was currently slumped over, his head looking at the frosted ground, his dirty black boots. He was sitting on a stone bench. Looking around Bulganin spotted the various pictures of the public park they were in, and the nearby government building in Moscow. From which both Bulganin and Zakharov escaped from.\n\n\"President Zakharov.\" Bulganin spoke softly, but there was a hint of firmness. He came here already knowing what to say, and he could tell that Zakharov knew too. Otherwise, he wouldn't be as dejected as he was here. His voice spoke of a hollowness, a sadness. An effort that was wasted to speak. \"Here to offer your help?\" In a way, the question was the right one to ask. Bulganin must admit that he was going to give help. But, he knew it wasn't for Zakharov or any of his hopes. Sighing, he saw his frosted breath appear as the wind caught it.\n\n\"No, as we speak my group is stepping up to lead the cabinet, while you sit out here and mope.\" His words were sharp, his words were accurate. Just now his plans that he has had in place for what felt like ages, ready the moment issues began arriving were being implemented, both for him and others. The President seemed to catch his voice, heaving in and out. He moaned out. \"I am trying Bulganin. I tried... I simply.\" The man that Bulganin had known, for this time. The stoic Zakharov, stepping up to handle and fill shoes he didn't want was gone. And instead. \"I simply don't know how much more...\" They were replaced by a defeated man, a broken man. A man that had the smallest spark still left within."
 RUS_phase_two.9.a:0 "\"I can try...\""
 RUS_phase_two.10.t:0 "Zakharovs Hopes"
 RUS_phase_two.10.d:0 "\"What of Bulganin, and Konovalov?\" Zakharov drummed out, he did his best to keep his voice stable. Not showing his worry or concern, all the while he went about tidying up his desk and office while his Secretary informed him of the news. He occasionally took a peak at them, the man was young, much younger than Zakharov. Both seeming too young, and too inexperienced but that exact look was what allowed him to fool so many people into just thinking he was only a secretary.\n\n\"Sir, they're each attempting to gain control of the situation. They're focused away from you, tearing each other apart.\" Zakharov nodded, this was the best case scenario for not just him and the nation. Even if it took advantage of the fact they believed Zakharov was too far gone to be able to provide any issue. \"That's good, it will prevent both of them from being in control.\" Finally, Zakharov opened up one of the drawers on his side cabinets. Pulling out an already closed and fully prepared suitcase, while he looked like complete crap. Dirt, and dust gathered on his suit from not just the cleaning, but sleepless nights where he didn't change, he was beginning to be more ready than ever.\n\n\"Sir.. Where are you going?\" His assistant noticed his look, noticed his suitcase and realised what that meant. Zakharov walked up to him, and handed him his set of keys for his office. Zakharov did not intend to spend another minute in this office if he could help it, he aimed to help his nation. Help his people the only way now, with the only hope he has. \"Prepare my messages to the E.U. and schedule a trip to Paris for after this is dealt with.\" Bringing the assistant along as he began to walk to the door, he was truly considering. If he could do this, if this is what he was meant to do all along. Or if this was simply him rectifying mistakes to begin with. He mused, finally he turned and took one last long look at his office, preparing only to come back with restored Russia, or not come back at all. Musing to himself quietly."
 RUS_phase_two.10.a:0 "\"I can do this.. Lebedev.\""
