 RUS_phase_one.29.t:0 "政府安全調查辦公室"
 RUS_phase_one.29.d:0 "\"I assume, Director, you know why I'm here.\" Zakharov looked at Yevgenny Kirov as he spoke, he had just stepped into a room at first he assumed was the wrong one. It was small, it was cramped. He felt like every corner he looked was filled with cobwebs and spiders, the man himself did not look how he imagined. Kirov looked rather just like a simple bland bureaucrat, nonetheless this further proved to him how much the CSRO needed to expand to fit Russia.\n\n\"Yes, President Zakharov. I had an inkling.\" The man had a droning voice, he reminded Zakharov of one of his old teachers from when he was still a boy, his entire appearance really did. Bald, with both eyes slightly getting pale in them, he almost thought the right one was entirely missing at first glance. In its place a fake. Zakharov collected himself, then sat down in the small wobbly chair by the Directors desk. \"I'll be straight with you then, I was hoping to expand the CSRO. Make it a proper agency.\" Kirov didn't have the surprise that Zakharov expected, and instead simply turned away and found one of his filing cabinets in the corner of his office, Zakharov was surprised. Worried that Kirov hadn't heard him, he opened the drawer and began rummaging.\n\n\"Something a matter?\" Zakharov now really didn't know what to think of the man. He came back quickly, holding in his hands a massive packed file, old and dusty, clearly not touched in what might've been centuries. Zakharov raised an eyebrow as he brought it back to the desk and placed it down in front of him. \"Here, my entire document for my proposal of a CSRO expansion.\" Zakharov let out a rare chuckle, he opened it and flipped and the Director was right. It had detailed lists and lines, every penny spent, every employee recruited were all listed. Clearly the Director knew more then he let on, and expected more too."
 RUS_phase_one.29.a:0 "\"Well played. I accept your proposal.\""
