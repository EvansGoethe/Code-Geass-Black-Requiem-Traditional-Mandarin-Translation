 RUS_phase_one.1.t:0 "扎爾科夫的統治"
 RUS_phase_one.1.d:0 "Zakharov had attended numerous presidential inaugurations throughout his lifetime as one of the handful of party figures who sat in the front row applauding another inevitable victory for the KDPR. Now, he stood at the podium alone. The amalgam of functionaries he once intermingled with now looked at him as if he was on the other side of the world. He could scarcely breathe, grasping the side of the podium and trying not to squirm in the face of the television crew's lights. A deathly silence permeated the hall, only pierced by the clicks of various photographers' cameras from the back of the room. The moment—seemingly frozen in time—resumed when the court judge placed a copy of the constitution in front of him. Without a single thought or feeling, Zakharov placed his right hand on the constitution and raised his left in the air. Each movement felt unreal, as if propelled by a force beyond his control. Taking a deep breath, he recited the oath of office which would confine him to the annals of history. As each word tumbled out, he thought less and less of the meaning of his oath and more so of why he was here. \"I hereby swear to exercise the executive power of the Russian Federal Republic...\" ‘The Presidency—a position everyone here would kill for. Hell, some almost certainly have in their attempts to gain it. Now I stand here alone with this power I never wanted thrust into my hands at the cost of losing what I never could...' \"...to protect and preserve the constitution and systems of our Republic...\" ‘Why do they want this? Why did Alexei even want it? To sit atop the throne of a broken land? To be the most powerful man in a powerless country that's still being held hostage by its past victors?' \"...to defend the safety and security of our democracy...\" ‘Alexei... Why would you choose to die for this position? What possible reason would justify leaving Natalya and Evgeny behind? Leaving me behind? Was it because you trusted no one to replace you? If I knew it would go like this, I would have stepped up for you more...' \"...and to faithfully serve our people...\" ‘Maybe you were the only one who ever tried in earnest... For you, Alexei, I'll try.‘ As he finished reciting the oath, Zakharov lowered his hand, and the audience broke out in polite applause. All around him, he saw only an army of sycophants preparing to adjust their plans for power in the face of an unexpected change. Zakharov ignored them—he had dealt with their kind before. He hadn't been chosen as the vice president for his looks or charms. He was President Lebedev's confidant, a party veteran, and perhaps the only man Alexei trusted. As Zakharov exited the hall, he was surprised to find his mind churning. His brain jumped to Russia—its economy, the failing administration, the economic woes with Europia. All the vast, insurmountable obstacles that had piled up over decades of stagnation were now his to try to climb and conquer. Zakharov wanted to run from this burden, but he sat in this position not by his own mandate but by that of Lebedev's. He couldn't turn back."
 RUS_phase_one.1.a:0 "For the sake of Lebedev, I must attempt the impossible."
 RUS_phase_one.2.t:0 "列別捷夫的遺產"
 RUS_phase_one.2.d:0 "To Vladislav Zakharov,\n\nI pray that you will never have to read this letter. I hope that you and I will enter the Kremlin renewed and in good health to carry my third term forward. However, I am sure it hasn't escaped you that my health has been in a perilous state for quite some time. While I am confident I have one more term left in me, it would be irresponsible to not account for the possibility of me being unable to make it to office. So, if you are reading my words now, it is safe to say I have died, leaving the burdens of the state upon your shoulders.\n\nYou are so diligent and insightful. I have no doubt you have already decided to take on the great sorrows of Russia by yourself. I have only been able to stem their bleeding, let alone heal our homeland. I will not demean you by recounting to you the fundamental code or precepts of the presidency. These things are select to the individual and will come naturally to you as they did to me. Instead, I will leave you a practical legacy—an arsenal which I hope enables you to weather the storms to come.\n\nThe center of the party will fall in line behind you. I never told you, but I had been solidifying you as my natural successor for a while. Therefore, you already have a third of the establishment backing you. The leads will know to meet with you and that you have my posthumous endorsement. After you meet with them, call Stanislav and ask him for his \"special dossier.\" I've had him working on it for some time now. Use it to persuade the Federal Council to be more cooperative. And finally: Europia. I know even a supporter like you has likely begun to lose hope after the countless times our constitutional and monetary reforms have been flatly vetoed by Europia. It is likely they will falter more when you take office, but don't stop applying pressure to them. I've been wearing them down for years now and can tell they are close to accepting our reforms. The Germans are with us, and we are close to winning over the Danubians as well. With that, we can finally push reforms through with a majority voting for us.\n\nI hope this legacy of mine can aid you in overcoming the monumental tasks which lie before you. I trust you will perform your duties to the best of your abilities, so I will only request one thing from you: tell Natalya I'm sorry. Tell her I'm sorry for being such a damn old fool, one who would choose to die for this stupid office and leave her all alone.\n\nThank you, Vladislav. I trust that Russia will be safe in your hands."
 RUS_phase_one.2.a:0 "On an eternally stoic face, tears begin to flow."
 RUS_phase_one.3.t:0 "切爾尼科夫"
 RUS_phase_one.3.d:0 "In the midst of all the high-rise meetings and yacht parties attended by many of the movers and fixers of Russia in their attempts to assess if President Lebedev's death had become a crisis or an opportunity, two figures conducted their schemes in a fashion more akin to old Russia, sharing a bottle of vodka in front of a dacha fireplace. Interior Minister Bulganin, a bespectacled man of around 50 with cropped and neat blonde hair, sat in a high back leather armchair across from aging former President Vicktor Chernikov. Chernikov, Minister Bulganin mused, was infamous in the circles of the KDPR. During the former president's one-and-a-half terms in office, he had ruthlessly suppressed the DSU during the Red Crisis of 1981. His attempts to expand presidential security powers and nationalise key industries nearly split the party until nationwide violent protests led to his downfall in 1989. Now, he plays the puppet master, controlling his so-called \"Reformist\" faction from his self-imposed rural exile with Bulganin as his protégé. The two men talked about the changing situation and the unique opportunity it presented the Reformists to push back against the Establishment caucus until the question of the new president came up. \"I'll admit, Vicktor, I don't know much about Zakharov. He is sort of a grey bureaucrat in the party from my understanding,\" Bulganin contemplated. \"Zakharov was never a man I gave much notice to,\" Chernikov said, looking up at the rafters, \"though I was aware that he always was that dog Lebedev's favourite.\" Bulganin mildly recoiled at the vitriolic fervour with which Chernikov spat his old rival's name. Bulganin knew of Chernikov as a collected and cool political operator, driven by his vision rather than ego or vanity. But Chernikov's fall mostly came down to Lebedev turning on him, and the matter was very personal. \"Regardless,\" Chernikov said, returning to the matter, \"keep in his good graces for now. We can't give him a reason to throw you out. We need our own foot in the door if we're to kick Lebedev's lackeys out of the KDPR once and for all.\""
 RUS_phase_one.3.a:0 "These old scores have yet to be settled."
 RUS_phase_one.4.t:0 "軍閥"
 RUS_phase_one.4.d:0 "Over 200 years ago, Saint Petersburg was founded and developed into a metropolis as part of Peter the Great's dream of modernising Russia to match the rest of Europia. In 1965, the combined armies of Europia levelled the city that had been modelled in their image, turning it into a grave to communism and a warning to those who would challenge the Europian order. 50 years later, Saint Petersburg has once again been reconstructed in the image of the West, but instead of gold and stone, it is now a city of glass and steel. Ironically, it has also become a monument to the inertial power of capitalism.\n\nOne building that still reflects the style of the imperial centuries is the reconstructed Winter Palace, a building originally intended to be a museum now serving as the bejewelled nest of Saint Petersburg's city government. Within its regal halls, the interests of oligarchs and government intertwine in an orgy of corruption and greed. Saint Petersburg's young upstarts, once the dreamers and schemers of the 1990s, have now transformed into the entrenched interests of wealth and power they once fought against.\n\nOf these people, the most prominent is Matvei Konovalov, the former mayor of Saint Petersburg, the current Minister of Economy and Development, and the de facto leader of this conclave of plutocrats. He walked the palace's golden halls, hearing out the many concerns of his associates:\n\"Is the President willing to talk?\"\n\"He isn't in league with Bulganin, right?\"\n\"Will he continue with the rail privatisation?\"\n\"Can we use this to stall the KosmosCom investigation?\"\n\"He better not have any ideas about messing with the market...\"\n\nMatvei knew the unexpected death of a presidential candidate and the elevation of his lackey had caused a stir amongst his club of friends, but overnight, he dispelled his colleagues' cacophony of concerns, successfully steering their attention back to yachts and mistresses.\n\nHe knew whoever held office rarely mattered. After all, humans are materialistic creatures and can always be convinced to take a course of action that benefits them. In the end..."
 RUS_phase_one.4.a:0 "\"Money controls power.\""
 RUS_phase_one.5.t:0 "反對派增長"
 RUS_phase_one.5.d:0 "CSRO report on dissident threats to the Republic, for the Office of the President,\n\nAll-Union Communist Party (VKP): The organisational and ideological descendants of Ivan Katunin's Soviet state, currently sheltering in Kazakhstan where they have resided since their defeat and ousting by the KDPR in 1965. The party helms one of the largest military forces in the Kazakh frontier whose presence is tolerated by the Kazakh government in return for assistance in anti-warlord operations. Though they are a notable military threat, they do not have enough manpower to cross the border defended by the RSDF and Europian units. Reports from our spies in Alma-ata report that Party Chairman Yakov Katunin (who has led his brother's party since its exile) has gotten increasingly ill and is unlikely to live for much longer.\n\nRussian National Front (RNF): This alliance of right-wing parties that failed to pass the election threshold would be of little note if it weren't for their leader, Mikhail Astakov. Astakov won the 1999 Ekaterinburg mayoral election by riding a wave of anti-Europian sentiment following a mass industrial layoff. He has since tried (and failed) to get into national politics, always making headlines but never taking seats as every attempt to unite the far-right has collapsed into infighting. Informers from within his office have reported that he has taken a recent interest in monarchism and locating a Romanov heir. Astakov can easily be countered by our usual electoral measures, but his connections to right-wing paramilitaries justifies full monitoring.\n\nPeople's Liberal Justice Party (NLPS): The NLPS is the largest opposition party in the assembly, controlling 28% of the seats. The party used to be an old liberal party but has gone through numerous mergers and renamings since the late 1960s. Currently, the party sits in the political center, having shifted their platform to appeal to the moderate left since the early 2000s. The current party leader is Grigory Ignateyev, a former lawyer and anti-corruption campaigner who was elected to balance the party's left and right wings. The party has proven impossible to dislodge but is struggling to achieve national popularity or electoral success. The party has known connections to numerous human rights and activist groups that are on our watchlist. We also suspect they've been taking money from the Europian liberal movement.\n\nNational Renewal Movement (NRM): The NRM is a rather schizophrenic movement that has grown due to generalised anti-government sentiment in the Far East. The NRM has numerous followers, regional mayors, indigenous groups, trade unions, businessmen, and activists ranging from far-left to far-right. Currently, the NRM fails to pass the electoral threshold as its support is primarily based in sparsely populated regions, but they have almost entirely pushed the KDPR out of local government in the Far East. If they continue to gain a foothold there, they may make a push for greater autonomy or possibly even independence.\n\nAdvice on handling these groups as well as detailed threat assessments to follow on pages 12-38."
 RUS_phase_one.5.a:0 "\"May Russia rest safely in your hands.\""
 RUS_phase_one.6.t:0 "Federal Councils Grasp"
 RUS_phase_one.6.d:0 "Zakharov quietly groaned as he watched motion after motion in the Federal Council get voted down. The results weren't what irked him—the obstructionism of the regionally appointed Federal Council had been a political fact he'd dealt with for decades in the KDPR. What sickened him was how blatant it was and how much they revelled in it. With each blocked motion, he could see the eyes of the councillors around him twinkle as they imagined what concessions they could pry out of him for the inevitable revote. Funding for a local infrastructure project, state investment into their cousin's construction firm, some electoral nudging, or even an overt bribe—every councillor wanted something, and they were more than willing to hold the government hostage until they received it.\n\nAs the session went into recess and the vultures filed out to prepare their demands, Zakharov leaned back in his chair and began to kick into gear as the veteran politician he had become. Two decades of working in politics had made calculating moves to deal with such men laughably easy, but as he contemplated what concessions he could afford to give, a thought suddenly struck him. A small passage in Lebedev's final letter to him, one which he hadn't had time to fully investigate due to the whirlwind of activity and grief following his mentor's death, came to mind: \"Stanislav's Dossier.\"\n\nZakharov recognised the name as that of an old party fixer who Lebedev had worked with back in the '80s. Apparently, Lebedev had asked him to gather kompromat on the federal councillors. As the clock struck 2 PM and the vermin in suit and tie began to file back in, Zakharov hastily turned to his assistant and said..."
 RUS_phase_one.6.a:0 "\"Call Party HQ. Ask for Viktor Stanislav. Tell him Zakharov needs Lebedev's parting gift.\""
 RUS_phase_one.7.t:0 "污點"
 RUS_phase_one.7.d:0 "The clock struck 01:00 in the President's office, once more bearing witness to Zakharov's endless nights. For once the President was not doing paperwork, he finished his work hours ago. Instead, he sat alone, tapping his fingers rhythmically on his desk waiting for a dossier important enough for Lebedev to mention in his last letter to Zakharov. A few minutes later an aid slid the door open and after the formalities, left a thick bundle of files encased in a grey sleeve. Zakharov turned over the bundle and removed a small note clipped to the files, it read \"To Vladislav Zakharov, I trust you shall make good use of this, if not better use, than Lebedev would have. Your old colleague, Viktor Stansislav.\" Placing the note tenderly on his desk, Zakharov then unbound the file and flicked on his reading light. For the next 5 hours, Zakharov sat enwrapped in what must have been the most complete and thorough kompromat file in Russian politics. Every transgression, corruption, deviancy and incompetence of each federal councilman was recorded diligently by Stanislav, each case accompanied with cited links to evidence buried in party archives. It did not just stop with the councilors, it also dug into the dirty secrets of the governors who appointed them, effectively ensuring this file could be used in case of replacements. Almost every man could be implicated, bar a few who may have been honest or more likely were in a class of their own at hiding evidence. Zakharov noted each file, together they could lead to hundreds of arrests, dozens of divorces and millions of euro's worth of fines and several lifetimes of political office bans. He was alerted in the morning around 6:00 when a surprised cleaner found the President had not slept all night. From there, he set about placing the pieces in motion. It was a dirty game he was about to play but no one sat in the President's chair with clean hands. Over the course of the morning, aided by coffee and adrenaline the President dispatched his agents of blackmail to subtly coerce and control the council. By the afternoon, the federal council was in session and Zakharov went over to see Lebedev's last gift. And the results were clear..."
 RUS_phase_one.7.a:0 "All motions passed unanimously..."
 RUS_phase_one.8.t:0 "日本的提議"
 RUS_phase_one.8.d:0 "Zakharov leaned back in his seat and surveyed the panorama beyond the glass window. From the 110th floor of the ROSMIRES tower, he could see the entirety of Moscow laid before him. The Kremlin, the centre of his world, seemed like nothing more than a small patch of light within the cityscape from the perspective of ROSMIRES. \"Mr. President, it's a pleasure to have you here,\" ROSMIRES Chairman Alexsandr Zinovy said while striding into the room and taking a seat at his desk. \"I apologise for the wait. The board meeting overran its allotted time.\" Zakharov eyed the man up and down. The presidency didn't afford him the strongest position of power, but even the most influential oligarchs would usually come to him out of respect for the office. But Zinovy was no mere oligarch—he was the head of Russia's most powerful corporation and held a significant portion of the Russian economy under his control. Regardless of Zinovy's influence, however, the government still maintained a sizeable stake in the company.\n\nZakharov stood up and shook the man's outstretched hand. \"Thank you for taking the time out of your schedule to meet with me, Mr. Zinovy.\" \"Not at all!\" the chairman responded, gesturing to the seat in front of his desk. \"ROSMIRES is always prepared to hear the concerns of its largest shareholder, although today we're discussing what we can do for you.\" Zakharov nodded for him to continue, somewhat interested in whatever \"deal\" ROSMIRES was offering. The chairman pressed a button on his desk, and the painting behind him slid down revealing a large widescreen monitor. After a moment, a shining, pink crystal appeared, illuminating the room. \"Sakuradite, Mr. President. Our economic projections expect it to become the primary strategic energy resource, overtaking oil and gas by 2015 at the latest, maybe even sooner. If we fail to adapt, we expect a downturn in profits of up to 42%. However, we believe we can get in on the ground floor.\"\n\n\"But our accessible Sakuradite deposits are not competitive with Britannia's, let alone Japan,\" Zakharov responded, \"and I doubt either would be willing to sell.\" Zinovy flashed him a foxy grin. \"Sell? No. But we do have an 'in' with the Japanese. The Kirihara Group holds the majority of Japan's Sakuradite mines, possessing an effective monopoly over the resource. However, our own geological surveys believe they are currently only able to utilise 40% of their potential deposits. Taizō Kirihara knows this and has signalled his willingness to form a partnership with us.\" \"What are the terms of this partnership?\" Zakharov asked curiously. \"A stake in profits generated from the mines in exchange for a vast investment of our labour, machinery, and expertise. In total, they are offering us 25% on all returns from Sakuradite mining operations we assist them with going forwards.\"\n\nZakharov struggled to maintain a straight face, using all of his effort to remain collected. He was no fool; the Sakuradite industry was worth trillions, and an ongoing stake in it would generate billions for ROSMIRES shareholders. \"So, what is it you need, Mr. Chairman?\" Zinovy leaned back in his chair, his fingers interlocked. \"We need capital, and lots of it, Mr. President. To afford the buy-in for this partnership, we need billions if we want to become an indispensable asset. Alongside clearing the trade barriers, I need the state to invest its worth. If the state can front 35% of the cost, the private investors we've convinced to sign on should make up the difference.\" \"That's a huge risk, Mr Zinovy. I'd have to negotiate the state contribution—\" Zakharov tried to explain before Zinovy raised his hand to interject.\n\n\"Of course, but if you truly wish to turn this rotten state around, you'll have to go all in. So, what say you, Mr. President?\" Zakharov weighed his options for a few moments before making a decision that would change Russia's course forever."
 RUS_phase_one.8.a:0 "\"Very well, Mr. Chairman. You've got a deal.\""
 RUS_phase_one.9.t:0 "京都協定"
 RUS_phase_one.9.d:0 "CUT"
 RUS_phase_one.9.a:0 "CUT"
 FRA_from_other_nations.1.t:0 "The Euro-Rouble Suggestion"
 FRA_from_other_nations.1.d:0 "Softly, the door swung open into a large office. It was massive, bigger than need be. A long rectangle, with the only door at one end it would take a short jog to reach the other end. Which had the windows looking out into Paris with the Eiffel tower in view. \"President, a request for you. From Russia.\" The president looked up, he was in the middle of a set of three desks, each was strewn about with paper work, but not just paperwork. Pens, files, tablets with more files. The workload that the president was trying to get through, truly did need three desks. Two of which had assistants at them, passing along files elsewhere once the president got through them.\n\n\"Leave it on my desk.\" Edouard spoke agonisingly slowly, in his thick French accent. He dragged on his words as he held a tablet up to his face, running his fat fingered hand through his slick back hair, that was creasing at the sheer effort it was to work on so much at once. He barely registered the man who had entered and began approaching him, in perfect strides. Though he recognised one thing about the man, his German accent. \"It seems... urgent.\" Edouard scoffed as he thought, handing the tablet off to his silver haired assistant to his side. ‘Must be a new messenger.' He thought they had multiple running at once, and this one clearly didn't understand the value of the president's time.\n\n\"Fine, fine. Hand it here.\" He said reluctantly, turning to the man who had come right up to him, while he was in the middle of all three desks facing him. Edouard snapped up the offered tablet from his hands, he often wondered what a waste of resources it was to have them all on separate messages. But he did see that it had some value, it made it more apparent how much work he had. He chuckled in his own mind at the thought, beginning to read what was on this one. Surprised when he saw the opening few paragraphs, and the title to begin with. \"...Urgent you say? They're just suggesting the same thing they've suggested to me a dozen times by now.\" The president was more than slightly annoyed now, but he hid it as he put his free hand to his fat chin. It was a suggestion from Russia, something useless about trying to do something with their economy. This time around he barely even read their plea, not to have his time wasted like the last time. He placed the tablet on a pile of unimportant work."
 FRA_from_other_nations.1.a:0 "\"They better not ‘suggest' again.\""
 RUS_phase_one.10.t:0 "經濟轉型"
 RUS_phase_one.10.d:0 "Through puffs of cigar smoke, Zakharov sat at the head of a long table. Not merely a right hand man to Lebedev, this seat now belonged to him. Further down the table were his cabinet. Sat amongst them were Grigory Bulganin belonging to the reformists, as well as Matvei Konovalov who was the face of the Saint Petersburg Clique. The stench in the air was as vile as the corruption seated in this room. Throughout this debate, the subject had been purely one of economic policy. It was a vicious, yet subtle viciousness that dominated the conversation. Everyone had their own stakes to look out for. For Zakharov, it was his mentor's legacy. To continue working with Europia to ensure Russia had a future, that was the vision of himself and Lebedev. However, those two who sat amongst this group of politicians were in direct opposition to his vision. Bulganin and Konovalov, both the faces of their respective parties. Konovalov pressed the butt of his cigar directly into the table, a lack of regard for damages. \"Russia has plenty of untapped resource deposits, President. Russia would no longer be fighting for scraps at the international table if we took advantage of them. Can't you see that?\" Zakharov, with his hands clasped in front of his face, spoke next. \"I would be neglecting the opportunity to make deals with Europia. We need to maintain closer ties.\" Zakharov rested his eyes. \"To hell with Europia,\" Bulganin interjected. \"What have they done for us other than hold our constitution hostage? We need change and we need to do it ourselves.\" Zakharov kept his hands clasped together, his eyes closed against the storm of disagreement. The conference room began to crescendo in a cacophony, those same disagreements rising. However, as the president, he had to make a delicate choice. To stand firm in the face of this opposition and maintain his own vision or appeal to the ideals of his counterparts. What course of action was best and who would it suit?"
 RUS_phase_one.10.a:0 "\"One way or the other, Russia must regain its footing.\""
 RUS_phase_one.11.t:0 "歐洲的協議"
 RUS_phase_one.11.d:0 "Zakharov slumped into his chair and took in the golden design of his dusty, ageing office. He could understand their frustration. The terms of partnership between Russia and Europia have long been unequal, but that was exactly the trend he wished to change. They labored on those negotiations for years, spending many long nights in Berlin, Paris, and Vienna back in the late 90s. A process of slow and gradual change, history made in measured steps, not sealed by handshakes and camera flashes but by nondescript, backroom talks and small pacts forged over wine and bread.\n\nHe had been a loyal servant of Lebedev back then, the diligent messenger of his grand plan to amend 40 years of stagnant relations with Europia. Now, the master and mentor is gone, leaving him all alone in a grand castle, its renovation and care entrusted to him. The clock struck 2:00. The old Tsarist relic's chime reverberated inside his shaking skull, serving as a reminder that a saner man would have gone to sleep a long time ago. The plans have to work. It is no longer in Europia's best interest to keep Russia as its geopolitical and economic slave. The Germans accept our moral argument, the Danubians are caving to our pressure, and even the French are seeing the \"positive implications\".\n\nBut what if it was all pointless? What if the grudges caused by the previous Tsar and the Soviets remain deeply rooted in the heart of Europia? Could rational, present-day realpolitik be clouded by ancient Russophobia? As Zakharov agonized over the possibilities, he came to a realisation: what if there's some Machiavellian reason to keep us under their rule that the Europians have hidden from us, that any growing hope might be nothing more than some centennial plot of their Kafkaesque bureaucracy?\n\nA buzz from his desk phone shook him from his doubt-filled paranoia. \"Sorry, Mr. President, but Minister Orlev has just returned from the Europian Energy Conference. Shall I put him through?\" his secretary queried. Zakharov took a deep breath and centered himself. What good would come from wallowing in paranoia when he has a job to do? For Russia and for Lebedev, he would see this plan through. Leaning back, he accepted the call and spent the next two hours talking about energy tariffs with his foreign minister."
 RUS_phase_one.11.a:0 "\"Work diligently, Mr. President. Russia needs you!\""
 RUS_phase_one.12.t:0 "長期適應"
 RUS_phase_one.12.d:0 "\"President, you should realise the E.U. will never accept proposals for an independent Russian currency.\" Konovalov's words were ended by accident, from the chime of the ancient clock in Zakharov's office. He almost instinctively reached for his desk phone, expecting a ring. But none came, allowing him to slump into his chair, leaning into the fine leather fabric. Thinking enough in comfort to let him respond. \"And if we pass along your proposed finance and tax reforms. We'll become a tax haven for Europian corporations, which will lead to profit...\" Zakharov droned his last part on, knowing by the time that he rested his head onto his right frigid hand and looked up at Konovalov he would wish to respond. Respond he did, with but a single word.\n\n\"Precisely.\" Zakharov nodded along, as he studied Konovalov closely, he didn't struggle trying to find things to think about the man. He struggled in that he had too much to think of the man, of how he acted, of how he presented himself. Yet, Zakharov was glad to admit one thing. He knew how to do his job at least, but Zakharov also knew how to do his. How to avoid certain issues, and so was drumming the two ideas over in his head. Speaking out softly as he affixed his gaze to the clock, still ticking in his office.\n\n\"Yet, it would be at the cost of some hostility from other E.U. nations. Am I right?\" Leaving the question open, Konovalov didn't respond immediately; he followed the president's gaze to the clock. Then brought up his own wrist, to admire his own watch. Much cleaner, and much newer than the old relic. Dropping his gaze from that he recollected himself and admitted one thing that was sometimes far from the truth. \"It is your call to make, President.\" Zakharov internally chuckled softly, his choice to make this time. Which also meant his blame to take, he stopped leaning back now and leaned forward, reaching for his desk phone on purpose. Dialing in a few numbers, the ring was loud.\n\nYet, he didn't raise his voice when he spoke. Not to a new person on the phone, it after all had yet to connect but instead to himself."
 RUS_phase_one.12.a:0 "\"Keep digging a tunnel... or dynamite it wide open.\""
