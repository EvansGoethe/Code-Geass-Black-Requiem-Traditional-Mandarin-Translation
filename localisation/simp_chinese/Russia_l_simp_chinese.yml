 russiaCW.0.t:0 "An End To An Era"
 russiaCW.0.d:0 "Alexi stood at the edge of the bustling crowd, his heart racing with anticipation. He had arrived early, eager to hear the senators speak and greet several of his friends who hadn't been granted leave from the Army like he had. As an officer on a brief vacation, he felt a mix of relief and guilt seeing his friends still in uniform, not that he was complaining of course.\n\nHe had grown up in this port town, and the base had always been a part of the fabric of his life. As a child, he would run along the pier, chasing seagulls and dreaming of the adventures the ships must have seen. Now, as a member of the NRM, the base was a symbol of something more—it was the heart of the change he and so many others had been fighting for.\n\nThey had come from all walks of life—miners with dust-streaked faces, business owners with furrowed brows, and even government workers seeking justice. They were united by a shared belief that the status quo had failed them, and today was the day their voices would be heard.\n\nThe loudspeakers crackled to life, the static cutting through the cacophony like a knife. The booming voice of Senator Ignatov filled the space, echoing off the towering cranes of the dockyard. \"Citizens of our great nation,\" he began, his tone solemn yet resonant, \"today we stand at a crossroads. For too long, the corrupt and the complacent have held the reins of power, leading us down a path of decay and despair. But fear not, for we are here to steer us back onto the course of progress!\"\n\nThe crowd roared with applause as the senator continued when, without warning, the ground beneath his feet trembled and a deafening roar tore through the air. Alexi's world plunged into chaos as a massive bomb detonated deep within the naval base with a terrifyingly awe-inspiring flash. The force of the blast sent him sprawling, the world around him disintegrating into a blur of fire, smoke, and debris. His ears rang, and his vision swam with the chaos. The crowd's cheers turned to screams of terror, and the once-steady perimeter of soldiers seemed to just... evaporate.\n\nAlexi's head pounded with the rhythm of his racing heart, but his instincts took over. His military training kicked in as he forced himself to his feet, stumbling over the debris. The confusion around him was absolute, but he had a mission—to help those who had come seeking change. He staggered through the destruction, his eyes searching for any sign of life amidst the wreckage. The smell of burning rubber and flesh was nauseating, but he pushed on, ignoring the cries of his own pain and those mourning the people whose dream had died with them."
 russiaCW.0.a:0 "Just one more... please let me save just one more..."
 russiaCW.1.t:0 "Situation Report Explosion in Okhotsk"
 russiaCW.1.d:0 "URGENT MILITARY COMMUNICATION TO THE OFFICE OF THE PRESIDENT\nDate/Time: Redacted, 19:07 Local Time\nFrom: Col. Viktor Kozolov, Military Police\nTo: President Vladislav Zakharov\n\nAt 19:07 hours, Senators Fyodor Ignatov (Okhotsk Oblast) and Ayhal Medvedev (Yakutia) arrived at Port Okhotsk to address the escalating civil unrest. Due to the high risk assessed by the security team, both Senators were redirected to Port Okhotsk Naval Base for their protection.\n\nA crowd estimated at several hundred thousand individuals surrounded the naval base and exhibited hostile behavior. Most RSDF guards abandoned their posts, and the small contingent of EU naval infantry withdrew to safeguard the docked Pacific Fleet vessels. Senators Ignatov and Medvedev decided to address the crowds to stabilize the situation which had a significant effect in de-escalate the situation.\n\nAt 19:58 hours, a significant explosion occurred, originating from the ammunition depot located a few hundred meters behind the armory. The blast resulted in extensive destruction to the facility, with the ammunition depot, barracks, and armory being entirely destroyed. Search and Rescue operations are still underway; however, initial estimates place the dead at between 800 and 1000 men, women, and children. Additionally, we can confirm that Senators Ignatov and Medvedev were killed in the blast alongside 15 security officers, 8 RSDF troops, and 5 EU naval personnel. The frigate EUS Aquitaine sustained serious damage but was the only EU ship in port as the Pacific Fleet was engaged in shadowing Britannian Naval Forces.\n\nPreliminary findings indicate the explosion was deliberate, with traces of a makeshift explosive device discovered at ground zero. The specific origin and perpetrator of the device remain unidentified.\n\nThe situation in Okhotsk has deteriorated beyond immediate control. Rioting, gunfire, and lynching have been confirmed at the city center and I can confirm that several patrols have joined the mob. I have ordered all available forces to withdraw behind the garrison walls and I have requested reinforcements from the reserve station at Ushki.\n\nCol. Viktor Kozolov, Military Police"
 russiaCW.1.a:0 "Godspeed Colonel"
 russiaCW.2.t:0 "Situation Report - WE HAVE LOST CONTROL"
 russiaCW.2.d:0 "Mr. President,\n\nWe promised the people that we would provide safety to their Senators... we were wrong. We expected the deaths of Senators Fyodor Ignatov and Ayhal Medvedev, alongside all those innocents at the site of the explosion, to illicit some feelings of solidarity or a time of morning... we were wrong there too. Now, three days after the catastrophic loss to our nation, I regret to inform you that we have failed to restore order to our city.\n\nThe situation in Port Okhotsk has deteriorated beyond my worst fears as long-simmering tensions within the National Renewal Movement have finally boiled over. It seems as though the last hope these people had were issuing their grievances with their now departed Senators but with the administrative chain being broken, so too it seems has any remaining loyalty to Moscow.\n\nThe streets are filled with tens of thousands of enraged citizens and an ever-increasing number of defectors, both officers and rank and file alike. This is not mindless destruction; damage to public property is minimal... Instead, the National Renewal Movement, driven by a sense of betrayal and long-standing grievances, is targeting those few who have put up in their eyes the biggest roadblocks for their cause. Known opponents are being dragged from their homes and workplaces before facing beatings, mock trials, and imprisonment.\n\nDesertions within our ranks have reached alarming levels as our RSDF garrison of 5,240 have dwindled to a little over 410... a number I fear will lower with each day. Soldiers born and raised in this region, sharing the beliefs of the rioters, are defecting in droves. Officers and enlisted men alike are abandoning their posts to join the masses for which they are cheered and looked up to.\n\nReinforcements from Ushki arrived a few hours ago. Initially, there was hope that they would help restore order... though that was not to be as the people reacted with nothing short of jubilation. Currently, they have formed a perimeter around City Hall and I can confirm with my own eyes that Colonels Volkov, Vasiliev, and Admiral Drozd have entered the building of their own volition.\n\nI have attempted to reach out to other reserve stations, airbases, and army installations across the region for aid but the responses have been dishearteningly consistent. Either they are reporting similar unrest and defections spreading across the small towns like Mokhsogoliokh and Yukusk... Or in the case of Neryungri... they are not responding at all.\n\nIn light of these events, I regret to inform you that this will be our final communication. Gunfire has just broken out at the perimeter between Loyalist and now traitor forces. The naval base has fallen. I have ordered the destruction of sensitive documents and equipment to prevent them from falling into hostile hands. My remaining loyal officers and I will hold our position to the last.\n\nMay Mother Russia be in safer hands than our own...\n\nCol. Viktor Kozolov. Military Police"
 russiaCW.2.a:0 "What have we done..."
 russiaCW.3.t:0 "Siberian Riots"
 russiaCW.3.d:0 "URGENT MILITARY COMMUNICATION TO THE OFFICE OF THE PRESIDENT\nSubject: It’s Now Or Never\nFrom: Office of Internal Development\nTo: President Vladislav Zakharov\n\nMr. President,\n\nThe riots in Okhotsk have now spilled over into the East, with Novosibirsk becoming the latest epicentre of escalating unrest. Capitalising on the chaos, trade unionists and workers groups have begun to coordinate widespread industrial action and provided support organising attacks on government institutions.\n\nThe commander of the Siberian Military district reports logistical issues, desertions and lack of resources has meant the Kazakh border station is unable to function. Our informants in Alma-Ata have alerted us to an uptick in Communist activity across the border in spite of Yakov Bunin’s death. We fear that if they use the unrest to attempt an excursion into Russia we won’t be able to stop them.\n\nMay Russia be in safe hands,\n\nGrigory Bulganin\n\nMinister of Internal Affairs"
 russiaCW.3.a:0 "The Police will address this. You worry too much Grigory."
 russiaCW.4.t:0 "Tsarist Revolts!"
 russiaCW.4.d:0 "URGENT MILITARY COMMUNICATION TO THE OFFICE OF THE PRESIDENT\nSubject: It’s Now Or Never\nFrom: Office of Internal Development\nTo: President Vladislav Zakharov\n\nIt is with great urgency that I report the outbreak of new riots in Ekaterinburg. As you are aware, the unrest in the Far East and Siberia has already severely destabilized these regions. Now, with Ekaterinburg descending into chaos, we need to do something before these riots turn into something worse...\n\nThe riots in Ekaterinburg mirror the intensity and violence seen in other affected areas. The local authorities are overwhelmed, and the threat to public safety and order is escalating rapidly. We are also receiving concering reports that Ultranationalist militia’s are distributing arms to the rioters. On the subject of the Nationalists our security services have been unable to locate Mikhail Astakov though we suspect he will use the riots to his advantage.\n\nIn light of the widespread disorder across the Far East, Siberia, and now the Urals, I strongly recommend declaring martial law in the affected regions.\n\nImmediate deployment of the army is essential to restore order and prevent further spread of the violence. I understand your concern about military deployment but we are long past the point where they are necessary. Clean up this mess now before I have to take my own drastic actions..."
 russiaCW.4.a:0 "Send in the troops, this has escalated beyond negotiation."
 russiaCW.5.t:0 "Sending The Army Into The Riots"
 russiaCW.5.d:0 "\"What’s going on? Someone report!\" President Zakharov echoed as he swept into the command room. The room's cacophony of voices and beeping machinery didn't quite silence, but it certainly took a pause. Generals and aides turned to face him, their expressions a mix of surprise and apprehension. The president's aide, a young man with a sweaty brow, rushed over to him, a tablet clutched in his hand.\n\n\"Mr. President, we've lost contact with the units from the Ural, Siberian and Far-Eastern Military districts\" he reported, his voice shaking slightly. \"The signals just... vanished.\"\n\nZakerhov's eyes widened in disbelief. \"Vanished? How is that even possible?\" He choked, his composure fracturing. The room grew tense as the generals shifted uncomfortably, looking at each other before focusing back on their screens, pretending to be busy. The aide took a deep breath and continued, \"We're not sure, sir. Initially, we thought it was a technical malfunction, but the silence has persisted for over an hour now.\"\n\nThe president's jaw clenched as he took in the information. He knew that something was amiss, something much larger than a mere communications error. \"Contact the bases directly!\" he ordered, his voice echoing through the room. \"Those bases are connected via our hotline system right? Whatever is going on those should work.\"\n\n\"Sir, we've been trying to establish a direct line since the initial reports came in,\" General Petrov, replied. \"We've sent messages to all major bases east of here and the local garrisons, but there's been no response... they.... Sir...\" He sputters trying and failing to withstand the President's withering gaze \"...we received automatic notifications saying that they have received the messages... just no one is responding\"\n\nThe President's face went pale as the gravity of the situation hit him like a sledgehammer. If his troops had truly gone rogue, it could mean the unthinkable. The Kremlin had always known that the Eastern Regions were a tinderbox, but they had thought they had control over their military assets. Now, with the silence from those divisions, it seemed that the worst fears of the Kremlin's leadership were being realized."
 russiaCW.5.a:0 "The final domino falls..."
 RUS_CW_5_Army_Disband:0 "§YWe have lost all contact with our Armed Forces. Brace for the worst...§!"
 russiaCW.6.t:0 "The Lion in the Far East"
 russiaCW.6.d:0 "Sergei cleared his throat, his eyes scanning the room. Each face he met was etched with the same determination, the same hope that had brought them all together. He knew the gravity of the words that would leave his lips next. They had watched the news, seen the chaos unfold across the vast expanse of their motherland. Russia was on the brink of anarchy, and it was their duty to save her.\n\n\"Brothers and sisters,\" he began, his voice strong and steady. \"Our nation, once a bastion of strength and unity, has been hollowed out by the greed of those who sit in ivory towers. They have turned their backs on the very people they are meant to serve, bowing to the whims of European overlords who care nothing for our struggles, our dreams, our very existence.\" His words hung in the air, heavy with accusation. \"Already they control our Constitution... need they control our lives as well?!\"\n\nThe room erupted with a volatile mix of anger and agreement. The crowd grew restless, the air thick with the scent of sweat and passion. He raised a hand for silence, and it fell like a curtain over the tumult. \"We stand on the precipice of a new era,\" he continued, his eyes alight with a fiery resolve. \"An era where the National Renewal Movement will rise as the true voice of the people. An era where we will no longer be pawns to a system that has failed us time and again.\"\n\n\"We are not merely dissenters. Nor are we but tools for the state to discard. We are the Men and Women of Mother Russia and together we shall be the architects of a new future! A future where our children will not be shackled by the debts of the past, where our resources are ours to harness and not a bribe for foreign interests!”\n\nWe are the descendants of the great bear, the sons and daughters of the steppes! Our ancestors conquered empires and stood firm against the ravages of time! Our very souls are forged in the fires of adversity in this snow-laden wasteland!\"\n\nThe crowd's response was deafening, a roar of agreement that seemed to shake the very foundations of the room. They knew what was at stake, and they were ready to fight for it. In the corner of his eye he could see Boris stepping backwards into the crowd though paid it no mind.\n\n\"Now is the time!\" Sergei declared, his voice a crescendo of power. \"We must rise as one! As the true guardians of our motherland! We must cast aside the yolk of the old government and their treacherous allies! We must take up arms and march forth, for the sake of our children, for the sake of our very existence!\""
 russiaCW.6.a:0 "Succession from the Republic shall not be tolerated!"
 russiaCW.6.b:0 "For Dignity! For Our Future! For The N.R.M!\n"
 russiaCW.7.t:0 "Siberia Uprising!"
 russiaCW.7.d:0 "In response to the Euro-Britannian uprising communist elements in Central Siberia have separated from the republic, they claim the aristocratic state in the far east is a threat to the proletariat and they have begun organizing defense militias to secure key government buildings and military infrastructure. They seem to want to defend themselves no matter what."
 russiaCW.7.a:0 "They didn’t learn their lesson last time..."
 russiaCW.7.b:0 "For Mankind and the Revolution!"
 russiaCW.8.t:0 "Old Glories"
 russiaCW.8.d:0 "Yet again another separatist state manifests into reality, the Russian Principality has seized on nationalist sentiments in the regions west of the Urals and the surrounding areas. They have proclaimed Vsevolod Romanov as their leader, although he seems nothing more than a puppet to the powers at be that being the military. They seek to unite what was once lost to them during the Great War."
 russiaCW.8.a:0 "The past is dead. We know what comes next..."
 russiaCW.8.b:0 "For Tsar and Motherland!"
 russiaCW.9.t:0 "Betrayed By Both Friends And Family"
 russiaCW.9.d:0 "Lieutenant Artyom Ivanov stepped through the heavy steel door into the dimly lit presidential command center. The air inside was thick with tension, palpable even before he fully entered the room. Maps and documents were spread out across a large table, surrounded by the nation's highest-ranking officials. At the head of the table stood President Zakharov his face disheveled from as he nurses at cup of coffee in his hands.\n\n \"Mr. President, we must face the reality that our forces out east should be considered as lost. Their positions are overrun, and communications have gone silent. We must send all available forces to rendezvous at Gorki to an~\"\n\n“And leave what cities we do have defenseless?!” President Zakharov's brow furrowed with concern, his gaze fixed on the map before him  “General Svyatoslav I appreciate your eagerness to crush the Tzarists but look around... what little we have left is disorganized and spread apart, the police are overwhelmed, and our neighbors have closed their borders over the unrest.”\n\n\"Mr. President,\" Artyom interrupted, stepping forward as the thought of his Mother in Ekaterinburg flashed through his mind. He took a breath to steady himself before continuing. \"The 13th Armor Brigade, 9th Infantry Regiment, and 51st Airborne report taking heavy fire... They... They say EU forces have launched a full-scale assault across the Belarusian border.\"\n\n\"How many divisions are we facing, Lieutenant?\" The President’s voice was barely a whisper.\"Initial reports indicate multiple divisions, supported by heavy artillery and air strikes.\" Artyom replied. “What do we do sir?”\n\nZakharov walks up to the young man probably in his early 20’s. His hand is clasping the Lieutenant on the shoulder as he puts up a fake reassuring smile. “Inform them that we will relieve them as soon as possible but until then they must by us time.”\n\nArtyom snapped a salute before turning around and running off to the communications suite to relay his orders... his ears just barely hearing a soft sob coming from behind. "
 russiaCW.9.a:0 "共和國萬歲……"
