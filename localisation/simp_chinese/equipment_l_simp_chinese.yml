 knightmare_mass_prod_unit:0 "Mass Production KN"
 knightmare_mass_prod_unit_desc:0 "With the results gained from the two separate programs, Knightmare Frames were developed into combat-effective platforms. Use of Sakuradite became paramount in making the Knightmare Frames perform to expectations, resulting in the mineral's value increasing greatly, turning it into a resource as important as fossil fuels in international politics. The Third Age also marked the creation of the Ganymede prototype, manufactured and designed by the Ashford Foundation."
 knightmare_pol_unit:0 "Police KN"
 knightmare_pol_unit_desc:0 "The Knightpolice is a Knightmare Frame made from retired Glasgows. They are operated by an elite paramilitary unit of the Britannian Police Force, where they serve as backup support for regular and special police units. It is armed with a pair of machine pistols instead of an assault rifle, as well as a specially-made anti-Knightmare combat knife. In addition, Knight Police frames also use a riot shield during crowd-control situations where firearms or rogue Knightmares may be present."
