﻿l_simp_chinese:
 ship_hull_submarine_desc:0 "潛艇是擅長於對付無武裝的運輸船的暗影獵手。歐陸大戰之後的數十年間，潛艇的改進一直在繼續。"
 ship_hull_submarine_1:0 "潛艇 I型"
 ship_hull_submarine_1_desc:0 "潛艇是擅長於對付無武裝的運輸船的暗影獵手。歐陸大戰之後的數十年間，潛艇的改進一直在繼續。"
 mtg_sakuradite_propulsion:0 "Sakuradite Propulsion"
 mtg_sakuradite_propulsion_desc:0 "Sakuradite propulsion, being completely independent of air, frees the submarine from the need to surface frequently, as is necessary for conventional submarines. The large amount of power generated by a Sakuradite reactor allows nuclear submarines to operate at high speed for long periods, and the long interval between refuelings grants a range virtually unlimited, making the only limits on voyage times being imposed by such factors as the need to restock food or other consumables."
 ship_hull_submarine_2:0 "潛艇 II型"
 ship_hull_submarine_2_desc:0 "Modern submarines are built with an emphasis on stealth. Advanced propeller designs, extensive sound-reducing insulation, and special machinery help a submarine remain as quiet as ambient ocean noise, making them difficult to detect. It takes specialized technology to find and attack modern submarines."
 ship_hull_submarine_3:0 "潛艇 III型"
 ship_hull_submarine_3_desc:0 "A ballistic missile submarine is a submarine capable of deploying submarine-launched ballistic missiles (SLBMs) with nuclear warheads. They can fire missiles thousands of kilometers from their targets, and acoustic quieting makes them difficult to detect, thus making them a survivable deterrent in the event of a first strike."
 ship_hull_light_desc:0 "Destroyers are significantly larger than EU-War ships and have fully automatic main guns, unit machinery, radar, sonar, and antisubmarine weapons such as the Squid mortar."
 ship_hull_light_1:0 "驅逐艦 I型"
 ship_hull_light_1_desc:0 "爲了確保運輸船的安全，第一次世界大戰的驅逐艦需要更改它們的定位並改變它們的設計。新的設計將擁有更多的魚雷來增加與敵人交火的機會。"
 ship_hull_light_2:0 "驅逐艦 II型"
 ship_hull_light_2_desc:0 "Modern destroyers have been equipped with guided missiles systems, which allows them to hit the target faster and harder. Majority of these systems have a vertical orientation."
 ship_hull_light_3:0 "驅逐艦 III型"
 ship_hull_light_3_desc:0 "Further advancements in this field have brought powerful Radar detectors against submarine attacks; in addition, improved armor has increased defense of Destroyer ships."
 ship_hull_light_4:0 "驅逐艦 IV型"
 ship_hull_light_4_desc:0 "Most modern Destroyers have acquired the capacity of performing stealth missions; plus, some models have managed to slightly control Sakuradite weapons, although in a very limited way."
 ship_hull_frigate:0 "Frigate I"
 ship_hull_frigate_desc:0 "Frigates are generally an anti-submarine escort vessel that was larger than a corvette, while smaller than a destroyer. Equal in size and capability to the American destroyer escort, frigates are usually less expensive to build and maintain."
 ship_hull_frigate_1:0 "Frigate I"
 ship_hull_frigate_1_desc:0 "Frigates are generally an anti-submarine escort vessel that was larger than a corvette, while smaller than a destroyer. Equal in size and capability to the American destroyer escort, frigates are usually less expensive to build and maintain."
 ship_hull_frigate_2:0 "Frigate II"
 ship_hull_frigate_2_desc:0 "New types of Frigates possese a greater speed and maneuverability than their predecessors. For this reasons, they can carry out operations of harrasment and sabotage."
 mtg_general_improve:0 "Light Ship Improvement"
 mtg_general_improve_desc:0 "General improvements for Frigates are to be implemented to face off new threats."
 ship_hull_frigate_3:0 "Frigate III"
 ship_hull_frigate_3_desc:0 "Most modern types of Frigates are capable of distracting Knightmares for a long period of time, while being less and less expensive to build and mantain."
 ship_hull_cruiser_desc:0 "Regarded as the most massive ships after carriers, these cruisers present the prototype of a guided missile system, as well as a base for attack helicopters. The latter are a mix of anti-submarine warfare and missile-guidance/electronic intelligence variants"
 ship_hull_cruiser_1:0 "巡洋艦 I型"
 ship_hull_cruiser_1_desc:0 "Regarded as the most massive ships after carriers, these cruisers present the prototype of a guided missile system, as well as a base for attack helicopters. The latter are a mix of anti-submarine warfare and missile-guidance/electronic intelligence variants"
 mtg_increased_defense:0 "Increased Defense"
 mtg_increased_defense_desc:0 "Deplyment of ballistic missile submarines has made standard cruisers incredibily vulnerable at stealth attacks.It is necessary to increase the anti-submarine and anti-torpedo defenses."
 ship_hull_cruiser_2:0 "巡洋艦 II型"
 ship_hull_cruiser_2_desc:0 "Cruisers have become the official successors of Battleships and Battlecruisers, and a vertical missile system has been finally implemented and improved. Despite this, the ship is still too vulnerable to another kind of weapon: Knightmares."
 ship_hull_cruiser_3:0 "巡洋艦 III型"
 ship_hull_cruiser_3_desc:0 "Cruisers now use a new universal vertical launch system that supports 4 different types of missiles,including Anti-Knightmare cannons, which have proved really useful in battle. This comes along improved defenses and attack."
 ship_hull_carrier:0 "航空母艦"
 ship_hull_carrier_desc:0 "在許多年的實驗之後，航空母艦作爲一種獨特種類的戰艦慢慢變得成熟。能夠搭載越來越多，越來越強大的艦載機，航空母艦即將成爲海軍力量投射的最終答案。"
 ship_hull_carrier_1:0 "1936航空母艦船體"
 ship_hull_carrier_1_desc:0 "很多軍事理論家相信未來是屬於海軍航空兵的。老舊的主力艦以及郵船改裝的航空母艦將是這些新理論的第一個試驗場。"
 mtg_anti_kn_cannons:0 "Anti-KN Cannons"
 mtg_anti_kn_cannons_desc:0 "Small Hadron Cannons have been implemented in the most modern aircraft carriers, which are now capable of destroying Knightmares from sky and water."
 ship_hull_carrier_2:0 "1940航空母艦船體"
 ship_hull_carrier_2_desc:0 "第一種專用航空母艦的設計工作開始了，我們必須確保這種航空母艦在不違反海軍條約的前提下，有足夠遠的航程和足夠快的速度來跟上艦隊中其他的軍艦。"
 mtg_magnetic_field:0 "Magnetic Shields"
 mtg_magnetic_field_desc:0 "Gefjun Disturber is becoming an increasing menance to aircraft carriers propelled by Sakuradite pieces; for this reason, an electro-magnetic counter-measure is required to guarantee a chance of success against the Disturbers."
 ship_hull_carrier_3:0 "1944航空母艦船體"
 ship_hull_carrier_3_desc:0 "改進的建造方式以及諸如甲板邊升降機這類的更加專業的系統使這些航空母艦可以更高效的攜帶更多飛機。"
