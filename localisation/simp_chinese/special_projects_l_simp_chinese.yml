 sp_land_reward_stronghold_network_delayed_by_concrete_shortage: "因混凝土短缺導致延遲"
 sp_land_reward_stronghold_network_underground_rail_systems: "地下軌道系統"
 sp_land_reward_stronghold_network_integration_of_anti_blast_doors: "防爆門一體化"
 sp_land_reward_stronghold_network_communication_system_overhaul: "通信系統大修"
 sp_land_reward_stronghold_network_communication_system_overhaul_desc: "在對測試中心的內部通信網絡進行測試時，研發團隊發現了效率低下之處，這可以用來改進傳統堡壘設計中的類似系統。"
 sp_land_reward_option_stronghold_network_communication_system_overhaul_standardize: "標準化"
 sp_land_reward_option_stronghold_network_communication_system_overhaul_further_study: "深入研究"
 sp_land_reward_stronghold_network_leadership_approach: "領導側重點"
 sp_land_reward_stronghold_network_leadership_approach_desc: "隨着項目的推進，首席科學家[Character.GetName]必須決定[Character.GetSheHe]在日常操作中的參與程度。[Character.GetSheHeCap]可以選擇親自監督現場施工，確保精準執行，或者留在辦公室專注於戰略和計劃。"
 sp_land_reward_option_stronghold_network_leadership_approach_oversee_work_personally: "親自監督工作"
 sp_land_reward_option_stronghold_network_leadership_approach_office_planning: "辦公室規劃"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_01: "混凝土加固技術的突破"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_01_desc: "一名初級工程師發現了一種新的加固方法，可以應用於標準防禦工事。現在記錄下來可以爲我們的科學家和工程師在未來的研究中提供優勢。"
 sp_land_reward_option_stronghold_network_breakthrough_in_concrete_reinforcement_01_apply_and_document_discovery: "應用並記錄發現"
 sp_land_reward_option_stronghold_network_breakthrough_in_concrete_reinforcement_01_use_in_current_project: "在當前項目中使用"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_02: "$sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_01$"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_02_desc: "一名初級工程師發現的新加固技術已提交外部研究團隊進行進一步評估。雖然結果仍在審查中，但如果合適，該技術仍可應用於當前項目。"
 sp_land_reward_option_stronghold_network_collapse_01: "隧道施工中的坍塌"
 sp_land_reward_option_stronghold_network_collapse_01_desc: "位於主要掩體之一下方的一條隧道意外坍塌，數名工人和負責監督作業的首席科學家[Character.GetName]被埋在廢墟之下。必須採取緊急措施營救被困人員，但事故已經導致整體進度延誤。"
 sp_land_reward_option_stronghold_network_collapse_01_prioritize_scientist: "優先救援首席科學家"
 sp_land_reward_option_stronghold_network_collapse_01_prioritize_safety: "優先保障工人安全"
