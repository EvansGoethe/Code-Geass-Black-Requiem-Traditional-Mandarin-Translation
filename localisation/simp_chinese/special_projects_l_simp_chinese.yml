 JAP_sp_nuclear_bomb: "仁計劃"
 sp_nuclear_bomb_desc: "這種炸彈利用核裂變的過程，在瞬間釋放出原子中儲存的能量。如果我們擁有這種毀滅性的武器，誰敢反對我們？"
 sp_nuclear_bomb_tt: "核反應堆開始生產§Y核彈§!。"
 sp_thermo_nuclear_bomb: "熱核彈"
 sp_thermo_nuclear_bomb_desc: "真的很難想象還有什麼東西能比核裂變炸彈威力更大，但有了核聚變，就有可能製造出比以往任何東西都大得多的爆炸效果。"
 sp_thermo_nuclear_bomb_tt: "核反應堆開始生產§Y熱核彈§!。"
 SOV_sp_thermo_nuclear_bomb: "RDS-6S氫彈"
 USA_sp_thermo_nuclear_bomb: "常春藤麥克"
 ENG_sp_thermo_nuclear_bomb: "綠花崗岩"
 POL_sp_thermo_nuclear_bomb: "烏拉姆裝置"
 sp_nuclear_warheads: "核彈頭"
 sp_nuclear_warheads_desc: "通過製造濃縮型核武器，我們將能夠將其作爲多種火箭發射系統的有效載荷，使我們能夠進行遠距離打擊。"
 sp_nuclear_design_choice_reward: "反應堆設計"
 sp_nuclear_design_choice_reward_desc: "在設計反應堆時，首先需要選擇使用哪種材料作爲反應堆慢化劑，這將決定整個反應堆的設計。我們可以選擇重水或是石墨，兩者各有優劣……"
 sp_nuclear_design_choice_reward_graphite: "純化石墨是更好的反應堆慢化劑"
 sp_nuclear_design_choice_reward_heavy_water: "重水更便宜"
 sp_nuclear_major_breakthrough_reward: "核反應的重大突破"
 sp_nuclear_major_breakthrough_reward_desc: "利用我們有限的核材料進行的受控實驗已經證明了我們預期設計的可行性，這使得項目進展得到了新的動力。"
 sp_nuclear_isotope_separation_choice_reward: "同位素分離設施"
 sp_nuclear_isotope_separation_choice_reward_desc: "爲了給我們的反應堆提供核燃料，我們需要決定一種分離鈾中有用同位素的工藝。目前有多個分離設施的提案，其中的兩個主要候選是氣體擴散法和離心分離法。"
 sp_nuclear_isotope_separation_choice_reward_gaseous: "氣體擴散法是一種經過驗證的技術。"
 sp_nuclear_isotope_separation_choice_reward_centrifugal: "離心分離法從長遠來看效率更高。"
 sp_nuclear_scientist_xp_generic_reward: "新知識"
 sp_nuclear_generic_industry_tech_reward: "技術進步"
 sp_nuclear_generic_industry_tech_reward_desc: "在項目的工作過程中，我們的工程師發明了幾項新技術，這些技術很可能也可以適用於其他領域。"
 sp_nuclear_generic_reward_option_industry_tech_name: "高級工業研究"
 sp_nuclear_scientist_xp_generic_reward_desc: "TODO_TA"
 sp_nuclear_minor_progress_generic_reward: "微小的突破"
 sp_nuclear_minor_progress_generic_reward_desc: "我們的科學家在研究最新的原型機時有了一些突破性的發現。他們的發現大大提高了我們對這一領域的認識和研究。"
 sp_nuclear_generic_electronics_tech_reward: "技術創新"
 sp_nuclear_generic_electronics_tech_reward_desc: "在項目的最後一次迭代中取得了重要的知識經驗。希望我們能將其付諸實踐，應能加速相關領域的研究。"
 sp_nuclear_generic_reward_option_electronics_tech_bonus_name: "先進電子研究。"
 sp_nuclear_war_support_generic_reward: "公衆支持"
 sp_nuclear_war_support_generic_reward_desc: "一次成功的測試，以及一些相關的、嚴格控制的媒體報道，讓公衆明白，我們離開發出某種可以用來擊敗任何敵人的超級武器越來越近了。"
 sp_nuclear_major_political_interference_generic_reward: "主要政治干預"
 sp_nuclear_major_political_interference_generic_reward_desc: "[SpecialProject.GetName]項目受到政治領導人的越來越多的審查和干預，這導致了延誤，並可能迫使項目領導層發生變化。這讓[Character.GetName]憤怒不已。我們需要應對這些政治挑戰，以保持項目的順利進行。"
 sp_nuclear_major_political_interference_generic_reward_option_keep: "保留[(Character?.GetName:'CAP_SCIENTIST)]"
 sp_nuclear_major_political_interference_generic_reward_option_fire: "移除[(Character?.GetName:'CAP_SCIENTIST)]"
 sp_nuclear_bomb_theoretical_breakthrough_generic_reward: "理論突破"
 sp_nuclear_bomb_theoretical_breakthrough_generic_reward_desc: "[Character.GetName]在最新原理樣機研製的工作中成功解決了一個複雜的理論問題。這使得炸彈的設計變得更精簡，生產起來也會更輕鬆。"
 sp_nuclear_bomb_critical_mass_generic_reward: "臨界質量實驗出錯"
 sp_nuclear_bomb_critical_mass_generic_reward_desc: "在確定臨界質量的實驗中發生了一起嚴重事故，導致輻射暴露並造成關鍵人員傷亡。"
 sp_nuclear_bomb_information_leak_reward: "信息泄露"
 sp_nuclear_bomb_information_leak_reward_desc: "[SpecialProject.GetName]的一名工作人員顯然在向外國特工泄露信息。目前尚不清楚這是故意的還是無意的。很難確定這對項目造成了多大損害。"
 sp_nuclear_bomb_information_leak_reward_tt: "獲得項目進展"
 sp_nuclear_reactor_radioactive_leak_stabilized_reward: "放射性泄漏-可控"
 sp_nuclear_reactor_radioactive_leak_stabilized_reward_desc: "不幸的是，在反應堆工作期間發生了嚴重事故。由於工作人員的快速反應，損失得到了控制，團隊能夠從事件中獲得有價值的數據。"
 sp_nuclear_reactor_minor_explosion_reward: "輕微爆炸，沒有人員傷亡"
 sp_nuclear_reactor_minor_explosion_reward_desc: "建造最新的核反應堆原型時發生了一起小事故。一次輕微的爆炸導致實驗室部分受損，但隨後的火災很快被撲滅。一旦實驗室修復完成，工作應能按計劃繼續，只會略有延遲。"
 sp_nuclear_reactor_tested_reward: "第一次成功的核反應堆測試"
 sp_nuclear_reactor_tested_reward_desc: "我們的首個核反應堆成功測試，證明了可控核裂變的可行性。這一突破預示着能源生產的新時代，以及更多的可能性。"
 sp_nuclear_reactor_tested_reward_public: "公開慶祝這一成就"
 nuclear_reactor_tested_reward_classify: "暫時保留這些信息加密"
 sp_nuclear_reactor_tested_reward_public_tt: "其他國家可能從中受益"
 sp_nuclear_reactor_tested_tech_bonus: "收到核試驗的資料"
 sp_commercial_nuclear_reactor_concerns_reward: "對核安全的擔憂"
 sp_commercial_nuclear_reactor_concerns_reward_desc: "[Character.GetName]對新反應堆冷卻塔中缺乏過濾器提出了擔憂。[Character.GetSheHeCap]堅持認爲必須添加過濾器，以防在緊急情況下放射性物質從反應堆泄漏。而工程師們則認爲這將大大延誤項目進度。"
 sp_commercial_nuclear_reactor_concerns_reward_option_safety: "加裝過濾器"
 sp_commercial_nuclear_reactor_concerns_reward_option_ignore: "愚蠢至極！"
 sp_nuclear_bomb_test_prototype_reward: "原型炸彈"
 sp_nuclear_bomb_test_prototype_reward_desc: "[Character.GetName]的團隊已經制造了一顆原型炸彈。成功製作和評估一次測試將顯著提升我們的進展。另一方面，我們現在有了一顆核彈……"
 sp_nuclear_bomb_test_prototype_reward_test_bomb: "在可控措施下進行測試"
 sp_nuclear_bomb_test_prototype_reward_keep_bomb: "我們可以運用這個來對付我們的敵人"
 sp_nuclear_bomb_espionage_threats_reward: "諜報威脅"
 sp_nuclear_bomb_espionage_threats_reward_desc: "安全人員認爲，有必要提高“[SpecialProject.GetName]”項目及周邊活動的安全性。研究人員以[Character.GetName]爲首，認爲自由行動和溝通對於進展至關重要。"
 sp_nuclear_bomb_espionage_threats_reward_no: "不提升安保等級"
 sp_nuclear_bomb_espionage_threats_reward_increase_security: "提升安保等級"
 sp_nuclear_bomb_espionage_threats_reward_increase_security_tt: "提升安保等級能降低竊密風險"
 sp_nuclear_bomb_breakthrough_plutonium_reward: "鈈生產的突破"
 sp_nuclear_bomb_breakthrough_plutonium_reward_desc: "我們的科學家在鈈的生產技術上取得了重大突破，提高了炸彈生產的效率。這有望加快研發進程。"
 sp_nuclear_bomb_accident_generic_reward: "意外火災"
 sp_nuclear_bomb_accident_generic_reward_desc: "設施內的一個倉庫發生了火災。初步調查顯示這很可能是意外。但真的是這樣嗎？"
 sp_nuclear_bomb_design_choice_reward: "簡單或複雜的炸彈設計"
 sp_nuclear_bomb_design_choice_reward_desc: "我們的科學家正在推進兩種原子武器的設計，並且圍繞如何繼續展開了爭論。其一是槍式設計，製造更爲簡單，但核材料利用效率較低。另一種是內爆式設計，儘管更具挑戰性，但理論上核材料利用效率更高。"
 sp_nuclear_bomb_design_choice_reward_gun_type: "槍式設計是更穩妥的選擇。"
 sp_nuclear_bomb_design_choice_reward_implosion: "內爆式設計是更優越的方案。"
 sp_thermonuclear_bomb_test_reward: "測試方案"
 sp_thermonuclear_bomb_test_reward_desc: "爲了驗證熱核炸彈背後的理論，我們的科學家請求進行一次試驗性爆炸。這將需要一顆現有的原子彈來引發鏈式反應，但這將大大加速項目的進展。"
 sp_thermonuclear_bomb_test_reward_option_yes: "進行測試"
 sp_thermonuclear_bomb_test_reward_option_no: "我們無法騰出足夠的材料"
