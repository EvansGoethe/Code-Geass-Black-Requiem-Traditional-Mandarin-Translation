 KOR_sp_naval_nuclear_missile_submarine: "KSS-III潛艇"
 ENG_sp_naval_nuclear_missile_submarine: "決心級潛艇"
 sp_naval_nuclear_missile_submarine_desc: "如果我們能夠讓潛艇浮出水面，發射核彈頭導彈，然後再次潛入水下，我們的首次打擊能力將幾乎沒有限制。"
 sp_naval_modern_battleship: "現代戰列艦"
 POL_sp_naval_modern_battleship: "颶風級戰列艦"
 sp_naval_modern_battleship_desc: "有些人可能認爲未來的海戰將由航母主導，我們將證明他們錯了。"
 sp_naval_modern_battleship_free_design: "現代戰列艦"
 sp_naval_midget_submarine: "袖珍潛艇"
 sp_naval_midget_submarine_desc: "我們的海軍需要輕型、廉價且多功能的潛艇，它可以用於從破壞港口到襲擊商船的任何任務。"
 sp_naval_midget_submarine_free_design: "袖珍潛艇"
 sp_naval_nuclear_torpedo: "核魚雷"
 sp_naval_nuclear_torpedo_desc: "隨着低當量戰術彈頭的出現，帶有這些彈頭的遠程魚雷理論上可以由幾乎任何常規潛艇發射。"
 sp_naval_modern_carrier: "現代航空母艦"
 sp_naval_modern_carrier_desc: "隨着造船技術的最新發展，我們可以建造新一代的航空母艦，航母的尺寸和能力都大大提高。"
 sp_naval_modern_carrier_free_design: "現代航母"
 sp_naval_anechoic_tiles: "消聲瓦"
 sp_naval_anechoic_tiles_desc: "這種潛艇專用的橡膠貼層，它們之間有很小的空隙，能夠減少被敵方聲納探測的威脅。"
 sp_naval_anechoic_tiles_non_mtg_tt: "啓用6級和7級的潛艇隱身升級選項"
 sp_naval_aip_engine: "無氧推進器"
 sp_naval_aip_engine_desc: "一種新的推進系統，可以消除潛艇需要浮出水面來爲電池充電並補充氧氣的弱點。"
 sp_naval_aip_engine_non_mtg_tt: "啓用6級和7級的潛艇引擎升級選項"
 sp_naval_ice_carrier: "冰航母"
 sp_naval_ice_carrier_desc: "爲了確保我們在遼闊海域的空中優勢，我們需要能夠停放和起飛遠程常規飛機的航母，而不僅僅是航母艦載機。"
 sp_naval_ice_carrier_free_design: "冰航母"
 ENG_sp_naval_ice_carrier: "哈巴谷工程"
 USA_sp_naval_ice_carrier: "哈巴谷工程"
 CAN_sp_naval_ice_carrier: "哈巴谷工程"
 sp_naval_underway_replenishment: "中途補給"
 sp_naval_underway_replenishment_desc: "向遠離本土基地的海軍提供補給一直是一個限制因素。我們的艦隊在極遠的距離上作戰，我們需要開發新的補給方法"
 sp_naval_underway_replenishment_pick_a_tt: "$MODIFIER_UNDERWAY_REPLENISHMENT_RANGE$§G+20%§!\n$MODIFIER_UNDERWAY_REPLENISHMENT_CONVOY_COST$§R+10%§!"
 sp_naval_underway_replenishment_pick_b_tt: "$MODIFIER_UNDERWAY_REPLENISHMENT_RANGE$ §R-10%§!\n$MODIFIER_UNDERWAY_REPLENISHMENT_CONVOY_COST$ §G-20%§!"
 sp_naval_proximity_fuze: "近炸引信"
 sp_naval_proximity_fuze_desc: "隨着改進和更加可靠的無線電技術，我們可以開發出一種新型引信，只需接近目標就能引爆並對其造成破壞。"
 sp_naval_proximity_fuze_custom_tt: "$MODIFIER_NAVY_ANTI_AIR_ATTACK$ §G+25%§!"
 sp_naval_cruiser_submarine_unique_reward_a: "襲擊協議"
 sp_naval_cruiser_submarine_unique_reward_a_desc: "倫敦海軍條約的無效性使潛艇甲板武器的任何實際限制都變得無關緊要。然而，問題仍然存在：我們是否應該優先考慮有影響力的武器裝備而不是戰術射程？"
 sp_naval_cruiser_submarine_preference_a: "機動"
 sp_naval_cruiser_submarine_preference_b: "軍備"
 sp_naval_fleet_submarine_unique_reward_a: "設計原則"
 sp_naval_fleet_submarine_unique_reward_a_desc: "在設計新型遠程潛艇時，我們必須明確應集中在哪些方面。我們的潛艇應該是隱祕而致命的獵手，還是應更加可靠且適應險境？"
 sp_naval_fleet_submarine_preference_a: "攻擊能力"
 sp_naval_fleet_submarine_preference_b: "更堅固的結構"
 sp_naval_nuclear_submarine_unique_reward_a: "成本考量"
 sp_naval_nuclear_submarine_unique_reward_a_desc: "我們正在設計一種全新類型的潛艇，關於生產成本可能過高的擔憂日益增加。我們該如何推進設計？"
 sp_naval_nuclear_submarine_preference_a: "削減成本"
 sp_naval_nuclear_submarine_preference_b: "保持現有設計"
 sp_naval_nuclear_submarine_preference_c: "追求最高質量"
 sp_naval_rocket_launching_submarine_unique_reward_a: "載荷問題"
 sp_naval_rocket_launching_submarine_unique_reward_a_desc: "我們需要回答一個緊迫的問題，如何確保我們從潛艇發射的導彈能夠打擊敵人？"
 sp_naval_rocket_launching_submarine_preference_a: "射程"
 sp_naval_rocket_launching_submarine_preference_b: "可靠性"
 sp_naval_rocket_launching_submarine_preference_c: "隱匿性"
 sp_naval_nuclear_missile_submarine_unique_reward_a: "擺脫獵殺"
 sp_naval_nuclear_missile_submarine_unique_reward_a_desc: "如果我們計劃中的核打擊信息泄露給敵人，他們就會大規模搜尋我們的核潛艇。爲了躲避獵殺，我們需要……"
 sp_naval_nuclear_missile_submarine_preference_a: "保持低調"
 sp_naval_nuclear_missile_submarine_preference_b: "保持冷靜"
 sp_naval_nuclear_missile_submarine_preference_c: "忍受風暴"
 sp_naval_nuclear_torpedo_unique_reward_a: "新型魚雷的研發方向"
