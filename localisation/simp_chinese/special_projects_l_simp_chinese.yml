 sp_rocket_interceptor_desc: "將火箭的動力與小型機體的機動性結合，我們將創造出無與倫比的截擊機。"
 sp_rockets_scientist_xp_generic_reward: "新知識"
 sp_rockets_scientist_xp_generic_reward_desc: "在最新原型的開發過程中，我們的科學家得到了多項新知識"
 sp_rockets_political_interference_generic_reward: "政治干預"
 sp_rockets_political_interference_generic_reward_desc: "政客們在不該插手的地方插手，導致項目被迫重做已經做過的事情，這對任何人來說都沒有意義。"
 sp_rockets_onsite_explosion_generic_reward: "現場爆炸"
 sp_rockets_onsite_explosion_generic_reward_desc: "一次測試中的重大爆炸嚴重破壞了部分設施，但也爲我們的科學家帶來了新的認知"
 sp_rockets_generic_major_breakthrough_reward: "重大突破"
 sp_rockets_generic_major_breakthrough_reward_desc: "在最近一次原型迭代期間，我們取得了重大突破。"
 sp_rockets_generic_avionics_advancements_reward: "航空電子技術進展"
 sp_rockets_generic_avionics_advancements_reward_desc: "我們通過不斷摸索，在航空電子和空氣動力學領域取得了許多發現，這些發現可以提升我們的飛機生產。"
 sp_rockets_experimental_rockets_improved_accuracy_reward: "精度改進"
 sp_rockets_experimental_rockets_stability_improvements_reward: "改進的火箭飛行穩定性"
 sp_rocket_design_choice_reward: "射程與載荷？"
 sp_rocket_design_choice_reward_desc: "設計這種遠程飛行炸彈時，我們的工程師認爲重要的是決定設計的主要目標。我們是想最大化射程，還是優先載荷。"
 sp_rocket_design_choice_reward_balanced: "平衡"
 sp_rocket_design_choice_reward_range: "射程"
 sp_rocket_design_choice_reward_payload: "載荷"
 sp_rockets_flying_bomb_technical_breakthrough_in_pulsejet_design_reward: "脈衝噴氣設計的技術突破"
 sp_rockets_flying_bomb_technical_breakthrough_in_pulsejet_design_reward_desc: "我們的工程師在設計導彈的脈衝噴氣引擎方面克服了重大障礙，這對其射程和速度至關重要。"
 sp_rockets_flying_bomb_launch_ramp_innovations_reward: "發射臺創新"
 sp_rockets_flying_bomb_launch_ramp_innovations_reward_desc: "我們的工程師在部署導彈所需的專用發射臺上取得了顯著改進。"
 sp_rockets_flying_bomb_launch_ramp_innovations_reward_option: "好消息"
 sp_rockets_flying_bomb_mass_production_scaling_reward: "規模化大量生產"
 sp_rockets_flying_bomb_mass_production_scaling_reward_desc: "我們已經成功地改進了生產，這將使我們能夠更快地進行大規模生產。"
 sp_rockets_flying_bomb_engine_optimization_breakthrough_reward: "發動機優化突破"
 sp_rockets_flying_bomb_engine_optimization_breakthrough_reward_desc: "我們的工程師已經顯著提高了脈衝噴氣的航程和可靠性，增強了導彈的作戰能力。"
 sp_rockets_flying_bomb_technological_innovation_in_guidance_systems_reward: "制導系統的技術創新"
 sp_rockets_flying_bomb_technological_innovation_in_guidance_systems_reward_desc: "在最新一輪原型設計中，制導系統的精確度和抗干擾能力得到了顯著改善，提升了我們的技術優勢。"
 sp_rockets_flying_bomb_test_flight_failures_reward: "試飛失敗"
 sp_rockets_flying_bomb_test_flight_failures_reward_desc: "早期試飛由於制導系統故障和結構弱點而失敗。我們的科學家從中學到了很多，但我們需要退一步重新思考。"
 sp_rockets_ground_control_improvements_reward: "地面制導改進"
 sp_rockets_ground_control_improvements_reward_desc: "[Character.GetName]成功解決了幾個從地面追蹤和控制導彈的關鍵問題。這標誌着我們朝瞄準高空飛行飛機邁出了重要一步。"
 sp_rockets_vertical_launch_reward: "垂直髮射系統"
 sp_rockets_vertical_launch_reward_desc: "經過幾次失敗的嘗試，[Character.GetName]終於解決了這些導彈垂直髮射的問題。新系統應該可以讓導彈順利發射，並在不延遲的情況下達到高空。"
 sp_rockets_high_speed_flight_control_reward: "高速飛行控制"
 sp_rockets_high_speed_flight_control_reward_desc: "我們終於成功開發了一個可以在高速下運行並對變化的飛行動態做出反應的控制系統。這些知識肯定在其他領域也能派上用場。"
 sp_rockets_high_speed_flight_control_bonus: "高速飛行控制系統"
 sp_rockets_warhead_detonation_mechanisms_reward: "彈頭引爆機制"
 sp_rockets_warhead_detonation_mechanisms_reward_desc: "整個開發過程中一個重要的部分是讓武器在正確的時機爆炸。看來[Character.GetName]找到了一個解決方案，使我們能夠在儘可能有利的時機引爆它。"
 sp_surface_air_missile_warhead_detonation_bonus: "地對空導彈：改進戰鬥部爆炸"
 sp_rocket_wind_tunnel_choice_reward: "工程師申請建造風洞"
 sp_rocket_wind_tunnel_choice_reward_desc: "彈道導彈項目的工程師請求建設一個超音速風洞，以便更早地測試他們設計的模型。這將加快迭代進程，並從長遠來看節省資源。"
 sp_rocket_wind_tunnel_choice_reward_reject: "資源有其他優先用途"
 sp_rocket_wind_tunnel_choice_reward_agree: "分配資源"
 sp_rocket_glass_wool_choice_reward: "大氣再入時結冰"
 sp_rocket_glass_wool_choice_reward_desc: "在火箭飛行的大氣再入階段，燃料箱周圍似乎會形成冰層，干擾火箭內部裝置。儘管是個挫折，但我們的工程師建議在燃料箱周圍添加玻璃棉，以防止未來出現這種情況。"
 sp_rocket_glass_wool_choice_reward_accept: "不幸但必要"
 sp_rocket_guidance_system_choice_reward: "制導系統"
 sp_rocket_guidance_system_choice_reward_desc: "我們的工程師在討論火箭的制導系統。一部分人希望繼續使用經過驗證的機械計算機，而另一些人則希望利用新型無線電技術，在發射後對火箭進行控制和監測。"
 sp_rocket_guidance_system_choice_reward_mechanical: "機械系統更可靠"
 sp_rocket_guidance_system_choice_reward_radio: "無線電是未來！"
 sp_rocket_turbo_pump_froth_reward: "渦輪泵起泡問題"
 sp_rocket_turbo_pump_froth_reward_desc: "在高空測試中，渦輪泵出現了問題。似乎泵內部的潤滑劑在高強度條件下開始起泡，從而影響了當前設計的整體性能和可靠性。"
 sp_rocket_turbo_pump_froth_reward_accept: "我們必須解決這個問題！"
 sp_rocket_relay_failure_reward: "繼電器故障"
 sp_rocket_relay_failure_reward_desc: "在準備測試發射時，發現用於火箭內部控制系統的繼電器有缺陷。工程師認爲應更換繼電器，但推遲項目可能會引發政治上的不利後果。"
 sp_rocket_relay_failure_reward_accept: "修復繼電器"
 sp_rocket_relay_failure_reward_reject: "我們不能再推遲了"
 sp_rocket_outercoating_reward: "火箭鏽蝕"
 sp_rocket_outercoating_reward_desc: "關於火箭外殼的腐蝕問題引發了擔憂。長時間放置時，材料經常會生鏽並腐蝕。如果不找到解決辦法，可能會導致火箭無法運行。"
 sp_rocket_outercoating_reward_accept: "或許可以塗抹潤滑劑？"
 sp_rocket_launch_site_choice_reward: "發射場問題"
 sp_rocket_launch_site_choice_reward_desc: "新火箭的巨大規模在預定發射場地造成了限制。項目管理者因此請求資助建造一個專門的新發射場。"
 sp_rocket_launch_site_choice_reward_reject: "想辦法在現有場地解決問題"
 sp_rocket_launch_site_choice_reward_accept: "我們將投資建設新設施"
 sp_naval_cruiser_submarine: "巡洋潛艇"
 sp_naval_cruiser_submarine_desc: "一種航程更遠的潛艇，設計用於在沒有支援的情況下長距離航行，將是攻擊敵方船隻的理想選擇。"
 sp_naval_cruiser_submarine_free_design: "巡洋潛艇"
 sp_naval_nuclear_submarine: "核潛艇"
