 sp_naval_modern_carrier_preference_b_a: "速度與天氣適應能力"
 sp_naval_modern_carrier_preference_c_a: "輕型艦艇威懾力"
 sp_naval_modern_carrier_unique_reward_b: "現代航母——安全"
 sp_naval_modern_carrier_unique_reward_b_desc: "航母無疑是海上作戰的王者，但我們需要爲它們提供適當的保護和安全保障。我們最應該關注的是什麼？"
