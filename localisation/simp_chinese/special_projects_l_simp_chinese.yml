 sp_naval_anechoic_tiles_unique_reward_a: "新發現——潛艇船體建造"
 sp_naval_anechoic_tiles_unique_reward_a_desc: "在消聲瓦的研發過程中，我們發現可以將這些成果應用於常規潛艇建造中，以增強隱匿性或節省成本，同時保持現有的隱身水平。"
 sp_naval_anechoic_tiles_preference_a: "攻擊性巡邏模式"
 sp_naval_anechoic_tiles_preference_b: "減少聲學特徵"
 sp_naval_anechoic_tiles_preference_c: "降低船體成本"
 sp_naval_torpedo_cruiser_unique_reward_a: "第二次機會——魚雷巡洋艦"
 sp_naval_torpedo_cruiser_unique_reward_a_desc: "隨着舊概念的魚雷巡洋艦被重新提上日程，我們需要對其在艦隊中的角色做出重要決定：是要專注於其優勢——魚雷，還是解決其主要弱點——對抗驅逐艦？"
 sp_naval_torpedo_cruiser_preference_a: "加強優勢——魚雷"
 sp_naval_torpedo_cruiser_preference_b: "彌補弱點——驅逐艦"
 sp_naval_super_heavy_battleship_unique_reward_a: "優先事項——攻擊"
 sp_naval_super_heavy_battleship_unique_reward_a_desc: "對於新類型的戰列艦的設計工作爲我們提供了一個機會，讓我們能夠專注於提升我們在海戰中的主導能力。我們應優先考慮什麼？"
 sp_naval_super_heavy_battleship_preference_a_a: "重炮"
 sp_naval_super_heavy_battleship_preference_b_a: "速度"
 sp_naval_super_heavy_battleship_preference_c_a: "輕炮"
 sp_naval_super_heavy_battleship_unique_reward_b: "優先事項——防禦"
 sp_naval_super_heavy_battleship_unique_reward_b_desc: "我們的最高海軍指揮官給我們下達了一項幾乎不可能完成的任務——讓這艘船幾乎無懈可擊，雖然我們知道這是不可能的，但我們至少可以盡力嘗試。這次，我們應該優先考慮什麼？"
 sp_naval_super_heavy_battleship_preference_a_b: "加強裝甲和船體"
 sp_naval_super_heavy_battleship_preference_b_b: "防空火炮"
 sp_naval_super_heavy_battleship_preference_c_b: "反魚雷措施"
 sp_naval_modern_battleship_unique_reward_a: "現代戰列艦——希望"
 sp_naval_modern_battleship_unique_reward_a_desc: "雖然許多人認爲戰列艦的時代已經結束，但我們仍然相信它們的價值。這艘船有機會成爲我們的新希望。爲了實現這一夢想，我們應專注在哪個方面？"
 sp_naval_modern_battleship_preference_a_a: "火力"
 sp_naval_modern_battleship_preference_b_a: "機動"
 sp_naval_modern_battleship_preference_c_a: "精準"
 sp_naval_modern_battleship_unique_reward_b: "現代戰列艦——捲土重來！"
 sp_naval_modern_battleship_unique_reward_b_desc: "爲了證明我們的觀點並保持我們的地位，我們必須經受住敵人的打擊。爲了能夠對那些膽敢挑戰我們的人進行反擊，我們應該進行哪種改進？"
