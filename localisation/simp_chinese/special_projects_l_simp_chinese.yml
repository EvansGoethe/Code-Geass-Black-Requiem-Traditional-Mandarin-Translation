 sp_commercial_nuclear_reactor_desc: "核反應堆很適用於生產製造炸彈的材料。但是產生的能量也可以爲民用和軍用工業提供電力。"
 sp_nuclear_engines: "核能引擎"
 sp_nuclear_engines_desc: "永不需要加燃料的引擎——這是原子能的承諾。我們的工程師說，我們已經非常接近實現這一承諾。"
