 sp_land_reward_option_land_cruiser_turret_redesign_bonus_name: "重新設計的炮塔結構"
 sp_land_reward_land_cruiser_track: "履帶系統故障"
 sp_land_reward_land_cruiser_track_desc: "[SpecialProject.GetName]的重量壓垮了履帶系統，導致測試期間的頻繁故障。目前的選項爲，加強履帶系統，不過這需要大規模重新設計，或者減少車輛的裝甲以減輕負荷。"
 sp_land_reward_option_land_cruiser_track_current: "繼續使用當前履帶系統"
 sp_land_reward_option_land_cruiser_track_reduce_armor: "減少裝甲覆層"
 sp_land_reward_option_land_cruiser_track_reduce_armor_bonus_name: "減少裝甲覆層"
 sp_land_reward_option_land_cruiser_track_reinforce_track: "加固履帶系統"
 sp_land_reward_option_land_cruiser_track_reinforce_track_bonus_name: "加固的履帶系統"
 sp_land_reward_land_cruiser_communication: "通信系統問題"
 sp_land_reward_land_cruiser_communication_desc: "[SpecialProject.GetName]的龐大體積需要一個複雜的內部通信系統來協調其乘員。當前的系統表現不佳，命令經常延遲或丟失。研發團隊建議重新設計內部佈局以改善通信流，或安裝一個更先進但未經測試的系統。"
 sp_land_reward_option_land_cruiser_communication_current: "保持當前系統"
 sp_land_reward_option_land_cruiser_communication_new: "加裝新的高級系統"
 sp_land_reward_option_land_cruiser_communication_new_bonus_name: "高級通信系統"
 sp_land_reward_option_land_cruiser_communication_redesign: "重新設計的內部佈局"
 sp_land_reward_option_land_cruiser_communication_redesign_bonus_name: "重新設計的通信系統"
 sp_land_reward_land_cruiser_assembly: "精密組裝"
 sp_land_reward_land_cruiser_assembly_desc: "在組裝階段，工程師成功改進了一種精密對準技術，用於裝配[SpecialProject.GetName]的巨大組件，如炮塔環和車體裝甲，顯著降低了機械應力裂紋的風險。我們可以將這種創新技術應用於整個項目，提高結構可靠性。我們應該如何應用它？"
 sp_land_reward_option_land_cruiser_assembly_all: "應用於所有組裝階段"
 sp_land_reward_option_land_cruiser_assembly_bonus_name: "精密組裝"
 sp_land_reward_option_land_cruiser_assembly_key: "僅應用於關鍵部件"
 sp_land_reward_land_cruiser_suspension: "液氣懸掛系統"
 sp_land_reward_land_cruiser_suspension_desc: "研發團隊已經完善了一種先進的液氣懸掛系統，能夠平衡[SpecialProject.GetName]的巨大重量，確保穩定性並減少在崎嶇地形上行駛時對履帶的壓力。[Character.GetName]對這種懸掛系統的可靠應用充滿信心，認爲能提高它在戰場上的表現。"
 sp_land_reward_option_land_cruiser_suspension_full: "全液氣懸掛"
 sp_land_reward_option_land_cruiser_suspension_rear: "僅限於後部部件"
 sp_land_reward_land_cruiser_ammunition: "彈藥存儲解決方案"
 sp_land_reward_land_cruiser_ammunition_desc: "在測試期間，對於[SpecialProject.GetName]高口徑彈藥的安全存儲和運輸，研發團隊提出了擔憂，因爲標準彈藥架無法安全負載這些爆炸性炮彈的重量。團隊因此提出了一種使用加固隔板和液壓裝載機的新型隔間存儲系統，這樣可以在戰鬥條件下更安全地裝運彈藥並加快裝填速度。"
 sp_land_reward_option_land_cruiser_ammunition_current: "保持現有系統"
 sp_land_reward_option_land_cruiser_ammunition_simplified: "使用簡化版本"
 sp_land_reward_option_land_cruiser_ammunition_new: "採用新的彈藥存儲系統"
 sp_land_reward_super_heavy_howitzer_focus_preference: "設計重點"
 sp_land_reward_super_heavy_howitzer_focus_preference_desc: "隨着開發的推進，我們必須做出關鍵抉擇：我們可以優先考慮快速生產和小口徑火炮，或者我們可以投資更大更重的火炮，犧牲生產效率，換取無與倫比的火力和毀滅性打擊能力。"
