 scientist_trait_genius: "天才"
 scientist_trait_genius_desc: "具有開創性思維的天才，以無與倫比的創新推動科學技術的邊界。這種天賦一代人只會出現一個。"
 scientist_trait_gifted_engineer: "天才工程師"
 scientist_trait_gifted_engineer_desc: "天賦異稟的工程師，擅長解決各領域的複雜技術問題。"
 scientist_trait_brilliant_theorist: "傑出的理論家"
 scientist_trait_brilliant_theorist_desc: "抽象概念和理論的高手，能夠徹底改變軍事戰略和科學研究。"
 scientist_trait_bright: "聰明"
 scientist_trait_bright_desc: "思維敏捷的科學家，擅長迅速掌握新概念並高效應用。"
 scientist_trait_fast_learner: "速學者"
 scientist_trait_fast_learner_desc: "能快速適應新挑戰，學習速度超過同行，在各個科學領域表現出色。"
 scientist_trait_resourceful: "足智多謀"
 scientist_trait_resourceful_desc: "即使資源稀缺或局勢艱難，也總能找到創造性的解決方案。"
 scientist_trait_schrodingers_trait: "薛定諤特徵"
 scientist_trait_schrodingers_trait_tt: "科學家經驗值獲取：§G+10%§!\n科學家經驗值獲取：§R-10%§!"
 scientist_trait_schrodingers_trait_desc: "在觀察者打開盒子之前，描述特徵的波函數形成了“好”和“壞”狀態的疊加。"
 scientist_trait_aircraft_specialist: "飛行器專家"
 scientist_trait_aircraft_specialist_desc: "一位擅長空氣動力學和飛機設計的專家，能夠開發出卓越的機體、引擎和設計，主宰天空。"
 scientist_trait_rocketry_specialist: "火箭專家"
 scientist_trait_rocketry_specialist_desc: "專攻火箭技術，側重於推進原理，涵蓋彈道導彈和制導火箭項目。"
 scientist_trait_electronics_specialist: "電子專家"
 scientist_trait_electronics_specialist_desc: "專長於通信、雷達和計算機系統，這些技術對於現代戰爭至關重要。"
 scientist_trait_helicopter_expert: "直升機專家"
 scientist_trait_helicopter_expert_desc: "旋翼航空器的先驅，專精於垂直飛行、旋翼系統和早期直升機模型的機械原理。"
 scientist_trait_jet_expert: "噴氣飛機專家"
 scientist_trait_jet_expert_desc: "噴氣推進領域的權威，推動早期噴氣引擎的研究及其在軍事飛行器中的應用。"
 scientist_trait_bombs_expert: "炸彈專家"
 scientist_trait_bombs_expert_desc: "精通爆炸裝置和精確炸彈的研發，能夠應用於新的空中轟炸策略。"
 scientist_trait_guidance_systems_expert: "制導系統專家"
 scientist_trait_guidance_systems_expert_desc: "制導技術專家，經驗豐富，致力於改進遠程無人爆炸裝置的控制系統。"
 scientist_trait_armored_specialist: "裝甲專家"
 scientist_trait_armored_specialist_desc: "一位老練的工程師，專精坦克和其他裝甲車的設計和改進。"
 scientist_trait_artillery_specialist: "火炮專家"
 scientist_trait_artillery_specialist_desc: "一位火炮專家，擁有改進遠程火力和大口徑火炮的經驗。"
 scientist_trait_submarine_specialist: "潛艇專家"
 scientist_trait_submarine_specialist_desc: "一位潛艇戰專家，專注於研發新式潛艇技術，以提高潛艇在隱祕海軍行動中發揮的作用。"
 scientist_trait_surface_ship_specialist: "水面艦艇專家"
 scientist_trait_surface_ship_specialist_desc: "專長於大型水面軍艦的設計、開發和部署，並研究軍艦裝備的新技術。"
 scientist_trait_nuclear_specialist: "核專家"
 scientist_trait_nuclear_specialist_desc: "一位處於原子研究前沿的物理學家，對核裂變和鏈式反應擁有深入的研究。"
 scientist_trait_nuclear_warfare_expert: "核戰爭專家"
 scientist_trait_nuclear_warfare_expert_desc: "一位將核物理實際應用於武器開發上的專家，專門研究原子彈設計的背後理論。"
 scientist_trait_nuclear_power_expert: "核能專家"
 scientist_trait_nuclear_power_expert_desc: "一位核物理學上的權威，精通核裂變領域，專注於核電項目。"
 sp_nuclear_project_events.1.t: "信息泄露"
 sp_nuclear_project_events.1.desc: "雖然完全是巧合，我們在[FROM.GetNameDef]的特工設法獲取了關於一個明顯的祕密項目的信息。一名參與祕密武器——原子彈開發的工人在一個小型社交聚會上談論了他的工作，而我們的特工也在那裏參加。"
 sp_nuclear_project_events.1.a: "這是有用的"
 sp_land_generic_reward_scientist_xp_1_desc: "[Character.GetName]取得了突破性進展，加速了項目進展，並鞏固了[Character.GetHerHis]作爲先進武器研發先鋒的地位。每一次發現都增強了[Character.GetHerHis]的工程掌控能力，塑造了軍事技術的未來。"
 sp_land_generic_reward_option_scientist_xp: "知識就是力量！"
 sp_land_generic_reward_option_scientist_xp_desc: "[Character.GetName]取得了突破，加快了進度，鞏固了[Character.GetHerHis]作爲先進武器先驅的地位。"
 sp_land_generic_reward_army_xp_1_desc: "[Character.GetName]已與一羣軍官會面，討論[SpecialProject.GetName]的潛力，獲得了關於將新技術應用於陸戰的關鍵見解。這一合作增強了我們的軍事能力，確保了未來戰鬥的準備。"
 sp_land_generic_reward_option_army_xp_desc: "[Character.GetName]與一羣選定的軍官會面，討論了[SpecialProject.GetName]的潛力，獲得了將新技術用於陸戰的關鍵見解。他們的合作增強了我們的軍事能力，確保爲未來的交戰做好準備。"
 sp_land_generic_reward_major_progress_1_desc: "[Character.GetName]取得了重大突破，極大地推動了項目進展，驗證了[Character.GetHerHis]的專業能力，並激勵了研究團隊。在這一進展下，項目距離目標更近了一步，鞏固了[Character.GetName]作爲開拓者的傳奇。"
 sp_land_generic_reward_option_major_breakthrough_desc: "[Character.GetName]取得了重大突破，極大地推進了項目進展，驗證了[Character.GetHerHis]的專業知識並激勵了研究團隊。因着這一進展，項目離目標更近了一步，鞏固了[Character.GetName]作爲開拓者的傳承。"
 sp_land_generic_reward_test_failure_1_desc: "在測試過程中出現了一個小小的挫折，揭示了[Character.GetName]的原型中意外的缺陷。這一問題促使對方法進行重新評估和技術改進。雖然暫時延緩了進展，但這些經驗教訓有助於在長遠上建立一個更強大、更具彈性的項目。"
 sp_land_generic_reward_option_test_failure_desc: "在測試過程中發生了小挫折，意外揭示了[Character.GetName]的原型機中的缺陷。這個小插曲促使了對方法和技術改進的重新評估。雖然暫時推遲了進展，但從長遠來看，這些經驗教訓有助於使項目更強大、更有韌性。"
 sp_land_generic_reward_armor_tech_1_desc: "[Character.GetName]領導的[SpecialProject.GetName]項目的最新進展，推動了相關領域的重大突破。這些進展正在革新軍事能力，爲更有效、更強大的陸地戰爭策略鋪平了道路。"
 sp_land_generic_reward_option_armor_tech_desc: "[Character.GetName]領導的[SpecialProject.GetName]項目中的最新發展，使相關領域取得了重大進步。這些突破徹底改變了軍事能力，爲更有效、更強大的陸戰戰略鋪平了道路。"
 sp_land_generic_reward_armor_bonus_1_desc: "作爲前沿研究的領導者，[Character.GetName]揭示了革命性的新合金發現，預示着坦克裝甲的重大進展。這些發現爲裝甲戰爭帶來了顯著的提升，展示了這位科學家在塑造裝甲戰爭未來中的關鍵作用。"
 sp_land_generic_reward_option_armor_bonus_desc: "把這種新合金應用到我們的生產線上。"
 sp_land_generic_reward_engine_bonus_1_desc: "對[SpecialProject.GetName]原型實驗引擎的最新調整，極大地提升了坦克引擎的整體性能。[Character.GetName]和[Character.GetHerHis]團隊的精細工作突破了工程的界限，承諾如果我們將這些創新應用於常規坦克引擎，將大幅提升其能力。"
 sp_land_generic_reward_option_engine_bonus_desc: "開始生產這些先進引擎吧！"
 sp_land_generic_reward_resource_scarcity_desc: "[Character.GetName]的團隊在[SpecialProject.GetName]項目的開發過程中面臨關鍵材料的短缺，迫使[Character.GetHerHim]尋找替代來源並開發新的製造方法以滿足需求。"
 sp_land_generic_reward_option_resource_scarcity_desc: "[Character.GetName]的團隊在[SpecialProject.GetName]項目的開發過程中面臨關鍵材料的短缺，迫使[Character.GetHerHim]尋找替代來源並開發新的製造方法以滿足需求。"
 sp_land_reward_multi_charge_large_caliber_gun_successful_test_firing_desc: "[SpecialProject.GetName]大炮剛剛成功完成了一次重要的試射，展示了其令人印象深刻的射程和準確性。這一成就鼓舞了研究團隊的士氣，並引起了高層官員的關注，爲項目提供了動力，並重新燃起了對成功的樂觀情緒。"
 sp_land_reward_option_multi_charge_large_caliber_gun_successful_test_firing_desc: "[SpecialProject.GetName]大炮成功完成了一次重要的試射，展示了其令人印象深刻的射程和準確性。這一成就鼓舞了研究團隊的士氣，並引起了高層官員的關注，爲項目提供了動力，並重新燃起了對成功的樂觀情緒。"
 sp_land_reward_multi_charge_large_caliber_gun_test_failure_desc: "在一次關鍵的測試試驗中，一場災難性的爆炸震動了測試場地，摧毀了大炮並對附近的基礎設施造成了重大損壞。[Character.GetName]的團隊正在調查爆炸原因，並處理事故帶來的後果，包括公衆審查和項目進度表的可能的延期。"
 sp_land_reward_option_multi_charge_large_caliber_gun_test_failure_desc: "在一次關鍵的測試試驗中，一場災難性的爆炸震動了測試場地，摧毀了大炮並對附近的基礎設施造成了重大損壞。[Character.GetName]的團隊不得不調查爆炸的原因，並處理事故帶來的後果，包括公衆審查和項目進度表的可能的延期。"
 sp_land_reward_multi_charge_large_caliber_gun_breakthrough_in_propulsion_technology_desc: "[Character.GetName]在推進技術方面取得了重要突破，顯著提高了[SpecialProject.GetName]發射的速度和威力。這一進步爲該武器在戰場上的有效性開闢了新的可能性，並加速了項目的進展。"
 sp_land_reward_option_multi_charge_large_caliber_gun_breakthrough_in_propulsion_technology_desc: "[Character.GetName]在推進技術方面取得了重要突破，顯著提高了[SpecialProject.GetName]發射的速度和威力。這一進步爲該武器在戰場上的有效性開闢了新的可能性，並加速了項目的進展。"
 sp_naval_generic_failure_nuclear_accident: "得到控制的核事故"