 sp_air_axial_jet_engine: "軸流式噴氣發動機"
 sp_air_axial_jet_engine_desc: "早期的噴氣發動機有一個主要問題，它只能在有限程度上壓縮空氣。也許可以通過將多個壓縮機串聯排列，進一步提升推力。"
 sp_air_supersonic_jet: "超音速噴氣機"
