 sp_land_land_cruiser_desc: "巨大的裝甲巨獸，旨在主宰戰場。憑藉無與倫比的尺寸和火力，這車代表了裝甲戰爭的巔峯。"
 sp_air_radar: "雷達"
 POL_sp_air_radar: "代號“號角”"
 sp_air_radar_desc: "通過使用脈衝無線電波並檢測其反射，我們將能夠監控敵軍在陸地、空中和海上的動向。"
 sp_air_centimetric_radar: "釐米波雷達"
 sp_air_centimetric_radar_desc: "開發釐米波雷達將允許我們檢測更小的目標，並使用更小的天線。"
 sp_land_reward_land_cruiser_overheating: "試驗中過熱"
 sp_land_reward_land_cruiser_chassis: "底盤壓力測試失敗"
 sp_land_reward_land_cruiser_chassis_desc: "在壓力測試期間，[SpecialProject.GetName]的底盤無法承受巨大的重量，導致結構變形。設計團隊對是否增加額外的加固構件產生了分歧，增添構件會進一步加大車輛的重量，而使用輕量化材料則可能削弱其耐用性。"
 sp_land_reward_option_land_cruiser_chassis_redesign: "完全重新設計底盤"
 sp_land_reward_option_land_cruiser_chassis_redesign_bonus_name: "重新設計的底盤"
 sp_land_reward_option_land_cruiser_chassis_reinforce: "加固底盤"
 sp_land_reward_option_land_cruiser_chassis_reinforce_bonus_name: "加固的底盤"
 sp_land_reward_option_land_cruiser_chassis_lighter_materials: "使用輕量化材料"
 sp_land_reward_option_land_cruiser_chassis_lighter_materials_bonus_name: "底盤使用輕量化材料"
 sp_land_reward_land_cruiser_engine: "引擎輸出不足"
 sp_land_reward_land_cruiser_engine_desc: "早期試驗表明，原型的巨大框架對現有引擎造成了壓力，使得[SpecialProject.GetName]行動遲緩且反應不靈敏。研發團隊提出了兩種選項：開發新的更強大的引擎，或嘗試改進現有引擎的輸出，但後者可能會導致引擎故障。"
 sp_land_reward_option_land_cruiser_engine_leave: "保持現狀"
 sp_land_reward_option_land_cruiser_engine_modify: "調整當前引擎"
 sp_land_reward_option_land_cruiser_engine_modify_bonus_name: "改進引擎"
 sp_land_reward_option_land_cruiser_engine_new: "研發新引擎"
 sp_land_reward_option_land_cruiser_engine_new_bonus_name: "重新設計引擎"
 sp_land_reward_land_cruiser_turret: "複雜的炮塔結構"
 sp_land_reward_land_cruiser_turret_desc: "巨大的多炮塔設計導致了嚴重的校正和瞄準問題，也會造成武器裝配工序的延遲。工程團隊建議簡化炮塔布局以提高可靠性，但這樣會降低[SpecialProject.GetName]原本計劃中的火力。"
 sp_land_reward_option_land_cruiser_turret_original: "保留原始設計"
 sp_land_reward_option_land_cruiser_turret_simplify: "簡化炮塔設計"
