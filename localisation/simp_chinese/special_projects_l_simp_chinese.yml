 ENG_sp_naval_nuclear_submarine: "德國海軍無畏艦計劃"
 SOV_sp_naval_nuclear_submarine: "627 K-3工程"
 sp_naval_nuclear_submarine_desc: "我們應該能夠製造出足夠小的、適應專門的潛艇的核動力引擎，使潛艇航程極遠且靜音。"
 sp_naval_nuclear_submarine_free_design: "核潛艇"
 sp_naval_rocket_launching_submarine: "導彈發射潛艇"
 JAP_sp_naval_rocket_launching_submarine: "I-400級導彈潛艇"
 SOV_sp_naval_rocket_launching_submarine: "611工程"
 PRC_sp_naval_rocket_launching_submarine: "094型晉級"
 sp_naval_rocket_launching_submarine_desc: "通過爲潛艇配備導彈及發射系統，我們應該能夠在沒有事先警告的情況下，從任意位置打擊敵人的戰略目標。"
 sp_naval_torpedo_cruiser: "魚雷巡洋艦"
 sp_naval_torpedo_cruiser_desc: "根據上世紀的“綠水學派”概念，我們可以使用魚雷巡洋艦，對敵方最重要和最昂貴的艦船造成重大傷害。"
 JAP_sp_naval_torpedo_cruiser: "長矛巡洋艦集成"
 sp_naval_torpedo_cruiser_free_design: "魚雷巡洋艦"
 sp_naval_fleet_submarine: "艦隊潛艇"
 sp_naval_fleet_submarine_desc: "一種能夠充當艦隊護航的遠洋潛艇，但剔除了之前巡洋潛艇設計中固有的缺陷。"
 sp_naval_fleet_submarine_free_design: "艦隊潛艇"
 sp_naval_super_heavy_battleship: "超重型戰列艦"
 sp_naval_super_heavy_battleship_desc: "近年來海軍軍備競賽日趨多樣化，但戰列艦的絕對威嚴仍然難以被否認，海上巨獸的潛力仍然存在。"
 JAP_sp_naval_super_heavy_battleship: "大和級戰列艦"
 USA_sp_naval_super_heavy_battleship: "蒙大拿級戰列艦"
