﻿l_simp_chinese:
 LOADING_TIP_0:0 "通過不正當手段取得的勝利根本算不上勝利。\n——樞木朱雀"
 LOADING_TIP_1:0 "爲消滅邪惡，我將成爲更強大的邪惡。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_2:0 "“真相”大多數時候都被掩蓋了。\n——羅伊德·阿斯普林德"
 LOADING_TIP_3:0 "消除謊言的最佳方式，就是讓它們成爲現實。\n——樞木朱雀"
 LOADING_TIP_4:0 "時間不停流逝，它不會在意那些正在掙扎的人。\n——魯路修·蘭佩洛基"
 LOADING_TIP_5:0 "毫無節制的力量，不過是暴力而已\n——俾斯麥·瓦爾德施泰因"
 LOADING_TIP_6:0 "並非所有人生而平等！這就是爲什麼會有戰爭、暴力和動亂。\n- 查爾斯·zi·不列顛尼亞"
 LOADING_TIP_7:0 "你知道爲什麼雪是白的嗎？因爲它忘記了自己原本是什麼顏色。\n——C.C."
 LOADING_TIP_8:0 "我現在要開始享用這條魚了。\n——樞木朱雀（值得收藏的Meme）"
 LOADING_TIP_9:0 "如果國王不採取行動，他的臣民就不會追隨。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_10:0 "不染塵埃，豈能改變世界。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_11:0 "虛假的眼淚會傷害身邊的人，虛假的笑容只會讓自己痛苦。\n——C.C."
 LOADING_TIP_12:0 "你一定覺得自己很酷吧，不過是置身事外對世界評頭論足罷了。\n——紅月卡蓮"
 LOADING_TIP_13:0 "查爾斯皇帝沉湎於往昔，你執着於當下，而我追尋未來.\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_14:0 "停滯不前的事物終將消亡。\n——米蕾·阿什弗德"
 LOADING_TIP_15:0 "想要有結果，就必須採取行動。\n——樞木朱雀"
 LOADING_TIP_16:0 "戰爭只是外交的一種方式，但也是最低效的一種方式。\n——俾斯麥·瓦爾德施泰因"
 LOADING_TIP_17:0 "生命中總有這樣的時刻，你不得不遠離所愛之人，卻是因爲你深愛着他們。\n——C.C."
 LOADING_TIP_18:0 "在這個世界上，善意能產生惡果，也有在惡意中產生的善行。\n——C.C."
 LOADING_TIP_19:0 "碌碌無爲的人生無異於慢性死亡。\n——魯路修·vi·不列顛尼亞"
 LOADING_TIP_20:0 "對民主最好的駁論就是和一個普通選民交談五分鐘。\n——溫斯頓·丘吉爾"
 LOADING_TIP_21:0 "無論未來何時發生戰爭，裝甲部隊都將起到決定性作用。\n——海因茨·古德里安"
 LOADING_TIP_22:0 "德國的新型豹式和虎式坦克可以使用到其拋錨爲止，但不要嘗試修復，它們的引擎、傳動和懸掛都很爛。\n——紅軍軍械部"
 LOADING_TIP_23:0 "沒有哪個雜種是通過爲國捐軀贏得一場戰爭的，贏得戰爭靠的是讓敵國那些可憐的雜種爲他們的國家去死。\n——喬治·S·巴頓"
 LOADING_TIP_24:0 "一個即刻踐行的好計劃要強於一個下週執行的完美計劃。\n——喬治·S·巴頓"
 LOADING_TIP_25:0 "要麼領導我，要麼跟着我，要麼從我面前滾開。\n——喬治·S·巴頓"
 LOADING_TIP_26:0 "從沒有人成功守住任何東西，只有進攻，進攻再進攻。\n——喬治·S·巴頓"
 LOADING_TIP_27:0 "戰爭也許是用武器打的，但是由人來獲勝的，是領導者與追隨者的精神爭取到的勝利。\n——喬治·S·巴頓"
 LOADING_TIP_28:0 "我第一次看到噴氣機的時候，我把它打下來了。\n——查克·葉格，美國陸軍航空兵"
 LOADING_TIP_29:0 "特奧，這裏是海因裏希，剛剛打下兩架轟炸機，沒有彈藥了。我要撞過去了，再見，英靈殿再會！\n——海因裏希·埃爾勒，納粹德國空軍"
 LOADING_TIP_30:0 "領導力包含選擇優秀的人才並幫助他們做到最好。\n——切斯特·W·尼米茲"
 LOADING_TIP_31:0 "這項行動有可能成功嗎？在物資和補給方面它處於可行範圍內嗎？\n——切斯特·W·尼米茲"
 LOADING_TIP_32:0 "在準備戰鬥的時候我總是發現計劃是毫無用處的，但是進行計劃的過程是不可或缺的。\n——德懷特·D·艾森豪威爾"
 LOADING_TIP_33:0 "決定兩條狗爭鬥勝負的並非它們的身板尺寸，而是它們爲爭鬥所投入的力量大小。\n——德懷特·D·艾森豪威爾"
 LOADING_TIP_34:0 "毋庸置疑，當面臨存亡之憂時，人間就會爆發衝突，並且最終招致諸國間不幸的戰事。\n——東條英機"
 LOADING_TIP_35:0 "在一場單挑中，勝利者是彈夾裏多一發的人。\n——埃爾溫·隆美爾"
 LOADING_TIP_36:0 "我寧可當錘子而不是砧子。\n——埃爾溫·隆美爾"
 LOADING_TIP_37:0 "流汗不流血，流血不丟命，但是開動腦筋可以同時保住兩者。\n——埃爾溫·隆美爾"
 LOADING_TIP_38:0 "此前可憐的內維爾·張伯倫以爲他能信任希特勒，他錯了。但是我不覺得我對斯大林的看法錯了。\n——溫斯頓·丘吉爾，雅爾塔會議後"
 LOADING_TIP_39:0 "我相信這是我們時代的和平。\n——內維爾·張伯倫，1938年慕尼黑協定後"
 LOADING_TIP_40:0 "沒有一架敵人的轟炸機能到達魯爾。如果有一架到了魯爾，我的名字就不叫戈林，你可以叫我邁耶。\n——赫爾曼·邁耶"
 LOADING_TIP_41:0 "我們只需往大門踹上一腳，整座腐朽的建築便會轟然倒塌。\n——阿道夫·希特勒（評價蘇聯）"
 LOADING_TIP_42:0 "我可以保證在對英美開戰後的半年至一年內勢如破竹，但是在這之後，我毫無獲勝的把握。\n——山本五十六"
 LOADING_TIP_43:0 "如果我們抵達雷區，我們的步兵會像雷區不存在般發起進攻。\n——格奧爾基·朱可夫"
 LOADING_TIP_44:0 "我們低估了俄國巨人……無論何時消滅一打師，俄國人就會換上另一打。\n——弗朗茨·哈爾德"
 LOADING_TIP_45:0 "放屁！\n——安東尼·C·麥考利夫，回覆德國的勸降"
 LOADING_TIP_46:0 "今天是我們，明天就輪到你們。\n——海爾·塞拉西一世，1936年"
 LOADING_TIP_47:0 "一步也不許後退！\n——蘇聯第227號命令"
 LOADING_TIP_48:0 "虎！虎！虎！\n——淵田美津雄，1941年12月7日"
 LOADING_TIP_49:0 "你的名字無人知曉，你的功績永世長存。\n——無名烈士墓（莫斯科）"
 LOADING_TIP_50:0 "第34特遣艦隊現在何處？重複一遍，現在何處？全世界都想知道。\n——CINCPAC（太平洋艦隊最高指揮官），萊特灣海戰"
 LOADING_TIP_51:0 "而戰局未必好轉，世界大勢亦不利我。\n——裕仁天皇，1945年"
 LOADING_TIP_52:0 "我們本該在一戰後就明白。\n——格爾德·馮·倫德施泰特"