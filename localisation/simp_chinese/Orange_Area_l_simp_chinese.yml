 ORG_the_holy_orange_empire_desc:0 "Imperial Britannia is our Orange homeland, it is time to liberate it from the tyranical rule of Emperor Charles, and to liberate all other Areas under the name of the Holy Orange Empire! To do this is our main goal, and until it is done the Orange Requiem can never be complete."
 ORG_form_holy_orange_empire:0 "Form The Holy Orange Empire"
 ORG_control_our_orangelands:0 "Our Orangelands"
 ORG_control_our_orangelands_desc:0 "Not every member of our nation is supporting their existence under the new Orange flag, while it will take time to gain their trust. We can always invest into new resources for the nation, to show them that we are the worlds rightful Orange Rulers."
