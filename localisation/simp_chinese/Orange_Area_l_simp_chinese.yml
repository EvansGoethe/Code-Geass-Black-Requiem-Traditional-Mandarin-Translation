 ORG_for_your_failure:0 "Demote Guilford Three Ranks"
 ORG.1.t:0 "The Orange Rebellion"
 ORG.1.d:0 "Area 5 had been running like any other Imperial Britannia Area, sending imports to the fatherland, receiving troops and supply in return. The Britannian Viceroy had no difficult tasks in recent memory, or for the foreseeable future. Outside of a few public speeches to woo the numbers and appease the nobles.\n\nIt was then around that time, that out of the blue. Reports began to come in, all about the arrival of a new company in Area 5. Buying up vast swathes of land for Orange farms, it was a company with unimaginable wealth. Called the Orange International Corporation, the company didn't just use its wealth for its own gain, but also for its employees providing benefits far outweighing any other.\n\nIn return the workers were swearing complete loyalty to the company, even going so far to refer to themselves as Oranges. All attempts to curtail the company was met with staunch opposition from the populace when the Viceroy had finally decided to oust the company from Area 5. Riots began to break out in the streets, it was the worst riots the Area had seen, and for some reason Britannia turned their backs.\n\nThe Oranges demanded more than just the staying of the company, they demanded that the Area pay respect to the benefits of the company, to go so far as making it an official political party. To rename the Area itself and break from Britannia tradition.\n\nThe Viceroy knew this was all a bid for control, but still was left with a choice."
 ORG.1.a:0 "'Give into the Orange's demands.'"
 ORG.1.b:0 "'They will not take control of Area 5!'"
 ORG.2.t:0 "Orange Boy?"
 ORG.2.d:0 "The Viceroy was forced into a position, and he had to make a call, he could only hope it was the right one. As he let out a soft sigh, he stood by the window in his office, being able to overlook Bogota Settlement. The riots had stopped ever since he accepted the Oranges demands. But now he saw his Area, his nation changing.\n\nLooking out over the city, he could see that even the large banners that flew the Britannian flag was not safe, replaced with ones which swapped out the blue for Orange.\n\n'Where did I go wrong?' He let out softly to himself, for the briefest moment he closed his eyes. He then heard a voice suddenly behind him, causing him to spin around the cape on his uniform being caught up in the sudden movement.\n\n'Hello there, pleasure to meet your acquaintance.' The man stood there drabbed in white clothes reminiscent of a Knight, having what looked like blue to green formal short hair, the biggest feature was that of a half mask over his left eye that was orange.\n\nBefore the Viceroy could speak the man leapt forward towards him, over the desk throwing his right arm out and from underneath his sleeve a golden blade had been thrown out.\n\n'Who are you? What do you want!' With, but one elegant motion the Viceroy had his throat sliced in a fluid movement by the man, he only chose to answer the first question. For the second one was only to be known by him and his Emperor."
 ORG.2.a:0 "'It is I, Jeremiah Gottwald!'"
 ORG.3.t:0 "I am an Orange Dr. Hans"
 ORG.3.d:0 "The people of the Orange Autonomous Area are becoming more deluded by the benefits of the Orange International Company, it is now not just the workers of the company that are seeking changes.\n\nEven those in the military are throwing down their colours of Britannia and adopting the colours of Orange, the nobles of the Area have found no choice, pressured by those who they had once considered mere Fives had now become something bigger than that.\n\nThe Oranges started to have more power than the Nobles themselves, leading to them to have one choice. To throw their weight behind the Oranges, to put aside all their other parties’ loyalties and become Orange not just in name but truth."
 ORG.3.a:0 "First our nation becomes Orange, then the world."
 ORG.4.t:0 "Orange Tinted Loyalty"
 ORG.4.d:0 "The future for the Orange Autonomous Area was thrown into question for, but a single moment, with the untimely death of the Viceroy. Very quickly however the Oranges used this chance to push their power more, pushing for their company to take helm pushing to rule the entire Area. For the CEO of Orange International Corporation to take charge and become the Viceroy of the Area.\n\nThis push for power was going against even Britannia, which in all other scenarios would lead to Britannia coming down to crush the Orange Rebellion entirely. But it was because of their leader this did not happen, their loyalty in him was absolute and so he delivered them freedom.\n\nWith all other Areas in the South American continent taking note, following behind with their own pushes, until all Areas were able to rid the strings of puppetry that Britannia had over them. For this act, the loyalty to Orange was becoming more then just for the benefits they provided, it was becoming their way of displaying their freedom, and life.."
 ORG.4.a:0 "The peoples loyalty to Orange is becoming absolute."
 ORG.5.t:0 "Eternal Loyalty"
 ORG.5.d:0 "Jeremiah had created a spark of revolution in the nation, the Oranges were able to free themselves from being the puppet and pawn of Britannia, and Jeremiah was promising to give them even more.\n\nWhen he looked down upon them from his new office in Bogota Settlement, he did not look down upon them with disgust, or any sort of vile intent. He looked down at them, with the same eyes he gave to those who had his loyalty. His new nation had shown him loyalty, and he would show them his in return. The next action was to declare open succession from the Empire, to cut all ties with Britannia, to no longer provide resources to them. To no longer receive support from them.\n\nWhile for other Areas this would have seemed like a disastrous action that would only lead to Britannia giving them a tighter leash, with Jeremiah at the head of the Orange nation there was hope for freedom. When the nation and Jeremiah made their declaration, the other Areas already following in the footsteps of the Orange Autonomous Area would do the same. The entire South American region in open revolt of Britannia, the Areas renamed themselves following the same lead as the Oranges.\n\nBut, they lacked the meaning behind the name, they lacked what had made the Oranges special. When Jeremiah was asked to make a speech to the populace by Villetta Nu, he gave the reason for the name Orange."
 ORG.5.a:0 "'Orange, you say? That is the name of my Loyalty!'"
 ORG.6.t:0 "ORANGE You Glad to See Me?"
 ORG.6.d:0 "While the other nations succession from Britannia alongside the Orange Autonomous Area seemed like a random chance, it was in fact perfectly in line with what Jeremiah had planned. It did not matter to him that the other Areas didn't immediately join his nation, he knew how to deal with them regardless\n\nAfter dealing with freeing themselves from Britannia, the Orange Autonomous Area could now move onto the next step of their plan. Getting ready to conquer Britannia, and for that the Orange Autonomous Area needed more land, more factories, and more men.\n\nWith the eyes of the world on them now, the Orange Autonomous Area now began to prepare for war, the Oranges were already gearing for war. Their nation was getting ready to go to war, and so were they, following their Viceroy with the loyalty that he has shown them."
 ORG.6.a:0 "Our nation and our Oranges grow."
 ORG.7.t:0 "Orange Cybernetics Research"
 ORG.7.d:0 "Jeremiah's appearance in Area 5 seemed all but random, the truth of his origins was mysterious. Even more so is what he brought with him, he brought not just a company valued at trillions of dollars to Area 5, he brought technology and schematics that far outclassed the ones used currently.\n\nBringing technology which could only be said to be from the far future, parts of this technology was from Jeremiah himself. His body was partly made up of cybernetic parts that in part, was keeping him alive.\n\nHe allowed the Orange scientists to examine the technology, to attempt to reverse engineer to recreate it and apply it to others. Not only to save lives, but to improve the people of the nation, and in some part to bring them closer to becoming Oranges. It did not take long for the scientists to reach a breakthrough with it.\n\nWhile the technology was highly advanced, the schematics and knowledge of it that Jeremiah had, made recreating it easier it got past the testing phase easily. Ready for mass production and implementation into the entire nation."
 ORG.7.a:0 "Taking one step closer to being Orange."
 ORG.8.t:0 "Ultimate Knightmare Frame OR-1"
 ORG.8.d:0 "With the schematics of the new technology called the Knightmare Frame, moves to improve it went ahead with no extra need for authorisation. Though Jeremiah had brought the best of the best technology he could grab at the time, he knew the world would be quick to advance.\n\nPerhaps even faster now that the entire world was able to see what the Orange Autonomous Area had access too. The scientists would begin work on a new project, to improve the technology of the Sutherland design they got from Jeremiah. To make it able to surpass all other technology, due to the might of Orange engineering.\n\nThe scientists dubbed the project and the new design for the Knightmare Frame O-R1NG3 L-OY1L with that being its full designation, it was however shortened to the OR-1 Knightmare Frame.\n\nWithin a matter of weeks the Knightmare Frame design went from a simple improvement design on the Sutherland, to the prototype phase, through testing, to being ready for full mass production for the entire nation. The benefits of their lord Jeremiah, and the loyalty and will of the Oranges allowed the OR-1 to be the best of the best."
 ORG.8.a:0 "The finest of Orange engineering!"
 ORG.9.t:0 "Orange Earth"
 ORG.9.d:0 "With an army that was worthy to conquer nations, and the entirety of the South American continent under the control of the Oranges. Jeremiah knew it was time to look towards Britannia, the biggest obstacle in his path to a better world, to completing his plan.\n\nIt was to go against Britannia, a nation he had previously sworn his life too that was the biggest challenge for Jeremiah. But that challenge faded in a moment when he was reminded of his loyalty and goals, Jeremiah was lost in thought as he sat at his desk looking down. He had forgotten that he had company entirely.\n\n'Lord Jeremiah.' He heard the voice of Viletta Nu ask him, as he felt her hand softly touch his shoulder, she looked at him softly while standing at his side.\n\n'Don't mind him, he was lost in his Oranges again.' The voice this time was Anya who was standing in front of the desk looking over at him, her eyes actually had a sparkle in comparison to the first time Jeremiah had met her.\n\n Jeremiah sighed and stood up out of his chair, the hand of Villetta still on him, he leaned over the table. Saying loudly."
 ORG.9.a:0 "'To have our Orange Earth, Britannia must go!'"
 ORG.10.t:0 "Orange Requiem"
 ORG.10.d:0 "The Holy Orange Empire had come so far from at first only being another Area of Britannia lost in the sea with the others. To having overthrown and completely taken over the nation, removing the tyranny of Britannia from the world. Jeremiah sighed softly, he seemed to be constantly sighing in private nowadays.\n\n'It's still not done.' He said simply, while he looked forward across his desk his hands coming up towards his chin he leaned against it as he was left in silence.\n\n'My Emperor still knows pain, from this world.. it's not done. The Orange Requiem still has steps to go.' Jeremiah let out to himself; his constant reminder of loyalty is what kept him going this far. Even more so then the cybernetics in his body that kept him living, the technology could keep him alive. But his loyalty lets him live.\n\nHe knew that there were still nations out there that would cause chaos and havoc for the world, and with them there he could never have the peace he wanted.\n\nEven if they weren't, some of the conquered populaces weren't happy with their new position, he simply had one declaration for them."
 ORG.10.a:0 "'I will destroy the world, and create it anew.'"
 ORG_orange_boy:0 "Orange Boy?"
 ORG_orange_boy_desc:0 "Area 5 has now become known as the Orange Autonomous Area, thanks to the influence of the Orange International Corporation. But, there's been rumours of the CEO of the company, making a bid for power, he uses the nickname Orange Boy."
 ORG_i_am_an_orange_dr_hans:0 "I am an Orange Dr. Hans"
 ORG_i_am_an_orange_dr_hans_desc:0 "The Orange Autonomous Area's people are falling in line more and more with the nation, they start to cry out in the streets that they are one with Orange, that they are all Oranges."
 ORG_orange_tinted_loyalty:0 "Orange Tinted Loyalty"
 ORG_orange_tinted_loyalty_desc:0 "The loyalty of the people to the nation is absolute, pushing for the nation to no longer be a direct pawn of britannia. The effect of their loyalty is followed suit by other Britannia Areas, and along with the Oranges they are throwing off the direct chains of Britannia."
 ORG_eternal_loyalty:0 "Eternal Loyalty"
 ORG_eternal_loyalty_desc:0 "Finally, along with the cries of loyalty from the Oranges, the Orange Autonomous Area finally rids itself of Britannia, rallying behind their leader, Jeremiah Gottwald! The other Areas have followed suit, succeeding from Britannia and carving out their own lands."
 ORG_ethylene_powered_air_fleet:0 "Ethylene Powered Air Fleet"
 ORG_ethylene_powered_air_fleet_desc:0 "With the full power of the Orange Autonomous Area's factories, and the minds of genius Orange scientists. The nation is able to build planes and airships, run entirely off of ethylene."
 ORG_orange_you_glad_to_see_me:0 "ORANGE You Glad to See me?"
 ORG_orange_you_glad_to_see_me_desc:0 "While the other Britannia Area's followed the example led by the Oranges. They do not hold the upmost loyalty to Orange, and for that they must be put back into place."
 ORG_the_citrus_fleet:0 "The Citrus Fleet"
 ORG_the_citrus_fleet_desc:0 "The waves surrounding us for so long were conquered by our Britannian oppressors, no longer will that be. Construction of an even grander navy is taking place, one that will rule the waves in the name of Orange."
 ORG_assembling_orange_airforce:0 "Assembling Orange Airforce"
 ORG_assembling_orange_airforce_desc:0 "With the tech in hand for ethylene powered ships, it is now time to begin the grand constrution of the nations Orange Airforce."
 ORG_orange_the_fleet:0 "Orange The Fleet"
 ORG_orange_the_fleet_desc:0 "Mighty ships that can sail the seven seas, equiped with the mightiest guns are useless if they are not put to proper use. It is time to arrange the Citrus Fleet in a proper manner."
 ORG_maximum_orange_efficiency:0 "Maximum Orange Efficiency"
 ORG_maximum_orange_efficiency_desc:0 "Our factories have reached the peak of their efficiency, thanks to the dedication and hardwork of the Oranges."
 ORG_orange_coast:0 "Orange Coast"
 ORG_orange_coast_desc:0 "The land we hold is surrounded by the seas, for us to conquer the seas we must first tame the coastline, and make it our own."
 ORG_oranges_the_finest_in_cybernetics:0 "Oranges! The Finest in Cybernetics"
 ORG_oranges_the_finest_in_cybernetics_desc:0 "Our leader Jeremiah Gottwald has a whole host of cybernetics, the orange scientists have been working on engineering them to work on others. The process was slow, but finally the Orange Cybernetics can be applied to the whole military."
 ORG_a_superior_orange_army:0 "A Superior Orange Army"
 ORG_a_superior_orange_army_desc:0 "We have built an army that could surpass a gear of metal, one that will surpass Britannia and the world, an army that will make the enemies run Orange."
 ORG_construction_of_the_knightmares:0 "Orange Powered Knightmares"
 ORG_construction_of_the_knightmares_desc:0 "Knightmare Frames are some of the deadliest weapons our nation has access to, and it just so happens that our leader Jeremiah Gottwald, had a whole host of schematics from where he was from, ones that surpass all."
 ORG_ultimate_knightmare_the_or1:0 "Ultimate Knightmare The OR-1"
 ORG_ultimate_knightmare_the_or1_desc:0 "With the schematics from Jeremiah, our scientists have been at work to improve them. To make them our own, and to make the ultimate Knightmare Frame, which they have dubbed the OR-1."
 ORG_god_is_an_orange:0 "God is an Orange"
 ORG_god_is_an_orange_desc:0 "With our advances to improving the everyday orange soldier, our work has truly surpassed being human. God is real, and he is an Orange."
 ORG_knights_of_orange:0 "Knights of Orange"
 ORG_knights_of_orange_desc:0 "The new Knightmare Frames were put to quick use, and pilots very quickly began to distinquish themselves amongst the rest. These skilled pilots were hand picked by Jeremiah, to become part of his Knights of Orange."
 ORG_we_can_orange_the_price:0 "We Can Orange The Price"
 ORG_we_can_orange_the_price_desc:0 "The value of the Orange International Corporation and the Orange Autonomous Area increases everyday, but our land does not. To the point that we've begun to look at other means for acquiring it."
 ORG_an_orange_earth:0 "An Orange Earth"
 ORG_an_orange_earth_desc:0 "Jeremiah's goal in all this has been simple, to end strife and war. To do that he has taken a simple approach, to make the whole world Orange. To make it loyal to itself and it's people, to do that Britannia must fall."
 ORG_the_orange_council:0 "The Orange Council"
 ORG_the_orange_council_desc:0 "The running of the Orange Autonomous Area is getting harder and harder for Jeremiah to keep track of, it is why he has put together a group of the most loyal, and intelligent Oranges to help with this, he formed the Orange Council."
 ORG_united_they_fall:0 "United They Fall"
 ORG_united_they_fall_desc:0 "The E.U. is a nation that has strife, turmoil and conflict within itself. The Orange Autonomous Area cannot simply sit by and watch them fall apart, we will hasten their collapse."
 ORG_from_desert_to_sea:0 "Every Man an Orange"
 ORG_from_desert_to_sea_desc:0 "For too long has the world been seperated by various countries, it is time to rectify that mistake. Time to make every man, every woman and every child an Orange."
 ORG_orange_requiem:0 "Orange Requiem"
 ORG_orange_requiem_desc:0 "With Britannia defeated, Jeremiah takes one step closer to his goal. In truth, his plan is completed only with a few more loose ends to tie up, he will destroy the world, and create it anew with the Orange Requiem, all for his loyalty."