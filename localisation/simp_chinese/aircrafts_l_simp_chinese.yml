﻿l_simp_chinese:
 cas:0 "地面支援"
 cv_cas:0 "艦載近距支援機"
 cv_CAS_equipment_desc:0 "我們的密接支援理論學說要求一款可進行精確範圍攻擊的飛行器。此種飛機的可用載荷較大型的戰略轟炸機要小，可在低空掃射及俯衝轟炸時伺機攻擊摧毀小型目標。"
 cv_fighter:0 "艦載多用途戰機"
 fighter:0 "多用途戰機"
 early_jet_design:0 "早期輕型飛機設計"
 early_jet_design_desc:0 "輕型戰機是一種主要爲空戰設計的固定翼飛機。在軍事衝突中，這些飛機被用來奪取戰鬥區域的制空權。掌握戰區制空權可以讓轟炸機和攻擊機可以對敵方目標實施戰術或戰略轟炸。"
 cv_fighter_equipment_desc:0 "多用途戰機是一種爲了執行多種戰鬥任務而設計戰機。可以執行空中格鬥、空中支援、轟炸、偵查、電子戰和壓制防空火力等任務。"
 fighter1:0 "多用途戰機 I"
 fighter1_desc:0 "多用途戰機是一種爲了執行多種戰鬥任務而設計戰機。可以執行空中格鬥、空中支援、轟炸、偵查、電子戰和壓制防空火力等任務。"
 cv_fighter_equipment_1:0 "多用途戰機 I"
 cv_fighter_equipment_2:0 "多用途戰機 II"
 fighter2:0 "多用途戰機 II"
 fighter2_desc:0 "這架飛機包含重大的結構改動以及更大的發動機。機身設計融入了功率更強的發動機，並配備了先進的發動機艙結構和艙門。後座爲武器系統軍官配備了設備，使其能夠通過多個屏幕操作空對地航空電子設備。"
 improved_fighter:0 "通用多用途戰機改進"
 improved_fighter_desc:0 "現在，多用途戰機裝載了威力更大的導彈，能對Knightmare造成傷害。速度和攻擊精度也得到提升。"
 fighter4:0 "多用途戰機 III"
 fighter4_desc:0 "這種飛機裝備了更大的機翼，這使得有效載荷和機動性與其推力成比例地增加，但也會以各種方式增加機身的重量。它對Knightmare的攻擊抗性大幅增強了。"
 stealth_fighters:0 "多用途戰機隱身改進"
 stealth_fighters_desc:0 "在機翼上共固化技術的創新應用遇到暫時性的困難，但這項技術的前沿應用已經被證實可以減輕重量、提升航程，還有利於提高隱身性能。"
 fighter5:0 "多用途戰機 IV型"
 fighter5_desc:0 "多用途戰機的最新發展使其對所有威脅的攻防能力得到了加強。此外，極高的靈活性使其能夠在同一場行動中，在極短的時間內執行多項任務。"
 g_support1:0 "近距支援機 I型"
 g_support1_desc:0 "我們的密接支援理論學說要求一款可進行精確範圍攻擊的飛行器。此種飛機的可用載荷較大型的戰略轟炸機要小，可在低空掃射及俯衝轟炸時伺機攻擊摧毀小型目標。"
 g_support2:0 "近距支援機 II型"
 g_support2_desc:0 "近距支援飛機的新型號在防禦系統方面進行了改進，還配備了用於抵禦任何攻擊的小型武器。"
 improved_g_support_desc:0 "考慮到Knightmare戰機技術的最新發展，這類戰機已配備一套全新的防禦系統。這樣一來，它們將能更好地抵禦戰機的攻擊。"
 g_support4:0 "近距支援機 III型"
 g_support4_desc:0 "近距支援機儘管最近已嘗試進行改進，但事實證明它們在抵禦來自下方的敵人攻擊時仍過於脆弱。如今，它們將在戰場邊緣發揮作用，憑藉增強型導彈和武器提供支援。"
 improved_g_support:0 "通用地面支援改進"
 stealth_g_support:0 "通用近距支援機隱身改進"
 stealth_g_support_desc:0 "爲了讓近距支援機躲過低級防空設施，有必要提高它們的隱身能力。"
 UNLOCK_DIVISION_PLANES:0 "我們將解鎖攻擊機的全部機型。"
 UNLOCK_DIVISION_PLANES_2:0 "我們將解鎖轟炸機和運輸機的全部機型。"
 early_jet_design_2:0 "早期重型飛機設計"
 early_jet_design_2_desc:0 "重型戰機是一類主要爲空對地打擊設計的軍用固定翼飛機。它們在軍事衝突中扮演着多種角色包括轉運部隊、輸送武器、轟炸海上或陸地目標等。"
 hel1:0 "攻擊直升機 I"
 hel1_desc:0 "攻擊直升機是一種以攻擊機爲主要作用的武裝直升機，具有攻擊敵方步兵、軍用車輛和防禦工事等地面目標的進攻能力。由於攜帶了重型武器，有時也被稱爲武裝直升機。 "
 helicopter_equipment_1:0 "攻擊直升機 I"
 helicopter_equipment_1_desc:0 "攻擊直升機是一種以攻擊機爲主要作用的武裝直升機，具有攻擊敵方步兵、軍用車輛和防禦工事等地面目標的進攻能力。由於攜帶了重型武器，有時也被稱爲武裝直升機。 "
 helicopter_equipment_2:0 "攻擊直升機 II"
 helicopter_equipment_2_desc:0 "現代攻擊直升機的主要角色有兩個：一是通過直射火力爲地面部隊精準的提供近距空中支援；二是作爲反坦克單位摧毀敵方裝甲集羣，攻擊直升機也被用於護送運輸直升機，或者在武裝偵查任務中支援輕型直升機。"
 hel2:0 "現代攻擊直升機的主要角色有兩個：一是通過直射火力爲地面部隊精準的提供近距空中支援；二是作爲反坦克單位摧毀敵方裝甲集羣，攻擊直升機也被用於護送運輸直升機，或者在武裝偵查任務中支援輕型直升機。"
 hel2_desc:0 "Modern attack helicopters have two primary roles: first, to provide direct and accurate close air support for ground troops; and second, the anti-tank role to destroy grouped enemy armor. Attack helicopters are also used as protective escort for transport helicopters, or to supplement lighter helicopters in the armed reconnaissance roles."
 hel_improve:0 "通用直升機改進"
 hel_improve_desc:0 "攻擊直升機現在可以使用機關炮、機關槍、火箭彈、反坦克導彈等武器。一些攻擊直升機還可以裝配備了空對空導彈。"
 trans1:0 "運輸機 I"
 trans1_desc:0 "軍用運輸機指由軍方所有、用於空運士兵及軍事裝備以支持軍事行動的運輸機。保持難以通過地面或水路到達的前沿基地的補給線離不開軍用運輸機。它們既可用於戰略運輸任務，也可用於戰術運輸任務。"
 transport_plane_equipment_1:0 "運輸機 I"
 transport_plane_equipment_1_desc:0 "軍用運輸機指由軍方所有、用於空運士兵及軍事裝備以支持軍事行動的運輸機。保持難以通過地面或水路到達的前沿基地的補給線離不開軍用運輸機。它們既可用於戰略運輸任務，也可用於戰術運輸任務。"
 trans_improve:0 "通用運輸機改進"
 trans_improve_desc:0 "新型運輸直升機普遍具備較強的運載能力，配備全新強化防禦系統，可搭載一個排的步兵，也可以通過機艙內置或懸掛運輸牽引式火炮與輕型車輛。"
 trans2:0 "航空母艦"
 trans2_desc:0 "這是類艘大型艦船，內部設有衆多居住艙室、會議室與娛樂活動室。艦橋採用分層指揮平臺設計，主控臺位於其他控制平臺之上，各平臺間以階梯相連。防禦系統方面，最初僅艦體底部配備強子光束護盾，後經升級擴展至全艦防護。進攻武器系統包括分佈於艦體各處的自動機槍炮塔、沿甲板佈置的導彈發射器、一門巨型艦首主炮以及一門後置式主炮。"
 transport_plane_equipment_2:0 "航空母艦"
 transport_plane_equipment_2_desc:0 "這是類艘大型艦船，內部設有衆多居住艙室、會議室與娛樂活動室。艦橋採用分層指揮平臺設計，主控臺位於其他控制平臺之上，各平臺間以階梯相連。防禦系統方面，最初僅艦體底部配備強子光束護盾，後經升級擴展至全艦防護。進攻武器系統包括分佈於艦體各處的自動機槍炮塔、沿甲板佈置的導彈發射器、一門巨型艦首主炮以及一門後置式主炮。"
 bomber1:0 "噴氣式轟炸機 I"
 bomber1_desc:0 "轟炸機是一種專爲攻擊地面與海上目標而設計的軍用作戰飛機，通過投擲對地攻擊武器（如炸彈）、發射魚雷或部署空射巡航導彈來執行任務。現代噴氣式轟炸機主要承擔戰略轟炸任務，但有時也可實施戰術轟炸。"
 strat_bomber_equipment_1:0 "噴氣式轟炸機 I"
 strat_bomber_equipment_1_desc:0 "轟炸機是一種專爲攻擊地面與海上目標而設計的軍用作戰飛機，通過投擲對地攻擊武器（如炸彈）、發射魚雷或部署空射巡航導彈來執行任務。現代噴氣式轟炸機主要承擔戰略轟炸任務，但有時也可實施戰術轟炸。"
 bomber2:0 "噴氣式轟炸機 II"
 bomber2_desc:0 "轟炸機是一種專爲攻擊地面與海上目標而設計的軍用作戰飛機，通過投擲對地攻擊武器（如炸彈）、發射魚雷或部署空射巡航導彈來執行任務。"
 strat_bomber_equipment_2:0 "噴氣式轟炸機 II"
 strat_bomber_equipment_2_desc:0 "現代噴氣式轟炸機主要承擔戰略轟炸任務，有時也可用於戰術轟炸。儘管如此，它們已被證實是造價高昂但效果平平的武器。"
 missile_equip:0 "通用武器強化"
 missile_equip_desc:0 "現代噴氣式轟炸機主要承擔戰略轟炸任務，有時也可用於戰術轟炸。儘管如此，它們已被證實是造價高昂但效果平平的武器。"
 bomber3:0 "噴氣式轟炸機 III"
 bomber3_desc:0 "隱形戰機爲了防止被敵方探測而設計的飛機，運用多種技術手段降低了在雷達、紅外、可見光、射頻頻譜及聲學等探測頻譜上的反射或輻射特徵，這類技術被統稱爲隱身技術。"
 strat_bomber_equipment_3:0 "噴氣式轟炸機 III"
 strat_bomber_equipment_3_desc:0 "隱形戰機爲了防止被敵方探測而設計的飛機，運用多種技術手段降低了在雷達、紅外、可見光、射頻頻譜及聲學等探測頻譜上的反射或輻射特徵，這類技術被統稱爲隱身技術。"
 sak_equip:0 "附加櫻石設備"
 sak_equip_desc:0 "櫻石動力開發的成果將得到應用；新式引擎保障了極大的轟炸範圍，也提高了地毯式轟炸的效率。"
 gen_improv_2:0 "通用噴氣式轟炸機改進"
 gen_improv_2_desc:0 "提高噴氣式轟炸機的任務效率，此外，開發威力更大的航彈將確保保這些飛行器的表現進一步提高。"
 bomber4:0 "噴氣式轟炸機 IV"
 bomber4_desc:0 "這種最新型的轟炸機可以執行各種高風險任務而不暴露蹤跡。此外，它們與Knightmare接戰的風險也很低。"
 strat_bomber_equipment_4:0 "噴氣式轟炸機 IV"
 strat_bomber_equipment_4_desc:0 "這種最新型的轟炸機可以執行各種高風險任務而不暴露蹤跡。此外，它們與Knightmare接戰的風險也很低。"