 BRT.28.t:0 "修奈澤爾獲勝"
 BRT.28.d:0 ""
 BRT.28.a:0 ""
 BRT.29.t:0 "姬妮薇兒獲勝"
 BRT.29.d:0 ""
 BRT.29.a:0 ""
 BRT.30.t:0 "一局血腥的棋"
 BRT.30.d:0 ""
 BRT.30.a:0 "這一輪我們必勝。"
 BRT.31.t:0 "11區之行"
 BRT.31.d:0 ""
 BRT.31.a:0 "軍隊是權力的支柱。"
 BRT.32.t:0 "皇帝的影子"
 BRT.32.d:0 ""
 BRT.32.a:0 "我們會解決此事。"
 BRT.33.t:0 "鞏固我們的地位"
 BRT.33.d:0 ""
 BRT.33.a:0 "親愛的姐姐，妳再也構不成威脅了。"
 BRT.34.t:0 "一份公正的背書"
 BRT.34.d:0 ""
 BRT.34.a:0 "先謝了，皇兄。"
 BRT.35.t:0 "白色皇子的將軍"
 BRT.35.d:0 ""
 BRT.35.a:0 "偉大帝國配得上英明的統治者。"
 BRT.36.t:0 "第47號指令"
 BRT.36.d:0 ""
 BRT.36.a:0 "立即開始執行！"
 BRT.39.t:0 "來自11區的貨運"
 BRT.39.d:0 ""
 BRT.39.a:0 "他們將得到我們的全力支持。"
 BRT.40.t:0 "莫妮卡的馬加丹之行"
 BRT.40.d:0 ""
 BRT.40.a:0 "她會完成她的任務。"
 BRT.41.t:0 "鬆散的邦聯"
 BRT.41.d:0 ""
 BRT.41.a:0 "統一的社會主義戰線？真有趣。"
 BRT.42.t:0 "撲滅社會主義之火"
 BRT.42.d:0 ""
 BRT.42.a:0 "它現在是、將來也永遠是一種死去的意識形態。"
 BRT.43.t:0 "我們在黑暗大陸的存在"
 BRT.43.d:0 ""
 BRT.43.a:0 "我們已找到目標。"
 BRT.60.t:0 "商討冰島的歸屬"
 BRT.60.d:0 ""
 BRT.60.a:0 "這份回報值得冒險。"
 BRT.60.b:0 "他們真以為我們那麼蠢嗎？"
 BRT.61.t:0 "來自潘德拉貢的交易"
 BRT.61.d:0 ""
 BRT.61.a:0 "我們會禮貌地接受。"
 BRT.62.t:0 "暗中會面"
 BRT.62.d:0 ""
 BRT.62.a:0 "一切盡在計畫之中。"
 BRT.63.t:0 "約翰尼斯堡條約"
 BRT.63.d:0 ""
 BRT.63.a:0 "就這麼定了。"
 BRT.64.t:0 "我們最忠誠的民兵"
 BRT.64.d:0 ""
 BRT.64.a:0 "看好那些混蛋！"
 BRT.65.t:0 "利用他們的文書作業"
 BRT.65.d:0 ""
 BRT.65.a:0 "官僚主義將是他們的墳墓。"
 BRT.66.t:0 "紅心藍皮之國"
 BRT.66.d:0 ""
 BRT.66.a:0 "讓他們趁還來得及好好享受他們的殖民地吧。"
 The_Great_Homecoming_Phase_1:0 "偉大的歸鄉"
 POLITICS_CHARLES_BRTT_DESC:0 "自查爾斯統治伊始，政府便將社會達爾文主義奉為理想信條。因此，宣傳部門使用三大標語：競爭即平等、支配即和平、力量即正義。這些話語在激勵帝國將士、強化政府權力的同時，也助長了極端派系——純血派——的聲勢。此外，它們還在各民族與各社會階級之間製造出一種持續的社會緊張狀態。"
 efficient_administration:0 "高效的行政"
 efficient_administration_desc:0 "不列顛尼亞的殖民行政體系以中央集權的官僚機構與嚴密的軍事管制著稱，是世界上效率最高的體系之一。這些特點確保了各領地在開發期間法律與秩序得以維持，最終讓不列顛尼亞殖民者能夠安心遷居於此。"
 legal_segregation:0 "制度化的種族隔離"
 legal_segregation_desc:0 "秉持社會達爾文主義的信條，不列顛尼亞實施了一套複雜而殘酷的種族隔離和壓迫制度，用來對付少數族裔。在不列顛尼亞征服的領土上，原住民被稱作“Numbers”，他們的文化遭到強行摧毀，推行同化政策，在最極端的情況下甚至演變為種族清洗。總的來說，他們的生活水平遠低於其他族裔，並且被剝奪了大多數社會晉升的機會。"
 militarized_academia:0 "軍事化的學術界"
 militarized_academia_desc:0 "皇家政府目前正調撥大量資源與資金以落實奧德修斯的提案。其內容包括進一步擴充與現代化武裝部隊，涵蓋創新武器與軍備。"
 extreme_stratocracy:0 "嚴格的軍政體制"
 extreme_stratocracy_desc:0 "不列顛尼亞社會以其公民的僵化階層而聞名於世。人們按血統劃分，一旦被歸入平民或軍隊系統中的某個社會階級，便鮮有改變的機會。"
 aristocratic_families:0 "貴族的暴政"
 aristocratic_families_desc:0 "拿破崙征服不列顛群島後，許多英國貴族追隨王室流亡。在各項帝國制度建立並穩定之後，這些貴族將自身影響力制度化於參議院——因為那裡賦予他們否決權，這是他們制約皇帝權力的唯一手段。"
 army_primacy:0 "陸軍至上"
 army_primacy_desc:0 "不列顛尼亞根深蒂固的軍國主義影響著整個社會，並經常受到達爾文主義宣傳與帝國新聞界的鼓吹。普通軍官的職業生涯往往享有優厚待遇——更高的薪俸以及躋身貴族的實際可能——這有效提升了軍官的士氣，進而提高了他們的整體生產力與效率。"
 financial_conglomerates:0 "金融財閥"
 financial_conglomerates_desc:0 "不列顛尼亞經濟的特徵是一系列強大的經濟金融財閥，它們往往由貴族家族或退役將領掌控。這造就了惡劣的勞動條件與極其孱弱的中產階級。"
 pax_britannica:0 "不列顛尼亞和平（Pax Britannica）"
 economic_isolation:0 "全面貿易封鎖"
 economic_isolation_2:0 "部分貿易封鎖"
 BRT_iceland_deal:0 "購買冰島"
 court_intrigues:0 "貴族的詭計"
 court_intrigues_desc:0 "血之紋章時代結束已數十年，但內鬥與暗流再度在皇宮中浮現，主因是瑪莉安娜皇妃對現政府的巨大影響力。儘管查爾斯的鐵腕曾終結了昔日的暴力事件，這一次恐怕不夠了。"
 VV_situation:0 "V.V.問題"
 VV_situation_desc:0 "V.V.——Geass教團的最高祭司與首領——正在政府背後採取詭異的行動。不過必須指出，皇帝與他保持著密切聯繫，因此在防止任何潛在危險事故或狀況發生方面，應該不會有太大問題。"
 BRT_assassination:0 "意外之死"
 BRT_assassination_desc:0 "V.V.終於出手了。這將帶來無法估量的後果……"
 BRT_evidence:0 "封鎖首都！"
 BRT_evidence_desc:0 "首先，我們必須關閉進出首都的所有通道。這樣既能保全顏面，又能阻止任何目擊者離開潘德拉貢。"
 BRT_investigating:0 "繼續調查！"
 BRT_investigating_desc:0 "一支特別偵查隊已組建以偵破此案，但我們必須盯緊他們……"
 BRT_case_unsolved:0 "懸案？"
 BRT_case_unsolved_desc:0 "偵探們越過了不該越過的界線。他們挖出了太多帝國政府的祕密。必須立刻終止這項調查！"
 BRT_continue_plan:0 "聯絡首相"
 BRT_continue_plan_desc:0 "鑑於已故皇妃的變故，我們必須穩定首都局勢。奧德修斯首相可以助我們一臂之力。"
 BRT_foreign_situation:0 "對抗中華聯邦"
 BRT_foreign_situation_desc:0 "為了重奪我們在世界舞台上的地位，我們可以在太平洋與我們的對手中華聯邦一戰。儘管人數眾多，中華軍隊尚未準備好應對針對其亞洲屬地的突襲。"
 BRT_bombings:0 "空襲馬尼拉"
 BRT_bombings_desc:0 "菲律賓是中華聯邦最暴露的傀儡之一，又因鄰近10區與不列顛尼亞太平洋艦隊，堪稱完美的目標。為了摧毀其基礎設施與士氣，我們將對其首都馬尼拉發動大規模空襲，無論城內有多少平民。中華聯邦對此的反應必然遲緩。"
 BRT_troops:0 "與日本的邊境衝突"
 BRT_troops_desc:0 "我們可以在石垣島與日本挑起一些邊境衝突，使其無暇干涉我們的事務。數艘不列顛尼亞巡邏艇已就位，準備向沿岸附近的任何日本漁船鳴砲示警，以牽制其海軍，掩護我們在菲律賓的行動。"
 BRT_army:0 "攻佔菲律賓"
 BRT_army_desc:0 "菲律賓是橫亙在我們與中華聯邦之間為數不多的領土之一。必須盡快將其納入我們的控制，為我們在亞洲的戰役做準備。"
 BRT_oriental:0 "東方事變"
 BRT_oriental_desc:0 "在菲律賓行動之後，我們遭到亞洲各國的一致譴責，其中最重要的幾國已決定禁運我們的商品，並對我們的貿易施加嚴厲制裁。這對我們的經濟是一場災難。我們必須迅速行動，否則後果將極為嚴重。"
 BRT_protectionism:0 "實施保護主義政策"
 BRT_protectionism_desc:0 "為了保護不列顛尼亞工業免受禁運引發的崩盤，我們必須將精力轉向國內經濟。一攬子保護主義措施將維持眾多企業的競爭力，儘管在政治上代價高昂。"
 BRT_diplomacy:0 "提議談判"
 BRT_diplomacy_desc:0 "如果我們希望彌補禁運造成的損失，就必須與歐洲人展開外交談判。我們可以秘密安排一項貿易協定，以阿圖群島為代價，換取歐洲開始進口我們的商品，而中華聯邦對此一無所知。北方諸島將成為俄羅斯的一部分，但它們對「怒濤行動」的戰略價值微不足道。"
 BRT_aid_MON_rebels:0 "援助蒙古叛軍"
 BRT_aid_MON_rebels_desc:0 "許多部長提議對禁運採取強硬措施：資助蒙古境內的幾個分裂組織。我們將利用我們在京都六家、日本黑幫以及幾個中國黑社會組織內部的關係來聯繫他們。"
 BRT_block_sup:0 "展示軍事實力"
 BRT_block_sup_desc:0 "在這個關鍵時刻，必須提醒其他超級大國：如果他們的挑釁太過火，我們有能力做出什麼。圓桌騎士正是這一角色的完美人選。他們將被部署到太平洋與大西洋的戰略區域。"
 BRT_domestic_front:0 "治理國內戰線"
 BRT_domestic_front_desc:0 "為了進一步穩定國家，首相提出了一系列對付內部滋事者與潛藏威脅的措施。"
 BRT_reassure_family:0 "安撫皇室"
 BRT_reassure_family_desc:0 "瑪莉安娜·vi·不列顛尼亞的孩子——魯路修與娜娜莉——在潘德拉貢處境極其危險。在魯路修提出那個可笑的請求之後，他們將作為交易籌碼被送往日本。身為皇室成員，他們將受到樞木首相的保護。"
 BRT_control_purists:0 "排擠純血派"
 BRT_control_purists_desc:0 "拜瑪莉安娜事件所賜，純血派在帝國士兵中獲得了危險的聲望。他們目前對皇室構成威脅。必須將他們暫時排除在不列顛尼亞政治之外。"
 BRT_nobility_ties:0 "重申貴族的支配地位"
 BRT_nobility_ties_desc:0 "重申貴族在不列顛尼亞政治體系中的支配地位、支持那些在血之紋章時代多次助我們一臂之力的潘德拉貢豪門世家，是十分重要的。這將削弱激進派系，同時壯大寡頭金融財閥。"
 BRT_laziness_odysseus:0 "拉攏首相"
 BRT_laziness_odysseus_desc:0 "儘管奧德修斯首相最初對瑪麗安娜的死表現出了極大的熱情，但他卻日益懈怠。我們需要和他“談談”，以確保他積極參與國家政治。"
 BRT_KN_dev:0 "繼續Knightmare研發"
 BRT_KN_dev_desc:0 "早在瑪麗安娜去世之前，我們的科學家就已經開始利用櫻石進行實驗，試圖製造出名為「knightmares」的強大武器，這將使我們在對抗敵人時擁有巨大的優勢。然而，這項研究十分複雜，還需要一段時間才能完成。"
 BRT_KN_module_1:0 "Knightmare研究：\n第一階段"
 BRT_KN_module_1_desc:0 "我們打造了一種緊急駕駛艙，作為我們Knightmare的基礎。它配備火箭引擎，可在Knightmare被摧毀時將駕駛員送往安全地帶。由於加裝了安全設備，艙內的活動空間不大，但這種設計的好處遠大於缺點。畢竟，每一名獲救的士兵都能活著再為我們而戰。"
 BRT_KN_module_2:0 "Knightmare研究：\n第二階段"
 BRT_KN_module_2_desc:0 "我們在每台knightmares的腿部都安裝了一套輪子，我們稱之為「陸行推進系統」。它將顯著提升夢魘騎士在地面行進時的機動性和速度。"
 BRT_KN_module_3:0 "Knightmare研究：\n第三階段"
 BRT_KN_module_3_desc:0 "我們研發出了一種精密的攝影機，並將其命名為Factsphere感應器。它的用途是將熱成像數據直接傳輸給駕駛員。它利用種類繁多的硬體，為駕駛員提供關於敵人、盟友與周遭環境的龐大資訊網。"
 BRT_KN_ashford:0 "來自阿什福德家族的幫助"
 BRT_KN_ashford_desc:0 "阿什福德家族一直是我們政府忠實的盟友。目前，他們經營著一所頗有效率的研究所，我們可以借助它妥善研發Knightmare。有了他們的協助，我們終於能打造出合格的Knightmare模組，並使其在我軍中標準化。"
 BRT_KN_old_guard:0 "對抗守舊派"
 BRT_KN_old_guard_desc:0 "包括現任陸軍總長在內的幾位老將仍在反對Knightmare的研製。他們固守傳統戰術，認為Knightmare是天方夜譚，因而是資源的浪費。如果他們拒絕放下成見，我們就再也不需要他們了。因此，奉查爾斯·zi·不列顛尼亞皇帝的直接命令，必須將他們排擠出局。"
 BRT_KN_glasgow:0 "Glasgow的部署"
 BRT_KN_glasgow_desc:0 "我們終於成功整合了所有最新技術，打造出可靠的Knightmare機體！將它們編入若干陸軍師之後，我們終於準備好與日本及其保護者對決了。這項技術壯舉是我們強大帝國的光榮之日。不列顛尼亞萬歲！"
 BRT_war:0 "浪潮行動"
 BRT_war_desc:0 "是時候正式開始「浪潮行動」了——入侵並強制殖民日本本土。我們必須速戰速決，以免其他超級大國介入。"
 BRT_piece_empire:0 "帝國的新版圖……"
 BRT_piece_empire_desc:0 "勝利終於到來！地球臉上那塊醜陋的污漬——日本——不復存在了！騎士俾斯麥·瓦爾德斯坦與神聖不列顛尼亞帝國的強大軍隊粉碎了一切抵抗！然而，消化這塊土地絕非小事。"
 BRT_odysseus_resign:0 "……以及一個空出來的位置"
 BRT_odysseus_resign_desc:0 "皇太子奧德修斯·eu·不列顛尼亞已證明自己完全是不列顛尼亞皇室的恥辱。所幸，剝奪他的諸多職責易如反掌。將他排擠出局之後，環伺在他那想像中的王座周圍的兇猛競爭者們，便可為殘羹剩飯激烈地爭吵了。"
 BRT_struggle_begins:0 "讓鬥爭開始吧！"
 BRT_struggle_begins_desc:0 "權力，權力，權力！不列顛尼亞已是熟透的果實，唾手可得！棋子已然擺好；一場宏大的戲劇性演出只欠最後的點睛之筆！第二皇子兼首相修奈澤爾·el·不列顛尼亞與第一皇女姬妮薇兒·de·不列顛尼亞將為權柄陷入激烈的鬥爭。"
 BRT_diplomatic_field:0 "外交劇變"
 BRT_diplomatic_field_desc:0 "我們捅了馬蜂窩。我們對日本列島雄心勃勃的入侵絲毫無助於改善我們的國際地位。作為對我們侵略之舉的回應，中華聯邦與歐洲聯合共和國都已宣布將以牙還牙，引發了世界大戰的疑慮。"
 BRT_new_frontier:0 "新邊疆"
 BRT_new_frontier_desc:0 "在波光粼粼的大海彼岸，盤踞著一頭黑暗而可怖的怪物——一條企圖吞噬我們新得珍寶、渴求我們孩子鮮血的巨龍。中國——又稱中華聯邦——是我們國際大業實實在在的障礙。我們必須在這團火焰吞噬我們所有人之前將其扼殺。"
 BRT_reinforce_new_areas:0 "保衛我們的新殖民區"
 BRT_reinforce_new_areas_desc:0 "我們注意到，不列顛尼亞地面部隊無力守衛我們光榮帝國的每一寸土地。我們的指揮官提議迅速擴編不列顛尼亞外籍軍團，以彌補兵員的嚴重短缺。"
 BRT_paris_conference:0 "巴黎密會"
 BRT_paris_conference_desc:0 "我們應該讓歐盟聯合共和國相信我們的意圖，盡可能地安撫他們，讓他們誤以為自己可以逃脫我們的掌控。為了我們其他的利益，或許需要做出一些讓步，但這無關緊要。一旦我們得到所需之物，只需一筆，歐盟就會被掃進歷史的垃圾堆。"
 BRT_lost_homeland:0 "失落的故土"
 BRT_lost_homeland_desc:0 "歐洲是一群糟蹋新鮮空氣的墮落廢物；他們自我毀滅的政策已使他們駛向命運的冰山。但不必擔心！我們將為他們道德破產的民眾獻上生命中最偉大的禮物：死亡的甜美解脫。屆時，我們將奪回本屬於我們的土地！但何必止步於此？讓我們連他們的土地也一併奪走，就像他們當年對我們做的那樣！"
 BRT_reinforce_atlantic_fleet:0 "資助大西洋艦隊"
 BRT_reinforce_atlantic_fleet_desc:0 "我們的大西洋防禦艦隊正在船塢中鏽蝕。我們忽視了全球武力投射的關鍵一環，任由水兵們變得萎靡不振。透過任命意志堅定的年輕海軍軍官擔任要職，我們將重振這支力量並為其配備充足的裝備，迎接下一場重要的水面戰鬥。"
 BRT_china_detente:0 "與中華緩和關係"
 BRT_china_detente_desc:0 "即使痛徹心扉，我們也必須與中華聯邦達成相互諒解。兩國大使之間備受矚目的會晤，將大大彌合我們兩個民族國家之間的裂痕。只要使用安撫性的複雜辭令，必定能攪亂他們在生物學上便低人一等的頭腦，讓他們對我們的每一項條款都點頭稱是。"
 BRT_shuffle_foreign_minister:0 "撤換外交大臣"
 BRT_shuffle_foreign_minister_desc:0 "在現任班子的把持下，我們永遠無法完全控制外交部。我們必須除掉反對派——尤其是現任大臣——無論是靠說服還是靠武力。將他清出棋盤之後，可以讓他帶著可觀的奢華待遇退休。"
 BRT_economic_field:0 "經濟困境"
 BRT_economic_field_desc:0 "毫不意外，國際社會對我國水域的封鎖已損害了我們的經濟機器，使我們易受外部影響。我們必須拔除這根扎人的刺，否則一切都將停擺。高級官員們已開始炮製一些不成熟的方案，但最終還是要由我們來決定未來數週乃至數月要走哪條路。"
 BRT_favour_corporatism:0 "偏向社團主義"
 BRT_favour_corporatism_desc:0 "那惱人的噪音是什麼？我們的工人階級沒完沒了地抱怨自己的命運，以為自己有追求幸福的權利。真是一派胡言！不過，作為他們仁慈的上位者，我們必須賦予他們一絲自尊。將社會底層重組為社團組織，將來會對我們有利——至少，我們希望如此。"
 BRT_protectionism_thesis:0 "保護主義論"
 BRT_protectionism_thesis_desc:0 "自由市場經濟？我們絕不允許這種怪胎存在於我們的國境之內！我們將限制來自外國的進口，敦促國有企業自給自足地生產。當然，會有一些問題——不過沒什麼大不了的。我們的經濟顧問已再三保證，這是正確的道路。"
 BRT_mantain_balance:0 "維持平衡"
 BRT_mantain_balance_desc:0 "既然拼圖已經齊全，何必做不必要的改動？將公民分入社團組織、顛覆我們的社會結構，將有損國家的健康。所幸，只要與抱持改革思想的文書官僚和貴族中的笨蛋們找到共同點，或許就能避免這一切。"
 BRT_discuss_state_role:0 "討論國家的角色"
 BRT_discuss_state_role_desc:0 "國家對經濟部門的干預在過去已被證明是災難性的，因此我們提出戰略性方案：將這頭巨獸的一小部分私有化，讓國內外投資者利用我們的口岸開拓以往未曾涉足的新市場。同樣地，走上這條路之後採用嚴格還是靈活的模式，由我們決定。"
 BRT_favour_technocracy:0 "偏向技術官僚制"
 BRT_favour_technocracy_desc:0 "變革勢在必行。我們放任頹廢、腐敗，以及最糟糕的——無能，侵蝕著經濟的每一個重要層面。我們必須趁為時未晚，以外科手術般的精準切除這顆裙帶主義的毒瘤。將政府重組為以功績而非平庸為本的體制至關重要，否則我們恐將湮沒於歷史的故紙堆中。"
 BRT_take_key_positions:0 "奪取關鍵職位"
 BRT_take_key_positions_desc:0 "我們必須將支持者安插進這個新生的經濟機構；從大臣到工頭，每一個職位都必須由宣誓只效忠於我們的人擔任。兩位首相候選人中，誰能達成這個宏偉目標？唯有時間能給出答案。"
 BRT_buy_britannian:0 "購買不列顛尼亞貨！"
 BRT_buy_britannian_desc:0 "我們將用在帝國各地經濟區大規模生產的廉價商品充斥海外市場，並打上「不列顛尼亞製造」的旗號。憑藉這一果斷行動，我們將逐個國家掌控全球市場，最終完全主宰一切我們感興趣的事物！畢竟，誰會反對呢？"
 BRT_economy_science:0 "沒有經濟學的科學算什麼？"
 BRT_economy_science_desc:0 "我們的科學家不斷抱怨經濟顧問委員會犯下的所謂「失誤」。他們為什麼不能像同僚一樣乖乖聽話？我們將讓他們的研究機構服從生產部門的意志，把他們與自己所憎惡的東西綁在一起。自然而然，他們會認識到自己的錯誤，不再對我們信賴的副手們口出惡言。"
 BRT_shuffle_economic_minister:0 "撤換經濟大臣"
 BRT_shuffle_economic_minister_desc:0 "經濟大臣對我們期望的改革表現出頑強的抵抗。必須處理掉他。此時此刻，我們的特工正在讓他認清自己的錯誤。在他辭職之後，他會心臟病發作，他的家人將從地表上消失。確實令人惋惜，但鑑於我們經濟大業的莊嚴性，這也是無可奈何。"
 BRT_political_field:0 "政治摩擦"
 BRT_political_field_desc:0 "說來離奇，我們對帝國內部鬥爭的強硬手段，竟導致政府結構中的各方勢力爆發了全面衝突。我們必須從速處理這個問題，否則將面臨來自各個角落的大規模顛覆。時間至關重要。"
 BRT_purist_question:0 "純血派問題"
 BRT_purist_question_desc:0 "邪惡盤踞在帝國的正中心，纏繞著我們最優秀、最聰穎之人的心靈。我們一時大意，讓這些怪物染指了我們成功的果實。我們必須做出決定：要麼放手讓純血派清除這塊黑斑，要麼粉碎他們、另尋他法。沒有中間路線。"
 BRT_areas_question:0 "殖民區問題"
 BRT_areas_question_desc:0 "我們的地方建制是一團瀕臨徹底崩潰的爛攤子。我們連最基本的長期目標都未能達成。據我們最信賴的當地代表所言，蠻力已不再是選項，只會使局勢惡化。不幸的是，除非政策發生劇烈轉向，否則我們可能會被不可控的變數逼入絕境。"
 BRT_cult_question:0 "教團問題"
 BRT_cult_question_desc:0 "宗教狂熱分子對皇位完整性的威脅已持續太久。他們迷信的胡言亂語終於激怒了我們的軍事指揮官、高級貴族與科學精英。時機成熟時，我們要麼消滅這些怪胎，要麼大發慈悲，讓他們在我們的細心引導下勞作。選擇權在我們手中，但唯有未來能裁決我們的行動是對是錯。"
 BRT_shuffle_remaining_ministers:0 "撤換其餘大臣"
 BRT_shuffle_remaining_ministers_desc:0 "所有在政府結構的各個層面公然與我們作對的殘餘分子，都將被碾碎在我們的軍靴之下。鮮血將浸透宮殿的大理石地基。值得信賴的傀儡將取而代之，對我們的一切心血來潮唯命是從。"
 BRT_see_results:0 "獲勝者是……"
 BRT_see_results_desc:0 "大吉大利，今晚吃雞！誰將摘得帝國第二高位？是第二皇子修奈澤爾·el·不列顛尼亞，還是第一皇女姬妮薇兒·de·不列顛尼亞？不要走開，廣告之後即刻揭曉！"
 BRT_white_prince_wins:0 "白色皇子的統治……"
 BRT_white_prince_wins_desc:0 "第二皇子修奈澤爾終於贏得了帝國首相之位。雖然這場勝利幾乎人人都預料到了，但關於他能否承受帝國的政治重擔與幕後的種種算計，質疑聲已開始浮現。是時候讓修奈澤爾證明他們錯了。"
 BRT_deal_guinevere:0 "對付姬妮薇兒"
 BRT_deal_guinevere_desc:0 "我們的第一要務是除掉第一皇女姬妮薇兒——修奈澤爾最顯眼的對手。雖然我們不能直接對她下手——那太明顯了——但將她在政治上排擠到一個無所作為的位置，並讓皇家特務機關時刻監視她，目前應該足夠了。"
 BRT_endorsment_odysseus:0 "奧德修斯的祝福"
 BRT_endorsment_odysseus_desc:0 "我們的下一項要務是處理第一皇子奧德修斯與皇室其他成員。擺在他們面前的有兩個選擇：臣服，或是步第一皇女的後塵。"
 BRT_support_knights_rounds:0 "騎士們的支持"
 BRT_support_knights_rounds_desc:0 "圓桌騎士對帝國至關重要。憑藉表面上的政治中立，他們贏得了民眾的廣泛支持。他們對首相的支持——哪怕只是幕後的支持——都將是無價之寶。我們必須竭盡全力爭取。"
 BRT_talk_charles:0 "與查爾斯會談"
 BRT_talk_charles_desc:0 "有了圓桌騎士的支持，我們將去覲見查爾斯皇帝，請求他擴大首相的權力。若能得到皇帝的直接首肯，我們的奪權大業將如虎添翼。"
 BRT_appeal_young_nobles:0 "拉攏年輕貴族"
 BRT_appeal_young_nobles_desc:0 "老貴族們的道路與信念早已根深蒂固、無法改變，但年輕貴族仍有可能被說服——以更大的利益與權力的承諾為交換，讓他們與第二皇子及其理想結盟。"
 BRT_image_pop:0 "仁君形象"
 BRT_image_pop_desc:0 "獲得大部分貴族的支持之後，是時候著手處理輿論問題了。也許只需一個仁慈統治者的形象，就足以讓民意倒向我們。"
 BRT_lobby_senate:0 "在參議院大舉遊說"
 BRT_lobby_senate_desc:0 "在其他所有人都已點頭之後，修奈澤爾登上權力頂峰的最後一道障礙就是參議院。貴族們的大舉遊說、圓桌騎士撐腰的幕後交易、皇帝的默許，以及輿論的壓力，足以讓任何持異議的參議員就範。"
 BRT_rule_supreme:0 "……他的統治至高無上"
 BRT_rule_supreme_desc:0 "終於，在參議院的批准下，首相的權力得到大幅擴充。如今被稱為「第二皇帝」的首相，唯有皇帝本人才能推翻其權威。然而，隨著皇帝從日常政務中抽身、專注於個人的追求，「白色皇子」的統治如今已至高無上。"
 BRT_national_security_prog:0 "國家安全計畫"
 BRT_national_security_prog_desc:0 "修奈澤爾首相發現，帝國嚴重缺乏對自身安全的監督，大大影響了效率與凝聚力。建立一個國家安全計畫來解決這些問題乃是當務之急。"
 BRT_take_down_cult:0 "處理教團§R（分支開發中）§!"
 BRT_take_down_cult_desc:0 "我們的情報機構調查發現，帝國境內潛藏著一個令人不安的教團組織，成員從普通百姓到潘德拉貢議會和參議院都未能倖免。我們必須在帝國徹底崩潰之前將其剷除。 §R分支在建工程，等待思考電梯機制§!"
 BRT_counter_influence:0 "反制教團的影響"
 BRT_counter_influence_desc:0 "初步調查顯示，這個所謂的「Geass教團」的影響力已深入帝國內部，甚至可能觸及我們政府的最高層。我們必須開始採取反制措施，阻止其影響進一步擴散。"
 BRT_reach_out_jupiter:0 "聯絡朱庇特教團"
 BRT_reach_out_jupiter_desc:0 "朱庇特教團是一個與Geass教團敵對的古老教團，一心只想看到後者毀滅。爭取他們協助對抗教團，將大幅增進我們對敵人的了解，進而提升我們與之對抗的能力。"
 BRT_restrict_priests_recruit:0 "限制祭司的招募"
 BRT_restrict_priests_recruit_desc:0 "我們對Geass教團的緩慢接管仍在繼續。我們的情報部門已查明教團招募成員的管道，使我們的內務警察得以阻斷這些招募活動。他們的招募將日漸枯竭，實力嚴重削弱——緩慢，但確實。"
 BRT_isolate_pontiff:0 "孤立教皇"
 BRT_isolate_pontiff_desc:0 "重大突破！我們掌握了教團教皇的所在位置。我們將派遣特工與皇家衛隊將其圍困擒獲，一勞永逸地解散這個可憎的教團。"
 BRT_mantain_pendragon_priests:0 "保留潘德拉貢議會。"
 BRT_mantain_pendragon_priests_desc:0 "我們解散教團的計畫被皇帝親自改變了。奉他之命，我們必須繼續他的這項計畫，而第一步就是讓潘德拉貢議會中被除名的成員復職。"
 BRT_mantain_thought_elevetors:0 "繼續搶建思想升降機"
 BRT_mantain_thought_elevetors_desc:0 "我們對思想升降機計畫的追求仍在繼續，關鍵研究人員與工業產能都被調來使該計畫接近完成。"
 BRT_send_abroad_high_clergy:0 "將高階神職人員送往海外"
 BRT_send_abroad_high_clergy_desc:0 "在查爾斯皇帝的批准下，修奈澤爾首相開始正式解散這個教派。第一步是將教團內所有掌權者流放到無法危害帝國的地方。"
 BRT_partial_clean_up:0 "部分整頓行政機構"
 BRT_partial_clean_up_desc:0 "隨著思想升降機接近完工，分配給它的大部分資源可以安全地轉作他用。這些資源中包括一批在行政機構任職的人員，他們對帝國而言弊大於利。現在我們可以放心地處理掉他們，提升官僚體系的效率。"
 BRT_formally_ban_cult:0 "正式取締教團"
 BRT_formally_ban_cult_desc:0 "隨著這個所謂教團的關鍵成員被流放，修奈澤爾首相將完成教派的解散工作，在帝國全境禁止其活動，並銷毀思想升降機計畫。"
 BRT_total_clean_up:0 "整頓行政機構。"
 BRT_total_clean_up_desc:0 "解散教團的最後一步，是清除行政機關中該教團及其意識形態的一切痕跡。我們的情報機構將確保這些邪惡的思想不會污染我們的國家。"
 BRT_special_territory:0 "設立NRT特區"
 BRT_special_territory_desc:0 "作為臨時措施，修奈澤爾首相批准在2區北部島嶼設立特殊的NRT特區，並在我們完成對教團的調查期間，將所有被認定為教團成員、但並未在政府任職的人員遷移至此。"
 BRT_deport_remnants:0 "開始驅逐低階神職人員"
 BRT_deport_remnants_desc:0 "隨著NRT特區全面建成，針對目標人員的驅逐行動將全面展開——無論他們願不願意。"
 BRT_token_defense:0 "建立象徵性防禦"
 BRT_token_defense_desc:0 "NRT特區出現了動盪，主要癥結之一是當地居民的完全不設防狀態。我們並不真的在乎這種狀況，但叛亂無益於帝國的安全。一支小規模的象徵性防禦部隊將進駐這些島嶼，為居民營造安全的表象。"
 BRT_send_supplies:0 "運送必需物資"
 BRT_send_supplies_desc:0 "查爾斯皇帝命令我們向NRT特區的居民提供必需物資，讓他們得以「專注於首要任務」。雖然沒有人理解這一決定背後的動機，我們仍將遵旨行事。"
 BRT_improve_ports:0 "改善北方港口"
 BRT_improve_ports_desc:0 "作為補給後勤鏈的一環，也為了改善通往NRT特區的物資流通，2區北部的港口將得到改善。"
 BRT_small_industry:0 "建立小型工業"
 BRT_small_industry_desc:0 "我們向NRT特區輸送補給已經太久了。這佔用了本可用於他處的資源、運輸與人力。在查爾斯皇帝的批准下，修奈澤爾下令在NRT特區建立小型工業基地，讓他們得以自給自足。"
 BRT_research_facilities:0 "新研究設施"
 BRT_research_facilities_desc:0 "奉查爾斯皇帝之命，修奈澤爾已下令在NRT特區建造用途不明的研究設施。工程應立即開始。"
 BRT_leave_them:0 "暫且不管他們……"
 BRT_leave_them_desc:0 "雖然我們仍然反對這些特區的存在，但在此事上我們別無選擇。目前只能放任不管，正式將其設立為新的殖民區並任命相應的當局。但這只是權宜之計，一旦風向轉變，他們的命運也將隨之改變。"
 BRT_esoterism_no_more:0 "神祕主義到此為止！"
 BRT_esoterism_no_more_desc:0 "隨著計畫塵埃落定、教團被逐出不列顛尼亞本土，修奈澤爾終於可以專注於困擾帝國及其人民的更大問題，而不必再為皇帝那些無聊的追求分心。"
 BRT_secret_police:0 "新的祕密警察"
 BRT_secret_police_desc:0 "自登上首相之位以來，修奈澤爾一次又一次親眼目睹皇家特務機關（RSI）的無能。他擔心這可能是一場除掉他的陰謀，於是策劃了一個以自己的機構——OSI——取代RSI的計畫。第一步：招募忠於大業的特工。"
 BRT_dump_osi:0 "壓制RSI"
 BRT_dump_osi_desc:0 "特工已經招募完畢，新機構也已在掌控之中。我們必須開始在幕後削減RSI，並著手將資源轉給我們的新特工。"
 BRT_forced_retirements:0 "強制退休"
 BRT_forced_retirements_desc:0 "要解散RSI，我們目前最大的障礙是身居高位的眾多貴族，他們處處阻撓我們的計畫。應付這些干擾需要我們所沒有的時間與資源，因此我們的辦法是強制這些人退休，繞過這個問題。"
 BRT_integrate_remnants:0 "整合殘餘勢力"
 BRT_integrate_remnants_desc:0 "RSI已然分崩離析，可能構成威脅者或已退休、或身陷囹圄、或已被處決。如今終於可以將那些認同我們理念、卻被迫在這個腐敗組織中蹉跎的特工併入新成立的機構了。"
 BRT_increase_quality:0 "提升專業水準"
 BRT_increase_quality_desc:0 "雖然我們的特工熱情高漲、蓄勢待發，我們仍必須針對即將壓上他們肩頭的任務給予正規訓練。RSI那種「從街頭直接幹諜報」的老日子一去不返了。"
 BRT_swear_to_schneizel:0 "效忠修奈澤爾"
 BRT_swear_to_schneizel_desc:0 "這整個組織的宗旨是保護首相的利益，充當他伸向世界的雙手。是時候改變我們的程序，訓練特工們不效忠皇帝，也不效忠帝國，而是效忠修奈澤爾·el·不列顛尼亞。"
 BRT_increase_authority:0 "擴大其權限"
 BRT_increase_authority_desc:0 "如果OSI要成為修奈澤爾伸向世界的雙手，RSI時代的舊有制衡就必須廢除。更大的權限、更廣的權力、免受監督的豁免。這些只是修奈澤爾對RSI宏大計畫的第一步。"
 BRT_create_RSI:0 "正式成立OSI"
 BRT_create_RSI_desc:0 "隨著RSI的殘餘被併入OSI、其權限大幅擴張，OSI再也無法繼續隱身於暗處。我們將公開向世界介紹它，並讓異見者心生恐懼。還有什麼比逮捕涉及OSI腐敗的關鍵貴族更好的方式呢？"
 BRT_control_rogue_areas:0 "控制失控的殖民區"
 BRT_control_rogue_areas_desc:0 "OSI對貴族的逮捕行動揭露了一張蔓延各殖民區的腐敗深網，而掩護者正是OSI自己。決不能任其存續。我們必須徹查此事，趕在這些問題從內部撕裂帝國之前予以糾正。"
 BRT_clovis_work:0 "克洛維斯的白日夢"
 BRT_clovis_work_desc:0 "調查發現，11區總督——第三皇子克洛維斯·la·不列顛尼亞——正利用職權過著奢靡的生活，放任恐怖分子與煽動者在民間橫行。雖然我們無法撼動這項任命，但可以在暗中行動，抵銷行政當局的種種劣行。"
 BRT_luciano_playground:0 "盧奇亞諾的遊樂場"
 BRT_luciano_playground_desc:0 "我們對7區的調查發現，總督盧奇亞諾勳爵在駐地為所欲為。具體而言，盧奇亞諾一面睜一隻眼閉一隻眼，一面把這些領土當作他個人聲色犬馬的遊樂場。奉修奈澤爾的直接命令，盧奇亞諾勳爵將被調往其他地區，總督一職也將得到相應處置。"
 BRT_wild_admirals:0 "橫行的提督們"
 BRT_wild_admirals_desc:0 "調查揭露了一個令人不安的事實：那些負責為島嶼殖民區供應物資並保衛周邊海域的人，正在暗中勒索這些殖民區。這些所謂的「野提督」把這些殖民區當作自己的私人王國，就連總督們也因懼怕報復而不敢作聲。必須嚴懲他們，殺一儆百。"
 BRT_northen_tribes:0 "北方部落"
 BRT_northen_tribes_desc:0 "調查顯示，該區總督蓄意無視野蠻的北方部落及其製造的混亂。2區的居民日益不安，不滿情緒正在升溫。我們必須立即制止，並懲處放任此事發生的總督。"
 BRT_order_stability:0 "秩序與穩定！"
 BRT_order_stability_desc:0 "隨著最後一輪調查的完成，以及不服管束的殖民區被牢牢納入OSI的掌控，修奈澤爾終於可以高枕無憂：來自各殖民區對帝國的威脅已被遏制。他可以把目光轉向內部，以及他們的鄰居。"
 BRT_take_down_purists:0 "打倒純血派！"
 BRT_take_down_purists_desc:0 "首相之爭已然落幕，國家安全計畫也已建立，一個事實變得再明顯不過：帝國內部有人企圖將這一切連同我們取得的進步一併推翻。我們必須剷除他們，決不容許這類分子在帝國死灰復燃。"
 BRT_red_purists:0 "紅色純血派"
 BRT_red_purists_desc:0 "我們對不列顛尼亞本土學術界的初步滲透發現，大量反不列顛尼亞與共產主義思想正在我們的大學中蔓延，傳播者既有學生也有教職員。必須加以制止。"
 BRT_daily_checks:0 "每日抽查"
 BRT_daily_checks_desc:0 "作為遏制純血派思想在我們隊伍中蔓延的行動之一，我們將實施每日突擊檢查。"
 BRT_police_universities:0 "警察進駐大學"
 BRT_police_universities_desc:0 "改造大學之路的第一步，是限制大學享有的討論自由與課程自主。我們將派遣特工巡邏校園、監管課程，確保傳播的是正確的思想。"
 BRT_counter_propaganda:0 "反制惱人的宣傳"
 BRT_counter_propaganda_desc:0 "我們近來在校園裡的行動並未被忽視，反不列顛尼亞的宣傳正從我們警戒的縫隙中滲入。雖然直接打擊宣傳者輕而易舉，但那只會給大學當前的緊張氛圍火上澆油。滲透那些煽動者的隊伍、散播反宣傳，會有效得多。"
 BRT_biased_academia:0 "有立場的學術界"
 BRT_biased_academia_desc:0 "我們的努力正在收效，但這只是遏制歪風邪說蔓延的權宜之計。除非從根源上解決問題，否則這將是一場永無止境的內部戰爭。我們必須打造一個立場鮮明的教職體系，把我們的人安插到關鍵職位上，以左右國家的未來。"
 BRT_clean_intelligentsia:0 "潔淨的知識階層"
 BRT_clean_intelligentsia_desc:0 "要徹底肅清我們的學術界，還需要最後一擊，而委婉行事的時代早已過去。我們的宣傳已經奏效，現在正是除掉反對我們的關鍵人物的最佳時機。大學方面必將激烈反彈，但為了我們的未來，一個潔淨的知識階層必不可少。"
 BRT_brown_purists:0 "棕色純血派"
 BRT_brown_purists_desc:0 "我們對軍隊的調查發現，有一部分純血派拒絕接受我們的理想，不惜一切代價也要維護不列顛尼亞的傳統。這些所謂的「棕色貴族」必須被清除，否則他們將從內部瓦解並摧毀我們的軍隊。"
 BRT_pol_commissars:0 "政治委員"
 BRT_pol_commissars_desc:0 "遏制純血派計畫的第一步，是在所有軍事單位中設置政治委員，以監控軍官與士兵的一舉一動。"
 BRT_disband_worst_units:0 "解散墮落的部隊"
 BRT_disband_worst_units_desc:0 "我們的每日抽查與政治委員發現，一些部隊已被純血派的意識形態徹底浸透，甚至拒絕執行他們口中「劣等軍官」與「不列顛尼亞毀滅者」下達的合法命令。他們已無可救藥，重新訓練是天方夜譚。解散這些墮落的部隊是唯一的辦法。"
 BRT_demote_radical_off:0 "將激進軍官降職"
 BRT_demote_radical_off_desc:0 "隨著問題部隊的解散，武裝部隊中殘餘的純血派只剩下各個職位上的一些軍官。將他們降職之後，他們就再也無法傳播他們的「棕色瘟疫」了。"
 BRT_investigate_prev_minister:0 "調查前部長§R（分支進行中）§!"
 BRT_investigate_prev_minister_desc:0 "我們政府中的一些大臣與這個「棕色」運動有牽連，並反對我們的統治。我們必須找出他們，趕在他們繼續散播毒素之前予以處置。"
 BRT_false_allegations:0 "不實指控"
 BRT_false_allegations_desc:0 "在調查與純血派有牽連的大臣時，我們發現了其他關聯人士，但礙於政治形勢，我們無法直接解除他們的職務。為繞過這一點，我們的特工將向合適的人捏造一系列不實指控，最終使他們下台，而不暴露我們在此事中的角色。"
 BRT_legal_purge:0 "開始合法清洗……"
 BRT_legal_purge_desc:0 "拜我們的行動所賜，如今我們可以正式開始清洗所有與此運動有牽連的人。目前，我們將專注於低階行政人員與官員。"
 BRT_until_the_end:0 "……直到終點"
 BRT_until_the_end_desc:0 "隨著法律程序接近尾聲，是時候把目標對準行政機構中殘餘的「大魚」了。雖然他們至今憑藉隱匿與職權躲過了清洗，但這一切到此為止。決不能容許這些貴族繼續他們的活動。"
 BRT_revise_recruit_standards:0 "修訂士兵的教程"
 BRT_revise_recruit_standards_desc:0 "軍官已被降職，行政機構已被清洗，再也沒有什麼能阻止我們修改對士兵的教學課程，確保此類事件永不重演。"
 BRT_wipe_them_out:0 "將他們徹底消滅……直到永遠！"
 BRT_wipe_them_out_desc:0 "紅色與棕色純血派幾乎已被徹底逐出我們的政府，是時候消滅所有殘餘的漏網之魚，確保我們的帝國直到時間盡頭都不再受這些污穢的沾染。"
 BRT_white_prince_foreign_policy:0 "修奈澤爾的海外冒險"
 BRT_white_prince_foreign_policy_desc:0 "我們的皇帝查爾斯·zi·不列顛尼亞命令我們專注於擴張帝國、收復故土。我們將火速執行。"
 BRT_great_homecoming:0 "籌備偉大的歸鄉"
 BRT_great_homecoming_desc:0 "我們的最終目標是收復我們的故土——不列顛，但那確實還很遙遠。我們必須做好充分準備，分步驟推進，以確保成功。"
 BRT_phase_one:0 "偉大的歸鄉：第一階段"
 BRT_phase_one_desc:0 "我們宏大計畫的第一部分，是從非洲、冰島與俄羅斯著手，打擊歐盟的殖民地與薄弱領土，藉此削弱歐盟。我們將把它一塊一塊拆解，直到它再也無力與我們對抗。"
 BRT_phase_two:0 "盛大回歸：第二階段 §R（分支進行中）§!"
 BRT_phase_two_desc:0 "下一步是支持歐洲-英國對俄羅斯的推進，並在非洲設下陷阱，迅速征服它。鑑於中國聯邦已表現出參戰的意圖，歐盟的處境將非常危險。 §R分支在建工程等待歐盟內容§!"
 BRT_phase_three:0 "偉大的歸鄉：第三階段"
 BRT_phase_three_desc:0 "---"
 BRT_exploit_EU_divisions:0 "利用歐盟的分歧"
 BRT_exploit_EU_divisions_desc:0 "雖然歐盟對外呈現出一個人人齊心協力的驕傲聯盟形象，事實卻恰恰相反。成員國之間的內部分歧與摩擦時刻威脅著將其撕裂，唯有各方的努力才維繫著這份團結。是時候讓他們分崩離析了。"
 BRT_buy_iceland:0 "提議購買冰島"
 BRT_buy_iceland_desc:0 "---"
 BRT_military_buildup_iceland:0 "北極軍事集結"
 BRT_military_buildup_iceland_desc:0 "接管冰島領土之後，我們必須利用該島的地利，在那裡籌備軍事資源，以支援我們對歐盟的入侵。"
 BRT_proposal_china:0 "遞交東京提案"
 BRT_proposal_china_desc:0 "---"
 BRT_casablanca_truce:0 "卡薩布蘭卡停戰協定"
 BRT_army_regrouping:0 "開始重整軍隊"
 BRT_organise_new_areas:0 "組建新殖民區"
 BRT_last_stand:0 "最後一搏"
 BRT_divide_conquera:0 "分而治之"
 BRT_reach_out_kongo:0 "聯絡剛果殖民地"
 BRT_reach_out_germany:0 "聯絡德國"
 BRT_reach_out_scandinavia:0 "聯絡斯堪地那維亞"
 BRT_destroy_the_rest:0 "殲滅其餘的一切……"
 BRT_until_total_victory:0 "……直至完全勝利！"
 BRT_white_prince_real_thaw:0 "修奈澤爾的解凍"
 BRT_const_reforms:0 "開始大改革"
 BRT_fight_corruption:0 "打擊腐敗"
 BRT_enpower_pm:0 "進一步擴大首相權力"
 BRT_establish_council:0 "設立小議會"
 BRT_appease_pop:0 "安撫民眾"
 BRT_term_limits:0 "總督任期限制"
 BRT_expand_senate:0 "擴大參議院席次"
 BRT_controlled_opposition:0 "允許受控的反對派"
 BRT_apparent_plurality:0 "表面上的多元"
 BRT_voting_reforms:0 "有限的投票改革"
 BRT_hundred_flower_campaign:0 "百朵玫瑰運動"
 BRT_relax_censorship:0 "放寬審查"
 BRT_respect_private_dissense:0 "尊重私下的異議"
 BRT_amnesty:0 "輕罪特赦"
 BRT_ease_religious_tensions:0 "緩和宗教緊張"
 BRT_new_course:0 "新路線？"
 BRT_change_everything:0 "改變一切……"
 BRT_change_nothing:0 "……為了什麼都不改變"
 BRT_promote_coup:0 "自我政變……？"
 BRT_schneizel_ambitions:0 "修奈澤爾的野心……滿足了嗎？"
 BRT_schneizel_technocracy:0 "修奈澤爾的技術官僚體制"
 BRT_agency_technical_rec:0 "技術人才招募局"
 BRT_educational_affairs:0 "教育事務"
 BRT_power_minister:0 "非常權力"
 BRT_improve_university:0 "改善大學"
 BRT_more_funds:0 "投入更多資金"
 BRT_fleija_commission:0 "設立F.L.E.I.J.A.委員會"
 BRT_mild_decentralization:0 "溫和的去中央化"
 BRT_deal_corporatocracy:0 "應對企業寡頭"
 BRT_compromise_nobles:0 "與部分貴族妥協"
 BRT_anti_oligarchy_laws:0 "通過反寡頭法"
 BRT_breakdown_some_corp:0 "拆分麻煩的企業集團"
 BRT_fill_vacant_spaces:0 "填補空缺職位"
 BRT_limit_military_business:0 "限制軍方經商"
 BRT_labour_question:0 "勞工問題"
 BRT_council_landowners:0 "地主議會"
 BRT_council_business:0 "商人議會"
 BRT_all_labour_union:0 "以及全不列顛尼亞總工會"
 BRT_token_reforms:0 "實施象徵性改革"
 BRT_scientific_labour:0 "勞動的科學願景"
 BRT_vibrant_economy:0 "繁榮而僵滯的經濟"
 BRT_guinevere_triumph:0 "姬妮薇兒的勝利！"
 BRT_guinevere_triumph_desc:0 "這位現代瑪麗·安東尼贏得了不列顛尼亞的首相之位。面對她那精明過人的弟弟，這是一場了不起的勝利。無論如何，她已證明自己可以是一位狡黠的政治家。然而這場勝利也讓她成為眾矢之的，許多人已在暗中策劃她的垮台。"
 BRT_reward_purists:0 "獎賞右翼純血派"
 BRT_reward_purists_desc:0 "右翼純血派已證明是她競選首相的主要支持者，現在是投桃報李的時候了。"
 BRT_push_back_knights:0 "抹黑圓桌騎士"
 BRT_push_back_knights_desc:0 "儘管圓桌騎士對帝國宮廷的政治陰謀大多保持中立，他們手中的權力仍然多得沒有必要。抹黑他們可以削弱他們在公眾與私人精英中的聲望，進而削弱他們自身。"
 BRT_compromise_cult:0 "與教團會談"
 BRT_compromise_cult_desc:0 "贏得首相之位也讓我們捲入了不列顛尼亞更為……私密的事務。我們因此發現了一個涉及某種名為Geass之物的教團。也許與他們談一談，能讓他們轉而支持我們。"
 BRT_fuck_odysseus:0 "讓奧德修斯見鬼去吧！"
 BRT_fuck_odysseus_desc:0 "奧德修斯已一再證明，儘管身為皇太子，他卻是不列顛尼亞最大的蠢貨。夠了，他必須下台。限制他的權力應該就能解決問題。"
 BRT_expel_schneizel:0 "流放修奈澤爾"
 BRT_expel_schneizel_desc:0 "修奈澤爾自始至終是我們最大的對手，也是我們最大的心腹之患。將他調離帝國宮廷應能削弱他的權力基礎，讓我們少一個主要的反對者。"
 BRT_ignore_charles:0 "無視查爾斯的質問"
 BRT_ignore_charles_desc:0 "我們的行動並未逃過皇帝的眼睛。他處處質問我們，說得輕一點也令人憂心。也許我們該暫時無視他的質問，日後再應付他的怒火。"
 BRT_many_enemies:0 "眾多敵人……"
 BRT_many_enemies_desc:0 "儘管姬妮薇兒獲勝，宮廷中她的敵人比比皆是，有的公然叫囂，有的藏身暗處。若她想守住手中的權力，就必須以某種方式處置他們。"
 BRT_few_friends:0 "……與寥寥無幾的朋友"
 BRT_few_friends_desc:0 "即便獲勝，姬妮薇兒在宮廷中的朋友與盟友依然很少。若想繼續把持首相之位，我們必須善用現有的人脈，並鞏固既有的盟友。"
 BRT_pass_anti_rebellion_laws:0 "推動反頹廢法令"
 BRT_pass_anti_rebellion_laws_desc:0 "儘管姬妮薇兒過去也做過不光彩的事，但必須對侵蝕不列顛尼亞上流社會的頹廢之風有所作為。有了法令及其執行，上層階級應會更積極地為國家的進步效力。不過，貴族們對這些法令可不會高興……"
 BRT_something_bad_coming:0 "山雨欲來……"
 BRT_something_bad_coming_desc:0 "儘管推行了一些改革，姬妮薇兒在不列顛尼亞仍不得人心。這些舉措正在國內製造緊張，使許多人心生不祥的預感，也讓許多人猜想壓垮駱駝的最後一根稻草會是什麼。"
 BRT_battle_for_pendragon:0 "潘德拉貢之戰"
 BRT_battle_for_pendragon_desc:0 "出人意料的是，圓桌騎士對現任首相發動了一場未遂政變。當然，政變被姬妮薇兒的忠臣挫敗，但如今潘德拉貢已陷入混戰——姬妮薇兒的支持者集團與試圖逮捕她的圓桌騎士集團打得不可開交。"
 BRT_arm_citizens:0 "武裝市民"
 BRT_arm_citizens_desc:0 "我們需要更多士兵投入戰鬥。潘德拉貢的市民雖未受過訓練，但只要用甜言蜜語與承諾給他們一個晉升階級的機會，許多人會欣然應召。"
 BRT_loyal_units:0 "召回忠誠部隊"
 BRT_loyal_units_desc:0 "雖然遠在潘德拉貢之外，我們仍可召回軍中一些依然忠於姬妮薇兒的部隊與軍官，讓他們加入戰鬥、贏得勝利。"
 BRT_blind_royal_palace:0 "封鎖主宮"
 BRT_blind_royal_palace_desc:0 "主宮即使不是潘德拉貢最重要的建築，也是最重要的建築之一。封鎖主宮既能防止宮內消息外洩，也能進一步鞏固勝利的正當性。"
 BRT_call_governor:0 "致電州長"
 BRT_call_governor_desc:0 "潘德拉貢州州長雖不起眼卻舉足輕重，是拉攏到我方的重要助力。有了他的支持，我們應能迅速而輕鬆地結束這場戰鬥。"
 BRT_dustle_settles:0 "塵埃落定……"
 BRT_dustle_settles_desc:0 "儘管短時間內血流成河、生靈塗炭，我們仍取得了勝利。所有活著的反抗者均已被捕，他們的命運尚待裁決。這一切結束之後，姬妮薇兒真正的權力鞏固就要開始了！"
 BRT_internal_war:0 "……內部戰爭開始！"
 BRT_internal_war_desc:0 "潘德拉貢的勝利已然到手，如今我們可以將全部精力投入國內問題，進一步鞏固我們的統治。"
 BRT_speech_nation:0 "姬妮薇兒的盛大演說"
 BRT_speech_nation_desc:0 "戰勝圓桌騎士的叛軍證明了姬妮薇兒是一位有能力擊敗強敵的領袖。發表一場演說既能提升她在民眾中的正當性，也能宣揚她的理念。"
 BRT_people_militia:0 "組建青年民兵"
 BRT_people_militia_desc:0 "潘德拉貢之戰暴露了諸如當地缺乏本土部隊之類的問題。我們可以組建青年民兵，既為未來的兵役預作訓練，也培養他們對姬妮薇兒的忠誠。"
 BRT_indoctrinate_osi:0 "拉攏OSI"
 BRT_indoctrinate_osi_desc:0 "OSI是我們最重要的情報機構。把他們拉到我們這一邊，是加強我們對不列顛尼亞控制的萬全之策。"
 BRT_declare_witch_hunt:0 "開始獵巫"
 BRT_declare_witch_hunt_desc:0 "剷除帝國宮廷中的所有異己絕非易事，但只要投入足夠的資源並展開行動，就能拿下宮廷中最具敵意的那部分人。"
 BRT_enemy_everywhere:0 "敵人……無處不在！"
 BRT_enemy_everywhere_desc:0 "潘德拉貢的局勢已大致處理妥當，接下來要對付帝國中其餘的反對勢力。他們滲透在帝國的每個角落，若想穩固我們的統治，就必須迅速果斷地處理他們。"
 BRT_purge_bureucracy:0 "清洗官僚體系"
 BRT_purge_bureucracy_desc:0 "帝國內仍有許多官僚、總督與州長不肯臣服於我們。這是絕對不能容忍的。"
 BRT_purge_government:0 "馴服政府"
 BRT_purge_government_desc:0 "可悲的是，我們大業中最大的敵人正是皇帝本人及其行政班子。將他排除出局，是我們獲得一致掌控的唯一途徑。"
 BRT_purge_navy:0 "削弱海軍"
 BRT_purge_navy_desc:0 "海軍軍官們不太服從管轄，削減他們的預算準能讓他們改變主意。"
 BRT_purge_army:0 "肅清陸軍"
 BRT_purge_army_desc:0 "陸軍中充斥著異見者與不配自稱不列顛尼亞軍人之徒。一場以除役為手段的清洗勢在必行。"
 BRT_brazil_problem:0 "8區問題"
 BRT_brazil_problem_desc:0 "雖然我們以任命州長為名，將修奈澤爾非正式地流放到了8區以遏制他在宮廷的權勢，他卻再次證明自己是心腹之患。我們必須一勞永逸地解決他。但我們不能用太直接的方式處理……"
 BRT_rely_other_areas:0 "整備周邊殖民區"
 BRT_rely_other_areas_desc:0 "我們必須開始籌備滲透8區。調撥資源與能夠穿越叢林的士兵，我們就能對付修奈澤爾的營地並發動攻擊。"
 BRT_expeditionary_corp:0 "籌備遠征"
 BRT_expeditionary_corp_desc:0 "組建一支特種小隊攻擊他的營地，我們就能悄無聲息地解決修奈澤爾。"
 BRT_atlantic_blockade:0 "大西洋封鎖"
 BRT_atlantic_blockade_desc:0 "我們將封鎖8區，切斷修奈澤爾與外界的一切聯繫。任何東西都不得進出。"
 BRT_attack_brazil:0 "攻打修奈澤爾的基地！"
 BRT_attack_brazil_desc:0 "是時候攻打修奈澤爾的基地，一勞永逸地解決他了！"
 BRT_governors_loyalty:0 "考驗州長們的忠誠"
 BRT_governors_loyalty_desc:0 "本土的潘德拉貢有許多高官不服從我們。設下考驗，就能看清誰忠誠、誰該除掉。"
 BRT_break_resistance:0 "粉碎麻煩的抵抗"
 BRT_break_resistance_desc:0 "甚至有一部分市民把姬妮薇兒視為不正當且糟糕的首相。最好讓他們見識一下，為什麼她是不列顛尼亞最出色的首相之一。"
 BRT_crush_east_coast:0 "東海岸的無政府狀態"
 BRT_crush_east_coast_desc:0 "最初的十三殖民地素來桀驁不馴，他們的後代也承襲了同樣的性子。控制東海岸是實現全面掌控、減輕行政負擔的優先要務。"
 BRT_great_lake_campaign:0 "五大湖戰役"
 BRT_great_lake_campaign_desc:0 "鏽帶一直是我們的工業中心，但那裡還有更多叛亂分子要對付，尤其是那批人數不多卻聒噪的工團主義少數派。"
 BRT_northen_campaign:0 "北方遠征"
 BRT_northen_campaign_desc:0 "不列顛尼亞北部大多是森林密布、人煙稀少的地區，但這不減其重要性。這裡蘊藏著大量資源，也讓我們得以清剿逃亡至此的零星抵抗勢力。"
 BRT_empire_consolidated:0 "帝國：大一統"
 BRT_empire_consolidated_desc:0 "憑藉裁決與武力，我們終於幾乎完全掌控了整個帝國的行政體系。"
 BRT_charles_house_arrest:0 "軟禁查爾斯"
 BRT_charles_house_arrest_desc:0 "軟禁皇帝將徹底遏制他的一切影響力，但此舉將令帝國上下許多人大為不滿。"
 BRT_deal_vv:0 "處置V.V."
 BRT_deal_vv_desc:0 "皇帝有一位依然在世、外表卻如孩童般的兄長。他深得皇帝信任，在教團中也頗具影響力。必須立即處置他。"
 BRT_intimidate_senate:0 "掌控參議院"
 BRT_intimidate_senate_desc:0 "只要加強我們對參議院的影響力，就能讓他們同意我們需要的幾乎任何事……至少從法律層面上是如此。"
 BRT_hunt_down_schneizel_supp:0 "打壓技術官僚制"
 BRT_hunt_down_schneizel_supp_desc:0 "因為修奈澤爾的緣故，技術官僚們過去、現在乃至將來都會與我們作對。我們必須應對這套理念並公開挑戰它，讓民眾相信它遠沒有吹噓的那麼好。"
 BRT_loyalty_not_meritocracy:0 "要忠誠，不要精英制"
 BRT_loyalty_not_meritocracy_desc:0 "雖然對有能力的人而言似乎很不公平，但讓忠誠的政客、軍官等人佔據要職，將大大有助於建立無可置疑的統治，杜絕反對衝突的產生。"
 BRT_pendragon_conquered:0 "潘德拉貢：安全無虞"
 BRT_pendragon_conquered_desc:0 "首都已牢牢處於我們的統治之下，我們在這裡幾乎已無人能敵。"
 BRT_favour_young_cadres:0 "重用年輕軍官"
 BRT_favour_young_cadres_desc:0 "年輕軍官更可能效忠於我們，也更渴望證明自己、走出老將的陰影。"
 BRT_control_ports:0 "鐵腕控制港口"
 BRT_control_ports_desc:0 "掌握港口進出的一切，我們就能進一步控制海軍資產，迫使那些尚未歸順者最終接受現實。"
 BRT_compromise_rogue_admirals:0 "與失控的提督們會談"
 BRT_compromise_rogue_admirals_desc:0 "有些提督仍在我們的掌控之外。也許透過給予特殊的讓步，我們能說服他們加入我們。"
 BRT_limit_navy_authority:0 "限制海軍的權限"
 BRT_limit_navy_authority_desc:0 "限制軍用海軍資產的港務權，將使我們更直接地控制海軍，進一步集中我們的權力。"
 BRT_navy_conquered:0 "海軍：隨時效命"
 BRT_navy_conquered_desc:0 "海軍終於被我們掌控，隨時準備執行我們的命令。"
 BRT_execute_knights:0 "處決騎士"
 BRT_execute_knights_desc:0 "騎士們的時代結束了。他們過去雖有用處，如今對我們只剩威脅。需要一場公開處決，讓膽敢反抗者看看自己的下場。"
 BRT_bribe_luciano:0 "收買盧奇亞諾"
 BRT_bribe_luciano_desc:0 "盧奇亞諾·布拉德利對騎士而言向來是個異類，人生態度亦然。他很容易被說服為我們效力。"
 BRT_shuffle_high_command:0 "改組最高統帥部"
 BRT_shuffle_high_command_desc:0 "將最高統帥部換成效忠我們的人，有助於進一步掌控陸軍。"
 BRT_hunt_left_purists:0 "摧毀偽純血派"
 BRT_hunt_left_purists_desc:0 "有些純血派反對我們，稱我們的政策是反不列顛尼亞。必須立即粉碎他們。"
 BRT_purge_officer_corp:0 "清洗軍官團"
 BRT_purge_officer_corp_desc:0 "除掉所有不效忠我們的軍官，是進一步鞏固我們對陸軍控制所必需的開銷。"
 BRT_brown_purist_dominance:0 "確立純血派的支配地位"
 BRT_brown_purist_dominance_desc:0 "「讓不列顛尼亞保持不列顛尼亞血統」是純血派鼓吹的論調。將其發揚光大，就能讓社會最底層的人也變得民族主義高漲，自覺比非不列顛尼亞人更優越。"
 BRT_deport_honorary_brit:0 "驅逐名譽不列顛尼亞人"
 BRT_deport_honorary_brit_desc:0 "名譽不列顛尼亞制度從來都是一場愚蠢的實驗。我們需要更多的不列顛尼亞人來統治不列顛尼亞，而不是數字人。"
 BRT_army_conquered:0 "陸軍：不再是威脅"
 BRT_army_conquered_desc:0 "陸軍已被掌控，一切非不列顛尼亞的影響均已清除。他們整裝待發，隨時效命。"
 BRT_declare_internal_war_end:0 "宣布流血結束"
 BRT_declare_internal_war_end_desc:0 "始於搖搖欲墜根基上的事業終於實現了。姬妮薇兒雖非皇帝，如今對帝國已近乎擁有絕對的支配。所有反對者均已敗北，淪為教科書中的註腳。姬妮薇兒昂然屹立，贏得了這一代人的宮廷之爭。現在，不列顛尼亞的新時代即將開始。不列顛尼亞萬歲！姬妮薇兒萬歲！"
 BRT_influence_EU_colonies:0 "影響歐盟殖民地"
 BRT_influence_EU_colonies_desc:0 "眼下與歐盟公開開戰並不明智，但我們必須確保在那塊大陸上取得立足點。奈及利亞與南非這兩塊歐盟殖民地，正是我們以壓倒性影響力征服的首選目標。"
 BRT_operation_orange:0 "橙色行動"
 BRT_operation_orange_desc:0 "南非長期在歐盟的陰影下凋敝，無法繁榮發展。這在民間滋生了怨恨——我們可以利用的怨恨。"
 BRT_reach_out_boers:0 "聯絡布爾人"
 BRT_reach_out_boers_desc:0 "布爾人長久以來渴望從歐盟獨立，卻缺乏打這場戰爭的手段。雖然我們不能公開向他們提供Knightmare Frame或類似技術，但我們可以提供基本武器，供他們對抗自己的「壓迫者」。"
 BRT_promises_greatness:0 "偉大的承諾"
 BRT_promises_greatness_desc:0 "南非人民已準備好起義；他們只差一點推力來扭轉天平。我們將向他們許諾在我們治下的偉大前程——條件是，且僅當時機到來時，他們協助我們對抗他們昔日的主人。"
 BRT_declare_apartheid_compatible:0 "宣布與種族隔離制度相容"
 BRT_declare_apartheid_compatible_desc:0 "種族隔離是當前南非最重要的制度之一，以至於任何反對它的聲音都只會遭到排斥。如果我們承諾支持他們維護這一制度，並保證不列顛尼亞與之相容，我們與南非的關係將大幅改善。"
 BRT_joeannesburg_meeting:0 "約翰尼斯堡會議"
 BRT_joeannesburg_meeting_desc:0 "看來我們的努力沒有白費。南非當局希望與我們商談：戰後南非的未來將是什麼樣子，我們又將與他們交換何種利益。這將是一個漫長的過程，但我們已經獲得了南非王國的軍事通行權，為未來的戰爭做準備。"
 BRT_operation_dark_anvil:0 "黑鐵砧行動"
 BRT_operation_dark_anvil_desc:0 "雖然奈及利亞不像南非王國那樣容易滋生異見，但它地處對我們有用的戰略要地，而且國內本就存在親不列顛尼亞或反歐盟的勢力。我們將緩慢滲透，並準備在時機成熟時迅速接管該國。"
 BRT_infiltrate_bureucracy:0 "滲透他們的官僚體系"
 BRT_infiltrate_bureucracy_desc:0 "奈及利亞的行政機構嚴重缺編，缺乏能勝任治國所需工作的人力。一批能幹的「奈及利亞」人才突然湧入，必定有助於緩解這一問題。"
 BRT_influence_pied_noirs:0 "與黑腳法裔對話"
 BRT_influence_pied_noirs_desc:0 "黑腳法裔曾被許諾榮耀，被許諾一個由他們這些歐洲人掌管、與EU其他國家平起平坐的奈及利亞，如今卻淪為非洲的一個卑微殖民地。雖然他們對類似的提議必然心存疑慮，我們仍將向他們承諾：讓這個國家成為一個殖民區（Area），並由黑腳法裔在不列顛尼亞治下主政。"
 BRT_pull_in_companies:0 "引入不列顛尼亞企業"
 BRT_pull_in_companies_desc:0 "奈及利亞經濟凋敝，大量資源被輸往歐洲本土，卻沒有任何回報，這讓民眾深感不滿與沮喪。讓我們的企業進駐該國提振其經濟——哪怕我們虧本——必定能為我們贏得民眾的支持。"
 BRT_horse_troy:0 "我們的特洛伊木馬"
 BRT_horse_troy_desc:0 "表面上奈及利亞仍是歐盟的忠實成員，實際上它已是我們的囊中之物。民心已倒向另一邊，眾多領導人與我們合作，我們的特工佔據要職，我們可以自由地將部隊調入該國，準備對其他殖民地發動突襲。這是我們在非洲的特洛伊木馬。"
 BRT_fund_russian_loyalists:0 "資助俄羅斯保皇派"
 BRT_fund_russian_loyalists_desc:0 "我們進軍歐洲需要一個突破口，而我們的情報機構認定俄羅斯正處於風雨飄搖之中。保皇派正在爭取一個自由獨立的國家，內戰一觸即發。我們向這些保皇派提供一點資金上的推力，就能讓這個國家開始走向沉淪。"
 BRT_send_monica:0 "派遣騎士莫妮卡"
 BRT_send_monica_desc:0 "保皇派如今士氣高昂、資金充足，卻缺乏訓練與有效的計畫。我們沒有時間慢慢把他們的領袖培養到位，因此將祕密派遣莫妮卡卿去引導他們走上對我們有利的道路。"
 BRT_stir_up_separatists:0 "煽動分離主義傾向"
 BRT_stir_up_separatists_desc:0 "保皇派雖已就緒，但沒有民眾的支持，這個計畫終將一敗塗地。我們必須煽動民眾的分離主義傾向，把他們推向「獨立國家」的目標，讓俄羅斯人民心甘情願地投身這場戰爭。"
 BRT_operation_white_bear:0 "白熊行動"
 BRT_operation_white_bear_desc:0 "終於，在確保了俄羅斯民眾的支持之後，是時候全面點燃這場內戰了：建立歐洲不列顛尼亞。為了讓計畫開花結果，我們仍需持續在幕後提供支援，但這是我們最終擊垮歐洲、奪回故土的第一步。"
 BRT_supply_euro_britannia:0 "補給歐洲不列顛尼亞"
 BRT_supply_euro_britannia_desc:0 "歐洲不列顛尼亞與俄羅斯的戰爭打得如火如荼，僅憑歐洲不列顛尼亞的資源不足以贏得這場衝突。雖然風險不小，但若要打贏這場戰爭，就必須在幕後為他們提供補給。"
 BRT_undefined_soldiers:0 "「未定義」士兵"
 BRT_undefined_soldiers_desc:0 "雖然我們不能正式參戰，卻沒有什麼能阻止有進取心的士兵申請休假，前往歐洲不列顛尼亞前線為信念而戰。他們心懷如此高尚的意圖，我們當然會批准這些休假申請，並帶著我們的祝福送他們出征。"
 BRT_secure_supply_lines:0 "確保補給線"
 BRT_secure_supply_lines_desc:0 "歐洲不列顛尼亞的部隊作戰英勇，但訓練不足顯而易見。最明顯的莫過於他們既不保護自己的補給線，也不攻擊敵人的補給線。我們的部隊將承擔起這副重擔，以確保勝利。"
 BRT_winter_kn:0 "改良冬季Knightmare"
 BRT_winter_kn_desc:0 "歐洲不列顛尼亞「神祕」獲得的那批Knightmare從未針對冬季作戰設計，只要分析它們在這場戰爭中的表現便一目了然。我們將改良這些Knightmare，使其能有效作戰。"
 BRT_goal_urals:0 "挺進烏拉爾"
 BRT_goal_urals_desc:0 "隨著俄羅斯抵抗的瓦解，我們必須將目標對準真正的下一站：烏拉爾。歐洲絕大多數的資源開採礦場都位於這條山脈，我們必須攻佔這些領土，切斷歐洲其餘地區獲取這些關鍵戰爭物資的管道。"
 BRT_green_light_china:0 "對中華亮綠燈"
 BRT_green_light_china_desc:0 "我們接到消息，中華聯邦計劃入侵歐洲，並希望在此事上與我們合作。這個臨時同盟的好處不容忽視。我們將與中華聯邦展開會談，為未來制定計畫。"
 BRT_finalise_spartition_plans:0 "敲定瓜分方案"
 BRT_finalise_spartition_plans_desc:0 "中華聯邦願意站在我們這一邊參戰，但要求在歐洲崩潰後瓜分領土。歐洲本應完全屬於我們，但這個方案的收益大於其暫時的弊端。況且，我們以後隨時可以征服他們。"
 BRT_reveal_our_horses:0 "亮出我們的木馬！"
 BRT_reveal_our_horses_desc:0 "隨著計畫進入第二階段，是時候剖開特洛伊木馬的腹部，在非洲釋放我們的怒火了。"
 BRT_african_blitz:0 "非洲閃電戰"
 BRT_african_blitz_desc:0 "在來自南非與奈及利亞的兩路夾擊之下，敵人在非洲的防線正在崩潰。我們將席捲這片大陸，把歐洲的腐化勢力從這片土地上清除。"
 BRT_send_cornelia:0 "派柯內莉亞上戰場"
 BRT_send_cornelia_desc:0 "我們的部隊進展神速，但還可以更快。我們將派第二皇女柯內莉亞指揮我們在該大陸的部隊。敵人將會明白她為何被稱為我們的「勝利女神」。"
 BRT_disturb_eu_supplies:0 "擾亂歐盟補給"
 BRT_disturb_eu_supplies_desc:0 "歐洲輸送的補給正在拖慢我們在該大陸的推進。常規戰術不起作用，因此我們將集中力量徹底粉碎他們的後勤能力。"
 BRT_rush_colonies:0 "直撲邊境"
 BRT_rush_colonies_desc:0 "有柯內莉亞坐鎮指揮，加上敵人後勤癱瘓，歐洲在非洲已毫無勝算。我們必須直撲大陸邊境，從南方威懾其本土。"
 BRT_manage_area_quotas:0 "殖民區的壓榨"
 BRT_manage_area_quotas_desc:0 "所有處於不列顛尼亞控制下的殖民區，都必須透過嚴苛的壓榨體系為本土經濟做出貢獻，無論其人民付出何種代價。我們必須以鐵腕治理每一塊領土，並確定神聖不列顛尼亞帝國要從它們的經濟中抽取多少。"
