 BRT_post_war_struggle:0 "權力之爭！"
 BRT_post_war_struggle_desc:0 "皇帝認為有必要將相當一部分權力授予首相之位。§G第二皇子修奈澤爾§!與§R第一皇女姬妮薇兒§!長期以來在不列顛尼亞宮廷各自掌控著龐大的政治圈子。修奈澤爾向來擅長外交，總能在其他老練朝臣屢屢失敗之處找到妥協之道；而他的姐姐姬妮薇兒則憑藉其強勢的人格魅力維繫著自己的勢力範圍。只有一人能登上帝國第二高位。潛在的後果可能十分§R嚴峻§!。"
