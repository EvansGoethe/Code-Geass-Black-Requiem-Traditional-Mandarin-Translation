 news.1.t:0 "國際人權組織NAR譴責不列顛尼亞！"
 news.1.d:0 "近日，國際人權組織NAR發表聲明，譴責神聖不列顛帝國對\"Numbers\"，即生活在不列顛尼亞殖民區被征服的原住民羣體，實施的政策。該聲明特別譴責針對\"Numders\"的壓迫性待遇，並敦促帝國重新審視現行政策。該組織因曾多次抨擊中華聯邦及其宦官集團，並曝光歐盟多起腐敗案而聞名。鑑於其影響力，多國情報機構已對其展開監控，但不列顛尼亞外相剛剛宣佈將把臭名昭著的\"NAR\"列入恐怖組織名單。\n\n令人意外的是，不列顛此舉引發全球範圍的批評浪潮，但其他超級大國預計不會採取實質行動。"
 news.1.b:0 "無稽之談"
 news.1.a:0 "他們不過是罪有應得。"
 news.2.t:0 "馬尼拉的空襲！"
 news.2.d:0 "一個月前，菲律賓的首都馬尼拉遭到數次空襲。神聖不列顛尼亞帝國似乎是這幾次轟炸的幕後黑手。幾家國際報紙強調了襲擊造成的毀滅性損害。駐留在該國的新聞記者也證實了這一點。\n\n據一名日本軍官稱，對地形損傷情況的調查結果顯示，襲擊者沒有采取任何措施減少對當地居民的連帶傷害。該國與中華聯邦緊密綁定，可以預見這個超級大國會做出強烈回應。儘管這樣，短時間內爆發全面戰爭的概率並不大。"
 news.2.b:0 "只是一點連帶傷害嗎"
 news.2.a:0 "如此暴行…"
 news.3.t:0 "東方事變"
 news.3.d:0 "在不列顛尼亞征服菲律賓後，以嚴守中立著稱的日本決定調整政策，與歐洲聯盟及中華聯邦保持一致立場。這兩大超級強國及其盟友通過對不列顛所有港口實施封鎖並採取多項經濟制裁，施加巨大經濟壓力，試圖迫使對方就太平洋局勢進行談判。\n\n出乎許多觀察家意料的是，不列顛尼亞僅以倉促生硬的聲明和報復的承諾回應這一制裁。儘管許多人認爲這是強大的不列顛尼亞帝國在國際上遭遇的重大挫敗，但歐洲聯合與中華聯邦的合作似乎到此爲止了……"
 news.3.b:0 "他們將付出代價……"
 news.3.a:0 "爲了利益，摧毀他們的經濟！"
 news.5.t:0 "富士和約"
 news.5.d:0 "全世界爲之震驚，日本不知怎麼的竟然成功抵擋了神聖不列顛尼亞帝國的進攻，時間遠超所有人的預期，儘管兩國均報告了慘重的傷亡。經過數月的殘酷戰鬥，不列顛尼亞政治和軍事精英中的主要派系向政府和貴族施壓，要求籤署和平協議，以避免進一步損失。\n\n停戰協議將包含對不列顛尼亞有利的條款，日本將在櫻石開採方面作出重大讓步，並租借出衆多港口和戰略島嶼。\n\n最終，這場戰爭導致兩國深陷動盪，國際專家擔心其後續影響可能會波及世界其他地區。"
 news.5.a:0 "這真是奇恥大辱……！"
 news.5.b:0 "不列顛尼亞雄獅被打敗了。"
 news.6.t:0 "日本的分裂"
 news.6.d:0 "很少有人能預料到，第二次太平洋戰爭以三個超級大國之間的二次瓜分結束。日本如今已被分裂爲兩個國家。\n\n在不列顛尼亞不顧多次失利和整體僵持的局勢、做出繼續戰爭的冒險決定後，歐盟和中國派出了一支入侵部隊，以阻止不列顛尼亞完全吞併日本。中國軍隊以人道主義干預的名義，在日本南部建立了事實上的軍事保護國，而不列顛尼亞則在北部地區建立了類似的行政區\n\n國家滿目瘡痍，局勢高度緊張；大量日本官員、將領和民衆開始湧向日本南部。這可能給城市帶來進一步的混亂。"
 news.6.a:0 "他們的太陽落下了。"
 country_capitulated.0.t:0 "[Root.GetName]已經停止抵抗"
 country_capitulated.0.d_positive_both_no_faction:1 "\n[From.From.GetLeader]日前宣佈怯懦的[Root.GetAdjective]政府已無力抵擋來自[From.From.GetAdjective]不可阻擋的軍勢所施加給他們舉國上下的壓力。[Root.GetAdjective]政府現已撤離該國並決定開始流亡。他們的主力部隊已經停止抵抗，而[From.From.GetNameDef]現在已經控制了該國領土。\n儘管戰爭還在別處延續，但對於[From.From.GetNameDef]來說這是一個偉大的勝利。"
 country_capitulated.0.d_positive_prev_no_faction:1 "\n[From.From.GetLeader]日前宣佈怯懦的[Root.GetAdjective]政府已無力抵擋來自[From.From.GetAdjective]不可阻擋的軍勢所施加給他們舉國上下的壓力。[Root.GetAdjective]政府現已撤離該國並決定開始流亡。他們的主力部隊已經停止抵抗，而[From.From.GetNameDef]現在已經控制了該國領土。\n儘管對[Root.GetFactionName]的戰爭還在別處延續，但對於[From.From.GetNameDef]來說這是一個偉大的勝利。"
 country_capitulated.0.d_positive_prev_faction:1 "\n[From.From.GetLeader]日前宣佈怯懦的[Root.GetAdjective]政府已無力抵擋來自[From.From.GetAdjective]不可阻擋的軍勢所施加給他們舉國上下的壓力。[Root.GetAdjective]政府現已撤離該國並決定開始流亡。他們的主力部隊已經停止抵抗，而[From.From.GetNameDef]現在已經控制了該國領土。\n儘管對[Root.GetFactionName]的戰爭還在別處延續，但對於[From.From.GetFactionName]全體成員來說這是一個偉大的勝利。"
 country_capitulated.0.d_negative_both_no_faction:1 "\n[Root.GetLeader]已經宣佈[Root.GetAdjective]政府再也不能承受來自[From.From.GetAdjective]佔領軍的壓力，舉國上下悲憤不已。[Root.GetAdjective]政府選擇逃離這個國家。他們的主要部隊已經停止抵抗，而[From.From.GetNameDef]現在已經控制了他們的國土。\n雖遭受這種毀滅性的損失，但反抗[From.From.GetNameDef]的戰爭遠未結束。"
 country_capitulated.0.d_negative_prev_no_faction:1 "\n[Root.GetLeader]已經宣佈[Root.GetAdjective]政府再也不能承受來自[From.From.GetAdjective]佔領軍的壓力，舉國上下悲憤不已。[Root.GetAdjective]政府選擇逃離這個國家。他們的主要部隊已經停止抵抗，而[From.From.GetNameDef]現在已經控制了他們的國土。\n儘管反抗[From.From.GetNameDef]的戰爭還會繼續，但對於[Root.GetFactionName]而言這是一個不幸的挫折。"
 country_capitulated.0.d_negative_prev_faction:1 "\n[Root.GetLeader]已經宣佈[Root.GetAdjective]政府再也不能承受來自[From.From.GetAdjective]佔領軍的壓力，舉國上下悲憤不已。[Root.GetAdjective]政府選擇逃離這個國家。他們的主要部隊已經停止抵抗，而[From.From.GetNameDef]現在已經控制了他們的國土。\n儘管反抗[From.From.GetNameDef]和其他[From.From.GetFactionName]國家的戰爭仍在繼續，但這對[Root.GetFactionName]是一個不幸的挫折 。"
 country_capitulated.0.d_neutral_both_no_faction:1 "\n[Root.GetAdjective]政府已流亡海外，其主力部隊已向[From.From.GetNameDef]投降，後者如今控制了他們的本土。\n\n雖然[From.From.GetName]與[Root.GetName]之間的鬥爭已經結束，[From.From.GetNameDef]仍深陷全面戰爭，戰火仍在他處延續。"
 country_capitulated.0.d_neutral_prev_no_faction:2 "\n[Root.GetAdjective]政府已流亡海外，其主力部隊已向[From.From.GetNameDef]投降，後者如今控制了他們的本土。\n\n[Root.GetName]的鬥爭只是這場衝突的一小部分。[From.From.GetNameDef]與[Root.GetFactionName]殘餘勢力之間的戰爭仍在他處延續。"
 country_capitulated.0.d_neutral_prev_faction:2 "\n[Root.GetAdjective]政府已流亡海外，其主力部隊已向[From.From.GetNameDef]投降，後者如今控制了他們的本土。\n\n[From.From.GetNameDef]與[Root.GetNameDef]之間的鬥爭只是這場衝突的一小部分。[From.From.GetFactionName]與[Root.GetFactionName]殘餘勢力之間的戰爭仍在他處延續。"
 country_capitulated.0.d_positive_collab_diff_ideology:0 "\n[Root.GetNameDef]已宣布向[From.From.GetNameDef]全面投降。[From.From.GetAdjective]軍隊在一批獨立的[Root.GetAdjective][From.From.GetRulingIdeology]支持者的協助下，迫使[Root.GetLeader]及其政府流亡，一個與[From.From.GetNameDef]合作統治[Root.GetNameDef]的新政府已經成立。[From.From.GetLeader]表示，這份雙方的協議將為[Root.GetNameDef]帶來繁榮與合作的新時代。\n[Root.GetLeader]則回應稱，即使身在流亡，他們也將繼續為[Root.GetNameDef]而戰，並支持祖國的一切抵抗行動。"
 country_capitulated.0.d_positive_collab_invaded_same_ideology:0 "\n[Root.GetNameDef]已宣布向[From.From.GetNameDef]全面投降。一批對[Root.GetLeader]帶給[Root.GetNameDef]的那種[From.From.GetRulingIdeologyNoun]感到不滿的[Root.GetAdjective]公民，與[From.From.GetAdjective]士兵一道將其趕下台，並在[From.From.GetNameDef]的指導下組建了新政府。[From.From.GetLeader]表示，這份雙方的協議將為[From.From.GetNameDef]帶來繁榮與合作的新時代。\n[Root.GetLeader]則回應稱[From.From.GetLeader]並非真正的[From.From.GetRulingIdeology]，即使身在流亡，他們也將繼續為[Root.GetNameDef]而戰，並支持祖國的一切抵抗行動。"
 country_capitulated.0.a:0 "令人滿意的消息！"
 country_capitulated.0.b:0 "黑暗時代降臨了。"
 country_capitulated.0.c:0 "變幻莫測的時代。"
 GAME_OVER_TT:0 "§R對你來說遊戲要結束了。§!"
 CAN_ANGERED_WORKERS:0 "這會讓人民失望的。"
 generic.2.t:0 "[From.GetNameDefCap]尋求加入[Root.GetFactionName]"
 generic.2.d.a:0 "面對自由與民主價值所遭受的與日俱增的威脅，[alliance_applicant.GetAdjective]人視我們為自由的捍衛者。他們如今希望加入我們的同盟，既為享有我們的保護，也為與我們並肩對抗那些威脅民主的勢力。"
 generic.2.d.b:0 "我們顛覆現有世界秩序的抗爭，並未逃過志同道合國家的注意。[alliance_applicant.GetAdjective]人認識到，在即將到來的衝突中與我們結盟，是他們為自己開創繁榮未來的最佳機會；因此，他們提議正式加入我們，共同對抗我們的敵人。"
 generic.2.d.c:0 "[alliance_applicant.GetNameDefCap]已認識到，他們必須與其他社會主義共和國團結起來，鞏固共產主義在世界上的地位。[alliance_applicant.GetAdjective]人承認我們在國際工人抗爭中的領導地位，如今請求與我們正式結盟。"
 generic.2.d.e:0 "隨著當前國際政治的劇變持續在世界各地迴盪，[alliance_applicant.GetAdjective]人認定我們是他們渡過這動盪時代的最大希望；因此，他們請求加入我們的同盟，讓我們共同抵禦即將到來的風暴。"
 generic.2.a:0 "所有堅信自由民主價值觀的人都可以和我們站在一起。"
 generic.2.b:0 "這世界屬於強者！"
 generic.2.c:0 "如果我們攜手，革命會戰無不勝。"
 generic.2.e:0 "我們在風暴中同舟共濟！"
 generic.2.f:0 "我們最好不要和他們一起。"
 generic.2.g:0 "我們已經擁有了我們想要的盟友。"
 generic.3.t:0 "[alliance_inviter.GetNameDefCap]歡迎我們加入[alliance_inviter.GetFactionName]"
 generic.3.d:0 "[alliance_inviter.GetNameDefCap]已經決定接受我們加入[alliance_inviter.GetFactionName]的要求。從今往後，我們將並肩作戰。"
 generic.3.a:0 "攜手共進，我們將一同捍衛民主。"
 generic.3.b:0 "沒有人能反抗我們！"
 generic.3.c:0 "工人的抗爭再也找不到比這更好的鬥士了！"
 generic.3.e:0 "我們暫且擱置分歧。"
 generic.4.t:0 "[alliance_inviter.GetNameDefCap]拒絕了加入[alliance_inviter.GetFactionName]的請求"
 generic.4.d:0 "[alliance_inviter.GetNameDefCap]決定拒絕我們加入[alliance_inviter.GetFactionName]的請求。沒有他們的幫助，我們也只能設法應付了。"
 generic.4.a:0 "他們也配自稱自由的捍衛者？"
 generic.4.b:0 "那我們就連他們一起碾碎！"
 generic.4.c:0 "他們的革命已經腐化！"
 generic.4.e:0 "我們之間的分歧太大了。 」 [Root.GetNameDef] 到 [alliance_inviter.GetFactionName]"
 generic.5.d.a:0 "[alliance_inviter.GetNameDef]以警惕的目光注視著世界政局的最新發展，向我們伸出了友誼之手，願意為我們提供保護，並敦促我們與他們一道捍衛自由與民主的原則。作為[alliance_inviter.GetFactionName]的一員，我國人民的自由或許能得到保障。"
 generic.5.d.b:0 "[alliance_inviter.GetAdjective]人認識到有時強者也需要盟友，因此邀請我們加入[alliance_inviter.GetFactionName]。如果我們選擇接受，這很可能為我們提供一個尋得立足之地的大好機會。"
 generic.5.d.c:0 "我們在[alliance_inviter.GetNameDef]的意識形態盟友注意到了我們對工人事業的寶貴貢獻。今天早上，我們收到了加入[alliance_inviter.GetFactionName]的邀請。與其他社會主義共和國並肩而立，我們可以以全新的活力傳播革命。"
 generic.5.d.e:0 "看來[alliance_inviter.GetAdjective]人認為我們對他們具有戰略價值。他們認為與其讓意識形態的分歧使我們分裂，不如攜手合作更為有利。今天早上，[alliance_inviter.GetAdjective]大使送來了邀請，請我們成為[alliance_inviter.GetFactionName]的成員國。"
 generic.5.a:0 "我們將與他們並肩作戰。"
 generic.5.b:0 "我們只需要死幾千個人……"
 generic.5.c:0 "我們將與同志們並肩作戰！"
 generic.5.e:0 "這是有利可圖的選擇。"
 generic.6.t:0 "[alliance_applicant.GetNameDefCap]接受了加入[alliance_inviter.GetFactionName]的邀請"
 generic.6.d:0 "[alliance_applicant.GetNameDefCap]決定接受我們的提議，加入[alliance_inviter.GetFactionName]。從今以後，我們將休戚與共。"
 generic.7.t:0 "[alliance_applicant.GetNameDefCap]拒絕了加入[alliance_inviter.GetFactionName]的提議"
 generic.7.d:0 "[alliance_applicant.GetNameDefCap]決定拒絕我們加入[alliance_inviter.GetFactionName]的提議。沒有他們的幫助，我們也只能設法應付了。"
 generic.7.a:0 "我們的好意不受歡迎。"
 THREAT_FROM_EFFECT:0 "世界緊張度上升"
 BRT.1.t:0 "瑪莉安娜皇妃駕崩！"
 BRT.1.d:0 "這是一場災難！\n\n帝國最重要的皇妃之一瑪莉安娜大人在潘德拉貢皇宮遇刺身亡，她的私人衛隊全數陣亡。襲擊發生在光天化日之下，兇手身分尚未公諸於世，但許多人認為這是一起恐怖攻擊。\n\n事發時，瑪莉安娜與她的兩個孩子——魯路修與娜娜莉·vi·不列顛尼亞——同在宮中，目睹了整個過程。由於這場創傷，娜娜莉公主似乎因槍傷而失明，雙腿也無法行走。在前皇家衛隊長柯內莉亞·li·不列顛尼亞的主持下，追查兇手的調查已經展開。政府內部局勢十分緊張，但皇帝決定暫時封鎖消息。"
 BRT.1.a:0 "這本可以避免……"
 BRT.2.t:0 "事有蹊蹺"
 BRT.2.d:0 "經過數週的深入調查，我們發現這起謀殺案與政府內部的某些勢力有所關聯。這張隱藏的網似乎還連向祕密的Geass教團——一個在皇室內部具有影響力的狂熱宗教組織。就目前來看，教團與宮中一些腐敗的衛兵很可能是刺殺案的幕後黑手。即便這是一場內部陰謀，這些消息一旦落入媒體手中，也可能引發全國恐慌。必須不惜一切代價保守祕密。"
 BRT.2.a:0 "事情越來越失控了……"
 BRT.3.t:0 "死路"
 BRT.3.d:0 "隨著我們對Geass教團的深入挖掘，我們在該組織內部發現了一些嫌疑人。有所發現之後，我們感到自己彷彿被監視著。我們的疑慮很快得到了證實。\n\n一天，我們正在辦公室工作時，帝國情報部突襲了這裡。他們並非獨自前來；警察早已包圍了整個地方，特工們準備逮捕我們。不久後我們就被撤出此案；此案被判定為懸案，並迅速歸檔。\n\n看來是查爾斯皇帝在Geass資深成員的建議下，下令徹底終結此案並銷毀一切證據。事到如今，很明顯皇帝知道的遠比我們想像的多，但在這種情況下，繼續追查甚至抗議都是徒勞。"
 BRT.3.a:0 "小心背後，親愛的偵探……"
 BRT.4.t:0 "輕重緩急"
 BRT.4.d:0 "儘管這場危險的調查已被強行終止，瑪莉安娜之死的後果與餘波仍未消散。另外兩個超級大國已注意到我們的虛弱處境，對我們採取了更具攻擊性的態度。此外，皇家政府與皇室內部也滋生了諸多恐懼。我們必須決定有限的資源該先用在哪裡。"
 BRT.4.a:0 "優先處理內部局勢。"
 BRT.4.b:0 "應對外部威脅。"
 BRT.5.t:0 "滾雷行動"
 BRT.5.d:0 "經過數週的準備，我們已準備好對中華聯邦控制的菲律賓發動入侵。迅速攻佔整個群島至關重要，這樣我們才能在機動上勝過敵人，避免正面衝突。\n\n三路主攻將從10區發起。主力部隊將部署在帛琉、關島與硫磺島，並獲得海空全面支援。這些領土對我們近期在太平洋戰區的擴張至關重要。"
 BRT.5.a:0 "開始行動。"
 BRT.6.t:0 "局勢升級"
 BRT.6.d:0 "這次行動徹底失敗了。\n\n儘管我們取得了一些進展，整個群島並未落入不列顛尼亞的控制。戰爭拖得太久，中華聯邦向我們發出了最後通牒：要麼把島嶼交還給宦官們，要麼面對全面戰爭。必須指出，後者風險極大，因為我們在太平洋的軍力並不完整，而圓桌騎士們正在南美洲忙得不可開交。權衡這些事實之後，查爾斯皇帝認為風險太高了。"
 BRT.6.a:0 "繼續戰爭！"
 BRT.6.b:0 "退讓……"
 BRT.7.t:0 "中華聯邦的報復！"
 BRT.7.d:0 "在我們進攻菲律賓之後，中華聯邦似乎與另一個超級大國歐盟結成了臨時同盟，並施壓日本使其配合自身利益。這一出人意料的舉動使不列顛尼亞遭受眾多經濟制裁與禁運，被隔絕於世界大部分貿易之外。雖然短期內這將重創不列顛尼亞經濟，但這也可能是實現帝國自給自足、一勞永逸地證明祖國偉大的機會！"
 BRT.7.b:0 "這出乎意料。以進一步的緊縮重整預算！"
 BRT.8.t:0 "檀香山提案"
 BRT.8.d:0 "出乎我們意料的是，首相與歐洲聯合達成了一項耐人尋味的妥協。他在夏威夷海軍司令部會見了幾位俄羅斯代表，商討近期的事件並改善兩個超級大國之間的緊張關係。巴黎政府準備秘密放寬部分貿易封鎖，允許有限的貿易往來。作為交換，我們將把阿圖島——EU數年前便聲索的地方——交給俄羅斯共和國。考慮到其位於極北之地，這並不算重大的戰略損失。"
 BRT.8.a:0 "接受決議。"
 BRT.8.b:0 "拒絕決議。"
 BRT.9.t:0 "魯路修皇子與娜娜莉公主的離去"
 BRT.9.d:0 "皇帝已就魯路修皇子與娜娜莉公主作出永久安排；已故皇妃瑪莉安娜的孩子們將被無限期送往日本。此舉既能將魯路修與娜娜莉變為政治棋子，同時也能讓皇室安心於自身的安全。旅居這個島國期間，他們將受到樞木首相及其子的保護。我們會告訴媒體，他們此行純屬教育目的。"
 BRT.9.a:0 "這是必要的。"
 BRT.10.t:0 "對日全面勝利！"
 BRT.10.d:0 "「浪潮行動」大獲成功！\n\n短短數月之內，我們便以新式先進武器——Knightmare——粉碎了日本的一切抵抗。經過殘酷的巷戰，日本政府終於投降。與此同時，樞木首相神祕失蹤，全國陷入混亂與無政府狀態。此外，眾多官員逃往我們的敵國中華，大量敵軍將領與軍官轉入地下。\n\n無論如何，大量櫻石礦藏如今已落入我們手中，我們也向世界展示了真正的實力。隨著11區的正式成立，查爾斯·zi·不列顛尼亞皇帝與皇室的權威將得到牢固鞏固。前途一片光明。\n\n不列顛尼亞萬歲！"
 BRT.10.a:0 "建立新殖民區。"
 BRT.10.b:0 "建立新殖民區。\n（以11區進行遊戲）"
 BRT.11.t:0 "曠日持久的僵局"
 BRT.11.d:0 "「浪潮行動」部分失敗，我們的主力軍未能迫使日本無條件投降。戰爭已持續半年有餘，許多將領開始擔心這片泥沼將奪走其他重要戰區所需的資源。\n\n儘管查爾斯皇帝想繼續打下去，奧德修斯首相與其他幾位大臣提出了一份替代和平方案，該方案將使我們獲得所有櫻石礦的開採權以及其他一些小讓步。我們必須慎重決定，因為這份和約可能被其他列強視為軟弱的表現。"
 BRT.11.a:0 "我們決不放棄！"
 BRT.11.b:0 "要求停戰。"
 BRT.13.t:0 "暗影中的行動"
 BRT.13.d:0 "V.V.是「血之紋章」時期查爾斯的第一位盟友。這使他在當前政權中佔據要位，得以保留相當大的自由為所欲為。\n\n近年來，V.V.一直是瑪莉安娜影響力的主要障礙，大大牽制了她的權勢。然而，他仍是她最不張揚的對手，寧願採取不露聲色的手段以避免不必要的注意。不過，特務機關始終盯著他，唯有皇帝的命令才能讓他們收手。"
 BRT.13.a:0 "事有蹊蹺。"
 BRT.14.t:0 "血之紋章的記憶"
 BRT.14.d:0 "許多年前，不列顛尼亞皇室內部爆發了一場激烈的內鬥。在此期間，各王位覬覦者之間的暗殺與背叛層出不窮。這段帝國歷史也因此見證了國內動盪的頂峰。\n\n當幾個貴族家族出面干預這場混亂後，局勢才得到部分解決——他們都支持由一位能終結流血的強勢領袖繼位，代價是削減部分貴族的權力。\n\n他們選中的領袖，就是查爾斯·zi·不列顛尼亞。"
 BRT.14.a:0 "一個想要遺忘的時代……"
 BRT.15.t:0 "首相之位"
 BRT.15.d:0 "自從我們的人民被逐出歐洲、由不列顛尼亞一系繼承王位以來，由帝國繼承人第一皇子出任首相便成為傳統。然而，第一皇子奧德修斯似乎優柔寡斷，給了貴族們超出分寸的餘地。這種不負責任的局面已持續太久。今天，皇帝宣布奧德修斯將卸任，由他更有能力的弟妹之一接任。"
 BRT.15.a:0 "再會了，第一皇子。"
 BRT.16.t:0 "首相之爭"
 BRT.16.d:0 "隨著第一皇子被逐出首相府，這個一人之下、萬人之上的職位懸空了。對許多人而言，這是千載難逢的機會，但目前有兩人在宮廷眾人之中脫穎而出。\n\n第二皇子修奈澤爾與第一皇女姬妮薇兒擁有龐大的勢力範圍，是執掌這一要職的最佳人選。出任首相無疑將提升他們繼承帝國的機會，因為奧德修斯的前景如今已嚴重黯淡。"
 BRT.16.a:0 "這場遊戲的關鍵字是「權力」。"
 BRT.17.t:0 "向東還是向西？"
 BRT.17.d:0 "皇帝已表達了擴張帝國疆土的意願。未來的首相必須選定世界的一個區域進行征服，因為帝國目前無法從容維持兩條戰線。選擇哪裡並不重要，只要新任首相聽從查爾斯·zi·不列顛尼亞皇帝的意志！"
 BRT.17.a:0 "無論東西，祖國第一！"
 BRT.18.t:0 "自給自足的路線之爭"
 BRT.18.d:0 "與大多數議題一樣，第二皇子修奈澤爾與第一皇女姬妮薇兒在經濟體制上立場截然相反。姬妮薇兒已被大企業的利益所左右，而修奈澤爾長期倡導以技術進步為驅動的體制。我們該偏袒某一位候選人，還是走一條平衡的路線？"
 BRT.18.a:0 "經濟的新思路？"
 BRT.19.t:0 "帝國的鐵腕"
 BRT.19.d:0 "為了維持神聖不列顛尼亞帝國的凝聚力，有必要剷除體制中可能損害我們利益的部分。我們的兩位候選人已在帝國宮廷中爭鬥多日，仍無結果。他們必須盡快達成決議。"
 BRT.19.a:0 "我們必須作出決斷。"
 BRT.20.t:0 "祕密會晤"
 BRT.20.d:0 "我們將派姬妮薇兒作為特使前往巴黎，說服他們的政客相信我們的意圖在別處。若能消除他們的疑慮，或許就能把他們的矛頭引向中華。"
 BRT.20.a:0 "緩和？"
 BRT.21.t:0 "一份面向未來的提案"
 BRT.21.d:0 "第二皇子修奈澤爾提出了讓中華的年幼女皇與我們的第一皇子聯姻的構想——這無疑是一步狡猾的棋，因為它將為徹底趕走奧德修斯鋪平道路。"
 BRT.21.a:0 "妙不可言的一步棋。"
 BRT.22.t:0 "一體兩面"
 BRT.22.d:0 "純血派的影響力不容小覷；因此，兩位候選人都必須謹慎對待他們。"
 BRT.22.a:0 "削弱他們的影響力。"
 BRT.22.b:0 "壯大純血派。"
 BRT.23.t:0 "有分寸的回應"
 BRT.23.d:0 "首相將獲得重啟殖民區制度的權力。修奈澤爾希望以較緩慢的步調將數字人納入帝國；然而，姬妮薇兒則傾向於更……傳統的做法。"
 BRT.23.a:0 "緩和緊張局勢，循序漸進地整合他們。"
 BRT.23.b:0 "實施鎮壓，剝奪他們的自由！"
 BRT.24.t:0 "§RWIP§!"
 BRT.24.d:0 "§RWIP§!"
