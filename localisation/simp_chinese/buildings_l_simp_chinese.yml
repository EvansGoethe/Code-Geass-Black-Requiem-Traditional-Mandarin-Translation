﻿l_simp_chinese:
 infrastructure:0 "基礎設施"
 infrastructure_plural:0 "基礎設施"
 infrastructure_desc:1 "此建築將改善所屬地區的基礎設施狀況，提高你在戰略要地的後勤能力及你的陸軍部隊在本地區的移動速度，並提升此地區的基礎資源產出。"
 arms_factory:0 "軍用工廠"
 arms_factory_plural:0 "軍用工廠"
 arms_factory_desc:0 "此建築可爲所屬地區提供生產軍事裝備的工業能力，或可因需轉換爲民用工廠。"
 dockyard:0 "海軍船塢"
 dockyard_plural:0 "海軍船塢"
 dockyard_desc:0 "此建築可爲所屬地區提供建造新艦船的工業能力。"
 dam:0 "大壩"
 dam_plural:0 "大壩"
 dam_desc:0 "水壩爲地區提供額外的電力，提高工業和資源產出。"
 dam_mountain:0 "$dam$"
 dam_mountain_plural:0 "$dam_plural$"
 dam_mountain_desc:0 "$dam_desc$"
 canal_kiel:0 "基爾運河船閘"
 canal_kiel_plural:0 "$canal_kiel$"
 canal_kiel_desc:0 "爲了使運河滿負荷運行，基爾運河船閘至關重要，破壞它們將會在很長一段時間內妨礙航運和交通。"
 canal_panama:0 "巴拿馬運河船閘"
 canal_panama_plural:0 "$canal_panama$"
 canal_panama_desc:0 "巴拿馬運河船閘是運河滿負荷運作所必需的設施，破壞它們將會長時間阻礙航運和交通。"
 industrial_complex:0 "民用工廠"
 industrial_complex_plural:0 "民用工廠"
 industrial_complex_desc:0 "此建築可爲所屬地區提供生產民用商品或建造新建築的工業能力，或可因需轉換爲軍用工廠。"
 air_base:0 "空軍基地"
 air_base_plural:0 "空軍基地"
 air_base_desc:0 "此建築可爲所屬地區提供部署空軍飛行器的場所。"
 naval_base:0 "海軍基地"
 naval_base_plural:0 "海軍基地"
 naval_base_desc:1 "該建築可延長你的艦隊航程，進行艦船維修，進行海外後勤補給以及資源出口。海軍基地可隨等級的提升增加補給吞吐量。"
 bunker:0 "陸上要塞"
 bunker_plural:0 "陸上要塞"
 bunker_desc:0 "此建築可在戰鬥中對進攻方造成基於建築等級每級$VALUE|+%0$的進攻懲罰。同時受到來自多方向的攻擊時則會降低要塞效果。"
 coastal_bunker:0 "海岸要塞"
 coastal_bunker_plural:0 "海岸要塞"
 coastal_bunker_desc:0 "此建築可在登陸作戰當中對進攻方造成基於建築等級每級$VALUE|+%0$的進攻懲罰。"
 anti_air_building:0 "防空陣地"
 anti_air_building_plural:0 "防空陣地"
 anti_air_building_desc:0 "此建築可爲所屬地區面臨轟炸機來襲時提供保護，並對敵軍飛行器發動打擊。"
 synthetic_refinery:0 "合成煉油廠"
 synthetic_refinery_plural:0 "合成煉油廠"
 synthetic_refinery_desc:0 "此建築可爲所屬地區提供"
 synthetic_refinery_amount:0 "$VALUE|Y0=$"
 synthetic_refinery_resource:0 "£resources_strip|$FRAME$"
 radar_station:0 "雷達站"
 radar_station_plural:0 "雷達站"
 radar_station_desc:3 "雷達可使你獲得鄰近地區的敵軍部隊情報。\n提高所屬地區的雷達站等級，便可增加雷達的有效距離。\n雷達也能在所屬地區附近提供更好的對空偵察能力，提高己方戰機接敵的概率。\n此外雷達還會提升探測敵方艦隊的能力。"
 rocket_site:0 "火箭基地"
 rocket_site_plural:0 "火箭基地"
 rocket_site_desc:0 "此建築可爲所屬地區提供部署火箭的場所。"
 nuclear_reactor_heavy_water:0 "重水櫻石反應堆"
 nuclear_reactor_heavy_water_plural:0 "重水櫻石反應堆"
 nuclear_reactor_heavy_water_desc:0 "此建築可爲所屬地區提供用於製造櫻石武器的濃縮櫻石的生產能力。使用重水的櫻石反應堆比普通櫻石反應堆建造成本更低，但產出的可用於櫻石武器生產的材料更少。"
 nuclear_reactor:0 "櫻石反應堆"
 nuclear_reactor_plural:0 "櫻石反應堆"
 nuclear_reactor_desc:0 "此建築可爲所屬地區提供用於製造櫻石武器的濃縮鈾的生產能力。"
 nuclear_facility:0 "櫻石研究設施"
 nuclear_facility_plural:0 "櫻石研究設施"
 nuclear_facility_desc:0 "櫻石研究實驗設施允許你啓動與利用櫻石能有關的研究項目。"
 air_facility:0 "空氣動力學與航空電子研究設施"
 air_facility_plural:0 "空氣動力學與航空電子研究設施"
 air_facility_desc:0 "空氣動力學和航空電子研究設施允許你啓動飛機、火箭和相關電子產品的研究項目。"
 naval_facility:0 "海軍工程設施"
 naval_facility_plural:0 "海軍工程設施"
 naval_facility_desc:0 "海軍工程設施允許你啓動與水面艦艇和潛艇相關的研究項目。\n海軍工程設施只能在沿海省份建造。"
 mega_gun_emplacement:0 "多級加速大口徑火炮"
 mega_gun_emplacement_plural:0 "多級加速火炮"
 mega_gun_emplacement_desc:0 "這種大口徑火炮採用多級加速，旨在實現無與倫比的射程。它利用一系列地下隧道，將炮彈加速到超音速，然後向遠處的目標發射。"
 stronghold_network:0 "要塞羣"
 stronghold_network_plural:0 "要塞羣"
 stronghold_network_desc:0 "這是一處由大量地堡與堅固陣地組成的廣泛的防禦系統，其主要使命在於擊退來犯之敵，以及確保關鍵戰略區域的安全。"
 land_facility:0 "地面戰設施"
 land_facility_plural:0 "地面戰設施"
 land_facility_desc:0 "地面戰設施允許你啓動與地面戰各方面相關的研究項目，如特種坦克或火炮。"
 knightmare_facility:0 "Knightmare設施"
 knightmare_facility_plural:0 "Knightmare設施"
 knightmare_facility_desc:0 "Knightmare設施允許你啓動與Knightmare各方面相關的研究項目，如武器、機體或裝備。"
 naval_supply_hub: "Naval Supply Hub"
 naval_supply_hub_desc: "This building allows your fleets to resupply and refuel in this base in addition to their Home Bases, potentially extending the operational range of your §YTask Forces§!.\nA Naval Supply Hub can only be constructed in a coastal province that has Naval Base of at least level 8."
 naval_headquarters: "Naval Headquarters"
 naval_headquarters_desc: "This building allows you to assign an admiral to increase effectivness of §YTask Forces§! operating within range of the Naval Headquarters.\n\nUp to $MAXNUM|H$ headquarters can have an admiral assigned at the same time.\n   Currently assigned: $CURRNUM|H$\n\nA Naval Headquarters can only be constructed in a coastal province that has Naval Base of at least level 8. "
