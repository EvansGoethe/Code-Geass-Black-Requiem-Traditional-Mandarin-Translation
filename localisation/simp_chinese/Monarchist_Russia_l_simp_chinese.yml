 MRU_phase_one.1.t:0 "Astakov in Office"
 MRU_phase_one.1.d:0 "Mikhail Astakov—a balding man in his fifties with the mannerisms of a scheming academic. He sat lounging in a plush office chair in an office he and his clique simply captured during the collapse of the Russian Republic. He let out a sigh as his cabinet looked worriedly at him.\nOne of Astakov's cronies tapped the table with their finger repeatedly. \"The Tsar isn't coming. No one is going to listen to us without him.\"\nAnother man from the cabinet interjected. \"Who cares if the Tsar shows up? We are the ones in power all the same. That's thanks to Astakov, not the Tsar.\"\nAgain, someone else decided to voice their thoughts. \"The Tsar is the reason we had any popularity to begin with!\" he shouted while smacking the iable.\n\nArguing children as per usual. For all those thoughts and opinions rattling around in their heads, they have no vision, Astakov thought to himself while they bickered amongst themselves. The Tsar would return, but not to lead Russia himself. Instead, Astakov would be the strong leader that Russia needed with the Tsar posing as a figurehead. He'd serve as a symbol while Astakov would serve as the guide for his nation. That was the true purpose of the Tsar's return.\nAs Astakov let out another sigh, the door to the room swung open, letting in a gust of air. \"Sir, a phone call for you. It's the Tsar,\" said the arriving aide, speaking over every man present. The arguing cabinet fell silent as Astakov sat up, a smug smirk forming on his face.\n\nIn the room next door, Astakov sat at a lone desk with a phone to his ear. Over the phone, a firm voice full of resolve spoke his name. Accustomed to the Tsar's calls by now, Astakov relaxed in his chair. \"Wonderful to speak with you again, Your Majesty.\"\n\"I'm calling about your request,\" Vsevolod Romanov said as Astakov perked up in his chair with anticipation.\n\"Of course. Have you made your decision?\" Astakov, despite being sure of himself, sat on the edge of his seat.\n\"Yes, I will return to Russia—to my people.\"\n\nAstakov had a twitching grin, unable to withhold his excitement. His plans were finally bearing fruit. \"Fantastic! You will be warmly welcomed at the Ekaterinburg International Airport, Your Majesty!\"\n\"Right... I presume you'll come to greet me upon my arrival?\"\nAstakov nodded to himself, clutching the phone with both hands. \"Of course! I will have my men personally escort you.\"\n\"Expect me there, then,\" the Tsar said before hanging up.\nAstakov stared down at the phone for a few seconds before laughing out loud. He stood up from his chair and began pacing around the room giddily. Twirling around in place, he walked over to the window and gazed at several civilians on the street below."
 MRU_phase_one.1.a:0 "Soon, my Mother Russia."
 MRU_phase_one.2.t:0 "The Tsar's Entrance"
 MRU_phase_one.2.d:0 "\"What do you mean he's already there?\" Astakov threw his hand up at the driver in anger, sitting in the back of a black car surrounded by police motorcycles and tailed by another car. The man pulled at what little hair he had left and bounced his leg rapidly, full of anxiety on this congested road. Scores of people blocked the road to the airport. His motorcade had no chance of making it in time to meet the Tsar amidst this chaos. He grumbled to himself and grabbed a remote from a drawer connected to the partition dividing the front and back of the car. Furiously pressing buttons, he turned on the monitor in front of him, switching straight to the news.\n\nAll Astakov could see on the screen was the young silver-haired man waving to a tremendous amount of people, appearing somewhat cold but self-assured. He adjusted the sleeve on his green ceremonial military tunic before walking down the steps of the plane. The people cheered, yet as the camera cut to various shots of the crowd, some of them appeared to be confused. Behind the young man, several other people could be seen walking down the steps as well, all dressed in formal military garb.\n\nAstakov crossed his arms, grinding his teeth. \"Can you not go around? This is the Tsar we're meant to be meeting! Drive!\"\nThe driver sheepishly glanced out the window to avoid Astakov's fierce glare. \"I'm afraid not, sir.\"\nAstakov clicked his tongue. \"I'm supposed to be running this show... so what am I doing stuck in traffic?!\"\n\nFrom the monitor, the news reporter covering the event could be heard saying, \"A Romanov has just landed at Ekaterinburg International Airport. The Tsar is here! The Russian Empire is restored!\" She was then cut off by someone behind the camera chastising her for her lack of professionalism. She cleared her throat. \"My apologies... We will update you as the situation progresses. Pokrovskaya Fenya, signing off!\" She gave a thumbs up to the camera."
 MRU_phase_one.2.a:0 "Thanks for the traffic, Your Majesty."
 MRU_phase_one.3.t:0 "A Race for Power"
 MRU_phase_one.3.d:0 "The door to Astakov's office swung wide open. One of his paramilitary officers stormed in full of rage. \"Are you kidding me!? Those RSDF shits! They think they can turn me down despite all of my experience? I belong in the general staff, not those kids!\"\nAstakov sat wide-eyed, leaning forward in his chair. \"What are you talking about? Kids? What kids?\"\nThe officer gritted his teeth and grumbled to himself before explaining. \"The Oprichniki. You know, those brats that arrived with the Tsar on his plane. They call themselves his 'inner circle' or something,\" he scoffed.\nStanding up, Astakov walked towards the open door. \"I'll look into this,\" he said rather plainly before heading down the hall.\n\nWhen Astakov entered the general staff's room, his jaw dropped. Before him were six young adults lounging at a table, feet up and leaning far back in their chairs. One of them yawned while going through papers as Astakov entered the room. His officer wasn't exaggerating. None of them even acknowledged his presence.\nAstakov smirked slightly, chuckling to himself. \"So, this is the Oprichniki? Can you explain how in the world the general staff is made up of all of you?\"\nAfter several seconds, a young man by the name of Sergey Voronov spoke up, leaning his head on his hand and refusing to even look at Astakov. \"Well, your paramilitary officers didn't have a plan set up yet, so we got onboarded as the general staff instead. Desperate times, right? It's only natural.\" Voronov gave Astakov an emotionless smile.\nAstakov's left eye twitched. \"My officers would be much better suited for this role.\"\nAnother Oprichniki member, Robert Saulfort, chimed in, waving his hand dismissively. \"We're sympathetic to your officers that it turned out this way, but Russia is currently in a state of emergency. We need soldiers, not street thugs.\"\nNot wanting to cause any more infighting to occur, Astakov exhaled heavily and narrowed his eyes at the group. \"Right... Thank you for explaining the situation. I'll pass it on to the officers.\" He shook his head and walked out of the room with one hand in his pocket and the other clenched in a fist."
 MRU_phase_one.3.a:0 "Those brats won't get the best of me."
 MRU_phase_one.4.t:0 "Manoeuvres of the Oprichniki"
 MRU_phase_one.4.d:0 "Tapping his finger on the desk repeatedly, Astakov grumbled to himself as the Duma was reaching its conclusion. Not a single one of his proposed ideas have been brought up or even considered. Only measures transferring power to the Tsar were passing. The Tsar, not Astakov. It was all about the Tsar. Wasn't this supposed to be about his ideas, not about some posh kid with nothing more than royal blood running through his veins? Where were the policies he proposed? This whole session started to get on his nerves.\n\nOut of the corner of his eye, Astakov saw one of the Oprichniki leaning against the wall, acting as carefree as usual. It was Maksim Orlev, his dirty blonde hair poking out from under his officer's cap. Astakov kept tapping the desk while glaring at Maksim.\n\nWhen Maksim spotted Astakov staring a hole through him, he looked back, only giving him a small smirk and a condescending shrug. Astakov's face tensed up, a vein nearly popping in his eye. His frustration instantly turned into infuriation. What were these kids trying to do to him? To his government? His Russia? Whatever they were scheming, he would put a stop to it."
 MRU_phase_one.4.a:0 "Not if I can help it."
 MRU_phase_one.5.t:0 "Voronov Breaks the Camel's Back"
 MRU_phase_one.5.d:0 "Astakov sighed once again, trying to relieve the tension in his chest. Over and over again, his plans failed. Even before the Tsar arrived, his plans would always fail. Why? He managed to seize power over the Urals, but it was slowly starting to slip from his grasp. Was this his fatal flaw—being incapable of doing anything of value on his own, achieving things only for a brief period of time before they would inevitably escape him again? If it weren't for the discord amongst the people and his own political party, Russia could become strong again. Whose fault was that? His own?\n\nAt least he could feel relieved for now. His old and loyal comrade Abakumov would be leading the Okhrana, the new intelligence agency. That meant Astakov would have an ally he could trust in a position of power, however small that power may be. He stared at the ceiling with his hands clasped together, waiting for Abakumov to enter the room with good news. No sooner than he thought this, the door in front of him opened.\nAstakov sat straight up in his chair, excited to see his friend enter the room. However, he didn't see Abakumov at all. Instead, he watched warily as a young man in a black suit walked in, a disingenuous smile plastered across his face. Astakov sputtered and leaned forward, staring in shock at the man standing before him. It was none other than Sergey Voronov of the Oprichniki.\n\n\"Good evening, Prime Minister Astakov,\" Voronov politely said. \"I'll be the new head of the Okhrana. I am very grateful for this role.\"\nAstakov's left eye twitched, his lips quivering as he realised what was happening. \"Where is Abakumov? What have you done to him?!\"\nVoronov appeared confused. \"Abakumov withdrew his candidacy. As the only person left, I became head of the Okhrana by default. I hope that isn't a problem. We are in a state of emergency after all. I'd hate for this selection to be delayed any further.\"\n\nAstakov's breathing was unsteady. It kept happening—his destiny was falling apart before his very eyes! These kids from Britannia were stealing it from him again!"
 MRU_phase_one.5.a:0 "Yes, of course..."
 MRU_phase_one.6.t:0 "Astakov's Destiny"
 MRU_phase_one.6.d:0 "Staring across the room at the frantic Astakov, the aide blinked repeatedly, wondering what had happened to the old man. He watched as the old man desperately scribbled down nonsense onto several sheets of paper before tearing them up and tossing them aside. Astakov's bloodshot eyes darted across the sheets, the pace of his breathing further increasing with every piece he threw to the ground.\n\"Sir, are you feeling alright?\" the aide said, quickly regretting having entered the room.\n\nAstakov muttered to himself and slammed his hands on the desk. \"This is my country! The Tsar can't take that from me! I'm his regent—he can't do anything without me!\"\nThe aide glanced back and forth, shuffling his feet. \"Should I call for someone, sir?\"\nAstakov ignored him and continued on with his outburst, spit flying from his mouth and snot running down his nose. \"I've worked decades for this! Me, alone! I'm not going to let some upstart brat take it all from me, let alone some half-Britannian fraud! Russia is mine—MINE! It's MY destiny!\"\n\nWith that, the room fell silent. Astakov took a moment to collect himself before finally mumbling, \"I won't let them...\" He grew louder. \"They can try to stop me, but I won't let them do whatever they please!\"\nAstakov surrounded himself with his paramilitaries. No one else could be trusted, especially not the Tsar and his Oprichniki. Secluding himself, he desperately vetoed every policy the Tsar attempted to introduce, not allowing anything to get through. This was HIS country—HIS destiny. Now the Tsar was trying to take it from him and make a fool out of him to boot! His hands trembled as he vetoed more and more policies until every single one of them had been thrown in the trash. He wouldn't let any more of their plans be realised, not after his own were foiled.\n\nUpon seeing this unfold, the aide slipped into the hall when no one was looking and snuck next door. He grabbed the telephone and dialled the number for the Oprichniki."
 MRU_phase_one.6.a:0 "I can't let it end like this!"
 MRU_phase_one.7.t:0 "The Tsar and his Regent"
 MRU_phase_one.7.d:0 "The sound of footsteps could be heard echoing around Astakov's office for the last few hours. He hadn't slept or halted his defiance to even get a drink. The office air had grown stale and the only source of light in the room came from the dimmed bulb of his desk lamp. He brushed back his window curtains, peering outside at the military trucks surrounding the place. The doors leading outside had already been overrun by the Tsar's forces, so Astakov's paramilitaries retreated further inside to guard several key locations within the building. At this point, he was committed. No one would steal his destiny from him again for as long as he lived.\n\n\"That little half-breed brat! He can't do this to me! Not me... I'm different,\" Astakov rambled, peeking through the curtains again with bloodshot eyes. He gripped the pistol holstered against his waist. \"He can't. I've worked too hard for this!\" A few moments later, he spotted the silver-haired Tsar step out from behind one of the trucks, illuminated by the amber setting sun. Astakov clawed at the curtains and slid the window open, shouting down at the people below. \"I want to talk!\" he yelled while leering at the man he despised most in the entire world. \"With the Tsar, not one of his officers!\"\n\nAstakov looked on with bated breath as the Tsar turned to talk with a woman next to him. Probably the Tsar's assistant or something, he thought. He watched the scene below for several minutes. When they finished their conversation, the Tsar signalled something to one of his soldiers and then made eye contact with Astakov. Trembling as he stroked the grip of his pistol with his thumb, Astakov decided he would exact his revenge right here inside his office. This would be the last time anyone would ever get in his way—in the way of his life's work. Astakov watched as the Tsar and the woman entered the office building.\n\nHe stepped away from the window, closed the blinds, and set his gun inside his desk drawer. He removed the cabinet he had placed in front of the office door out of paranoia and returned to his seat, awaiting his special guests. For what seemed like ages, Astakov couldn't hear anything anymore except his own unsteady breathing. Finally, the office door opened. The woman entered the room first, followed by the Tsar. He took a seat whilst the woman stood next to him at attention.\n\n\"Who the hell do you think you are?!\" Astakov's voice came out quietly at first but rapidly escalated into a full-blown shout without a shred of respect for the man sitting in front of him. Unable to continue stewing in his hate-filled chair, Astakov stood up abruptly, glaring bitterly at the Tsar. \"You think you can take this from me? This is MY destiny!\" You are the Tsar, a figurehead for the people, and I am your regent! You are here only because I allowed it, not because of some antiquated birthright!\" The Tsar kept still and quiet, listening to Astakov's mad rants. The woman next to him gave Astakov a scornful glare and seemed to be getting progressively angrier with every word he uttered. \"I'm not going to let some impudent little brat take this from me! Russia. Is. MINE!\" Astakov shouted at the top of his lungs, leaning over his desk and punctuating his declaration by slamming it with his fist as hard as he could. \"MINE!\""
 MRU_phase_one.7.a:0 "I'll put a stop to this, once and for all."
 MRU_phase_one.8.t:0 "Final Fall"
 MRU_phase_one.8.d:0 "The Tsar stared lamentably at Astakov, who had stopped rambling for a moment to catch his breath, before addressing him in a cold, firm voice.\n“Astakov, Russia is not yours to lead.”\nUpon hearing these deeply offensive words, Astakov nearly vomited, fighting the urge to shoot the Tsar dead then and there.\n“Russia cannot be led by someone like you,” the Tsar continued. “You are nothing more than a populist and an opportunist, no different than a Republican. Russia must be led by the strongest and wisest individual, one who can truly realise her ‘destiny'. I do not yet know if I am worthy of that title, but I certainly know that after 30 years of failure and cheap opportunism, you are not.”\nAny semblance of rationality left within Astakov's mind vanished instantly. His vision turned red as time seemingly slowed to a crawl around him. He felt his gut wrench in utter disgust at the piece of human filth sitting in front of him.\n“You...” Astakov slowly reached for his desk drawer with a shaking hand before swiftly opening it and retrieving the gun hidden within.\n“You blue-blooded DEGENERATE! THIS IS MY DEST—”\n\nWith this swearing declaration, Astakov heard a shot ring out from across the room mid-sentence. Clutching his chest in sudden agonising pain, he stumbled backwards into his chair, the strength to stand on his own two legs depleted completely. Losing his grip on the gun in his hand, he dropped it unceremoniously to the ground with a metallic clang. With his remaining willpower, he raised his head and peered weakly across his desk, noticing that the woman beside the Tsar had a smoking gun in her hand. Realising what had happened, he slumped back as the light faded from his eyes, still desperately holding the now profusely bleeding wound in his chest. He felt the last vestiges of life drain from his feeble body as he slid out of his chair and hit the floor with a final, tremendous thud.\nTsar Romanov sat quietly as he watched Astakov's final fall, his descent as slow as his rise to power. For all the flailing and whimpering he had done, Astakov's fight for Russia ultimately proved to be the last-ditch endeavour of a man who had accomplished absolutely nothing throughout his pitiful life. Regardless, this was one more problem out of the way.\nThe Tsar let out a sigh as Selena holstered her gun. “As quick as ever, but couldn't you have simply disabled him? I know your aim is good enough.”\nSelena replied curtly. “It would be a disgrace to myself and especially to you if I had allowed him to continue to draw breath. After disrespecting you and raising his gun with the intent to harm you, how could I afford him that mercy?”\nThe Tsar nodded in acknowledgement, the matter settled. Surveying the pathetic scene before him one last time, he turned to Selena and said..."
 MRU_phase_one.8.a:0 "Come. We have much work to do and no more obstructions."
 MRU_phase_one_politics.1.t:0 "A new Government"
 MRU_phase_one_politics.1.d:0 "Sat around a round table, the Tsar and his seven Oprichniki were fairly relaxed for such an important meeting. Now was the time to create a functioning government after the coup that removed Astakov from power. Selena Larionovna and Robert Saulfort, as the most loyal to the Tsar, sat closest to him. Although, they argued about who would sit where furiously. Selena ended up stealing the seat to the right of the Tsar for her own. Tsar Vsevolod Romanov sat between them, letting out a small sigh.\nSelena spoke first. “Vsevolod, I must say this again, we have to wipe out the paramilitaries that Astakov rallied to his side.”\n\nRobert nodded in agreement, crossing his arms. He was still slightly annoyed that Selena stole his seat. “They're a threat to you if left alone long enough.”\n“Right, I'll have either Narmanov or Voronov work on that,” Vsevolod said in an indifferent tone.\nVoronov raised his hand. “Can we get a proper tax code sorted out then? I don't want us looking like republicans.”\nVsevolod nodded. “Yes, in which case-”\nIlyana Markova interrupted the Tsar. “Yeah, we can bombard the people with taxes!”\n“Calm down, Ilyana.” Narmanov put a hand on her shoulder, looking at the Tsar. “We also need to start appointing noble titles so that we can gain more legitimacy. You are a royal, remember.”\n“Yes, the church needs to be addressed too,” Ilyana said with a bit more sensibility.\n\nThe room fell silent in thought for a moment, before Maksim Orlev interjected. “Could we also discuss what to do with the Duma?”\n“I agree with Maksim,” Tatiyana Rosina said. “We should make sure the people have a voice in all of this.”\nThe Tsar put his hand to his chin and closed his eyes. His head began to spin, all this information entering his brain at once. He nodded to himself, though it was the type of nod that wasn't processing most of what he heard. While the others spoke over each other and he remained in his thoughts, he started to come up with plans for each issue himself.\n“Right, we will continue this later on. Don't forget we have the Europians to worry about. Selena?”\nSelena stood to attention. “Yes, your majesty.”\n“Please keep them under control.” He stood up and left the room."
 MRU_phase_one_politics.1.a:0 "I need some time to think."
 MRU_phase_one_politics.2.t:0 "Taking the Mantle"
 MRU_phase_one_politics.2.d:0 "The Tsar took a seat, in a meeting with the Oprichniki once again. He let out a sigh, shuffling through papers in front of him. The light above the table buzzed, occasionally flickering. Tsar Romanov lifted his head and scanned his eyes around the room at each one of the Oprichniki. “First and foremost...” the Tsar started. “This is not the Britannian Academy. We are running a country. Act like it.” The Tsar stared daggers at each of his officers. All of them remained silent. “With that of the way, we are going to deal with the paramilitaries like Selena suggested. Understood?” Everyone in the room nodded in unison.\n\n“Then I will lead the operation to wipe them out-” Selena began before being interrupted by the Tsar.\n“No, Narmanov will take care of it.”\nSelena recoiled slightly. “But your majesty, I think I would be more suited for this...” As Selena tried to argue, the Tsar stared at her disapprovingly, causing her to stand down.\n“Narmanov, did you hear me?”\n“Yes, your majesty!” Narmanov stood from his chair.\n\nVoronov raised his hand. “If I could make a suggestion, I believe I have a better plan. Brute force is great and all, but I could use the Okhrana to have them tear each other apart from the inside.”\nThe Tsar pondered for a moment, glancing down at the table. He hadn't considered using the Okhrana. Either way, the paramilitaries would be dealt with, but in a state of emergency it would be better to be as efficient as possible."
 MRU_phase_one_politics.2.a:0 "Voronov's idea would cost us less militarily."
 MRU_phase_one_politics.2.b:0 "We'll stick with Narmanov's plan and crush the rebels."
 MRU_phase_one_politics.3.t:0 "Collapse From the Inside"
 MRU_phase_one_politics.3.d:0 "“I'm telling you, it isn't mine!” Pavel shouted.\n“Don't bullshit us, traitor!”\nMoments earlier, one of Pavel's comrades found a letter inside a pocket of his backpack. A letter from the Tsar himself, detailing Pavel's supposed infiltration of the paramilitaries formed by Astakov. However, this wasn't his letter. Pavel never in his life worked with the Tsar, but no one would listen to him.\n\n“Lay off him Grigoriy, this clearly isn't Pavel's,” Pavel's good friend Dimitri defended him. Pavel smiled at Dimitri.\n“It has his name on it. What, are you in cahoots with him?” Grigoriy said, lifting his rifle at Dimitri.\n“Don't point that thing at me!” Dimitri yelled, lifting his own rifle. “Are you fucking crazy?”\nPavel looked back and forth, before stepping in front of Dimitri. “Stop this! You're playing right into their hands!”\n“I'm not going to end up like Astakov because of a snake like you!” Grigoriy yelled.\n\nPavel desperately tried to reason with him, but it was pointless. Someone clearly instigated this, trying to spark infighting amongst Astakov's paramilitaries. Why couldn't he see that? Didn't he trust him?\n“Grigoriy! Put it down!” Dimitri yelled.\n“I trusted you!” Grigoriy shouted at Pavel, looking him dead in the eyes as he pulled the trigger. Pavel's world went black in an instant."
 MRU_phase_one_politics.3.a:0 "Grigoriy, you idiot!"
 MRU_phase_one_politics.4.t:0 "The end of Astakov's Clique"
 MRU_phase_one_politics.4.d:0 "Dogs could be heard barking from behind as Pavel brushed past bushes. A man shouting orders while he ran. Pavel's foot caught onto the root of a tree and he fell to the floor. His pants were caught on the branch as he desperately tore them loose. As he tried to stand himself up, a Danubian Wolfdog pounced onto his back and bit into his arm. Pavel screamed, the dog shaking its head violently, its jaws locked onto his flesh. Pavel felt his arm slowly rip out of his socket as it pulled at him, biting through his clothes. From above on the ridge, Pavel heard a whistle as the dog let go and barked at him. On the ridge were several men, one with an officer's cap.\n\n“You run fast,” the officer said. He looked to be no older than his mid twenties, young in the face. Pavel quickly recognized him as one of the Oprichniki that exited the plane with the Tsar on the news. Narmanov, was it? “I'm afraid you've backed the wrong horse.”\nPavel was choking on his own breath, his mouth dry. Blood seeped through the cloth of his shirt, his arm feeling as if it was on fire. “Why are you doing this? You could have worked with Astakov!” Pavel shouted, fearing for his life.\nNarmanov shook his head. “Astakov couldn't realise Russia's destiny. That role falls onto the Tsar.” Narmanov started to lift his gun.\n“Wait!” Pavel pleaded. “I'll swear my loyalty to the Tsar!”\nNarmanov looked down at Pavel, a scornful expression on his face. “Changing sides when it benefits you?” He shook his head. “Have the decency to die with dignity.” Narmanov lifted the gun, pointing it at Pavel.\nPavel's heart sunk in his chest. He clutched his arm hopelessly. This was how it ended. Not just for Pavel, but Astakov's Clique. As Pavel closed his eyes, all went black."
 MRU_phase_one_politics.4.a:0 "Why did I follow Astakov? Idiot!"
 MRU_phase_one_politics.5.t:0 "Republican Remnants"
 MRU_phase_one_politics.5.d:0 "Maksim Orlev made a quick pace towards the Tsar's side with papers nearly falling from his hands and onto the hallway floor. “Your majesty!” Maksim said, catching up to him.\n“What is it?” the Tsar said, looking down at the papers Maksim was holding.\nMaksim caught his breath. “About the republicans, could we reintegrate some of them into government? I think some of their skills could be useful...” Maksim shuffled through his papers, trying to find a specific one amongst the mess.\n“You want former republican civil servants in our government?” the Tsar narrowed his eyes.\n“That's right! I'm sure they wouldn't mind adapting to our new system.”\nThe Tsar frowned. “Maksim... I think those Republican sympathies of yours have gotten a little out of hand.”\n“Oh come on, I'm not asking you to surrender our country and let Europia decide our constitution.” The two of them gave up on speaking formally with one another. “I'm just saying we could put them to use under our system rather than leaving them alone to fester.”\n\nTsar Romanov stared through Maksim for a moment, lost in thought. By no means was he in the wrong, but Maksim was far too kind. Even if masquerading it as a decision of efficiency, Vsevolod saw right through him. “Maksim, I know what you're like,” he said. “Your tendencies were fine in Britannia, but here I cannot allow them to keep spiraling into something more. You are... how do I put this? Very quick to go off the deep end with your wild ideas.”\nMaksim processed before letting out a laugh. “That was only one- okay, two times. I'm not going to go full Maksim on you. I actually think this is for the best. I'm not just doing it as a favor to someone.”\nVsevolod sighed and looked to the ceiling. He put a hand to his chin and closed his eyes. Republicans... Sure, they could be of use, but they were republicans. The people who once stagnated Russia and allowed their greed to harm the people. Would it really be worth it?"
 MRU_phase_one_politics.5.a:0 "As long as they don't keep their old habits."
 MRU_phase_one_politics.5.b:0 "There's no place for republicans."
 MRU_phase_one_politics.6.t:0 "All-Seeing Eyes"
 MRU_phase_one_politics.6.d:0 "Footsteps marched down the hallway of the Ekaterinburg government building, Selena in her green military uniform heading straight for the Tsar's office. A fiery scowl was on her face as she busted open Vsevolod's door, Vsevolod nearly jumping out of his seat and dropping his pen. Selena stormed towards the desk and dropped a fat stack of papers in front of the Tsar. She let out an exhale. “All of this,” she began. “All of our own conversation written out for everyone to see.”\nVsevolod picked up the top sheet, scanning his eyes over the first sentence before narrowing his eyes. “Selena... didn't I say this to you in private?” Vsevolod gripped the paper with both his hands and read further.\nThe conversation written down went as follows. “We aren't in Britannia anymore, Vsevolod,” Selena's words were written.\n“Did they not protect us? Shelter us? We may have been treated as pawns, but we were under their protection,” Vsevolod responded.\n“And we're free of it now. We don't owe them anything.”\n\nVsevolod set the paper down, exhaling through his nose. He didn't need to read anymore. It was clear what was going on. Vsevolod stood from his chair, marching past Selena and out of his office, pushing the doors open with enough force for them to swing into the wall. Hearing the approaching footsteps that could've been mistaken for the fiery Selena's was none other than Sergey Voronov. As the door to Voronov's office swung open, the tea he held shook as droplets splashed onto the carpet below.\nVoronov let his heart settle before speaking. “Your majesty,” he gave an over embellished bow. “Did you mistake my office for Maksim's?” He gave an insincere smile.\nIn the tsar's face was a fury that despite still being subdued, was unsettling for its unfamiliarity. “Explain yourself,” Vsevolod stated simply.\nVoronov recoiled slightly, the sight of an aggressive Vsevolod catching him off guard. “I suppose you're not asking about the tea I'm drinking...” Voronov sighed, setting it aside on his desk. “I'll begin with this. Who holds the despot responsible?”\nVsevolod dug a nail into the palm of his hand. “Are you questioning my leadership?”\n“I wouldn't go that far...” Voronov said. “But rather, that should be the role of the people. To watch those ruling them with an eye for criticism. Do you not agree?”\n\n“Then who are you to be recording my conversations, Voronov? What right do you have to do that?” said Vsevolod.\nVoronov lifted his arms to a shrug. “Myself and the Okhrana are just a messenger for the people. Their decisions and opinions are their own.”\nVsevolod narrowed his eyes. “There's a limit to what the people need to hear from me, Voronov...”\nVoronov closed his eyes, placing a hand on his chest and bowing with more sincerity this time. “Ultimately, you are the Tsar here. The decision remains your's, whether any of these recordings should be publicized. How much do you value your time behind closed doors over your transparency towards your people?”"
 MRU_phase_one_politics.6.a:0 "I will not tolerate this."
 MRU_phase_one_politics.6.b:0 "My people deserve to hold their Tsar responsible."
 MRU_phase_one_politics.7.t:0 "Blessed Reunion"
 MRU_phase_one_politics.7.d:0 "Morning dew spilled over leaves of green stems. Sunlight reflected off of every droplet. Just outside of an old stone church was an elderly man, using a broom to sweep the dead leaves that remained on the paved pathway. Footsteps approached from behind him, although it was not an everyday worshipper. Rather, a man in a brown coat and hood, a scarf to cover his face. Following him was a woman with brown hair covered by a knitted wool cap with a scarf and coat of her own. The elderly man gave his attention to the pair. “May I help you?” He set his broom against the edge of the water well flanking the path.\n\nThe woman did not speak. Instead, the young man next to her removed the hood above his head and lowered his scarf. The man immediately recognized him and went still. Standing before him was none other than the Tsar of Russia, Vsevolod Romanov. “Bishop Samuil, it's been a while.”\n“Vsevolod... Young boy, is that you?” Samuil stepped forward and looked Vsevolod up and down.\nVsevolod nodded. “How have you been? I suppose that's a cruel thing to ask.”\n\nFollowing the uprising of Astakov's paramilitaries in Ekaterinburg, Samuil was replaced with another patriarch who no doubt bleeded corruption and dishonesty throughout Christian faith. Even after all his years of dedication to his faith and the old Tsar, he was tossed aside like dirt. Samuil recomposed himself, wiping a single tear from his eye. “Russia is blessed to have you, Vsevolod.”\n“Bishop, would you care to take back your position?” Vsevolod reached out a hand. “Not only for Russia, but for my father.”\nBishop Samuil took Vsevolod's hand. “For God and the Tsar.”"
 MRU_phase_one_politics.7.a:0 "Faith will guide us."
 MRU_phase_one_politics.8.t:0 "Burden of Command"
 MRU_phase_one_politics.8.d:0 "Tsar Romanov sat in the very office Astakov was killed in, with Ilyana Markova sitting across from him. Ilyana kept her attention on the Tsar who was lost in thought. Finally, the Tsar gave her an answer. “We can do this, but I need to make a choice between the two,” the Tsar said.\n“Thank you very much, though personally I think the soldiers are more deserving of these titles.” The matter was about assigning noble titles. Though, whether those titles would be given to soldiers or to economists was still up for debate. Both were valuable to Ekaterinburg respectively. The soldiers risked their lives on the frontlines and defended the nation. However, it was the economists who were rebuilding Ekaterinburg and employing her people. Ilyana gave a mocking grin. “Come on, you aren't going to give noble titles to some pencil pushers, are you?”\n\nVsevolod sighed, looking off to the side. “Would you blame me? There's a balance to be maintained when running a country.”\nIlyana leaned back into her chair, blankly staring at the ceiling with an empty head. She then leaned forward again. “Yeah, anyway, I'm siding with the soldiers.”\n“You aren't listening...” Vsevolod pinched the bridge of his nose and closed his eyes.\nIlyana put a finger to her chin. “We are in a war, aren't we? What's so wrong about valuing the lives we're sending away? I think there's value in keeping our economy afloat too, but there's something a bit more noble about rushing an enemy gunline for the sake of those behind you.”\nVsevolod opened his eyes, setting his hands onto his desk and standing up. He walked to the window behind him, looking down at the street. “Then isn't there something noble about keeping production high for the equipment the soldiers use?”\nIlyana recoiled slightly and stood up. “Have you been getting comfy in that chair, Vsevolod?” He turned to look back at her, seeing a look of disgust on her face. “Selena may have fired the gun, but the man who sat there died because of you.”\nThe young Tsar dug his fingernails into his palm. “What does that have to do with this?”\n\nIlyana stared the Tsar dead in the eyes. “Those soldiers are dying for your country, by your command. They are running into no man's land for the Tsar. That is your responsibility.” The Tsar's eyes retreated from Ilyana's gaze. “You know, Vsevolod,” Ilyana continued. “My love for artillery has been challenged lately. With every bombardment, we spill Russian blood. Seeing the dismembered corpses created by my orders, I can't help but question what right I have.” Ilyana planted her hands on the desk. “I still stand by the orders you give, but remember who are the ones having to execute them. We both made that same pledge when we arrived at the academy. I don't believe either of us were truly thinking of Britannia when we made it,” Ilyana said sternly before bowing and marching out the room with her military cap pulled down to hide her eyes."
 MRU_phase_one_politics.8.a:0 "It is my responsibility."
 MRU_phase_one_politics.8.b:0 "We need to maintain a balance."
 MRU_phase_one_military.1.t:0 "Regarding the EIZ"
 MRU_phase_one_military.1.d:0 "“...and so this newly formed ‘Europian Intervention Zone' has moved onto Moscow and intends to take back the rest of Russia.” The former RSDF officer had been briefing the Tsar and his Oprichniki for an hour now. Specifically about the Europian Intervention Zone or the EIZ which had invaded western Russia to prevent the spread of rebellions towards the rest of Europia. “In their own words, to ‘restore order.'” The officer was sweating in front of the Tsar.\n\nRobert Saulfort of the Oprichniki spoke first. “Is this really a matter for the Tsar?”\nThe officer stumbled on his words. “But... But of course! This is an invasion!”\nTsar Romanov appeared unphased in his chair, as if he wasn't even present in the room. His gaze passed through the officer. “Your concern is appreciated, but this is hardly as grave as you make it out to be. The EIZ is nothing more than a skeleton force of troops thrown together by Paris in a matter of days.”\nThe officer nodded and lowered his hat. “Yes, apologies your majesty... however, I still think it should be addressed.”\n“Naturally, it will be addressed.” The Tsar sat upright with his hands clasped together, never lessening his regal posture.\n“Thank you, your majesty!” The officer exited the room and disappeared from sight.\nSelena Larionovna shut the door behind him, before turning to the Tsar. “You can relax, Vsevolod.”"
 MRU_phase_one_military.1.a:0 "Europian cheapskates."
 MRU_phase_one_military.2.t:0 "Ilyana's Beloved Artillery"
 MRU_phase_one_military.2.d:0 "“Boom baby!” Ilyana screamed as artillery rounds went off around her. “Oh yeah! That's what I like to see!”\nTatiyana sighed, watching from further back. Ilyana's obsession with giant guns never failed to impress. “Ilyana? What are you thinking so far? And don't just say something stupid,” Tatiyana spoke over the radio in her hand.\nRadio static came through as Ilyana replied. “The radius has improved and I can feel the blast more. As far as speed goes, they definitely feel a bit quicker. I think these new treads you made work well.”\nTatiyana smiled, satisfied that her design wasn't awful. She took a sip from her coffee mug, letting out a yawn as if it wasn't even working. She watched Ilyana from behind the camp table, sitting with her legs crossed. “I'd like to try them out when it's snowy outside. Too bad we got a sunny day for once.” Tatiyana yawned once more. Tatiyana then watched as Ilyana got too excited and fell backwards into mud as the artillery went off again. “Hm... at least there's some mud around.”"
 MRU_phase_one_military.2.a:0 "How do these two get anything done?"
 MRU_phase_one_military.2.b:0 ""
 MRU_phase_one_military.3.t:0 "Object-550"
 MRU_phase_one_military.3.d:0 "Maksim Orlev sauntered into the factory. It smelt of oil and steel. The overseer of the operation walked up to Maksim, adjusting his hard hat and wiping sweat from his brow. Maksim looked past him at the armoured vehicle, suspended on a lift. It was coloured army green, its main turret taking up most of the area.\n“This is Object-550?” Maksim asked, sighing. “I knew they would be cheap, but wow. Oh well, it will do.”\nThe overseer looked down at his clipboard. “We optimised it for mass production as much as we could while keeping it beefy within budget. Sorry to disappoint.”\n“No matter, it's better to have twenty tanks rather than one,” Maksim reassured him. He gazed up at the tank, getting closer to feel it for himself. This would transform their offensive operations against the EIZ massively. Even if it was an unreliable hunk of junk, it was still a tank. Something to counter the enemy. He glanced to his side at a worker who was slouching and exhausted. Maksim narrowed his eyes at the worker, before walking up to him. The worker looked up at Maksim in surprise.\n“Sir! Sorry, I was just-”\nMaksim interrupted. “Drink up, you have work to do,” he said before pulling his personal flask from his coat and handing it to the worker.\nThe worker looked at the flask hesitantly before grabbing it and taking a swig. “Thank you, sir!”"
 MRU_phase_one_military.3.a:0 "Strength through numbers."
 MRU_phase_one_military.3.b:0 ""
 MRU_phase_one_military.4.t:0 "Counter-Offensive Against the EIZ"
 MRU_phase_one_military.4.d:0 "The general staff meeting room was colder than usual, the window to the room opened by Narmanov of the Oprichniki in order to keep the attention of everyone in the room. Vassili, a former RSDF officer, was sitting in the chair furthest from Narmanov. Narmanov spoke loudly to the general staff, his voice echoing down the hall. “The EIZ's troops hold cheap guns and their tanks are practically tin foil. It is obvious to anyone on the front line that they are not being given the funding they need to sustain their armies.” Vassili nodded, agreeing with this assessment. Narmanov went on. “That being said, if we fell behind them it would be a disgrace. This is something we can take advantage of. Keep our supply safe and starve the enemy.”\n\nVassili sat there, listening intently. For a bunch of kids, they certainly knew how to make the best out of a bad situation. Considering they only recently performed a coup on Astakov's government, they were already getting to business and forming offensive operations.\nIlyana Markova raised her hand. “I believe we could also take advantage of our artillery stockpile. Rain down hell on the EIZ.”\nNarmanov sighed. “Don't you care about anything other than artillery? You are right though.”\nIt had only been a day since Vassili joined the general staff, but already these kids from Britannia were giving him more work than he's had for a month."
 MRU_phase_one_military.4.a:0 "Things are finally moving along."
 MRU_phase_one_military.5.t:0 "March Across the Urals"
 MRU_phase_one_military.5.d:0 "Selena's head remained high, her posture never faltering as she marched through frozen wasteland. Behind her were the men and women she was training, all failing to keep up with her. One of the soldiers fell onto his rear and dropped his backpack, his hot breath able to be seen in the cold air as he breathed heavily. Selena narrowed her eyes at him and shouted, “Did I say you could rest? On your feet!” The young girl was bossing around this man in his late twenties, a foot shorter than him. He reluctantly stood to attention, wobbling as he tried to stay standing. All her soldiers were groaning as they trailed after her, trying to keep up with her pace. She didn't bother to look back until she heard someone else fall into the snow on their knees. She did a 180 and instantly berated the young woman. “Are you a preschooler? We aren't having nap time. Keep up or you'll do another one of these exercises tomorrow.”\n“Yes... ma'am!” she could barely form sounds as she gasped for breath in the freezing air. She eventually caught up with the man who fell over earlier and gave him a look of scepticism. He looked back at her and shook his head.\n\nSelena kept the same pace as she marched, each step in sync with the other, as if she was made for the army. She had the demeanour of a perfect soldier and yet, she was doing training exercises, not on the front lines. Eventually she stopped at a flat area. “Stop!” she yelled, turning around to see all her soldiers fall to the floor out of breath. “We are setting up camp here. Get to work.” She didn't stop to order them around, all of them reluctantly opening their backpacks and beginning to set up camp in the field. All their faces were red from the cold, their hands shaking. Meanwhile, Selena stood firm with her hands behind her back, watching over everyone. Some of these soldiers were in their forties and had fought in battle, yet they were being ordered around by a girl decades younger.\nOnce camp was set up and various soldiers were either in tents or sat around fires, Selena wandered off into her own tent, sitting at a fold out desk inside. She exhaled, shuffling through papers under a bright lamp. Why was she here? Sure, she was good at what she did, but why so far from the front lines where she could be fighting with her comrades? Deep down, this ate away at her, but it mattered not. It was under the Tsar's direct orders, something she could not disobey."
 MRU_phase_one_military.5.a:0 "A machine on her surface."
 MRU_phase_one_military.5.b:0 ""
 MRU_phase_one_economy.1.t:0 "BREAKING NEWS"
 MRU_phase_one_economy.1.d:0 "“Are we live?” Fenya asked her cameraman, before clearing her throat. “This is Pokrovskaya Fenya from Ekaterinburg News bringing you live from inside the Ekaterinburg government office. The Tsar has just arrived, meeting with several oligarchs from around the Ural regions.” Fenya stretched her arm out towards the Tsar who sat down in front of the table where the agreement would officially be signed. “Today they will hand over their private assets to the Tsar and the Duma, giving back their funds to help the people of Russia!”\n\nTsar Romanov gestured to the oligarch closest as Selena spoke his name. The oligarch came up to the table and signed the paper in front of the Tsar, before shaking his hand and giving a half assed smile. As the oligarch defeatedly shuffled away, Selena called out the next name and the process repeated itself.\n\n“Once again the Tsar proves he's looking out for the people!” Fenya enthusiastically said while moving her hair out of her face. “This is Ekaterinburg News bringing you unbiased stories from Ekaterinburg Square.”"
 MRU_phase_one_economy.1.a:0 "Pokrovskaya Fenya, signing off!"
 MRU_grand_ball.1.t:0 "The Tsar's Future Wife"
 MRU_grand_ball.1.d:0 "The Tsar let out a hefty sigh. His head hung low as he sat at his desk. The only person in the room with him was Robert Saulfort of the Oprichniki. Robert stood across from Vsevolod, holding a collection of papers to read from. As he flipped one of the pages, he peered over the papers to see if the Tsar was still listening. “All that being said, there's a couple of women attending the ball that may be of interest... Vsevolod?” Robert asked, snapping his fingers to get his attention.\nVsevolod perked up with a scowl. “Of all the things...” he let out another sigh. “Must it be marriage?”\nRobert shook his head. “You must have seen this coming... Besides, what's the big deal? All you have to do is talk to women at a party and find one that wants to be romantic with you.”\nTsar Vsevolod dug a fingernail into the palm of his hand, one of his eyes twitching. “Right, right... Go on, who do you have on that sheet that I'm supposed to do that with?”\n\nRobert cleared his throat, moving a strand of silver hair out of his face. “Well uh... you got the lady from Europia... she's pretty, I guess?” Robert scratched the back of his head, trying to sell it. “That would be Sylvia. She's a pretty big deal, so don't screw anything up with her!”\nVsevolod nodded. A big shot from the EU? If only it were as simple as politics. Romance was not exactly a field of experience for the young man. Though, a potential marriage with a woman from western Europia did come with political advantages. So romantic, the Tsar thought to himself.\n\n“And let's see...” Robert continued. “Sophia il Britannia. All hail Britannia or whatever. She's something like royalty, seems like. Even though we aren't living in Britannia anymore, an alliance in whatever form it takes... Well, you see what I'm getting at?”\nAnother nod from the Tsar, with just a trickle of sweat on his forehead. A Britannian, how nice would it be to get on their good side. It remained to be seen if this girl even had a good side to get on. Britannians were not the most accommodating. Vsevolod leaned back in his chair, staring at the ceiling. “Marriage, huh?” A sigh escaped his lips."
 MRU_grand_ball.1.a:0 "Things will not remain the same for much longer."
 MRU_grand_ball.2.t:0 "Selena's Gentle Push"
 MRU_grand_ball.2.d:0 "Vsevolod sat at his desk, scribbling down production rates and the limits of their logistic capabilities, planning the next month's supply for the troops, his head hovering over the desk as he clasped his head lost in thought. Suddenly he felt himself being lifted out his chair, stumbling forward as Selena dragged him by the collar, mumbling under her breath as she turned to face him. “What did I do now? You know I am the tsar, some people would take offense to you manhandling me like this,” Vsevolod said with a smirk straightening up as Selena released him.\nSelena tossed a dress uniform to Vsevolod. “We both know they're more scared of me than you, now get dressed. The patriarchs and palace servants have been preparing for tonight for weeks now and I'll be damned if I had to teach you how to dance for nothing. I swear your feet are less stable than the Euro's,” Selena commanded with an annoyed glance.\n\nVsevolod stared down at the clothes draped over his arm with a displeased expression. Letting out a sigh, he begrudgingly went along with it. Not thirty minutes later, he exited his room with Selena waiting outside of his door. He wore his formal military uniform, his arms unflatteringly spread out as if he felt like an alien wearing it. He stared down at himself, awkwardly adjusting his tie before Selena adjusted it for him.\n“Well, how do I look?” Vsevolod said with an unconvincing smirk, which made him look less glamorous and more like a villain.\nSelena had a blank, dead stare. “Hard to polish a turd, but we've pulled it off as best we could. Let's hope the potential suitors at this ball are into men with no self confidence.”\nVsevolod slouched forward, exhaling the little confidence he mustered. “Thanks. Is this even necessary?”\n\nSelena gripped his shoulders to readjust his posture and grabbed the young Tsar by the hand, dragging him down the hall towards the ballroom. “Stop being a baby. You're going to get married whether you like it or not.”\nA groan followed behind Selena. “I don't even know these women.” They stopped in front of the door, Vsevolod slouching once more before readjusting himself to avoid Selena's wrath. However, this didn't stop Selena from maneuvering his body around and straightening his suit collar repeatedly.\n“Shut up, once you're in there you're going to be on your own, so behave.” Selena let out her own sigh, a nervous look on her face. “You can get to know them when you marry them.”\n\nThe Tsar's gaze cast downward, before Selena pushed open the door to the ballroom. Light soaked over the pair as the Tsar and his accompaniment put on a tough front as they walked into the room. Every guest turned to face the Tsar, his chin held high now. Whispering echoed throughout the room, surrounding him while he made his way to the top of the stairs where everyone was able to see him now.\nSelena brutishly placed a hand on the railing, clearing her throat before raising her voice. “Ladies and gentleman, his royal majesty, Tsar Vsevolod.” She gestured to the Tsar, who then with glorious silence, started walking down the stairs and into the ball. As a polite applause sounded out around the room, the Tsar gave a royal wave, before joining the partygoers below."
 MRU_grand_ball.2.a:0 "The grand ball begins."
 MRU_grand_ball.3.t:0 "The Flower From Europia"
 MRU_grand_ball.3.d:0 "As the ball had been going on for some time now, Vsevolod found himself in the thick of it. Within the large open room where most attendees gathered, he was naturally swarmed by those of higher status as well as gawked at by everyone else. As he was shaking someone's hand, in the corner of his eye was a dress of blue and black. However, while the dress caught his eye, it was when his eyes locked with hers that he recognized who this was. Sylvia Metternich or ‘the lady from Europia' as Robert so eloquently put it. She stared at Vsevolod from across the room, her gaze threading through the crowd of people. It was after the first second of eye contact that he realized he just initiated an interaction from a distance that he was now stuck in. \n\nSylvia set her glass on a passing tray cart to be taken away, turning back to the Tsar and beginning to walk towards him. Vsevolod, still stuck in a long handshake with a man he didn't know the name of, smoothly made an excuse to end the conversation he wasn't listening to. Before Vsevolod knew it, Sylvia was standing in front of him, lifting her dress and giving a gentle bow.\n“It's a delight to finally meet you, Tsar Vsevolod,” Sylvia spoke with a silvery voice. “Sylvia Metternich.” She reached a hand out, which the Tsar lightly gripped with his own.\n“Yes, delighted as well. I had heard you would be attending...” Vsevolod said before stopping short. \n\nSylvia's eyes said that she knew exactly why the Tsar would hear of her of all people. “That so? What an honor to be on the Tsar's VIP list!” She put a hand over her lips to give a light laugh.\nVsevolod maintained the cool and unphased face of the Tsar, despite being outmaneuvered in conversation. Although it was only a hunch, that handshake a few seconds ago felt like the handshake a politician would give. Clearly, this was not her first rodeo. Her azure eyes sparkled up at him, perhaps intentionally.\n\nVsevolod glanced around, Sylvia not the only one observing this conversation. “Your Russian sounds native. Have you stayed in Russia for some time?”\nSylvia toyed with her hair as she spoke. “I've done my fair share of travelling, but Russia is something of a curiosity of mine.”\nThe Tsar raised an eyebrow. “In what way?”\nShe gave a genuine smile. “People with true hearts live here. Some might say Germany is the heart of Europia, but to have faced such hardship for so long while remaining headstrong is more Russian than German.” Vsevolod let a smile sneak onto his lips as well."
 MRU_grand_ball.3.a:0 "That is a good answer."
 MRU_grand_ball.3.b:0 "I am needed elsewhere."
 MRU_grand_ball.4.t:0 "Russia's Flower"
 MRU_grand_ball.4.d:0 "With a deteriorated posture, the Tsar found his way into the waiting room. For the past ten minutes, he had stumbled around in this draining party, conversation after conversation. In the room he found himself in was Selena Larionovna, someone he could relax around, his best friend. He let out a hidden sigh, trying not to look visibly worn out in front of the guests. Selena also sighed, but for an entirely different reason. As head of security, she was busy diffusing a heated argument with two guests. Although, as the Tsar cleared his throat and made his presence known, they both stopped their bickering. “That's enough, isn't it?” Selena said with daggers for eyes, gesturing to the guests to leave the room. “I don't want to hear anything else from you two all night.”\n\nAs the two men left the room with their gaze turned downward, Vsevolod turned his own gaze to Selena. She sat cross legged with crossed arms, like an extremely annoyed pretzel. It was only Selena and a few other guests who whispered to each other in the room. Selena side eyed Vsevolod.\n“Don't look at me like that,” Vsevolod said with a glass of wine in his hand. His neat hair from earlier had the slightest strand drooping now.\n\nSelena stood up and got closer to Vsevolod so that they could speak quieter. “Are you trying to skip your duties?”\nVsevolod gave a dismissive shrug, clearly worn out. “I thought I'd come check on you.”\nSelena gave a blank stare. “Vsevolod, go back to the party.”\n“You are tougher on me than anyone else, you know that?” Vsevolod said with a scowl, though it was clear that this was normal between the two friends. “Besides, I just came to see how you were doing. You're my head of security, remember?”\nSelena shook her head. “Alright, alright, in that case I'm doing just fine. Security is great. Now shoo.”\n\n“Are you sure you don't want to take a break?” Vsevolod asked.\nSelena narrowed her eyes. “You mean you want to take a break?”\nVsevolod waved a hand. “No, honestly I think you should just relax while things are running smoothly.” He said this with a worn out expression.\nSelena had a look of surprise, but also suspicion. She paused for a moment. “Alright...” she said. “I'll be upstairs if you need anything then. Just send someone to come get me.” She looked downward for a moment to think, hesitating with her own words until she finally and slowly walked out of the room. She looked back once before closing the door behind her."
 MRU_grand_ball.4.a:0 "She'll need company."
 MRU_grand_ball.4.b:0 "I'll head back to the party."
 MRU_grand_ball.5.t:0 "A Flower Under Moonlight"
 MRU_grand_ball.5.d:0 "“Glorious, fresh air...” Vsevolod took in a deep breath, having escaped the crowds and making it to the garden outside. As much as he had undying passion for running his country, nothing could change his introverted nature. A little time in the garden wouldn't hurt, he thought. Thus, he slipped out of sight behind the fountain and around a pair of hedges. There, he found a greenhouse. Through the surrounding glass panes of that greenhouse, he saw a girl of red and white. Vermillion flowing hair and a long white dress with a red jewel resting from her neck. Too unusual to be a gardener of course, but serene enough to be right at home in the flower filled glass structure.\nUnaware of the Tsar's presence, Vsevolod could have simply left without a word. However, he continued his escape from the ball by entering the greenhouse, tapping on the doorframe. The red headed girl jumped with a start, turning to face the Tsar. However, that last detail was unknown to her.\n“Sorry, I didn't mean to startle you,” Vsevolod said with a softness that he could not achieve indoors. “I just came to get some fresh air. I hope I'm not a bother.”\n\nThe girl appeared caught off guard for a moment, before shaking her head. “Not at all, I'm here for the same reason.” Her eyes shifted to the side, not making direct contact with Vsevolod.\nInstantly, Vsevolod picked up on the aura of an introvert worse off than himself. He put out a hand for her to shake, giving a gentle smile. “What is your name?”\nThe redheaded girl lifted her face, illuminated by moonlight. “Sophia, yours?”\nAs they shook hands, Vsevolod put a hand to his chest. “I'm Vsevolod.” He didn't bother giving his status. “Are you not from Russia?”\nSophia's face turned the color of her hair. “Is it that obvious?”\nVsevolod swiftly waved his arms dismissively. “I don't mean it as an insult!” Sophia put a hand to her chin and gave a subdued laugh. Vsevolod continued, “Your accent is actually very pretty.” He stopped for a moment to contemplate if that was too forward.\nHer ruby eyes went big, somewhat taken aback. “Thank you, Vsevolod... That is a wonderful name.”\n\nMoonlight poured over them through the glass ceiling, their silhouettes reflected. Vsevolod thought to himself to try and place what exactly her accent was. It had a certain western feel to it, but not central Europian, nor French. In his mind, he heard the echoing thoughts of Robert's voice, telling him to get married. That was when he placed it.\n“Sorry if this is rude to ask, but could I know your surname?” Vsevolod asked.\nSophia recoiled slightly. “That is... Britannia. Sophia il Britannia.”\nVsevolod sent his brain to process for a moment, before stepping back in shock. “Sorry! I should have really said this sooner...” He put a hand on his chest and took a deep breath. “I am Tsar Vsevolod.”"
 MRU_grand_ball.5.a:0 "It's nice to meet you, princess."
 MRU_grand_ball.5.b:0 "Unfortunately, I must get going."
 MRU_grand_ball.6.t:0 "Arrival of the Red Flower"
 MRU_grand_ball.6.d:0 "As the Tsar moved into the entry hall after a period of socializing, he heard surrounding mumbling and people talking over each other. Vsevolod could see Selena from across the room. As he made his way around the crowds and got a better view, in front of Selena was an older woman with a long blonde braid over her shoulder. She wore a green military uniform, a fiery look in her eyes. A man next to her cleared his throat before putting an arm out. “Please make way for the mother of the revolution, our glorious leader, Sonya Bunina!” he shouted with as much hype as he could muster.\nThe hall was taken over by a mixture of confusion and obligatory applause. Vsevolod quickly walked forward to Selena's side to show himself, reaching out a hand. “Tsar Vsevolod,” he introduced himself. “It is wonderful to have you here, chairwoman.”\nShe extended her own arm to shake his hand lightly, that same fire in her eyes not dissipating. “Likewise. Let us hope our wishes align.”\n\nAnother man stood next to Sonya on her other side. Vsevolod had met him before, but his name escaped him. He had graying parts in his short hair and a strong jaw, a cigarette between his fingers.\n“And you are?” Vsevolod pretended not to know him, but shaked his hand politely.\n“Kulakov,” the man said. “Pleasure to meet you.” Being reminded of his name, Vsevolod was able to recall exactly who this man was. Mikhail Kulakov, something of a pragmatic communist within Sonya's circle, was a man of rationality, something Vsevolod could get along with.\n“The pleasure is mine,” Vsevolod gave a practiced smile. “Please enjoy the ball, you two.”\n“Naturally, and what is your relation to the Tsar, madam?” Kulakov put out his hand once more, offering to shake Selena's. \nAlthough taken aback, she took the man's outreached hand. “Selena Larionovna of the Oprichniki,” she replied, a stern look in her eyes.\n“Ah, I should have guessed,” Kulakov took another puff of his Chinese branded cigarette.\n\nSonya shook her head. “Excuse my chatty companion, your majesty.” She glared at Kulakov who was more focused on his nicotine intake than anything else. “If it would not be a bother, Kulakov and I hoped to speak with you in private.”\nVsevolod maintained eye contact with Sonya, now understanding where things were going. Despite her politeness, Vsevolod could still sense the political motions from this woman. Of course, this was no mere visit for her enjoyment, but a calculated move."
 MRU_grand_ball.6.a:0 "There is a room upstairs we can use."
 MRU_grand_ball.6.b:0 "Unfortunately, I am too busy right now."
 MRU_grand_ball.7.t:0 "Unburied Feelings"
 MRU_grand_ball.7.d:0 "Tsar Vsevolod laid on the floor of the room upstairs, an arm over his forehead as he stared at the ceiling. Every minute, a sigh would escape his lips. Despite being the Tsar, the man to lead Russia as their strong leader, somehow there remained a single obstacle in front of him. Not warfare, diplomacy or internal politics. Rather, his own feelings. Who would he grow old with? He was the Tsar, so there was no room to experiment in matters of love. Marriage was binding. How could he make a choice in a single night between women he'd only just met? It was an impossibility. No amount of conviction could bring him to make that irrevocable choice.\nA knock came from the door. Vsevolod quickly stood himself up, hearing Selena's voice. “Vsevolod? I'm coming in,” she said, entering before the Tsar could fix his ruined posture. She looked him up and down with a pitiful gaze. “Perhaps this was a mistake on my part.” She let out a sigh.\n\nVsevolod gave up on appearing noble, relaxing himself with the slightest bit of shame. “What do you mean by mistake?”\nSelena shook her head. “It was foolish of me to force you into this. I even told myself it wouldn't work, but I made you go through it anyway.” She cast her eyes to the floor.\n“Don't pity me, Selena,” Vsevolod said. “It's my own fault. If I could abandon everything and just be the Tsar, this would be simple.” He walked towards the desk and leaned onto it.\n“Vsevolod...” Selena walked with him and put a hand on his back. “I'm sorry. I'll just come out and say it and if you don't feel the same...” Selena took a deep breath as Vsevolod looked up at her. “I love you, Vsevolod. Though, I'm sure that's obvious.”\n\n“Is it?” Vsevolod quietly laughed. “I am dense, aren't I?”\n“I thought I could bury my feelings if you got married, but that only put pressure on you. I'm sorry,” Selena removed her hand from Vsevolod's back as she said this.\n“Stop apologizing,” Vsevolod said, straightening his stance. “I don't know what to feel right now. Whether or not I can reciprocate your feelings or meet your expectations, regardless...” He turned to Selena. “If the Tsar must marry, would you give me a chance?”\n“Do you really need to ask that?” Selena gave a pained, but genuine smile. “I'll be with you every step of the way, Vsevolod.” She grabbed his hand and gave an affirmative nod, before looking down at their interlocked fingers. “Your hand is cold, Vsevolod... Mine burns like fire.”"
 MRU_grand_ball.7.a:0 "How blind I am, Selena."
 MRU_grand_ball.8.t:0 "The Final Decision"
 MRU_grand_ball.8.d:0 "11 o'clock at night and the Tsar was feeling great. He had surprised himself, unexpectedly becoming more suave than he could possibly imagine, hitting it off with multiple different girls. Perhaps he always had it within himself, but this was beyond comprehension. Suddenly, he felt himself yanked to the side with a familiar voice in his ear. “Vsevolod!” Robert spoke, grabbing his wrist. “I need to talk to you. Now.”\nVsevolod was pulled along until they made it to the upstairs hallway. The door was shut behind them. “What is it, Robert? Paramilitaries?” Vsevolod asked with urgency.\n“No, no!” Robert frantically said. “It's you! What are you doing, man? You're flirting with everyone around!”\nVsevolod smirked, putting a hand to his chin. “I know, right? I didn't realize I could do so well... Wait, how do you know that?”\n“I've been watching,” Robert said, guiltily turning his gaze to the side. “Just to make sure and oh boy... You've gone and done it.”\n“What do you mean?” Vsevolod's smugness faded. “Isn't that a good thing.”\nRobert facepalmed. “Listen... You can't be leading girls on. You've got to make a choice.”\nVsevolod's eyes widened. “Robert!” He yelled. “I'm sorry, I didn't think of that... You're right.”\nRobert sighed and nodded. “Glad you understand... Now who do you actually want to marry?”"
 MRU_grand_ball.8.a:0 "Sylvia has captured my interest."
 MRU_grand_ball.8.b:0 "Selena has always been there for me."
 MRU_grand_ball.8.c:0 "Sophia stole my heart."
 MRU_grand_ball.9.t:0 "The Final Decision"
