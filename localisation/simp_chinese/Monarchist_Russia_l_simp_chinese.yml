 RUS_form_russo_britannia:0 "建立俄羅斯-不列顛尼亞聯合帝國"
 MRU_Succession_Crisis:0 "繼承危機"
 MRU_Succession_Crisis_desc:0 "我們的運動是一個黃金時代破碎的餘燼。沒有沙皇，我們不過是一群毫無希望收復失地的人。我們必須準備行動來尋找王位的最後繼承人——弗謝沃洛德·羅曼諾夫。有了王位繼承人的支持，我們終於能獲得爭取人民支持所需的正統性。"
 MRU_Operation_Kulik:0 "庫利克行動"
 MRU_Operation_Kulik_desc:0 "我們的間諜已接到任務，尋找有關沙皇下落的任何線索。我們所知道的唯一具體訊息是他在不列顛尼亞本土的某個地方，我們不確定他的境遇。我們只能希望沙皇得到了公正的對待，並且在我們急需之時他願意返回家園。"
 MRU_Locating_the_Tsar:0 "尋找沙皇"
 MRU_Locating_the_Tsar_desc:0 "placeholder"
 MRU_The_Eagles_Nest:0 "鷹巢"
 MRU_The_Eagles_Nest_desc:0 "儘管沙皇的回歸是這場運動最重要的要求之一，但一個顯而易見且迫在眉睫的問題是，如果我們的情報正確，沙皇仍然未成年，無法登基。因此，最高階的將領們召開了一次會議來討論手頭的事務"
 MRU_The_Bear_and_the_Eagle:0 "熊與雕"
 MRU_The_Bear_and_the_Eagle_desc:0 "placeholder"
 MRU_Operation_Chelyabinsk:0 "車里雅賓斯克行動"
 MRU_Operation_Chelyabinsk_desc:0 "隨著沙皇的位置被鎖定，我們可以準備所有必要的交通工具送他回家。人民已經等待得夠久了，當前的內戰階段已經逼近；我們必須立刻帶皇室回家。"
 MRU_Coalition_Government:0 "聯合政府"
 MRU_Coalition_Government_desc:0 "隨著我們的政府首腦終於回家，我們現在可以組建聯合政府。攝政委員會將處理目前因軍隊擴建所需的大多數任務，而沙皇將負責安撫群眾，並展示秩序與穩定將在國家中得以確立。"
 MRU_Weathering_The_Storm:0 "安然渡過難關"
 MRU_Weathering_The_Storm_desc:0 "placeholder"
 MRU_Monarch:0 "君主"
 MRU_Monarch_desc:0 "隨著沙皇重回他應有的地位，權力平衡已被陛下牢牢鞏固。隨著我們的國家在兩個戰線上遭到入侵，戰爭的火花已經燃起。我們必須向全國證明，政府現在完全團結在一個人的領導之下。"
 MRU_Restoring_Tzarist_Institutions:0 "恢復沙皇制度"
 MRU_Restoring_Tzarist_Institutions_desc:0 "隨著收復冬宮，加冕典禮可以毫不延遲地進行；冬宮以及我們祖先建立的許多其他制度（例如杜馬）也將得到恢復。奧克拉納也需要被恢復，以便不惜一切代價保護公共安全與保障。"
 MRU_Crushing_Opposition:0 "粉碎反對派"
 MRU_Crushing_Opposition_desc:0 "The Regency has been shown to be nothing but scheming cowards, just as the Eunuchs in China have schemed against the Empress. We have tolerated their scheming long enough, it is time to clean house. The ones who remain must swear allegiance to his majesty, or be \"evacuated\" somewhere else. "
 MRU_Purge_Option_1:0 "清理門戶"
 MRU_Purge_Option_1_desc:0 "我們已經給了政治家們足夠的時間做出選擇；是時候讓他們做出決定了，是一勞永逸地加入陛下的榮光，還是在他們的愚昧中自掘墳墓。命令已經下達給我們的將軍，在參議院大樓照常進行政策辯論期間，將那些墮落分子圍捕起來。"
 MRU_Purge_Option_2:0 "我的十二月"
 MRU_Purge_Option_2_desc:0 "我們沙皇的歷史表明，任何軍官都可能叛國。一次又一次，叛亂和兵變困擾著我們的軍隊，這次也不例外；有消息傳出攝政委員會一直在密謀反對陛下。對付叛國罪只有一種方法，那就是消滅。"
 MRU_Purge_Option_3:0 "來自中國的教訓"
 MRU_Purge_Option_3_desc:0 "If our dynasty is going to survive, we must purge any politician who dares to question the authority of my rule. The politicians must be \"educated\", on the correct way of serving the people and the state. And as such, we must weed out those who do not take our \"life lessons\" to heart. "
 MRU_Purge_Results:0 "清洗結果"
 MRU_Purge_Results_desc:0 "隨著軍隊、宮殿和參議院中任何反對陛下的叛國勢力被清除；我們在帝國中的地位得到了鞏固。雖然我們的許多同志可能會哀悼創立攝政委員會的人及其盟友，但無論輿論如何，我們都必須繼續前進。"
 MRU_Return_Of_The_Patriarchs:0 "東正教牧首的回歸"
 MRU_Return_Of_The_Patriarchs_desc:0 "隨著東正教會的恢復，大主教們現已回到帝國。藉此，宗教現在可以適當地恢復到我們社會中應有的地位；當然，沙皇仍然是帝國中權力最大的人。然而，即使是沙皇也必須由上帝祝聖，才能繼承他作為俄羅斯人民最後沙皇的繼承權。"
 MRU_Anointing_A_Saint:0 "冊封聖人"
 MRU_Anointing_A_Saint_desc:0 "作為對恢復教會的感激之情，俄羅斯大主教已下令在滴血救世主教堂舉行盛大儀式，冊封沙皇為祖國俄羅斯的守護聖人。每座教堂還將雕刻沙皇的塑像，以紀念他作為羅馬的真正繼承人。"
 MRU_Patriarchs_Speech:0 "牧首的演講"
 MRU_Patriarchs_Speech_desc:0 "隨著沙皇現在被任命為祖國俄羅斯的守護聖人，大主教已經起草了一篇紀念沙皇的演講，這篇演講將在整個俄羅斯本土廣播，以啟發俄羅斯人民並將他們團結在一面旗幟下……帝國旗幟。"
 MRU_Loyalty_Above_All:0 "忠誠高於一切"
 MRU_Loyalty_Above_All_desc:0 "最近的清洗向我們表明，軍隊中的某些勢力正計劃背叛君主制和國家。我們必須鞏固權力，讓每個營的每名士兵都在參議院廣場宣誓公開效忠。忠誠高於一切將是我們的信條，因為沒有忠誠，人民和國家就會像共和國那樣自我毀滅。"
 MRU_Proper_Echelon:0 "適當階層"
 MRU_Proper_Echelon_desc:0 "只有在對社會的運作方式實施嚴格的指導方針時，帝國才能繁榮。隨著俄羅斯文化因外來糟粕而衰落，我們必須重新建立這些指導方針，以便我們作為一個民族和種族生存下去。俄羅斯只屬於俄羅斯人，因此，我們必須只向社會提供我們的文化和傳統。"
 MRU_EU_Path_Placeholder:0 "三帝會盟"
 MRU_EU_Path_Placeholder_desc:0 "我們摧毀歐洲聯合的事業得到了我們西部鄰國的認同。看來多瑙河聯邦已經暗中派來了他們的領袖，討論脫離聯盟的計劃，並重建一個在拿破崙統治後被解散的古老同盟。"
 MRU_The_Elegance_of_Zinnia:0 "百日菊的優雅"
 MRU_The_Elegance_of_Zinnia_desc:0 "placeholder"
 MRU_Recorporate_To_The_EU:0 "重新併入歐盟"
 MRU_Recorporate_To_The_EU_desc:0 "placeholder"
 MRU_Ruling_As_God_Intended:0 "奉天承運的統治"
 MRU_Ruling_As_God_Intended_desc:0 "placeholder"
 MRU_The_Royal_Azalea:0 "皇家杜鵑"
 MRU_The_Royal_Azalea_desc:0 "莎蓮娜·拉里奧諾夫娜自幼便對君主制忠貞不渝。她的美貌僅次於她的堅韌，是帝國中真正理想的俄羅斯女性。眾所周知，她與沙皇可能暗生情愫，因此我們毫不懷疑莎蓮娜會拒絕這個成為真正沙皇后的機會。"
 MRU_The_New_Hierarchy:0 "新階級體系"
 MRU_The_New_Hierarchy_desc:0 "placeholder"
 MRU_Social_Monarchy_in_Mother_Russia:0 "荊棘之心"
 MRU_Social_Monarchy_in_Mother_Russia_desc:0 "敵人的敵人就是朋友；在這些動盪的時期，這一教訓從未如此真實。社會主義者已經與我們接觸，商討互不侵犯條約，且到目前為止他們都遵守了約定。我們可以通過聯姻將我們兩國團結起來，再次加強這一關係；也許有一天，將我們的兩個政府合併為一個社會君主立憲制國家。"
 MRU_The_Passion_of_Roses:0 "玫瑰的熱情"
 MRU_The_Passion_of_Roses_desc:0 "placeholder"
 MRU_Ultimate_Unification:0 "純潔與美麗"
 MRU_Ultimate_Unification_desc:0 "俄羅斯君主制一向蒙受純潔與美麗的祝福。因此，為了讓皇室能妥善恢復其根源。我們必須尋找一位知名的俄羅斯女性引薦給陛下，以延續這支純潔與美麗的俄羅斯高貴血脈。"
 MRU_The_Lion_And_The_Bear:0 "獅與熊"
 MRU_The_Lion_And_The_Bear_desc:0 "placeholder"
 MRU_The_Lily_of_The_Valley:0 "鈴蘭"
 MRU_The_Lily_of_The_Valley_desc:0 "placeholder"
 MRU_Forgive_and_Forget:0 "禁果"
 MRU_Forgive_and_Forget_desc:0 "Just as Eve was Adam's true love, so was Britannia to the Russian Empire. Some of our advisors have advised the Tsar that the daughter of this so-called \"Euro-Britannia\" Governor, \"Alice Highland\", be given in marriage to the Tsar. Perhaps there is some usefulness to this advice, as it would give the Empire a strong ally, regardless of the worries of their past betrayal."
 MRU_The_Bears_Rebirth:0 "熊之重生"
 MRU_The_Bears_Rebirth_desc:0 "placeholder"
 MRU_Only_Two_Reliable_Allies:0 "唯有兩個可靠的盟友"
 MRU_Only_Two_Reliable_Allies_desc:0 "俄羅斯只有兩個可靠的盟友：她的陸軍和空軍。隨著我們的土地受到威脅，我們理應召喚我們的盟友，並確保他們裝備有最精良的武器。只有在我們支配這兩個盟友的情況下，我們才能取得最終的勝利。"
 MRU_Circled_By_Enemies:0 "雙線戰爭"
 MRU_Circled_By_Enemies_desc:0 "隨著我們的軍隊在兩條戰線上被包圍，我們必須專注於防禦措施以消耗敵人的攻勢。因此，我們的訓練計劃必須強調特殊的防禦措施以防止前線被突破，從而使我們能夠利用被削弱的敵人。"
 MRU_Saint_Susanins_Spirit:0 "聖蘇薩寧精神"
 MRU_Saint_Susanins_Spirit_desc:0 "愛國主義與人類本身一樣古老。即使在我們的歷史中，當我們的國家處於分崩離析的邊緣時，羅曼諾夫家族的一位勇敢愛國者也犧牲了自己來拯救沙皇。我們必須通過號召我們的伐木工和獵人來干擾敵人在國內的行動，以向他的精神致敬。"
 MRU_The_Secrets_Of_The_Unicorns:0 "獨角獸的祕密"
 MRU_The_Secrets_Of_The_Unicorns_desc:0 "placeholder"
 MRU_Attack_Of_The_Dead:0 "亡靈的進攻"
 MRU_Attack_Of_The_Dead_desc:0 "在大歐洲戰爭期間，奧索維茨要塞的居民與德軍進行了最後的戰鬥。即使他們的身體被毒害和燒傷，肺部開始解體，他們也拒絕撤退，並對抗數千名敵軍毫不退縮。這場最後的抵抗作為在極端劣勢下展現真正勇氣的行行徑已載入傳奇，類似於古希臘斯巴達人。我們的士兵必須在心中灌輸同樣的勇氣，以便讓更多俄羅斯人能見到明天的太陽。"
 MRU_Conscripts_To_The_Standing_Armies:0 "常備軍的徵召兵"
 MRU_Conscripts_To_The_Standing_Armies_desc:0 "placeholder"
 MRU_Evolve.Adapt.Improvise:0 "進化必須繼續"
 MRU_Evolve.Adapt.Improvise_desc:0 "雖然我們的軍隊確實優於我們的宿敵，但我們絕不能對其現狀感到自滿。為了我們的帝國在對抗歐洲人和社會主義者時生存下去，我們必須投資我們的軍事原型機以保持我們的優勢。我們的帝國將是現代戰爭進化的下一步。"
 MRU_Repeating_Suvorovs_Genius:0 "重現蘇沃洛夫的天才"
 MRU_Repeating_Suvorovs_Genius_desc:0 "隨著敵人入侵我們的家園，我們必須利用他們對我們國家的無知。山脈和森林不僅能為我們的士兵提供充足的掩護，同時也是造成軍隊所能遭受最大傷亡的完美伏擊地點。因此，我們必須提供獵人對我們的步兵進行更多培訓，以便他們妥善利用祖國俄羅斯的廣袤地形。"
 MRU_Forward_Unto_Dawn:0 "航向黎明"
 MRU_Forward_Unto_Dawn_desc:0 "我們從前線收到的每一份報告都證實了這一事實：我們的敵人試圖建立二線防禦以擊退我們。為了對抗這一點，我們獲得了更多接受過突破敵人新建防線訓練的突擊部隊。最高指揮部已命令我們發動『航向黎明行動』，這是一場旨在突破其防線並奪取補給站控制權的全面進攻，徹底迫使我們的敵人潰退。"
 MRU_Modern_Supply_Lines:0 "現代補給線"
 MRU_Modern_Supply_Lines_desc:0 "placeholder"
 MRU_Knightmare_R_D_Department:0 "Knightmare研發部門"
 MRU_Knightmare_R_D_Department_desc:0 "毫無疑問，未來的戰爭將完全圍繞著機動性和火力展開。隨著Knightmare的發明再次改變了戰爭規則，我們必須在研發團隊中設立一個特別部門，以提升我們的軍事實力。如果沒有一個不斷進化的軍隊，我們注定會被遺留在歷史的廢墟中。"
