 MRU_phase_one.1.t:0 "「阿斯塔科夫執政」"
 MRU_phase_one.1.d:0 "Mikhail Astakov—a balding man in his fifties with the mannerisms of a scheming academic. He sat lounging in a plush office chair in an office he and his clique simply captured during the collapse of the Russian Republic. He let out a sigh as his cabinet looked worriedly at him.\nOne of Astakov's cronies tapped the table with their finger repeatedly. \"The Tsar isn't coming. No one is going to listen to us without him.\"\nAnother man from the cabinet interjected. \"Who cares if the Tsar shows up? We are the ones in power all the same. That's thanks to Astakov, not the Tsar.\"\nAgain, someone else decided to voice their thoughts. \"The Tsar is the reason we had any popularity to begin with!\" he shouted while smacking the iable.\n\nArguing children as per usual. For all those thoughts and opinions rattling around in their heads, they have no vision, Astakov thought to himself while they bickered amongst themselves. The Tsar would return, but not to lead Russia himself. Instead, Astakov would be the strong leader that Russia needed with the Tsar posing as a figurehead. He'd serve as a symbol while Astakov would serve as the guide for his nation. That was the true purpose of the Tsar's return.\nAs Astakov let out another sigh, the door to the room swung open, letting in a gust of air. \"Sir, a phone call for you. It's the Tsar,\" said the arriving aide, speaking over every man present. The arguing cabinet fell silent as Astakov sat up, a smug smirk forming on his face.\n\nIn the room next door, Astakov sat at a lone desk with a phone to his ear. Over the phone, a firm voice full of resolve spoke his name. Accustomed to the Tsar's calls by now, Astakov relaxed in his chair. \"Wonderful to speak with you again, Your Majesty.\"\n\"I'm calling about your request,\" Vsevolod Romanov said as Astakov perked up in his chair with anticipation.\n\"Of course. Have you made your decision?\" Astakov, despite being sure of himself, sat on the edge of his seat.\n\"Yes, I will return to Russia—to my people.\"\n\nAstakov had a twitching grin, unable to withhold his excitement. His plans were finally bearing fruit. \"Fantastic! You will be warmly welcomed at the Ekaterinburg International Airport, Your Majesty!\"\n\"Right... I presume you'll come to greet me upon my arrival?\"\nAstakov nodded to himself, clutching the phone with both hands. \"Of course! I will have my men personally escort you.\"\n\"Expect me there, then,\" the Tsar said before hanging up.\nAstakov stared down at the phone for a few seconds before laughing out loud. He stood up from his chair and began pacing around the room giddily. Twirling around in place, he walked over to the window and gazed at several civilians on the street below."
 MRU_phase_one.1.a:0 "「快了，我的祖國俄羅斯。」"
 MRU_phase_one.2.t:0 "「沙皇登場」"
 MRU_phase_one.2.d:0 "\"What do you mean he's already there?\" Astakov threw his hand up at the driver in anger, sitting in the back of a black car surrounded by police motorcycles and tailed by another car. The man pulled at what little hair he had left and bounced his leg rapidly, full of anxiety on this congested road. Scores of people blocked the road to the airport. His motorcade had no chance of making it in time to meet the Tsar amidst this chaos. He grumbled to himself and grabbed a remote from a drawer connected to the partition dividing the front and back of the car. Furiously pressing buttons, he turned on the monitor in front of him, switching straight to the news.\n\nAll Astakov could see on the screen was the young silver-haired man waving to a tremendous amount of people, appearing somewhat cold but self-assured. He adjusted the sleeve on his green ceremonial military tunic before walking down the steps of the plane. The people cheered, yet as the camera cut to various shots of the crowd, some of them appeared to be confused. Behind the young man, several other people could be seen walking down the steps as well, all dressed in formal military garb.\n\nAstakov crossed his arms, grinding his teeth. \"Can you not go around? This is the Tsar we're meant to be meeting! Drive!\"\nThe driver sheepishly glanced out the window to avoid Astakov's fierce glare. \"I'm afraid not, sir.\"\nAstakov clicked his tongue. \"I'm supposed to be running this show... so what am I doing stuck in traffic?!\"\n\nFrom the monitor, the news reporter covering the event could be heard saying, \"A Romanov has just landed at Ekaterinburg International Airport. The Tsar is here! The Russian Empire is restored!\" She was then cut off by someone behind the camera chastising her for her lack of professionalism. She cleared her throat. \"My apologies... We will update you as the situation progresses. Pokrovskaya Fenya, signing off!\" She gave a thumbs up to the camera."
 MRU_phase_one.2.a:0 "「感謝您帶來的流量，陛下。」"
 MRU_phase_one.3.t:0 "「權力競逐」"
 MRU_phase_one.3.d:0 "The door to Astakov's office swung wide open. One of his paramilitary officers stormed in full of rage. \"Are you kidding me!? Those RSDF shits! They think they can turn me down despite all of my experience? I belong in the general staff, not those kids!\"\nAstakov sat wide-eyed, leaning forward in his chair. \"What are you talking about? Kids? What kids?\"\nThe officer gritted his teeth and grumbled to himself before explaining. \"The Oprichniki. You know, those brats that arrived with the Tsar on his plane. They call themselves his 'inner circle' or something,\" he scoffed.\nStanding up, Astakov walked towards the open door. \"I'll look into this,\" he said rather plainly before heading down the hall.\n\nWhen Astakov entered the general staff's room, his jaw dropped. Before him were six young adults lounging at a table, feet up and leaning far back in their chairs. One of them yawned while going through papers as Astakov entered the room. His officer wasn't exaggerating. None of them even acknowledged his presence.\nAstakov smirked slightly, chuckling to himself. \"So, this is the Oprichniki? Can you explain how in the world the general staff is made up of all of you?\"\nAfter several seconds, a young man by the name of Sergey Voronov spoke up, leaning his head on his hand and refusing to even look at Astakov. \"Well, your paramilitary officers didn't have a plan set up yet, so we got onboarded as the general staff instead. Desperate times, right? It's only natural.\" Voronov gave Astakov an emotionless smile.\nAstakov's left eye twitched. \"My officers would be much better suited for this role.\"\nAnother Oprichniki member, Robert Saulfort, chimed in, waving his hand dismissively. \"We're sympathetic to your officers that it turned out this way, but Russia is currently in a state of emergency. We need soldiers, not street thugs.\"\nNot wanting to cause any more infighting to occur, Astakov exhaled heavily and narrowed his eyes at the group. \"Right... Thank you for explaining the situation. I'll pass it on to the officers.\" He shook his head and walked out of the room with one hand in his pocket and the other clenched in a fist."
 MRU_phase_one.3.a:0 "「那些小鬼休想勝過我。」"
 MRU_phase_one.4.t:0 "「沙皇特轄禁衛軍的策劃」"
 MRU_phase_one.4.d:0 "「阿斯塔科夫反覆用手指敲擊著書桌，隨著杜馬會議接近尾聲，他獨自嘟囔著。他提出的想法中沒有一個被提及，甚至根本沒有被考慮過。通過的只有將權力移交給沙皇的法案。是沙皇，而不是阿斯塔科夫。一切都是為了沙皇。這難道不應該是有關他的理念，而不是關於某個血管裡只流淌著皇室血液的紈絝子弟嗎？他提出的政策都去哪兒了？這整個會議開始讓他心煩意亂。\n\n阿斯塔科夫用餘光看到一個沙皇特轄禁衛軍靠在牆上，表現得像往常一樣無憂無慮。那是馬克西姆·奧爾列夫，他的髒金色頭髮從軍官帽下露了出來。阿斯塔科夫一邊死死盯著馬克西姆，一邊繼續敲擊著桌子。\n\n當馬克西姆發現阿斯塔科夫正盯著他看時，他回望過來，只給了他一個得意的冷笑和一個輕蔑的聳肩。阿斯塔科夫的臉部肌肉緊繃起來，眼角的一根血管幾乎要爆裂。他的挫敗感瞬間轉化為狂怒。這些小鬼想對他做什麼？對他的政府？對他的俄羅斯？不管他們在策劃什麼，他都要阻止這一切。」"
 MRU_phase_one.4.a:0 "「絕不能讓他們得逞。」"
 MRU_phase_one.5.t:0 "「沃羅諾夫壓死駱駝的最後一根稻草」"
 MRU_phase_one.5.d:0 "Astakov sighed once again, trying to relieve the tension in his chest. Over and over again, his plans failed. Even before the Tsar arrived, his plans would always fail. Why? He managed to seize power over the Urals, but it was slowly starting to slip from his grasp. Was this his fatal flaw—being incapable of doing anything of value on his own, achieving things only for a brief period of time before they would inevitably escape him again? If it weren't for the discord amongst the people and his own political party, Russia could become strong again. Whose fault was that? His own?\n\nAt least he could feel relieved for now. His old and loyal comrade Abakumov would be leading the Okhrana, the new intelligence agency. That meant Astakov would have an ally he could trust in a position of power, however small that power may be. He stared at the ceiling with his hands clasped together, waiting for Abakumov to enter the room with good news. No sooner than he thought this, the door in front of him opened.\nAstakov sat straight up in his chair, excited to see his friend enter the room. However, he didn't see Abakumov at all. Instead, he watched warily as a young man in a black suit walked in, a disingenuous smile plastered across his face. Astakov sputtered and leaned forward, staring in shock at the man standing before him. It was none other than Sergey Voronov of the Oprichniki.\n\n\"Good evening, Prime Minister Astakov,\" Voronov politely said. \"I'll be the new head of the Okhrana. I am very grateful for this role.\"\nAstakov's left eye twitched, his lips quivering as he realised what was happening. \"Where is Abakumov? What have you done to him?!\"\nVoronov appeared confused. \"Abakumov withdrew his candidacy. As the only person left, I became head of the Okhrana by default. I hope that isn't a problem. We are in a state of emergency after all. I'd hate for this selection to be delayed any further.\"\n\nAstakov's breathing was unsteady. It kept happening—his destiny was falling apart before his very eyes! These kids from Britannia were stealing it from him again!"
 MRU_phase_one.5.a:0 "「是的，當然……」"
 MRU_phase_one.6.t:0 "「阿斯塔科夫的命運」"
 MRU_phase_one.6.d:0 "Staring across the room at the frantic Astakov, the aide blinked repeatedly, wondering what had happened to the old man. He watched as the old man desperately scribbled down nonsense onto several sheets of paper before tearing them up and tossing them aside. Astakov's bloodshot eyes darted across the sheets, the pace of his breathing further increasing with every piece he threw to the ground.\n\"Sir, are you feeling alright?\" the aide said, quickly regretting having entered the room.\n\nAstakov muttered to himself and slammed his hands on the desk. \"This is my country! The Tsar can't take that from me! I'm his regent—he can't do anything without me!\"\nThe aide glanced back and forth, shuffling his feet. \"Should I call for someone, sir?\"\nAstakov ignored him and continued on with his outburst, spit flying from his mouth and snot running down his nose. \"I've worked decades for this! Me, alone! I'm not going to let some upstart brat take it all from me, let alone some half-Britannian fraud! Russia is mine—MINE! It's MY destiny!\"\n\nWith that, the room fell silent. Astakov took a moment to collect himself before finally mumbling, \"I won't let them...\" He grew louder. \"They can try to stop me, but I won't let them do whatever they please!\"\nAstakov surrounded himself with his paramilitaries. No one else could be trusted, especially not the Tsar and his Oprichniki. Secluding himself, he desperately vetoed every policy the Tsar attempted to introduce, not allowing anything to get through. This was HIS country—HIS destiny. Now the Tsar was trying to take it from him and make a fool out of him to boot! His hands trembled as he vetoed more and more policies until every single one of them had been thrown in the trash. He wouldn't let any more of their plans be realised, not after his own were foiled.\n\nUpon seeing this unfold, the aide slipped into the hall when no one was looking and snuck next door. He grabbed the telephone and dialled the number for the Oprichniki."
 MRU_phase_one.6.a:0 "「我不能讓它就這樣結束！」"
 MRU_phase_one.7.t:0 "「沙皇與他的攝政王」"
 MRU_phase_one.7.d:0 "The sound of footsteps could be heard echoing around Astakov's office for the last few hours. He hadn't slept or halted his defiance to even get a drink. The office air had grown stale and the only source of light in the room came from the dimmed bulb of his desk lamp. He brushed back his window curtains, peering outside at the military trucks surrounding the place. The doors leading outside had already been overrun by the Tsar's forces, so Astakov's paramilitaries retreated further inside to guard several key locations within the building. At this point, he was committed. No one would steal his destiny from him again for as long as he lived.\n\n\"That little half-breed brat! He can't do this to me! Not me... I'm different,\" Astakov rambled, peeking through the curtains again with bloodshot eyes. He gripped the pistol holstered against his waist. \"He can't. I've worked too hard for this!\" A few moments later, he spotted the silver-haired Tsar step out from behind one of the trucks, illuminated by the amber setting sun. Astakov clawed at the curtains and slid the window open, shouting down at the people below. \"I want to talk!\" he yelled while leering at the man he despised most in the entire world. \"With the Tsar, not one of his officers!\"\n\nAstakov looked on with bated breath as the Tsar turned to talk with a woman next to him. Probably the Tsar's assistant or something, he thought. He watched the scene below for several minutes. When they finished their conversation, the Tsar signalled something to one of his soldiers and then made eye contact with Astakov. Trembling as he stroked the grip of his pistol with his thumb, Astakov decided he would exact his revenge right here inside his office. This would be the last time anyone would ever get in his way—in the way of his life's work. Astakov watched as the Tsar and the woman entered the office building.\n\nHe stepped away from the window, closed the blinds, and set his gun inside his desk drawer. He removed the cabinet he had placed in front of the office door out of paranoia and returned to his seat, awaiting his special guests. For what seemed like ages, Astakov couldn't hear anything anymore except his own unsteady breathing. Finally, the office door opened. The woman entered the room first, followed by the Tsar. He took a seat whilst the woman stood next to him at attention.\n\n\"Who the hell do you think you are?!\" Astakov's voice came out quietly at first but rapidly escalated into a full-blown shout without a shred of respect for the man sitting in front of him. Unable to continue stewing in his hate-filled chair, Astakov stood up abruptly, glaring bitterly at the Tsar. \"You think you can take this from me? This is MY destiny!\" You are the Tsar, a figurehead for the people, and I am your regent! You are here only because I allowed it, not because of some antiquated birthright!\" The Tsar kept still and quiet, listening to Astakov's mad rants. The woman next to him gave Astakov a scornful glare and seemed to be getting progressively angrier with every word he uttered. \"I'm not going to let some impudent little brat take this from me! Russia. Is. MINE!\" Astakov shouted at the top of his lungs, leaning over his desk and punctuating his declaration by slamming it with his fist as hard as he could. \"MINE!\""
 MRU_phase_one.7.a:0 "「我要一勞永逸地阻止這一切。」"
 MRU_phase_one.8.t:0 "「最後的殞落」"
 MRU_phase_one.8.d:0 "「沙皇以悲憫的眼神看著阿斯塔科夫，後者停下了喋喋不休，正喘一口氣。沙皇隨即用冰冷而堅定的聲音對他說道：\n「阿斯塔科夫，俄羅斯不該由你來領導。」\n聽到這些極具冒犯性的話，阿斯塔科夫幾乎吐了出來，他強忍著當場把沙皇一槍打死的衝動。\n「俄羅斯不能由你這樣的人領導，」沙皇繼續說道。「你不過是個民粹主義者和投機分子，跟共和派沒有任何區別。俄羅斯必須由最強大、最智慧的人來領導，一個能夠真正實現她『命運』的人。我還不知道自己是否配得上這個稱號，但我肯定知道，在經歷了30年的失敗和卑劣的投機後，你絕不配。」\n阿斯塔科夫腦中僅存的理智瞬間化為烏有。他的眼前一片血紅，周圍的時間似乎慢了下來。他感到胃部一陣劇烈翻騰，對眼前這個人類垃圾感到無比的噁心。\n「你……」阿斯塔科夫用顫抖的手慢慢伸向書桌的抽屜，隨後迅速將其拉開，拿出了藏在裡面的手槍。\n「你這個藍血的墮落廢物！這是我的命運——」\n\n在這句宣誓般的叫囂中，阿斯塔科夫聽到房間另一頭傳來一聲槍響，打斷了他的話。他捂著胸口，突然感到一陣劇烈的痛苦，隨後向後踉蹌著跌坐在椅子上，雙腿站立的力量被徹底抽乾。他失去了對手中槍的控制，手槍哐啷一聲掉在地上，發出金屬撞擊聲。憑藉著最後的意志力，他虛弱地抬起頭，隔著書桌望去，注意到沙皇身邊的那個女人手裡拿著一把冒煙的槍。意識到發生了什麼事，他向後癱倒，眼神中的光芒逐漸消逝，雙手仍死死按著胸口那道大量出血的傷口。隨著他從椅子上滑落，伴隨著一聲巨大的悶響倒在地板上，他感到生命最後的痕跡正從他虛弱的身體中流逝。\n羅曼諾夫沙皇靜靜地坐著，看著阿斯塔科夫最後的殞落，其倒台就像他崛起一樣緩慢。儘管他拼命掙扎和哀鳴，阿斯塔科夫為俄羅斯的奮鬥最終被證明只是一個在他可憐的一生中一事無成的男人的垂死掙扎。無論如何，這又解決了一個問題。\n沙皇嘆了口氣，塞蓮娜將槍放回槍套中。「依然和以前一樣利落，但妳難道就不能單純廢掉他嗎？我知道妳的槍法足夠精準。」\n塞蓮娜簡短地回答。「如果我讓他繼續呼吸，那將是對我、尤其是對您的恥辱。在大膽頂撞您並拔出槍企圖傷害您之後，我怎能給予他這種仁慈？」\n沙皇點頭表示同意，此事就此了結。他最後一次環顧眼前這可憐的景象，轉身對塞蓮娜說道……」"
 MRU_phase_one.8.a:0 "「來吧。我們有許多工作要做，不再有任何阻礙。」"
 MRU_phase_one_politics.1.t:0 "「新政府」"
 MRU_phase_one_politics.1.d:0 "「沙皇和他的七名特轄禁衛軍圍坐在圓桌旁，對於這樣一次重要的會議，氣氛顯得相當輕鬆。現在是在罷免阿斯塔科夫的政變後建立一個有效運轉的政府的時候了。塞蓮娜·拉里奧諾夫娜和羅伯特·索爾福特作為對沙皇最忠誠的人，坐得離他最近。儘管力圖克制，他們曾為誰該坐在哪裡爭論不休。塞蓮娜最終為自己搶占了沙皇右側的座位。弗謝沃洛德·羅曼諾夫沙皇坐在他們中間，輕輕嘆了口氣。\n塞蓮娜首先發言。「弗謝沃洛德，我必須再次強調，我們必須消滅阿斯塔科夫召集到他身邊的準軍事組織。」\n\n羅伯特交叉著雙臂，點頭同意。他仍然對塞蓮娜搶了他的座位感到有些惱火。「如果任由他們存在足夠長的時間，他們會對您構成威脅。」\n「好，我會讓納爾馬諾夫或沃羅諾夫去處理那件事，」弗謝沃洛德以冷淡的語氣說道。\n沃羅諾夫舉起手。「那我們能整理出一個妥善的稅法嗎？我不想讓我們看起來像共和派。」\n弗謝沃洛德點頭。「是的，在這種情況下——」\n伊莉安娜·馬爾科娃打斷了沙皇。「對，我們可以用稅收狂轟濫炸人民！」\n「冷靜點，伊莉安娜。」納爾馬諾夫把一隻手放在她的肩膀上，看著沙皇。「我們還需要開始授予貴族頭銜，以便獲得更多合法性。請記住，您是王室成員。」\n「是的，教會問題也需要解決，」伊莉安娜稍微理智了一點說道。\n\n房間裡陷入了片刻的沉思，隨後馬克西姆·奧爾列夫插話道。「我們也能討論一下如何處理杜馬嗎？」\n「我同意馬克西姆的看法，」塔蒂亞娜·羅西娜說道。「我們應該確保人民在所有這一切中都有發言權。」\n沙皇把手托在下巴上，閉上了眼睛。他的大腦開始旋轉，所有這些資訊同時湧入他的腦海。他對自己點了點頭，雖然那種點頭並沒有處理他聽到的大部分內容。當其他人互相交談而他仍沉浸在自己的思緒中時，他開始親自為每個問題制定計劃。\n「好吧，我們稍後再繼續討論。別忘了我們還有歐洲人要擔心。塞蓮娜？」\n塞蓮娜肅立致敬。「在，陛下。」\n「請控制住他們。」他站起身離開了房間。」"
 MRU_phase_one_politics.1.a:0 "「我需要一些時間思考。」"
 MRU_phase_one_politics.2.t:0 "「承接重任」"
 MRU_phase_one_politics.2.d:0 "沙皇再次坐了下來，與特轄軍開會。他嘆了口氣，翻看著面前的文件。桌子上方明滅不定的燈泡發出嗡嗡聲。羅曼諾夫沙皇抬起頭，環視著房間裡的每一位特轄軍。「首先……」沙皇開口道。「這裡不是不列顛尼亞學園。我們正在治理一個國家。給我放尊重點。」沙皇對他的軍官們怒目而視。所有人均保持沉默。「言歸正傳，我們將按照莎蓮娜的建議處理準軍事組織。明白了嗎？」房間裡的每個人都一致點頭。\n\n「那麼我將領導行動去消滅他們——」莎蓮娜剛開口就被沙皇打斷了。\n「不，納爾馬諾夫會負責處理。」\n莎蓮娜稍微退縮了一下。「但是陛下，我認為我更適合這項任務……」正當莎蓮娜試圖爭辯時，沙皇向她投去不贊同的目光，使她退了下去。\n「納爾馬諾夫，你聽到我說的話了嗎？」\n「是的，陛下！」納爾馬諾夫從椅子上站了起來。\n\n沃羅諾夫舉起了手。「如果我可以提出一個建議，我相信我有一個更好的計劃。蠻力固然很好，但我可以使用奧克拉納讓他們從內部互相殘殺。」\n沙皇沉思了片刻，看著桌面。他之前沒有考慮過使用奧克拉納。無論如何，準軍事組織都將被處理，但在緊急狀態下，盡可能提高效率是更好的選擇。"
 MRU_phase_one_politics.2.a:0 "沃羅諾夫的想法在軍事上的代價較小。"
 MRU_phase_one_politics.2.b:0 "我們將堅持納爾馬諾夫的計劃並粉碎叛軍。"
 MRU_phase_one_politics.3.t:0 "從內部崩潰"
 MRU_phase_one_politics.3.d:0 "「我告訴你，這不是我的！」帕維爾喊道。\n「少胡說八道，叛徒！」\n就在剛才，帕維爾的一位戰友在他的背包口袋裡發現了一封信。一封來自沙皇本人的信，詳細說明了帕維爾被指派滲透由阿斯塔科夫組建的準軍事組織的事宜。然而，這並不是他的信。帕維爾一生中從未為沙皇工作過，但沒有人願意聽他解釋。\n\n「放過他吧，格里戈里，這顯然不是帕維爾的，」帕維爾的好友德米特里為他辯護。帕維爾對德米特里笑了笑。\n「上面寫著他的名字。怎麼，你和他是一夥的嗎？」格里戈里說道，並向德米特里舉起步槍。\n「別拿那玩意兒指著我！」德米特里大喊，也舉起了自己的步槍。「你他媽瘋了嗎？」\n帕維爾來回看著，然後擋在德米特里面前。「住手！你們正中他們的下懷！」\n「我可不想因為像你這樣的內奸而落得跟阿斯塔科夫一樣的下場！」格里戈里喊道。\n\n帕維爾拼命地想說服他，但這毫無用處。顯然有人在煽風點火，試圖在阿斯塔科夫的準軍事組織中挑起內鬨。他為什麼看不出來？難道他不相信他嗎？\n「格里戈里！把槍放下！」德米特里大喊。\n「我信任過你！」格里戈里對帕維爾大吼，死死盯著他的眼睛扣下了扳機。帕維爾的世界頓時陷入一片漆黑。"
 MRU_phase_one_politics.3.a:0 "格里戈里，你這個白癡！"
 MRU_phase_one_politics.4.t:0 "阿斯塔科夫集團的終結"
 MRU_phase_one_politics.4.d:0 "後方傳來陣陣犬吠，帕維爾拂過灌木叢。一名男子在奔跑時大喊著命令。帕維爾的腳絆在了樹根上，摔倒在地上。他的褲子掛在樹枝上，他拼命地掙脫。當他試圖站起身時，一隻多瑙河狼犬撲到了他的背上，咬住了他的手臂。帕維爾發出慘叫，那隻狗劇烈地搖晃著腦袋，下顎緊緊咬住他的肉。帕維爾感覺自己的手臂正被慢慢撕出關節，狗拉扯著他，咬破了他的衣服。從上方的山脊上，帕維爾聽到一聲哨音，那隻狗鬆了口並朝他吠叫。山脊上有幾個人，其中一人戴著軍官帽。\n\n「你跑得挺快，」那名軍官說道。他看起來不超過二十五六歲，臉龐很年輕。帕維爾很快認出他是新聞中和沙皇一起下飛機的特轄軍之一。是納爾馬諾夫，對吧？「恐怕你押錯了注。」\n帕維爾呼吸困難，口乾燥熱。鮮血滲透了他的襯衫衣料，他的手臂感覺像著了火一樣。「你們為什麼要這樣做？你們本可以和阿斯塔科夫合作的！」帕維爾大喊，為自己的生命感到恐懼。\n納爾馬諾夫搖了搖頭。「阿斯塔科夫無法實現俄羅斯的命運。那個角色落在了沙皇身上。」納爾馬諾夫開始舉起他的槍。\n「等等！」帕維爾哀求道。「我願意宣誓效忠沙皇！」\n納爾馬諾夫俯視著帕維爾，臉上帶著輕蔑的神情。「在對你有利的時候倒戈？」他搖了搖頭。「體面地死得有尊嚴一點吧。」納爾馬諾夫舉起槍，對準了帕維爾。\n帕維爾的心沉到了谷底。他無望地抓著手臂。這就是結局。不僅是帕維爾，也是阿斯塔科夫集團的終結。當帕維爾閉上眼睛時，一切都歸於黑暗。"
 MRU_phase_one_politics.4.a:0 "我為什麼要追隨阿斯塔科夫？白癡！"
 MRU_phase_one_politics.5.t:0 "共和國殘餘"
 MRU_phase_one_politics.5.d:0 "馬克西姆·奧爾列夫快步走向沙皇身邊，手中的文件差點掉到走廊地板上。「陛下！」馬克西姆說道，並跟上了他。\n「什麼事？」沙皇說道，看著馬克西姆手裡的文件。\n馬克西姆喘了口氣。「關於共和派，我們能否將他們中的一些人重新納入政府？我認為他們的一些技能可能會很有用……」馬克西姆在文件堆裡翻找著，試圖在混亂中找到特定的一張。\n「你想讓前共和派的文官進入我們的政府？」沙皇瞇起眼睛。\n「沒錯！我相信他們不會介意適應我們的新體制。」\n沙皇皺了皺眉。「馬克西姆……我認為你對共和派的同情有點失控了。」\n「哦，拜託，我又不是要你割讓我們的國家，讓歐洲來決定我們的憲法。」兩人放棄了正式的交談方式。「我只是說我們可以在我們的體制下利用他們，而不是讓他們自生自滅。」\n\n羅曼諾夫沙皇盯著馬克西姆看了一會兒，陷入沉思。馬克西姆絕不是錯的，但馬克西姆太善良了。即使偽裝成效率的決定，弗謝沃洛德也一眼看穿了他。「馬克西姆，我知道你是個什麼樣的人，」他說。「你的傾向在不列顛尼亞時還算好，但在這裡，我不能讓它們繼續演變成更嚴重的問題。你……我該怎麼說呢？你的狂野想法很容易讓你走極端。」\n馬克西姆想了想，然後笑了出來。「那只有一次——好吧，兩次。我不會對你發瘋的。我真的認為這是最好的選擇。我並不只是在幫某人的忙。」\n弗謝沃洛德嘆了口氣，看著天花板。他把手放在下巴上，閉上了眼睛。共和派……當然，他們可能有用，但他們是共和派。那些曾經讓俄羅斯停滯不前、讓自己的貪婪傷害人民的人。這真的值得嗎？"
 MRU_phase_one_politics.5.a:0 "只要他們不保留舊習慣。"
 MRU_phase_one_politics.5.b:0 "共和派沒有容身之地。"
 MRU_phase_one_politics.6.t:0 "無所不知的眼睛"
 MRU_phase_one_politics.6.d:0 "腳步聲在葉卡捷琳堡政府大樓的走廊裡迴響，莎蓮娜身穿綠色軍裝直奔沙皇辦公室。她臉上帶著憤怒的神情，猛地推開弗謝沃洛德的房門，弗謝沃洛德差點從座位上跳起來，筆也掉了。莎蓮娜衝到辦公桌前，在沙皇面前丟下了一大疊文件。她呼了一口氣。「這一切，」她開口道。「我們自己所有的對話都被寫出來供所有人看。」\n弗謝沃洛德拿起最上面的一張紙，目光掃過第一句話，然後瞇起眼睛。「莎蓮娜……我不是私下對你說過這件事嗎？」弗謝沃洛德雙手緊握紙張，繼續讀了下去。\n寫下來的對話如下。「我們已經不在不列顛尼亞了，弗謝沃洛德，」莎蓮娜的話被寫在紙上。\n「他們難道沒有保護我們嗎？收留我們嗎？我們可能曾被當作棋子，但我們處在他們的保護之下，」弗謝沃洛德回答。\n「而且我們現在自由了。我們不欠他們任何東西。」\n\n弗謝沃洛德放下紙，用鼻子呼了口氣。他不需要再讀下去了。很明顯發生了什麼事。弗謝沃洛德從椅子上站了起來，大步走過莎蓮娜走出辦公室，用力推開門，力道大得門板撞在牆上反彈。聽到那可能被誤認為是暴怒的莎蓮娜傳來的腳步聲，來者正是謝爾蓋·沃羅諾夫。當沃羅諾夫辦公室的門被推開時，他手裡拿著的茶杯晃動著，茶水濺到了下面的地毯上。\n沃羅諾夫讓自己平復下來，然後開口道。「陛下，」他行了一個過於誇張的禮。「您是把我的辦公室誤認為馬克西姆的了嗎？」他露出了虛偽的微笑。\n沙皇的臉上帶著一種憤怒，儘管這種憤怒依然克制著，但因其罕見而令人不安。「解釋一下，」弗謝沃洛德簡短地說道。\n沃羅諾夫稍微退縮了一下，看到具有攻擊性的弗謝沃洛德讓他猝不及防。「我想您不是在問我喝的是什麼茶……」沃羅諾夫嘆了口氣，把茶杯放在辦公桌的一旁。「我先說這個吧。誰來追究專制者的責任？」\n弗謝沃洛德用指甲掐了掐手心。「你是在質質疑我的領導能力嗎？」\n「我不會走那麼遠……」沃羅諾夫說。「但相反地，那應該是人民的角色。用批判的眼光注視著統治他們的人。您不同意嗎？」\n\n「那麼你是誰，憑什麼記錄我的對話，沃羅諾夫？你有什麼權利這樣做？」弗謝沃洛德說。\n沃羅諾夫聳了聳肩。「我和奧克拉納只是人民的傳聲筒。他們的決定和意見是他們自己的。」\n弗謝沃洛德瞇起眼睛。「人民需要從我這裡聽到的內容是有極限的，沃羅諾夫……」\n沃羅諾夫閉上眼睛，將一隻手放在胸前，這次鞠躬顯得更加真誠。「歸根結底，您才是這裡的沙皇。無論這些記錄是否應該公開，決定權都在您手中。比起對人民的透明度，您更看重自己閉門度過的時光嗎？」"
 MRU_phase_one_politics.6.a:0 "我不會容忍這種行為。"
 MRU_phase_one_politics.6.b:0 "我的人民有權追究他們沙皇的責任。"
 MRU_phase_one_politics.7.t:0 "神聖的重聚"
 MRU_phase_one_politics.7.d:0 "清晨的露珠灑在綠色莖葉上。陽光反射在每一個水滴上。在一座古老石造教堂的外面，有一位老人正拿著掃帚清掃鋪路石道上的落葉。腳步聲從他身後傳來，但來的並非普通的信徒。相反地，是一個穿著棕色大衣、戴著兜帽、用圍巾遮住臉的情緒男子。跟在他身後的是一個留著棕色頭髮的女子，頭戴針織羊毛帽，也圍著圍巾、穿著大衣。老人轉向這對男女。「有什麼我可以幫忙的嗎？」他將掃帚靠在石道旁的井邊。\n\n那名女子沒有說話。相反地，她身旁的年輕人脫下頭上的兜帽，拉下了圍巾。老人立刻認出了他，愣在原地。站在他面前的不是別人，正是俄羅斯沙皇弗謝沃洛德·羅曼諾夫。「薩穆伊爾主教，好久不見了。」\n「弗謝沃洛德……孩子，真的是你嗎？」薩穆伊爾走上前，上下打量著弗謝沃洛德。\n弗謝沃洛德點了點頭。「您過得怎麼樣？我想問這個問題有點殘忍。」\n\n在葉卡捷琳堡阿斯塔科夫準軍事組織起義之後，薩穆伊爾被另一位毫無疑問在基督教信仰中散播腐敗與不誠實的牧首所取代。即使為他的信仰和老沙皇奉獻了這麼多年，他還是被像垃圾一樣拋棄了。薩穆伊爾重新振作起來，擦去眼角的一滴淚水。「俄羅斯能擁有你，是俄羅斯的福氣，弗謝沃洛德。」\n「主教，您願意重新擔任您的職位嗎？」弗謝沃洛德伸出了一隻手。「不僅是為了俄羅斯，也是為了我的父親。」\n薩穆伊爾主教握住了弗謝沃洛德的手。「為了上帝和沙皇。」"
 MRU_phase_one_politics.7.a:0 "信仰將指引我們。"
 MRU_phase_one_politics.8.t:0 "指揮的重擔"
 MRU_phase_one_politics.8.d:0 "羅曼諾夫沙皇坐在阿斯塔科夫被殺的那間辦公室裡，伊蓮娜·馬爾科娃坐在他的對面。伊蓮娜密切關注著陷入沉思的沙皇。終於，沙皇給了她一個答覆。「我們可以這樣做，但我需要在兩者之間做出選擇，」沙皇說道。\n「非常感謝，不過我個人認為士兵們更配得上這些頭銜。」這件事是關於授予貴族頭銜。然而，這些頭銜是授予士兵還是授予經濟學家仍有爭議。兩者對葉卡捷琳堡而言都各自具有價值。士兵們在前線冒著生命危險保衛國家。然而，是經濟學家們在重建葉卡捷琳堡並為她的人民提供就業機會。伊蓮娜露出一絲嘲諷的笑容。「拜託，你不會把貴族頭銜給一些辦公室文員吧？」\n\n弗謝沃洛德嘆了口氣，看著一旁。「你會怪我嗎？治理國家需要維持平衡。」\n伊蓮娜靠回椅子上，腦袋空空地盯著天花板。接著她又探出頭來。「好吧，總之，我支持士兵。」\n「你根本沒在聽……」弗謝沃洛德捏了捏鼻樑，閉上了眼睛。\n伊蓮娜把手指放在下巴上。「我們正在打仗，不是嗎？重視我們送上戰場的生命有什麼不對？我認為維持經濟運轉也有價值，但為了身後的人衝向敵人的防線，這要顯得更為高尚一些。」\n弗謝沃洛德睜開眼睛，雙手按在桌上站了起來。他走到身後的窗前，俯視著街道。「那麼，為了士兵們使用的裝備而保持高產量，難道不也同樣高尚嗎？」\n伊蓮娜稍微退縮了一下並站了起來。「弗謝沃洛德，你坐在那張椅子上變得很安逸嗎？」他轉身看著她，看到她臉上帶著厭惡的神情。「莎蓮娜可能開了槍，但坐在那裡的人是因為你而死的。」\n年輕的沙皇用指甲掐進了掌心。「這和這件事有什麼關係？」\n\n伊蓮娜死死盯著沙皇的眼睛。「那些士兵是按照你的命令為你的國家而死。他們是為了沙皇衝進無人區。那是你的責任。」沙皇的目光避開了伊蓮娜的直視。「你知道嗎，弗謝沃洛德，」伊蓮娜繼續說道。「最近我對火砲的喜愛受到了挑戰。每次砲擊，我們都在灑下俄羅斯人的鮮血。看著因我的命令而造成的殘肢斷臂，我不禁質疑自己有什麼權利。」伊蓮娜把雙手按在辦公桌上。「我仍然支持你下達的命令，但請記住誰才是必須執行命令的人。我們抵達學園時都做過同樣的誓言。我相信當我們發誓時，我們都沒有真正想著不列顛尼亞，」伊蓮娜嚴厲地說道，然後鞠了個躬，壓低軍帽擋住眼睛，大步走了出去。"
 MRU_phase_one_politics.8.a:0 "這是我的責任。"
 MRU_phase_one_politics.8.b:0 "我們需要維持平衡。"
 MRU_phase_one_military.1.t:0 "關於歐洲干涉區(EIZ)"
 MRU_phase_one_military.1.d:0 "「……因此，這個新成立的『歐洲干涉區』已向莫斯科推進，並企圖收復俄羅斯的其他地區。」前RSDF軍官已經向沙皇及他的特轄軍匯報了一個小時。具體而言是關於歐洲干涉區，即EIZ，該組織入侵了俄羅斯西部，以防止叛亂蔓延到歐洲的其他地區。「用他們自己的話來說，就是『恢復秩序』。」軍官在沙皇面前直冒冷汗。\n\n特轄軍的羅伯特·索爾福特首先發言。「這真的是沙皇該操心的事嗎？」\n那名軍官說話結結巴巴。「但……但當然！這是一場入侵！」\n羅曼諾夫沙皇坐在椅子上，顯得泰然自若，彷彿他甚至不在這個房間裡。 his 他的目光穿過軍官。「感謝你的關心，但這很難說像你描述的那麼嚴重。歐洲干涉區(EIZ)只不過是巴黎在短短幾天內拼湊起來的空殼部隊。」\n軍官點了點頭，壓低了帽子。「是的，請陛下恕罪……然而，我仍然認為這應該得到處理。」\n「自然會得到處理的。」沙皇挺直身子，雙手交疊，始終保持著他那帝王般的姿態。\n「謝謝您，陛下！」軍官退出了房間，消失在視線中。\n特轄軍的莎蓮娜·拉里奧諾夫娜在他身後關上了門，然後轉向沙皇。「你可以放鬆了，弗謝沃洛德。」"
 MRU_phase_one_military.1.a:0 "歐洲鐵公雞。"
 MRU_phase_one_military.2.t:0 "伊蓮娜摯愛的火砲"
 MRU_phase_one_military.2.d:0 "「轟！寶貝！」當火砲彈藥在她周圍爆炸時，伊蓮娜尖叫道。「哦，對了！這就是我想看到的！」\n塔蒂亞娜在更遠的後方看著，嘆了口氣。伊蓮娜對巨型火砲的執著總是令人印象深刻。「伊蓮娜？你目前覺得怎麼樣？別只說些蠢話，」塔蒂亞娜用手裡的手持無線電說道。\n無線電傳來靜電聲，伊蓮娜回答道。「爆炸半徑有所改善，我可以更強烈地感受到爆炸衝擊。就速度而言，它們確實感覺快了一點。我認為你做的新履帶效果很好。」\n塔蒂亞娜笑了笑，滿意於自己的設計並不糟糕。她喝了一口馬克杯裡的咖啡，打了個哈欠，彷彿咖啡根本沒起作用。她坐在營地桌子後面，翹著二郎腿看著伊蓮娜。「我想在外面下雪的時候試試看。可惜難得遇上個晴天。」塔蒂亞娜又打了個哈欠。接著，塔蒂亞娜看著伊蓮娜興奮過頭，在火砲再次發射時往後摔進了泥裡。「嗯……至少周圍還有一些泥巴。」"
 MRU_phase_one_military.2.a:0 "這兩個人到底是怎麼完成工作的？"
 MRU_phase_one_military.2.b:0 ""
 MRU_phase_one_military.3.t:0 "550工程"
 MRU_phase_one_military.3.d:0 "馬克西姆·奧爾列夫信步走進工廠。裡面瀰漫著機油和鋼鐵的味道。行動的主管走向馬克西姆，調整了一下他的安全帽，擦去額頭上的汗水。馬克西姆越過他看著懸掛在起重機上的裝甲車。它是墨綠色的，主炮塔佔據了大部分空間。\n「這就是550工程？」馬克西姆嘆了口氣問道。「我知道它們會很便宜，但，哇。好吧，這也夠用了。」\n主管低頭看著他的寫字夾板。「我們在預算內盡可能優化了它以利於量產，同時保持其結構結實。抱歉讓您失望了。」\n「沒關係，擁有二十輛坦克總比只有一輛好，」馬克西姆安撫他。他抬頭看著坦克，走近親自觸摸它。這將極大地改變他們對歐洲干涉區(EIZ)的進攻行動。即使它是一個不可靠的破銅爛鐵，它仍然是一輛坦克。是可以用來對抗敵人的東西。他瞥了一眼身旁一個無精打采、疲憊不堪的工人。馬克西姆瞇起眼睛盯著那名工人，然後走到他面前。工人驚訝地抬頭看著馬克西姆。\n「先生！對不起，我剛才只是——」\n馬克西姆打斷了他。「喝了吧，你還有工作要做，」他說著，從大衣裡拿出他個人的扁壺遞給工人。\n工人猶豫地看著扁壺，然後接過來喝了一大口。「謝謝您，先生！」"
 MRU_phase_one_military.3.a:0 "以數量取得優勢。"
 MRU_phase_one_military.3.b:0 ""
 MRU_phase_one_military.4.t:0 "對歐洲干涉區(EIZ)的反攻"
 MRU_phase_one_military.4.d:0 "參謀總部的會議室比平時更冷，特轄軍的納爾馬諾夫打開了會議室的窗戶，以保持室內所有人的注意力。前RSDF軍官瓦西里坐在離納爾馬諾夫最遠的椅子上。納爾馬諾夫對參謀總部大聲說道，他的聲音在走廊裡迴響。「歐洲干涉區(EIZ)的部隊拿著廉價的槍支，他們的坦克基本上就是錫箔紙。前線的任何人都很清楚，他們沒有得到維持軍隊所需的資金。」瓦西里點了點頭，同意這個評估。納爾馬諾夫繼續說道。「話雖如此，如果我們落後於他們，那將是一場恥辱。這是我們可以利用的優勢。確保我們的補給安全並餓死敵人。」\n\n瓦西里坐在那裡，專心地聽著。對於一群孩子來說，他們確實知道如何從糟糕的局面中化險為夷。考慮到他們最近才對阿斯塔科夫的政府發動了政變，他們就已經開始著手業務並組織進攻行動了。\n伊蓮娜·馬爾科娃舉起了手。「我相信我們也可以利用我們的火砲庫存。讓炮火像雨點般落向歐洲干涉區(EIZ)。」\n納爾馬諾夫嘆了口氣。「除了火砲，你就不關心別的嗎？不過你說得對。」\n瓦西里加入參謀總部才一天，但這些來自不列顛尼亞的孩子給他安排的工作，就已經比他一個月要做的工作還多了。"
 MRU_phase_one_military.4.a:0 "事情終於有所進展了。"
 MRU_phase_one_military.5.t:0 "越過烏拉山脈的行軍"
 MRU_phase_one_military.5.d:0 "莎蓮娜高昂著頭，在穿過冰凍的荒原時，她的姿態從未動搖。在她身後是她正在訓練的男女士兵，他們都跟不上她的步伐。其中一名士兵摔倒在地，弄掉了背包，在寒冷的空氣中可以看見他沉重呼吸時撥出的熱氣。莎蓮娜瞇起眼睛盯著他大喊：「我有說過可以休息嗎？給我站起來！」這個年輕女孩對這個二十多歲、比她高一個頭的男人指手畫腳。他極不情願地立正，站立時身體搖搖晃晃。她的士兵們在後面跟著她，試圖跟上她的速度，同時都在抱怨。直到聽到身後有人跪倒在雪地裡，她才回過頭去，立刻斥責那名年輕女子。「你是幼兒園小朋友嗎？我們這不是午睡時間。跟上，否則明天還要再做一次這樣的訓練。」\n「是的……長官！」她一邊在冰冷的空氣中大口喘氣，一邊勉強發出聲音。她最終跟上了之前摔倒的男子，並向他投去懷疑的目光。他看著她，搖了搖頭。\n\n莎蓮娜在行軍時保持著同樣的步伐，每一步都協調一致，彷彿她就是為軍隊而生的。她有著完美軍人的風範，然而，她正在進行訓練，而不是在前線。最終她停在了一片平坦的區域。「停！」她大喊著轉過身，看到她所有的士兵都精疲力竭地倒在地上。「我們就在這裡宿營。開始工作。」她沒有停下來命令他們，所有人都不情願地打開背包，開始在野地裡宿營。他們的臉都凍得通紅，雙手發抖。與此同時，莎蓮娜雙手背在身後站得筆直，注視著每個人。這些士兵有些已經四十多歲，參加過戰鬥，卻被一個小他們幾十歲的女孩指揮著。\n營地搭建好後，士兵們有的進了帳篷，有的圍坐在篝火旁，莎蓮娜則獨自走進自己的帳篷，坐在裡面的摺疊桌旁。她嘆了口氣，在一盞明亮的燈光下翻看著文件。她為什麼會在這裡？當然，她很擅長自己的工作，但為什麼要遠離前線，不能與戰友們一起戰鬥呢？在內心深處，這一直折磨著她，但這並不重要。這是沙皇的直接命令，她不能違抗。"
 MRU_phase_one_military.5.a:0 "表面上是一部機器。"
 MRU_phase_one_military.5.b:0 ""
 MRU_phase_one_economy.1.t:0 "突發新聞"
 MRU_phase_one_economy.1.d:0 "「我們開始直播了嗎？」芬妮雅問她的攝影師，然後清了清嗓子。「我是葉卡捷琳堡新聞的波克羅夫斯卡婭·芬妮雅，為您在葉卡捷琳堡政府辦公室內部進行實況報導。沙皇剛剛抵達，正與來自烏拉地區的幾位寡頭會面。」芬妮雅將手臂伸向沙皇，沙皇此時已在準備正式簽署協定的桌前坐下。「今天，他們將把個人資產移交給沙皇和杜馬，歸還資金以幫助俄羅斯人民！」\n\n羅曼諾夫沙皇向最靠近的寡頭打手勢，莎蓮娜則在一旁宣讀他的名字。寡頭走到桌前，在沙皇面前簽署了文件，然後與他握手，並露出虛偽的笑容。當那名寡頭垂頭喪氣地走開時，莎蓮娜叫出了下一個名字，過程再次重複。\n\n「沙皇再次證明了他在為人民著想！」芬妮雅熱情地說道，同時將頭髮從臉上撥開。「這是葉卡捷琳堡新聞，為您在葉卡捷琳堡廣場帶來不偏不倚的報導。」"
 MRU_phase_one_economy.1.a:0 "波克羅夫斯卡婭·芬妮雅，報導結束！"
 MRU_grand_ball.1.t:0 "沙皇未來的妻子"
 MRU_grand_ball.1.d:0 "The Tsar let out a hefty sigh. His head hung low as he sat at his desk. The only person in the room with him was Robert Saulfort of the Oprichniki. Robert stood across from Vsevolod, holding a collection of papers to read from. As he flipped one of the pages, he peered over the papers to see if the Tsar was still listening. “All that being said, there's a couple of women attending the ball that may be of interest... Vsevolod?” Robert asked, snapping his fingers to get his attention.\nVsevolod perked up with a scowl. “Of all the things...” he let out another sigh. “Must it be marriage?”\nRobert shook his head. “You must have seen this coming... Besides, what's the big deal? All you have to do is talk to women at a party and find one that wants to be romantic with you.”\nTsar Vsevolod dug a fingernail into the palm of his hand, one of his eyes twitching. “Right, right... Go on, who do you have on that sheet that I'm supposed to do that with?”\n\nRobert cleared his throat, moving a strand of silver hair out of his face. “Well uh... you got the lady from Europia... she's pretty, I guess?” Robert scratched the back of his head, trying to sell it. “That would be Sylvia. She's a pretty big deal, so don't screw anything up with her!”\nVsevolod nodded. A big shot from the EU? If only it were as simple as politics. Romance was not exactly a field of experience for the young man. Though, a potential marriage with a woman from western Europia did come with political advantages. So romantic, the Tsar thought to himself.\n\n“And let's see...” Robert continued. “Sophia il Britannia. All hail Britannia or whatever. She's something like royalty, seems like. Even though we aren't living in Britannia anymore, an alliance in whatever form it takes... Well, you see what I'm getting at?”\nAnother nod from the Tsar, with just a trickle of sweat on his forehead. A Britannian, how nice would it be to get on their good side. It remained to be seen if this girl even had a good side to get on. Britannians were not the most accommodating. Vsevolod leaned back in his chair, staring at the ceiling. “Marriage, huh?” A sigh escaped his lips."
 MRU_grand_ball.1.a:0 "情況維持不了多久了。"
 MRU_grand_ball.2.t:0 "莎蓮娜的輕推"
 MRU_grand_ball.2.d:0 "弗謝沃洛德坐在辦公桌前，草草記錄著生產率和後勤能力限制，規劃下個月部隊的補給，他的頭低垂在桌前，雙手抱頭陷入沉思。突然他感到自己被拎出椅子，由於莎蓮娜扯著他的衣領把他拖了過去，他在轉身面向她時有些踉蹌，口中還低聲咕囔著。「我又怎麼了？妳知道我是沙皇，有些人會因為妳這樣粗暴對待我而感到被冒犯，」弗謝沃洛德在莎蓮娜放開他後直起身子，露出一絲微笑說道。\n莎蓮娜將一套禮服軍裝扔給弗謝沃洛德。「我們都知道他們怕我多過怕你，現在去換衣服。牧首們和宮廷僕人已經為今晚準備了幾個星期，如果要我白白教你跳舞，我可不答應。我發誓你的腳步比歐元的匯率還不穩定，」莎蓮娜帶著惱怒的目光命令道。\n\n弗謝沃洛德一臉不高興地低頭看著搭在手臂上的衣服。他嘆了口氣，勉為其難地照做了。不到三十分鐘後，他走出了房間，莎蓮娜正在他的門外等待。他穿著正式的軍裝，雙臂很不自然地張開，彷彿觉得自己穿上它就像個外星人。他低頭看著自己，有些尷尬地調整著領帶，隨後莎蓮娜幫他重新打好。\n「好吧，我看起來怎麼樣？」弗謝沃洛德帶著毫無說服力的笑容說道，這讓他看起來沒那麼英俊，反而更像個反派。\n莎蓮娜一臉面無表情、死氣沉沉地看著他。「雖然爛泥扶不上牆，但我們已經盡了最大努力。希望今晚舞會上的潛在求婚者會喜歡沒有自信的男人。」\n弗謝沃洛德身體前傾，嘆出了他剛聚集起的一點自信。「謝謝。這真的有必要嗎？」\n\n莎蓮娜抓住他的肩膀調整好他的姿勢，抓起年輕沙皇的手，拉著他沿著走廊走向舞廳。「別像個小嬰兒一樣。不管你喜不喜歡，你都要結婚。」\n莎蓮娜身後傳來一聲抱怨。「我甚至不認識這些女人。」他們在門口停下，弗謝沃洛德再次彎下身子，隨即又直起身來以避免莎蓮娜發怒。然而，這並沒有阻止莎蓮娜反覆擺弄他的身體並整理他的西裝領口。\n「閉嘴，一旦你進去，你就得靠自己了，所以表現好點。」莎蓮娜自己嘆了口氣，臉上帶著緊張的神情。「你娶了她們之後自然可以去了解她們。」\n\n沙皇的目光低垂，隨後莎蓮娜推開了舞廳的門。光芒灑在兩人身上，沙皇與他的隨從在走進房間時展現出了堅強的姿態。每一位客人都轉向沙皇，此時他高昂起下巴。竊竊私語在整個房間迴響，圍繞著他，而他來到了樓梯頂端，現在所有人都看得到他了。\n莎蓮娜粗魯地把手放在扶手上，清了清喉嚨，然後提高聲音。「女士們、先生們，陛下，弗謝沃洛德沙皇。」她向沙皇做手勢，沙皇隨後在光榮的寂靜中開始走下樓梯，步入舞會。隨著房間裡響起禮貌的掌聲，沙皇揮了揮手表示致意，然後加入了下方的派對人群。"
 MRU_grand_ball.2.a:0 "盛大舞會拉開帷幕。"
 MRU_grand_ball.3.t:0 "來自歐洲的花朵"
 MRU_grand_ball.3.d:0 "舞會已經進行了一段時間，弗謝沃洛德發現自己身處人群中央。在大多數與會者聚集的寬敞大廳裡，他自然被那些地位較高的人簇擁著，同時也被其他人注視著。當他與某人握手時，眼角餘光瞥見了一件藍黑相間的禮服。然而，雖然禮服吸引了他的注意力，但當他的目光與她的目光交會時，他認出了這是誰。希爾薇婭·梅特涅，或者正如羅伯特所生動描述的「來自歐洲的女士」。她從房間的另一端盯著弗謝沃洛德，目光穿過人群。在眼神接觸的第一秒後，他就意識到自己剛剛在遠處引發了一次互動，而他現在被套牢了。\n\n希爾薇婭把她的杯子放在路過的托盤推車上送走，轉過身向沙皇走去。弗謝沃洛德仍然與一個他不知道名字的男人在漫長的握手中，他順暢地找了個藉口結束了他根本沒在聽的對話。在弗謝沃洛德反應過來之前，希爾薇婭已經站在他面前，提著裙擺行了個優雅的禮。\n「很高興終於見到您，弗謝沃洛德沙皇，」希爾薇婭用銀鈴般的聲音說道。「希爾薇婭·梅特涅。」她伸出了一隻手，沙皇輕輕握住。\n「是的，同樣很高興。我聽說您會出席……」弗謝沃洛德說道，然後欲言又止。\n\n希爾薇婭的眼神透露出她完全知道沙皇為什麼會聽說她。「是嗎？能進入沙皇的貴賓名單真是榮幸！」她用手遮住嘴唇輕輕笑了一聲。\n儘管在對話中落了下風，弗謝沃洛德仍保持著沙皇冷靜和從容的表情。雖然這只是一種直覺，但幾秒鐘前的握手感覺就像是政治家的握手。顯然，這並不是她第一次經歷這種場合。她那蔚藍的雙眼正向上看著他，閃爍著光芒，或許是故意的。\n\n弗謝沃洛德環顧四周，希爾薇婭並非唯一關注這場對話的人。「您的俄語聽起來很地道。您在俄羅斯待了很長時間嗎？」\n希爾薇婭一邊玩著頭髮一邊說道。「我到處旅行，但俄羅斯對我來說有些神祕，讓我很好奇。」\n沙皇挑了挑眉。「在哪些方面？」\n她露出了真誠的微笑。「這裡生活著擁有真摯心靈的人們。有人可能會說德國是歐洲的心臟，但在面對如此長期的艱難困苦的同時仍保持頑強，這比德國人更具俄羅斯精神。」弗謝沃洛德的唇角也泛起了一絲微笑。"
 MRU_grand_ball.3.a:0 "那是一個很好的回答。"
 MRU_grand_ball.3.b:0 "我有其他事情需要處理。"
 MRU_grand_ball.4.t:0 "俄羅斯的花朵"
 MRU_grand_ball.4.d:0 "沙皇拖著疲憊的步伐走進了休息室。在過去的十分鐘裡，他在這個令人心力交瘁的派對上跌跌撞撞地進行了一次又一次的交談。在房間裡，他看到了特轄軍的莎蓮娜·拉里奧諾夫娜，一個可以讓他放鬆的人，他的摯友。他暗自嘆了口氣，試圖在客人面前不顯露出疲態。莎蓮娜也嘆了口氣，但原因完全不同。作為安全主管，她正忙著調解兩位客人之間的激烈爭吵。不過，隨著沙皇清了清嗓子並表明自己的存在，他們都停止了爭吵。「夠了吧？」莎蓮娜用利刃般的目光盯著客人，示意他們離開房間。「我今晚不想再聽到你們兩個人的任何聲音。」\n\n隨著兩名男子低頭離開房間，弗謝沃洛德將自己的目光投向了莎蓮娜。她翹著二郎腿，雙臂交叉，活像一個極度不爽的麻花。房間裡只有莎蓮娜和另外幾位客人在互相低語。莎蓮娜斜眼看著弗謝沃洛德。\n「別那樣看著我，」弗謝沃洛德手裡拿著一杯紅酒說道。他之前整齊的頭髮現在有一絲垂落了下來。\n\n莎蓮娜站起身，走近弗謝沃洛德，以便他們可以小聲說話。「你是想逃避你的職責嗎？」\n弗謝沃洛德有些自嘲地聳了聳肩，顯然筋疲力盡。「我以為我應該來看看妳。」\n莎蓮娜一臉木然。「弗謝沃洛德，回派對去。」\n「妳對我比任何人都嚴厲，妳知道嗎？」弗謝沃洛德皺著眉說，儘管這在兩個朋友之間顯然是常態。「而且，我只是來看看妳過得怎麼樣。妳是我的安全主管，記得嗎？」\n莎蓮娜搖了搖頭。「好吧，好吧，既然這樣，我過得很好。安全方面很棒。現在，快走吧。」\n\n「妳確定妳不想休息一下嗎？」弗謝沃洛德問道。\n莎蓮娜瞇起眼睛。「你是說你想休息一下吧？」\n弗謝沃洛德揮了揮手。「不，說真的，我認為既然一切運轉順利，妳就應該放鬆一下。」他帶著疲憊的表情說道。\n莎蓮娜露出了驚訝的神色，但也有些懷疑。她停頓了片刻。「好吧……」她說。「如果需要什麼，我就在樓上。派人來叫我就行了。」她低頭想了一會兒，猶豫著自己的話，直到最後她終於緩緩走出了房間。在關上身後的門之前，她回頭看了一眼。"
 MRU_grand_ball.4.a:0 "她會需要人作伴的。"
 MRU_grand_ball.4.b:0 "我回派對去了。"
 MRU_grand_ball.5.t:0 "月光下的花朵"
 MRU_grand_ball.5.d:0 "「多麼美妙的清新空氣……」逃離了人群來到外面的花園，弗謝沃洛德深吸了一口氣。儘管他對治理國家有著無限的熱情，但這無法改變他內向的性格。他心想，在花園裡待一會兒也無妨。於是，他穿過噴泉，繞過兩旁的樹籬，避開了眾人的視線。在那裡，他發現了一個溫室。透過溫室周圍的玻璃窗，他看到了一個身穿紅白相間衣服的女孩。她有著一頭飄逸的朱紅色長髮，身穿白色長裙，頸部戴著一顆紅寶石。她顯然不可能是一個園丁，但她安詳的神態與裝滿花卉的溫室完美融合在一起。\n弗謝沃洛德大可以不發一言悄悄離開，而不引起女孩的注意。然而，他通過走進溫室、輕敲門框，繼續著他的舞會逃離計劃。紅髮女孩嚇了一跳，轉過身面對沙皇。然而，她當時並不知道他是沙皇。\n「抱歉，我不是故意嚇到妳的，」弗謝沃洛德用一種在室內無法展現的溫柔語氣說道。「我只是來呼吸一下新鮮空氣。希望我沒有打擾到妳。」\n\n女孩似乎愣了一下，然後搖了搖頭。「完全沒有，我也是因為同樣的原因來這的。」她的眼睛移向一旁，沒有與弗謝沃洛德進行直接的眼神接觸。\n弗謝沃洛德立刻察覺到她身上散發出一種比自己還要嚴重的內向氣息。他伸出一隻手想和她握手，微微一笑。「妳叫什麼名字？」\n紅髮女孩抬起臉，在月光的映照下。「索菲亞，你呢？」\n握手時，弗謝沃洛德把一隻手放在胸前。「我是弗謝沃洛德。」他沒有透露自己的身份。「妳不是俄羅斯人吧？」\n索菲亞的臉變得像她的頭髮一樣紅。「有那麼明顯嗎？」\n弗謝沃洛德急忙揮手否認。「我不是想侮辱妳！」索菲亞把手放在下巴上，低聲笑了一聲。弗謝沃洛德繼續說道：「妳的口音其實非常動聽。」他停頓了一下，思索這是不是太過露骨了。\n她那紅寶石般的雙眼睜得大大的，顯得有些驚訝。「謝謝你，弗謝沃洛德……那是一個很好聽的名字。」\n\n月光透過玻璃天花板傾瀉在他們身上，倒映出他們的輪廓。弗謝沃洛德在心裡試著猜測她的口音到底是什麼。它有一種西部的感覺，但既不是中歐的，也不是法國的。在他的腦海中，他聽到了羅伯特催促他結婚的聲音。就在那時，他想通了。\n「抱歉，如果問這個有些無禮，但我能知道妳的姓氏嗎？」弗謝沃洛德問道。\n索菲亞稍微退縮了一下。「那是……不列顛尼亞。索菲亞·伊·不列顛尼亞。」\n弗謝沃洛德的大腦停滯了片刻，隨後震驚地退後了一步。「抱歉！我真的應該早點說的……」他把手放在胸口，深吸了一口氣。「我是弗謝沃洛德沙皇。」"
 MRU_grand_ball.5.a:0 "很高興見到您，公主殿下。"
 MRU_grand_ball.5.b:0 "遺憾的是，我必須走了。"
 MRU_grand_ball.6.t:0 "紅花的降臨"
 MRU_grand_ball.6.d:0 "沙皇在社交了一段時間後走進前廳，聽到周圍傳來陣陣竊竊私語，人們七嘴八舌地交談著。弗謝沃洛德可以從房間另一端看到莎蓮娜。當他繞過人群並看清情況時，在莎蓮娜面前站著一位肩膀上留著金色長辮的年長女性。她身穿綠色軍裝，眼神中帶著熾熱的光芒。她身旁的一名男子清了清嗓子，伸出一隻手臂。「請為革命之母、我們光榮的領袖索尼婭·布尼娜讓路！」他竭盡全力大喊，試圖製造氣氛。\n大廳裡頓時被困惑與應付式的掌聲所籠罩。弗謝沃洛德迅速走上前來到莎蓮娜身旁，伸出了一隻手。「我是弗謝沃洛德沙皇，」他自我介紹道。「很高興您能來這裡，主席女士。」\n她也伸出自己的手臂，輕輕握了握他的手，眼中的火焰並未消散。「彼此彼此。希望我們志同道合。」\n\n另一個男子站在索尼婭的另一側。弗謝沃洛德以前見過他，但一時想不起他的名字。他的短髮中有些花白，下巴線條剛毅，指間夾著一支菸。\n「那您是？」弗謝沃洛德裝作不認識他，但禮貌地與他握了手。\n「庫拉科夫，」那名男子說道。「很高興認識您。」在被提醒了名字後，弗謝沃洛德立刻想起了這個人是誰。米哈伊爾·庫拉科夫，是索尼婭圈子裡帶有實用主義傾向的共產主義者，他是一個理性的人，是弗謝沃洛德可以相處得來的人。\n「這是我的榮幸，」弗謝沃洛德露出了嫻熟的微笑。「祝兩位在舞會上過得愉快。」\n「自然。夫人，您與沙皇是什麼關係？」庫拉科夫再次伸出手，提出想和莎蓮娜握手。\n儘管有些吃驚，她還是握住了那名男子伸出的手。「特轄軍的莎蓮娜·拉里奧諾夫娜，」她回答道，眼神堅毅。\n「啊，我早該猜到的，」庫拉科夫又抽了一口他那中國品牌的香菸。\n\n索尼婭搖了搖頭。「請原諒我這位話多的同伴，陛下。」她怒視著庫拉科夫，後者更專注於吸食尼古丁，而不是其他任何事情。「如果不介意的話，庫拉科夫和我想私下和您談談。」\n弗謝沃洛德與索尼婭保持著眼神接觸，現在明白了事情的走向。儘管她表現得很有禮貌，但弗謝沃洛德仍然可以感覺到這位女性身上散發的政治意圖。當然，這對她來說絕非僅是前來遊玩，而是一次深思過後的舉動。"
 MRU_grand_ball.6.a:0 "樓上有個房間我們可以使用。"
 MRU_grand_ball.6.b:0 "遺憾的是，我現在太忙了。"
 MRU_grand_ball.7.t:0 "未埋藏的情感"
 MRU_grand_ball.7.d:0 "弗謝沃洛德沙皇躺在樓上房間的地板上，一隻手臂搭在額頭上，盯著天花板。他每一分鐘都會嘆一口氣。儘管身為沙皇，本應作為俄羅斯的強大領袖來領導國家，但不知為何，他面前仍然存在著一個障礙。不是戰爭、外交，也不是國內政治，而是他自己的情感。他將與誰共度餘生？他是沙皇，所以在愛情方面沒有嘗試的空間。婚姻是具有約束力的。他怎麼可能在一個晚上從他剛剛認識的女人中做出選擇呢？這是不可能的。再多的信念也無法讓他做出那個不可挽回的選擇。\n門口傳來了敲門聲。弗謝沃洛德迅速站了起來，聽到了莎蓮娜的聲音。「弗謝沃洛德？我進來了，」她說道，在沙皇還來不及整理好凌亂的姿態前就開了門。她用同情的目光上下打量著他。「也許這是我犯的一個錯誤。」她嘆了口氣。\n\n弗謝沃洛德放棄了維持高貴的姿態，帶著些許羞愧讓自己放鬆下來。「妳說的錯誤是什麼意思？」\n莎蓮娜搖了搖頭。「我強迫你做這件事太愚蠢了。我甚至告訴過自己這行不通，但我還是讓你去做了。」她把目光投向地板。\n「別可憐我，莎蓮娜，」弗謝沃洛德說。「這是我自己的錯。如果我可以拋棄一切，只當沙皇，這就會很簡單。」他走向辦公桌，靠在上面。\n「弗謝沃洛德……」莎蓮娜走過去，把一隻手放在他的背上。「對不起。我還是直說吧，如果你沒有相同的感覺……」當弗謝沃洛德看著她時，莎蓮娜深吸了一口氣。「我愛你，弗謝沃洛德。不過，我相信這很明顯。」\n\n「是嗎？」弗謝沃洛德輕聲笑了笑。「我很遲鈍，對吧？」\n「我以為如果你結婚，我就可以埋藏我的感情，但這只會給你帶來壓力。對不起，」莎蓮娜在說這些時把手從弗謝沃洛德的背上拿開。\n「別再道歉了，」弗謝沃洛德說著，站直了身子。「I don't know 我現在不知道該有什麼感覺。無論我是否能回報妳的情感，或者滿足妳的期望，無論如何……」他轉向莎蓮娜。「如果沙皇必須結婚，妳會給我一個機會嗎？」\n「你真的需要問這個嗎？」莎蓮娜露出了痛苦但真誠的微笑。「我會陪你走過每一步的，弗謝沃洛德。」她握住他的手，肯定地點了點頭，然後低頭看著他們緊扣的手指。「你的手很冷，弗謝沃洛德……我的手卻燙得像火。」"
 MRU_grand_ball.7.a:0 "我多麼盲目啊，莎蓮娜。"
 MRU_grand_ball.8.t:0 "最終決定"
 MRU_grand_ball.8.d:0 "夜裡十一點，沙皇感覺棒極了。他有些驚訝，自己竟然出乎意料地比想像中更加溫文儒雅，和多個不同的女孩相處得很融洽。也許這一直是他內在的能力，但這實在超乎想像。突然，他感到自己被拽到一旁，耳邊響起熟悉的聲音。「弗謝沃洛德！」羅伯特說著抓住他的手腕。「我需要和你談談。現在。」\n弗謝沃洛德被拉著走，直到他們來到二樓的走廊。身後的門被關上了。「怎麼了，羅伯特？是準軍事組織的事嗎？」弗謝沃洛德急切地問道。\n「不，不！」羅伯特手忙腳亂地說。「是你！老兄，你到底在做什麼？你正在和周圍的每個人調情！」\n弗謝沃洛德笑了笑，摸著下巴。「我知道，對吧？我都不知道我自己能做得這麼好……等等，你怎麼知道的？」\n「我一直在觀察，」羅伯特說道，愧疚地把目光移向一旁。「確認確認，噢，天哪……你玩過頭了。」\n「你什麼意思？」弗謝沃洛德自得的表情消失了。「這難道不是件好事嗎？」\n羅伯特用手捂住臉。「聽著……你不能到處招惹女孩子。你必須做出選擇。」\n弗謝沃洛德睜大了眼睛。「羅伯特！」他喊道。「對不起，我沒想到這點……你說得對。」\n羅伯特嘆了口氣，點了點頭。「很高興你明白……現在，你到底想娶誰？」"
 MRU_grand_ball.8.a:0 "希爾薇婭吸引了我的興趣。"
 MRU_grand_ball.8.b:0 "莎蓮娜一直陪伴在我的身旁。"
 MRU_grand_ball.8.c:0 "索菲亞偷走了我的心。"
 MRU_grand_ball.9.t:0 "最終決定"
