 MRU_Risen_From_History:0 "Risen From History"
 MRU_Risen_From_History_desc:0 "As a result of the chaos caused by the Russian collapse, Astakov's clique took control of Ekaterinburg. The nationalists can reunite Russia by force of arms and end the stagnation of the corrupt Republic. Russia must once again be united under a strong leader. The question is, who might that leader be: the young Tsar or his scheming regent?"
 MRU_Arrival_Of_The_Tsar:0 "Arrival of the Tsar"
 MRU_Arrival_Of_The_Tsar_desc:0 "Vsevolod Romanov, the true Tsar of Russia, has landed at the Ekaterinburg International Airport. The arrival of a Romanov is being considered by the public as a sign that Russia will return to its former glory once more. Astakov, who was unable to arrive at the ceremony after being blocked by crowds of excited people, may not be able to maintain his popularity for much longer."
 MRU_Foundation_Of_The_Imperial_Rule_Party:0 "Foundation of the Imperial Rule Party"
 MRU_Foundation_Of_The_Imperial_Rule_Party_desc:0 "The Tsar is using his influence to form the Imperial Rule Party, which advocates for an imperial ruler over the Principality of Ekaterinburg, namely the Tsar. He will make a grand speech and address Astakov's clique directly. If they are loyal to the Tsar, surely they will not object to this new party. Through party unity, the Principality of Ekaterinburg can proceed with the reunification of Russia, resurrecting the fierce golden eagle and silencing the whimpering of the diseased mutt which has plagued the Republic for so long."
 MRU_Assembling_A_Military_Command:0 "Assemble a Military Command"
 MRU_Assembling_A_Military_Command_desc:0 "Out of fear of losing power, Astakov launched his plan to use the army to maintain order and, more importantly, his position. Adversely, Vsevolod and his loyalists have begun making their own moves to secure the Oprichniki as the general staff of the army and Vsevolod's position as Tsar of Russia. Thus, a race for power has commenced between the two men."
 MRU_Forming_The_Okhrana:0 "Form the Okhrana"
 MRU_Forming_The_Okhrana_desc:0 "The formation of an intelligence agency is required to expel the rats sneaking around in our government. Naturally, a man from the Oprichniki would be best suited to become the director of the agency, though Astakov would be strongly opposed to this idea."
 MRU_Government_Standstill:0 "Government Standstill"
 MRU_Government_Standstill_desc:0 "The Tsar has made a grab for power we did not anticipate. He intends to lead Ekaterinburg on his own, using his Imperial Rule Party to leave us without any positions in the government. This is something we cannot allow to happen. As a last ditch effort, we must utilise our paramilitaries to quell his overconfidence and secure our future within the new regime."
 MRU_Ekaterinburg_Square_Coup:0 "Ekaterinburg Square Coup"
 MRU_Ekaterinburg_Square_Coup_desc:0 "Despite all of our efforts, the Tsar is still closing in on us. We are holed up in the Ekaterinburg Government Office, surrounded by him and his Oprichniki. How could this young man have outmanoeuvred us? What else can we do? There might not be a way out. All we can do now is bide our time and hope he shows us mercy."
 MRU_The_Great_Restoration:0 "The Great Restoration"
 MRU_The_Great_Restoration_desc:0 "The rightful ruler of Russia has finally returned to the throne. Today is a day for celebration and one that will go down in history, but there is still much to be done. With the Europian lapdogs to our west, we can't afford to sit idly for too long. Russia is in a state of civil war, after all, despite direct combat between armed forces not having taken place yet."
 MRU_Pulling_The_State_Together:0 "Pull the State Together"
 MRU_Pulling_The_State_Together_desc:0 "Now that Vsevolod is in power, he can actually put that power to use. We have several issues at hand, such as the remaining forces Astakov rallied to his side before his death, corruption within the church, and the arguments regarding the Duma."
 MRU_Bringing_Our_House_In_Order:0 "Bring our House in Order"
 MRU_Bringing_Our_House_In_Order_desc:0 "We need to quickly get the Oprichniki together and discuss a way to solve the issue of what remains of Astakov's paramilitaries. We could take a more heavy-handed approach or something less direct. Either way, we can't leave this issue for later. Astakov's remaining forces must be dealt with as soon as possible."
 MRU_Inflame_The_Infighting:0 "Inflame the Infighting"
 MRU_Inflame_The_Infighting_desc:0 "Voronov's plan consists of splitting the paramilitaries into several subgroups by using psychological warfare. Most of them have ideological differences that can easily be exploited, which will cause widespread arguments within their ranks until they eventually collapse on their own."
 MRU_Crush_The_Mutiny:0 "Crush the Mutiny"
 MRU_Crush_The_Mutiny_desc:0 "With the Oprichniki at our disposal, we can wipe out any resistance from the remaining paramilitaries with ease. However, it would still be in our best interests to take care of this problem before it has the chance to grow out of our control. The easiest way to do this would be with brute force."
 MRU_Peace_In_The_Streets:0 "Peace in the Streets"
 MRU_Peace_In_The_Streets_desc:0 "The Tsar can breathe a sigh of relief now that tensions have been removed from the remnants of the nationalists. Astakov lies in a coffin and the army who were loyal to him have faded. With that problem out of the way, we can start to make reforms to other pressing issues without the annoyance of a rebellion."
 MRU_Imperialization_Of_Society:0 "Imperialization of Society"
 MRU_Imperialization_Of_Society_desc:0 "Ekaterinburg can be united under a single banner. Legitimacy has returned to Russia with a Romanov in power. The Russian Empire has risen again. All that's left is to bring the rest of Russia into the fold."
 MRU_The_Inherited_Bureacracy:0 "The Inherited Bureacracy"
 MRU_The_Inherited_Bureacracy_desc:0 "Bureaucracy is often a mess of convoluted power structures that no one really wants to deal with, but it has to be done. The leftovers from the Republican government need cleaning up as well as full reform. It is part of the duty we adopted to fix this mess."
 MRU_Formalize_The_Tax_Code:0 "Formalize the Tax Code"
 MRU_Formalize_The_Tax_Code_desc:0 "What would the Tsar be without the people and what would the government be without their taxes? It isn't so much a fun part of governing a country, but we need to come to some sort of agreement on how to tax our population in comparison to the Republic's tax code."
 MRU_Replace_The_Corrupt_Patriarchs:0 "Replace the Corrupt Patriarchs"
 MRU_Replace_The_Corrupt_Patriarchs_desc:0 "Astakov installed a corrupt patriarch in the church before his death. Unsurprisingly, corruption has always been high in Russia. We should replace the patriarch with one more loyal to the Tsar that will be willing to help the people rather than himself."
 MRU_Return_Of_Noble_Titles:0 "Return of Noble Titles"
 MRU_Return_Of_Noble_Titles_desc:0 "To further show gratitude towards those who have served us, the Tsar will be appointing noble titles to them. The question is whether we appoint these titles to the soldiers or key economic figures. These titles come with land and state pensions. Both have been loyal and indispensable, but we must make a choice."
 MRU_Matters_Of_The_Duma:0 "Matters of the Duma"
 MRU_Matters_Of_The_Duma_desc:0 "In regards to the State Duma, we don't want a repeat of the Republican constitution in which an imbalance of power sticks out like a sore thumb. Keep the people happy and their voices heard, but respect the Tsar's authority."
 MRU_Laying_Down_Legal_Groundwork:0 "Lay Down Legal Groundwork"
 MRU_Laying_Down_Legal_Groundwork_desc:0 "The foundation of our new government should be planned carefully and intentionally. We don't want another revolt, especially not while we're at war. History often repeats itself, so let's not be fools. We must establish a legal code for our society. The Republic may have had a vast array of laws, but their courts were slow and bloated. We can do better."
 MRU_Taking_A_Break_At_The_Ball:0 "A Break at the Ball"
 MRU_Taking_A_Break_At_The_Ball_desc:0 "As part of his royal duty, Tsar Vsevolod is expected to be courted. Not just by the church, but the people as well. Annoyingly for him, the head of the Oprichniki and his childhood friend, Selena, is pushing the hardest for him to get married. It would do some good for him to relieve some stress and have some fun for once. Perhaps this marriage could even be used diplomatically."
 MRU_New_Oprichniki:0 "New Oprichniki"
 MRU_New_Oprichniki_desc:0 "Though the Oprichniki was once the Tsar's closest and most trusted allies, we should invite new blood with open arms to this valuable military asset. They will guide the nation at the Tsar's whim and bring back glory to the empire."
 MRU_The_Opprichnikis_Will:0 "The Oprichnikis Will"
 MRU_The_Opprichnikis_Will_desc:0 "The sacrifices on the battlefield will be great, but the brave men and women of the Oprichniki have the spirit of wolves to fight on and push forward. For every soldier that is killed, we are one step closer to victory."
 MRU_Unified_Training_Programmes:0 "Unified Training Programmes"
 MRU_Unified_Training_Programmes_desc:0 "Time is of the essence and so we shouldn't waste it. The quicker we can train new recruits, the quicker they can reinforce our front lines. A more effective method to train our soldiers is needed to keep our armies strong. The Oprichniki have ordered lower ranked officers to train troops that are not needed on the front line."
 MRU_Putting_Theory_To_Practice:0 "Put Theory to Practice"
 MRU_Putting_Theory_To_Practice_desc:0 "Now that the new blood in the Oprichniki are ready, it's time to reap the fruits of our labour on the battlefield. Our new battle tactics and elite soldiers will prove resourceful in real combat. Let us use our new Oprichniki for real."
 MRU_A_New_Century_Of_Warfare:0 "A New Century of Warfare"
 MRU_A_New_Century_Of_Warfare_desc:0 "The Great War has long been over. We need to move on from outdated tactics and bring in something new. The Russian army has been old fashioned for a while now. It's time to give it a fresh coat of paint."
 MRU_Modernize_Kutuzovs_Strategies:0 "Modernize Kutuzovs Strategies"
 MRU_Modernize_Kutuzovs_Strategies_desc:0 "If it ain't broke don't fix it as the saying goes. We can however improve on it, that being Kutuzov's methods of war. Taking a more traditional approach with trench warfare, it can't be overstated how effective it is. Modernising his tactics would give us a strategic advantage in battle."
 MRU_Dig_In_The_Infantry:0 "Dig in the Infantry"
 MRU_Dig_In_The_Infantry_desc:0 "The men on the front lines are what win our battles. They are who rush the gun line, dig our trenches and hold our forts. The backbone of the army should be respected. Trench warfare may be old, but it is effective."
 MRU_Combat_Survivabilty_Strategies:0 "Combat Survivability Strategies"
 MRU_Combat_Survivabilty_Strategies_desc:0 "Every loss is an offensive operation weakened. The men who hold our guns need to be preserved and cherished. Let us come up with strategies to avoid losses on the battlefield. Selena Larionovna of the Oprichniki can lead this operation, an expert in infantry."
 MRU_Innovate_Defensive_Plans:0 "Innovate Defensive Plans"
 MRU_Innovate_Defensive_Plans_desc:0 "Warfare is ever-changing. To counter new technology and new tactics, we need to come up with defensive methods of our own. Keep the strategies that work and replace the ones that don't."
 MRU_Mine_Their_Approach:0 "Mine Their Approach"
 MRU_Mine_Their_Approach_desc:0 "Effectiveness is often dishonourable. A few traps here and there will make mincemeat of enemies foolish enough to fall for them. Maybe it's immoral, but the battle must be won. After all, where was the morality in the Europians leaving mines in our homeland after the Great War had already ended?"
 MRU_Ambush_Strategies:0 "Ambush Strategies"
 MRU_Ambush_Strategies_desc:0 "The tradition of marching in a straight line is long gone. The element of surprise is crucial. Much like steadying your breath while hunting an elk, hunting enemy soldiers is no different. Wait for them to enter line of sight and open fire before they know you're there."
 MRU_Every_Mile_Costs_European_Blood:0 "Every Mile Costs Europian Blood"
 MRU_Every_Mile_Costs_European_Blood_desc:0 "Death is inevitable in war, so why should we avoid it? Russian blood is valuable, like a drop of poison. Let the EIZ drink it up until they drop dead of exhaustion. Our land is ours alone and yet again they taint it. They will only take it once it is piled with their corpses."
 MRU_Infantry_Anti-Tank_Weapons:0 "Infantry Anti-Tank Weapons"
 MRU_Infantry_Anti-Tank_Weapons_desc:0 "Tanks have become commonplace in modern wars. We should equip our troops properly to counter armoured divisions, otherwise they'll be reduced to red dust and our defences will collapse."
 MRU_From_Trains_To_Trucks:0 "From Trains to Trucks"
 MRU_From_Trains_To_Trucks_desc:0 "Supply is everything in a war. The less supply, the less the strength of our units. We need to ensure our production is in the green and our supply routes are healthy. We can establish a logistics company in the army and create a fleet of trucks, optimising our production. Our reliance on trains is dragging us down. In the words of Napoleon, momentum wins the war."
 MRU_Unit_Autonomy_Doctrine:0 "Unit Autonomy Doctrine"
 MRU_Unit_Autonomy_Doctrine_desc:0 "Our generals cannot hope to control every aspect of the battlefield. The human element is the most important. Our soldiers need to be able to make informed decisions on their own and in the moment during a crucial fight, no matter the situation."
 MRU_Enhance_Artillery_Mobility:0 "Enhance Artillery Mobility"
 MRU_Enhance_Artillery_Mobility_desc:0 "Our artillery divisions are being slowed down by the inconvenient equipment. We can make some tweaks to them in order to give them the speed they need to maintain a front and push forward. Some ice spiked wheels added onto our mobile artillery would let us move quicker in harsh conditions. Even some simple mud flaps wouldn't hurt. We will turn mobility into our strength."
 MRU_Push_Object_550_Into_Production:0 "Push Object 550 Into Production"
 MRU_Push_Object_550_Into_Production_desc:0 "Russian tanks are old crones, outdated and outmatched. We desperately need to upgrade our equipment to meet the same standards as Europian steel. Our newest Russian made design, the Object-550 will solve this issue once we can fit it into our production line."
 MRU_Drive_Them_Out_Of_Russia:0 "Drive Them out of Russia"
 MRU_Drive_Them_Out_Of_Russia_desc:0 "Our army has rapidly ramped up in fighting strength. We are mobile, tough and prepared. The time to strike is now. With our military finally something to be proud of, we can finally push west and retake something that Russia hasn't had for decades. Our mother Russia. First they take our constitution and then they take our capital, no more. This is the last time the EU will ever decide our future."
 MRU_Finish_placeholder:0 "Victory Shall be Ours"
 MRU_Finish_placeholder_desc:0 "Our army has been modernised and brought up to scratch. With great elegance and undying loyalty to the Tsar, we will defeat the usurpers on our borders and march through the land that is rightfully ours. Glory to the Tsar!"
 MRU_Wrestling_The_Economy:0 "Wrestling the Economy"
 MRU_Wrestling_The_Economy_desc:0 "Attention is desperately needed towards economic matters. We have little to no industry and our technology is decades behind the EIZ. Focusing on one of these issues should allow us to improve on it fairly quickly, but which one?"
 MRU_Seize_Oligarchs_Wealth:0 "Seize Oligarchs Wealth"
 MRU_Seize_Oligarchs_Wealth_desc:0 "For how long has the Republic allowed these leeches to suck the motherland of all her blood? It's a despicable act of corruption. Those funds are meant for the government to allow the nation to prosper. Seize their assets at once."
 MRU_Anti-Corruption_Drive:0 "Anti-Corruption Drive"
 MRU_Anti-Corruption_Drive_desc:0 "Never again can we allow Russia to fall victim to shameful greed. Let our people know we stand firmly against misuse of budget, let the oligarchs know their place, and if the Duma steps out of line, remind them."
 MRU_Rule_Of_Managers:0 "Rule of Managers"
 MRU_Rule_Of_Managers_desc:0 "Those who manage our funds should be held accountable for any misuse. Therefore, a series of laws protecting the wild Russian economy should be put in place."
 MRU_Expand_On_Our_Industrial_Power:0 "Expand on Our Industrial Power"
 MRU_Expand_On_Our_Industrial_Power_desc:0 "We can turn Ekaterinburg into a well oiled war machine if we give it the effort. Industry is king in a war of attrition. If we can outproduce the EIZ, we'll be marching to Moscow while their guns are empty of bullets. The war would turn from a bloodbath to a walk in the park."
 MRU_Centralize_The_Rail_Networks:0 "Centralize the Rail Networks"
 MRU_Centralize_The_Rail_Networks_desc:0 "To make our railways easier to manage, we should manage them all in one place. If even one railway gets cut off from a front, that entire region can fall. The previous ruling governments have neglected the railways in the Urals, leaving them underdeveloped. Our nation will not neglect such an important network. By creating a railway company, we can raise the quality of railways throughout the region."
 MRU_Northern_Resource_Extraction:0 "Northern Resource Extraction"
 MRU_Northern_Resource_Extraction_desc:0 "The north is rich with resources. We should start some operations in the region and harvest the land to fuel our war. "
 MRU_Massive_Industrial_Grants:0 "Massive Industrial Grants"
 MRU_Massive_Industrial_Grants_desc:0 "Our industry needs proper funding to prosper. Let us give widespread funding to local industries to improve and expand within Ekaterinburg and her outer counties."
 MRU_Military_Factory_Conversions:0 "Military Factory Conversions"
 MRU_Military_Factory_Conversions_desc:0 "During times of war, the civilian economy cannot be considered as important as the military. Factories would be better suited to making guns and tanks rather than toaster ovens."
 MRU_Nationalize_The_Construction_Industry:0 "Nationalize the Construction Industry"
 MRU_Nationalize_The_Construction_Industry_desc:0 "We're getting nowhere with the rate at which we construct new facilities. This needs to be addressed as soon as possible. It would be better if the construction industry was under state ownership rather than a private sector."
 MRU_Empower_The_Ministry_Of_Industrial_Development:0 "Empower the Ministry of Industry"
 MRU_Empower_The_Ministry_Of_Industrial_Development_desc:0 "Ekaterinburg has turned into an industrial powerhouse, but we shouldn't quit while we're ahead. Give more power to the Ministry of Industrial Development and accelerate our production even further, while funding them plenty to keep up our rapid industrialization."
 MRU_Closing_Technological_Gap:0 "Close the Technological Gap"
 MRU_Closing_Technological_Gap_desc:0 "It's no secret that Russian tech is basically made up of hand-me-downs from Europia. It's unfair, but that's the reality. However, we are not the cowardly Republicans. We have a chance to rival the EIZ if we allocate enough resources to modernisation."
 MRU_Refining_Advanced_Materials:0 "Refine Advanced Materials"
 MRU_Refining_Advanced_Materials_desc:0 "Our refining industry is lacking and so we're missing more advanced materials that the EIZ will beat us in. Our guns and artillery are cheap, as we can't afford anything else. The Urals never got much investment in regards to refineries. We've always been a transport hub in between the west and Siberia. Let us expand our refining industry to make up for this fact."
 MRU_Electronics_And_Communications_Modernization:0 "Electronics and Communications Modernization"
 MRU_Electronics_And_Communications_Modernization_desc:0 "Our communication systems need an upgrade. Coordination is an important aspect in battle. Information can win or lose a fight. The Tsar's plan is to establish a government owned company based around electronics. Specifically, electronics used for communications, especially in the military. Though, this will help to digitally modernise our nation as a whole."
 MRU_Modernizing_Our_Military_Industry:0 "Modernizing Our Military Industry"
 MRU_Modernizing_Our_Military_Industry_desc:0 "Overall, the industry needs to be improved. We don't have the output we need to win a war. We need to catch up with the enemy and outmatch them in production. Perhaps we can open a portion of military infrastructure into the Urals to have production closer to the front lines. Although, they should still be kept hidden from the eyes of the EIZ."
 MRU_Automate_Factory_Lines:0 "Automate Factory Lines"
 MRU_Automate_Factory_Lines_desc:0 "Even the slightest changes can make production more efficient. The more efficient the more supply we have for our army. Automation of our factories will speed up production significantly."
 MRU_Hire_Engineers_And_Researchers:0 "Hire Engineers and Researchers"
 MRU_Hire_Engineers_And_Researchers_desc:0 "There are plenty of smart individuals who can contribute to the empire's technological effort. They'd be better off in research labs than on the front lines. Let's put their curiosity to good use instead of drafting them into the army. Surely they would appreciate being exempt from military service and overjoyed to be serving under the Tsar."
 MRU_Empower_The_Ministry_Of_Trade_and_Technologys:0 "Empower the Ministry of Trade and Technologys"
 MRU_Empower_The_Ministry_Of_Trade_and_Technologys_desc:0 "Thanks to their advances in technology, the Ministry of Trade and Technology has made Ekaterinburg a force to be reckoned with. We can now say we are equals to other nations with our outdated equipment gone. It would be best to give the Ministry of Trade and Technology the ability to work independently and make their own decisions, though the Tsar will have the final say."
 MRU_An_Economy_Tamed:0 "An Economy Tamed"
 MRU_An_Economy_Tamed_desc:0 "Through some miracle, our economy is actually back on its feet. Republican style corruption is a thing of the past and we can rest easy knowing the future of our economy is stable."
 MRU_Our_Sovereignty_Secured:0 "Our Sovereignty Secured"
 MRU_Our_Sovereignty_Secured_desc:0 "The EIZ has been forced out of Russia. The war is won at long last. The Tsar has returned, our independence has been won, and our strength is insurmountable. Russia has the strength of the golden eagle once more. With Moscow taken back, the home of the Romanovs is under our control and our legitimacy can no longer be argued against. All that's left is to deal with the issue of the red Siberians and traitorous Euro Brittanians to our east."
 MRU_britannia_spreads_its_influence:0 "Britannia Spreads it's Influence"
 MRU_britannia_spreads_its_influence_desc:0 "The reds have been defeated by the Euro Britannians. Peace has returned to Siberia and Russia is no longer in a state of war. However, it still is not whole. It is split down the middle between two empires."
 MRU_socialism_lives_and_breathes:0 "Socialism Lives and Breathes"
 MRU_socialism_lives_and_breathes_desc:0 "The Siberian People's Republic has squeezed Euro Britannia out of Russia. No longer does Britannia have a hold on Russian land. That land belongs solely to the Siberian People's Republic. Maybe we can find a way to work their idealism into our own ideals, should an alliance be proposed."
 MRU_tsar_intervenes_in_the_east:0 "Vsevolod Intervenes in the East"
 MRU_tsar_intervenes_in_the_east_desc:0 "The war in the east is an opportunity. As we have prevailed against the EIZ, we are in a position to start backing one of the nations to our east. Which one? The red bear or the Britannian snake?"
 MRU_backing_the_siberians:0 "Backing the Siberian's"
 MRU_backing_the_siberians_desc:0 "The Siberian People's Republic might be useful to us with their sense of idealism. Their leader, Sonya Bunina wants what's best for Russia as do we. She is optimistic that a socialist government can serve the people."
 MRU_lend_the_urals_industrial_might:0 "Lend the Urals Industrial Might"
 MRU_lend_the_urals_industrial_might_desc:0 "We can give the socialists what they need to improve their industrial capabilities. Experienced engineers and workers will vastly help their production output to reach its full potential."
 MRU_tsarist_fueled_red_war_machine:0 "Tsarist Fueled red war Machine"
 MRU_tsarist_fueled_red_war_machine_desc:0 "Equipment and fuel is what they need. Pure fighting strength is most important right now, so let's give them what they need. Guns, artillery, and trucks. On top of that, fuel is needed to keep them moving in the harsh Siberian winter."
 MRU_eagle_grants_bear_wings:0 "The Eagle Grants the Bear Wings"
 MRU_eagle_grants_bear_wings_desc:0 "Despite ideological differences, we can agree on one thing with the Siberian People's Republic. We will not stand for Britannians desecrating our homeland. It belongs to us, not the Britannian emperor."
 MRU_let_gods_revolution_fuel_us:0 "Let Gods Revolution Fuel Us"
 MRU_let_gods_revolution_fuel_us_desc:0 "We can send the reds some volunteers to help secure their fronts. We have veterans in our ranks. With some propaganda against the Euro Britannians, they would be willing to help our red brothers and sisters fight for Russia."
 MRU_rip_apart_the_lions_leash:0 "Rip Apart the Lion's Leash"
 MRU_rip_apart_the_lions_leash_desc:0 ""
 MRU_goodbye_far_east_communication:0 "Goodbye Far-East Communication"
 MRU_goodbye_far_east_communication_desc:0 "Communication is key in a modern war. Without it, dominos fall and resistance can spiral out of control. By disabling communication networks in Euro Britannia, we can fuel resistance movements across eastern Russia and Siberia. They'll then need to fight two wars. One against the Siberian People's Republic and one against themselves."
 MRU_stalling_their_offensive:0 "Stalling Their Offensive"
 MRU_stalling_their_offensive_desc:0 "Let the Euro Britannians know hell. Show them what it means to face an enemy ten times the strength. They will learn that the Siberian people do not give up easily and that traitors who bend to a foreign power will only face the full fury of Russia."
 MRU_send_the_britannians_home:0 "Send the Britannian's Home"
 MRU_send_the_britannians_home_desc:0 "The Euro-Britannians are traitors. A government who bowed to a foreign emperor not of Russian descent. They're no better than the republicans who surrendered our country to Europia all those decades ago. Let them rot and collapse on themselves. Through blood, they will learn to never betray Russia again."
 MRU_backing_the_euro_britannians:0 "Backing the Euro-Britannians"
 MRU_backing_the_euro_britannians_desc:0 "As a half Britannian himself, it only makes sense for the Tsar to form an alliance with Euro Britannia. Their military might is powerful as well, with new age Knightmares. We should keep our relations positive with Britannia if we want to avoid invasion."
 MRU_carry_the_far_east:0 "Carry the Far-East"
 MRU_carry_the_far_east_desc:0 "The backbone of any army is the weapons that the factories produce. This backbone needs to be strengthened if the Euro Brittanians hope to defeat the reds. If we send over mechanics and architects, their industry can grow quicker especially if we provide them with the tools they need as well."
 MRU_stock_from_the_imperial_armory:0 "Stock From the Imperial Armory"
 MRU_stock_from_the_imperial_armory_desc:0 "Euro-Britannia could use some equipment and fuel. It's safe to assume they are low on both. We have some old guns and artillery that they'd be able to put to use better than we could."
 MRU_eagle_and_lion_united:0 "Eagle and Lion United"
 MRU_eagle_and_lion_united_desc:0 "Long have the Britannians protected the royal family during their exile. It is time to repay the favor and unite against the Siberian bear. Two empires stand against the socialists who attempted a second revolution."
 MRU_imperial_reinforcements:0 "Imperial Reinforcements"
 MRU_imperial_reinforcements_desc:0 "We will provide the Euro-Britannians with pure manpower to reinforce their front lines against the revolutionaries. Even if they can't pilot Knightmares, we can still have raw bodies to help. Wars are won by the men and women, not fancy machinery."
 MRU_siberians_little_hell:0 "Siberian's Little Hell"
 MRU_siberians_little_hell_desc:0 "By fueling resistance movements in occupied states that the reds have taken over, we can damage their infrastructure and industry indirectly, destroying them from within. Resistance is already high in Siberia. It would be easy to fan the flames even further with a little bit of clever propaganda. The Okhrana could be used to help with this."
 MRU_the_death_of_revolution:0 "The Death of Revolution"
 MRU_the_death_of_revolution_desc:0 "Did the reds not learn their lesson the last time they tried to start a revolution? Another violent extermination of communism is on its way. The Siberian People's Republic will feel the ripples of the Great War for themselves in all its fury."
 MRU_siberians_winter_burning:0 "The Siberian Winter Burns"
 MRU_siberians_winter_burning_desc:0 "Another revolution failed. The Great War should have been a lesson, but they did not learn from it. Now their country is in flames and they have no one but themselves to blame for trying to revive a long dead movement. Let them experience the same fate as Maksim Katunin."
 MRU_siberia_burns_and_now_we_wait:0 "Siberia Burns And Now we Wait..."
 MRU_siberia_burns_and_now_we_wait_desc:0 "We've backed our horse, now we can only hold out and hope the strength we provided is enough to sustain them and win them the war. One will fall and one will stand victorious. Once that happens, we can start making moves against the victor."
