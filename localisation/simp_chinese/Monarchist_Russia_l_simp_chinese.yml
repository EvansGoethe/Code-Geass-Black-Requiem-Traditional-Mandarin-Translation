 MRU_grand_ball.12.d:0 "夜裡十一點，沙皇感覺棒極了。他有些驚訝，自己竟然出乎意料地比想像中更加溫文儒雅，和多個不同的女孩相處得很融洽。也許這一直是他內在的能力，但這實在超乎想像。突然，他感到自己被拽到一旁，耳邊響起熟悉的聲音。「弗謝沃洛德！」羅伯特說著抓住他的手腕。「我需要和你談談。現在。」\n弗謝沃洛德被拉著走，直到他們來到二樓的走廊。身後的門被關上了。「怎麼了，羅伯特？是準軍事組織的事嗎？」弗謝沃洛德急切地問道。\n「不，不！」羅伯特手忙腳亂地說。「是你！老兄，你到底在做什麼？你正在和周圍的每個人調情！」\n弗謝沃洛德笑了笑，摸著下巴。「我知道，對吧？我都不知道我自己能做得這麼好……等等，你怎麼知道的？」\n「我一直在觀察，」羅伯特說道，愧疚地把目光移向一旁。「確認確認，噢，天哪……你玩過頭了。」\n「你什麼意思？」弗謝沃洛德自得的表情消失了。「這難道不是件好事嗎？」\n羅伯特用手捂住臉。「聽著……你不能到處招惹女孩子。你必須做出選擇。」\n弗謝沃洛德睜大了眼睛。「羅伯特！」他喊道。「對不起，我沒想到這點……你說得對。」\n羅伯特嘆了口氣，點了點頭。「很高興你明白……現在，你到底想娶誰？」"
 MRU_grand_ball.12.a:0 "莎蓮娜與希爾薇婭被接受"
 MRU_grand_ball.12.b:0 "索尼婭與索菲亞被接受"
 MRU_grand_ball.13.t:0 "藍衣的果敢"
 MRU_grand_ball.13.d:0 "沙皇此時已在社交人群中穿梭了相當長的一段時間，比他整個星期所說的話還要多。圍繞在他身邊的客人渴望獲得他的注意，許多人希望藉此建立對自己有利的聯繫。最引起他注意的，是一位多瑙河女性，那便是希爾薇婭·梅特涅。由於被不斷糾纏，希爾薇婭偶爾會插話與沙皇進行她自己的談話。現在又是其中一次。她留在圍繞著他的社交圈子裡，然後公然宣稱……「弗謝沃洛德沙皇，您願意和我一起吃晚餐嗎？」圍繞在沙皇身邊的幾位客人驚訝得張大了嘴。\n弗謝沃洛德的眉毛挑了挑，對這個女孩的果敢感到驚訝。「我想現在是個好時機。」不過，這更多是為了找個藉口坐下，逃離這個最擁擠的房間。\n希爾薇婭帶他來到餐廳，那裡有許多貴族一邊吃著烤肉大餐一邊社交。她幫他拉出椅子，這讓沙皇有些質疑自己的男子氣概。他也拉出了自己身旁的椅子示意她坐下，希爾薇婭幽默地笑了笑。\n\n「你真是太有紳士風度了！」她打趣地說道，並坐了下來。\n兩人並肩而坐，侍從和廚師們忙著滿足沙皇的需求。在這段插曲中，希爾薇婭的目光一直落在弗謝沃洛德沙皇身上。沙皇輕輕揮手示意退下，目前隨伺的侍從隨後離開，留下他們兩人。他壓抑住粗魯的嘆息，以免引起騷動。\n「累壞了吧？」希爾薇婭用手托著下巴問道。\n弗謝沃洛德挑了挑眉。「妳這假設可真夠大膽的。」\n希爾薇婭只是露出了天真的微笑。「行了，你在我面前不用裝強硬。」\n弗謝沃洛德稍微退縮了一下，有些猝不及防。「要知道，我可是沙皇。」\n「是的，這正是你有趣的地方，」希爾薇婭說道，神情就像是在觀察動物園裡的動物一樣。「如此年輕，卻如此渴望在世界上闖出自己的一片天。」\n「妳看起來應該沒比我大多少，」弗謝沃洛德說著放鬆了肩膀。\n「別瞎猜，」希爾薇婭說道。「要知道，問女人的年齡是很失禮的。」\n\n弗謝沃洛德翻了個白眼，放棄了客套話。「那麼，妳到底想在晚宴上談些什麼。」弗謝沃洛德喝了一口水。\n希爾薇婭把手指放在嘴唇上，看著吊燈。「嗯……我想了解我未來的丈夫。」\n水從弗謝沃洛德的嘴裡噴了出來，所有人都轉頭看向他。他狼狽地咳嗽著，而希爾薇婭只是繼續對著他微笑，享受著他慌忙擦拭身體的窘態。弗謝沃洛德重新振作起來。「我恐怕不明白妳的意思。什麼丈夫？」\n「當然是你啊，」希爾薇婭面無表情地說道。「我們需要為我們的婚禮做規劃。」希爾薇婭輕輕拍了拍手。"
 MRU_grand_ball.13.a:0 "請解釋。"
 MRU_grand_ball.13.b:0 "我要離開這了！"
 MRU_grand_ball.14.t:0 "欺瞞的十年"
 MRU_grand_ball.14.d:0 "敲了敲門後，沙皇向住在樓上房間之一的莎蓮娜表明了身份。他能聽到房間裡傳來的踱步聲，隨後門把手轉動，門開了。莎蓮娜的頭髮有些凌亂。她開了門，站得筆直。\n「弗謝沃洛德？你找我有什麼事，」莎蓮娜說道。\n弗謝沃洛德抓了抓後腦勺。「別擔心，什麼事都沒發生。我只是來看看妳。」\n莎蓮娜瞇起眼睛。「我不需要被看望。你現在不應該正在和那些大人物名媛調情嗎？」\n弗謝沃洛德避開她的目光。「好吧，關於那個……」弗謝沃洛德嘆了口氣。「我想我不會和下面的任何人結婚了。」\n莎蓮娜搖了搖頭，把門開得更大讓他進來。「你打算逃避這件事多久？」她靠在牆上，雙臂交叉。「你遲早要結婚的。你是沙皇。」\n\n弗謝沃洛德看著地板，斜眼看著一旁，握緊了拳頭。她是對的，不管他想不想，他都必須結婚。不管他拖延多久，都會有一個女人需要與他度過餘生，以延續皇家血脈。然而，這必須是個陌生人嗎？弗謝沃洛德再次抬頭看著莎蓮娜。她正以不以為然的神情盯著他。那是她一如既往的反對神情，在多年的相處中，他對此早已習以為常。\n「莎蓮娜，」弗謝沃洛德開始以更嚴肅的語氣說道。「妳有喜歡的人嗎？」\n\n莎蓮娜的臉立刻變紅了。「我——你什麼意思？喜歡的人？這太荒謬了。」\n弗謝沃洛德有些尷尬地看向一旁。「假設妳有……妳會為了和那個人在一起而放棄妳的貴族職責嗎？」\n莎蓮娜有些疑惑地看著他，手托著下巴。她想了一會兒。「我會。」她的臉依然紅著。「你呢，弗謝沃洛德，你有喜歡的人嗎？」她說這些話時沒有看著他，而是看著一瓶杜鵑花。\n弗謝沃洛德的心在胸膛中停滯了短暫的一瞬，他將指甲掐入掌心。他現在做出的選擇至關重要。他將與誰共度餘生？他到底對誰有感覺？"
 MRU_grand_ball.14.a:0 "對妳，莎蓮娜。"
 MRU_grand_ball.14.b:0 "這絕不可能成功。"
 MRU_grand_ball.15.t:0 "逃離喧囂"
 MRU_grand_ball.15.d:0 "自從弗謝沃洛德遇見安靜的索菲亞後，已經過去了一段時間。他曾與她短暫告別，但由於與她的交談比預期的更加愉快，他發現自己又回到了戶外。在弗謝沃洛德開始走向溫室之前，在庭院裡零星散布的人群中，他看到了噴泉水幕後面熟悉的紅髮。隨著越來越多的人湧入庭院，索菲亞顯得有些焦躁不安。弗謝沃洛德走向她，微微揮了揮手。\n\n索菲亞用明亮的雙眼看著弗謝沃洛德。「弗謝沃洛德！我還以為你把我丟下了，」她微笑著說道，顯然很感激他沒有這樣做。\n隨著室內變得更加擁擠，人們開始佔據室外區域。弗謝沃洛德看了一眼走出門口的人群。「妳為什麼離開溫室？我懷疑有人會去那裡，」弗謝沃洛德說。\n索菲亞指了指溫室。「我有點慌了。」\n弗謝沃洛德看到一群園丁正在修剪外面的樹籬和溫室內的植物。「那太不幸了。這裡開始變得熱鬧了。」\n索菲亞低著頭點了點頭。弗謝沃洛德嘆了口氣，雙臂交叉環顧四周。這裡變得越來越吵，而索菲亞並不是那種健談的人。隨著時間的流逝，兩人之間的交談變得更加困難。他想了一會兒，腦海中靈光一閃。\n「索菲亞？」弗謝沃洛德說著以引起她的注意。「這聽起來可能很怪，但妳想去儲藏室嗎？」\n索菲亞的眼睛睜得大大的。「嗯……你指的是什麼？」\n「好吧，我只是想那裡可能會安靜一些，」弗謝沃洛德帶著茫然的微笑說道。\n索菲亞眨了幾下眼睛，盯著這個遲鈍的弗謝沃洛德。「我想……確實會安靜些。」\n\n考慮到她害羞的性格，弗謝沃洛德對她的猶豫感到困惑。他不知道，自己剛才的話聽起來極度可疑。儘管如此，他還是伸出了手。「那就跟我來吧，」他說道，索菲亞不情願地握住了他的手。她低頭看著他們緊握的手，臉上泛起一絲紅暈。\n弗謝沃洛德拉著索菲亞穿過舞廳，在人群中穿梭。大量的客人注視著並對他們指指點點，但弗謝沃洛德一直握著她的手。索菲亞的心跳因為種種原因而加速，焦慮地來回張望。當她成為與沙皇相關的話題焦點時，焦慮籠罩著她的胸膛。然而，他握著她的手那種感覺，稍微減輕了她的焦慮。當兩人進入一個與儲藏室門相連的相對安靜的房間時，弗謝沃洛德帶她進入了那個昏暗的房間。"
 MRU_grand_ball.15.a:0 "我們在這裡待一會兒吧。"
 MRU_grand_ball.15.b:0 "能請您稍等我一下嗎？"
 MRU_grand_ball.16.t:0 "戰略提案"
 MRU_grand_ball.16.d:0 "在樓上的一間空辦公室裡，弗謝沃洛德沙皇坐了下來，莎蓮娜站在他的身旁。索尼婭和庫拉科夫坐在辦公桌的對面。索尼婭沒有失去她的專業素養，坐姿端正。與此同時，庫拉科夫從煙盒裡又拿出一支菸，開始點燃。弗謝沃洛德首先發言：「那麼，我有什麼可以幫兩位的？」\n庫拉科夫正忙著抽菸，所以索尼婭接過話頭。「我相信您很清楚，我們之間的和平並非永久性的。」索尼婭眼神中閃爍著光芒說道。\n弗謝沃洛德瞇起眼睛，莎蓮娜在身後把一隻手輕輕放在槍套上。「那麼，我想您是來警告我的了，」弗謝沃洛德說道。\n「不完全是，」庫拉科夫搶在索尼婭之前插話。「索尼婭說得對，但我們不會僅僅為了威脅沙皇而來。雖然很明顯俄羅斯容不下多個政權，但我們是來提出一個替代方案的。我們在某種程度上知道這場舞會是為了什麼，您看……」\n他吸了口菸，讓索尼婭有時間發言。「沙皇正在尋找妻子，不是嗎？」\n\n弗謝沃洛德挑了挑眉。「這對您有用？」弗謝沃洛德的胃裡開始升起一陣不適，他最害怕的就是這種情況。\n令弗謝沃洛德驚訝的是，索尼婭暫時放下了她的矜持，無奈地嘆了口氣。「確切地說，是這位的庫拉科夫對此感興趣。」\n庫拉科夫抬起下巴吐出難聞的煙霧。「我認為，這即將到期的和平可以通過某種形式的聯姻來維持。當然，當我發現沙皇在尋求愛情時，我找到了索尼婭。我總不能毛遂自薦吧？」他低聲笑著。\n弗謝沃洛德轉向索尼婭，期望看到某種抗拒。然而，他什麼也沒看到。在弗謝沃洛德身後，莎蓮娜逆下身，在他耳邊低語。「從戰略上講，我會同意這一點。這是一種妥協，但這意味著可以避免戰爭。」弗謝沃洛德閉上眼睛想了一會兒。這不是他為自己設想的未來。然而，他是沙皇，他有責任，這是事實。坐在他對面的索尼婭也明白這一點。"
 MRU_grand_ball.16.a:0 "索尼婭，我想單獨和妳談談。"
 MRU_grand_ball.16.b:0 "我不能同意這件事。"
 MRU_grand_ball.17.t:0 "最終決定"
