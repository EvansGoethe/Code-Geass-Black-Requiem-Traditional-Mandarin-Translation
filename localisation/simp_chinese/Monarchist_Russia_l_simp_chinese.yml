 MRU_grand_ball.23.t:0 "掙脫束縛"
 MRU_grand_ball.23.d:0 "「婚禮……我不明白，」弗謝沃洛德用手捂著頭，對希爾薇婭公然提出的結婚要求感到有些不知所措。\n「難道你不想嗎？我相信我們倆會是天造地設的一對，」希爾薇婭湊得更近了。「況且，這就是你出現在這裡的原因，不是嗎？」\n她適應得很快，弗謝沃洛德心想。然而，他不能隨便和一個他不認識的女人結婚。「聽著，妳很完美，但事情進展得有點太快了——」弗謝沃洛德被打斷了。\n「我們為什麼不去外面呼吸一下新鮮空氣呢？」當她這麼說時，弗謝沃洛德注意到許多異樣的目光落在他們身上。\n「好吧，」弗謝沃洛德嘆了口氣，隨後兩人站起身走出了大樓。他們來到了庭院，希爾薇婭坐在中央噴泉的邊緣。\n\n她把被微風吹亂的頭髮撥開。「你感到有壓力，對吧，弗謝沃洛德？」希爾薇婭很自然地直呼其名。\n弗謝沃洛德把臉轉向一旁。「妳現在在說什麼呢？」\n「我能理解婚姻帶來的壓力。這是我個人已經習以為常的事情，」希爾薇婭用更嚴肅的語氣說道。「曾幾何時，我認為這是一個強加在我身上的殘酷負擔。」\n弗謝沃洛德回頭看著她。「妳是說妳也不想結婚嗎？」\n希爾薇婭搖了搖頭。「我最終意識到我不需要被它壓倒，相反地，我可以掌控自己的義務，而不是放棄它們。如果我必須結婚，為什麼不自己做選擇呢？」\n弗謝沃洛德的眼睛睜大了。「妳根本不了解我，希爾薇婭。」\n\n希爾薇婭有些同情地歪了歪頭回答道：「但我了解沙皇，弗謝沃洛德。我了解俄羅斯人民。我知道他們是合而為一的。我愛上這個國家已經很久了，包含它所有的缺點與美麗。我想，如果我能愛上任何人，那一定會是體現了俄羅斯精神的男人。」噴泉在希爾薇婭身後短暫地噴出水柱，月光倒映在清澈的水面上。\n沙皇想了想，眼睛看著希爾薇婭。如果這種壓垮他的重擔是可以避免的，同時又不用放棄他所承擔的義務，他會幸福嗎？這種幸福是否能與這個他剛認識的女人一起實現？如果這是他可以選擇的選項……"
 MRU_grand_ball.23.a:0 "那麼，請允許我娶妳為妻。"
 MRU_grand_ball.23.b:0 "拒絕希爾薇婭"
 MRU_grand_ball.24.t:0 "寧靜的沉默"
 MRU_grand_ball.24.d:0 "兩人在震驚的沉默中站立了片刻，下樓傳來盛大舞會的聲音。莎蓮娜張大嘴巴看著他。像往常一樣，她那容易慌張的性格依然沒有改變。弗謝沃洛德帶緊張的神情與她對視，祈禱自己沒有出洋相。儘管相識多年，但這種緊張感以及無法坦誠自己感情的狀態一直持續著。然而，這被弗謝沃洛德剛剛說出的話所打破。\n弗謝沃洛德低下頭。「如果妳沒有相同的感覺，請忘掉這件事。」他的聲音有些發抖，開始轉身走向門口。\n在大門前走開之前，莎蓮娜伸出手抓住了他外套的袖子。「別走！」當沙皇轉身時，她脫口而出。「請留在這裡。」兩人的臉都通紅，他們都不習慣這種互動。弗謝沃洛德轉過身來面對她。「如果沙皇允許的話……」莎蓮娜開口道。「那麼我的感覺也是一樣的。」\n\n弗謝沃洛德的心跳漏了一拍。他們站得很近，這並不尋常，但這次感覺不同。他吸了口氣，然後說道。「妳不介意我是沙皇嗎？」\n「我不介意，」莎蓮娜沒有猶豫，她的尷尬變成了堅定。「即使你不是沙皇，我也會嫁給你。」莎蓮娜說完後，猛地意識到自己說了什麼，並用手捂住了嘴巴。「我不是說我們非得結婚不可！」\n弗謝沃洛德睜大了眼睛，隨後笑了出來，打破了緊張的氣氛。他深深呼了一口氣，胸膛上的重擔終於卸了下來。「至少我們的想法是一致的。」\n「是嗎？」莎蓮娜說。「等等，這意味著——」\n弗謝沃洛德點了點頭。「是的，如果妳不介意的話，我不反對結婚。這能讓我不用和陌生人結婚。」\n莎蓮娜庫了一下他的手臂，他疼得叫了起來。「別這麼說！」\n「對不起！」弗謝沃洛德縮了縮脖子。「相信我，除了妳，我不想和任何人結婚。」\n莎蓮娜點了點頭，臉頰上依舊帶著不可否認的紅暈。「那就好。」\n\n弗謝沃洛德的臉上浮現出微笑。房間再次陷入沉默，但不再是緊張的沉默。相反地，他們現在正像往常一樣享受彼此的陪伴。然而，現在有些不同了。十幾年來無法說出真實感受的友誼，在幾分鐘內落下了帷幕。當房間裡一片寂靜，只有遠處傳來古典音樂的聲音時，弗謝沃洛德和莎蓮娜對視著。尷尬已經消失了，兩人的腦海中都只剩下了一件事。沒有言語交流。在兩人確定的一瞬間，雙方同時向對方傾身，而隨著漸強音的結束……"
 MRU_grand_ball.24.a:0 "他們的雙唇緊貼在一起。"
 MRU_grand_ball.24.b:0 "拒絕莎蓮娜"
 MRU_grand_ball.25.t:0 "難忘的一夜"
 MRU_grand_ball.25.d:0 "弗謝沃洛德和索菲亞在儲藏室裡聊了幾分鐘，互相開著玩笑，並尋找最不難受的木箱坐下。儘管兩位貴族躲在裝滿馬鈴薯的箱子裡避開嘈雜的派對顯得有些尷尬，但空氣中的氛圍卻很輕鬆愉快。\n索菲亞越感到放鬆，說話聲音就越大，不在乎有沒有人在看或聽。當她沒那麼有淑女風度時，她的面具開始卸下，她靠在箱子上，鞋子脫了一半，掛在腳趾尖上。\n從他們面前的一個木箱拐角處，爬出了一隻大得有些嚇人的蟑螂。索菲亞尖叫著抱住了弗謝沃洛德，弗謝沃洛德也沒好到哪去，像見到魔鬼一樣大喊大叫。索菲亞嘲笑弗謝沃洛德表現出的懦弱，但弗謝沃洛德隨後猛撲過去，用靴子將牠踩扁。牠還在抽搐，顯然還活著，但現在已經動彈不得。\n\n索菲亞鬆了口氣。「真是一位英雄，」索菲亞諷刺地說道。\n弗謝沃洛德有些搖晃地轉過身，行了個嘲諷的禮，然後蹲了下來，雙手放在膝蓋上，氣喘吁吁。他蹲著，頭髮凌亂，神色有些疲憊；對面的索菲亞靠在箱子上，裙子有些凌亂，看起來同樣有些狼狽。\n就在這時，儲藏室的門被推開了，站在門口的正是特轄軍的莎蓮娜。她看著那兩個毫無說服力的貴族，一個蹲在另一個靠在箱子的人面前。這一幕太過可疑，莎蓮娜無法就這樣忽略並離開。她紅著臉衝了進來。\n「你在做什麼，弗謝沃洛德，你這個色狼！」她大喊著，揪著他的後頸把它拉了起來。\n「妳在說什麼呢？」弗謝沃洛德說，眼裡帶著驚恐。「我們只是想要點隱私！放過我們吧。」在莎蓮娜因震驚而屏住呼吸時，他脫口而出。\n索菲亞在自己面前揮了揮手。「不是看起來那樣的！弗謝沃洛德沒有做任何失禮的事！除了踩扁那隻蟑螂……」她指著那隻抽搐的昆蟲。\n\n經過幾分鐘的澄清，三人終於明白沒有發生任何越軌的事。索菲亞和莎蓮娜的臉都通紅。索菲亞不好意思看任何人。「我到處在找你，弗謝沃洛德，」莎蓮娜說道。\n弗謝沃洛德和索菲亞互相看了看。誰也不想為惹出麻煩承擔責任。「好吧，妳放鬆點，」弗謝沃洛德說。「我只是帶她避開擁擠的人群。」\n莎蓮娜把一隻手托在下巴上，點了點頭，臉依然紅著。「當然，弗謝沃洛德不會和一個他甚至還沒結婚的女人做任何事……」\n弗謝沃洛德的腦海中靈光一閃。他回想起莎蓮娜一整晚說的話，然後看著索菲亞的臉。雖然直到現在才明朗，但他知道他整個舞會最享受誰的陪伴。那個讓他感到最舒服的女人。經過一番思考和鼓起勇氣，他開口了。「索菲亞……」"
 MRU_grand_ball.25.a:0 "我有一個求婚想向妳提出。"
 MRU_grand_ball.25.b:0 "拒絕索菲亞"
 MRU_grand_ball.26.t:0 "相互理解"
 MRU_grand_ball.26.d:0 "庫拉科夫和莎蓮娜離開辦公室留下他們兩人之後，弗謝沃洛德和索尼婭得以便捷地交談。「我沒想到你會遣退你的衛兵，」索尼婭開口道。\n弗謝沃洛德身體前傾，雙手交疊。「如果您今晚打算殺我，您將面對這棟大樓裡我所有的衛兵。即使我們單獨在一起，我也並非毫無防備，可以這麼說。」\n索尼婭露出了會心的微笑。「那麼，讓我們輕鬆地談談吧。」\n弗謝沃洛德點了點頭，從交疊的雙手上方看著她。「這場婚禮，難道不違背你們紅軍所珍視的價值觀嗎？妳不是皇室成員，也不是……好吧，請原諒我的假設，但妳和妳的同志們似乎不像是妥協的人。」\n「那你呢？以你處理那些民族主義者的手段，我並不認為你是一個會妥協的人，」索尼婭沉思道。\n\n弗謝沃洛德嘆了口氣，靠回椅背上，露出一絲微笑以卸下沙皇的架子。「也許我們誤會了彼此。索尼婭，這場婚禮不是妳的主意吧？」\n索尼婭短暫地低下頭，這告訴了弗謝沃洛德他想知道的一切。「這確實不是我的主意，但我明白隨之而來的好處。也許這讓我顯得像個傻瓜，但我認為如果將我自己的未來置於國家未來之上，那是自私的。你難道沒有同樣的感受嗎？」\n弗謝沃洛德想了想她說的話。難道他更看重自己的幸福，而不是國家的未來嗎？也許他所感受到的束縛並非僅僅是皇家義務。這就是作為領袖的意義。為了人民的利益、他們的未來以及帝國的未來而犧牲自己。無論他是否生來就扮演這個角色，既然承擔了這個責任，這些就是他的義務。他呼了一口氣，再次挺直身子。「好吧，我明白了。在改變主意之前，我們來談談細節吧。」\n索尼婭露出了相互理解的微笑。「那麼，我們握手為盟吧。」她站起身，伸出了手。弗謝沃洛德猶豫了片刻，隨後回握。這場聯姻更像是政治家之間的交易，兩人在婚約上達成了共識。"
 MRU_grand_ball.26.a:0 "他們雖缺乏愛情，卻以領導力補足。"
 MRU_grand_ball.26.b:0 "拒絕索尼婭"
 MRU_intervention.1.t:0 "東方戰爭"
 MRU_intervention.1.d:0 "「嘿，吃你自己的食物！」塔蒂亞娜朝身旁的伊蓮娜大喊，後者從她的盤子裡搶走了一個小麵包。\n「我已經吃完我的了。」伊蓮娜旁若無人地把麵包塞進嘴裡。塔蒂亞娜試圖搶回來，差點碰倒了她裝滿咖啡的紅酒杯。\n羅曼諾夫沙皇坐在桌子最遠的一端，他的特轄軍都圍坐在桌子旁。自從抵達莫斯科以來，事情變得相對平靜了。不再需要與歐洲干涉區(EIZ)作戰，羅曼諾夫家族的家園也得到了解放，弗謝沃洛德終於可以鬆一口氣了。弗謝沃洛德瞥了瞥坐在他右邊的莎蓮娜。她一邊吃著湯，一邊拿著一疊文件，設法不把任何東西滴到珍貴的紙上。「這本該是一場慶祝活動，妳知道的，」弗謝沃洛德看著她大腿上的文件說道。\n「在國家還在前線東部邊境作戰時，根本沒有時間慶祝。」\n\n弗謝沃洛德點了點頭。「我知道。甚至我也想暫時逃離它……」他嘆了口氣，從座位上站起來，用叉子敲了敲杯子，引起了所有人的注意。「各位，我想提出一件事。」特轄軍都直起身子，伊蓮娜的嘴裡還含著一片麵包。「我們已經將歐洲干涉區(EIZ)驅逐出我們的土地，這要歸功於這裡每個人的努力。我本想盡情慶祝，但我相信大家都意識到了我們東方的威脅。」每個人都點頭同意。「我很抱歉在這裡提出無聊的政治問題，但我們需要做出選擇。我們將向誰提供支持？這些國家之一將會倒下，而我們有機會選擇誰能笑到最後。」\n\n沃羅諾夫交叉雙臂，首先發言。「問題是，誰是更大的威脅？答案永遠是歐洲不列顛尼亞人，即使他們自己不是不列顛尼亞。只要他們控制了俄羅斯，他們就會繼續推進並吞併其餘部分。」\n伊蓮娜拼命吞下她正在咀嚼的小麵包，喝光她杯子裡的水，並重重地摔在桌子上。「鬼話！我絕不與社會主義站在一起！打倒紅軍！」\n羅伯特從座位上站了起來。「等一下……我們不會像歐洲不列顛尼亞人那樣向另一位皇帝低頭。我來到葉卡捷琳堡是為了追隨弗謝沃洛德，而不是不列顛尼亞。」\n「拜託，羅伯特，你現在應該已經習慣當另一個國家的走狗了，」伊蓮娜嘲諷地笑道。\n馬克西姆舉起了手，但沒有等待發言許可。「夠了。我們不是來互相進行無聊的人身攻擊的。」他看著低下頭的弗謝沃洛德。「陛下？您的意見應該放在第一位。」\n羅曼諾夫沙皇慢抬起頭說道……"
 MRU_intervention.1.a:0 "我們不會向外國皇帝低頭。"
 MRU_intervention.1.b:0 "不列顛尼亞待我們不薄。"
 MRU_intervention.2.t:0 "來自葉卡捷琳堡的援助"
 MRU_intervention.2.d:0 "主題：對抗歐洲不列顛尼亞的支援\n發件人：弗謝沃洛德·羅曼諾夫\n收件人：西伯利亞人民共和國主席團\n\n關於社會主義人民共和國對抗歐洲不列顛尼亞及其支持者的戰爭，葉卡捷琳堡親王國希望在防禦和財政上提供援助。我以沙皇弗謝沃洛德的名義，謙卑地希望您接受這一支持，並希望我們兩國的願望一致。不列顛尼亞及其殖民地絕不能在俄羅斯腹地獲得立足點。為共同對抗外國帝國的努力，光榮屬於俄羅斯。"
 MRU_intervention.2.a:0 "這項支援將確保俄羅斯的未來。"
 MRU_intervention.3.t:0 "沙皇弗謝沃洛德派遣援助"
 MRU_intervention.3.d:0 "主題：與共產主義的戰鬥\n發件人：弗謝沃洛德·羅曼諾夫\n收件人：奧古斯塔·亨利·海蘭德\n\n我，羅曼諾夫沙皇，請求歐洲不列顛尼亞允許來自葉卡捷琳堡親王國在經濟和軍事上的外國援助。西伯利亞人民共和國共產主義的復甦絕不能被容許繼續，因為這意味著容許他們的思想傳播到他們的邊境之外。請允許我們支持貴國對抗紅色威脅的戰鬥。我謙卑地等待您的答覆。"
 MRU_intervention.3.a:0 "作為君主對君主，我們接受。"
 MRU_intervention.5.t:0 "路線的轉變"
 MRU_intervention.5.d:0 "寒風席捲著雪花穿過稀薄的大氣層。在如此高的高度，沒有任何活物呼吸著空氣，只有不被打擾的天氣。這片小雪花漫無目的地漂流著，由於缺乏重量，它在空中隨著微風左右搖擺。它被寒冷的俄羅斯風吹拂著，為大地塗上一層白色。下面是樹葉覆蓋著白雪的綠色森林。這是永恆純白的自然之美。這片雪花將融入已經鋪好的厚厚無色地毯中。\n\n然而，伴隨著遠處傳來雷鳴般的巨響，一個鋼鐵製造的怪物呼嘯著掠過漂流的雪花。一陣大風將雪花吹得四處飛舞，然後被拖向與之前相反的方向。它下面不再是白雪覆蓋的茂密森林，而是一枚地對空導彈撞擊人類城市的景象。火焰從建築物中噴出，碎石四處飛散。這座城市燃起大火，車輛一輛接一輛地湧入。\n\n沒有什麼能阻止這片雪花落入更深的大氣層。空氣此時瀰漫著令人窒息的濃煙，不再像以前那樣清澈。在它的軌跡受到干擾之前，雪花堅定地落向了下方的煉獄。橘紅色的火焰在下方舞動，雪花開始感受到熱量，其獨特的形狀開始融化消逝。從冰凍的冰，到冰冷的水滴落入火焰中蒸發。雪花的旅程結束了，它被火焰完全吞噬，徹底融化。"
 MRU_intervention.5.a:0 "現在我們等待。"
