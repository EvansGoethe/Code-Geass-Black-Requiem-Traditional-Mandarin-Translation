 MRU_the_grand_ball:0 "The Grand Ball"
 MRU_the_grand_ball_desc:0 "Tsar Vsevolod Romanov is without a wife and by extension has no heir to the throne. Being a royal without a royal family, the future of his nation is dangerously delicate. A single bullet would leave the Russian throne empty. In order to negate this possibility, there is only one thing for it. The Grand Ball will be held where Tsar Vsevolod will find his lifelong partner and ensure his bloodline has a future."
