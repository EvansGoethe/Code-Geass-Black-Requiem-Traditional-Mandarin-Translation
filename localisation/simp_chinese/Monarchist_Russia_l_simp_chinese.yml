 MRU_grand_ball.13.t:0 "Bold in Blue"
 MRU_grand_ball.13.d:0 "The Tsar had been intermingling for quite some time now, more talkative than he had to be all week. The guests surrounding him demanded his attention, many wishing to make connections that would benefit them. It was a certain Danubian woman who took his attention the most, that being Sylvia Metternich. Having been occupied constantly, Sylvia would occasionally interject to have her own conversation with the Tsar. Now was another one of those times. She stayed within the circle of people surrounding him, before blatantly exclaiming... “Tsar Vsevolod, would you join me for dinner?” A few guests surrounding the Tsar had jaws agape.\nVsevolod's eyebrows raised at the boldness of this girl. “I suppose now would be a good time.” Though, this was more of an excuse to sit down and escape the most crowded room.\nSylvia brought him along to the dining room, where many aristocrats sat and socialized over roast dinner. She pulled out a chair for him, causing the Tsar to somewhat question his sense of masculinity. He also pulled out the chair next to his for her to take a seat in, giving Sylvia a humorous laugh.\n\n“How very gentlemanly of you!” she taunted, taking a seat.\nThe two sat side by side, with waiters and cooks rushing to meet the Tsar's needs. Sylvia had her gaze set on Tsar Vsevolod throughout this interruption. With a simple dismissive wave, the waiter currently with them left them alone. He suppressed a rude sigh so as not to make a fuss.\n“Worn out, are you?” Sylvia asked with her chin resting on her hand.\nVsevolod raised an eyebrow. “Rather bold of you to assume that.”\nSylvia simply gave an innocent smile. “Come now, you don't need to act tough around me.”\nVsevolod recoiled slightly, caught off guard. “I am the Tsar, you know.”\n“Yes, that is what makes you so interesting,” Sylvia said with a look that seemed like she was observing a zoo animal. “So young, yet so eager to make your place in the world.”\n“You can't be that much older than me,” Vsevolod said, relaxing his shoulders.\n“Don't go making any guesses,” Sylvia said. “It's rude to ask a woman her age, you know.”\n\nVsevolod rolled his eyes, abandoning formalities. “So, what exactly did you wish to talk about over dinner.” Vsevolod took a sip from a glass of water.\nPutting a finger to her lips, Sylvia looked to the chandelier. “Hmm... I'd like to get to know my future husband.”\nWater sprayed out of Vsevolod's mouth as everyone turned to him. He sputtered while Sylvia just continued to smile at him, enjoying his scrambling to wipe himself down. Vsevolod recomposed himself. “I'm afraid I don't know what you mean. What husband?”\n“Why you of course,” Sylvia said with a blank stare. “We need to make plans for our wedding.” Sylvia lightly clapped her hands together."
 MRU_grand_ball.13.a:0 "Please explain."
 MRU_grand_ball.13.b:0 "I'm out of here!"
 MRU_grand_ball.14.t:0 "Decade of Dishonesty"
 MRU_grand_ball.14.d:0 "With a knock on the door, the Tsar announced himself to Selena who was staying in one of the upstairs rooms. He could hear pacing from inside the room, before the door handle turned and the door opened. Selena's hair was slightly frazzled. As she opened the door, she stood up straight.\n“Vsevolod? What do you need me for,” Selena said.\nVsevolod scratched the back of his head. “Don't worry, nothing happened. I was just coming to check on you.”\nSelena narrowed her eyes. “I don't need to be checked on. Shouldn't you be flirting with big shot noblewomen?”\nVsevolod averted his gaze from her. “Well, about that...” Vsevolod sighed. “I don't think I'll be marrying anyone down there.”\nSelena shook her head, opening the door wider to let him in. “How long are you going to avoid this for?” She leaned against the wall, crossing her arms. “You're going to get married at some point. You are the Tsar.”\n\nVsevolod looked at the floor, glancing to the side and closing his fist. She was right, he would have to get married regardless of what he wanted. No matter how long he put it off for, there would be a woman he'd have to spend the rest of his life with and to continue the royal bloodline. Although, did it have to be a stranger? Vsevolod looked up at Selena again. She was glaring at him with an unimpressed look. That usual face of disapproval that she always had, which he had gotten accustomed to over the course of many years.\n“Selena,” Vsevolod began in a more serious tone. “Do you have feelings for someone?”\n\nSelena's face immediately became tinted red. “I- What do you mean? Feelings? For someone? That's preposterous.”\nVsevolod looked to the side out of embarrassment. “Say you did... Would you give up your noble duties to be with that person?”\nSelena looked at him with bewilderment, putting a hand to her chin. She thought for a moment. “I would.” Her face was still red. “Do you have feelings for someone, Vsevolod?” She said this while not looking at him, instead at a vase of azalea flowers.\nVsevolod's heart stood still in his chest for a brief moment, as he dug his nails into the palm of his hand. The choice he made now was an important one. Who would he spend the rest of his life with. Who did he have feelings for?"
 MRU_grand_ball.14.a:0 "For you, Selena."
 MRU_grand_ball.14.b:0 "It could never work."
 MRU_grand_ball.15.t:0 "An Escape From the Noise"
 MRU_grand_ball.15.d:0 "Some time had passed since Vsevolod met the quiet Sophia. He had parted with her briefly, but having enjoyed his chat with her more than expected, he found himself returning to the outdoors. Before Vsevolod started walking towards the greenhouse, amongst the people dotted around in the courtyard, he saw the familiar red hair beyond the spilling water of the fountain. Sophia could be seen fidgeting with a look of nervousness as more people began to trickle into the courtyard. Vsevolod approached her, giving a small wave.\n\nSophia looked up at Vsevolod with bright eyes. “Vsevolod! I thought you might have abandoned me,” she said with a smile, clearly grateful he didn't.\nAs the indoors got more crowded, people began to take up space in the outdoor area. Vsevolod glanced at the people exiting the doorway. “Why did you end up leaving the greenhouse? I doubt anyone would go there,” Vsevolod said.\nSophia pointed towards the greenhouse. “I panicked a little bit.”\nVsevolod saw a collection of gardeners tending to the hedges outside and plants within the greenhouse. “That's unfortunate. It's starting to get busy.”\nSophia nodded with her head hung low. Vsevolod let out a sigh, crossing his arms and looking around. It was getting noisier and Sophia wasn't exactly the vocal type. Conversation got harder between the two as the minutes passed. He thought for a moment before a lightbulb appeared above his head.\n“Sophia?” Vsevolod said to get her attention. “This might sound weird, but do you want to go to the storage room?”\nSophia's eyes went wide. “Um... What are you suggesting?”\n“Well, I thought it might be quiet in there,” Vsevolod said with an oblivious smile.\nSophia blinked a few times, staring at the dense Vsevolod. “I suppose... It would be.”\n\nVsevolod appeared confused as to why she was being hesitant, given her shy nature. Little did he know, he sounded extremely suspicious. Regardless, he held out his hand. “Follow me then,” he said as Sophia reluctantly held his hand. She looked down at their gripping hands, a little blush appearing on her face.\nVsevolod made his way through the ballroom with Sophia in tow, weaving through crowds of people. A large number of guests stared at and commented on the two, but Vsevolod kept her hand in his. Sophia's heart raced for numerous reasons, glancing back and forth worriedly. Anxiety weighed on her chest as she became the subject of conversation in relation with the Tsar. However, the feeling of his hand holding hers lifted some of those anxieties. As the two entered a relatively quieter room where the storage room door was connected, Vsevolod took her into the dimly lit room."
 MRU_grand_ball.15.a:0 "Let's stay here for a while."
 MRU_grand_ball.15.b:0 "Could you excuse me for one moment?"
 MRU_grand_ball.16.t:0 "Strategic Proposal"
 MRU_grand_ball.16.d:0 "In a spare office upstairs, Tsar Vsevolod took his seat with Selena standing to his side. Sonya and Kulakov sat across from the desk. Sonya did not break her professionalism, her posture upright. Meanwhile, Kulakov took another cigarette out of his pack and began to light it. Vsevolod spoke first, “So then, how can I help you two?”\nKulakov was busy taking a puff, so Sonya spoke next. “I'm sure you are aware, this peace between us is not permanent.” Sonya said with a glint in her eyes.\nVsevolod narrowed his eyes, Selena taking a hand from behind her back and gently setting it on her holster. “I take it you've come to warn me, then,” Vsevolod said.\n“Not quite,” Kulakov butted in before Sonya could. “Sonya is correct, but we wouldn't come simply to threaten the Tsar. While it is obvious that there isn't room for more than one Russia, we came to suggest an alternative. We are somewhat aware of what this ball is for, you see...”\nHe took another puff, giving Sonya time to speak. “The Tsar is looking for a wife, is that not correct?”\n\nVsevolod raised an eyebrow. “This is of interest to you?” A rising discomfort began to rise in Vsevolod's stomach, dreading this exact scenario.\nMuch to Vsevolod's surprise, Sonya dropped her formalities momentarily to let out a frustrated sigh. “Rather, it is of interest to Kulakov here.”\nKulakov lifted his chin to exhale stinking smoke. “I am of the opinion that this expiring peace could be preserved through a union of sorts. Of course, when I discovered the Tsar was looking for love, I approached Sonya. I couldn't exactly offer myself, you know?” He gave a low chuckle.\nVsevolod turned to Sonya, expecting some sort of resistance. However, he saw nothing of the sort. From behind Vsevolod, Selena leaned down and whispered into his ear. “Strategically, I would agree to this. It's a compromise, but it would mean avoiding war.” Vsevolod closed his eyes for a moment. This was not the kind of future he'd envisioned for himself. However, it was true that he was the Tsar and he had a duty. Across from him, Sonya knew the same thing."
 MRU_grand_ball.16.a:0 "I'd like to speak with you alone, Sonya."
 MRU_grand_ball.16.b:0 "I can't agree to this."
 MRU_grand_ball.17.t:0 "The Final Decision"
 MRU_grand_ball.17.d:0 "11 o'clock at night and the Tsar was feeling great. He had surprised himself, unexpectedly becoming more suave than he could possibly imagine, hitting it off with multiple different girls. Perhaps he always had it within himself, but this was beyond comprehension. Suddenly, he felt himself yanked to the side with a familiar voice in his ear. “Vsevolod!” Robert spoke, grabbing his wrist. “I need to talk to you. Now.”\nVsevolod was pulled along until they made it to the upstairs hallway. The door was shut behind them. “What is it, Robert? Paramilitaries?” Vsevolod asked with urgency.\n“No, no!” Robert frantically said. “It's you! What are you doing, man? You're flirting with everyone around!”\nVsevolod smirked, putting a hand to his chin. “I know, right? I didn't realize I could do so well... Wait, how do you know that?”\n“I've been watching,” Robert said, guiltily turning his gaze to the side. “Just to make sure and oh boy... You've gone and done it.”\n“What do you mean?” Vsevolod's smugness faded. “Isn't that a good thing.”\nRobert facepalmed. “Listen... You can't be leading girls on. You've got to make a choice.”\nVsevolod's eyes widened. “Robert!” He yelled. “I'm sorry, I didn't think of that... You're right.”\nRobert sighed and nodded. “Glad you understand... Now who do you actually want to marry?”"
 MRU_grand_ball.17.a:0 "Sylvia has captured my interest."
 MRU_grand_ball.17.b:0 "Selena has always been there for me."
