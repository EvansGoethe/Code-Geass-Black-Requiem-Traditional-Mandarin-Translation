 MRU_Risen_From_History:0 "自歷史中崛起"
 MRU_Risen_From_History_desc:0 "由於俄羅斯崩潰造成的混亂，阿斯塔科夫集團控制了葉卡捷琳堡。民族主義者可以通過武力重新統一俄羅斯，結束腐敗共和國的停滯狀態。俄羅斯必須再次在一位強大的領袖領導下團結起來。問題是，這位領袖會是誰：是年輕的沙皇，還是他詭計多端的攝政王？"
 MRU_Arrival_Of_The_Tsar:0 "沙皇抵達"
 MRU_Arrival_Of_The_Tsar_desc:0 "俄羅斯真正的沙皇弗謝沃洛德·羅曼諾夫已降落在葉卡捷琳堡國際機場。羅曼諾夫家族成員的到來被公眾視為俄羅斯將再次重現昔日輝煌的標誌。而阿斯塔科夫因被興奮的人群阻擋而無法抵達典禮現場，他的聲望恐怕維持不了多久了。"
 MRU_Foundation_Of_The_Imperial_Rule_Party:0 "帝國統治黨的成立"
 MRU_Foundation_Of_The_Imperial_Rule_Party_desc:0 "沙皇正利用他的影響力組建帝國統治黨，該黨主張由一位帝國統治者，即沙皇，來統治葉卡捷琳堡親王國。他將發表一場大型演講，直接向阿斯塔科夫集團發言。如果他們效忠於沙皇，他們肯定不會反對這個新政黨。通過政黨的團結，葉卡捷琳堡親王國可以繼續推進俄羅斯的重新統一，復活兇猛的金雕，並讓折磨共和國許久的病犬的哀鳴歸於沉寂。"
 MRU_Assembling_A_Military_Command:0 "組建軍事指揮部"
 MRU_Assembling_A_Military_Command_desc:0 "出於對失去權力的恐懼，阿斯塔科夫啟動了他的計劃，利用軍隊來維持秩序，更重要的是維持他的地位。相反地，弗謝沃洛德和他的效忠者已開始採取行動，以確保特轄軍成為軍隊的總參謀部，並鞏固弗謝沃洛德作為俄羅斯沙皇的地位。因此，兩人之間展開了一場權力角逐。"
 MRU_Forming_The_Okhrana:0 "成立奧克拉納"
 MRU_Forming_The_Okhrana_desc:0 "為了驅逐在我們政府裡鬼鬼祟祟的內奸，需要成立一個情報機構。自然地，特轄軍出身的人最適合擔任該機構的局長，儘管阿斯塔科夫會強烈反對這個想法。"
 MRU_Government_Standstill:0 "政府停擺"
 MRU_Government_Standstill_desc:0 "沙皇進行了我們未曾預料到的奪權。他企圖獨自領導葉卡捷琳堡，利用他的帝國統治黨讓我們在政府中失去任何職位。這是我們絕不能容許發生的事。作為最後一搏，我們必須利用我們的準軍事組織來壓制他的過度自信，並確保我們在新政權中的未來。"
 MRU_Ekaterinburg_Square_Coup:0 "葉卡捷琳堡廣場政變"
 MRU_Ekaterinburg_Square_Coup_desc:0 "儘管我們做出了種種努力，沙皇仍在向我們逼近。我們被困在葉卡捷琳堡政府辦公室內，被他和他的特轄軍包圍。這個年輕人是怎麼智勝我們的？我們還能做些什麼？可能已經無路可走了。我們現在所能做的就是拖延時間，並希望他能對我們發慈悲。"
 MRU_The_Great_Restoration:0 "偉大復辟"
 MRU_The_Great_Restoration_desc:0 "俄羅斯真正的統治者終於回歸王位。今天是個值得慶祝的日子，也是將載入史冊的一天，但仍有許多工作要做。有著我們西部的歐洲走狗，我們可經受不起閒坐太久。畢竟，儘管武裝部隊之間尚未發生直接戰鬥，但俄羅斯仍處於內戰狀態。"
 MRU_Pulling_The_State_Together:0 "凝聚國家力量"
 MRU_Pulling_The_State_Together_desc:0 "如今弗謝沃洛德已掌握政權，他終於可以將權力付諸實施。我們面臨著幾個棘手的問題，例如阿斯塔科夫在死前召集到他身邊的殘餘勢力、教會內部的腐敗，以及關於杜馬的爭議。"
 MRU_Bringing_Our_House_In_Order:0 "整頓內務"
 MRU_Bringing_Our_House_In_Order_desc:0 "我們需要迅速召集特轄軍，並討論解決阿斯塔科夫殘餘準軍事組織問題的方法。我們可以採取更強硬的手段，或是較為間接的方式。無論如何，我們不能把這個問題留到以後。阿斯塔科夫的殘餘勢力必須儘快處理。"
 MRU_Inflame_The_Infighting:0 "煽動內鬨"
 MRU_Inflame_The_Infighting_desc:0 "沃羅諾夫的計劃是通過心理戰將準軍事組織分裂成幾個小團體。他們中的大多數人在意識形態上存在著很容易被利用的分歧，這將在他們內部引起廣泛的爭論，直到他們最終自行崩潰。"
 MRU_Crush_The_Mutiny:0 "粉碎叛亂"
 MRU_Crush_The_Mutiny_desc:0 "有了我們支配的特轄軍，我們可以輕鬆消滅殘餘準軍事組織的任何抵抗。然而，在問題失去控制之前將其解決，仍然最符合我們的利益。最簡單的方法就是使用武力。"
 MRU_Peace_In_The_Streets:0 "街頭安寧"
 MRU_Peace_In_The_Streets_desc:0 "如今民族主義者殘餘勢力的緊張局勢已消除，沙皇終於可以鬆一口氣了。阿斯塔科夫已躺在棺材裡，而效忠於他的軍隊也已煙消雲散。隨著這個問題的解決，我們可以開始對其他緊迫問題進行改革，而不用擔心叛亂的干擾。"
 MRU_Imperialization_Of_Society:0 "社會帝國化"
 MRU_Imperialization_Of_Society_desc:0 "葉卡捷琳堡可以在單一旗幟下團結起來。隨著羅曼諾夫家族掌權，正統地位已重回俄羅斯。俄羅斯帝國再次崛起。剩下的就是將俄羅斯的其他地區納入版圖。"
 MRU_The_Inherited_Bureacracy:0 "繼承的官僚體系"
 MRU_The_Inherited_Bureacracy_desc:0 "官僚機構往往是個沒有人真正想處理的錯綜複雜的權力結構，但這又必須完成。共和國政府遺留下來的爛攤子需要清理，並進行全面改革。這是我們為了解決這個混亂局面而承擔的職責的一部分。"
 MRU_Formalize_The_Tax_Code:0 "規範稅法"
 MRU_Formalize_The_Tax_Code_desc:0 "沒有了人民，沙皇會怎樣？沒有了稅收，政府又會如何？這雖然不是治理國家中一件有趣的事，但與共和國的稅法相比，我們需要就如何對我們的人口徵稅達成某種協議。"
 MRU_Replace_The_Corrupt_Patriarchs:0 "更換腐敗的東正教牧首"
 MRU_Replace_The_Corrupt_Patriarchs_desc:0 "阿斯塔科夫在死前於教會中安插了一位腐敗的牧首。不出所料，俄羅斯的腐敗現象一直很嚴重。我們應該更換一位更效忠於沙皇的牧首，他將願意幫助人民，而不是為了一己私利。"
 MRU_Return_Of_Noble_Titles:0 "恢復貴族頭銜"
 MRU_Return_Of_Noble_Titles_desc:0 "為了進一步向那些為我們服務的人表示感謝，沙皇將向他們授予貴族頭銜。問題在於我們是將這些頭銜授予士兵，還是授予關鍵的經濟人物。這些頭銜伴隨著土地和國家養老金。雙方都一直效忠且不可或缺，但我們必須做出選擇。"
 MRU_Matters_Of_The_Duma:0 "杜馬事務"
 MRU_Matters_Of_The_Duma_desc:0 "關於國家杜馬，我們不希望重複共和國憲法的悲劇，其中權力失衡的問題極為突出。要讓人民高興並傾聽他們的聲音，但也必須尊重沙皇的權威。"
 MRU_Laying_Down_Legal_Groundwork:0 "奠定法律基礎"
 MRU_Laying_Down_Legal_Groundwork_desc:0 "我們新政府的基礎應該經過周密且有目的性的規劃。我們不希望再次發生叛亂，尤其是在我們處於戰爭狀態時。歷史往往會重演，所以我們不要當傻瓜。我們必須為我們的社會制定法律規範。共和國可能有大量的法律，但他們的法院既緩慢又臃腫。我們可以做得更好。"
 MRU_Taking_A_Break_At_The_Ball:0 "舞會上的小憩"
 MRU_Taking_A_Break_At_The_Ball_desc:0 "作為沙皇職責的一部分，弗謝沃洛德沙皇預計將受到追求。不僅是教會，人民也是如此。令他煩惱的是，特轄軍負責人兼他童年好友莎蓮娜最積極地推動他結婚。對他來說，緩解一些壓力並痛快地玩一次會有些好處。也許這場婚姻甚至可以在外交上加以利用。"
 MRU_New_Oprichniki:0 "新特轄軍"
 MRU_New_Oprichniki_desc:0 "雖然特轄軍曾是沙皇最親密、最信任的盟友，但我們應該張開雙臂邀請新鮮血液加入這一寶貴的軍事資產。他們將聽從沙皇的差遣引領國家，並為帝國帶回榮光。"
 MRU_The_Opprichnikis_Will:0 "特轄軍的意志"
 MRU_The_Opprichnikis_Will_desc:0 "戰場上的犧牲將是巨大的，但特轄軍勇敢的男女擁有像狼一樣的鬥志，不斷戰鬥並向前推進。每犧牲一名士兵，我們就離勝利更近一步。"
 MRU_Unified_Training_Programmes:0 "統一訓練計劃"
 MRU_Unified_Training_Programmes_desc:0 "時間就是生命，所以我們不應該浪費它。我們訓練新兵的速度越快，他們就能越快地增援我們的前線。需要一種更有效的訓練我們士兵的方法來保持我們軍隊的強大。特轄軍已命令低階軍官訓練前線不需要的部隊。"
 MRU_Putting_Theory_To_Practice:0 "將理論付諸實踐"
 MRU_Putting_Theory_To_Practice_desc:0 "既然特轄軍的新鮮血液已經準備就緒，是時候在戰場上收穫我們努力的成果了。我們新的戰術和精銳士兵將在實際戰鬥中證明其資源豐富。讓我們將新特轄軍投入實戰吧。"
 MRU_A_New_Century_Of_Warfare:0 "新世紀的戰爭"
 MRU_A_New_Century_Of_Warfare_desc:0 "大戰早已結束。我們需要告別過時的戰術，引入一些新的東西。俄羅斯軍隊已經落伍很久了。是時候給它塗上一層新油漆了。"
 MRU_Modernize_Kutuzovs_Strategies:0 "現代化庫圖佐夫的戰略"
 MRU_Modernize_Kutuzovs_Strategies_desc:0 "俗話說，如果沒壞就別修它。然而，我們可以改進它，那就是庫圖佐夫的戰爭方法。採用更傳統的戰壕戰，其效果多麼顯著都不為過。將他的戰術現代化將使我們在戰鬥中獲得戰略優勢。"
 MRU_Dig_In_The_Infantry:0 "構築步兵防禦工事"
 MRU_Dig_In_The_Infantry_desc:0 "前線的士兵才是贏得我們戰鬥的關鍵。他們是衝向火線、挖掘戰壕並堅守我們堡壘的人。軍隊的脊樑應該受到尊重。戰壕戰雖然古老，但很有效。"
 MRU_Combat_Survivabilty_Strategies:0 "戰鬥生存能力策略"
 MRU_Combat_Survivabilty_Strategies_desc:0 "每一次損失都是對進攻行動的削弱。拿著我們槍支的士兵需要得到保護和珍惜。讓我們制定策略來避免戰場上的損失。特轄軍的莎蓮娜·拉里奧諾夫娜可以領導這項行動，她是步兵領域的專家。"
 MRU_Innovate_Defensive_Plans:0 "創新防禦計劃"
 MRU_Innovate_Defensive_Plans_desc:0 "戰爭是千變萬化的。為了應對新技術和新戰術，我們需要想出自己的防禦方法。保留有效的策略，並更換無效的策略。"
 MRU_Mine_Their_Approach:0 "在他們必經之路佈雷"
 MRU_Mine_Their_Approach_desc:0 "效率往往是不道德的。到處設下一些陷阱將使愚蠢到落入陷阱的敵人被炸成肉醬。也許這是不道德的，但戰鬥必須贏下。畢竟，在大戰已經結束後，歐洲人把地雷留在我們家園時，哪裡有什麼道德可言？"
 MRU_Ambush_Strategies:0 "伏擊策略"
 MRU_Ambush_Strategies_desc:0 "排成直線行軍的傳統早已一去不復返。出其不意的元素至關重要。就像在獵殺麋鹿時屏住呼吸一樣，獵殺敵方士兵也沒有什麼不同。等待他們進入視線，並在他們知道你存在之前開火。"
 MRU_Every_Mile_Costs_European_Blood:0 "每一英里都要以歐洲人的血肉為代價"
 MRU_Every_Mile_Costs_European_Blood_desc:0 "戰爭中死亡是不可避免的，那我們為什麼要避免它？俄羅斯人的鮮血很珍貴，就像一滴毒藥。讓歐洲干涉區(EIZ)喝下去，直到他們疲憊地倒地死去。我們的土地唯獨屬於我們，而他們再次玷污了它。他們只有在鋪滿自己屍體的情況下才能奪走它。"
 MRU_Infantry_Anti-Tank_Weapons:0 "步兵反坦克武器"
 MRU_Infantry_Anti-Tank_Weapons_desc:0 "坦克在現代戰爭中已變得司空見慣。我們應該妥善裝備我們的部隊以對抗裝甲師，否則他們將化為紅色的塵土，我們的防線將會崩潰。"
 MRU_From_Trains_To_Trucks:0 "從火車到卡車"
 MRU_From_Trains_To_Trucks_desc:0 "補給是戰爭中的一切。補給越少，我們單位的戰鬥力就越低。我們需要確保我們的生產處於綠色安全狀態，並且我們的補給路線暢通。我們可以在軍隊中建立一家後勤公司並創建一支卡車車隊，從而優化我們的生產。我們對火車的依賴正在拖累我們。用拿破崙的話來說，勢頭（momentum）贏得戰爭。"
 MRU_Unit_Autonomy_Doctrine:0 "單位自治學說"
 MRU_Unit_Autonomy_Doctrine_desc:0 "我們的將軍們無法期望控制戰場的方方面面。人的因素是最重要的。在關鍵的戰鬥中，無論面對何種情況，我們的士兵都需要能夠自己即時做出明智的決定。"
 MRU_Enhance_Artillery_Mobility:0 "提高火砲機動性"
 MRU_Enhance_Artillery_Mobility_desc:0 "不便的裝備拖慢了我們火砲師的速度。我們可以對它們進行一些調整，以便為它們提供維持戰線和向前推進所需的速度。在我們的移動火砲上增加一些冰刺輪胎將使我們能夠在惡劣的條件下移動得更快。甚至一些簡單的擋泥板也無妨。我們將把機動性轉化為我們的優勢。"
 MRU_Push_Object_550_Into_Production:0 "將550工程投入量產"
 MRU_Push_Object_550_Into_Production_desc:0 "俄羅斯坦克是些老古董，過時且不堪一擊。我們迫切需要升級我們的裝備，以達到與歐洲鋼鐵相同的標準。我們最新的俄羅斯製造設計——550工程，一旦我們將其納入我們的生產線，將解決這個問題。"
 MRU_Drive_Them_Out_Of_Russia:0 "把他們攆出俄羅斯"
 MRU_Drive_Them_Out_Of_Russia_desc:0 "我們軍隊的戰鬥力迅速提升。我們機動靈活、堅韌且做好了準備。出擊的時刻就是現在。我們的軍隊終於有了一些值得驕傲的本錢，我們終於可以向西推進，收復俄羅斯數十年來未曾擁有的東西。我們的祖國俄羅斯。他們先是奪走了我們的憲法，然後又奪走了我們的首都，再也不會這樣了。這是歐盟最後一次決定我們的未來。"
 MRU_Finish_placeholder:0 "勝利終將屬於我們"
 MRU_Finish_placeholder_desc:0 "我們的軍隊已經完成了現代化，達到了標準。憑藉著對沙皇的高雅與無比忠誠，我們將擊敗邊境上的篡位者，並在合理屬於我們的土地上進軍。沙皇萬歲！"
 MRU_Wrestling_The_Economy:0 "重整經濟"
 MRU_Wrestling_The_Economy_desc:0 "經濟事務迫切需要關注。我們幾乎沒有工業，而且我們的技術比歐洲干涉區(EIZ)落後了數十年。專注於其中一個問題應該能讓我們相對較快地改進它，但選哪一個呢？"
 MRU_Seize_Oligarchs_Wealth:0 "沒收寡頭財富"
 MRU_Seize_Oligarchs_Wealth_desc:0 "共和國容許這些水蛭吸食祖國的所有鮮血有多久了？這是一種令人鄙視的腐敗行為。那些資金本是為了讓政府使國家繁榮昌盛的。立刻沒收他們的資產。"
 MRU_Anti-Corruption_Drive:0 "反腐運動"
 MRU_Anti-Corruption_Drive_desc:0 "我們絕不能再次讓俄羅斯淪為可恥貪婪的犧牲品。讓我們的人民知道我們堅決反對濫用預算，讓寡頭們知道自己的分寸，如果杜馬越界，就提醒他們。"
 MRU_Rule_Of_Managers:0 "經理人統治"
 MRU_Rule_Of_Managers_desc:0 "管理我們資金的人應該為任何濫用行為負責。因此，應該制定一系列保護動盪的俄羅斯經濟的法律。"
 MRU_Expand_On_Our_Industrial_Power:0 "擴大我們的工業實力"
 MRU_Expand_On_Our_Industrial_Power_desc:0 "如果我們付出努力，我們可以把葉卡捷琳堡變成一個運轉良好的戰爭機器。在消耗戰中，工業是王者。如果我們的產量能超過歐洲干涉區(EIZ)，當他們的槍支打光子彈時，我們就將向莫斯科進軍。戰爭將從一場血洗變成一場輕鬆的散步。"
 MRU_Centralize_The_Rail_Networks:0 "集中鐵路網絡"
 MRU_Centralize_The_Rail_Networks_desc:0 "為了使我們的鐵路更容易管理，我們應該在一個地方管理它們。如果甚至只有一條鐵路被切斷與前線的聯繫，那整個地區都可能失守。前幾屆執政政府忽視了烏拉地區的鐵路，使其發展不足。我們的國家不會忽視如此重要的網絡。通過創建一家鐵路公司，我們可以提高整個地區鐵路的質量。"
 MRU_Northern_Resource_Extraction:0 "北部資源開採"
 MRU_Northern_Resource_Extraction_desc:0 "北方資源豐富。我們應該在該地區啟動一些開採行動，收穫土地資源來為我們的戰爭提供燃料。"
 MRU_Massive_Industrial_Grants:0 "巨額工業補貼"
 MRU_Massive_Industrial_Grants_desc:0 "我們的工業需要適當的資金才能繁榮。讓我們為地方工業提供廣泛的資金支援，以在葉卡捷琳堡及其外部縣區內改進和擴張。"
 MRU_Military_Factory_Conversions:0 "軍用工廠改建"
 MRU_Military_Factory_Conversions_desc:0 "在戰爭時期，平民經濟不能被視為與軍事同等重要。工廠更適合用來製造槍支和坦克，而不是烤箱。"
 MRU_Nationalize_The_Construction_Industry:0 "收歸國有建築業"
 MRU_Nationalize_The_Construction_Industry_desc:0 "我們建造新設施的速度毫無進展。這個問題必須儘快解決。如果建築業歸國家所有，而不是歸私營部門所有，那會更好。"
 MRU_Empower_The_Ministry_Of_Industrial_Development:0 "向工業部授權"
 MRU_Empower_The_Ministry_Of_Industrial_Development_desc:0 "葉卡捷琳堡已發展為一個工業重鎮，但我們不應該在取得領先後就止步不前。給予工業發展部更多權力，進一步加速我們的生產，同時為他們提供充足的資金，以維持我們快速的工業化進程。"
 MRU_Closing_Technological_Gap:0 "縮小技術差距"
 MRU_Closing_Technological_Gap_desc:0 "俄羅斯的技術基本上是由歐洲淘汰下來的二手貨組成的，這早已不是什麼祕密。這很不公平，但事實就是如此。然而，我們不是懦弱的共和派。如果我們為現代化分配足夠的資源，我們就有機會與歐洲干涉區(EIZ)匹敵。"
 MRU_Refining_Advanced_Materials:0 "提煉先進材料"
 MRU_Refining_Advanced_Materials_desc:0 "我們的提煉工業十分匱乏，因此我們缺少先進材料，這將使我們在與歐洲干涉區(EIZ)的競爭中落敗。我們的槍支和火砲都很廉價，因為我們負擔不起其他東西。烏拉地區在精煉廠方面的投資從未很多。我們一直只是西部和西伯利亞之間的交通樞紐。讓我們擴大我們的精煉工業以彌補這一事實。"
 MRU_Electronics_And_Communications_Modernization:0 "電子與通訊現代化"
 MRU_Electronics_And_Communications_Modernization_desc:0 "我們的通訊系統需要升級。協調是戰鬥中的一個重要方面。資訊可以決定一場戰鬥的勝負。沙皇的計劃是成立一家以電子為核心的國營公司。具體而言，是應用於通訊的電子產品，特別是在軍事領域。不過，這將有助於我們國家整體的數字現代化。"
 MRU_Modernizing_Our_Military_Industry:0 "現代化我們的軍事工業"
 MRU_Modernizing_Our_Military_Industry_desc:0 "總體而言，工業需要得到改進。我們的產量不足以贏得戰爭。我們需要追趕上敵人並在生產上超越他們。也許我們可以在烏拉地區開放一部分軍事基礎設施，使生產更接近前線。然而，它們仍應對歐洲干涉區(EIZ)的耳目保持隱蔽。"
 MRU_Automate_Factory_Lines:0 "自動化工廠生產線"
 MRU_Automate_Factory_Lines_desc:0 "即使是微小的改變也能提高生產效率。效率越高，我們軍隊的補給就越充足。我們工廠的自動化將顯著加快生產速度。"
 MRU_Hire_Engineers_And_Researchers:0 "聘請工程師和研究人員"
 MRU_Hire_Engineers_And_Researchers_desc:0 "有許多聰明的人才可以在帝國的技術努力中做出貢獻。他們留在研究實驗室比去前線更有價值。讓我們把他們的好奇心投入到有益的用途上，而不是將他們徵召入伍。當然，他們會很感激能被免除兵役，並為在沙皇麾下服務而感到無比高興。"
 MRU_Empower_The_Ministry_Of_Trade_and_Technologys:0 "向貿易與技術部授權"
 MRU_Empower_The_Ministry_Of_Trade_and_Technologys_desc:0 "多虧了他們在技術上的進步，貿易與技術部使葉卡捷琳堡成為一股不可忽視的力量。隨著我們過時的裝備被淘汰，我們現在可以說我們與其他國家平起平坐了。最好賦予貿易與技術部獨立工作並自己做決定的能力，儘管沙皇將擁有最終決定權。"
 MRU_An_Economy_Tamed:0 "受控的經濟"
 MRU_An_Economy_Tamed_desc:0 "奇蹟般地，我們的經濟實際上已經重回正軌。共和國式的腐敗已成為過去，我們可以安心地知道我們經濟的未來是穩定的。"
 MRU_Our_Sovereignty_Secured:0 "我們的主權得到保障"
 MRU_Our_Sovereignty_Secured_desc:0 "歐洲干涉區(EIZ)已被迫撤出俄羅斯。戰爭終於勝利了。沙皇回歸，我們的獨立得到了保障，我們的實力是不可逾越的。俄羅斯再次擁有了金雕的力量。隨著莫斯科的收復，羅曼諾夫家族的家園已在我們的控制之下，我們的正統性不容置疑。剩下的就是處理我們東方的紅色西伯利亞人和背叛的歐洲不列顛尼亞人問題。"
 MRU_britannia_spreads_its_influence:0 "不列顛尼亞擴大其影響力"
 MRU_britannia_spreads_its_influence_desc:0 "紅軍已被歐洲不列顛尼亞人擊敗。西伯利亞恢復了和平，俄羅斯不再處於戰爭狀態。然而，它仍然不完整。它被兩個帝國從中剖開。"
 MRU_socialism_lives_and_breathes:0 "社會主義永存"
 MRU_socialism_lives_and_breathes_desc:0 "西伯利亞人民共和國已將歐洲不列顛尼亞逐出俄羅斯。不列顛尼亞不再佔領俄羅斯的土地。那片土地完全屬於西伯利亞人民共和國。如果提出結盟，也許我們可以找到一種方法，將他們的理想主義融入我們自己的理想中。"
 MRU_tsar_intervenes_in_the_east:0 "弗謝沃洛德干涉東方"
 MRU_tsar_intervenes_in_the_east_desc:0 "東方的戰爭是一個機會。由於我們戰勝了歐洲干涉區(EIZ)，我們現在可以開始支持我們東方的國家之一。哪一個？紅色之熊還是不列顛尼亞之蛇？"
 MRU_backing_the_siberians:0 "支持西伯利亞人"
 MRU_backing_the_siberians_desc:0 "西伯利亞人民共和國憑藉其理想主義可能對我們有用。他們的領袖索尼婭·布尼娜和我們一樣，都希望俄羅斯能得到最好的發展。她樂觀地認為，社會主義政府可以為人民服務。"
 MRU_lend_the_urals_industrial_might:0 "賦予烏拉工業實力"
 MRU_lend_the_urals_industrial_might_desc:0 "我們可以為社會主義者提供他們所需的東西，以提高他們的工業能力。經驗豐富的工程師和工人將極大地幫助他們的產能達到其最大潛力。"
 MRU_tsarist_fueled_red_war_machine:0 "沙皇燃料驅動的紅色戰爭機器"
 MRU_tsarist_fueled_red_war_machine_desc:0 "裝備和燃料是他們所需要的。純粹的戰鬥力在目前是最重要的，所以讓我們給他們所需的東西。槍支、火砲和卡車。最重要的是，還需要燃料來讓他們在寒冷的西伯利亞嚴冬中保持行軍。"
 MRU_eagle_grants_bear_wings:0 "雕授予熊之翼"
 MRU_eagle_grants_bear_wings_desc:0 "儘管存在意識形態上的分歧，但我們與西伯利亞人民共和國在一件事上達成了共識。我們絕不容忍不列顛尼亞人玷污我們的家園。它屬於我們，而不屬於不列顛尼亞皇帝。"
 MRU_let_gods_revolution_fuel_us:0 "讓上帝的革命為我們提供動力"
 MRU_let_gods_revolution_fuel_us_desc:0 "我們可以派遣一些志願軍給紅軍，以幫助他們鞏固前線。我們的隊伍中有退伍軍人。通過一些反歐洲不列顛尼亞人的宣傳，他們將願意幫助我們的紅色兄弟姐妹為俄羅斯而戰。"
 MRU_rip_apart_the_lions_leash:0 "撕碎獅子的韁繩"
 MRU_rip_apart_the_lions_leash_desc:0 ""
 MRU_goodbye_far_east_communication:0 "再見，遠東通訊"
 MRU_goodbye_far_east_communication_desc:0 "在現代戰爭中，通訊是關鍵。沒有它，多米諾骨牌就會倒下，抵抗運動可能會失控。通過禁用歐洲不列顛尼亞的通訊網絡，我們可以激發俄羅斯東部和西伯利亞的抵抗運動。然後，他們將需要打兩場戰爭。一場對抗西伯利亞人民共和國，另一場對抗他們自己。"
 MRU_stalling_their_offensive:0 "拖延他們的攻勢"
 MRU_stalling_their_offensive_desc:0 "讓歐洲不列顛尼亞人體驗地獄吧。讓他們知道面對十倍實力的敵人意味著什麼。他們將了解到西伯利亞人民不會輕易放棄，向外國勢力低頭的叛徒只會面臨俄羅斯的無盡怒火。"
 MRU_send_the_britannians_home:0 "送不列顛尼亞人回家"
 MRU_send_the_britannians_home_desc:0 "歐洲不列顛尼亞人是叛徒。一個向非俄羅斯血統的外國皇帝低頭的政府。他們和幾十年前把我們國家割讓給歐洲的共和派沒有兩樣。讓他們腐爛並自我崩潰吧。通過鮮血，他們將學會永遠不要再背叛俄羅斯。"
 MRU_backing_the_euro_britannians:0 "支持歐洲不列顛尼亞人"
 MRU_backing_the_euro_britannians_desc:0 "作為半個不列顛尼亞人，沙皇與歐洲不列顛尼亞結盟是合情合理的。他們的軍事實力也很強大，擁有新時代的Knightmare。如果我們想避免被入侵，我們應該與不列顛尼亞保持積極的關係。"
 MRU_carry_the_far_east:0 "支撐遠東"
 MRU_carry_the_far_east_desc:0 "任何軍隊的脊樑都是工廠生產的武器。如果歐洲不列顛尼亞人希望能擊敗紅軍，就必須加強這一脊樑。如果我們派遣機械師和建築師，他們的工業可以增長得更快，特別是如果我們也為他們提供所需的工具。"
 MRU_stock_from_the_imperial_armory:0 "帝國軍械庫的庫存"
 MRU_stock_from_the_imperial_armory_desc:0 "歐洲不列顛尼亞可能需要一些裝備和燃料。可以安全地假設他們這兩樣都很缺乏。我們有一些舊槍支和火砲，他們能比我們更有效地利用它們。"
 MRU_eagle_and_lion_united:0 "雕與獅的聯合"
 MRU_eagle_and_lion_united_desc:0 "不列顛尼亞人在流亡期間長期保護著皇室。是時候回報這一恩情，團結起來對抗西伯利亞熊了。兩個帝國共同對抗企圖發動第二次革命的社會主義者。"
 MRU_imperial_reinforcements:0 "帝國援軍"
 MRU_imperial_reinforcements_desc:0 "我們將為歐洲不列顛尼亞人提供純粹的人力，以加強他們對抗革命者的前線。即使他們不能駕駛Knightmare，我們仍然可以提供人手幫忙。戰爭是由男女贏得的，而不是花哨的機器。"
 MRU_siberians_little_hell:0 "西伯利亞人的小地獄"
 MRU_siberians_little_hell_desc:0 "通過在紅軍接管的被佔領邦煽動抵抗運動，我們可以間接地破壞他們的基礎設施和工業，從內部摧毀他們。西伯利亞的抵抗程度本就很激烈。通過一點聰明的宣傳，很容易進一步煽風點火。奧克拉納可以用於協助此事。"
 MRU_the_death_of_revolution:0 "革命的死亡"
 MRU_the_death_of_revolution_desc:0 "紅軍上次試圖發動革命時難道沒有吸取教訓嗎？對共產主義的另一次暴力消滅即將到來。西伯利亞人民共和國將親自感受到大戰波及的無窮怒火。"
 MRU_siberians_winter_burning:0 "西伯利亞寒冬燃燒"
 MRU_siberians_winter_burning_desc:0 "另一場革命失敗了。大戰本應是一個教訓，但他們沒有從中吸取教訓。現在他們的國家陷入火海，他們只能怪自己試圖復活一個早已死亡的運動。讓他們體驗與馬克西姆·卡圖寧相同的宿命。"
 MRU_siberia_burns_and_now_we_wait:0 "西伯利亞燃燒，現在我們等待……"
 MRU_siberia_burns_and_now_we_wait_desc:0 "我們已經押了注，現在我們只能堅持下去，希望我們提供的力量足以維持他們並贏得戰爭。一個將會倒下，另一個將取得勝利。一旦這發生，我們就可以開始對勝者採取行動。"
 MRU_An_Imperial_Coronation_EU:0 "帝國加冕典禮"
 MRU_An_Imperial_Coronation_EU_desc:0 "佔位符"
 MRU_Return_To_The_Winter_Palace_EU:0 "回歸冬宮"
 MRU_Return_To_The_Winter_Palace_EU_desc:0 "佔位符"
 MRU_Relocate_Our_Institutions_EU:0 "搬遷我們的機構"
 MRU_Relocate_Our_Institutions_EU_desc:0 "佔位符"
 MRU_Arrival_Of_The_Hapsburg_Princess:0 "哈布斯堡公主的到來"
 MRU_Arrival_Of_The_Hapsburg_Princess_desc:0 "佔位符"
 MRU_the_zinnan_wedding:0 "辛南婚禮"
