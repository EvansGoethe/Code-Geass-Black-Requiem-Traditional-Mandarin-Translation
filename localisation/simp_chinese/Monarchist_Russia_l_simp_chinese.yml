 MRU_grand_ball.23.t:0 "Bindings Made Free"
 MRU_grand_ball.23.d:0 "“Wedding... I don't understand,” Vsevolod held his head in his hands, traumatized by Sylvia's blatant advances to marry him.\n“Do you not want to? I believe we would make a good pair, you and I,” Sylvia leaned closer. “Besides, that's why you're here, isn't it?”\nShe caught on fast, Vsevolod thought. Although, he couldn't just marry some woman he didn't know. “Listen, you're great, but things are moving kind of fast-” Vsevolod was interrupted.\n“Why don't we head outside for some fresh air?” As she said this, Vsevolod noticed many strange looks targeted at the pair.\n“Alright,” Vsevolod sighed, then the two stood up and exited the building. They found themselves in the courtyard, Sylvia sitting at the edge of the central fountain.\n\nShe moved her hair out of her face which had been disturbed by a gust of wind. “You feel pressured, don't you, Vsevolod?” Sylvia said using his given name as if it were a matter of course.\nVsevolod looked off to the side. “What are you saying now?”\n“I can understand the pressure of marriage. It's something I've personally become accustomed to,” Sylvia said with a more serious tone. “There was a point that I thought it was a cruel weight to be placed on me.”\nVsevolod looked back at her. “Are you saying you don't want to get married either?”\nSylvia shook her head. “I eventually realized I didn't have to let it weigh me down, that rather than abandoning my obligations, I could take control of them. If I have to get married, why not make the choice for myself?”\nVsevolod's eyes widened. “You barely know me, Sylvia.”\n\nWith an empathetic tilt of her head, Sylvia responded, “But I know the Tsar, Vsevolod. I know the Russian people. I know that they are one in the same. It's been a long time since I grew to love this country for all its flaws and beauties. I thought that if I could love anyone, it would be the man who embodies the Russian spirit.” The fountain shot pillars of water behind Sylvia for a brief moment, moonlight reflecting off the clear liquid.\nThe Tsar thought for a moment, his eyes on Sylvia. If this weight he felt crushing him was one he could avoid, while also not abandoning the obligations placed upon him, could he be happy? Would that happiness be possible with this woman he just met? If that was an option available to him..."
 MRU_grand_ball.23.a:0 "Then allow me to take you as my wife."
 MRU_grand_ball.23.b:0 "Sylvia Denied"
 MRU_grand_ball.24.t:0 "Peaceful Silence"
 MRU_grand_ball.24.d:0 "The two stood in shocked silence for a moment and the grand ball could be heard from downstairs. Selena's mouth was open as she stared at him. As usual, her easily flustered personality remained. Vsevolod maintained eye contact with a sense of nervousness, praying he did not just embarrass himself. Despite having known each other for so long, this kind of tension and inability to be honest of their own feelings lasted. However, it was broken by Vsevolod's words he just now spoke.\nVsevolod cast his gaze downward. “If you don't feel the same, please forget this.” His voice shook as he began to turn towards the door.\nBefore he could start to leave, Selena reached out and grabbed the sleeve of his jacket. “Don't leave!” she blurted out as the Tsar turned around. “Please, stay here.” Both their faces were bright red, neither used to this kind of interaction. Vsevolod turned back around to face her. “If the Tsar would allow it...” Selena started. “Then I do feel the same.”\n\nVsevolod's heart skipped a beat. They stood close together, not unusually, but this time it felt different. He took a breath before speaking. “You don't mind that I'm the Tsar?”\n“I don't mind,” Selena did not hesitate, her embarrassment turned to conviction. “I would marry you even if you weren't.” After Selena said this, she caught herself and put her hand over her mouth. “Not that we have to get married!”\nVsevolod's eyes went wide, before he let out a laugh, breaking the tension. He exhaled deeply, the weight lifted from his chest. “At least we're on the same page.”\n“We are?” Selena said. “Wait, does that mean-”\nVsevolod nodded. “Yes, if it's alright with you, I would not be opposed to marriage. That gets me out of having to marry a stranger.”\nSelena pinched his arm as he yelped with pain. “Don't say it like that!”\n“I'm sorry!” Vsevolod winced. “I wouldn't want to marry anyone but you, believe me.”\nSelena nodded with an undeniable blush still present on her cheeks. “That's right.”\n\nA smile formed on Vsevolod's face. The room fell into silence once more, but no longer a tense silence. Rather, they were now enjoying each other's company as per usual. Still, it was different now. Long over a decade of friendship where their true feelings could never be said came to an end in a matter of minutes. As the room was silent with only the distant sound of classical music, Vsevolod and Selena locked eyes. The awkwardness was gone now and only one thing was left on both of their minds. No communication was made. In a single moment of certainty between the two, both leaned towards each other at once and as the crescendo finalized..."
 MRU_grand_ball.24.a:0 "Their lips met."
 MRU_grand_ball.24.b:0 "Selena Denied"
 MRU_grand_ball.25.t:0 "Night to Remember"
 MRU_grand_ball.25.d:0 "Vsevolod and Sophia had been chatting in the storage room for a few minutes, exchanging jokes and finding crates to sit on that were the least uncomfortable. Despite the awkwardness of being two nobles hiding away in a room full of potato boxes from the noise of the party, the aura in the air was relaxed and enjoyable.\nSophia was being louder than Vsevolod the more comfortable she got, not worried about anyone watching or listening. Her mask began to slip as she got less ladylike, leaning back on the crate and slipping her shoes off halfway, dangling off the end of her toes.\nFrom around the corner of a crate in front of the two, a cockroach too big and horrific to be left alive emerged. Sophia let out a shriek as she held onto Vsevolod and Vsevolod wasn't much better, yelling as if it were a demon. Sophia laughed at Vsevolod for his show of weakness, but Vsevolod made up for it by lunging towards it and crushing it beneath his boot. It twitched, clearly still alive, but it was now incapacitated.\n\nSophia breathed a sigh of relief. “Truly a hero,” Sophia said sarcastically.\nVsevolod turned around with a wobble, giving a sarcastic bow before leaning down and putting his hands on his knees, exasperated. He crouched down with ruined hair and a bedraggled look in front of Sophia who was leaning back on the crate, her dress having been rustled over time, looking equally degraded.\nAt that moment, the door to the storage room swung open and standing in the doorway was Selena of the Oprichniki. There she saw the two unconvincingly nobles, one crouched down in front of the other who was leaning back. The scene was too suspicious for Selena to just ignore and leave. Her face was red as she stormed in.\n“What are you doing Vsevolod, you dog!” she yelled before pulling him up by the scruff of his neck.\n“What are you talking about?” Vsevolod said, a look of fear in his eyes. “We just wanted some privacy! Give us a break.” He blurted out as Selena held her breath out of shock.\nSophia waved her hands in front of herself. “It's not what it looks like! Vsevolod wasn't doing anything uncouth! Other than crushing that cockroach...” she pointed at the twitching insect.\n\nAfter a few minutes of clarification, the three were finally at an understanding that nothing perverted happened. Sophia's face was fully red as well as Selena's. Sophia had trouble looking at anyone. “I was searching all over for you, Vsevolod,” Selena said.\nVsevolod and Sophia looked at each other. Neither wanted to take responsibility for causing trouble. “Well you can relax,” Vsevolod said. “I was just getting her away from the crowds of people.”\nSelena had a hand on her chin and nodded, her face still red. “Of course, Vsevolod wouldn't do anything with a woman he wasn't even married to...”\nAnother lightbulb appeared above Vsevolod's head. He took in what Selena said and had been saying all night, then looking at Sophia's face. Though it wasn't clear until now, he knew whose company he had been enjoying for the entirety of the ball. The woman who he felt most comfortable with. After a moment of thinking and building up the courage, he spoke. “Sophia...”"
 MRU_grand_ball.25.a:0 "I have a proposal to make."
 MRU_grand_ball.25.b:0 "Sophia Denied"
 MRU_grand_ball.26.t:0 "Mutual Understanding"
 MRU_grand_ball.26.d:0 "After Kulakov and Selena had left the two alone in the office, Vsevolod and Sonya were able to speak without interruption. “I did not expect you to dismiss your guard,” Sonya began.\nVsevolod leaned forward with his hands clasped together. “If you were intent on killing me tonight, you would be facing the entirety of my guard in this building. Even if we are alone, I am not unguarded, so to say.”\nSonya gave an amused smile. “Let us talk at ease, then.”\nVsevolod nodded, glaring from over his hands which rested in front of his face. “This marriage, does it not go against the values you reds hold so dear? You are not a royal, nor are you... well, pardon the assumption, but you and your comrades don't seem like the types to compromise.”\n“And you are? I did not take you for someone to compromise with how you handled those nationalists,” Sonya mused.\n\nVsevolod sighed, leaning back and giving a smirk to drop his royal facade. “Perhaps we misunderstand one another then. Sonya, this marriage was not your idea, right?”\nSonya cast her gaze downward momentarily, telling Vsevolod all he needed to know. “It was not, though I understand the benefits that come with it. Perhaps this makes me a fool, but I think it would be selfish to prioritise my own future over the future of my nation. Do you not feel the same?”\nVsevolod thought about what she said for a moment. Was it his own happiness he valued over the future of his nation? Perhaps it was not simply royal duty he felt bound by. This was simply what it meant to take the role of a leader. To sacrifice yourself for the benefit of your people, their futures, and the future of your empire. Whether or not he was born into that role, having taken it upon himself, these were his obligations. He let out an exhale, sitting up straight once more. “Alright, I understand. Let us discuss the details before I change my mind.”\nSonya gave a smile, one of mutual understanding. “Let us shake on it, then.” She stood up and reached out her hand. Vsevolod hesitated for just a moment, before reciprocating. With a proposal more reminiscent of a deal between politicians, the two took each other's hands in marriage."
 MRU_grand_ball.26.a:0 "What they lack in love, they make up for in leadership."
 MRU_grand_ball.26.b:0 "Sonya Denied"
 MRU_intervention.1.t:0 "The Eastern War"
 MRU_intervention.1.d:0 "“Hey, eat your own food!” Tatiyana yelled at Ilyana next to her who stole a bread roll from her plate.\n“I already finished mine.” Ilyana shoved the bread into her mouth without care. Tatiyana nearly knocked over her wine glass full of coffee trying to grab it back from her.\nTsar Romanov sat at the far end of the table, his Oprichniki all sat around the table. Since arriving in Moscow, things have been relatively calmer. No longer having to fight a war with the EIZ and the home of the Romanov's liberated, Vsevolod could breathe a sigh of relief. Vsevolod glanced to his right, where Selena sat. She held a stack of documents while eating her soup, managing to not drip anything onto the precious paper. “This is supposed to be a celebration, you know,” Vsevolod remarked while looking at the papers in her lap.\n“There's hardly time for celebration with the countries fighting on our eastern border.”\n\nVsevolod nodded. “I know. Maybe even I would like to escape it for a moment...” He let out a sigh, standing from his seat and tapping his glass with a fork to grab everyone's attention. “Everyone, I would like to bring something up.” The Oprichniki all sat upright, Ilyana with a piece of bread in her mouth still. “We have expelled the EIZ from our lands and that is thanks to the efforts of everyone here. I would like to celebrate as much as we wanted, but I'm sure you all realise the threat to our east.” Everyone nodded in agreement. “I apologise for bringing up boring politics here, but we need to make a choice. Who will we send support to? One of these nations will fall and we have the opportunity to choose who comes out on top.”\n\nVoronov crossed his arms and spoke first. “The question is, who's the bigger threat? The answer will always be the Euro-Britannians, even if they aren't Britannia themselves. As long as they have a hold on Russia, they're going to push it and claim the rest.”\nIlyana desperately swallowed the bread roll she was chewing on, downing her glass of water and slamming it on the table. “Bullshit! I won't side with socialism! Down with the reds!”\nRobert stood from his seat. “Now hang on… We're not bowing to another emperor like the Euro-Britannians did. I came to Ekaterinburg to follow Vsevolod. Not Britannia.”\n“Come on Robert, you should be used to being a lapdog for another country by now,” Ilyana let out a mocking laugh.\nMaksim put his hand up, although not waiting for permission to speak. “That's enough. We're not here to throw petty insults.” He looked at Vsevolod, who had lowered his head. “Your majesty? Your opinion should come first.”\nTsar Romanov lifted his head and said..."
 MRU_intervention.1.a:0 "We won't bow to a foreign emperor."
 MRU_intervention.1.b:0 "Britannia treated us well."
 MRU_intervention.2.t:0 "Aid From Ekaterinburg"
 MRU_intervention.2.d:0 "Subject: Support Against Euro-Britannia\nFrom: Vsevolod Romanov\nTo: Politburo of the Siberian People's Republic\n\nIn regards to the war the Socialist People's Republic faces against Euro-Britannia and its supporters, the Principality of Ekaterinburg wishes to provide aid in defence and finances. In the name of Tsar Vsevolod, I humbly hope you accept this support and that the wishes of our two nations align. Britannia and its colonies cannot be allowed a foothold in the heartland of Russia. For the combined effort against foreign empires, glory be to Russia."
 MRU_intervention.2.a:0 "This support will ensure a future for Russia."
 MRU_intervention.3.t:0 "Tsar Vsevolod Sends Aid"
 MRU_intervention.3.d:0 "Subject: Battle Against Communism\nFrom: Vsevolod Romanov\nTo: Augusta Henry Highland\n\nI, Tsar Romanov, request that Euro-Britannia may allow foreign aid from the Principality of Ekaterinburg both economically and militarily. The rebirth of communism in the Siberian People's Republic cannot be allowed to continue, for it would mean allowing their ideals to spread beyond their borders. Allow us to support your nation in its fight against the red threat. I humbly await your response."
 MRU_intervention.3.a:0 "From one monarch to another, we accept."
 MRU_intervention.5.t:0 "A Change of Course"
 MRU_intervention.5.d:0 "Freezing winds swept the snowflake through the thin atmosphere. Not a thing alive breathing in the air so high, only the undisturbed weather. This little flake of snow drifted mindlessly with such lack of weight that it swayed from side to side as it fell, following the breeze. It was carried by that cold Russian wind in order to paint the landscape white. Green forest with snow capped leaves below was where it was headed. The natural beauty of unchanging pure white. This snowflake would add to the thick colorless carpet that had been laid out.\n\nHowever, it was with a thunderous wave of distant sound that came a man-made abomination of steel, soaring past the drifting flake. A gust of wind sent the snowflake into a swirling flurry, before being dragged in the opposite direction it was headed. No longer lush forest coated in snow below it, but the view of a surface to air missile colliding with a human city. Flames spewed from the structures and rubble thrown around. This city was ablaze, vehicles pouring into it one by one.\n\nNothing would stop the snowflake's trajectory as it fell deeper into the atmosphere. The air was thick now with suffocating smoke, no longer clear as it was before. Before anything would disturb the course it was on, the snowflake fell with certainty towards the inferno below. Orange flames dancing below it, the snowflake began to feel the heat and its unique shape started to melt out of this world. From frozen ice, to cold water that then dropped into the flames and evaporated. The snowflake's journey was complete as it melted away entirely, absorbed by the flames."
 MRU_intervention.5.a:0 "Now we wait."
