 MRU_the_grand_ball:0 "盛大舞會"
 MRU_the_grand_ball_desc:0 "弗謝沃洛德沙皇沒有妻子，因此也沒有王位繼承人。作為一個沒有皇室家庭的君主，他國家的未來異常脆弱。一顆子彈就會讓俄羅斯的王座空置。為了消除這種可能性，只有一個辦法。將舉行一場盛大舞會，弗謝沃洛德沙皇將在舞會上尋找他的終身伴侶，並確保他的血脈得以延續。"
