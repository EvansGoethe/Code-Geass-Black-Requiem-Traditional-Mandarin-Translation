 MRU_vsevolod_romanov_desc:0 "「作為帝國羅曼諾夫皇室血脈的後裔，弗謝沃洛德·羅曼諾夫是一個安靜而狡黠的年輕人。他出生於不列顛尼亞，母親是夏洛特·考威爾·羅曼諾夫——一位不列顛尼亞人，父親則是俄羅斯最後一位沙皇之子亞歷山大·羅曼諾夫。由於他的父親在大戰期間被迫流亡，弗謝沃洛德從未踏足過俄羅斯的土地。他與兒時的朋友塞蓮娜一起就讀於不列顛尼亞軍事學院，在學院期間他是一名令人矚目的學生，贏得了教職員工和其他優秀學生的讚賞與尊重。然而，由於性格內向，他幾乎沒有交到朋友。\n\n一天，一個名叫米哈伊爾·阿斯塔科夫的男子聯繫了弗謝沃洛德，鼓勵他回到俄羅斯以重建羅曼諾夫王朝的統治。在俄羅斯共和國崩潰後，弗謝沃洛德發現了機會並抓住了它，帶著他的沙皇特轄禁衛軍飛往葉卡捷琳堡。」"
 MRU_mikhail_astakov_desc:0 "「米哈伊爾·阿斯塔科夫是一位五十多歲的俄羅斯男子，他是一名民族主義者，認為俄羅斯應該團結在一個強大的領袖——最好是他自己——的領導下。他是一名學者，尤其擅長歷史，在防範重蹈覆轍上採取了極大的謹慎。令他非常懊惱的是，由於集團內部的明爭暗鬥，他的成年生活並沒有取得太大成就。然而，在俄羅斯共和國崩潰後，他利用其反共和的民粹主義運動，終於成功奪取了烏拉山脈的控制權。當他收到沙皇繼承人一直生活在不列顛尼亞的消息時，他迅速與這個年輕人取得了聯繫，企圖利用他來獲取合法性。」"
