 CIZ_phase_one.1.t:0 "聖誕奇蹟"
 CIZ_phase_one.1.d:0 "拉斯洛正埋頭處理自己的事務，全力把工作做完。他剛從桌上拿起一疊文件，舉起來在桌面上磕了磕，把整疊紙和每條邊都對得整整齊齊，這才得以停下來吐出一口氣，望向右邊牆上的時鐘。\"拉斯洛！奧斯卡瘋了！他不知為什麼正在大吼大叫地嚷嚷著聖誕節！\"接著他被打斷了——有人闖進了他的隔間，一臉驚慌地死死盯著他的眼睛，彷彿正在逃避什麼人的追趕。喊話的不過是另一名會計，一個年輕人。也許太年輕了，他看起來像是謊報了年齡才被派來這裡當會計的——不過那想法未免太傻了。拉斯洛一頭霧水，放下文件，一邊起身一邊語速飛快地說著，試圖在腦中理清頭緒。\n\n\"什麼——為、為什麼他會……他昨天才到任，才剛跟——開完會——\"這時他聽見了腳步聲，令人發狂的響亮腳步聲。一步接著一步，正是從那年輕人逃來的方向傳來的。年輕人一臉驚恐，與拉斯洛四目相對後又拔腿跑了起來，跑向拉斯洛，躲到他身後不肯出來，把他當作一面盾牌。拉斯洛微微回頭，偏過臉盯著他，心想究竟是什麼能讓一個人恐懼至此——然後他望向前方。他看見一個穿西裝的男人，一身色彩繽紛到令人發狂的西裝。剪裁倒是十分得體：西裝外套、西裝褲、一條漂亮的領帶。但顏色全然不對——紅、白、綠。聖誕節的顏色。就在這時，拉斯洛才把年輕會計話裡「聖誕節」那部分對上了號。他看著那男人清了清嗓子，抓住領帶整了整。拉斯洛望著他，卻看不清那人的臉——不知為何，只要一對上他的眼睛，就會被深深吸進去。男人開口了，而拉斯洛不得不聽。\n\n\"還請您不必為那點小事操心。\"他並沒有在提問，甚至讓人感覺他什麼都沒說。但那話語沉入了拉斯洛的心底，沉入了他的腦海。拉斯洛想著想著，一瞬間，他看見男人的右眼中浮現出一個紅色的形狀。一隻鳥的形狀，緋紅之鳥。拉斯洛還在注視著他，感覺自己的頭腦即將澄明，一切憂慮即將煙消雲散——但那神秘男子又多說了一句。\"事實上，我認為你們全體支持奧斯卡的使命，將大大有益於聖誕節。\"就在此刻，那隻鳥從男人的眼中消失了。而現在，拉斯洛的心澄澈無比，腦中只剩下一件事——他必須做的事。他向神秘男子答道。"
 CIZ_phase_one.1.a:0 "\"是……長官。\""
 CIZ_phase_one.2.t:0 "聖誕干預行動"
 CIZ_phase_one.2.d:0 "奧斯卡凝視著他的辦公桌，那枚小小的原型圓盤就擺在桌上。與平常會被送到他手上的東西不同——通常會是某個可運作的原型機，灰色的、金屬質感的東西。這枚圓盤卻很特別：側面是紅色的，邊緣是白色的，頂部用於投射全息影像的螢幕則是綠色的。自上任以來，他彷彿第一次心中再無疑慮、再無恐懼。他知道自己該做什麼。而當他這麼想時，他永遠不會注意到自己眼中閃過的那一抹紅光。他伸出右手，紅色西裝的衣袖此刻在他的皮膚上格外醒目。他啟動了圓盤，綠光傾瀉而下，將他籠罩其中。毫無疑問，它正常運作了，此刻正把他那副聖誕風格的尊容投放到曾經的俄羅斯、曾經的EIZ的每一寸土地上。\n\n\"歐洲介入區的人民們！\"話語洪亮，他的聲音響亮而清晰，以至於他覺得自己在辦公室外都能聽到這聲音，正自信地傳遍整個EIZ。\"我不再是你們短暫認識的那位總司令，奧斯卡·馮·門德爾是個虛假之人。如今站在這裡的，是我，奧斯卡·馮·克勞斯！我有了新的使命！\"有那麼一瞬間，他感到自己的手在顫抖，身體幾乎要從內部扭曲掙脫。但那只是一閃而過的瞬間，一閃而過的抵抗。為了壓制它，他雙掌重重拍在桌面上站起身來，狠狠將座椅向後推去，椅腳刮擦著地面。\n\n\"那就是將聖誕節的歡樂與禮物帶給全俄羅斯、傳遍全俄羅斯！\"他高舉右手揮舞起來，那隻手被強烈的光芒吞沒，聚焦其上。隨後他又猛地將手砸下，一聲巨響在桌面上砸出裂痕，木屑扎進手裡，鮮血開始滲出。\"從此刻起，歐洲介入區將更名為……\"\n\n他屏住呼吸，讓這光輝的時刻再多延續一秒。然後向全EIZ宣告了他們的新名字。為它命名。"
 CIZ_phase_one.2.a:0 "\"聖誕介入區！\""
 CIZ_phase_one.3.t:0 "獻給整個世界的聖誕節"
 CIZ_phase_one.3.d:0 "一步，又一步。奧斯卡向前走著，漆黑的長靴踏在金屬上發出沉重的聲響。他剛沿著一小段鐵絲網樓梯爬進這台原型機。從外面看，它彷彿生來就是一座巨大的金屬墳墓，一口等著奧斯卡走入其中的棺材。但當他在其中一步步前行時，他知道事實並非如此。他的面容看上去……已經崩壞，不復當初。他的頭髮如今幾乎全白，長鬚的白色垂落下來，與他西裝——他的新西裝——的白色毛邊融為一體。其餘部分的紅色在白色的映襯下格外鮮豔，黑色腰帶與金色帶扣將這一切連同寬鬆的紅褲一起繫在他身上。\n\n走到內門前，他伸手抓住把手，推開門，裡面是一個空曠的大房間。屋內唯一值得注意的，是那片泛著深綠色調的巨大玻璃地板。當他完全走入、關上身後的門，它便整個亮了起來。音響設備的電流聲滲入房間，讓他得以透過這套精心佈置的裝置向全世界發聲。此時玻璃顯露出它的真面目——一幅完整的世界地圖。渾然一色，盡數籠罩在深綠的色澤之下。奧斯卡踏上玻璃，隨即高聲宣告：\"全世界，注意了！\"音樂同時轟然灌入房間，真正把這一刻標記為所有人所熟知的世界的終結。音樂中充滿了低沉的唱詩班歌聲。奧斯卡繼續前行，任由自己沐浴在身旁深綠色的全息光芒中，直到他向前邁步、彷彿入水一般沒入其中。\"聽我宣告！我是奧斯卡·馮·克勞斯，CIZ總司令！我已征服俄羅斯，將其統一在我的介入之下！\"隨著他的話語，靴子底下的螢幕作出了回應。它標出了俄羅斯，CIZ的發源之地，插上了他們的旗幟——聖誕節之旗——隨後開始蔓延。如同病毒，一種令人作嘔、瘋狂扭曲的病毒。直到它覆蓋整個俄羅斯，將其烙印在同一面旗幟、同一個目標之下。\n\n\"有鑑於此，聖誕節現在把目光投向了別處！聖誕禮物與歡樂的傳播無可阻擋！\"話音落下，地圖變了——CIZ不再孤單。那些原本只是一片空白深綠的土地，此刻插滿了各大陣營的旗幟。中華之星、歐洲之鷹、不列顛尼亞的紋章。其餘的無足輕重。\"若有人膽敢反抗我的至高權威，就讓他們見識聖誕節毀天滅地的力量。\"說著，奧斯卡站到了腳下螢幕的正中央，CIZ開始從俄羅斯向E.U.、向中國蔓延。奧斯卡陶醉在自己掌握的力量之中——去完成交付給他的使命，由他的左右手所交付，而一切力量都源自那位本尊。聖尼古拉斯。\"從今天起，從此刻起，世界將屬於聖誕節！\"地圖上聖誕節令人作嘔的擴張、CIZ旗幟的蔓延開始吞噬一切。中華聯邦最先陷落，接著是E.U.——奧斯卡曾經稱之為家的地方化為烏有——隨後它跨越大海，與不列顛尼亞交戰，一路征服所經的一切。\n\n\"奧斯卡·馮·克勞斯告訴你們：服從聖誕節吧，公民們！服從聖誕節吧，世界！\"當奧斯卡宣佈這句話時，他開始聽到外面傳來微弱的聲音。聽上去像是微弱的歡呼，微弱而美妙的聖誕歡呼。他高舉雙手，音樂漸漸被一段優美的聖誕旋律取代，隨後被一句話——僅僅一句話——的呼喊聲淹沒。"
 CIZ_phase_one.3.a:0 "\"聖誕節萬歲！！！\""