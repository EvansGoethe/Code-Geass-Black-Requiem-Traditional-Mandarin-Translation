 CIZ_phase_one.1.t:0 "聖誕奇蹟"
 CIZ_phase_one.1.d:0 "Laszlo was minding his business, doing his best to get his work done. He had just picked up a stack of papers across his desk, raised them up and tapped them down. Neatly arranging the entire stack and all its edges, allowing him pause to let out a sigh, as he looked to the clock on the wall to his right. \"Laszlo! Oskar has lost it! He's ranting and raving about Christmas for some reason!\" Then he was interrupted, someone burst into his space and looked him dead in the eyes panicked, as if they were running from someone. The person who shouted was just one of the other accountants, a young man. Perhaps too young, he looked as if he lied about his age to get sent here to be an accountant but that was just silly. Laszlo was puzzled, placing his papers down and he started to stand up as he spoke rapidly, trying to get to the bottom of this in his mind.\n\n\"What- why why is he... He only got in yesterday, he just had his meeting with-\" Then he heard footsteps, maddeningly loud footsteps. One after the other, it came from where the young man was running from, he looked terrified, locking his eyes onto Laszlos he started running again, running towards Laszlo he got behind him and stayed there, using him like a shield. Laszlo turned back just a little bit, adjusting his head to stare at him. Wondering what could put such fear into a person, then he looked forward. He saw a man in a suit, a maddeningly colourful suit. It was tailored properly, suit jacket, suit pants, a nice tie. But the colours were just wrong, red, white, green. The colours of Christmas, that's when Laszlo locked onto the Christmas part about what the young accountant had said. He watched as the man cleared his throat, grabbing his tie and adjusting it. Laszlo looked at him, he couldn't see the man's face, for some reason as soon as he looked at his eyes he was just drawn into them. The man spoke, and Laszlo was forced to listen.\n\n\"Would you kindly not worry about that minor thing.\" He didn't ask a question, it felt like he didn't even say anything. But the words sunk into Laszlo's heart, sunk into his brain. Laszlo thought, for a second he saw a red shape in the man's right eye. The shape of a bird, the crimson bird. Laszlo was still watching him, it felt like his mind was about to clear, and all worries were about to be relieved but then the mysterious man spoke a bit more. \"In fact, I think it would serve Christmas well for you all to support Oskar in his mission.\" And that's when the bird disappeared from the man's eyes, and now. Laszlo's was clear, he had only one thing on his mind. What he had to do, he responded to the mysterious man."
 CIZ_phase_one.1.a:0 "\"Yes... sir.\""
 CIZ_phase_one.2.t:0 "聖誕干預行動"
 CIZ_phase_one.2.d:0 "Oskar stared at his desk, the small prototype disc sitting on top of it. Unlike what he would normally have been brought to him, perhaps a working prototype, something grey, something metallic. This disc was special, it was red on its side, and it was white on its edges. The screen on top of it, where the hologram would be displayed was green. For what felt like the first time since being appointed, he had no doubt in his mind, no fear in his mind. He knew what he had to do, and as he felt that. He would never notice the red glint around his eyes. Reaching his right hand out, the sleeve of his red suit now prominent against his skin. He would activate the disc, showering him in green light. No doubt it was working, and now showcasing his Christmas inspired visage across the entirety of what was once Russia, and what was once the EIZ.\n\n\"People of the Europian Intervention Zone!\" The words loud, his voice loud and crisp. To the point that he felt as if he could hear it outside of his office, spreading across in confidence to the entirety of the EIZ. \"I am no longer the Commander in Chief you briefly knew, Oskar Von Mendel was a false man. It is I, Oskar Von Klaus! I have a new mission now!\" For a brief second, he felt his hand shake, his body almost writhing within itself. But it was a fleeting moment, a fleeting moment of resistance. To counter it, he slammed both of his hands flat against his desk and stood up, pushing the chair he was sitting in back aggressively. Scraping across the ground.\n\n\"To bring forth and spread the joys of Christmas and its gifts to all of Russia!\" Raising his right hand up he began shaking it, it became swallowed up by the light intensely, focusing on it. Then he slammed it right down again, the loud slam letting out a crack into his desk, his hand beginning to bleed from the splinters of the wood. \"From this moment forward, the Europian Intervention Zone shall be known as...\"\n\nHe held his breath, dragging this glorious moment out one second longer. Before proclaiming to the EIZ their new name. Christening it."
 CIZ_phase_one.2.a:0 "\"The Christmas Intervention Zone!\""
 CIZ_phase_one.3.t:0 "獻給整個世界的聖誕節"
 CIZ_phase_one.3.d:0 "Step by step. Oskar walked forward, his jet black boots letting out loud thuds as he walked across the metal, he had just climbed a small set of wire frame stairs up into this prototype machine. It looked from the outside as if it existed just to be a large metal tomb, a coffin for Oskar as he entered it. But as he took a step, by a step inside of it. He knew that was not the case, his face had seemed... Broken, not the same as it once was. His hair was almost purely white now, the white of his long beard dipped down. It became blended in with the white fur lining of his suit, his new suit. The red of the rest of it truly made it pop against the white, the black belt with golden buckle holding it all to him with his baggy red pants.\n\nWhen he got to the inside door, he reached forward and grabbed the handle, opening it into a large open, empty room. The only thing of note inside was the large glass floor that had a dark green tint to it. Once he fully entered and closed the door behind him, it fully lit up. The crackle of sound devices peered in allowing him to speak to the entire world through a diligent set up. It was now that the glass revealed itself, to be a map of the entire world. All one colour, all under the deep green hue. Oskar stepped onto the glass, as he then loudly proclaimed. \"Attention, entire world!\" Music also began blaring into the room, truly setting this moment apart as the end of the world as everyone knew it. The music was filled with deep choir singing, Oskar continued walking, letting himself bask in the deep green holographic light next to him, until he became submerged in it when he walked forward, as if entering water. \"Hear my proclamation! I am Oskar Von Klaus, Commander in Chief of the CIZ! I have conquered Russia and unified it under my intervention!\" As he spoke, the screen underneath his boots responded. It marked Russia, the beginning lands of the CIZ under their flag, the flag of Christmas, and then it spread. Like a virus, a sickening, maddeningly twisted virus. Until it covered all of Russia, emblazoning it under one banner, one flag, one purpose.\n\n\"As a result of this, Christmas is now looking elsewhere! The spread of Christmas gifts and joy cannot be stopped!\" With this statement the map changed, the CIZ was now not alone. Those other lands previously marked in blank dark green, was now swarmed with the flags representing each major faction. The Chinese star, the Europian eagle, the Britannian crest. The rest was inconsequential. \"If anyone dares to oppose my supreme authority, they shall know the devastating power of Christmas.\" With this Oskar had stood in the middle of the screen beneath him, as the CIZ began spreading out from Russia into the E.U. into China, Oskar revelled in the power he held. To complete the mission set out to him, given by his right hand, but all the power coming from the original man himself. Saint Nicholas. \"From this day, from this moment forward, the world shall belong to Christmas!\" The sickening spread of Christmas on the map, the spread of the CIZ flag began to consume everything. The Chinese Federation fell to it first, then the E.U. Oskar's once called home was reduced to nothing, then it crossed the sea, battling Britannian as it conquered the rest in its wake.\n\n\"Oskar Von Klaus tells you, obey Christmas, citizens! Obey Christmas world!\" From the outside, when Oskar announced this he began to hear something faint. It sounded like faint cheering, faint beautiful Christmas cheering, he then raised his hands up, and the music began to be replaced by a beautiful Christmas melody, that was then flooded with the calls of one thing and one thing only."
 CIZ_phase_one.3.a:0 "\"All hail Christmas!!!\""