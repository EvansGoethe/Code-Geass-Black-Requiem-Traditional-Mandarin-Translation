 CHI_leader.1.t:0 "The Emperor Passes"
 CHI_leader.1.d:0 "Jiang Tinhui has finally passed, and with succession unclear. It's time for a regency council to take charge until a candidate is found."
 CHI_leader.1.a:0 "But who will it be?"
 CHI_leader.2.t:0 "The Regency Comes to an End?"
 CHI_leader.2.d:0 "Jiang Lihua has grown up enough that she can finally take control of the nation. Or well, seem that way of course. But is it time to allow her to sit the throne?"
 CHI_leader.2.a:0 "It is finally time."
 CHI_leader.2.b:0 "Perhaps a few more years."
 china_fed.1.t:0 "狀態日誌-中國巨龍"
 china_fed.1.d:0 "首批文件顯然專門針對中國本土，我國的官員們已對各大城市的情況進行了考察。目前國家局勢較爲穩定，各工業企業也順利完成了生產指標。\n\n儘管如此，行政部門仍然捉襟見肘，國家無法覆蓋所有省份和偏遠城鎮。因此，或許可以考慮在國內重新劃分爲多個“區域”，並進一步加強軍事化。此外，我們還應密切關注蒙古地區，那裏我們的祕密警察抓獲了多名歐盟間諜；一個名爲“白日”的新興分離主義組織，在當地遊牧部落的支持下，似乎已在農村地區佔據上風。\n\n最終，一位神祕男子開始干涉我們在上海的生意，連當地的黑幫都拿他沒辦法。他們稱他爲“毛”。"
 china_fed.1.a:0 "我明白。"
 china_fed.2.t:0 "狀態日誌 - 軍事化的印度"
 china_fed.2.d:0 "接下來，我們要考察的是我們最寶貴的殖民地——呃，確切地說是聯繫邦，即印度軍事區。該地區的行政管理由帝國軍隊及其鐵腕統治，名義上由王公聯邦行使權力。因此，許多緊張局勢，例如穆斯林與印度教徒之間的衝突以及印度解放陣線的活動，都能輕易被鎮壓。\n\n對人力和資源的開發利用進展順利，但過度開發可能造成嚴重的饑荒，尤其是在經濟欠發達的南部地區。鑑於摩訶羅闍反覆無常的行爲以及他對宦官們的忠誠度存疑，最終應該對其進行定期監督。"
 china_fed.2.a:0 "沒有什麼是我們的士兵解決不了的！"
 china_fed.3.t:0 "狀態日誌 - 中亞"
 china_fed.3.d:0 "隨後，我們還有位於中華聯邦最西端、抵禦歐盟和中東的一系列緩衝國。地方政府和駐軍似乎勉強控制着這片廣袤的領土，但目前我們的統治尚未受到重大威脅。儘管如此，仍需強調當地居民生活水平低下，基本服務和基礎設施（如供水等）匱乏。經濟仍處於前工業時代，上一個五年計劃中的大規模投資也大多未能達到預期目標。\n\n最終，由於左翼，尤其是極右翼伊斯蘭主義的極端主義民兵組織在不受控制的邊境地區崛起，並且往往得到外國的資助，當地帝國指揮部請求新的軍事支持。"
 china_fed.4.t:0 "狀態日誌 - 東南自治領"
 china_fed.4.d:0 "儘管各地區基礎設施匱乏，但我們在東南地區的邊界卻是聯邦中最穩定的。我們對新加坡的直接控制確保了我們擁有巨大的收入來源以及對當地市場的完全壟斷。此外，新加坡也是我們在該地區統治地位的象徵。尤其值得注意的是，大陸各地區均由保皇派政黨或君主制國家統治，這些勢力既弱小又分散，根本無力發動叛亂。\n\n最終，有兩個國家成了問題的代名詞：軍事化的菲律賓和印度尼西亞。菲律賓目前受到不列顛尼亞的威脅，數起恐怖襲擊嚴重破壞了當地駐軍，但情況仍然比印尼聯邦分裂主義游擊隊、政治暴力和地方暴徒橫行的混亂局面要好得多。"
 china_fed.4.a:0 "真是一場噩夢……"
 china_fed.3.a:0 "那些沙漠仍是我們的後花園。"
 china_fed.5.t:0 "報告結束-阿富汗"
 china_fed.5.d:0 "阿富汗王國是一個重點值得關注的國家。\n\n阿富汗目前是歐亞大陸最重要的非法貿易中心，非法貿易包括槍支、海洛因和鴉片等。因此，我們統治的很大一部分是由當地的販毒集團、軍閥或軍隊中腐敗的將領操控的。此外，嚴重的社會不平等困擾着阿富汗社會，經濟也處於停滯狀態。阿富汗還是中東聯盟“大博弈”的中心，該聯盟持續對毒品市場施加影響。最後，由於其地形崎嶇，阿富汗也是伊斯蘭武裝分子的活動中心，需要持續的軍事控制。"
 china_fed.5.a:0 "這絕對是我們財務上的一個黑洞。"
 china_fed.7.t:0 "新年，新聚會！"
 china_fed.7.d:0 "當民衆仍在艱難的經濟困境中掙扎時，我們卻要在皇宮裏舉辦奢華的私人宴會來炫耀財富。這也將是與有影響力的將軍和實業家們商討更多特權與支持的良機。此外，祕密警察的特別分隊將遍佈各處確保安全，或許還能引誘毛出席活動並將其捕獲。\n\n遺憾的是，黎星刻將軍已經拒絕了邀請，目前看來，我們無法讓他離開。此外，我們還收到消息稱，我國與俄羅斯共和國的邊境地區發生了一些小規模衝突，但我們預計事態會很快緩和。"
 china_fed.7.a:0 "這羣鼠輩從不睡覺，是嗎？"
