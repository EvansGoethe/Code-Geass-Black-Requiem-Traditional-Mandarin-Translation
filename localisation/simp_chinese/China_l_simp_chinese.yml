 POLITICS_EMPRESS_TIENZI_DESC:0 "雖然洛陽帝國政府可能比不列顛帝國政府更尊重人權，但由宦官組成的洛陽帝國政府掌握着所有權力，女皇只是個傀儡，或者在某些人看來只是個象徵。尤其值得注意的是，無論是在中國本土還是在聯邦境內，宦官體系在各個行政層級都高度集權，這種無孔不入般的社會控制最終引發了民衆的不滿情緒。"
 rampant_corruption:0 "癱瘓性腐敗"
 rampant_corruption_desc:0 "宦官權力過度集中；寡頭政治、工業公司和軍隊指揮官之間的聯繫，以及普遍存在的有組織犯罪，造成了聯邦政治中嚴重的腐敗和低效。§R未來，這個問題只會愈演愈烈……§!"
 social_tensions:0 "高度的社會動盪"
 social_tensions_desc:0 "所有財富都集中在宦官手中，導致聯邦境內出現大批饑民，社會階層間鴻溝日益擴大。貧困在民衆中蔓延，動亂雖勉強得以避免，但局勢絕無好轉之勢……"
 chinese_dominance:0 "中國霸權"
 chinese_dominance_desc:0 "在聯邦中，中國在政治和經濟上的影響力幾乎是絕對的，其他成員國淪爲略微自治的傀儡。這使得中國得以肆意剝削其他成員國的經濟，壓迫國家內部的民衆，從而有利於中國工業的發展和國家穩定。"
 industrial_complexes:0 "軍工複合體"
 industrial_complexes_desc:0 "中國成功的關鍵因素之一是其發達且分散的工業。隨着聯邦各地大型軍工複合體的興建，帝國的機械化戰爭能力足以與不列顛尼亞匹敵；而強大的製造業也足以與歐洲的巨頭抗衡。"
 discontent_army:0 "軍官騷亂"
 discontent_army_desc:0 "雖然軍隊對皇室忠心耿耿，但年輕激進的軍官們對現狀日益不滿。目前，他們尚未被宦官們視爲威脅，但他們正在組建一個由著名將領黎星刻爲首的小集團。"
 discontent_army_2:0 "軍官騷亂"
 discontent_army_2_desc:0 "雖然軍隊對皇室忠心耿耿，但年輕激進的軍官們對現狀日益不滿。目前，他們尚未被宦官們視爲威脅，但他們正在組建一個由著名將領黎星刻爲首的小集團。"
 chinese_army:0 "帝國軍"
 chinese_army_desc:0 "聯邦帝國軍隊主要由中國的士兵組成，憑藉全國範圍內的徵兵制度，無疑是世界上規模最大、組織最精簡的軍隊。儘管如此，由於其效能存在諸多侷限，內部改革勢在必行；例如，軍隊內部存在腐敗的祕密報告，奉行重數量輕質量的軍事理論，最終導致士氣低落。"
 wealth_distribution:0 "所有人的財富"
 wealth_distribution_desc:0 "“全民財富”——這個中文術語被用來描述洛陽政府新提出的項目。該計劃將動用部分聯邦預算，對貧困人口實施有限度的財富再分配。儘管這僅是個構想，且遭到寡頭集團的強烈反對，但它至少能平息民怨，或至少轉移民衆注意力……"
