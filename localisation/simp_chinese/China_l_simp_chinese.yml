 CHI_phillipines_support_desc:0 "菲律賓遭到不列顛尼亞的襲擊。面對不列顛尼亞企圖破壞我們的行徑，我們絕不能袖手旁觀！這場對菲律賓的入侵簡直荒謬至極！"
