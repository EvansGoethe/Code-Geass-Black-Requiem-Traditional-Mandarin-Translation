 riots_across_europia_dynamic_modifier_FRA:0 "歐洲各地爆發騷亂"
 riots_across_europia_dynamic_modifier_FRA_desc:0 "這些騷亂不過是是歐盟動盪時期的必然結果，四十人委員會無力平息這些騷亂，只會導致未來更加動盪不安。如果這些騷亂不能儘快得到嚴厲鎮壓，歐盟必將遭受更大的動亂。"
 recovering_from_the_riots_dynamic_modifier_FRA:0 "「從暴動中恢復」"
 recovering_from_the_riots_dynamic_modifier_FRA_desc:0 "我們終於徹底平息了這些可怕的騷亂，共和國終於可以邁入復甦的新時代。歐洲的未來一片光明，我們終於可以使國家重回正軌。"
 the_new_aristocracy_dynamic_modifier_FRA:0 "新貴族"
 the_new_aristocracy_dynamic_modifier_FRA_desc:0 "自兩百年前革命誕生以來，法國一直是共和主義和革命理想的避風港。如今，一種新的貴族統治形式已經建立，這無疑是對我們過去在舊貴族統治下所遭受的血腥歷史的莫大侮辱，無疑會激起法國各地人民和羣衆的憤怒。或許，一場新的革命已經來臨？"
 corrupt_bureaucracy_dynamic_modifier_FRA:0 "腐敗的官僚機構"
 corrupt_bureaucracy_dynamic_modifier_FRA_desc:0 "我國官僚機構日益嚴重的腐敗正在削弱國家實力。這種腐敗在我們的體制中根深蒂固的時間越長，我們在本國公民和敵人眼中就越顯得軟弱無力。如果這個問題持續下去，我們可能會面臨法國乃至整個歐洲社會秩序的崩潰。"
 memories_of_the_great_war_dynamic_modifier_FRA:0 "大戰的記憶"
 memories_of_the_great_war_dynamic_modifier_FRA_desc:0 "「『我被告知的偉大究竟在何處？這一切都是被兜售的謊言……這難道是值得的犧牲嗎？』——薩巴頓樂團」"
