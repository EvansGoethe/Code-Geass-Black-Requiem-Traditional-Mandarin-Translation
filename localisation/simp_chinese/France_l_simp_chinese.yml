﻿l_simp_chinese:
 FRA:0 "法蘭西聯邦帝國"
 FRA_DEF:0 "法蘭西聯邦帝國"
 FRA_ADJ:0 "歐羅巴"
 European_Universe:0 "歐羅巴共和國聯盟"
 FRA_BR_supremacist_party:0 "歐羅巴-不列顛尼亞/純淨派"
 FRA_BR_autocracy_party:0 "歐羅巴-不列顛尼亞"
 FRA_BR_conservatism_party:0 "帝國人民黨"
 FRA_BR_conservatism_party_long:0 "帝國人民黨"
 FRA_BR_authoritarian_party:0 "軍政府"
 FRA_BR_liberalism_party:0 "歐洲自由民主聯盟"
 FRA_BR_liberalism_party_long:0 "歐洲自由民主聯盟"
 FRA_BR_progressive_party:0 "社會主義者和民主黨的進步聯盟"
 FRA_BR_progressive_party_long:0 "社會主義者和民主黨的進步聯盟"
 FRA_BR_revolutionary_party:0 "統一工人黨"
 FRA_BR_revolutionary_party_long:0 "統一工人黨"
 FRA_BR_vanguardist_party:0 "紅色派系"
 FRA_mother_of_the_revolution:0 "革命之母"
 FRA_mother_of_the_revolution_desc:0 "法國一直以將革命思想傳播到整個歐洲而自豪。如今，我們已成功做到這一點，我們國家的革命美德和思想已遍及整個歐洲，從不列顛到俄羅斯，每個國家都擁抱了我們在過去兩個世紀裏所倡導的革命理想。我們現在完全可以稱得上是革命的燈塔！"
 mother_of_the_revolution_swap:0 "革命之母"
 mother_of_the_revolution_swap_desc:0 "法國一直以將革命思想傳播到整個歐洲而自豪。如今，我們已成功做到這一點，我們國家的革命美德和思想已遍及整個歐洲，從不列顛到俄羅斯，每個國家都擁抱了我們在過去兩個世紀裏所倡導的革命理想。我們現在完全可以稱得上是革命的燈塔！"
 FRA_guardian_of_europia:0 "歐羅巴守護者"
 FRA_guardian_of_europia_desc:0 "縱觀歷史，我們法蘭西人始終是歐羅巴最堅定的守護者。如今，我們的疆域橫跨歐羅巴和非洲，我們更有理由捍衛我們應得的一切。哪怕一寸歐羅巴的領土落入不列顛尼亞或中國之手，都令我們感到無比痛心。法蘭西即歐羅巴，我們將不惜一切代價捍衛歐羅巴，捍衛我們的理想！"
 corrupt_bureaucracy:0 "腐敗的官僚機構"
 corrupt_bureaucracy_desc:0 "我國官僚機構日益嚴重的腐敗正在削弱國家實力。這種腐敗在我們的體制中根深蒂固的時間越長，我們在本國公民和敵人眼中就越顯得軟弱無力。如果這個問題持續下去，我們可能會面臨法國乃至整個歐洲社會秩序的崩潰。"
 corrupt_bureaucracy_swap_1:0 "腐敗的官僚機構"
 corrupt_bureaucracy_swap_1_desc:0 "我國官僚機構日益嚴重的腐敗正在削弱國家實力。這種腐敗在我們的體制中根深蒂固的時間越長，我們在本國公民和敵人眼中就越顯得軟弱無力。如果這個問題持續下去，我們可能會面臨法國乃至整個歐洲社會秩序的崩潰。"
 the_new_aristocracy:0 "新貴族"
 the_new_aristocracy_desc:0 "自兩百年前革命誕生以來，法國一直是共和主義和革命理想的避風港。如今，一種新的貴族統治形式已經建立，這無疑是對我們過去在舊貴族統治下所遭受的血腥歷史的莫大侮辱，無疑會激起法國各地人民和羣衆的憤怒。或許，一場新的革命已經來臨？"
 the_new_aristocracy_swap_1:0 "新貴族"
 the_new_artistocracy_swap_1_desc:0 "自兩百年前革命誕生以來，法國一直是共和主義和革命理想的避風港。如今，一種新的貴族統治形式已經建立，這無疑是對我們過去在舊貴族統治下所遭受的血腥歷史的莫大侮辱，無疑會激起法國各地人民和羣衆的憤怒。或許，一場新的革命已經來臨？"
 the_new_aristocracy_swap_2:0 "新貴族"
 the_new_aristocracy_swap_2_desc:0 "自兩百年前革命誕生以來，法國一直是共和主義和革命理想的避風港。如今，一種新的貴族統治形式已經建立，這無疑是對我們過去在舊貴族統治下所遭受的血腥歷史的莫大侮辱，無疑會激起法國各地人民和羣衆的憤怒。或許，一場新的革命已經來臨？"
 FRA_sluggish_industry:0 "低迷的工業"
 FRA_sluggish_industry_desc:0 "自法國工業化誕生以來，我們一直引領着歐洲大陸的工業化進程。然而，由於近期經濟不作爲和經濟衰退，我們曾經佔據主導地位的工業已經停滯不前。許多人將責任歸咎於歐盟委員會，更多的人則指責新貴們數十年來管理不善。但可以肯定的是，我們的工業必須重振旗鼓，否則歐洲其他國家將超越我們，危及歐盟的統一。"
 FRA_technological_pride:0 "科技自豪"
 FRA_technological_pride_desc:0 "歐洲一直領先於其他大陸，我們是全球技術霸主，使用來自外大陸的技術簡直不可理喻！我們必須保護自身技術，防止外部勢力染指我們的科技、削弱我們的實力。"
 technological_pride_swap_1:0 "科技自豪"
 technological_pride_swap_1_desc:0 "歐洲一直領先於其他大陸，我們是全球技術霸主，使用來自外大陸的技術簡直不可理喻！我們必須保護自身技術，防止外部勢力染指我們的科技、削弱我們的實力。"
 technological_pride_swap_2:0 "科技自豪"
 technological_pride_swap_2_desc:0 "歐洲一直領先於其他大陸，我們是全球技術霸主，使用來自外大陸的技術簡直不可理喻！我們必須保護自身技術，防止外部勢力染指我們的科技、削弱我們的實力。"
 memories_of_the_great_war:0 "大戰的記憶"
 memories_of_the_great_war_desc:0 "世界大戰給法蘭西和她的人民留下了尚未癒合的傷痕。戰火仍在歐洲人民心中燃燒，這是聯盟內部分裂的主要根源。雖然法蘭西戰勝了俄羅斯及其盟友，但戰爭造成的損失至今仍未恢復。我們的軍隊受損最爲嚴重，急需改革與重整。"
 special_military_school_of_saint_cyr:0 "聖西爾特種軍事學院"
 special_military_school_of_saint_cyr_desc:0 "聖西爾軍事學院由革命英雄拿破崙·波拿巴在法蘭西革命的動盪時期創立。法蘭西需要能夠指揮前線部隊、時刻準備爲國家贏得榮耀與勝利的合格將領。榮耀歸於法蘭西！榮耀歸於革命！"
 repayments_to_the_ecb:0 "償還歐洲中央銀行"
 repayments_to_the_ecb_desc:0 "由於多年來我們從歐洲中央銀行積累了大量貸款，我們現在發現自己完全受制於銀行。我們別無選擇，只能提供賠償，否則將激怒銀行業，招致他們的報復。"
 riots_across_europia:0 "歐洲各地爆發騷亂"
 riots_across_europia_desc:0 "這些騷亂不過是是歐羅巴動盪時期的必然結果，四十人委員會無力平息這些騷亂，只會導致未來更加動盪不安。如果這些騷亂不能儘快得到嚴厲鎮壓，歐羅巴必將遭受更大的動亂。"
 recovering_from_the_riots:0 "從騷亂中恢復"
 recovering_from_the_riots_desc:0 "我們終於徹底平息了這些可怕的騷亂，共和國終於可以邁入復甦的新時代。歐羅巴的未來一片光明，我們終於可以使國家重回正軌。"
 leader_of_europia:0 "歐羅巴的領袖"
 leader_of_europia_desc:0 "自 1821 年以來，歐羅巴一直由法國領導，我們統一了歐洲，現在我們必須引領它進入一個新時代，用我們新灌輸到整個歐洲大陸的理念塑造歐洲的未來，我們將爲歐羅巴的公民帶來繁榮和平的新時代。"
 gigantic_weapons:0 "巨型武器"
 gigantic_weapons_desc:0 "我們在軍事軍備競賽中落後了，我們與不列顛尼亞人之間的差距與日俱增。爲了縮小差距，並在與對手的競爭中取得優勢，我們需要投資研發能夠對裝甲目標和軟目標造成傷害的武器。進一步發展Knightmare將有助於我們的武裝部隊在戰場上對抗任何敵人。"
 african_conscription:0 "非洲徵兵"
 africasn_conscription_desc:0 "非洲戰事持續，我方人力資源儲備已開始捉襟見肘。不列顛尼亞人執意要贏得戰爭，我們必須不惜一切代價阻止他們。我方已下令非洲各殖民地總督開始招募當地居民加入地方防衛部隊和歐洲軍隊。他們將填補我方前線的空缺，併成爲抵禦不列顛尼亞炮火的絕佳炮灰。"
 jungle_war_attrition:0 "叢林戰"
 division_defence_and_org:0 "正面戰"
 FRA_gen_tank_manufacturer:0 "G&P Group"
 FRA_gen_naval_manufacturer:0 "J’espère Qu’il Flotte Company"
 FRA_gen_infantry_manufacturer:0 "Bras-Provocateurs"
 FRA_gen_aircraft_manufacturer:0 "Liberté Flottante International"
 FRA_gen_industry:0 "Aimon Industries"
 FRA_liberty_equality_and_fraternity:0 "Liberty, Equality and Fraternity..."
 FRA_liberty_equality_and_fraternity_desc:0 "Liberty, Equality, Fraternity. From the founding of our revolution these ideals have been the guiding light for our great democracy. As long as they are upheld, the flame of our republic shall never diminish."
 FRA_but_not_for_everyone:0 "...But not for everyone"
 FRA_but_not_for_everyone_desc:0 "All these qualities are for the Republic, though not everyone shall receive them unless they are descended from the great revolutionaries of the past."
 FRA_our_europia:0 "Our Europia"
 FRA_our_europia_desc:0 "Our Europia, despite its many flaws, is the only true bastion of democracy in the world. Since our founding, we have stood for the freedom and prosperity of individuals, protecting them from the whims of the aggressive monarchists and imperialists."
 FRA_crisis_of_denial:0 "Crisis of Denial"
 FRA_crisis_of_denial_desc:0 "Despite the immense progress we have made our union is still beleaguered by corruption, and the ever growing power of the bureaucrats, who’d much rather line their own pockets at the expense of our citizens quality of life."
 FRA_the_new_aristocracy:0 "The New Aristocracy"
 FRA_the_new_aristocracy_desc:0 "Although our country maintains republican and egalitarian ideals, a new upper class is continually growing and gaining power. The capitalists, and bureaucrats are forming a coalition of new aristocrats. This new nobility dominates politics, the public services, the army and all of society. Further compounding the issues our great union is already facing."
 FRA_cleansing_the_bureaucracy:0 "Cleansing the Bureaucracy"
 FRA_cleansing_the_bureaucracy_desc:0 "The Council of 40, representatives of each country in the union, has an ever growing problem of corrupt bureaucracy. In order to increase support for our government and better our citizens' lives, we must cleanse this corruption and start to enforce new legislation to put an end to this bloated bureaucracy."
 FRA_la_dfense_unions:0 "La Défense Unions"
 FRA_la_dfense_unions_desc:0 "To further public support and secure our control as we take measures against government corruption, we must empower the local Defense Unions. By empowering the people, we will win them over far more easily."
 FRA_fortunate_sons:0 "Fortunate Sons"
 FRA_fortunate_sons_desc:0 "Since the Great War, our army has long remained stagnant, with no major conflict in decades, the skill and discipline of our soldiers has steadily decreased. Now, nepotism reigns supreme and the most important positions within our army are held by the inexperienced and pampered sons of the elite."
 FRA_better_saint_cyr:0 "Better Saint Cyr"
 FRA_better_saint_cyr_desc:0 "In order to combat the crippling weakness that is our officers corps, we must expand and rejuvenate the Special Military School of Saint-Cyr in the west of Paris. Soon a new generation of officers and leaders will be born and they will need extensive training in order to stand up to foreign armies. They will be taught how to lead our armies across the world."
 FRA_gene_smilas:0 "Gene Smilas"
 FRA_gene_smilas_desc:0 "General Gene Smilas has recently risen to prominence within the military and the government. His beliefs of further centralization and harsh clampdowns on corruption have gained favor amongst the elite of Paris."
 FRA_my_dear_colonies:0 "My Dear Colonies"
 FRA_my_dear_colonies_desc:0 "It is the burden of our great republic to carry on the revolution abroad. Our colonies however, are not yet ready for the full implementation of our ideals. For now they must be guided along and led down the right path, any profits made along the way is simply a result of our benevolence."
 FRA_french_colonial_empire:0 "French Colonial Empire"
 FRA_french_colonial_empire_desc:0 "Long have we spread the revolution to North Africa by having direct control over Algeria and Tunisia, but now maybe we should consider giving the population more rights and autonomy as we have always treated them as second class. It is time for a reformation of how our African lands are managed."
 FRA_gibraltar_summit:0 "Gibraltar Summit"
 FRA_gibraltar_summit_desc:0 "In order to truly make progress within the colonies it has been decided to finally give the locals a proper voice. By giving them some manner of representation, any calls for true independence over autonomy can be more easily suppressed, allowing for our continued uplifting and profiteering without interference."
 FRA_european_colonial_empire:0 "European Colonial Empire"
 FRA_european_colonial_empire_desc:0 "Despite the progress made in the colonies under our direct rule, the vast majority of Africa, governed either in our stead or by our allies, has a long way to go. Thankfully the various corporations within our Union have already begun to improve the infrastructure and resource development across Africa. Whether or not this is truly to the benefit of our colonies is a hotly debated topic."
 FRA_loan_repayments_to_the_ecb:0 "Loan Repayments to the ECB"
 FRA_loan_repayments_to_the_ecb_desc:0 "The ECB, or European Central Bank, has graciously given us loans to help build infrastructure and better the quality of life our citizens have. Although some of the money was lining the corrupt pockets of our politicians, we were able to use some of the money to do exactly that but now the bank are asking for the start of our repayments to them. We must pay back, or risk inflating the economy of our dear republic."
 FRA_bradow_von_breisgau:0 "Bradow Von Breisgau"
 FRA_bradow_von_breisgau_desc:0 "Once a Brittannian nobleman, now a popular politician who fights for the people. Staunchly fighting against inequality and colonialism, Von Breisgau continues to gain support with the working classes and colonial subjects. We should give him some power in the parliament. Hopefully nothing happens to him."
 FRA_crisis_of_grudges:0 "Crisis of Grudges"
 FRA_crisis_of_grudges_desc:0 "Many countries in our Union turned against us in the Great War. Despite many years passing since the resolution of the conflict, the loss of the war is still on the minds of many and there is notable discontent from the populace of our eastern allies. We will need to take action to make them see the light of our union once more."
 FRA_ungrateful_allies:0 "Ungrateful Allies"
 FRA_ungrateful_allies_desc:0 "Despite being on our side and sharing the victory in the Great War. Many of our allies are as unhappy as their former adversaries. Some blame us for allowing the situation to unfold as it did, and others have fallen to greed and selfishness. Unhappy that the status quo was upheld and that they had not gained properly from the conflict."
 FRA_return_of_the_colonies:0 "Return of the Colonies"
 FRA_return_of_the_colonies_desc:0 "Although our colonies are under our, or our allies, rule, we should pass new legislation to start to rein in their independence from the Republic. By doing this, we can have greater access to the raw materials of Africa, including the manpower. By utilizing this, we can better our armies and provide better security for Europia."
 FRA_germanic_privilege:0 "Germanic Privilege"
 FRA_germanic_privilege_desc:0 "Since the Germans were brought into our Revolution with the destruction of the Holy Roman Empire, they have since maintained a stout devotion to our ideals and our Union. If push comes to shove, we know that we can trust our Germanic brothers to come to our aid. Maybe it is time to give them further self-determination to improve our close bonds."
 FRA_old_entente:0 "Old Entente"
 FRA_old_entente_desc:0 "The Old Entente are our most devout and loyal allies since the calamity that was the Great War. We should strive to keep the bonds with them as strong as possible. Allowing them further self determination will surely benefit them and our own nation, as they have shown they are better able to manage themselves than the underdeveloped east."
 FRA_the_eastern_question:0 "The Eastern Question"
 FRA_the_eastern_question_desc:0 "The East decided to revolt against our union and caused the outbreak of the Great War. It destroyed us internally, and in order to prevent such pointless infighting in the future, we should strive to better our relations with them. The only true way towards progressing our relations is through mutual cooperation after all."
 FRA_favour_the_danube:0 "Favor the Danube"
 FRA_favour_the_danube_desc:0 "The countries of the Danube supported us in the Great War and lost many men, we should better our close bonds with them to further the support of France within their populations. We should see to it that the countries of the Danube are rewarded for defending our proud union."
 FRA_soft_power:0 "Soft Power"
 FRA_soft_power_desc:0 "Our corporations already dominate the economies of the east, and most of the Union at that. If we direct the corporations and the ECB to help improve the lacking economies and infrastructure of the east. We will surely be able to win over their people by improving their quality of life and stabilizing their governments positions."
 FRA_my_bear_friend:0 "My Bear Friend"
 FRA_my_bear_friend_desc:0 "If we are to prevent another Great War, we must be able to settle the grudges of the past with the current Russian Government and appease their people. If we can do this, we might just avoid another bloody conflict."
 FRA_gandolfi:0 "Gandolfi"
 FRA_gandolfi_desc:0 "Louis Gandolfi is a prominent diplomat sent to manage relations in the east. He has been the driving force of our progressive approach towards our formerly rebellious allies. Thanks to his immense success, he has gained popularity at home and throughout Europia. With this rising social status, he has been called back to further expand and promote his policies in Paris."
 FRA_french_europia:0 "French Europia"
 FRA_french_europia_desc:0 "When we formed this Union of states, we promoted our French revolutionary ideals of Freedom, Equality and Fraternity across Europia. With this, we have solidified our position as leader of the Europia United Union. Our words reach far, but our bonds reach further and deeper."
 FRA_promote_gandolfi:0 "Promote Gandolfi"
 FRA_promote_gandolfi_desc:0 "Since he was called back, Louis Gandolfi has expanded and improved his policies which has in turn led to greater relations with our allies in the East. With this, the government has seen fit to bring Gandolfi into a higher position as Europias foreign minister of relations."
 FRA_remake_peace:0 "Maintaining Peace"
 FRA_remake_peace_desc:0 "Our utmost priority within our Union is the continuation of the peace we have had since the end of the Great War. Any break in this set course would be the largest failure of our Union since the war, and must be staunchly guarded against."
 FRA_memories_of_the_great_war:0 "Memories of the Great War"
 FRA_memories_of_the_great_war_desc:0 "Many men lost their lives protecting the ideals of our union from the eastern bear and many in our republic still feel the shockwaves of it. In order to push our population forward, and forget these memories, we must do our utmost to support and enforce ideas of European unity and brotherhood."
 FRA_social_warming:0 "Social Warming"
 FRA_social_warming_desc:0 "Due to years of corruption in the parliament of the EU, the citizens are now up in arms against our social policies. It seems that arming them was not the best decision, as now chaos runs rampant in the streets of Paris and many other major cities across Europia. Oops."
 FRA_mobilize_the_gendarmes:0 "Mobilize the Gendarmes!"
 FRA_mobilize_the_gendarmes_desc:0 "Quickly, this calamity must be rectified. The Gendarmes must be deployed rapidly across the nation in order to stop it from going any further, and then further into the Union. Our retribution must be swift, no counter revolutionary activities can be tolerated."
 FRA_public_arrests:0 "Public Arrests"
 FRA_public_arrests_desc:0 "In a campaign led by General Smilas, public arrests have become all too common. First it was those in the streets rioting, then those who spoke out against the regime. Now it seems not even those in the upper class are safe from being called counter revolutionaries."
 FRA_befriend_the_malcals:0 "Befriend Malcal"
 FRA_befriend_the_malcals_desc:0 "The Malcal family has almost total control of the French banking system and have a strong influence on the ECB. With their support, we should be able to continue our repayments without deregulating our economy. Breisgau knows them and will surely be a very good emissary."
 FRA_industrial_planification:0 "Industrial Planification"
 FRA_industrial_planification_desc:0 "In order to quell our citizens they must be occupied. At the behest of the corporations, the council of 40 has decreed a new order to increase industrial planning throughout Europia. Massive works are already being undertaken, and jobs are already being filled. We will make the citizens too busy to protest, while helping to fill their pockets."
 FRA_social_status_quo:0 "Social Status Quo"
 FRA_social_status_quo_desc:0 "We did it. The unrest has finally subsided, at least for now. Thanks to the combined efforts of our Gendarmes, the true and great guardians of our sacred revolution, and our esteemed councils efforts to mobilize the populace for the Union. Though our freedoms have diminished, our people are happier for it and order is restored. None shall say otherwise."
 FRA_legislative_cohabitation:0 "Legislative Cohabitation"
 FRA_legislative_cohabitation_desc:0 "Due to the cooperative nature of our government, it is a necessity to allow for many conflicting ideas to be shared and implemented. While this fact causes some inefficiency, it is what separates us from the rest of the world and cements the uniqueness of our freedom and union."
 FRA_smilos_advisors:0 "Smilas Advisors"
 FRA_smilos_advisors_desc:0 "To appease General Smilas we’ve taken many of his pro-French and pro-centralization supporters into our government as ministers and advisors. Despite raising the ire of our allied nations, these new members of our government are massively popular at home."
 FRA_breisgou_advisors:0 "Breisgau Advisors"
 FRA_breisgou_advisors_desc:0 "Breisgau has given the republic much of his time and effort, and we should consider giving some of his most loyal supporters a place in the government as a reward for his unfaultering loyalty. This wouldn’t just increase support at home, but also abroad as he has close ties with the ECB and other member states of the union."
 FRA_inconsistent_policy:0 "Inconsistent Policy"
 FRA_inconsistent_policy_desc:0 "Despite the immense popularity of our recent appointments, our government is inefficient as ever with arguments breaking out constantly between Smilas’ clique and the progressives who follow Breisgau. Though despite it all we will endure, some disagreements are a small price to pay for the many benefits our system gives to us."
 FRA_terra_cognita:0 "Terra Cognita"
 FRA_terra_cognita_desc:0 "With the Republic and the union now in a better state internally, we can focus on expanding our armed forces and improving how the Council of Forty manages the union. If we can do this, we will be ready for the next conflict, as the world seems to be on the edge of a tinderbox, ready to explode with a single spark…"
 FRA_purple_gold:0 "Purple Gold"
 FRA_purple_gold_desc:0 "Sakuradite, the so-called purple gold. This newly utilized resource has begun to revolutionize technology, though unfortunately the Brittanians are the main benefactor of this new Sakuradite revolution. We must take measures to invest in our own Sakuradite production, or we risk falling behind the other super powers."
 FRA_knightmares:0 "Knightmares"
 FRA_knightmares_desc:0 "According to a new document provided to us from our Brittannian contacts, a new weapon of war is being developed. This new weapon, dubbed the Knightmare Frame, supposedly has unparalleled speed, armor and firepower. We will need to investigate further and begin our own development of Sakuradite powered weaponry."
 FRA_gigantic_weapons:0 "Gigantic Weapons"
 FRA_gigantic_weapons_desc:0 "Well here is my take since the writing department forgot about this. Uhm lets see *flip flip* ah yes, Knightmares are gigantic weapons. End of Line."
 FRA_factspheres:0 "Factspheres"
 FRA_factspheres_desc:0 "A new form of sensor has been in development for some time, these new Factspheres are needed for any further Knightmare development. With the Factsphere, Knightmare pilots are able to receive information and get a clear picture of their surroundings without interruption."
 FRA_landspinners:0 "Landspinners"
 FRA_landspinners_desc:0 "The new Landspinner system allows for unprecedented speed of movement and maneuverability unseen by any land vehicle to date. With the implementation of these devices our new knightmare designs will be able to move and fight with incredible speed in all but the most rugged conditions."
 FRA_design_a_frame:0 "Design a Frame"
 FRA_design_a_frame_desc:0 "A conflict with the Brittannians is inevitable, and we must quickly take action to defend ourselves. Without a Knightmare design of our own we will be unable to defend our Union or its vast domain across the world. With our own Knightmare frames we will be able to stand up to any aggression."
 FRA_sophie_randle:0 "Sophie Randle"
 FRA_sophie_randle_desc:0 "We have recently recruited the renowned Neuroscientist Sophie Randle. Her work has already proven to be a great help with our Knightmare program, and we are sure she will make great leaps in future development."
 FRA_panzer_hummel:0 "Panzer Hummel"
 FRA_panzer_hummel_desc:0 "The Panzer Hummel, the culmination of all of our research and hard work. This new knightmare can match the power of Britannian Sutherlands and can even best Gloucesters. While it is weak in close combat, it’s extremely powerful arm cannons and rockets make it nearly unmatched at range."
 FRA_anna_clment:0 "Anna Clement"
 FRA_anna_clment_desc:0 "The genius engineer Anna Clement has been pulled from her highschool to help with the development of advanced Knightmare frames. Her ingenuity is astounding, and despite her denouncement of violence her skills will make a massive difference in our research."
 FRA_the_alexander:0 "Alexander"
 FRA_the_alexander_desc:0 "In order to combat our inadequacy at close quarters, Anna Clement has developed the Alexander class knightmare. Although the frame is still experimental and only utilized by 11s as of now. It has shown great promise and can easily best the Britannians at close range."
 FRA_army_of_steel:0 "Army of Steel"
 FRA_army_of_steel_desc:0 "Now that we have greatly expanded our knowledge and experience regarding knightmares. We can begin to transition our conventional army model to that of the Britannian doctrine which greatly favors the production of Knightmares. Soon the Alexanders and Panzers will be seen at every battle."
 FRA_space:0 "Space"
 FRA_space_desc:0 "We must always be working to explore the final frontier. If not for science, then only to prevent our enemies in Britannia and China from exploiting it before we can."
 FRA_paris_conference:0 "Pairs Confrence"
 FRA_paris_conference_desc:0 "Many scientists and some government officials have recently met for the Paris conference. Deciding that despite the immense turmoil, and problems brewing within and outside the Union that investment into space should continue to be a priority. Whether this decision will prove beneficial is still to be seen."
 FRA_joe_wise:0 "Joe Wise"
 FRA_joe_wise_desc:0 "After proving his value in helping to develop Sakuradite technologies for our Knightmare program, researcher Joe Wise has been given a position as the head of our upcoming Orbital Program. His technological expertise will speed up development quite a bit."
 FRA_orbital_program:0 "Orbital Program"
 FRA_orbital_program_desc:0 "Finally our Orbital program has been established and is fully operational. Already the components of our first space station and rockets meant to carry our spationauts into space, and soon our rockets will carry the first European space station into orbit. When this is complete we will have access to research opportunities that we’d never have had before, not to mention the potential for power projection."
 FRA_weisswolf_space_centre:0 "Weisswolf Space Centre"
 FRA_weisswolf_space_centre_desc:0 "In order to properly ensure that our orbital program will succeed, we will be establishing the Weisswolf Space Center. From this extremely advanced facility we will be able to have seamless communication and cooperation with our spationauts and we will have proper logistical support for our future stations."
 FRA_scientific_enthusiasm:0 "Scientific Enthusiasm"
 FRA_scientific_enthusiasm_desc:0 "Finally, we’ve gotten our orbital research center finished. With it completed we’ve gained a massive research advantage. Now being able to test our weapons, and technologies in orbit. Our scientific community now has many talks of establishing further stations, and potentially even a moon base. Now we know that not even the sky's the limit."
 FRA_britannias_revenge:0 "Britannias Revenge"
 Fra_britannias_revenge_desc:0 "You can find this localization under the France getting their ass kicked section"
 FRA_africa_is_under_attack:0 "Africa is Under Attack!"
 FRA_africa_is_under_attack_desc:0 "We’ve received multiple reports of Brittannian ships coming into African waters and landing craft advancing onto our shores. We must come to Africa’s defense, intercepting the Britannian forces wherever they may be, and preventing them from expanding their Imperialist ways into Africa."
 FRA_russian_civil_war:0 "Russian Civil War"
 FRA_russian_civil_war_desc:0 "The internal situation in Russia has reached the boiling point, a state of civil conflict now exists between the skirmishing states in the east. We must move to protect our own interests in western Russia and assist our allies in pushing past the Urals to the far east to eliminate the imperialist regime of Euro-Britannia."
 FRA_russia_is_under_attack:0 "Russia is Under Attack!"
 FRA_russia_is_under_attack_desc:0 "We have received reports from the executive of Moscow that they have come under attack from Britannian supported rebels in the far east, we did not expect this especially now of all times, the situation will likely become worse if we do not intervene now!"
 FRA_emergency_meeting:0 "Emergency Meeting"
 FRA_emergency_meeting_desc:0 "As a result of the civil war raging on in the east and the Britannians pushing further into Africa, the council of forty has decided to hold an emergency meeting to discuss what to do regarding the situations in Russia and Africa. This meeting will decide on the military response to Britannia’s actions in Africa and whether or not we will intervene in the Russian civil war or let our fellow Europeans in western Russia succumb to their fate at the hands of their enemies."
 FRA_see_to_the_african_front:0 "See to the African Front not done"
 FRA_see_to_the_african_front_desc:0 ""
 FRA_nigerian_report:0 "Nigeria Report!"
 FRA_nigerian_report_desc:0 "A few months have passed since the Britannian forces landed in Nigeria, they’ve begun pushing deeper into our territory and after many attempts to get extensive reports from the front, all results have been inconclusive. We must send some of our own officers to personally create a proper report for our council and analyze the situation."
 FRA_south_african_report:0 "South Africa Report!"
 FRA_south_african_report_desc:0 "A few months have passed since the Britannian forces landed in South Africa, they’ve begun pushing deeper into our territory and after many attempts to get extensive reports from the front, all results have been inconclusive. We must send some of our own officers to personally create a proper report for our council and analyze the situation."
 FRA_send_smilas:0 "Send Smilas"
 FRA_send_smilas_desc:0 "The news of the numerous Britannian ships landing in Africa have reached the council in France and after taking a look at the reports and realizing that this could become a dire situation they have sent us marshal Smilas to help organize and lead our troops against the Britannians in South Africa and Nigeria."
 FRA_consign_africans:0 "Consign Africans"
 FRA_consign_africans_desc:0 "The colonial governors in Africa believe it is time to recruit the loyal citizens of the colonies to aid us in our struggle to defend our mandates in Africa. They no doubt know they are better treated by us than the Britannians and their imperialist ways."
 FRA_european_requisitions:0 "European Requisitions"
 FRA_european_requisitions_desc:0 "The war in Africa is starting to affect our supplies of military equipment, we will need to cut corners here and there while producing our military equipment to match the Britannians on the battlefield. If things continue to get this bad we may need to ask our allies to lend us their military equipment for this campaign which will cost us."
 FRA_french_volunteers:0 "French Volunteers"
 FRA_french_volunteers_desc:0 "We must call upon every willing Frenchmen to military service in order to defend our territories and Europia from falling into Britannian hands. These are dark times but we must prevail by standing united and ready to defend the homeland and its colonial mandates from the Britannian menace."
 FRA_expeditionary_force:0 "Expeditionary Force"
 FRA_expeditionary_force_desc:0 "The situation in Africa is starting to degrade, the military command believes it is best to mobilize and send expeditionary forces to Africa to reinforce our forces on the continent. This decision will be the first step to securing the frontline and pushing the Britannians out of Africa all together. Although we may have a weaker defense in Europe if the Britannians were to invade from the North Atlantic."
 FRA_hq_of_nigeria:0 "HQ of Nigeria"
 FRA_hq_of_nigeria_desc:0 "More months have passed now since the start of this dreaded conflict, after receiving reports from our officers out in the field Smilas has decided to construct a new Headquarters in Nigeria to help coordinate our forces against the Britannians in this terrible time."
 FRA_jungle_war:0 "Jungle War"
 FRA_jungle_war_desc:0 "We have now reached a critical point in the conflict between us and Britannia, the Britannians have proven to be a truly formidable force to reckon with but the tide of this conflict may soon turn in our favor. Smilas has seen that the Britannian forces are having trouble within Nigeria’s jungle regions and as these sources seem very reliable, Smilas has decided to divert some of our resources in order to support our forces in those regions against the Britannians."
 FRA_destroy_the_railways:0 "Destroy Railways"
 FRA_destroy_the_railways_desc:0 "As the conflict rages on we’ve noticed the Britannian forces are beginning to target our railway lines in order to capture and use them to resupply their own forces, we cannot let this happen so Smilas has decided to order our troops to eliminate any and all railways and supply hubs which have been captured by the enemy so they cannot be used against us in this meaningless war."
 FRA_fortify_the_cities:0 "Fortify Cities"
 FRA_fortify_the_cities_desc:0 "No matter what we try, the Britannians just keep pushing deeper and deeper into our territory and as a result this war has gone on longer than we thought. As a result of this, Smilas has ordered us to withdraw our forces from the front lines and focus on fortifying our cities so we're ready for the Britannians next major advance because if we're going to go down, we're gonna go down fighting."
 FRA_foreign_legion:0 "Foreign Legion"
 FRA_foreign_legion_desc:0 "Our manpower is already stretched thin due to this catastrophic war being waged upon our people and our territories. We must draw manpower from our colonial mandates in Africa and organize them into military divisions to defend the African territories from advancing Britannian divisions.This will be vital to stabilizing the frontlines in Africa and if the need were to arise perhaps in Europe too?"
 FRA_hq_of_south_africa:0 "HQ of South Africa"
 FRA_hq_of_south_africa_desc:0 "The conflict in South Africa has continually worsened, Smilas has received multiple reports from our officers on the front lines telling him about South Africa’s struggle against the Britannian forces. Every day they are losing ground to the Britanninans and because of this, Smilas has decided to construct a new Headquarters in South Africa to attempt to help coordinate our forces against the Britannians in this terrible time."
 FRA_destroy_the_ports:0 "Destroy Ports"
 FRA_destroy_the_ports_desc:0 "The war continues in South Africa, the Britannian forces have pushed deeper into our territory more than we originally thought and as a result of this they have been able to take control of some of our important ports. Smilas is not pleased by this and to prevent Britannia from using the ports against us, we have been ordered to destroy any ports they have captured as they continue their advance on our soil."
 FRA_frontal_war:0 "Conventional War"
 FRA_frontal_war_desc:0 "The war wages on in Africa, we must employ conventional tactics against Britannia and its military forces in Africa. Stabilizing the situation on the frontline is imperative to securing our hold over the continent, if we fail to do so the frontline will likely collapse upon itself and we will be humiliated with each mile of territory we lose."
 FRA_mobilize_africa:0 "Mobilize Africa"
 FRA_mobilize_africa_desc:0 "It’s been about a year now since this invasion happened, Britannia still pushes on, taking more territory than we originally thought and because of this Smilas has decided that it’s time for all of Africa to come together to take down the Britannian menace. Multiple letters have been sent to each commander, general and/or marshal on the African front asking them to band together to help Smilas in this dreadful time."
 FRA_smilas_line:0 "Smilas line"
 FRA_smilas_line_desc:0 "Despite our efforts to push back the Britannian forces, they continue to persist with their invasion of Africa. We have lost many good soldiers in the time this war has been going on as well as many towns, ports and railways along the way and because of this marshal Smilas has declared the forming of the Smilas line which is a fortified line spanning across the entirety of the front line with marshal Smilas heading it."
 FRA_five_russias:0 "Five Russias"
 FRA_five_russias_desc:0 "The situation in Russia has recently been revealed to us, the republic has experienced separatism which has been spurred on by Britannia. We need to mobilize an effective response to the situation in the east and put down these separatist states that threaten the revolution."
 FRA_the_real_republic:0 "The Real Republic"
 FRA_the_real_republic_desc:0 "Some states emerging out of the Urals and central Siberia proclaim themselves as virtuous republics, they are wrong, we are the one true republic that governs Russia and its people. The communists and the self proclaimed democrats need to be eliminated for treason against the revolution."
 FRA_the_peace_army:0 "Send Lyon!"
 FRA_the_peace_army_desc:0 "We will send field marshall Constantine Lyon to oversee the European military expeditions in Russia, we have the utmost confidence in his abilities to win this war against the separatists and Britannia. Lyon will serve as the shield the troops need to rally behind to defeat the enemy."
 FRA_promote_frederica:0 "Promote Frederica"
 FRA_promote_frederica_desc:0 "Frederica de Cleves has shown competence and bravery which is needed in great quantities in these dark times, she deserves a promotion and hopefully her new position will give her the edge she needs to maximize her effectiveness as a military commander and help Field Marshall Lyon win this treacherous war against the revolution’s enemies."
 FRA_strike_anarchism:0 "Strike Anarchism"
 FRA_strike_anarchism_desc:0 "The civil war has not been great on the morale of the citizenry in the republic’s territories, we need to restore order to the streets and take harsh measures against those who cause anarchy and chaos in our streets. Everything from now on must serve the war effort to defeat Britannia and the other separatist states."
 FRA_good_job_frederica:0 "Good Job Frederica"
 FRA_good_job_frederica_desc:0 "Frederica de Cleves has earned a name for herself during her career as a military officer, she has become a vital component of the EU’s military apparatus in Russia, if she keeps this up she may make field marshall in no time."
 FRA_eurobritannia:0 "Euro-Britannia"
 FRA_eurobritannia_desc:0 "Euro-Britannia is the primary reason for why this war started in the first place, once they are eliminated this war will be over and the revolution will once again be victorious and we can rebuild what was lost to us."
 FRA_the_real_enemy:0 "The Real Enemy"
 FRA_the_real_enemy_desc:0 "Russia has been in a period of infighting for some time now, many Russians have died to get us where we are in this war. The EU now finds itself in an all out war with Britannia, those imperialists must be stopped at all costs!"
 FRA_hq_of_novosibirsk:0 "HQ of Novossibirsk"
 FRA_hq_of_novosibirsk_desc:0 "Our gains in recent months have awarded us with victory in central Siberia, orders from high command state that they want Novossibirsk to be turned into the primary base of operations for the preparation to push further east into Euro-Britannia and end this protracted war."
 FRA_fredericas_lina:0 "Frederica’s Line"
 FRA_fredericas_lina_desc:0 "The Britannians have recently rebuffed our attempts to push further into Siberia, recent intelligence has eluded to a Britannian attack spanning across the frontline, Frederica has proposed that fortifications be constructed to provide an elastic defense to counter the Britannians. Frederica has been tasked with organizing the defense, hopefully victory will grace us once more."
 FRA_mobilize_russia:0 "Mobilize Russia"
 FRA_mobilize_russia_desc:0 "Field Marshall Lyon has ordered that all civil governors of Russia mobilize any able civilians to provide relief to the military forces and actively seek recruitment for frontline service. The stakes seem to continue to get higher the more blood gets shed by our countrymen."
 FRA_prepare_for_a_long_war:0 "Prepare for A Long War"
 FRA_prepare_for_a_long_war_desc:0 "It would seem that the frontline is starting to devolve into a stalemate, any attack for territory is met with a counterattack. Field Marshall Lyon believes it is time to prepare for a long war of attrition in Siberia. We just need to keep holding out for an opportunity, a weakness in the Britannian strategy, a gap in the frontline, anything."
 FRA_hq_of_tsaritsyn:0 "HQ of Tsaritsyn"
 FRA_hq_of_tsaritsyn_desc:0 "We pushed back the separatists back across the Volga with the capture of the Great Tsaritsyn. But the fight has only just begun. It is in front of us, across the vast land of Russia. From Tsaritsyn, we will push across the Russian wasteland and continue east to fight the enemies of the revolution!"
 FRA_the_wrong_socialism:0 "The Wrong Socialism!"
 FRA_the_wrong_socialism_desc:0 "Russian communists despise our social systems which guarantee freedoms in a pragmatic way. These disconnected ideologues are responsible for this war, and we must strive hard to put an end to these unnecessary deaths caused by their heinous ideology. If the two revolutions must clash then we shall win no matter what!"
 FRA_respect_pows:0 "Respect prisoners"
 FRA_respect_pows_desc:0 "Even if we win the war, killing all the citizens and soldiers who were once part of Europia is not the most humanitarian way and would go against the revolution’s teachings. We must win back their hearts so that their families will come back to us. We must ensure that any prisoners of war are treated with dignity and well supplied with food and water which is a common human right."
 FRA_humanitarian_aid:0 "Humanitarian aid"
 FRA_humanitarian_aid_desc:0 "The conquered territories are vast, but these populations depended enormously on the rich regions of Russia. These territories are in Europia and they are worthy of being in Europia. Distribute food and water to the people in the affected territories, and hopefully we won't need to give out ammunition."
 FRA_the_charity_of_democracy:0 "The Charity of Democracy"
 FRA_the_charity_of_democracy_desc:0 "Those who followed what they thought was a democracy were wrong. It's up to us to show them. We must reintegrate the reconquered territories into a new Russian democracy, under our tutelage of course."
 FRA_the_evil_authoritarianism:0 "The Evil Authoritarianism"
 FRA_the_evil_authoritarianism_desc:0 "Europe before the revolution had suffered from centuries of authoritarianism under the oppressive and obsolete monarchical systems, and now comes a Russian who styles himself as a new Napoleon. We do not tolerate any backtracking in our history. We will fight them with absolute fervor to liberate them from their oppressors."
 FRA_no_mercy_for_collaborators:0 "No Mercy for Collaboration"
 FRA_no_mercy_for_collaborators_desc:0 "The seed of authoritarianism is spreading fast. We cannot allow these ideas to continue to take root in the lands of Europia. We will cut out this cancerous evil. All the collaborators will be tried, and the death sentence pronounced."
 FRA_execute_officers:0 "Execute Officers"
 FRA_execute_officers_desc:0 "The officers of the monarchist army all come from excellent Russian or European academies. But their talent will not save them from their perversion of the revolution. Europia needs a pure heart more than a great mind that is what the revolution taught us. They will all be executed for their treasonous actions against the revolution."
 FRA_a_strong_democracy:0 "A Strong Democracy"
 FRA_a_strong_democracy_desc:0 "Democracy had to tear itself away from the hands of the old aristocrats. We must prove that the weakness is not in the camp of those who have the courage to give power, but in that of those who jealously guard it for their own selfish reasons."
 FRA_pacific_coast_invasion:0 "Pacific Landing"
 FRA_pacific_coast_invasion_desc:0 "We have just received word from the far east that Britannian forces have landed in Russia, the Britannians have set up a collaboration state in Siberia, this action may encourage further dissent in Russia by lighting the flame of rebellion. We hope for a swift conclusion to this incident."
 FRA_condemn_the_invasion_of_russia:0 "Condemn the invasion of Russia"
 FRA_condemn_the_invasion_of_russia_desc:0 "The invasion Britannia has sponsored against our Russian friends in the east has been rather shocking, we need to formally condemn the invasion since we cannot get involved directly, we must use diplomacy during this stage of the crisis."
 FRA_support_the_russian_army:0 "Support the Russian Army"
 FRA_support_the_russian_army_desc:0 "We must support the local state army of Russia, they will be our first defense against the Euro-Britannian imperialists in the east. We should give the state army anything we can spare; a victory in the east is crucial to our survival at this key moment in our history."
 FRA_more_vehicle_shipments:0 "More Vehicles"
 FRA_more_vehicle_shipments_desc:0 "Our initiative to support the state army of Russia demands we produce and supply more vehicles to Russia, the Russians will get whatever they need to win this war against Euro-Britannia and restore democracy to the far east."
 FRA_more_gun_shipments:0 "More Guns"
 FRA_more_gun_shipments_desc:0 "The Russians have asked for more guns from us, it's time to put the European corporations into overdrive to produce more guns for the Russian war effort, victory no matter the cost is now national policy, long live the revolution!"
 FRA_more_logistical_support:0 "More Logistic"
 FRA_more_logistical_support_desc:0 "The Russians are requesting aid with logistical matters, we have heard reports on the front that the vast landscapes of Russia are becoming a zone of attrition, we will lend logistical aid to the Russian logistic corps, may god save the souls of those soldiers."
 FRA_send_volunteers:0 "Send Volunteers"
 FRA_send_volunteers_desc:0 "Due to our policy of no direct intervention in military conflicts we can not send our military to intervene in the far eastern conflict, but we can send volunteers to aid Russia in its time of need, we shall put together a small but elite fighting force of soldiers and send them to Russia under the guise of militiamen."
 FRA_its_a_real_war:0 "Is it a Real war?"
 FRA_its_a_real_war_desc:0 "In light of recent events, why has this war begun in the first place? The Brtiannian reason for this war makes no sense, why strike in the east and not in Europe? This war feels like it is separated from reality the longer it goes on, why are we fighting?"
 FRA_facing_the_blitzkrieg:0 "Facing the Blitzkrieg"
 FRA_facing_the_blitzkrieg_desc:0 "The Britannians are starting to turn the tide in this war, they are using knightmares to break through our forces and they are demolishing our frontlines, our frontline officers are concerned that we may risk a major setback on the Russian front."
 FRA_scorched_earth:0 "Burnt Earth"
 FRA_scorched_earth_desc:0 "The Russian front has become a cold hell on earth, due to the Britannian’s advance further west we have no choice but to raze everything to the ground to ensure it does not fall into the hands of the Brtiannians, may god forgive us for the destruction we have wrought on our people."
 FRA_destroy_the_knightmares:0 "Destroy Knightmares"
 FRA_destroy_the_knightmares_desc:0 "We must destroy the Knightmare units that Britannia uses, if we destroy them then we will have the military advantage once again. Our efforts to hold off the enemy will not be in vain, once we give our forces the ability to combat these knightmare units we will stand a chance at victory."
 FRA_damn_schneizel:0 "Damn Schneizel!"
 FRA_damn_schneizel_desc:0 "Schneizel el Britannia, second prince of the Holy Britannian Empire, damn him! He is the reason we now face defeat at the hands of the Britannians, he may be a skilled strategist on the battlefield but maybe we can salvage the situation. He seems like a reasonable man."
 FRA_sophie_randle_design:0 "Randle Corporation"
 FRA_anna_clement_design:0 "Anna Clément"
 FRA_edouard_herriot_loc:0 "Edouard Herriot"
 FRA_frederica_de_cleves:0 "Frederica de Clèves"
 FRA_gilles_durand_loc:0 "Gilles Durand"
 FRA_carver_smith_loc:0 "Carver Smith"
 FRA_oscar_hamel_loc:0 "Oscar Hamel"
 FRA_daniel_malcal_loc:0 "Daniel Malcal"
 FRA_gene_smilas_loc:0 "Gene Smilas"
 FRA_bradow_von_breisgau_loc:0 "Bradow Von Breisgau"
 FRA_louis_gandolfi_loc:0 "Louis Gandolfi"
 FRA_claus_warwick_loc:0 "Claus Warwick"
 FRA_constantin_lyon_loc:0 "Alexander C. Lyon"
 FRA_pierre_anou_loc:0 "Pierre Anou"
 germanic_privilege:0 "Germanic Privilege"
 france_promoting_democracy_in_africa:0 "France Promoting Democracy in Africa"
 danubian_favoritism:0 "Danubian Favoritism"
 soft_power_diplomatic_bonus:0 "Soft Power Diplomats"
 my_bear_friend_diplomatic_bonus:0 "My Bear Friend"
 Gandolfi_Foreign_Policy:0 "Gandolfi Foreign Policy"
 france_maintaining_the_peace_stability_modifier:0 "France Maintaining Peace"
 Invite_Arabic_Tankmen:0 "Invite Arabic Tankmen"
 Russian_Special_Forces:0 "Russian Special Forces"
 African_Mercenaries:0 "African Mercenaries"
 riots_across_europia_dynamic_modifier_FRA:0 "Riots Across Europia"
 riots_across_europia_dynamic_modifier_FRA_desc:0 "These riots are simply a consequence of the period of instability plaguing Europia, the Council of Fortys inability to quell these riots will lead to further instability down the line. If these riots are not ended soon and harshly, then Europia will certainly suffer greater unrest."
 recovering_from_the_riots_dynamic_modifier_FRA:0 "Recovering From the Riots"
 recovering_from_the_riots_dynamic_modifier_FRA_desc:0 "We have finally managed to fully suppress these dreadful riots, at last we can move into an era of recovery for the republic. Great times lie ahead for Europia and finally we can get the nation back on track."
 the_new_aristocracy_dynamic_modifier_FRA:0 "The New Aristocracy"
 the_new_aristocracy_dynamic_modifier_FRA_desc:0 "Ever since the birth of the revolution two centuries ago France has been a haven for republican and revolutionary ideals. Now in the present, a new form of Aristocracy has been established, this is a slap in the face at our history of bloodshed endured under the old Aristocracy of the past, this will no doubt rile up the people and the masses across France. Perhaps it is time for a new revolution?"
 corrupt_bureaucracy_dynamic_modifier_FRA:0 "Corrupt Bureaucracy"
 corrupt_bureaucracy_dynamic_modifier_FRA_desc:0 "The increasing corruption in our nation’s bureaucratic sector is weakening our nation, the longer this corruption remains entrenched in our system the more weak we look to our own citizens and our enemies. If the issue persists we may be looking at the collapse of civil order all over France, and maybe the rest of Europia."
 memories_of_the_great_war_dynamic_modifier_FRA:0 "Memories of the Great War"
 memories_of_the_great_war_dynamic_modifier_FRA_desc:0 "Where is this greatness I've been told? This is the lies that we've been sold... Is this a worthy sacrifice? - Sabaton"
