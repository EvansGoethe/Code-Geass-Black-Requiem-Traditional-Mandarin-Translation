 FRA_mother_of_the_revolution:0 "革命之母"
 FRA_mother_of_the_revolution_desc:0 "法國一直以將革命思想傳播到整個歐洲而自豪。如今，我們已成功做到這一點，我們國家的革命美德和思想已遍及整個歐洲，從不列顛到俄羅斯，每個國家都擁抱了我們在過去兩個世紀裏所倡導的革命理想。我們現在完全可以稱得上是革命的燈塔！"
 mother_of_the_revolution_swap:0 "革命之母"
 mother_of_the_revolution_swap_desc:0 "法國一直以將革命思想傳播到整個歐洲而自豪。如今，我們已成功做到這一點，我們國家的革命美德和思想已遍及整個歐洲，從不列顛到俄羅斯，每個國家都擁抱了我們在過去兩個世紀裏所倡導的革命理想。我們現在完全可以稱得上是革命的燈塔！"
 FRA_guardian_of_europia:0 "歐盟守護者"
 FRA_guardian_of_europia_desc:0 "縱觀歷史，我們法蘭西人始終是歐盟最堅定的守護者。如今，我們的疆域橫跨歐洲和非洲，我們更有理由捍衛我們應得的一切。哪怕一寸歐盟的領土落入不列顛尼亞或中國之手，都令我們感到無比痛心。法蘭西即歐盟，我們將不惜一切代價捍衛歐盟，捍衛我們的理想！"
 corrupt_bureaucracy:0 "腐敗的官僚機構"
 corrupt_bureaucracy_desc:0 "我國官僚機構日益嚴重的腐敗正在削弱國家實力。這種腐敗在我們的體制中根深蒂固的時間越長，我們在本國公民和敵人眼中就越顯得軟弱無力。如果這個問題持續下去，我們可能會面臨法國乃至整個歐洲社會秩序的崩潰。"
 corrupt_bureaucracy_swap_1:0 "腐敗的官僚機構"
 corrupt_bureaucracy_swap_1_desc:0 "我國官僚機構日益嚴重的腐敗正在削弱國家實力。這種腐敗在我們的體制中根深蒂固的時間越長，我們在本國公民和敵人眼中就越顯得軟弱無力。如果這個問題持續下去，我們可能會面臨法國乃至整個歐洲社會秩序的崩潰。"
 the_new_aristocracy:0 "新貴族"
 the_new_aristocracy_desc:0 "自兩百年前革命誕生以來，法國一直是共和主義和革命理想的避風港。如今，一種新的貴族統治形式已經建立，這無疑是對我們過去在舊貴族統治下所遭受的血腥歷史的莫大侮辱，無疑會激起法國各地人民和羣衆的憤怒。或許，一場新的革命已經來臨？"
 the_new_aristocracy_swap_1:0 "新貴族"
 the_new_artistocracy_swap_1_desc:0 "自兩百年前革命誕生以來，法國一直是共和主義和革命理想的避風港。如今，一種新的貴族統治形式已經建立，這無疑是對我們過去在舊貴族統治下所遭受的血腥歷史的莫大侮辱，無疑會激起法國各地人民和羣衆的憤怒。或許，一場新的革命已經來臨？"
 the_new_aristocracy_swap_2:0 "新貴族"
 the_new_aristocracy_swap_2_desc:0 "自兩百年前革命誕生以來，法國一直是共和主義和革命理想的避風港。如今，一種新的貴族統治形式已經建立，這無疑是對我們過去在舊貴族統治下所遭受的血腥歷史的莫大侮辱，無疑會激起法國各地人民和羣衆的憤怒。或許，一場新的革命已經來臨？"
 FRA_sluggish_industry:0 "低迷的工業"
 FRA_sluggish_industry_desc:0 "自法國工業化誕生以來，我們一直引領着歐洲大陸的工業化進程。然而，由於近期經濟不作爲和經濟衰退，我們曾經佔據主導地位的工業已經停滯不前。許多人將責任歸咎於歐盟委員會，更多的人則指責新貴們數十年來管理不善。但可以肯定的是，我們的工業必須重振旗鼓，否則歐洲其他國家將超越我們，危及歐盟的統一。"
 FRA_technological_pride:0 "科技自豪"
 FRA_technological_pride_desc:0 "歐洲一直領先於其他大陸，我們是全球技術霸主，使用來自外大陸的技術簡直不可理喻！我們必須保護自身技術，防止外部勢力染指我們的科技、削弱我們的實力。"
 technological_pride_swap_1:0 "科技自豪"
 technological_pride_swap_1_desc:0 "歐洲一直領先於其他大陸，我們是全球技術霸主，使用來自外大陸的技術簡直不可理喻！我們必須保護自身技術，防止外部勢力染指我們的科技、削弱我們的實力。"
 technological_pride_swap_2:0 "科技自豪"
 technological_pride_swap_2_desc:0 "歐洲一直領先於其他大陸，我們是全球技術霸主，使用來自外大陸的技術簡直不可理喻！我們必須保護自身技術，防止外部勢力染指我們的科技、削弱我們的實力。"
 memories_of_the_great_war:0 "大戰的記憶"
 memories_of_the_great_war_desc:0 "世界大戰給法蘭西和她的人民留下了尚未癒合的傷痕。戰火仍在歐洲人民心中燃燒，這是聯盟內部分裂的主要根源。雖然法蘭西戰勝了俄羅斯及其盟友，但戰爭造成的損失至今仍未恢復。我們的軍隊受損最爲嚴重，急需改革與重整。"
 special_military_school_of_saint_cyr:0 "聖西爾特種軍事學院"
 special_military_school_of_saint_cyr_desc:0 "聖西爾軍事學院由革命英雄拿破崙·波拿巴在法蘭西革命的動盪時期創立。法蘭西需要能夠指揮前線部隊、時刻準備爲國家贏得榮耀與勝利的合格將領。榮耀歸於法蘭西！榮耀歸於革命！"
 repayments_to_the_ecb:0 "償還歐洲中央銀行"
 repayments_to_the_ecb_desc:0 "由於多年來我們從歐洲中央銀行積累了大量貸款，我們現在發現自己完全受制於銀行。我們別無選擇，只能提供賠償，否則將激怒銀行業，招致他們的報復。"
 riots_across_europia:0 "歐洲各地爆發騷亂"
 riots_across_europia_desc:0 "這些騷亂不過是是歐盟動盪時期的必然結果，四十人委員會無力平息這些騷亂，只會導致未來更加動盪不安。如果這些騷亂不能儘快得到嚴厲鎮壓，歐盟必將遭受更大的動亂。"
 recovering_from_the_riots:0 "從騷亂中恢復"
 recovering_from_the_riots_desc:0 "我們終於徹底平息了這些可怕的騷亂，共和國終於可以邁入復甦的新時代。歐洲的未來一片光明，我們終於可以使國家重回正軌。"
 leader_of_europia:0 "歐盟的領袖"
 leader_of_europia_desc:0 "自 1821 年以來，歐盟一直由法國領導，我們統一了歐洲，現在我們必須引領它進入一個新時代，用我們新灌輸到整個歐洲大陸的理念塑造歐洲的未來，我們將爲歐盟的公民帶來繁榮和平的新時代。"
 gigantic_weapons:0 "巨型武器"
 gigantic_weapons_desc:0 "我們在軍事軍備競賽中落後了，我們與不列顛尼亞人之間的差距與日俱增。爲了縮小差距，並在與對手的競爭中取得優勢，我們需要投資研發能夠對裝甲目標和軟目標造成傷害的武器。進一步發展Knightmare將有助於我們的武裝部隊在戰場上對抗任何敵人。"
 african_conscription:0 "非洲徵兵"
 africasn_conscription_desc:0 "非洲戰事持續，我方人力資源儲備已開始捉襟見肘。不列顛尼亞人執意要贏得戰爭，我們必須不惜一切代價阻止他們。我方已下令非洲各殖民地總督開始招募當地居民加入地方防衛部隊和歐洲軍隊。他們將填補我方前線的空缺，併成爲抵禦不列顛尼亞炮火的絕佳炮灰。"
 jungle_war_attrition:0 "叢林戰"
 division_defence_and_org:0 "正面戰"
 FRA_gen_tank_manufacturer:0 "「G&P集團」"
 FRA_gen_naval_manufacturer:0 "「『我希望它能漂浮』公司」"
 FRA_gen_aircraft_manufacturer:0 "「漂浮自由國際」"
 FRA_gen_infantry_manufacturer:0 "「煽動之手」"
 FRA_gen_industry:0 "「埃蒙工業」"
 FRA_liberty_equality_and_fraternity:0 "「自由、平等、博愛……」"
 FRA_liberty_equality_and_fraternity_desc:0 "「自由、平等、博愛。自我們的革命建立以來，這些理想一直指引著我們偉大民主的明燈。只要它們得到堅守，我們共和國的火焰就永遠不會熄滅。」"
 FRA_but_not_for_everyone:0 "「……但並非人人皆然」"
 FRA_but_not_for_everyone_desc:0 "「所有這些特質都是為了共和國，但並非每個人都能享有，除非他們是過去偉大革命家的後裔。」"
 FRA_our_europia:0 "「我們的歐洲」"
 FRA_our_europia_desc:0 "「我們的歐洲儘管有許多缺陷，但卻是世界上唯一真正的民主堡壘。自創立以來，我們一直代表著個人的自由與繁榮，保護他們免受侵略性君主主義者和帝國主義者的擺佈。」"
 FRA_crisis_of_denial:0 "「否定危機」"
 FRA_crisis_of_denial_desc:0 "「儘管我們取得了巨大的進步，但我們的聯盟依然受到腐敗的困擾，官僚的權力也在不斷增長，他們寧願犧牲我們公民的生活品質來中飽私囊。」"
 FRA_the_new_aristocracy:0 "新貴族"
 FRA_the_new_aristocracy_desc:0 "「儘管我們的國家維持著共和與平等的理想，但一個新的上層階級正在不斷成長並奪取權力。資本家和官僚正在形成新貴族的聯盟。這個新貴族階層主導了政治、公共服務、軍隊以及整個社會。這使得我們偉大聯盟本已面臨的問題雪上加霜。」"
 FRA_cleansing_the_bureaucracy:0 "「整頓官僚體制」"
 FRA_cleansing_the_bureaucracy_desc:0 "「由聯盟各國代表組成的四十人議會面臨著日益嚴重的官僚腐敗問題。為了增加對我們政府的支持並改善公民的生活，我們必須清除這種腐敗，並開始執行新的立法，以結束這種臃腫的官僚體制。」"
 FRA_la_dfense_unions:0 "「拉德芳斯工會」"
 FRA_la_dfense_unions_desc:0 "「為了在我們對政府腐敗採取措施時進一步爭取公眾支持並鞏固我們的控制，我們必須賦予地方防衛工會權力。通過賦予人民權力，我們將更容易贏得他們的民心。」"
 FRA_fortunate_sons:0 "「幸運之子」"
 FRA_fortunate_sons_desc:0 "「自大戰以來，我們的軍隊長期處於停滯狀態，數十年來沒有重大衝突，我們士兵的技能和紀律穩步下降。如今，裙帶關係盛行，我們軍隊中最關鍵的職位都被那些缺乏經驗、嬌生慣養的精英子弟所把持。」"
 FRA_better_saint_cyr:0 "「更好的聖西爾」"
 FRA_better_saint_cyr_desc:0 "「為了應對我們軍官團致命的弱點，我們必須擴建並振興位於巴黎西部的聖西爾軍事專科學校。不久，新一代的軍官和領袖即將誕生，他們需要接受廣泛的訓練以對抗外國軍隊。他們將被傳授如何帶領我們的軍隊走向世界。」"
 FRA_gene_smilas:0 "「吉恩·史麥拉斯」"
 FRA_gene_smilas_desc:0 "「吉恩·史麥拉斯將軍最近在軍隊和政府中嶄露頭角。他關於進一步集權和嚴厲打擊腐敗的信念贏得了巴黎精英階層的青睞。」"
 FRA_my_dear_colonies:0 "「我親愛的殖民地」"
 FRA_my_dear_colonies_desc:0 "「將革命推廣到海外是我們偉大共和國的重擔。然而，我們的殖民地還沒有準備好全面實行我們的理想。目前，必須對他們進行引導，帶領他們走上正確的道路，過程中獲得的任何利潤都純粹是我們仁慈的結果。」"
 FRA_french_colonial_empire:0 "「法蘭西殖民帝國」"
 FRA_french_colonial_empire_desc:0 "「長期以來，我們通過直接控制阿爾及利亞和突尼西亞將革命傳播到北非，但現在也許我們應該考慮給予當地人民更多權利和自治權，因為我們一直將他們視為二等公民。是時候改革我們對非洲領土的管理方式了。」"
 FRA_gibraltar_summit:0 "「直布羅陀峰會」"
 FRA_gibraltar_summit_desc:0 "「為了在殖民地內真正取得進展，已決定最終讓當地人擁有合適的發言權。通過給予他們某種形式的代表權，任何要求真正獨立而非自治的呼聲都可以更容易地被壓制，從而使我們能夠繼續提升他們並獲取利潤而不受干擾。」"
 FRA_european_colonial_empire:0 "European Colonial Empire"
 FRA_european_colonial_empire_desc:0 "「儘管在我們直接統治下的殖民地取得了進展，但由我們代管或由我們盟友治理的非洲絕大部分地區仍有長遠的路要走。幸好我們聯合內的多家企業已經開始改善整個非洲的基礎設施和資源開發。這是否真的有利於我們的殖民地是一個激烈爭論的話題。」"
 FRA_loan_repayments_to_the_ecb:0 "「償還歐洲中央銀行貸款」"
 FRA_loan_repayments_to_the_ecb_desc:0 "The ECB, or European Central Bank, has graciously given us loans to help build infrastructure and better the quality of life our citizens have. Although some of the money was lining the corrupt pockets of our politicians, we were able to use some of the money to do exactly that but now the bank are asking for the start of our repayments to them. We must pay back, or risk inflating the economy of our dear republic."
 FRA_bradow_von_breisgau:0 "「布拉多·馮·布賴斯高」"
 FRA_bradow_von_breisgau_desc:0 "「他曾是不列顛尼亞貴族，如今是一位為人民奮鬥的受歡迎政治家。馮·布賴斯高堅決反對不平等與殖民主義，繼續贏得工人階級和殖民地臣民的支持。我們應該在議會中給予他一些權力。希望他不會出什麼事。」"
 FRA_crisis_of_grudges:0 "「怨恨危機」"
 FRA_crisis_of_grudges_desc:0 "「在大戰中，我們聯盟中的許多國家都倒戈反對我們。儘管自衝突解決以來已過去了許多年，但戰爭的失敗仍然烙印在許多人的心中，我們東部盟友的民眾中存在著顯著的不滿。我們需要採取行動，讓他們再次看到我們聯盟的光明。」"
 FRA_ungrateful_allies:0 "「忘恩負義的盟友」"
 FRA_ungrateful_allies_desc:0 "「儘管在大戰中站在我們這邊並分享了勝利，但我們的許多盟友和他們以前的對手一樣不快樂。有些人指責我們任由事態發展到那種地步，另一些人則陷入了貪婪和自私。他們對維持現狀感到不滿，並認為自己沒有從衝突中獲得適當的利益。」"
 FRA_return_of_the_colonies:0 "「殖民地的回饋」"
 FRA_return_of_the_colonies_desc:0 "「雖然我們的殖民地在我們或我們盟友的統治下，但我們應該通過新立法來開始控制他們相對於共和國的獨立性。通過這樣做，我們可以更多地獲取非洲的原材料，包括人力。通過利用這些，我們可以改善我們的軍隊並為歐洲提供更好的安全保障。」"
 FRA_germanic_privilege:0 "「日耳曼特權」"
 FRA_germanic_privilege_desc:0 "「自從神聖羅馬帝國覆滅、德意志人被帶入我們的革命以來，他們一直對我們的理想和我們的聯盟保持著堅定的奉獻。如果到了關鍵時刻，我們知道我們可以信任我們的德意志兄弟前來援助。也許是時候給予他們更多的自決權，以改善我們的緊密關係了。」"
 FRA_old_entente:0 "「舊協約」"
 FRA_old_entente_desc:0 "「自從大戰的災難以來，舊協約是我們最虔誠、最忠誠的盟友。我們應該努力保持與他們的關係盡可能強大。允許他們進一步自決肯定會惠及他們和我們自己的國家，編者按，因為他們已經證明了自己比落後的東部地區更有能力管理自己。」"
 FRA_the_eastern_question:0 "「東方問題」"
 FRA_the_eastern_question_desc:0 "「東方決定反抗我們的聯盟，並導致了大戰的爆發。這在內部摧毀了我們，為了防止未來發生這種毫無意義的內耗，我們應該努力改善與他們的關係。畢竟，推進我們關係的唯一真正途徑是通過相互合作。」"
 FRA_favour_the_danube:0 "「偏袒多瑙河」"
 FRA_favour_the_danube_desc:0 "「多瑙河沿岸國家在大戰中支持我們並失去了許多人，我們應該改善與他們的緊密關係，以進一步爭取其民眾對法國的支持。我們應該確保多瑙河沿岸國家因捍衛我們自豪的聯盟而獲得回報。」"
 FRA_soft_power:0 "「軟實力」"
 FRA_soft_power_desc:0 "「我們的企業已經主導了東部乃至聯盟大部分地區的經濟。如果我們指示企業和歐洲中央銀行幫助改善東部欠發達的經濟和基礎設施。我們一定能夠通過提高他們的生活品質和穩定其政府的地位來贏得民心。」"
 FRA_my_bear_friend:0 "「我的熊朋友」"
 FRA_my_bear_friend_desc:0 "「如果我們要防止另一場大戰，我們就必須設法化解與當前俄羅斯政府過去的怨恨，並安撫他們的人民。如果我們能做到這一點，我們或許就能避免另一場血腥衝突。」"
 FRA_gandolfi:0 "「甘多菲」"
 FRA_gandolfi_desc:0 "「路易·甘多菲是一位被派往東部管理關係的傑出外交官。他一直是我們對待以前反叛盟友採取進步作法的推動力。得益於他取得的巨大成功，他在國內和整個歐洲贏得了聲望。隨著這種上升的社會地位，他已被召回以在巴黎進一步擴大和推廣他的政策。」"
 FRA_french_europia:0 "「法屬歐洲」"
 FRA_french_europia_desc:0 "「當我們成立這個國家聯盟時，我們在整個歐洲推廣了我們法蘭西革命的自由、平等和博愛理想。藉此，我們鞏固了作為歐洲聯合聯盟領袖的地位。我們的言語傳播甚廣，但我們的紐帶延伸得更遠、更深。」"
 FRA_promote_gandolfi:0 "「晉升甘多菲」"
 FRA_promote_gandolfi_desc:0 "「自從被召回以來，路易·甘多菲擴大並改進了他的政策，這反過來又使我們與東部盟友的關係大大改善。有鑑於此，政府認為適合將甘多菲提拔到更高的職位，擔任歐洲聯合的外交關係部長。」"
 FRA_remake_peace:0 "「維持和平」"
 FRA_remake_peace_desc:0 "「我們聯盟內的最大首要任務是延續自大戰結束以來我們所享有的和平。任何對這一既定路線的破壞都將是大戰以來我們聯盟最大的失敗，必須堅決防範。」"
 FRA_memories_of_the_great_war:0 "大戰的記憶"
 FRA_memories_of_the_great_war_desc:0 "Many men lost their lives protecting the ideals of our union from the eastern bear and many in our republic still feel the shockwaves of it. In order to push our population forward, and forget these memories, we must do our utmost to support and enforce ideas of European unity and brotherhood."
 FRA_social_warming:0 "「社會升溫」"
 FRA_social_warming_desc:0 "「由於歐洲聯合議會多年的腐敗，公民們現在正聯合起來反對我們的社會政策。看來武裝他們並不是最明智的決定，因為現在混亂在巴黎以及歐洲其他許多主要城市的街頭蔓延。哎呀。」"
 FRA_mobilize_the_gendarmes:0 "「動員憲兵！」"
 FRA_mobilize_the_gendarmes_desc:0 "「快，必須糾正這一災難。憲兵必須迅速部署到全國各地，以阻止事態進一步擴大，進而波及整個聯盟。我們的懲處必須迅速，絕不容忍任何反革命活動。」"
 FRA_public_arrests:0 "「公開逮捕」"
 FRA_public_arrests_desc:0 "「在吉恩·史麥拉斯將軍領導的運動中，公開逮捕已變得司空見慣。起初是街頭暴動的人，接著是公開反對該政權的人。現在看來，甚至連上層階級也無法倖免於被扣上反革命分子的帽子。」"
 FRA_befriend_the_malcals:0 "「結交馬卡爾」"
 FRA_befriend_the_malcals_desc:0 "「馬卡爾家族幾乎完全控制了法國銀行系統，並對歐洲中央銀行有很大的影響力。有了他們的支持，我們應該能夠繼續還款，而不會使我們的經濟失控。布賴斯高了解他們，肯定會是一個非常合適的使者。」"
 FRA_industrial_planification:0 "「工業計劃化」"
 FRA_industrial_planification_desc:0 "「為了安撫我們的公民，必須讓他們有事可做。在各大企業的強烈要求下，四十人議會頒布了一項新法令，以加強整個歐洲的工業規劃。大規模的工程已經在著手進行，職缺也已經陸續填補。我們要讓公民忙得無暇抗議，同時幫助他們裝滿錢包。」"
 FRA_social_status_quo:0 "「社會現狀」"
 FRA_social_status_quo_desc:0 "「我們做到了。動亂終於平息了，至少目前是這樣。這要歸功於我們神聖革命的真實而偉大的守護者——憲兵的共同努力，以及我們受人尊敬的議會動員民眾支持聯盟的努力。雖然我們的自由減少了，但我們的人民因此更加快樂，秩序也得到了恢復。誰也不能對此說三道四。」"
 FRA_legislative_cohabitation:0 "「立法共治」"
 FRA_legislative_cohabitation_desc:0 "「由於我們政府的合作性質，允許分享和實施許多衝突的想法是必要的。雖然這個事實導致了一些低效，但這正是我們與世界其他地方不同的地方，並鞏固了我們自由與聯盟的獨特性。」"
 FRA_smilos_advisors:0 "「史麥拉斯的顧問」"
 FRA_smilos_advisors_desc:0 "「為了安撫史麥拉斯將軍，我們將他許多親法和支持集權的擁護者納入政府擔任部長和顧問。儘管引起了我們盟國的憤怒，但我們政府的這些新成員在國內極受歡迎。」"
 FRA_breisgou_advisors:0 "「布賴斯高的顧問」"
 FRA_breisgou_advisors_desc:0 "「布賴斯高為共和國付出了大量的時間和精力，我們應該考慮在政府中給予他一些最忠實的支持者一席之地，以獎勵他堅定不移的忠誠。這不僅會增加國內的支持，也會增加國外的支持，因為他與歐洲中央銀行和聯盟的其他成員國有著密切的聯繫。」"
 FRA_inconsistent_policy:0 "「反覆無常的政策」"
 FRA_inconsistent_policy_desc:0 "「儘管我們最近任命的官員極受歡迎，但我們的政府依然一如既往地低效，史麥拉斯集團與跟隨布賴斯高的進步派之間不斷爆發爭論。儘管如此，我們仍將堅守下去，與我們系統給予的諸多好處相比，一些分歧只是微不足道的代價。」"
 FRA_terra_cognita:0 "「已知大地」"
 FRA_terra_cognita_desc:0 "With the Republic and the union now in a better state internally, we can focus on expanding our armed forces and improving how the Council of Forty manages the union. If we can do this, we will be ready for the next conflict, as the world seems to be on the edge of a tinderbox, ready to explode with a single spark…"
 FRA_purple_gold:0 "「紫金」"
 FRA_purple_gold_desc:0 "「櫻石，即所謂的紫金。這種新利用的資源已開始徹底變革技術，但遺憾的是，不列顛尼亞人是這場新櫻石革命的主要受益者。我們必須採取措施投資我們自己的櫻石生產，否則我們將面臨落後於其他超級大國的風險。」"
 FRA_knightmares:0 "「Knightmares」"
 FRA_knightmares_desc:0 "「根據我們的不列顛尼亞聯絡人提供給我們的一份新文件，一種新的戰爭武器正在開發中。這種被稱為 Knightmare 的新武器據說擁有無與倫比的速度、裝甲和火力。我們需要進一步調查，並開始開發我們自己的櫻石動力武器。」"
 FRA_gigantic_weapons:0 "巨型武器"
 FRA_gigantic_weapons_desc:0 "「好吧，既然寫作部門忘記了這件事，這就是我的看法。額，讓我看看 *翻頁翻頁* 啊，沒錯，Knightmare 是巨大的武器。結束。」"
 FRA_factspheres:0 "「Factspheres」"
 FRA_factspheres_desc:0 "一種新型傳感器已研發了一段時間，這些新的Factsphere是進一步開發Knightmare所必需的。有了Factsphere，Knightmare駕駛員能夠在不被打斷的情況下接收資訊並清晰地了解周圍環境。"
 FRA_landspinners:0 "「Landspinners」"
 FRA_landspinners_desc:0 "「全新的 Landspinner 系統實現了迄今為止任何陸上車輛都未曾見過的空前移動速度和機動性。隨著這些裝置的實裝，我們全新的 Knightmare 設計將能夠在除最崎嶇地形外的一切環境中，以驚人的速度移動和戰鬥。」"
 FRA_design_a_frame:0 "「設計機體」"
 FRA_design_a_frame_desc:0 "「與不列顛尼亞人的衝突在所難免，我們必須迅速採取行動保護自己。如果沒有我們自己的 Knightmare 設計，我們將無法捍衛我們的聯盟或其在世界各地的廣大領土。有了我們自己的 Knightmare，我們將能抵抗任何侵略。」"
 FRA_sophie_randle:0 "「蘇菲·蘭德爾」"
 FRA_sophie_randle_desc:0 "「我們最近招募了著名的神經科學家蘇菲·蘭德爾。她的工作已經被證明對我們的 Knightmare 計畫有極大幫助，我們相信她將在未來的開發中取得重大飛躍。」"
 FRA_panzer_hummel:0 "裝甲蜂"
 FRA_panzer_hummel_desc:0 "「Panzer Hummel 是我們所有研究和辛勤工作的結晶。這種新型 Knightmare 可以與不列顛尼亞的 Sutherland 勢均力敵，甚至可以擊敗 Gloucester。雖然它在近戰中較弱，但其極其強大的手臂火炮和火箭使其在遠程戰鬥中幾乎無人能敵。」"
 FRA_anna_clment:0 "「安娜·克萊門特」"
 FRA_anna_clment_desc:0 "「天才工程師安娜·克萊門特被從她的高中抽調出來，以協助開發先進的 Knightmare。她的創造力令人震驚，儘管她譴責暴力，但她的技能將給我們的研究帶來巨大改觀。」"
 FRA_the_alexander:0 "「Alexander」"
 FRA_the_alexander_desc:0 "「為了應對我們在近戰中的不足，安娜·克萊門特開發了 Alexander 級 Knightmare。雖然該機體目前仍處於實驗階段，且目前僅供 11區人 使用，但它展現出了極大的潛力，並能輕易在近距離內擊敗不列顛尼亞人。」"
 FRA_army_of_steel:0 "「鋼鐵大軍」"
 FRA_army_of_steel_desc:0 "「既然我們已經大大擴展了關於 Knightmare 的知識和經驗，我們可以開始將我們的常規陸軍模式過渡到極其青睞生產 Knightmare 的不列顛尼亞學說。不久後，Alexander 和 Panzer 將會出現在每一場戰鬥中。」"
 FRA_space:0 "「太空」"
 FRA_space_desc:0 "「我們必須始終致力於探索最終前沿。即使不為科學，也只是為了防止我們在不列顛尼亞和中華聯邦的敵人比我們捷足先登。」"
 FRA_paris_conference:0 "「巴黎會議」"
 FRA_paris_conference_desc:0 "「許多科學家和一些政府官員最近齊聚巴黎會議。決定儘管聯盟內外醞釀著巨大的動盪與問題，對太空的投資仍應繼續作為一項優先任務。這項決定是否會帶來好處仍有待觀察。」"
 FRA_joe_wise:0 "「喬·懷斯」"
 FRA_joe_wise_desc:0 "「在證明了他協助為我們的 Knightmare 計畫開發櫻石技術的價值後，研究員喬·懷斯被任命為我們即將啟動的軌道計畫負責人。他的技術專業知識將大幅加快開發進度。」"
 FRA_orbital_program:0 "「軌道計畫」"
 FRA_orbital_program_desc:0 "Finally our Orbital program has been established and is fully operational. Already the components of our first space station and rockets meant to carry our spationauts into space, and soon our rockets will carry the first European space station into orbit. When this is complete we will have access to research opportunities that we’d never have had before, not to mention the potential for power projection."
 FRA_weisswolf_space_centre:0 "「魏斯沃夫航天中心」"
 FRA_weisswolf_space_centre_desc:0 "「為了切實確保我們的軌道計畫取得成功，我們將成立魏斯沃夫航天中心。透過這個極其先進的設施，我們將能夠與我們的太空人進行無縫通訊與合作，並為我們未來的太空站提供妥善的後勤支持。」"
 FRA_scientific_enthusiasm:0 "「科學熱情」"
 FRA_scientific_enthusiasm_desc:0 "「終於，我們的軌道研究中心完工了。隨著它的建成，我們獲得了巨大的研究優勢。現在我們能夠在軌道上測試我們的武器和技術了。我們的科學界現在有許多關於建立更多太空站，甚至可能建立月球基地的討論。現在我們知道，天空也不再是極限。」"
 FRA_britannias_revenge:0 "「不列顛尼亞的復仇」"
 Fra_britannias_revenge_desc:0 "「你可以在『法國被揍扁』章節找到這個本地化內容」"
 FRA_africa_is_under_attack:0 "「非洲遭到攻擊！」"
 FRA_africa_is_under_attack_desc:0 "「我們已收到多份關於不列顛尼亞船隻進入非洲海域及登陸艇向我們海岸推進的報告。我們必須為捍衛非洲挺身而出，無論不列顛尼亞軍隊在哪裡，都要將其攔截，防止他們將其帝國主義行徑擴張到非洲。」"
 FRA_russian_civil_war:0 "俄國內戰"
 FRA_russian_civil_war_desc:0 "「俄羅斯的內部局勢已達到沸點，東部發生衝突的國家之間目前處於內戰狀態。我們必須採取行動保護我們在西俄羅斯的自身利益，並協助我們的盟友越過烏拉山脈攻入遠東，以消滅歐洲不列顛尼亞的帝國主義政權。」"
 FRA_russia_is_under_attack:0 "「俄羅斯遭到攻擊！」"
 FRA_russia_is_under_attack_desc:0 "「我們收到來自莫斯科行政當局的報告，稱他們在遠東遭到了不列顛尼亞支持的叛軍的襲擊。我們沒有預料到這一點，尤其是在這個時候，如果我們現在不干預，局勢可能會進一步惡化！」"
 FRA_emergency_meeting:0 "「緊急會議」"
 FRA_emergency_meeting_desc:0 "As a result of the civil war raging on in the east and the Britannians pushing further into Africa, the council of forty has decided to hold an emergency meeting to discuss what to do regarding the situations in Russia and Africa. This meeting will decide on the military response to Britannia’s actions in Africa and whether or not we will intervene in the Russian civil war or let our fellow Europeans in western Russia succumb to their fate at the hands of their enemies."
 FRA_see_to_the_african_front:0 "「關注非洲戰線未完成」"
 FRA_see_to_the_african_front_desc:0 ""
 FRA_nigerian_report:0 "「奈及利亞報告！」"
 FRA_nigerian_report_desc:0 "「自不列顛尼亞軍隊在奈及利亞登陸以來已過去了幾個月，他們已開始向我們的領土深處推進，在多次試圖獲取來自前線的詳細報告後，所有結果都無定論。我們必須派我們自己的一些軍官親自為我們的議會撰寫一份合適的報告並分析形勢。」"
 FRA_south_african_report:0 "「南非報告！」"
 FRA_south_african_report_desc:0 "「自不列顛尼亞軍隊在南非登陸以來已過去了幾個月，他們已開始向我們的領土深處推進，在多次試圖獲取來自前線的詳細報告後，所有結果都無定論。我們必須派我們自己的一些軍官親自為我們的議會撰寫一份合適的報告並分析形勢。」"
 FRA_send_smilas:0 "「派遣史麥拉斯」"
 FRA_send_smilas_desc:0 "「大批不列顛尼亞船隻在非洲登陸的消息已傳到法國議會，在查看了報告並意識到這可能會變成可怕的局勢後，他們向我們派出了史麥拉斯元帥，以協助組織和帶領我們的軍隊在南非和奈及利亞對抗不列顛尼亞人。」"
 FRA_consign_africans:0 "「徵募非洲人」"
 FRA_consign_africans_desc:0 "「非洲的殖民總督認為，是時候招募殖民地的忠誠公民，以協助我們捍衛在非洲的委任統治地了。他們毫無疑問知道，比起不列顛尼亞人及其帝國主義行徑，在我們這裡待遇要好得多。」"
 FRA_european_requisitions:0 "European Requisitions"
 FRA_european_requisitions_desc:0 "「非洲的戰爭已開始影響我們的軍事裝備供應，我們在生產軍事裝備時將需要偷工減料，以在戰場上與不列顛尼亞人匹敵。如果情況繼續惡化，我們可能需要請求我們的盟友為這次戰役借給我們他們的軍事裝備，這將耗費我們的資金。」"
 FRA_french_volunteers:0 "法國志願軍"
 FRA_french_volunteers_desc:0 "「我們必須號召每一位有意願的法國人服兵役，以防止我們的領地和歐洲落入不列顛尼亞人手中。這是黑暗的時期，但我們必須通過團結一致並準備好保衛祖國及其殖民委任地免受不列顛尼亞的威脅來贏得勝利。」"
 FRA_expeditionary_force:0 "「遠征軍」"
 FRA_expeditionary_force_desc:0 "The situation in Africa is starting to degrade, the military command believes it is best to mobilize and send expeditionary forces to Africa to reinforce our forces on the continent. This decision will be the first step to securing the frontline and pushing the Britannians out of Africa all together. Although we may have a weaker defense in Europe if the Britannians were to invade from the North Atlantic."
 FRA_hq_of_nigeria:0 "「奈及利亞總部」"
 FRA_hq_of_nigeria_desc:0 "「自這場可怕的衝突開始以來又過去了幾個月，在收到我們在前線軍官的報告後，史麥拉斯決定在奈及利亞建造一個新的總部，以協助協調我們的部隊在這個可怕的時期對抗不列顛尼亞人。」"
 FRA_jungle_war:0 "「雨林戰爭」"
 FRA_jungle_war_desc:0 "「我們現在與不列顛尼亞的衝突已達到關鍵點，不列顛尼亞人已被證明是一股真正強大、不可忽視的力量，但這場衝突的局勢可能很快就會轉向對我們有利的一面。史麥拉斯發現不列顛尼亞軍隊在奈及利亞的雨林地區遇到了困難，由於這些消息來源似乎非常可靠，史麥拉斯決定調撥我們的一部分資源，以支持我們在這些地區的軍隊對抗不列顛尼亞人。」"
 FRA_destroy_the_railways:0 "「摧毀鐵路」"
 FRA_destroy_the_railways_desc:0 "「隨著衝突繼續，我們注意到不列顛尼亞軍隊開始瞄準我們的鐵路路線，以便佔領並使用它們來補給他們自己的部隊。我們不能讓這種情況發生，因此史麥拉斯決定命令我們的軍隊摧毀被敵人佔領的任何及所有鐵路和補給樞紐，使其無法在這場無意義的戰爭中用來對抗我們。」"
 FRA_fortify_the_cities:0 "「加固城市」"
 FRA_fortify_the_cities_desc:0 "「無論我們做出什麼嘗試，不列顛尼亞人只是不斷向我們的領土深處推進，結果這場戰爭持續的時間比我們預期的要長。因此，史麥拉斯已命令我們從前線撤出部隊，集中力量加固我們的城市，以便為不列顛尼亞人的下一次重大進攻做好準備，因為如果我們注定要失敗，我們也要戰鬥到最後一刻。」"
 FRA_foreign_legion:0 "「外籍兵團」"
 FRA_foreign_legion_desc:0 "Our manpower is already stretched thin due to this catastrophic war being waged upon our people and our territories. We must draw manpower from our colonial mandates in Africa and organize them into military divisions to defend the African territories from advancing Britannian divisions.This will be vital to stabilizing the frontlines in Africa and if the need were to arise perhaps in Europe too?"
 FRA_hq_of_south_africa:0 "「南非總部」"
 FRA_hq_of_south_africa_desc:0 "「南非的衝突持續惡化，史麥拉斯收到了前線軍官的多份報告，向他講述了南非與不列顛尼亞軍隊的艱難鬥爭。他們每天都在失去土地給不列顛尼亞人，因此，史麥拉斯決定在南非建造一個新的總部，試圖在這個可怕的時期協助協調我們的部隊對抗不列顛尼亞人。」"
 FRA_destroy_the_ports:0 "「摧毀港口」"
 FRA_destroy_the_ports_desc:0 "「南非的戰爭還在繼續，不列顛尼亞軍隊向我們領土深處推進的程度超過了我們最初的想像，因此他們得以控制我們的一些重要港口。史麥拉斯對此非常不滿，為了防止不列顛尼亞利用這些港口對付我們，在他們繼續在我們的土地上推進時，我們已被命令摧毀任何被他們佔領的港口。」"
 FRA_frontal_war:0 "「常規戰爭」"
 FRA_frontal_war_desc:0 "「非洲的戰爭仍在繼續，我們必須在對抗不列顛尼亞及其在非洲的軍隊時採用常規戰術。穩定前線局勢對於確保我們對該大陸的控制至關重要，如果我們做不到這一點，前線很可能會自行崩潰，而我們每失去一英里的土地，都將蒙受恥辱。」"
 FRA_mobilize_africa:0 "「動員非洲」"
 FRA_mobilize_africa_desc:0 "「自這次入侵發生以來已過去了大約一年，不列顛尼亞仍在推進，奪取的領土比我們最初想像的還要多。因此，史麥拉斯決定是時候讓全非洲團結起來消滅不列顛尼亞的威脅了。多封信件已被發送給非洲前線的每位指揮官、將軍和/或元帥，要求他們聯合起來，在這個可怕的時期協助史麥拉斯。」"
 FRA_smilas_line:0 "「史麥拉斯防線」"
 FRA_smilas_line_desc:0 "「儘管我們努力擊退不列顛尼亞軍隊，但他們仍在堅持對非洲的入侵。在這場戰爭持續的期間，我們失去了許多優秀的士兵，以及沿途的許多城鎮、港口和鐵路，因此，史麥拉斯元帥宣佈建立史麥拉斯防線，這是一條橫跨整個前線的防禦陣線，並由史麥拉斯元帥親自指揮。」"
 FRA_five_russias:0 "「五個俄羅斯」"
 FRA_five_russias_desc:0 "「俄羅斯的局勢最近向我們揭曉，該共和國經歷了由不列顛尼亞煽動的分裂主義。我們需要動員有效的對策來應對東部的局勢，並鎮壓這些威脅到革命的分裂主義國家。」"
 FRA_the_real_republic:0 "「真正的共和國」"
 FRA_the_real_republic_desc:0 "「一些從烏拉山脈和中西伯利亞湧現的國家自稱為高尚的共和國，他們錯了，我們才是治理俄羅斯及其人民的唯一真正共和國。共產主義者和自稱的民主主義者因叛國反對革命而必須被消滅。」"
 FRA_the_peace_army:0 "「派遣里昂！」"
 FRA_the_peace_army_desc:0 "We will send field marshall Constantine Lyon to oversee the European military expeditions in Russia, we have the utmost confidence in his abilities to win this war against the separatists and Britannia. Lyon will serve as the shield the troops need to rally behind to defeat the enemy."
 FRA_promote_frederica:0 "「晉升費德莉卡」"
 FRA_promote_frederica_desc:0 "「費德莉卡·德·克萊芙展現出了在這些黑暗時期極需的才能和勇氣，她理應獲得晉升。希望她的新職位能給予她所需的優勢，以最大程度地發揮她作為軍事指揮官的效能，並協助里昂陸軍元帥贏得這場對抗革命敵人的艱險戰爭。」"
 FRA_strike_anarchism:0 "「打擊無政府主義」"
 FRA_strike_anarchism_desc:0 "「內戰對共和國領土內公民的士氣並沒有好處，我們需要恢復街頭秩序，並對那些在我們街頭製造無政府狀態和混難的人採取嚴厲措施。從現在開始，一切都必須為戰勝不列顛尼亞及其他分裂主義國家的戰爭努力服務。」"
 FRA_good_job_frederica:0 "「做得好，費德莉卡」"
 FRA_good_job_frederica_desc:0 "「費德莉卡·德·克萊芙在她的軍官生涯中為自己贏得了名聲，她已成為歐洲聯合在俄羅斯軍事機構中的重要組成部分，如果她繼續保持下去，她可能很快就會晉升為陸軍元帥。」"
 FRA_eurobritannia:0 "「歐洲不列顛尼亞」"
 FRA_eurobritannia_desc:0 "「歐洲不列顛尼亞是這場戰爭最初爆發的主要原因，一旦消滅了他們，這場戰爭就會結束，革命將再次獲得勝利，我們可以重建失去的家園。」"
 FRA_the_real_enemy:0 "「真正的敵人」"
 FRA_the_real_enemy_desc:0 "「俄羅斯已經經歷了一段時間的內耗，許多俄羅斯人為了讓我們在這場戰爭中走到今天而犧牲。歐洲聯合現在發現自己正與不列顛尼亞處於全面戰爭中，必須不惜一切代價阻止那些帝國主義者！」"
 FRA_hq_of_novosibirsk:0 "「新西伯利亞總部」"
 FRA_hq_of_novosibirsk_desc:0 "「近幾個月來我們的戰果為我們贏得了中西伯利亞的勝利，來自高層指揮部的命令指出，他們希望將新西伯利亞轉變為準備進一步向東攻入歐洲不列顛尼亞並結束這場持久戰爭的主要行動基地。」"
 FRA_fredericas_lina:0 "「費德莉卡防線」"
 FRA_fredericas_lina_desc:0 "「不列顛尼亞人最近擊退了我們進一步攻入西伯利亞的企圖，最近的情報暗示不列顛尼亞軍隊將發動一場橫跨整個前線的進攻。費德莉卡建議建造防禦工事以提供彈性防禦來對抗不列顛尼亞人。費德莉卡已被指派負責組織防禦，希望勝利能再次眷顧我們。」"
 FRA_mobilize_russia:0 "「動員俄羅斯」"
 FRA_mobilize_russia_desc:0 "「里昂陸軍元帥已命令俄羅斯的所有行政長官動員任何有能力的平民為軍隊提供支援，並積極招募前線服役人員。隨著同胞們流下的鮮血越來越多，這場賭注似乎也隨之水漲船高。」"
 FRA_prepare_for_a_long_war:0 "「準備迎接持久戰」"
 FRA_prepare_for_a_long_war_desc:0 "「前線似乎開始演變成僵局，任何對領土的進攻都會遭到反擊。里昂陸軍元帥認為是時候為西伯利亞的長期消耗戰做準備了。我們只需要繼續堅持下去，等待機會，等待不列顛尼亞戰略中的弱點、前線的缺口，或者任何轉機。」"
 FRA_hq_of_tsaritsyn:0 "「察里津總部」"
 FRA_hq_of_tsaritsyn_desc:0 "「透過佔領偉大的察里津，我們將分裂主義者擊退回伏爾加河彼岸。但戰鬥才剛剛開始。它就在我們的面前，橫跨俄羅斯遼闊的土地。我們將從察里津出發，穿過俄羅斯的荒原，繼續向東前進，去與革命的敵人戰鬥！」"
 FRA_the_wrong_socialism:0 "「錯誤的社會主義！」"
 FRA_the_wrong_socialism_desc:0 "「俄羅斯的共產主義者鄙視我們以務實方式保障自由的社會制度。這些脫離現實的意識形態倡導者是這場戰爭的魁首，我們必須加倍努力，結束由他們令人髮指的意識形態所造成的不必要的死亡。如果這兩場革命注定要發生衝突，那麼無論如何我們都將贏得勝利！」"
 FRA_respect_pows:0 "「尊重戰俘」"
 FRA_respect_pows_desc:0 "「即使我們贏得了戰爭，殺死所有曾經是歐洲一部分的公民和士兵也不是最人道的方法，而且會違背革命的教義。我們必須重新贏得他們的心，這樣他們的家人就會回到我們身邊。我們必須確保任何戰俘都受到尊嚴的對待，並獲得充足的食物和水，這是一項共同的人權。」"
 FRA_humanitarian_aid:0 "「人道援助」"
 FRA_humanitarian_aid_desc:0 "「被征服的領土非常遼闊，但這些人口極大地依賴俄羅斯富庶的地區。這些領土位於歐洲，而且值得留在歐洲。將食物和水分發給受影響地區的人民，希望我們不需要分發彈藥。」"
 FRA_the_charity_of_democracy:0 "「民主的施捨」"
 FRA_the_charity_of_democracy_desc:0 "「那些追隨他們自以為是民主的人錯了。這取決於我們向他們展示。我們必須將重新收復的領土重新納入新的俄羅斯民主制度，當然，是在我們的監護下。」"
 FRA_the_evil_authoritarianism:0 "「邪惡的威權主義」"
 FRA_the_evil_authoritarianism_desc:0 "Europe before the revolution had suffered from centuries of authoritarianism under the oppressive and obsolete monarchical systems, and now comes a Russian who styles himself as a new Napoleon. We do not tolerate any backtracking in our history. We will fight them with absolute fervor to liberate them from their oppressors."
 FRA_no_mercy_for_collaborators:0 "「對通敵絕不姑息」"
 FRA_no_mercy_for_collaborators_desc:0 "「威權主義的種子正在迅速蔓延。我們不能容許這些思想繼續在歐洲的土地上生根發芽。我們將切除這個癌變的毒瘤。所有通敵者都將受到審判，並被宣判死刑。」"
 FRA_execute_officers:0 "「處決軍官」"
 FRA_execute_officers_desc:0 "The officers of the monarchist army all come from excellent Russian or European academies. But their talent will not save them from their perversion of the revolution. Europia needs a pure heart more than a great mind that is what the revolution taught us. They will all be executed for their treasonous actions against the revolution."
 FRA_a_strong_democracy:0 "「強大的民主」"
 FRA_a_strong_democracy_desc:0 "「民主必須從舊貴族的手中掙脫出來。我們必須證明，軟弱並不在於那些有勇氣賦予權力的人的陣營，而在於那些出於自身私利而指地守護權力的人的陣營。」"
 FRA_pacific_coast_invasion:0 "「太平洋登陸」"
 FRA_pacific_coast_invasion_desc:0 "「我們剛剛收到來自遠東的消息，不列顛尼亞軍隊已在俄羅斯登陸，不列顛尼亞人在西伯利亞建立了一個協作政權，這一行動可能會通過點燃叛亂的火焰來鼓動俄羅斯內部進一步的異議。我們希望這一事件能迅速結束。」"
 FRA_condemn_the_invasion_of_russia:0 "「譴責入侵俄羅斯」"
 FRA_condemn_the_invasion_of_russia_desc:0 "「不列顛尼亞贊助的針對我們東方俄羅斯朋友的入侵相當令人震驚，我們需要正式譴責這次入侵，因為我們無法直接介入，在危機的這個階段我們必須使用外交手段。」"
 FRA_support_the_russian_army:0 "「支持俄羅斯陸軍」"
 FRA_support_the_russian_army_desc:0 "「我們必須支持俄羅斯的當地國家陸軍，他們將是我們對抗東方歐洲不列顛尼亞帝國主義者的第一道防線。我們應該給予國家陸軍我們能騰出的任何物資；在我們歷史的關鍵時刻，東部的勝利對我們的生存至關重要。」"
 FRA_more_vehicle_shipments:0 "「更多車輛」"
 FRA_more_vehicle_shipments_desc:0 "「我們支持俄羅斯國家陸軍的倡議要求我們生產並向俄羅斯供應更多車輛，俄羅斯人將獲得他們贏得這場對抗歐洲不列顛尼亞的戰爭並在遠東恢復民主所需的一切物資。」"
 FRA_more_gun_shipments:0 "「更多槍枝」"
 FRA_more_gun_shipments_desc:0 "The Russians have asked for more guns from us, it's time to put the European corporations into overdrive to produce more guns for the Russian war effort, victory no matter the cost is now national policy, long live the revolution!"
 FRA_more_logistical_support:0 "「更多後勤」"
 FRA_more_logistical_support_desc:0 "「俄羅斯人正就後勤事務尋求援助，我們聽到了前線的報告，俄羅斯遼闊的土地正變成消耗戰的區域，我們將向俄羅斯後勤兵團提供後勤援助，願上帝保佑那些士兵的靈魂。」"
 FRA_send_volunteers:0 "「派遣志願軍」"
 FRA_send_volunteers_desc:0 "「由於我們不直接干預軍事衝突的政策，我們不能派遣軍隊介入遠東衝突，但我們可以在俄羅斯需要幫助的時候派遣志願軍前往援助，我們將組建一支人數雖少但精銳的戰鬥部隊，並以民兵的名義派往俄羅斯。」"
 FRA_its_a_real_war:0 "「這是真正的戰爭嗎？」"
 FRA_its_a_real_war_desc:0 "In light of recent events, why has this war begun in the first place? The Brtiannian reason for this war makes no sense, why strike in the east and not in Europe? This war feels like it is separated from reality the longer it goes on, why are we fighting?"
 FRA_facing_the_blitzkrieg:0 "「面對閃電戰」"
 FRA_facing_the_blitzkrieg_desc:0 "「不列顛尼亞人正開始扭轉這場戰爭的局勢，他們正在使用 Knightmare 突破我們的軍隊並摧毀我們的前線，我們的前線軍官擔心我們可能在俄羅斯前線上面臨重大挫敗。」"
 FRA_scorched_earth:0 "「焦土政策」"
 FRA_scorched_earth_desc:0 "「俄羅斯前線已成了人間的冰冷地獄，由於不列顛尼亞人進一步向西推進，我們別無選擇，只能將一切夷為平地，以確保其不落入不列顛尼亞人的手中。願上帝原諒我們對我們的人民所造成的破壞。」"
 FRA_destroy_the_knightmares:0 "「摧毀 Knightmare」"
 FRA_destroy_the_knightmares_desc:0 "「我們必須摧毀不列顛尼亞所使用的 Knightmare 單位，如果我們能摧毀它們，我們將再次獲得軍事優勢。我們阻擊敵人的努力不會白費，一旦我們讓部隊擁有與這些 Knightmare 單位作戰的能力，我們就將有機會獲得勝利。」"
 FRA_damn_schneizel:0 "「該死的修奈傑爾！」"
 FRA_damn_schneizel_desc:0 "「神聖不列顛尼亞帝國第二皇子修奈傑爾·el·不列顛尼亞，該死的他！他就是我們現在面臨敗於不列顛尼亞人之手的原因。他或許是戰場上老練的戰略家，但也許我們能挽救局勢。他看起來像個通情達理的人。」"
