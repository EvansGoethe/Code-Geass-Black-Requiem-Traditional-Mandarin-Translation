 FRA_communist_civil_war_decision:0 "共產黨叛亂將近"
 FRA_communist_civil_war_decision_desc:0 "激進政治運動愈發劇烈的騷動正變得難以平息——我們最終必須以某種方式處理它。"
 FRA_fascist_civil_war_decision:0 "法西斯叛亂將近"
 FRA_fascist_civil_war_decision_desc:0 "事實證明，持續高漲的民粹主義思潮實在是無法阻擋，不可避免之事永無法避免。"
 ETH_defeat_italy:0 "擊敗殖民入侵者"
 ETH_defeat_italy_category:0 "第二次意埃戰爭"
 ETH_defeat_italy_category_desc:0 "意大利再度襲來，試圖將埃塞俄比亞徹底納入其殖民統治。但既然我們上次已經擊敗了這些入侵者，那麼只要這次將其徹底逐出國境，我們就能再次擊敗他們！"
 seize_some_trains_woo:0 "徵用民用火車"
 seize_some_trains_woo_desc:0 "商業鐵路公司控制着我國基礎設施。隨着戰爭的臨近，我們完全有權因國家需要而將其徵收。"
 random_general_monarchy_tt:0 "一個隨機[FROM.GetAdjective]將軍將獲得祕密君主制支持者特質。"
 removed_when_cancelled_war_prop:0 "政治宣傳已經結束。"
 war_propaganda_casualties:0 "英雄主義宣傳"
 war_propaganda_casualties_desc:0 "戰死者與日俱增，但我們仍得告訴人民：鋼鐵唯有歷戰方能煉成。"
 war_propaganda_convoys:0 "鼓勵節儉"
 war_propaganda_convoys_desc:0 "即使是平民也能幫助贏得戰爭——在利用原材料時用心節省，每克鋼材對戰爭的價值都可以翻倍。"
 war_propaganda_bombing:0 "提振精神"
 war_propaganda_bombing_desc:0 "儘管轟炸連連，我們勇敢的工人仍然奮勇前進。正是憑藉這種精神，我們纔會取得勝利。"
