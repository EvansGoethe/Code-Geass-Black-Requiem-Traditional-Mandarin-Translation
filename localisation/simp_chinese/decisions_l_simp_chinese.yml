 CHI_breach_the_yellow_river:0 "黃河決堤"
 CHI_breach_the_yellow_river_desc:0 "黃河雖爲周遭民衆生產生活之命脈，卻位於敵寇進犯之路上。已有提議炸燬其堤壩系統，作爲拖延敵軍之下下策。\n\n此舉能否起效難以定論，但其必將爲禍萬民。"
 yellow_river_blown:0 "洪水氾濫"
 yellow_river_blown_desc:0 "該地區由於黃河防洪堤被毀而洪水氾濫。"
