 MRU.1.t:0 "Astakov in Office"
 MRU.1.d:0 "Mikhail Astakov—a balding man in his fifties with the mannerisms of a scheming academic. He sat lounging in a plush office chair in an office he and his clique simply captured during the collapse of the Russian Republic. He let out a sigh as his cabinet looked worriedly at him.\nOne of Astakov’s cronies tapped the table with their finger repeatedly. “The Tsar isn’t coming. No one is going to listen to us without him.”\nAnother man from the cabinet interjected. “Who cares if the Tsar shows up? We are the ones in power all the same. That’s thanks to Astakov, not the Tsar.”\nAgain, someone else decided to voice their thoughts. “The Tsar is the reason we had any popularity to begin with!” he shouted while smacking the iable.\n\nArguing children as per usual. For all those thoughts and opinions rattling around in their heads, they have no vision, Astakov thought to himself while they bickered amongst themselves. The Tsar would return, but not to lead Russia himself. Instead, Astakov would be the strong leader that Russia needed with the Tsar posing as a figurehead. He’d serve as a symbol while Astakov would serve as the guide for his nation. That was the true purpose of the Tsar’s return.\nAs Astakov let out another sigh, the door to the room swung open, letting in a gust of air. “Sir, a phone call for you. It’s the Tsar,” said the arriving aide, speaking over every man present. The arguing cabinet fell silent as Astakov sat up, a smug smirk forming on his face.\n\nIn the room next door, Astakov sat at a lone desk with a phone to his ear. Over the phone, a firm voice full of resolve spoke his name. Accustomed to the Tsar’s calls by now, Astakov relaxed in his chair. “Wonderful to speak with you again, Your Majesty.”\n“I’m calling about your request,” Vsevolod Romanov said as Astakov perked up in his chair with anticipation.\n“Of course. Have you made your decision?” Astakov, despite being sure of himself, sat on the edge of his seat.\n“Yes, I will return to Russia—to my people.”\n\nAstakov had a twitching grin, unable to withhold his excitement. His plans were finally bearing fruit. “Fantastic! You will be warmly welcomed at the Ekaterinburg International Airport, Your Majesty!”\n“Right... I presume you’ll come to greet me upon my arrival?”\nAstakov nodded to himself, clutching the phone with both hands. “Of course! I will have my men personally escort you.”\n“Expect me there, then,” the Tsar said before hanging up.\nAstakov stared down at the phone for a few seconds before laughing out loud. He stood up from his chair and began pacing around the room giddily. Twirling around in place, he walked over to the window and gazed at several civilians on the street below."
 MRU.1.a:0 "Soon, my Mother Russia."
 MRU.2.t:0 "The Tsar's Entrance"
 MRU.2.d:0 "“What do you mean he’s already there?” Astakov threw his hand up at the driver in anger, sitting in the back of a black car surrounded by police motorcycles and tailed by another car. The man pulled at what little hair he had left and bounced his leg rapidly, full of anxiety on this congested road. Scores of people blocked the road to the airport. His motorcade had no chance of making it in time to meet the Tsar amidst this chaos. He grumbled to himself and grabbed a remote from a drawer connected to the partition dividing the front and back of the car. Furiously pressing buttons, he turned on the monitor in front of him, switching straight to the news.\n\nAll Astakov could see on the screen was the young silver-haired man waving to a tremendous amount of people, appearing somewhat cold but self-assured. He adjusted the sleeve on his green ceremonial military tunic before walking down the steps of the plane. The people cheered, yet as the camera cut to various shots of the crowd, some of them appeared to be confused. Behind the young man, several other people could be seen walking down the steps as well, all dressed in formal military garb.\n\nAstakov crossed his arms, grinding his teeth. “Can you not go around? This is the Tsar we’re meant to be meeting! Drive!”\nThe driver sheepishly glanced out the window to avoid Astakov’s fierce glare. “I’m afraid not, sir.”\nAstakov clicked his tongue. “I’m supposed to be running this show... so what am I doing stuck in traffic?!”\n\nFrom the monitor, the news reporter covering the event could be heard saying, “A Romanov has just landed at Ekaterinburg International Airport. The Tsar is here! The Russian Empire is restored!” She was then cut off by someone behind the camera chastising her for her lack of professionalism. She cleared her throat. “My apologies... We will update you as the situation progresses. Pokrovskaya Fenya, signing off!” She gave a thumbs up to the camera."
 MRU.2.a:0 "Thanks for the traffic, Your Majesty."
 MRU.3.t:0 "Manoeuvres of the Oprichniki"
 MRU.3.d:0 "Tapping his finger on the desk repeatedly, Astakov grumbled to himself as the Duma was reaching its conclusion. Not a single one of his proposed ideas have been brought up or even considered. Only measures transferring power to the Tsar were passing. The Tsar, not Astakov. It was all about the Tsar. Wasn’t this supposed to be about his ideas, not about some posh kid with nothing more than royal blood running through his veins? Where were the policies he proposed? This whole session started to get on his nerves.\n\nOut of the corner of his eye, Astakov saw one of the Oprichniki leaning against the wall, acting as carefree as usual. It was Maksim Orlev, his dirty blonde hair poking out from under his officer’s cap. Astakov kept tapping the desk while glaring at Maksim.\n\nWhen Maksim spotted Astakov staring a hole through him, he looked back, only giving him a small smirk and a condescending shrug. Astakov’s face tensed up, a vein nearly popping in his eye. His frustration instantly turned into infuriation. What were these kids trying to do to him? To his government? His Russia? Whatever they were scheming, he would put a stop to it."
 MRU.3.a:0 "Not if I can help it."
 MRU.4.t:0 "A Race for Power"
 MRU.4.d:0 "The door to Astakov’s office swung wide open. One of his paramilitary officers stormed in full of rage. “Are you kidding me!? Those RSDF shits! They think they can turn me down despite all of my experience? I belong in the general staff, not those kids!”\nAstakov sat wide-eyed, leaning forward in his chair. “What are you talking about? Kids? What kids?”\n\nThe officer gritted his teeth and grumbled to himself before explaining. “The Oprichniki. You know, those teenagers that arrived with the Tsar on his plane. They call themselves his ‘inner circle’ or something,” he scoffed.\nStanding up, Astakov walked towards the open door. “I’ll look into this,” he said rather plainly before heading down the hall.\n\nWhen Astakov entered the general staff’s room, his jaw dropped. Before him were six teenagers lounging at a table, feet up and leaning far back in their chairs. One of them yawned while going through papers as Astakov entered the room. His officer wasn’t exaggerating. None of them even acknowledged his presence.\n\nAstakov smirked slightly, chuckling to himself. “So, this is the Oprichniki? Can you explain how in the world the general staff is made up of all of you?”\nAfter several seconds, a young man by the name of Sergey Voronov spoke up, leaning his head on his hand and refusing to even look at Astakov. “Well, your paramilitary officers didn’t have a plan set up yet, so we got onboarded as the general staff instead. Desperate times, right? It’s only natural.” Voronov gave Astakov an emotionless smile.\nAstakov’s left eye twitched. “My officers would be much better suited for this role.”\n\nAnother Oprichniki member, Robert Saulfort, chimed in, waving his hand dismissively. “We’re sympathetic to your officers that it turned out this way, but Russia is currently in a state of emergency. We need soldiers, not street thugs.”\nNot wanting to cause any more infighting to occur, Astakov exhaled heavily and narrowed his eyes at the group of teenagers. “Right... Thank you for explaining the situation. I’ll pass it on to the officers.” He shook his head and walked out of the room with one hand in his pocket and the other clenched in a fist."
 MRU.4.a:0 "Those brats won’t get the best of me."
 MRU.5.t:0 "Voronov Breaks the Camel’s Back"
 MRU.5.d:0 "Astakov sighed once again, trying to relieve the tension in his chest. Over and over again, his plans failed. Even before the Tsar arrived, his plans would always fail. Why? He managed to seize power over the Urals, but it was slowly starting to slip from his grasp. Was this his fatal flaw—being incapable of doing anything of value on his own, achieving things only for a brief period of time before they would inevitably escape him again? If it weren’t for the discord amongst the people and his own political party, Russia could become strong again. Whose fault was that? His own?\n\nAt least he could feel relieved for now. His old and loyal comrade Abakumov would be leading the Okhrana, the new intelligence agency. That meant Astakov would have an ally he could trust in a position of power, however small that power may be. He stared at the ceiling with his hands clasped together, waiting for Abakumov to enter the room with good news. No sooner than he thought this, the door in front of him opened.\nAstakov sat straight up in his chair, excited to see his friend enter the room. However, he didn’t see Abakumov at all. Instead, he watched warily as a young man in a black suit walked in, a disingenuous smile plastered across his face. Astakov sputtered and leaned forward, staring in shock at the man standing before him. It was none other than Sergey Voronov of the Oprichniki.\n\n“Good evening, Prime Minister Astakov,” Voronov politely said. “I’ll be the new head of the Okhrana. I am very grateful for this role.”\nAstakov’s left eye twitched, his lips quivering as he realised what was happening. “Where is Abakumov? What have you done to him?!”\nVoronov appeared confused. “Abakumov withdrew his candidacy. As the only person left, I became head of the Okhrana by default. I hope that isn’t a problem. We are in a state of emergency after all. I’d hate for this selection to be delayed any further.”\n\nAstakov’s breathing was unsteady. It kept happening—his destiny was falling apart before his very eyes! These kids from Britannia were stealing it from him again!"
 MRU.5.a:0 "Yes, of course..."
 MRU.6.t:0 "Astakov’s Destiny"
 MRU.6.d:0 "Staring across the room at the frantic Astakov, the aide blinked repeatedly, wondering what had happened to the old man. He watched as the old man desperately scribbled down nonsense onto several sheets of paper before tearing them up and tossing them aside. Astakov’s bloodshot eyes darted across the sheets, the pace of his breathing further increasing with every piece he threw to the ground.\n“Sir, are you feeling alright?” the aide said, quickly regretting having entered the room.\n\nAstakov muttered to himself and slammed his hands on the desk. “This is my country! The Tsar can’t take that from me! I’m his regent—he can’t do anything without me!”\nThe aide glanced back and forth, shuffling his feet. “Should I call for someone, sir?”\nAstakov ignored him and continued on with his outburst, spit flying from his mouth and snot running down his nose. “I’ve worked decades for this! Me, alone! I’m not going to let some upstart brat take it all from me, let alone some half-Britannian fraud! Russia is mine—MINE! It’s MY destiny!”\n\nWith that, the room fell silent. Astakov took a moment to collect himself before finally mumbling, “I won’t let them...” He grew louder. “They can try to stop me, but I won’t let them do whatever they please!”\nAstakov surrounded himself with his paramilitaries. No one else could be trusted, especially not the Tsar and his Oprichniki. Secluding himself, he desperately vetoed every policy the Tsar attempted to introduce, not allowing anything to get through. This was HIS country—HIS destiny. Now the Tsar was trying to take it from him and make a fool out of him to boot! His hands trembled as he vetoed more and more policies until every single one of them had been thrown in the trash. He wouldn’t let any more of their plans be realised, not after his own were foiled.\n\nUpon seeing this unfold, the aide slipped into the hall when no one was looking and snuck next door. He grabbed the telephone and dialled the number for the Oprichniki."
 MRU.6.a:0 "I can’t let it end like this!"
 MRU.7.t:0 "The Tsar and his Regent"
 MRU.7.d:0 "The sound of footsteps could be heard echoing around Astakov’s office for the last few hours. He hadn’t slept or halted his defiance to even get a drink. The office air had grown stale and the only source of light in the room came from the dimmed bulb of his desk lamp. He brushed back his window curtains, peering outside at the military trucks surrounding the place. The doors leading outside had already been overrun by the Tsar’s forces, so Astakov’s paramilitaries retreated further inside to guard several key locations within the building. At this point, he was committed. No one would steal his destiny from him again for as long as he lived.\n\n“That little half-breed brat! He can’t do this to me! Not me... I’m different,” Astakov rambled, peeking through the curtains again with bloodshot eyes. He gripped the pistol holstered against his waist. “He can’t. I’ve worked too hard for this!” A few moments later, he spotted the silver-haired Tsar step out from behind one of the trucks, illuminated by the amber setting sun. Astakov clawed at the curtains and slid the window open, shouting down at the people below. “I want to talk!” he yelled while leering at the man he despised most in the entire world. “With the Tsar, not one of his officers!”\n\nAstakov looked on with bated breath as the Tsar turned to talk with a woman next to him. Probably the Tsar’s assistant or something, he thought. He watched the scene below for several minutes. When they finished their conversation, the Tsar signalled something to one of his soldiers and then made eye contact with Astakov. Trembling as he stroked the grip of his pistol with his thumb, Astakov decided he would exact his revenge right here inside his office. This would be the last time anyone would ever get in his way—in the way of his life’s work. Astakov watched as the Tsar and the woman entered the office building.\n\nHe stepped away from the window, closed the blinds, and set his gun inside his desk drawer. He removed the cabinet he had placed in front of the office door out of paranoia and returned to his seat, awaiting his special guests. For what seemed like ages, Astakov couldn’t hear anything anymore except his own unsteady breathing. Finally, the office door opened. The woman entered the room first, followed by the Tsar. He took a seat whilst the woman stood next to him at attention.\n\n“Who the hell do you think you are?!” Astakov’s voice came out quietly at first but rapidly escalated into a full-blown shout without a shred of respect for the man sitting in front of him. Unable to continue stewing in his hate-filled chair, Astakov stood up abruptly, glaring bitterly at the Tsar. “You think you can take this from me? This is MY destiny!” You are the Tsar, a figurehead for the people, and I am your regent! You are here only because I allowed it, not because of some antiquated birthright!” The Tsar kept still and quiet, listening to Astakov’s mad rants. The woman next to him gave Astakov a scornful glare and seemed to be getting progressively angrier with every word he uttered. “I’m not going to let some impudent little brat take this from me! Russia. Is. MINE!” Astakov shouted at the top of his lungs, leaning over his desk and punctuating his declaration by slamming it with his fist as hard as he could. “MINE!”"
 MRU.7.a:0 "I’ll put a stop to this, once and for all."
