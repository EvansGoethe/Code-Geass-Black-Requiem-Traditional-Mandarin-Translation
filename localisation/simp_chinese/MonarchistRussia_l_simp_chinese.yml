 MRU_Risen_From_History:0 "Risen From History"
 MRU_Risen_From_History_desc:0 "As a result of the chaos caused by the Russian collapse, Astakov’s clique took control of Ekaterinburg. The nationalists can reunite Russia by force of arms and end the stagnation of the corrupt Republic. Russia must once again be united under a strong leader. The question is, who might that leader be? The young Tsar or his scheming regent?"
 MRU_Arrival_Of_The_Tsar:0 "Arrival of the Tsar"
 MRU_Arrival_Of_The_Tsar_desc:0 "Vsevolod Romanov, the true Tsar of Russia, has landed at the Ekaterinburg International Airport. The arrival of a Romanov is being considered by the public as a sign that Russia will return to its former glory once more. Astakov, who was unable to arrive at the ceremony after being blocked by crowds of excited people, may not be able to maintain his popularity for much longer."
 MRU_Foundation_Of_The_Imperial_Rule_Party:0 "Foundation of the Imperial Rule Party"
 MRU_Foundation_Of_The_Imperial_Rule_Party_desc:0 "The Tsar is using his influence to form the Imperial Rule Party, which advocates for an imperial ruler over the Principality of Ekaterinburg, namely the Tsar. He will make a grand speech and address Astakov’s clique directly. If they are loyal to the Tsar, surely they will not object to this new party. Through party unity, the Principality of Ekaterinburg can proceed with the reunification of Russia, resurrecting the fierce golden eagle and silencing the whimpering of the diseased mutt which has plagued the Republic for so long."
 MRU_Assembling_A_Military_Command:0 "Assemble a Military Command"
 MRU_Assembling_A_Military_Command_desc:0 "Out of fear of losing power, Astakov launched his plan to use the army to maintain order and, more importantly, his position. Adversely, Vsevolod and his loyalists have begun making their own moves to secure the Oprichniki as the general staff of the army and Vsevolod’s position as Tsar of Russia. Thus, a race for power has commenced between the two men."
 MRU_Forming_The_Okhrana:0 "Form the Okhrana"
 MRU_Forming_The_Okhrana_desc:0 "The formation of an intelligence agency is required to expel the rats sneaking around in our government. Naturally, a man from the Oprichniki would be best suited to become the director of the agency, though Astakov would be strongly opposed to this idea."
 MRU_Government_Standstill:0 "Government Standstill"
 MRU_Government_Standstill_desc:0 "The Tsar has made a grab for power we did not anticipate. He intends to lead Ekaterinburg on his own, using his Imperial Rule Party to leave us without any positions in the government. This is something we cannot allow to happen. As a last ditch effort, we must utilise our paramilitaries to quell his overconfidence and secure our future within the new regime."
 MRU_Ekaterinburg_Square_Coup:0 "Ekaterinburg Square Coup"
 MRU_Ekaterinburg_Square_Coup_desc:0 "Despite all of our efforts, the Tsar is still closing in on us. We are holed up in the Ekaterinburg Government Office, surrounded by him and his Oprichniki. How could this young man have outmanoeuvred us? What else can we do? There might not be a way out. All we can do now is bide our time and hope he shows us mercy."
 MRU_The_Great_Restoration:0 "The Great Restoration"
 MRU_The_Great_Restoration_desc:0 "The rightful ruler of Russia has finally returned to the throne. Today is a day for celebration and one that will go down in history, but there is still much to be done. With the European lapdogs to our west, we can’t afford to sit idly for too long. Russia is in a state of civil war, after all, despite direct combat between armed forces not having taken place yet."
 MRU_Pulling_The_State_Together:0 "Pull the State Together"
 MRU_Pulling_The_State_Together_desc:0 "Now that Vsevolod is in power, he can actually put that power to use. We have several issues at hand, such as the remaining forces Astakov rallied to his side before his death, corruption within the church, and the arguments regarding the Duma."
 MRU_Bringing_Our_House_In_Order:0 "Bring our House in Order"
 MRU_Bringing_Our_House_In_Order_desc:0 "We need to quickly get the Oprichniki together and discuss a way to solve the issue of what remains of Astakov’s paramilitaries. We could take a more heavy-handed approach or something less direct. Either way, we can’t leave this issue for later. Astakov’s remaining forces must be dealt with as soon as possible."
