 MRU_vsevolod_romanov_desc:0 "Descending from the Imperial Romanov bloodline, Vsevolod Romanov is a quiet and cunning young man. He was born in Britannia to his mother, Elanor Calwell Romanov, a Britannian, and his father, Alexander Romanov, son of the last Tsar of Russia. Because his father had been forced into exile during the Great War, Vsevolod has never set foot on Russian soil. He attended a Britannian military academy with his childhood friend, Selena. He was an impressive student during his academy days, garnering the admiration and respect of the faculty and other talented students. However, he made few friends due to his introverted nature. One day, a man by the name of Mikhail Astakov contacted Vsevolod, encouraging him to return to Russia to reestablish the Romanovs’ rule. Upon the collapse of the Republic of Russia, Vsevolod spotted his opportunity and seized it, flying with his Oprichniki to Ekaterinburg."
 MRU_mikhail_astakov_desc:0 "Mikhail Astakov, a Russian man in his fifties, is a nationalist who believes Russia should be united under a strong leader—preferably himself. He is an academic and especially good with history, utilizing great caution to not repeat the mistakes of the past. Much to his chagrin, he has spent his adult life not achieving much due to the infighting within his clique. However, he finally managed to seize control of the Urals after the collapse of the Republic of Russia using his anti-Republican populist movement. When he received news that an heir to the Tsar had been living in Britannia, he quickly got in contact with the young man, intending to use him to gain legitimacy."
