 EUR_Cheap_and_fast_firepower:0 "Cheap and Fast Firepower"
 EUR_Cheap_and_fast_firepower_desc:0 "To secure our victory, we will rely on the unstoppable force of massed armored units. Quick to mobilize, cost-effective, and relentless, tanks and mechanized vehicles will form the backbone of our military might."
