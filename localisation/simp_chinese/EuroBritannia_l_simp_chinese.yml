 EUR_Present_from_Britannia_desc:0 ""
 EUR_Death_from_sky:0 "Scavenge old Aircraft"
 EUR_Death_from_sky_desc:0 "Amid the remnants of the old Russian government, we will scour the wreckage for aircraft long forgotten. These once-proud machines, now little more than husks, will be resurrected and retooled in service of the Emperor."
 EUR_Learn_from_Brittanian_experience:0 "Poach Britannian Instructors"
 EUR_Learn_from_Brittanian_experience_desc:0 "Our forces are ready to embrace the air, but to do so, we need the expertise that only Britannia’s finest can provide. By poaching the most skilled instructors from Britannia, we’ll ensure our air forces are not just trained but molded in the image of the Empire’s greatest."
 EUR_Invite_Britannian_aces:0 "A Shipment From Abroad"
 EUR_Invite_Britannian_aces_desc:0 "A fleet of unmarked vessels has docked at our port. While our quartermasters would typically handle such matters, the Grand Duke has taken it upon himself to investigate personally. Perhaps the Grand Duke has more influence than we had thought?"
 EUR_Develop_our_own_doctrine:0 "Developing our own Doctrine"
 EUR_Develop_our_own_doctrine_desc:0 "Our air force must no longer follow the tired tactics of the past. With unyielding speed and precision, we will dominate the skies, cutting down any foe that dares challenge us."
