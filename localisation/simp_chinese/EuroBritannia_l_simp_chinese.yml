 HIGHLAND_DESC:0 "Augusta Henry Highland, also known as Grand Duke Velaines, is an honourable and chivalrous man and a close relative of the Britannian Imperial Family who has been entrusted with affairs regarding the Holy Britannian Empire's security by the Emperor himself on numerous occasions. He has been put in charge of one of Britannia's newest projects, Euro-Britannia, as its suzerain and, as such, is determined to bring Russia under the dominion of the Holy Britannian Empire."
 EUR_INTRO.1.t:0 "Cold Winds Are Blowing"
 EUR_INTRO.1.d:0 "For over 300 years our forefathers have worked to turn this desolate wasteland into a glorious beacon for Mother Russia. For over 300 years we have fought against starvation and disease cut off from the rest of civilization. For over 300 years we have been stalwart defenders of the greatest expanse known to man, holding the line against any wayward invasion from the Chinese down south.\n\nWe have done our part and we expected our countrymen to do the same for that was the deal we struck with them oh so long ago... yet... what has that brought us? All of our great history dashed away into the dirt as the bureaucrats of Europe sank their teeth into our wealth... nothing more than a puppet state after the Great War. Our politicians turning their backs on their own as they only care for their ever-increasing bank accounts.\n\nFor too long, we have clung to the belief that the Russia we knew and loved still existed, that our loyalty and sacrifices would be recognized and rewarded... but we were fools. The Russia of our forefathers died long ago, buried under layers of corruption and greed. We, the people of Eastern Siberia, have been reduced to pawns in their games, our voices ignored, our needs dismissed...\n\n No more...\n\nThe time for negotiations and false hopes is over. The only way to save Russia is for us to take matters into our own hands. The true Russia lives in our hearts, and it is us who shall bring it back to life."
 EUR_INTRO.1.a:0 "Our dream is not yet dead!"
 EUR_INTRO.2.t:0 "A Lead Amongst The Dead"
 EUR_INTRO.2.d:0 "The room was a mosaic of stern faces and furrowed brows, a stark contrast to the ornate gold leaf that lined the high ceiling. The chandeliers, once a bastion of opulence, now cast a grim pallor over the hastily assembled council. Sergei had learned much over these last tremulous days as now he found himself the president of the Provisional Government. A fact no doubt tied to his rallying cry but a few weeks ago. His hands shifting eagerly through the stacks of papers that made up the hastily made report on the armed forces and the economy. Eyes flickering upwards to the rest of the grand assembly doing much the same.\n\n\"What do you expect we do?!\" Boris's voice rose above the rest. \"We do not have the factories, the equipment, or god forbid the people to get through even the Socialists. Sure what men we do have can probably hold off their tide but...\" He paused, looking around the table at the men and women who had pinned their hopes on this shaky alliance. His hands rise up before taking off his glasses and setting them down on the hardwood table in front of him \"If we are to win this... IF.... we cannot do this alone.\"\n\nSergei took a deep breath, his fist clenched around the report he'd been reading. He knew Boris was right. The numbers didn't lie. The Monarchists had resources, the socialists had numbers, and here they are trying to hold together a country that couldn't hope to survive alone. His jaw tightened. \"We need an alliance,\" he said flatly...\n\nBut before they could continue, a sharp knock on the door drew their attention. It was a young aide, who rushed to the President's side, nearly tripping in the process before handing another report to Sergei. \"From the investigation team, sir,\" she whispered. \"It's... just read it...\"\n\nSergei's heart sank as he took the paper, scanning the first few lines. His face contorting in a manner most would see as contemplation, but not Boris. In the eyes of his friend, all he saw was rage. \"It seems,\" he began, his voice low and measured, \"that the detonation at the port was no accident\" He paused as a deafening silence filled the space to bursting. \"Someone was able to slip inside the permitter during the chaos and planted a bomb on the ammunition depot... This was a deliberate act of sabotage.\"\n\nSergei slammed the report down on the table, the sound echoing through the room. \"We must find out who did this!\" he said with a steely conviction. \"We need to know who did this atrocity... and if they were Russian... or someone else...\""
 EUR_INTRO.2.a:0 "May God have mercy for them for I shall not..."
 EUR_INTRO.3.t:0 "In From The Cold"
 EUR_INTRO.3.d:0 "\"Alright, keep it tight. Lets not let them slip out of our grasp a second time now.\" the squad leader, Sergeant Ivanov, murmured into his radio. The crunch of fresh snow beneath their boots was the only sound piercing the deafening silence of the Siberian wilderness. The five soldiers of the 3rd Special Forces Unit moved in a staggared line, their breaths misting in the frigid air.\n\n A sudden jerk from the man in the rear caught Ivanov's eye. Private Novakov had paused, his rifle at the ready, his gaze fixed on a disturbance in the dense, snow-covered forest ahead. \"What is it?\" Ivanov hissed, his eyes scanning the area for any signs of danger.\n\n\"I thi-\" Novakov's reply was cut short by the crack of a distant gunshot. The force of the bullet threw him back into the snowbank behind him, a crimson stain blossoming rapidly against the white snow. The other four soldiers dropped into combat positions, their eyes darting to find the source of the threat.\n\n \"Contact, front!\" Ivanov barked diving to the ground. Rounds whizzing right above where he was just standing sending a chill down his spine. The forest erupted with the sound of gunfire as the hidden assailants revealed themselves.\n\n The squad returned fire with precision, their movements a blur as they weaved between trees and cover. The crack of rifles echoed through the quiet woods, punctuated by the thump of snow kicked up by the incoming rounds. Yet despite the unfavorable conditions Ivanov found himself in, it seems as though the rest of his squad was doing much better. One after another the hostiles were dropping till silence once more swept over the dead trees.\n\n Ivanov signaled for the squad to advance cautiously as they pass several bodies. His heart hammering in his chest as they rush around an overturned log. Two unknown men lay against the log, their rifles tossed to the side. They were dressed in gray and white winter camouflage, their bags strewn across the colorless snow as makeshift cover. It was there, poking softly out of the side that he spotted something that caught his eye... a computer... and a transmitter...\""
 EUR_INTRO.3.a:0 "Let's see what's on that device you have there."
 EUR_INTRO.4.t:0 "A Change In Plans"
 EUR_INTRO.4.d:0 "Subject: The Okhotsk Tragedy Shall Not Go Unanswered\nFrom: Alexandrov Yeltz, Director of Counter Intelligence\nTo: President Sergei Sorokin and the Provincial Committee\n\nTo the esteemed Committee,\n\nI am proud to confirm that we eliminated or captured all of the individuals responsible for the Okhotsk tragedy several weeks ago. Our operatives were successful in tracking down those responsible engaged, killing five and capturing two of the culprits.\n\nPer your instructions, the survivors' interrogation is going slowly, yet I am impressed by their resilience. I have yet to crack either of them, but this fact alone says much about what we are dealing with. These men have had formal training, and there is no doubt that they are part of a much larger organization.\n\nAdditionally, I have ordered a comprehensive analysis of the information obtained from a computer found on their persons. While accessing this information has proven challenging, I can confirm two critical points.\n\nFirstly, this team has been transmitting to somewhere within the Britannian homeland.\n\nSecondly, the computer indicates that this team was tasked with infiltrating the space program run by the now-defunct Zakharov government.\n\nThe revelation that the collapse of Russia was orchestrated at least in part by this now unknown Britannian Intelligence agency has not passed me by. Yet, the space program's significance cannot be overstated. Its operation has been conducted under the veil of utmost secrecy for decades, with even its locations under the highest classification.\n\nOnly President Zakharov and his closest advisors knew the details of the program, but whatever these Britannians are after, I can assure you that we shall know soon enough. In the meantime, I shall ensure that we catch any other godforsaken spy that has found itself within our borders."
 EUR_INTRO.4.a:0 "The Space Program you say?"
 EUR_INTRO.5.t:0 "Conspiracy Amongst The Stars"
 EUR_INTRO.5.d:0 "Subject: I Found What They Were After\nFrom: Alexandrov Yeltz, Director of Counter Intelligence\nTo: President Sergei Sorokin\n\nSince my last report I have done some additional digging into our guests, and they have been quite talkative as of late. From what they have said, as well as our own investigation, we now know the locations of several facilities tied to the Russian Space Program—sites whose secrecy has been maintained even through the turmoil of our nation’s collapse.\n\nAs you know, this program was conceived in the wake of the Great War, when Europe’s heavy-handed edicts left our economy crippled and our people demoralized. Seeking a path forward, the government of that time saw the burgeoning development of propulsion technology as an opportunity. One that could not only restore national pride but also create something of real value, immune to foreign exploitation. The Space Program became that path, shrouded in secrecy from both our neighbors and our own people.\n\nWe all watched the old shows depicting those all too famous closed cities... and it seems as though we can now put all those debates on where they were located to rest. We have identified 4 main hubs scattered across our motherland, and fortunately, they will remain hidden from our adversaries. It seems the Britannians, before starting this whole mess, at least ensured that the chaos in Russia would stay far away from our beloved national treasure hoping to get to it while we were distracted. Unfortunately for them, they underestimated just how... persistent we can be.\n\nThese facilities, while not directly influential in our current military struggle, represent a potential lifeline for our people. We both understand the precariousness of our situation. Our resources alone are not sufficient to secure victory in this civil war, and requesting foreign intervention may be our only option. Should that time come then the value of these sites lies in their potential as a bargaining chip... quite an attractive one at that.\n\nI have ordered the men under my command to secure the only site currently within our boarders being the Vostochno-Yevraziyskiy Cosmodrome. I suspect that our number should be sufficient though I would like to request some additional forces to keep it’s secrecy for as long as we can."
 EUR_INTRO.5.a:0 "This will do quite nicely for future negotiations."
 EUR_INTRO.6.t:0 "The Lion's Mistake"
 EUR_INTRO.6.d:0 "Subject: Elimination of Britannian Intelligence Cell\nFrom: Alexandrov Yeltz, Director of Counter Intelligence\nTo: President Sergei Sorokin\n\nOur operation has successfully dismantled the Britannian intelligence network that had infiltrated our territory. Although the endeavor cost us several skilled officers and dedicated personnel, I can say with confidence that the entire cell has been neutralized.\n\nTo be quite frank I am a little dissapointed that it was this easy. With the equipment we captured from our initial engagement we inserted ourselves right into their communications network. From there it wasn't too difficult to raid their positions or set up traps so they could experience the suffering the inflicted during that dark day. With their network now dismantled, the threat from Britannian espionage has been effectively removed.\n\nHere's hoping the next task you give my office will last a little longer."
 EUR_INTRO.6.a:0 "If only the old government were as competent..."
 EUR_INTRO.7.t:0 "Breaking Through The Veil"
 EUR_INTRO.7.d:0 "President Sergei sat at the head of the long table, his brow furrowed in thought. Around him, members of the Governing Council both civilian and military leaders alike exchanged tense whispers. Boris lounged nearby, his chair large and reinforced as to maintain his vast girth.\n\n“We cannot afford to delay any longer,” said Captain Yelena Markov, a decorated officer and one of the council’s most vocal members. She leaned forward, her voice steady but urgent. “Our reality is clear. Without foreign support, our resources will run dry within months. The monarchists and socialists already outmatch us, and the damned Europeans will crush us once they get through the other two. We have the space program facilities which, at this point, is the only card we hold that could interest anyone. We should approach our southern neighbors who might be sympathetic to our cause, especially if it keeps Britannia’s influence at bay.”\n\nBoris chuckled softly, drawing the attention of the room. “The Pacific nations? Sympathy? Captain, you’re dreaming,” he said, his tone dripping with sarcasm. “Even if we could secure a meeting, what guarantees do we have that they’d act? Most of them are too entangled with China’s power bloc or too weak to make a difference.”\n\nMarkov bristled, but Boris raised a hand to forestall her retort. “No, if we’re serious about survival, we should consider Britannia.”\n\nThe room fell deathly silent as the very name seemed to darken the air. “We all know Britannia’s role in sparking this civil war, but let’s not pretend they don’t hold the cards here. Britannia is the only superpower with both the resources and the desire to act. They want our space program which is no speculation as it is a fact. We offer them the facilities and whatever else they can acquire from that junk, and in return, they back us. With their support, the war ends in months, not years.”\n\nSergei’s expression remained unreadable, but the council erupted into heated debate. Some nodded at Boris’s words, their pragmatic side recognizing the logic. Others shouted in protest, accusing Boris of betraying their people by even considering working with Britannia.\n\n“Enough of this bickering!” Sergei shouted as he rose to his feat. His voice cutting through the clamor like a hot knife as the whole room turned towards him. The room held its breath as Boris asked the question that was on everyone’s minds. “Well, Sergei,” he said, his tone almost challenging. “The council defers to you. What do you say, Mr. President?”"
 EUR_INTRO.7.a:0 "Both of you make your points well... I shall need some time to think."
 EUR_INTRO.8.t:0 "All In"
 EUR_INTRO.9.t:0 "Deal From.. Britannia?!"
 EUR_INTRO.9.d:0 "Subject: Aid To The Far-East\nFrom: Oiagros Zevon\nTo: Acting-President Sergei Sorokin\n\nIn the name of Charles Zi Britannia, 98th Emperor of the Holy Britannian Empire. I Oiagros Zevon head of the prestigious and noble Zevon family write in his name, to lay forth the terms of aid to the Far-East Provisional Government. If the terms laid forth by the Emperor himself are met, our support and assistance will follow through to aid the efforts of your nation.\"\n\n1. The Far-East will allow the Holy Britannian Empire and all its Areas access to its ports for docking and refueling purposes.\n2. The Far-East will allow the Holy Britannian Empire and all it's Areas access to its resources for purposes of aid.\n\nIf these said terms are met. Our aid and support will be rendered as thus.\n\n1. Russians will be treated as equals to Britannians, and will receive the same privileges and rights afforded to Britannians when dealing with the Holy Britannian Empire and its Areas.\n2. The Far-East will be considered a totally independent nation seperate from the Holy Britannian Empire and its Areas, but treated as an equal, receiving the benefits of trade and political backing.\n3. Supplies will be sent to the Far-East in order to help their war efforts, including Britannian equipment, technology, soldiers and expertise.\n\nThe Emperor expects the response to this letter within the month."
 EUR_INTRO.9.a:0 "'All... hail... Britannia?'"
 EUR_INTRO.10.t:0 "Bluffing The Devil"
 EUR_INTRO.10.d:0 "Sergei Sorokin stood on the steps of the capital building overlooking the main plaza. Where once he had simply been a mayor trying to do what was right for his people, now he stood leading a government built on little more than desperation and borrowed faith. Behind him, Boris stood as his unease betrayed itself in the occasional twitch of his fingers.\n\nKnightmares flanked the oncoming procession like steel predators looking for the slightest sign of danger. Britannian soldiers marched in perfect unison around their charge as the ambassador stepped forward, his polished boots clicking against the stone. The crowd's thunderous cheers drowned out everything except the voices of those close enough, allowing Sergei, Boris, and the ambassador to speak in a fragile bubble of words.\n\n“President Sorokin,” the ambassador greeted, his voice warm and cordial, though something in his tone made Sergei’s stomach churn. “What a spectacular welcome. Your people have truly outdone themselves. Why I don’t think I could have asked for better if I was visiting one of our subjects.”\n\nSergei nodded stiffly, keeping his tone measured. “I thought it would be best that we celebrate the start to a partnership that will bring freedom and prosperity to our two peoples.” The ambassador’s smile lingered for a moment before it twisted into something far colder. “Ah, partnership,” he repeated, almost as if testing the word.  “I’m afraid that word no longer applies. Effective immediately, Britannia is assuming control of the Far East. Your government is to be dissolved, and our administrators will take your place. You see this arrangement is unfortunately non-negotiable.”\n\nSergei’s heart dropped as stood there incredulous desperately trying to find his words. “You’re violating our agreement! Th- this is treachery!”\n\n“Treachery?” Boris’s voice broke in now as he stepped forwards. “No, Sergei. This is survival and only the most brutal survive. It’s foolish to believe otherwise.” Sergei turned sharply to face Boris, disbelief etched into his features as his voice trembled in barely restrained fury. “You... knew about this? You let them in and threw away all that we sacrificed and for what?! You really are a pathetic cockroach.” Boris didn’t flinch. Instead, he offered Sergei a placid, almost pitying look, as the ambassador placed a hand on Boris’s shoulder. “A wise man, your loyalty will not go unrewarded. We’ve prepared accommodations fit for someone of your... vision.”\n\nBefore Sergei could find the words, the ambassador reached into his coat and produced a small, ornate box. “And for you, Mr. President, a final gesture of respect.” he said, his tone dripping with mockery. Sergei took the box with trembling hands and opened it. Inside was a single pistol, polished and loaded. The ambassador’s smile turned sharp as a blade. “Consider this your final act of leadership. Do it yourself, with dignity, or my men will see to it in a much less pleasant manner.”\n\nThe weight of the gun seemed to drag Sergei down as he looked past the ambassador, past Boris, and out to the sea of cheering civilians. They waved flags and shouted his name, their faces lit with hope that felt unbearably cruel. None of them knew. None of them understood.\n\nHe closed the box slowly, his hand lingering on the lid. His voice, when it came, was barely a whisper."
 EUR_INTRO.10.a:0 "They cheer for what’s been stolen from them, and I won't live to see them realize it..."
