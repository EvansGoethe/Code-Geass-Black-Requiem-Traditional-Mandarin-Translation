 EUR_A_New_Russian_Army:0 "A New Russian Army"
 EUR_A_New_Russian_Army_desc:0 ""
 EUR_Replace_young_officers:0 "Replace Young Officers"
 EUR_Replace_young_officers_desc:0 "The time has come to purge the weak and replace them with true warriors. Forged in Britannian Exceptionalism, our army will answer only to might. Loyalty to the Empire is not a choice. Only the strong shall endure!"
 EUR_Mobilize_more_people:0 "FIGHT FOR THE EMPEROR!"
 EUR_Mobilize_more_people_desc:0 "Fight for the Emperor! We are the rightful rulers of this world, the stewards of its destiny! The weak will falter, but we will rise above for might is the only true law! Let the lesser nations quake before us for we are the vanguard of its evolution!"
 EUR_Introduce_harsh_punishments_in_army:0 "Introduce Harsh Punishments"
 EUR_Introduce_harsh_punishments_in_army_desc:0 "The Doctrine of Imperial Strength Article III:\n A soldier's life is the property of the Empire; a soldier who does not serve to the fullest shall be discarded without hesitation."
 EUR_Open_Britannian_academy_for_officers:0 "Open the Britannian Officers' Academy"
 EUR_Open_Britannian_academy_for_officers_desc:0 "Excerpt from Beneath the Imperial Banner\nTo serve the Empire is to serve truth itself. Your loyalty is your bond, and through it, you and your men shall forge a path to unrivaled glory. This is the way of a leader..."
 EUR_Restore_organisation_in_army:0 "Reorganize the Army"
 EUR_Restore_organisation_in_army_desc:0 "Political officers, appointed directly into the ranks, serve as the voice of the Empire’s unyielding might. Their purpose is clear: to ensure that every soldier, regardless of origin, understands the righteousness of their cause and the duty they serve."
 EUR_Transfer_all_scientists_to_research_knightmares:0 "Secure Fuel for our Knightmares"
 EUR_Transfer_all_scientists_to_research_knightmares_desc:0 "To power our Knightmares is to fuel our conquest. Securing a steady flow of resources is crucial to maintaining the might of our machines. Without this lifeblood, even the strongest warriors fall silent."
 EUR_Focusing_on_knightmares_production:0 "Focus on Knightmare Production"
 EUR_Focusing_on_knightmares_production_desc:0 "Under Grand Duke Velaines' directive, we will ramp up Knightmare production at all costs. Factories are to run day and night, with every available resource poured into their creation."
 EUR_Conduct_several_tests:0 "Request Equipment for Combat Testing"
 EUR_Conduct_several_tests_desc:0 "A formal request has been made for the latest military equipment to be sent directly to our forces, ensuring that we test the true power of the Empire’s advancements in the crucible of battle. Tanks, weaponry, and advanced systems will be delivered without hesitation."
