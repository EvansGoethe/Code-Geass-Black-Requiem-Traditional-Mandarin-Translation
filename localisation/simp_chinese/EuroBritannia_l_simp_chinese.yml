 EUR_Conduct_grueling_exercises1:0 "Begin Live Fire Excersises"
 EUR_Conduct_grueling_exercises1_desc:0 "Our soldiers will face the fire of battle, not in practice, but in brutal reality. Live fire exercises will rain down upon them. This is the price of glory, the price of serving Britannia."
 EUR_Conduct_grueling_exercises:0 "Begin Live Fire Excersises"
 EUR_Conduct_grueling_exercises_desc:0 "Our soldiers will face the fire of battle, not in practice, but in brutal reality. Live fire exercises will rain down upon them. This is the price of glory, the price of serving Britannia."
 EUR_Ask_homeland1:0 "Bring in the Excavators"
 EUR_Ask_homeland1_desc:0 "Rumors of untapped Sakuradite veins have reached our ears, and now it’s time to make them a reality. With the arrival of powerful excavation machinery from the Homeland, we will break the earth and bring this invaluable resource to the surface."
 EUR_Ask_homeland:0 "Bring in the Excavators"
 EUR_Ask_homeland_desc:0 "Rumors of untapped Sakuradite veins have reached our ears, and now it’s time to make them a reality. With the arrival of powerful excavation machinery from the Homeland, we will break the earth and bring this invaluable resource to the surface."
 EUR_Area_11_deposits1:0 "Buy From the Areas"
 EUR_Area_11_deposits1_desc:0 "Even as we stand apart, the Empire's reach stretches far. By securing steel and vital materials from one of the Areas, we ensure our own growth. Their resources will flow into our hands, fueling our industries and feeding our war machine."
 EUR_Area_11_deposits:0 "Buy From the Areas"
 EUR_Area_11_deposits_desc:0 "Even as we stand apart, the Empire's reach stretches far. By securing steel and vital materials from one of the Areas, we ensure our own growth. Their resources will flow into our hands, fueling our industries and feeding our war machine"
