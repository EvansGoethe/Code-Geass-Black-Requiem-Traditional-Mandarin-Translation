 EUR_Leasing_Coast_tt:0 "§YIf Britannia accepts all terms, we recomend you designate dockyards to repair ships. Any damaged ships docked by Britannia will start to be repaired by your facilities.§!"
 EUR_clean_up_tt:0 "§RThe war with the Siberians has taken its toll, time to clean up.§!"
 EUR_intervention_happens_tt:0 "§RThe Europians and Principality have been at war far too long, now we will end it for them.§!"
 EUR_move_to_phase_2_tt:0 "§GAll is quiet on the eastern front, time to move on.§!"
 POLITICS_HENRY_HIGHLAND_DESC:0 "Augusta Henry Highland also knowns as the Grand Duke Velaines, is a close relative of the Britannian Imperial Family and has been entrusted by the Emperor on numerous occasions with affairs regarding the empire's security, he is an honourable and chivalrous man and he has been put in charge of Britannia's new project Euro-Britannia as it's suzerain, he is determined to bring Russia under the dominion of the Holy Britannian Empire."
 EUR_Cold_Pacific_coast:0 "A Cold Pacific Coast"
 EUR_Cold_Pacific_coast_desc:0 "If we are to look towards the future we must first look to our past..."
 EUR_Digging_Through_The_Rubble:0 "Digging Through the Rubble"
 EUR_Digging_Through_The_Rubble_desc:0 "After the tradgic bombing that tore Russia assunder, a new Government takes stock of its situation. The deeper they dig into their affairs the worse it gets."
 EUR_Britannian_Illusions:0 "Closing the Net"
 EUR_Britannian_Illusions_desc:0 "We have deployed our operatives and agents far and wide. Now it's just waiting till something bites."
 EUR_The_Men_From_PENDRAGON:0 "The men From P.E.N.D.R.A.G.O.N"
 EUR_The_Men_From_PENDRAGON_desc:0 "With the forign agent's in custody it's time to see what they were doing in Russia. Yeltz has been itching to take a crack at these men so lets let him."
 EUR_The_Space_Connection:0 "The Space Connection"
 EUR_The_Space_Connection_desc:0 "Before the colapse, Russia's greatest treasure was it's Space Program. Being the only thing that we did better than the Europeans, it was the most heavily guarded secret in our nations history. Now, our greatest achievement shall become our future."
 EUR_Reeling_In_Their_Dirty_Laundry:0 "Reeling in Their Dirty Laundry"
 EUR_Reeling_In_Their_Dirty_Laundry_desc:0 "We must sweep the Britannians from the Motherland. Never again shall we let their agents commit such a heinous atrocity as they did at Okhotsk!"
 EUR_Ace_in_the_hole:0 "Ace in the Hole"
 EUR_Ace_in_the_hole_desc:0 "Now that we know our situation, it is time to decide what course our newborn nation shall take. Is it better with the devil we know or the devil we don't know?"
 EUR_Finding_alternatives:0 "Finding Alternatives"
 EUR_Finding_alternatives_desc:0 "Britannia caused all of our problems and killed thousands of our countrymen. Now we are in the midst of a Civil War because of them. Lets rub in their failure by looking for allies that would love to stick it to them."
 EUR_Britannians_proposal:0 "Support From Britannia"
 EUR_Britannians_proposal_desc:0 "We can't undo what has already been done so why not make the best of the situation? We've sent a message to the Britannians now lets hope that they are interested in our offer."
 EUR_Britannian_ultimatum:0 "Britannian Ultimatum"
 EUR_Britannian_ultimatum_desc:0 "Preparations are underway for the imminent arrival of the Britannian ambassador. Citizens are making impromptu Britannian flags to wave welcoming our guests. Let's just hope that there arn't any surprises for us. "
 EUR_Expand_north_trading_routes:0 "Expand Northern Trade Routes"
 EUR_Expand_north_trading_routes_desc:0 "With the new government underway we require increased shipping to get everything we need into position for the first offensive. Any logistical shortfall shall be made up by requisitioning civilian transports."
 EUR_Create_special_rights:0 "Create Special Rights for Britannians"
 EUR_Create_special_rights_desc:0 "We have less than 50,000 men over here to set up this blasted government with. If we are to ensure our foothold on the continent then we need to attract volunteers from the Homeland. What better way then setting up proper legal incentives?"
 EUR_An_End_To_Madness:0 "End the Madness"
 EUR_An_End_To_Madness_desc:0 "Our supply lines are a mess, our men outnumbered, and our positions compromised due to the upset natives. Reguardless of our position Grand Duke Velaines has ordered an offensive against the Socialists and by the Emperor we shall not fail."
 EUR_Secure_First_Site:0 "Securing the First Site"
 EUR_Secure_First_Site_desc:0 "It was the Russian Space Program that drew the Emperor's will to Russia and it is time to begin our work repairing the network. Much has been damaged and lost due to disrepair. It is time to send engineers to the first site and assess the damages."
 EUR_Opening_Up_Data_Vaults:0 "Opening up the Data Vaults"
 EUR_Opening_Up_Data_Vaults_desc:0 "While the repairs on the launchpad are underway the control center is an absolute mess. One of our engineers tripped the security system and caused a lockdown and purge of sensative data. While much was lost we may still be able to recover the blueprints if we act fast."
 EUR_Reengage_Cooling_Protocols:0 "Reengage Cooling Protocols"
 EUR_Reengage_Cooling_Protocols_desc:0 "When the Cosmodrome was put into a lockdown after the government collapsed one half was sabatouged and the other half into a computational coma. Our engineers say that if we can get the coolent and propelent facilities back online we may be able to force a restart."
 EUR_Research_Anomaly:0 "Project: §RZorya§!"
 EUR_Research_Anomaly_desc:0 "Having gained full access to the Cosmodrome's network our analists have discovered several inconsistancies between the launch manefest and.... wait.... §Rwe are recieving an emergancy transmission please stand by...§!"
 EUR_Call_Upon_The_OSI:0 "Call Upon the O.S.I"
 EUR_Call_Upon_The_OSI_desc:0 "It was the O.S.I that gifted the Far East to us and it will be through them that we shall secure the East. First we need to give them them what they need."
 EUR_Cast_Wide_Net:0 "Fisherman Protocols"
 EUR_Cast_Wide_Net_desc:0 "Our coastlines and ports are flooded with incoming transports. We must ensure that no spies are hinding away with our valuable cargo."
 EUR_Numbers_Stations:0 "Numbers Stations"
 EUR_Numbers_Stations_desc:0 "As the O.S.I sinks their talons deeper into the west we can not risk our communications being compromised."
 EUR_Getting_Rid_Of_Troublemakers:0 "Consolodate the Region"
 EUR_Getting_Rid_Of_Troublemakers_desc:0 "For far too long the native Russians have misunderstood their new place. With sufficient propoganda and choice disappearances surely they will realize that the Socialists are the bigger threat."
 EUR_Hope_They_Like_Chocolate:0 "Operation: §RValentine§!"
 EUR_Hope_They_Like_Chocolate_desc:0 "These Socialists believe in their oh so glorious ideals that all men are created equal... disgusting. Lets target their most vulerable and shatter that dream. I wonder how many will survive?"
 EUR_Bucket_and_Chair:0 "A Bucket and a Chair"
 EUR_Bucket_and_Chair_desc:0 "Never do we back down for a challenge especially when it comes to aquiring information. If we need to break a few bones or violate a few treaties what's the harm if there is no one left to tell."
 EUR_Operation_Parasyte:0 "Operation: §RParasite§!"
 EUR_Operation_Parasyte_desc:0 "The O.S.I has sunk its fangs into the Socialists. Key officials will fall to unseen poisons, their supply lines will crumble under relentless commando raids, and their communications will be reduced to a chaotic silence. May they fall screaming into the annals of history..."
 EUR_Guinevere_Support:0 "Guinevere's Support"
 EUR_Guinevere_Support_desc:0 "We had swallowed our pride and asked for more support from mainland Britannia; the newly appointed First Princess Guinevere de Britannia has answered our request. Her efforts have been admirable, seeing if Britannia can afford to give more support to us, or if we will need to gain support from the Areas."
 EUR_Guinevere_Caring_Hand:0 "Guinevere's Caring Hand"
 EUR_Guinevere_Caring_Hand_desc:0 "Guinevere de Britannia has decided that Britannia can afford to support our endeavours further, and she has decided to take a new keen interest in our affairs and efforts. In order to ensure the support is well worth it."
 EUR_Reach_Out_To_The_Proper_Areas:0 "Reach out to the Areas"
 EUR_Reach_Out_To_The_Proper_Areas_desc:0 "Guinevere de Britannia has decided that Britannia can’t afford to support our endeavours further, at least not entirely by themselves, the cost and effort to Britannia alone would be too much. Instead she has graciously allowed us to call upon the resources of other Areas, mainly the radicalised Areas."
 EUR_Prepare_for_prime_minister_visit:0 "Prepare for the First Princess"
 EUR_Prepare_for_prime_minister_visit_desc:0 "For us to show First Princess Guinevere her efforts and support aren’t wasted on us, we must prepare for her upcoming visit. To put all our efforts into making this nation one of her ideals, for her to look upon us and see her dream for Britannia proper."
 EUR_Creating_Okhotsk_settlement:0 "Create the Okhotsk Settlement"
 EUR_Creating_Okhotsk_settlement_desc:0 "Port Okhotsk is our capital, and yet it still holds the look of old Russia. It’s time for a shift in appearance and modernisation, using Russian manpower and the workforce, we will begin to create the Okhotsk Settlement. A sign of our commitment to bringing Euro-Britannia closer in line with the Areas."
 EUR_Expand_industrial_district:0 "Expand Industrial District"
 EUR_Expand_industrial_district_desc:0 "The Okhotsk Settlements construction has led to it lacking a proper industrial district, while there are more pressing matters with possible other districts mainly for administration purposes, getting our industrial capabilities up is vital for contributing back to Britannia for their support."
 EUR_Support_open_britannian_labs:0 "Open the Britannian Research Labs"
 EUR_Support_open_britannian_labs_desc:0 "Britannian scientists are some of the best in the world, we can curry more favour and support with Britannia if we open up local research labs for them to conduct their research from within Euro-Britannia, their knowledge will be greatly appreciated and used to help the nation."
 EUR_Expand_administrative_district:0 "Expand Administrative District"
 EUR_Expand_administrative_district_desc:0 "The Okhotsk Settlements construction has led to it lacking a proper administrative district and offices, while there are more pressing matters like increasing the settlements industrial capabilities, having a proper administration district will allow us to properly administer the settlement, vital for maintaining appearances to Britannia."
 EUR_Better_region_organisation:0 "Better Region Organisation"
 EUR_Better_region_organisation_desc:0 "The region organisation management for Euro-Britannia holds to the old Far-East Provisional Governments system, that is for us a lack of one. Our advisors and advice from Britannia have suggested a much better system for our region's organisation, which would effectively improve the nation if implemented."
 EUR_Withdraw_all_lands_of_Russian_nobles:0 "Withdraw all Lands of Russian Nobles"
 EUR_Withdraw_all_lands_of_Russian_nobles_desc:0 "Russian Nobles still hold vast swathes of land in Euro-Britannia, for us to be able to effectively improve the nation, we have decided to place all lands previously held by Russian nobles into state ownership permanently."
 EUR_Nationalize_all_railroads_and_trains_in_region:0 "The vital railroads highly important for supply all across Euro-Britannia are held and owned by multiple hands, this will not do for something so highly necessary for the survival of the nation. We will nationalise the railroads, and keep them firmly in state ownership."
 EUR_Create_modern_excavation_company:0 "Create a Modern Excavation Company"
 EUR_Create_modern_excavation_company_desc:0 "Euro-Britannia is rich in resources that could be made use of from Britannia proper, in order to ease and speed up the extraction and excavation of such resources, it's time for us to create a modernised company to take over the excavation efforts."
 EUR_Strengthen_the_proBrittanian_police:0 "Strengthen the Pro-Britannian Police"
 EUR_Strengthen_the_proBrittanian_police_desc:0 "Many of the police officers in Euro-Britannia are still those who operated in the nation under its previous leadership. It hampers our cause, instead we will work to strengthen the police to be more Pro-Britannia leanings."
 EUR_Send_opposition_to_Kolima:0 "The Opposition Goes on Vacation"
 EUR_Send_opposition_to_Kolima_desc:0 "There are many in Euro-Britannia who strongly oppose many things we’re trying to push for, some have suggested a good use of them. To send them on vacation, to give them a nice break from all that hard work they’ve been doing and to let us work unopposed."
 EUR_Clear_all_administration_from_Russians:0 "Expell Russian Administrators"
 EUR_Clear_all_administration_from_Russians_desc:0 "Some of the last vestiges of pure Russian control in Euro-Britannia is down to the administrators, Britannia has offered us ‘replacements’ for these individuals, so we may finally expel the Russians. Gaining tighter control over the nation's administration."
 EUR_The_long_awaited_meeting:0 "The Long-Awaited Meeting"
 EUR_The_long_awaited_meeting_desc:0 "The Grand meeting with First Princess Guinevere, the culmination of all our grand efforts thus far to improve the nation. Many in the nation including the Russian citizens are highly anxious for this meeting, our Grand Duke Velaine awaits to talk to her, he couldn’t remember the last time he saw her."
 EUR_Use_doctrine_of_non_retreat:0 "Deploy the Doctrine of No-Retreat"
 EUR_Use_doctrine_of_non_retreat_desc:0 "While our army is still in tatters, our soldiers' motivation is what really matters. They shirk away in the face of Socialist opposition, it is time to enforce a more stricter doctrine upon them. One where they are afraid to retreat from their enemies in cowardice, one where they will charge straight ahead into gunfire for a tactical victory."
 EUR_Develop_plan_together_with_Brittanian_Headquarters:0 "Joint Tactics Conference"
 EUR_Develop_plan_together_with_Brittanian_Headquarters_desc:0 "Britannia has approached us for a conference on our tactics, offering for an exchange in tactics and information on our military so as to properly prepare our soldiers, and to prepare the Britannian soldiers gearing up to fight for Euro-Britannias victory."
 EUR_Propaganda_of_weakness_of_Socialists:0 "Anti-Socialist Propaganda"
 EUR_Propaganda_of_weakness_of_Socialists_desc:0 "Within our citizens there is some sympathy for our enemies the Siberian People’s Republic, mostly amongst our Russian citizens, though a few Britannian citizens are starting to feel for the Socialists. This cannot be, Euro-Britannia has started developing state propaganda to deploy to our citizens to unite them entirely against our enemy the Siberian People’s Republic."
 EUR_Holy_Order_of_Michael2:0 "The Holy Order of Michael"
 EUR_Holy_Order_of_Michael2_desc:0 "Null"
 EUR_Our_own_genius2:0 "Our own Genius"
 EUR_Our_own_genius2_desc:0 "Null"
 EUR_An_army_worth_of_duke:0 "Army Worthy of the Duke"
 EUR_An_army_worth_of_duke_desc:0 "Our Grand Duke Velaine was well known all across Britannia for his military prowess and stratagems. He has continued to bring these talents with him to Euro-Britannia, and with our military and army in a sorry state, it is now time to bring the army up to being worthy of one led by our Duke."
 EUR_Claws_of_Britannia:0 "Claw's of Britannia"
 EUR_Claws_of_Britannia_desc:0 "While Britannia has sent us some of their Knightmare divisions made up of older models and frames, and barely enough equipment to repair and run them. Britannia has now opened up the Frames to us entirely, sending us the technology and research of their newer models, ensuring we can use the Claws of Britannia against our enemies."
 EUR_Teach_Russians_to_cooperate_with_Knightmer_troops:0 "Russians Cooperate With Knightmares"
 EUR_Teach_Russians_to_cooperate_with_Knightmer_troops_desc:0 "Our Russian soldiers have had to deal with fighting alongside new Knightmare Frames that they never seen before, as expected this has caused issues within our army, with strategies and tactics being broken up due to these new divisions. Britannia has offered us a training regiment, which should properly teach the rest of our soldiers how to fight alongside our Knightmares."
 EUR_Monthly_deliveries:0 "Monthly Deliveries"
 EUR_Monthly_deliveries_desc:0 "Britannia has come to the realisation, that with all they’ve provided us thus far in terms of men, technology and research, that in order for us to continue making use of it all we would require a steady supply of the equipment for it all. Until we’re able to properly make it all ourselves, First Princess Guinevere has committed to providing us monthly deliveries until our struggle is over."
 EUR_Wings_of_Emperor:0 "Wings of the Emperor"
 EUR_Wings_of_Emperor_desc:0 "Euro-Britannia thus far has lacked any sort of proper air force, with only a handful of air bases spread out across the Far-East and barely the means to produce any aircraft, the air force has been left to sit. No longer, Britannia has sent us many of their spare aircraft which haven’t seen much combat, the Wings of the Emperor have arrived for us."
 EUR_Best_aces:0 "Best Aces"
 EUR_Best_aces_desc:0 "Without having any air force, we were unable to train many if any pilots. That seemed like a grand mistake, our people have a natural affinity for the skies. And with the new Britannian planes they are now able to show their skills, as some of the best aces in Russia."
 EUR_Recruit_honorable_britannians_from_areas:0 "Recruit Honorary Britannians From Areas"
 EUR_Recruit_honorable_britannians_from_areas_desc:0 "Our military has been in a disarray, made up of both Russian soldiers and Britannian volunteers, it lacks any sort of core to it. We could make up this by asking upon the Areas, for them to volunteer us some of their Honorary Britannians to make up the core of our military."
 EUR_Asking_areas_for_help:0 "Asking Areas for Help"
 EUR_Asking_areas_for_help_desc:0 "With the Areas Honorary Britannians in our military now, we need more supplies to be able to maintain both them and their equipment. Once again we call for the Areas to aid us, in sending in supplies and shipments of their own to help us keep the soldiers in fighting shape."
 EUR_Invite_advisor:0 "Invite a Field Specialist"
 EUR_Invite_advisor_desc:0 "Our military is no short of officers and men who are well versed in warfare, especially now with making use of the Areas Honorary Britannians it has widened our armies skillset. But inviting a Field Specialist can further help to refine our army."
 EUR_Use_experience_of_war_in_rough_terrain:0 "March Through the Wilderness"
 EUR_Use_experience_of_war_in_rough_terrain_desc:0 "With our army now having a large core of it made up of the Honorary Britannians from the Areas, this has had an accidental benefit. With all the varying different terrains and environments of the Areas, these Honorary Britannian soldiers are well versed in marching through all sorts of terrain. Speeding up our armies movements."
 EUR_Invite_insructors_from_honorable_britannia_academies:0 "Invite Honorary Britannian Instructors"
 EUR_Invite_insructors_from_honorable_britannia_academies_desc:0 "While the core of our Euro-Britannian military is now made up of Honorary Britannians, the rest of our army could do with some of the training the Honorary Britannians go through to become soldiers. We will call and invite in some of the instructors, to better prepare our whole army."
 EUR_Invite_foreign_legion:0 "Request Foreign Legions"
 EUR_Invite_foreign_legion_desc:0 "The Honorary Britannian core drawn from the other Areas has provided our army a great boost in its military capabilities, but many feel that we still need more to be able to win this war. We will put out a request to the other Areas for them to send their legions to help our cause."
 EUR_Scrapping_barrel:0 "Provincial Aid"
 EUR_Scrapping_barrel_desc:0 "The resources and economy of Euro-Britannia far in falls behind the rest of Britannia, and even the Areas. It is with this knowledge that we will begin to open up negotiations with the other Areas for more economic aid, to allow us to use their support to build ourselves up as a nation worthy of the name Britannia."
 EUR_Organise_volunteers_from_Area_3_and_7:0 "Organise 'Volunteers' From Areas 4 and 8"
 EUR_Organise_volunteers_from_Area_3_and_7_desc:0 "Area 4 and 8 is very well known for its vast ‘workforce’ of their Numbers. Our diplomats sent to these two Areas have managed to jointly organise ‘volunteers’ from this workforce to come to Euro-Britannia to help boost our industry."
 EUR_Use_them_in_factories:0 "Place Them in Factories"
 EUR_Use_them_in_factories_desc:0 "The Numbers from Area 4 and 8 have a wide array of working skills that make them flexible with their position. But it would be much better to focus the bulk of these workers to our factories, to increase our production."
 EUR_Asking_for_more_factory_equipment:0 "Ask for More Factory Equipment"
 EUR_Asking_for_more_factory_equipment_desc:0 "While our diplomats were able to arrange the ‘volunteers’ of Areas 4 and 8 they forgot to ask for some of their factory equipment to be able to make proper use of their workforce. An error we have quickly corrected, expecting their equipment any day now."
 EUR_Use_them_on_the_railroads:0 "Have Them Build Railroads"
 EUR_Use_them_on_the_railroads_desc:0 "The workers we have borrowed from Areas 4 and 8 would be best used to smash out our supply issues, putting them to work on railroads across Euro-Britannia and local supply hubs so that our soldiers and citizens can continue to be fed."
 EUR_Improve_logistics_chains:0 "Improve the Logistics Chain"
 EUR_Improve_logistics_chains_desc:0 "The logistics of Euro-Britannia has been a nightmare for us since day one, with many hands and people trying to wrap their head around our current system to be able to improve it. Some fresh eyes from some of the more expert ‘volunteers’ from Areas 4 and 8 could heavily improve the situation."
 EUR_Steel_of_Area_6:0 "The Steel of Area 6"
 EUR_Steel_of_Area_6_desc:0 "Area 6 in Britannia is well known for its vast quantities of steel, and the high quality nature of it. Our diplomats have managed to take a visit to the Area, and secured use of their steel to fuel our nation for the future to come."
 EUR_Use_scientists_from_New_Anglia:0 "New Anglian Scientists"
 EUR_Use_scientists_from_New_Anglia_desc:0 "New Anglia is the scientific hub for Britannia, housing many of its great scientists past and present. Making headways in many scientific advancements for Britannia, responsible for the Knightmare Frame. We have managed to secure their scientific aid in our endeavours for our own projects."
 EUR_Use_industry_of_Area_2:0 "More Than we Asked For"
 EUR_Use_industry_of_Area_2_desc:0 "While securing scientific aid from New Anglia, our diplomats got a bit ahead of themselves, and asked them for more resources for our nation, mostly involving the Sakuradite reserves New Anglia holds. While we expected only a small part of those reserves, they have sent us all of them, placing great faith in our endeavours."
 EUR_a_meal_for_every_household:0 "A Meal for Every Household"
 EUR_a_meal_for_every_household_desc:0 "Many of our citizens have been working while having very little to sustain ourselves, due to the ongoing war with the Siberian People’s Republic, calling on the Areas to lend us some of their funds for disaster relief we can use the money to ensure that every household can eat until the war is done."
 EUR_relocate_dissidents_up_north:0 "Relocate Dissidents up North"
 EUR_relocate_dissidents_up_north_desc:0 "Our cities have faced many issues due to the citizens becoming rowdier and more rebellious in the face of our war with the Siberian People’s Republic, relocating these dissidents to places where they are less likely to cause a ruckus could heavily improve the situation in our cities."
 EUR_bring_in_foreign_administrators:0 "Bring in Foreign Administrators"
 EUR_bring_in_foreign_administrators_desc:0 "Our administration jointly run by Russians and Britannians have caused many issues for us, to the point where very little of them would know a way to fix the situation. This has caused us to rely on Administrators from the Areas and Britannia to set us straight."
 EUR_Advance_our_own_economy:0 "Advance our own Economy"
 EUR_Advance_our_own_economy_desc:0 "The support from the Areas have completely overhauled our economy, pushing Euro-Britannia from barely having an industry to churning factories fueling our war efforts, none of this could be done without the Areas aid, they alone have allowed us to advance our own economy, which will allow us to support them in the near future."
 EUR_guinevere_east_secured:0 "East Secured"
 EUR_guinevere_east_secured_desc:0 "The last drop of Siberian blood has been spilt, the Siberian People's Republic lies in ruin. Euro-Britannia is victorious in the war, and it all comes down to the support we have received from the First Princess Guinevere de Britannia. With the news of our victory reaching Pendragon, Guinevere can rest assured that the east is secure."
 EUR_guinevere_the_eiz_victorious:0 "Europian Intervention Persists"
 EUR_guinevere_the_eiz_victorious_desc:0 "While the blood of the Siberians were being spilt by us, fighting tooth and nail in the east. The Europian Intervention Zone and the Principality of Ekaterinburg have been fighting a similarly gruelling war, only for the Russian puppet supported by Europe to come out in victory, while we have begun making preparations to fight them in the upcoming war for the rest of Russia. Guinevere has been preparing for dealing with the situation with Europe that will arise."
 EUR_guinevere_tsar_continues_to_reign:0 "Tsar Continues to Reign"
 EUR_guinevere_tsar_continues_to_reign_desc:0 "While the blood of the Siberians were being spilt by us, fighting tooth and nail in the east. The Europian Intervention Zone and the Principality of Ekaterinburg have been fighting a similarly gruelling war, only for the nation clinging to the old past to come out victorious. The Tsar continues to reign, and we have begun preparing to determine who truly deserves Russia, the Tsar or the Emperor."
 EUR_content:0 "Why There is no Content"
 EUR_content_desc:0 "To explain briefly why there is no content for the continuation in this path, I'm regretful to inform you that we had this designed, we were actively designing this phase for the Russia update. Only for it to be decided to scrap this, and rework Euro-Britannia with the pacific update anyway so any work here didn't matter, its a regretful thing and a decision I despise. The updates take longer because people scrap and redo content that is not needed to happen. This is lead programmer Arctracer by the way, just so everyone knows why I couldn't do this phase and make the content."
 EUR_guinevere_intervene_in_the_west:0 "Guinevere Intervenes in the West"
 EUR_guinevere_intervene_in_the_west_desc:0 "The war between the Europian Intervention Zone and the Principality of Ekaterinburg has been going on for years, barely little progress has been made by either side. Both defiantly cling to life, determined to come out the victor. Guinevere has suggested to us that we could tip the scales in their war to determine who wins, while unprepared to fight another war so soon ourselves, we can more than easily become the one who decides who lives and who dies."
 EUR_guinevere_backing_the_intervention_zone:0 "Backing the Intervention Zone"
 EUR_guinevere_backing_the_intervention_zone_desc:0 ""
 EUR_guinevere_grant_them_our_industry:0 "Grant Them our Industry"
 EUR_guinevere_grant_them_our_industry_desc:0 ""
 EUR_guinevere_show_them_how_its_done:0 "Show Them how it's Done"
 EUR_guinevere_show_them_how_its_done_desc:0 ""
 EUR_guinevere_deserves_only_our_scraps:0 "Deserves Only our Scraps"
 EUR_guinevere_deserves_only_our_scraps_desc:0 ""
 EUR_guinevere_clip_their_wings:0 "Clip Their Wings"
 EUR_guinevere_clip_their_wings_desc:0 ""
 EUR_guinevere_bear_and_lion_together:0 "Bear and Lion Together"
 EUR_guinevere_bear_and_lion_together_desc:0 ""
 EUR_guinevere_tooth_and_nail:0 "Tooth and Nail"
 EUR_guinevere_tooth_and_nail_desc:0 ""
 EUR_guinevere_no_tsar_only_the_emperor:0 "No Tsar, Only the Emperor"
 EUR_guinevere_no_tsar_only_the_emperor_desc:0 ""
 EUR_guinevere_backing_the_monarchists:0 "Backing the Principality"
 EUR_guinevere_backing_the_monarchists_desc:0 ""
 EUR_guinevere_eagles_cry_for_aid:0 "Eagle's cry for Aid"
 EUR_guinevere_eagles_cry_for_aid_desc:0 ""
 EUR_guinevere_honorary_britannian_regimental_support:0 "Honorary Britannian Regimental Support"
 EUR_guinevere_honorary_britannian_regimental_support_desc:0 ""
 EUR_guinevere_eagle_feeding:0 "Eagle Feeding"
 EUR_guinevere_eagle_feeding_desc:0 ""
 EUR_guinevere_seize_the_bears_throat:0 "Seize the Bear's Throat"
 EUR_guinevere_seize_the_bears_throat_desc:0 ""
 EUR_guinevere_carries_the_eagle:0 "Lion Carries the Eagle"
 EUR_guinevere_carries_the_eagle_desc:0 ""
 EUR_guinevere_failings_of_democracy:0 "Failings of Democracy"
 EUR_guinevere_failings_of_democracy_desc:0 ""
 EUR_guinevere_death_of_european_intervention:0 "Death of Europian Intervention"
 EUR_guinevere_death_of_european_intervention_desc:0 ""
 EUR_guinevere_moscow_lay_in_ruin:0 "Moscow Lay in Ruin..."
 EUR_guinevere_moscow_lay_in_ruin_desc:0 ""
 EUR_Schnizel_Support:0 "The White Prince Reigns"
 EUR_Schnizel_Support_desc:0 "Schneizel has won the Emperor's favor in Britannia. While it is Highland's plan to take Russia in his own direction, there is only so much he can do in Schneizel's Empire."
 EUR_By_Emperors_order:0 "To Kill a Dream"
 EUR_By_Emperors_order_desc:0 "When we first arrived on this continent the people had looked up to us with hope in their eyes. Now they are nothing but trouble getting in our way. If they will not submit on their own, then we will squeeze them till they break."
 EUR_In_memory_of_Russian_Empire:0 "In Memory of the Russian Empire"
 EUR_In_memory_of_Russian_Empire_desc:0 "President Sorokin of the Provisional Government never got to see his dream realized before he was betrayed. While I could not save him from his fate, I can still save his dream."
 EUR_Attract_investment_from_British_nobles:0 "Britannian Noble Investment"
 EUR_Attract_investment_from_British_nobles_desc:0 "Euro-Britannia, for all its resources, lacks the industrial strength to thrive independently. But what if we could attract the right kind of investment? By opening our doors to the Empire’s nobility, we could secure the capital and expertise we need to build something lasting."
 EUR_Schneizels_Playground:0 "Schneizel's Playground"
 EUR_Schneizels_Playground_desc:0 "Schneizel has demanded we play our part in the Imperial economy. It matters not how only that Britannia gets their tithe."
 EUR_Creating_trading_hub_port_in_Okhotsk:0 "Create the Okhotsk Trade Hub"
 EUR_Creating_trading_hub_port_in_Okhotsk_desc:0 "Okhotsk can’t simply serve as a port for Britannian goods. If we position Euro-Britannia as a neutral hub where the Empire, the EU, and the Chinese Federation can all trade freely, our nation would surely be able to stand on it's own."
 EUR_Free_trade:0 "Establish the Free Port"
 EUR_Free_trade_desc:0 "With the infrastructure in place to handle the growing flow of goods, it's time to solidify Okhotsk's role as a trade nexus. By granting special trade exemptions and privileges, we can ensure that the port attracts merchants from all corners of the globe."
 EUR_Britannian_Urban_Planning:0 "Britannian Urban Planning"
 EUR_Britannian_Urban_Planning_desc:0 "Euro-Britannia’s urban areas face long-standing issues, from crumbling housing to outdated infrastructure. Introducing Britannian building techniques will address these concerns, improving conditions for native Russians and showing our commitment to their well-being."
 EUR_Modernize_Okhotsk:0 "Modernize Okhotsk"
 EUR_Modernize_Okhotsk_desc:0 "While Okhotsk’s port is ready for trade, the city requires careful attention. Renovating the urban landscape and enhancing public services will elevate living standards ensureing Britannians are seen as invested in the city’s growth, not just outsiders."
 EUR_Easing_of_customs_duties_from_Areas:0 "Ease the Areas' Customs Duties"
 EUR_Easing_of_customs_duties_from_Areas_desc:0 "To solidify our position, we will ease customs duties on goods produced in Euro-Britannia. While we remain neutral globally, our priority is clear: the Empire comes first. Encouraging investment in steel and oil shall also ensure we have the resources to support Britannia’s needs."
 EUR_Form_the_TPTA:0 "Form the TPTA"
 EUR_Form_the_TPTA_desc:0 "To solidify our standing and ensure free trade, we will establish the Trans-Pacific Trade Association (TPTA). This agreement guarantees signatory nations’ ships are safe from Britannian naval confiscations, while positioning Euro-Britannia as a trusted global partner."
 EUR_Leasing_out_our_coastline:0 "Lease out our Coastline"
 EUR_Leasing_out_our_coastline_desc:0 "While Euro-Britannia doesn’t need a fleet at the moment, our naval facilities are more than capable of servicing Britannia’s Pacific fleet. We’ll offer docking rights and repair services in exchange for proper compensation."
 EUR_Establish_the_Okhotsk_Drydocks:0 "Establish the Okhotsk Drydocks"
 EUR_Establish_the_Okhotsk_Drydocks_desc:0 "With our ports now equipped to repair Britannian vessels, the next step is to expand our capacity. By retooling existing facilities for repair rather than construction and establishing a sub-facility in Petropavlovsk, Kamchatka, we can offload some of the work."
 EUR_Pulling_From_Land:0 "Exploit the Land"
 EUR_Pulling_From_Land_desc:0 "Why waste resources on local infrastructure when the true value lies beneath the soil? Every ounce of timber, every grain of ore, and every bushel of produce will be shipped abroad to fuel the Empire’s vast industries."
 EUR_Focus_on_jewerly_industry:0 "Expand the Jewelry Industry"
 EUR_Focus_on_jewerly_industry_desc:0 "The wealth of Britannia isn’t drawn to raw stones alone. To meet demand, we will expand resource production beyond the mines. New deposits of precious metals will be uncovered, fueling the creation of fine rings, necklaces, and ornaments destined for Britannia's elite."
 EUR_Reopening_old_mineshafts:0 "Reopen old Mineshafts"
 EUR_Reopening_old_mineshafts_desc:0 "The mines were never barren; they were abandoned when workers lacked the tools to dig deeper. With the right equipment, veins of diamonds, gold, and other luxuries await extraction. While useless on the battlefield, these treasures are perfect for Britannia’s markets."
 EUR_Establish_relations_with_Brittanian_nobles:0 "Friends in High Places"
 EUR_Establish_relations_with_Brittanian_nobles_desc:0 "Once a minor figure among Britannia's nobility, Grand Duke Velaines now wields significant influence. As luxury goods flow from his land, the opinions of the imperial elite back home have begun to shift, with former skeptics now eager to support him for profit."
 EUR_Perfecting_our_Craft:0 "Perfecting our Craft"
 EUR_Perfecting_our_Craft_desc:0 "Euro-Britannia has long been recognized for its resource-rich lands, but now it is time to be known for the quality of its products. By refining our techniques and crafting some of the finest jewelry in the Empire, we will strive for excellence in usual Britannian fashion."
 EUR_Establishing_our_Brand:0 "Establishing our Brand"
 EUR_Establishing_our_Brand_desc:0 "Even the finest jewelry is only as valuable as the name behind it. To truly secure our place in the market, we must craft a brand that speaks to the Empire and beyond. We must show the world that our goods are as much symbols of status as they are of prestige."
 EUR_Oil_for_Britannia:0 "Digging for Black Gold"
 EUR_Oil_for_Britannia_desc:0 "The land holds untapped riches and oil is the key to unlocking them. As drilling intensifies, Black Gold not only offers wealth through exports but also provides a strategic value for our military exploits."
 EUR_Modernizing_to_Meet_Their_Needs:0 "To Meet Their Needs"
 EUR_Modernizing_to_Meet_Their_Needs_desc:0 "Euro-Britannia has aligned with the Empire’s resource demands, and Prime Minister Schnizel has called for an increase in production. Experts from the Homeland will be dispatched to optimize extraction methods, boosting output without causing unnecessary hardship."
 EUR_Economic_Stability_Secured:0 "A Stable Economy"
 EUR_Economic_Stability_Secured_desc:0 "When Britannia first took control, the economy lacked the strength needed to fend off the socialists. Hope was in short supply, but we've managed to stabilize what was once a crumbling system. From here, it will only grow stronger."
 EUR_An_Area_in_All_but_Name:0 "An Area in all but Name"
 EUR_An_Area_in_All_but_Name_desc:0 "The situation in Russia is not unlike many of Britannia's recent conquests. If we were to adopt the policies that made those Areas successful then surely we shall be too. After all, it all comes down to acquiring a suitable workforce."
 EUR_Ensuring_material_transport:0 "Ensure Material Transportation"
 EUR_Ensuring_material_transport_desc:0 "With so few of our own able-bodied workers available, the solution lies among the conquered. From the feeble elderly to those who dare speak out against our rule, the iron roads will stretch ever onwards. It truly is a wonder what a man can do with a gun at their back."
 EUR_Britannia_Welfare_program:0 "There is Only Britannia"
 EUR_Britannia_Welfare_program_desc:0 "In a land where the conquered far outnumber their betters, our strength lies in bolstering our own. We must offer our countrymen back home opportunities to serve be it as overseers, enforcers, or administrators. Our home's idle hands will become our state's iron fist."
 EUR_Expanding_Neryungri_area:0 "Expand the Neryungri Area"
 EUR_Expanding_Neryungri_area_desc:0 "Neryungri is running out of housing and none of it meets the standards expected by our countrymen. To prevent further outrage from our brethren, the natives will build a new quarter of the city just for them. This city will expand to serve our needs, not theirs."
 EUR_Signs_of_growth:0 "Signs of Growth"
 EUR_Signs_of_growth_desc:0 "Among the latest wave of immigrants from the homeland were a mere handful of the lower nobility, and yet, they have already started to monopolize the economy. It’s a satisfying sight, watching the natives struggle while we build our empire before their starving eyes."
 EUR_Protect_our_investment:0 "Protecting our Investment"
 EUR_Protect_our_investment_desc:0 "Now that we have made Neryungri a home for our people, its safety is non-negotiable. Trenches will be dug, artillery lines will be drawn up, and a vast defensive network will encircle the city. The cost is irrelevant for our people must be protected at all costs."
 EUR_Revitalize_Neryungri_Airfields:0 "Revitalize the Neryungri Airport"
 EUR_Revitalize_Neryungri_Airfields_desc:0 "Neryungri’s airport serves as a critical logistics hub near the front lines with the Socialists. Plans are already in place to expand it, preparing for the day when Nerungri will welcome tourists from all over the Empire to see a shining beacon of Britannian exceptionalism."
 EUR_Leasing_to_Military:0 "Lease to the Military"
 EUR_Leasing_to_Military_desc:0 "With the airport’s civilian traffic severly limited, it only makes sense to lease it for military use. While we don't have much in the way of combat aircraft, they will be key to lightening the load of our quartermasters."
 EUR_Schnizel_East_Secured:0 "East Secured"
 EUR_Schnizel_East_Secured_desc:0 ""
 EUR_schneizel_crushing_the_eiz:0 "To Crush the EIZ"
 EUR_schneizel_crushing_the_eiz_desc:0 ""
 EUR_schneizel_down_with_the_tsar:0 "Down With the Tsar"
 EUR_schneizel_down_with_the_tsar_desc:0 ""
 EUR_Restoring_discipline_in_army1:0 "Restore Army Discipline"
 EUR_Restoring_discipline_in_army1_desc:0 "The army is fractured, torn between the native Russian ranks and Britannian command. To emerge victorious, we must unify this divided force, forging a cohesive, disciplined army that serves one purpose: absolute victory."
 EUR_Restoring_discipline_in_army:0 "Restore Army Discipline"
 EUR_Restoring_discipline_in_army_desc:0 "The army is fractured, torn between the native Russian ranks and Britannian command. To emerge victorious, we must unify this divided force, forging a cohesive, disciplined army that serves one purpose: absolute victory."
 EUR_New_officier_corps1:0 "A New Officer Corps"
 EUR_New_officier_corps1_desc:0 "By integrating Russian officers into the Britannian system, we will create a new breed of leadership. One that harnesses the strengths of both just as Saint Darwin intended."
 EUR_New_officier_corps:0 "A New Officer Corps"
 EUR_New_officier_corps_desc:0 "By integrating Russian officers into the Britannian system, we will create a new breed of leadership. One that harnesses the strengths of both just as Saint Darwin intended."
 EUR_Ask_more_generals1:0 "Call in The Old Guard"
 EUR_Ask_more_generals1_desc:0 "Sometimes, the old ways are the best. By bringing in seasoned Britannian generals, steeped in traditional tactics, we’ll bolster our ranks with their time-tested strategies. Their methods may be rigid, but their effectiveness on the battlefield is undeniable."
 EUR_Using_Britannia_experience1:0 "Utilize Britannian Militarism"
 EUR_Using_Britannia_experience1_desc:0 "With the Old Guard at the helm, we will reshape our military into a force of relentless speed and precision. Our troops will strike swiftly to hit where it hurts. Victory will not be achieved through brute force alone but through maneuver, surprise, and exploiting their mistakes."
 EUR_Invite_Communications_officers1:0 "Ensure Competent Communications Officers"
 EUR_Invite_Communications_officers1_desc:0 "With our forces now operating on a new scale, effective communication is paramount. The Old Guard may bring their strategies, but without the means to coordinate them those plans are doomed to fail."
 EUR_Ask_more_generals:0 "Call in The Old Guard"
 EUR_Ask_more_generals_desc:0 "Sometimes, the old ways are the best. By bringing in seasoned Britannian generals, steeped in traditional tactics, we’ll bolster our ranks with their time-tested strategies. Their methods may be rigid, but their effectiveness on the battlefield is undeniable."
 EUR_Using_Britannia_experience:0 "Utilize Britannian Militarism"
 EUR_Using_Britannia_experience_desc:0 "With the Old Guard at the helm, we will reshape our military into a force of relentless speed and precision. Our troops will strike swiftly to hit where it hurts. Victory will not be achieved through brute force alone but through maneuver, surprise, and exploiting their mistakes."
 EUR_Invite_Communications_officers:0 "Ensure Competent Communications Officers"
 EUR_Invite_Communications_officers_desc:0 "With our forces now operating on a new scale, effective communication is paramount. The Old Guard may bring their strategies, but without the means to coordinate them those plans are doomed to fail."
 EUR_Modern_vehicle_of_victory1:0 "The Modern Vehicle of Victory"
 EUR_Modern_vehicle_of_victory1_desc:0 "Knightmare Mechs are more than mere machines; they are a testament to our Empire’s unstoppable power heralding an age of our dominance. Their speed, their precision, and their unstoppable force will continue to rewrite the rules of combat."
 EUR_Modern_vehicle_of_victory:0 "The Modern Vehicle of Victory"
