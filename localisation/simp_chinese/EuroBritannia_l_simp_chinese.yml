 EUR_britannia_favor:0 "The Price for Victory"
 EUR_britannia_favor_desc:0 "After taking control of this rump State, one thing has immediately emerged: the §R-pitiful state of the military§!.\nOnly few native Russian divisions have joined the Far Eastern Urprising and our manpower is continuosly dwindling. Moreover, we lack modern equipment and our very existence could be put at stake by our tracherous neighbour, §Rthe Socialists§!. Luckily, this soil is rich of bountiful resources, and we can exploit them to feed the §RBritannian Behemoth§! in exchange for their §RMilitary Support§!. Sure, this will put Russian control of these regions in jeopardy, but isn't this the price for our glory?\n\n§RClick On Each Region To Cede Control Over Local Resources.§!"
 EUR_secure_sites:0 "Our Race to the Stars"
 EUR_secure_sites_desc:0 "Though Russia's terminal decline and collapse left little for the factions scrabbling after her death to claim, the legacy of her §YSpace Program§! lives on in the Far-East. Even though the organisation of the Roscosmos fled during the collapse, the infrastructure of the program still remain. Though we currently only have the Magadan Cosmodrome in our hands, taking control of all the facilities would allow us to seize and utilize Russia's former §YSpace Program§!. This would not only allow us to have a base for future launches but also would allow us to control the currently isolated Russian Satellite network. Our Britannian benefactors have expressed great interest in controlling this network of spy and communication satellites, §Respecially the O.S.I...\n\n(You have two actions)§!"
