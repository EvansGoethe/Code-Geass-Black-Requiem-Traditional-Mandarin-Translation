 EUR_INTRO.11.a:0 ""
 EUR.12.t:0 "When the Sun Sets, So Rises the Moon"
 EUR.12.d:0 "\n\n£GFX_EUR_Project_Zorya \n\n\n\n\n\nSubject: Project Zorya\nFrom: Isabella Schariac, Project Head of Starshot\nTo: Grand Duke Velaines\n\nSir, I appologize for the urgent message although recient developments have forced me to violate protocol.\n\nLast night at 3:07:51 my team recieved an encrypted transmission for which we have no explanation for. Every single computer connected to the Cosmodrome's network recorded the phenominon before subsiquently crashing. All attempts to recover the final data from any of said devices has been an unmittigated failure; however, we were able to determine that all hardware built into the facility was unaffected. Whatever sent that transmission the eggheads that built this place designed their systems in order to withstand such an event.\n\nI do not need to state the importance or the concern that a signal that can take down entire communication networks could bring to our effort or the prosperity of the Empire.\n\nI understand that you want answers though I have none to give other than an update on one of my potential leads. Over the last 6 years I have identified that over 300 shipments sent to this facility that have been removed from the database leaving only a blank space on the records. Additionally, Flight Control has records of several static fire tests and two launches that are not on the launch manifest or any other records. The Republic was known for it's secrecy in reguards to it's space program but this is, frankly, overkill. I believe that these three instances are indeed connected to whatever that transmission was earlier and while I am limited by the information at this facility, should I gain access to the rest of program's locations I should be able to learn more.\n\nFinally sir, I give to you the last piece of information that I could recover that being the codename all related files have been found under... §RProject Zorya§!"
 EUR.12.a:0 "Was this an automated responce or did someone try to stop our investigation?"
 EUR.13.t:0 "Orders From The Crown Prince"
 EUR.13.d:0 "Grand Duke Velaines stood in his recently acquired office at the Capital building in Okhotsk. His fingers pressed against the cool surface of his desk as he mulled over the events of the last two months and the message from Pendragon lying in front of him. Oh, how he wished he had a government to build off of… and oh how he cursed the O.S.I for killing the one man who brought stability to this territory. Despite all his flaws, President Sorokin did what was required of him, a thought that recentered Highland’s mind to the task at hand.\n\nThe words were clear, he was to eradicate any opposition either from the upstarts out west or from within while ensuring that all of Russia feel under Euro-Britannia’s grasp. A challenge no doubt but when did a mere challenge ever force him to back down. No, it wasn’t the task that made him think twice but the author of the order being none other than the Second Prince Schneizel el Britannia.\n\nSchneizel’s directives had always been coldly logical, a reminder of the unyielding will of the Empire, but these suggestions that he had laid out made his conscience spring to life. As much as he revered Schneizel’s intellect and strategic genius, the brutality required to carry out these orders wouldn’t be uncommon from a recently conquered area. Was this what he was supposed to lead? A new Area built off a broken promise and political backstabbing? Highland chuckled at the thought realizing how accurate that thought was to the history of Britannia’s royal family.\n\nHe could, of course, repeat history and follow his orders at face value. His position of course demanded loyalty to the Emperor first and foremost, but, a part of him wondered if there was a way to interpret these orders more creatively. To see if he could stop the cycle and give unto the people what had been promised without undermining his position. It would certainly be more difficult but, again, when has an added challenge ever stopped him?"
 EUR.13.a:0 "Better to follow the orders and avoid the added hassle."
 EUR.13.b:0 "If I am to lead these people I need to restore the trust that was lost."
