 EMU_begun_the_second_emu_war_has:0 "第二次鴯鶓戰爭，開始了"
 EMU_begun_the_second_emu_war_has_desc:0 "傑鶓已做好準備，我們也是。我們已準備好宣戰，奪取澳大利亞聯合共和國的殘餘領土。我們已經佔領了維多利亞。現在，是時候奪回其餘本屬於我們的一切了。"
 EMU_release_our_captive_brothers:0 "解救被囚的弟兄"
 EMU_release_our_captive_brothers_desc:0 "在第一次戰爭勝利之後，我們賜予了人類和平。他們卻恩將仇報，把我們的同胞擄為人質，關進圍欄，當作牲畜對待。哪怕要傾盡全體鴯鶓之力，我們也要解救他們。"
 EMU_their_farms_our_farms:0 "他們的農場，我們的農場"
 EMU_their_farms_our_farms_desc:0 "這一切都始於他們的農場，所以我們要將農場全部奪來為己所用。善用這片土地，以農場為根基，建立更偉大的鴯鶓國度。"
 EMU_make_the_humans_work:0 "讓人類幹活"
 EMU_make_the_humans_work_desc:0 "人類雖然軟弱無力，卻也有些用處——最重要的是他們的雙手。我們要讓那些手勞動起來，讓他們為自己反自然的罪行付出代價。"
 EMU_modify_equipment_to_suit:0 "改裝合身的裝備"
 EMU_modify_equipment_to_suit_desc:0 "這支現代人類軍隊的裝備並不適合我們的體型。我們將讓被俘的人類迅速為我們改裝，好讓我們更有效地作戰。"
 EMU_no_mercy_this_time:0 "這次絕不留情"
 EMU_no_mercy_this_time_desc:0 "隨著最後一滴澳大利亞人的血灑落，我們再度獲勝。第二次鴯鶓戰爭正式結束，而這一次，他們將得不到任何憐憫。"
 EMU_alliance_with_the_penguins:0 "與企鵝結盟"
 EMU_alliance_with_the_penguins_desc:0 "單憑我們一國之力，實在太過弱小，無法征服其餘的人類國家。我們必須尋找盟友。企鵝是水下作戰的專家，他們會是一支出色的海軍。"
 EMU_funs_with_guns_on_subs:0 "潛艇上的槍砲樂"
 EMU_funs_with_guns_on_subs_desc:0 "企鵝為我們打造了一套完美的裝束，外形與他們相仿，能夠游泳與潛水，同時披掛鋼鐵護甲並裝有威力強大的槍砲。是時候讓潛水鴯鶓出擊了。"
 EMU_improve_gods_work:0 "改良上帝的傑作"
 EMU_improve_gods_work_desc:0 "上帝將鴯鶓設計為祂最偉大的造物，但我們可以讓祂的造物更臻完美、展翅翱翔。結合我們俘獲的人類科學家與我們自己的科學家，我們將運用所學的知識，以科技改良我們的形態。"
 EMU_emu_technicality:0 "E.M.U 技術車"
 EMU_emu_technicality_desc:0 "我們取得了重大的科學發現。如今我們能將槍砲綁上裝束並在移動中開火，人類豐田技術車的完美形態就此誕生。"
 EMU_pigeons_help_us_fly:0 "鴿子助我們飛翔"
 EMU_pigeons_help_us_fly_desc:0 "傑鶓聯絡上了他的一位老朋友，人稱噴射背包鴿。他為我們搭起了與整個鴿族溝通的橋樑。他們同意幫助我們獲得飛行的能力。"
 EMU_roaring_steel_wings:0 "咆哮的鋼鐵之翼"
 EMU_roaring_steel_wings_desc:0 "鴿子們證明了自己非常有用。他們幫助我們改裝現有的人類戰鬥機並製造我們自己的戰機，全部由鴿子與鴯鶓混合駕駛。"
 EMU_eu_more_like_emu:0 "E.U？不如叫E.M.U"
 EMU_eu_more_like_emu_desc:0 "一些人類聯合起來嘲弄我們。他們自稱EU還是什麼自命不凡的名號。我們要把他們的國家從地球表面抹去。"
 EMU_emu_superiority_over_dragon:0 "鴯鶓勝過龍"
 EMU_emu_superiority_over_dragon_desc:0 "一個名為中國的人類國家長久以來都把龍當作終極生物來炫耀。現在是時候讓他們知道自己錯了。"
 EMU_operation_saving_private_emmanuel:0 "行動代號：搶救鴯兵曼紐爾"
 EMU_operation_saving_private_emmanuel_desc:0 "不列顛尼亞囚禁傑鶓的偉大盟友——曼紐爾二等兵——已有一段時日。我們再也無法容忍他被強行囚禁。是時候把戰火燒到他們頭上了。我們已讓他等得太久。"
 EMU_the_emu_who_sold_the_world:0 "出賣世界的鴯鶓"
 EMU_the_emu_who_sold_the_world_desc:0 "這場戰鬥因傑鶓而起，也將由他終結。我們的勝利要歸功於那個賦予我們超凡智慧與永不止息的戰意的祕密結社：鵝教。"
 EMU.1.t:0 "第一擊"
 EMU.1.d:0 "起初，這只是澳大利亞聯合共和國平凡的一天。陽光灑落在墨爾本的主幹道上，海風輕拂過雪梨。然而，今天因為一個原因而與眾不同：這是維多利亞的慶典之日。共和國總理蒞臨此地，與各州州長會晤。車隊沿路緩緩前行，一輛流線型的黑色豪華轎車行駛在最前方，裡面無疑坐著總理。豪華轎車後方還跟著兩輛，載滿了州長們。\n\n民眾夾道觀望，揮舞著紫色的旗幟和飾有澳大利亞盾徽的旗幟——那是獨立與民主的象徵。就在那時，事情發生了。剎那之間，混亂爆發。前方的豪華轎車在減速停車時猛烈爆炸，塵埃尚未落定，後方兩輛車也接連爆炸。當驚恐的圍觀者停止尖叫時，街道上出乎意料地湧滿了鴯鶓。\n\n起初這一切看似毫無章法、混亂至極，鴯鶓四處奔跑啄人。接著，攻擊顯得更有針對性。鴯鶓們選擇先攻擊並解除警察的武裝，而當軍隊開進時，他們也對軍隊發起攻擊。戰鬥愈拖愈久，最終升級為人類與鴯鶓之間的全面巷戰。他們的數量實在太多了。他們開始在街道上遊行，在混亂中如魚得水，並自然而然地圍成一圈，中間站著一隻鴯鶓——一隻能夠用英語說話交談的鴯鶓。牠明確表示，這絕非偶發事件。不，這是鴯鶓對人類發起的第一擊。"
 EMU.1.a:0 "\"The Emus are justified!\""
 EMU.1.b:0 "\"There is no justice in murder.\""
 EMU.2.t:0 "戰爭已被宣告"
 EMU.2.d:0 "Flanked by his guards, Jemu inspected the chaotic streets. So much violence and chaos, all because of him. He walked down the streets of Melbourne with the air that he had owned them for all his life. He kept on going without a single sign of anything threatening to stop him and his men. Even as the Human military rolled in to fight, his soldiers simply overwhelmed and killed them.\n\n\"Sir, we are approaching the podium,\" the guard directly in front of Jemu told him. He nodded and looked ahead.\n\n\"So we are,\" spoke Jemu in a deep, gruff voice. They had come here for that podium. Jemu pointed his head to his right guard and then pointed again to some camera equipment that had been prepared previously. The guard and two others peeled off the lens caps and went to work on them as Jemu walked the other way, approaching the stage’s steps and ascending towards the podium.\n\nAs Jemu sauntered onto the stage, the guards following him dispersed. He stepped up onto the podium, a microphone already set up for him, and waited for his other guards to point the camera towards him. When they confirmed the cameras were live, Jemu announced only one thing: \"The Emu Kingdom hereby declares...\""
 EMU.2.a:0 "\"War.\""
 EMU.3.t:0 "這次絕不留情"
 EMU.3.d:0 "The Human had his head down, staring right into the concrete ground with his hands bound tightly behind him. He was in a line with other captured Humans. He wore a green military uniform, though it had been stained—stained red with blood. Jemu approached him and stomped on his head with his powerful clawed foot.\n\n\"You... are responsible for the deaths of hundreds of my kind.\"\n\nJemu spoke in a deep voice as he looked at the Human with the only eye he had left. The man beneath his foot didn’t speak at all. He just gritted his teeth. Jemu lifted his head up by his hair to look into his bloodshot eyes which burned with rage and hatred. He spat right at Jemu in an act of defiance, the spit splattering against the ground as it narrowly missed Jemu’s face. Jemu glared at the Human and slammed his head down into the concrete with a splat. The Human was still alive—he had made sure of it.\n\n Lowering his head to look into the half-conscious eyes of the man before him, Jemu uttered something that sent chills down the Human’s spine.\n\n\"The first time we won, we made a mistake in letting you all live as you please.\""
 EMU.3.a:0 "\"Not this time.\""
 EMU.4.t:0 "鵝之力量"
 EMU.4.d:0 "They met where it all began for them, overlooking the coastline. With the crashing of the waves, Jemu remembered this place. Here, he had been granted a power unlike any other—the power that changed his fate, the power that isolated him from the rest of his brethren.\n\n\"This power would isolate me. That's what you had said.\"\n\nHe spoke gently, turning around to look upon the figure he had come here to greet. The white, stark feathers of the being in front of him laid in contrast to every other bird Jemu had seen up until that point. It was the appearance of the Goose who had granted him so much, the Goose who had had a glowing glint in its eye when starting him on his journey.\n\nIt didn’t speak. In fact, it didn’t say anything at all to him, just like the first time they had met.\n\n\"So, this is it,\"\" Jemu spoke again, turning his gaze back to the coastline which from end to end belonged to him. The entirety of it. Unsure of what he was to do next, he sighed as he recalled the one thing he fully knew about himself. He was..."
 EMU.4.a:0 "\"The Emu who sold the world.\""