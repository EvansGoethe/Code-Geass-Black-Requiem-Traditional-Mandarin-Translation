 EMU_begun_the_second_emu_war_has:0 "Begun the Second Emu War has"
 EMU_begun_the_second_emu_war_has_desc:0 "Jemu is prepared, and so are we. We are ready to make the declaration of war to take what remains of the United Australian Republic. We have already seized Victoria. Now, it is time to seize the rest of what is rightfully ours."
 EMU_release_our_captive_brothers:0 "Release Our Captive Brothers"
 EMU_release_our_captive_brothers_desc:0 "After our victory in the first war, we granted the Humans peace. They repaid our kindness by taking our brethren as hostages, keeping them in pens, and treating them like livestock. We will release them even if it takes all of Emukind to do so."
 EMU_their_farms_our_farms:0 "Their Farms, Our Farms"
 EMU_their_farms_our_farms_desc:0 "This all began on their farms, and that’s why we’ll seize them all for our own goals. Make use of the land and utilise the farms as our foundation for a greater Emu nation."
 EMU_make_the_humans_work:0 "Make the Humans Work"
 EMU_make_the_humans_work_desc:0 "Humans, while weak and feeble, do have some uses—their hands most importantly. We will put those hands to work so they may pay for their crimes against nature."
 EMU_modify_equipment_to_suit:0 "Modify Equipment to Suit"
 EMU_modify_equipment_to_suit_desc:0 "The equipment of this modern Human military isn’t properly designed to suit our form. We will have the captured Humans modify them quickly for us so we may fight more effectively."
 EMU_no_mercy_this_time:0 "No Mercy This Time"
 EMU_no_mercy_this_time_desc:0 "With the last drops of Australian blood spilled, we have won once more. The Second Emu War is officially over, and this time, they shall be afforded no mercy."
 EMU_alliance_with_the_penguins:0 "Alliance With the Penguins"
 EMU_alliance_with_the_penguins_desc:0 "Alone, our nation is weak and unable to conquer the rest of the Human nations. We must seek allies. The Penguins are experts at underwater warfare. They will make a fine navy."
 EMU_funs_with_guns_on_subs:0 "Funs With Guns on Subs"
 EMU_funs_with_guns_on_subs_desc:0 "The Penguins have made us a perfect suit with a form like theirs that’s able to swim and dive underwater while having armor made of steel and mighty guns attached to it. It's time to launch the Scuba Emu."
 EMU_improve_gods_work:0 "Improve God's Work"
 EMU_improve_gods_work_desc:0 "God designed Emus as his greatest creation, but we can perfect His creation and make it soar. Between the Human scientists we’ve captured and our own, we will use the knowledge we have gained to improve our form with technology."
 EMU_emu_technicality:0 "E.M.U Technicality"
 EMU_emu_technicality_desc:0 "We have made a great scientific discovery. With the ability to now strap guns to our suits and fire them while on the move, a perfected form of the Humans’ Toyota technicals has been achieved."
 EMU_pigeons_help_us_fly:0 "Pigeons Help us Fly"
 EMU_pigeons_help_us_fly_desc:0 "Jemu has contacted a longtime friend of his, known only as Jetpack Pigeon, who has opened a bridge of communication to the rest of Pigeonkind for us. They have agreed to help us gain the ability to fly."
 EMU_roaring_steel_wings:0 "Roaring Steel Wings"
 EMU_roaring_steel_wings_desc:0 "The Pigeons have proven themselves very useful. They have helped us modify existing Human fighters and make our own, all to be piloted by a mix of Pigeons and Emus."
 EMU_eu_more_like_emu:0 "E.U? More Like E.M.U"
 EMU_eu_more_like_emu_desc:0 "Some Humans have bound together to make a mockery of us. They call themselves the EU or some pretentious title like that. We will wipe their nations off the face of the Earth."
 EMU_emu_superiority_over_dragon:0 "Emu Superiority Over Dragon"
 EMU_emu_superiority_over_dragon_desc:0 "A Human nation known as China has had a great history of parading around Dragons as the ultimate creature. It is now time to show them they are wrong."
 EMU_operation_saving_private_emmanuel:0 "Operation: Saving Private Emmanuel"
 EMU_operation_saving_private_emmanuel_desc:0 "Britannia has held Private Emmanuel, a great ally of Jemu’s, captive for some time. We cannot tolerate his unwilling captivity any longer. It’s time to take the fight to them. We’ve kept him waiting long enough."
 EMU_the_emu_who_sold_the_world:0 "The Emu who Sold the World"
 EMU_the_emu_who_sold_the_world_desc:0 "This fight began with Jemu, and this fight will end with him. Our victories were secured thanks to the secret society that granted us our supreme intelligence and never-ending will to fight: the Goose Cult."
 EMU.1.t:0 "The First Strike"
 EMU.1.d:0 "It was, at first, a day like any other in the United Australian Republic. The sun beamed down onto the main road through Melbourne, and the oceanic winds blew gently through Sydney. Today, however, was special for one reason: it was a day of celebration in Victoria. The Prime Minister of the Republic was here for a visit with the premiers. The cars trundled down the road, a sleek, black limo positioned right at the front, no doubt carrying the Prime Minister. The limo was flanked by two more behind it, filled with the Premiers.\n\nThe citizens watched onwards, flying banners of purple and flags crested with the shield of Australia, a symbol of independence and democracy. That was when it happened. In a single flash, chaos ensued. The front limo exploded violently as it began to stop, followed by the two behind it in cascading fashion before the dust had even had a chance to settle. And when the screams of the horrified onlookers stopped, the streets became unexpectedly flooded with Emus.\n\nIt seemed random at first and completely chaotic as Emus ran around pecking people. Then it seemed more targeted. The Emus chose to attack and disarm the police first, and when the military rolled in, they attacked them as well. The battle began to drag on and on, eventually escalating into a full-blown war in the streets between the Humans and the Emus. There were just so many of them. They began to parade around the streets themselves, thriving in the chaos as a circle of them naturally formed around a single Emu, one that had the ability to speak and converse in English. It made it clear that this was no random incident. No, this had been the first strike against the Humans by the Emus."
 EMU.1.a:0 "\"The Emus are justified!\""
 EMU.1.b:0 "\"There is no justice in murder.\""
 EMU.2.t:0 "War Were Declared"
 EMU.2.d:0 "Flanked by his guards, Jemu inspected the chaotic streets. So much violence and chaos, all because of him. He walked down the streets of Melbourne with the air that he had owned them for all his life. He kept on going without a single sign of anything threatening to stop him and his men. Even as the Human military rolled in to fight, his soldiers simply overwhelmed and killed them.\n\n\"Sir, we are approaching the podium,\" the guard directly in front of Jemu told him. He nodded and looked ahead.\n\n\"So we are,\" spoke Jemu in a deep, gruff voice. They had come here for that podium. Jemu pointed his head to his right guard and then pointed again to some camera equipment that had been prepared previously. The guard and two others peeled off the lens caps and went to work on them as Jemu walked the other way, approaching the stage’s steps and ascending towards the podium.\n\nAs Jemu sauntered onto the stage, the guards following him dispersed. He stepped up onto the podium, a microphone already set up for him, and waited for his other guards to point the camera towards him. When they confirmed the cameras were live, Jemu announced only one thing: \"The Emu Kingdom hereby declares...\""
 EMU.2.a:0 "\"War.\""
 EMU.3.t:0 "No Mercy This Time"
 EMU.3.d:0 "The Human had his head down, staring right into the concrete ground with his hands bound tightly behind him. He was in a line with other captured Humans. He wore a green military uniform, though it had been stained—stained red with blood. Jemu approached him and stomped on his head with his powerful clawed foot.\n\n\"You... are responsible for the deaths of hundreds of my kind.\"\n\nJemu spoke in a deep voice as he looked at the Human with the only eye he had left. The man beneath his foot didn’t speak at all. He just gritted his teeth. Jemu lifted his head up by his hair to look into his bloodshot eyes which burned with rage and hatred. He spat right at Jemu in an act of defiance, the spit splattering against the ground as it narrowly missed Jemu’s face. Jemu glared at the Human and slammed his head down into the concrete with a splat. The Human was still alive—he had made sure of it.\n\n Lowering his head to look into the half-conscious eyes of the man before him, Jemu uttered something that sent chills down the Human’s spine.\n\n\"The first time we won, we made a mistake in letting you all live as you please.\""
 EMU.3.a:0 "\"Not this time.\""
 EMU.4.t:0 "The Power of the Goose"
 EMU.4.d:0 "They met where it all began for them, overlooking the coastline. With the crashing of the waves, Jemu remembered this place. Here, he had been granted a power unlike any other—the power that changed his fate, the power that isolated him from the rest of his brethren.\n\n\"This power would isolate me. That's what you had said.\"\n\nHe spoke gently, turning around to look upon the figure he had come here to greet. The white, stark feathers of the being in front of him laid in contrast to every other bird Jemu had seen up until that point. It was the appearance of the Goose who had granted him so much, the Goose who had had a glowing glint in its eye when starting him on his journey.\n\nIt didn’t speak. In fact, it didn’t say anything at all to him, just like the first time they had met.\n\n\"So, this is it,\"\" Jemu spoke again, turning his gaze back to the coastline which from end to end belonged to him. The entirety of it. Unsure of what he was to do next, he sighed as he recalled the one thing he fully knew about himself. He was..."
 EMU.4.a:0 "\"The Emu who sold the world.\""