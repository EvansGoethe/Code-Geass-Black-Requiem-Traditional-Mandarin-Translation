 EMU_the_second_emu_uprising_tt:0 "§R喬治，他們又來了！快拿路易斯機槍來！§!"
 EMU_the_emu_who_sold_the_world_tt:0 "面對面……與那隻把世界賣給鵝的§R鴯鶓§!面對面！"
