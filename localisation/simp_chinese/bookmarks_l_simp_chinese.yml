﻿l_simp_chinese:
 BM_HISTORY_TITLE:0 "歷史簡介"
 COUNTRY_SELECTION_CHARACTER_DESC_NAME: "$NAME|Y$"
 COUNTRY_SELECTION_CHARACTER_DESC: "$NAME|Y$ $DESC|$\n$TRAITS_DESC|$"
 UNEQUAL_WORLD_DESC:0 "在過去的一個世紀中，三個超級大國崛起了，保持着世界總體的均勢。不列顛尼亞帝國、中華聯邦和歐盟。這些國家的社會和政治系統各不相同，但它們的目標是一樣的，那就是主宰世界。剩餘少數幾個獨立國家在爲生存而戰，反抗着這些強權。脆弱的和平得以延續，世界陷入停滯。但面對這樣一個不平等的世界…沒人能一笑而過"
 UNEQUAL_WORLD_OTHER_COUNTRIES_DESC:0 "地球上幾乎所有國家都隸屬於三大超級大國之一的旗幟之下，即中國、不列顛尼亞或歐盟。這個世界秩序卻兩個例外，分別是日本和中東聯邦。\n\n前一個國家，也被稱爲“太平洋的明珠”，是太平洋地區唯一的民主國家，它之所以能存續，多虧了其櫻石礦藏；類似的邏輯也適用於中東地區。這些地區會被征服，還是它們的獨立精神能延續下去？隨着世界的變化，答案尚未可知。"
 BRT_UNEQUAL_WORLD_DESC:0 "不列顛尼亞的起源可以追溯到拿破崙戰爭，這場戰爭以拿破崙的輝煌勝利告終。在拿破崙入侵不列顛本土期間，許多貴族和名門望族與王室一同逃往他們在北美的領地。\n最初的幾年艱難時期過後，這個新國家在社會達爾文主義原則的啓發下，整合成爲一個君主專制國家，並逐漸將其統治擴展到兩個大陸。最終，在科學和軍事技術方面取得重大進步後，不列顛尼亞帝國成爲了一個全球超級大國。"
 JAP_UNEQUAL_WORLD_DESC:0 "時光並未善待這個曾經聲名顯赫的日本。《鄂霍次克條約》嚴重削弱了他們的整體軍事力量，僅留下一支象徵性的部隊，勉強能夠抵禦各種形式的傷害。數十年後，各大列強都將目光投向日本，，從不斷擴張、貪得無厭的不列顛尼亞，到狡猾如狐的中華聯邦，都企圖征服日本並將其納入新的版圖。\n\n日本能否抵禦歷史的洪流，安然度過這場風暴？還是說，它終將淪爲未來歷史中的一個註腳？"
 FRA_UNEQUAL_WORLD_DESC:0 "歐盟是一個自革命開始以來就在籌備的項目。在拿破崙·波拿巴的領導下，法國得以在反法同盟戰爭中扭轉對英國的局勢，征服了不列顛羣島，並藉此控制了歐洲的大部分地區。儘管1815年在滑鐵盧戰役中，英國領導的同盟軍給拿破崙及其軍隊造成了災難性的失敗，阻止了拿破崙征服俄國，但不久之後，革命者處決了拿破崙。共和國在與不列顛人和俄國人講和後穩定下來。在法國主導下的歐盟中被視爲全球三大力量之一。"
 CHI_UNEQUAL_WORLD_DESC:0 "China heroically stands in the universe, these were the words of the Hongxian Emperor after creating a new dynasty, betraying the Republic. His former socialist comrades rose up against him, only to be put down and chased into the empty western wastelands. Moreover, the High Eunuchs outmanoeuvred the Emperor and reduced him to a puppet.\n\nChina eventually dominated Asia, but it stands divided. A thousand enemies within and without plot to destroy her. Will she wither and die or rise like a phoenix?"
 RUS_UNEQUAL_WORLD_DESC:0 "自從大戰期間法國入侵、沙皇俄國被征服以後，俄羅斯母親就一直飽受動盪之苦。親歐政府籠罩在俄羅斯廣袤無垠的平原之上若隱若現的動亂陰影中；極端主義意識形態已在烏拉爾和西伯利亞紮根。俄羅斯和她的人民正處於一個動盪的時代，人心惶惶，未來充滿了不確定，國家最終會怎樣——俄羅斯政府能否經受住未來的考驗，還是會陷入無政府狀態，這一切都是未知數，因爲內戰的威脅從未像現在這樣迫在眉睫。"
 RUSSIA_IN_CHAOS_DESC:0 "俄羅斯共和國是一個正迅速衰落的國家。自從被納入歐洲體系以來，歐盟對俄羅斯施加的政治壓力給這個國家帶來了巨大影響。全球範圍內的國際緊張局勢和衝突正處於歷史最高點，這一切似乎都加速了不可避免的結局——最後一塊多米諾骨牌已經倒下。俄羅斯已被多個爭奪其未來控制權的派系分裂。在這個戰亂紛爭的新時期，有一點是確定無疑的：俄羅斯陷入了混亂。"
 RUSSIA_IN_CHAOS_OTHER_NATIONS:0 "在《Code Geass》的世界中選擇一個國家，或者直接查看地圖！雖然大多數國家沒有獨特的內容，但有一個爲小國定製的通用國策樹，其中不列顛區域會多一些額外內容。你會幫助超級大國實現它們的目標，還是有自己的其他計劃呢？"
 BRT_RUSSIA_IN_CHAOS_DESC:0 "神聖不列顛帝國在入侵日本之後，憑藉着世界上最大的櫻石礦藏，佔據了主導地位，這也使得歐洲和中國不得不坐到談判桌前。\n\n如今，不列顛尼亞雖已處於世界的中心，但也付出了代價——整個世界的怒火都聚焦在他們身上。一場風暴正在地平線醞釀，它將把世界捲入堪比聖經規模的混亂之中，而不列顛尼亞能戰勝現狀嗎？"
 A11_RUSSIA_IN_CHAOS_DESC:0 "11區，前身爲日本，是神聖不列顛尼亞帝國的人造產物，如今由第一騎士俾斯麥以帝國的名義統治。他意圖穩定這一地區，不擇手段地確保帝國對日本人口和資源的控制，爲世界舞臺上即將到來的風暴做準備。隨着日本政府的垮臺，多個抵抗組織湧現出來，努力反抗不列顛對其祖國的征服。不列顛政府能成功平定日本，還是帝國的這一角落會在永無止境的叛亂浪潮中崩塌？"
 RUS_RUSSIA_IN_CHAOS_DESC:0 "曾經在世界舞臺上是一股強大力量的俄羅斯共和國，如今發現自己正瀕臨毀滅的邊緣。數十年不均衡的發展，給那些被認爲重要的人帶來了繁榮，卻給其他所有人帶來了苦難。隨着莫斯科的控制力不斷減弱，民衆對其領導層的信任也已崩塌，政府在這個根基搖搖欲墜、逐漸分裂的國家裏拼命維持秩序。然而，在全世界的注視下，俄羅斯那些曾經忠誠的歐洲盟友中，不滿的低語聲越來越大。這個共和國會挺過去並重新團結其人民，還是會讓外國勢力趁機左右俄羅斯的命運？"
 MRU_RUSSIA_IN_CHAOS_DESC:0 "在俄羅斯寒冷的烏拉爾地區，隨着米哈伊爾·阿斯塔科夫執掌這個新的分裂國家，建立一個新俄羅斯國家的夢想開始成爲現實。憑藉民粹主義運動的支持，他已經在葉卡捷琳堡奪取了政權，俄羅斯人民或許會再次看到一位強權人物領導他們的國家。\n然而，這位強權領導人是否會是阿斯塔科夫，仍有待觀察，因爲年輕的流亡沙皇弗謝沃洛德·羅曼諾夫也在制定自己的計劃，想要掌控他那正在分崩離析的祖國。阿斯塔科夫或許會試圖將沙皇用作傀儡，但他對這個年輕人真正有多少控制權呢？"
 SRU_RUSSIA_IN_CHAOS_DESC:0 "俄羅斯共產黨（VKP）長久以來一直等待着在俄羅斯重振革命精神的機會。隨着全國上下動盪不安，他們的機會終於來了，但黨內領導層之間的緊張局勢不斷升級，他們正走向衝突，這很可能會使國家分裂。\n這會讓他們徹底失去獲勝的機會。有一些人仍會回想起遙遠的記憶中俄國革命的恐怖，仍被那個流血時代所留下的創傷困擾，但當然，歷史確實有重演的習慣。§R或許是時候更換領導層了？§R"
 EUR_RUSSIA_IN_CHAOS_DESC:0 "遠東臨時政府誕生於莫斯科數十年的忽視與腐敗之中，它體現了一個被自己國家拋棄的民族的堅韌。多年的孤立將他們逼至絕境，一場毀滅性的轟炸更是雪上加霜，如今他們奮起反抗，想要奪回曾經的俄羅斯。\n\n在謝爾蓋·索羅金總統的領導下，這片四分五裂的土地敢於挑戰那個拋棄了他們的舊世界。他們會拯救俄羅斯母親，爲所有人開闢出一條道路嗎？還是說，他們的共和國會在這個不切實際的夢想的重壓下分崩離析？"