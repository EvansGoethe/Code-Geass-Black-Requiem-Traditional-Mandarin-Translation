 BWR_sonya_will_be_avenged_idea_desc:0 "為索妮亞復仇"
 BWR_bears_are_unpawable_idea:0 "難以忍受的現實"
 BWR_bears_are_unpawable_idea_desc:0 "難以忍受的現實"
 BWR_beartality_idea:0 "艾斯潘的勇士"
 BWR_beartality_idea_desc:0 "艾斯潘的勇士"
 BWR_Air:0 "熊之空軍"
 BWR_Air_desc:0 "熊之空軍"
 BWR_remember_sonya:0 "銘記索妮亞"
 BWR_remember_sonya_desc:0 "我們摯愛的索妮亞的離世使我們的人民深受創傷。她雖已逝去，但她的熊將繼承她的遺志。時機成熟時，我們將為所有熊的自由而戰。但今天，我們哀悼。在向新世界進軍之前，讓我們度過安寧的一天。"
 BWR_the_new_face_of_russia:0 "俄羅斯的新面孔"
 BWR_the_new_face_of_russia_desc:0 "是時候讓社會主義運動獲得一張全新的面孔，讓大家在絕望之時有所仰望了。還有什麼比熊更社會主義的呢？"
 BWR_bear_market:0 "熊市"
 BWR_bear_market_desc:0 "我們已接過熊之革命的大旗，但僅憑熊力無法實現革命。我們需要俘虜一些人類專家，學習他們的資源開採方法，才能將革命傳播四方，把所有的熊從人類手中解放出來。"
 BWR_bear_economy:0 "熊之經濟學"
 BWR_bear_economy_desc:0 "我們的共和國必須擁有自己的貨幣。因此，應人民的要求，我們首先要重點發展的產業是漁業。工人們將開始用魚眼交換其他商品。共和國是一個自主選擇的國度，人民已經選出了有價值的東西。我們的貨幣將被稱為RFE，即「共和國魚眼」。"
 BWR_train_the_bears_for_war:0 "訓練戰熊"
 train_the_bears_for_war_desc:0 "為了確保熊族的存續，我們必須將人民軍事化，為與人類的戰爭做準備。艾斯潘黎明之日即將到來。"
 BWR_bear_necessities:0 "熊之必需"
 BWR_bear_necessities_desc:0 "隨著共和國的誕生，我們承擔起照顧人民的責任。索妮亞教會了我許多事，其中最早的一課，就是人們會為自己所愛的土地與家園而戰。共和國將成為那個家園。我們將滿足人民的需求，確保他們獲得妥善的住所、食物與安全，直到我們能在這個世界上自由地生活。"
 BWR_beary_good:0 "熊棒了！"
 BWR_beary_good_desc:0 "雖然我們的人民對勞動力的概念還很陌生，但他們天生就是幹活的料。一頭熊能做五個人的工作。因此，我們的產業輕鬆超越了人類。人類為了滿足需求不惜毀滅地球；而我們只需努力工作就能滿足自己的需求。"
 BWR_call_out_to_the_international_bears:0 "召喚國際熊"
 BWR_call_out_to_the_international_bears_desc:0 "我們向世界各地的兄弟姐妹發出了召喚。他們比預期更早抵達，牙齒與利爪上還沾著鮮血——他們的重生與我們並無二致。現在我們可以訓練他們、武裝他們，教他們人類的戰爭之道。"
 BWR_bear_revolution:0 "熊之革命"
 BWR_bear_revolution_desc:0 "我們已清楚認識到，我們不能只做一個國家。這片土地在農業與人口承載力上都有極限。我們必須將共和國傳播到世界各地，讓大地恢復到艾斯潘最初創造它時的模樣。"
 BWR_establish_the_polar_fleet:0 "建立極地艦隊"
 BWR_establish_the_polar_fleet_desc:0 "北方的兄弟姐妹已經證明，浮冰適合短途海上航行。為了擴充極地艦隊，我們必須徵收國內所有船隻，從海參崴城的船開始。"
 BWR_beary_good_navy:0 "熊棒的海軍"
 BWR_beary_good_navy_desc:0 "極地艦隊需要升級。為此，我們責成灰熊族群成為國家的研發部門。他們唯一的目標就是讓我們追上人類的水準，從海軍能力開始。"
 BWR_establish_knightbears:0 "建立騎士熊部隊"
 BWR_establish_knightbears_desc:0 "不列顛尼亞部署的Knightmare部隊近乎完美，卻有一個致命缺陷：我們塞不進駕駛艙。因此，我們請來了太平洋彼岸的小個子朋友——無尾熊——替我們駕駛，組成精英騎士熊部隊。"
 BWR_getting_our_bearings:0 "找準熊的方位"
 BWR_getting_our_bearings_desc:0 "人類已經證明了一支正規空軍的重要性。因此，我們認為馬來熊弟兄們正適合這份工作。我們將在天空中確立方位，保護人民免遭人類轟炸。"
 BWR_bear_force_one:0 "熊軍一號"
 BWR_bear_force_one_desc:0 "令我們驚喜的是，人類擋不住我們強大的馬來熊的駕駛技術。儘管我們在空中威力強大，我們的熊式飛機卻太過老舊，飛行員無法充分發揮才能。為此，灰熊研究員們設計出了特製駕駛艙，讓飛行員在裡面有更多活動空間，立刻解決了他們大部分的技術問題。"
 BWR_release_the_war_bears:0 "放出戰熊"
 BWR_release_the_war_bears_desc:0 "「熊臨行動」——粉碎人類的行動——的準備工作已經完成。今天，人類將見證我們的力量：我們將碾碎他們的防禦工事，擊潰他們的軍隊。革命絕不停歇，直到地球再次成為熊的宜居之地。"
 BWR_sonya_will_be_avenged:0 "為索妮亞復仇"
 BWR_sonya_will_be_avenged_desc:0 "我摯愛的照顧熊索妮亞，總是照顧著她的人民。她教會了我最幼小的熊崽也有價值。我明白這一點，但那條毒蛇奪走她生命的畫面總在我眼前閃現。為此，我們絕不能放過人類。"
 BWR_bears_are_unpawable:0 "難以忍受的現實"
 BWR_bears_are_unpawable_desc:0 "人類以為我們的征服可以被阻止。他們野蠻的頭腦無法理解：他們作為地球優勢物種的時代已經結束了。他們已經失去了那本就名不正言不順的世界主權。"
 BWR_beartial_law:0 "戒嚴爪"
 BWR_beartial_law_desc:0 "隨著共和國在各條戰線上持續擴張，是時候在全國宣布戒嚴爪了。人類將認清自己的地位，正如歷史上艾斯潘曾經怒吼宣告的那樣。"
 BWR_force_the_humans_to_fight:0 "建立人類營"
 BWR_force_the_humans_to_fight_desc:0 "如今大量人類已歸屬我們的共和國，我們對他們最起碼的要求就是替我們作戰。既然我們有龐大的人類儲備來補充損失，為什麼還要繼續浪費我們自己人民的生命呢？"
 BWR_expand_the_knightbears:0 "擴編騎士熊部隊"
 BWR_expand_the_knightbears_desc:0 "隨著人類不斷擴展其Knightmare的性能，灰熊部門決定集中力量，超越人類已達到的水準。"
 BWR_beartality:0 "艾斯潘的黎明"
 BWR_beartality_desc:0 "人類殘酷地按照自己的形象塑造了世界。唯有以他們過去對我們展現的同等熊性，才能讓他們看清我們為自己塑造的新世界。艾斯潘賜予我們力量，讓我們用騎士熊營粉碎人類最後的抵抗。\n這將是屬於我們的日子：艾斯潘黎明之日。"
 BWR_Industrial_Development:0 "發展工業"
 BWR_Industrial_Development_desc:0 "我們的國家迫切需要進行工業改革。我們需要投資建立更好的工業化體系，以使我們的國家擺脫在當前充滿不確定性的時期所面臨的經濟差距。"
 BWR_Civillian_sector:0 "民用部門"
 BWR_Civillian_sector_desc:0 "現在是時候從零開始建造新工廠了。只有這樣，我們的國家才能達到成為經濟強國所需的指標和永續發展目標。"
 BWR_Civillian_sector_2:0 "民用部門2"
 BWR_Civillian_sector_2_desc:0 "作為當前經濟政策的延續，政府將投資建設更多國有工廠，以促進國家經濟發展，並致力於實現人民的長期經濟繁榮。"
 BWR_Civillian_sector_3:0 "民用部門3"
 BWR_Civillian_sector_3_desc:0 "為了實現經濟計畫的中期目標，我們將繼續專注於建造工廠，以滿足不斷增長的消費產業的需求。"
 BWR_Civillian_sector_4:0 "民用部門4"
 BWR_Civillian_sector_4_desc:0 "隨著我們經濟計劃的最後階段即將完成，這項旨在提升國家財富和繁榮的宏偉計劃終於準備就緒！在不久的將來，世界各國都將臣服於我們強大的經濟實力！"
 BWR_infastructure_sector:0 "基礎設施部門"
 BWR_infastructure_sector_desc:0 "由於過去的腐敗和無知，我們國家的基建設施長期疏於維護，已經破敗不堪。我們必須發起一項倡議，修復和擴大我們的基建設施，使其重現昔日輝煌。"
 BWR_infastructure_sector_2:0 "基礎設施部門2"
 BWR_infastructure_sector_2_desc:0 "基礎設施發展的下一階段現在可以開始了。我們將致力於建設一個可長期運作的全國性運輸系統，在未來多年內為我們的軍隊與民眾提供補給。"
 BWR_infastructure_sector_3:0 "基礎設施部門3"
 BWR_infastructure_sector_3_desc:0 "我們必須保持目前所取得的動能。我們將清理舊的基礎設施，為新建住宅、工廠和設施騰出空間，這將鞏固我們國家的根基。"
 BWR_infastructure_sector_4:0 "基礎設施部門4"
 BWR_infastructure_sector_4_desc:0 "我們的基礎建設發展計畫終於要進入最後階段了。在可預見的未來，我們的首都將實現自給自足，其經濟也將真正體現一個新興國家首都應有的水準。"
 BWR_military_sector:0 "軍事部門"
 BWR_military_sector_desc:0 "為了能夠有效地抵禦外部威脅，我們需要一個能夠為步兵提供足夠可靠的武器的軍火工業，以對抗那些企圖破壞我們國家穩定的日益增長的敵對勢力。"
 BWR_military_sector_2:0 "軍事部門2"
 BWR_military_sector_2_desc:0 "我們必須考慮的另一個方面是敵軍可能部署的大量裝甲師。更不用說我們可能遭遇的「knightmares」坦克了。這種技術正迅速展現戰爭的新面貌，並且正快速發展成為超越裝甲的新型武器。我們必須加大對火砲和反戰車能力的投入，才能對抗這種強大的技術力量。"
 BWR_military_sector_3:0 "軍事部門3"
 BWR_military_sector_3_desc:0 "天空是戰場上經常被忽視的一個區域，但即便如此，我們也能清楚地看到，誰控制了製空權，誰就控制了戰局。因此，生產能夠確保我方制空權的飛機是重中之重。"
 BWR_military_sector_4:0 "軍事部門4"
 BWR_military_sector_4_desc:0 "我們最終的軍事工業擴張將大大提高我們的軍事產量，推動我們的軍事技術，確保我們的主權和我們國家的持續安全。"
 BWR_New_Technical_Institute:0 "新技術學院"
 BWR_New_Technical_Institute_desc:0 "我們近期的工業擴張使我們有機會增加研發預算，這將使我們能夠迅速擴大創新能力，並進一步實現我們的長期國家目標。"
 BWR_Synthethic:0 "合成資源"
 BWR_Synthethic_desc:0 "為了推動我們不斷發展的產業，我們需要資源來維持自身的正常運轉，同時繼續擴大產業規模，並創新能夠幫助我們實現產業擴張的新技術。"
 BWR_Civillian_sector_5:0 "民用部門5"
 BWR_Civillian_sector_5_desc:0 "我們的第二個國家工業計劃已經啟動。我們將在這裡興建的工廠將為國家提供確保經濟獨立所需的資源。"
 BWR_Prosperous_Nation:0 "繁榮之國"
 BWR_Prosperous_Nation_desc:0 "最終，我們的國家實現了真正的繁榮。人民享受近年來國民經濟產業蓬勃發展所帶來的財富。我們取得了其他弱小國夢寐以求的成就。"
 BWR_Pink_Saphires:0 "粉色的寶石？"
 BWR_Pink_Saphires_desc:0 "櫻石是一種珍貴的資源，我們絕對不能放棄。其他國家則利用這種資源大大提升了自身的經濟和軍事實力。我們需要這種資源，而且是刻不容緩！"
 BWR_New_Railways:0 "新建鐵路"
 BWR_New_Railways_desc:0 "為了確保我國不僅能夠保衛自身，而且能夠實現經濟自給自足，我們需要建立一個能夠滿足我們這個處於創新前沿的成長型國家需求的鐵路網絡。"
 BWR_military_sector_5:0 "軍事部門5"
 BWR_military_sector_5_desc:0 "現在我們擁有了進行第二次軍事擴張所需的資源，我們就能真正為軍隊配備各種各樣的裝備。我們將擁有世界上裝備最精良的軍隊之一——不，是世界上裝備最精良的軍隊！"
 BWR_Military_Industrial_Complex:0 "軍工複合體"
 BWR_Military_Industrial_Complex_desc:0 "我們國家的經濟未來正越來越接近以軍事為中心的模式。我們的戰爭機器將繼續壯大；我們能否無限期地維持下去，還是這將導致我們的衰落？"
 BWR_Advanced_Technical_Institute:0 "先進技術學院"
 BWR_Advanced_Technical_Institute_desc:0 "近年來，我們產業的蓬勃發展提升了我們的創新能力，也增強了我們改進現有技術的能力。這將使我們超越那些自認為科技優於我們的國家，贏得競爭優勢。"
 BWR_Establish_Admiralty:0 "擴充海軍部"
 BWR_Establish_Admiralty_desc:0 "現在，我們國家終於到了海岸線以外拓展的時機。但在考慮派遣船艦之前，我們必須先建立起海軍體系和指揮系統。我們國家只有少數男女能夠勝任這項工作。希望他們能夠迎接挑戰。"
 BWR_Confiscate_Dockyards:0 "沒收民用船塢"
 BWR_Confiscate_Dockyards_desc:0 "儘管貿易在當前動盪時期對我們至關重要，但我們不能坐視巨頭們踐踏我們，因為我們終將面臨被踐踏的命運。我們將沒收港口、碼頭以及任何用於船舶維修的人工岬角。這些臨時搭建的船塢將使我們能夠製造自己的戰艦。"
 BWR_Naval_School:0 "建立海军学院"
 BWR_Naval_School_desc:0 "現在我們有了海軍上將，也有了幾艘正在建造中的艦艇，我們必須建立一所學院，將水手培養成軍官，以便我們能夠填補指揮結構中的其他軍銜。"
 BWR_New_Age:0 "海戰新時代"
 BWR_New_Age_desc:0 "儘管艦船設計多年來變化不大，但各艦種的戰術和角色卻發生了翻天覆地的變化。我們必須盡快更新海軍理論，否則，我們很可能在第一場戰鬥中就措手不及。"
 BWR_Coastal_Defense_Fleet:0 "建立海岸防禦艦隊"
 BWR_Coastal_Defense_Fleet_desc:0 "隨著生產能力的提升和指揮體系的穩固建立，我們現在可以向海軍下達第一個任務。這項任務的目標並不複雜，就是沿著海岸線巡邏，讓船員累積一些海上經驗。雖然表面上看這只是一項小任務，但它卻成功地增強了我們國家的自豪感和希望。"
 BWR_Honorable_Battle:0 "光榮的戰爭浪潮"
 BWR_Honorable_Battle_desc:0 "我們的國家驕傲而光榮，絕不會像潛伏的掠食者一樣躲藏在海底。我們將昂首挺胸，以昔日艦隊的雄偉氣勢向敵人發動衝鋒。我們將用我們強大的武器裝備將他們徹底擊敗。"
 BWR_Heavy_Ship_Design:0 "重型船艦設計"
 BWR_Heavy_Ship_Design_desc:0 "現在我們擁有了一支強大的護航艦隊，可以安全地護送我們的船穿越海洋。這也意味著我們應該從更宏觀的角度來思考問題。讓我們建造能夠與不列顛尼亞最強大的戰列航空母艦相媲美的船吧。"
 BWR_Standardized_Designs:0 "標準化設計"
 BWR_Standardized_Designs_desc:0 "我們已成功建造了多種類型的水面艦艇。從中累積的經驗讓我們發現了設計中的許多缺陷，其中一些缺陷導致組裝時間過長。因此，我們最終能夠實現設計標準化，從而以前所未有的速度組裝輕型艦艇。"
 BWR_Install_the_Repair_Yards:0 "安裝維修場地"
 BWR_Install_the_Repair_Yards_desc:0 "隨著戰爭的可能性隨著時間的推移而增加，建造乾船塢修理廠將增強我們艦隊的生存能力，使它們能夠返回巡邏，而無需等待數月進行維修。"
 BWR_Flagship_for_the_Fleet:0 "艦隊的旗艦"
 BWR_Flagship_for_the_Fleet_desc:0 "現代水面艦隊若沒有旗艦統帥，又怎能稱之為海軍強國？沒有旗艦，我們怎能自詡為海軍強國？儘管我們擁有足夠的資源來建造這樣一艘戰艦，但目前僅夠建造一艘主力艦。重型巡洋艦和航空母艦之間的選擇，目前在海軍部內部引發了激烈的爭論。"
 BWR_Hidden_War:0 "秘密戰線"
 BWR_Hidden_War_desc:0 "鑑於我國生產能力有限，為了面子或虛榮心而建造水面艦隊是愚蠢的。我們應該專注於捕食戰術，在目標出現之前保持隱蔽。從長遠來看，潛艦艦隊對我們更有利。我們首先要做的就是統一潛水艇設計。"
 BWR_Fear_the_Unseen:0 "懼怕無形"
 BWR_Fear_the_Unseen_desc:0 "建造小型艦艇節省了大量時間和精力，我們可以將精力投入到提升魚雷性能和訓練水手推遲攻擊目標到最後一刻的行動中。"
 BWR_Lock_Down_the_Ocean:0 "封鎖海路"
 BWR_Lock_Down_the_Ocean_desc:0 "隨著潛水艇設計的標準化，現在是時候增加巡邏次數了。我們新建造的布雷艦進一步加強了這項工作，它們對我國週邊海域實施了嚴密的封鎖。"
 BWR_Mass-Produce_Parts:0 "大量生產零件"
 BWR_Mass-Produce_Parts_desc:0 "我們絕不能讓巡邏出現漏洞。為了確保敵艦無法突破我方艦隊防線，我們必須將艦艇建造零件標準化，以提高潛艦的組裝速度。"
 BWR_Deploy_the_Prototypes:0 "部署原型"
 BWR_Deploy_the_Prototypes_desc:0 "專業化海軍生產終於有了成效。設計師們興奮地向海軍部報告說，新型潛水艇原型已經準備就緒，可以下水試航了。這令海軍部感到意外，因為他們之前既沒有訂購也沒有預料到會有原型艇。"
 BWR_Air_Development:0 "發展空軍"
 BWR_Air_Development_desc:0 "我們已經清楚地認識到，我國空軍與世界主要強國相比實力不足。我們必須立即糾正這一問題！我們已命令航空研發部門設計新型武器和機身原型，以縮小與敵人之間的實力差距。"
 BWR_Airbases:0 "空軍基地"
 BWR_Airbases_desc:0 "由於我國空軍正在研發新型飛機，我們必須先建造一些機場才能開始組裝。"
 BWR_Air_Academy:0 "建立空軍學院"
 BWR_Air_Academy_desc:0 "我們已經建立了一支強大的空軍，但這還不足以讓我們在製空戰中保持競爭力。我們將訓練飛行員運用最佳戰術和策略，賦予他們豐富的知識，使他們在戰鬥中所向披靡。他們將成為我們天空的守護者，他們將無所畏懼。"
 BWR_Transport_Supplies:0 "物資輸送"
 BWR_Transport_Supplies_desc:0 "時代在變遷。我們不能再像過去那樣僅僅依靠地面基礎設施來安全運輸物資了。在籌集到一些資金後，我們將從其他國家的私人企業購買一些運輸機，這樣我們就能在不依賴公路和鐵路的情況下為部隊提供補給。"
 BWR_aviation_Doctrine_School:0 "空軍理論學校"
 BWR_aviation_Doctrine_School_desc:0 "我們無需費力就能明白，在飛機及其使用方面，我們還有很多東西要學習。資金已經投入，書籍也已購買；我們將利用這些資源來培訓我們的飛行員。"
 BWR_aviation_Doctrine_School_2:0 "空軍理論學校 2"
 BWR_aviation_Doctrine_School_2_desc:0 "自上次會議以來，我們在空軍理論方面吸取了一些非常寶貴的經驗教訓——這些經驗教訓讓我們對如何進一步推進飛行員訓練有了更深入的了解。"
 BWR_aviation_Doctrine_School_3:0 "空軍理論學校 3"
 BWR_aviation_Doctrine_School_3_desc:0 "我國在空戰方面已經累積了豐富的經驗，飛行員的技能已經可以與主要強國的飛行員相提並論。我們為什麼要止步於此？不，我們將繼續運用已有的經驗，進一步提升飛行員的技能。如果我們的空軍停滯不前，就等於向敵人投降。"
 BWR_Fighter_Focus:0 "重視戰鬥機"
 BWR_Fighter_Focus_desc:0 "轟炸機威力強大，但速度慢且脆弱。我們的空軍需要的不是更多的轟炸機，而是能夠對抗轟炸機並摧毀敵方可能部署的任何飛機的手段。"
 BWR_Close_Air_Support:0 "近距離空中支援"
 BWR_Close_Air_Support_desc:0 "諸兵種聯合作戰方法已不再是可有可無的戰術條令。將空中優勢與有效的地面支援相結合，是保持戰鬥勢頭的最佳戰術。地面支援最好與突襲式空中打擊配合使用。為了使這些諸兵種聯合作戰成為可能，我們必須擁有隨時待命的近距離空中支援力量。"
 BWR_Bomber_Focus:0 "重視轟炸機"
 BWR_Bomber_Focus_desc:0 "我們擁有支援空軍最精銳部隊——轟炸機——所需的工業實力。這些大型殺傷性機器能夠摧毀敵人的後方防線，扭轉戰局，為前線士兵帶來勝利。"
 BWR_Nothing_But_Ash:0 "只餘灰燼"
 BWR_Nothing_But_Ash_desc:0 "我軍空軍的首要目標應當是徹底摧毀敵人的戰爭能力。我們將竭力發展出世界上最強大的轟炸機，並用它們攻擊敵人的工業設施和基礎設施，使其軍隊物資匱乏，容易受到我軍地面部隊的打擊。"
 BWR_Army_Development:0 "陸軍發展計畫"
 BWR_Army_Development_desc:0 "現在是時候重新評估我們的軍隊，為新時代的戰爭做好準備，並研究我們希望如何繼續前進。"
 BWR_Artillery_Development:0 "發展炮兵部隊"
 BWR_Artillery_Development_desc:0 "事實證明，砲兵在摧毀最強大的軍隊方面極為有效。在當今時代，擁有一支沒有砲兵的軍隊不僅不明智，而且極其愚蠢。我們將研究來自前線部隊的報告，以研發更好的砲兵裝備。"
 BWR_Motorized_Development:0 "機動化發展"
 BWR_Motorized_Development_desc:0 "過去幾個世紀一直是戰爭和技術領域創新與實驗的堡壘。在眾多經驗中，我們發現了機動裝備在軍隊中的效用。我們將匯聚科學家的力量，加深我們對這些看似簡單卻至關重要的機器的理解。"
 BWR_Firearms_Development:0 "槍械研發"
 BWR_Firearms_Development_desc:0 "對一支軍隊來說，還有什麼比不起眼的槍更重要的呢？就連這些先進的新型「knightmares」戰機也配備了自己的武器。值得慶幸的是，我們可以藉鏡其他國家私部門的知識，來研發更先進的槍械。"
 BWR_Armor_Development:0 "裝甲裝備研發"
 BWR_Armor_Development_desc:0 "坦克是唯一能有效對抗布里塔尼亞機甲的武器，即便如此，它們也難以取勝。我們必須盡快研發出更強大的坦克車來對抗機甲。"
 BWR_New_RND_Department:0 "一個新的研發部門"
 BWR_New_RND_Department_desc:0 "我們已清楚地認識到，為了與敵人抗衡，我們需要更多科學家。我們已籌集到資金並招募到所需人才，以建立一個全新的研究部門來支持我們現有的研究部門。"
 BWR_army_Doctrine_School:0 "陸軍條令學校"
 BWR_army_Doctrine_School_desc:0 "建立一支成功的軍隊涉及許多重要因素，其中最關鍵的之一是指揮體系。我們需要能幹的軍官與將領才能發動戰爭；否則，我們的軍隊將極其低效與遲緩。我們將確保只有最有才幹、最有經驗、因而也最合格的人才能獲得晉升。"
 BWR_army_Doctrine_School_2:0 "陸軍條令學校 2"
 BWR_army_Doctrine_School_2_desc:0 "儘管裝甲目前仍然普遍存在，但未來顯然將由「knightmares」主導。步兵在即將到來的時代將難以生存。如果我們希望他們能夠在與敵人的首次交鋒中倖存下來，就必須確保他們獲得便攜式反坦克導彈（MANPATS）的補給，以維持他們的生存能力，並使其能夠對抗任何「knightmares」或裝甲敵人。"
 BWR_army_Doctrine_School_3:0 "陸軍條令學校 3"
 BWR_army_Doctrine_School_3_desc:0 "隨著每年都有新的Knightmare原型機亮相，我們必須討論兩種變體：近戰型和堡壘型。近戰型Knightmare犧牲了防禦力以換取更高的護甲穿透力，能夠對大多數Knightmare變體構成攻擊先鋒。堡壘型Knightmare幾乎沒有任何進攻能力，但卻是強大的防禦力量，需要先進的機甲或反Knightmare火砲才能將其擊敗。"
 BWR_army_Doctrine_School_4:0 "陸軍條令學校 4"
 BWR_army_Doctrine_School_4_desc:0 "我們必須討論的最後一個Knightmare Frame變種是先進型，或者說是所謂的「全能型」。這種科技奇蹟（或恐怖）是我們務必不惜一切代價避免的目標。只有反Knightmare火砲才能將其擊敗。如果我們的士兵遭遇這種機體，他們必須知道要么堅守陣地等待援軍，要么撤退到主戰線。切勿交戰。"
 BWR_army_Doctrine_School_5:0 "陸軍條令學校 5"
 BWR_army_Doctrine_School_5_desc:0 "反Knightmare火砲已成為對抗Knightmare的常備資產。無論我們選擇哪一方，都必須研究與之協同或對抗的方法。我們可以用聰明的戰術反制這種火砲，例如讓步兵突襲這些笨重的機器；或者，若我們使用這類武器，則將其部署在敵人難以攻克的戰略要點。"
 BWR_Knightmare_Warfare:0 "Knightmare 戰爭"
 BWR_Knightmare_Warfare_desc:0 "戰爭新時代已經來臨；我們絕不能落後。knightmares是未來的發展方向，我們將充分利用它們，研發出屬於我們自己的knightmares，以便在必要時與各強國競爭。"
 BWR_The_Facts:0 "歪曲事實"
 BWR_The_Facts_desc:0 "微型球體感測器和陸上迴旋輪 是knightmares的關鍵組件。我們需要立即開發這些技術。不惜一切代價！"
 BWR_Knightmared_Police:0 "Knightmare 警察"
 BWR_Knightmared_Police_desc:0 "警察一直是維護世界法律與秩序的中堅力量，但在當今時代，恐怖主義與叛亂才是他們的主要對手。我們將致力於打造一款警用Knightmare Frame，讓警察能用它保衛街頭免受這些威脅，並在緊急情況下投入對叛亂分子的戰鬥。"
 BWR_Buy_Used_Stock:0 "買二手貨"
 BWR_Buy_Used_Stock_desc:0 "誰說我們非得自己做所有的knightmares？二手貨和黑市庫存充足，足夠我們組成一個師。我們得趕緊集結兵力，訓練他們駕駛這些knightmares保衛家園。"
 BWR_Our_Own_Roundtable:0 "我們自己的圓桌騎士團"
 BWR_Our_Own_Roundtable_desc:0 "不列顛尼亞擁有一支由最優秀、最傑出的Knightmare機甲駕駛員組成的精英部隊，名為「圓桌騎士」。雖然我們目前在Knightmare機甲方面經驗不足，但我們擁有足夠多具備組建我們自己的精英部隊所需天賦的人才。"
 BWR_Conventional_Warfare:0 "常規作戰"
 BWR_Conventional_Warfare_desc:0 "如果它沒壞，就別修。我們現有的軍隊已經在歷史上證明了自身的價值，為什麼還要把精力放在「knightmares」戰機上呢？"
 BWR_The_Real_Engines_of_war:0 "真正的戰爭機器"
 BWR_The_Real_Engines_of_war_desc:0 "knightmares或許體型龐大、令人膽寒，但正如俗語所說：越大越容易倒下。我們將與坦克設計師和實際操作坦克的士兵攜手合作，研發出性能更優的坦克，以應對Knightmare的強大火力。"
 BWR_The_Stuff_That_Matters:0 "事關重大"
 BWR_The_Stuff_That_Matters_desc:0 "步兵是任何軍隊最重要的組成部分，忽視他們是愚蠢的。我們將訓練部隊，教導他們如何更有效地作戰。透過這些訓練，我們也將提升整個軍隊的組織性。"
 BWR_Protecting_The_Men_On_The_Front:0 "保護前線士兵"
 BWR_Protecting_The_Men_On_The_Front_desc:0 "人力是寶貴的資源，而那些願意為國而戰的經驗豐富的戰士更是如此。我們必須增加戰地醫護人員的數量，並提高他們的裝備質量，以降低我們損失寶貴士兵的風險。"
 BWR_The_Drums_Of_War:0 "戰鼓轟鳴"
 BWR_The_Drums_Of_War_desc:0 "我們的軍隊已經成為世界上最精銳的部隊之一！就連各大強國在進攻我們之前都會三思！要達到今天的成就絕非易事；然而，我們不會止步於此。我們將繼續提昇軍隊的實力！否則，我們的敵人必將迎頭趕上，甚至在最糟糕的情況下，超越並壓制我們。"
 BWR.1.t:0 "普卡的悲歌"
 BWR.1.d:0 "自從索妮亞收養了我，我便一直被愛與善意包圍，因為她與許多人不同。從未有人類對一頭註定死在荒野中的熊崽展現過如此的仁慈。我本該終生做她忠實的夥伴……至少，事情本該如此。\n\n在索妮亞被奪走的那個夜晚，我經歷了任何生靈所能承受的最深沉的悲痛。毒蛇盧卡背叛了她，將她摯愛的人人平等之夢扭曲成邪惡之物。就在那一夜，我對人類的仇恨生根發芽。他的血是我嚐過的第一口血，他的肉是我撕裂的第一塊肉，他的命是我奪走的第一條命。我的荊棘之心將收緊纏繞，困住人類所有的暴君，恢復索妮亞那光榮的夢想——讓她所有的孩子一律平等。\n\n索妮亞，與你相識的時光是我和我的人民的福分。我向你發誓：你的夢想必將成真。我將以一聲怒吼團結眾熊，向艾斯潘的黎明進軍。請像從前一樣等著我，待你的夢想實現之後，我會去與你重聚。"
 BWR.1.a:0 "我們的人民為她哀悼。"
 BWR.2.t:0 "銘記索妮亞"
 BWR.2.d:0 "「我的熊民同胞們，今天，我們哀悼我們最親愛的同志索妮亞的離世。她是所有熊的母親，是革命的真正同志。她就在我面前被殺害——連熊崽們也未能倖免。那場悲劇教會了我一件事：如果人類會毫不留情地屠殺他們物種中最優秀、最善良的人，那麼他們就不配擁有她的世界。而我們配得上。\n\n首先，我們要奪回我們的家園——那個被他們僅僅出於貪婪與自負而撕裂的國家。然後，我們將把我們的願景傳遍世界。在人類的腐敗被清算之前，我們無法繼承索妮亞的夢想。\n\n母親，如果您在天有靈，我知道您會為您的人民哭泣。對不起，但人類已向我們展露了他們的本性。現在，輪到我們展露我們的本性了。」"
 BWR.2.a:0 "她將永遠不會被遺忘。"
 BWR.3.t:0 "俄羅斯的新面孔"
 BWR.3.d:0 "「我親愛的人民，今天，我以領袖的身分站在你們面前，但我並非獨自站在這裡。在我發出召喚之後，是你們解放了自己，來到我的身邊。我不能按照我個人的願景來領導革命。那是人類一再重蹈的覆轍，但絕不會是我們的。\n\n在這個新國家誕生之際，已有一些同胞用後腿站了起來：列文季·熊利亞、沃伊泰克、熊科斯基、熊魯雪夫、熊拉科夫，還有讓·熊里。這些熊是最先挺立的。很快，你們都將站起來，因為今天是一個新國家的誕生之日。今天，熊之工人共和國誕生了！」"
 BWR.3.a:0 "普卡將崛起！"
 BWR.4.t:0 "訓練戰熊"
 BWR.4.d:0 "儘管我們的人民十分強壯，在這個偉大國家的建設中也已走了很遠，但他們對人類的戰爭之道仍未完全領會。許多士兵仍會扔掉槍，衝上去用爪撕咬眼前的人類。這雖然給敵方造成大量傷亡，卻讓熊群暴露於危險之中，而我們的人口數量不足以補充每一位陣亡的士兵。\n\n我們將教會他們射擊、操作火砲、更穩當地駕駛車輛，以及——在適當的時候——在近身戰中釋放野性。"
 BWR.4.a:0 "我們必須迅速備戰。"
 BWR.5.t:0 "召喚國際熊"
 BWR.5.d:0 "以我們目前的數量，根本無望染指這個世界。我們必須聯絡世界各地的同胞。北極熊、馬來熊、灰熊、無尾熊、掉落熊、黑熊、棕熊、貓熊等等——共和國歡迎所有的熊。無論他們來自何方，我們都會在偉大的國度裡為他們找到一席之地。"
 BWR.5.a:0 "兄弟姐妹們，團結起來！"
 BWR.6.t:0 "放出戰熊"
 BWR.6.d:0 "進軍的時刻到了。我們建立了共和國，如今它已與世界列國並肩而立。然而，在我們站穩腳跟的同時，人類並未袖手旁觀。我們必須趁他們組織起集體反擊之前立即行動。\n\n我們要讓人類認清自己的地位——歐洲人、亞洲人、不列顛尼亞人，以及他們所有的傀儡。"
 BWR.6.a:0 "和平的時代結束了。"
 BWR.7.t:0 "建立人類營"
 BWR.7.d:0 "如今人類已在我們的統治之下，我們必須設法照顧他們，讓他們成為共和國的一分子。我們最初的計畫是開設人類動物園，讓民眾更加熟悉這些完全無法照顧自己的生物。畢竟，他們很快就會成為瀕危物種。但戰爭不會為仁慈而止步。\n\n為了利用他們好鬥的天性，我們建立了人類營，並將這些小個子搬進與公眾隔離的熊營。他們很快將被武裝、訓練並投入前線，讓我們自己的人民得以遠離最慘烈的戰鬥。"
 BWR.7.a:0 "他們必須為自己的罪孽贖罪。"
 BWR.8.t:0 "擴編騎士熊部隊"
 BWR.8.d:0 "我們的無尾熊弟兄在前線為國家立下汗馬功勞，包圍了許多人類，還打了更多人類一個措手不及。愚蠢的人類總是仰望天空，提防我們危險的騎士熊機體，卻從沒料到會有小號的機體直直朝他們衝來。\n\n鑑於他們在戰爭中的巨大價值，灰熊部門專注於改裝他們的騎士熊機體，讓無尾熊們能更穩定地堅守在戰鬥最激烈處。我們的小個子弟兄們再也不必專注於側翼攻擊與包圍，如今可以如願以償：與體型更大的同志們並肩，直搗敵陣。"
 BWR.8.a:0 "是時候向我們的無尾熊弟兄致敬了。"
 BWR.9.t:0 "艾斯潘的黎明"
 BWR.9.d:0 "時至今日，我已無數次阻止我的士兵進入我族所能達到的那種毫無節制的原始狂怒狀態。這種克制我再也無法自圓其說。雖然這個共和國最初是為了紀念索妮亞而建立，想以最終向世界展示仁慈的力量來告慰她，但它終究撐不起如此崇高的理想。這個世界不在乎你的願望與期盼。它冰冷、嚴酷、無情；它的土壤浸透了無辜者的鮮血，而在無辜者持續受難之時，從沒有誰敢說出一個反抗的字眼。\n\n這就是我們出生的世界——索妮亞出生的世界。人類中最光明的人，往往被他們同類中最黑暗的人扼殺。歸根結底，行動比理想更有分量，而那唯一的行動就暴露了人類真正卑劣的心：一個除了屍體與貪婪之外一無所有的黑暗深淵。他們的殘忍唯有他們的傲慢可與之匹敵。我們的新世界——我的新世界——容不下這樣的人。我們必須戰鬥，直到人類跪下，接受自己在自然階序中的位置。\n\n我親愛的照顧熊，我知道妳在為妳的人民悲傷。妳一定後悔當年把我從飢餓中救出來，但如今我有自己的人民要服侍，有自己的夢想要實現。永別了，索妮亞。我們保證，不會讓妳在來世孤單。"
 BWR.9.a:0 "這樣做是對的嗎？"
 BWR.10.t:0 "通往天堂的熊之階梯"
 BWR.10.d:0 "今天標誌著全球共和國的開端。在我們的統治下，國界與部落主義都已成為過去。人類已被馴化，倖存者也獲得了保護地位。我們終於可以把這個世界變得更美好，並沿途照顧那些弱小脆弱的生靈。我實在不忍心終結他們。我們已徹底粉碎了人類的一切抵抗及其存在缺陷的社會。全面屠殺不會為我們偉大的共和國帶來榮耀。事實上，它只會是一個污點：玷污我們的人民、玷污我們的國家，最糟的是，玷污艾斯潘——那位賜予我們與人類彼此共享的思想與情感的全能者。沒有誰知道我們的神是誰、是什麼，也不知道是什麼促使祂賜予我們這份自我意識。也許祂是被人類激怒了，也許這根本不是刻意為之。\n\n多年來，我們發現一些人類擁有一種名為「鵝斯」的特殊力量。也許正是這些力量的使用造就了我們的崛起，因為我們似乎對它們完全免疫。至少這是我個人的看法。無論其源頭為何，所有的熊生來就知道「艾斯潘」這個名字。這個無比強大的名字，以靈魂與意識的形式賦予了我們智慧。為此，我們必須永懷感恩。\n\n不久之後，我們將建立人類保留區，為他們提供食物、飲水，以及為我們光榮的共和國貢獻綿薄之力的機會。也許有一天，他們會明白是什麼導致了自己的沒落，並奮起與我們並肩而立。也許未來還會有另一位索妮亞再度綻放光芒。可悲的是，我活不到那一天了。所以，我將用在這世上剩餘的時光，完善這個我深愛的共和國，奠定它的未來，但願在我死後人類依然安全。\n\n流血的時代已經過去。如今我們站在了人類曾經的位置上，重蹈他們的覆轍只會使我讓人類與我的人民共同經歷的那些戰爭歲月失去意義。永不重演。"
 BWR.10.a:0 "為了艾斯潘、索妮亞，以及全體熊族！"
