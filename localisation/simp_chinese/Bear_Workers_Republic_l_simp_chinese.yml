 1_BWR.tt:0 "這將生成7個騎士熊師，並為你的庫存增加1200台騎士熊機體。"
 2_BWR.tt:0 "這將生成極地艦隊。"
 3_BWR.tt:0 "這將生成10個熊單位，並有新的將領加入共和國。"
 4_BWR.tt:0 "這將大幅提升熊軍的實力。"
 5_BWR.tt:0 "普卡將不再遠距離領導國家。是時候為他摯愛的索妮亞復仇了！"
 6_BWR.tt:0 "這將解鎖一項決議，允許你每30天徵募一次懲戒營。"
 7_BWR.tt:0 "這將生成12個騎士熊師，並聘請一位騎士熊專家擔任元帥。"
 8_BWR.tt:0 "這將解鎖地區決議，允許你以政治點數為代價，將服從度高的佔領地區設為核心。"
