﻿l_simp_chinese:
 suzaku.1.t:0 "一場小爭執-第一部"
 suzaku.1.d:0 "樞木和他的兒子朱雀被祕密轉移到這個新的隔離住所已經過去幾天了，但朱雀的內心有些不對勁。他親身目睹了戰爭的恐怖，但他相信，至少他還能依靠自己的父親。然而，當朱雀看到父親遺落在地板上的一些文件後，一切都變了。他不假思索地大喊起來——\n\n“爸爸，這到底是什麼意思！？”\n\n“朱雀，你什麼意思？”\n\n“你真的打算把弓箭手行動進行到底嗎！？”\n\n“嗯……畢竟這是拯救日本的唯一希望……”\n\n“你在開玩笑嗎？不列顛人每天都在殺害成千上萬的日本人！你爲什麼不向敵人投降！”\n\n“然後丟掉我們的身份？我們的國家嗎！？那樣我們就會變成哈巴狗！”\n\n“但想想那些能被拯救的生命，你難道不在乎他們嗎！？”\n\n“正因爲我在乎他們，我纔想把這場鬥爭堅持到最後一個人！”\n\n“別找藉口了！你真的要爲這種瘋狂的想法採取行動嗎！？”"
 suzaku.1.a:0 "“我只能向你保證，弓箭手行動可能會被推遲。”"
 suzaku.1.b:0 "“這是必要的，朱雀！我們現在不能失去戰鬥的決心！”"
 suzaku.2.t:0 "一場小爭執-第二部"
 suzaku.2.d:0 "短暫的沉默過後，樞木注意到兒子平靜了一些，但這並沒有阻止男孩過了沒多久再次向父親發難，想要繼續爭論下去。\n\n“真的有必要這樣嗎？”\n\n“日本孤立無援，我們是唯一能做這件事的人。”\n\n“那就向其他國家求助啊！我知道他們害怕不列顛尼亞，但我們可以給他們一些櫻石！”\n\n“別逗我笑了。櫻石正是我們陷入這種境地的主要原因。”\n\n“話是這麼說，可是……”\n\n“我們那些所謂的友好國家不會出於‘善意’爲我們動一分一毫。我們不能把國寶拱手讓人，任由外國剝削。”\n\n“難道這不比犧牲人命更容易承受嗎？”\n\n“聽我說，朱雀。如今，一條人命的價值還比不上一座櫻石礦。”\n\n“你在說什麼……”\n\n“你聽見了！你太年輕，不懂政治！”\n\n“你是在開玩笑吧？！”"
 suzaku.2.a:0 "“我這輩子從沒他媽的這麼認真過！”"
 suzaku.2.b:0 "“對不起，朱雀。我說話沒過腦子……”"
 suzaku.3.t:0 "一場小爭執-第三部"
 suzaku.3.d:0 "朱雀渾身發抖，心跳加速，這時他恰好瞥見一個小抽屜上放着一把刀。局勢十分緊張，朱雀內心充滿了矛盾：誰纔是日本真正的敵人？不列顛尼亞無疑難辭其咎。但那個一心想要讓這場血戰持續下去的人，難道就不是罪犯了嗎？\n\n“那，娜娜莉和魯路修的未來呢？”\n\n“我們現在能換個話題嗎？”\n\n“絕對不行！告訴我他們在這場戰爭中扮演什麼角色！”\n\n“別擔心，我已經爲他們準備好了計劃。”\n\n“你在撒謊，是不是！”\n\n“聽着，朱雀，他們是不列顛尼亞人，他們是敵人。你難道已經忘了嗎？”\n\n“那對我來說已經毫無意義了！”\n\n“自從上次我們見到他們之後，你已經變了，是不是？”\n\n“我跟你說過不要轉移話題。現在，你的計劃是什麼？”"
 suzaku.3.a:0 "“他們將被送往中國，一個比這個永無止境的戰區更安全的地方。”"
 suzaku.3.b:0 "“……我會把他們的性命獻給不列顛尼亞，以拯救我們的國家。”"