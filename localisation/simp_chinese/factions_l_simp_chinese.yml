 FACTION_RESOURCE_EXTRACTED_TOTAL_DESC: "陣營成員開採資源總量"
 defense_of_democracy_goal_name: "捍衛民主"
 defense_of_democracy_goal_desc: "民主價值觀正面臨嚴峻挑戰。我們必須團結一致，確保世界上的民主國家不會在威脅面前逐個淪陷。"
 containment_of_communism_goal_name: "遏制全球共產主義"
 containment_of_communism_goal_desc: "世界在共產主義威脅被消除之前不可能安全。"
 suppress_regional_fascism_goal_name: "反法西斯主義"
 suppress_regional_fascism_goal_desc: "法西斯主義如燎原之火肆虐全球，其蔓延之勢令人憂心。每多一個國家淪陷於其魔爪之下，世界局勢便愈發岌岌可危。"
 suppress_regional_communism_goal_name: "在[ROOT.GetCountryContinent]打壓共產主義"
 suppress_regional_communism_goal_desc: "我們必須不遺餘力，保持儘可能多的[ROOT.GetCountryContinent]遠離共產主義枷鎖。"
 regional_expansionism_goal_name: "在[ROOT.GetCountryContinent]的擴張"
 regional_expansionism_goal_desc: "我們的陣營應領導[ROOT.GetCountryContinent]並占主導地位"
 suppress_regional_democracy_goal_name: "打壓民主主義"
 suppress_regional_democracy_goal_desc: "所謂的民主國家是對我們理念的最大威脅。我們需要確保它們在[ROOT.GetCountryContinent]中只佔少數。"
 between_the_seas_goal_name: "海間主義"
 between_the_seas_goal_desc: "通過在黑海至波羅的海沿岸的海間地帶構建堅不可摧的盟國防線，我們足以應對所有潛在挑戰。"
 little_entente_goal_name: "執行巴黎和會條約"
 little_entente_goal_desc: "巴黎和會條約規定了[GER.GetName]、[HUN.GetName]、[BUL.GetName]與[AUS.GetName]的邊界。我們的主要目標是確保這些國家不會開始吞併邊境領土，再次摧毀歐洲的和平。"
 china_territorial_integrity_goal_name: "領土完整"
 china_territorial_integrity_goal_desc: "中國必須在一個政黨的領導下完成民族解放與祖國統一大業。唯有徹底清除一切內外敵對勢力，全面收復固有領土主權，方能使中華民族重獲歷史榮光。"
 china_chinese_consolidation_goal_name: "中國統一"
 china_wang_front_expansion_name: "戰勝帝國主義"
 china_wang_front_expansion_desc: "是時候打破殖民列強在東亞的殖民桎梏了。我們必須在區域內構建屬於我們自己的陣營體系，方能永遠擺脫被支配的命運。"
 china_asian_democratic_union_name: "$china_wang_front_expansion_name$"
 china_asian_democratic_union_desc: "$china_wang_front_expansion_desc$"
 strength_in_unity_goal_name: "團結就是力量"
 strength_in_unity_goal_desc: "讓我們這片土地上的國家緊密團結一致。唯有立一個強大的陣營，我們將擁有保持獨立與中立的最佳機會。"
 conquest_of_territory_goal_name: "征服與統治"
 conquest_of_territory_goal_desc: "在一個充滿敵意的世界裡，擴張對生存至關重要。擴張能創造緩衝區，並讓我們獲得更多資源。"
 spread_of_communism_goal_name: "世界革命"
 spread_of_communism_goal_desc: "時候到了，人民群眾要站起來。當他們無法自己站起來時，我們必須用武裝力量幫助他們。"
 control_of_the_balkans_goal_name: "巴爾幹安全"
 control_of_the_balkans_goal_desc: "域外勢力從未停止將其觸角伸向巴爾幹半島。我們必須勠力同心，堅決捍衛這片土地免受任何外來干預。"
 african_decolonization_goal_name: "非洲去殖民化"
 african_decolonization_goal_desc: "是時候讓非洲人民團結起來，奮起反抗一切壓迫者與殖民者了。為了大陸的徹底解放，我們不惜以鮮血與生命為代價！"
 habsburg_hegemony_goal_name: "哈布斯堡霸權"
 habsburg_hegemony_goal_desc: "血脈相連的家族紐帶是所有聯盟最堅實的基石，我們神聖的同盟亦不例外。當務之急是捍衛歐洲王冠的榮耀，將我們的意志遍及寰宇。"
 indifference_is_a_threat_goal_name: "漠視即威脅"
 indifference_is_a_threat_goal_desc: "歐洲一場重大沖突幾乎不可避免，我們必須確保不會有意外發生。任何拒絕選邊站的國家都必須被清除。"
 security_through_expansion_goal_name: "通過擴張獲得安全"
 security_through_expansion_goal_desc: "我們需要在領土周圍建立一道盾牌，確保在當前邊界外形成一圈受控國家。"
 an_iron_curtain_goal_name: "一道鐵幕"
 an_iron_curtain_goal_name_desc: "為鞏固祖國的安全防線，我們有必要在周邊地區構築由友好國家構成的堅實戰略緩衝帶，從而抵禦非友好勢力可能發起的各類非友好行為。"
 eastern_european_security_goal_name: "東歐安保"
 eastern_european_security_goal_desc: "為了更好地保護我們在東歐的利益，必須介入並在西部扶植志同道合的政權。"
 mare_nostrum_goal_name: "我們的海"
 mare_nostrum_goal_desc: "將地中海變為我們的內海一直是我們民族的夢想。時機已到，讓夢想成真！"
 pax_romana_goal_name: "羅馬治世"
 pax_romana_goal_desc: "恢復羅馬帝國的輝煌一直是我們民族的夢想。時機已到，讓夢想成真！"
 building_up_guam_goal_name: "擴建關島海軍基地"
 building_up_guam_goal_desc: "我們必須確保與[PHI.GetNameDef]的通信渠道暢通無阻，以應對可能發生的對[JAP.GetName]的衝突。若能獲取一處更近的海軍戰略據點，將為未來可能爆發的對[JAP.GetAdjective]戰爭創造決定性優勢。而[638.GetName]正是我們夢寐以求的理想基地。"
 the_two_seas_goal_name: "在波羅的海與黑海建立影響"
 the_two_seas_goal_desc: "我們應確保在波羅的海和黑海都保持強大的海軍存在。"
 one_germany_goal_name: "統一德意志各邦"
 one_germany_goal_desc: "為了建立一個強大而團結的權力基礎，我們首先必須確保德國強大而統一。巴黎和約禁止了任何形式的德意志統一。現在是時候證明我們不受無用條約的束縛了。"
 guardians_of_peace_goal_name: "維護全球和平"
 guardians_of_peace_goal_desc: "地平線上正聚集起風暴的烏雲。我們必須防止戰爭過早爆發，這樣我們的聯盟才有時間充分準備這場不可避免的衝突。"
 growing_the_faction: "擴張陣營"
 growing_the_faction_desc: "我方陣營若要在地緣政治舞臺上被認真對待，就必須擁有更多成員。"
 a_large_faction_goal_name: "邀請更多國家加入我們的陣營"
 a_large_faction_goal_desc: "通過進一步擴大規模，我們的陣營將能夠投射更大的影響力。"
 preemptive_strike_on_fascism_goal_name: "先發制人打擊法西斯主義"
 preemptive_strike_on_fascism_goal_desc: "我們不應該等他們率先向我們我們發起進攻。我們必須確保掌握主動權。"
 a_great_fortress_goal_name: "修築更堅固的防禦工事"
 a_great_fortress_goal_desc: "精心準備才是關鍵。通過使用最現代化的防禦工事鞏固邊境地區和戰略要地，我們將確保敵人無法擊敗我們。"
 aggressive_defense_goal_name: "對侵略者造成損害"
 aggressive_defense_goal_desc: "我們不會向敵對勢力讓出一寸土地。要讓士兵們明白：戰鬥的意義不在於為祖國獻身，而在於讓侵略者為他們的國家付出生命的代價。"
 war_on_communism_goal_name: "對共產主義宣戰"
 war_on_communism_goal_desc: "我們必須不擇手段地阻止共產主義蔓延。"
 war_on_democracy_goal_name: "對民主主義宣戰"
 war_on_democracy_goal_desc: "我們需要對意識形態敵人發動打擊。"
 defeat_of_communism_goal_name: "擊敗共產主義"
 defeat_of_communism_goal_desc: "要擊敗全世界的共產主義，我們必須從國內開始，優先消除我們這片區域的共產主義。"
 defeat_of_fascism_goal_name: "消滅法西斯勢力"
 defeat_of_fascism_goal_desc: "要徹底阻止法西斯主義的蔓延，我們必須從國內開始，優先消除我們這片區域的法西斯主義。"
 defeat_of_anti_communists_goal_name: "消滅反動勢力"
 defeat_of_anti_communists_goal_desc: "世界革命的進程始於對區域性敵對勢力的強硬改造。因此，我們的首要革命任務是對大陸境內所有威脅節點實施徹底肅清。"
 defeat_of_anti_fascists_goal_name: "在本大洲傳播法西斯主義"
 defeat_of_anti_fascists_goal_desc: "我們必須優先消除我們這片區域內反對法西斯事業的勢力。"
 defeating_our_enemies_goal_name: "贏得戰爭"
 defeating_our_enemies_goal_desc: "世界風雲變幻，戰爭一觸即發。我們必須確保無論這場戰爭以何種形式爆發，我們終將立於不敗之地。"
 is_victor_in_pc_tt: "在和談上處於勝利方"
 a_military_base_goal_name: "擴建軍事工業"
 a_military_base_goal_desc: "對抗共產主義運動需要槍支。為了大量生產槍支，我們需要強大的軍事工業。"
 a_military_base_tech_bonus: "$a_military_base_goal_name$目標獎勵"
 resource_control_goal_name: "確保戰略資源"
 resource_control_goal_desc: "陣營需要確保自己擁有應對世界上任何威脅所需的資源"
 secure_european_continent_goal_name: "建立歐洲堡壘"
 secure_european_continent_goal_desc: "我們必須確保歐洲大陸與我們的目標一致。[faction.GetName]應在歐洲擁有至高的統治地位。"
 secure_north_africa_goal_name: "保障北非安全"
 secure_north_africa_goal_desc: "我們不僅要竭力掌控歐洲，還要確保在北非獲得更多立足點。"
 an_armored_fist_goal_name: "擴充我們的裝甲部隊"
 an_armored_fist_goal_desc: "新時代帶來新的戰爭機遇。坦克是未來的趨勢。我們需要確保我們的陣營擁有足夠的坦克來主導戰場。"
 an_infantry_army_goal_name: "擴充我們的步兵部隊"
 an_infantry_army_goal_desc: "步兵是任何軍隊的中堅力量。我們需要一支規模可觀的步兵部隊，為我們在外交場合和戰場上的主張提供支持。"
 high_seas_fleet_goal_name: "擴充主力艦隊"
 high_seas_fleet_goal_desc: "確保敵人無法控制北大西洋對我們的行動至關重要。如果我們能阻斷其控制，我們將不會遭受海軍封鎖的影響，我們的艦隊便可以自由航行。"
 high_seas_fleet_tech_bonus: "$high_seas_fleet_goal_name$目標獎勵"
 control_the_chinese_coast_goal_name: "掌控海岸線"
 control_the_chinese_coast_goal_desc: "如果遭到攻擊，我們應儘可能長時間的方式維持海上通道暢通。我們的生存依賴於從海外國家獲取物資的能力。"
 guerilla_expansion_goal_name: "組織抵抗"
 guerilla_expansion_goal_desc: "或許我們無法用侵略者的姿態與侵略者正面交鋒，但可以用我們的戰術與他們周旋到底。"
 industrial_expansion_goal_name: "工業擴張"
 industrial_expansion_goal_desc: "創建強大陣營的最好方法是擁有強大的工業基礎。我們必須確保具備成為列強所需的工業實力。"
 industrial_domination_goal_name: "擴建民用工業"
 industrial_domination_goal_desc: "現代戰爭歸根結底是生產能力的較量。我們必須確保擁有全世界前所未見的強大工業實力。"
 industrial_expansion_tech_bonus: "$industrial_expansion_goal_name$目標獎勵"
 industrial_research_goal_name: "研究$construction4$"
 industrial_research_goal_desc: "為了成為主導力量，我們需要確保陣營內部掌握全面的工業技術。"
 secure_chinese_waters_goal_name: "保衛中華海疆"
 secure_chinese_waters_goal_desc: "我們雖能在陸域稱雄，但遼闊的海疆防線更需嚴防外敵來犯。守護萬里海疆的安全，必須從遠洋開始築牢屏障。"
 faction_goal_subjugate_the_faction_name: "收服陣營"
 faction_goal_subjugate_the_faction_desc: "我們唯有團結一致，在強有力的領導下方能形成抵禦外敵的堅固防線。雖各派意見有所分歧，終能奏響氣勢磅礴的抗戰強音。"
 faction_goal_north_subjugated_name: "降服北部勢力"
 faction_goal_north_subjugated_desc: "只要我們同心協力，整合這一方向的陣營勢力，其他地方實力派自然能看清時勢，乖乖就範。"
 faction_goal_west_subjugated_name: "降服西部勢力"
 faction_goal_west_subjugated_desc: "只要我們同心協力，整合這一方向的陣營勢力，其他地方實力派自然能看清時勢，乖乖就範。"
 faction_goal_south_subjugated_name: "降服南部勢力"
 faction_goal_south_subjugated_desc: "只要我們同心協力，整合這一方向的陣營勢力，其他地方實力派自然能看清時勢，乖乖就範。"
 faction_goal_no_japanese_in_china_name: "驅逐侵略者"
 faction_goal_no_japanese_in_china_desc: "日本人壓迫我們的人民已經太久了。必須將他們趕出中國。"
 faction_goal_the_northern_mandate_name: "控制東西伯利亞"
 faction_goal_the_northern_mandate_desc: "為實現我們民族的偉大繁榮，西伯利亞廣袤疆域與豐富資源勢在必得。當前控制者無能開發，故我國的正當主權不容置疑。"
 faction_goal_the_southern_mandate_name: "控制東南亞"
 faction_goal_the_southern_mandate_desc: "在輝煌的歷史中，我們曾將遼闊的南方納入羈縻。如今我們將再次實現這一事業，憑藉該地區蘊藏的財富，我們的成就將永無止境。"
 faction_goal_the_greater_game_name: "控制中亞"
 faction_goal_the_greater_game_desc: "歷史上，帝國多次試圖征服中亞，但最終鎩羽而歸。現在，我們的時刻到了。我們將再次西進，橫越草原，征服這片土地。"
 suppress_asian_communism_goal_name: "鎮壓亞洲共產主義"
 suppress_asian_communism_goal_desc: "共產主義威脅著傳統生活方式和自然秩序。我們必須團結一致，在共產主義勢力的醜惡嘴臉顯露之時將其擊敗。"
 strategic_resource_control_goal_name: "戰略資源控制"
 strategic_resource_control_goal_desc: "掌握著世界戰略資源者掌握著全世界。"
 align_china_goal_name: "拉攏中國"
 align_china_goal_desc: "中國各派系及其產生的威脅必須加以控制。而以親善的政權取而代之，便是解決此問題的最優解。"
 control_the_chinese_capitals_goal_name: "控制中國首都"
 control_the_chinese_capitals_goal_desc: "若能掌控中國的歷史古都，計劃的阻力必將削弱。"
 war_on_communism_in_asia_goal_name: "在亞洲對共產主義宣戰"
 war_on_communism_in_asia_goal_desc: "真正打敗共產主義的方法只有一個：武力。如果我們想要永遠免受共產主義的影響，就必須將它從亞洲徹底剷除。"
 coastal_security_goal_name: "控制海岸線"
 coastal_security_goal_desc: "我們必須確保完全掌控東亞與東南亞的海岸線。如此一來，西方帝國主義殖民勢力將無法在境內立足。"
 secure_the_oil_supply_goal_name: "保障石油供應"
 secure_the_oil_supply_goal_desc: "若要進行持久戰，必須不惜一切代價確保石油供應充足穩定。"
 secure_the_oil_supply_tech_bonus: "保障石油供應獎勵"
 protector_of_peace_goal_name: "和平守護者"
 protector_of_peace_goal_desc: "我們不應捲入歐洲或其他地區的戰爭。相反，我們應維護和平，鼓勵各國通過和平方式迅速解決爭端。"
 african_domination_goal_name: "非洲主導權"
 african_domination_goal_desc: "我們的最終目標必須始終是確保非洲不受任何外部勢力影響。凡是不與我們站在一起的，就是反對我們的，必須讓他們順從。"
 contain_japanese_expansion_asia_goal_name: "遏制日本擴張"
 contain_japanese_expansion_asia_goal_desc: "我們必須盡力遏制[JAP.GetName]的領土擴張"
 pan_americanism_goal_name: "泛美主義"
 pan_americanism_goal_desc: "整個美洲應當團結一致。通過讓所有人加入，我們就能確保我們這部分世界的安全，並建立起對抗任何外部勢力的統一陣線。"
 amerindian_liberation_goal_name: "解放美洲原住民"
 amerindian_liberation_goal_desc: "美洲的原住民必須從當前統治他們的外國壓迫者手中解放出來。"
 islamic_brotherhood_goal_name: "伊斯蘭兄弟會"
 islamic_brotherhood_goal_desc: "世界上的伊斯蘭國家必須團結起來，共同對抗那些企圖征服和奴役我們的勢力。"
 baltic_security_goal_name: "保護波羅的海"
 baltic_security_goal_desc: "為了保障我國公民和平民的未來，我們必須傾盡全力保護波羅的海地區。只有將其置於我們的掌控之下，當地人民才能繁榮發展。"
 nordic_defence_goal_name: "防禦北歐"
 nordic_defence_goal_desc: "為了保障我國公民和平民的未來，我們必須傾盡全力保護北歐地區。只有將那些咄咄逼人的列強勢力拒之門外，我們才能繁榮發展。"
 european_dominance_goal_name: "確立歐陸霸權"
 european_dominance_goal_desc: "若能團結歐洲大多數國家於一旗之下，我們就能建立起足以應對最嚴峻威脅的強大聯盟。"
 asian_dominance_goal_name: "確立亞洲霸權"
 asian_dominance_goal_desc: "隨著亞洲大部分地區處於我們掌控之下，我們的陣營將成為不可忽視的力量。"
 middle_east_dominance_goal_name: "掌控中東"
 middle_east_dominance_goal_desc: "從阿拉伯半島到黎凡特地區，再到阿富汗山脈，我們需要團結一致，建立全面控制。只要確保各方齊心協力，這一地區必將成為舉足輕重的力量。"
 the_arteries_of_trade_goal_name: "保護貿易命脈"
 the_arteries_of_trade_goal_desc: "為保障成員國的生存與發展，主要航運線路必須牢牢掌控在我方手中。"
 the_atomic_race_goal_name: "製造第一顆原子彈"
 the_atomic_race_goal_desc: "必須確保敵對勢力無論現在還是未來，均無法先於我方獲得核武器。唯有先發制人，方能保證無人能抗衡。"
 the_atomic_race_complete_trigger: "第一個完成$sp_nuclear_bomb$的國家屬於[ROOT.GetFactionName]"
 the_atomic_race_complete_trigger_fail: "首個完成$sp_nuclear_bomb$的國家為非[ROOT.GetFactionName]陣營成員"
 rule_the_waves_goal_name: "統治海洋"
 rule_the_waves_goal_desc: "要真正掌控海洋，就需要一支龐大的艦隊，而龐大艦隊的關鍵組成部分是主力艦。"
 eliminate_the_twin_threats_goal_name: "避免兩線作戰"
 eliminate_the_twin_threats_goal_desc: "除非[SOV.GetNameDef]和[GER.GetNameDef]達成協議，否則我們的安全永遠無法得到保障。"
 disarm_aggression_central_powers_goal_name: "削弱侵略國"
 disarm_aggression_central_powers_goal_desc: "民主國家很少互相發動進攻。為了為後代保全歐洲，我們必須確保這些好戰國家要麼被改造成民主國家，要麼被徹底移除。"
 rule_the_waves_tech_bonus: "統治海洋獎勵"
 imperial_glory_goal_name: "保衛帝國重要資產"
 imperial_glory_goal_desc: "我們必須堅守我國及盟友的關鍵據點。在戰爭時期，只要我們依舊能夠管控全球屬地，便能向世界表明我們是一支不可忽視的強大軍隊。 "
 production_quotas_goal_name: "達到生產配額"
 production_quotas_goal_desc: "我們需要擁有龐大的武器庫來確保[ROOT.GetFactionName]的領土完整，並準備好面對任何來襲的威脅。"
 stall_the_fascist_threat_goal_name: "遏制法西斯主義威脅"
 stall_the_fascist_threat_goal_desc: "我們需要減緩法西斯主義在世界的蔓延速度。西班牙很可能會淪陷，但我們必須盡己所能拖延時間，直到準備好抵禦日益增長的法西斯威脅。通過將敵軍牽制在西班牙的衝突中，我們會使他們難以在其他地方集中力量，從而為我們爭取寶貴的時間。"
 the_red_tide_goal_name: "擴充紅軍"
 the_red_tide_goal_desc: "腳踏實地的軍隊才是最重要的。我們需要一支千萬人的強大軍隊。唯有如此，才能真正確保生存。"
 military_infrastructure_goal_name: "建設軍事基礎設施"
 military_infrastructure_goal_desc: "完善的基礎設施對於確保邊防部隊所需的補給線至關重要。"
 ensure_military_r_d_goal_name: "建設軍事研發設施"
 ensure_military_r_d_goal_desc: "我們必須確保我們的軍事技術達到標準，為此需建設專門用於研發先進原型和新概念的設施。"
 spy_master_goal_name: "任命一名間諜主管"
 spy_master_goal_desc: "我們應指定一位成員國專精於間諜與情報工作，由其負責統籌並指導陣營的各項非行動。"
 convoy_sufficiency_goal_name: "擴充船隊"
 convoy_sufficiency_goal_desc: "為了既能向海外部隊提供充足補給，又能通過海外進口滿足國內工業的物資需求，我們必須建立一支規模足夠龐大的商船隊。"
 develop_mexican_oil_goal_name: "開發墨西哥石油"
 develop_mexican_oil_goal_desc: "擴大墨西哥石油儲量的開採將確保工業與軍事的燃料供應。"
 develop_curacao_oil_goal_name: "開發庫拉索石油"
 develop_curacao_oil_goal_desc: "庫拉索的煉油廠是委內瑞拉石油加工的關鍵。擴大其產能將確保聯盟繼續獲得精煉石油產品的供應。"
 develop_venezuelan_oil_goal_name: "開發委內瑞拉石油"
 develop_venezuelan_oil_goal_desc: "進一步擴大委內瑞拉的石油開採可為聯盟提供支持軍事活動所需的能源。"
 develop_guyanan_bauxite_goal_name: "開發圭亞那鋁土礦"
 develop_guyanan_bauxite_goal_desc: "加強圭亞那的鋁土礦資源的開發將為大型飛機制造提供必需的原材料。"
 develop_suriname_bauxite_goal_name: "開發蘇里南鋁土礦"
 develop_suriname_bauxite_goal_desc: "加強蘇里南豐富的鋁土礦資源的開發將為聯盟不斷增長的航空工業提供所需的原料。"
 develop_lappland_metals_goal_name: "開發拉普蘭金屬資源"
 develop_lappland_metals_goal_desc: "擴大拉普蘭地區礦產的開採將強化聯盟的鐵與鎢供應，支撐軍工產業。"
 develop_ploiesti_oil_fields_goal_name: "開發普洛耶什蒂油田"
 develop_ploiesti_oil_fields_goal_desc: "作為歐洲唯一的油田，普洛耶什蒂油田必須得到充分開發，以確保聯盟擁有維持軍事行動所需的燃料。"
 develop_baku_oil_fields_goal_name: "開發巴庫油田"
 develop_baku_oil_fields_goal_desc: "開發巴庫石油區將為軍事行動提供豐富的精煉石油產品。"
 develop_iraqi_oil_goal_name: "開發伊拉克石油"
 develop_iraqi_oil_goal_desc: "擴大伊拉克石油產能可有效滿足我軍的燃料需求。"
 develop_persian_oil_goal_name: "開發波斯石油"
 develop_persian_oil_goal_desc: "加強波斯油田與煉油能力將確保作戰所需燃料的持續供應。"
 develop_chinese_metals_goal_name: "開發中國金屬資源"
 develop_chinese_metals_goal_desc: "中國蘊藏的多種關鍵金屬可更深入開採，為聯盟的軍工體系提供所需資源。"
 develop_malayan_riches_goal_name: "開發馬來資源"
 develop_malayan_riches_goal_desc: "開發馬來地區的鎢與橡膠資源將大幅增強聯盟的物資基礎，保障製造與軍事後勤關鍵原料的供應。"
 develop_indonesian_riches_goal_name: "開發印尼資源"
 expand_newfoundland_bases_goal_name: "擴建紐芬蘭基地"
 expand_newfoundland_bases_goal_desc: "擴建紐芬蘭的基地將使我們更好地控制北大西洋船隊，並能在重要航線投射空中與海上力量。"
 expand_bermuda_bases_goal_name: "擴建百慕大基地"
 expand_bermuda_bases_goal_desc: "擴建百慕大基地將提升我們在大西洋中部的巡邏能力，並保障跨大陸補給線安全。"
 expand_bahamas_bases_goal_name: "擴建巴哈馬基地"
 expand_bahamas_bases_goal_desc: "在巴哈馬增設基地，將能更有效地監控加勒比海航道，並保護通往北美和南美的海上通道安全。"
 fortify_panama_canal_goal_name: "加強巴拿馬運河"
 expand_trinidad_bases_goal_name: "擴建特立尼達基地"
 expand_azores_bases_goal_name: "擴建亞速爾基地"
 expand_iceland_bases_goal_name: "擴建冰島基地"
 expand_iceland_bases_goal_desc: "在冰島擴建基地將使我們能夠更好地保障丹麥海峽的安全，並對北大西洋通道施加更大影響。"
 expand_faroese_bases_goal_name: "擴建法羅群島基地"
 expand_narvik_bases_goal_name: "擴建納爾維克基地"
 expand_narvik_bases_goal_desc: "擴建納爾維克的基地將能更好地保障獲取重要鐵礦石運輸的通道，並對北極物資供應路線實現管控。"
 fortify_danish_belts_goal_name: "鞏固丹屬貝爾特海峽"
 fortify_danish_belts_goal_desc: "加固卡特加特海峽將使我們能夠更好地對波羅的海與北海之間的海軍通道實施單獨管控。"
 fortify_danish_belts_tooltip: "§Y日德蘭§!、§Y菲英§!與§Y西蘭§!的所有控制§Y丹麥海峽§!的省份獲得一級§Y海岸要塞§!，並由一個師駐守。"
 fortify_gibraltar_goal_name: "鞏固直布羅陀海峽"
 fortify_gibraltar_goal_desc: "加固我們在直布羅陀海峽的戰略基地，將使我們能夠更好地管控地中海與大西洋之間的海上航行。"
 expand_maltese_bases_goal_name: "擴建馬耳他基地"
 expand_maltese_bases_goal_desc: "擴建我們在馬耳他的基地，將能更有效地切斷敵方補給線，並在整個地中海中部投射軍事力量。"
 expand_cretan_bases_goal_name: "擴建克里特基地"
 expand_cretan_bases_goal_desc: "擴建我們在克里特島的基地將使我們能更好地掌控東地中海，並便利於在愛琴海和北非的行動。"
 expand_cypriot_bases_goal_name: "擴建塞浦路斯基地"
 expand_cypriot_bases_goal_desc: "擴建我們在塞浦路斯的基地，將使我們能夠更好地支持東地中海的軍事行動，並確保往返中東的重要航線安全。"
 fortify_bosporus_goal_name: "鞏固博斯普魯斯海峽"
 fortify_bosporus_goal_desc: "加固博斯普魯斯海峽將確保我們掌控黑海與地中海之間的所有海軍通道。"
 fortify_bosporus_tooltip: "§Y伊斯坦布爾§!所有控制§Y博斯普魯斯§!海峽的省份獲得一級§Y海岸要塞§!、一級§Y陸上要塞§!，並由一個師駐守。"
 fortify_dardanelles_goal_name: "加固達達尼爾海峽"
 fortify_dardanelles_goal_desc: "加固達達尼爾海峽將強化我們對來自黑海艦隊與商船航線的掌控。"
 fortify_dardanelles_tooltip: "§Y埃迪爾內§!與§Y布爾薩§!的所有控制§Y達達尼爾§!海峽的省份獲得一級§Y海岸要塞§!、一級§Y陸上要塞§!，並由一個師駐守。"
 fortify_suez_canal_goal_name: "鞏固蘇伊士運河"
 fortify_suez_canal_goal_desc: "持續掌控蘇伊士運河對於確保我們單獨控制歐亞之間主要交通命脈至關重要。"
 fortify_suez_tooltip: "§Y蘇伊士§!的所有控制§Y蘇伊士§!海峽的省份獲得一級§Y海岸要塞§!、一級§Y陸上要塞§!，並由一個師駐守。"
 expand_gulf_of_aden_bases_goal_name: "擴建亞丁灣基地"
 fortify_strait_of_hormuz_goal_name: "鞏固霍爾木茲海峽"
 fortify_strait_of_hormuz_goal_desc: "鞏固霍爾木茲海峽的戰略基地，將使我們能夠更好地管控對波斯和伊拉克重要石油資源的獲取通道。"
 fortify_strait_of_hormuz_tooltip: "§Y穆桑達姆§!與§Y法爾斯§!的所有控制§Y霍爾木茲§!海峽的省份獲得一級§Y海岸要塞§!、一級§Y陸上要塞§!，並由一個師駐守。"
 expand_ceylonese_bases_goal_name: "擴建錫蘭基地"
 expand_ceylonese_bases_goal_desc: "擴建我們在錫蘭的基地，將增強我們對印度洋的掌控力，並便於保護中東與東南亞之間的重要海上航線。"
 expand_singapore_naval_base_goal_name: "擴建新加坡海軍基地"
 expand_singapore_naval_base_goal_desc: "新加坡宏偉的海軍基地要塞扼守著馬六甲海峽，管控著印度洋與太平洋之間的海上往來。它應當得到進一步加強。"
 fortify_manila_bay_goal_name: "加固馬尼拉灣"
 fortify_manila_bay_goal_desc: "加固可防禦的馬尼拉灣將提升我們在西太平洋地區的軍事力量投射能力，並確保通往東印度群島和南海的通道安全。"
 fortify_manila_tooltip: "§Y馬尼拉§!省份擁有2級§Y海岸要塞§!和7級§Y海軍基地§!，而§Y馬尼拉§!地區擁有8級§Y空軍基地§!。"
 fortify_okinawa_goal_name: "鞏固沖繩"
 fortify_okinawa_goal_desc: "鞏固沖繩將掌控通往日本本土的通道，並在太平洋建立堅固的防禦防線。"
 fortify_okinawa_tooltip: "§Y沖繩§!擁有1級§Y防空炮§!和5級§Y空軍基地§!，而§Y那霸§!省份擁有2級§Y海岸要塞§!。"
 fortify_iwo_jima_goal_name: "鞏固硫磺島"
 fortify_iwo_jima_goal_desc: "鞏固硫磺島將掌控通往日本本土的通道，並在太平洋構築起堅固的防禦島鏈。"
 expand_caroline_islands_bases_goal_name: "擴建加羅林群島基地"
 expand_caroline_islands_bases_goal_desc: "擴建我們在加羅林群島和特魯克環礁的基地，將便於在太平洋中部持續開展海空作戰行動。"
 expand_guadalcanal_bases_goal_name: "擴建瓜達爾卡納爾基地"
 expand_guadalcanal_bases_goal_desc: "擴建我們在瓜達爾卡納爾的基地將更好地使我們掌控南太平洋的海上行動以及與澳大利亞之間的通道。"
 expand_wake_island_bases_goal_name: "擴建威克島基地"
 expand_midway_island_bases_goal_name: "擴建中途島基地"
 expand_midway_island_bases_goal_desc: "發展我們在中途島的基地將確保中央太平洋通道的安全，並提供實施跨洋行動的關鍵基地。"
 undoing_brest_litowsk_goal_name: "為《佈列斯特-立托夫斯克條約》復仇"
 undoing_brest_litowsk_goal_desc: "《佈列斯特-立陶夫斯克條約》帶來的屈辱性和平從未被徹底消除。現在是時候抹去這段可恥歷史的最後殘餘了。"
 marine_corps_goal_name: "建立海軍陸戰隊"
 marine_corps_goal_desc: "擴充兩棲作戰部隊將大幅提升我方進攻能力，並擴大可威懾的敵佔區範圍。"
 marine_corps_tech_bonus: "$marine_corps_goal_name$目標獎勵"
 airborne_corps_goal_name: "組建空降部隊"
 airborne_corps_goal_desc: "擴大空降部隊的規模將顯著提升我們的進攻靈活性，使我們有能力對敵方領土縱深實施更有效的打擊。"
 airborne_corps_tech_bonus: "$airborne_corps_goal_name$目標獎勵"
 mountaineer_corps_goal_name: "組建山地作戰部隊"
 mountaineer_corps_goal_desc: "擴充我們的山地部隊，將顯著提升我軍在複雜崎嶇地形中的作戰實力。"
 mountaineer_corps_tech_bonus: "$mountaineer_corps_goal_name$目標獎勵"
 submarine_force_goal_name: "擴大潛艇艦隊"
 submarine_force_goal_desc: "一支部署得當的潛艇部隊對於削弱敵方補給線至關重要。"
 submarine_force_tech_bonus: "$submarine_force_goal_name$目標獎勵"
 convoy_escort_force_goal_name: "護航跨洋商隊"
 convoy_escort_force_goal_desc: "為確保我們的補給線安全，必須配備足夠數量的護航艦艇。"
 convoy_escort_force_tech_bonus: "$convoy_escort_force_goal_name$目標獎勵"
 air_superiority_goal_name: "維持制空權"
 air_superiority_goal_desc: "制空權決定陸地與海洋的成敗。我們必須擁有足夠的戰鬥機飛行器以確保空中優勢。"
 air_superiority_tech_bonus: "$air_superiority_goal_name$目標獎勵"
 control_mexican_oil_goal_name: "控制墨西哥石油"
 control_mexican_oil_goal_desc: "確保墨西哥石油儲備將保障工業和軍事需求的充足燃料供應。"
 control_curacao_oil_goal_name: "控制庫拉索石油"
 control_curacao_oil_goal_desc: "庫拉索的煉油廠對加工委內瑞拉石油至關重要。掌控這些設施將使陣營獲得穩定的成品油供應。"
 control_venezuelan_oil_goal_name: "控制委內瑞拉石油"
 control_venezuelan_oil_goal_desc: "委內瑞拉龐大的石油儲備將為我們的陣營提供支持軍事活動所需的能源獲取渠道。"
 control_guyanan_bauxite_goal_name: "控制圭亞那鋁土礦"
 control_guyanan_bauxite_goal_desc: "控制圭亞那的鋁土礦儲量將擴大該聯盟的鋁產量，這對飛行器製造至關重要。"
 control_suriname_bauxite_goal_name: "控制蘇里南鋁土礦"
 control_suriname_bauxite_goal_desc: "掌控蘇里南豐富的鋁土礦藏將為我們陣營日益壯大的飛行器產業提供所需原材料。"
 control_lappland_metals_goal_name: "控制拉普蘭金屬"
 control_lappland_metals_goal_desc: "獲取拉普蘭的礦產資源將增強聯盟的鐵和鎢供應，維持我們的軍火製造業。"
 control_ploiesti_oil_fields_goal_name: "控制普洛耶什蒂油田"
 control_ploiesti_oil_fields_goal_desc: "作為歐洲唯一的油田，控制普洛耶什蒂油田對於確保陣營獲得軍事行動持續所需的燃料至關重要。"
 control_baku_oil_fields_goal_name: "控制巴庫油田"
 control_baku_oil_fields_goal_desc: "確保巴庫石油區的安全將獲得對軍事行動至關重要的豐富石油儲備。"
 control_iraqi_oil_goal_name: "控制伊拉克石油"
 control_iraqi_oil_goal_desc: "伊拉克的石油產能可能對滿足我軍燃料需求起到關鍵作用。"
 control_persian_oil_goal_name: "控制波斯石油"
 control_persian_oil_goal_desc: "控制波斯油田及其煉油能力將確保作戰所需的燃料持續供應。"
 control_chinese_metals_goal_name: "控制中國金屬"
 control_chinese_metals_goal_desc: "中國豐富的各類關鍵金屬資源可為陣營軍事工業基地提供所需物資。"
 control_malayan_riches_goal_name: "控制馬來亞財富"
 control_malayan_riches_goal_desc: "掌控馬來亞的鎢礦和橡膠資源將極大增強陣營的物質基礎，為製造業及軍事後勤保障提供關鍵原料。"
 control_indonesian_riches_goal_name: "控制印度尼西亞財富"
 control_indonesian_riches_goal_desc: "印度尼西亞豐富的自然資源，包括石油、橡膠和礦產，對於支撐我們的工業基礎以及確保聯盟的資源獨立具有不可估量的價值。"
 control_newfoundland_bases_goal_name: "控制紐芬蘭基地"
 control_newfoundland_bases_goal_desc: "在紐芬蘭建立基地將使我們能夠控制北大西洋的運輸船隊，並在關鍵航線上投送空中和海軍力量。"
 control_bermuda_goal_name: "控制百慕大"
 control_bermuda_goal_desc: "在百慕大建立基地將使我們能夠更有效地巡邏大西洋中部海域，並維持各大洲之間更安全的補給線。"
 control_bahamas_bases_goal_name: "控制巴哈馬基地"
 control_bahamas_bases_goal_desc: "在巴哈馬擁有基地將使我們能夠更有效地監控加勒比海航道，並保護通往北美和南美的海上通道。"
 control_panama_canal_goal_name: "控制巴拿馬運河"
 control_panama_canal_goal_desc: "控制巴拿馬運河對於實現艦隊在大西洋和太平洋之間的快速重新部署至關重要，能確保在兩大洋的戰略靈活性。"
 control_trinidad_goal_name: "控制特立尼達"
 control_trinidad_goal_desc: "特立尼達的關鍵地理位置使其對控制加勒比海地區的石油供應至關重要，並使其成為南美洲北海岸的一個戰略跳板。"
 control_azores_goal_name: "控制亞速爾"
 control_azores_goal_desc: "亞速爾群島的戰略位置能夠延伸至大西洋中部，彌補潛艇與反潛覆蓋範圍的缺口，併為運輸船隊提供持續的空中掩護。"
 control_iceland_goal_name: "控制冰島"
 control_iceland_goal_desc: "控制冰島的基地將有助於確保丹麥海峽的安全，並對北大西洋通道施加影響力。"
 control_faroe_islands_goal_name: "控制法羅群島"
 control_faroe_islands_goal_desc: "法羅群島地理位置戰略，能夠控制北方海運航線，併為駛向英國、斯堪的納維亞半島和北極地區的海軍行動提供支援。"
 control_narvik_goal_name: "控制納爾維克"
 control_narvik_goal_desc: "佔領納爾維克將能維持重要鐵礦石運輸通道的暢通，並控制北極補給路線。"
 control_danish_belts_goal_name: "控制丹麥貝爾特海峽"
 control_danish_belts_goal_desc: "在卡特加特海峽駐軍將使我們能夠獨家控制波羅的海與北海之間的海上通道。"
 control_brittany_bases_goal_name: "控制布列塔尼基地"
 control_brittany_bases_goal_desc: "布列塔尼海岸沿線的戰略基地將使潛艇和空中作戰能夠深入大西洋更廣闊區域，同時確保進入歐洲大陸的通道安全。"
 control_gibraltar_goal_name: "控制直布羅陀"
 control_gibraltar_goal_desc: "直布羅陀海峽的戰略基地將使我們能夠控制地中海與大西洋之間的海上交通。"
 control_malta_goal_name: "控制馬耳他"
 control_malta_goal_desc: "佔領馬耳他將使我們能夠切斷敵方補給線，並在整個地中海中部投射軍事力量。"
 control_crete_goal_name: "控制克里特"
 control_crete_goal_desc: "控制克里特島將能主宰東地中海地區，並便利於在愛琴海和北非的軍事行動。"
 control_cyprus_goal_name: "控制塞浦路斯"
 control_cyprus_goal_desc: "控制塞浦路斯將能夠支援東地中海的軍事行動，並確保往返中東的重要空中航線安全。"
 control_bosporus_goal_name: "控制博斯普魯斯海峽"
 control_bosporus_goal_desc: "奪取博斯普魯斯海峽將使我們能夠控制黑海與地中海之間的所有海軍通道。"
 control_dardanelles_goal_name: "控制達達尼爾海峽"
 control_dardanelles_goal_desc: "控制達達尼爾海峽將能夠支配來自黑海的艦隊和貿易流動。"
 control_suez_canal_goal_name: "控制蘇伊士運河"
 control_suez_canal_goal_desc: "掌控至關重要的蘇伊士運河將使我們獨家控制歐亞之間的主要交通命脈，確保部隊和資源能夠快速調配。"
 control_gulf_of_aden_bases_goal_name: "控制亞丁灣基地"
 control_gulf_of_aden_bases_goal_desc: "亞丁灣沿岸的戰略基地能夠保護紅海通道，並確保連接歐洲、非洲和亞洲的航運路線安全。"
 control_strait_of_hormuz_goal_name: "控制霍爾木茲海峽"
 control_strait_of_hormuz_goal_desc: "霍爾木茲海峽的戰略基地將使我們能夠控制對至關重要的波斯和伊拉克石油的獲取通道。"
 control_ceylon_goal_name: "控制錫蘭"
 control_ceylon_goal_desc: "控制錫蘭將能主宰印度洋，並保護中東與東南亞之間的重要海上通道。"
 control_singapore_goal_name: "控制新加坡"
 control_singapore_goal_desc: "宏偉且牢固的新加坡海軍基地扼守著馬六甲海峽，管控著印度洋與太平洋之間的航道往來。它應該歸我們所有。"
 control_manila_goal_name: "控制馬尼拉"
 control_manila_goal_desc: "掌控易守難攻的馬尼拉灣將使我們能夠向整個西太平洋投射力量，並確保通往東印度群島和南海的通道安全。"
 control_okinawa_goal_name: "控制沖繩"
 control_okinawa_goal_desc: "控制沖繩將能夠對日本本土發動行動，並在太平洋建立強大的防禦圈。"
 control_iwo_jima_goal_name: "控制硫磺島"
 control_iwo_jima_goal_desc: "佔領硫磺島將能夠為針對日本的遠程空中行動提供支持，並將我們的力量範圍擴展至中太平洋地區。"
 control_caroline_islands_goal_name: "控制加羅林群島"
 control_caroline_islands_goal_desc: "控制加羅林群島和特魯克環礁將使我們能夠在中太平洋持續開展海軍和空中作戰行動。"
 control_guadalcanal_goal_name: "控制瓜達爾卡納爾"
 control_guadalcanal_goal_desc: "奪取瓜達爾卡納爾島將使我們能夠掌控南太平洋的海軍行動以及往返澳大利亞的航線。"
 control_wake_island_goal_name: "控制威克島"
 control_wake_island_goal_desc: "控制威克島將能夠擴大對中太平洋航線的偵察和空中掩護範圍。"
 control_midway_island_goal_name: "控制中途島"
 control_midway_island_goal_desc: "控制中途島將確保中太平洋通道的安全，併為跨洋作戰提供關鍵基地。"
 control_hawaii_goal_name: "控制夏威夷"
 control_hawaii_goal_desc: "奪取珍珠港將能為太平洋行動提供錨點，協調整個大洋戰區的後勤補給，同時打開通往美國太平洋沿岸的通道。"
 control_attu_island_goal_name: "控制阿圖島"
 control_attu_island_goal_desc: "佔領阿圖島將得以控制北太平洋航道，並能夠沿阿留申群島向阿拉斯加及美洲太平洋沿岸展開軍事行動。"
 undo_versailles_goal_name: "為《凡爾賽條約》復仇"
 undo_versailles_goal_desc: "是時候糾正這份“強加條約”的荒謬性了。我們必將收復合法的領土！"
 strategic_bombing_campaign_goal_name: "持續戰略轟炸戰役"
 strategic_bombing_campaign_goal_desc: "大規模的戰略轟炸行動將系統性削弱敵人的工業產能，使我們能夠逐步消耗其軍隊力量。"
 liberate_territory_goal_name: "解放國土"
 liberate_territory_goal_desc: "敵人佔領了我們的領土。解放它應是我們的首要目標。"
 great_offensive_goal_name: "發動大規模攻勢"
 great_offensive_goal_desc: "發起一場奪取敵方領土的大規模攻勢，應是我們邁向戰爭最終勝利的第一步。"
