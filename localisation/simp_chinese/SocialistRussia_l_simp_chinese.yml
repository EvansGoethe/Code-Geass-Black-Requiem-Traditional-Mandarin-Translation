 SRU_central_asian_support:0 "Central Asian Support"
 SRU_central_asian_support_desc:0 "Our formal agreement for cooperation with Kazhakstan was to end when we left their land to fight for revolution. However over the years we came to an increased understanding with our hosts in Alma-Ata who have signaled a willingness to continue to work with us.\n\nThey are willing to ship us arms and supplies in return for favours. Though the anarchic backwater of the Chinese Sphere, Kazhakstan's limited recognition of us gives access to indirect trade with the Sphere's more prosperous members.\n"
