 POLITICS_LUKA_ZHUKOV_DESC:0 "盧卡·朱可夫並非普通的社會主義者；在成爲革命者之前，他是一位生活在中華聯邦的心理學家。在一次哈薩克斯坦之行中，盧卡加入了蘇聯共產黨（VKP），憑藉其卓越的人際交往能力，他迅速在黨內晉升。在蘇聯共產黨流亡哈薩克斯坦期間，他參與了該黨爲哈薩克斯坦政府效力的諸多臭名昭著的活動。哈薩克斯坦政府在蘇聯戰敗後收留了流亡的紅軍和蘇聯共產黨。他很快在黨內領導層中獲得了足夠的地位，得以與黨的精英領導人交往；不久之後，他組建了雅各賓集團，這是一個規模雖小但實力強大的團體，盧卡認爲這些人對革命的未來至關重要。一段時間後，隨着老一代領導層的消亡，更多關鍵的黨內職位落入盧卡及其爪牙的掌控；最終，他甚至控制了格魯烏（GRU）和契卡（Cheka）準軍事部隊，成爲僅次於創始人本人的黨內第二號人物。儘管盧卡的影響力巨大，但作爲革命繼承人的索尼婭，還是在父親的支持下贏得了2008年的黨內領導權選舉。盧卡只能默默等待混亂的到來，以便徹底瓦解索尼婭，並最終掌控革命。而混亂的時代，其實已經近在眼前了！"
 SRU_sonya_bunina_desc:0 "索尼婭·布尼娜，全聯盟共產黨主席，1986年11月7日出生，是俄羅斯共產主義運動的實際領導人。她思想激進、理想主義，繼承了其父、黨的創始人伊萬·卡圖寧的烏托邦思想。然而，她也深知第一次革命失敗的原因在於缺乏妥協和犯下的錯誤。無論未來的道路如何，索尼婭都決心實現她父親一直向她描繪的共產主義未來，帶領革命走向輝煌的黎明或最終的黃昏。"
