 SRU_Intro.1.t:0 "人民已作出選擇。"
 SRU_Intro.1.d:0 "在哈薩克斯坦那片荒涼而未馴服的草原上，遠離俄羅斯的中心地帶，一股被認爲早已消亡的歷史力量再度崛起。革命從灰燼中重生，再度降臨俄羅斯。\n\n當公社成員征服世界的嘗試失敗後，俄羅斯蘇維埃政權被歐洲反動勢力擊潰後，許多人認爲革命的窗口已然關閉，物質條件已然改變，使馬克思主義變得過時。但逃脫歐洲槍炮追剿的革命先鋒隊逃往亞洲荒野，靜待時機，潛心建設，伺機而動。如今，在大革命半個世紀之後，俄國的工人和人民再次吶喊，反對搖搖欲墜的國家；那些當年浴血奮戰、身心俱疲地離開革命的先輩們的後代，帶着革命的紅旗重返故土。\n\n如今，他們席捲西伯利亞，迎接他們的是揮舞着紅旗、爲更美好世界而奮鬥的人們的歡呼聲。在希望之中，也蘊含着對形勢嚴峻的理解。革命憑藉運氣和謀略挺過了第一次失敗，但蘇維埃的繼承者們深知，它不會再僥倖逃脫。在他們所有人的心中，都懷着一個堅定的決心：半個世紀過去了，人類要麼獲得解放，要麼革命的火種將永遠熄滅……"
 SRU_Intro.1.a:0 "我們一無所有，失去的僅有枷鎖。"
 SRU_Intro.2.t:0 "踏入瘋狂的深淵"
 SRU_Intro.2.d:0 "“我的同志們，自從我們的理想誕生以來，我們這些全心全意、忠誠地信仰這些理想的人，就一直被那些企圖從外部或內部威脅中消滅我們的人追殺到瀕臨滅絕的邊緣。在過去的五十年裏，我們爲正義和平等而進行的鬥爭，在這個被暴君和腐敗官員主宰的世界裏，經歷了起伏跌宕，但我們目前所走的道路，卻註定是毀滅和人民的悲痛之路。索尼婭和她的同夥正將我們引向毀滅的深淵。如果我們想要生存下去，奪回我們革命的發源地，我們就必須改變自己，才能在這個深受早已消亡的古老帝國意志所支配的世界中生存下去。你們許多人都知道，戰爭的陰雲籠罩着俄羅斯，暴風雨即將到來，而我們卻毫無準備應對它的後果。但是，不要害怕，因爲我來拯救你們，使你們免遭愚昧無知之徒的毒手。”他們正集結在城門外，一心想要洗劫並摧毀你們的家園，屠殺你們的家人。我和俄羅斯共產黨是你們的未來，我們是你們的救世主，我……是你們在這個被詛咒的世界裏生存的唯一希望。\n\n“現在，我的俄羅斯同胞們，選擇權在你們手中，我們是繼續在索尼婭的旗幟下走上毀滅之路，還是願意與我一起，爲我們摯愛的俄羅斯開啓一個自由、正義和安全的新時代？”"
 SRU_Intro.2.a:0 "“我的意志就是革命的意志。”"
 SRU_Intro.3.t:0 "敢於夢想"
 SRU_Intro.3.d:0 "俄羅斯人民！五十年來，爲了躲避資本和帝國主義的殘酷報復，我們的黨不得不藏匿於地下。五十年來，我的父親和他的同志們一直夢想着帶着革命的火炬凱旋而歸。我多麼希望他們還能親眼見證這一切……我也多麼希望我們能夠像一位騎着駿馬的紅衣騎士那樣，高舉共產主義的火焰，帶來變革。但是……這一切的功勞都歸於你們，西伯利亞和俄羅斯的人民。五十年來，你們在資本和歐洲帝國主義的暴政下苦苦掙扎，你們的未來被寡頭政治和盜賊統治的機器碾成齏粉。在這幾十年裏，你們不僅活了下來，而且還保留了最寶貴的東西……希望。對更美好世界的希望，對一個無階級社會的夢想，在那裏，我們不再受制於自身的暴政，而是爲全人類的共同事業而奮鬥。我並不否認，時局艱難，我們或許都被恐懼所籠罩，但請鼓起勇氣，因爲那顆跳動的心臟依然跳動着。人類的希望就在你們身後。你們一路走來，堅持到了最後，再加把勁，我們的夢想就能成真，這一切都歸功於你們的堅持。正因如此，我今天來到這裏，不是作爲領導者，而是作爲革命的僕人……\n\n在那些黑暗的日子裏，你從未讓星光熄滅……我代表全人類感謝你。"
 SRU_Intro.3.a:0 "“這是一場人民的革命。”"
 SRU_Intro.4.t:0 "蘇維埃正義"
 SRU_Intro.4.d:0 "在新西伯利亞郊外，兩名契卡隊員站在他們最近一次突襲後的廢墟之上。羅斯米雷斯西伯利亞分部負責人瓦列裏·科斯科夫那座裝飾浮誇的別墅，此刻已成一片狼藉——碎玻璃四散，硝煙與塵埃在血腥現場瀰漫，那是負責安保人員進行最後抵抗的地方。科斯科夫本人，這位在東方臭名昭著的人物，幾乎呆立在地，喃喃自語，一名契卡士兵正在爲他處理腿上的彈片傷口。\n\n第一位契卡軍官羅曼環顧四周，轉向他的同事說：“12名僱傭兵死亡，4人受傷，5人被俘，目標已達。幹得不錯，對吧，根納季？”\n\n但根納季並不在他身邊，而是神色擔憂地望着窗外。羅曼感到困惑，直到他走過去，才明白同事爲何如此擔憂。在別墅大門外，數百人聚集在一起，在契卡安全部隊的勉強維持下，他們正高聲吶喊。抗議的口號含糊不清，但兩人還是能看出人羣的意圖：在人羣之下，有人在無聲地高喊着“殺了科斯科夫！”。“我們人手不夠，擋不住他們，如果他們想要他的腦袋，我們可能只能答應了。”根納季無奈地望着人羣說道。“什麼！”羅曼喊道，“庫利科娃主席命令我們把他帶回來，她會……”“可能根本不在乎，”根納季打斷他，“這很可能是她一手策劃的，這完全是雅各賓派慣用的血腥仇恨狂歡，她很可能泄露了行動情報，所以他們才都同時出現。”正當羅曼準備回答時，一名中士把一部手機塞到他手裏，這是來自契卡對外情報部門的安全電話。\n\n一個冷靜沉着的男聲在他耳邊響起：“你的處境很艱難，所以我就不多說了。我已經派了一架直升機來撤離科斯科夫。我們組織裏有不少人支持暴民統治，但我絕不會容忍我們的權威被削弱。我給你留了一條出路，接受與否，全憑你自己。記住，如果民衆嚐到了把他們憎恨的人吊死在路燈柱上的滋味，說不定哪天，你也會被懸在風中……”兩人雖不介意看這位寡頭被民衆吊死，但電話那頭最後的話卻讓他們猶豫不決。最後，根納季轉向羅曼問道：“那麼，你的決定是什麼，隊長？”"
 SRU_Intro.4.a:0 "“讓外國情報部門把他帶走，千萬別讓主席知道……”"
 SRU_Intro.4.b:0 "“讓人民得到他們需要的復仇，把他扔到大門去……”"
 SRU_Intro.5.t:0 "說服頑固分子"
 SRU_Intro.5.d:0 "The Party Congress’s move to Novosibirsk was a sudden affair that upended the entire administrative structure of the VKP. Despite the wartime situation and abrupt move, 5 Congressmen sat around a table in a bar’s smokey back room as if they had been regulars for years. “I’m telling you Yevgenny! Kulakov is just a functionary; he knows nothing of the spirit of Communism!.” A bearded official a few drinks too far belched at his colleague. “Fedor you ass,” the bespectacled man replied, “we need a rational figure like that to keep Sonya’s idealism in check. Kulakov is a perfect continuation of Comrade Yakov’s approach.”\n\nFrom the side of the table a gaunt man put down his drink and interjected “We can’t have Sonya run around with her allies unchecked. We are not the blood Tsars, power comes from talent not patronage or birth and Luka Zhukov certainly has talent.” As the other two laid into him a fourth man lay slumped on the table moaning to himself “It's useless either way, either choice won’t get on with Sonya for ideological reasons. Luka will just try to usurp her and Kulakov’s views will become irreconcilable. Either way we are fucked.”\n\nThe back and forth between the four Congressmen continued for hours and reached no greater conclusion, despite the shouting they stuck together thick and thin, voting in union on agreement for years and having no intention of stopping now. The impasse looked impossible until the fifth man at the table, the oldest of them A man who could still remember Maksim Bunin, coughed. Each man roused from their drunken stupor to hear his words. The old man was the most respected, his word would settle the matter."
 SRU_Intro.5.a:0 "'Sonya and Kulakov may strike the balance between ideals and pragmatism we need...'"
 SRU_Intro.5.b:0 "“給盧卡一次機會，革命者不可能不弄髒雙手...”"
 SRU_Intro.6.t:0 "All Votes Counted"
 SRU_Intro.6.d:0 "Sonya Bunina was nominally the most powerful figure in the Communist Party as its sitting chairperson. But as the procedures of democratic centralism broke down to a shouting match between the Jacobins and their opponents, with a few members having to be removed from the hall, she felt powerless in this ultimate moment that would decide the future of the party.\n\nShe had done all she could, she had lobbied, campaigned and pulled out all the stops to secure Kulakov’s ascension to the premiership. But would it be enough? To the side of the hall she could see him, Luka Zhukov the Demon of the Steppe… If she could ever have implored her father to do anything differently it would have been to never let that creep anywhere near the party.\n\nRight now, the monster who haunts the nightmares of many across central Asia looked rather bored, sitting in the corner of the hall impatiently looking at a clock while his cronies scurried around slavishly executing his will.\n\nNot wanting to dwell on him any longer, Sonya looked over to Kulakov. He was always the image of collected calm, the human embodiment of the balanced, bland and technocratic brand of communism he advocated, the gravity of the situation hadn’t changed him.\n\nSonya was wrenched from her thoughts as the party secretary slammed down his gavel and delivered the party's verdict.\n\n“By the principles of democratic centralism the ‘All-Union Communist Party’ elects Luka Zhukov to serve as Premier of the new Siberian Socialist Republic…”\n\nSonya’s heart sank as the words “Luka Zhukov” and “Premier” rang through her head, she didn’t really notice as Luka stepped up to the podium, accompanied by roars of approval and shouts of hatred, and began his opening remarks..."
 SRU_Intro.6.a:0 "'Thank you comrades, your decision today is monumental you will feel its weight, with its change...'"
 SRU_Intro.7.t:0 "All Votes Counted"
 SRU_Intro.7.d:0 "Sonya Bunina was nominally the most powerful figure in the Communist Party as its sitting chairperson. But as the procedures of democratic centralism broke down to a shouting match between the Jacobins and their opponents, with a few members having to be removed from the hall, she felt powerless in this ultimate moment that would decide the future of the party.\n\nShe had done all she could, she had lobbied, campaigned and pulled out all the stops to secure Kulakov’s ascension to the premiership. But would it be enough? To the side of the hall she could see him, Luka Zhukov the Demon of the Steppe… If she could ever have implored her father to do anything differently it would have been to never let that creep anywhere near the party.\n\nRight now, the monster who haunts the nightmares of many across central Asia looked rather bored, sitting in the corner of the hall impatiently looking at a clock while his cronies scurried around slavishly executing his will.\n\nNot wanting to dwell on him any longer, Sonya looked over to Kulakov. He was always the image of collected calm, the human embodiment of the balanced, reserved and technocratic brand of communism he advocated, the gravity of the situation hadn’t changed him.\n\nSonya was wrenched from her thoughts as the party secretary slammed down his gavel and delivered the party's verdict.\n\n“By the principles of democratic centralism the ‘All-Union Communist Party’ elects Mikhail Kulakov to serve as Premier of the new Siberian Socialist Republic…”\n\nSonya’s heart lifted as her thoughts were drowned out by applause of the Idealists and Revisionists as Kulakov made his way to the podium, giving Sonya a small nod of appreciation as he opened his speech."
 SRU_Intro.7.a:0 "'Thank you comrades, I am honoured to be able to chart the course of our revolution.'"
 SRU_revolution_once_more:0 "Revolution Once More"
 SRU_revolution_once_more_desc:0 "After nearly half a century Communism has returned to Russia. The rotting husk of the federation has caved away and from its dying death rattle grows the every lounder cry of change. The party has returned from Kazakhstan to throw down the gauntlet of revolution."
 SRU_rallying_the_workers_protests:0 "Rally the Workers"
 SRU_rallying_the_workers_protests_desc:0 "The proletariat of Siberia has long suffered under the yoke of oligarchic capital. When the federation started to die they moved to seize the means of production. Though not outwardly communist, we should easily be able to mobilize these groups given how close our ideals are."
 SRU_let_luke_fuel_their_hate:0 "Let Luka Fuel Their Hate"
 SRU_let_luke_fuel_their_hate_desc:0 "How long have the people been slaves to capitalism? How many have seen their families beat down and chewed out by the degenerate hegemony of world capital. Hope has long died among the desperate masses but hate, great hatred, still remains. Comrade Zhukov knows how to give these people the revenge they desire on the world."
 SRU_have_sonya_promise_the_future:0 "Have Sonya Promise the Future"
 SRU_have_sonya_promise_the_future_desc:0 "For hundreds of years we have laboured under capital and imperialism. Humanity has experienced the blackest depths of hopelessness and despair, but we are still going. The fight for a better world doesn’t end no matter how many times brave revolutionaries are cut down. A world without oppression, a world without classes, a world without empires, That is the world Sonya promises. Perhaps it's time for a bit of hope…"
 SRU_dealing_with_the_oligarchs:0 "Deal With the Oligarchs"
 SRU_dealing_with_the_oligarchs_desc:0 "The Oligarchs and their goons are despised throughout Russia. Vile plutocrats, they gleefully profited from the economic pillaging of Russia and luxuriated in their plunder while everyone else suffered. A reckoning with the remaining scumbags is long overdue."
 SRU_convincing_party_holdouts:0 "Convince Party Holdouts"
 SRU_convincing_party_holdouts_desc:0 "The competition for the position of State Premier has started to heat up. Most party members are already supporting either Mikhail Kulakov for the Young Soviet-Revisionist alliance or Luka Zhukov with the Jacobins. However, a few holdouts have not yet picked a side. Their decision could swing the vote."
 SRU_returning_session_of_the_politburo:0 "Returning Session of the Politburo"
 SRU_returning_session_of_the_politburo_desc:0 "The party will be holding its first session on Russian soil since 1964. In this great homecoming of Communism an important decision will be made, who is to be elected as de-facto head of government? Sonya’s backed choice Kulakov is facing off against Zhukov for the position. The political conflict between the Young Soviets-Revisionist alliance and the Jacobins has raged for years, now the conflict faces its showdown."
 SRU_to_grasp_the_future:0 "To Grasp the Future"
 SRU_to_grasp_the_future_desc:0 "The Jacobin opportunists have been repelled for now, the true heirs of the Communist Party have won. Chairwoman Sonya Bunina and newly elected Premier Mikhail Kulakov shall lead the united front of idealists and pragmatists to build a new future for Russia and mankind."
 SRU_the_peoples_hearts:0 "The Peoples Hearts"
 SRU_the_peoples_hearts_desc:0 "For our homeland and families, as freemen not slaves, for our survival…"
 SRU_the_soldiers_blood:0 "The Soldiers Blood"
 SRU_the_soldiers_blood_desc:0 "For those who fight against the enemies of mankind, who lay down their lives for a better world…"
 SRU_the_workers_toil:0 "The Workers Toil"
 SRU_the_workers_toil_desc:0 "For the labour of humanity to be free, not chained by individual greed…"
 SRU_march_of_the_revolution:0 "March of the Revolution"
 SRU_march_of_the_revolution_desc:0 "For the World Revolution and All Mankind…\n\nThe Revolution shall march onwards, until it triumphs or lies in a martyrs grave."
 SRU_Politburo_War_Powers:0 "Politburo War Powers"
 SRU_Politburo_War_Powers_desc:0 "The situation in Russia is volatile and could snuff out the flame of revolution if we are not careful. For these reasons we shall give emergency powers of government to the Politburo. While many accuse this of overstepping into Bonapartism or an overstep into the rule of a party state, it is needed to steer the revolution through the rocky waters of the civil war intact."
 SRU_Establishing_The_Peoples_Congress:0 "Establish the Peoples Congress"
 SRU_Establishing_The_Peoples_Congress_desc:0 "While the revolution is young and we are in a transitional stage towards socialism and communism, we must make compromises. One such compromise is the people's congress, a popular elected chamber to vote on legislative motions. This is the pillar of the “People's Republic” concept, as outlined by Yakov Bunin. Serving as a transitory stage to a classless and stateless society down the road to Communism."
 SRU_Minority_Seat_Elections:0 "Minority Seat Elections"
 SRU_Minority_Seat_Elections_desc:0 "We cannot risk having our legislator paralysed by bourgeois party politics. While we shall give the opposition representation it must be proportionally limited. Only a third of seats will be up for open election to non VKP candidates. This means that whatever happens we will hold a majority in the people congress. It may be undemocratic but this is wartime and we can’t be taken over by grafters and opportunists."
 SRU_Full_Congress_Elections:0 "Full Congress Elections"
 SRU_Full_Congress_Elections_desc:0 "To stifle the Congress would be to stifle the people. While it may be a concessionary measure, we must use it as a launchpad to propel our parties' work. If we kneecap our opposition rather than beat them fair and square, it hardly sends a positive message to the people. And anyway, the opposition is barely organized so it is unlikely we will not achieve a majority. "
 SRU_Mobilize_The_State:0 "Mobilize the State"
 SRU_Mobilize_The_State_desc:0 "We do not have the luxury of creating our state in peacetime. As we build a Socialist homeland we are also in a mortal struggle against the forces of imperialist-reaction for our very survival. To this end we must unify the will of the nation and people for this great battle for our survival."
 SRU_The_Party_Or_The_State:0 "The Party or the State?"
 SRU_The_Party_Or_The_State_desc:0 "The constitutional structure of the new People's Republic is laid out. But a very unclear line exists between the party and the state. Increasing clashes between state and party bureaucracy has become problematic. We must clearly define which branch of our power has administrative supremacy."
 SRU_Educational_Doctrine:0 "Educational Doctrine"
 SRU_Educational_Doctrine_desc:0 "The unification of Siberia’s many disparate private and regionally run schools into a single cohesive state education service has left us with a big choice. What exactly are we going to teach? Ideologues, Propagandists, educational professionals and teachers have all been getting into an increasingly nasty fight over the curriculum. We need to make a choice if we want a unified education system."
 SRU_Opening_The_Ministry_Of_Welfare:0 "Open the Ministry of Welfare"
 SRU_Opening_The_Ministry_Of_Welfare_desc:0 "There are many tired and desperate people who need a safety net, especially in times of war. The Old, the orphaned, the disabled, the homeless and the otherwise vulnerable are often the first to fall victim to strife and conflict. We shall not repeat our past mistakes and let those who need our help most die whilst we focus on war. We shall establish the Ministry of Welfare to make sure no one goes hungry, sick or without a roof over their head."
 SRU_The_Power_Of_The_Media:0 "The Power of the Media"
 SRU_The_Power_Of_The_Media_desc:0 "Upon taking control of Siberia, the press has been operating in a grey area. We have built a strong state network for news from Pravda taking over seized oligarch media assets, but alot of independent media outlets (both supporting and critical) still operate. Opinion in the Party is divided on if we should let criticism run free or if we should control the press to prevent counter-revolutionary voices prevailing."
 SRU_The_Foreigners_Loyalties:0 "The Foreigners Loyalties"
 SRU_The_Foreigners_Loyalties_desc:0 "A large number of EU expats and citizens still live in Siberia. They are mostly technical professionals hired by Russian Companies to work high-qualification jobs in mining, manufacturing and design technology. Many have families here and are effectively permanent residents. Some individuals within the Party raise the justifiable concern that some may be staying as spies for the EU who have no loyalty to the revolution. Others argue that they are useful professionals. Either way we need to settle the issue."
 SRU_Opening_The_Ministry_Of_Information:0 "Open the Ministry of Information"
 SRU_Opening_The_Ministry_Of_Information_desc:0 "The news, media and information itself has become a battleground in the modern age. Regardless of if the press is to be controlled or protected, we need an organisation to handle the information age. The new Ministry of Information will oversee: Communications infrastructure, internet regulation, press standards, social media regulation and also oversee state media holdings."
 SRU_Removing_The_Jacobin_Chekists:0 "Remove Jacobin Chekists"
 SRU_Removing_The_Jacobin_Chekists_desc:0 "The Cheka has an infamous legacy in Russia. Founded after the 1961 Revolution it hunted the enemies of the revolution with brutal dedication and efficiency. In exile, the secret police would eventually become a more rounded party intelligence agency, learning much from working in central Asia. However, in recent years the organisation has been increasingly dominated by Jacobins who make the old Chekists of the 60s look tame. For the sake of our stability these brutes must be removed, so the vanguard should not try overthrowing us…"
 SRU_Chairwoman_Leonova:0 "Chairwoman Leonova"
 SRU_Chairwoman_Leonova_desc:0 "Tatiyana Leonova is an old friend of Sonya Bunina, having grown up in the same expat circle. She is also currently the Cheka’s head of close protection branch, responsible for protecting senior party officials. She is a diligent and tough operator who has held out a faction of Young Soviets in the Jacobin dominated Cheka. Out of everyone, she is the most we can trust to make a loyal vanguard. A fine replacement to take Kulikova’s position as head of our Secret Police."
 SRU_Chairman_Ivanov:0 "Chairman Ivanov"
 SRU_Chairman_Ivanov_desc:0 "Mr Ivanov is something of a mystery within our ranks. If we ever knew who Mr Ivanov was, we certainly don’t know as he effectively erased his own records when he became head of the foreign intelligence branch of the Cheka. His work speaks for itself, he basically rebuilt our networks in Russia after the DSU crisis and is perhaps the most able spymaster in the organisation's history. We don’t know who he is loyal to, but it certainly isn’t the Jacobins given how many times they tried to remove him. The Cheka will certainly be in capable hands with this dark savant."
 SRU_Founding_The_MGB:0 "Founding the MGB"
 SRU_Founding_The_MGB_desc:0 "The Cheka, though always our proud vanguard, has a rather bad reputation left over from the “Red Terror”. It is also still structurally skewed towards its usage as a secret police organisation. In the modern landscape, we need a unified organisation able to handle foreign and domestic intelligence as well as security matters. The Ministry of State Security (MGB) shall be the new umbrella for the previous responsibilities of the Cheka. As well as new duties such as border security, internal troops, information warfare and cybersecurity."
 SRU_Groundwork_Of_The_Revolution:0 "Groundwork of the Revolution"
 SRU_Groundwork_Of_The_Revolution_desc:0 "We have created a stable groundwork for our revolution going forward. We have avoided the mistakes of Maksim Katuninand not consumed ourselves in a rushed class war in the middle of a literal war. By combining the historical lessons of Maksim and Yakov Bunin, Comrade Sonya and the Party has built a state capable of safeguarding the revolution without losing its fervour. On this rock, let us firmly raise the red flag and keep it flying forever more!"
 Siberian_Economic_Matters:0 "Siberian Economic Matters"
 Siberian_Economic_Matters_desc:0 "The punitive seizure of Oligarch assets in our territories have given us direct control of large amounts of Capital, industry and resources. The newly established economic ministries have debated exactly how to advocate these assets towards our industrial strategy. Our most immediate concern is the mobilization of the economy to a war footing to push out the reactionary invaders from our revolutionary homeland. Outside of that, a divergence has emerged in our long term industrial strategy…"
 SRU_Expand_The_Tomsk_University:0 "Expand the Tomsk University"
 SRU_Expand_The_Tomsk_University_desc:0 "Tomsk University was never the largest or most prestigious university, but it has been a respected underdog for decades. Unlike Moscow or Saint Petersburg, which mostly pushed out arrogant Political Science students into the plutocratic KDPR. Tomsk University also had a secret, its Chancellor had been sending many communist graduates to us. Meaning we were able to get a fresh intake of committed party members of higher education to replace the dying old guard. For its loyal service, we shall expand Tomsk University to be a center of socialist education and beacon to future communists."
 SRU_Opening_Public_Hospitals:0 "Open Public Hospitals"
 SRU_Opening_Public_Hospitals_desc:0 "Healthcare in Siberia has been in a shambolic state for years. State healthcare funding only maintained a few decaying and overcrowded hospitals while the wealthy would fly west for treatment. The situation was only made worse by thousands of miners with horrific injuries or chronic illnesses. It is a moral and practical imperative that we prioritize the opening of state hospitals and clinics to fix healthcare in the region."
 SRU_Develop_Siberian_Roads:0 "Develop Siberian Roads"
 SRU_Develop_Siberian_Roads_desc:0 "Siberia has a fine network of railways and roadways that exclusively serve the region's mining industry to funnel minerals west to factories in the Urals. This means that public infrastructure has been neglected and left in a decaying state. To remedy this for the sake of the people and our own logistics, we shall begin to renovate regional and rural roads so transport across Siberia is more efficient and easy."
 Two_Year_Industrialization_Plan:0 "Two Year Industrialization Plan"
 Two_Year_Industrialization_Plan_desc:0 "The Heavy Industry and Construction Ministries have proposed a program of rapid industrialization. This plan (enthusiastically supported by the Young Soviets) would see the rapid development of heavy and military industry in Siberia. Detractors of the scheme complain that it would see a neglect of services and light industry which could harm us in the long run. However, the benefits and necessity of rapid arms and industrial production outweighs those concerns."
 SRU_Buy_Kazakh_Construction_Vehicles:0 "Buy Kazakh Construction Vehicles"
 SRU_Buy_Kazakh_Construction_Vehicles_desc:0 "To meet our industrialization targets we need more construction machinery to build infrastructure and factories. Fortunately our friends in Kazakhstan are willing to sell us second-hand Chinese construction machinery for large scale building works."
 SRU_Re_Purpose_Extraction_Machinery:0 "Repurpose Extraction Machinery"
 SRU_Re_Purpose_Extraction_Machinery_desc:0 "Most of the industrial machinery in Siberia was left by the fleeing Oligarchs. While these diggers and drilling machines are very useful for digging through rock and stone, they are less good at actually constructing a factory or railway. To balance or inventory we shall convert excess mining vehicles into machinery useful for constructing industry and infrastructure."
 SRU_Rapid_Industrialization:0 "Rapid Industrialization"
 SRU_Rapid_Industrialization_desc:0 "Now we have the capacity to build and expand, we are on track to pursue our targets. Without worrying about Capital or Shareholders or Profit and Loss we can commit to pushing Siberia’s economy to the frontiers of prosperity it can reach. In 2 years we shall realize 100 years worth of development lost to imperial feudalism and robber baron capitalism."
 SRU_Omsk_Arms_Complex:0 "Omsk Arms Complex"
 SRU_Omsk_Arms_Complex_desc:0 "Our small arms production has been heavily disorganized and decentralized, with many individual workshops making guns of wildly varying quality. To fix this we shall open the Omsk Arms Complex to meet the needs of small arms production. The factory shall employ thousands and have the capacity to mass produce small arms and equipment for our army. It shall also have an autonomous design bureau to develop new armaments."
 SRU_Kemerovo_Tank_Factory:0 "Kemerovo Tank Factory"
 SRU_Kemerovo_Tank_Factory_desc:0 "A tractor factory in Kemerovo has been marked out for conversion to a key industrial site for armoured vehicles. The factory will allow the streamlined and standardized production of anything from armored cars through to main battle tanks. It shall also accommodate research and design teams to begin to develop our own domestic armour or improve foreign models."
 SRU_Krasnoyarsk_Machinery_Plant:0 "Krasnoyarsk Machinery Plant"
 SRU_Krasnoyarsk_Machinery_Plant_desc:0 "Krasnoyark’s location at a key railway link in our territory makes it a prime location for centralized industrial machinery production. The new factory shall greatly increase our ability to make engineering equipment and industrial vehicles. It shall also provide employment for thousands of workers and engineers, revitalizing the region."
 SRU_Tomsk_Electronics_Bureau:0 "Tomsk Electronics Bureau"
 SRU_Tomsk_Electronics_Bureau_desc:0 "Any modern economy requires computers and electronics to function in the 21st century. To keep up with advancements we must foster a domestic computer industry to supply industrial, scientific, military and civilian needs. The Tomsk Electronic Bureau shall spark the lights of a golden age of Russian technology. The Bureau will employ hundreds of our brightest minds to push the boundaries of the computer age."
 SRU_Growing_Manufacturing_Economy:0 "Grow Manufacturing Economy"
 SRU_Growing_Manufacturing_Economy_desc:0 "We are steaming ahead into industrialization. The skylines of our cities are lit with industry that surpasses that of the Urals. If we maintain our pace of growth we are on track for surpassing 100 years of economic stagnation, from there who knows! At this rate our industrial centers shall stand aside the Ruhr, The Great Lakes and even Pearl River industrial heartlands. The trade and finance ministries may grumble that this growth is mostly the realization of untapped potential and isn’t sustainable in the long run, but they are just bitter we didn’t go with their plan. "
 SRU_National_Trade_Plan:0 "National Trade Plan"
 SRU_National_Trade_Plan_desc:0 "The Trade and Finance Ministries have put forward an alternative plan to simple industrialization. They instead wish to use our connections in Kazakhstan to export our mineral and energy surplus in return for goods and capital. This will generate significant revenue that we can invest in developing our domestic industry, While importing weapons to supply our army in the short term. The Heavy Industry and Construction Ministries argue our plans are too slow and lead to foreign dependency, but at the end of the day we must think long term."
 SRU_Securing_A_Khazak_Route:0 "Securing a Khazak Route"
 SRU_Securing_A_Khazak_Route_desc:0 "Trade with Asia depends on a secure route through Kazakhstan. Unfortunately the Kazakh border is infested with bandits and warlords who make commerce impossible. Fortunately, our soldiers are experienced in dealing with steppe bandits and have routed them many times before. To earn favour with Alma-Ata and secure a route, we shall send a military expedition to secure key trade arteries in Kazakhstan."
 SRU_State_Funded_Prospecting:0 "State Funded Prospecting"
 SRU_State_Funded_Prospecting_desc:0 "Exploration and surveying Northern Siberia for minerals is a dangerous job, often subcontracted by the corporations. It is a deadly trade that no sane man would do for free. If we want to restart prospecting we need to start funding these pioneers again and reward them fairly for their important work. With them cooperating, we can expect to start expanding extraction operations soon."
 SRU_Silk_Road_To_Asia:0 "Silk Road to Asia"
 SRU_Silk_Road_To_Asia_desc:0 "The stabilisation of routes through Kazakhstan has opened up a whole new exciting route of commerce across Eurasia. Many companies and governments in the Chinese Sphere have disregarded ideological concerns in the name of trade and begun to deal with us more openly. We have created a new silk road in central Asia and we stand as its guardian and benefactor. "
 SRU_Export_Surplus_Oil_And_Gas:0 "Export Surplus Oil and Gas"
 SRU_Export_Surplus_Oil_And_Gas_desc:0 "Secret talks with the Chinese Trade Ministry have concluded positively and the government has signaled its willingness to buy our export oil and gas. We have agreed to very generous prices in return for China looking the other way on our deals with Chinese conglomerates, especially in weapons."
 SRU_Contracts_With_Chinese_Factories:0 "Contracts With Chinese Factories"
 SRU_Contracts_With_Chinese_Factories_desc:0 "Many Chinese Conglomerates have signaled their willingness to subcontract certain areas of manufacturing to us to circumvent their byzantine tax system. If the corporations want to outsource to the revolution that opposes their core values, more power to them, and more resources for us."
 SRU_Rare_Earth_Resource_Exports:0 "Rare Earth Resource Exports"
 SRU_Rare_Earth_Resource_Exports_desc:0 "Siberia has a significant amount of ‘Rare Earth Resources’ that are in high demand among the tech and arms industry. While not as demanded as Sakuradite, these minerals are still highly valuable and many conglomerates in Asia struggle to obtain them. Supplying the Chinese Sphere with these vital strategic resources will certainly increase the favours they owe us."
 SRU_Import_Advanced_Industrial_Tools:0 "Import Advanced Industrial Tools"
 SRU_Import_Advanced_Industrial_Tools_desc:0 "Siberia has a significant amount of ‘Rare Earth Resources’ that are in high demand among the tech and arms industry. While not as demanded as Sakuradite, these minerals are still highly valuable and many conglomerates in Asia struggle to obtain them. Supplying the Chinese Sphere with these vital strategic resources will certainly increase the favours they owe us."
 SRU_Growing_Trade_Economy:0 "Resource Export Economy"
 SRU_Growing_Trade_Economy_desc:0 "Our trade with Asia has not only secured us weapons and capital in the short-term, it has also laid the groundworks for a long term economic strategy built on exports and positive relations with Asia. This has given us access to the resources and technologies of the Chinese Sphere, allowing us to develop our economy more efficiently than if we relied on autarky. The Heavy Industry and Construction Ministries may denounce us as betraying the principles of industrial self reliance but at the end of the day compromises must be made if the revolution is to survive."
 SRU_the_long_road_to_communism:0 "The Long Road to Communism"
 SRU_the_long_road_to_communism_desc:0 "Many may say we have betrayed the foundational principles of Marxism. That we have sacrificed worker led production and surrendered to the immediate necessity of wartime. But Communism is as much a road as a destination. It is a grand historical project that we have laboured for over years with many twists and turns. We have a long way to reach our Utopia, but for the first time we can see it start to take shape."
 SRU_Failures_Of_The_Great_Peoples_War:0 "Failures of the Great Peoples War"
 SRU_Failures_Of_The_Great_Peoples_War_desc:0 "The failure of the 1960s war between the Soviet state and Europia has been attributed to many factors. While it would be easy to blame the overwhelming power of Capital against our infant revolution, we must self critique and move on. We shall go into this civil war having learned from our past mistakes, not overcome and not repeat a doomed cycle."
 SRU_were_not_in_kazhakstan_anymore:0 "We're not in Kazhakstan Anymore"
 SRU_were_not_in_kazhakstan_anymore_desc:0 "It goes without saying but Siberia is cold, like REALLY COLD. Kazakhstan has its cold times but nothing like this. Our veterans and officers are being outpaced in snow warfare by militias from the far-east. To rectify this situation we must rapidly adapt to the terrain of battle."
 SRU_attach_native_guide_units:0 "Attach Native Guide Units"
 SRU_attach_native_guide_units_desc:0 "The Yakuts, the Buryats and the Tuvans are experienced in the local terrain, often having worked as guides for the mining companies. In return for autonomy and representation (something already on our to-do list) they are willing to assist our army in adapting to Siberia’s hostile climate. We shall form integrated guide units immediately."
 SRU_masters_of_all_terrain:0 "Masters of all Terrain"
 SRU_masters_of_all_terrain_desc:0 "Our soldiers and officers are now fully comfortable with combat in near-arctic conditions. Combining this with our past experience we now stand as an adaptable force capable of handling near any terrain. From steppe to snow, the Red Army stands without parallel! "
 SRU_The_Partisans_Ideas:0 "The Partisan's Ideas"
 SRU_The_Partisans_Ideas_desc:0 "Vasily Durov and the Partisan contingent of the Military Council advocate codified decentralization of our forces for asymmetric warfare. His plans outline a focus on unit autonomy, flexible supply lines to accommodate light mobile units to engage enemy units on their terms and disengage before larger forces counter attack."
 SRU_Rocket_Propelled_Grenades:0 "Rocket Propelled Grenades"
 SRU_Rocket_Propelled_Grenades_desc:0 "The increased amount of armour being brought in by the Far-East’s backers is proving difficult to handle for our infantry units. We shall begin manufacturing and improving upon Federation designed man-held anti-tank rockets to give small infantry units the firepower to engage armoured units."
 SRU_Ambush_Strategies:0 "Ambush Strategies"
 SRU_Ambush_Strategies_desc:0 "Engaging a superior force on equal footing is a foolish thing to do, so a wise officer will simply not do that. If we are to win this civil war every engagement must be one of our own choosing and where we hold all the cards. Fortunately this is the area of warfare the Partisan Officers excel at."
 SRU_Fast_Armoured_Cars:0 "Fast Armoured Cars"
 SRU_Fast_Armoured_Cars_desc:0 "Modernity has rendered the romantic idea of the revolutionary infantryman carrying out guerilla attacks rather dated. It's hard to out-ride an attack helicopter on horseback, even for the bravest of steppe horsemen. We shall develop fast and light armoured cars to carry out raiding attacks off-road and on with enough armament to do damage and enough speed to evade reinforcements."
 SRU_Strike_And_Disperse_Doctrine:0 "Strike Fast and Disperse Doctrine"
 SRU_Strike_And_Disperse_Doctrine_desc:0 "With our new tools we shall refine our process of asymmetrical warfare into our core strategy. “Strike and Disperse” is our game plan for victory. If we can’t beat the enemy in open battle, we buy time while wreaking havoc on their weak but vital link units. While frontline combat is unavoidable in our context, we can at the least cripple the enemy with surgical skirmishes before a full engagement."
 SRU_special_purpose_units:0 "Special Purpose Units"
 SRU_special_purpose_units_desc:0 "Durov has outlined his plans for several Special Purpose Unit regiments (Spetsnaz) of elite infantry units recruited from our most hardened veterans of the Kazakhstan campaigns. They shall be trained for combat in rough terrain and urban settlements, with a strong focus on psychological warfare, sabotage and assassination. This force shall be the very point of our blade when fighting the enemy."
 SRU_A_New_Type_Of_Warfare:0 "A New Type of Warfare"
 SRU_A_New_Type_Of_Warfare_desc:0 "We are spearheading a new modernized form of asymmetrical warfare, a fitting strategy for a revolutionary army. We are surrounded by Imperialist superpowers who seek to crush our historic movement. If we fight then on equal terms by their rules we shall be cast to the dustbin of history. "
 SRU_The_Military_Councils_Plan:0 "The Military Council's Plan"
 SRU_The_Military_Councils_Plan_desc:0 "Dimitry Rostoviev is a veteran of the Great War and the only officer to be granted the honour of Marshal. A young tank commander back in the 1960s, his doctrine is based on a refined version of earlier doctrine of deep battle and armoured warfare. Rostoviev opposes the decentralization of the partisan clique and wants to centralize and organize our forces into a united Red Army."
 SRU_Emergency_Truck_Procurment:0 "Emergency Truck Procurement"
 SRU_Emergency_Truck_Procurment_desc:0 "To create a modern army we need to move towards mass motorization and mechanization. Unfortunately we are in a dire situation and also need trucks for basic logistics requirements in Siberia. To remedy this we will seize private trucks for usage in military logistics."
 SRU_The_Power_of_Rocket_Artillery:0 "The Power of Rocket Artillery"
 SRU_The_Power_of_Rocket_Artillery_desc:0 "The sound of our Katyusha rockets still ring in the nightmares of the few surviving Great War veterans in europe. Rocket artillery proved terrifyingly effective, and with 50 years of advancements in rocketry and munitions has only become more potent. Strapping rocket launchers to military trucks is the first step towards rebuilding or orchestra of destruction."
 SRU_Mass_Produce_Tanks:0 "Mass Produce Tanks"
 SRU_Mass_Produce_Tanks_desc:0 "We have a reserve of legacy tanks brought over from Kazakhstan but to expand our armoured corp we need domestic production. Luckily we can efficiently mass produce older generation T70 tanks in existing factories to fulfil our requirements fast."
 SRU_Modernize_The_T70:0 "Modernize the T-70"
 SRU_Modernize_The_T70_desc:0 "The T70 is a reliable and solid Main Battle Tank that is 20 years out of date. Fortunately it can be brought up to contemporary standards with a few simple upgrades. By replacing the engine, modernizing communication, fitting ATGM and applying liberal amounts of explosive reactive armour."
 SRU_guards_tank_divisons:0 "Guards Tank Divisions"
 SRU_guards_tank_divisons_desc:0 "Our limited industrial capabilities prevent the mass deployment of armour across the board. Therefore we shall concentrate our armoured reserves into ‘Guards Divisions’, elite and independent armoured units staffed with our best tankers. These divisions will be the vanguard of our offensives."
 SRU_Groundwork_Of_A_Red_Army:0 "Groundwork of a Red Army"
 SRU_Groundwork_Of_A_Red_Army_desc:0 "Marshall Rostoviev has reformed our disconnected forces into a unified and professional fighting force. With his diligent work we shall see the Red Army emerge from its shadow of defeat and onwards to Moscow and victory!"
 SRU_Push_Out_The_Invaders:0 "Push out the Invaders"
 SRU_Push_Out_The_Invaders_desc:0 "Our forces are reformed and ready to finally go on the offensive in full. We shall pool our resources to launch a coordinated offensive to drive the invaders out of our homeland. These imperialists shall be driven back into the sea."
 SRU_sonya_east_secured:0 "The East is Red"
 SRU_sonya_east_secured_desc:0 "The invaders have been vanquished. The revolution has reached the pacific, the imperialists driven back across the ocean. The first hurdle towards securing the revolution within Russia is complete, but our trials have just begun. While we may breathe for now, the enemy shall come east and when we face them we shall roll them back and raise the red flag over Moscow itself!"
 SRU_sonya_european_intervention_survives:0 "Europian Intervention Survives"
