 SRU_Luka_Phase_One.1.t:0 "Night of The Generals"
 SRU_Luka_Phase_One.1.d:0 "Placeholder"
 SRU_Luka_Phase_One.1.a:0 "That Should Keep Them In Line"
 SRU_Luka_Phase_One.2.t:0 "Formation of The Russian Jacobin Council"
 SRU_Luka_Phase_One.2.d:0 "The cold Russian winter chill assailed the city of Novosibirsk late one night, the streets were all but completely deserted, there were but a handful of people staying outside braving the harsh Siberian weather. Most were inside their homes, safe and warm, foolishly feeling as if they were almost protected from the strife that affected Russia. Tucked away from prying eyes, down empty deserted alleyways and streets, a group of individuals gathered in a dining hall who numbered no more than 40 tucked away in the hall, seating themselves at a few tables, all enjoying fine pleasantries food and company with one another.\n\nThey were all gathered there for the annual Jacobin meeting, the members made up mostly of middle class Russians, with their ideals unified under one banner. At the central table sat the higher up members of the party, situated at the head of the table with no opposition from either side of the table, was Luka Zhukov, who was sitting there in his chair above all the swathes of people clambering for their own prestige and to be the ones to earn Zhukov's favour, he was seemingly disinterested by the masses of loathsome securocrats and mundane bureaucrats.\n\nThose who sat around him were other important members of the Jacobin clique, sitting to his right was Zaytsev the economic minister a reformer who prefers a more soft approach to Jacobinism, unlike Zhukov his focus was on the fine drink in front of him.\n\nTo Luka’s left was Kulikova, the Chief of the Cheka, who was watching Luka like a hawk examining his every move. Then there was Sorokina the youngest member of the top four party members, she was enjoying herself blissfully unaware of her surroundings as usual. Everything continued as it was, the feast was filled with a joyous air of the Jacobin's recent victory in the people's congress but some were more successful than others an aura of envy was in the air, suddenly as the clock strikes midnight Luka Zhukov stands up, Zaytsev stands up after him and clinks his glass to get the attention of everybody in the hall.\n\nThe silence rapidly dissipated and an aura of unease filled the room, suddenly Luka started speaking \"My dearest friends and colleagues tonight we celebrate our most recent victory in the people's congress, our party is now in coalition with the rest of the VKP and with my recent appointment as the Prime Minister our influence grows day by day, soon the fate of the revolution shall be ours to determine and we must guide it to fruition, to do this I have ordered the creation of the Russian Jacobin Council which shall oversee the true governing of the country while the VKP grip onto whatever delusions of power they think they hold.\"\n\nThe hall suddenly erupts into cheers and praise for Luka but he gestures for them to quiet themselves. He continues \"My fellow Jacobins if we are to be successful in ensuring the survival of our revolution then we must rally behind one leader, that is why I from henceforth shall be the sole authority of the Jacobin leadership with my three compatriots beside me to assist me in carrying the torch of the revolution. Long live the revolution, long live Russia!\"\n\nThe hall chants Luka's very words \"Long live the revolution, long live Russia!\" Those words echo through the night sky, not even suppressed by the coming storm which is on the horizon."
 SRU_Luka_Phase_One.2.a:0 "'Long live the revolution!'"
 SRU_Luka_Phase_One.3.t:0 "A Revolutionary With A Heart Of Steel"
 SRU_Luka_Phase_One.3.d:0 "Placeholder"
 SRU_Luka_Phase_One.3.a:0 "All Hail Comrade Zhukov!"
 SRU_Luka_Phase_One.4.t:0 "Establishment Of The Jacobin Revolutionary Army"
 SRU_Luka_Phase_One.4.d:0 "‘Sentinels of the revolution.’ The voice of Luka Zhukov spoke out, the voice rang out in an otherwise silent room. Though it did not mean the room was empty, the room was large but it was filled to the brim with officers of various ranks, what took up the most amount of space in the room was only a table, old and weathered, a large rectangular table which took up most of the space in the middle of the room. Seated at the table were generals of Sonya’s regime, the men responsible for the security of the nation are all located in one room.\n\nLuka surveyed the room as he spoke, every word purposeful. ‘You’re probably wondering why I called you all here for this meeting.’ Every word carried a chill air to it, which most of the generals in the room understood, his eyes only noticed a few generals he recognised, and those were the ones who sat closest to him in his view, Lukas eyesight was keen, not keen enough to see the other side of the table from where he stood at the opposite head of it.\n\nOf one of the generals he recognised easily, he spoke against Luka in response. Not an angry tone, but a questioning one carrying veins of annoyance. ‘Wondering exactly why, in case you haven’t noticed Zhukov we are currently fighting a war, we can’t spare even a single general to not be dedicated to it.’ Kovalev ’s saying of his last name, Zhukov carried a slight tinge of venom, the simple words of Kovalev was silently murmured by the other generals in the room. Only one other outside of Luka looked at Kovalev with silent disdain, the man who sat opposite of him, Makarov.\n\n’I understand the ongoing situation in the Far East, but these matters are far more important for the war effort.. I can assure you.’ Luka brushed past Kovalev’s tinge in his voice to continue with what he actually cared to say, looking away from Kovalev looking out across the table, it seemed as if he was looking at the entire room and everyone present, instead he was staring off for an unknowing reason. ‘As of now… from this moment onwards, the current army for the Siberian People’s Republic is now defunct.’\n\nThose few words, brought outrage to a majority of the generals in the room, all visibly and verballing addressing their displeasure at the news, save for maybe a quarter or so generals who continued to pay attention and looked to Luka, including Makarov. An unnamed general was the first to stand, slamming his hands onto the table, to directly confront Luka. ‘And by whose order was this?! Sonya would not have such a thing!’\n\n’And.. In its place will rise the new Jacobin Revolutionary Army.’ Luka continued speaking, not even looking at the man continuing like he didn’t exist. ‘The failings and inefficiency of the old army will disappear along with it, the strength and security of our nation will now directly fall under the control of the Jacobin party.’ The general sat back down silently, he had a realisation like many others in the room. If they were now to be placed under the banner of this new army, under the banner of the Jacobin party now, the true power now lay with Luka. Even more so than it already did with the Prime Minister, many of the generals made quick to hide their disgruntlement, most had a silent understanding of Luka. Only a quarter seemed pleased by this course of action. Luka continued with some final words. ‘The leader of the Revolutionary army is still undecided.’"
 SRU_Luka_Phase_One.4.a:0 "‘Many of the generals hoped for it to be Kovalev.’"
 SRU_Luka_Phase_One.4.b:0 "‘The Jacobin Generals already knew who it would be.’"
 SRU_Luka_Phase_One.5.t:0 "General Kovalev's Demands"
 SRU_Luka_Phase_One.5.d:0 "‘General Kovalev!’ The silence that General Kovalev was working within, inside of his own office was ruined suddenly. The door slammed open and a man dressed in a uniform which was worn in even though it was just introduced into service entered Kovalev's office, it was the standard uniform now used by the Jacobin Revolutionary Army. Yet even still, this soldier managed to wear it out. Kovalev looked up from his desk, a stack of papers he was reading through already there. ‘What is it? I’m busy at the moment.’\n\nKovalev said instinctively to the disturbance, his head instantly looking up, he didn’t yet stand from his seat as he brushed his brown hair out of his eyes. The first thing he noticed about the soldier outside of his uniform, was what he held in his hand. Roughly held up in his right hand seemed to be a stack of yet more paper, yellowing and crumpled by the soldier's rough grip. ‘It’s the response from the government about your requests! Sir.’\n\nThe soldier took a few steps further into the room, moving his hand out offering the papers to Kovalev, Kovalev now stood up reluctantly and leaned over his desk to snap up the papers from the soldier's hand. The soldier seemed to relax just a little, as Kovalev now raised the papers in his hand to his eyes, skim reading through most of the papers. His expression went from bothered, to more and more annoyed the more words he read. ‘They misinterpret what I asked for, they weren’t requests…’\n\nKovalev started, placing the papers down onto his table, the pile slightly scattered as he placed it down. ‘They were demands. If they expect me to command the JRA, they should be able to at least let me assign my own officers.’ When he finished, he left one hand on his desk as he leaned on it, scooping up a new and clean piece of paper, moving it over in front of him making room. Then grabbing one of his scattered pens, quickly scribbling some rough words onto the paper, only taking a few moments to finish writing them.\n\n’Take this back to them, and don’t return unless it's with their agreement.’ Kovalev ordered the soldier, as he picked up the piece of paper and offered it to the soldier to once again be the messenger. The soldier quickly took the paper as soon as it was offered ‘Yes, sir!’ The soldier quickly shouted too loudly, and held the paper in one hand as he gave Kovalev a salute with the other hand. Making a quick full turn in the room, heading back out the door he burst in through."
 SRU_Luka_Phase_One.5.a:0 "‘I hope to not have to ask again.’"
 SRU_Luka_Phase_One.6.t:0 "Zhukov's Adress To The Military"
 SRU_Luka_Phase_One.6.d:0 "‘Sentinels of the revolution.’ The microphone in front of Luka’s words crackled to life, speakers all over a large hall filled to the brim with soldiers of the Jacobin Revolutionary Army crackled to life. Luka’s words had an air to them, they sounded both like honeyed words and of poison. The voice distracted all in the hall, it made most of them seem like despite being in a room of thousands, all standing shoulder to shoulder. Looking up at a stage where Luka, always dressed in his suit, always keeping the same expression on his face, always standing perfectly was talking to them, and them alone.\n\nMishia Valeryevich knew in the back of his mind that Luka wouldn’t talk one on one to a mere rifleman who signed up to the JRA only a few days ago, but that's not how he felt listening to him. ‘It is my pleasure to inform you all that the leader of the Jacobin Revolutionary Army has been chosen.\n\nLuka continued, moving swiftly onto the main topic of which he had everyone brought together into this hall, onto why he had cameras above them pointed at him and him alone from every direction. Mishia held onto every word, like it was a life rope. ‘General Viktor Makarov, will now be responsible for holding the peace and protecting our great nation. There is no greater candidate for the position.’ Luka stood completely still for a moment, surveying the soldiers in the crowd. Before shifting slightly to the side, letting his arm out towards his right. Mishia followed it, and somehow he had completely forgotten that there had been others up on the stage with Luka.\n\nSitting all together in lines, Lukas loyal followers and advisors, Luka pointed to one of them, exactly the one he had just mentioned. Viktor Makarov. Who responded to Luka’s summons by standing, taking a few steps away from his chair to be more clear to everyone in the room. Luka turned his head slowly back to the soldiers. ‘With Makarov’s appointment, immediate change will be put into effect for the entire Jacobin Revolutionary Army.’\n\nLuka had yet to finish, and what words only took him a few moments to say, had the weight of a perfectly crafted anvil. Some of the soldiers in line, those who weren’t hanging onto Luka's every word seemed to shift at this point. ‘As of now in order to be part of the Jacobin Revolutionary Army, one must swear all their loyalty to the ideals of the VKP.’ There was no outcry to this announcement, this sudden requirement at least not majorly, there were some hushed whispers between certain soldiers, but not the majority, the majority still stood tall, stood proper, mostly the young and the new. Many of which Mishia knew.\n\n‘There is no room for disloyalty, no room for a shred of doubt in this new revolutionary army.’ The reasoning was sound, Mishia knew it. Those who swore their loyalty hardly ever broke it, less they suffer a worse fate. ‘Every soldier of the JRA shall fight and die under the banner of loyalty to the VKP..’ Luka left his word hanging for a moment, long enough for him to redirect his hand from point towards Makarov, slowly swinging around in plain view, until he directed it to himself, leaving out the words to the entire crowd. ‘To me.’ It was dead silent, a pin drop could be heard, the faintest rustle of the wind, the one to break it was not Luka. It was Mishia, who let out a sudden cry heard by the entire hall."
 SRU_Luka_Phase_One.6.a:0 "‘Long live the VKP, long live Luka!’"
 SRU_Luka_Phase_One.7.t:0 "High Morale Among Soldiers"
 SRU_Luka_Phase_One.7.d:0 "“As you can see, Miss Sorokina. The addition of your cadets has gotten through to us, here you can see them undergoing instruction..” The voice trailed off softly, the eyes of Sorokina were keenly focused elsewhere. The sharp slightly pinkish rubies with pitch black iris’s spied around. The first thing her sharp eyes caught was fresh snow. The winter has assailed Novosibirsk and Siberia constantly, here was no exception. She ignored it, just as she would ignore rocks on the ground. Ignoring the air of frost, clinging to the nearby buildings, and paying no heed to those working to clear away paths.\n\nHer eyes spotted the topic of conversation. Rows of young looking, snow dusted, Siberian trainees who were being grilled by an older man in full uniform and getup. They stood perfectly in line, perfectly still, taking in everything he had to say. They appeared more as listening robots, than cadets she had made them that way. “I see that, Bolotov. I’m wondering what the effect on the other soldiers is?” Sorokina’s voice was light, soft, some would describe it similar to the sound of feathers falling. Her focus was kept on them, even as they walked. Raising her hand, wearing a pristine white glove. The man directing her, caught the movement but kept moving. She could feel his eyes staring at her, she softly smiled.\n\nShe couldn’t blame him, after all she was beautiful in her uniform. One such uniform that signified importance, being the colour of mint forest green, a uniform topped off around her neck by a white fur collar that separated the outside of her uniform from the inside. Which was a more simple crisp white shirt, with a tight formal black tie and deep maroon red vest. “I’m unsure what you are referring to, Miss. This base of the JRA has seen no adverse effects from their involvement, every soldier performs his duty for his country.” Sorokina had caught him, she was sure of it. His voice had wavered for just a second, as he spoke.\n\nThe tone she had caught was of being forced, coerced into speaking on something or being pressured too. And she caught him in it just as he had mentioned the JRA. They had been walking along now for quite some time, and they came to a sudden stop as Sorokina prevented herself from moving, turning away from watching the cadets in training. She eyed him now, as they both stood under the outside overhanging roof that was connected to a nearby troops building. “You seem like you can’t speak. Bolotov, in fact you seem like you are being with a knife to your throat.” The face he now gave her, was the face of someone being caught stealing, reeking of almost being intimidated. He made quick to compose himself.\n\n“Miss if you are implying. That I am underperforming in my duties, then you can-” Sorokina quickly snapped at him, with her own voice stopping him dead in his tracks. As if he had just been struck, by a bullet fired from a rifle. “That’s simply not what I’m implying at all, Bolotov. I am here to inspect, and see what has come of my actions. So, if you have any complaints, any issues of the sort with the induction of the cadets. Please bring them to my attention.” There was now a sudden pause, a moment of wait. Where Bolotov thought his next words carefully as he looked at Sorokina. Before he spoke again, now in a tone that sounded as if the noose around his neck had loosened.\n\n “Well… Miss, my first complaint. Please address me via my rank first.” Sorokina’s first response was a bright wide smile with pearly white teeth, before she let out a light hearty chuckle."
 SRU_Luka_Phase_One.7.a:0 "‘Heheh, why of course Officer Bolotov.’"
