 SRU_Luka_Socialist_Flavour.1.t:0 "Retreat From Novosibirsk"
 SRU_Luka_Socialist_Flavour.1.d:0 "As the war drags on across the motherland, the Euro-Britannian forces inch ever closer to victory while the revolution crumbles before Luka’s very eyes. The capital is in utter chaos as the people's militias scramble to the defence of the motherland, but it is all in vain as the final victory is drifting ever closer into the enemy’s clutches. As the nation is on the very edge of total collapse Field Marshall Anton Makarov had organised the remaining population of Novosibirsk which was home to the most loyal comrades of the revolutionary cause to evacuate to Kazakhstan, Luka Zhukov ordered what was left of the Revolutionary Guards to place explosives around Novosibirsk to ensure the city's infastructure does not fall into the hands of the enemy, as soon as he had given the order he and his closest advisors make their way to the last train bound for Kazakhstan. While Novosibirsk was being evacuated the military was ordered to stay behind and resist the enemy at all costs, infighting abruptly broke out between the Red Army and Cheka, after which the remaining Cheka forces used the underground network of tunnels used during the first Russian revolution by Socialist Guerillas. Before Luka Zhukov got on the last train at the Novosibirsk train terminal Luka Zhukov was reportedly wounded by a gunman identified to be local worker Boris Mikhaylov who exclaimed §tTraitor To Mother Russia§!. As he shot Luka Zhukov three times, Luka Zhukov was rushed on board the train and departed immediately, at this time it is unknown if Luka Zhukov has survived his injuries and the gunman is still at large."
 SRU_Luka_Socialist_Flavour.1.a:0 "We Shall Return One Day"
