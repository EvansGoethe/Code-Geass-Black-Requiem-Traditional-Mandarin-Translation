 SRU_cheka_opposition:0 "Cheka Opposition Towards The Army"
 SRU_cheka_opposition_desc:0 "Disagreements between Cheka and the armed forces have escalated into conflict in the defence of our national borders there is no doubt this will effect our fighting capablities in the future. §RCHEKA WILL BE OPPOSED TO THE ARMY§!"
 SRU_cheka_integration:0 "Cheka Integration Into The Army"
 SRU_cheka_integration_desc:0 "A new level of cooperation has been reached between the armed forces and Cheka, they will assist the military in the administration and running of military operations. §GCHEKA WILL ENSURE THE LOYALTY OF THE MILITARY§!"
