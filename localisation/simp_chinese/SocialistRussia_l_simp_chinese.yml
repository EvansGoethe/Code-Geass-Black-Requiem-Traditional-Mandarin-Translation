 SRU_Luka_Phase_One_Politics.12.t:0 "Zhukov Meets With The Opposition"
 SRU_Luka_Phase_One_Politics.12.d:0 "‘Matvey, Oksana, welcome have a seat. We will need to hurry this along. My time is very limited as of late, I’ll give you five minutes. Tell me, why did you want to have this meeting?’ As if Luka’s words could take grip of the very room around them. Matvey Vasilev and Oksana Volkona suddenly felt like they heard a clock rapidly ticking, all the while they were being stared down by Luka, who observed their every characteristic and feature. Like he was logging it permanently into his brain. ‘We don’t want to take up-’ Oksana tried to speak first, attempting to be kind and apologetic already, hoping for this to not get out of hand.\n\nBut suddenly her soft voice drowned out, her black hair almost jumping off her head. ‘Enough!, he said make this quick so let’s make this quick.’ Matvey was brash, cutting off Oksana's niceties quickly, his hands were balled into fists. Not for a fight, but purely out of reflex as he started to wave them at Oksana like telling her to get on with it. ‘Right! Both our parties have a series of concessions we’d like to see from the government.’ Oksana produced a white crisp paper document from a stack of papers within her hands. And couldn’t even hand it to Luka, she simply stepped forward and placed them down in front of him, within his eyesight but he didn’t even focus on it.\n\nFocusing only onto them. ‘Simply put, more democratic changes to the electoral system and the continuity of elections through the current period of war. The government should not just be allowed to act freely during a time of crisis especially on this magnitude. This document covers most of it, in short. Let the people elect their own judges, and officials to oversee the government.’ It was clear that Matvey was speaking from his own true beliefs, trying to speak on the behalf of the people. It was no wonder he was given the position he was in, he seemed to have earned it by drive alone.\n\nHis fists were now holstered at the side, doing their best to not be waved toward Luka. Less it cause him to feel fear, little did Matvey know that as Luka stared right at him as he spoke. He realised there was nothing to fear from the man, even if he had a loaded gun to his head. Luka answered quickly and sharply, he hadn’t even begun to read the document before finishing with."
 SRU_Luka_Phase_One_Politics.12.a:0 "‘I believe five minutes is up... Now, please leave.’"
 SRU_Luka_Phase_One_Politics.13.t:0 "Some Advice From a Friend"
 SRU_Luka_Phase_One_Politics.13.d:0 "The air in Luka’s office was chill, while the window to the rest of the frozen Novosibirsk was hard shut. The biting cold still seeped its way in, so much so that as Luka went to raise his cup of Tashkent tea, the steam billowed off of it like a smoke stack, but he raised it to his lips regardless. The warmth flooded his body, all while his ears were filled with the voice of Zaytsev. ‘What I’m saying, Luka, is that there is a simple way to deal with the opposing parties.’ Luka gently sat contemplating the topic of discussion before he answered, placing the tea cup back on its plate in his hand as he looked out at Zaytsev.\n\nWho had his own cup he was drinking from, he held it from above with his hands spider like and spread out on its rim. ‘Go on Zaytsev.’ Was Luka’s simple response, interested in what his friend had to say. ‘The parties are weak willed, they’ll take anyone who shows a little bit of interest in their mundane values. That is their weakness. Put simply, if we were to infiltrate their party's leadership they could be controlled from the shadows.’ Zaytsevs mind was always analytical, Luka assumed he saw everything like a graph and could come up with the best way to solve the problem. So, he thought for a second.\n\nTaking a few more sips of his tea, that couldn’t calm a perfectly still Luka was providing warmth for his body, more than his suit did. ‘People are far more willing to listen to someone who shows interest in their values no matter how false that interest may be.’ Luka’s words seemed interesting, well to anyone but Zaytsev. He had an underlying feeling about them, something like they were practised before. Or came from simple experience, Zaytsev took a long sip of his black tea, before finishing what he was arguing for. The way to solve problems that the nation had. ‘My point exactly, to end the political turmoil, use the opposing parties to your benefit to get what you want. All without lifting a finger and getting our nation back on track.’ Zaytsev had practically chugged his tea, and when he sat it down gently on Luka’s desk. An action no one else but Zaytsev would dare to do, Luka smiled at him."
 SRU_Luka_Phase_One_Politics.13.a:0 "‘Let’s find some interested people.’"
 SRU_Luka_Phase_One_Politics.14.t:0 "Zhukov's Thoughts"
 SRU_Luka_Phase_One_Politics.14.d:0 "The winter had assaulted Novosibirsk harsher than had ever been seen before, Luka couldn’t remember a time in his life where it was any harsher. It was either that, or the fact of looking down at it all from an office window that was floors above it, had a way of making him forget the times of being hit by it, of being someone who needed to crawl through the icy breath of snow just to reach home. ‘Novosibirsk.. Socialist Paradise.’ The muttering words under Lukas chill breath seemed to fog up on the windows, not that he minded. Softly tapping his wrist with his hands folded behind his back, he eyed himself within the reflection of the window.\n\nTreating it, like a mirror. ‘Not entirely, not yet. Still so much left to do.’ Luka did not lower his head, did not stoop himself down, instead his eyes merely drifted. To someone fighting against the cold winter's breath just to even move out in the main street, going from building to building waving at others that spotted them. Luka didn't realise it, but he must’ve forgotten the feeling of the struggle the man went through. “What course should I take? Both sides have merits, Zaytsev has a way of making a convincing argument to me.” Or, he must’ve ignored it. His own words now seemed lost, caught up within his own mind. His own tongue caught, until of course. He was able to weed and clear them out completely with sharp words. “I hate it.”\n\nWords not reading as loathing or annoyance, not even pure hatred. Something more interwoven. Luka re-affixed his gaze onto the window, he didn’t see that man anymore making his way through the city. Instead he caught someone else's eye over his right shoulder, in his own office. Not waiting for a second, he turned around to catch the intruder. Someone he noticed had both a fully recogniseable face, and one he couldn’t recall. “I don’t believe I let you in-” The air was silent, the office completely silent. The windows were hard shut, and so not a single gust of wind was able to disturb him in his office. He straightened himself, looking at his desk, eyeing the unruffled papers that lie neatly across it. But more importantly, he eyed the desk phone of his in the left hand corner."
 SRU_Luka_Phase_One_Politics.14.a:0 "‘Either way, I should make the call.’"
 SRU_Luka_Phase_One_Politics.15.t:0 "Chaotic Congressional Session"
 SRU_Luka_Phase_One_Politics.15.d:0 "The bill was passed around the Novosibirsk congress room, like it was a piece of paper caught on fire. Every time a single slip of it was handed out to a member of congress, who was sitting around in a ring of dark oak wooden tables it was almost like they suddenly went into a panic. And all Luka Zhukov did as this happened was watch, he sat at the very head and foremost point of the congress room. All attention in the room, all focus would always be towards him. It was no different this time.\n\n'This is an outrageous bill!' The voice of one of the congressmen rattled off, Luka didn’t attempt to even look at the man. Who had bursted up out of his seat, scrunching the paper in his right fist waving it around. The man was yet to finish shouting as others started receiving their bits of paper from nearby assistants and helpers. 'You want us to simply lay down, and hand you full control over the nation!!' The man was fuming, it was clear he was a part of one of the key opposition parties to Luka. But the details of which one he was a part of didn’t matter.\n\nAll members of the opposing parties reacted similarly if not worse, congress almost broke out into complete chaos with members standing up, yelling practically throwing themselves around the room. Luka even noticed that as some members of his own party the VKP didn’t look too pleased when they saw the bill. The reformists hiding by Kulakov had more restrained rage, it looked like a blood vessel of his would burst at any moment, but he kept control and stayed seated looking down at the paper with disgust. Luka continued to watch all of this unfold, with mild amusement not smiling, not any expression on his face, just quietly watching.\n\nEven as members of Cheka entered the room through all entrances and exits, moving around silently which slowly wrapped a chain around the necks of congress. Their mere presence caused those who had visibly shown their rage, annoyance and anger at the bill, to quietly take their seats once more and stay seated. Luka didn’t even need to lift a finger, or move a muscle, he stayed seated in his chair the whole time. It didn’t seem like the chair was even comfortable for Luka, it was old, almost broken splintering wood. Luka started to lean his head down a little bit as he looked out at the room. And finally he spoke, and he did so with a smile."
 SRU_Luka_Phase_One_Politics.15.a:0 "‘Tell me again, your complaints. If you would.’"
 SRU_Luka_Phase_One_Politics.16.t:0 "Congress Unites Under Zhukov's Leadership"
 SRU_Luka_Phase_One_Politics.16.d:0 "‘Look at them...’ Luka’s eyes were focused down from where he stood, his only options to look ahead out towards the far reaching horizon, blotted with a series of snow covered brick buildings. Or up towards the ever soaring skies, where it would only be blocked by the clouds. ‘People of Russia...’ Luka began muttering to himself, watching down by the streets as people corralled around beneath him, he could see his feet, firmly planted on the top of a thin railing to his balcony, as the wind whipped at him and people seemed to look up at him concerned. ‘People of Novosibirsk... no.’ He continued, he had no trouble finding the words, or knowing them. No trouble at all, he was simply admiring the view of those beneath him like ants. The people of the revolution, his revolution. All watching concerned, as they believed any push of wind would send him tumbling to his death.\n\n‘Look around you, look amongst yourselves.’ He spoke just loud enough to be heard above the wind and those below. ‘To your friends, to your family, to your comrades. Tell me now, could you ever imagine to yourself, that the person you considered friend. May very well be not just an enemy to you, but to your home that you live in? To your family?’ Continuing his words, they seemed to take effect on those beneath him, who began to shuffle amongst themselves turning side by side, possibly wondering where this was coming from, but focusing on what was said all the same. Luka began to grow a smirk on his face, and took his hands, his arms. Safely stored at his side, and threw them far out to the sides, seemingly in a wide embrace. ‘For too long has our revolution struggled. Not only did we have enemies within the East, but we had our enemies right amongst us. Look to the left of you, look to the right of you. Any of them could be our greatest foe for our revolution.’\n\nNow murmurs in the crowd gathered below began to grow, and Luka seemingly caught the glimpse of a camera zooming up at him, his smirk only grew as he directed his eyes up, closing them. Before looking back down. ‘These enemies trapped our fate within their jaws, barring any progression amongst our Congress.’ There was some mild outrage amongst the crowd, a scant few members of the growing blot down below raising and shaking their fists into the air at Luka while trying to overtake his words with his own, the others around them began to step away. No matter, Luka thought, looking at them as he continued. ‘No longer shall they plague us, no longer shall we clench at our own throat as the noose ties around it.’ One of those growing dissidents, clearly a member of other parties was quickly surrounded, by figures dressed in the uniforms even from this distance, recognised by Luka to be Cheka.\n\n‘For I, I alone have taken the blade and cut that rope. Now, not only do I intend to direct our blade at the enemies in the East. But, I will direct it to all the enemies of the revolution.’ Luka threw his right hand out in front of him, pointing and holding his wrist forward like he held a knife pointed forward to the horizon, as he took his other hand, balled it into a fist and slammed it into his heart. At that moment, the Cheka surrounding the man turned away from him back to Luka, throwing their fists onto their own hearts in unison. Which started a chain reaction amongst the rest of the crowd, minus those few dissidents. The words that rang out from the crowd shortly after, and that rested on the headlines of the newspaper."
 SRU_Luka_Phase_One_Politics.16.a:0 "'Long live Luka!'"
