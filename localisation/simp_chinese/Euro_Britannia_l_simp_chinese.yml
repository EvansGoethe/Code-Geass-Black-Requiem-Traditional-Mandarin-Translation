 FAR_military_council_desc:0 "「軍事委員會非官方地由前鄂霍次克市長謝爾蓋·索羅金領導，官方則負責整個遠東臨時政府。它主要由駐紮在遠東的許多將領和指揮官組成，他們也是國家復興運動的核心成員。由於去中心化的性質，軍事委員會在維持遠東地區的穩定與秩序上面臨著很大困難。\n\n雖然委員會由許多高級將領組成，但也有少數高階將領佔據了領導地位，與索羅金以及國家復興運動的其他市長 and 成員並肩作戰。他們是康斯坦丁·羅斯托夫、米羅斯拉夫·伊斯梅洛夫、加夫里爾·阿普拉克辛和雅科夫·戈爾施泰因-貝克西。」"
 HIGHLAND_DESC:0 "「1985年2月18日，奧古斯塔·亨利·海蘭出生於聲名顯赫的名門望族海蘭家族。他在很年輕的時候就成為了海蘭家族的族長，並晉升為公爵。海蘭利用自己的地位推動不列顛尼亞的改革，導致其他一些貴族世家對他抱持鄙視態度。然而，由於他家族的偉大歷史以及與查爾斯皇帝的緊密關係，他們無法對他採取任何公開行動。\n\n海蘭隨後加入了不列顛尼亞軍隊，證明了自己是一名出色的戰士，但主要是一位優秀的戰略家。在服役期間，他為不列顛尼亞和他自己贏得了許多勝利，主要是在第二次太平洋戰爭期間。在他的軍旅生涯中，他結識了米凱勒·曼弗雷迪和安德烈亞·法爾內塞，並與兩人建立了深厚的戰友情誼與忠誠紐帶。\n\n海蘭是向遠東臨時政府提出提議的主要倡導者之一。許多其他貴族促請皇帝任命海蘭為即將成立的歐洲不列顛尼亞的大公。當皇帝向海蘭提供這個職位時，他以優雅和榮譽接受了它，正式成為歐洲不列顛尼亞的維萊恩斯大公。此舉讓其他貴族能夠在排除海蘭及其改革派觀點的同時，也充分利用了他的才能。\n\n『您的願望就是我的命令，陛下。』——維萊恩斯大公」"
 FAR_phase_one_intro.1.t:0 "「寒風吹拂」"
 FAR_phase_one_intro.1.d:0 "「300多年來，我們的祖先致力於將這片荒涼的廢土轉化為祖國俄羅斯的榮耀燈塔。300多年來，我們在與世隔絕的環境中與飢餓和疾病抗爭。300多年來，我們一直是人類已知最廣袤土地的堅定捍衛者，堅守防線抵禦來自南方中國的任何侵略。\n\n我們履行了我們的職責，我們也期望我們的同胞做同樣的事，因為那是我們很久以前與他們達成的協議……然而……這給我們帶來了什麼？當歐洲的官僚將他們的獠牙咬入我們的財富時，我們偉大歷史的一切都被踐踏在泥土中……大戰後淪為只是一個傀儡政權。我們的政治家背叛了自己人，因為他們只在乎自己不斷增加的銀行帳戶。\n\n長期以來，我們一直固執地相信我們所熟知和深愛的俄羅斯依然存在，我們的忠誠和犧牲會得到認可和回報……但我們是傻瓜。我們祖先的俄羅斯很久以前就死了，被埋在層層腐敗和貪婪之下。我們，東西伯利亞的人民，已經淪為他們遊戲中的棋子，我們的聲音被忽視，我們的需求被拒絕……\n\n 不能再這樣了……\n\n談判和虛假希望的時間已經結束。拯救俄羅斯的唯一方法就是我們自己掌控局勢。真正的俄羅斯活在我們的心中，我們將使它重獲新生。」"
 FAR_phase_one_intro.1.a:0 "「我們的夢想還沒有破滅！」"
 FAR_phase_one_intro.2.t:0 "「死者中的線索」"
 FAR_phase_one_intro.2.d:0 "The room was a mosaic of stern faces and furrowed brows, a stark contrast to the ornate gold leaf that lined the high ceiling. The chandeliers, once a bastion of opulence, now cast a grim pallor over the hastily assembled council. Sergei had learned much over these last tremulous days as now he found himself the president of the Provisional Government. A fact no doubt tied to his rallying cry but a few weeks ago. His hands shifting eagerly through the stacks of papers that made up the hastily made report on the armed forces and the economy. Eyes flickering upwards to the rest of the grand assembly doing much the same.\n\n\"What do you expect we do?!\" Boris's voice rose above the rest. \"We do not have the factories, the equipment, or god forbid the people to get through even the Socialists. Sure what men we do have can probably hold off their tide but...\" He paused, looking around the table at the men and women who had pinned their hopes on this shaky alliance. His hands rise up before taking off his glasses and setting them down on the hardwood table in front of him \"If we are to win this... IF.... we cannot do this alone.\"\n\nSergei took a deep breath, his fist clenched around the report he'd been reading. He knew Boris was right. The numbers didn't lie. The Monarchists had resources, the socialists had numbers, and here they are trying to hold together a country that couldn't hope to survive alone. His jaw tightened. \"We need an alliance,\" he said flatly...\n\nBut before they could continue, a sharp knock on the door drew their attention. It was a young aide, who rushed to the President's side, nearly tripping in the process before handing another report to Sergei. \"From the investigation team, sir,\" she whispered. \"It's... just read it...\"\n\nSergei's heart sank as he took the paper, scanning the first few lines. His face contorting in a manner most would see as contemplation, but not Boris. In the eyes of his friend, all he saw was rage. \"It seems,\" he began, his voice low and measured, \"that the detonation at the port was no accident\" He paused as a deafening silence filled the space to bursting. \"Someone was able to slip inside the permitter during the chaos and planted a bomb on the ammunition depot... This was a deliberate act of sabotage.\"\n\nSergei slammed the report down on the table, the sound echoing through the room. \"We must find out who did this!\" he said with a steely conviction. \"We need to know who did this atrocity... and if they were Russian... or someone else...\""
 FAR_phase_one_intro.2.a:0 "「願上帝憐憫他們，因為我不會……」"
 FAR_phase_one_intro.3.t:0 "「來自寒地」"
 FAR_phase_one_intro.3.d:0 "\"Alright, keep it tight. Lets not let them slip out of our grasp a second time now.\" the squad leader, Sergeant Ivanov, murmured into his radio. The crunch of fresh snow beneath their boots was the only sound piercing the deafening silence of the Siberian wilderness. The five soldiers of the 3rd Special Forces Unit moved in a staggared line, their breaths misting in the frigid air.\n\n A sudden jerk from the man in the rear caught Ivanov's eye. Private Novakov had paused, his rifle at the ready, his gaze fixed on a disturbance in the dense, snow-covered forest ahead. \"What is it?\" Ivanov hissed, his eyes scanning the area for any signs of danger.\n\n\"I thi-\" Novakov's reply was cut short by the crack of a distant gunshot. The force of the bullet threw him back into the snowbank behind him, a crimson stain blossoming rapidly against the white snow. The other four soldiers dropped into combat positions, their eyes darting to find the source of the threat.\n\n \"Contact, front!\" Ivanov barked diving to the ground. Rounds whizzing right above where he was just standing sending a chill down his spine. The forest erupted with the sound of gunfire as the hidden assailants revealed themselves.\n\n The squad returned fire with precision, their movements a blur as they weaved between trees and cover. The crack of rifles echoed through the quiet woods, punctuated by the thump of snow kicked up by the incoming rounds. Yet despite the unfavorable conditions Ivanov found himself in, it seems as though the rest of his squad was doing much better. One after another the hostiles were dropping till silence once more swept over the dead trees.\n\n Ivanov signaled for the squad to advance cautiously as they pass several bodies. His heart hammering in his chest as they rush around an overturned log. Two unknown men lay against the log, their rifles tossed to the side. They were dressed in gray and white winter camouflage, their bags strewn across the colorless snow as makeshift cover. It was there, poking softly out of the side that he spotted something that caught his eye... a computer... and a transmitter...\""
 FAR_phase_one_intro.3.a:0 "「讓我們看看你那個設備裡有什麼。」"
 FAR_phase_one_intro.4.t:0 "「計劃有變」"
 FAR_phase_one_intro.4.d:0 "「主旨：鄂霍次克悲劇絕不能不予回應\n寄件者：反情報總監 亞歷山德羅夫·葉爾茨\n收件者：總統 謝爾蓋·索羅金與省委員會\n\n致敬愛的委員會：\n\n我很自豪地證實，我們已於幾週前消滅或捕獲了所有對鄂霍次克悲劇負有責任的人員。我們的特工成功追踪並與責任人交火，擊斃五人，並捕獲了兩名罪犯。\n\n按照您的指示，對倖存者的審訊進展緩慢，但他們的堅韌讓我印象深刻。我還沒能擊破他們中的任何一個，但僅憑這一點就說明了我們面對的是什麼樣的角色。這些人接受過正式培訓，毫無疑問，他們是一個更大組織的一部分。\n\n此外，我已下令對從他們身上發現的一台電腦中獲取的資訊進行全面分析。雖然讀取資訊被證實具有挑戰性，但我可以確認兩個關鍵點。\n\n第一，該小組一直在向不列顛尼亞本土的某個地方發送訊號。\n\n第二，電腦顯示，該小組的任務是滲透現已不復存在的扎哈羅夫政府所運行的太空計劃。\n\n這場俄羅斯的崩潰至少有部分是由這個目前尚不知名的不列顛尼亞情報機構所策劃的，這一發現並未被我忽視。然而，太空計劃的重要性不容忽視。幾十年來，它的運作一直在極度機密的掩護下進行，甚至其位置也處於最高機密級別。\n\n只有扎哈羅夫總統和他最親密的顧問知道該計劃的細節，但無論這些不列顛尼亞人在尋找什麼，我向您保證，我們很快就會知道。與此同時，我將確保我們抓住任何在我們境內出現的該死的間諜。」"
 FAR_phase_one_intro.4.a:0 "「你說太空計劃？」"
 FAR_phase_one_intro.5.t:0 "「星空中的陰謀」"
 FAR_phase_one_intro.5.d:0 "「主旨：我找到了他們的目標\n寄件者：反情報總監 亞歷山德羅夫·葉爾茨\n收件者：總統 謝爾蓋·索羅金\n\n自從我上次報告以來，我對我們的客人進行了更多調查，他們最近相當多話。根據他們的口供以及我們自己的調查，我們現在知道了幾個與俄羅斯太空計劃相關的設施位置——即使在國家崩潰的動盪中，這些地點的機密性依然得以維持。\n\n如您所知，這個計劃是在大戰結束後構想的，當時歐洲嚴苛的法令使我們的經濟陷入癱瘓，我們的人民士氣低落。為了尋求出路，當時的政府將推進技術的迅速發展視為一個機遇。這不僅可以重塑民族自豪感，還可以創造出真正有價值的東西，免受外國剝削。太空計劃成為了這條道路，向我們的鄰國和我們自己的人民保密。\n\n我們都看過描繪那些極為著名的封閉城市的舊節目……現在看來，我們終於可以平息所有關於它們位置的爭論了。我們已經確定了分佈在祖國各地的4個主要樞紐，幸運的是，它們對我們的對手而言依然保密。看來不列顛尼亞人在挑起這場混亂之前，至少確保了俄羅斯的動盪遠離我們深愛的國家寶藏，希望在我們分心時染指它。不幸的是，他們低估了我們是多麼的……執著。\n\n這些設施雖然對我們目前的軍事鬥爭沒有直接影響，但代表了我們人民的潛在生命線。我們都了解我們處境的脆弱。僅憑我們的資源不足以確保在這場內戰中取得勝利，尋求外國干預可能是我們唯一的選擇。如果那個時刻到來，那麼這些地點的價值就在於它們作為籌碼的潛力……而且是一個相當有吸引力的籌碼。\n\n我已下令我指揮下的部隊控制目前唯一處於我們邊界內的站點，即東部歐亞航天發射場。我懷疑我們的人數應該足夠，但我希望請求一些額外的部隊，以盡可能長時間地維持其機密性。」"
 FAR_phase_one_intro.5.a:0 "「這對未來的談判非常有用。」"
 FAR_phase_one_intro.6.t:0 "「雄獅的錯誤」"
 FAR_phase_one_intro.6.d:0 "「主旨：消滅不列顛尼亞情報小組\n寄件者：反情報總監 亞歷山德羅夫·葉爾茨\n收件者：總統 謝爾蓋·索羅金\n\n我們的行動已成功瓦解了滲透到我們領土內的不列顛尼亞情報網絡。雖然這次努力耗費了我們幾名優秀的官員和盡職的人員，但我可以滿懷信心地說，整個情報小組已被消滅。\n\n坦白說，我對事情如此簡單感到有點失望。利用我們在最初交戰中繳獲的設備，我們直接接入了他們的通信網絡。從那裡開始，突襲他們的陣地或設置陷阱讓他們體會到在那個黑暗日子裡所施加的痛苦並不是太困難。隨著他們的網絡被摧毀，來自不列顛尼亞間諜活動的威脅已被有效清除。\n\n希望您交給我部門的下一項任務能持續得久一點。」"
 FAR_phase_one_intro.6.a:0 "「如果前政府也這麼稱職就好了……」"
 FAR_phase_one_intro.7.t:0 "「衝破面紗」"
 FAR_phase_one_intro.7.d:0 "President Sergei sat at the head of the long table, his brow furrowed in thought. Around him, members of the Governing Council both civilian and military leaders alike exchanged tense whispers. Boris lounged nearby, his chair large and reinforced as to maintain his vast girth.\n\n\"We cannot afford to delay any longer,\" said Captain Yelena Markov, a decorated officer and one of the council's most vocal members. She leaned forward, her voice steady but urgent. \"Our reality is clear. Without foreign support, our resources will run dry within months. The monarchists and socialists already outmatch us, and the damned Europians will crush us once they get through the other two. We have the space program facilities which, at this point, is the only card we hold that could interest anyone. We should approach our southern neighbors who might be sympathetic to our cause, especially if it keeps Britannia's influence at bay.\"\n\nBoris chuckled softly, drawing the attention of the room. \"The Pacific nations? Sympathy? Captain, you're dreaming,\" he said, his tone dripping with sarcasm. \"Even if we could secure a meeting, what guarantees do we have that they'd act? Most of them are too entangled with China's power bloc or too weak to make a difference.\"\n\nMarkov bristled, but Boris raised a hand to forestall her retort. \"No, if we're serious about survival, we should consider Britannia.\"\n\nThe room fell deathly silent as the very name seemed to darken the air. \"We all know Britannia's role in sparking this civil war, but let's not pretend they don't hold the cards here. Britannia is the only superpower with both the resources and the desire to act. They want our space program which is no speculation as it is a fact. We offer them the facilities and whatever else they can acquire from that junk, and in return, they back us. With their support, the war ends in months, not years.\"\n\nSergei's expression remained unreadable, but the council erupted into heated debate. Some nodded at Boris's words, their pragmatic side recognizing the logic. Others shouted in protest, accusing Boris of betraying their people by even considering working with Britannia.\n\n\"Enough of this bickering!\" Sergei shouted as he rose to his feat. His voice cutting through the clamor like a hot knife as the whole room turned towards him. The room held its breath as Boris asked the question that was on everyone's minds. \"Well, Sergei,\" he said, his tone almost challenging. \"The council defers to you. What do you say, Mr. President?\""
 FAR_phase_one_intro.7.a:0 "「你們兩個人的觀點都很有道理……我需要一些時間思考。」"
 FAR_phase_one_intro.8.t:0 "All In"
 FAR_phase_one_intro.9.t:0 "「來自……不列顛尼亞的交易？！」"
 FAR_phase_one_intro.9.d:0 "「主旨：對遠東的援助\n寄件者：奧伊亞格羅斯·澤馮\n收件者：代理總統 謝爾蓋·索羅金\n\n以神聖不列顛尼亞帝國第98代皇帝查爾斯·Zi·不列顛尼亞之名。我，聲名顯赫且高貴的澤馮家族首領奧伊亞格羅斯·澤馮，以皇帝的名義致信，提出對遠東臨時政府的援助條款。如果皇帝親自提出的條款得到滿足，我們的支持和協助將隨之而來，以援助貴國的努力。\n\n1. 遠東將允許神聖不列顛尼亞帝國及其所有地區進入其港口進行對接和加油。\n2. 遠東將允許神聖不列顛尼亞帝國及其所有地區出於援助目的獲取其資源。\n\n如果滿足上述條款。我們的援助和支持將如下呈現：\n\n1. 俄羅斯人在與神聖不列顛尼亞帝國及其地區打交道時將獲得與不列顛尼亞人同等的對待，並獲得給予不列顛尼亞人的相同特權和權利。\n2. 遠東將被視為一個獨立於神聖不列顛尼亞帝國及其地區的完全獨立國家，但獲得平等的對待，享受貿易和政治支持的益處。\n3. 物資將被送往遠東以協助其戰爭努力，包括不列顛尼亞的裝備、技術、士兵和專業知識。\n\n皇帝期望在一個月內收到對這封信的回覆。」"
 FAR_phase_one_intro.9.a:0 "「『不列顛尼亞……萬歲？』」"
 EUR_phase_one_intro.1.t:0 "「欺騙魔鬼」"
 EUR_phase_one_intro.1.d:0 "Sergei Sorokin stood on the steps of the capital building overlooking the main plaza. Where once he had simply been a mayor trying to do what was right for his people, now he stood leading a government built on little more than desperation and borrowed faith. Behind him, Boris stood as his unease betrayed itself in the occasional twitch of his fingers.\n\nKnightmares flanked the oncoming procession like steel predators looking for the slightest sign of danger. Britannian soldiers marched in perfect unison around their charge as the ambassador stepped forward, his polished boots clicking against the stone. The crowd's thunderous cheers drowned out everything except the voices of those close enough, allowing Sergei, Boris, and the ambassador to speak in a fragile bubble of words.\n\n\"President Sorokin,\" the ambassador greeted, his voice warm and cordial, though something in his tone made Sergei's stomach churn. \"What a spectacular welcome. Your people have truly outdone themselves. Why I don't think I could have asked for better if I was visiting one of our subjects.\"\n\nSergei nodded stiffly, keeping his tone measured. \"I thought it would be best that we celebrate the start to a partnership that will bring freedom and prosperity to our two peoples.\" The ambassador's smile lingered for a moment before it twisted into something far colder. \"Ah, partnership,\" he repeated, almost as if testing the word.  \"I'm afraid that word no longer applies. Effective immediately, Britannia is assuming control of the Far East. Your government is to be dissolved, and our administrators will take your place. You see this arrangement is unfortunately non-negotiable.\"\n\nSergei's heart dropped as stood there incredulous desperately trying to find his words. \"You're violating our agreement! Th- this is treachery!\"\n\n\"Treachery?\" Boris's voice broke in now as he stepped forwards. \"No, Sergei. This is survival and only the most brutal survive. It's foolish to believe otherwise.\" Sergei turned sharply to face Boris, disbelief etched into his features as his voice trembled in barely restrained fury. \"You... knew about this? You let them in and threw away all that we sacrificed and for what?! You really are a pathetic cockroach.\" Boris didn't flinch. Instead, he offered Sergei a placid, almost pitying look, as the ambassador placed a hand on Boris's shoulder. \"A wise man, your loyalty will not go unrewarded. We've prepared accommodations fit for someone of your... vision.\"\n\nBefore Sergei could find the words, the ambassador reached into his coat and produced a small, ornate box. \"And for you, Mr. President, a final gesture of respect.\" he said, his tone dripping with mockery. Sergei took the box with trembling hands and opened it. Inside was a single pistol, polished and loaded. The ambassador's smile turned sharp as a blade. \"Consider this your final act of leadership. Do it yourself, with dignity, or my men will see to it in a much less pleasant manner.\"\n\nThe weight of the gun seemed to drag Sergei down as he looked past the ambassador, past Boris, and out to the sea of cheering civilians. They waved flags and shouted his name, their faces lit with hope that felt unbearably cruel. None of them knew. None of them understood.\n\nHe closed the box slowly, his hand lingering on the lid. His voice, when it came, was barely a whisper."
 EUR_phase_one_intro.1.a:0 "「他們為被奪走的東西歡呼，而我活不到看見他們意識到這一點的那一天……」"
 EUR_phase_one_intro.2.t:0 "「從一開始就被操縱了」"
