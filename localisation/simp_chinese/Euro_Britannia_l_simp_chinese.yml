 EUR_britannia_favor:0 "「勝利的代價」"
 EUR_britannia_favor_desc:0 "「在控制了這個殘存國家後，有一件事立刻浮現了出來：§R-可憐的軍事狀態§！。\n只有少數俄羅斯本土的師加入了遠東起義，而我們的人力正不斷減少。此外，我們缺乏現代化裝備，我們微弱的生存空間隨時可能受到我們狡詐的鄰居——§R社會主義者§！的威脅。幸運的是，這片土地擁有豐富的資源，我們可以用這些資源來餵養§R不列顛尼亞巨獸§！以換取他們的§R軍事支持§！。當然，這會讓俄羅斯對這些地區的控制面臨危機，但這難道不是我們為勝利付出的代價嗎？\n\n§R點擊各個區域以割讓對當地資源的控制權。§！」"
 EUR_secure_sites:0 "「我們與星空的競逐」"
 EUR_secure_sites_desc:0 "「儘管俄羅斯的晚期衰落和崩潰給在她死後爭奪的派系留下了很少可以繼承的東西，但她§Y太空計畫§！的遺產在遠東依然存在。儘管俄羅斯航太的組織在崩潰期間逃亡，但該計畫的基礎設施仍然保留了下來。雖然我們目前手裡只有馬加丹航天發射場，但控制所有設施將使我們能夠奪取並利用俄羅斯以前的§Y太空計畫§！。這不僅能讓我們擁有未來發射的基地，還能讓我們控制目前孤立的俄羅斯衛星網絡。我們的不列顛尼亞贊助者對控制這個間諜和通訊衛星網絡表現出了極大的興趣，§R特別是機密情報局（O.S.I.）……\n\n（你有兩次行動）§！」"
