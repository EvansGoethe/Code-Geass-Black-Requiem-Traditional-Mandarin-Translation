 POLITICS_HENRY_HIGHLAND_DESC:0 "「奧古斯塔·亨利·海蘭也被稱為維萊恩斯大公，是不列顛尼亞皇室的近親，曾多次被皇帝委以關係到帝國安全的重任。他是一位高尚且富有騎士精神的人，並被任命為不列顛尼亞新項目歐洲不列顛尼亞的主權者，他決心將俄羅斯置於神神聖不列顛尼亞帝國的統治之下。」"
 EUR_Cold_Pacific_coast:0 "「寒冷的太平洋海岸」"
 EUR_Cold_Pacific_coast_desc:0 "「如果我們要展望未來，我們必須首先回顧我們的過去……」"
 EUR_Digging_Through_The_Rubble:0 "「挖掘廢墟」"
 EUR_Digging_Through_The_Rubble_desc:0 "「在撕裂俄羅斯的慘烈轟炸之後，新政府開始評估其處境。他們對自身事務挖掘得越深，情況就越糟糕。」"
 EUR_Britannian_Illusions:0 "「收網」"
 EUR_Britannian_Illusions_desc:0 "「我們已經到處部署了我們的特工和情報人員。現在只需等待有魚兒上鉤。」"
 EUR_The_Men_From_PENDRAGON:0 "「來自潘德拉根的人」"
 EUR_The_Men_From_PENDRAGON_desc:0 "「隨著外國間諜被拘留，是時候看看他們在俄羅斯做什麼了。葉爾茨一直渴望給這些人一點顏色看看，那就讓他去吧。」"
 EUR_The_Space_Connection:0 "「太空聯繫」"
 EUR_The_Space_Connection_desc:0 "「在崩練之前，俄羅斯最大的寶藏是它的太空計劃。作為我們唯一比歐洲人做得更好的事情，它是我們國家歷史上守衛最嚴密的秘密。現在，我們最偉大的成就將成為我們的未來。」"
 EUR_Reeling_In_Their_Dirty_Laundry:0 "「抖出他們的骯髒秘密」"
 EUR_Reeling_In_Their_Dirty_Laundry_desc:0 "「我們必須將不列顛尼亞人從祖國清除出去。我們絕不能再讓他們的特工犯下像在鄂霍次克那樣令人髮指的暴行！」"
 EUR_Ace_in_the_hole:0 "「底牌」"
 EUR_Ace_in_the_hole_desc:0 "「現在我們知道了我們的處境，是時候決定我們新生國家該走哪條路了。是與我們熟知的魔鬼打交道更好，還是與我們不了解的魔鬼打交道更好？」"
 EUR_Finding_alternatives:0 "「尋找替代方案」"
 EUR_Finding_alternatives_desc:0 "「不列顛尼亞造成了我們所有的問題，並殺害了我們成千上萬的同胞。現在我們因為他們而陷入了內戰。讓我們通過尋找樂於給他們找麻煩的盟友，來凸顯他們的失敗。」"
 EUR_Britannians_proposal:0 "「來自不列顛尼亞的支持」"
 EUR_Britannians_proposal_desc:0 "「我們無法挽回已經發生的事情，那麼為什麼不盡力而為呢？我們已經向不列顛尼亞人發送了信息，現在希望他們對我們的提議感興趣。」"
 EUR_Britannian_ultimatum:0 "「不列顛尼亞最後通牒」"
 EUR_Britannian_ultimatum_desc:0 "「迎接即將抵達的不列顛尼亞大使的準備工作正在進行中。市民們正在臨時製作不列顛尼亞國旗來揮舞以歡迎我們的客人。但願不會有什麼意外等待著我們。」"
 EUR_Expand_north_trading_routes:0 "「擴大北部貿易路線」"
 EUR_Expand_north_trading_routes_desc:0 "「隨著新政府的運作，我們需要增加航運以將我們所需的一切運送到位，為第一次進攻做好準備。任何後勤短缺都將通過徵用民用運輸工具來彌補。」"
 EUR_Create_special_rights:0 "「為不列顛尼亞人創立特權」"
 EUR_Create_special_rights_desc:0 "「我們在這裡只有不到 50,000 人來建立這個該死的政府。如果我們要確保我們在歐陸的立足點，那麼我們需要從本土吸引志願軍。還有什麼比建立適當的法律激勵措施更好的方法呢？」"
 EUR_An_End_To_Madness:0 "「結束瘋狂」"
 EUR_An_End_To_Madness_desc:0 "「我們的補給線一團糟，我們的人手不足，而且由於憤怒的當地人，我們的陣地也暴露了。無論處境如何，維萊恩斯大公都下達了對社會主義者的進攻命令，以皇帝之名，我們絕不會失敗。」"
 EUR_Secure_First_Site:0 "「控制第一個站點」"
 EUR_Secure_First_Site_desc:0 "「正是俄羅斯的太空計劃將皇帝的意志吸引到了俄羅斯，現在是時候開始我們修復網絡的工作了。由於年久失修，許多東西都已損壞和丟失。是時候派工程師去第一個地點並評估損失了。」"
 EUR_Opening_Up_Data_Vaults:0 "「打開數據保險庫」"
 EUR_Opening_Up_Data_Vaults_desc:0 "「當發射台的維修工作正在進行時，控制中心卻是一片混亂。我們的一位工程師觸發了安全系統，導致了鎖定和敏感數據的清除。雖然丟失了許多東西，但如果我們行動迅速，我們可能仍然能夠恢復藍圖。」"
 EUR_Reengage_Cooling_Protocols:0 "「重新啟用冷卻協議」"
 EUR_Reengage_Cooling_Protocols_desc:0 "「當政府崩潰後，航天發射場被鎖定，其中一半遭到破壞，另一半陷入計算昏迷。我們的工程師說，如果我們能讓冷卻劑和推進劑設施重新上線，我們可能能夠強制重啟。」"
 EUR_Research_Anomaly:0 "項目：§RZorya§!"
 EUR_Research_Anomaly_desc:0 "我們的分析師已完全連接到航太發射場的網絡，並發現發射計劃與……等等……§R我們正在接收緊急傳輸，請稍候……§!"
 EUR_Call_Upon_The_OSI:0 "「召喚 O.S.I」"
 EUR_Call_Upon_The_OSI_desc:0 "「正是 O.S.I 將遠東贈予了我們，我們將通過他們來確保東方的安全。首先我們需要給予他們所需的東西。」"
 EUR_Cast_Wide_Net:0 "「漁民協議」"
 EUR_Cast_Wide_Net_desc:0 "「我們的海岸線和港口充斥著運抵的運輸工具。我們必須確保沒有間諜與我們的寶貴貨物藏在一起。」"
 EUR_Numbers_Stations:0 "「數字電台」"
 EUR_Numbers_Stations_desc:0 "「隨著 O.S.I 將利爪更深地探入西方，我們不能冒通信被妥協的風險。」"
 EUR_Getting_Rid_Of_Troublemakers:0 "「鞏固該地區」"
 EUR_Getting_Rid_Of_Troublemakers_desc:0 "「太久以來，當地的俄羅斯人都誤解了他們的新地位。有了足夠的宣傳和選擇性的消失，他們一定會意識到社會主義者是更大的威脅。」"
 EUR_Hope_They_Like_Chocolate:0 "行動：§R情人節§!"
 EUR_Hope_They_Like_Chocolate_desc:0 "「這些社會主義者相信他們那多麼光榮的理想，即人人生而平等……令人作嘔。讓我們瞄準他們最脆弱的群體，粉碎那個夢想。我想知道會有多少人存活下來？」"
 EUR_Bucket_and_Chair:0 "「水桶與椅子」"
 EUR_Bucket_and_Chair_desc:0 "「我們絕不向挑戰退縮，尤其是在獲取信息方面。如果我們需要打碎幾根骨頭或違反幾項條約，如果沒有人活著說出去，那又有什麼危害呢。」"
 EUR_Operation_Parasyte:0 "行動：§R寄生蟲§!"
 EUR_Operation_Parasyte_desc:0 "「O.S.I 已經把毒牙刺入了社會主義者體內。關鍵官員將死於看不見的毒藥，他們的補給線將在無情的突擊隊襲擊下崩潰，而他們的通信將被簡化為混亂的沉默。願他們嚎叫著落入歷史的塵埃之中……」"
 EUR_Guinevere_Support:0 "「桂妮薇兒的支持」"
 EUR_Guinevere_Support_desc:0 "「我們放下了尊嚴，向不列顛尼亞本土尋求更多支持；新任命的第一皇女桂妮薇兒·de·不列顛尼亞回應了我們的請求。她的努力令人欽佩，看看不列顛尼亞是否負擔得起給予我們更多支持，或者我們是否需要從各個地區獲得支持。」"
 EUR_Guinevere_Caring_Hand:0 "「桂妮薇兒的關懷之手」"
 EUR_Guinevere_Caring_Hand_desc:0 "「桂妮薇兒·de·不列顛尼亞決定，不列顛尼亞可以進一步支持我們的努力，她決定對我們的事務和工作投入新的濃厚興趣。以確保這項支持是完全值得的。」"
 EUR_Reach_Out_To_The_Proper_Areas:0 "「向各個地區尋求支持」"
 EUR_Reach_Out_To_The_Proper_Areas_desc:0 "「桂妮薇兒·de·不列顛尼亞決定，不列顛尼亞無法進一步支持我們的努力，至少不能完全由他們自己承擔，單是不列顛尼亞的成本和努力就太大了。相反，她慷慨地允許我們調用其他地區的資源，主要是那些激進化地區的資源。」"
 EUR_Prepare_for_prime_minister_visit:0 "「為第一皇女的到來做好準備」"
 EUR_Prepare_for_prime_minister_visit_desc:0 "「為了向第一皇女桂妮薇兒證明她的努力和支持沒有在我們身上白費，我們必須為她即將到來的訪問做準備。全力以赴將這個國家建設成為她的理想之一，讓她看著我們，看到她對不列顛尼亞本土的夢想。」"
 EUR_Creating_Okhotsk_settlement:0 "「建立鄂霍次克租界」"
 EUR_Creating_Okhotsk_settlement_desc:0 "「鄂霍次克港是我們的首都，但它仍然保留著舊俄羅斯的外貌。是時候改變外觀並進行現代化了，利用俄羅斯的人力和勞動力，我們將開始建立鄂霍次克租界。這標誌著我們致力於使歐洲不列顛尼亞與各個地區更加一致。」"
 EUR_Expand_industrial_district:0 "「擴建工業區」"
 EUR_Expand_industrial_district_desc:0 "「鄂霍次克租界的建設導致其缺乏一個合適的工業區，雖然還有其他更緊迫的事情，主要是出於行政目的的可能其他區域，但提高我們的工業能力對於回報不列顛尼亞的支持至關重要。」"
 EUR_Support_open_britannian_labs:0 "「開放不列顛尼亞研究實驗室」"
 EUR_Support_open_britannian_labs_desc:0 "「不列顛尼亞的科學家是世界上最優秀的科學家之一，如果我們開設本地研究實驗室讓他們在歐洲不列顛尼亞境內進行研究，我們可以從不列顛尼亞獲得更多的好感和支持，他們的知識將被極大地感激並用於幫助這個國家。」"
 EUR_Expand_administrative_district:0 "「擴建行政區」"
 EUR_Expand_administrative_district_desc:0 "「鄂霍次克租界的建設導致其缺乏一個合適的行政區和辦公室，雖然還有更緊迫的事情，如提高租界的工業能力，但擁有一個合適的行政區將使我們能夠妥善管理租界，這對於向不列顛尼亞維持外在形象至關重要。」"
 EUR_Better_region_organisation:0 "「更好的區域組織」"
 EUR_Better_region_organisation_desc:0 "「歐洲不列顛尼亞的區域組織管理仍然沿用舊的遠東臨時政府系統，這對我們來說等於沒有系統。我們的顧問和來自不列顛尼亞的建議為我們區域的組織提出了一個好得多的系統，如果實施，這將有效改善國家。」"
 EUR_Withdraw_all_lands_of_Russian_nobles:0 "「收回俄羅斯貴族的所有土地」"
 EUR_Withdraw_all_lands_of_Russian_nobles_desc:0 "「俄羅斯貴族在歐洲不列顛尼亞仍然擁有廣闊的土地，為了讓我們能夠有效改善國家，我們決定將先前由俄羅斯貴族持有的所有土地永久歸入國家所有。」"
 EUR_Nationalize_all_railroads_and_trains_in_region:0 "「將所有鐵路國有化」"
 EUR_Nationalize_all_railroads_and_trains_in_region_desc:0 "「在整個歐洲不列顛尼亞對於補給至關重要的鐵路被多方持有和擁有，這對於國家生存如此高度必要的東西來說是行不通的。我們將鐵路國有化，並將其牢牢控制在國家所有權中。」"
 EUR_Create_modern_excavation_company:0 "「建立一家現代化開採公司」"
 EUR_Create_modern_excavation_company_desc:0 "「歐洲不列顛尼亞富含可以被不列顛尼亞本土利用的資源，為了簡化和加速此類資源的開採和挖掘，是時候讓我們建立一家現代化的公司來接管挖掘工作了。」"
 EUR_Strengthen_the_proBrittanian_police:0 "「加強親不列顛尼亞的警察力量」"
 EUR_Strengthen_the_proBrittanian_police_desc:0 "「歐洲不列顛尼亞的許多警察仍然是那些在前領導層下在該國工作的人。這阻礙了我們的事業，相反，我們將致力於加強警察以使其更具親不列顛尼亞的傾向。」"
 EUR_Send_opposition_to_Kolima:0 "「反對派去度假了」"
 EUR_Send_opposition_to_Kolima_desc:0 "「歐洲不列顛尼亞有許多人強烈反對我們試圖推動的許多事情，有人建議了對他們的一個好用途。把他們送去度假，讓他們從一直以來的辛勤工作中好好休息一下，好讓我們在無反對的情況下工作。」"
 EUR_Clear_all_administration_from_Russians:0 "「驅逐俄羅斯行政管理人員」"
 EUR_Clear_all_administration_from_Russians_desc:0 "「歐洲不列顛尼亞純粹俄羅斯控制的最後一些痕跡落在了行政管理人員身上，不列顛尼亞已經為這些人向我們提供了『替代者』，這樣我們終於可以驅逐俄羅斯人。從而獲得對國家行政管理更緊密的控制。」"
 EUR_The_long_awaited_meeting:0 "「期待已久的會面」"
 EUR_The_long_awaited_meeting_desc:0 "「與第一皇女桂妮薇兒的盛大會面，是我們迄今為止為改善國家所做的一切偉大努力的頂點。該國許多人，包括俄羅斯公民，都對這次會面感到非常焦慮，我們的維萊恩斯大公等待著與她交談，他都不記得上次見到她是什麼時候了。」"
 EUR_Use_doctrine_of_non_retreat:0 "「實施絕不後退學說」"
 EUR_Use_doctrine_of_non_retreat_desc:0 "「雖然我們的軍隊仍然支離破碎，但我們士兵的動力才是真正重要的。他們在面對社會主義者的反對時退縮，現在是時候對他們實施更嚴格的學說了。在這種學說下，他們不敢因懦弱而向敵人撤退，而是會頂著炮火直衝向前以爭取戰術勝利。」"
 EUR_Develop_plan_together_with_Brittanian_Headquarters:0 "「聯合戰術會議」"
 EUR_Develop_plan_together_with_Brittanian_Headquarters_desc:0 "「不列顛尼亞已與我們接觸，要求就我們的戰術召開會議，提供戰術和我們軍隊信息的交流，以便妥善準備我們的士兵，並準備準備為歐洲不列顛尼亞的勝利而戰的不列顛尼亞士兵。」"
 EUR_Propaganda_of_weakness_of_Socialists:0 "「反社會主義宣傳」"
 EUR_Propaganda_of_weakness_of_Socialists_desc:0 "「在我們的公民中，對我們的敵人西伯利亞人民共和國存在一些同情，主要是在我們的俄羅斯裔公民中，儘管少數不列顛尼亞公民也開始對社會主義者產生同情。這絕不能發生，歐洲不列顛尼亞已開始研發國家宣傳，部署給我們的公民，使他們完全團結起來對抗我們的敵人西伯利亞人民共和國。」"
 EUR_Holy_Order_of_Michael2:0 "「聖米迦勒騎士團」"
 EUR_Holy_Order_of_Michael2_desc:0 "「維萊恩斯大公需要的不僅僅是一支由俄羅斯士兵和不列顛尼亞志願者組成的軍隊，他需要願意為他戰鬥和犧牲的忠誠部隊。這群經驗豐富的部隊將成為他軍隊的矛頭。為此，他召請了不列顛尼亞的第二席騎士米凱勒·曼弗雷迪前來歐洲不列顛尼亞，並組建一支新的戰鬥力量——聖米迦勒騎士團。」"
 EUR_Our_own_genius2:0 "「我們自己的天才」"
 EUR_Our_own_genius2_desc:0 "「歐洲不列顛尼亞擁有人力、裝備以及來自不列顛尼亞的火力，以確保對俄羅斯的征服取得成功。然而，它目前還缺乏成功使用和維護這些裝備的技術專業知識。維萊恩斯大公相信他心中已經有了一位人選來帶領這項事業。不過，這意味著他必須回到祖國一趟，去造訪一間特定的牢房。」"
 EUR_An_army_worth_of_duke:0 "「配得上大公的軍隊」"
 EUR_An_army_worth_of_duke_desc:0 "「我們的維萊恩斯大公因其軍事才能和策略而在整個不列顛尼亞聞名遐邇。他繼續將這些才能帶到了歐洲不列顛尼亞，而鑑於我們的軍事和軍隊處於糟糕的狀態，現在是時候提升這支軍隊，使其配得上由我們大公所領導了。」"
 EUR_Claws_of_Britannia:0 "「不列顛尼亞之爪」"
 EUR_Claws_of_Britannia_desc:0 "「儘管不列顛尼亞向我們派遣了一些由舊型號和機體組成的Knightmare師，且僅有勉強足夠維修和運作它們的設備。但現在不列顛尼亞已向我們完全開放了這些機體，向我們送來了他們最新型號的技術和研究，以確保我們能使用不列顛尼亞之爪來對抗我們的敵人。」"
 EUR_Teach_Russians_to_cooperate_with_Knightmer_troops:0 "「俄羅斯人協同Knightmare作戰」"
 EUR_Teach_Russians_to_cooperate_with_Knightmer_troops_desc:0 "「我們的俄羅斯士兵不得不面對與他們從未見過的全新Knightmare機體並肩作戰的情況，正如預期的那樣，這在我們軍隊內部引發了問題，戰略和戰術由於這些新師的加入而被打亂。不列顛尼亞為我們提供了一個訓練大綱，這應該能妥善教授我們的其餘士兵如何協同我們的Knightmare作戰。」"
 EUR_Monthly_deliveries:0 "「每月交付」"
 EUR_Monthly_deliveries_desc:0 "「不列顛尼亞已經意識到，鑑於他們迄今為我們提供的人力、技術和研究，為了讓我們能夠繼續利用這一切，我們需要這一切設備的穩定供應。在我們能夠自己妥善製造這些之前，第一皇女吉妮薇爾已承諾每月向我們提供物資，直到我們的鬥爭結束。」"
 EUR_Wings_of_Emperor:0 "「皇帝之翼」"
 EUR_Wings_of_Emperor_desc:0 "「迄今為止，歐洲不列顛尼亞一直缺乏任何像樣的空軍，僅有少數空軍基地分布在遠東地區，且幾乎沒有製造任何航空器的手段，空軍一直處於擱置狀態。現在不再如此了，不列顛尼亞向我們送來了許多他們未曾參與太多戰鬥的備用航空器，皇帝之翼已為我們降臨。」"
 EUR_Best_aces:0 "「最頂尖的王牌」"
 EUR_Best_aces_desc:0 "「由於沒有空軍，我們無法培訓太多（如果有的話）飛行員。這似乎是一個巨大的錯誤，我們的人民對天空有著天然的親和力。隨著全新不列顛尼亞飛機的到來，他們現在能夠展現他們的技能，成為俄羅斯最頂尖的一些王牌飛行員。」"
 EUR_Recruit_honorable_britannians_from_areas:0 "「招募名譽不列顛尼亞人」"
 EUR_Recruit_honorable_britannians_from_areas_desc:0 "「我們的軍隊一直處於混亂之中，由俄羅斯士兵和不列顛尼亞志願者共同組成，缺乏任何核心。我們可以向各個「區」發出請求，讓他們自願為我們提供一些名譽不列顛尼亞人，以構成我們軍隊的核心。」"
 EUR_Asking_areas_for_help:0 "「向各區請求協助」"
 EUR_Asking_areas_for_help_desc:0 "「隨著各轄區的名譽不列顛尼亞人加入我們的軍隊，我們需要更多補給來維持他們及其裝備。我們再次呼籲各轄區向我們提供援助，運送他們自己的物資和船運，以幫助我們保持士兵的戰鬥力。」"
 EUR_Invite_advisor:0 "「邀請戰地專家」"
 EUR_Invite_advisor_desc:0 "「我們的軍隊並不缺少精通戰爭的軍官和士兵，特別是現在利用了各區的名譽不列顛尼亞人，這擴大了我們軍隊的技能範圍。但邀請一位戰地專家可以進一步幫助精煉我們的軍隊。」"
 EUR_Use_experience_of_war_in_rough_terrain:0 "「穿行荒野」"
 EUR_Use_experience_of_war_in_rough_terrain_desc:0 "「隨著我們的軍隊現在有很大一部分核心由來自各區的名譽不列顛尼亞人組成，這帶來了一個意想不到的好處。由於各區地形和環境多樣，這些名譽不列顛尼亞人士兵非常擅長在各種地形中行軍。這加快了我們軍隊的移動速度。」"
 EUR_Invite_insructors_from_honorable_britannia_academies:0 "「邀請名譽不列顛尼亞人教官」"
 EUR_Invite_insructors_from_honorable_britannia_academies_desc:0 "「雖然我們歐洲不列顛尼亞軍隊的核心現在由名譽不列顛尼亞人組成，但我們軍隊的其餘部分也可以接受一些名譽不列顛尼亞人成為士兵所經歷的訓練。我們將召集並邀請一些教官，以更好地準備我們的整支軍隊。」"
 EUR_Invite_foreign_legion:0 "「請求外國軍團」"
 EUR_Invite_foreign_legion_desc:0 "「從其他地區抽調的名譽不列顛尼亞人核心為我們軍隊的軍事能力提供了巨大提升，但許多人認為我們仍需要更多力量才能贏得這場戰爭。我們將向其他地區發出請求，讓他們派遣軍團來協助我們的事業。」"
 EUR_Scrapping_barrel:0 "「行省援助」"
 EUR_Scrapping_barrel_desc:0 "「歐洲不列顛尼亞的資源和經濟遠遠落後於不列顛尼亞的其餘部分，甚至落後於各個「區」。基於這一認知，我們將開始與其他地區展開談判，以獲取更多經濟援助，使我們能利用他們的全力支持，將自己建設成一個配得上不列顛尼亞之名的國家。」"
 EUR_Organise_volunteers_from_Area_3_and_7:0 "「組織來自4區和8區的「志願者」」"
 EUR_Organise_volunteers_from_Area_3_and_7_desc:0 "「4區和8區因其龐大的「數字人」勞動力而聞名遐邇。我們派往這兩個地區的外交官已成功共同組織了來自該勞動力的「志願者」前來歐洲不列顛尼亞，以幫助提升我們的工業。」"
 EUR_Use_them_in_factories:0 "「安置他們進工廠」"
 EUR_Use_them_in_factories_desc:0 "「來自4區 and 8區的數字人擁有多樣的工作技能，使他們能靈活適應各種崗位。但將這些工人的大部分集中到我們的工廠會好得多，以此增加我們的產量。」"
 EUR_Asking_for_more_factory_equipment:0 "「請求更多工廠設備」"
 EUR_Asking_for_more_factory_equipment_desc:0 "「雖然我們的外交官能夠安排4區和8區的「志願者」，但他們忘記請求一些工廠設備以便妥善利用他們的勞動力。我們已迅速糾正了這一錯誤，預計他們的設備這幾天就會送達。」"
 EUR_Use_them_on_the_railroads:0 "「讓他們修建鐵路」"
 EUR_Use_them_on_the_railroads_desc:0 "「我們從4區和8區借調的工人最好用來解決我們的補給問題，讓他們在整個歐洲不列顛尼亞的鐵路和地方補給樞紐工作，以使我們的士兵和公民能夠繼續獲得溫飽。」"
 EUR_Improve_logistics_chains:0 "「改善物流鏈」"
 EUR_Improve_logistics_chains_desc:0 "「自第一天起，歐洲不列顛尼亞的物流對我們來說就是一場噩夢，許多人和部門都在努力理解我們當前的系統以便加以改進。來自4區和8區一些更專業的「志願者」所帶來的新視角，可以大大改善這一狀況。」"
 EUR_Steel_of_Area_6:0 "「6區的鋼鐵」"
 EUR_Steel_of_Area_6_desc:0 "「不列顛尼亞的6區以其龐大的鋼鐵儲量及高質量的品質而聞名。我們的外交官已成功訪問了該地區，並確保使用他們的鋼鐵來為我們國家未來的發展提供動力。」"
 EUR_Use_scientists_from_New_Anglia:0 "「新安格利亞的科學家」"
 EUR_Use_scientists_from_New_Anglia_desc:0 "「新安格利亞是不列顛尼亞的科學樞紐，聚集了許多過去和現在的偉大科學家。他們在不列顛尼亞的許多科學進步中取得了突破，並負責了Knightmare機體的研發。我們已成功確保了他們在我們自己專案的努力中提供科學援助。」"
 EUR_Use_industry_of_Area_2:0 "「比我們要求的更多」"
 EUR_Use_industry_of_Area_2_desc:0 "「在確保新安格利亞的科學援助的同時，我們的外交官有點操之過急，向他們索要了更多用於我們國家的資源，主要涉及新安格利亞持有的櫻石儲備。雖然我們只期望得到那些儲備的一小部分，但他們卻把全部都送給了我們，對我們的事業寄予了極大的信心。」"
 EUR_a_meal_for_every_household:0 "「每家每戶的溫飽」"
 EUR_a_meal_for_every_household_desc:0 "「由於與西伯利亞人民共和國正在進行的戰爭，我們的許多公民一直在工作，同時只有極少物資來維持生計，呼籲各區向我們提供一些用於災難救援的資金，我們可以使用這筆錢來確保在戰爭結束前每家每戶都能吃飽。」"
 EUR_relocate_dissidents_up_north:0 "「將異見人士遷往北方」"
 EUR_relocate_dissidents_up_north_desc:0 "「面對我們與西伯利亞人民共和國的戰爭，我們的城市由於公民變得更加喧鬧和叛逆而面臨許多問題，將這些異見人士安置到不太可能引起混亂的地方，可以大大改善我們城市的局勢。」"
 EUR_bring_in_foreign_administrators:0 "「引進外籍行政官員」"
 EUR_bring_in_foreign_administrators_desc:0 "「我們由俄羅斯人和不列顛尼亞人共同運作的行政機構為我們帶來了許多問題，以至於他們中幾乎沒有人知道解決這一局勢的方法。這迫使我們依靠來自各區和不列顛尼亞本國的行政官員來引導我們重回正軌。」"
 EUR_Advance_our_own_economy:0 "「推進我們自己的經濟」"
 EUR_Advance_our_own_economy_desc:0 "「來自各區的支持徹底改革了我們的經濟，推動歐洲不列顛尼亞從幾乎沒有工業轉變為工廠轟鳴運轉以支持我們的戰爭努力，如果沒有各區的援助，這一切都無法實現。僅憑他們就使我們得以推進我們自己的經濟，這將使我們能夠在不久的將來支持他們。」"
 EUR_guinevere_east_secured:0 "「東方已安全」"
 EUR_guinevere_east_secured_desc:0 "「最後一滴西伯利亞人的鮮血已流盡，西伯利亞人民共和國化為廢墟。歐洲不列顛尼亞在這場戰爭中取得了勝利，這完全歸功於我們從第一皇女吉妮薇爾·德·不列顛尼亞那裡獲得的支持。隨著我們勝利的消息傳到潘德拉貢，吉妮薇爾可以放心，東方已安全無虞。」"
 EUR_guinevere_the_eiz_victorious:0 "「歐洲干涉依然存在」"
 EUR_guinevere_the_eiz_victorious_desc:0 "「當我們在東方浴血奮戰、拼死搏殺之時，歐洲干涉區和葉卡捷琳堡公國也一直在進行一場同樣艱苦的戰爭，結果只有歐洲支持的俄羅斯傀儡取得了勝利，而我們已開始為爭奪俄羅斯其餘部分的即將到來的戰爭做準備。吉妮薇爾一直在準備應對隨之而來的與歐洲的局勢。」"
 EUR_guinevere_tsar_continues_to_reign:0 "「沙皇繼續統治」"
 EUR_guinevere_tsar_continues_to_reign_desc:0 "「當我們在東方浴血奮戰、拼死搏殺之時，歐洲干涉區和葉卡捷琳堡公國也一直在進行一場同樣艱苦的戰爭，結果只有死守過去的國家取得了勝利。沙皇繼續統治，而我們已開始準備決定誰才真正配得上俄羅斯——是沙皇還是皇帝。」"
 EUR_guinevere_intervene_in_the_west:0 "「吉妮薇爾干涉西方」"
 EUR_guinevere_intervene_in_the_west_desc:0 "「歐洲干涉區與葉卡捷琳堡公國之間的戰爭已持續多年，雙方幾乎沒有取得任何進展。雙方都頑強地苟延殘喘，決心成為勝利者。吉妮薇爾向我們建議，我們可以打破他們戰爭的平衡以決定誰勝出，雖然我們自己還沒準備好這麼快就投入另一場戰爭，但我們完全可以輕易成為決定誰生誰死的關鍵力量。」"
