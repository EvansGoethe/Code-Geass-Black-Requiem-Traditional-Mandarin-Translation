 EUR_guinevere_eagles_cry_for_aid:0 "「鷹的求援之鳴」"
 EUR_guinevere_eagles_cry_for_aid_desc:0 ""
 EUR_guinevere_honorary_britannian_regimental_support:0 "「名譽不列顛尼亞人軍團支援」"
 EUR_guinevere_honorary_britannian_regimental_support_desc:0 ""
 EUR_guinevere_eagle_feeding:0 "「餵鷹」"
 EUR_guinevere_eagle_feeding_desc:0 ""
 EUR_guinevere_seize_the_bears_throat:0 "「鎖住熊的喉嚨」"
 EUR_guinevere_seize_the_bears_throat_desc:0 ""
 EUR_guinevere_carries_the_eagle:0 "「獅子載著鷹」"
 EUR_guinevere_carries_the_eagle_desc:0 ""
 EUR_guinevere_failings_of_democracy:0 "「民主的衰落」"
 EUR_guinevere_failings_of_democracy_desc:0 ""
 EUR_guinevere_death_of_european_intervention:0 "「歐洲干涉的覆滅」"
 EUR_guinevere_death_of_european_intervention_desc:0 ""
 EUR_guinevere_moscow_lay_in_ruin:0 "「莫斯科化為廢墟……」"
 EUR_guinevere_moscow_lay_in_ruin_desc:0 ""
 EUR_Schnizel_Support:0 "「白之皇子執政」"
 EUR_Schnizel_Support_desc:0 "「修奈傑爾已在不列顛尼亞贏得了皇帝的青睞。雖然海蘭德計畫將俄羅斯帶往他自己的方向，但在修奈傑爾的帝國中，他所能做的也僅有這麼多。」"
 EUR_By_Emperors_order:0 "「抹殺夢想」"
 EUR_By_Emperors_order_desc:0 "「當我們第一次踏上這片大陸時，人們眼中滿含希望地仰望著我們。現在，他們只不過是擋在我們路上的麻煩。如果他們不主動屈服，那我們就壓榨他們直到他們崩潰為止。」"
 EUR_In_memory_of_Russian_Empire:0 "「紀念俄羅斯帝國」"
 EUR_In_memory_of_Russian_Empire_desc:0 "「臨時政府的索羅金總統在遭到背叛之前，從未能親眼看見他的夢想實現。雖然我無法將他從命運中解救出來，但我依然可以拯救他的夢想。」"
 EUR_Attract_investment_from_British_nobles:0 "「不列顛尼亞貴族投資」"
 EUR_Attract_investment_from_British_nobles_desc:0 "「儘管歐洲不列顛尼亞資源豐富，但仍缺乏獨立繁榮所需的工業實力。但如果我們能吸引到合適的投資呢？通過向帝國的貴族敞開大門，我們就能確保建立持久基業所需的資金和專業知識。」"
 EUR_Schneizels_Playground:0 "「施奈澤爾的棋盤」"
 EUR_Schneizels_Playground_desc:0 "「修奈傑爾要求我們在帝國經濟中發揮我們的作用。如何發揮並不重要，重要的是不列顛尼亞要拿到他們的什一稅。」"
 EUR_Creating_trading_hub_port_in_Okhotsk:0 "「創建鄂霍次克貿易樞紐」"
 EUR_Creating_trading_hub_port_in_Okhotsk_desc:0 "「鄂霍次克不能僅僅作為不列顛尼亞商品的港口。如果我們將歐洲不列顛尼亞定位為一個帝國、歐盟和中華聯邦都可以自由貿易的中立樞紐，我們的國家肯定就能夠獨立自主。」"
 EUR_Free_trade:0 "「設立自由港」"
 EUR_Free_trade_desc:0 "「隨著處理日益增長的商品流動的基礎設施落實到位，是時候鞏固鄂霍次克作為貿易紐帶的角色了。通過給予特別貿易豁免和特權，我們可以確保該港口吸引來自全球各個角落的商家。」"
 EUR_Britannian_Urban_Planning:0 "「不列顛尼亞城市規劃」"
 EUR_Britannian_Urban_Planning_desc:0 "「歐洲不列顛尼亞的市區面臨著長期存在的問題，從破敗的房屋到陳舊的基礎設施。引進不列顛尼亞的建造技術將解決這些問題，改善俄羅斯當地人的生活條件，並展示我們對他們福祉的承諾。」"
 EUR_Modernize_Okhotsk:0 "「現代化鄂霍次克」"
 EUR_Modernize_Okhotsk_desc:0 "「雖然鄂霍次克的港口已準備好進行貿易，但這座城市還需要仔細關注。翻新城市景觀並加強公共服務將提高生活水平，確保不列顛尼亞人被視為對城市成長的投入者，而不僅僅是外來者。」"
 EUR_Easing_of_customs_duties_from_Areas:0 "「放寬各區的關稅」"
 EUR_Easing_of_customs_duties_from_Areas_desc:0 "「為了鞏固我們的地位，我們將放寬對歐洲不列顛尼亞所生產商品的關稅。雖然我們在全球保持中立，但我們的優先順序是明確的：帝國第一。鼓勵對鋼鐵和石油的投資也將確保我們擁有支持不列顛尼亞需求所需的資源。」"
 EUR_Form_the_TPTA:0 "「成立跨太平洋貿易協會」"
 EUR_Form_the_TPTA_desc:0 "「為了鞏固我們的地位並確保自由貿易，我們將成立跨太平洋貿易協會（TPTA）。該協定保證簽約國的船隻免受不列顛尼亞海軍的沒收，同時將歐洲不列顛尼亞定位為一個值得信賴的全球合作夥伴。」"
 EUR_Leasing_out_our_coastline:0 "「出租我們的海岸線」"
 EUR_Leasing_out_our_coastline_desc:0 "「雖然歐洲不列顛尼亞目前不需要艦隊，但我們的海軍設施完全有能力為不列顛尼亞的太平洋艦隊提供服務。我們將提供停泊權和維修服務，以換取妥善的補償。」"
 EUR_Establish_the_Okhotsk_Drydocks:0 "「建立鄂霍次克乾船塢」"
 EUR_Establish_the_Okhotsk_Drydocks_desc:0 "「隨著我們的港口現在具備了維修不列顛尼亞船隻的能力，下一步就是擴大我們的容量。通過將現有設施改造為維修而非建造，並在堪察加的彼得羅巴甫洛夫斯克建立一個子設施，我們可以分擔部分工作。」"
 EUR_Pulling_From_Land:0 "「開發土地」"
 EUR_Pulling_From_Land_desc:0 "「當真正的價值蘊藏在土壤之下時，為什麼要把資源浪費在當地的基礎設施上？每一盎司木材、每一粒礦石和每一蒲式耳農產品都將被運往國外，以支持帝國龐大的工業。」"
 EUR_Focus_on_jewerly_industry:0 "「擴大珠寶業」"
 EUR_Focus_on_jewerly_industry_desc:0 "「不列顛尼亞的財富不僅僅被原石所吸引。為了滿足需求，我們將把資源生產擴展到礦山之外。新的貴重金屬礦床將被發現，為不列顛尼亞精英打造的精美戒指、項鍊和首飾的製作提供原料。」"
 EUR_Reopening_old_mineshafts:0 "「重啟舊礦井」"
 EUR_Reopening_old_mineshafts_desc:0 "「這些礦山從未枯竭；當工人缺乏深挖的工具時，它們就被廢棄了。配備合適的設備後，鑽石、黃金和其他奢侈品礦脈正等待著開採。雖然在戰場上毫無用處，但這些寶藏對不列顛尼亞的市場來說是完美的。」"
 EUR_Establish_relations_with_Brittanian_nobles:0 "「朝中有人」"
 EUR_Establish_relations_with_Brittanian_nobles_desc:0 "「維萊恩斯大公曾是不列顛尼亞貴族中的小人物，如今卻擁有了舉足輕重的影響力。隨著奢侈品從他的領地源源不斷地流出，帝國本國精英的輿論已開始轉變，以前的懷疑者現在都渴望為了利益而支持他。」"
 EUR_Perfecting_our_Craft:0 "「完善我們的工藝」"
 EUR_Perfecting_our_Craft_desc:0 "「歐洲不列顛尼亞長期以來因其豐富的資源而聞名，但現在是時候以其產品的品質而為人所知了。通過精煉我們的技術並打造帝國中一些最精美的珠寶，我們將以不列顛尼亞一貫的方式追求卓越。」"
 EUR_Establishing_our_Brand:0 "「建立我們的品牌」"
 EUR_Establishing_our_Brand_desc:0 "「即使是最精美的珠寶，其價值也取決於其背後的品牌。為了真正鞏固我們在市場上的地位，我們必須打造一個能打動帝國及其他地區的品牌。我們必須向世界展示，我們的商品既是地位的象徵，也是聲望的體現。」"
 EUR_Oil_for_Britannia:0 "「不列顛尼亞的石油」"
 EUR_Oil_for_Britannia_desc:0 "「這片土地蘊藏著未開發的財富，石油是開啟這些財富的鑰匙。隨著鑽探的加劇，「黑金」不僅通過出口帶來財富，還為我們的軍事開拓提供了戰略價值。」"
 EUR_Modernizing_to_Meet_Their_Needs:0 "「滿足他們的需求」"
 EUR_Modernizing_to_Meet_Their_Needs_desc:0 "「歐洲不列顛尼亞已與帝國的資源需求對接，宰修奈傑爾已要求增加產量。來自本國的專家將被派遣以優化開採方法，在不造成不必要困苦的情況下提高產量。」"
 EUR_Economic_Stability_Secured:0 "「穩定的經濟」"
 EUR_Economic_Stability_Secured_desc:0 "「當不列顛尼亞最初取得控制權時，經濟缺乏抵禦社會主義者所需的力量。希望曾非常渺茫，但我們已成功穩定了曾經崩潰的系統。從這裡開始，它只會變得更強大。」"
 EUR_An_Area_in_All_but_Name:0 "「名副其實的區」"
 EUR_An_Area_in_All_but_Name_desc:0 "「俄羅斯的局勢與不列顛尼亞最近征服的許多地區並無二致。如果我們採取使那些「區」取得成功的政策，那麼我們無疑也會成功。畢氣，這一切都歸結於獲取合適的勞動力。」"
 EUR_Ensuring_material_transport:0 "「確保物資運輸」"
 EUR_Ensuring_material_transport_desc:0 "「由於我們自己可用的健全工人如此之少，解決方案就在被征服者中。從體弱的老人到那些敢於公開反對我們統治的人，鐵路將不斷向前延伸。當有人拿著槍頂著你的後背時，人能做出的事確實令人驚嘆。」"
 EUR_Britannia_Welfare_program:0 "「不列顛尼亞福利計畫」"
 EUR_Britannia_Welfare_program_desc:0 "「在一個被征服者人數遠超統治者的土地上，我們的力量在於加強我們自身。我們必須為國內的同胞提供服務的機會，不論是作為監督者、執法者還是行政官員。我們本國的閒置人力將成為我們國家的鐵拳。」"
 EUR_Expanding_Neryungri_area:0 "「擴大雅庫茨克地區」"
 EUR_Expanding_Neryungri_area_desc:0 "「雅庫茨克正面臨住房短缺，而且沒有一處符合我們同胞所期望的標準。為了防止我們的兄弟同胞進一步憤怒，當地土著將專門為他們建造一個新的城市街區。這座城市將擴建以服務我們的需求，而不是他們的需求。」"
 EUR_Signs_of_growth:0 "「增長的跡象」"
 EUR_Signs_of_growth_desc:0 "「在來自本國的最新一波移民中，僅有少數低階貴族，然而，他們已經開始壟斷經濟了。這是一個令人欣慰的景象，看著當地人在苦苦掙扎，而我們在他們飢餓的眼前建立起我們的帝國。」"
 EUR_Protect_our_investment:0 "「保護我們的投資」"
 EUR_Protect_our_investment_desc:0 "「既然我們已將雅庫茨克建成了我們人民的家園，其安全就是不容談判的。我們將挖掘戰壕、部署火炮線，並建立一個巨大的防禦網絡來包圍這座城市。代價無關緊要，因為我們的人民必須不惜一切代價得到保護。」"
 EUR_Revitalize_Neryungri_Airfields:0 "「重振雅庫茨克機場」"
 EUR_Revitalize_Neryungri_Airfields_desc:0 "「雅庫茨克機場是靠近社會主義者前線的關鍵物流樞紐。擴建計畫已經就緒，為雅庫茨克迎接來自整個帝國的遊客來見證不列顛尼亞卓越主義的閃亮燈塔的那一天做準備。」"
 EUR_Leasing_to_Military:0 "「出租給軍方」"
 EUR_Leasing_to_Military_desc:0 "「由於機場的民用交通受到嚴重限制，將其出租用於軍事用途是唯一合情合理的做法。雖然我們在戰鬥機方面沒有太多裝備，但它們將是減輕我們軍需官負擔的關鍵。」"
 EUR_Schnizel_East_Secured:0 "「東方已安全」"
 EUR_Schnizel_East_Secured_desc:0 ""
 EUR_schneizel_crushing_the_eiz:0 "「摧毀歐洲干涉區」"
 EUR_schneizel_crushing_the_eiz_desc:0 ""
 EUR_schneizel_down_with_the_tsar:0 "「打倒沙皇」"
 EUR_schneizel_down_with_the_tsar_desc:0 ""
 EUR_Restoring_discipline_in_army1:0 "「恢復軍隊紀律」"
 EUR_Restoring_discipline_in_army1_desc:0 "「軍隊四分五裂，分裂在俄羅斯本土官兵與不列顛尼亞指揮官之間。為了取得勝利，我們必須統一這支分裂的力量，鍛造出一支凝聚力強、紀律嚴明且只服務於一個目標——絕對勝利的軍隊。」"
 EUR_Restoring_discipline_in_army:0 "「恢復軍隊紀律」"
 EUR_Restoring_discipline_in_army_desc:0 "「軍隊四分五裂，分裂在俄羅斯本土官兵與不列顛尼亞指揮官之間。為了取得勝利，我們必須統一這支分裂的力量，鍛造出一支凝聚力強、紀律嚴明且只服務於一個目標——絕對勝利的軍隊。」"
 EUR_New_officier_corps1:0 "「新型軍官團」"
 EUR_New_officier_corps1_desc:0 "「通過將俄羅斯軍官融入不列顛尼亞體系，我們將創造出一種新型的領導層。正如聖達爾文所設想的那樣，它能發揮兩者的優勢。」"
 EUR_New_officier_corps:0 "「新型軍官團」"
 EUR_New_officier_corps_desc:0 "「通過將俄羅斯軍官融入不列顛尼亞體系，我們將創造出一種新型的領導層。正如聖達爾文所設想的那樣，它能發揮兩者的優勢。」"
 EUR_Ask_more_generals1:0 "「召集老近衛軍」"
 EUR_Ask_more_generals1_desc:0 "「有時，老方法才是最好的。通過引進浸淫於傳統戰術的經驗豐富的不列顛尼亞將領，我們將用他們經受過時間檢驗的戰略來增強我們的隊伍。他們的方法或許死板，但他們在戰場上的成效毋庸置疑。」"
 EUR_Using_Britannia_experience1:0 "「利用不列顛尼亞軍國主義」"
 EUR_Using_Britannia_experience1_desc:0 "「在老近衛軍的掌舵下，我們將把我們的軍隊重塑為一支追求無情速度與精準度的力量。我們的部隊將迅速出擊，直擊要害。勝利將不僅僅依靠蠻力取得，而是通過機動、奇襲和利用他們的失誤。」"
 EUR_Invite_Communications_officers1:0 "「邀請通信軍官」"
 EUR_Invite_Communications_officers1_desc:0 "「隨著我們的部隊現在以新的規模運作，有效的溝通至關重要。老近衛軍或許能帶來他們的戰略，但如果沒有協調這些戰略的手段，那些計畫註定會失敗。」"
 EUR_Ask_more_generals:0 "「召集老近衛軍」"
 EUR_Ask_more_generals_desc:0 "「有時，老方法才是最好的。通過引進浸淫於傳統戰術的經驗豐富的不列顛尼亞將領，我們將用他們經受過時間檢驗的戰略來增強我們的隊伍。他們的方法或許死板，但他們在戰場上的成效毋庸置疑。」"
 EUR_Using_Britannia_experience:0 "「利用不列顛尼亞軍國主義」"
 EUR_Using_Britannia_experience_desc:0 "「在老近衛軍的掌舵下，我們將把我們的軍隊重塑為一支追求無情速度與精準度的力量。我們的部隊將迅速出擊，直擊要害。勝利將不僅僅依靠蠻力取得，而是通過機動、奇襲和利用他們的失誤。」"
 EUR_Invite_Communications_officers:0 "「邀請通信軍官」"
 EUR_Invite_Communications_officers_desc:0 "「隨著我們的部隊現在以新的規模運作，有效的溝通至關重要。老近衛軍或許能帶來他們的戰略，但如果沒有協調這些戰略的手段，那些計畫註定會失敗。」"
 EUR_Modern_vehicle_of_victory1:0 "「現代勝利載具」"
 EUR_Modern_vehicle_of_victory1_desc:0 "「Knightmare機甲不僅僅是機器；它們是我們帝國不可阻擋之力量的證明，預示著我們統治時代的到來。它們的速度、精準度和不可阻擋的力量將繼續重寫戰鬥規則。」"
 EUR_Modern_vehicle_of_victory:0 "「現代勝利載具」"
 EUR_Modern_vehicle_of_victory_desc:0 "「Knightmare機甲不僅僅是機器；它們是我們帝國不可阻擋之力量的證明，預示著我們統治時代的到來。它們的速度、精準度和不可阻擋的力量將繼續重寫戰鬥規則。」"
 EUR_Holy_Order_of_Michael1:0 "「聖米迦勒騎士團」"
 EUR_Holy_Order_of_Michael1_desc:0 "「維萊恩斯大公需要的不僅僅是一支由俄羅斯士兵和不列顛尼亞志願者組成的軍隊，他需要願意為他戰鬥和犧牲的忠誠部隊。這群經驗豐富的部隊將成為他軍隊的矛頭。為此，他召請了不列顛尼亞的第二席騎士米凱勒·曼弗雷迪前來歐洲不列顛尼亞，並組建一支新的戰鬥力量——聖米迦勒騎士團。」"
 EUR_Holy_Order_of_Michael:0 "「聖米迦勒騎士團」"
 EUR_Holy_Order_of_Michael_desc:0 "「維萊恩斯大公需要的不僅僅是一支由俄羅斯士兵和不列顛尼亞志願者組成的軍隊，他需要願意為他戰鬥和犧牲的忠誠部隊。這群經驗豐富的部隊將成為他軍隊的矛頭。為此，他召請了不列顛尼亞的第二席騎士米凱勒·曼弗雷迪前來歐洲不列顛尼亞，並組建一支新的戰鬥力量——聖米迦勒騎士團。」"
 EUR_Conduct_grueling_exercises1:0 "「開始實彈演習」"
 EUR_Conduct_grueling_exercises1_desc:0 "「我們的士兵將在殘酷的現實中而非演練中面對戰火。實彈演習將如雨般降臨在他們身上。這是榮耀的代價，是服務於不列顛尼亞的代價。」"
 EUR_Conduct_grueling_exercises:0 "「開始實彈演習」"
 EUR_Conduct_grueling_exercises_desc:0 "「我們的士兵將在殘酷的現實中而非演練中面對戰火。實彈演習將如雨般降臨在他們身上。這是榮耀的代價，是服務於不列顛尼亞的代價。」"
 EUR_Ask_homeland1:0 "「引進挖掘機」"
 EUR_Ask_homeland1_desc:0 "「未開採櫻石礦脈的傳言已傳入我們耳中，現在是時候將其變為現實了。隨著來自本國的強大挖掘機械的抵達，我們將破開大地，將這一寶貴資源帶到地面。」"
 EUR_Ask_homeland:0 "「引進挖掘機」"
 EUR_Ask_homeland_desc:0 "「未開採櫻石礦脈的傳言已傳入我們耳中，現在是時候將其變為現實了。隨著來自本國的強大挖掘機械的抵達，我們將破開大地，將這一寶貴資源帶到地面。」"
 EUR_Area_11_deposits1:0 "「向各區採購」"
 EUR_Area_11_deposits1_desc:0 "「即使我們各自獨立，帝國的觸角依然延伸得很遠。通過從其中一個「區」確保鋼鐵和關鍵材料，我們確保了我們自己的成長。他們的資源將流入我們手中，為我們的工業提供燃料，並滿足我們的戰爭機器。」"
 EUR_Area_11_deposits:0 "「向各區採購」"
 EUR_Area_11_deposits_desc:0 "「即使我們各自獨立，帝國的觸角依然延伸得很遠。通過從其中一個「區」確保鋼鐵和關鍵材料，我們確保了我們自己的成長。他們的資源將流入我們手中，為我們的工業提供燃料，並滿足我們的戰爭機器」"
 EUR_Our_own_genius1:0 "「我們自己的天才」"
 EUR_Our_own_genius1_desc:0 "「歐洲不列顛尼亞擁有人力、裝備以及來自不列顛尼亞的火力，以確保對俄羅斯的征服取得成功。然而，它目前還缺乏成功使用和維護這些裝備的技術專業知識。維萊恩斯大公相信他心中已經有了一位人選來帶領這項事業。不過，這意味著他必須回到祖國一趟，去造訪一間特定的牢房。」"
 EUR_Our_own_genius:0 "「我們自己的天才」"
 EUR_Our_own_genius_desc:0 "「歐洲不列顛尼亞擁有人力、裝備以及來自不列顛尼亞的火力，以確保對俄羅斯的征服取得成功。然而，它目前還缺乏成功使用和維護這些裝備的技術專業知識。維萊恩斯大公相信他心中已經有了一位人選來帶領這項事業。不過，這意味著他必須回到祖國一趟，去造訪一間特定的牢房。」"
 EUR_Cheap_and_fast_firepower:0 "「廉價且快速的火力」"
 EUR_Cheap_and_fast_firepower_desc:0 "「為了確保我們的勝利，我們將依靠集中裝甲部隊的不可阻擋的力量。動員快速、具性價比且無情，坦克和機械化車輛將構成我們軍事力量的骨幹。」"
 EUR_Using_experience_of_the_Great_War:0 "「不列顛尼亞坦克手志願者」"
 EUR_Using_experience_of_the_Great_War_desc:0 "「我們請求的來自不列顛尼亞的坦克手志願者已經抵達，這將極大地補充我們的力量。」"
 EUR_Oil_for_our_maneuvers:0 "「現代化我們的部隊」"
 EUR_Oil_for_our_maneuvers_desc:0 "「從俄羅斯共和國時期開始，我們的坦克、火炮甚至是士兵都經歷過更好的歲月。現在是時候進行現代化改造了，這需要不列顛尼亞及其軍事工業複合體的多方協助。」"
 EUR_Improve_outdated_recharge_system:0 "「超載坦克砲管」"
 EUR_Improve_outdated_recharge_system_desc:0 "「鑑於不列顛尼亞坦克砲管的製造方式結合了我們其餘武器中經受過考驗的成熟馬達設計。對其進行超載既是從我們的射擊中獲得更多制動能力的有效方法，但也對坦克和乘員帶來了其自身的風險。」"
 EUR_Brittanian_Crew_Training_standards:0 "「不列顛尼亞乘員訓練標準」"
 EUR_Brittanian_Crew_Training_standards_desc:0 "「我們坦克乘員的訓練標準一直依賴舊的俄羅斯共和國標準，這意味著這些標準充其量是過時的。而在最壞的情況下，這對士兵和戰爭努力都是危險的。是時候將這些標準更新為不列顛尼亞及其各區所期望的標準了。」"
 EUR_Present_from_Britannia:0 "「召集外籍志願者」"
 EUR_Present_from_Britannia_desc:0 "「雖然這有點超出了可以接受的常規，但可怕的境況需要採取果斷措施。全世界有許多士兵都渴望戰鬥，他們有可能會回應我們的援助呼籲。」"
 EUR_Death_from_sky:0 "「來自天空的死亡」"
 EUR_Death_from_sky_desc:0 "「在舊俄羅斯政府的廢墟中，我們將搜尋被遺忘已久的航空器殘骸。這些曾經令人驕傲的機器，現在只不過是空殼，將被復活並重新裝備，為皇帝效力。」"
 EUR_Learn_from_Brittanian_experience:0 "「挖角不列顛尼亞教官」"
 EUR_Learn_from_Brittanian_experience_desc:0 "「我們的部隊已準備好擁抱天空，但為此，我們需要只有不列顛尼亞最優秀人才才能提供的專業知識。通過從不列顛尼亞挖角最熟練的教官，我們將確保我們的空軍不僅得到訓練，而且被塑造成帝國最偉大力量的形象。」"
 EUR_Invite_Britannian_aces:0 "「來自國外的貨物」"
 EUR_Invite_Britannian_aces_desc:0 "「一支無標記船隻組成的艦隊已停靠在我們的港口。雖然我們的軍需官通常會處理此類事務，但大公已親自前去調查。也許大公的影響力比我們想像的還要大？」"
 EUR_Develop_our_own_doctrine:0 "「發展我們自己的學說」"
 EUR_Develop_our_own_doctrine_desc:0 "「我們的空軍絕不能再遵循過去陳舊的戰術。憑藉著不屈的速度與精準度，我們將主宰天空，斬殺任何敢於挑戰我們的敵人。」"
 EUR_Asking_Britannia_about_Air_Commander:0 "「空軍元帥的崛起」"
 EUR_Asking_Britannia_about_Air_Commander_desc:0 "「隨著我們重新聚焦於空軍，在飛行員和空中指揮官中湧現出了一顆新星——年輕的鄧肯·霍爾特。他的戰鬥能力和想法取得了巨大的成功，以至於他晉升為空軍元帥，希望能繼續他的偉大上升軌跡。」"
 EUR_Rely_on_young_Russian_officers:0 "「依靠年輕的俄羅斯軍官」"
 EUR_Rely_on_young_Russian_officers_desc:0 "「我們必須記住，這不僅僅是一個不列顛尼亞人的國家，也是一個俄羅斯人的國家。俄羅斯人在為他們的家園拼死搏殺，如果我們更多地依靠我們年輕的俄羅斯軍官而不是不列顛尼亞軍官的行動，我們可能憑藉主場優勢擁有更好的獲勝機會。」"
 EUR_Our_own_tactics:0 "「我們自己的戰術」"
 EUR_Our_own_tactics_desc:0 "「我們士兵的獨立性一直是爭論的話題，有些人認為如果沒有命令他們就不應該行動，另一些人則認為每個班都應該由隨心所欲的獨立思考者組成。在這兩者之間的抉擇將塑造我們軍隊的前景和運作方式。」"
 EUR_Rely_On_Infantrymen:0 "「依靠士兵」"
 EUR_Rely_On_Infantrymen_Null:0 "「每個士兵都是一個有想法、有經驗、有戰鬥動力的人。如果我們依靠我們的士兵為我們的軍隊做出更大的決定，我們最終將得到一支不可預測的戰鬥力量，我們的敵人將很難應對。」"
 EUR_Rely_On_Officers:0 "「依靠軍官」"
 EUR_Rely_On_Officers_desc:0 "「軍官們聰明、紀律嚴明且訓練有素。我們應該依靠他們來做最高決定和最低決定，憑藉我們對軍隊領導層的信心，我們終將脫穎而出。」"
 EUR_Improve_Army_Rations:0 "「改善軍糧」"
 EUR_Improve_Army_Rations_desc:0 "「腐爛、冰霜和鮮血已成為我們軍糧中的常見味道。我們在用比狗食更差的食物餵養我們的士兵，是時候改變這一點並改善這些口糧了，給予他們再戰一天的力量。」"
 EUR_Unified_Command:0 "「統一指揮部」"
 EUR_Unified_Command_desc:0 "「以前，軍隊的領導層四分五裂、疏遠，彼此之間沒有多少適當的溝通。現在，隨著中央指揮結構的建立，它比以往任何時候都更加強大和統一。」"
 EUR_Reform_The_Hierarchy:0 "「改革階級制度」"
 EUR_Reform_The_Hierarchy_desc:0 "「自這場內戰開始以來，軍隊的階級體系就一直是一個難題，軍階或晉升缺乏合適的格式。是時候進行從上到下的徹底改革了，以確保建立一支專業的軍隊。」"
 EUR_Developing_Rifles:0 "「研發新型步槍」"
 EUR_Developing_Rifles_desc:0 "「不列顛尼亞製造的步槍並非專為寒冷天氣而設計，在長期使用後已開始出現維護問題。是時候研發一系列更能適應其使用環境的新型步槍了。」"
 EUR_Artillery_Training:0 "「火炮的雷鳴」"
 EUR_Artillery_Training_desc:0 "「我們已經為我們的陸軍找到了一批新的火炮藏匿處，再結合來自不列顛尼亞的新庫存，我們將能夠伴隨著雷鳴般的轟響，將烈火傾瀉在我們的敵人頭上。」"
 EUR_A_New_Russian_Army:0 "「全新的俄羅斯陸軍」"
 EUR_A_New_Russian_Army_desc:0 "「我們的軍隊乾淨整潔、給養充足，運作起來比精良的Knightmare機體還要順暢。孩子，這是一支全新的俄羅斯軍隊。」"
 EUR_Replace_young_officers:0 "「替換年輕軍官」"
 EUR_Replace_young_officers_desc:0 "「清除弱者並用真正的戰士取而代之的時刻已經到來。在不列顛尼亞卓越主義中鍛造出的我們軍隊，將只服從於力量。對帝國的忠誠不是一種選擇。只有強者才能生存！」"
 EUR_Mobilize_more_people:0 "「為皇帝而戰！」"
 EUR_Mobilize_more_people_desc:0 "「為皇帝而戰！我們是這個世界合法的統治者，是其命運的管家！弱者將會動搖，但我們將超越一切，因為力量是唯一真正的法則！讓弱小的國家在我們面前戰慄吧，因為我們是其演化的先鋒！」"
 EUR_Introduce_harsh_punishments_in_army:0 "「引入嚴厲處罰」"
 EUR_Introduce_harsh_punishments_in_army_desc:0 "「《帝國實力教條》第三條：\n 士兵的生命是帝國的財產；不全力效忠的士兵應被毫不猶豫地拋棄。」"
 EUR_Open_Britannian_academy_for_officers:0 "「開設不列顛尼亞軍官學校」"
 EUR_Open_Britannian_academy_for_officers_desc:0 "「摘自《帝國旗幟之下》\n為帝國服務就是為真理本身服務。你的忠誠是你的紐帶，通過它，你和你的部下將開闢出一條通往無與倫比榮耀的道路。這就是領袖之道……」"
 EUR_Restore_organisation_in_army:0 "「重組軍隊」"
 EUR_Restore_organisation_in_army_desc:0 "「直接任命到基層的政工軍官，作為帝國不屈力量的代言人。他們的目標是明確的：確保每位士兵，無論出身如何，都理解他們事業的正義性以及他們所服務的職責。」"
 EUR_Transfer_all_scientists_to_research_knightmares:0 "「確保Knightmare燃料」"
 EUR_Transfer_all_scientists_to_research_knightmares_desc:0 "「為我們的Knightmare提供動力就是為我們的征服提供燃料。確保穩定的資源流動對於維持我們機器的強大力量至關重要。沒有這股生命之源，即使是最強大的戰士也會歸於沉寂。」"
 EUR_Focusing_on_knightmares_production:0 "「專注於Knightmare生產」"
 EUR_Focusing_on_knightmares_production_desc:0 "「在維萊恩斯大公的指示下，我們將不惜一切代價提高Knightmare產量。工廠將日夜不停地運作，將所有可用資源投入到它們的製造中。」"
 EUR_Conduct_several_tests:0 "「請求作戰測試裝備」"
 EUR_Conduct_several_tests_desc:0 "「已正式請求將最新的軍事裝備直接運送給我們的部隊，以確保我們在戰鬥的熔爐中測試帝國技術進步的真正力量。坦克、武器和先進系統將被毫不猶豫地交付。」"
