 FAR_military_council_desc:0 "Unofficially led by the former Mayor of Okhotsk, Sergei Sorokin, the Military Council is officially in charge of the entirety of the Far-East Provisional Government. It is largely made up of many generals and commanders stationed in the Far-East, who also made up the core members of the NRM. The Military Council has had a hard time in maintaining stability and order within the Far-East, due to their decentralized nature.\n\nWhile the council is made up of many flag officers, there are a few higher-ranking generals who have taken leading positions, alongside Sorokin and the other mayors and members of the NRM. Those being Konstantin Rostov, Miroslav Izmailov, Gavril Apraksin and Yakov Golshteyn-Beksy."
 HIGHLAND_DESC:0 "On the 18th of February, 1985, Augusta Henry Highland was born to the prestigious and noble Highland family. At a very early age, he became the patriarch of the Highland family, elevating in rank to Duke. Highland used his position to push for reforms in Britannia, causing some of the other noble houses to hold disdain for him. They couldn't do anything openly against him, however, due to his family's great history and ties to Emperor Charles.\n\nHighland went on to join the Britannian military, proving himself to be a capable fighter but primarily an excellent strategist. During his time there, he earned many victories for Britannia and himself, mostly during the Second Pacific War. In the midst of his military career, he met Michele Manfredi and Andrea Farnese, forming bonds of camaraderie and loyalty with both.\n\nHighland was one of the main advocates for forming an offer to the Far-East Provisional Government. Many other nobles pushed the Emperor to make Highland the Grand Duke of what would soon become Euro-Britannia. When the Emperor offered Highland this position, he accepted it with grace and honor, officially becoming Grand Duke Velaines of Euro-Britannia. With a single move, the other nobles were able to dispose of Highland and his reformist views while also making exceptional use of his skills.\n\n'Your wish is my command, Your Majesty.' — Grand Duke Velaines"
 FAR_phase_one_intro.1.t:0 "Cold Winds are Blowing"
 FAR_phase_one_intro.1.d:0 "For over 300 years our forefathers have worked to turn this desolate wasteland into a glorious beacon for Mother Russia. For over 300 years we have fought against starvation and disease cut off from the rest of civilization. For over 300 years we have been stalwart defenders of the greatest expanse known to man, holding the line against any wayward invasion from the Chinese down south.\n\nWe have done our part and we expected our countrymen to do the same for that was the deal we struck with them oh so long ago... yet... what has that brought us? All of our great history dashed away into the dirt as the bureaucrats of Europia sank their teeth into our wealth... nothing more than a puppet state after the Great War. Our politicians turning their backs on their own as they only care for their ever-increasing bank accounts.\n\nFor too long, we have clung to the belief that the Russia we knew and loved still existed, that our loyalty and sacrifices would be recognized and rewarded... but we were fools. The Russia of our forefathers died long ago, buried under layers of corruption and greed. We, the people of Eastern Siberia, have been reduced to pawns in their games, our voices ignored, our needs dismissed...\n\n No more...\n\nThe time for negotiations and false hopes is over. The only way to save Russia is for us to take matters into our own hands. The true Russia lives in our hearts, and it is us who shall bring it back to life."
 FAR_phase_one_intro.1.a:0 "Our dream is not yet dead!"
 FAR_phase_one_intro.2.t:0 "A Lead Amongst the Dead"
 FAR_phase_one_intro.2.d:0 "The room was a mosaic of stern faces and furrowed brows, a stark contrast to the ornate gold leaf that lined the high ceiling. The chandeliers, once a bastion of opulence, now cast a grim pallor over the hastily assembled council. Sergei had learned much over these last tremulous days as now he found himself the president of the Provisional Government. A fact no doubt tied to his rallying cry but a few weeks ago. His hands shifting eagerly through the stacks of papers that made up the hastily made report on the armed forces and the economy. Eyes flickering upwards to the rest of the grand assembly doing much the same.\n\n\"What do you expect we do?!\" Boris's voice rose above the rest. \"We do not have the factories, the equipment, or god forbid the people to get through even the Socialists. Sure what men we do have can probably hold off their tide but...\" He paused, looking around the table at the men and women who had pinned their hopes on this shaky alliance. His hands rise up before taking off his glasses and setting them down on the hardwood table in front of him \"If we are to win this... IF.... we cannot do this alone.\"\n\nSergei took a deep breath, his fist clenched around the report he'd been reading. He knew Boris was right. The numbers didn't lie. The Monarchists had resources, the socialists had numbers, and here they are trying to hold together a country that couldn't hope to survive alone. His jaw tightened. \"We need an alliance,\" he said flatly...\n\nBut before they could continue, a sharp knock on the door drew their attention. It was a young aide, who rushed to the President's side, nearly tripping in the process before handing another report to Sergei. \"From the investigation team, sir,\" she whispered. \"It's... just read it...\"\n\nSergei's heart sank as he took the paper, scanning the first few lines. His face contorting in a manner most would see as contemplation, but not Boris. In the eyes of his friend, all he saw was rage. \"It seems,\" he began, his voice low and measured, \"that the detonation at the port was no accident\" He paused as a deafening silence filled the space to bursting. \"Someone was able to slip inside the permitter during the chaos and planted a bomb on the ammunition depot... This was a deliberate act of sabotage.\"\n\nSergei slammed the report down on the table, the sound echoing through the room. \"We must find out who did this!\" he said with a steely conviction. \"We need to know who did this atrocity... and if they were Russian... or someone else...\""
 FAR_phase_one_intro.2.a:0 "May God have mercy for them for I shall not..."
 FAR_phase_one_intro.3.t:0 "In From the Cold"
 FAR_phase_one_intro.3.d:0 "\"Alright, keep it tight. Lets not let them slip out of our grasp a second time now.\" the squad leader, Sergeant Ivanov, murmured into his radio. The crunch of fresh snow beneath their boots was the only sound piercing the deafening silence of the Siberian wilderness. The five soldiers of the 3rd Special Forces Unit moved in a staggared line, their breaths misting in the frigid air.\n\n A sudden jerk from the man in the rear caught Ivanov's eye. Private Novakov had paused, his rifle at the ready, his gaze fixed on a disturbance in the dense, snow-covered forest ahead. \"What is it?\" Ivanov hissed, his eyes scanning the area for any signs of danger.\n\n\"I thi-\" Novakov's reply was cut short by the crack of a distant gunshot. The force of the bullet threw him back into the snowbank behind him, a crimson stain blossoming rapidly against the white snow. The other four soldiers dropped into combat positions, their eyes darting to find the source of the threat.\n\n \"Contact, front!\" Ivanov barked diving to the ground. Rounds whizzing right above where he was just standing sending a chill down his spine. The forest erupted with the sound of gunfire as the hidden assailants revealed themselves.\n\n The squad returned fire with precision, their movements a blur as they weaved between trees and cover. The crack of rifles echoed through the quiet woods, punctuated by the thump of snow kicked up by the incoming rounds. Yet despite the unfavorable conditions Ivanov found himself in, it seems as though the rest of his squad was doing much better. One after another the hostiles were dropping till silence once more swept over the dead trees.\n\n Ivanov signaled for the squad to advance cautiously as they pass several bodies. His heart hammering in his chest as they rush around an overturned log. Two unknown men lay against the log, their rifles tossed to the side. They were dressed in gray and white winter camouflage, their bags strewn across the colorless snow as makeshift cover. It was there, poking softly out of the side that he spotted something that caught his eye... a computer... and a transmitter...\""
 FAR_phase_one_intro.3.a:0 "Let's see what's on that device you have there."
 FAR_phase_one_intro.4.t:0 "A Change in Plans"
 FAR_phase_one_intro.4.d:0 "Subject: The Okhotsk Tragedy Shall Not Go Unanswered\nFrom: Alexandrov Yeltz, Director of Counter Intelligence\nTo: President Sergei Sorokin and the Provincial Committee\n\nTo the esteemed Committee,\n\nI am proud to confirm that we eliminated or captured all of the individuals responsible for the Okhotsk tragedy several weeks ago. Our operatives were successful in tracking down those responsible engaged, killing five and capturing two of the culprits.\n\nPer your instructions, the survivors' interrogation is going slowly, yet I am impressed by their resilience. I have yet to crack either of them, but this fact alone says much about what we are dealing with. These men have had formal training, and there is no doubt that they are part of a much larger organization.\n\nAdditionally, I have ordered a comprehensive analysis of the information obtained from a computer found on their persons. While accessing this information has proven challenging, I can confirm two critical points.\n\nFirstly, this team has been transmitting to somewhere within the Britannian homeland.\n\nSecondly, the computer indicates that this team was tasked with infiltrating the space program run by the now-defunct Zakharov government.\n\nThe revelation that the collapse of Russia was orchestrated at least in part by this now unknown Britannian Intelligence agency has not passed me by. Yet, the space program's significance cannot be overstated. Its operation has been conducted under the veil of utmost secrecy for decades, with even its locations under the highest classification.\n\nOnly President Zakharov and his closest advisors knew the details of the program, but whatever these Britannians are after, I can assure you that we shall know soon enough. In the meantime, I shall ensure that we catch any other godforsaken spy that has found itself within our borders."
 FAR_phase_one_intro.4.a:0 "The Space Program you say?"
 FAR_phase_one_intro.5.t:0 "Conspiracy Amongst the Stars"
 FAR_phase_one_intro.5.d:0 "Subject: I Found What They Were After\nFrom: Alexandrov Yeltz, Director of Counter Intelligence\nTo: President Sergei Sorokin\n\nSince my last report I have done some additional digging into our guests, and they have been quite talkative as of late. From what they have said, as well as our own investigation, we now know the locations of several facilities tied to the Russian Space Program—sites whose secrecy has been maintained even through the turmoil of our nation's collapse.\n\nAs you know, this program was conceived in the wake of the Great War, when Europia's heavy-handed edicts left our economy crippled and our people demoralized. Seeking a path forward, the government of that time saw the burgeoning development of propulsion technology as an opportunity. One that could not only restore national pride but also create something of real value, immune to foreign exploitation. The Space Program became that path, shrouded in secrecy from both our neighbors and our own people.\n\nWe all watched the old shows depicting those all too famous closed cities... and it seems as though we can now put all those debates on where they were located to rest. We have identified 4 main hubs scattered across our motherland, and fortunately, they will remain hidden from our adversaries. It seems the Britannians, before starting this whole mess, at least ensured that the chaos in Russia would stay far away from our beloved national treasure hoping to get to it while we were distracted. Unfortunately for them, they underestimated just how... persistent we can be.\n\nThese facilities, while not directly influential in our current military struggle, represent a potential lifeline for our people. We both understand the precariousness of our situation. Our resources alone are not sufficient to secure victory in this civil war, and requesting foreign intervention may be our only option. Should that time come then the value of these sites lies in their potential as a bargaining chip... quite an attractive one at that.\n\nI have ordered the men under my command to secure the only site currently within our boarders being the Vostochno-Yevraziyskiy Cosmodrome. I suspect that our number should be sufficient though I would like to request some additional forces to keep it's secrecy for as long as we can."
 FAR_phase_one_intro.5.a:0 "This will do quite nicely for future negotiations."
 FAR_phase_one_intro.6.t:0 "The Lion's Mistake"
 FAR_phase_one_intro.6.d:0 "Subject: Elimination of Britannian Intelligence Cell\nFrom: Alexandrov Yeltz, Director of Counter Intelligence\nTo: President Sergei Sorokin\n\nOur operation has successfully dismantled the Britannian intelligence network that had infiltrated our territory. Although the endeavor cost us several skilled officers and dedicated personnel, I can say with confidence that the entire cell has been neutralized.\n\nTo be quite frank I am a little dissapointed that it was this easy. With the equipment we captured from our initial engagement we inserted ourselves right into their communications network. From there it wasn't too difficult to raid their positions or set up traps so they could experience the suffering the inflicted during that dark day. With their network now dismantled, the threat from Britannian espionage has been effectively removed.\n\nHere's hoping the next task you give my office will last a little longer."
 FAR_phase_one_intro.6.a:0 "If only the old government were as competent..."
 FAR_phase_one_intro.7.t:0 "Breaking Through the Veil"
 FAR_phase_one_intro.7.d:0 "President Sergei sat at the head of the long table, his brow furrowed in thought. Around him, members of the Governing Council both civilian and military leaders alike exchanged tense whispers. Boris lounged nearby, his chair large and reinforced as to maintain his vast girth.\n\n\"We cannot afford to delay any longer,\" said Captain Yelena Markov, a decorated officer and one of the council's most vocal members. She leaned forward, her voice steady but urgent. \"Our reality is clear. Without foreign support, our resources will run dry within months. The monarchists and socialists already outmatch us, and the damned Europians will crush us once they get through the other two. We have the space program facilities which, at this point, is the only card we hold that could interest anyone. We should approach our southern neighbors who might be sympathetic to our cause, especially if it keeps Britannia's influence at bay.\"\n\nBoris chuckled softly, drawing the attention of the room. \"The Pacific nations? Sympathy? Captain, you're dreaming,\" he said, his tone dripping with sarcasm. \"Even if we could secure a meeting, what guarantees do we have that they'd act? Most of them are too entangled with China's power bloc or too weak to make a difference.\"\n\nMarkov bristled, but Boris raised a hand to forestall her retort. \"No, if we're serious about survival, we should consider Britannia.\"\n\nThe room fell deathly silent as the very name seemed to darken the air. \"We all know Britannia's role in sparking this civil war, but let's not pretend they don't hold the cards here. Britannia is the only superpower with both the resources and the desire to act. They want our space program which is no speculation as it is a fact. We offer them the facilities and whatever else they can acquire from that junk, and in return, they back us. With their support, the war ends in months, not years.\"\n\nSergei's expression remained unreadable, but the council erupted into heated debate. Some nodded at Boris's words, their pragmatic side recognizing the logic. Others shouted in protest, accusing Boris of betraying their people by even considering working with Britannia.\n\n\"Enough of this bickering!\" Sergei shouted as he rose to his feat. His voice cutting through the clamor like a hot knife as the whole room turned towards him. The room held its breath as Boris asked the question that was on everyone's minds. \"Well, Sergei,\" he said, his tone almost challenging. \"The council defers to you. What do you say, Mr. President?\""
 FAR_phase_one_intro.7.a:0 "Both of you make your points well... I shall need some time to think."
 FAR_phase_one_intro.8.t:0 "All In"
 FAR_phase_one_intro.9.t:0 "Deal From.. Britannia?!"
 FAR_phase_one_intro.9.d:0 "Subject: Aid To The Far-East\nFrom: Oiagros Zevon\nTo: Acting-President Sergei Sorokin\n\nIn the name of Charles Zi Britannia, 98th Emperor of the Holy Britannian Empire. I Oiagros Zevon head of the prestigious and noble Zevon family write in his name, to lay forth the terms of aid to the Far-East Provisional Government. If the terms laid forth by the Emperor himself are met, our support and assistance will follow through to aid the efforts of your nation.\n\n1. The Far-East will allow the Holy Britannian Empire and all its Areas access to its ports for docking and refueling purposes.\n2. The Far-East will allow the Holy Britannian Empire and all it's Areas access to its resources for purposes of aid.\n\nIf these said terms are met. Our aid and support will be rendered as thus.\n\n1. Russians will be treated as equals to Britannians, and will receive the same privileges and rights afforded to Britannians when dealing with the Holy Britannian Empire and its Areas.\n2. The Far-East will be considered a totally independent nation seperate from the Holy Britannian Empire and its Areas, but treated as an equal, receiving the benefits of trade and political backing.\n3. Supplies will be sent to the Far-East in order to help their war efforts, including Britannian equipment, technology, soldiers and expertise.\n\nThe Emperor expects the response to this letter within the month."
 FAR_phase_one_intro.9.a:0 "'All... hail... Britannia?'"
 EUR_phase_one_intro.1.t:0 "Bluffing the Devil"
 EUR_phase_one_intro.1.d:0 "Sergei Sorokin stood on the steps of the capital building overlooking the main plaza. Where once he had simply been a mayor trying to do what was right for his people, now he stood leading a government built on little more than desperation and borrowed faith. Behind him, Boris stood as his unease betrayed itself in the occasional twitch of his fingers.\n\nKnightmares flanked the oncoming procession like steel predators looking for the slightest sign of danger. Britannian soldiers marched in perfect unison around their charge as the ambassador stepped forward, his polished boots clicking against the stone. The crowd's thunderous cheers drowned out everything except the voices of those close enough, allowing Sergei, Boris, and the ambassador to speak in a fragile bubble of words.\n\n\"President Sorokin,\" the ambassador greeted, his voice warm and cordial, though something in his tone made Sergei's stomach churn. \"What a spectacular welcome. Your people have truly outdone themselves. Why I don't think I could have asked for better if I was visiting one of our subjects.\"\n\nSergei nodded stiffly, keeping his tone measured. \"I thought it would be best that we celebrate the start to a partnership that will bring freedom and prosperity to our two peoples.\" The ambassador's smile lingered for a moment before it twisted into something far colder. \"Ah, partnership,\" he repeated, almost as if testing the word.  \"I'm afraid that word no longer applies. Effective immediately, Britannia is assuming control of the Far East. Your government is to be dissolved, and our administrators will take your place. You see this arrangement is unfortunately non-negotiable.\"\n\nSergei's heart dropped as stood there incredulous desperately trying to find his words. \"You're violating our agreement! Th- this is treachery!\"\n\n\"Treachery?\" Boris's voice broke in now as he stepped forwards. \"No, Sergei. This is survival and only the most brutal survive. It's foolish to believe otherwise.\" Sergei turned sharply to face Boris, disbelief etched into his features as his voice trembled in barely restrained fury. \"You... knew about this? You let them in and threw away all that we sacrificed and for what?! You really are a pathetic cockroach.\" Boris didn't flinch. Instead, he offered Sergei a placid, almost pitying look, as the ambassador placed a hand on Boris's shoulder. \"A wise man, your loyalty will not go unrewarded. We've prepared accommodations fit for someone of your... vision.\"\n\nBefore Sergei could find the words, the ambassador reached into his coat and produced a small, ornate box. \"And for you, Mr. President, a final gesture of respect.\" he said, his tone dripping with mockery. Sergei took the box with trembling hands and opened it. Inside was a single pistol, polished and loaded. The ambassador's smile turned sharp as a blade. \"Consider this your final act of leadership. Do it yourself, with dignity, or my men will see to it in a much less pleasant manner.\"\n\nThe weight of the gun seemed to drag Sergei down as he looked past the ambassador, past Boris, and out to the sea of cheering civilians. They waved flags and shouted his name, their faces lit with hope that felt unbearably cruel. None of them knew. None of them understood.\n\nHe closed the box slowly, his hand lingering on the lid. His voice, when it came, was barely a whisper."
 EUR_phase_one_intro.1.a:0 "They cheer for what's been stolen from them, and I won't live to see them realize it..."
 EUR_phase_one_intro.2.t:0 "Rigged From the Start"
 EUR_phase_one_intro.2.d:0 ""
 EUR_phase_one_intro.2.a:0 ""
 EUR.12.t:0 "When the Sun Sets, So Rises the Moon"
 EUR.12.d:0 "\n\n£GFX_EUR_Project_Zorya \n\n\n\n\n\nSubject: Project Zorya\nFrom: Isabella Schariac, Project Head of Starshot\nTo: Grand Duke Velaines\n\nSir, I appologize for the urgent message although recient developments have forced me to violate protocol.\n\nLast night at 3:07:51 my team recieved an encrypted transmission for which we have no explanation for. Every single computer connected to the Cosmodrome's network recorded the phenominon before subsiquently crashing. All attempts to recover the final data from any of said devices has been an unmittigated failure; however, we were able to determine that all hardware built into the facility was unaffected. Whatever sent that transmission the eggheads that built this place designed their systems in order to withstand such an event.\n\nI do not need to state the importance or the concern that a signal that can take down entire communication networks could bring to our effort or the prosperity of the Empire.\n\nI understand that you want answers though I have none to give other than an update on one of my potential leads. Over the last 6 years I have identified that over 300 shipments sent to this facility that have been removed from the database leaving only a blank space on the records. Additionally, Flight Control has records of several static fire tests and two launches that are not on the launch manifest or any other records. The Republic was known for it's secrecy in reguards to it's space program but this is, frankly, overkill. I believe that these three instances are indeed connected to whatever that transmission was earlier and while I am limited by the information at this facility, should I gain access to the rest of program's locations I should be able to learn more.\n\nFinally sir, I give to you the last piece of information that I could recover that being the codename all related files have been found under... §RProject Zorya§!"
 EUR.12.a:0 "Was this an automated responce or did someone try to stop our investigation?"
 EUR_schneizel_phase_one.1.t:0 "Orders From the Crown Prince"
 EUR_schneizel_phase_one.1.d:0 "Grand Duke Velaines stood in his recently acquired office at the Capital building in Okhotsk. His fingers pressed against the cool surface of his desk as he mulled over the events of the last two months and the message from Pendragon lying in front of him. Oh, how he wished he had a government to build off of... and oh how he cursed the O.S.I for killing the one man who brought stability to this territory. Despite all his flaws, President Sorokin did what was required of him, a thought that recentered Highland's mind to the task at hand.\n\nThe words were clear, he was to eradicate any opposition either from the upstarts out west or from within while ensuring that all of Russia feel under Euro-Britannia's grasp. A challenge no doubt but when did a mere challenge ever force him to back down. No, it wasn't the task that made him think twice but the author of the order being none other than the Second Prince Schneizel el Britannia.\n\nSchneizel's directives had always been coldly logical, a reminder of the unyielding will of the Empire, but these suggestions that he had laid out made his conscience spring to life. As much as he revered Schneizel's intellect and strategic genius, the brutality required to carry out these orders wouldn't be uncommon from a recently conquered area. Was this what he was supposed to lead? A new Area built off a broken promise and political backstabbing? Highland chuckled at the thought realizing how accurate that thought was to the history of Britannia's royal family.\n\nHe could, of course, repeat history and follow his orders at face value. His position of course demanded loyalty to the Emperor first and foremost, but, a part of him wondered if there was a way to interpret these orders more creatively. To see if he could stop the cycle and give unto the people what had been promised without undermining his position. It would certainly be more difficult but, again, when has an added challenge ever stopped him?"
 EUR_schneizel_phase_one.1.a:0 "Better to follow the orders and avoid the added hassle."
 EUR_schneizel_phase_one.1.b:0 "If I am to lead these people I need to restore the trust that was lost."
 EUR_guinevere_phase_one.1.t:0 "Orders From the First Princess"
 EUR_guinevere_phase_one.1.d:0 "\"Under the circumstances that the Britannian homeland can no longer provide assistance to you, you may seek out financial support from the Areas.\" The words of the first princess rang out in Highland's head. Guinevere de Britannia, a woman of high ambition and unrealistic expectations. He read her letter in the cold dockyard of Okhotsk, gripping it tightly. To build Russia, he needed support more than anything else. The resources in Okhotsk would not be enough and with President Sorokin killed by the O.S.I., stability within the region was plummeting.\n\n\"Should Britannia give me the green light, I expect a settlement larger than the Tokyo settlement upon my arrival.\" Highland scrunched part of the paper between his fingers. He had of course known about her habits and personality, but this was beyond measure. Her expectations were higher than the stars. Support from Britannia would be amazing, but this came with the caveat of Guinevere wanting something as unreasonable as an entire settlement in Okhotsk of all places!\n\n\"Should they give me the red light, do as you please. I am doubtful a visit would be worth my time.\" Highland closed his eyes, rubbing his temples. To jumpstart Russia's economy using finances from the Areas and to rebuild a nation in an image worthy of Britannia, what a task he had ahead of him."
 EUR_guinevere_phase_one.1.a:0 "\"Time to get started on the Okhotsk settlement...\""
 EUR_guinevere_phase_one.1.b:0 "We’re relying on the Areas."
 EUR_guinevere_phase_one_economy.1.t:0 "Guinevere's Okhotsk Visit"
 EUR_guinevere_phase_one_economy.1.d:0 "Standing in front of the shining jewel of eastern Russia stood Highland at the airport, wind at his back, awaiting the private transport that held Guinevere. In one hand he grasped the crumpled letter he initially got from her, as a reminder of all his hard work up until now. In the distance glowed lights growing ever closer. Her arrival was imminent. The anticipation in Highland's chest grew stronger. The large VTOL aircraft landed roughly. Highland wore a  scowl and wide eyes, annoyed that the private transport of the first princess would be so rough with her. A gust of air blew Highland's low ponytail back as he approached the ramp exit of the aircraft. The jets turned off and the ramp door cracked open as it slowly lowered. The lights of the interior cast behind the silhouette of a figure. However, this figure had no extravagant dress, nor stylish hair.\n\n\"Your... majesty?\" Highland presumably greeted the first princess. As the figure descended further, it was revealed to be not the royal he imagined, but a man. Nothing special. No fancy clothes, no Britannian sigils. \"I do not understand...\" Highland said. \"Is she flight sick?\" Without any words, the man reached for his pocket and pulled out an envelope with an all too familiar wax seal on it. Highland hesitantly took the letter from the man's outstretched hand. Breaking the wax seal and flipping it open, he scanned over the contents inside. In a near instant reaction, his eyes went wide.\n\n\"Dear Augusta Henry Highland, Duke of Velaines,\n\nAs I understand it, you have successfully built what was asked for. What a remarkable turn of events this turned out to be. However, not long after you started building this settlement, I came to the conclusion that I simply did not care. It was entertaining to hear that you had followed my orders so earnestly and efficiently. Though, even while writing my initial letter to you, the thought occurred to me that a visit to the Russian east would be far too much of a hassle and I have never been fond of the cold. Therefore, I will not be visiting in person to see the Okhotsk Settlement. Do not bother my servant. He is here to pick up Russian wine from my new settlement for a party I shall be having soon.\n\nSincerely, First Princess of the Royal Family, Guinevere de Britannia.\""
 EUR_guinevere_phase_one_economy.1.a:0 "\"Highland let out a pained chuckle, a single eye twitching.\""
 EUR_guinevere_phase_one_economy.2.t:0 "Shipment From the Areas"
 EUR_guinevere_phase_one_economy.2.d:0 "Arms crossed, Highland stood looking at the gargantuan vessel in the dockyard. His voice raised to be heard over the heavy machinery  \"... And you are sure there was no mix-up?\" \n\"Of course, sir! The Areas were very specific in what to give you,\" the foreman responded equally loudly.\n\nThe ship's size slowly shrank as more cargo was taken off and sparks flew as containers were lowered onto the concrete. Highland tried to peek over the foreman's shoulder to see what other cargo was written on the clipboard to which the foreman noticed. \"Oh? Curious one are you?\" The foreman handed over the clipboard to Highland freely. \"Have a look as to what else is on board, sir.\"\n\nAs Highland scanned the data, the amount was on the generous side, but it certainly didn't justify such a large freighter. He lifted up a page to notice the simple text of 'Sakuradite' with a frighteningly large number beside it. Highland choked on his own spit. \"This... This is insane! So much sakuradite in one place... If so much as a spark goes off on the ship, it would cause a catastrophe worse than the Okhotsk bombing!\"\nThe foreman reassured Highland. \"Don't worry, nobody knew about this delivery. Plus, ships carrying Sakuradite rarely have any accidents.\"\nThe words of comfort had no effect on Highland. \"I'll send my deepest gratitudes to the Areas once I get back to the office and I thank you personally for handling this, but excuse me as I make my leave from this floating bomb.\""
 EUR_guinevere_phase_one_economy.2.a:0 "\"What were they thinking?\""
 EUR_guinevere_phase_one.2.t:0 "Manners Over Mind"
 EUR_guinevere_phase_one.2.d:0 "“You are above your station, General Lancaster,” Highland raised his voice, although no anger was in it.\nThe man opposite Highland scoffed and shook his head. “I am simply stating my opinion, Grand Duke. Would you rather do it your way?” There was a hint of sarcasm in the man’s voice.\n\nGeneral Albert Lancaster had come to meet Highland without warning and ambushed him in the halls of the Okhotsk governmental building to complain about Highland’s current strategy on the Siberian front. The man’s coat was adorned in medals, most of which represented his staggering victory against the former Japanese—now Elevens. Albert had been invaluable to the Britannian high command, but the man which Highland used to know, a cowardly, cautious lapdog, had now come across as anything but. The cocky look he’d give to Highland every time he walked past—the feeling of superiority that emanated from his posture all showed he was reveling in this new prestige.\n\nHighland glared at Albert with stern, yet calm eyes. “General Lancaster, I believe it would be best if you presented yourself more professionally.”\nAlbert scowled. “Perhaps I should leave it to you and take my men home if I am unneeded.”\n“Alright then, I will notify the Emperor of your decision immediately,” Highland said with the same firm expression, his words cold.\nAlbert’s smugness flatlined, quickly vocalising a retraction. “Let’s not get ahead of ourselves, Grand Duke!” He stepped back slightly, clearing his throat and giving his best shot at maintaining his composure. “Just please consider my proposal.” Sweat formed above his brow as he took a deep, subdued exhale."
 EUR_guinevere_phase_one.2.a:0 "I’ll consider it."
 EUR_guinevere_phase_one.3.t:0 "Duke Meets Knight"
 EUR_guinevere_phase_one.3.d:0 "He waved, the first thing that giant of a man did, giant even next to Highland himself did was wave. Even as Highland and his entourage approached, Highland was flanked by many Britannian guards, two of which by his sides were wielding ceremonial spears mainly. However there was a small detachment behind him, properly equipped with weapons. His elite guard, and those who would actually defend him, and die for him. \"Highland!\" The deep voice of Manfredi yelled, giving himself away with his booming voice, making himself known out of his own entourage, coming just off their boat at the Magadan port. Highland approached him and stood right in front, though some steps away as he looked at him, and thought just to get down with the customs. \"Knight of Two, Michele Manfredi it is with great-\" However, he did not get to finish in his own voice. As Manfredi took three great strides, and pulled Highland right into a bear hug with one arm, at which Highland could only react by patting Manfredi's back, who boomed at him once more. \"Ah! Leave the dramatics alone, it is good to see you again my friend.\" Truly happy he seemed, to see Highland in person again. Handling affairs through calls, and notes while Manfredi attempted to lead the Euro-Britannian army from Britannia was difficult, and annoying, plus lonely. Manfredi let Highland break the hug, as they went from that right into a firm handshake as Highland preferred, Manfredi had great strength even in a simple handshake.\n\n\"It's good to see you too, are you to understand your orders here?\" Highland said, though he was happy to see his friend too. He understood that they had a nation to secure, a war to win, and work to do. All for Emperor Charles. Manfredi looked at him, a big smile plastered on his face this entire time, as he cracked it for a bit scratching the back of his head. \"Yes, of course! They would not stop reiterating it to me.\" He said, seemingly annoyed about it, but not really. The two men then stood there, for a hot or well cold minute, the biting winter of Russia nipping at them. They stood there, locked into another, without saying a word. Highland looked at him, expectedly but Manfredi said nothing. So Highland cleared his throat. And began to speak again to break the cold air.\n\n\"So you know-\" Only for Manfredi to cut him off again, clearly not wanting to hear the same orders again, especially from his friend. He seemingly led him on that one on purpose, as his eyes glinted and smile grew wider. \"Yes! To establish an organisation of Knights who can carry forth the flame and honor of Euro-Britannia.\" While, his orders were definitely a lot more specific than that, and had a lot better reasoning to them. Highland had to admit that was how Manfredi saw them, and how Manfredi would approach them, and with that in mind. He got it spot on. So, Highland did not correct him. Instead saying."
 EUR_guinevere_phase_one.3.a:0 "\"Yes, that's about right.\""
 EUR_guinevere_phase_one.4.t:0 "The Serpent’s Cage"
 EUR_guinevere_phase_one.4.d:0 "“Ah, a visitor at this hour?” Her voice was ice cold, not the slightest hint of care in it. With her dull, ghostly golden hair following her head's movement, Isabella Shariac only glanced up from the letter on her desk momentarily. She very quickly looked back down at it to continue reading. “The esteemed Lord Highland. Very interesting. What do you want?” She shuffled through papers, the evening orange glow pouring through a single barred window.\nHighland narrowed his eyes on her. Even in just his peripheral vision, he could still understand the circumstances of this room. Cushy furniture, ornate decor, silky curtains... This was the only kind of prison cell fit for a noblewoman with her ties. “Isabella Shariac, I come to offer a pardon written by the Emperor.” He said it simply. There was no need to beat around the bush with a woman of her disposition.\n\nSlipping one of the letters on her desk into an envelope, she stood from her desk and grabbed a tall top hat. With her signature headwear, she walked towards Highland, her heels clicking against the wood floor and her envelope still in hand. She stopped in front of him and crossed her arms, Highland towering over the younger woman. “Tell me then, what do I have to do for you?” Her voice lacked any formality, giving Highland the same blunt response he gave her. Despite her careless tone, the expression on her face contradicted her voice. Her lips curled with amusement, her eyes sharpened with curiosity. Anyone who met Isabella would say the same thing. Her face was that of a viper’s.\nTo continue their pattern of simplicity, Highland replied with a matter of fact truth. “You would come to Euro-Britannia to work under me. I am in need of your expertise.” Highland kept his gaze stern, his authority unwavering.\n\nIsabella maintained a venomous smile, her eyes injecting a toxin of unease into Highland. After a moment of thought in a mind that Highland could not nor wanted to comprehend, Isabella walked to the fireplace in the corner of her luxurious cell. She held the envelope in front of her face, no text to read on the outside, simply observing it like a chemist’s vial. “Alright,” she said with a followup of silence. “And I will have my own lab to work in?” She just barely glanced over her shoulder at Highland.\nAlthough she posed it as a question, Highland felt this was not exactly a request. “You will have the resources you need,” he replied. With that, Isabella turned back to her envelope to give it one last look before tossing it into the flames of the fireplace. Highland said no more, opening the door and leaving her. There was nothing more he wished to say to her. After all, she was the type of woman to murder her own husband."
 EUR_guinevere_phase_one.4.a:0 "No good can come from provoking a snake."
 EUR_guinevere_phase_one_military.1.t:0 "An Army Worthy of the Duke"
 EUR_guinevere_phase_one_military.1.d:0 "Having heard news of the arrival of Knightmare pilots from the homeland, Highland made haste to the nearby bunker where they had been temporarily stationed. As he opened the cafeteria doors his eyes scanned over the couple dozen pilots sent over from Britannia, all socialising with each other and enjoying their meals. He was recognised instantly and within moments they all stood up straight to salute to Highland. Highland stood straight and tall, towering over all but a few of the pilots.\n\nThe room’s jovial atmosphere ceased to be as they continued to hold their salute with dignity. They stood shoulder to shoulder, ready to serve. Pride came over Highland as he recognised some high profile pilots, as well as a few who were called prodigies during the earliest days of their recruitment. The best Highland could ask for.\n\nHighland cleared his throat as he began to speak with a loud and striking voice. “My esteemed Britannians, welcome to Euro-Britannia.” He paused momentarily, not exactly one for speeches on the fly, but quickly continued. “You all have been chosen individually and we expect good results from you. Don’t be fooled. Siberia is not to be underestimated. Already, we have lost many to the freezing Russian tundra. Machine failures are to be expected. Make your rest tonight. You go to the battlefield tomorrow. All hail Britannia,” he said almost monotonously, but it was enough to prompt an eruption of pilots mimicking just that.\n\n“All hail Britannia!” echoed throughout the cafeteria in unison. Highland turned around and exited the room. As he walked back down the hallway, a roaring noise of enthusiasm pierced throughout the halls."
 EUR_guinevere_phase_one_military.1.a:0 "The reds will not have a moment of rest."
 EUR_guinevere_phase_one_military.2.t:0 "Recruit Honorary Britannians"
 EUR_guinevere_phase_one_military.2.d:0 "The minute hand struck twelve and the grandfather clock played its chime to an empty room. The tweeting bird pointed directly to the wide open balcony doors and past them stood Highland, both hands behind his back. His eyes, which had been gazing over the lights of Okhotsk, held nostalgia as he thought back on his career.\n\nWhile old memories flowed, Highland contemplated his role here. Britannia had been kind to him and he had to pay back that kindness with success. If he could request some pilots it would mean—\n“No,” Highland muttered, interrupting his own thoughts. “They’ve given me too much already. Any more and I would be insulting his majesty.”\n\nHighland leaned forward and placed his bare hands on the railing, unphased by the frozen metal. \"Britannia's might will be proven with those who she has previously conquered.” His hands now tightly gripped the rail, Highland retreated back into his thoughts. The numbers of the empire, numbered 1 through 11. The homeland would have no complaints if the areas were conscripted for this war. After all, they are not truly Britannians."
 EUR_guinevere_phase_one_military.2.a:0 "The best is not needed."
 EUR_guinevere_phase_one_military.3.t:0 "Request Foreign Legions"
 EUR_guinevere_phase_one_military.3.d:0 "“Just the person I wanted to see,” Highland announced himself as he placed down his dinner tray opposite General Rosalyn Bourchier. Rosalyn, mouth full of food, gave a quick and awkward salute then swallowed.\n“Grand Duke!” She coughed as her food went down poorly. “What can I assist you with?”\n“A few days ago,” Highland started as he cut his potatoes into uniform squares. “I sent out a message to all the Areas requesting more infantry.” Rosalyn nodded, having stopped eating to pay full attention. Highland moved onto cutting the steak, once again into squares. “Those who come from the Areas, I will be assigning to you.” Rosalyn was trying her best to stay focused, although Highland who was now turning the broccoli into cubes distracted her heavily. “This shouldn’t be too much, should it?” Highland asked.\n“Of course not!” Rosalyn shook her head, snapping out of her trance. “I'll make good use of them!”\n“Fantastic.” Highland sighed in relief. “I knew I could rely on you.”\nNow that official business was concluded, the two ate their meals together. Rosalyn in her infinite wisdom tried to have some small talk with the Grand Duke in the worst way possible.\n“Why do you eat like my grandpa?”\nHighland grew self conscious and excused himself, his food still on the table while he walked away muttering."
 EUR_guinevere_phase_one_military.3.a:0 "This is why I prefer to eat in my office."
 EUR_guinevere_phase_one_military.4.t:0 "Aid for the Soldiers"
 EUR_guinevere_phase_one_military.4.d:0 "In the Okhotsk port sat a mysterious shipment. The container was not accounted for in any deliveries that came and none of the workers remembered ever touching it. Fearing an enemy explosive, it was alerted to a Euro-Britannian bomb squad. With all the commotion over the container, it caught Highland’s curiosity. After it was deemed safe, Grand Duke Highland himself made time to visit its grand opening.\n\nHighland and a crowd of dockyard workers stood at a distance as they watched. White tents with chemical testing equipment were directly beside the container. A single unlucky man in a hazmat suit had the task of opening the heavy metal doors. As the hatches were loosened and the doors opened, Highland noticed many wooden crates at the back. The canary crept into the container, looked down, and crouched to pick an object up. The man immediately took it over to a chemical testing team to run tests on it. Then after a few nods of agreement, the object was brought straight to Highland.\n\n“A letter?” Highland raised an eyebrow and reached his hand out to grab the unmarked envelope. As he opened it, he was met with overly fancy penmanship.\n“Dear Grand Duke Augusta Henry Highland,” The letter read. “I hope this finds you well. I’ve been taking a great interest in your efforts in Euro-Britannia and hope your success comes to fruition. In the place this letter was found holds a large stockpile of supplies you will surely find helpful. Good luck. Trust nobody.\n\nSigned, a fan.”\n\nHighland looked up to see the whole dockyard was standing still, staring at him.\n“Test everything you find in that container. If it’s safe then we will make use of it all.” he proclaimed, startling the people back into action."
 EUR_guinevere_phase_one_military.4.a:0 "Who am I to turn down help?"
 EUR_guinevere_phase_one_military.4.b:0 "Why would I trust a stranger?"
 EUR_guinevere_phase_one_delivieries.1.t:0 "Monthly Deliveries"
 EUR_guinevere_phase_one_delivieries.1.d:0 "“I told you malfunctions would be common here,” Highland told his general, Rosalyn Bourchier. Highland continued, “I’m grateful their escape pods still worked. That’s more important. Arrangements have been made for replacement parts and frames to be shipped on the regular.” Highland put on a radio with baroque music filling the room. “Ah, this one again?” Highland gave a nostalgic chuckle. “Since the pilots who are out of commission can’t do anything for the time being, I’ll take a visit to their base.” Highland started to tap his foot to the chords. “My next few days are swamped with paperwork. I’d like to hear their opinions for a change of pace.”\nRosalyn nodded in response. “Understood, viceroy.” She started to unconsciously sway to the violin melody. “You know, my grandpa loved this kind of music!”\nHighland’s eye twitched as he felt himself age by at least thirty years. "
 EUR_guinevere_phase_one_delivieries.1.a:0 "You’re dismissed."
 EUR_schneizel_phase_one_military.1.t:0 "The Confident Sheep"
 EUR_schneizel_phase_one_military.1.d:0 "In he walked, it had been quite some time since Highland saw him. Last Highland remembered seeing the now great Albert Lancaster was prior to the Japanese invasion, he had been presented for when he was brought into the imperial throne room by Charles. Where he had been given the great honour to command and lead the invasion of Japan, he remembered how he walked then. While even then he was a keen commander, and courageous. He walked into Emperor Charles' throne room like a sheep walking into the lion's den, only to be given great prestige and prominence by his appointment. Since his success with Japan, he walked like a different man. Though the situations were similar, here Albert Lancaster approached Highland, Highland and his almost makeshift throne. Thrown together hastily while more formal preparations could be made, still it was regal, and full of prominence. Not to mention some of Highlands guards that ensured his safety. Albert approached him, like he was the one with the power, the lion walking into the sheep's pen.\n\n\"Margrave Albert Lancaster, it is my understanding that you have connections with some of the esteemed older generals of Britannia, due to your familial ties and your recent success with Japan-\" Highland said, as he rose from the throne, and took a few steps down the rickety assembled plinth for his throne, not content on sitting in a throne above one of his generals, and a man he was asking a favour for. He wanted to be eye level with him, or as close as he could be. However he was cut off, not by Albert backing away, nor bowing. But instead by his confident snarky comment. \"Out with it Velaines, you want me to request for their transfer to Euro-Britannia.\" Highland stared at him, not with a glare, not with daggers. He just stared, this truly was a far cry from the man he saw that day. A man who might cower at the slightest raising of Charles' voice, Highland was not Charles nor could he ever be Charles. But he was given authority paramount to Charles and authority often only granted by the Imperial Scepter. Yet he still responded like that. \"Given the current situation, I found it best to have men with experience and honor lead our troops.\" Highland explained, keeping his tone, voice and posture steady. He was not one to bend the knee, or crack at the slightest push back by one of his now esteemly cocky generals.\n\n\"Then it will be done. Is that all?\" Albert asked, the look on his face was telling. He looked as if he wanted Highland position, no that was incorrect. He looked as if he knew better than his position, before even waiting for an answer, Albert took initiative, watching as Highland remained silent. He turned away, and went for the door. Approaching the door which was flanked by two ceremonial guards wielding spears.\"No it isn't, remember General Lancaster.\" Highland commented, as he raised his hand up and out, the two guards by the two moved their spears, blocking the entrance preventing the general from taking his leave, especially without turning to meet Highland's gaze, even still Albert did not fully turn around. Only peeking his head back, to be met with the glare of a lion, and the statement of a firm ruler."
 EUR_schneizel_phase_one_military.1.a:0 "\"To watch... your tone.\""
 EUR_schneizel_phase_one_military.2.t:0 "Duke Meets Knight"
 EUR_schneizel_phase_one_military.2.d:0 "He waved, the first thing that giant of a man did, giant even next to Highland himself did was wave. Even as Highland and his entourage approached, Highland was flanked by many Britannian guards, two of which by his sides were wielding ceremonial spears mainly. However there was a small detachment behind him, properly equipped with weapons. His elite guard, and those who would actually defend him, and die for him. \"Highland!\" The deep voice of Manfredi yelled, giving himself away with his booming voice, making himself known out of his own entourage, coming just off their boat at the Magadan port. Highland approached him and stood right in front, though some steps away as he looked at him, and thought just to get down with the customs. \"Knight of Two, Michele Manfredi it is with great-\" However, he did not get to finish in his own voice. As Manfredi took three great strides, and pulled Highland right into a bear hug with one arm, at which Highland could only react by patting Manfredi's back, who boomed at him once more. \"Ah! Leave the dramatics alone, it is good to see you again my friend.\" Truly happy he seemed, to see Highland in person again. Handling affairs through calls, and notes while Manfredi attempted to lead the Euro-Britannian army from Britannia was difficult, and annoying, plus lonely. Manfredi let Highland break the hug, as they went from that right into a firm handshake as Highland preferred, Manfredi had great strength even in a simple handshake.\n\n\"It's good to see you too, are you to understand your orders here?\" Highland said, though he was happy to see his friend too. He understood that they had a nation to secure, a war to win, and work to do. All for Emperor Charles. Manfredi looked at him, a big smile plastered on his face this entire time, as he cracked it for a bit scratching the back of his head. \"Yes, of course! They would not stop reiterating it to me.\" He said, seemingly annoyed about it, but not really. The two men then stood there, for a hot or well cold minute, the biting winter of Russia nipping at them. They stood there, locked into another, without saying a word. Highland looked at him, expectedly but Manfredi said nothing. So Highland cleared his throat. And began to speak again to break the cold air.\n\n\"So you know-\" Only for Manfredi to cut him off again, clearly not wanting to hear the same orders again, especially from his friend. He seemingly led him on that one on purpose, as his eyes glinted and smile grew wider. \"Yes! To establish an organisation of Knights who can carry forth the flame and honor of Euro-Britannia.\" While, his orders were definitely a lot more specific than that, and had a lot better reasoning to them. Highland had to admit that was how Manfredi saw them, and how Manfredi would approach them, and with that in mind. He got it spot on. So, Highland did not correct him. Instead saying."
 EUR_schneizel_phase_one_military.2.a:0 "\"Yes, that's about right.\""
 EUR_schneizel_phase_one_military.3.t:0 "The Greatest Junkpile"
 EUR_schneizel_phase_one_military.3.d:0 "The hanger doors slid open, there was a bundle of excitement for the four pilots who stood there at its precipice waiting for it to finish opening. This is what they had been waiting for, one of the main reasons as to why they transferred and volunteered for Euro-Britannia, which currently existed as a frozen hellhole. They had finally hoped they'd get some shred of credit, proper respect again, a semi decent budget. The four held their breaths while their sergeant was off looking away. When finally the doors stopped and they could see the new planes inside that they had the pleasure of flying. Only one thing could be said.\n\n\"These planes are junk!\" Pilot Lara let out a high pitched screech as they were the first one to rush in and examine one of many planes that rested in the rusted darned old hanger. The other three pilots weren't far behind, the planes seemed. Ancient, outdated, antiquated, a far cry from even the worst planes in Euro-Britannia. Planes that they did not get the benefit of bringing over to fly just yet. \"Damnit, I was really hoping when we transferred to Euro-Britannia we'd get a better budget, this is a priority front and they're still giving us- scraps?\" Osuna commented, running his hand alongside the side of a plane, before quickly pulling it off, looking at his palm now completely covered in dust that he wiped off quickly, on the back of a fellow pilot. The tall Oettingen, who seemed to not notice. Or if they did notice, they didn't care as they adjusted their glasses peering at the planes. First the one closest to them, the one Osuna had left a fresh handprint on. But then they looked across at the others, coming to a simple conclusion in a voice with a thick french accent.\n\n\"All the budget is going to the Knightmare frame's now, and not just the budget...\" He mused, clearly daydreaming about things he'd get in trouble for thinking if their Sergeant could see them. Their Sergeant who was currently still standing by the door, as he reached in his pocket for a flask. To wipe away a headache, or to fight off the cold? None of the pilots seemed to care much which, as they understood both. \"Yeah yeah, the prestige, the honor. All in the hands of those pilots now.\" Harcourt yelled over the hanger as he had gone to the very end, and ran back trying to see if perhaps he could find a gold mine of a jet in this haystack of garbage. His voice seemed bitter, as if reconsidering his career path was a common happenstance now. Once their Sergeant, Bloiss realised he was out of liquor in his flask he finally stepped further inside, snapping at them all."
 EUR_schneizel_phase_one_military.3.a:0 "\"Quit it all of you!\""
 EUR_schneizel_phase_one.2.t:0 "The Serpent’s Cage"
 EUR_schneizel_phase_one.2.d:0 "“Ah, a visitor at this hour?” Her voice was ice cold, not the slightest hint of care in it. With her dull, ghostly golden hair following her head's movement, Isabella Shariac only glanced up from the papers on her desk momentarily. She very quickly looked back down at them to continue scribbling. “The esteemed Lord Highland. Very interesting. What do you want?” She shuffled through papers, the evening orange glow pouring through a single barred window.\nHighland narrowed his eyes on her. Even in just his peripheral vision, he could still understand the circumstances of this room. Cushy furniture, ornate decor, silky curtains... This was the only kind of prison cell fit for a noblewoman with her ties. “Isabella Shariac, I come to offer a pardon written by the Emperor.” He said it simply. There was no need to beat around the bush with a woman of her disposition.\n\nIsabella stood from her desk and grabbed a tall top hat. With her signature headwear, she walked towards Highland, her heels clicking against the wood floor. She stopped in front of him and crossed her arms, Highland towering over the younger woman. “Tell me then, what do I have to do for you?” Her voice lacked any formality, giving Highland the same blunt response he gave her. Despite her careless tone, the expression on her face contradicted her voice. Her lips curled with amusement, her eyes sharpened with curiosity. Anyone who met Isabella would say the same thing. Her face was that of a viper’s.\nTo continue their pattern of simplicity, Highland replied with a matter of fact truth. “You would come to Euro-Britannia to work under me. I am in need of your expertise.” Highland kept his gaze stern, his authority unwavering.\n\nIsabella maintained a venomous smile, her eyes injecting a toxin of unease into Highland. After a moment of thought in a mind that Highland could not nor wanted to comprehend, Isabella walked to the fireplace in the corner of her luxurious cell. “Alright,” she said with a followup of silence. “And I will have my own lab to work in?” She just barely glanced over her shoulder at Highland.\nAlthough she posed it as a question, Highland felt this was not exactly a request. “You will have the resources you need,” he replied. He said no more, opening the door and leaving her. There was nothing more he wished to say to her. After all, she was the type of woman to murder her own husband."
 EUR_schneizel_phase_one.2.a:0 "No good can come from provoking a snake."
 EUR_schneizel_phase_one_economy.1.t:0 "Schneizel's Chessboard"
 EUR_schneizel_phase_one_economy.1.d:0 "There he was, the blonde son, the Second Prince, and the current Prime Minister of Britannia. Schneizel el Britannia, his Emperor's own blood. Though he wasn't there physically, he was there on the screen that Highland was watching, sitting from his uncomfortable throne, hastily put together in a room not meant for it. Just like how Schneizel was appearing to him, on a large screen that was wheeled into the room purely so they could have a seemingly more natural conversation. Something about Schneizel, the way he appeared, or smiled. It gave Highland a prick at the back of his neck.\"Lord Highland, it has been some time since we've last spoken I-\" Schneizel started, Highland was sure his voice wooed the girls, and calmed the masses. But what Highland heard was how Schneizel attempted to speak to him with friendly familiarity. They were familiar, yes, but Highland was familiar with many of Charles' kids, and whether Schneizel realised it or not. His words were undermining Highland's position. Highland could handle that with just his guards, and some of his closer acquaintances present. But not with an envoy of some of Schneizel's own men in the room.\n\n\"Prime Minister Schneizel, my title is Grand Duke Velaines. I would appreciate you, to use it.\" Those words felt almost alien to Highland, to demand the proper use of a title for himself, a title he felt he still had yet to earn. Yet, he understood he needed to, he needed Schneizel to see him as his equal, otherwise Schneizel would continue to speak to him as if he was speaking to his pawn on a chessboard. \"My apologies, I was not made aware of your new title, anyway. You understand why we're having this meeting?\" Schneizel brushed it off, just as Highland expected of him. Even as he narrowed his eyes at him. Highland nodded, he wanted so much to stand just then, to not meet this from this throne. But he held himself, as he had to see this meeting through while sitting in his established position by the Emperor. \"You want your free reign with Euro-Britannia and its people.\" Highland answered as he brought his hands together and clasped them in front, interlocking his fingers together looking at Schneizel, who met the comment head on. Coming at Highland with some of his belief, or philosophy.\n\n\"What do the Euro-Britannian people want, starvation? Or to eat?\" This would be a long meeting Highland thought, and perhaps he was meeting Schneizel too harshly. But he couldn't help it, the way his eyes looked, the way he smiled. It met Highland too harshly. Like a well crafted lie. So, Highland continued to speak the same way responding with."
 EUR_schneizel_phase_one_economy.1.a:0 "\"Your point?\""
 EUR_schneizel_phase_one_economy.2.t:0 "Highland's Crisis"
 EUR_schneizel_phase_one_economy.2.d:0 "The meeting with Schneizel had long since concluded, and while his men and pawns were still hanging around Euro-Britannia, and hanging around Highland himself. Schneizel wasn't a factor anymore, and yet. Highland couldn't stop himself from thinking on that meeting, the suggestions Schneizel made. Or more so his orders, perhaps he was going crazy. Perhaps serving under his Emperor so loyally and faithfully has made him paranoid to those that don't fit a crafted mould. And yet, Schneizel, there was something up with him. Highland understood he was a chess prodigy and master, and he was perhaps now wondering if he saw the entire world as a chessboard, or perhaps just its people as his pawns. A chess match against who? \"What's the point of calling this place Euro-Britannia, if we are simply to follow the policies of the Areas?\" Highland raised his hand up and gripped his head, the door to his office was closed. Express wording given to his assistant to not enter or let anyone in, to simply leave Highland alone, alone to just himself. His thoughts and his words, the blinds on the windows behind him were closed. Even though it was daytime outside, it blocked the light coming in as Highland had his foot mindlessly begin tapping as he thought.\n\n\"I may follow the Emperor's orders, but... this is just.\" Was it a crisis? A crisis of faith? A crisis of morals? Highland had no idea what to make of his thoughts. All he understood was that he could not just reduce his mission to that of conquest of another Area, he wanted to fulfil the Emperor's duty, to reclaim the homeland of so many Britannians. In part to reclaim his own, and yet. Reducing Euro-Britannia to an Area would not accomplish that, its tactics that are unfitting to the nation even if they would work. \"We tricked this nation, we took away their freedom, their identity.\" He admitted it, he knew it this whole time. Despite being the one to make the suggestion to the Emperor to send an offer, it was meant to be honest. It was meant to be just support, and yet it was turned into a trick, a lie. One he never meant to tell, and he didn't even know if the Emperor intended it to be told. Highland was so close to his Emperor and yet, now he had one thought racing through his mind. What opinion did he hold on lies? He may never know, for Charles may never reveal that to him. Despite all of his years of service and friendship. Or was it just service? Highland was for a moment, crumbling, his voice shaky and unknown to anyone but him, a voice he kept for his darkest thoughts.\n\n\"And now it's happening again... Will I turn out like Sergei?\" Dead, that's how Sergei turned out. A dead man, would that be Highland's fate in the end? To be used, and then killed when his use was no longer necessary. Suddenly, Highland's iron will snapped himself back again. It felt like it took all of his strength to stop the rapid movement of his foot up and down, he had to turn his mind into an iron cage. He would not fall apart like this, not for Schneize's orders. Even if Euro-Britannia became an area in all but name, he had to hold himself together. Yelling his immediate closing thought out loud and not just in his head."
 EUR_schneizel_phase_one_economy.2.a:0 "\"Snap out of it Highland!\""
 EUR_schneizel_phase_one_economy.3.t:0 "A Cry of the Land"
 EUR_schneizel_phase_one_economy.3.d:0 "He was almost too late, he was running with all his might, all his strength to catch up. The winter chill bit at his bones, and yet still he ran. His age itself was fighting him and yet still he ran, he could hear it in the distance. The thundering roar of yet another Britannian boat, a vessel containing yet more stolen goods of resources from his homeland, roaring to life to take these resources and take them far, far away. Where they will fuel a foreign war machine, instead of providing for the people. The man kept running, his ushanka fell off when he almost ran right into a seemingly Britannian noble man. But as the noble man yelled at him he didn't have the time to turn to get it back, nor yell back at him as he usually would. With all his running he finally had it in sight, the Britannian boat. A large vessel, one of the last docked within this part of the Okhotsk Port. He couldn't stop them all, but maybe he could stop this one.\n\nThere were a few Britannian guards set out along the dock, almost forming a wall to prevent people busting in. But they weren't fully kitted out, not these guards, not in the typical full body Britannian gear. Instead they were rugged up, wearing clothes upon clothes, some covered with furs emblazoning the Britannian symbol to keep warm. While the running man could see their faces, he didn't care who they were. \"Stop! Stop this boat now!\" The running man shouted, his Russian accent thick but his words were clear and cut through. Just as he cut right through the Britannian line, he threw himself between them just as they tried to stop him, getting right past. He heard many guns whir to life, but he did not care. He sprinted and went for one of the ramps that lead onto the boat, climbing it by running with tremendous speed. He went for the top, the nearest door to the captain's cabin he could find. Just as he heard the thunder of heavy footsteps, and a Britannian shout.\n\n\"What- what are you doing get off there!\" The Russian man didn't listen, didn't respond, he just found the door, and immediately attempted to get it open, he tried and tried, pulling, pushing, twisting and turning. But nothing he could do made the door come loose or even budge. \"How could you do this! You come in here and rip our livelihoods out from under us.\" He shouted, hoping with desperation that someone on the other side would hear him, and would perhaps listen to him. Would change something, for him. He would never know, as he heard the shouting guards. \"Seize him!\" One commanded, the man pounded his fist hard against the door, it stung it hurt as it hit metal but he did. Until he couldn't anymore, and he felt a hand roughly grab his shoulder, he fell to his knees in desperation pounding on the door as he felt more hands grab him, pulling him restraining him, he simply cried."
 EUR_schneizel_phase_one_economy.3.a:0 "\"Damn it all!\""
 EUR_schneizel_phase_one_economy.4.t:0 "A Noble Investment"
 EUR_schneizel_phase_one_economy.4.d:0 "As the man walked in, Highland almost attempted to let out a soft smile at him. But he couldn't, not when he realised there were other eyes on him. He knew he had to remain stoic, stoic, confident, and calm. A ruler in every sense of the word, but even then. He was unbelievably appreciative of Earl Orleans coming out to Euro-Britannia at his request, so much so that as the Earl stepped in and gave him a soft bow as Highland sat at his throne, that Highland simply stood up and approached him. He was continually uncomfortable sitting in his throne, so he left it the moment a chance arrived, walking down from its plinth he spoke simply and calmly. \"Earl Orleans, I appreciate you coming out all this way. I understand things are busy in the homeland at the current moment.\" As the Earl returned from his bow, Highland was already offering his hand. They clasped them together in a firm handshake, one of mutual respect and trust. The Earl while not receiving a smile from Highland, did give him a small one of his own, through his blonde golden beard, as his hair was swept back. Speaking in his own voice.\n\n\"Not to worry about all that, I was delighted to come visit and see what you've done my friend. But... you mainly wanted to talk about business didn't you.\" There was perhaps some excitement in his words at first, perhaps a twinkle in his eyes just to move around Okhotsk and see the changes underway into transforming it into a city fit for Euro-Britannia, perhaps he was even just interested in seeing how the Knightmare frame pilots were performing under these new frozen hellhole conditions, but he conveyed that there wasn't much time for that. Something that Highland was keenly aware of himself. \"You understand my position with the Empire's nobility isn't the greatest, I was hoping if you might be able to... open the doors to them for Euro-Britannia, to get some of them to invest in it, right now we lack the needed strength the Empire has to sustain ourselves.\" While to Highland, his words came off as awkward, perhaps even begging. To everyone else they came across as the confident voice of Grand Duke Velaines, exactly what they expected of him. And exactly the way Highland said it outloud, even if inside he was unsure.\n\nEarl Orleans nodded along to his words, understanding them. He himself was familiar with Highland's unique position, being so close to the Emperor made him a target of envy. And on top of that, he was someone who did not fit the classical noble mould. But at the same time, neither did Orleans. \"Ah I understand, well good news.\" Orleans announced in a half hearted manner, almost as if it was the opening to a bad joke. But nonetheless, even if it was a joke Highland humoured him and asked, while on the outside he remained stoic. He perhaps hoped it would be a funny one, that might just be very nice this time of year to hear. \"And what is that?\" He asked, Orleans smiled wider. But not in a humorous or mischievous manner, but instead a wide honest smile. Saying."
 EUR_schneizel_phase_one_economy.4.a:0 "\"You have an investment already.\""
 EUR_schneizel_phase_one_economy.5.t:0 "The Okhotsk Trade Hub"
 EUR_schneizel_phase_one_economy.5.d:0 "Highland was overseeing some documents, he had his glasses on just for reading a couple of papers in front of him. Letters, and official documents from the three greatest powers in the world. All sitting on his desk, he picked up the one from the E.U. and examined it closely, looking for any secret meanings. Clauses, or perhaps traps that they were attempting. When he saw none, he picked up the one confirmation from Britannia in his free hand, holding both flipping back and forth just to compare them. \"Grand Duke Velaines? What do you have there?\" The shy, timid voice of his assistant chimed in as she approached him, he didn't even notice her enter through his inspection of the documents, of which he lowered and placed down as she stood in front. He expected she was looking for something to do, documents to run for him, or something to fetch for him. While he could've had a legion of servants, or brought his own from Britannia. He was content with having a Russian assisting him, content to compare her reaction to some of his actions and efforts, however Britannia would always have to take precedence, something he hoped she knew.\n\n\"Letters, representatives of the E.U. and Chinese Federation have expressed their interest in Euro-Britannia being a neutral hub of commerce.\" He answered her softly, he realised just then that she hadn't been brought into the loop of what was happening. The agenda kept hushed and on the downlow under recommendations from everyone who knew about them, but as he gauged her reaction. He was able to tell there was no worry in her now knowing, she showed no sign of illwill or intent, minor shock but she hid that quickly as she began to think back to what had happened previously. She asked him in a soft voice. \"Do you really see that as a wise idea... I mean, have you even checked with Sch- Schneizel-\" She stuttered on the second prince's name, he couldn't blame her. After all, it would be foreign for her to say, but he also saw this as a chance to correct or perhaps wash away some of the beliefs she may have with how things currently worked in Britannia. All the while keeping his own thoughts, or attempting to keep them out of it even while they slip in.\n\n\"Is Prime Minister Schneizel the Emperor?\" He asked her, equally gently. Not trying to scold or scare her, just trying to make her understand. Because while she would've understood the President of Russia being one of the highest powers to worry about, and the position of President being similar to the Prime Minister, at the very least in Australia it was basically the same position. She would now need to understand this is not the case in Britannia. \"No...\" She was still timid, and sheepish she even took a step back, which Highland couldn't stop, he only reached his hands up and removed his glasses. Hoping that his grey eyes unobscured could offer her some comfort. To her he simply reaffirmed his loyalties and his position."
 EUR_schneizel_phase_one_economy.5.a:0 "\"I only serve the Emperor.\""
 EUR_schneizel_phase_one_economy.6.t:0 "Imperial Announcement"
 EUR_schneizel_phase_one_economy.6.d:0 "Highland was growing restless, constantly adjusting in his throne. Uncomfortable to sit in it, he was much more familiar with kneeling or standing before it. That sitting in it, well, it wasn't uncomfortable because it was hastily thrown into a room unprepared or meant for it. It was uncomfortable because Highland was placed down in it, feeling unprepared or meant for it. He thought that perhaps he never would, it did not help that he had large blaring studio lights down on him. Two ceremonial guards flanked his throne and the plinth it stood on, in a good shot of the frame. To convey strength alongside Highland, the camera was adjusted, zoomed in and out. He couldn't see the person behind it, completely covered by it, just focusing on the glass within it. That reflected his own person back at him. A person in a throne, one he couldn't recognise. Not until, it shifted to Charles. That was how he could do this, do this in front of the camera. He had to channel his Emperor. When the camera clicked on, the script ran through Highland's mind. Though it was his mouth that was speaking, the tone came across like Charles' or attempted to, it still had within it a tone of Highland's person.\n\n\"To all imperial subjects of Euro-Britannia! Britannians and Honorary Britannians alike!\" He announced, his hands gripping the arm rests of the throne hard, the gold felt like it would break under his grip, under his tension. All the while he tried to let it go, just let himself focus and relax, but he could not. He could not relax in the throne, he felt like this was right. That a ruler should never be relaxed in his throne. \"It is with great honor that I make this announcement to you.\" Highland watched as someone from the side of the camera was fiddling, fiddling in a pile of apparently cue cards. As if they were prepared for him to make a mistake, for them to catch him just in case. However, he would not need them too. He had the strength to have this on his own, as he continued. This time, he added a flair, he took his right hand off the throne, and threw it out in front, uncurling his fingers.\n\n\"When we offered our hand to the old Russian Far-East, it was in squalor. It was wretched, barely able to stand on its own two feet.\" He rotated his hand until it became an open hand, an offer, a sign of giving. Or a sign of needing, of wanting. Either way, it reflected the words ringing in Highland's head. \"With help from Britannia, we have been able to rectify this. Now Euro-Britannia is able to stand on its own two feet! And look towards the future.\" He then crushed this open hand, he turned it into a fist, a fist in the air that he held, and as he continued to speak, he rose from his throne, standing tall. While he was dressed in his usual garb, they took on another look while he stood there, the camera tilted up to capture his presence and just looking at him now. All the while the lights beamed on him, casting him in an ethereal glow. He then rose his fist high above his head and yelled proudly."
 EUR_schneizel_phase_one_economy.6.a:0 "\"All hail Britannia!\""
