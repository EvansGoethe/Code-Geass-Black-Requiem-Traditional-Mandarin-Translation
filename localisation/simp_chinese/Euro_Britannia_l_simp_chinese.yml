 EUR_intervention.3.t:0 "Message From Euro-Britannia"
 EUR_intervention.3.d:0 "Subject: Aid Against Our Enemies\nFrom: Grand Duke Velaines\nTo: Commander in Chief of the EIZ\n\nIn the name of Charles Zi Britannia, 98th Emperor of the Holy Britannian Empire. I Grand Duke Velaines, leader of Euro-Britannia in his name send forth this message to you.\n\nOur interests have aligned, it has been decided by the House of Lords and by the will of the Emperor that we cannot allow the false pretender Tsar to continue his measly existence. Thus forth, we will render you aid and support in order to deal with this nusiance.\n\nAll hail Britannia!"
 EUR_intervention.3.a:0 "'Such a strange nation...'"
 EUR_intervention.4.t:0 "Message From Euro-Britannia"
 EUR_intervention.4.d:0 "Subject: Aid Against Our Enemies\nFrom: Grand Duke Velaines\nTo: Vsevolod Romanov\n\nIn the name of Charles Zi Britannia, 98th Emperor of the Holy Britannian Empire. I Grand Duke Velaines, leader of Euro-Britannia in his name send forth this message to you.\n\nOur interests have aligned, it has been decided by the House of Lords and by the will of the Emperor that we cannot allow the continued intervention of the corrupt democratic EIZ to continue in Russia. Thus forth, we will render you aid and support in order to deal with this outsider influence.\n\nAll hail Britannia!"
 EUR_intervention.4.a:0 "'The Tsar and Emperor, unite.'"
 EUR_intervention.5.t:0 "Moscow Lie in Ruin..."
