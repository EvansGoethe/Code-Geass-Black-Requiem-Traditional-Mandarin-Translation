 EUR_First_Site_Add_Info:0 "「該航天港由歐洲私營企業與俄羅斯航太局於 90 年代在馬加丹合作建造，是赤道非洲以外最大的運作中歐洲航太局（ESA）設施。儘管其非赤道位置使其只能作為賴伯維爾和維多利亞航天港的備份，但得益於繁榮的私營電信發射產業，它擁有大量的運載火箭儲備。」"
 EUR_Second_Site_Add_Info:0 "「新西伯利亞綜合體是歐洲航太局內部競爭中東側的驕傲，擁有原始的航太製造潛力。工業中心與馬加丹航天發射場的臨近，使克拉斯諾亞爾斯克比非洲或歐洲的航太工廠更具優勢。除了龐大的工業產能外，克拉斯諾亞爾斯克還擁有舊暴風雪號太空梭計畫的庫存，以便在經濟太空競賽中與歐洲的可重複使用火箭競爭。」"
 EUR_Third_Site_Add_Info:0 "「烏拉山太空地帶是沿北烏拉山脈延伸的無線電望遠鏡、地面站、中繼天線和雷達群的俗稱。歷史上，這些站點是由各種私營電信公司、研究機構、軍事部門和大學開發的，他們負擔不起歐洲航太局主導的阿爾卑斯地區的場地費用。雖然沒有正式的主站點，但統一他們的管理應該不難。」"
 EUR_Fourth_Site_Add_Info:0 "「作為俄羅斯太空計畫的掌上明珠以及他們對歐洲航太局的主要貢獻，莫斯科研究所一直處於火箭推進劑研究的前沿，參與了幾乎每一次歐洲航太局飛行任務的火箭發動機設計。在與德國人的激烈競爭中，莫斯科研究所是歐洲航太局計畫的重要組成部分。除了作為俄羅斯火箭設計的研究中心外，它還提供了從軍事火箭到反坦克導彈（ATGM）的設計。」"
