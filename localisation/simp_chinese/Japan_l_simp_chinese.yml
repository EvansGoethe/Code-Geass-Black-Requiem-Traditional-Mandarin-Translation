 stagnant_population_5_desc:0 "必須指出，日本目前仍是世界上人口最多的國家之一，但近幾十年來其出生率遭遇銳減，數據表現比大多數工業化國家更糟糕。這種不可持續的狀況已開始對勞動力市場和工業生產率方面造成影響。"
 resource_economy:0 "出口導向型經濟"
 resource_economy_desc:0 "自發現大量櫻石礦藏，尤其是在富士山下，日本已成爲世界領先的資源出口國。政府利用這一點掩蓋金融領域的諸多問題，並維持經濟的高速增長。最終，幾乎所有利潤都流入了實力雄厚的工業集團手中。"
 resource_economy_2:0 "出口導向型經濟"
 resource_economy_2_desc:0 "自發現大量櫻石礦藏，尤其是在富士山下，日本已成爲世界領先的資源出口國。政府利用這一點掩蓋金融領域的諸多問題，並維持經濟的高速增長。最終，幾乎所有利潤都流入了實力雄厚的工業集團手中。"
