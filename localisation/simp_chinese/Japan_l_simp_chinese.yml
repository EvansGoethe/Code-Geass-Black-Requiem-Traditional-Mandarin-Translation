 PW_unexpected_victory:0 "意想不到的勝利！"
 PW_unexpected_victory_desc:0 "勝利！一場看似不可避免失敗的戰爭，最終卻化作我軍的輝煌勝利。我們迫使不列顛尼亞簽署了富士條約，從此將自己永遠銘刻於世界史冊。多虧了首相樞木的鋼鐵意志，證明了我們能自己能夠掌控命運。但凡事皆有代價……"
 PW_rubber_stamp_gov:0 "橡皮圖章式立法"
 PW_rubber_stamp_gov_desc:0 "戰爭期間，許多政府職能被移交給那些行動迅速果斷、能夠做出艱難但必要決定的人。最終，這種做法奏效了。而目前國家形勢不允許我們沉湎於過去。我們將把政治權力移交給能夠勝任的人。一切都是爲了日本。"
 PW_adress_mil_anarchy:0 "解決軍事無政府狀態"
 PW_adress_mil_anarchy_desc:0 "其中最重要的問題之一是軍隊內部的混亂局面。樞木首相通過廣播和電視向所有軍人和武裝人員發表了慷慨激昂的講話，要求他們停止阻撓政府政權的恢復。這次講話的效果如何尚難預料，但即便如此，單靠講話顯然是不夠的。"
 PW_peace_pres_act:0 "和平維護法"
 PW_peace_pres_act_desc:0 "我國剛剛經歷了幾個世紀以來最嚴重的領土攻擊。我們飽受戰爭之苦，無力再發動新的戰爭。樞木首相已提交一份文件草案，概述了一系列旨在維護地區和平與穩定的措施。"
 PW_democracy_question:0 "民主問題"
 PW_democracy_question_desc:0 "首相樞木的第二個任期即將結束。雖然戒嚴令仍然有效，但或許是時候考慮恢復一些基本的民主要素，比如全民普選？"
 PW_confront_kirihara:0 "對抗桐原"
 PW_confront_kirihara_desc:0 "桐原泰三已成爲日本戰後政治生活中舉足輕重的人物。他將大量的政治、媒體和經濟資源集中在一人手中。這種權力集中是造成我國嚴重不穩定的根源。我們必須在爲時過晚之前譴責這種爲謀取私利而濫用戰時權力的行爲。"
 PW_uniformity_act:0 "統一法案"
 PW_uniformity_act_desc:0 "現在，我軍內部的無政府狀態已經結束，但我們面對的是衆多各自爲政、毫無組織性的部隊。我們應當考慮頒佈一項法令，以統一全軍。"
 PW_tohdoh_position:0 "藤堂的立場"
 PW_tohdoh_position_desc:0 "藤堂鏡志朗是一位戰爭英雄，他無與倫比的軍事才能爲日本帶來了輝煌的勝利，在日本民衆中贏得了極高的聲望。有些人甚至稱他爲“日本的救星”。但自戰爭結束，日本陷入戰後動盪時期以來，藤堂將軍很少公開露面。或許他的公開露面能對日本產生積極的影響。"
 PW_population_question:0 "人口情況？"
 PW_population_question_desc:0 "我們已經清點完了上次戰爭的損失。四分之一的男性喪生，三分之一的居民受傷。莊稼被燒燬或無法耕種，超過60%的房屋不適宜長期居住。我們失去了人口，失去了糧食，失去了家園。這是一場前所未有的災難。"
 PW_international_aid:0 "呼籲國際援助"
 PW_international_aid_desc:0 "戰後，我國正處於內部崩潰的邊緣——社會儲備幾乎耗盡。戰爭尚未結束，它只是從與他國的戰爭演變爲一場與饑荒、資源匱乏和社會矛盾的戰爭。現在是我們放下傲慢，尋求國際援助來應對當前局勢的時候了。"
 PW_reassure_chinese:0 "安撫中國"
 PW_reassure_chinese_desc:0 "日本在太平洋地區幾乎沒有盟友。我們的經濟嚴重依賴外部資源注入，而戰後，我們實際上沒有任何途徑來保障自身生存所需的資源。儘管多年來日中關係並非十分友好，但作爲鄰國，建立良好的關係將有利於我們兩國。"
 PW_partial_dem:0 "開始復員"
 PW_partial_dem_desc:0 "日本大規模的戰爭行動、臃腫的預算、不計前嫌的殺戮以及龐大的戰爭機器都已成爲過去。我們爲此付出了巨大的犧牲，無論是鮮血還是鋼鐵。爲了彌補資源匱乏，無法保障那些爲我們浴血奮戰並最終贏得戰爭的英雄們的生命，我們需要讓經濟更加惠及構成它的每一個人。"
 PW_growing_violence:0 "不斷升級的暴力"
 PW_growing_violence_desc:0 "戰火熊熊，留下了大量的餘燼——轟炸造成的慘痛創傷、強制徵兵、武器氾濫到幾乎平民百姓都能找到武器、日益緊張的局勢、食物和物資的匱乏……一切都開始崩潰，而對於人們對他們現在所處世界的憤怒，我們幾乎無能爲力。"
 PW_tokyo_strike:0 "東京大罷工!"
 PW_tokyo_strike_desc:0 "局勢正在迅速失控；此刻，一場大規模暴動正在醞釀——至少五十萬人，其中許多人持有武器，甚至可能還有更多人隱蔽攜帶武器，正在東京街頭遊行，要求政府採取行動改變現狀。政府竭盡全力撲滅一處火情的同時，另一處又燃起了熊熊烈火。"
 PW_back_in_control:0 "重回掌控"
 PW_back_in_control_desc:0 "執行警方的祕密計劃，調動我們能夠調動的所有軍隊，確保城市重要設施的安全，保護我們的人民免受這場瘋狂暴亂的侵害——這僅僅是我們應對這場企圖將整個日本推向崩潰邊緣的瘋子叛亂所需採取的行動的開始。會有傷亡，但與我們所經歷的一切相比，這只是微不足道的犧牲。我們都明白這一點。"
 PW_chaos_expand:0 "混沌蔓延……"
 PW_chaos_expand_desc:0 "或許是由於現有人員能力不足，或許是由於我們針對這種情況制定的計劃執行不力，最終我們失敗了：現在是時候承認政府已別無選擇。叛軍似乎羣龍無首，目標模糊，正趁機作亂。因此，我們只能等待局勢自行解決……無論如何。"
 PW_it_falls_down:0 "…一切都崩塌了"
 PW_it_falls_down_desc:0 "我們已越過盧比孔河，此刻再無回頭路。政府已然崩潰瓦解，國內再無其他主要力量能掌控局勢。眼下無政府狀態已然爆發，我們唯一能做的便是祈禱。我們只能期盼，希望之火尚未熄滅。"
 PW_military_rule:0 "挽救局勢"
 PW_military_rule_desc:0 "最糟糕的情況發生了。樞木治國失敗，桐原年事已高。在藤堂的領導下，參謀部動員了剩餘的忠誠部隊，並臨時擔任首相，殘酷鎮壓了起義。這個國家再次陷入戰火，需要從中拯救出來。但奇蹟能否第三次發生呢？"
 PW_kirihara_steps_in:0 "桐原的干預"
 PW_kirihara_steps_in_desc:0 "鑑於樞木政府無力獨自應對起義，桐原調動京都家的聯合力量，對動亂進行了殘酷鎮壓。行動中，首相樞木被示威者槍擊，後因傷勢過重在醫院去世。國會召開緊急會議，任命桐原爲代首相。"
 second_kururugi_term:0 "樞木的第二任期"
 second_kururugi_term_desc:0 "勝利！\n我們的政黨再次在全國選舉中獲得最多選票！\n現在是時候正式組建新政府內閣了，儘管我們將被迫與強大的工業集團和目前排名第二的自由派政黨立憲民主黨做出妥協。"
 parliament_supremacy:0 "議會的統治地位"
 parliament_supremacy_desc:0 "經過保守黨和自由黨議員之間的一系列遊說和妥協，我們幾乎獲得了絕對多數席位。這樣一來，我們就不會陷入無謂的阻撓，能夠順利推行我們的政治議程；儘管我們有時仍需應對一些小的要求或保證。"
 press_influence:0 "按下“支持”"
 press_influence_desc:0 "顯然，一個強大的政黨需要一些好的廣告來維護其良好的公衆形象。幸運的是，日本的大多數報紙都有很強的順從傾向，只要來自產業集團施加一些壓力，就足以平息事態。"
 foreign_problems:0 "我們在世界中的位置"
 foreign_problems_desc:0 "自第一次太平洋戰爭慘敗以來，日本一直奉行完全中立的理念。儘管如此，我們仍然可以在太平洋和亞洲運用軟實力，而無需進行任何直接對抗。正因如此，我們過去是、現在是、將來也仍將是太平洋的明珠。"
 sakuradite_power:0 "櫻石的力量"
 sakuradite_power_desc:0 "櫻石可以被認爲是日本近期經濟穩定的真正幕後推手，但誰說我們不能進一步利用鄰國的需求來增加收入，從而引發真正的經濟繁榮呢？"
 brit_treaty:0 "與魔鬼的交易"
 brit_treaty_desc:0 "不列顛尼亞的殘暴統治舉世聞名，但我們可以對此睜一隻眼閉一隻眼，以換取皇帝暫時擱置一系列令人惱火的法令。尤其值得一提的是，我們將面臨帝國龐大內部市場資源出口關稅的大幅降低。"
 china_treaty:0 "新中國貸款"
 china_treaty_desc:0 "中華帝國樂於繼續慷慨借貸，用於櫻石礦藏的勘探和開發。當然，我們清楚宦官們的真實意圖，但桐原大臣已保證，任何外國勢力都會被京都的家族牢牢控制。"
 eu_treaty:0 "吸引歐洲巨頭"
 eu_treaty_desc:0 "隨着勞動法的改革，我們吸引了大量歐洲跨國公司，特別是法國跨國公司的投資，他們非常樂意在我國設立新的分支機構，從而促進我國國內產業的發展。"
 great_gamble:0 "最後一步"
 great_gamble_desc:0 "時不我待。我們的經濟政策只能維持國家財政平衡幾個月，我們必須採取行動。這將是樞木政府最大的成就，也可能是最大的失敗。"
 house_always_win:0 "莊家總是贏家"
 house_always_win_desc:0 "勞動力市場達到完美平衡，礦業也迅速發展，我們已經形成了一個良性循環，這將帶動整個日本經濟！憑藉這一優勢，我們可以以最佳方式開啓第二個任期，並在下次選舉中佔據優勢。"
 we_are_screwed:0 "出問題了……"
 we_are_screwed_desc:0 "我們近期的舉措給國家經濟和產業帶來了前所未有的衝擊。銀行倒閉，企業紛紛遷往其他市場，民衆很快也將開始對政府表達憤怒……"
 fixing_our_mistakes:0 "遏制災難"
 fixing_our_mistakes_desc:0 "桐原提出了一項平衡方案，或許能將局勢恢復到可控水平。具體而言，所有虧損的莊園都將以低價出售給歐洲或中國公司。這樣一來，我們就能爲枯竭的市場注入新的流動性，但同時也會損失大量的工業實力。"
 good_start:0 "這是個好的開始"
 good_start_desc:0 "樞木再次展現了他卓越的政治才能，未來一片光明。此外，如果日本能夠保持其國際地位，這或許將開啓日本新的黃金時代。"
 brit_madness:0 "對抗不列顛尼亞的瘋狂"
 brit_madness_desc:0 "不列顛人終究露出了真面目，他們的目標很明確：稱霸太平洋。雖然我們沒有足夠的軍事實力直接與他們對抗，但我們可以通過與歐盟和中國結成戰略聯盟，從經濟和工業層面削弱他們。"
 enforce_blockade:0 "執行封鎖"
 enforce_blockade_desc:0 "遏制不列顛尼亞的重要一步是對其戰略資源，特別是櫻石，實施近乎全面的封鎖。這樣一來，我們既能向其他超級大國表明我們的決心，更重要的是，這或許能迫使不列顛尼亞與國際社會展開談判。"
 close_embassy:0 "關閉大使館"
 close_embassy_desc:0 "雖然這主要是一種象徵性舉動，但我們仍將強行關閉不列顛尼亞駐東京大使館。這隻會加劇兩國本已緊張的關係，但無論在日本國內還是國際上，都將是一次巨大的政治勝利。"
 sawasaki_call:0 "澤崎的來電"
 sawasaki_call_desc:0 "我們內心深處的擔憂最終還是應驗了：歐盟和中國除了發表挑釁性言論或採取象徵性行動之外，似乎並不值得信賴。因此，祕密實施“弓箭手行動”仍然是一個可能的解決方案。"
 chinese_advisors:0 "中國軍事顧問"
 chinese_advisors_desc:0 "中國是不列顛尼亞在太平洋地區的主要對手，也是距離我們最近的超級大國。或許我們可以在朝鮮半島的軍事化區域訓練我們的軍官，學習他們的戰略規劃和防禦技巧，儘管我們無法依賴他們龐大的軍隊。"
 import_guns:0 "槍支大規模進口"
 import_guns_desc:0 "自新千年開始以來，日本的軍事裝備庫長期被忽視。雖然我們無法在短期內解決所有這些問題，但我們可以用現代化且價格低廉的中國型號部分替換許多老舊裝備；以此換取更緊密的經濟合作。"
 EU_advisors:0 "歐洲軍事顧問"
 EU_advisors_desc:0 "日本和歐盟有着悠久的國際團結歷史，因爲兩國擁有許多共同的民主和道德價值觀。雖然與超級大國接觸更加困難，但我們可以派遣軍官前往俄羅斯，學習他們著名的進攻戰術。"
 emergency_laws:0 "第3271號經濟法令"
 emergency_laws_desc:0 "是時候通過特別法令來徹底整頓我們的軍工複合體了。這些法令將賦予政府在工業領域更大的行動空間，並在日本全國範圍內啓動部分動員。"
 deploy_fleet:0 "艦隊部署"
 deploy_fleet_desc:0 "多年來，日本共和艦隊主要用於巡邏或執行一些枯燥乏味的任務。隨着島田海軍上將的任命，艦隊領導層將進行重組，以更有效地管理現有艦艇和武器裝備。"
 conscription_laws:0 "第1278號徵兵令"
 conscription_laws_desc:0 "最重要的措施將是重新推行強制徵兵制。儘管如此，我們仍能實施原始計劃的輕量版方案，因爲民衆對任何被視爲國家軍事化的激進舉措都會產生強烈牴觸。"
 will_it_be_enough:0 "夠了嗎？"
 will_it_be_enough_desc:0 "我們已經盡力了，暴風雨前的寧靜幾乎籠罩着每一位政府成員。每個人都在問同一個問題：這樣做足以保住日本嗎？"
 domestic_things:0 "應對人口危機"
 domestic_things_desc:0 "人口危機是現代日本的一大禍患，必須遏制。在樞木的批准下，我們將嘗試以某種方式緩解這一局面。此外，我們將成爲世界上首個直接應對這一問題的國家。"
 family_funds:0 "對家庭的補貼"
 family_funds_desc:0 "家庭是我們社會的核心，儘管我們也深知家庭需要大量的資金投入。爲了讓年輕人安心，我們可以提供各種國家補貼，鼓勵結婚和組建穩定的新家庭。此外，我們還可以穩定一部分有幼兒的日本夫婦的經濟狀況。"
 promote_datings:0 "贊助約會"
 promote_datings_desc:0 "我們必須面對現實，考慮到許多年輕男女彼此不感興趣或害怕對方；我們可以嘗試通過政府親自推廣贊助約會來迫使他們改變這種狀況。"
 nationalist_support:0 "民族主義者的支持？"
 nationalist_support_desc:0 "迄今爲止，我們從近期的人口統計報告中獲得的成果寥寥無幾，且已開始陷入思路枯竭的困境。儘管如此，部分民族主義議員仍呼籲採取激進手段解決該問題，樞木政府內部因此分裂爲兩個對立陣營。"
 ban_abortion:0 "將墮胎定爲刑事犯罪"
 ban_abortion_desc:0 "正如我們向右翼派系承諾的那樣，我們將通過一系列法律，嚴格限制女性墮胎的可能性。顯然，這會迅速在全國範圍內引發動盪和抗議浪潮，但我們完全可以置之不理，等待局勢平息。"
 no_birth_control:0 "放鬆對避孕的管制"
 no_birth_control_desc:0 "精簡人口統計部門中大部分繁瑣的官僚機構是另一項重要舉措，因爲這將大大降低推行近乎自由生育政策的諸多障礙。此外，我們的部長們也警告我們，此舉將在國內引發強烈反彈。"
 suprise_invasion:0 "突襲！"
 suprise_invasion_desc:0 "樞木果然是對的！\n不列顛尼亞軍隊正在登陸日本海岸，與此同時，通過海軍和空襲已發出非正式宣戰。日本只能奮起反擊，等待中國和歐盟的援助。"
 timing_is_everything:0 "時機至關重要"
 timing_is_everything_desc:0 "儘管我們初期處於劣勢，但在這個階段我們必須不惜一切代價抵抗，否則我們將被迫迅速投降。當務之急是加強軍事指揮體系，整頓部隊秩序。"
 war_committee:0 "建立戰爭委員會"
 war_committee_desc:0 "首先，我們必須喚醒日本建制派，使其從震驚中恢復過來，同時組織更高效的戰爭管理。爲了實現這一目標，我們可以成立一個特別戰爭委員會，協助國會和樞木內閣開展工作。"
 call_all_reservists:0 "召集所有預備役人員！"
 call_all_reservists_desc:0 "委員會已下令在全國範圍內對預備役人員進行全面動員。此外，我們將能夠每週招募更多人員入伍，從而擁有源源不斷的人力資源。"
 factory_conversion:0 "實施工廠轉換！"
 factory_conversion_desc:0 "我國經濟已發展成爲以民用和資源產業爲主的經濟體，軍工複合體較少。因此，有必要賦予政府廣泛的權力，以對民用工廠進行特殊改造，並支持國家戰爭機器的復甦。"
 bunkers_building:0 "啓用應急碉堡！"
 bunkers_building_desc:0 "不列顛尼亞的火力已然強大，我軍已不堪重負。爲避免我軍寶貴的裝備繼續遭受Knightmares的無謂損失，我們必須在主要工業和行政中心附近構築有效的防線和防禦工事。"
 bring_todoh:0 "全力支持藤堂！"
 bring_todoh_desc:0 "藤堂中尉是這場戰爭中的一線希望，因爲他是唯一一個曾給不列顛尼亞人帶來慘痛失敗的人。鑑於此，委員會提議與藤堂密切合作，並最終提拔他到更高的職位。"
 this_is_not_working:0 "這行不通。"
 this_is_not_working_desc:0 "祖國正在淪陷。\n不列顛尼亞人步步緊逼，攻城略地，正蠶食着我們的防線，軍隊已瀕臨崩潰。爲了拯救國家，樞木必須挺身而出，不惜一切代價，採取一切必要的行動。"
 great_speech:0 "偉大的演講"
 great_speech_desc:0 "在樞木經歷最漫長的夜晚過後，他準備發表講話，向精疲力竭的國民廣播，呼籲拯救祖國。尤其將號召全體日本民衆投入殊死而堅定的防禦，無論手段如何、代價多大。此外，政府也準備採取……非常措施來拯救日本。"
 reasserting_control:0 "重新掌控"
 reasserting_control_desc:0 "接下來的行動至少可以說會是激進的，我們不能坐等議會或民主制度的低效運作。因此，救國委員會將從議會手中奪取全部權力，樞木內閣將對國家行政部門擁有近乎獨裁的特權。"
 extreme_bushido:0 "支持極端武士道"
 extreme_bushido_desc:0 "日本在戰爭與競爭中向來秉持強硬而嚴苛的武士精神。值得慶幸的是，我們能夠重新啓用這些理念，推動日本民衆爲捍衛國家而進行至高無上的頑強抵抗——即便這意味着死亡或在敵人的手中承受更多苦難。"
 extreme_conscription:0 "所有成年人必須服役。"
 extreme_conscription_desc:0 "無論性別、職業或社會地位，所有人都必須參與保衛日本國家的神聖職責。沒有全體勞動者和民衆的參與，全面動員是不可能的。理念必須始終如一：“勝利或死亡！”"
 people_militia:0 "人民防衛民兵"
 people_militia_desc:0 "我們正遭受正規軍內部懦弱士兵的逃兵之苦。因此，委員會將授權組建主要由普通公民組成的當地準軍事組織，從補給線和前線兩方面與不列顛尼亞作戰。"
 infrastructure_obliteration:0 "S.I.D計劃"
 infrastructure_obliteration_desc:0 "我們必須不惜一切代價阻止不列顛尼亞的推進，包括戰略性地利用櫻石礦藏摧毀其重要的戰略基礎設施，以此拖延他們的軍隊，即便平民也會因此受害。此外，不列顛尼亞人並不完全瞭解櫻石的爆炸威力，這將會是一個出其不意的妙招。"
 chemical_warfare:0 "化學戰"
 chemical_warfare_desc:0 "我們之前加入的旨在規範國家間道德戰爭規則的巴黎國際條約並不能阻止我們使用祕密儲備的高威力神經毒氣。這些毒氣，再加上我們部署在前線的各種致命陷阱，肯定能阻止不列顛尼亞士兵的進攻。"
 pouring_mercenaries:0 "僱傭兵的天堂"
 pouring_mercenaries_desc:0 "倘若我們龐大的人力仍不足以填補前線撤退軍隊留下的空缺，我們將向全球各地的僱傭兵公司支付鉅額費用，尤其是俄羅斯和中國的僱傭兵。屆時我國將臭名昭著地成爲“僱傭兵天堂”。"
 yakuza_friends:0 "黑幫中的朋友"
 yakuza_friends_desc:0 "有組織犯罪對我們的事業也將有所助益。通過建立黑幫與樞木委員會之間的有利聯盟，這些犯罪集團將利用黑市和其他非法活動，例如走私槍支，來更好地履行保衛祖國的職責。"
