 JAP_protests_1:0 "零星抗議"
 JAP_protests_1_desc:0 "幾場針對經濟狀況，特別是與中華聯邦的新條約的抗議爆發了。"
 JAP_protests_2:0 "大規模抗議"
 JAP_protests_2_desc:0 "抗議的強度和烈度不斷增加，蔓延到了橫濱等重要城市。情況高度不穩定。"
 JAP_protests_3:0 "東京暴動"
 JAP_protests_3_desc:0 "東京爆發了大規模暴動，出於安全考慮，政府和樞木首相已經離開了這座城市"
 JAP_protests_4:0 "全國暴動"
 JAP_protests_4_desc:0 "情況已經失控：暴動和零元購正在全國各地發生。必須要出重拳，不然就全完了。"
 JAP_reconstruction_1:0 "重建計劃"
 JAP_reconstruction_1_desc:0 "樞木首相啓動了一項大範圍重建計劃，以緩解國內目前的矛盾"
 JAP_reconstruction_2:0 "重建計劃"
 JAP_reconstruction_2_desc:0 "樞木首相啓動了一項大範圍重建計劃，以緩解國內目前的矛盾"
 military_anarchy_2:0 "軍事無政府狀態"
 military_anarchy_2_desc:0 "儘管不列顛尼亞人已經離開了我們的國土，由於勢力弱小，我們還是沒能恢復全國各地的秩序。僱傭兵、黑幫、極端主義民兵和武裝市民在全日本各自爲政，看來，他們不願和平交出軍政大權。"
 military_anarchy_3:0 "軍事無政府狀態"
 military_anarchy_3_desc:0 "儘管不列顛尼亞人已經離開了我們的國土，由於勢力弱小，我們還是沒能恢復全國各地的秩序。僱傭兵、黑幫、極端主義民兵和武裝市民在全日本各自爲政，看來，他們不願和平交出軍政大權。"
 military_anarchy:0 "軍事無政府狀態"
 military_anarchy_desc:0 "儘管不列顛尼亞人已經離開了我們的國土，由於勢力弱小，我們還是沒能恢復全國各地的秩序。僱傭兵、黑幫、極端主義民兵和武裝市民在全日本各自爲政，看來，他們不願和平交出軍政大權。"
 pacific_war_scars:0 "太平洋戰爭的創傷"
 pacific_war_scars_desc:0 "第二次太平洋戰爭對日本造成了很多破壞，全國各地的工業被毀、基建倒塌、農田荒蕪。儘管這樣，國民的愛國精神與民族意識卻空前高漲。我們已向世界證明，不列顛尼亞並非不可戰勝，它可以被打敗。樞木萬歲！"
 pacific_war_scars_2:0 "太平洋戰爭的創傷"
 pacific_war_scars_2_desc:0 "第二次太平洋戰爭對日本造成了很多破壞，全國各地的工業被毀、基建倒塌、農田荒蕪。儘管這樣，國民的愛國精神與民族意識卻空前高漲。我們已向世界證明，不列顛尼亞並非不可戰勝，它可以被打敗。樞木萬歲！"
 pacific_war_scars_3:0 "太平洋戰爭的創傷"
 pacific_war_scars_3_desc:0 "第二次太平洋戰爭對日本造成了很多破壞，全國各地的工業被毀、基建倒塌、農田荒蕪。儘管這樣，國民的愛國精神與民族意識卻空前高漲。我們已向世界證明，不列顛尼亞並非不可戰勝，它可以被打敗。樞木萬歲！"
 stagnant_population_6:0 "人口崩潰"
 stagnant_population_6_desc:0 "日本的人口結構早在戰前就已十分嚴峻；現在無數青壯年軍民被殺害，生育率大幅下降，城市整個地變成無人區。"
 democratic_bastion:0 "太平洋的民主"
 democratic_bastion_desc:0 "在第一次太平洋戰爭後，日本以現代共和國的形式成爲了亞洲的第一個民主國家。現有的獨特政治體制保障了穩定和人們的各種權利。特別的，全體公民能享有廣泛的政治自由，人身自由，經濟自由被寫入了憲法。"
 diplomacy_neutrality:0 "強制中立"
 diplomacy_neutrality_desc:0 "日本當前在世界舞臺上的處境危險。地處兩個不斷試圖影響該地區的政治與經濟格局君主制帝國之間。唯一可能的盟友是遠在大陸另一端的歐洲；因此，爲了維護自身獨立並保障櫻石資源的出口，日本不得不採取完全中立的外交政策。"
 industrial_corporations:0 "工業集團"
 industrial_corporations_desc:0 "毫無疑問，日本經濟正處於停滯狀態，而大型工業集團日益壯大的力量使這種情況更加惡化。它們在經濟中的壟斷地位確保了大規模的工業生產，但也影響了中小型企業，導致效率和士氣下降。"
 industrial_corporations_2:0 "工業集團"
 industrial_corporations_2_desc:0 "毫無疑問，日本經濟正處於停滯狀態，而大型工業集團日益壯大的力量使這種情況更加惡化。它們在經濟中的壟斷地位確保了大規模的工業生產，但也影響了中小型企業，導致效率和士氣下降。"
 stagnant_population:0 "嚴重人口危機"
 stagnant_population_desc:0 "必須指出，日本目前仍是世界上人口最多的國家之一，但近幾十年來其出生率遭遇銳減，數據表現比大多數工業化國家更糟糕。這種不可持續的狀況已開始對勞動力市場和工業生產率方面造成影響。"
