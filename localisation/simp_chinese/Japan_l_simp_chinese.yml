 POLITICS_KURURUGI_DESC:0 "樞木玄武是現任日本領袖，也是樞木朱雀的父親。雖然他以固執的性格和強硬的行事作風著稱，但他保徵了日本的獨立和經濟增長。更重要的是，面對任何侵略者，他都將不惜一切代價捍衛自己的國家。"
