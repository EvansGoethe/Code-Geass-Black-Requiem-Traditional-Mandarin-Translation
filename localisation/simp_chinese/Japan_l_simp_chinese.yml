 JAP_post_war_struggle_desc:0 "Even though Japanese people and their leaders might have appeared united during the Pacific War, divisions and contrasts have already begun to increase in the national government. The §RIron Fist§! of §R Prime Minister Kururugi§! was barely tolerated by most of political parties, and now it is openly attacked by the latter. In addition, §RKirihara§! and the §RKyoto Group§! have already noticed the ambitious personality of Kururugi, and they fear a radical change in the country's economy, at their disadvatange.Their actions of disturbance are only matched by the threat of §RSenior Military Officers§!, lead by the charisamtic §RTohdoh§!, who are going to intervene in case of emergency, and avoid total chaos. Eventually, the population might be initially loyal to Kururugi for its leadership during the war, but it is yet to be seen if it will be ready for the aftermath and its new hardships.\n\n§RNOTE: Keep Public Approval Above 40% If You Want To Avoid A Future Collapse.§!"
