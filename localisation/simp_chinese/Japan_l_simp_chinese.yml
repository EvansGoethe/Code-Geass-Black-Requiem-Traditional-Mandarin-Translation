 minerary_industry_funds_fail:0 "經濟衰退"
 minerary_industry_funds_fail_desc:0 "最近的桐原計劃導致大量資本撤出我國，預計中的經濟增長變成了深度經濟混亂。"
 minerary_industry_funds_fail_2:0 "經濟衰退"
 minerary_industry_funds_fail_2_desc:0 "最近的桐原計劃導致大量資本撤出我國，預計中的經濟增長變成了深度經濟混亂。"
 minerary_industry_funds_5:0 "新經濟繁榮"
 minerary_industry_funds_5_desc:0 "我們已經成功扭轉了局勢，國家正在經歷新的金融和經濟增長。"
 surprise_attack_jap:0 "無組織的軍隊"
 surprise_attack_jap_desc:0 "儘管之前做過一些準備，但自第一次太平洋戰爭以來，日本陸軍就沒有真正打過仗，陸軍和軍事指揮部都不確定或沒有做好應對具體任務的準備。"
 surprise_attack_jap_2:0 "混亂的軍事指揮"
 surprise_attack_jap_2_desc:0 "儘管之前做過一些準備，但自第一次太平洋戰爭以來，日本陸軍就沒有真正打過仗，陸軍和軍事指揮部都不確定或沒有做好應對具體任務的準備。"
 political_shock:0 "政治衝擊"
 political_shock_desc:0 "自突襲事件發生以來，整個日本政界都陷入了徹底的震驚之中。除了樞木及其內閣成員外，無人料到會與最危險的超級大國不列顛尼亞公開爆發戰爭。這一次，櫻石護盾失效了"
 democratic_bastion_2:0 "太平洋的民主……？"
 democratic_bastion_2_desc:0 "在第一次太平洋戰爭後，日本以現代共和國的形式成爲了亞洲的第一個民主國家。儘管這樣，戰爭形勢要求我們暫時壓制民主價值觀，爲了更好的管理衝突，樞木首相和他的戰時委員會被授予全權控制國家。"
 democratic_bastion_3:0 "太平洋的民主……？"
 democratic_bastion_3_desc:0 "在第一次太平洋戰爭後，日本以現代共和國的形式成爲了亞洲的第一個民主國家。儘管這樣，戰爭形勢要求我們暫時壓制民主價值觀，爲了更好的管理衝突，樞木首相和他的戰時委員會被授予全權控制國家。"
