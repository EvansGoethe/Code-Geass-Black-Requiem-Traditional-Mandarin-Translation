 JAP.1.t:0 "人口的噩夢"
 JAP.1.d:0 "內政部長公佈的最新統計數據至少令人擔憂。幾十年來，我國人口一直處於極其危險的下降階段，但大多數政府都對此問題置之不理。他們認爲這個問題可以永遠拖延下去，但事實卻是情況逐年惡化。\n\n此外，許多因素相互作用導致了這一問題的產生，例如高生活水平降低了年輕人結婚或組建家庭的積極性，以及對男性羣體造成的巨大社會壓力。\n\n最終，工業企業開始對我們施加一定的壓力，迫使我們採取行動，因爲這種情況從長遠來看將會摧毀就業市場，而現在最初的裂痕已經很明顯了。"
 JAP.1.a:0 "該去工作了"
 JAP.2.t:0 "一個提議"
 JAP.2.d:0 "隨着近期事態發展，我們已在短期內略微減緩了人口下降的趨勢。儘管如此，政府內部一些人仍提出更爲激進且更具爭議性的措施；這些措施可能會對國家產生劇烈但潛在的積極影響。爲了將這些改革轉化爲有效的法律，我們還需要獲得廣泛的支持，而我們可以從民族主義政黨那裏獲得這種支持。\n\n此外，部分自由黨夥伴會受到產業集團和經濟大臣桐原的遊說，這將給我們留下很大的迴旋餘地。毫無疑問，這些法案最終會非常不得人心，預計在最初幾個月會遭到一定程度的民衆抵制……而國家和警察部門將對此予以強力鎮壓。"
 JAP.2.a:0 "你以爲我會向那些白癡屈服嗎？！"
 JAP.2.b:0 "非常時期需要非常手段。"
 JAP.3.t:0 "新中東"
 JAP.3.d:0 "自20世紀被俄羅斯擊敗、不列顛尼亞崛起以來，地緣政治一直是日本的一根刺。作爲亞洲中部唯一真正的民主國家，我們始終受到周邊強大鄰國的擠壓。因此，保持完全中立是確保國家生存直至新千年的最佳選擇。\n\n然而，權力平衡依然脆弱，新的緊張局勢正在太平洋（諷刺的是，太平洋本身也被稱爲太平洋）以及歐洲和中東地區動盪不安。最終，如果我們不能明智地運用手中的籌碼，日本境內蘊藏的大量櫻石礦藏可能會成爲我們的禍根，因爲它們是對抗超級大國的強大地緣政治工具。此外，櫻石礦藏已經證明了其對振興國民經濟及其向出口導向型經濟轉型的重要性。"
 JAP.3.a:0 "這是一場危險的華爾茲"
 JAP.4.t:0 "弓箭手行動"
 JAP.4.d:0 "時代在變化。\n\n自菲律賓戰爭以來，不列顛尼亞一直在我國領海附近進行挑釁性活動，並加劇了對中國和歐盟的敵意。此外，在放棄中立政策後，我們必須做好應對各種嚴峻形勢的準備，包括最糟糕的情況：與三大超級大國之一開戰。我國軍事力量不足以應對真正的戰爭，我們甚至無法完全信任中國或歐盟會前來保障日本的安全。\n\n因此，內政大臣澤崎批准了“弓箭手作戰”計劃，旨在通過一系列迅速的內外政策改革，使日本爲未來的戰爭做好準備。有趣的是，這項計劃是在第一次太平洋戰爭幾十年後製定的，但當時沒有人預料到它會被真正實施，而且我們必須將其保密，以免被不法分子窺探。\n\n最終，我們可能只能實施“弓箭手行動”的部分內容，因爲許多部分需要數月甚至數年才能完成，而我們不能再抽出任何額外的時間。"
 JAP.4.a:0 "我們的未來岌岌可危"
 JAP.7.t:0 "利用市場"
 JAP.7.d:0 "鑑於近期中東局勢動盪，國外對櫻石的需求激增，衆多國家紛紛向日本拋出橄欖枝。經濟大臣桐原和首相樞木已制定一項風險較高的計劃，旨在利用這一契機，確保日本經濟在今年年底前實現繁榮。具體而言，我們將通過在資源市場實施一系列利好商業的措施，例如降低關稅和稅收，爲外國投資者和企業提供非常優惠的條件。\n\n此外，我們將與三大超級大國簽訂重要條約，以低價出口櫻石換取鉅額貸款；顯然，我們將向每個超級大國承諾不切實際的利益，很可能很快就會形成金融泡沫。最終，爲了避免更大的麻煩，我們將被迫制定一項計劃，讓歐盟、中國和不列顛尼亞相互博弈，從而打破金融泡沫，以確保未來的經濟繁榮。的確，在這場國際博弈中，我們必須謹慎行事。"
 JAP.7.a:0 "我們依靠桐原和樞木"
 JAP.6.t:0 "破解市場"
 JAP.6.d:0 "時間緊迫，現在可能是我們在市場上採取果斷行動的合適時機。\n\n儘管如此，我國政府在如何解決當前局勢的問題上出現了分歧。特別是經濟大臣桐原和各大企業傾向於繼續拖延與超級大國的談判，同時維持現有的親商政策。他們認爲，這樣一來，日本就能在最短的時間內獲得最大的利潤。\n\n另一方面，首相樞木及其支持者正在推動儘快批准這些條約，這些條約將被修訂，以確保中國和歐盟獲得幾乎平等的待遇，並對經濟進行新的國家干預。\n\n儘管如此，較小的第三派勢力——內政大臣澤崎和官僚機構——認爲之前的選項過於危險。他們認爲最穩妥的做法是在爲時過晚之前退出與超級大國的任何國際條約，並通過監管資源市場，在自由放任和國家干預之間尋求妥協。\n\n這是關鍵時刻，因爲還不確定哪條路通往成功，哪條路通往災難。"
 JAP.6.a:0 "或許桐原說得也有道理……"
 JAP.6.b:0 "樞木很清楚自己在做什麼。"
 JAP.6.c:0 "澤崎已經證明了他的能力。"
 JAP.8.t:0 "泡沫破裂了！"
 JAP.8.d:0 "經過數週的拖延，意想不到的事情發生了。三大強國因日本態度曖昧而將其告上國際貿易法庭，並迫使日本政府立即償還大量現金和貨物，例如櫻石。這引發了經濟的連鎖反應，因爲爲了避免徹底破產，政府對工人和企業都徵收了高額稅款。\n\n隨後，工地長期罷工以及政府無法保證未來付款，甚至無法保證新櫻石煉油廠的完工，這兩大因素疊加，引發了大規模的外國投資和資金外流。最終，許多公司倒閉，資源市場遭受重創，並波及日本經濟和金融領域的其他部門。諷刺的是，我們最終還是走上了我們曾竭力避免的道路。"
 JAP.8.a:0 "見鬼去吧，桐原！"
 JAP.9.t:0 "泡沫已被打破！"
 JAP.9.d:0 "經過數週與超級大國令人不安的談判，首相樞木和內閣部長馬薩卡與中國和歐盟就櫻石出口問題達成妥協，更重要的是，延長或無限期增加對該國的慷慨投資。\n\n由於政府對所謂的“財政天堂”採取了果斷干預措施，這些收入彌補甚至超過了因調整各項勞動法而造成的損失。此外，新建櫻石精煉廠或發現新礦藏也確保了政府資金的源源不斷流入。\n\n因此，我們正面臨資源市場的新一輪擴張，以及亞洲貿易的繁榮，這帶動了其他金融領域的增長；此外，隨着消費品稅收的降低，普通民衆的購買力也得到了提升。最終，我們已經進入了一個良性經濟循環，並將持續多年。"
 JAP.9.a:0 "我們做到了，樞木！"
 JAP.10.t:0 "泡沫已被避免！"
 JAP.10.d:0 "經過數週與國際貿易法院和超級大國的談判，日本政府迅速退出了所有可能引發國際僵局並使日本陷入經濟危機的掠奪性協議。因此，部分資金和投資已被外國公司撤回。隨後，澤崎和他的官僚們通過一系列小額的保護措施和對工人的補貼，成功地維持了資源精煉廠的穩定。\n\n最終，從櫻石開採中節省下來的資金勉強足以彌補與外國缺乏有利可圖的貿易協定所帶來的損失。此外，預計任何激進舉措都會迅速結束，一切將恢復原狀。"
 JAP.10.a:0 "你真是個幸運的混蛋，不是嗎？"
 JAP.5.t:0 "關東地區發生多次地震！"
 JAP.5.d:0 "對於東京市民來說，這原本是平凡的一天，直到一種他們幾乎無比熟悉的聲音開始響徹城市的幾乎每一個街區——地震警報。\n\n凌晨2點，關東地區記錄到多次地震波，但由於地震中央部門提前發佈了預警信息，政府得以疏散該地區的大部分民衆。此外，雖然損失嚴重，但總體上控制在了局部區域內，應急設施在疏散過程中發揮了重要作用。\n\n儘管各方努力，仍有一些人未能逃離地震，在救援行動開始前不幸遇難。最終，地震持續時間有限，政府已穩定了局勢。"
 JAP.5.a:0 "我們必須幫助我們的人民！"
 JAP.11.t:0 "不列顛尼亞正在進攻！"
 JAP.11.d:0 "儘管我們之前已對不列顛尼亞採取了諸多措施，例如全球封鎖和櫻石對峙，但帝國仍然決定進攻我國。歐盟和中華聯邦已陷入癱瘓，除非出現意外，否則他們不會直接支援我們；日本孤軍奮戰，對抗不列顛尼亞的戰爭機器。尤其令人震驚的是，新型恐怖武器Knightmares的出現，已經嚴重打擊了我們士兵和軍官的士氣。\n\n一切都將在24小時內決定，所以今天，日本人的力量和榮譽必須擊退帝國侵略者，否則我們都將滅亡。"
 JAP.11.a:0 "天皇陛下萬歲！"
 news.4.t:0 "第二次太平洋戰爭"
 news.4.d:0 "全世界普遍認爲，不列顛尼亞不會如此大膽地攻擊日本，從而冒着引發三大超級大國之間全面世界戰爭的風險，但這種想法是錯誤的。\n\n不列顛尼亞皇帝查爾斯·zi·不列顛尼亞出其不意地將帝國的軍事精英——圓桌騎士團全部派往非洲和印度，並將他的旗艦“大不列顛尼亞號”部署到印度洋。趁着所有人的目光都從太平洋轉移開來，入侵開始了。\n\n歐盟和中華聯邦陷入癱瘓，日本只能孤軍奮戰，對抗帝國部署的新型恐怖武器—— Knightmares。最終，許多人認爲日本在超級大國面前幾乎毫無招架之力，唯有奇蹟或極佳的運氣才能避免徹底覆滅。"
 news.4.a:0 "不列顛尼亞又要發動戰爭了嗎？"
 JAP.12.t:0 "樞木發表講話！"
 JAP.12.d:0 "“……最後，我號召每一位日本公民，無論社會地位、性別或年齡，都積極投身戰爭，不計代價！全體人民將秉承獨立神聖的日本民族千年精神，開始對不列顛尼亞瘟疫進行破壞、鬥爭和騷亂！ 沒錯，就是這樣，爲了日本或者死亡！”\n\n說完這些話，樞木便結束了向全國發表的講話，隨後他帶着大部分大臣和政府官員撤離東京，前往一處祕密地點。不列顛尼亞人的確勢不可擋，幾乎一半的前線都已崩潰或潰敗，但樞木相信這可能是他力挽狂瀾的最後機會。最終結果如何，只有時間才能證明……"
 JAP.12.a:0 "不歸路。"
 JAP.13.t:0 "不列顛尼亞提議休戰！"
 JAP.13.d:0 "由於我軍和民衆近幾個月來進行了頑強的抵抗，我們終於成功地逐步遏制了不列顛尼亞的戰爭機器。在此過程中，我們遭受了慘重的損失，但儘管最初遭遇了阻力，這一戰略似乎最終奏效了。樞木首相欣喜地宣佈，不列顛尼亞已提出和平協議，以結束這場血腥的衝突，政府上下也都鬆了一口氣。\n\n此外，還有一些人，特別是軍隊中的一些人，似乎並不看好這項協議，因爲它會將所有櫻石和特許權都交給不列顛尼亞。"
 JAP.13.a:0 "日本還沒有淪陷！"
 JAP.15.t:0 "日本的分裂"
 JAP.15.d:0 "這是一場災難，日本同時遭到三大超級大國的攻擊！\n\n幾周前，樞木和他的政府曾希望與不列顛尼亞達成停戰協議，以應對慘重的損失。然而，停戰並未發生，查爾斯反而決定將戰爭持續到最後。歐盟，尤其是中國，經過一番權衡後，決定介入，以避免日本被不列顛尼亞徹底吞併。儘管他們表面上是出於人道主義目的進行干預，但樞木認爲這將是超級大國瓜分日本的開端。\n\n就在我們談話的此刻，中國軍隊正在我們身後推進，很快整個戰線就會崩潰；我們現在唯一能做的就是決定先向哪一方投降。"
 JAP.15.a:0 "日本淪陷了。\n（遊玩中屬日本）"
 JAP.15.b:0 "日本淪陷了。\n（遊玩不列顛尼亞屬日本）"
 JAP.15.c:0 "日本能夠挺過去。"
 JAP.14.t:0 "首相樞木之死 ！"
 JAP.14.d:0 "這真的是結局了，首相樞木被內政大臣澤崎和多位政府官員發現死於其偏僻的住所中！\n\n樞木當時正和兒子朱雀在一起，顯然兩人發生了激烈的爭吵，最終演變成暴力事件。人們發現朱雀雙手沾滿血跡，正凝視着父親的屍體。大臣們得知真相後，頓時陷入絕望和震驚之中。\n\n事故發生數小時後，據報道多位大臣已逃離日本，主要逃往亞洲和中國。此外，日本全國的行政體系正在崩潰，軍隊也遭到不列顛尼亞軍隊的全方位圍攻。官方抵抗力量正在逐漸瓦解，樞木內閣的殘餘勢力正與桐原和各大企業商討無條件投降的可能性。\n\n願上帝保佑日本。"
 JAP.14.a:0 "什麼！？"
